  function post(type, data = {}) {
    try { window.parent.postMessage({ type, data }, '*'); } catch (_) {}
  }

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function ensureAudio() {
    try {
      if (!sound.ctx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        sound.ctx = new AudioContext();
        sound.masterGain = sound.ctx.createGain();
        sound.masterGain.gain.value = 0.55;
        sound.masterGain.connect(sound.ctx.destination);
      }
      if (sound.ctx.state === 'suspended') sound.ctx.resume();
      return sound.ctx;
    } catch (_) {
      return null;
    }
  }

  function playTone(frequency, duration, options = {}) {
    const ctx = ensureAudio();
    if (!ctx || !sound.masterGain) return;
    const startAt = ctx.currentTime + (options.delay || 0);
    const stopAt = startAt + duration;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = options.type || 'sine';
    osc.frequency.setValueAtTime(frequency, startAt);
    if (options.endFrequency) osc.frequency.exponentialRampToValueAtTime(Math.max(20, options.endFrequency), stopAt);
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(options.gain || 0.08, startAt + 0.018);
    gain.gain.exponentialRampToValueAtTime(0.0001, stopAt);
    osc.connect(gain);
    gain.connect(sound.masterGain);
    osc.start(startAt);
    osc.stop(stopAt + 0.02);
  }

  function playNoise(duration, options = {}) {
    const ctx = ensureAudio();
    if (!ctx || !sound.masterGain) return;
    const startAt = ctx.currentTime + (options.delay || 0);
    const sampleCount = Math.max(1, Math.floor(ctx.sampleRate * duration));
    const buffer = ctx.createBuffer(1, sampleCount, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let index = 0; index < sampleCount; index++) data[index] = (Math.random() * 2 - 1) * (1 - index / sampleCount);
    const source = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    const gain = ctx.createGain();
    source.buffer = buffer;
    filter.type = options.filterType || 'bandpass';
    filter.frequency.value = options.frequency || 900;
    filter.Q.value = options.q || 0.8;
    gain.gain.setValueAtTime(options.gain || 0.06, startAt);
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(sound.masterGain);
    source.start(startAt);
  }

  function playSound(name) {
    if (name === 'start') {
      playTone(392, 0.08, { type: 'triangle', gain: 0.045 });
      playTone(523.25, 0.11, { type: 'triangle', gain: 0.05, delay: 0.07 });
      return;
    }
    if (name === 'break') {
      playNoise(0.12, { frequency: 1250, gain: 0.045 });
      playTone(180, 0.08, { type: 'triangle', gain: 0.025, endFrequency: 120 });
      return;
    }
    if (name === 'food') {
      playTone(659.25, 0.08, { type: 'sine', gain: 0.06 });
      playTone(880, 0.12, { type: 'sine', gain: 0.065, delay: 0.06 });
      playTone(1174.66, 0.15, { type: 'triangle', gain: 0.045, delay: 0.14 });
      return;
    }
    if (name === 'flag') {
      playTone(420, 0.07, { type: 'square', gain: 0.035 });
      playTone(560, 0.08, { type: 'square', gain: 0.028, delay: 0.055 });
      return;
    }
    if (name === 'unflag') {
      playTone(520, 0.06, { type: 'square', gain: 0.025, endFrequency: 360 });
      return;
    }
    if (name === 'trap') {
      playNoise(0.28, { filterType: 'lowpass', frequency: 520, gain: 0.09 });
      playTone(160, 0.28, { type: 'sawtooth', gain: 0.055, endFrequency: 70 });
      return;
    }
    if (name === 'win') {
      [523.25, 659.25, 783.99, 1046.5].forEach((frequency, index) => {
        playTone(frequency, 0.13, { type: 'triangle', gain: 0.055, delay: index * 0.09 });
      });
    }
  }

  function shuffle(items) {
    const arr = items.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = rand(0, i);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function key(q, r) { return `${q},${r}`; }

  function config() {
    if (state.levelConfig) return state.levelConfig;
    state.levelConfig = createLevelConfig();
    return state.levelConfig;
  }

  function createLevelConfig() {
    return DIFFICULTIES[state.difficulty] || DIFFICULTIES.normal;
  }

  function makeLevelConfig(base = DIFFICULTIES.normal, level = 1) {
    const stage = Math.max(0, Math.floor((level - 1) / 2));
    const radius = Math.min(base.maxRadius || base.radius, base.radius + Math.floor(stage / 3));
    const cellCount = 1 + 3 * radius * (radius + 1);
    const emptyCells = Math.min(Math.floor(cellCount * .14), Math.max(0, base.emptyCells + Math.floor(stage / 2) + rand(0, 2)));
    const playableCells = Math.max(12, cellCount - emptyCells);
    const traps = Math.min(Math.floor(playableCells * .28), base.traps + stage * 2 + rand(0, 2));
    const foods = Math.min(Math.floor(playableCells * .36), base.foods + stage * 2 + rand(0, 3));
    const target = Math.min(foods, base.target + Math.floor(stage * 1.5) + rand(0, 1));
    const clues = Math.min(Math.floor(playableCells * .34), base.clues + stage + rand(-2, 3));
    return {
      ...base,
      radius,
      traps: Math.max(3, traps),
      foods: Math.max(target, foods),
      target: Math.max(3, target),
      clues: Math.max(6, clues),
      emptyCells,
      level,
    };
  }

  function buildDifficulties() {
    const wrap = document.getElementById('mhDifficulties');
    wrap.innerHTML = DIFFICULTY_ORDER.map(id => `<button class="mh-difficulty" type="button" data-difficulty="${id}">${DIFFICULTIES[id].label}</button>`).join('');
    wrap.querySelectorAll('[data-difficulty]').forEach(btn => {
      btn.onclick = () => {
        if (state.difficulty === btn.dataset.difficulty) return;
        state.difficulty = btn.dataset.difficulty;
        startGame();
      };
    });
  }

  function makeCells(radius) {
    const cells = [];
    for (let q = -radius; q <= radius; q++) {
      const r1 = Math.max(-radius, -q - radius);
      const r2 = Math.min(radius, -q + radius);
      for (let r = r1; r <= r2; r++) {
        cells.push({ q, r, id: key(q, r), clue: false, trap: false, food: false, collectedFood: false, open: false, flagged: false, n: 0, foodIcon: FOOD_ICONS[rand(0, FOOD_ICONS.length - 1)] });
      }
    }
    return cells;
  }

  function neighbors(cell) {
    return NEIGHBORS.map(([dq, dr]) => state.cellMap.get(key(cell.q + dq, cell.r + dr))).filter(Boolean);
  }

  function generateBoard() {
    state.levelConfig = makeLevelConfig(DIFFICULTIES[state.difficulty] || DIFFICULTIES.normal, state.level);
    const cfg = config();
    state.cells = carveEmptyCells(makeCells(cfg.radius), cfg);
    state.cellMap = new Map(state.cells.map(cell => [cell.id, cell]));
    const center = state.cellMap.get('0,0');
    if (center) center.clue = true;

    const playableCount = state.cells.length;
    const maxClues = Math.max(4, playableCount - cfg.target - cfg.traps - 4);
    const clueCount = Math.max(4, Math.min(cfg.clues, maxClues));
    const cluePool = shuffle(state.cells.filter(cell => !cell.clue && Math.max(Math.abs(cell.q), Math.abs(cell.r), Math.abs(-cell.q - cell.r)) > 1));
    cluePool.slice(0, clueCount).forEach(cell => { cell.clue = true; });

    const hidden = shuffle(state.cells.filter(cell => !cell.clue));
    const trapCount = Math.min(cfg.traps, Math.max(1, hidden.length - cfg.target));
    hidden.slice(0, trapCount).forEach(cell => { cell.trap = true; });
    const foodCount = Math.min(cfg.foods, hidden.filter(cell => !cell.trap).length);
    shuffle(hidden.filter(cell => !cell.trap)).slice(0, foodCount).forEach(cell => { cell.food = true; });
    cfg.clues = clueCount;
    cfg.traps = trapCount;
    cfg.foods = foodCount;
    cfg.target = Math.min(cfg.target, foodCount);

    state.cells.forEach(cell => {
      cell.n = neighbors(cell).filter(n => n.trap).length;
    });
  }

  function carveEmptyCells(cells, cfg) {
    const emptyCount = Math.max(0, Math.min(cells.length - 16, Math.round(cfg.emptyCells || 0)));
    if (!emptyCount) return cells;
    const selected = new Set();
    const candidates = shuffle(cells.filter(cell => cell.id !== '0,0' && Math.max(Math.abs(cell.q), Math.abs(cell.r), Math.abs(-cell.q - cell.r)) > 1));
    for (const cell of candidates) {
      if (selected.size >= emptyCount) break;
      const neighborHoles = NEIGHBORS.filter(([dq, dr]) => selected.has(key(cell.q + dq, cell.r + dr))).length;
      if (neighborHoles > 1) continue;
      selected.add(cell.id);
    }
    return cells.filter(cell => !selected.has(cell.id));
  }

  function startTimer() {
    clearInterval(state.timer);
    state.seconds = 0;
    state.timer = setInterval(() => {
      if (!state.started || state.finished) return;
      state.seconds++;
      document.getElementById('mhTime').textContent = String(state.seconds);
    }, 1000);
  }

  function startGame() {
    const cfg = config();
    state.started = true;
    state.finished = false;
    state.collected = 0;
    state.opened = 0;
    state.flags = 0;
    state.mistakes = 0;
    state.flagMode = false;
    state.pointerMark = null;
    document.getElementById('mhNext').hidden = true;
    generateBoard();
    renderBoard();
    updateHud();
    startTimer();
    hideOverlay();
    playSound('start');
    post('gameStarted', { difficulty: state.difficulty, level: state.level });
  }

  function renderBoard() {
    const centers = state.cells.map(cell => ({
      cell,
      x: Math.sqrt(3) * (cell.q + cell.r / 2),
      y: 1.5 * cell.r,
    }));
    const xs = centers.map(item => item.x);
    const ys = centers.map(item => item.y);
    const minX = Math.min(...xs);
    const maxX = Math.max(...xs);
    const minY = Math.min(...ys);
    const maxY = Math.max(...ys);
    const hexCoordWidth = Math.sqrt(3);
    const hexCoordHeight = 2;
    const pad = 4;
    const scale = Math.min(
      (100 - pad * 2) / (maxX - minX + hexCoordWidth),
      (100 - pad * 2) / (maxY - minY + hexCoordHeight)
    );
    const hexPercent = hexCoordWidth * scale * .985;
    boardEl.style.setProperty('--hex', `${hexPercent}%`);
    boardEl.innerHTML = '';

    centers.forEach(({ cell, x, y }) => {
      const left = pad + (hexCoordWidth * scale / 2) + (x - minX) * scale;
      const top = pad + (hexCoordHeight * scale / 2) + (y - minY) * scale;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = cellClass(cell);
      btn.style.left = `${left}%`;
      btn.style.top = `${top}%`;
      btn.dataset.id = cell.id;
      btn.setAttribute('aria-label', cellLabel(cell));
      btn.innerHTML = cellContent(cell);
      bindCellEvents(btn, cell);
      boardEl.appendChild(btn);
    });
  }

  function bindCellEvents(btn, cell) {
    btn.onclick = (event) => {
      event.preventDefault();
      if (state.skipNextClick && state.skipClickCellId === cell.id) {
        state.skipNextClick = false;
        state.skipClickCellId = null;
        return;
      }
      if (cell.flagged) toggleFlag(cell);
      else openCell(cell);
    };
    btn.oncontextmenu = (event) => {
      event.preventDefault();
      toggleFlag(cell);
    };
    btn.addEventListener('pointerdown', (event) => {
      clearTimeout(state.longPressTimer);
      try { btn.setPointerCapture(event.pointerId); } catch (_) {}
      state.pointerMark = { id: cell.id, pointerId: event.pointerId, x: event.clientX, y: event.clientY, marked: false, dragging: false, sourceEl: btn, ghost: null };
    });
    btn.addEventListener('pointermove', (event) => {
      const mark = state.pointerMark;
      if (!mark || mark.id !== cell.id || mark.pointerId !== event.pointerId || mark.marked) return;
      const dx = event.clientX - mark.x;
      const dy = event.clientY - mark.y;
      if (Math.hypot(dx, dy) >= 14) {
        clearTimeout(state.longPressTimer);
        skipNextCellClick(cell);
        if (!mark.dragging) startCellDrag(mark, event);
        moveCellDrag(mark, event);
      }
    });
    btn.addEventListener('pointerup', (event) => finishPointerMark(cell, event));
    btn.addEventListener('pointercancel', () => clearPointerMark(cell));
    btn.addEventListener('pointerleave', () => {
      if (!state.pointerMark?.dragging) clearTimeout(state.longPressTimer);
    });
  }

  function startCellDrag(mark, event) {
    const el = mark.sourceEl;
    if (!el) return;
    mark.dragging = true;
    const rect = el.getBoundingClientRect();
    const ghost = document.createElement('i');
    ghost.className = 'mh-drag-ghost';
    ghost.style.setProperty('--ghost-w', `${rect.width}px`);
    ghost.style.setProperty('--ghost-h', `${rect.height}px`);
    document.body.appendChild(ghost);
    mark.ghost = ghost;
    el.classList.add('drag-placeholder');
    el.innerHTML = '?';
    moveCellDrag(mark, event);
  }

  function moveCellDrag(mark, event) {
    if (!mark?.ghost) return;
    mark.ghost.style.left = `${event.clientX}px`;
    mark.ghost.style.top = `${event.clientY}px`;
  }

  function finishPointerMark(cell, event) {
    clearTimeout(state.longPressTimer);
    const mark = state.pointerMark;
    if (!mark || mark.id !== cell.id) return;
    if (mark.dragging) {
      skipNextCellClick(cell);
      const dx = event.clientX - mark.x;
      const dy = event.clientY - mark.y;
      cleanupCellDrag(mark);
      if (Math.hypot(dx, dy) >= 14) markTrap(cell);
      else refreshCell(cell);
    }
    state.pointerMark = null;
  }

  function skipNextCellClick(cell) {
    state.skipNextClick = true;
    state.skipClickCellId = cell.id;
    setTimeout(() => {
      if (state.skipClickCellId === cell.id) {
        state.skipNextClick = false;
        state.skipClickCellId = null;
      }
    }, 60);
  }

  function cleanupCellDrag(mark) {
    mark?.ghost?.remove();
    if (mark?.sourceEl) {
      mark.sourceEl.classList.remove('drag-placeholder');
      const cell = state.cellMap.get(mark.id);
      if (cell) refreshCell(cell);
    }
  }

  function clearPointerMark(cell) {
    clearTimeout(state.longPressTimer);
    if (state.pointerMark?.id === cell.id) {
      cleanupCellDrag(state.pointerMark);
      state.pointerMark = null;
    }
  }

  function cellClass(cell) {
    if (cell.clue) return 'mh-cell clue';
    if (cell.flagged && !cell.open) return 'mh-cell flagged';
    if (!cell.open) return 'mh-cell hidden';
    if (cell.trap) return 'mh-cell trap';
    if (cell.food) return 'mh-cell food';
    return 'mh-cell open';
  }

  function cellContent(cell) {
    if (cell.clue) return String(cell.n);
    if (cell.flagged && !cell.open) return '🚩';
    if (!cell.open) return '';
    if (cell.trap) return '🪤';
    if (cell.food) return `<span class="food-icon">${cell.foodIcon}</span>`;
    if (cell.collectedFood) return '';
    return cell.n > 0 ? `<span class="tiny">${cell.n}</span>` : '';
  }

  function cellLabel(cell) {
    if (cell.clue) return `线索，附近 ${cell.n} 个陷阱`;
    if (cell.flagged) return '已标记为陷阱';
    if (!cell.open) return '未探索空地';
    if (cell.trap) return '陷阱';
    if (cell.food) return '食物';
    if (cell.collectedFood) return '已收集食物的空地';
    return '安全空地';
  }

  function refreshCell(cell) {
    const el = boardEl.querySelector(`[data-id="${cell.id}"]`);
    if (!el) return;
    el.className = cellClass(cell);
    el.innerHTML = cellContent(cell);
    el.setAttribute('aria-label', cellLabel(cell));
  }

  function openCell(cell) {
    if (!state.started || state.finished || cell.clue || cell.open || cell.flagged) return;
    const el = boardEl.querySelector(`[data-id="${cell.id}"]`);
    breakCell(el);
    playSound('break');
    cell.open = true;
    state.opened++;
    if (cell.trap) {
      state.mistakes++;
      playSound('trap');
      revealAll(false);
      finish(false);
      return;
    }
    if (cell.food) {
      const foodIcon = cell.foodIcon;
      state.collected++;
      cell.food = false;
      cell.collectedFood = true;
      refreshCell(cell);
      flyFoodToHud(foodIcon, el);
      playSound('food');
      if (state.collected >= config().target) {
        revealAll(true);
        finish(true);
        return;
      }
    } else {
      refreshCell(cell);
      if (cell.n === 0) openSafePatch(cell);
    }
    updateHud();
  }

  function breakCell(el) {
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const colors = el.classList.contains('flagged')
      ? ['#f97316', '#dc2626', '#fed7aa']
      : el.classList.contains('clue')
        ? ['#334155', '#111827', '#64748b']
        : ['#fde047', '#f59e0b', '#fbbf24'];
    for (let i = 0; i < 9; i++) {
      const piece = document.createElement('i');
      const size = Math.max(5, Math.round(rect.width * (i % 3 === 0 ? .14 : .11)));
      piece.className = 'mh-fragment';
      piece.style.left = `${rect.left + rect.width * (.24 + (i % 3) * .22)}px`;
      piece.style.top = `${rect.top + rect.height * (.25 + Math.floor(i / 3) * .2)}px`;
      piece.style.setProperty('--frag-size', `${size}px`);
      piece.style.setProperty('--frag-color', colors[i % colors.length]);
      piece.style.setProperty('--frag-x', `${rand(-42, 42)}px`);
      piece.style.setProperty('--frag-y', `${rand(62, 138)}px`);
      piece.style.setProperty('--frag-rot', `${rand(-190, 210)}deg`);
      piece.style.setProperty('--frag-duration', `${rand(560, 860)}ms`);
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 900);
    }
  }

  function flyFoodToHud(icon, sourceEl) {
    if (!sourceEl) return;
    const from = sourceEl.getBoundingClientRect();
    const target = document.getElementById('mhFood')?.getBoundingClientRect();
    if (!target) return;
    const fly = document.createElement('span');
    fly.className = 'mh-food-fly';
    fly.textContent = icon;
    fly.style.setProperty('--from-x', `${from.left + from.width / 2}px`);
    fly.style.setProperty('--from-y', `${from.top + from.height / 2}px`);
    fly.style.setProperty('--to-x', `${target.left + target.width / 2}px`);
    fly.style.setProperty('--to-y', `${target.top + target.height / 2}px`);
    document.body.appendChild(fly);
    setTimeout(() => fly.remove(), 860);
  }

  function openSafePatch(startCell) {
    const queue = [startCell];
    const seen = new Set([startCell.id]);
    while (queue.length) {
      const cell = queue.shift();
      neighbors(cell).forEach(next => {
        if (seen.has(next.id) || next.clue || next.trap || next.food || next.flagged) return;
        seen.add(next.id);
        if (!next.open) {
          next.open = true;
          state.opened++;
          refreshCell(next);
        }
        if (next.n === 0) queue.push(next);
      });
    }
  }

  function toggleFlag(cell) {
    if (!state.started || state.finished || cell.clue || cell.open) return;
    cell.flagged = !cell.flagged;
    state.flags += cell.flagged ? 1 : -1;
    playSound(cell.flagged ? 'flag' : 'unflag');
    refreshCell(cell);
    updateHud();
  }

  function markTrap(cell) {
    if (!state.started || state.finished || cell.clue || cell.open || cell.flagged) return;
    cell.flagged = true;
    state.flags++;
    playSound('flag');
    refreshCell(cell);
    updateHud();
  }

  function revealAll(won) {
    state.cells.forEach(cell => {
      if (!cell.clue) {
        cell.open = true;
        if (cell.flagged && !cell.trap) {
          const el = boardEl.querySelector(`[data-id="${cell.id}"]`);
          el?.classList.add('mark-wrong');
        }
      }
      refreshCell(cell);
    });
    if (won) burstConfetti();
  }

  function finish(won) {
    if (state.finished) return;
    state.finished = true;
    clearInterval(state.timer);
    const cfg = config();
    const completedLevel = state.level;
    const score = Math.max(10, cfg.reward + state.collected * 8 + state.level * 3 - state.seconds - state.mistakes * 18);
    if (won) {
      playSound('win');
      state.best = Math.max(state.best, score);
      state.level++;
      localStorage.setItem(STORAGE_KEY_BEST, String(state.best));
      localStorage.setItem(STORAGE_KEY_LEVEL, String(state.level));
      document.getElementById('mhNext').hidden = false;
      showResult('收集成功！', `找到了 ${state.collected} 份食物，没有让哈奇踩进陷阱。`, '下一局', () => startGame());
    } else {
      showResult('踩到陷阱了', '黑色数字会告诉你周围陷阱数量，再试一次就更稳。', '再来一次', () => startGame());
    }
    if (won) {
      post('gameFinished', {
        completed: true,
        passed: true,
        earnedPoints: score,
        score,
        level: completedLevel,
        difficulty: DIFFICULTY_ORDER.indexOf(state.difficulty) + 1,
        difficultyId: state.difficulty,
        collected: state.collected,
        targetFood: cfg.target,
        traps: cfg.traps,
        seconds: state.seconds,
        finishedAt: Date.now(),
        roundId: `${state.difficulty}-${completedLevel}-${Date.now()}`,
      });
    }
  }

  function updateHud() {
    const cfg = config();
    document.getElementById('mhLevel').textContent = String(state.level);
    document.getElementById('mhFood').textContent = String(state.collected);
    document.getElementById('mhTarget').textContent = String(cfg.target);
    document.getElementById('mhTraps').textContent = String(Math.max(0, cfg.traps - state.flags));
    document.getElementById('mhTime').textContent = String(state.seconds);
    document.querySelectorAll('[data-difficulty]').forEach(btn => btn.classList.toggle('active', btn.dataset.difficulty === state.difficulty));
  }

  function showOverlay(title, text, buttonText, action) {
    overlayTitleEl.textContent = title;
    overlayTextEl.textContent = text;
    startBtn.textContent = buttonText;
    startBtn.onclick = action;
    overlayEl.hidden = false;
  }

  function showResult(title, text, buttonText, action) {
    setTimeout(() => showOverlay(title, text, buttonText, action), 420);
  }

  function hideOverlay() {
    overlayEl.hidden = true;
  }

  function popToast(text, className = '') {
    const toast = document.createElement('div');
    toast.className = `mh-toast ${className}`.trim();
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1350);
  }

  function burstConfetti() {
    const colors = ['#f97316', '#facc15', '#22c55e', '#38bdf8', '#fb7185'];
    for (let i = 0; i < 34; i++) {
      const piece = document.createElement('i');
      piece.className = 'mh-confetti';
      piece.style.left = `${rand(5, 95)}vw`;
      piece.style.setProperty('--x', `${rand(-70, 70)}px`);
      piece.style.setProperty('--d', `${rand(900, 1500)}ms`);
      piece.style.setProperty('--c', colors[rand(0, colors.length - 1)]);
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 1600);
    }
  }

  function requestPetImage() {
    const requestId = `food_hex_pet_${Date.now()}`;
    try {
      window.parent.postMessage({ type: 'haqi_get_pet_image', requestId, anim: 'happy' }, '*');
    } catch (_) {}
  }

  async function setPetImage(pet) {
    cleanupObjectUrls();
    const holder = document.getElementById('mhPet');
    if (!pet?.imageBlob || !pet?.uv) return;
    const url = URL.createObjectURL(pet.imageBlob);
    state.objectUrls.push(url);
    const { col = 0, row = 0, cols = 1, rows = 1 } = pet.uv;
    const posX = cols > 1 ? `${col * 100 / (cols - 1)}%` : 'center';
    const posY = rows > 1 ? `${row * 100 / (rows - 1)}%` : 'center';
    holder.innerHTML = `<div class="sprite"></div>`;
    const sprite = holder.querySelector('.sprite');
    sprite.style.backgroundImage = `url("${url}")`;
    sprite.style.backgroundSize = cols > 1 || rows > 1 ? `${cols * 100}% ${rows * 100}%` : 'contain';
    sprite.style.backgroundPosition = `${posX} ${posY}`;
  }

  function cleanupObjectUrls() {
    state.objectUrls.forEach(url => URL.revokeObjectURL(url));
    state.objectUrls = [];
  }

  window.addEventListener('message', event => {
    const msg = event.data || {};
    if (msg.type === 'gameContinue') startGame();
    if (msg.type === 'haqi_pet_image' && msg.ok) setPetImage(msg.data);
    if (msg.type === 'setGameConfig' && msg.data?.difficulty && DIFFICULTIES[msg.data.difficulty]) {
      state.difficulty = msg.data.difficulty;
      startGame();
    }
  });

  document.getElementById('mhMenu').onclick = () => showOverlay('寻找食物', '数字表示相邻陷阱数量，可用它判断哪些黄色格子安全。点击黄色格子清理，拖动可疑格子可标记陷阱，电脑也可右键标记；收集到目标数量的食物即可过关。', state.started ? '继续' : '开始寻找', () => state.started ? hideOverlay() : startGame());
  document.getElementById('mhHelp').onclick = document.getElementById('mhMenu').onclick;
  document.getElementById('mhRestart').onclick = () => startGame();
  document.getElementById('mhNext').onclick = () => startGame();
  startBtn.onclick = () => startGame();
  window.addEventListener('beforeunload', cleanupObjectUrls);

  buildDifficulties();
  updateHud();
  requestPetImage();
  post('gameLoaded');
})();
</script>

</html>
