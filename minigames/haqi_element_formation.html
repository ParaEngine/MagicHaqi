<script>
// Gameplay configuration. A parent "setGameConfig" message can override any of this.
// Built programmatically for brevity; the resulting shape matches the engine below.
(function () {
  // ----- 五行 + 觉醒系 -----
  // 金→木→土→水→火→金 (beats 指该系克制的目标)。雷为「觉醒」隐藏系，克水。
  const ELEMENTS = {
    metal:   { key: 'metal',   name: '金', color: '#d9d2c5', glow: '#fff3c4', emoji: '⚙️', beats: 'wood'  },
    wood:    { key: 'wood',    name: '木', color: '#6abe5a', glow: '#b6f59a', emoji: '🌿', beats: 'earth' },
    earth:   { key: 'earth',   name: '土', color: '#b07a4a', glow: '#e6b07a', emoji: '🪨', beats: 'water' },
    water:   { key: 'water',   name: '水', color: '#4aa8e0', glow: '#a8e0ff', emoji: '💧', beats: 'fire'  },
    fire:    { key: 'fire',    name: '火', color: '#e0623a', glow: '#ffb070', emoji: '🔥', beats: 'metal' },
    // 觉醒系：雷克水（教学第二关用）
    thunder: { key: 'thunder', name: '雷', color: '#f2d23a', glow: '#fff89a', emoji: '⚡', beats: 'water', awakened: true }
  };

  const EMO = Object.fromEntries(Object.values(ELEMENTS).map(e => [e.key, e.emoji]));
  const _ = () => ({ t: 'empty' });
  const W = () => ({ t: 'wall' });
  let _eid = 0;
  function enemy(element, hp) {
    return { t: 'enemy', p: { id: 'e' + (++_eid), element, atk: 0, hp, maxHp: hp, emoji: EMO[element], side: 'enemy' } };
  }
  function form(element, atk, hp) { return { key: element, element, name: ELEMENTS[element].name, atk, hp, emoji: EMO[element] }; }
  function pet(id, name, forms, formKey) { return { id, name, forms, formKey: formKey || forms[0].key }; }

  window.game_config = {
    difficulty: 'easy',
    gridSize: 4,
    elements: ELEMENTS,
    elementBonus: 1.75,
    elementPenalty: 0.55,

    levels: [
      // ===== 教学一：属性克制（拖拽） =====
      {
        id: 1, name: '初遇·水克火', difficulty: 'easy', tutorial: true,
        grid: [
          [ _(), _(), _(), _() ],
          [ _(), enemy('fire', 12), _(), _() ],
          [ _(), _(), _(), _() ],
          [ _(), _(), _(), _() ]
        ],
        bench: [ pet('p1', '水灵', [ form('water', 10, 10) ]) ],
        guide: {
          steps: [
            { type: 'drag', cell: [2, 1], say: '把这只💧水系小可爱，拖到发光的草地上！' },
            { type: 'resolve', say: '水能浇灭火🔥！按下【推演】，一击必杀！' }
          ]
        },
        objective: 'clear'
      },
      // ===== 教学二：形态觉醒 =====
      {
        id: 2, name: '觉醒·雷克水', difficulty: 'easy', tutorial: true,
        grid: [
          [ _(), _(), _(), _() ],
          [ _(), enemy('water', 16), _(), _() ],
          [ _(), _(), _(), _() ],
          [ _(), _(), _(), _() ]
        ],
        bench: [ pet('p1', '变变兽', [ form('wood', 12, 10), form('thunder', 12, 10) ], 'wood') ],
        guide: {
          steps: [
            { type: 'drag', cell: [2, 1], say: '先把宝宝拖到发光的草地上～' },
            { type: 'awaken', say: '敌人是💧水系，普通攻击不够力！点击宝宝头上的 ✨ 让它觉醒成 ⚡ 雷！' },
            { type: 'resolve', say: '雷劈水面，必杀！按下【推演】！' }
          ]
        },
        objective: 'clear'
      },
      // ===== 入门实战 =====
      {
        id: 3, name: '双面夹击', difficulty: 'easy',
        hint: '水克火、火克金。把宝宝对准草地上的敌人。',
        grid: [
          [ _(), enemy('fire', 14), _(), enemy('metal', 14) ],
          [ _(), _(), _(), _() ],
          [ _(), _(), _(), _() ],
          [ _(), _(), _(), _() ]
        ],
        bench: [ pet('p1', '水灵', [ form('water', 14, 10) ]), pet('p2', '火狐', [ form('fire', 14, 10) ]) ],
        objective: 'clear'
      },

      // ===== 标准 =====
      {
        id: 4, name: '四方来敌', difficulty: 'normal',
        hint: '每个敌人单独占一条直线，给它配上克制它的宝宝。',
        grid: [
          [ _(), enemy('fire', 16), _(), enemy('metal', 16) ],
          [ _(), _(), _(), _() ],
          [ _(), _(), _(), _() ],
          [ _(), enemy('water', 16), _(), enemy('wood', 16) ]
        ],
        bench: [
          pet('p1', '水澜', [ form('water', 14, 10) ]),
          pet('p2', '火狐', [ form('fire', 14, 10) ]),
          pet('p3', '土岩', [ form('earth', 14, 10) ]),
          pet('p4', '金锋', [ form('metal', 14, 10) ])
        ],
        objective: 'clear'
      },
      {
        id: 5, name: '形态抉择', difficulty: 'normal',
        hint: '一只宝宝可在多种元素间切换，选对系别才能克制。',
        grid: [
          [ _(), W(), enemy('earth', 18), W() ],
          [ _(), _(), _(), _() ],
          [ _(), _(), _(), _() ],
          [ W(), enemy('water', 18), _(), W() ]
        ],
        bench: [
          pet('p1', '三变兽', [ form('wood', 16, 10), form('metal', 16, 10), form('fire', 16, 10) ], 'wood'),
          pet('p2', '岩兽', [ form('earth', 16, 10) ])
        ],
        objective: 'clear'
      },

      // ===== 困难 =====
      {
        id: 6, name: '环环相扣', difficulty: 'hard',
        hint: '金克木、木克土、土克水、水克火、火克金。',
        grid: [
          [ enemy('wood', 20), _(), _(), enemy('earth', 20) ],
          [ _(), W(), W(), _() ],
          [ _(), W(), W(), _() ],
          [ enemy('fire', 20), _(), _(), enemy('water', 20) ]
        ],
        bench: [
          pet('p1', '金锋', [ form('metal', 16, 10) ]),
          pet('p2', '木藤', [ form('wood', 16, 10) ]),
          pet('p3', '水澜', [ form('water', 16, 10) ]),
          pet('p4', '土岩', [ form('earth', 16, 10) ])
        ],
        objective: 'clear'
      },

      // ===== 专家 =====
      {
        id: 7, name: '终极博弈', difficulty: 'expert',
        hint: '双形态宝宝需精确换系，找准每一条直线。',
        grid: [
          [ enemy('metal', 24), _(), enemy('wood', 24), _() ],
          [ _(), W(), _(), _() ],
          [ _(), _(), W(), _() ],
          [ _(), enemy('water', 24), _(), enemy('fire', 24) ]
        ],
        bench: [
          pet('p1', '炎金兽', [ form('fire', 22, 10), form('metal', 22, 10) ], 'fire'),
          pet('p2', '土木兽', [ form('earth', 22, 10), form('wood', 22, 10) ], 'earth'),
          pet('p3', '水灵', [ form('water', 22, 10) ]),
          pet('p4', '金锋', [ form('metal', 22, 10) ])
        ],
        objective: 'clear'
      }
    ],

    difficultyReward: { easy: 70, normal: 95, hard: 125, expert: 160 }
  };
})();
</script>

<script defer>
(function () {
  // ============================================================ i18n
  const I18N = {
    zhCN: {
      title: '元素编队推演',
      subtitle: '拖拽布阵 · 克制制胜',
      start: '开始冒险',
      levelLabel: '关卡', enemyLabel: '剩余敌人',
      resolve: '⚡ 推 演', reset: '重来', next: '下一关',
      diffEasy: '入门', diffNormal: '标准', diffHard: '困难', diffExpert: '专家',
      winTitle: '🎉 推演成功',
      winText: '第 {level} 关「{name}」清场！获得 {coins} 金币 · {stars}★',
      failTitle: '差一点点',
      failText: '还剩 {remaining} 个敌人，调整方向或元素再试一次！',
      retry: '重新布阵',
      hintDrag: '👇 把下方的宝宝拖到草地空格上',
      hintAim: '👆 点击场上宝宝可旋转攻击方向，点 ✨ 可觉醒换系',
      hintReady: '⚡ 准备好了就按【推演】！',
      counter: '克制', weak: '微弱',
      awaken: '觉醒', form: '形态',
      ringTitle: '五行相克',
      audioOn: '🔊 音效', audioOff: '🔇 静音',
      tipTitle: '怎么玩',
      tip: '把宝宝拖到草地，让它的攻击射线打到敌人。元素相克时伤害大增（⬆️克制），相反则微弱（⬇️）。清光所有敌人即过关！'
    },
    enUS: {
      title: 'Element Formation',
      subtitle: 'Drag · Counter · Win',
      start: 'Start',
      levelLabel: 'Level', enemyLabel: 'Enemies',
      resolve: '⚡ Resolve', reset: 'Reset', next: 'Next',
      diffEasy: 'Easy', diffNormal: 'Normal', diffHard: 'Hard', diffExpert: 'Expert',
      winTitle: '🎉 Cleared',
      winText: 'Level {level} "{name}" cleared! +{coins} coins · {stars}★',
      failTitle: 'So close',
      failText: '{remaining} enemy(ies) left. Adjust aim or element and retry!',
      retry: 'Redeploy',
      hintDrag: '👇 Drag a pet onto an empty grass tile',
      hintAim: '👆 Tap a placed pet to rotate aim, tap ✨ to awaken',
      hintReady: '⚡ Ready? Hit Resolve!',
      counter: 'Counter', weak: 'Weak',
      awaken: 'Awaken', form: 'Form',
      ringTitle: 'Five Elements',
      audioOn: '🔊 Sound', audioOff: '🔇 Mute',
      tipTitle: 'How to play',
      tip: 'Drag a pet onto the grass so its attack ray hits an enemy. Counter elements deal big damage (⬆️), reverse is weak (⬇️). Clear all enemies to win!'
    }
  };
  function detectLang() {
    try { const p = new URLSearchParams(location.search).get('lang'); if (p && I18N[p]) return p; } catch (_) {}
    return 'zhCN';
  }
  const LANG = detectLang();
  const L = I18N[LANG];
  function t(key, vars) {
    let s = L[key] || I18N.zhCN[key] || key;
    if (vars) s = s.replace(/\{(\w+)\}/g, (m, n) => vars[n] != null ? String(vars[n]) : m);
    return s;
  }
  try { document.documentElement.setAttribute('lang', LANG === 'enUS' ? 'en' : 'zh-CN'); } catch (_) {}
  try { document.title = t('title'); } catch (_) {}

  // ============================================================ constants & state
  const STORAGE_DIFF = 'haqiElementFormationLastDifficulty';
  const STORAGE_BEST = 'haqiElementFormationBestLevel';
  const STORAGE_LVL = 'haqiElementFormationLevelIdx';
  const STORAGE_STARTED = 'haqiElementFormationStarted';
  const STORAGE_DEPLOY = 'haqiElementFormationDeploy';
  const SIZE = window.game_config.gridSize || 4;
  // clockwise order for tap-to-rotate
  const DIRS = [
    { key: 'up', dr: -1, dc: 0, label: '↑' },
    { key: 'right', dr: 0, dc: 1, label: '→' },
    { key: 'down', dr: 1, dc: 0, label: '↓' },
    { key: 'left', dr: 0, dc: -1, label: '←' }
  ];
  const dirByKey = k => DIRS.find(d => d.key === k) || DIRS[0];
  const DIFFICULTY_ORDER = ['easy', 'normal', 'hard', 'expert'];
  const CYCLE = ['metal', 'wood', 'earth', 'water', 'fire']; // ring order (each beats next)

  function elementMul(atkEl, defEl) {
    if (!atkEl || !defEl) return 1;
    const e = window.game_config.elements;
    if (e[atkEl] && e[atkEl].beats === defEl) return window.game_config.elementBonus || 1.75;
    if (e[defEl] && e[defEl].beats === atkEl) return window.game_config.elementPenalty || 0.55;
    return 1;
  }
  function normalizeDifficulty(v) { return DIFFICULTY_ORDER.includes(v) ? v : 'easy'; }
  function levelsForDifficulty(d) { return (window.game_config.levels || []).filter(l => l.difficulty === d); }
  function clone(o) { return JSON.parse(JSON.stringify(o)); }

  const state = {
    difficulty: normalizeDifficulty(localStorage.getItem(STORAGE_DIFF)),
    levelIndex: Math.max(0, Number(localStorage.getItem(STORAGE_LVL) || 0)) || 0,
    bestLevel: Number(localStorage.getItem(STORAGE_BEST) || 1),
    started: localStorage.getItem(STORAGE_STARTED) === '1',
    finished: false,
    resolving: false,
    level: null,
    grid: null,
    bench: null,
    deployed: [],            // {id,benchId,row,col,formKey,dir,atk,element,emoji,name,forms}
    selectedId: null,
    guide: null,             // { steps, idx } active tutorial
    petAsset: null,
    petRequestId: '',
    objectUrls: []
  };

  function loadLevel(diff, idx) {
    const list = levelsForDifficulty(diff);
    const lv = list[idx] || list[0] || (window.game_config.levels || [])[0];
    if (!lv) return null;
    state.level = clone(lv);
    state.grid = clone(state.level.grid);
    state.bench = clone(state.level.bench);
    state.deployed = [];
    state.selectedId = null;
    state.finished = false;
    state.resolving = false;
    state.guide = (state.level.guide && state.level.guide.steps) ? { steps: state.level.guide.steps, idx: 0 } : null;
    return state.level;
  }

  // ---- session persistence (survive page/iframe reloads) ----
  function deployKey() { return state.difficulty + ':' + state.levelIndex; }
  function persistMeta() {
    try {
      localStorage.setItem(STORAGE_DIFF, state.difficulty);
      localStorage.setItem(STORAGE_LVL, String(state.levelIndex));
      localStorage.setItem(STORAGE_STARTED, state.started ? '1' : '0');
    } catch (_) {}
  }
  function persistDeploy() {
    try {
      const all = JSON.parse(localStorage.getItem(STORAGE_DEPLOY) || '{}');
      // only snapshot stable, pre-resolve layouts
      if (state.resolving || state.finished) delete all[deployKey()];
      else all[deployKey()] = { deployed: state.deployed, selectedId: state.selectedId };
      localStorage.setItem(STORAGE_DEPLOY, JSON.stringify(all));
    } catch (_) {}
  }
  function clearDeploy() {
    try {
      const all = JSON.parse(localStorage.getItem(STORAGE_DEPLOY) || '{}');
      delete all[deployKey()];
      localStorage.setItem(STORAGE_DEPLOY, JSON.stringify(all));
    } catch (_) {}
  }
  function restoreDeploy() {
    // call AFTER loadLevel (which clears deployed). Re-applies a saved layout for this exact level.
    try {
      const all = JSON.parse(localStorage.getItem(STORAGE_DEPLOY) || '{}');
      const snap = all[deployKey()];
      if (!snap || !Array.isArray(snap.deployed) || !state.grid) return;
      state.deployed = snap.deployed.filter(d =>
        d && Number.isInteger(d.row) && Number.isInteger(d.col) &&
        d.row >= 0 && d.row < SIZE && d.col >= 0 && d.col < SIZE &&
        state.grid[d.row][d.col].t === 'empty' &&
        Array.isArray(d.forms) && state.bench.some(b => b.id === d.benchId));
      state.selectedId = state.deployed.some(d => d.id === snap.selectedId) ? snap.selectedId : null;
    } catch (_) {}
  }

  // ============================================================ scaffold
  const root = document.createElement('div');
  root.id = 'efShell';
  root.innerHTML = `
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        font-family: 'Segoe UI', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        color: #f5f3ea; user-select: none;
        background:
          linear-gradient(180deg, #6fc3ff 0%, #9ad9ff 38%, #bfe9ff 50%, #7ec46a 50%, #5ea84e 60%, #4a7c3a 100%);
      }
      /* faint voxel grid texture over sky+ground */
      body::before {
        content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .10;
        background-image:
          linear-gradient(rgba(0,0,0,.5) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,0,0,.5) 1px, transparent 1px);
        background-size: 34px 34px;
      }
      .ef-shell { position: relative; z-index: 1; height: 100vh; display: grid;
        grid-template-rows: auto minmax(0,1fr) auto auto auto; gap: 8px; padding: 8px; overflow: hidden; }

      /* ---- voxel panel base ---- */
      .vox {
        background: linear-gradient(180deg, #8a6a44 0%, #6e4f2f 100%);
        border: 3px solid #3f2c19;
        border-radius: 6px;
        box-shadow: inset 0 4px 0 rgba(255,255,255,.18), inset 0 -5px 0 rgba(0,0,0,.28), 0 4px 0 rgba(0,0,0,.3);
      }

      /* ---- top bar ---- */
      .ef-top { display: grid; grid-template-columns: auto minmax(0,1fr) auto; align-items: center; gap: 8px; padding: 7px 10px; }
      .ef-top .ttl { font-weight: 900; font-size: 15px; letter-spacing: .5px; color: #fff;
        text-shadow: 2px 2px 0 #3f2c19; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .ef-pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: 4px;
        background: #2e4d22; border: 2px solid #1d3315; color: #d8f5c8; font-size: 11px; font-weight: 900;
        box-shadow: inset 0 2px 0 rgba(255,255,255,.12); }
      .ef-pill b { color: #fff; font-size: 13px; }
      .ef-iconbtn { width: 34px; height: 34px; border: 3px solid #3f2c19; border-radius: 6px; cursor: pointer;
        background: linear-gradient(180deg, #c89b5a, #a87838); color: #fff; font-size: 16px; font-weight: 900;
        text-shadow: 1px 1px 0 #3f2c19; box-shadow: inset 0 3px 0 rgba(255,255,255,.25), 0 3px 0 rgba(0,0,0,.3); }
      .ef-iconbtn:active { transform: translateY(2px); box-shadow: inset 0 3px 0 rgba(255,255,255,.25); }

      /* ---- stage + board ---- */
      .ef-stage { min-height: 0; position: relative; display: grid; place-items: center; padding: 2px; }
      .ef-board-wrap { position: relative; width: min(92vw, calc(100vh - 320px), 460px); aspect-ratio: 1;
        padding: 10px; background: linear-gradient(180deg, #7a5a36, #5c4127);
        border: 4px solid #3f2c19; border-radius: 8px;
        box-shadow: inset 0 5px 0 rgba(255,255,255,.16), inset 0 -7px 0 rgba(0,0,0,.3), 0 8px 0 rgba(0,0,0,.32), 0 14px 24px rgba(0,0,0,.3); }
      .ef-board { position: relative; width: 100%; height: 100%; display: grid;
        grid-template-columns: repeat(${SIZE}, 1fr); grid-template-rows: repeat(${SIZE}, 1fr);
        gap: 5px; }
      .ef-cell { position: relative; border-radius: 4px; cursor: pointer; transition: transform .08s; }
      .ef-cell:active { transform: scale(.96); }
      /* grass tile */
      .ef-cell.empty { background: linear-gradient(180deg, #7ec46a 0 30%, #5ea84e 30% 100%);
        box-shadow: inset 0 3px 0 rgba(255,255,255,.3), inset 0 -4px 0 rgba(0,0,0,.25), inset 3px 0 0 rgba(255,255,255,.08); }
      .ef-cell.empty.drop-ok { outline: 3px solid #fff44f; outline-offset: -2px;
        box-shadow: inset 0 3px 0 rgba(255,255,255,.4), 0 0 14px #fff44f; }
      .ef-cell.empty.guide-target { animation: efGuide 1s ease-in-out infinite; }
      /* stone/cobble wall */
      .ef-cell.wall { background:
          repeating-linear-gradient(0deg, #8d8d8d 0 6px, #7a7a7a 6px 12px),
          linear-gradient(180deg, #9a9a9a, #6f6f6f);
        box-shadow: inset 0 3px 0 rgba(255,255,255,.28), inset 0 -4px 0 rgba(0,0,0,.35); cursor: default; }
      .ef-cell.enemy { background: linear-gradient(180deg, #b85a4a 0 30%, #8f4034 30% 100%);
        box-shadow: inset 0 3px 0 rgba(255,255,255,.22), inset 0 -4px 0 rgba(0,0,0,.3); }
      .ef-cell.ally { background: linear-gradient(180deg, #5a86c4 0 30%, #3f63a0 30% 100%);
        box-shadow: inset 0 3px 0 rgba(255,255,255,.28), inset 0 -4px 0 rgba(0,0,0,.3); }
      .ef-cell.cleared { background: linear-gradient(180deg, #6a5a44, #4c3f2f); opacity: .55;
        box-shadow: inset 0 -3px 0 rgba(0,0,0,.3); }
      .ef-cell.selected { outline: 3px solid #fff44f; outline-offset: -2px; box-shadow: 0 0 14px #fff44f, inset 0 3px 0 rgba(255,255,255,.3); }

      /* units */
      .ef-unit { position: absolute; inset: 6%; display: grid; place-items: center; pointer-events: none; }
      .ef-unit .emoji { font-size: clamp(22px, 6.2vmin, 40px); line-height: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,.4)); }
      .ef-unit .sprite { width: 92%; height: 92%; background-repeat: no-repeat; background-position: center;
        background-size: contain; image-rendering: pixelated; filter: drop-shadow(0 2px 2px rgba(0,0,0,.35)); }
      .ef-unit.flip { animation: efFlip .55s ease; }
      .ef-elbadge { position: absolute; top: -6%; left: -6%; width: 38%; height: 38%; max-width: 22px; max-height: 22px;
        display: grid; place-items: center; border-radius: 4px; font-size: clamp(10px, 2.6vmin, 14px);
        background: var(--el); border: 2px solid #1d1208; box-shadow: 0 2px 0 rgba(0,0,0,.35); pointer-events: none; }
      .ef-hp { position: absolute; bottom: -10%; left: 6%; right: 6%; height: 7px; border-radius: 2px;
        background: #1d1208; overflow: hidden; box-shadow: 0 1px 0 rgba(0,0,0,.4); }
      .ef-hp > i { display: block; height: 100%; background: linear-gradient(90deg, #ff5a3c, #ff8a5a); transition: width .35s; }
      .ef-diric { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
        font-size: clamp(13px, 3.4vmin, 22px); color: #fff44f; font-weight: 900;

  // ============================================================ boot
  function boot() {
    document.body.appendChild(root);
    // clamp restored level index to the current difficulty's list
    const list = levelsForDifficulty(state.difficulty);
    if (state.levelIndex >= list.length) state.levelIndex = 0;
    renderDiffs();
    buildRing();
    bindEvents();
    loadLevel(state.difficulty, state.levelIndex);
    restoreDeploy();              // resume an in-progress layout, if any
    renderAll();
    if (state.started) {
      // a session was already active before this (re)load → skip the title and resume
      byId('efTitle').hidden = true;
      post('gameStarted');
      maybeStartGuide();
    } else {
      byId('efTitle').hidden = false;
    }
    post('gameLoaded');
    requestAnimationFrame(() => requestAnimationFrame(requestPetImage));
  }

  function byId(id) { return document.getElementById(id); }
  function post(type, data = {}) { try { window.parent.postMessage({ type, data }, '*'); } catch (_) {} }

  // ============================================================ events
  function bindEvents() {
    byId('efTitleStart').onclick = () => { playSound('click'); byId('efTitle').hidden = true; initAudio(); startGame(); maybeStartGuide(); };
    byId('efTitleAudio').onclick = () => { const on = toggleAudio(); byId('efTitleAudio').textContent = on ? t('audioOn') : t('audioOff'); };
    byId('efHelp').onclick = () => { playSound('click'); byId('efTip').hidden = false; };
    byId('efTipClose').onclick = () => { byId('efTip').hidden = true; };
    byId('efReset').onclick = () => { playSound('click'); resetDeployment(); };
    byId('efResolve').onclick = () => resolveBattle();
    byId('efNext').onclick = () => nextLevel();
    byId('efWinNext').onclick = () => { byId('efWin').hidden = true; nextLevel(); };
    byId('efFailRetry').onclick = () => { byId('efFail').hidden = true; resetDeployment(); };
    byId('efDockAwaken').onclick = () => { const a = selectedAlly(); if (a) awaken(a); };
    document.querySelectorAll('[data-dir]').forEach(b => b.onclick = () => setDirection(b.dataset.dir));
    byId('efBoard').addEventListener('click', onBoardClick);
    byId('efBench').addEventListener('pointerdown', onBenchPointerDown);
    ['efTip', 'efWin', 'efFail'].forEach(id => byId(id).addEventListener('click', e => { if (e.target.id === id) byId(id).hidden = true; }));
    window.addEventListener('message', onParentMessage);
    window.addEventListener('resize', () => { renderRays(); positionPaw(); });
  }

  function onParentMessage(event) {
    const msg = event.data || {};
    if (msg.type === 'gameContinue' && !state.started) { startGame(); maybeStartGuide(); }
    if (msg.type === 'setGameConfig') {
      if (msg.data?.petId) requestPetImage(msg.data.petId);
      if (msg.data?.difficulty) { state.difficulty = normalizeDifficulty(msg.data.difficulty); state.levelIndex = 0; loadLevel(state.difficulty, 0); restoreDeploy(); persistMeta(); renderDiffs(); renderAll(); }
    }
    if (msg.type === 'haqi_pet_image' && msg.ok && msg.data &&
        (!state.petRequestId || !msg.requestId || msg.requestId === state.petRequestId || msg.requestId === 'active_pet_config')) setPetImage(msg.data);
    if (msg.type === 'haqi_pet_images' && msg.ok) { const f = Array.isArray(msg.data?.pets) ? msg.data.pets[0] : null; if (f) setPetImage(f); }
  }

  function startGame() { if (!state.started) { state.started = true; post('gameStarted'); } persistMeta(); }

  function renderDiffs() {
    const wrap = byId('efDiffs');
    const labels = { easy: t('diffEasy'), normal: t('diffNormal'), hard: t('diffHard'), expert: t('diffExpert') };
    wrap.innerHTML = DIFFICULTY_ORDER.map(d => `<button class="ef-diff${d === state.difficulty ? ' active' : ''}" type="button" data-d="${d}">${labels[d]}</button>`).join('');
    wrap.querySelectorAll('[data-d]').forEach(b => b.onclick = () => {
      const next = normalizeDifficulty(b.dataset.d);
      if (next === state.difficulty) return;
      state.difficulty = next; state.levelIndex = 0;
      loadLevel(next, 0); restoreDeploy(); persistMeta(); renderDiffs(); renderAll(); maybeStartGuide(); post('gameStarted');
    });
  }

  function nextLevel() {
    const list = levelsForDifficulty(state.difficulty);
    state.levelIndex = (state.levelIndex + 1) % Math.max(1, list.length);
    loadLevel(state.difficulty, state.levelIndex);
    restoreDeploy(); persistMeta();
    renderAll(); maybeStartGuide(); post('gameStarted');
  }

  function resetDeployment() {
    loadLevel(state.difficulty, state.levelIndex);
    clearDeploy(); persistMeta();
    renderAll(); maybeStartGuide(); post('gameStarted');
  }

  // ============================================================ placement helpers
  function deployedAt(r, c) { return state.deployed.find(d => d.row === r && d.col === c); }
  function selectedAlly() { return state.deployed.find(d => d.id === state.selectedId); }

  function placeAlly(benchId, row, col) {
    const bp = state.bench.find(b => b.id === benchId);
    if (!bp) return null;
    const f = bp.forms.find(x => x.key === bp.formKey) || bp.forms[0];
    const id = `ally_${benchId}_${Date.now()}`;
    const ally = { id, benchId, row, col, formKey: f.key, dir: 'up', atk: f.atk, element: f.element, emoji: f.emoji, name: bp.name, forms: bp.forms };
    state.deployed.push(ally);
    return ally;
  }

  function setDirection(dirKey) {
    const a = selectedAlly();
    if (!a) return;
    a.dir = dirKey;
    playSound('click');
    renderBoard(); renderRays(); renderDock(); persistDeploy();
  }

  function rotateAlly(a) {
    const idx = DIRS.findIndex(d => d.key === a.dir);
    a.dir = DIRS[(idx + 1) % DIRS.length].key;
    playSound('click');
    renderBoard(); renderRays(); renderDock(); persistDeploy();
  }

  // ============================================================ board interactions
  function onBoardClick(e) {
    initAudio();
    if (state.resolving || state.finished) return;
    const cell = e.target.closest('.ef-cell');
    if (!cell) return;
    const r = Number(cell.dataset.row), c = Number(cell.dataset.col);
    const ally = deployedAt(r, c);
    if (ally) {
      if (state.selectedId === ally.id) rotateAlly(ally);
      else { state.selectedId = ally.id; playSound('click'); renderBoard(); renderRays(); renderDock(); }
      return;
    }
    // tapping elsewhere deselects
    if (state.selectedId) { state.selectedId = null; renderBoard(); renderRays(); renderDock(); }
  }

  // ---- pointer-based drag from bench ----
  let drag = null;
  function onBenchPointerDown(e) {
    initAudio();
    if (state.resolving || state.finished) return;
    const card = e.target.closest('.ef-card');
    if (!card || card.classList.contains('deployed')) return;
    const benchId = card.dataset.benchId;
    e.preventDefault();
    const bp = state.bench.find(b => b.id === benchId);
    const f = bp.forms.find(x => x.key === bp.formKey) || bp.forms[0];
    const ghost = document.createElement('div');
    ghost.className = 'ef-drag-ghost';
    ghost.textContent = f.emoji;
    document.body.appendChild(ghost);
    card.classList.add('dragging');
    drag = { benchId, ghost, card, lastCell: null, moved: false };
    moveGhost(e.clientX, e.clientY);
    window.addEventListener('pointermove', onDragMove);
    window.addEventListener('pointerup', onDragUp);
    try { card.setPointerCapture(e.pointerId); } catch (_) {}
  }
  function moveGhost(x, y) { if (drag) { drag.ghost.style.left = x + 'px'; drag.ghost.style.top = y + 'px'; } }
  function onDragMove(e) {
    if (!drag) return;
    drag.moved = true;
    moveGhost(e.clientX, e.clientY);
    drag.ghost.style.display = 'none';
    const el = document.elementFromPoint(e.clientX, e.clientY);
    drag.ghost.style.display = '';
    const cell = el && el.closest && el.closest('.ef-cell');
    if (drag.lastCell && drag.lastCell !== cell) drag.lastCell.classList.remove('drop-ok');
    if (cell && cell.classList.contains('empty')) { cell.classList.add('drop-ok'); drag.lastCell = cell; }
    else drag.lastCell = null;
  }
  function onDragUp(e) {
    if (!drag) return;
    window.removeEventListener('pointermove', onDragMove);
    window.removeEventListener('pointerup', onDragUp);
    const d = drag; drag = null;
    d.ghost.remove();
    d.card.classList.remove('dragging');
    if (d.lastCell) d.lastCell.classList.remove('drop-ok');
    // resolve drop target
    d.ghost.style.display = 'none';
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const cell = el && el.closest && el.closest('.ef-cell');
    if (cell && cell.classList.contains('empty')) {
      const r = Number(cell.dataset.row), c = Number(cell.dataset.col);
      if (!deployedAt(r, c) && state.grid[r][c].t === 'empty') {
        const ally = placeAlly(d.benchId, r, c);
        if (ally) {
          state.selectedId = ally.id;
          playSound('place');
          renderAll();
          spawnPlaceParticles(r, c, window.game_config.elements[ally.element]?.glow || '#fff');
          persistDeploy();
          guideOn('drag');
        }
      }
    }
  }

  // ============================================================ awaken (form switch)
  function awaken(ally) {
    if (!ally || ally.forms.length < 2 || state.resolving || state.finished) return;
    const idx = ally.forms.findIndex(f => f.key === ally.formKey);
    const nf = ally.forms[(idx + 1) % ally.forms.length];
    ally.formKey = nf.key; ally.atk = nf.atk; ally.element = nf.element; ally.emoji = nf.emoji;
    playSound('awaken');
    renderBoard(); renderRays(); renderDock();
    // visual: flip + particle burst on the unit
    const cell = byId('efBoard').querySelector(`[data-row="${ally.row}"][data-col="${ally.col}"]`);
    const unit = cell && cell.querySelector('.ef-unit');
    if (unit) unit.classList.add('flip');
    spawnPlaceParticles(ally.row, ally.col, window.game_config.elements[nf.element]?.glow || '#fff', 12);
    persistDeploy();
    guideOn('awaken');
  }

  function spawnPlaceParticles(r, c, color, n = 8) {
    const board = byId('efBoard');
    const ctr = cellCenter(r, c);
    if (!ctr) return;
    for (let i = 0; i < n; i++) {
      const p = document.createElement('div');
      p.className = 'ef-particle';
      p.style.background = color;
      p.style.left = ctr.x + 'px'; p.style.top = ctr.y + 'px';
      const ang = (i / n) * Math.PI * 2, dist = 26 + Math.random() * 18;
      p.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(ang) * dist + 'px');
      board.appendChild(p);
      setTimeout(() => p.remove(), 700);
    }
  }

  // ============================================================ ray targeting & preview
  // returns { stop:{r,c}, enemy:cellPref|null } following the line until blocked
  function rayTrace(ally) {
    const d = dirByKey(ally.dir);
    let r = ally.row, c = ally.col;
    let last = { r, c };
    while (true) {
      const nr = r + d.dr, nc = c + d.dc;
      if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) return { stop: last, enemy: null };
      const cell = state.grid[nr][nc];
      if (cell.t === 'wall') return { stop: last, enemy: null };
      if (deployedAt(nr, nc)) return { stop: { r: nr, c: nc }, enemy: null };
      if (cell.t === 'enemy' && cell.p && cell.p.hp > 0) return { stop: { r: nr, c: nc }, enemy: cell.p, er: nr, ec: nc };
      r = nr; c = nc; last = { r, c };
    }
  }

  function cellCenter(r, c) {
    const cell = byId('efBoard').querySelector(`[data-row="${r}"][data-col="${c}"]`);
    const board = byId('efBoard');
    if (!cell) return null;
    const cr = cell.getBoundingClientRect(), br = board.getBoundingClientRect();
    return { x: cr.left - br.left + cr.width / 2, y: cr.top - br.top + cr.height / 2 };
  }

  function renderRays() {
    const svg = byId('efRays');
    const board = byId('efBoard');
    if (!svg || !board) return;
    const br = board.getBoundingClientRect();
    svg.setAttribute('viewBox', `0 0 ${br.width} ${br.height}`);
    svg.style.width = br.width + 'px'; svg.style.height = br.height + 'px';
    // clear
    svg.innerHTML = '';
    document.querySelectorAll('.ef-prebadge').forEach(b => b.remove());

    const preds = {}; // enemyId -> {dmg, counter, weak, er, ec, hp}
    for (const ally of state.deployed) {
      const from = cellCenter(ally.row, ally.col);
      const trace = rayTrace(ally);
      const to = cellCenter(trace.stop.r, trace.stop.c);
      if (!from || !to) continue;
      const elColor = window.game_config.elements[ally.element]?.color || '#fff44f';
      const selected = ally.id === state.selectedId;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', from.x); line.setAttribute('y1', from.y);
      line.setAttribute('x2', to.x); line.setAttribute('y2', to.y);
      line.setAttribute('stroke', elColor);
      line.setAttribute('stroke-width', selected ? 5 : 3);
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('stroke-dasharray', '7 6');
      line.setAttribute('opacity', selected ? 0.95 : 0.5);
      svg.appendChild(line);
      // arrowhead dot at the ray tip
      const tip = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      tip.setAttribute('cx', to.x); tip.setAttribute('cy', to.y);
      tip.setAttribute('r', selected ? 6 : 4);
      tip.setAttribute('fill', elColor);
      tip.setAttribute('opacity', selected ? 0.95 : 0.5);
      svg.appendChild(tip);

      if (trace.enemy) {
        const mul = elementMul(ally.element, trace.enemy.element);
        const dmg = Math.round(ally.atk * mul);
        const k = trace.enemy.id;
        if (!preds[k]) preds[k] = { dmg: 0, counter: false, weak: true, er: trace.er, ec: trace.ec, hp: trace.enemy.hp };
        preds[k].dmg += dmg;
        if (mul > 1) { preds[k].counter = true; preds[k].weak = false; }
        else if (mul >= 1) preds[k].weak = false;
      }
    }

    // preview badges
    Object.values(preds).forEach(p => {
      const ctr = cellCenter(p.er, p.ec);
      if (!ctr) return;
      const badge = document.createElement('div');
      const ko = p.dmg >= p.hp;
      let cls = 'neutral', txt = `-${p.dmg}`;
      if (p.counter) { cls = 'counter'; txt = `⬆️${t('counter')} -${p.dmg}`; }
      else if (p.weak) { cls = 'weak'; txt = `⬇️${t('weak')} -${p.dmg}`; }
      if (ko) txt += ' 💀';
      badge.className = `ef-prebadge ${cls}`;
      badge.textContent = txt;
      // place above the enemy cell, in board-wrap coordinates
      const cell = byId('efBoard').querySelector(`[data-row="${p.er}"][data-col="${p.ec}"]`);
      const cr = cell.getBoundingClientRect(), wr = byId('efBoard').parentElement.getBoundingClientRect();
      badge.style.left = (cr.left - wr.left + cr.width / 2) + 'px';
      badge.style.top = (cr.top - wr.top + 4) + 'px';
      byId('efBoard').parentElement.appendChild(badge);
    });
  }

  // ============================================================ element ring
  function buildRing() {
    const g = byId('efRingArrows');
    const cx = 46, cy = 42, R = 30;
    const pos = {};
    CYCLE.forEach((key, i) => {
      const ang = -Math.PI / 2 + i * (2 * Math.PI / 5);
      pos[key] = { x: cx + Math.cos(ang) * R, y: cy + Math.sin(ang) * R };
    });
    // arrows along the cycle
    let arrows = '';
    CYCLE.forEach((key, i) => {
      const a = pos[key], b = pos[CYCLE[(i + 1) % 5]];
      arrows += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>`;
    });
    g.innerHTML = arrows;
    // nodes
    const ring = byId('efRing');
    CYCLE.forEach(key => {
      const el = window.game_config.elements[key];
      const n = document.createElement('div');
      n.className = 'ef-ring node';
      n.id = 'ring-' + key;
      n.textContent = el.emoji;
      n.style.left = pos[key].x + 'px'; n.style.top = pos[key].y + 'px';
      n.style.background = el.color;
      n.style.setProperty('--el', el.glow);
      ring.appendChild(n);
    });
  }
  function flashRing(atkEl, defEl) {
    const a = byId('ring-' + atkEl), d = byId('ring-' + defEl);
    if (a) { a.classList.remove('flash-atk'); void a.offsetWidth; a.classList.add('flash-atk'); setTimeout(() => a.classList.remove('flash-atk'), 700); }
    if (d) { d.classList.remove('flash-def'); void d.offsetWidth; d.classList.add('flash-def'); setTimeout(() => d.classList.remove('flash-def'), 700); }
  }

  // ============================================================ resolve
  function resolveBattle() {
    if (state.resolving || state.finished || !state.deployed.length) return;
    // tutorial gate: only allow on resolve step
    if (state.guide && currentGuide() && currentGuide().type !== 'resolve') { nudgeGuide(); return; }
    state.resolving = true;
    state.selectedId = null;
    clearDeploy();   // once a battle starts, a reload should resume at a fresh board, not mid-fight
    renderBoard(); renderDock();

    const attacks = [];
    for (const ally of state.deployed) {
      const trace = rayTrace(ally);
      if (trace.enemy) attacks.push({ ally, target: trace.enemy, er: trace.er, ec: trace.ec });
    }

    let i = 0;
    const board = byId('efBoard');
    function step() {
      if (i >= attacks.length) { setTimeout(settle, 260); return; }
      const a = attacks[i++];
      if (a.target.hp <= 0) { step(); return; }
      const mul = elementMul(a.ally.element, a.target.element);
      const dmg = Math.round(a.ally.atk * mul);
      a.target.hp -= dmg;
      flashRing(a.ally.element, a.target.element);
      const cls = mul > 1 ? 'counter' : (mul < 1 ? 'weak' : 'normal');
      playSound(mul > 1 ? 'counter' : 'attack');
      spawnFloater(a.er, a.ec, `-${dmg}`, cls);
      renderBoard(); // update hp bars
      setTimeout(step, 300);
    }
    step();
  }

  function settle() {
    let remaining = 0;
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
      const cell = state.grid[r][c];
      if (cell.t === 'enemy' && cell.p) {
        if (cell.p.hp <= 0) { cell.t = 'cleared'; cell.p = null; }
        else remaining++;
      }
    }
    state.resolving = false;
    renderBoard(); renderRays(); updateStats();
    if (remaining === 0) winLevel();
    else {
      playSound('fail');
      byId('efFailText').textContent = t('failText', { remaining });
      byId('efFail').hidden = false;
    }
  }

  function spawnFloater(r, c, text, cls) {
    const ctr = cellCenter(r, c);
    if (!ctr) return;
    const f = document.createElement('div');
    f.className = `ef-floater ${cls}`;
    f.textContent = text;
    f.style.left = (ctr.x - 14) + 'px';
    f.style.top = ctr.y + 'px';
    byId('efBoard').appendChild(f);
    setTimeout(() => f.remove(), 1000);
  }

  function winLevel() {
    state.finished = true;
    state.bestLevel = Math.max(state.bestLevel, state.levelIndex + 1);
    localStorage.setItem(STORAGE_BEST, String(state.bestLevel));
    // if reloaded while the win banner is up, resume at the NEXT level instead of replaying this one
    try {
      const list = levelsForDifficulty(state.difficulty);
      localStorage.setItem(STORAGE_LVL, String((state.levelIndex + 1) % Math.max(1, list.length)));
    } catch (_) {}
    hideNpc();
    const reward = (window.game_config.difficultyReward || {})[state.difficulty] || 80;
    const allies = state.deployed.length;
    const stars = allies <= 1 ? 3 : (allies <= 2 ? 2 : 1);
    const coins = reward + state.levelIndex * 8 + stars * 6;
    byId('efWinText').textContent = t('winText', { level: state.levelIndex + 1, name: state.level?.name || '', coins, stars });
    byId('efWin').hidden = false;
    playSound('win');
    post('gameFinished', { earnedPoints: coins, score: coins, difficulty: state.difficulty, level: state.levelIndex + 1, allies, stars, finishedAt: Date.now() });
  }

  // ============================================================ NPC guidance
  function currentGuide() { return state.guide ? state.guide.steps[state.guide.idx] : null; }
  function maybeStartGuide() {
    if (state.guide) renderGuide();
    else hideNpc();
  }
  function guideOn(actionType) {
    // advance guide if the completed action matches the current step
    const g = currentGuide();
    if (g && g.type === actionType) {
      state.guide.idx++;
      if (state.guide.idx >= state.guide.steps.length) { state.guide = null; hideNpc(); }
      else renderGuide();
    } else {
      renderGuide();
    }
  }
  function nudgeGuide() { const c = byId('efNpc'); c.classList.add('show'); positionPaw(); }
  function renderGuide() {
    const g = currentGuide();
    const npc = byId('efNpc');
    if (!g) { hideNpc(); return; }
    byId('efNpcSay').textContent = g.say;
    npc.classList.add('show');
    // highlight relevant control
    clearGuideHighlights();
    if (g.type === 'drag') {
      const card = byId('efBench').querySelector('.ef-card:not(.deployed)');
      if (card) card.classList.add('guide-card');
    }
    renderBoard(); // re-mark guide-target cell
    positionPaw();
  }
  function clearGuideHighlights() {
    document.querySelectorAll('.guide-card').forEach(e => e.classList.remove('guide-card'));
  }
  function hideNpc() { byId('efNpc').classList.remove('show'); byId('efPaw').classList.remove('show'); clearGuideHighlights(); }
  function positionPaw() {
    const paw = byId('efPaw');
    const g = currentGuide();
    if (!g || !byId('efNpc').classList.contains('show')) { paw.classList.remove('show'); return; }
    let target = null, glyph = '👇';
    if (g.type === 'drag') {
      const cell = g.cell && byId('efBoard').querySelector(`[data-row="${g.cell[0]}"][data-col="${g.cell[1]}"]`);
      target = cell; glyph = '👇';
    } else if (g.type === 'awaken') {
      const a = state.deployed[0];
      target = a ? byId('efBoard').querySelector(`.ef-awaken-btn`) : null;
      glyph = '👇';
    } else if (g.type === 'resolve') {
      target = byId('efResolve'); glyph = '👆';
    }
    if (!target) { paw.classList.remove('show'); return; }
    const r = target.getBoundingClientRect();
    paw.textContent = glyph;
    paw.classList.add('show');
    paw.style.left = (r.left + r.width / 2 - 13) + 'px';
    paw.style.top = (glyph === '👆' ? r.top - 32 : r.top - 30) + 'px';
  }

  // ============================================================ rendering
  function renderAll() { renderBoard(); renderBench(); renderDock(); updateStats(); }

  function renderBoard() {
    const board = byId('efBoard');
    if (!state.grid) return;
    const g = currentGuide();
    board.innerHTML = '';
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
      const cell = state.grid[r][c];
      const div = document.createElement('div');
      div.dataset.row = r; div.dataset.col = c;
      let cls = 'ef-cell';
      const ally = deployedAt(r, c);
      if (cell.t === 'wall') cls += ' wall';
      else if (cell.t === 'enemy' && cell.p) cls += ' enemy';
      else if (cell.t === 'cleared') cls += ' cleared';
      else if (ally) cls += ' ally';
      else {
        cls += ' empty';
        if (g && g.type === 'drag' && g.cell && g.cell[0] === r && g.cell[1] === c) cls += ' guide-target';
      }
      if (ally && ally.id === state.selectedId) cls += ' selected';
      div.className = cls;

      if (cell.t === 'enemy' && cell.p) div.appendChild(makeUnit(cell.p, 'enemy'));
      if (ally) {
        div.appendChild(makeUnit(ally, 'ally'));
        const arrow = document.createElement('span');
        arrow.className = 'ef-diric';
        arrow.textContent = dirByKey(ally.dir).label;
        div.appendChild(arrow);
        // awaken button on selected multi-form ally
        if (ally.id === state.selectedId && ally.forms.length > 1 && !state.finished && !state.resolving) {
          const ab = document.createElement('button');
          ab.type = 'button'; ab.className = 'ef-awaken-btn'; ab.textContent = '✨';
          ab.onclick = (ev) => { ev.stopPropagation(); awaken(ally); };
          div.appendChild(ab);
        }
      }
      board.appendChild(div);
    }
    renderRays();
  }

  function makeUnit(pet, side) {
    const unit = document.createElement('div');
    unit.className = `ef-unit ${side}`;
    const el = window.game_config.elements[pet.element];
    // body: pet sprite for ally if available, else element emoji
    if (state.petAsset?.url && side === 'ally') {
      const sp = document.createElement('span');
      sp.className = 'sprite';
      sp.style.backgroundImage = `url("${state.petAsset.url}")`;
      const uv = state.petAsset.uv;
      if (uv && (uv.cols > 1 || uv.rows > 1)) {
        sp.style.backgroundSize = `${uv.cols * 100}% ${uv.rows * 100}%`;
        sp.style.backgroundPosition = `${uv.col * 100 / Math.max(1, uv.cols - 1)}% ${uv.row * 100 / Math.max(1, uv.rows - 1)}%`;
      } else { sp.style.backgroundSize = 'contain'; sp.style.backgroundPosition = 'center'; }
      unit.appendChild(sp);
      // element badge so identity is clear
      const b = document.createElement('span');
      b.className = 'ef-elbadge'; b.style.setProperty('--el', el?.color || '#888'); b.textContent = el?.emoji || '🐾';
      unit.appendChild(b);
    } else {
      const em = document.createElement('span');
      em.className = 'emoji';
      em.textContent = pet.emoji || el?.emoji || '🐾';
      unit.appendChild(em);
    }
    // hp bar (enemies only — allies never take damage)
    if (side === 'enemy') {
      const hp = document.createElement('span'); hp.className = 'ef-hp';
      const fill = document.createElement('i');
      fill.style.width = `${Math.max(0, pet.hp) / (pet.maxHp || pet.hp) * 100}%`;
      hp.appendChild(fill); unit.appendChild(hp);
    }
    return unit;
  }

  function renderBench() {
    const bench = byId('efBench');
    if (!state.bench) { bench.innerHTML = ''; return; }
    bench.innerHTML = state.bench.map(p => {
      const deployed = state.deployed.some(d => d.benchId === p.id);
      const f = p.forms.find(x => x.key === p.formKey) || p.forms[0];
      const el = window.game_config.elements[f.element];
      const multi = p.forms.length > 1 ? `<span class="st">✨×${p.forms.length}</span>` : '';
      return `<div class="ef-card${deployed ? ' deployed' : ''}" data-bench-id="${p.id}" style="--el:${el?.color || '#888'}">
        <span class="eldot"></span>
        <span class="emoji">${f.emoji || el?.emoji || '🐾'}</span>
        <span class="nm">${p.name}</span>
        <span class="st">⚔️${f.atk}</span>${multi}
      </div>`;
    }).join('');
  }

  function renderDock() {
    const a = selectedAlly();
    const awakenBtn = byId('efDockAwaken');
    const hint = byId('efHint');
    // dpad active state
    document.querySelectorAll('.ef-dir').forEach(b => b.classList.toggle('active', !!a && b.dataset.dir === a.dir));
    document.querySelectorAll('.ef-dir').forEach(b => b.disabled = !a);
    if (a && a.forms.length > 1) awakenBtn.classList.add('show'); else awakenBtn.classList.remove('show');

    if (state.finished) hint.textContent = '🎉';
    else if (a) hint.textContent = t('hintAim');
    else if (state.deployed.length) hint.textContent = t('hintReady');
    else hint.textContent = (state.level?.hint ? '💡 ' + state.level.hint : t('hintDrag'));

    // resolve enabled?
    const resBtn = byId('efResolve');
    const guideBlock = state.guide && currentGuide() && currentGuide().type !== 'resolve';
    resBtn.disabled = state.resolving || state.finished || !state.deployed.length || !!guideBlock;
    byId('efReset').disabled = state.resolving;
  }

  function updateStats() {
    byId('efLevelNum').textContent = String(state.levelIndex + 1);
    byId('efLevelName').textContent = state.level?.name || '';
    let enemies = 0;
    if (state.grid) for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
      const cell = state.grid[r][c]; if (cell.t === 'enemy' && cell.p) enemies++;
    }
    byId('efEnemyCount').textContent = String(enemies);
  }

  // ============================================================ pet image
  function requestPetImage(petId = '') {
    const requestId = `ef_pet_${Date.now()}`;
    state.petRequestId = requestId;
    window.parent.postMessage({ type: 'haqi_get_pet_image', requestId, anim: 'idle', petId: petId || undefined }, '*');
    setTimeout(() => {
      if (state.petAsset?.url) return;
      window.parent.postMessage({ type: 'haqi_get_pet_images', requestId: `ef_pets_${Date.now()}`, anim: 'idle' }, '*');
    }, 900);
  }
  function setPetImage(pet) {
    if (!pet?.imageBlob || !pet?.uv) return;
    if (state.petAsset?.url) { URL.revokeObjectURL(state.petAsset.url); state.objectUrls = state.objectUrls.filter(u => u !== state.petAsset.url); }
    const url = URL.createObjectURL(pet.imageBlob);
    state.objectUrls.push(url);
    state.petAsset = { url, uv: pet.uv };
    renderBoard();
  }

  // ============================================================ audio (Web Audio API)
  let audioCtx = null, bgmOsc = null, bgmGain = null, audioEnabled = true;
  function initAudio() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); startBGM(); } catch (e) {}
  }
  function startBGM() {
    if (!audioCtx || bgmOsc) return;
    bgmOsc = audioCtx.createOscillator(); bgmGain = audioCtx.createGain();
    bgmOsc.type = 'triangle'; bgmOsc.frequency.value = 196; bgmGain.gain.value = 0.025;
    bgmOsc.connect(bgmGain); bgmGain.connect(audioCtx.destination); bgmOsc.start();
    const notes = [196, 220, 262, 294, 330];
    setInterval(() => { if (bgmOsc && audioEnabled) bgmOsc.frequency.value = notes[Math.floor(Math.random() * notes.length)]; }, 2200);
  }
  function playSound(type) {
    if (!audioCtx || !audioEnabled) return;
    const now = audioCtx.currentTime, osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    switch (type) {
      case 'click': osc.frequency.value = 720; gain.gain.setValueAtTime(.08, now); gain.gain.exponentialRampToValueAtTime(.01, now + .08); osc.start(now); osc.stop(now + .08); break;
      case 'place': osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(660, now + .12); gain.gain.setValueAtTime(.12, now); gain.gain.exponentialRampToValueAtTime(.01, now + .14); osc.start(now); osc.stop(now + .14); break;
      case 'attack': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(180, now + .2); gain.gain.setValueAtTime(.12, now); gain.gain.exponentialRampToValueAtTime(.01, now + .2); osc.start(now); osc.stop(now + .2); break;
      case 'counter': osc.type = 'square'; osc.frequency.setValueAtTime(700, now); osc.frequency.exponentialRampToValueAtTime(1300, now + .16); gain.gain.setValueAtTime(.16, now); gain.gain.exponentialRampToValueAtTime(.01, now + .18); osc.start(now); osc.stop(now + .18); break;
      case 'awaken': [523, 659, 880].forEach((f, i) => { const o = audioCtx.createOscillator(), gg = audioCtx.createGain(); o.connect(gg); gg.connect(audioCtx.destination); o.type = 'triangle'; o.frequency.value = f; gg.gain.setValueAtTime(.0001, now + i * .07); gg.gain.exponentialRampToValueAtTime(.16, now + i * .07 + .02); gg.gain.exponentialRampToValueAtTime(.01, now + i * .07 + .25); o.start(now + i * .07); o.stop(now + i * .07 + .26); }); break;
      case 'win': [523, 659, 784, 1047].forEach((f, i) => { const o = audioCtx.createOscillator(), gg = audioCtx.createGain(); o.connect(gg); gg.connect(audioCtx.destination); o.frequency.value = f; gg.gain.setValueAtTime(.0001, now + i * .12); gg.gain.exponentialRampToValueAtTime(.18, now + i * .12 + .02); gg.gain.exponentialRampToValueAtTime(.01, now + i * .12 + .35); o.start(now + i * .12); o.stop(now + i * .12 + .36); }); break;
      case 'fail': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(90, now + .3); gain.gain.setValueAtTime(.13, now); gain.gain.exponentialRampToValueAtTime(.01, now + .3); osc.start(now); osc.stop(now + .3); break;
    }
  }
  function toggleAudio() { audioEnabled = !audioEnabled; if (bgmGain) bgmGain.gain.value = audioEnabled ? 0.025 : 0; return audioEnabled; }

  window.addEventListener('beforeunload', () => { try { persistMeta(); persistDeploy(); } catch (_) {} state.objectUrls.forEach(u => URL.revokeObjectURL(u)); if (bgmOsc) try { bgmOsc.stop(); } catch (_) {} });

  boot();
})();
</script>
