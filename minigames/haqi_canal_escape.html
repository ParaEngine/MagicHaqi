          </div>
        </div>
      </main>
      <footer class="mh-bottom">
        <span class="mh-pill">${t('moves')} <b id="mhMoves">0</b></span>
        <span class="mh-pill">${t('shortest')} <b id="mhDifficulty">1</b></span>
        <button id="mhUndo" class="mh-undo" type="button">${t('undo')}</button>
        <button id="mhHint" class="mh-hint" type="button">${t('hint')}</button>
        <button id="mhHelp" class="mh-help" type="button">${t('help')}</button>
        <button id="mhRestart" class="mh-restart" type="button">${t('restart')}</button>
      </footer>
    </div>
    <div id="mhHowTo" class="mh-overlay" role="dialog" aria-modal="true" aria-labelledby="mhHowToTitle" hidden>
      <div class="mh-card">
        <h1 id="mhHowToTitle">${t('howToTitle')}</h1>
        <p>${t('howToText')}</p>
        <button id="mhStart" class="mh-start" type="button">${t('chooseDiff')}</button>
      </div>
    </div>
    <div id="mhDiff" class="mh-overlay" role="dialog" aria-modal="true" aria-labelledby="mhDiffTitle" hidden>
      <div class="mh-card">
        <h1 id="mhDiffTitle">${t('diffTitle')}</h1>
        <p>${t('diffText')}</p>
        <div class="mh-diff-list" id="mhDiffList"></div>
      </div>
    </div>
    <div id="mhWin" class="mh-overlay" role="dialog" aria-modal="true" aria-labelledby="mhWinTitle" hidden>
      <div class="mh-card">
        <h1 id="mhWinTitle">${t('winTitle')}</h1>
        <p id="mhWinText">${t('winDefault')}</p>
        <button id="mhNext" class="mh-next" type="button">${t('nextLevel')}</button>
      </div>
    </div>
    <div id="mhGenerating" class="mh-generating" hidden>${t('generating')}</div>
  `;

  function boot() {
    document.body.appendChild(root);
    createCells();
    bindEvents();
    requestPetImage();
    prepareLevel(1);
    showDifficulty();
    post('gameLoaded');
  }

  function createCells() {
    const cells = byId('mhCells');
    cells.innerHTML = '';
    for (let i = 0; i < GRID * GRID; i++) {
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'mh-cell';
      cell.dataset.index = String(i);
      cell.onclick = () => moveSelectedToward(Math.floor(i / GRID), i % GRID);
      cells.appendChild(cell);
    }
  }

  function bindEvents() {
    byId('mhHelp').onclick = showHowTo;
    byId('mhMenu').onclick = showHowTo;
    byId('mhUndo').onclick = undoMove;
    byId('mhHint').onclick = useHint;
    byId('mhStart').onclick = () => {
      byId('mhHowTo').hidden = true;
      showDifficulty();
    };
    byId('mhRestart').onclick = () => {
      if (state.generating) return;
      showDifficulty();
    };
    byId('mhNext').onclick = () => {
      byId('mhWin').hidden = true;
      prepareLevel(state.level + 1);
      startTimer();
      post('gameStarted');
    };
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('message', (event) => {
      const msg = event.data || {};
      if (msg.type === 'gameContinue' && !state.started) startGame();
      if (msg.type === 'setGameConfig' && msg.data?.petId) requestPetImage(msg.data.petId);
      if (msg.type === 'haqi_pet_image' && msg.ok && msg.data && (!state.petRequestId || !msg.requestId || msg.requestId === state.petRequestId || msg.requestId === 'active_pet_config')) setPetImage(msg.data);
      if (msg.type === 'haqi_pet_images' && msg.ok) {
        const firstPet = Array.isArray(msg.data?.pets) ? msg.data.pets[0] : null;
        if (firstPet) setPetImage(firstPet);
      }
    });
  }

  function startGame(startLevel) {
    state.started = true;
    state.finished = false;
    state.moves = 0;
    state.seconds = 0;
    state.selectedId = TARGET_ID;
    state.history = [];
    state.hintsUsed = 0;
    state.hint = null;
    prepareLevel(Math.max(1, Math.round(startLevel || state.level)));
    startTimer();
    post('gameStarted');
    updateStats();
  }

  function startTimer() {
    clearInterval(state.timer);
    state.seconds = 0;
    state.timer = setInterval(() => {
      if (state.finished || state.generating || byId('mhHowTo').hidden === false || byId('mhWin').hidden === false) return;
      state.seconds += 1;
      updateStats();
    }, 1000);
  }

  function prepareLevel(level) {
    state.generating = true;
    byId('mhGenerating').hidden = false;
    const puzzle = generatePuzzle(level);
    state.level = level;
    state.pieces = puzzle.pieces;
    state.solutionMoves = puzzle.solutionMoves;
    state.selectedId = TARGET_ID;
    state.moves = 0;
    state.history = [];
    state.hintsUsed = 0;
    state.hint = null;
    state.finished = false;
    state.generating = false;
    byId('mhGenerating').hidden = true;
    updateStats();
    renderBoard();
  }

  function generatePuzzle(level) {
    const minimumMoves = Math.min(5 + Math.floor(level * 1.35), 24);
    const maximumMoves = Math.min(minimumMoves + 8, 30);
    const targetMoves = Math.min(minimumMoves + 3, maximumMoves);
    const pieceCount = Math.min(6 + Math.floor(level / 2), 11);
    let best = null;
    const attempts = Math.min(80 + level * 8, 220);

    for (let attempt = 0; attempt < attempts; attempt++) {
      const pieces = scrambleSolvedBoard(pieceCount, 34 + level * 7 + attempt);
      const solutionMoves = solveMinimumMoves(pieces);
      if (!Number.isFinite(solutionMoves)) continue;
      const distance = Math.abs(solutionMoves - targetMoves) + (solutionMoves < minimumMoves ? 6 : 0) + (solutionMoves > maximumMoves ? 8 : 0);
      if (!best || distance < best.distance || (distance === best.distance && solutionMoves > best.solutionMoves)) best = { pieces, solutionMoves, distance };
      if (solutionMoves >= minimumMoves && solutionMoves <= maximumMoves && pieces.find(p => p.id === TARGET_ID).r >= 2) {
        return { pieces, solutionMoves };
      }
    }

    return best || {
      pieces: [
        boatPiece(3, 2),
        piece('h0', 1, 1, 2, 1, 'h', 0),
        piece('v1', 0, 0, 1, 2, 'v', 1),
        piece('h2', 2, 3, 2, 1, 'h', 2),
        piece('v3', 3, 4, 1, 2, 'v', 3),
      ],
      solutionMoves: 5,
    };
  }

  function scrambleSolvedBoard(pieceCount, steps) {
    let pieces = createSolvedPieces(pieceCount);
    let previous = '';
    for (let i = 0; i < steps; i++) {
      const moves = legalOneStepMoves(pieces).filter(move => `${move.id}:${-move.dr}:${-move.dc}` !== previous);
      if (!moves.length) break;
      const weighted = moves.flatMap(move => move.id === TARGET_ID && move.dr > 0 ? [move, move, move] : [move]);
      const move = weighted[Math.floor(Math.random() * weighted.length)];
      pieces = applyMove(pieces, move.id, move.dr, move.dc);
      previous = `${move.id}:${move.dr}:${move.dc}`;
    }
    return normalizePieces(pieces);
  }

  function createSolvedPieces(pieceCount) {
    const pieces = [boatPiece(0, 2)];
    let guard = 0;
    while (pieces.length < pieceCount && guard < 500) {
      guard++;
      const axis = Math.random() < .52 ? 'v' : 'h';
      const length = Math.random() < .82 ? 2 : 3;
      const w = axis === 'h' ? length : 1;
      const h = axis === 'v' ? length : 1;
      const r = Math.floor(Math.random() * (GRID - h + 1));
      const c = Math.floor(Math.random() * (GRID - w + 1));
      if (c === 2 && r < 2) continue;
      const next = piece(`p${pieces.length}`, r, c, w, h, axis, pieces.length - 1);
      if (fits(next, pieces)) pieces.push(next);
    }
    return pieces;
  }

  function boatPiece(r, c) {
    return { id: TARGET_ID, r, c, w: 1, h: 2, axis: 'v', colorIndex: -1 };
  }

  function piece(id, r, c, w, h, axis, colorIndex) {
    return { id, r, c, w, h, axis, colorIndex };
  }

  function fits(candidate, pieces) {
    if (candidate.r < 0 || candidate.c < 0 || candidate.r + candidate.h > GRID || candidate.c + candidate.w > GRID) return false;
    return !pieces.some(other => overlaps(candidate, other));
  }

  function overlaps(a, b) {
    return a.c < b.c + b.w && a.c + a.w > b.c && a.r < b.r + b.h && a.r + a.h > b.r;
  }

  function solveMinimumMoves(startPieces) {
    const start = normalizePieces(startPieces);
    const startKey = keyOf(start);
    const seen = new Set([startKey]);
    const queue = [{ pieces: start, depth: 0 }];
    let cursor = 0;
    while (cursor < queue.length && seen.size < MAX_SOLVER_NODES) {
      const node = queue[cursor++];
      if (isSolved(node.pieces)) return node.depth;
      for (const move of legalOneStepMoves(node.pieces)) {
        const next = applyMove(node.pieces, move.id, move.dr, move.dc);
        const key = keyOf(next);
        if (seen.has(key)) continue;
        seen.add(key);
        queue.push({ pieces: next, depth: node.depth + 1 });
      }
    }
    return Infinity;
  }

  function findBestNextMove(startPieces) {
    const start = normalizePieces(startPieces);
    const startKey = keyOf(start);
    const seen = new Set([startKey]);
    const queue = [{ pieces: start, firstMove: null }];
    let cursor = 0;
    while (cursor < queue.length && seen.size < MAX_SOLVER_NODES) {
      const node = queue[cursor++];
      for (const move of legalOneStepMoves(node.pieces)) {
        const next = applyMove(node.pieces, move.id, move.dr, move.dc);
        const key = keyOf(next);
        if (seen.has(key)) continue;
        const firstMove = node.firstMove || move;
        if (isSolved(next)) return firstMove;
        seen.add(key);
        queue.push({ pieces: next, firstMove });
      }
    }
    return null;
  }

  function legalOneStepMoves(pieces) {
    const moves = [];
    for (const pieceItem of pieces) {
      if (pieceItem.axis === 'h') {
        if (canMove(pieces, pieceItem.id, 0, -1)) moves.push({ id: pieceItem.id, dr: 0, dc: -1 });
        if (canMove(pieces, pieceItem.id, 0, 1)) moves.push({ id: pieceItem.id, dr: 0, dc: 1 });
      } else {
        if (canMove(pieces, pieceItem.id, -1, 0)) moves.push({ id: pieceItem.id, dr: -1, dc: 0 });
        if (canMove(pieces, pieceItem.id, 1, 0)) moves.push({ id: pieceItem.id, dr: 1, dc: 0 });
      }
    }
    return moves;
  }

  function canMove(pieces, id, dr, dc) {
    const item = pieces.find(p => p.id === id);
    if (!item) return false;
    if (item.axis === 'h' && dr !== 0) return false;
    if (item.axis === 'v' && dc !== 0) return false;
    const moved = { ...item, r: item.r + dr, c: item.c + dc };
    if (moved.r < 0 || moved.c < 0 || moved.r + moved.h > GRID || moved.c + moved.w > GRID) return false;
    return !pieces.some(other => other.id !== id && overlaps(moved, other));
  }

  function applyMove(pieces, id, dr, dc) {
    return normalizePieces(pieces.map(item => item.id === id ? { ...item, r: item.r + dr, c: item.c + dc } : { ...item }));
  }

  function normalizePieces(pieces) {
    return pieces.map(item => ({ ...item })).sort((a, b) => a.id === TARGET_ID ? -1 : b.id === TARGET_ID ? 1 : a.id.localeCompare(b.id));
  }

  function keyOf(pieces) {
    return pieces.map(item => `${item.r},${item.c}`).join('|');
  }

  function isSolved(pieces) {
    const boat = pieces.find(p => p.id === TARGET_ID);
    return boat && boat.r <= 0;
  }

  function renderBoard() {
    const layer = byId('mhPieces');
    const arrows = byId('mhArrows');
    layer.innerHTML = '';
    arrows.innerHTML = '';
    for (const pieceItem of state.pieces) {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = `mh-piece ${pieceItem.axis === 'h' ? 'horizontal' : 'vertical'}${pieceItem.id === TARGET_ID ? ' mh-boat' : ''}${state.selectedId === pieceItem.id ? ' selected' : ''}${state.hint?.id === pieceItem.id ? ' hinted' : ''}`;
      el.dataset.id = pieceItem.id;
      const [from, to, shadow] = pieceItem.id === TARGET_ID ? ['#f59e0b', '#b45309', '#0e7490'] : COLORS[Math.max(0, pieceItem.colorIndex) % COLORS.length];
      el.style.setProperty('--from', from);
      el.style.setProperty('--to', to);
      el.style.setProperty('--shadow', shadow);
      placeElement(el, pieceItem);
      if (pieceItem.id === TARGET_ID) {
        el.appendChild(createBoatArtElement());
        el.appendChild(createPetElement());
      }
      el.onclick = (event) => {
        event.stopPropagation();
        selectPiece(pieceItem.id);
      };
      el.onpointerdown = (event) => beginDrag(event, pieceItem.id, el);
      layer.appendChild(el);
    }
    renderArrows();
    renderHintPath();
  }

  function placeElement(el, item) {
    const track = `((100% - ${(GRID - 1) * GAP_PX}px) / ${GRID})`;
    el.style.left = `calc(${item.c} * (${track} + ${GAP_PX}px))`;
    el.style.top = `calc(${item.r} * (${track} + ${GAP_PX}px))`;
    el.style.width = `calc(${item.w} * ${track} + ${(item.w - 1) * GAP_PX}px)`;
    el.style.height = `calc(${item.h} * ${track} + ${(item.h - 1) * GAP_PX}px)`;
  }

  function createPetElement() {
    const el = document.createElement('span');
    if (state.petAsset?.url) {
      el.className = 'mh-pet';
      el.style.backgroundImage = `url("${state.petAsset.url}")`;
      const uv = state.petAsset.uv;
      el.style.backgroundSize = uv.cols > 1 || uv.rows > 1 ? `${uv.cols * 100}% ${uv.rows * 100}%` : 'contain';
      el.style.backgroundPosition = uv.cols > 1 || uv.rows > 1 ? `${uv.col * 100 / Math.max(1, uv.cols - 1)}% ${uv.row * 100 / Math.max(1, uv.rows - 1)}%` : 'center';
    } else {
      el.className = 'mh-pet mh-pet-fallback';
      el.textContent = '🐾';
    }
    return el;
  }

  function createBoatArtElement() {
    const wrap = document.createElement('span');
    wrap.className = 'mh-boat-art';
    wrap.innerHTML = `
      <svg viewBox="0 0 72 128" preserveAspectRatio="none" aria-hidden="true">
        <path d="M13 9C22 2 50 2 59 9c7 20 8 84 0 110-10 8-36 8-46 0C5 93 6 29 13 9z" fill="#0e8fb2"/>
        <path d="M20 13c7-5 25-5 32 0 5 18 5 75 0 98-7 6-25 6-32 0-5-23-5-80 0-98z" fill="#7dd3fc" opacity=".82"/>
        <path d="M24 32h24c4 0 7 3 7 7v51c0 4-3 7-7 7H24c-4 0-7-3-7-7V39c0-4 3-7 7-7z" fill="#b45309"/>
        <path d="M23 42h26M23 58h26M23 74h26M23 90h26" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" opacity=".82"/>
        <path d="M19 17c8-5 26-5 34 0" fill="none" stroke="#e0faff" stroke-width="5" stroke-linecap="round" opacity=".75"/>
      </svg>`;
    return wrap;
  }

  function renderArrows() {
    const selected = getSelectedPiece();
    if (!selected) return;
    const directions = selected.axis === 'h'
      ? [{ label: '◀', dr: 0, dc: -1 }, { label: '▶', dr: 0, dc: 1 }]
      : [{ label: '▲', dr: -1, dc: 0 }, { label: '▼', dr: 1, dc: 0 }];
    directions.forEach(direction => {
      if (!canMove(state.pieces, selected.id, direction.dr, direction.dc)) return;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `mh-arrow${state.hint?.id === selected.id && state.hint.dr === direction.dr && state.hint.dc === direction.dc ? ' hint' : ''}`;
      btn.textContent = direction.label;
      btn.onclick = (event) => {
        event.stopPropagation();
        movePiece(selected.id, direction.dr, direction.dc, 1);
      };
      const centerR = selected.r + selected.h / 2;
      const centerC = selected.c + selected.w / 2;
      const top = direction.dr < 0 ? selected.r : direction.dr > 0 ? selected.r + selected.h : centerR;
      const left = direction.dc < 0 ? selected.c : direction.dc > 0 ? selected.c + selected.w : centerC;
      btn.style.left = `${left / GRID * 100}%`;
      btn.style.top = `${top / GRID * 100}%`;
      byId('mhArrows').appendChild(btn);
    });
  }

  function renderHintPath() {
    document.querySelectorAll('.mh-cell.path').forEach(cell => cell.classList.remove('path'));
    if (!state.hint || state.hint.level < 2) return;
    const item = state.pieces.find(p => p.id === state.hint.id);
    if (!item) return;
    const steps = countMovableSteps(state.pieces, item.id, state.hint.dr, state.hint.dc);
    for (let step = 1; step <= steps; step++) {
      const row = state.hint.dr < 0 ? item.r - step : state.hint.dr > 0 ? item.r + item.h - 1 + step : item.r;
      const col = state.hint.dc < 0 ? item.c - step : state.hint.dc > 0 ? item.c + item.w - 1 + step : item.c;
      const cell = document.querySelector(`.mh-cell[data-index="${row * GRID + col}"]`);
      cell?.classList.add('path');
    }
  }

  function beginDrag(event, id, el) {
    if (state.finished || state.generating) return;
    state.selectedId = id;
    document.querySelectorAll('.mh-piece').forEach(pieceEl => pieceEl.classList.toggle('selected', pieceEl.dataset.id === id));
    byId('mhArrows').innerHTML = '';
    renderArrows();
    el.setPointerCapture?.(event.pointerId);
    el.classList.add('dragging');
    state.pointer = { id, x: event.clientX, y: event.clientY, el, previewSteps: 0 };
    event.preventDefault();
  }

  window.addEventListener('pointermove', (event) => {
    if (!state.pointer) return;
    const pointer = state.pointer;
    const item = state.pieces.find(p => p.id === pointer.id);
    if (!item) return;
    const dx = event.clientX - pointer.x;
    const dy = event.clientY - pointer.y;
    const cellSize = boardCellSize();
    const rawSteps = item.axis === 'h' ? Math.round(dx / cellSize) : Math.round(dy / cellSize);
    const clampedSteps = clampDragSteps(pointer.id, item.axis === 'h' ? 0 : rawSteps, item.axis === 'h' ? rawSteps : 0);
    pointer.previewSteps = clampedSteps;
    const offset = clampedSteps * cellSize;
    pointer.el.style.transform = item.axis === 'h' ? `translateX(${offset}px)` : `translateY(${offset}px)`;
  });

  window.addEventListener('pointerup', (event) => {
    if (!state.pointer) return;
    const pointer = state.pointer;
    state.pointer = null;
    pointer.el.classList.remove('dragging');
    pointer.el.style.transform = '';
    const item = state.pieces.find(p => p.id === pointer.id);
    if (!item) return;
    const steps = pointer.previewSteps || 0;
    if (steps !== 0) {
      movePiece(item.id, item.axis === 'v' ? Math.sign(steps) : 0, item.axis === 'h' ? Math.sign(steps) : 0, Math.abs(steps));
    } else {
      renderBoard();
    }
  });

  function boardCellSize() {
    const boardSize = byId('mhBoard').getBoundingClientRect().width - 20;
    return Math.max(1, boardSize / GRID);
  }

  function clampDragSteps(id, drSteps, dcSteps) {
    const steps = drSteps || dcSteps;
    if (!steps) return 0;
    const dr = drSteps ? Math.sign(drSteps) : 0;
    const dc = dcSteps ? Math.sign(dcSteps) : 0;
    const limit = countMovableSteps(state.pieces, id, dr, dc);
    return Math.sign(steps) * Math.min(Math.abs(steps), limit);
  }

  function countMovableSteps(pieces, id, dr, dc) {
    let count = 0;
    let next = pieces;
    while (canMove(next, id, dr, dc)) {
      next = applyMove(next, id, dr, dc);
      count++;
      if (count >= GRID) break;
    }
    return count;
  }

  function selectPiece(id) {
    state.selectedId = id;
    renderBoard();
  }

  function getSelectedPiece() {
    return state.pieces.find(p => p.id === state.selectedId);
  }

  function saveHistory() {
    state.history.push({
      pieces: normalizePieces(state.pieces),
      moves: state.moves,
      selectedId: state.selectedId,
    });
    if (state.history.length > 40) state.history.shift();
  }

  function undoMove() {
    if (state.finished || state.generating) return;
    const snapshot = state.history.pop();
    if (!snapshot) {
      showToast(t('noUndo'));
      return;
    }
    state.pieces = normalizePieces(snapshot.pieces);
    state.moves = snapshot.moves;
    state.selectedId = snapshot.selectedId;
    state.hint = null;
    updateStats();
    renderBoard();
  }

  function useHint() {
    if (state.finished || state.generating) return;
    const move = findBestNextMove(state.pieces);
    if (!move) {
      showToast(t('nearExit'));
      return;
    }
    state.hintsUsed += 1;
    state.selectedId = move.id;
    state.hint = { ...move, level: Math.min(3, state.hintsUsed) };
    if (state.hint.level >= 3) {
      showToast(t('hintAuto'));
      movePiece(move.id, move.dr, move.dc, 1);
      return;
    }
    showToast(state.hint.level === 1 ? t('hintGlow') : t('hintDir'));
    updateStats();
    renderBoard();
  }

  function moveSelectedToward(row, col) {
    const item = getSelectedPiece();
    if (!item || state.finished || state.generating) return;
    if (item.axis === 'h' && row === item.r) {
      const dir = col < item.c ? -1 : col >= item.c + item.w ? 1 : 0;
      if (dir) movePiece(item.id, 0, dir, Math.abs(dir < 0 ? item.c - col : col - item.c - item.w + 1));
    }
    if (item.axis === 'v' && col === item.c) {
      const dir = row < item.r ? -1 : row >= item.r + item.h ? 1 : 0;
      if (dir) movePiece(item.id, dir, 0, Math.abs(dir < 0 ? item.r - row : row - item.r - item.h + 1));
    }
  }

  function movePiece(id, dr, dc, requestedSteps) {
    if (state.finished || state.generating) return;
    if (!canMove(state.pieces, id, dr, dc)) {
      pulseBlocked(id);
      return;
    }
    saveHistory();
    state.hint = null;
    let moved = 0;
    for (let i = 0; i < requestedSteps; i++) {
      if (!canMove(state.pieces, id, dr, dc)) break;
      state.pieces = applyMove(state.pieces, id, dr, dc);
      moved++;
    }
    if (!moved) return;
    state.moves += moved;
    state.selectedId = id;
    updateStats();
    renderBoard();
    if (isSolved(state.pieces)) winLevel();
  }

  function pulseBlocked(id) {
    const el = document.querySelector(`.mh-piece[data-id="${id}"]`);
    if (!el) return;
    el.classList.remove('blocked');
    void el.offsetWidth;
    el.classList.add('blocked');
  }

  function winLevel() {
    state.finished = true;
    clearInterval(state.timer);
    state.bestLevel = Math.max(state.bestLevel, state.level + 1);
    localStorage.setItem(STORAGE_KEY, String(state.bestLevel));
    const stars = calculateStars();
    const earnedPoints = calculateScore(stars);
    byId('mhWinText').textContent = t('winText', { level: state.level, starsOn: '★'.repeat(stars), starsOff: '☆'.repeat(3 - stars), moves: state.moves, best: state.solutionMoves });
    byId('mhWin').hidden = false;
    launchConfetti();
    showToast(t('toastWin'));
    post('gameFinished', {
      earnedPoints,
      score: earnedPoints,
      moves: state.moves,
      seconds: state.seconds,
      difficulty: state.level,
      solutionMoves: state.solutionMoves,
      hintsUsed: state.hintsUsed,
      stars,
      finishedAt: Date.now(),
    });
  }

  function calculateStars() {
    const extraMoves = Math.max(0, state.moves - state.solutionMoves) + state.hintsUsed * 2;
    if (extraMoves <= 2) return 3;
    if (extraMoves <= 6) return 2;
    return 1;
  }

  function calculateScore(stars) {
    const starScore = stars === 3 ? 100 : stars === 2 ? 82 : 64;
    const timePenalty = Math.min(18, Math.floor(state.seconds / 18));
    return Math.max(50, starScore - state.hintsUsed * 5 - timePenalty);
  }

  function updateStats() {
    byId('mhLevel').textContent = String(state.level);
    byId('mhTime').textContent = String(state.seconds);
    byId('mhMoves').textContent = String(state.moves);
    byId('mhDifficulty').textContent = String(Math.max(1, Math.round(state.solutionMoves || state.level)));
    byId('mhEnergy').textContent = String(560 + state.level * 40);
    byId('mhUndo').disabled = state.history.length === 0;
    const progress = Math.min(100, Math.round((state.level / Math.max(state.bestLevel, state.level + 2)) * 100));
    byId('mhProgress').style.width = `${progress}%`;
  }

  function onKeyDown(event) {
    if (byId('mhHowTo').hidden === false || byId('mhWin').hidden === false) return;
    const item = getSelectedPiece();
    if (!item) return;
    const keyMap = {
      ArrowLeft: [0, -1], ArrowRight: [0, 1], ArrowUp: [-1, 0], ArrowDown: [1, 0],
      a: [0, -1], d: [0, 1], w: [-1, 0], s: [1, 0],
    };
    const pair = keyMap[event.key];
    if (!pair) return;
    event.preventDefault();
    movePiece(item.id, pair[0], pair[1], 1);
  }

  function showHowTo() {
    byId('mhHowTo').hidden = false;
  }

  function renderDifficulties() {
    const list = byId('mhDiffList');
    list.innerHTML = '';
    DIFFICULTIES.forEach(diff => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `mh-diff-btn${diff.key === state.difficultyKey ? ' current' : ''}`;
      btn.style.setProperty('--dc', diff.color);
      btn.style.setProperty('--ds', diff.shadow);
      btn.innerHTML = `
        <span class="mh-diff-emoji">${diff.emoji}</span>
        <span class="mh-diff-meta">
          <span class="mh-diff-name">${diff.name}</span>
          <span class="mh-diff-desc">${diff.desc}</span>
        </span>
        <span class="mh-diff-lv">Lv.${diff.startLevel}+</span>`;
      btn.onclick = () => chooseDifficulty(diff.key);
      list.appendChild(btn);
    });
  }

  function showDifficulty() {
    if (state.generating) return;
    renderDifficulties();
    byId('mhWin').hidden = true;
    byId('mhHowTo').hidden = true;
    byId('mhDiff').hidden = false;
  }

  function chooseDifficulty(key) {
    const diff = DIFFICULTIES.find(d => d.key === key) || DIFFICULTIES[0];
    state.difficultyKey = diff.key;
    try { localStorage.setItem(DIFFICULTY_STORAGE_KEY, diff.key); } catch (_) {}
    byId('mhDiff').hidden = true;
    startGame(diff.startLevel);
  }

  function showToast(text) {
    const toast = document.createElement('div');
    toast.className = 'mh-toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1300);
  }

  function launchConfetti() {
    const colors = ['#f97316', '#facc15', '#22c55e', '#38bdf8', '#ec4899', '#8b5cf6'];
    for (let i = 0; i < 44; i++) {
      const piece = document.createElement('span');
      piece.className = 'mh-confetti';
      piece.style.left = `${Math.random() * 100}vw`;
      piece.style.setProperty('--x', `${(Math.random() - .5) * 150}px`);
      piece.style.setProperty('--c', colors[i % colors.length]);
      piece.style.setProperty('--d', `${1.2 + Math.random() * .9}s`);
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 2300);
    }
  }

  function requestPetImage(petId = '') {
    const requestId = `canal_pet_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
    state.petRequestId = requestId;
    post('haqi_get_pet_image', { requestId, anim: 'happy', petId: petId || undefined }, { requestId, anim: 'happy', petId: petId || undefined });
    setTimeout(() => {
      if (state.petAsset?.url) return;
      const fallbackId = `canal_pets_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
      post('haqi_get_pet_images', { requestId: fallbackId, anim: 'happy' }, { requestId: fallbackId, anim: 'happy' });
    }, 900);
  }

  function setPetImage(pet) {
    if (!pet?.imageBlob || !pet?.uv) return;
    if (state.petAsset?.url) {
      URL.revokeObjectURL(state.petAsset.url);
      state.objectUrls = state.objectUrls.filter(url => url !== state.petAsset.url);
    }
    const url = URL.createObjectURL(pet.imageBlob);
    state.objectUrls.push(url);
    state.petAsset = { url, uv: pet.uv };
    renderBoard();
  }

  function post(type, data = {}, extra = {}) {
    try {
      window.parent.postMessage({ type, data, ...extra }, '*');
    } catch (_) {}
  }

  function byId(id) {
    return document.getElementById(id);
  }

  window.addEventListener('beforeunload', () => {
    clearInterval(state.timer);
    state.objectUrls.forEach(url => URL.revokeObjectURL(url));
  });

  boot();
})();
</script>

</html>
