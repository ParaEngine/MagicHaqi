      .mh-fly { position: fixed; left: var(--from-x); top: var(--from-y); z-index: 50; width: var(--tile-w); height: var(--tile-h); border-radius: 8px; display: grid; place-items: center; background: linear-gradient(180deg, #fff7ed, #fef3c7 76%, #d9b96d); box-shadow: 0 8px 15px rgba(15,23,42,.22); transform: translate(-50%, -50%); pointer-events: none; animation: mhFly .26s ease-in forwards; }

    </style>
    <div class="mh-bg" aria-hidden="true">
      ${Array.from({ length: 16 }, (_, i) => `<i class="mh-grass" style="left:${(i * 23 + 7) % 96}%;top:${(i * 31 + 12) % 92}%;transform:scale(${0.75 + (i % 4) * 0.12}) rotate(${(i % 5 - 2) * 8}deg)"></i>`).join('')}

  document.body.appendChild(root);

  const boardEl = document.getElementById('mhBoard');
  const trayEl = document.getElementById('mhTray');
  const levelsEl = document.getElementById('mhLevels');
  const overlayEl = document.getElementById('mhOverlay');
  const overlayTitleEl = document.getElementById('mhOverlayTitle');
  const overlayTextEl = document.getElementById('mhOverlayText');
  const startBtn = document.getElementById('mhStart');

  function post(type, data = {}) {
    try { window.parent.postMessage({ type, data }, '*'); } catch (_) {}
  }

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function randFloat(min, max) {
    return min + Math.random() * (max - min);
  }

  function shuffle(items) {
    for (let i = items.length - 1; i > 0; i--) {
      const j = rand(0, i);
      [items[i], items[j]] = [items[j], items[i]];
    }
    return items;
  }

  function loadProgress() {
    try {
      const raw = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
      return LEVELS.reduce((progress, level) => {
        progress[level.id] = Math.max(0, Math.round(Number(raw[level.id]) || 0));
        return progress;
      }, {});
    } catch (_) {
      return LEVELS.reduce((progress, level) => {
        progress[level.id] = 0;
        return progress;
      }, {});
    }
  }

  function loadDifficultyIndex() {
    try {
      const index = Math.round(Number(localStorage.getItem(DIFFICULTY_KEY)) || 0);
      return Math.max(0, Math.min(LEVELS.length - 1, index));
    } catch (_) {
      return 0;
    }
  }

  function saveDifficultyIndex(index) {
    try { localStorage.setItem(DIFFICULTY_KEY, String(index)); } catch (_) {}
  }

  function saveProgress() {
    try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(state.clears)); } catch (_) {}
  }

  function buildLevel(base, clears = 0) {
    const extra = Math.max(0, Math.round(clears));
    const tier = extra + 1;
    const rank = Number(base.challengeRank) || 0;
    const groupStep = base.id === 'tutorial' ? 3 : 3 + rank;
    const scaledGroups = base.groups + Math.min(rank >= 4 ? 42 : 28, extra * groupStep);
    return {
      ...base,
      baseId: base.id,
      tier,
      groups: base.id === 'tutorial' && tier === 1 ? base.groups : scaledGroups,
      typeCount: Math.min(TILE_TYPES.length, base.typeCount + Math.floor(extra / 2)),
      layers: Math.min(rank >= 4 ? 12 : 10, base.layers + Math.floor((extra + 1) / 2)),
      cols: Math.min(8, base.cols + Math.floor(extra / 4)),
      rows: Math.min(7, base.rows + Math.floor(extra / 5)),
      reward: base.reward + extra * 28,
      title: `${base.label} Lv.${tier}`,
      note: extra > 0
        ? `${base.label}基础难度已通关 ${extra} 次，本局会增加食物数量、图案种类和叠放层数。`
        : base.note,
    };
  }

  function ensureAudio() {
    try {
      if (!sound.ctx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        sound.ctx = new AudioContext();
        sound.master = sound.ctx.createGain();
        sound.master.gain.value = 0.42;
        sound.master.connect(sound.ctx.destination);
      }
      if (sound.ctx.state === 'suspended') sound.ctx.resume();
      return sound.ctx;
    } catch (_) {
      return null;
    }
  }

  function beep(freq = 520, duration = 0.08, type = 'sine', gain = 0.1) {
    const ctx = ensureAudio();
    if (!ctx || !sound.master) return;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    amp.gain.setValueAtTime(0.0001, ctx.currentTime);
    amp.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + 0.01);
    amp.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.connect(amp);
    amp.connect(sound.master);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.02);
  }

  function playPickSound() {
    beep(520 + state.tray.length * 18, 0.055, 'triangle', 0.08);
  }

  function playClearSound(combo = 1) {
    beep(660 + combo * 35, 0.08, 'sine', 0.1);
    setTimeout(() => beep(880 + combo * 42, 0.1, 'triangle', 0.09), 70);
  }

  function playWinSound() {
    [740, 930, 1110].forEach((freq, index) => setTimeout(() => beep(freq, 0.12, 'triangle', 0.1), index * 95));
  }

  function playFailSound() {
    beep(180, 0.16, 'sawtooth', 0.09);
    setTimeout(() => beep(130, 0.2, 'sawtooth', 0.08), 100);
  }

  function tileSizeForLevel(level) {
    if (level.challengeRank >= 4 || level.groups > 58) return { w: '10.4%' };
    if (level.challengeRank >= 2 || level.groups > 20) return { w: '11.2%' };
    return { w: '13.2%' };
  }

  function boardAspectScale() {
    const rect = boardEl?.getBoundingClientRect?.();
    if (!rect?.width || !rect?.height) return 1;
    return rect.width / rect.height;
  }

  function tileHeightPercent(tile) {
    return tile.w * boardAspectScale();
  }

  function clampValue(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function safeTileBounds(tileWidth) {
    const halfW = tileWidth / 2;
    const halfH = tileWidth * boardAspectScale() / 2;
    const reservedTop = 18;
    return {
      xMin: halfW + 1.4,
      xMax: 100 - halfW - 1.4,
      yMin: reservedTop + halfH + 1.4,
      yMax: 100 - halfH - 1.4,
    };
  }

  function clampTilePoint(x, y, tileWidth) {
    const bounds = safeTileBounds(tileWidth);
    return {
      x: clampValue(x, bounds.xMin, bounds.xMax),
      y: clampValue(y, bounds.yMin, bounds.yMax),
    };
  }

  function layoutPointForLevel(level, layer, row, col, cols, rows, jitter) {
    const extreme = level.challengeRank >= 4;
    const xMin = extreme ? 7 : level.groups > 20 ? 9 : 14;
    const xMax = extreme ? 93 : level.groups > 20 ? 91 : 86;
    const yMin = extreme ? 14 : level.groups > 20 ? 16 : 20;
    const yMax = extreme ? 90 : level.groups > 20 ? 88 : 82;
    const xStep = cols > 1 ? (xMax - xMin) / (cols - 1) : 0;
    const yStep = rows > 1 ? (yMax - yMin) / (rows - 1) : 0;
    const layerShiftX = ((layer % 4) - 1.5) * (extreme ? 3.2 : level.groups > 20 ? 2.4 : 1.5);
    const layerShiftY = ((layer % 3) - 1) * (extreme ? 2.8 : level.groups > 20 ? 2.2 : 1.4);
    return {
      x: clampValue(xMin, 5, 95) + col * xStep + layerShiftX + rand(-jitter * 10, jitter * 10) / 10,
      y: clampValue(yMin, 8, 92) + row * yStep + layerShiftY + rand(-jitter * 10, jitter * 10) / 10,
      xMin,
      xMax,
      yMin,
      yMax,
    };
  }

  function buildTileBag(level) {
    const groups = [];
    for (let group = 0; group < level.groups; group++) {
      groups.push(TILE_TYPES[group % level.typeCount]);
    }

    if (level.challengeRank >= 2) {
      const shallow = [];
      const middle = [];
      const deep = [];
      shuffle(groups).forEach((type, index) => {
        if (level.challengeRank >= 4 && index % 4 === 0) {
          shallow.push(type);
          middle.push(type);
          deep.push(type);
        } else if (index % 2 === 0) {
          shallow.push(type, type);
          deep.push(type);
        } else {
          shallow.push(type);
          middle.push(type);
          deep.push(type);
        }
      });
      return shuffle(deep).concat(shuffle(middle), shuffle(shallow));
    }

    return shuffle(groups.flatMap(type => [type, type, type]));
  }

  function layerGridSize(level, layer) {
    const depth = level.layers <= 1 ? 0 : layer / (level.layers - 1);
    let cols = level.cols;
    let rows = level.rows;
    if (level.challengeRank >= 3 && depth > 0.62) {
      cols -= depth > 0.84 ? 3 : 2;
      rows -= depth > 0.84 ? 2 : 1;
    } else {
      cols -= layer % 2 === 0 ? 0 : 1;
      rows -= layer % 3 === 0 ? 0 : 1;
    }
    return {
      cols: Math.max(3, cols),
      rows: Math.max(3, rows),
    };
  }

  function buildLayerCandidates(level, size) {
    if (level.challengeRank >= 2) return buildStackLayerCandidates(level, size);

    return Array.from({ length: level.layers }, (_, layer) => {
      const grid = layerGridSize(level, layer);
      const jitter = level.challengeRank >= 4 ? 3.2 : level.groups > 20 ? 2.2 : 1.2;
      const candidates = [];
      for (let row = 0; row < grid.rows; row++) {
        for (let col = 0; col < grid.cols; col++) {
          const point = layoutPointForLevel(level, layer, row, col, grid.cols, grid.rows, jitter);
          const tileWidth = parseFloat(size.w);
          const safePoint = clampTilePoint(point.x, point.y, tileWidth);
          candidates.push({
            layer,
            x: safePoint.x,
            y: safePoint.y,
            w: tileWidth,
          });
        }
      }
      return shuffle(candidates);
    });
  }

  function buildStackAnchors(level, tileWidth) {
    const targetCount = level.challengeRank >= 4 ? 18 : level.challengeRank >= 3 ? 20 : 21;
    const bounds = safeTileBounds(tileWidth);
    const xMin = bounds.xMin + 0.8;
    const xMax = bounds.xMax - 0.8;
    const yMin = bounds.yMin + 2.8;
    const yMax = bounds.yMax - 1.4;
    const minDistance = tileWidth * (level.challengeRank >= 4 ? 1.28 : 1.18);
    const anchors = [];

    for (let attempt = 0; anchors.length < targetCount && attempt < 900; attempt++) {
      const candidate = {
        x: randFloat(xMin, xMax),
        y: randFloat(yMin, yMax),
      };
      const suitable = anchors.every(anchor => {
        const dx = candidate.x - anchor.x;
        const dy = (candidate.y - anchor.y) / Math.max(0.7, boardAspectScale());
        return Math.hypot(dx, dy) >= minDistance;
      });
      if (suitable || attempt > 560) {
        anchors.push(candidate);
      }
    }
    return shuffle(anchors);
  }

  function buildStackLayerCandidates(level, size) {
    const tileWidth = parseFloat(size.w);
    const anchors = buildStackAnchors(level, tileWidth);
    const offsets = [
      [0, 0],
      [-3.5, 2.1],
      [3.4, -2.0],
      [-1.5, -3.0],
      [1.9, 2.8],
    ];
    return Array.from({ length: level.layers }, (_, layer) => {
      const depth = level.layers <= 1 ? 1 : layer / (level.layers - 1);
      const variantCount = depth > 0.78 ? 1 : depth > 0.52 ? 2 : 4;
      const layerLeanX = ((layer % 3) - 1) * 1.15;
      const layerLeanY = ((layer % 4) - 1.5) * 0.9;
      const peekScale = depth > 0.78 ? 0 : depth > 0.52 ? 0.85 : 1.2;
      const candidates = [];
      const dealtAnchors = shuffle([...anchors]);
      dealtAnchors.forEach((anchor, anchorIndex) => {
        for (let i = 0; i < variantCount; i++) {
          const offset = depth > 0.78 ? offsets[0] : offsets[(i + anchorIndex + layer) % offsets.length];
          const dealArc = (anchorIndex - dealtAnchors.length / 2) * 0.08;
          const safePoint = clampTilePoint(
            anchor.x + offset[0] * peekScale + layerLeanX + dealArc + rand(-12, 12) / 10,
            anchor.y + offset[1] * peekScale + layerLeanY + Math.abs(dealArc) * 0.45 + rand(-12, 12) / 10,
            tileWidth,
          );
          candidates.push({
            layer,
            x: safePoint.x,
            y: safePoint.y,
            w: tileWidth,
          });
        }
      });
      return shuffle(candidates);
    });
  }

  function buildLayerQuotas(level, targetCount, layerCandidates) {
    const quotas = Array(level.layers).fill(0);
    const weights = layerCandidates.map((candidates, layer) => {
      const depth = level.layers <= 1 ? 0 : layer / (level.layers - 1);
      const strategicBias = level.challengeRank >= 3 ? 1.08 - depth * 0.22 : 1;
      return Math.max(0.5, strategicBias) * Math.max(1, candidates.length);
    });
    let remaining = targetCount;
    let weightSum = weights.reduce((sum, weight) => sum + weight, 0);
    for (let layer = 0; layer < level.layers; layer++) {
      const desired = Math.round(targetCount * weights[layer] / weightSum);
      quotas[layer] = Math.min(layerCandidates[layer].length, Math.max(1, desired));
      remaining -= quotas[layer];
    }
    while (remaining !== 0) {
      let changed = false;
      for (let layer = level.layers - 1; layer >= 0 && remaining > 0; layer--) {
        if (quotas[layer] < layerCandidates[layer].length) {
          quotas[layer]++;
          remaining--;
          changed = true;
        }
      }
      for (let layer = 0; layer < level.layers && remaining < 0; layer++) {
        if (quotas[layer] > 1) {
          quotas[layer]--;
          remaining++;
          changed = true;
        }
      }
      if (!changed) break;
    }
    return quotas;
  }

  function generateTutorialTiles() {
    const size = tileSizeForLevel(LEVELS[0]);
    const tiles = [];
    const bottomGroups = [TILE_TYPES[2], TILE_TYPES[3], TILE_TYPES[4], TILE_TYPES[5]];
    const topGroups = [TILE_TYPES[0], TILE_TYPES[1]];
    const bottomPositions = [
      [22, 29], [40, 29], [58, 29], [76, 29],
      [22, 53], [40, 53], [58, 53], [76, 53],
      [22, 77], [40, 77], [58, 77], [76, 77],
    ];
    const topPositions = [
      [31, 40], [49, 40], [67, 40],
      [31, 64], [49, 64], [67, 64],
    ];
    bottomGroups.flatMap(type => [type, type, type]).forEach((type, index) => {
      const [x, y] = bottomPositions[index];
      tiles.push({ uid: `tutorial_bottom_${index}`, typeId: type.id, icon: type.icon, label: type.label, layer: 0, x, y, w: parseFloat(size.w), removed: false });
    });
    topGroups.flatMap(type => [type, type, type]).forEach((type, index) => {
      const [x, y] = topPositions[index];
      tiles.push({ uid: `tutorial_top_${index}`, typeId: type.id, icon: type.icon, label: type.label, layer: 1, x, y, w: parseFloat(size.w), removed: false });
    });
    return tiles;
  }

  function generateTiles(level) {
    if (level.id === 'tutorial' && level.tier === 1) return generateTutorialTiles();

    const bag = buildTileBag(level);
    const size = tileSizeForLevel(level);
    const layerCandidates = buildLayerCandidates(level, size);
    const layerQuotas = buildLayerQuotas(level, bag.length, layerCandidates);
    const tiles = [];
    let index = 0;
    for (let layer = 0; layer < level.layers && index < bag.length; layer++) {
      const candidates = layerCandidates[layer];
      for (let i = 0; i < layerQuotas[layer] && index < bag.length; i++) {
        const type = bag[index];
        const point = candidates[i];
        tiles.push({
          uid: `tile_${layer}_${i}_${index}`,
          typeId: type.id,
          icon: type.icon,
          label: type.label,
          layer,
          x: point.x,
          y: point.y,
          w: point.w,
          removed: false,
        });
        index++;
      }
    }

    while (index < bag.length) {
      const type = bag[index];
      const layer = level.layers - 1;
      const tileWidth = parseFloat(size.w);
      const safePoint = clampTilePoint(rand(9, 91), rand(16, 88), tileWidth);
      tiles.push({
        uid: `tile_extra_${index}`,
        typeId: type.id,
        icon: type.icon,
        label: type.label,
        layer,
        x: safePoint.x,
        y: safePoint.y,
        w: tileWidth,
        removed: false,
      });
      index++;
    }
    if (level.challengeRank >= 2) suppressInitialOpenTriples(tiles);
    return tiles;
  }

  function copyTileFood(target, source) {
    target.typeId = source.typeId;
    target.icon = source.icon;
    target.label = source.label;
  }

  function swapTileFood(a, b) {
    const saved = { typeId: a.typeId, icon: a.icon, label: a.label };
    copyTileFood(a, b);
    copyTileFood(b, saved);
  }

  function openTilesFromList(tiles) {
    const previousTiles = state.tiles;
    state.tiles = tiles;
    const openTiles = tiles.filter(isTileOpen);
    state.tiles = previousTiles;
    return openTiles;
  }

  function suppressInitialOpenTriples(tiles) {
    for (let pass = 0; pass < 80; pass++) {
      const openTiles = openTilesFromList(tiles);
      const counts = openTiles.reduce((map, tile) => {
        map[tile.typeId] = (map[tile.typeId] || 0) + 1;
        return map;
      }, {});
      const crowdedType = Object.keys(counts).find(typeId => counts[typeId] >= 3);
      if (!crowdedType) return;

      const crowdedOpen = openTiles.filter(tile => tile.typeId === crowdedType);
      const swapOut = crowdedOpen[crowdedOpen.length - 1];
      const buriedCandidates = tiles.filter(tile => !tile.removed && !openTiles.includes(tile) && tile.typeId !== crowdedType);
      const swapIn = buriedCandidates.find(tile => (counts[tile.typeId] || 0) <= 1) || buriedCandidates[0];
      if (!swapIn) return;
      swapTileFood(swapOut, swapIn);
    }
  }

  function overlaps(a, b) {
    const ah = tileHeightPercent(a);
    const bh = tileHeightPercent(b);
    const ax1 = a.x - a.w * 0.42;
    const ax2 = a.x + a.w * 0.42;
    const ay1 = a.y - ah * 0.42;
    const ay2 = a.y + ah * 0.42;
    const bx1 = b.x - b.w * 0.42;
    const bx2 = b.x + b.w * 0.42;
    const by1 = b.y - bh * 0.42;
    const by2 = b.y + bh * 0.42;
    return ax1 < bx2 && ax2 > bx1 && ay1 < by2 && ay2 > by1;
  }

  function isTileOpen(tile) {
    if (tile.removed) return false;
    return !state.tiles.some(other => !other.removed && other.layer > tile.layer && overlaps(tile, other));
  }

  function setupLevel(index = state.levelIndex) {
    clearInterval(state.timer);
    state.levelIndex = Math.max(0, Math.min(LEVELS.length - 1, index));
    saveDifficultyIndex(state.levelIndex);
    const base = LEVELS[state.levelIndex];
    state.level = buildLevel(base, state.clears[base.id] || 0);
    state.tiles = generateTiles(state.level);
    state.tray = [];
    state.started = false;
    state.finished = false;
    state.score = 0;
    state.combo = 0;
    state.moves = 0;
    state.seconds = 0;
    state.roundId = `${state.level.id}_${Date.now()}`;
    renderLevels();
    renderAll();
    showOverlay(state.level.title, state.level.note, '开始挑战');
  }

  function startGame() {
    if (state.started) return;
    state.started = true;
    state.finished = false;
    overlayEl.hidden = true;
    post('gameStarted', { level: state.level.tier, difficulty: state.level.id, baseDifficulty: state.level.baseId, roundId: state.roundId });
    state.timer = setInterval(() => {
      if (!state.finished) {
        state.seconds++;
        updateHud();
      }
    }, 1000);
  }

  function renderLevels() {
    levelsEl.innerHTML = LEVELS.map((level, index) => {
      const tier = (state.clears[level.id] || 0) + 1;
      return `<button type="button" class="mh-level-btn${index === state.levelIndex ? ' active' : ''}" data-level="${index}">${level.label} Lv.${tier}</button>`;
    }).join('');
    levelsEl.querySelectorAll('[data-level]').forEach((btn) => {
      btn.onclick = () => setupLevel(Number(btn.dataset.level));
    });
  }

  function renderAll() {
    renderBoard();
    renderTray();
    updateHud();
  }

  function renderBoard() {
    boardEl.innerHTML = '';
    state.tileElements.clear();
    const size = tileSizeForLevel(state.level);
    const ordered = [...state.tiles].sort((a, b) => a.layer - b.layer);
    const fragment = document.createDocumentFragment();
    ordered.forEach((tile) => {
      if (tile.removed) return;
      const button = document.createElement('button');
      const open = isTileOpen(tile);
      button.type = 'button';
      button.className = `mh-tile${open ? '' : ' locked'}`;
      button.style.setProperty('--x', `${tile.x}%`);
      button.style.setProperty('--y', `${tile.y}%`);
      button.style.setProperty('--tile-w', size.w);
      button.style.zIndex = 10 + tile.layer;
      button.dataset.uid = tile.uid;
      button.disabled = state.finished;
      button.setAttribute('aria-label', `${tile.label}${open ? '，可拿取' : '，被压住'}`);
      button.innerHTML = `<span class="mh-food">${tile.icon}</span>`;
      button.onclick = () => pickTile(tile.uid, button);
      state.tileElements.set(tile.uid, button);
      fragment.appendChild(button);
    });
    boardEl.appendChild(fragment);
  }

  function renderTray(clearingType = '') {
    trayEl.innerHTML = '';
    const fragment = document.createDocumentFragment();
    for (let i = 0; i < TRAY_SIZE; i++) {
      const tile = state.tray[i];
      const slot = document.createElement('div');
      slot.className = `mh-slot${tile ? ' filled' : ''}${tile && tile.typeId === clearingType ? ' clearing' : ''}`;
      if (tile) slot.innerHTML = `<span class="mh-food" aria-label="${tile.label}">${tile.icon}</span>`;
      fragment.appendChild(slot);
    }
    trayEl.appendChild(fragment);
  }

  function updateTileLocks() {
    state.tiles.forEach((tile) => {
      if (tile.removed) return;
      const el = state.tileElements.get(tile.uid);
      if (!el) return;
      const wasLocked = el.classList.contains('locked');
      const open = isTileOpen(tile);
      el.classList.toggle('locked', !open);
      el.setAttribute('aria-label', `${tile.label}${open ? '，可拿取' : '，被压住'}`);
    });
  }

  function updateHud() {
    const left = state.tiles.filter(tile => !tile.removed).length;
    document.getElementById('mhTitle').textContent = state.level.title;
    document.getElementById('mhLeft').textContent = String(left);
    document.getElementById('mhScore').textContent = String(state.score);
    document.getElementById('mhBest').textContent = String(state.best);
    document.getElementById('mhTime').textContent = String(state.seconds);
  }

  function pickTile(uid, tileEl) {
    if (state.finished) return;
    if (!state.started) startGame();
    const tile = state.tiles.find(item => item.uid === uid);
    if (!tile || tile.removed || !isTileOpen(tile)) {
      beep(170, 0.08, 'square', 0.08);
      return;
    }
    if (state.tray.length >= TRAY_SIZE) return;

    state.moves++;
    tile.removed = true;
    state.tray.push({ ...tile });
    tileEl.classList.add('removing');
    state.tileElements.delete(tile.uid);
    flyToTray(tileEl, state.tray.length - 1, tile.icon);
    spawnSparksFromRect(tileEl.getBoundingClientRect(), ['#facc15', '#fb923c', '#86efac'], 8);
    pulseBoard('pick-pulse');
    playPickSound();
    setTimeout(() => tileEl.remove(), 240);
    updateTileLocks();

    const typeCount = state.tray.filter(item => item.typeId === tile.typeId).length;
    if (typeCount >= 3) {
      state.combo++;
      state.score += 30 + state.combo * 8;
      renderTray(tile.typeId);
      setTimeout(() => {
        const clearRect = trayEl.getBoundingClientRect();
        let removed = 0;
        state.tray = state.tray.filter((item) => {
          if (item.typeId === tile.typeId && removed < 3) {
            removed++;
            return false;
          }
          return true;
        });
        playClearSound(state.combo);
        spawnSparksFromRect(clearRect, ['#22c55e', '#38bdf8', '#facc15'], 18);
        showPopText(`+${30 + state.combo * 8}`, clearRect.left + clearRect.width / 2, clearRect.top + clearRect.height / 2);
        renderTray();
        updateHud();
        checkResult();
      }, 170);
    } else {
      state.combo = 0;
      renderTray();
      updateHud();
      checkResult();
    }
  }

  function flyToTray(tileEl, trayIndex, icon) {
    const from = tileEl.getBoundingClientRect();
    const slots = trayEl.querySelectorAll('.mh-slot');
    const to = slots[Math.min(trayIndex, slots.length - 1)]?.getBoundingClientRect();
    if (!to) return;
    const fly = document.createElement('div');
    fly.className = 'mh-fly';
    fly.style.setProperty('--from-x', `${from.left + from.width / 2}px`);
    fly.style.setProperty('--from-y', `${from.top + from.height / 2}px`);
    fly.style.setProperty('--to-x', `${to.left + to.width / 2}px`);
    fly.style.setProperty('--to-y', `${to.top + to.height / 2}px`);
    fly.style.setProperty('--tile-w', `${from.width}px`);
    fly.style.setProperty('--tile-h', `${from.height}px`);
    fly.innerHTML = `<span>${icon}</span>`;
    document.body.appendChild(fly);
    setTimeout(() => fly.remove(), 310);
  }

  function checkResult() {
    if (state.finished) return;
    const left = state.tiles.filter(tile => !tile.removed).length;
    if (left === 0 && state.tray.length === 0) {
      finish(true);
      return;
    }
    if (state.tray.length >= TRAY_SIZE) {
      pulseBoard('fail-shake');
      finish(false);
    }
  }

  function finish(passed) {
    state.finished = true;
    clearInterval(state.timer);
    const left = state.tiles.filter(tile => !tile.removed).length;
    const timeBonus = passed ? Math.max(0, 90 - state.seconds) : 0;
    const earnedPoints = Math.max(0, state.score + timeBonus + (passed ? state.level.reward : 0));
    if (earnedPoints > state.best) {
      state.best = earnedPoints;
      localStorage.setItem(STORAGE_KEY, String(state.best));
    }
    updateHud();
    if (passed) {
      state.clears[state.level.baseId] = (state.clears[state.level.baseId] || 0) + 1;
      saveProgress();
      renderLevels();
      launchConfetti();
      playWinSound();
      showOverlay('挑战成功', `清空了所有食物，获得 ${earnedPoints} 分。${state.level.label}难度已升到 Lv.${state.clears[state.level.baseId] + 1}。`, '继续挑战');
    } else {
      playFailSound();
      showOverlay('暂存槽满了', `还剩 ${left} 个食物没有清理，试着先消掉同类食物。`, '再试一次');
    }
    post('gameFinished', {
      completed: passed,
      passed,
      earnedPoints,
      score: earnedPoints,
      level: state.level.tier,
      difficulty: state.level.id,
      baseDifficulty: state.level.baseId,
      moves: state.moves,
      seconds: state.seconds,
      left,
      roundId: state.roundId,
      rewardCoins: passed ? undefined : 10,
    });
  }

  function showOverlay(title, text, buttonText) {
    overlayTitleEl.textContent = title;
    overlayTextEl.textContent = text;
    startBtn.textContent = buttonText;
    overlayEl.hidden = false;
  }

  function showToast(text) {
    const old = document.querySelector('.mh-toast');
    old?.remove();
    const toast = document.createElement('div');
    toast.className = 'mh-toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1400);
  }

  function pulseBoard(className) {
    boardEl.classList.remove(className);
    void boardEl.offsetWidth;
    boardEl.classList.add(className);
    setTimeout(() => boardEl.classList.remove(className), className === 'fail-shake' ? 400 : 220);
  }

  function spawnSparksFromRect(rect, colors, count = 10) {
    if (!rect?.width || !rect?.height) return;
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    for (let i = 0; i < count; i++) {
      const spark = document.createElement('i');
      const angle = (Math.PI * 2 * i / count) + Math.random() * 0.45;
      const distance = rand(22, 62);
      spark.className = 'mh-spark';
      spark.style.setProperty('--x', `${centerX + rand(-8, 8)}px`);
      spark.style.setProperty('--y', `${centerY + rand(-8, 8)}px`);
      spark.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
      spark.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
      spark.style.setProperty('--size', `${rand(5, 10)}px`);
      spark.style.setProperty('--c', colors[i % colors.length]);
      spark.style.setProperty('--d', `${rand(420, 720)}ms`);
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 760);
    }
  }

  function showPopText(text, x, y) {
    const el = document.createElement('div');
    el.className = 'mh-pop-text';
    el.textContent = text;
    el.style.setProperty('--x', `${x}px`);
    el.style.setProperty('--y', `${y}px`);
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 860);
  }

  function showHint() {
    if (state.finished) return;
    const trayCounts = state.tray.reduce((counts, item) => {
      counts[item.typeId] = (counts[item.typeId] || 0) + 1;
      return counts;
    }, {});
    const openTiles = state.tiles.filter(isTileOpen);
    const preferred = openTiles.find(tile => trayCounts[tile.typeId] === 2)
      || openTiles.find(tile => trayCounts[tile.typeId] === 1)
      || openTiles[0];
    boardEl.querySelectorAll('.mh-tile.hint').forEach(el => el.classList.remove('hint'));
    if (!preferred) {
      showToast('没有可拿的食物了');
      return;
    }
    const el = boardEl.querySelector(`[data-uid="${preferred.uid}"]`);
    el?.classList.add('hint');
    setTimeout(() => el?.classList.remove('hint'), 1800);
  }

  function launchConfetti() {
    const colors = ['#f97316', '#22c55e', '#38bdf8', '#facc15', '#f472b6'];
    for (let i = 0; i < 34; i++) {
      const piece = document.createElement('i');
      piece.className = 'mh-confetti';
      piece.style.left = `${rand(4, 96)}vw`;
      piece.style.setProperty('--x', `${rand(-80, 80)}px`);
      piece.style.setProperty('--c', colors[i % colors.length]);
      piece.style.setProperty('--d', `${rand(900, 1500)}ms`);
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 1700);
    }
  }

  function handleOverlayAction() {
    if (!state.started) {
      startGame();
      return;
    }
    if (state.finished) {
      setupLevel(state.levelIndex);
      return;
    }
    overlayEl.hidden = true;
  }

  window.addEventListener('message', (event) => {
    const msg = event.data || {};
    if (msg.type !== 'setGameConfig') return;
    const nextLevel = Number(msg.data?.level ?? msg.level);
    if (Number.isFinite(nextLevel)) setupLevel(Math.max(0, Math.min(LEVELS.length - 1, nextLevel - 1)));
  });

  document.getElementById('mhMenu').onclick = () => showOverlay('食物叠叠消', '点击没有被压住的食物放入下方7格。3个相同食物会消除；可以随时切换轻松、挑战、噩梦、炼狱基础难度，每次通关会让当前基础难度继续升级。', state.started && !state.finished ? '继续游戏' : '开始挑战');
  document.getElementById('mhHelp').onclick = () => document.getElementById('mhMenu').click();
  document.getElementById('mhRestart').onclick = () => setupLevel(state.levelIndex);
  document.getElementById('mhHint').onclick = showHint;
  startBtn.onclick = handleOverlayAction;

  setupLevel(state.levelIndex);
  post('gameLoaded', { title: '哈奇食物叠叠消' });
})();
</script>

</html>
