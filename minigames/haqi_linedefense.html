  <!-- ============ chunk 1.5: EQUIPMENT & ECONOMY ENGINE (装备 & 经济系统) ============ -->
  <!-- 自包含的装备/经济核心：装备定义、稀有度、词条、强化、合成、有效属性、战力、奖励掉落、每日奖励。
       通过 window.__ECON 暴露给商店(chunk4)、背包(chunk4)、战斗(chunk3) 使用。
       所有持久化字段挂在 chunk1 的 G 上 (G.inventory / G.equipped / G.materials / G.dailyClaim)。 -->
  <script>
  (function () {
    'use strict';
    const D = window.__GD;
    const G = D.G, heroDef = D.heroDef, saveProgress = D.saveProgress;

    // ---------- 数值常量 (集中管理，便于平衡调参) ----------
    const ECON = {
      // 6 个装备槽
      slots: [
        { k: 'helmet', t: '头盔', e: '🪖', mainStat: 'hp' },
        { k: 'armor',  t: '护甲', e: '🦺', mainStat: 'hp' },
        { k: 'legs',   t: '护腿', e: '👖', mainStat: 'phys' },
        { k: 'boots',  t: '战靴', e: '🥾', mainStat: 'rate' },
        { k: 'gloves', t: '手套', e: '🧤', mainStat: 'crit' },
        { k: 'badge',  t: '徽章', e: '🎖️', mainStat: 'phys' }
      ],
      // 5 档稀有度：颜色 / 名称 / 词条数 / 属性倍率 / 强化上限
      rarities: [
        { r: 1, key: 'common',    name: '普通', color: '#9aa0a6', mul: 1.0,  affixes: 1, maxLvl: 5,  sellCoin: 60,   sellMatBonus: 0 },
        { r: 2, key: 'fine',      name: '精良', color: '#3fce6a', mul: 1.35, affixes: 1, maxLvl: 8,  sellCoin: 140,  sellMatBonus: 1 },
        { r: 3, key: 'rare',      name: '稀有', color: '#4aa3ff', mul: 1.8,  affixes: 2, maxLvl: 12, sellCoin: 320,  sellMatBonus: 2 },
        { r: 4, key: 'epic',      name: '史诗', color: '#b06bff', mul: 2.45, affixes: 3, maxLvl: 16, sellCoin: 760,  sellMatBonus: 4 },
        { r: 5, key: 'legendary', name: '传说', color: '#ffb733', mul: 3.4,  affixes: 4, maxLvl: 20, sellCoin: 1800, sellMatBonus: 8 }
      ],
      // 属性类型：键 -> 显示信息 (用于词条/主属性)
      statInfo: {
        phys: { t: '物理伤害', e: '⚔️', suffix: '%', base: 6 },
        crit: { t: '暴击率',   e: '🎯', suffix: '%', base: 4 },
        hp:   { t: '防线耐久', e: '🛡️', suffix: '',  base: 8 },
        rate: { t: '射速',     e: '⚡', suffix: '%', base: 5 }
      },
      // 装备基础模板 (按槽位提供若干外观/名字)，rarity/level 实例化时决定
      bases: {
        helmet: [ { id: 'h_steel', name: '钢制头盔', e: '🪖' }, { id: 'h_bronze', name: '青铜面甲', e: '⛑️' }, { id: 'h_jade', name: '玉冠', e: '👑' } ],
        armor:  [ { id: 'a_vest', name: '防弹背心', e: '🦺' }, { id: 'a_robe', name: '守陵法袍', e: '🥋' }, { id: 'a_scale', name: '龙鳞胸甲', e: '🐲' } ],
        legs:   [ { id: 'l_guard', name: '护腿', e: '👖' }, { id: 'l_plate', name: '战术护胫', e: '🦿' } ],
        boots:  [ { id: 'b_boot', name: '军用战靴', e: '🥾' }, { id: 'b_swift', name: '疾风踏靴', e: '👟' } ],
        gloves: [ { id: 'g_glove', name: '战术手套', e: '🧤' }, { id: 'g_claw', name: '裂甲爪套', e: '🐾' } ],
        badge:  [ { id: 'd_lucky', name: '幸运徽章', e: '🎖️' }, { id: 'd_hero', name: '英雄勋章', e: '🏅' }, { id: 'd_seal', name: '镇墓符印', e: '🧿' } ]
      },
      // 强化每级属性增幅 (相对该件白值的百分比)
      enhancePerLevel: 0.12,
      // 强化花费曲线: coins = base * (level+1)^1.35 * rarityMul ; 素材随等级递增
      enhanceCoinBase: 80,
      enhanceMatBase: 1,
      // 合成: 3 件同稀有度 -> 1 件高一档 (随机槽)
      fuseNeed: 3,
      // 材料显示信息
      mats: {
        screw:   { t: '螺丝', e: '🔩' },
        gear:    { t: '齿轮', e: '⚙️' },
        potion:  { t: '强化液', e: '🧪' },
        crystal: { t: '结晶', e: '💠' }
      }
    };

    // 初始化某英雄的装备槽记录
    function ensureEquipSlots(key) {
      if (!G.equipped[key]) {
        G.equipped[key] = { helmet: null, armor: null, legs: null, boots: null, gloves: null, badge: null };
      }
      return G.equipped[key];
    }

    // ---------- 装备实例生成 ----------
    function rarityDef(r) { return ECON.rarities.find(x => x.r === r) || ECON.rarities[0]; }
    function slotDef(slot) { return ECON.slots.find(s => s.k === slot); }

    // 按 slot + rarity 生成一件随机装备实例。可指定 baseId / level。
    function makeItem(slot, rarity, opt) {
      opt = opt || {};
      const sd = slotDef(slot); if (!sd) return null;
      const rd = rarityDef(rarity);
      const bases = ECON.bases[slot] || [{ id: slot, name: sd.t, e: sd.e }];
      const base = opt.baseId ? (bases.find(b => b.id === opt.baseId) || bases[0]) : bases[Math.floor(Math.random() * bases.length)];
      // 主属性 = 该槽位 mainStat，数值 = base * rarityMul (取整)
      const mainKey = sd.mainStat;
      const mainVal = Math.round(ECON.statInfo[mainKey].base * rd.mul);
      // 副词条：按稀有度 affixes 数量随机抽取 (不与主属性重复，可重复种类则叠加)
      const statKeys = Object.keys(ECON.statInfo);
      const affixes = [];
      const affixCount = Math.max(0, rd.affixes - 1); // 主属性占 1 条
      for (let i = 0; i < affixCount; i++) {
        const k = statKeys[Math.floor(Math.random() * statKeys.length)];
        const v = Math.round(ECON.statInfo[k].base * rd.mul * (0.4 + Math.random() * 0.5));
        affixes.push({ k, v: Math.max(1, v) });
      }
      return {
        id: 'it' + (G._itemSeq++),
        slot, baseId: base.id, name: base.name, emoji: base.e,
        rarity, level: opt.level || 0,
        main: { k: mainKey, v: mainVal },
        affixes
      };
    }

    // 把一件装备加入背包
    function addItem(item) { if (item) { G.inventory.push(item); } return item; }

    // 计算装备「当前等级下」的属性合计 (主+副，含强化加成) -> {phys,crit,hp,rate}
    function itemStats(item) {
      const out = { phys: 0, crit: 0, hp: 0, rate: 0 };
      if (!item) return out;
      const lvlMul = 1 + (item.level || 0) * ECON.enhancePerLevel;
      if (item.main) out[item.main.k] += item.main.v * lvlMul;
      (item.affixes || []).forEach(a => { out[a.k] += a.v * lvlMul; });
      for (const k in out) out[k] = Math.round(out[k]);
      return out;
    }

    // 单件装备战力评分 (用于排序/品质感)
    function itemPower(item) {
      const s = itemStats(item);
      return Math.round(s.phys * 3 + s.crit * 4 + s.hp * 1.5 + s.rate * 3 + (item.rarity || 1) * 20);
    }

    // 查找实例
    function findItem(itemId) { return G.inventory.find(i => i.id === itemId) || null; }

    // ---------- 穿戴 / 卸下 ----------
    function equip(heroKey, itemId) {
      const item = findItem(itemId); if (!item) return false;
      const slots = ensureEquipSlots(heroKey);
      // 若该装备已被其它英雄穿戴，先卸下
      for (const hk in G.equipped) {
        for (const sk in G.equipped[hk]) {
          if (G.equipped[hk][sk] === itemId) G.equipped[hk][sk] = null;
        }
      }
      slots[item.slot] = itemId;
      saveProgress();
      return true;
    }
    function unequip(heroKey, slot) {
      const slots = ensureEquipSlots(heroKey);
      slots[slot] = null; saveProgress();
    }
    // 某装备当前被谁穿戴 (返回 heroKey 或 null)
    function wearerOf(itemId) {
      for (const hk in G.equipped) {
        for (const sk in G.equipped[hk]) if (G.equipped[hk][sk] === itemId) return hk;
      }
      return null;
    }

    // ---------- 有效属性 (基础 + 装备) ----------
    // 返回 {phys, crit, hpBonus, rateBonus} —— hpBonus 给防线上限，rateBonus 百分比加射速
    function effectiveStats(heroKey) {
      const def = heroDef(heroKey);
      const lvl = (G.heroLevel[heroKey] || 1);
      // 角色基础随技能等级成长 (与战斗内 makeHeroUnit 一致)
      const base = {
        phys: (def ? def.stats.phys : 0) + (lvl - 1) * 4,
        crit: (def ? def.stats.crit : 0) + (lvl - 1) * 2,
        hp: 0, rate: 0
      };
      const slots = ensureEquipSlots(heroKey);
      for (const sk in slots) {
        const it = findItem(slots[sk]);
        if (!it) continue;
        const s = itemStats(it);
        base.phys += s.phys; base.crit += s.crit; base.hp += s.hp; base.rate += s.rate;
      }
      base.phys = Math.round(base.phys); base.crit = Math.round(base.crit);
      base.hp = Math.round(base.hp); base.rate = Math.round(base.rate);
      return base;
    }

    // 英雄综合战力 (含装备)
    function heroPower(heroKey) {
      const s = effectiveStats(heroKey);
      const lvl = (G.heroLevel[heroKey] || 1);
      return Math.round(s.phys * 12 + s.crit * 8 + s.hp * 4 + s.rate * 6 + lvl * 60);
    }
    // 出战阵容总战力 (主角 + 候补)
    function squadPower() {
      const keys = [G.leader, ...G.squad.filter(k => k !== G.leader)].filter((v, i, a) => a.indexOf(v) === i);
      return keys.reduce((s, k) => s + (heroDef(k) ? heroPower(k) : 0), 0);
    }

    // ---------- 强化 ----------
    function enhanceCost(item) {
      const rd = rarityDef(item.rarity);
      const lv = item.level || 0;
      const coin = Math.round(ECON.enhanceCoinBase * Math.pow(lv + 1, 1.35) * (0.6 + rd.r * 0.35));
      // 素材：低级用螺丝/齿轮，高级追加强化液/结晶
      const need = { screw: 0, gear: 0, potion: 0, crystal: 0 };
      need.screw = ECON.enhanceMatBase + Math.floor(lv / 2) + rd.r;
      if (lv >= 4) need.gear = 1 + Math.floor((lv - 4) / 3);
      if (lv >= 8) need.potion = 1 + Math.floor((lv - 8) / 4);
      if (lv >= 14 && rd.r >= 4) need.crystal = 1 + Math.floor((lv - 14) / 5);
      return { coin, mats: need };
    }
    function canEnhance(item) {
      const rd = rarityDef(item.rarity);
      if ((item.level || 0) >= rd.maxLvl) return { ok: false, reason: 'max' };
      const c = enhanceCost(item);
      if (G.coins < c.coin) return { ok: false, reason: 'coin', cost: c };
      for (const m in c.mats) if ((G.materials[m] || 0) < c.mats[m]) return { ok: false, reason: 'mat', cost: c };
      return { ok: true, cost: c };
    }
    function enhance(item) {
      const chk = canEnhance(item);
      if (!chk.ok) return chk;
      G.coins -= chk.cost.coin;
      for (const m in chk.cost.mats) G.materials[m] = (G.materials[m] || 0) - chk.cost.mats[m];
      item.level = (item.level || 0) + 1;
      saveProgress();
      return { ok: true, level: item.level };
    }

    // ---------- 出售 / 合成 ----------
    function sellItem(itemId) {
      const it = findItem(itemId); if (!it) return false;
      const w = wearerOf(itemId); if (w) unequip(w, it.slot);
      const rd = rarityDef(it.rarity);
      // 售价 = 基础 + 强化等级返还
      const coin = Math.round(rd.sellCoin * (1 + (it.level || 0) * 0.15));
      G.coins += coin;
      // 高稀有返还少量素材
      if (rd.sellMatBonus > 0) { G.materials.gear = (G.materials.gear || 0) + rd.sellMatBonus; }
      G.inventory = G.inventory.filter(i => i.id !== itemId);
      saveProgress();
      return { coin, mat: rd.sellMatBonus };
    }
    // 合成：选 fuseNeed 件同稀有度 -> 1 件高一档
    function fuse(itemIds) {
      if (!Array.isArray(itemIds) || itemIds.length < ECON.fuseNeed) return { ok: false, reason: 'count' };
      const items = itemIds.map(findItem).filter(Boolean);
      if (items.length < ECON.fuseNeed) return { ok: false, reason: 'missing' };
      const r = items[0].rarity;
      if (!items.every(i => i.rarity === r)) return { ok: false, reason: 'rarity' };
      if (r >= 5) return { ok: false, reason: 'max' };
      // 消耗素材：合成需要齿轮
      const matNeed = r;
      if ((G.materials.gear || 0) < matNeed) return { ok: false, reason: 'mat', need: matNeed };
      G.materials.gear -= matNeed;
      // 卸下并移除被合成的装备
      items.forEach(it => { const w = wearerOf(it.id); if (w) unequip(w, it.slot); });
      G.inventory = G.inventory.filter(i => !itemIds.includes(i.id));
      // 产出：随机槽、高一档
      const slot = ECON.slots[Math.floor(Math.random() * ECON.slots.length)].k;
      const out = makeItem(slot, r + 1, {});
      addItem(out);
      saveProgress();
      return { ok: true, item: out };
    }

    // ---------- 掉落 (战斗奖励) ----------
    // 根据关卡序号 stageIdx + 是否胜利 + 表现，生成本局奖励 {coins, gems, mats, items[]}
    function rollBattleRewards(stageIdx, win, opt) {
      opt = opt || {};
      const score = opt.score || 0, comboBest = opt.comboBest || 0, kills = opt.kills || 0, hard = !!opt.hard;
      const stageMul = 1 + stageIdx * 0.28;
      const hardMul = hard ? 1.6 : 1;
      // 金币：基础 + 分数 + 连杀，胜利额外加成
      const baseCoin = (win ? 120 : 30) + Math.round(score / 4) + Math.round(comboBest * 2) + kills * 2;
      const coins = Math.round(baseCoin * stageMul * hardMul);
      // 材料掉落 (胜利更多)
      const mats = { screw: 0, gear: 0, potion: 0, crystal: 0 };
      const matRoll = (win ? 1 : 0.4) * (1 + stageIdx * 0.15) * hardMul;
      mats.screw = Math.round((2 + Math.random() * 4) * matRoll);
      if (Math.random() < 0.5 + stageIdx * 0.05) mats.gear = Math.round((1 + Math.random() * 2) * matRoll);
      if (win && stageIdx >= 2 && Math.random() < 0.4) mats.potion = 1 + Math.floor(Math.random() * 2);
      if (win && stageIdx >= 4 && Math.random() < 0.25) mats.crystal = 1;
      // 钻石：首通多，复通少
      let gems = 0;
      if (win) { const firstClear = opt.firstClear; gems = firstClear ? (15 + stageIdx * 5) : 6; }
      // 装备掉落：胜利必掉 1 件，按关卡决定稀有度权重；表现好(高连杀)有几率额外掉落
      const items = [];
      if (win) {
        items.push(rollDropItem(stageIdx, hard));
        if (comboBest >= 30 && Math.random() < 0.5) items.push(rollDropItem(stageIdx, hard));
      } else if (Math.random() < 0.35) {
        items.push(rollDropItem(stageIdx, hard));
      }
      return { coins, gems, mats, items: items.filter(Boolean) };
    }
    // 按关卡 + 困难度决定掉落装备稀有度，再随机槽位
    function rollDropItem(stageIdx, hard) {
      // 稀有度权重随关卡推进而上移
      const t = Math.min(1, stageIdx / 7);
      const w = [
        Math.max(2, 50 - t * 45),                 // common
        30 + t * 5,                                // fine
        12 + t * 22,                               // rare
        4 + t * 14,                                // epic
        1 + t * 9 + (hard ? 4 : 0)                 // legendary
      ];
      const total = w.reduce((a, b) => a + b, 0);
      let roll = Math.random() * total, rarity = 1;
      for (let i = 0; i < w.length; i++) { roll -= w[i]; if (roll <= 0) { rarity = i + 1; break; } }
      const slot = ECON.slots[Math.floor(Math.random() * ECON.slots.length)].k;
      return makeItem(slot, rarity, {});
    }

    // ---------- 每日奖励 ----------
    function todayKey() { const d = new Date(); return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate(); }
    function canClaimDaily(id) { const t = todayKey(); return !(G.dailyClaim[t] && G.dailyClaim[t][id]); }
    function claimDaily(id, reward) {
      const t = todayKey();
      if (!G.dailyClaim[t]) G.dailyClaim[t] = {};
      if (G.dailyClaim[t][id]) return false;
      G.dailyClaim[t][id] = true;
      // 应用奖励
      if (reward.coins) G.coins += reward.coins;
      if (reward.gems) G.gems += reward.gems;
      if (reward.mats) for (const m in reward.mats) G.materials[m] = (G.materials[m] || 0) + reward.mats[m];
      if (reward.item) addItem(reward.item);
      saveProgress();
      return true;
    }

    // ---------- 给新玩家发一套启动装备 (仅首次，背包为空时) ----------
    function seedStarterGear() {
      if (G.inventory && G.inventory.length) return;
      // 给 2 件普通 + 1 件精良，并自动给主角穿上
      const a = makeItem('helmet', 1, {});
      const b = makeItem('armor', 1, {});
      const c = makeItem('gloves', 2, {});
      addItem(a); addItem(b); addItem(c);
      const lk = G.leader || (heroDef && game_config.heroes[0].key);
      if (lk) { ensureEquipSlots(lk); equip(lk, a.id); equip(lk, b.id); equip(lk, c.id); }
      saveProgress();
    }

    // 暴露 API
    window.__ECON = {
      ECON, rarityDef, slotDef,
      makeItem, addItem, findItem, itemStats, itemPower,
      equip, unequip, wearerOf, ensureEquipSlots,
      effectiveStats, heroPower, squadPower,
      enhanceCost, canEnhance, enhance,
      sellItem, fuse,
      rollBattleRewards, rollDropItem,
      todayKey, canClaimDaily, claimDaily,
      seedStarterGear
    };

    // 启动：为新玩家播种初始装备
    seedStarterGear();
  })();
  </script>

  <!-- ============ chunk 2: roster / partner screen (up to 5 heroes, skill upgrade) ============ -->
  <script>
  (function () {
    'use strict';
    const D = window.__GD;
    const G = D.G, heroDef = D.heroDef, el = D.el, ui = D.ui;
    // 音效快捷方式 (chunk 0)
    function sfx(name, ...args) { try { const a = window.__AUDIO; if (a && a.sfx && a.sfx[name]) a.sfx[name](...args); } catch (e) {} }

    // cost to upgrade a hero skill = level * 120 coins
    function upCost(lvl) { return lvl * 120; }
    function unlockCost(key) { const h = heroDef(key); return (h && h.unlockCost) || 200; } // gems

    // 合计暴击伤害 = 出战阵容(主角+候补)各角色 crit 随等级成长后的总和
    function squadCritBonus() {
      const keys = [G.leader, ...G.squad.filter(k => k !== G.leader)];
      let sum = 0;
      keys.forEach(k => { const h = heroDef(k); if (!h) return; const lv = G.heroLevel[k] || 1; sum += h.stats.crit + (lv - 1) * 2; });
      return sum;
    }

    let selectedKey = G.squad[0] || game_config.heroes[0].key;
    let tab = 'style'; // 'style'(更衣室) | 'skill'(技能树)
    let previewForm = null;  // 更衣室里临时预览/切换的形态 (null = 跟随当前等级)

    // ---- 4-form evolution (与战斗一致) ----
    const FORM_LABELS = ['形态一', '形态二', '形态三', '终极形态'];
    const FORM_THRESH = [1, 3, 5, 8]; // 形态解锁所需技能等级
    function heroFormRow(lvl) { const L = Math.floor(lvl); if (L >= 8) return 3; if (L >= 5) return 2; if (L >= 3) return 1; return 0; }

    // DOM 引用缓存：构建一次，之后只做局部更新
    let R = null;

    // 完整构建一次界面骨架（进入界面或阵容变化时调用）
    function renderRoster() {
      G.screen = 'roster';
      if (window.__applyScreenVisibility) window.__applyScreenVisibility(); // 防御：确保战斗画布隐藏，避免文字重叠
      if (window.__stopBattle) window.__stopBattle();
      selectedKey = selectedKey || G.leader || game_config.heroes[0].key;
      if (!heroDef(selectedKey)) selectedKey = G.leader;

      const wrap = el('div', 'screen absolute inset-0 flex flex-col');
      wrap.id = 'rosterWrap';
      wrap.innerHTML = `
        <!-- ===== 顶部信息条 ===== -->
        <div class="flex items-center gap-2 px-3 pt-3">
          <div id="rName" class="text-2xl font-black truncate min-w-0" style="color:#fff;text-shadow:0 2px 4px #000;"></div>
          <div id="rTitle" class="shrink-0 px-2 py-[2px] rounded-full text-[11px] font-bold text-amber-200" style="background:rgba(0,0,0,.4);"></div>
          <div class="flex-1"></div>
          <button id="closeRoster" class="shrink-0 w-9 h-9 rounded-full bg-black/50 text-white text-lg">⤢</button>
        </div>

        <!-- ===== 中部：左 更衣室 | 中 立绘 | 右 技能 ===== -->
        <div class="flex-1 min-h-0 relative flex items-stretch px-2 mt-1">
          <!-- 左侧：更衣室入口 -->
          <div class="flex flex-col justify-center gap-2 z-10">
            <button data-tab="style" id="tabStyle" class="w-14 py-3 rounded-2xl flex flex-col items-center gap-1 font-bold border" style="border-color:rgba(217,154,58,.4);">
              <span class="text-xl">👗</span><span class="text-[10px]" id="tabStyleTxt">更衣室</span>
            </button>
          </div>

          <!-- 中间：宠物立绘 -->
          <div class="flex-1 relative flex items-center justify-center">
            <div id="portraitBox" class="relative flex items-center justify-center rounded-2xl" style="width:210px;height:280px;">
              <canvas id="heroCanvas" width="220" height="220" class="drop-shadow-2xl" style="image-rendering:auto;"></canvas>
              <div id="heroLoading" class="absolute text-[12px] text-stone-300">形象加载中…</div>
              <!-- 核心属性：宠物卡片左上角，每个一行 -->
              <div id="statBox" class="absolute top-1 left-1 flex flex-col gap-[2px] z-10"></div>
              <!-- 元素徽章 -->
              <div id="elBadge" class="absolute top-1 right-1 px-2 py-[1px] rounded-full text-[11px] font-bold"></div>
              <!-- 形态名 -->
              <div id="formBadge" class="absolute bottom-1 left-1/2 -translate-x-1/2 px-2 py-[1px] rounded-full bg-black/70 text-[10px] font-bold" style="color:#ffd24a;"></div>
              <!-- 锁定时：预览界面上的小解锁按钮 (贴底，不挡立绘) -->
              <div id="unlockOverlay" class="absolute bottom-7 left-1/2 -translate-x-1/2 z-20 hidden"></div>
            </div>
          </div>

          <!-- 右侧：技能 入口 -->
          <div class="flex flex-col justify-center gap-2 z-10">
            <button data-tab="skill" id="tabSkill" class="w-14 py-3 rounded-2xl flex flex-col items-center gap-1 font-bold border" style="border-color:rgba(217,154,58,.4);">
              <span class="text-xl">⚔️</span><span class="text-[10px]" id="tabSkillTxt">技能</span>
            </button>
          </div>
        </div>

        <!-- ===== 面板区：更衣室(形态切换) 或 技能(显示+升级) ===== -->
        <div id="panelArea" class="px-3"></div>

        <!-- ===== 出战 / 全部 两排：拖动交换是否出战 ===== -->
        <div class="px-3 pb-1 flex items-center justify-between">
          <div class="text-[10px] text-amber-300 font-bold">出战阵容</div>
          <div class="text-[9px] text-stone-400">↓ 拖到下方可移出</div>
        </div>
        <div id="deployRow" class="flex gap-2 px-3 pb-2 min-h-[78px] rounded-xl mx-2 items-center"
             style="background:rgba(54,196,90,.08);border:1px dashed rgba(54,196,90,.4);"></div>

        <div class="px-3 pb-1 pt-1 flex items-center justify-between">
          <div class="text-[10px] text-stone-400">全部角色</div>
          <div class="text-[9px] text-emerald-300 font-bold">↑ 拖到上方出战</div>
        </div>
        <div id="benchRow" class="flex gap-2 px-3 pb-2 min-h-[78px] overflow-x-auto scrollx rounded-xl mx-2 items-center"
             style="background:rgba(0,0,0,.25);border:1px dashed rgba(255,255,255,.12);"></div>

        <div id="rosterNav"></div>`;
      ui.innerHTML = '';
      ui.appendChild(wrap);

      // 缓存 DOM 引用
      R = {
        wrap,
        name: wrap.querySelector('#rName'), title: wrap.querySelector('#rTitle'),
        tabStyle: wrap.querySelector('#tabStyle'), tabStyleTxt: wrap.querySelector('#tabStyleTxt'),
        tabSkill: wrap.querySelector('#tabSkill'), tabSkillTxt: wrap.querySelector('#tabSkillTxt'),
        portraitBox: wrap.querySelector('#portraitBox'), heroCanvas: wrap.querySelector('#heroCanvas'),
        heroLoading: wrap.querySelector('#heroLoading'), statBox: wrap.querySelector('#statBox'),
        elBadge: wrap.querySelector('#elBadge'), formBadge: wrap.querySelector('#formBadge'),
        unlockOverlay: wrap.querySelector('#unlockOverlay'),
        panel: wrap.querySelector('#panelArea'),
        deployRow: wrap.querySelector('#deployRow'), benchRow: wrap.querySelector('#benchRow')
      };

      // 底部导航 (构建一次)
      const navHost = wrap.querySelector('#rosterNav');
      if (navHost && window.__buildBottomNav) navHost.appendChild(window.__buildBottomNav('roster'));

      // 一次性事件绑定
      wrap.querySelector('#closeRoster').addEventListener('click', () => { sfx('click'); window.__show('home'); });
      R.tabStyle.addEventListener('click', () => { if (tab !== 'style') { tab = 'style'; previewForm = null; sfx('tab'); refreshSelected(); } });
      R.tabSkill.addEventListener('click', () => { if (tab !== 'skill') { tab = 'skill'; previewForm = null; sfx('tab'); refreshSelected(); } });

      // 两排卡片 + 局部内容
      renderDeployRows(R.deployRow, R.benchRow);
      refreshSelected();
    }

    // 仅更新与「当前选中角色 / 形态 / tab」相关的局部内容 (不重建整个界面)
    function refreshSelected() {
      if (!R) { renderRoster(); return; }
      const h = heroDef(selectedKey);
      const lvl = G.heroLevel[selectedKey];
      const unlocked = !!G.unlocked[selectedKey];
      const sk = h.skill;
      const curForm = heroFormRow(lvl);
      const showForm = (previewForm != null) ? previewForm : curForm;
      // 有效属性：基础(随等级) + 装备加成 (来自 __ECON)，让伙伴页直观体现装备价值
      const eff = (window.__ECON && window.__ECON.effectiveStats) ? window.__ECON.effectiveStats(selectedKey) : null;
      const crit = eff ? eff.crit : (h.stats.crit + (lvl - 1) * 2);
      const phys = eff ? eff.phys : (h.stats.phys + (lvl - 1) * 4);
      const gearHp = eff ? eff.hp : 0;
      const gearRate = eff ? eff.rate : 0;
      const power = (window.__ECON && window.__ECON.heroPower) ? window.__ECON.heroPower(selectedKey) : 0;

      // 背景随选中角色配色
      R.wrap.style.background = `linear-gradient(160deg,${h.color}26,#120d0b 60%,#0a0706)`;

      // 顶部：名字 + 称号(职业放在抬头右侧，元素系不再显示在标题)
      R.name.textContent = h.name;
      R.title.textContent = h.title;

      // 核心属性：放到宠物卡片左上角，每个一行 (含装备加成 + 战力)
      R.statBox.innerHTML = `
        <div class="px-2 py-[1px] rounded bg-black/60 text-[10px] font-bold text-amber-300">⚡ 战力 ${power}</div>
        <div class="px-2 py-[1px] rounded bg-black/60 text-[10px] font-bold text-amber-300">物伤 +${phys}%</div>
        <div class="px-2 py-[1px] rounded bg-black/60 text-[10px] font-bold text-amber-300">暴击 +${crit}%</div>
        ${gearHp ? `<div class="px-2 py-[1px] rounded bg-black/60 text-[10px] font-bold text-emerald-300">🛡️ +${gearHp}</div>` : ''}
        ${gearRate ? `<div class="px-2 py-[1px] rounded bg-black/60 text-[10px] font-bold text-sky-300">⚡ 射速+${gearRate}%</div>` : ''}`;

      // 立绘底色 / 元素徽章 / 形态名 / 锁定灰度
      R.portraitBox.style.background = `radial-gradient(circle at 50% 38%,${h.color}55,${h.color}11)`;
      R.heroCanvas.style.filter = unlocked ? '' : 'grayscale(.6) brightness(.7)';
      R.elBadge.style.background = elColor(h.element); R.elBadge.style.color = '#0a0a0a';
      R.elBadge.textContent = `${elEmoji(h.element)} ${elName(h.element)}系`;
      R.formBadge.textContent = FORM_LABELS[showForm];

      // tab 高亮
      R.tabStyle.style.background = tab === 'style' ? 'linear-gradient(#c0392b,#7a1f15)' : 'rgba(0,0,0,.45)';
      R.tabStyleTxt.className = 'text-[10px] ' + (tab === 'style' ? 'text-white' : 'text-stone-300');
      R.tabSkill.style.background = tab === 'skill' ? 'linear-gradient(#c0392b,#7a1f15)' : 'rgba(0,0,0,.45)';
      R.tabSkillTxt.className = 'text-[10px] ' + (tab === 'skill' ? 'text-white' : 'text-stone-300');

      // 锁定时：在预览主界面底部显示一个【小】解锁按钮 (尽量不挡住立绘)
      if (!unlocked) {
        const ucost = unlockCost(selectedKey);
        R.unlockOverlay.classList.remove('hidden');
        R.unlockOverlay.innerHTML = `<button id="ovUnlock" class="px-3 py-[3px] rounded-full text-[11px] font-bold text-white shadow"
            style="background:linear-gradient(#ffb733,#e07b0a);box-shadow:0 2px 0 #7a2408;">🔒 解锁 💎${ucost}</button>`;
        R.unlockOverlay.querySelector('#ovUnlock').addEventListener('click', () => doUnlock(selectedKey));
      } else {
        R.unlockOverlay.classList.add('hidden');
        R.unlockOverlay.innerHTML = '';
      }

      // 面板 (更衣室 / 技能)
      if (tab === 'style') renderWardrobe(R.panel, h, lvl, curForm, showForm);
      else renderSkillPanel(R.panel, h, lvl, sk, unlocked);

      // 中央立绘
      drawHeroPortrait(h, showForm);

      // 仅更新卡片高亮边框 (不重建卡片)
      highlightCards();
    }

    // 解锁角色 (用预览界面上的解锁按钮，而非弹窗 confirm)
    function doUnlock(key) {
      const h = heroDef(key);
      const cost = unlockCost(key);
      if (G.gems >= cost) {
        G.gems -= cost; G.unlocked[key] = true; sfx('unlock'); toast('已解锁 ' + h.name); D.saveProgress();
        renderDeployRows(R.deployRow, R.benchRow);  // 卡片锁状态变化，重建两排
        refreshSelected();
      } else toast('💎 不足，无法解锁 ' + h.name);
    }

    // 仅更新卡片选中高亮，不重建
    function highlightCards() {
      if (!R) return;
      R.wrap.querySelectorAll('.roster-card').forEach(card => {
        const k = card.getAttribute('data-hk');
        const hh = heroDef(k);
        const isLeader = (k === G.leader);
        if (isLeader) { card.style.borderColor = '#e0a017'; return; }
        card.style.borderColor = (k === selectedKey) ? hh.color : 'rgba(255,255,255,.14)';
      });
    }

    // 出战上限（不含主角）
    function maxDeploy() { return Math.max(1, (game_config.maxSquad || 5) - 1); }
    // 已出战的候补伙伴(不含主角)
    function deployedKeys() { return G.squad.filter(k => k !== G.leader && heroDef(k)); }
    // 在「全部角色」里可候选的所有伙伴(不含主角)
    function allPartnerKeys() { return game_config.heroes.filter(h => h.key !== G.leader && h.usePet !== false).map(h => h.key); }
    // 未出战的伙伴 = 全部 - 已出战
    function benchKeys() { const dep = new Set(deployedKeys()); return allPartnerKeys().filter(k => !dep.has(k)); }

    // ---- 中央立绘 (宠物占位) ----
    function drawHeroPortrait(h, formRow) {
      const cv = document.getElementById('heroCanvas');
      const loading = document.getElementById('heroLoading');
      if (!cv) return;
      const url = h.spriteUrl;
      const cctx = cv.getContext('2d');
      if (!url) { if (loading) loading.textContent = '形象加载中…'; return; }
      const tryDraw = () => {
        cctx.clearRect(0, 0, cv.width, cv.height);
        const ok = D.drawSheetCell(cctx, url, formRow, 1, 10, 10, 200, 200); // 形态行, happy col
        if (ok && loading) loading.style.display = 'none';
        return ok;
      };
      if (!tryDraw()) { let n = 0; const iv = setInterval(() => { if (tryDraw() || ++n > 25) clearInterval(iv); }, 120); }
    }

    // ---- 更衣室：四个成长阶段在这里显示和切换 ----
    function renderWardrobe(panel, h, lvl, curForm, showForm) {
      panel.innerHTML = `
        <div class="bg-black/45 rounded-xl p-3 border border-amber-900/40">
          <div class="text-[12px] font-bold text-amber-200 mb-2">👗 更衣室 · 成长阶段</div>
          <div class="flex items-center justify-between gap-1" id="formRow"></div>
        </div>`;
      const row = panel.querySelector('#formRow');
      FORM_LABELS.forEach((lab, i) => {
        const reached = lvl >= FORM_THRESH[i];
        const isShown = i === showForm;
        const cell = el('div', 'relative flex flex-col items-center');
        cell.style.opacity = reached ? '1' : '.55';
        cell.innerHTML = `
          <canvas class="formCv" data-form="${i}" width="56" height="56"
            style="width:54px;height:54px;border-radius:10px;border:2px solid ${isShown?elColor(h.element):'rgba(255,255,255,.15)'};background:${h.color}18;${reached?'':'filter:grayscale(.7);'}cursor:pointer;"></canvas>
          <div class="text-[10px] mt-[2px] ${isShown?'text-amber-300 font-bold':'text-stone-400'}">${lab}</div>
          <div class="text-[8px] text-stone-500">Lv.${FORM_THRESH[i]}${reached?'':' 🔒'}</div>`;
        row.appendChild(cell);
        if (i < 3) { const arrow = el('div', 'text-stone-500 text-xs mb-5', '›'); row.appendChild(arrow); }
        // 每个形态都可点击预览(含未解锁形态)；未解锁仅提示，仍可预览查看形象
        cell.querySelector('.formCv').addEventListener('click', () => {
          previewForm = i; refreshSelected();   // 只刷新局部，不重建整页
          if (!reached) toast('该形态需技能升至 Lv.' + FORM_THRESH[i] + ' 解锁');
        });
      });
      // draw form thumbnails
      panel.querySelectorAll('.formCv').forEach(cv => {
        const fi = +cv.getAttribute('data-form');
        if (!h.spriteUrl) return;
        const cc = cv.getContext('2d');
        const draw = () => { cc.clearRect(0, 0, cv.width, cv.height); return D.drawSheetCell(cc, h.spriteUrl, fi, 0, 3, 3, 50, 50); };
        if (!draw()) { let n = 0; const iv = setInterval(() => { if (draw() || ++n > 15) clearInterval(iv); }, 120); }
      });
    }


    // ================= 拖动出战/移出 (移动端 + PC 通用 pointer 事件) =================
    // 构建一张可拖动的角色卡 (出战行/全部行通用)
    function makeDragCard(k, where) {
      const hh = heroDef(k);
      const owned = !!G.unlocked[k];
      const isLeader = (k === G.leader);
      const card = el('div', 'roster-card shrink-0 w-16 h-[72px] rounded-lg flex flex-col items-center justify-center relative select-none');
      card.style.background = `linear-gradient(${hh.color}33,${hh.color}10)`;
      card.style.border = `2px solid ${k === selectedKey ? hh.color : 'rgba(255,255,255,.14)'}`;
      card.style.touchAction = 'none';
      card.setAttribute('data-hk', k);
      card.setAttribute('data-where', where); // 'deploy' | 'bench'
      card.innerHTML = `
        <canvas class="ptThumb" width="48" height="48" style="width:40px;height:40px;${owned?'':'filter:grayscale(.6) brightness(.7);'};pointer-events:none;"></canvas>
        <div class="text-[8px] text-stone-200 mt-[2px] pointer-events-none">${hh.name}</div>
        <div class="absolute bottom-[1px] right-[2px] text-[9px] pointer-events-none" style="color:${elColor(hh.element)}">${elEmoji(hh.element)}</div>
        ${isLeader ? '<div class="absolute -top-2 left-1/2 -translate-x-1/2 px-[5px] py-[1px] rounded bg-amber-500 text-[8px] font-bold text-black pointer-events-none">主角</div>' : ''}
        ${owned ? '' : `<div class="cardLock absolute top-[2px] right-[2px] z-10 flex items-center gap-[1px] px-[4px] py-[1px] rounded-full bg-black/85 border border-sky-400/60 shadow pointer-events-none" data-lockk="${k}"><span class="text-[9px] leading-none">🔒</span><span class="text-[8px] text-sky-300 font-bold leading-none">💎${hh.unlockCost || 200}</span></div>`}`;
      // 绘制宠物缩略图
      const cv = card.querySelector('.ptThumb');
      if (hh.spriteUrl) {
        const cc = cv.getContext('2d');
        const draw = () => { cc.clearRect(0, 0, cv.width, cv.height); return D.drawSheetCell(cc, hh.spriteUrl, 0, 1, 2, 2, 44, 44); };
        if (!draw()) { let n = 0; const iv = setInterval(() => { if (draw() || ++n > 15) clearInterval(iv); }, 120); }
      }
      // 锁定角色：点击整张卡片即可预览 (预览区会出现解锁按钮)；角标锁头仅作提示，不拦截点击
      return card;
    }

    // 渲染两排 + 绑定拖动
    function renderDeployRows(deployRow, benchRow) {
      deployRow.innerHTML = '';
      benchRow.innerHTML = '';

      // 出战行：主角(固定不可拖) + 已出战候补
      const leaderCard = makeDragCard(G.leader, 'deploy');
      leaderCard.classList.add('leader-fixed');
      leaderCard.style.borderColor = '#e0a017';
      leaderCard.style.boxShadow = '0 0 10px #e0a01788';
      deployRow.appendChild(leaderCard);
      deployedKeys().forEach(k => deployRow.appendChild(makeDragCard(k, 'deploy')));
      // 出战行剩余空位提示
      const usedSlots = deployedKeys().length;
      for (let i = usedSlots; i < maxDeploy(); i++) {
        const slot = el('div', 'shrink-0 w-16 h-[72px] rounded-lg flex items-center justify-center text-stone-600 text-xl');
        slot.style.border = '1px dashed rgba(255,255,255,.12)';
        slot.textContent = '＋';
        deployRow.appendChild(slot);
      }

      // 全部行：未出战伙伴
      benchKeys().forEach(k => benchRow.appendChild(makeDragCard(k, 'bench')));
      if (!benchKeys().length) {
        benchRow.innerHTML = '<div class="text-[10px] text-stone-500 px-3 py-4">全部伙伴已出战</div>';
      }

      bindDrag(deployRow, benchRow);
    }

    // 把某伙伴加入出战
    function deployPartner(k) {
      if (k === G.leader) return false;
      if (!G.unlocked[k]) { toast('需先解锁该伙伴'); return false; }
      if (deployedKeys().length >= maxDeploy()) { toast('出战已满（最多' + maxDeploy() + '位，不含主角）'); return false; }
      if (!G.squad.includes(k)) G.squad.push(k);
      D.saveProgress(); return true;
    }
    // 把某伙伴移出出战
    function benchPartner(k) {
      if (k === G.leader) { toast('主角固定出战，无法移出'); return false; }
      G.squad = G.squad.filter(x => x !== k);
      D.saveProgress(); return true;
    }

    // 拖动逻辑：pointer 事件统一处理鼠标+触摸
    let dragState = null;
    function bindDrag(deployRow, benchRow) {
      const cards = [...deployRow.querySelectorAll('.roster-card'), ...benchRow.querySelectorAll('.roster-card')];
      cards.forEach(card => {
        card.addEventListener('pointerdown', e => onDragStart(e, card, deployRow, benchRow));
      });
    }

    function onDragStart(e, card, deployRow, benchRow) {
      const k = card.getAttribute('data-hk');
      const from = card.getAttribute('data-where');
      const hh = heroDef(k);
      // 锁定的伙伴无法拖动 → 点击则选中预览(预览主界面会出现解锁按钮)
      if (!G.unlocked[k]) { selectedKey = k; previewForm = null; refreshSelected(); return; }
      // 主角不可拖动
      if (card.classList.contains('leader-fixed')) { selectedKey = k; previewForm = null; refreshSelected(); return; }

      e.preventDefault();
      const rect = card.getBoundingClientRect();
      const ghost = card.cloneNode(true);
      ghost.style.position = 'fixed';
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      ghost.style.width = rect.width + 'px';
      ghost.style.height = rect.height + 'px';
      ghost.style.zIndex = '999';
      ghost.style.pointerEvents = 'none';
      ghost.style.opacity = '.92';
      ghost.style.transform = 'scale(1.08)';
      document.body.appendChild(ghost);
      card.style.opacity = '.35';

      dragState = {
        key: k, from, card, ghost, deployRow, benchRow,
        startX: e.clientX, startY: e.clientY,
        offX: e.clientX - rect.left, offY: e.clientY - rect.top,
        moved: false, pointerId: e.pointerId
      };
      try { card.setPointerCapture(e.pointerId); } catch (_) {}
      card.addEventListener('pointermove', onDragMove);
      card.addEventListener('pointerup', onDragEnd);
      card.addEventListener('pointercancel', onDragEnd);
    }

    function onDragMove(e) {
      if (!dragState) return;
      const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragState.moved = true;
      dragState.ghost.style.left = (e.clientX - dragState.offX) + 'px';
      dragState.ghost.style.top = (e.clientY - dragState.offY) + 'px';
      // 高亮目标放置区
      const overDeploy = isOver(e, dragState.deployRow);
      const overBench = isOver(e, dragState.benchRow);
      dragState.deployRow.style.background = overDeploy ? 'rgba(54,196,90,.22)' : 'rgba(54,196,90,.08)';
      dragState.benchRow.style.background = overBench ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.25)';
    }

    function onDragEnd(e) {
      if (!dragState) return;
      const st = dragState; dragState = null;
      st.card.removeEventListener('pointermove', onDragMove);
      st.card.removeEventListener('pointerup', onDragEnd);
      st.card.removeEventListener('pointercancel', onDragEnd);
      try { st.card.releasePointerCapture(st.pointerId); } catch (_) {}
      if (st.ghost && st.ghost.parentNode) st.ghost.parentNode.removeChild(st.ghost);
      st.card.style.opacity = '1';
      st.deployRow.style.background = 'rgba(54,196,90,.08)';
      st.benchRow.style.background = 'rgba(0,0,0,.25)';

      const overDeploy = isOver(e, st.deployRow);
      const overBench = isOver(e, st.benchRow);

      if (!st.moved) {
        // 仅点击：选中查看 (只刷新局部)
        selectedKey = st.key; previewForm = null; refreshSelected();
        return;
      }
      let changed = false;
      if (st.from === 'bench' && overDeploy) changed = deployPartner(st.key);
      else if (st.from === 'deploy' && overBench) changed = benchPartner(st.key);
      selectedKey = st.key; previewForm = null;
      if (changed) renderDeployRows(R.deployRow, R.benchRow); // 阵容变化才重建两排
      refreshSelected();
    }

    function isOver(e, row) {
      const r = row.getBoundingClientRect();
      return e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
    }

    function cyclePartner(dir) {
      const keys = [G.leader, ...benchKeys(), ...deployedKeys()].filter((v, i, a) => a.indexOf(v) === i);
      if (!keys.length) return;
      let i = keys.indexOf(selectedKey);
      if (i < 0) i = 0;
      i = (i + dir + keys.length) % keys.length;
      selectedKey = keys[i];
      previewForm = null;
      refreshSelected();
    }

    // ================= 技能面板：技能显示 + 升级 =================
    function renderSkillPanel(panel, h, lvl, sk, unlocked) {
      const cost = upCost(lvl);
      const nextDmg = (sk.dmg * (1 + lvl * 0.25)).toFixed(0);
      const curDmg = (sk.dmg * (1 + (lvl - 1) * 0.25)).toFixed(0);
      // 技能树节点：每个节点对应一个升级里程碑 (thr=达成所需等级)
      const nodes = [
        { lab: sk.name, icon: skillIcon(sk.type), thr: 1 },
        { lab: '强化Ⅰ', icon: '🔧', thr: 3 },
        { lab: '强化Ⅱ', icon: '⚙️', thr: 5 },
        { lab: '觉醒', icon: '✨', thr: 8 }
      ];
      nodes.forEach(n => n.on = lvl >= n.thr);
      // 下一个可升级(高亮)的节点 = 第一个尚未点亮的节点 (角色已解锁时才可点击)
      const nextIdx = unlocked ? nodes.findIndex(n => !n.on) : -1;
      panel.innerHTML = `
        <div class="bg-black/45 rounded-xl p-3 border border-amber-900/40">
          <!-- 技能显示：icon + 名称 + 描述 + 数值 -->
          <div class="flex items-start gap-3">
            <div class="shrink-0 w-14 h-14 rounded-full flex items-center justify-center text-3xl"
                 style="background:radial-gradient(circle at 35% 30%,#fff,${h.color});box-shadow:0 2px 8px #000;${unlocked?'':'filter:grayscale(.6);opacity:.7;'}">${skillIcon(sk.type)}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <div class="font-bold text-amber-200 text-[14px]">${sk.name} <span class="text-stone-400 text-[11px]">Lv.${lvl}</span></div>
                <div class="text-[10px] text-stone-400">${typeLabel(sk.type)}</div>
              </div>
              <div class="text-[11px] text-stone-300 mt-1 leading-snug">${sk.desc}</div>
              <div class="text-[10px] text-stone-400 mt-1">伤害 ${curDmg}${unlocked?` <span class="text-emerald-300">→ ${nextDmg}</span>`:''} · 射速 ${sk.fireRate?(1000/sk.fireRate*(1+(lvl-1)*0.12)).toFixed(1)+'/s':'—'}</div>
            </div>
          </div>

          <!-- 技能树：高亮可升级的下一级节点，点击即升级 -->
          <div class="flex items-center justify-between mt-3">
            ${nodes.map((n, i) => {
              const isNext = i === nextIdx;
              return `
              <div class="flex items-center">
                <div class="flex flex-col items-center ${isNext ? 'skillNext' : ''}" ${isNext ? `data-upnode="1" style="cursor:pointer;"` : ''}>
                  <div class="w-10 h-10 rounded-full flex items-center justify-center text-xl relative"
                       style="background:radial-gradient(circle at 35% 30%,#fff,${h.color});${n.on?'':'filter:grayscale(.7);opacity:.5;'}${isNext?`filter:none;opacity:1;box-shadow:0 0 0 2px ${elColor(h.element)},0 0 12px ${elColor(h.element)}aa;`:''}">${n.icon}${isNext?'<div class="absolute -top-2 -right-1 text-[12px]">⬆️</div>':''}</div>
                  <div class="text-[9px] mt-1 ${isNext?'text-emerald-300 font-bold':(n.on?'text-amber-200':'text-stone-500')}">${n.lab}</div>
                  ${isNext?`<div class="text-[8px] text-amber-300 font-bold leading-none">🪙${cost}</div>`:''}
                </div>
                ${i < nodes.length - 1 ? `<div class="w-5 h-[2px] mx-[2px] mb-4" style="background:${nodes[i+1].on?elColor(h.element):'rgba(255,255,255,.15)'};"></div>` : ''}
              </div>`;
            }).join('')}
          </div>

          <!-- 操作：仅未解锁角色时显示解锁按钮 -->
          <div id="skillAction" class="mt-3"></div>
        </div>

        ${h.ult ? `
        <div class="bg-black/45 rounded-xl p-3 border mt-2" style="border-color:${elColor(h.element)}55;${unlocked?'':'opacity:.6;'}">
          <div class="flex items-center gap-2">
            <div class="shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-2xl" style="background:radial-gradient(circle at 35% 30%,#fff,${h.color});box-shadow:0 0 14px ${elColor(h.element)}88;">★</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-1">
                <span class="text-[9px] font-black px-[5px] py-[1px] rounded text-black" style="background:#ffd24a;">大招</span>
                <span class="font-bold text-[13px]" style="color:${elColor(h.element)};">${h.ult.name}</span>
              </div>
              <div class="text-[11px] text-stone-300 mt-1 leading-snug">${h.ult.desc}</div>
              <div class="text-[9px] text-stone-500 mt-1">战斗中作为「主角」时，能量充满即可释放</div>
            </div>
          </div>
        </div>` : ''}`;

      if (!unlocked) {
        const act = panel.querySelector('#skillAction');
        const ucost = unlockCost(selectedKey);
        act.innerHTML = `<div class="flex justify-center"><button id="unlockBtn" class="px-4 py-[6px] rounded-full text-[12px] font-bold text-white"
            style="background:linear-gradient(#ffb733,#e07b0a);box-shadow:0 2px 0 #7a2408;">🔒 解锁 · 💎${ucost}</button></div>`;
        act.querySelector('#unlockBtn').addEventListener('click', () => doUnlock(selectedKey));
      } else {
        // 高亮的下一级节点可点击 → 弹出确认弹窗后升级
        const upNode = panel.querySelector('[data-upnode="1"]');
        if (upNode) {
          upNode.addEventListener('click', () => {
            const enough = G.coins >= cost;
            confirmModal({
              title: '升级技能',
              body: `将 <b style="color:#ffd24a;">${h.name}</b> 的技能升至 <b style="color:#7CFC00;">Lv.${lvl + 1}</b><br>消耗 <b style="color:#ffd24a;">🪙${cost}</b>　(当前 🪙${G.coins})${enough ? '' : '<br><span style="color:#ff7b6a;">金币不足</span>'}`,
              okText: enough ? '确定升级' : '金币不足',
              okDisabled: !enough,
              onOk: () => {
                if (G.coins >= cost) {
                  G.coins -= cost; G.heroLevel[selectedKey]++;
                  sfx('levelup');
                  toast(h.name + ' 技能升至 Lv.' + G.heroLevel[selectedKey]);
                  D.saveProgress(); refreshSelected();
                } else toast('🪙 不足');
              }
            });
          });
        }
      }
    }

    function skillIcon(type) {
      return ({ explode: '💥', nail: '❄️', pierce: '🎯', rapid: '🔫', support: '💉', flame: '🔥', chain: '⚡', normal: '🔫' })[type] || '✨';
    }
    function typeLabel(type) {
      return ({ explode: '爆炸', nail: '冰冻·减速', pierce: '穿透', rapid: '连射·增益', support: '治疗·减速', flame: '火焰·灼烧', chain: '雷电·连锁', normal: '多重射击' })[type] || '技能';
    }
    // element display helpers
    function elColor(k) { return (game_config.elements[k] && game_config.elements[k].color) || '#888'; }
    function elEmoji(k) { return (game_config.elements[k] && game_config.elements[k].emoji) || '✨'; }
    function elName(k) { return (game_config.elements[k] && game_config.elements[k].name) || '?'; }

    // simple toast
    let toastT = null;
    function toast(msg) {
      let t = document.getElementById('__toast');
      if (!t) { t = el('div', 'fixed left-1/2 -translate-x-1/2 px-4 py-2 rounded-full bg-black/80 text-white text-sm z-50'); t.id = '__toast'; t.style.bottom = '90px'; D.root.appendChild(t); }
      t.textContent = msg; t.style.opacity = '1';
      clearTimeout(toastT); toastT = setTimeout(() => t.style.opacity = '0', 1400);
    }
    window.__toast = toast;

    // 通用确认弹窗 (替代 alert/confirm)；onOk 在点击确定时触发
    function confirmModal({ title, body, okText = '确定', cancelText = '取消', okDisabled = false, onOk }) {
      const prev = document.getElementById('__confirmModal');
      if (prev) prev.remove();
      const mask = el('div', 'fixed inset-0 z-[60] flex items-center justify-center');
      mask.id = '__confirmModal';
      mask.style.background = 'rgba(0,0,0,.6)';
      mask.innerHTML = `
        <div class="w-[78%] max-w-[300px] rounded-2xl p-4 text-center" style="background:linear-gradient(160deg,#2a1c18,#171010);border:1px solid rgba(217,154,58,.5);box-shadow:0 10px 40px #000;">
          <div class="text-[15px] font-black text-amber-200 mb-2">${title || '确认'}</div>
          <div class="text-[12px] text-stone-200 mb-4 leading-relaxed">${body || ''}</div>
          <div class="flex gap-2">
            <button id="cmCancel" class="flex-1 py-2 rounded-xl font-bold text-stone-200 text-[13px]" style="background:rgba(255,255,255,.12);">${cancelText}</button>
            <button id="cmOk" class="flex-1 py-2 rounded-xl font-bold text-white text-[13px] ${okDisabled ? 'opacity-50' : ''}"
              style="background:linear-gradient(#ffb733,#e07b0a);box-shadow:0 3px 0 #7a2408;">${okText}</button>
          </div>
        </div>`;
      D.root.appendChild(mask);
      const close = () => mask.remove();
      mask.addEventListener('click', e => { if (e.target === mask) close(); });
      mask.querySelector('#cmCancel').addEventListener('click', close);
      mask.querySelector('#cmOk').addEventListener('click', () => {
        if (okDisabled) return;
        close();
        if (onOk) onOk();
      });
    }
    window.__confirmModal = confirmModal;

    window.__renderRoster = renderRoster;
  })();
  </script>

  <!-- ============ chunk 3: multi-hero battle ============ -->
  <script>
  (function () {
    'use strict';
    const D = window.__GD;
    const G = D.G, heroDef = D.heroDef, curLevel = D.curLevel, el = D.el;
    const canvas = D.canvas, ctx = D.ctx, ui = D.ui, root = D.root;
    const PET = D.PET, drawSheetCell = D.drawSheetCell, sheetPending = D.sheetPending, pickPetForElement = D.pickPetForElement, ELEMENT_KEYS = D.ELEMENT_KEYS;
    // 音效引擎快捷方式 (chunk 0 提供)；做空安全包装，缺失时静默。
    const SFX = (window.__AUDIO && window.__AUDIO.sfx) || {};
    function sfx(name, ...args) { try { if (SFX[name]) SFX[name](...args); } catch (e) {} }
    function bgm(track) { try { window.__AUDIO && window.__AUDIO.playMusic(track); } catch (e) {} }

    // ---- 4-form evolution (form1/2/3/ultimate = sprite rows 0..3) ----
    const FORM_NAMES = ['baby', 'teen', 'adult', 'elder'];
    const FORM_LABELS = ['形态一', '形态二', '形态三', '终极形态'];
    // hero form升级阈值：技能等级 1→baby, 3→teen, 5→adult, 8→elder(最终形态)
    function heroFormRow(lvl) {
      const L = Math.floor(lvl);
      if (L >= 8) return 3;
      if (L >= 5) return 2;
      if (L >= 3) return 1;
      return 0;
    }
    // boss form随关卡推进/波次成长：越靠后的 boss 波形态越高
    function bossFormRow(waveIndex, totalWaves) {
      const ratio = totalWaves > 1 ? waveIndex / (totalWaves - 1) : 0;
      return Math.min(3, Math.floor(ratio * 4));
    }

    // ---- element counter helpers ----
    // 自然(balanced) 对所有人无差别：既不享受克制加成，也不受被克减伤。
    function elementMul(atkEl, defEl) {
      if (!atkEl || !defEl) return 1;
      const eDef = game_config.elements;
      // 平衡系无差别攻击/防御
      if ((eDef[atkEl] && eDef[atkEl].balanced) || (eDef[defEl] && eDef[defEl].balanced)) return 1;
      if (eDef[atkEl] && eDef[atkEl].beats === defEl) return game_config.elementBonus || 1.5;   // 克制
      if (eDef[defEl] && eDef[defEl].beats === atkEl) return game_config.elementPenalty || 0.65; // 被克
      return 1;
    }
    function randElement() { return ELEMENT_KEYS[Math.floor(Math.random() * ELEMENT_KEYS.length)]; }

    // ---- battle state ----
    const B = {
      running: false, t: 0, speedMul: 1, elapsed: 0,
      enemies: [], bullets: [], particles: [], floaters: [],
      heroes: [],            // live hero units {key,def,x,y,cd,lvl,buffLvl}
      reserve: [],           // candidate keys not yet deployed; may join on level-up
      kills: 0, score: 0, cash: 0,
      baseHp: 100, baseHpMax: 100,
      xp: 0, xpNeed: 12, lvl: 1,
      spawnTimer: 0, spawned: 0,
      // ---- wave system ----
      waves: [], waveIndex: 0, waveSpawned: 0, waveTarget: 0,
      waveResting: false, restTimer: 0, totalTarget: 0,
      _bossSpawnedThisWave: 0,    // 本波已刷出的 Boss 数 (用于限制 Boss 数量)
      _eliteSpawnedThisWave: 0,   // 本波已刷出的精英数
      combo: 0, comboTimer: 0, comboBest: 0,  // 连杀系统
      shake: 0,                   // 屏幕震动强度
      overdrive: 0,               // 全队过载(狂暴)计时
      energy: 0, energyMax: 100,  // 大招能量
      ultsUsed: 0,                // 释放大招次数(统计)
      summons: [],                // 召唤物(民兵/炮塔)
      fields: [],                 // 持续场地效果(雷域/圣域/雷暴云等)
      flash: 0,                   // 全屏闪白(大招演出)
      slowmo: 0,                  // 子弹时间(大招瞬间)
      shield: 0,                  // 护盾值(护盾大招)
      seenEnemies: {},            // 已出现过的怪物图鉴: element -> {element, spriteUrl, ti, name}
      lanes: [], laneTop: 78, laneBottom: 0,
      paused: false
    };
    let lastTime = 0;

    function layoutLanes() {
      const W = D.W, H = D.H, n = game_config.laneCount;
      B.lanes = [];
      const margin = W * 0.12, usable = W - margin * 2;
      for (let i = 0; i < n; i++) B.lanes.push(margin + (usable / (n - 1)) * i);
      B.laneBottom = H - 150;
      placeHeroes();
    }
    window.__layoutLanes = layoutLanes;

    function placeHeroes() {
      const W = D.W;
      const n = B.heroes.length || 1;
      const margin = W * 0.16, usable = W - margin * 2;
      B.heroes.forEach((h, i) => {
        h.x = n === 1 ? W / 2 : margin + (usable / (n - 1)) * i;
        h.y = B.laneBottom + 60;
      });
    }

    function startBattle() {
      const lv = curLevel();
      Object.assign(B, {
        running: true, t: 0, speedMul: 1, elapsed: 0,
        enemies: [], bullets: [], particles: [], floaters: [],
        kills: 0, score: 0, cash: 0,
        baseHp: game_config.baseHpStart, baseHpMax: game_config.baseHpStart,
        xp: 0, xpNeed: 12, lvl: 1,
        spawnTimer: 0, spawned: 0, paused: false,
        waveIndex: 0, waveSpawned: 0, waveResting: false, restTimer: 0,
        _bossSpawnedThisWave: 0, _eliteSpawnedThisWave: 0,
        combo: 0, comboTimer: 0, comboBest: 0, shake: 0, overdrive: 0, lifesteal: 0, zaps: [],
        energy: (game_config.ult && game_config.ult.startEnergy) || 30,
        energyMax: (game_config.ult && game_config.ult.energyMax) || 100,
        ultsUsed: 0, summons: [], fields: [], flash: 0, slowmo: 0, shield: 0,
        seenEnemies: {}
      });
      // build wave list (fallback to a single wave if config missing)
      B.waves = Array.isArray(lv.waves) && lv.waves.length ? lv.waves.slice() : [{ count: lv.target || 30 }];
      B.waveTarget = B.waves[0].count;
      B.totalTarget = B.waves.reduce((s, w) => s + (w.count || 0), 0);

      // 关卡启动：按本关允许的出战角色数(含主角，未配置=5，上限5)自动 trim 或补齐阵容。
      // (fitSquadToLevel/levelSquadCap 定义在 chunk 1，通过共享的 __GD(D) 访问)
      D.fitSquadToLevel(D.levelSquadCap(lv));

      // ALWAYS start with ONLY the leader on the field.
      let leaderKey = G.leader;
      if (!leaderKey || !heroDef(leaderKey)) leaderKey = (G.squad[0] || game_config.heroes[0].key);
      const ldef = heroDef(leaderKey);
      B.heroes = [makeHeroUnit(leaderKey)];

      // reserve pool = pre-selected candidates (squad) minus the leader; these may
      // randomly join the battle on level-ups via the 3-choose-1 card.
      B.reserve = [...new Set(G.squad.filter(k => k !== leaderKey && heroDef(k)))];

      // ===== 装备「防线耐久」加成：把出战阵容(主角+候补)各自装备的 hp 词条汇总，提高防线上限。
      // 主角全额计入，候补按 60% 计入(他们尚未登场)，鼓励为整队投资护甲类装备。
      if (window.__ECON && window.__ECON.effectiveStats) {
        let hpBonus = (window.__ECON.effectiveStats(leaderKey).hp) || 0;
        B.reserve.forEach(k => { hpBonus += Math.round((window.__ECON.effectiveStats(k).hp || 0) * 0.6); });
        if (hpBonus > 0) { B.baseHpMax += hpBonus; B.baseHp += hpBonus; }
      }

      layoutLanes();
      lastTime = performance.now();
      try { window.parent.postMessage({ type: 'gameStarted' }, '*'); } catch (e) {}

      // 开战前：先暂停战斗，播放主角/队员随机对话 (漫画框)，结束后再真正开打
      B.paused = true;
      playPreBattleBanter(beginCombat);
    }
    window.__startBattle = startBattle;

    // 真正开始刷怪 (对话结束后调用)
    function beginCombat() {
      if (G.screen !== 'battle') return;   // 玩家可能已退出
      removeOverlay();
      B.paused = false;
      bgm('battle');   // 进入战斗 → 切换战斗 BGM (Boss 波会自动切到 boss 曲)
      announceWave();
      lastTime = performance.now();
    }

    // ================= 开战前随机对话 (盗墓题材 · 一来一回 · 带头像) =================
    // 序列：领队开场重点台词(居中) → 一组随机「一来一回」对白(主角左、队友右轮流) → 收尾重点台词(居中)。
    // 每句都带说话者头像；所有台词都需要玩家点击一下才继续。
    function playPreBattleBanter(done) {
      const banter = (game_config.story && game_config.story.banter) || {};
      const openings = Array.isArray(banter.opening) ? banter.opening : [];
      const closings = Array.isArray(banter.closing) ? banter.closing : [];
      const dialogues = Array.isArray(banter.dialogues) ? banter.dialogues : [];
      const leaderKey = G.leader;
      // 选一名队友作为本场对话搭档：优先从已选候补里随机；没有候补则从全部已解锁角色里挑一个非主角的
      let mateKey = null;
      const reserveMates = (B.reserve || []).filter(k => k !== leaderKey && heroDef(k));
      if (reserveMates.length) mateKey = reserveMates[Math.floor(Math.random() * reserveMates.length)];
      if (!mateKey) {
        const others = game_config.heroes.filter(h => h.key !== leaderKey && G.unlocked[h.key]);
        if (others.length) mateKey = others[Math.floor(Math.random() * others.length)].key;
      }
      if (!mateKey) mateKey = leaderKey;
      const pick = arr => arr[Math.floor(Math.random() * arr.length)];
      const keyOf = role => (role === 'mate' ? mateKey : leaderKey);

      // 组装本次对话脚本：{ key(说话者), side('left'|'right'|'center'), txt }
      const script = [];
      if (openings.length) script.push({ key: leaderKey, side: 'center', txt: pick(openings) });
      if (dialogues.length) {
        const pair = pick(dialogues);
        pair.forEach(line => script.push({ key: keyOf(line.role), side: line.role === 'mate' ? 'right' : 'left', txt: line.txt }));
      }
      if (closings.length) script.push({ key: leaderKey, side: 'center', txt: pick(closings) });

      if (!script.length) { done && done(); return; }

      // 对话层 (盖在战斗画布上)
      removeOverlay();
      const layer = el('div', 'absolute inset-0 z-30');
      layer.style.background = 'rgba(0,0,0,.18)';   // 轻微压暗背景，突出对话

    // ---- enemies ----
    function enemyTheme(i) { return game_config.enemies[Math.min(i, game_config.enemies.length - 1)]; }
    const CURVE = game_config.curve || {};
    // 指数式难度曲线：stage(关卡序号 0-based) + wave(波序号) 双重复利成长
    function stageHpFactor() { return Math.pow(1 + (CURVE.stageHp || 0.26), G.lvlIndex); }
    function stageSpdFactor() { return Math.pow(1 + (CURVE.stageSpd || 0.07), G.lvlIndex); }
    function waveHpFactor() { return Math.pow(1 + (CURVE.waveHp || 0.16), B.waveIndex); }
    function waveSpdFactor() { return Math.pow(1 + (CURVE.waveSpd || 0.035), B.waveIndex); }
    function eliteChance() { return (CURVE.eliteChanceBase || 0.06) + G.lvlIndex * (CURVE.eliteChancePerStage || 0.025); }

    function spawnEnemy(isBoss, forceElite) {
      const c = curLevel();
      const wave = B.waves[B.waveIndex] || {};
      const lane = Math.floor(Math.random() * game_config.laneCount);
      let ti = 0; const roll = Math.random();
      if (B.waveIndex >= 1 && roll > .76) ti = 1;
      if (B.waveIndex >= 2 && roll > .88) ti = 2;
      if (G.lvlIndex >= 4 && roll > .82) ti = Math.min(2, ti + 1);
      const th = enemyTheme(ti);
      // 精英判定：本波强制 elite，或按概率随机刷出
      const isElite = !isBoss && (forceElite || Math.random() < eliteChance());
      // 全局难度曲线（困难模式额外放大敌人 HP / 速度）
      const hardHp = G.hardMode ? 1.8 : 1;
      const hardSpd = G.hardMode ? 1.25 : 1;
      const hpCurve = stageHpFactor() * waveHpFactor() * (wave.hpMul || 1) * hardHp;
      const spdCurve = stageSpdFactor() * waveSpdFactor() * (wave.speedMul || 1) * hardSpd;
      let hp = c.enemyHp * th.hpMul * hpCurve;
      if (isBoss) hp *= (CURVE.bossHpMul || 18);
      else if (isElite) hp *= (CURVE.eliteHpMul || 2.4);
      hp = Math.round(hp);
      const baseW = ti === 2 ? 40 : (ti === 1 ? 26 : 30), baseH = ti === 2 ? 56 : (ti === 1 ? 42 : 46);
      const element = randElement();
      const petEntry = th.usePet ? pickPetForElement(element, (Date.now() + B.enemies.length * 97) >>> 0) : null;
      // 形态：Boss 随波次进化(最后一波 boss = elder 最终形态)；杂兵随波次/关卡小幅成长
      const formRow = isBoss ? bossFormRow(B.waveIndex, B.waves.length) : Math.min(3, Math.floor((B.waveIndex + G.lvlIndex) / 2));
      // 出生点：在车道中心附近加随机水平抖动，避免所有怪物精确叠在同一列
      const Wnow = D.W;
      const jitter = (isBoss ? 0 : (Math.random() - 0.5) * Wnow * 0.16);
      let spawnX = B.lanes[lane] + jitter;
      spawnX = Math.max(Wnow * 0.08, Math.min(Wnow * 0.92, spawnX));
      const sizeMul = isElite ? 1.22 : 1;
      B.enemies.push({
        x: spawnX, y: B.laneTop - Math.random() * 30, lane, hp, hpMax: hp,
        speed: c.enemySpeed * th.spdMul * spdCurve * (isBoss ? .5 : 1),
        theme: th, ti, isBoss, isElite, element, formRow,
        dmgMul: isBoss ? (CURVE.bossDmgMul || 2.2) : (isElite ? (CURVE.eliteDmgMul || 1.6) : 1),
        spriteUrl: petEntry ? petEntry.imageSheetUrl : '',
        name: (isBoss ? pickBossName() : (isElite ? ('精英·' + th.name) : th.name)) + (isBoss ? ('·' + FORM_LABELS[formRow] + '态') : ''),
        w: (isBoss ? 70 : baseW) * (1 + formRow * 0.06) * sizeMul, h: (isBoss ? 96 : baseH) * (1 + formRow * 0.06) * sizeMul,
        slowT: 0, stunT: 0, burnT: 0, burnDmg: 0, shockT: 0, frozenT: 0, vuln: 0, wob: Math.random() * Math.PI * 2,
        eliteElement: isElite ? element : null
      });
      // 记入「已出现怪物图鉴」(按系别归类，记录首个出现的形象)
      if (!B.seenEnemies[element] || (B.seenEnemies[element] && !B.seenEnemies[element].spriteUrl && petEntry)) {
        B.seenEnemies[element] = {
          element,
          spriteUrl: petEntry ? petEntry.imageSheetUrl : (B.seenEnemies[element] ? B.seenEnemies[element].spriteUrl : ''),
          ti, formRow: 0
        };
      }
    }
    function pickBossName() { const arr = game_config.bossNames || ['首领']; return arr[Math.floor(Math.random() * arr.length)]; }

    // ---- AABB 分离：相邻怪物若重叠超过允许阈值，则沿最小穿透轴互相推开 ----
    // ALLOW_OVERLAP=0.2 表示允许两者「接触盒」最多 20% 的重叠；超出部分被推开。
    const ALLOW_OVERLAP = 0.2;
    function separateEnemies(sdt) {
      const list = B.enemies;
      const n = list.length;
      if (n < 2) return;
      const Wnow = D.W;
      // 接触盒≈绘制盒；配合 ALLOW_OVERLAP=20% 容差，使两者绘制盒最多重叠约 20%
      const PAD = 1.0;
      for (let i = 0; i < n; i++) {
        const a = list[i]; if (a.dead) continue;
        const aw = a.w * PAD, ah = a.h * PAD;
        for (let j = i + 1; j < n; j++) {
          const b = list[j]; if (b.dead) continue;
          const bw = b.w * PAD, bh = b.h * PAD;
          const dx = b.x - a.x, dy = b.y - a.y;
          // 允许 20% 重叠：把所需最小间距按 (1-ALLOW_OVERLAP) 缩小
          const minX = (aw + bw) / 2 * (1 - ALLOW_OVERLAP);
          const minY = (ah + bh) / 2 * (1 - ALLOW_OVERLAP);
          const ox = minX - Math.abs(dx);   // x 轴穿透量
          const oy = minY - Math.abs(dy);   // y 轴穿透量
          if (ox > 0 && oy > 0) {
            // 沿穿透量较小的轴分离 (最小平移向量)。Boss 更重，推动幅度更小。
            const aMass = a.isBoss ? 2.2 : 1, bMass = b.isBoss ? 2.2 : 1;
            const total = aMass + bMass;
            const aShare = bMass / total, bShare = aMass / total;
            if (ox < oy) {
              // 水平分离：左右推开，不影响前进
              const push = ox * (dx < 0 ? -1 : 1);
              a.x -= push * aShare; b.x += push * bShare;
            } else {
              // 垂直分离：只把「靠后(y 较小)」的那只往后顶，绝不把「靠前(y 较大)」的拉回去，
              // 否则领先的怪(尤其 Boss)会被后面堆积的小怪不断顶停，导致到一定距离就不再前进。
              const rear = a.y <= b.y ? a : b;     // 靠后(更小 y)
              rear.y -= oy;                        // 仅后者后退
            }
            // 夹在屏幕内，且不要被推回出生线之上太多
            a.x = Math.max(Wnow * 0.06, Math.min(Wnow * 0.94, a.x));
            b.x = Math.max(Wnow * 0.06, Math.min(Wnow * 0.94, b.x));
            if (a.y < B.laneTop - 40) a.y = B.laneTop - 40;
            if (b.y < B.laneTop - 40) b.y = B.laneTop - 40;
          }
        }
      }
    }

    // ---- shooting (each hero fires its own skill) ----
    function dmgBuff() { // takashi passive in squad → team dmg up；过载状态额外 +60%
      const t = B.heroes.find(h => h.key === 'takashi');
      let mul = t ? (1 + 0.15 * t.lvl) : 1;
      if (B.overdrive > 0) mul *= 1.6;
      return mul;
    }
    function rateBuff() { // 过载状态全队射速 +50%
      return B.overdrive > 0 ? 0.66 : 1;
    }
    function nearestEnemy(x, y) {
      let best = null, bd = Infinity;
      for (const e of B.enemies) { if (e.dead) continue; const d = Math.hypot(e.x - x, e.y - y); if (d < bd) { bd = d; best = e; } }
      return best;
    }
    // 在攻击半径范围内寻找最近敌人 (超出半径不锁定)
    function nearestEnemyInRange(x, y, range) {
      let best = null, bd = range * range;
      for (const e of B.enemies) {
        if (e.dead) continue;
        const dx = e.x - x, dy = e.y - y, d = dx * dx + dy * dy;
        if (d < bd) { bd = d; best = e; }
      }
      return best;
    }
    // 技能攻击半径：优先用 skill.range，否则按类型给一个合理默认值；随等级小幅增长
    function skillRange(h) {
      const sk = h.def.skill;
      let base = sk.range;
      if (base == null) {
        base = ({ support: 200, rapid: 300, normal: 320, nail: 300, explode: 330, flame: 300, chain: 340, pierce: 420 })[sk.type] || 320;
      }
      return base * (1 + (h.lvl - 1) * 0.04);   // 每级 +4% 射程
    }
    function heroFire(dt) {
      const buff = dmgBuff();
      for (const h of B.heroes) {
        const sk = h.def.skill;
        const range = skillRange(h);
        if (sk.type === 'support') { // healing + slow aura
          h.cdMax = sk.fireRate;
          h.cd -= dt;
          if (h.cd <= 0) { h.cd = sk.fireRate; h.bob = 1; B.baseHp = Math.min(B.baseHpMax, B.baseHp + (sk.heal || 4) * h.lvl); pulse(h.x, h.y, h.color); }
          continue;
        }
        h.cd -= dt;
        const rateGear = 1 + ((h.eff ? h.eff.rate : 0) || 0) / 100;   // 装备射速加成(%)
        const rate = sk.fireRate / (1 + (h.lvl - 1) * 0.12) / rateGear * rateBuff();
        h.cdMax = rate;
        if (h.cd <= 0 && B.enemies.length) {
          const tgt = nearestEnemyInRange(h.x, h.y, range);
          if (tgt) { fire(h, tgt, buff); h.cd = rate; h.bob = 1; }
        }
      }
    }
    function fire(h, tgt, buff) {
      const sk = h.def.skill;
      const phys = (h.eff ? h.eff.phys : h.def.stats.phys) || 0;
      const dmg = sk.dmg * (1 + (h.lvl - 1) * 0.25) * buff * (1 + phys / 100);
      h.muzzle = 0.08;
      sfx('shoot', sk.type);
      const elColor = (game_config.elements[h.element] && game_config.elements[h.element].color) || h.color;
      // 多重射击：发射 multishot 发，带角度扩散
      const shots = sk.multishot || 1;
      const baseAng = Math.atan2(tgt.y - h.y, tgt.x - h.x);
      const spread = sk.spread || (shots > 1 ? 0.22 : 0);
      for (let s = 0; s < shots; s++) {
        const off = shots > 1 ? (s - (shots - 1) / 2) * spread : 0;
        const ang = baseAng + off;
        B.bullets.push({
          x: h.x, y: h.y - 26, vx: Math.cos(ang) * sk.speed, vy: Math.sin(ang) * sk.speed,
          dmg, type: sk.type, radius: sk.radius || 0, pierce: sk.pierce || 0, slow: sk.slow || 0,
          burn: sk.burn || 0, burnDmg: sk.burnDmg || 0, chain: sk.chain || 0, shock: sk.shock || 0,
          color: elColor, element: h.element, crit: (h.eff ? h.eff.crit : h.def.stats.crit) || 0,
          r: (sk.type === 'explode' || sk.type === 'flame') ? 7 : (sk.type === 'nail' || sk.type === 'chain') ? 6 : 4,
          life: 2.5, hits: []
        });
      }
    }
    // 连锁闪电：从命中点向附近敌人连跳
    function chainLightning(x, y, dmg, jumps, element, crit, hitSet) {
      let cx = x, cy = y, remaining = jumps, dealt = dmg;
      const seen = hitSet || new Set();
      while (remaining > 0) {
        let best = null, bd = 140 * 140;
        for (const e of B.enemies) {
          if (e.dead || seen.has(e)) continue;
          const d = (e.x - cx) * (e.x - cx) + (e.y - cy) * (e.y - cy);
          if (d < bd) { bd = d; best = e; }
        }
        if (!best) break;
        seen.add(best);
        // 闪电视觉
        B.zaps = B.zaps || [];
        B.zaps.push({ x1: cx, y1: cy, x2: best.x, y2: best.y, life: 0.18, color: '#bdf0ff' });
        hurt(best, dealt, element, crit);
        best.shockT = Math.max(best.shockT, 1.4);
        cx = best.x; cy = best.y; dealt *= 0.78; remaining--;
      }
    }
    function pulse(x, y, color) {
      for (let i = 0; i < 8; i++) { const a = Math.random() * Math.PI * 2; B.particles.push({ x, y, vx: Math.cos(a) * 60, vy: Math.sin(a) * 60, life: .4, max: .4, color, r: 2 }); }
    }
    function explode(x, y, radius, dmg, color, slow, stun, element, crit) {
      sfx('explosion', radius >= 60);
      for (const e of B.enemies) {
        if (e.dead) continue;
        if (Math.hypot(e.x - x, e.y - y) <= radius) { hurt(e, dmg, element, crit); if (slow) e.slowT = Math.max(e.slowT, 1.6); if (stun) e.stunT = Math.max(e.stunT, 1.0); }
      }
      for (let i = 0; i < 14; i++) { const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 180; B.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: .5, max: .5, color, r: 2 + Math.random() * 3 }); }
    }
    function hurt(e, dmg, element, crit) {
      // element counter + crit roll
      const mul = elementMul(element, e.element);
      let isCrit = false;
      if (crit && Math.random() * 100 < crit) { dmg *= 1.6; isCrit = true; sfx('crit'); }
      dmg *= mul;
      // 脆弱(冰封)：受到的伤害放大
      if (e.vuln && e.frozenT > 0) dmg *= e.vuln;
      const eff = mul > 1.05 ? '克' : (mul < 0.95 ? '抗' : '');
      return hurtRaw(e, dmg, eff, isCrit);
    }
    function hurtRaw(e, dmg, eff, isCrit) {
      e.hp -= dmg;
      // 灼烧 DoT 伤害较小，跳字精简(避免刷屏)
      if (eff === '燃') {
        if (dmg >= 1 && Math.random() < 0.5) B.floaters.push({ x: e.x + (Math.random() * 12 - 6), y: e.y - 8, txt: Math.round(dmg) + '🔥', life: .5, color: '#ff8a2a' });
        if (e.hp <= 0 && !e.dead) killEnemy(e);
        return;
      }
      const col = isCrit ? '#ffd24a' : (eff === '克' ? '#7CFC00' : (eff === '抗' ? '#9aa' : '#fff'));
      const txt = Math.round(dmg) + (isCrit ? '!' : '') + (eff ? (' ' + eff) : '');
      B.floaters.push({ x: e.x + (Math.random() * 16 - 8), y: e.y - 10, txt, life: .7, color: col });
      gainEnergy((game_config.ult && game_config.ult.gainPerHit) || 0.4);
      if (e.hp <= 0 && !e.dead) killEnemy(e);
    }
    // 大招能量积攒
    function gainEnergy(v) {
      if (!B.running) return;
      const was = B.energy;
      B.energy = Math.min(B.energyMax, B.energy + v);
      // 首次充满 → 提示玩家可释放大招
      if (was < B.energyMax && B.energy >= B.energyMax) {
        const ld = leaderUnit();
        if (ld && ld.def && ld.def.ult) {
          B.floaters.push({ x: ultBtnGeo().cx, y: ultBtnGeo().cy - 50, txt: '大招就绪!', life: 1.4, big: true, color: '#ffd24a' });
          B.shake = Math.max(B.shake, 4); sfx('ultReady');

    }
    // 统一击杀结算 (连杀/分数/奖励/粒子)
    function killEnemy(e) {
      {
        e.dead = true; B.kills++;
        sfx(e.isBoss ? 'bossKill' : (e.isElite ? 'eliteKill' : 'kill'));
        // ---- 连杀系统：在窗口内连续击杀累计 combo，提供分数与击杀奖励加成 ----
        B.combo++; B.comboTimer = 2.2; if (B.combo > B.comboBest) B.comboBest = B.combo;
        const comboMul = 1 + Math.min(2, B.combo * 0.04);  // 最高 +200% 分数
        const bountyMul = 1 + G.lvlIndex * ((game_config.curve && game_config.curve.bountyCurve) || 0.12);
        const baseScore = e.isBoss ? 200 : (e.isElite ? 60 : (e.ti === 2 ? 30 : 10));
        const baseCash = e.isBoss ? 120 : (e.isElite ? 28 : 8);
        B.score += Math.round(baseScore * comboMul);
        B.cash += Math.round(baseCash * bountyMul);
        if (B.lifesteal) B.baseHp = Math.min(B.baseHpMax, B.baseHp + B.lifesteal * (e.isBoss ? 5 : 1));
        // 大招能量：击杀按目标类型积攒
        const U = game_config.ult || {};
        gainEnergy(e.isBoss ? (U.gainPerBoss || 40) : (e.isElite ? (U.gainPerElite || 14) : (U.gainPerKill || 6)));
        gainXp(e.isBoss ? 32 : (e.isElite ? 14 : 6));
        // 连杀里程碑提示 + 过载触发
        if (B.combo === 10 || B.combo === 25 || B.combo === 50 || B.combo === 100) {
          B.floaters.push({ x: D.W / 2, y: B.laneTop + 110, txt: B.combo + ' 连杀!', life: 1.3, big: true, color: '#ffd24a' });
          B.shake = Math.max(B.shake, 6); sfx('combo', B.combo);
          if (B.combo >= 25) B.overdrive = Math.max(B.overdrive, 4);  // 25+连杀触发全队过载
        }
        // 击杀爆裂粒子
        const burst = e.isBoss ? 30 : (e.isElite ? 18 : 10);
        const col = e.isBoss ? '#ff5a3c' : (e.isElite ? elColorOf(e.element) : '#8b2b1a');
        for (let i = 0; i < burst; i++) { const a = Math.random() * Math.PI * 2, sp = 40 + Math.random() * 180; B.particles.push({ x: e.x, y: e.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: .6, max: .6, color: col, r: 2 + Math.random() * 3 }); }
        if (e.isBoss) { B.shake = Math.max(B.shake, 16); ringBlast(e.x, e.y, col); }
