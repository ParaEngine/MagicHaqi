    }
    // 击杀冲击波环 (Boss/大招用)
    function ringBlast(x, y, color) {
      for (let i = 0; i < 28; i++) { const a = (i / 28) * Math.PI * 2; B.particles.push({ x, y, vx: Math.cos(a) * 220, vy: Math.sin(a) * 220, life: .5, max: .5, color, r: 3, grav: 0 }); }
    }

    // ---- in-battle leveling: temporary skill boost choice ----
    function gainXp(v) {
      B.xp += v;
      // 升级曲线：前期几张卡快速到手（需求增长平缓），后期逐渐拉开，保证尽快收卡。
      // xpNeed: 12 → ~20 → ~30 → ... 前三张卡间隔明显变短
      if (B.xp >= B.xpNeed) {
        B.xp -= B.xpNeed; B.lvl++;
        const grow = B.lvl <= 3 ? 1.18 : 1.26;   // 前期增长更缓
        B.xpNeed = Math.round(B.xpNeed * grow + 8);
        openSkillSelect();
      }
    }
    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

    function openSkillSelect() {
      B.paused = true;
      sfx('levelup');
      // Build a 3-choose-1: each option is either RECRUIT (a candidate joins) or
      // BOOST (an already-deployed hero levels up). Recruits are weighted so new
      // members appear, but boosts keep showing once the squad is full.
      const choices = [];

      // candidate recruit options (not yet deployed)
      const recruitable = shuffle(B.reserve.slice());
      // deployed-hero boost options
      const boostable = shuffle(B.heroes.slice());

      // Aim for a mix: if there are recruits, offer 1 (sometimes 2) recruit cards.
      const wantRecruits = recruitable.length ? (recruitable.length >= 2 && Math.random() < 0.4 ? 2 : 1) : 0;
      for (let i = 0; i < wantRecruits && recruitable.length; i++) {
        choices.push({ kind: 'recruit', key: recruitable.shift() });
      }
      // fill the rest with boosts of deployed heroes
      let bi = 0;
      while (choices.length < 3 && boostable.length) {
        choices.push({ kind: 'boost', hero: boostable[bi % boostable.length] });
        bi++;
        if (bi >= boostable.length && choices.length < 3) {
          // allow repeats of distinct heroes only once; break to generic if exhausted
          if (bi >= boostable.length) break;
        }
      }
      // de-dup boosts (same hero appearing twice) by replacing with generic buff
      const generic = shuffle([
        { kind: 'dmg', label: '火力强化', desc: '全队物理伤害 +18%', icon: '🔥' },
        { kind: 'rate', label: '快速装填', desc: '全队射速等效 +0.6级', icon: '⚡' },
        { kind: 'heal', label: '紧急补给', desc: '立即修复防线 +30', icon: '🩹' },
        { kind: 'maxhp', label: '加固防线', desc: '防线耐久上限 +25 并回满该量', icon: '🛡️' },
        { kind: 'crit', label: '精准瞄准', desc: '全队暴击率 +8%', icon: '🎯' },
        { kind: 'overdrive', label: '战意爆发', desc: '立即进入过载狂暴 5 秒', icon: '💢' },
        { kind: 'element', label: '元素淬炼', desc: '克制伤害额外 +25%', icon: '🌈' },
        { kind: 'lifesteal', label: '应急医疗', desc: '此后击杀回复防线 +1', icon: '➕' }
      ]);
      const seen = new Set();
      for (let i = 0; i < choices.length; i++) {
        const c = choices[i];
        if (c.kind === 'boost') {
          if (seen.has(c.hero.key)) choices[i] = generic.shift() || { kind: 'dmg', label: '火力强化', desc: '全队伤害 +15%', icon: '🔥' };
          else seen.add(c.hero.key);
        }
      }
      // pad to 3 with generic buffs
      while (choices.length < 3) choices.push(generic.shift() || { kind: 'dmg', label: '火力强化', desc: '全队伤害 +15%', icon: '🔥' });

      renderSkillOverlay(choices.slice(0, 3));
    }

    function deployReserve(key) {
      if (B.heroes.find(h => h.key === key)) return;
      const def = heroDef(key);
      if (!def) return;
      const unit = makeHeroUnit(key);
      B.heroes.push(unit);
      B.reserve = B.reserve.filter(k => k !== key);
      placeHeroes();
      // little flourish text
      B.floaters.push({ x: D.W / 2, y: B.laneBottom + 30, txt: def.name + ' 登场!', life: 1.1, color: def.color });
      sfx('debut');
      // 首次登场说一句话 (头顶冒泡，不暂停游戏)
      showDebutLine(unit, def);
    }

    // 登场台词：在该角色头顶弹出一个对话框，4.2s 后自动消失，不阻塞战斗 (加宽，一行可容纳 ≥10 字)
    function showDebutLine(unit, def) {
      const banter = (game_config.story && game_config.story.banter) || {};
      const lines = Array.isArray(banter.debut) ? banter.debut : [];
      if (!lines.length) return;
      const txt = lines[Math.floor(Math.random() * lines.length)];
      const bub = el('div', 'debut-bubble');
      bub.innerHTML = `<div class="debut-name" style="color:${def.color || '#7a4a10'};">${def.name}</div>${txt}`;
      // 头顶上方定位 (canvas 与 root 同坐标系)；水平夹限避免气泡超出屏幕两侧
      bub.style.left = (unit.x || D.W / 2) + 'px';
      bub.style.top = Math.max(70, (unit.y || B.laneBottom) - 96) + 'px';
      root.appendChild(bub);
      // 气泡为 translateX(-50%) 居中，按实际宽度把 left 夹在 [half, W-half] 内，不超出画面
      requestAnimationFrame(() => {
        if (!bub.parentNode) return;
        const half = bub.offsetWidth / 2 + 6;
        const lx = Math.max(half, Math.min(D.W - half, unit.x || D.W / 2));
        bub.style.left = lx + 'px';
      });
      setTimeout(() => { if (bub.parentNode) bub.parentNode.removeChild(bub); }, 4200);
    }

    function applyChoice(c) {
      sfx('pickCard');
      if (c.kind === 'recruit') { deployReserve(c.key); }
      else if (c.kind === 'boost') {
        const before = heroFormRow(c.hero.lvl);
        c.hero.lvl++;
        const after = heroFormRow(c.hero.lvl);
        if (after > before) {  // 跨过形态阈值 → 进化特效
          const isFinal = after >= 3;
          sfx('evolve');
          B.floaters.push({ x: c.hero.x, y: c.hero.y - 40, txt: c.hero.def.name + ' 进化为 ' + FORM_LABELS[after] + (isFinal ? '·最终形态!' : '态!'), life: 1.5, big: true, color: isFinal ? '#ffd24a' : '#7CFC00' });
          for (let i = 0; i < 24; i++) { const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 160; B.particles.push({ x: c.hero.x, y: c.hero.y - 6, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: .7, max: .7, color: elColorOf(c.hero.element), r: 2 + Math.random() * 3 }); }
        }
      }
      // 注意：临时增益只改 hero 单位的 eff 快照，绝不污染共享的 game_config.def.stats
      else if (c.kind === 'dmg') B.heroes.forEach(h => { if (h.eff) h.eff.phys += 18; });
      else if (c.kind === 'rate') B.heroes.forEach(h => h.lvl += 0.6);
      else if (c.kind === 'heal') B.baseHp = Math.min(B.baseHpMax, B.baseHp + 30);
      else if (c.kind === 'maxhp') { B.baseHpMax += 25; B.baseHp = Math.min(B.baseHpMax, B.baseHp + 25); }
      else if (c.kind === 'crit') B.heroes.forEach(h => { if (h.eff) h.eff.crit += 8; });
      else if (c.kind === 'overdrive') B.overdrive = Math.max(B.overdrive, 5);
      else if (c.kind === 'element') game_config.elementBonus = (game_config.elementBonus || 1.75) + 0.25;
      else if (c.kind === 'lifesteal') B.lifesteal = (B.lifesteal || 0) + 1;
      removeOverlay(); B.paused = false; lastTime = performance.now();
    }

    let overlayEl = null;
    function removeOverlay() { if (overlayEl) { overlayEl.remove(); overlayEl = null; } }
    window.__clearBattleOverlay = removeOverlay;
    window.__stopBattle = function () { B.running = false; B.paused = false; };
    function renderSkillOverlay(choices) {
      removeOverlay();
      const wrap = el('div', 'absolute inset-0 flex flex-col items-center justify-center z-30');
      wrap.style.background = 'rgba(10,8,6,.55)'; wrap.style.backdropFilter = 'blur(2px)';
      const banner = `<div class="relative mb-5 px-10 py-2 text-2xl font-black tracking-widest"
        style="background:linear-gradient(90deg,transparent,#5a3210,#a85a17,#5a3210,transparent);color:#ffe7c2;text-shadow:0 2px 4px #000;border-top:2px solid #d99a3a;border-bottom:2px solid #d99a3a;">技能选择</div>`;
      const cards = choices.map((c, i) => {
        let color, name, skillIco, skillName, skillDesc, tag, spriteUrl = '', isChar = false, isNew = false;
        if (c.kind === 'recruit') {
          const hd = heroDef(c.key);
          isChar = true; spriteUrl = hd.spriteUrl || '';
          color = hd.color; name = hd.name;
          skillIco = skillIcon(hd.skill.type); skillName = hd.skill.name; skillDesc = hd.skill.desc;
          // 尚未登场的新角色 → NEW 角标
          isNew = !B.heroes.find(u => u.key === c.key);
          tag = `<div class="absolute -left-1 top-3 px-3 py-[2px] text-[11px] font-bold text-white skew-x-[-8deg]" style="background:#e08a17;">登场</div>`;
        } else if (c.kind === 'boost') {
          isChar = true; spriteUrl = c.hero.spriteUrl || c.hero.def.spriteUrl || '';
          color = c.hero.color; name = c.hero.def.name;
          skillIco = skillIcon(c.hero.def.skill.type); skillName = c.hero.def.skill.name; skillDesc = c.hero.def.skill.desc;
          tag = `<div class="absolute right-2 top-2 text-[11px] font-bold px-2 py-[1px] rounded bg-black/60 text-amber-300">Lv.${Math.floor(c.hero.lvl)}→${Math.floor(c.hero.lvl) + 1}</div>`;
        } else {
          color = '#e08a17'; name = c.label;
          skillIco = c.icon; skillName = c.label; skillDesc = c.desc;
          tag = `<div class="absolute -left-1 top-3 px-3 py-[2px] text-[11px] font-bold text-white skew-x-[-8deg]" style="background:#e08a17;">强化</div>`;
        }
        // 顶部形象：角色卡用宠物 sprite 占位；强化卡用大 emoji 图标
        const artInner = isChar
          ? `<canvas class="cardArt" data-sprite="${spriteUrl}" width="120" height="120" style="width:72px;height:72px;image-rendering:auto;"></canvas>
             <div class="cardArtFallback w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-lg" style="background:radial-gradient(circle at 35% 30%,#fff,${color});">${skillIco}</div>`
          : `<div class="w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-lg" style="background:radial-gradient(circle at 35% 30%,#fff,${color});">${skillIco}</div>`;
        const newBadge = isNew
          ? `<div class="absolute right-1 top-1 z-10 px-[6px] py-[1px] rounded-full text-[10px] font-black text-white" style="background:linear-gradient(#ff4d4d,#c0142d);box-shadow:0 0 8px #ff4d4d99;">NEW</div>`
          : '';
        return `<div class="skill-card relative w-[30%] max-w-[150px] mx-1 cursor-pointer rounded-md overflow-hidden border-2 transition-transform hover:scale-105 active:scale-95"
            data-i="${i}" style="background:#efe9df;border-color:${color};animation-delay:${i * 0.07}s;">
            ${tag}${newBadge}
            <div class="relative h-24 flex items-center justify-center" style="background:linear-gradient(135deg,${color}33,${color}11);">
              ${artInner}
            </div>
            <div class="px-2 py-1 text-center" style="background:linear-gradient(#3a2418,#241208);"><div class="text-amber-200 font-bold text-sm truncate">${name}</div></div>
            <div class="px-2 py-2 min-h-[64px]" style="background:#efe9df;">
              <div class="flex items-center gap-1 mb-1">
                <span class="text-base leading-none">${skillIco}</span>
                <span class="text-[12px] font-bold leading-tight" style="color:${color};">${skillName}</span>
              </div>
              <div class="text-[10px] leading-tight text-stone-700">${skillDesc}</div>
            </div>
          </div>`;
      }).join('');
      wrap.innerHTML = `${banner}<div class="flex justify-center items-stretch w-full px-2">${cards}</div>
        <!-- 查看它们：展开已出现怪物图鉴 -->
        <button id="bestiaryToggle" class="mt-4 text-[13px] font-bold text-amber-300 underline decoration-dotted underline-offset-4 active:scale-95 transition-transform"
          style="text-shadow:0 1px 3px #000;">📖 查看它们 ▾</button>
        <div id="bestiaryPanel" class="hidden w-full px-3 mt-2 max-h-[34%] overflow-y-auto scrollx"></div>`;
      root.appendChild(wrap); overlayEl = wrap;
      // ---- 查看它们：内联展示已出现过的怪物 icon + 系别能力 ----
      const bToggle = wrap.querySelector('#bestiaryToggle');
      const bPanel = wrap.querySelector('#bestiaryPanel');
      let bestiaryOpen = false;
      function renderBestiary() {
        const list = Object.values(B.seenEnemies || {});
        if (!list.length) {
          bPanel.innerHTML = `<div class="text-center text-[12px] text-stone-300 py-3" style="text-shadow:0 1px 2px #000;">尚未遭遇任何怪物</div>`;
          return;
        }
        // 按系别克制环顺序排序，便于阅读
        const order = ['fire','ice','thunder','dark','life','nature'];
        list.sort((a,b)=> order.indexOf(a.element) - order.indexOf(b.element));
        bPanel.innerHTML = list.map((m,i)=>{
          const col = elColorOf(m.element);
          return `<div class="flex items-center gap-3 rounded-lg px-3 py-2 mb-2" style="background:rgba(20,14,10,.82);border:1px solid ${col}66;">
              <div class="relative flex-none rounded-full overflow-hidden" style="width:46px;height:46px;background:radial-gradient(circle at 40% 30%,${col}55,#120c08);border:2px solid ${col};">
                <canvas class="bestiaryArt" data-sprite="${m.spriteUrl}" data-ti="${m.ti}" data-form="${m.formRow||0}" width="92" height="92" style="width:46px;height:46px;image-rendering:auto;"></canvas>
                <div class="bestiaryFallback absolute inset-0 flex items-center justify-center text-2xl">${elEmojiOf(m.element)}</div>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                  <span class="text-base leading-none">${elEmojiOf(m.element)}</span>
                  <span class="text-[13px] font-bold" style="color:${col};">${elNameOf(m.element)}系凶物</span>
                </div>
                <div class="text-[11px] text-stone-200 mt-[2px] leading-tight">${elAbilityText(m.element)}</div>
              </div>
            </div>`;
        }).join('');
        // 绘制怪物 sprite (失败则保留 emoji 占位)
        bPanel.querySelectorAll('.bestiaryArt').forEach(cv => {
          const url = cv.getAttribute('data-sprite');
          const form = +cv.getAttribute('data-form') || 0;
          const fb = cv.parentElement.querySelector('.bestiaryFallback');
          if (!url) { cv.style.display = 'none'; return; }
          const cc = cv.getContext('2d');
          const draw = () => { cc.clearRect(0,0,cv.width,cv.height); return drawSheetCell(cc, url, form, 0, 4, 4, 84, 84); };
          if (draw()) { if (fb) fb.style.display = 'none'; }
          else { let n=0; const iv=setInterval(()=>{ if(draw()){ if(fb) fb.style.display='none'; clearInterval(iv);} else if(++n>20) clearInterval(iv); },120); }
        });
      }
      bToggle.addEventListener('click', () => {
        bestiaryOpen = !bestiaryOpen;
        bPanel.classList.toggle('hidden', !bestiaryOpen);
        bToggle.innerHTML = bestiaryOpen ? '📖 查看它们 ▴' : '📖 查看它们 ▾';
        if (bestiaryOpen) renderBestiary();
      });
      // draw character pet sprites (image占位) for character cards
      wrap.querySelectorAll('.cardArt').forEach(cv => {
        const url = cv.getAttribute('data-sprite');
        const fallback = cv.parentElement.querySelector('.cardArtFallback');
        if (!url) { cv.style.display = 'none'; return; }
        const cc = cv.getContext('2d');
        const draw = () => { cc.clearRect(0, 0, cv.width, cv.height); return drawSheetCell(cc, url, 0, 1, 6, 6, 108, 108); }; // 形态一, happy
        const ok = draw();
        if (ok) { if (fallback) fallback.style.display = 'none'; }
        else { let n = 0; const iv = setInterval(() => { if (draw()) { if (fallback) fallback.style.display = 'none'; clearInterval(iv); } else if (++n > 20) clearInterval(iv); }, 120); }
      });
      wrap.querySelectorAll('[data-i]').forEach(node => node.addEventListener('click', () => applyChoice(choices[+node.getAttribute('data-i')])));
    }
    function skillIcon(type) { return ({ explode: '💥', nail: '❄️', pierce: '🎯', rapid: '🔫', support: '💉', flame: '🔥', chain: '⚡', normal: '🔫' })[type] || '✨'; }

    // ---- input: 角色只能点击(显示技能范围)，不可拖动；tap pause/speed/ult ----
    function clientXY(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * (D.W / r.width), y: (e.clientY - r.top) * (D.H / r.height) }; }
    function hitHero(e) {
      const p = clientXY(e);
      let best = null, bd = 34 * 34;
      for (const h of B.heroes) { const dx = p.x - h.x, dy = p.y - (h.y - 6), d = dx * dx + dy * dy; if (d < bd) { bd = d; best = h; } }
      return best;
    }
    canvas.addEventListener('pointerdown', e => {
      // 背景音乐开关即使暂停也可点（不依赖 B.running/paused）
      if (hitMusic(e)) { const A = window.__AUDIO; if (A && A.setMusicOn && A.isMusicOn) A.setMusicOn(!A.isMusicOn()); return; }
      if (!B.running || B.paused) return;
      if (hitPause(e)) { B.paused = true; renderPause(); return; }
      if (hitSpeed(e)) { B.speedMul = B.speedMul === 1 ? 1.5 : 1; return; }
      if (hitUlt(e)) { castUltimate(); return; }
      // 角色禁止拖动：按住某角色才显示该角色的攻击半径；按空白处不显示。
      const hh = hitHero(e);
      B.selectedHero = hh || null;
    });
    // 抬起时隐藏技能范围 (无拖动)
    window.addEventListener('pointerup', () => { B.selectedHero = null; });
    window.addEventListener('pointercancel', () => { B.selectedHero = null; });
    function hitPause(e) { const r = canvas.getBoundingClientRect(); const x = e.clientX - r.left, y = e.clientY - r.top; return x > 6 && x < 70 && y > 6 && y < 40; }
    function hitSpeed(e) { const r = canvas.getBoundingClientRect(); const x = e.clientX - r.left, y = e.clientY - r.top; return x > D.W - 70 && x < D.W - 6 && y > 6 && y < 40; }
    // 背景音乐开关按钮几何 (右上角速度按钮下方；下移避开黄色经验条)
    function musicBtnGeo() { return { cx: D.W - 35, cy: 80, r: 15 }; }
    function hitMusic(e) { const r = canvas.getBoundingClientRect(); const g = musicBtnGeo(); const x = e.clientX - r.left, y = e.clientY - r.top; return Math.hypot(x - g.cx, y - g.cy) <= g.r + 6; }
    // 大招按钮在右下角(圆形)
    function ultBtnGeo() { return { cx: D.W - 52, cy: D.laneBottom + 56, r: 38 }; }
    function hitUlt(e) { const r = canvas.getBoundingClientRect(); const g = ultBtnGeo(); const x = e.clientX - r.left, y = e.clientY - r.top; return Math.hypot(x - g.cx, y - g.cy) <= g.r + 6; }

    function renderPause() {
      removeOverlay();
      const wrap = el('div', 'absolute inset-0 flex flex-col items-center justify-center z-30');
      wrap.style.background = 'rgba(8,6,5,.7)';
      wrap.innerHTML = `<div class="text-3xl font-black text-amber-200 mb-6">暂停中</div>
        <div class="text-[12px] text-stone-300 mb-6 text-center px-8">退出战斗将判定为<span style="color:#ff7b6a;font-weight:900;">失败</span>，确定要撤退吗？</div>
        <div class="flex gap-3">
          <button id="quitBtn" class="px-7 py-2 rounded-full font-bold text-white" style="background:linear-gradient(#5a93d6,#2a6ab0);box-shadow:0 3px 0 #1a447a;">退出战斗</button>
          <button id="resumeBtn" class="px-7 py-2 rounded-full font-bold text-white" style="background:linear-gradient(#ffb733,#e07b0a);box-shadow:0 3px 0 #7a2408;">继续战斗</button>
        </div>`;
      root.appendChild(wrap); overlayEl = wrap;
      wrap.querySelector('#resumeBtn').addEventListener('click', () => { sfx('click'); B.paused = false; removeOverlay(); lastTime = performance.now(); });
      // 退出战斗 = 判定失败：结算为 DEFEAT 并展示结算界面
      wrap.querySelector('#quitBtn').addEventListener('click', () => { sfx('click'); removeOverlay(); B.paused = false; endBattle(false); });
    }

    // ================= ULTIMATE / 大招系统 =================
    function leaderUnit() { return B.heroes.find(h => h.key === G.leader) || B.heroes[0]; }
    function castUltimate() {
      if (!B.running || B.paused) return;
      if (B.energy < B.energyMax) { B.floaters.push({ x: D.W / 2, y: B.laneBottom - 40, txt: '能量不足', life: .8, color: '#ffcf66' }); sfx('noEnergy'); return; }
      const ld = leaderUnit(); if (!ld) return;
      const ult = ld.def.ult;
      if (!ult) { B.floaters.push({ x: D.W / 2, y: B.laneBottom - 40, txt: '该角色暂无大招', life: .9, color: '#ffcf66' }); sfx('noEnergy'); return; }
      B.energy = 0; B.ultsUsed++;
      sfx('ultCast');
      // 通用大招演出：全屏闪白 + 震动 + 子弹时间 + 大字
      B.flash = 0.5; B.shake = Math.max(B.shake, 16); B.slowmo = 0.5;
      B.floaters.push({ x: D.W / 2, y: D.H * 0.4, txt: '★ ' + ult.name + ' ★', life: 1.6, big: true, color: ld.color });
      const allEnemies = () => B.enemies.filter(e => !e.dead);
      const el = ld.element, crit = (ld.eff ? ld.eff.crit : ld.def.stats.crit) || 0, phys = 1 + ((ld.eff ? ld.eff.phys : ld.def.stats.phys) || 0) / 100;
      const D2 = v => v * phys * (1 + (ld.lvl - 1) * 0.12);  // 大招随领队等级成长
      switch (ult.type) {
        case 'meteor': { // 火雨：随机落点爆炸+点燃
          for (let i = 0; i < (ult.count || 12); i++) {
            const mx = D.W * (0.1 + Math.random() * 0.8), my = B.laneTop + Math.random() * (B.laneBottom - B.laneTop);
            setTimeout(() => { if (!B.running) return; explode(mx, my, 60, D2(ult.dmg), '#ff6b35', false, false, 'fire', crit); meteorFx(mx, my); for (const t of allEnemies()) { if (Math.hypot(t.x - mx, t.y - my) <= 60) { t.burnT = Math.max(t.burnT, ult.burn || 3); t.burnDmg = Math.max(t.burnDmg, ult.burnDmg || 10); } } }, i * 70);
          }
          break; }
        case 'field': { // 死亡罗网：全场雷区，持续麻痹+伤害
          B.fields.push({ kind: 'field', t: ult.dur || 4, dmg: D2(ult.dmg), element: el, color: '#9b6bff', tick: 0, stun: !!ult.stun });
          break; }
        case 'freezeAll': { // 冰封天陆：全体冻结+脆弱
          for (const t of allEnemies()) { t.stunT = Math.max(t.stunT, ult.dur || 3.5); t.frozenT = ult.dur || 3.5; t.vuln = ult.vuln || 1.5; hurt(t, D2(ult.dmg), 'ice', crit); }
          frostFx();
          break; }
        case 'heal': { // 生命圣域：大量回血+持续场效
          B.baseHp = Math.min(B.baseHpMax, B.baseHp + (ult.heal || 50));
          B.fields.push({ kind: 'sanctuary', t: ult.dur || 6, regen: ult.regen || 8, slowAll: ult.slowAll || 0.5, color: '#2ecc71', acc: 0 });
          break; }
        case 'shield': { // 广域护盾：回血+护盾+临时上限
          B.baseHp = Math.min(B.baseHpMax, B.baseHp + (ult.heal || 40));
          B.shield = (B.shield || 0) + (ult.shield || 60);
          B.fields.push({ kind: 'shieldglow', t: ult.dur || 8, color: '#16a085' });
          break; }
        case 'blade': { // 千本樱：全场多段穿透
          for (let k = 0; k < (ult.hits || 4); k++) setTimeout(() => { if (!B.running) return; for (const t of allEnemies()) hurt(t, D2(ult.dmg), el, crit); bladeFx(); B.shake = Math.max(B.shake, 5); }, k * 130);
          break; }
        case 'snipe': { // 雷射风暴：锁定高血量目标连射
          const targets = allEnemies().sort((a, b) => (b.isBoss ? 1e9 : b.hp) - (a.isBoss ? 1e9 : a.hp));
          for (let k = 0; k < (ult.shots || 10); k++) setTimeout(() => { if (!B.running) return; const list = allEnemies().sort((a, b) => (b.isBoss ? 1e9 : b.hp) - (a.isBoss ? 1e9 : a.hp)); const t = list[0]; if (t) { snipeFx(ld.x, ld.y - 30, t.x, t.y); hurt(t, D2(ult.dmg), el, crit); explode(t.x, t.y, 36, D2(ult.dmg) * 0.4, ld.color, false, false, el, crit); } }, k * 90);
          break; }
        case 'carpet': { // 地毯式轰炸：多波全场爆炸
          for (let w = 0; w < (ult.waves || 3); w++) setTimeout(() => { if (!B.running) return; for (let i = 0; i < 8; i++) { const mx = D.W * (0.08 + i / 8 * 0.84) + (Math.random() - .5) * 40, my = B.laneTop + Math.random() * (B.laneBottom - B.laneTop); explode(mx, my, 54, D2(ult.dmg), '#c0392b', false, false, el, crit); meteorFx(mx, my); } B.shake = Math.max(B.shake, 8); }, w * 320);
          break; }
        case 'thunderstorm': { // 天劫雷域：持续随机雷击
          B.fields.push({ kind: 'storm', t: ult.dur || 6, dmg: D2(ult.dmg), gap: ult.strikeGap || 0.35, acc: 0, element: el, crit });
          break; }
        case 'bullethell': { // 弹幕狂欢：原地泼洒大量子弹
          for (let i = 0; i < (ult.bullets || 60); i++) { const a = Math.random() * Math.PI * 2 - Math.PI; const sp = 300 + Math.random() * 260; B.bullets.push({ x: ld.x, y: ld.y - 26, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, dmg: D2(ult.dmg), type: 'normal', color: ld.color, element: el, crit, r: 4, life: 1.8, hits: [] }); }
          break; }
        case 'summonOverdrive': { spawnMinions(ult.summonCount || 2, ld); B.overdrive = Math.max(B.overdrive, ult.overdrive || 6); break; }
        case 'summonTurret': { for (let i = 0; i < (ult.turretCount || 2); i++) spawnTurret(ld, ult.turretDur || 12); break; }
        case 'freezeTurret': { for (const t of allEnemies()) { t.stunT = Math.max(t.stunT, ult.dur || 4); t.frozenT = ult.dur || 4; hurt(t, D2(ult.dmg), 'ice', crit); } frostFx(); for (let i = 0; i < (ult.turretCount || 1); i++) spawnTurret(ld, ult.turretDur || 10, 'ice'); break; }
        case 'summonStrike': { spawnMinions(ult.summonCount || 3, ld); for (const t of allEnemies()) hurt(t, D2(ult.dmg), el, crit); bladeFx(); break; }
        case 'summonRally': { spawnMinions(ult.summonCount || 3, ld); B.overdrive = Math.max(B.overdrive, ult.overdrive || 8); B.baseHp = Math.min(B.baseHpMax, B.baseHp + (ult.heal || 40)); break; }
        default: { for (const t of allEnemies()) hurt(t, D2(ult.dmg || 30), el, crit); }
      }
    }
    // 大招演出特效
    function meteorFx(x, y) { for (let i = 0; i < 16; i++) { const a = Math.random() * Math.PI * 2, sp = 80 + Math.random() * 220; B.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: .5, max: .5, color: i % 2 ? '#ffce4a' : '#ff5a1a', r: 2 + Math.random() * 4, grav: 0 }); } ringBlast(x, y, '#ff7a2a'); }
    function frostFx() { for (let i = 0; i < 50; i++) B.particles.push({ x: Math.random() * D.W, y: B.laneTop + Math.random() * (B.laneBottom - B.laneTop), vx: 0, vy: 30, life: .8, max: .8, color: '#bfe9ff', r: 2 + Math.random() * 2, grav: 0 }); B.flash = Math.max(B.flash, 0.4); }
    function bladeFx() { for (let i = 0; i < 10; i++) { const y = B.laneTop + Math.random() * (B.laneBottom - B.laneTop); B.zaps = B.zaps || []; B.zaps.push({ x1: 0, y1: y, x2: D.W, y2: y + (Math.random() - .5) * 30, life: 0.16, color: '#ffd6ee' }); } }
    function snipeFx(x1, y1, x2, y2) { B.zaps = B.zaps || []; B.zaps.push({ x1, y1, x2, y2, life: 0.14, color: '#bfe9ff' }); for (let i = 0; i < 6; i++) B.particles.push({ x: x2, y: y2, vx: (Math.random() - .5) * 160, vy: (Math.random() - .5) * 160, life: .35, max: .35, color: '#fff', r: 2, grav: 0 }); }

    // ================= SUMMONS / 召唤物 =================
    function spawnMinions(n, ld) {
      const S = game_config.summon || {};
      for (let i = 0; i < n; i++) {
        const off = (i - (n - 1) / 2) * 56;
        B.summons.push({ kind: 'minion', x: Math.max(40, Math.min(D.W - 40, ld.x + off)), y: B.laneBottom + 20, hp: S.minionHp || 40, hpMax: S.minionHp || 40,
          dmg: S.minionDmg || 8, rate: S.minionRate || 700, range: S.minionRange || 220, cd: 0, t: S.minionDur || 12, color: ld.color, element: ld.element, spriteUrl: ld.spriteUrl });
        for (let p = 0; p < 12; p++) { const a = Math.random() * Math.PI * 2; B.particles.push({ x: ld.x + off, y: B.laneBottom + 20, vx: Math.cos(a) * 100, vy: Math.sin(a) * 100, life: .4, max: .4, color: ld.color, r: 2, grav: 0 }); }
      }
      B.floaters.push({ x: D.W / 2, y: B.laneBottom - 10, txt: '援军登场!', life: 1.1, color: ld.color });
      sfx('summon');
    }
    function spawnTurret(ld, dur, forceEl) {
      const S = game_config.summon || {};
      const x = Math.max(40, Math.min(D.W - 40, ld.x + (Math.random() - .5) * 120));
      B.summons.push({ kind: 'turret', x, y: B.laneBottom + 24, dmg: S.turretDmg || 14, rate: S.turretRate || 480, range: S.turretRange || 320, cd: 0, t: dur || 12, color: forceEl === 'ice' ? '#5fd0ff' : (ld.color), element: forceEl || ld.element });
      B.floaters.push({ x, y: B.laneBottom, txt: '🛡️', life: .9, color: ld.color });
    }
    function updateSummons(sdt) {
      if (!B.summons.length) return;
      for (const s of B.summons) {
        s.t -= sdt; if (s.t <= 0) { s.dead = true; continue; }
        s.cd -= sdt * 1000;
        if (s.cd <= 0 && B.enemies.length) {
          // 找范围内最近敌人
          let best = null, bd = s.range * s.range;
          for (const e of B.enemies) { if (e.dead) continue; const d = (e.x - s.x) * (e.x - s.x) + (e.y - s.y) * (e.y - s.y); if (d < bd) { bd = d; best = e; } }
          if (best) {
            s.cd = s.rate;
            const ang = Math.atan2(best.y - s.y, best.x - s.x);
            const isTurret = s.kind === 'turret';
            B.bullets.push({ x: s.x, y: s.y - 18, vx: Math.cos(ang) * (isTurret ? 600 : 460), vy: Math.sin(ang) * (isTurret ? 600 : 460), dmg: s.dmg, type: isTurret ? 'pierce' : 'normal', pierce: isTurret ? 2 : 0, color: s.color, element: s.element, crit: 0, r: 4, life: 2, hits: [], fromSummon: true, slow: s.element === 'ice' ? 0.5 : 0 });
          }
        }
      }
      B.summons = B.summons.filter(s => !s.dead);
    }
    // 持续场地效果
    function updateFields(sdt) {
      if (!B.fields.length) return;
      for (const f of B.fields) {
        f.t -= sdt; if (f.t <= 0) { f.dead = true; continue; }
        if (f.kind === 'field') { // 雷区：每0.4s伤害+麻痹
          f.tick = (f.tick || 0) + sdt;
          if (f.tick >= 0.4) { f.tick = 0; for (const e of B.enemies) { if (e.dead) continue; hurt(e, f.dmg * 0.4, f.element, 0); if (f.stun) e.stunT = Math.max(e.stunT, 0.6); } }
        } else if (f.kind === 'sanctuary') { // 圣域：回血+全场减速
          f.acc = (f.acc || 0) + sdt; if (f.acc >= 0.5) { f.acc = 0; B.baseHp = Math.min(B.baseHpMax, B.baseHp + (f.regen || 8) * 0.5); }
          for (const e of B.enemies) { if (!e.dead) e.slowT = Math.max(e.slowT, 0.3); }
        } else if (f.kind === 'storm') { // 雷暴云：随机雷击
          f.acc = (f.acc || 0) + sdt; if (f.acc >= f.gap) { f.acc = 0; const list = B.enemies.filter(e => !e.dead); if (list.length) { const t = list[Math.floor(Math.random() * list.length)]; snipeFx(t.x, B.laneTop - 30, t.x, t.y); hurt(t, f.dmg, f.element, f.crit); t.shockT = Math.max(t.shockT, 1.2); chainLightning(t.x, t.y, f.dmg * 0.6, 2, f.element, f.crit, new Set([t])); } }
        }
      }
      B.fields = B.fields.filter(f => !f.dead);
    }
    window.__castUlt = castUltimate;

    // ---- update ----
    function update(dt) {
      const sdt = dt * B.speedMul * (B.slowmo > 0 ? 0.35 : 1); B.elapsed += sdt;
      const c = curLevel();
      if (B.slowmo > 0) B.slowmo = Math.max(0, B.slowmo - dt);
      if (B.flash > 0) B.flash = Math.max(0, B.flash - dt * 1.4);
      // 角色发技能起伏动画：bob 在开火瞬间置 1，随后快速衰减
      for (const h of B.heroes) { if (h.bob > 0) h.bob = Math.max(0, h.bob - dt * 6); }
      updateSummons(sdt);
      updateFields(sdt);

      // ---- WAVE-BASED SPAWNING ----
      if (B.waveResting) {
        B.restTimer -= sdt * 1000;
        if (B.restTimer <= 0) {
          B.waveResting = false;
          B.waveSpawned = 0;
          B._bossSpawnedThisWave = 0;
          B._eliteSpawnedThisWave = 0;
          B.waveTarget = B.waves[B.waveIndex].count;
          announceWave();
        }
      } else if (B.waveIndex < B.waves.length) {
        const wave = B.waves[B.waveIndex];
        B.spawnTimer -= sdt * 1000;
        if (B.spawnTimer <= 0 && B.waveSpawned < B.waveTarget) {
          // Boss 波：先刷出 bossCount 只 Boss，其余全部刷成围绕 Boss 的小怪(随从)。
          // 这样「一个 Boss 周围配一些小怪」，且 Boss 数量受控、不会一堆叠在一起。
          let asBoss = false;
          if (wave.boss) {
            const maxBoss = wave.bossCount || 1;
            asBoss = B._bossSpawnedThisWave < maxBoss;
          }
          // 精英波：本波强制刷出 wave.elite 只精英
          let forceElite = false;
          if (!asBoss && wave.elite && B._eliteSpawnedThisWave < wave.elite) {
            // 把精英尽量平摊到本波刷怪里
            const remain = B.waveTarget - B.waveSpawned;
            const needElite = wave.elite - B._eliteSpawnedThisWave;
            if (remain <= needElite || Math.random() < needElite / Math.max(1, remain)) forceElite = true;
          }
          spawnEnemy(asBoss, forceElite); B.waveSpawned++; B.spawned++;
          if (asBoss) B._bossSpawnedThisWave++;
          if (forceElite) B._eliteSpawnedThisWave++;
          // swarm 冲锋潮：刷怪间隔大幅缩短；普通波 Boss 出场后小怪较快涌出
          const swarmMul = wave.swarm ? 0.42 : 1;
          B.spawnTimer = (c.spawnGap || 1200) * (asBoss ? 1.2 : 0.55) * swarmMul;
        }
        // wave cleared? advance
        if (B.waveSpawned >= B.waveTarget && B.enemies.length === 0) {
          B.waveIndex++;
          if (B.waveIndex < B.waves.length) {
            B.waveResting = true;
            B.restTimer = c.restGap || 2400;
            B.floaters.push({ x: D.W / 2, y: B.laneTop + 90, txt: '波次清空，准备下一波!', life: 1.4, color: '#7CFC00' });
            sfx('waveClear');
          }
        }
      }

      heroFire(sdt * 1000);
      for (const h of B.heroes) if (h.muzzle) h.muzzle = Math.max(0, h.muzzle - sdt);

      for (const b of B.bullets) {
        b.x += b.vx * sdt; b.y += b.vy * sdt; b.life -= sdt;
        for (const e of B.enemies) {
          if (e.dead || b.hits.includes(e)) continue;
          if (Math.abs(e.x - b.x) < e.w / 2 + b.r && Math.abs(e.y - b.y) < e.h / 2 + b.r) {
            if (b.type === 'explode') { explode(b.x, b.y, b.radius, b.dmg, b.color, false, false, b.element, b.crit); B.shake = Math.max(B.shake, 4); b.dead = true; }
            else if (b.type === 'nail') { explode(b.x, b.y, b.radius, b.dmg, b.color, true, true, b.element, b.crit); b.dead = true; }
            else if (b.type === 'flame') { // 火焰弹：爆炸 + 范围灼烧
              explode(b.x, b.y, b.radius, b.dmg, b.color, false, false, b.element, b.crit);
              for (const t of B.enemies) { if (!t.dead && Math.hypot(t.x - b.x, t.y - b.y) <= b.radius) { t.burnT = Math.max(t.burnT, b.burn || 2.5); t.burnDmg = Math.max(t.burnDmg, b.burnDmg || b.dmg * 0.3); } }
              B.shake = Math.max(B.shake, 4); b.dead = true;
            }
            else if (b.type === 'chain') { // 连锁闪电
              const seen = new Set([e]); hurt(e, b.dmg, b.element, b.crit); e.shockT = Math.max(e.shockT, 1.4);
              chainLightning(e.x, e.y, b.dmg * 0.85, b.chain || 3, b.element, b.crit, seen); b.dead = true;
            }
            else if (b.type === 'pierce') { hurt(e, b.dmg, b.element, b.crit); if (b.shock) e.shockT = Math.max(e.shockT, 1.2); b.hits.push(e); b.pierce--; if (b.pierce <= 0) b.dead = true; }
            else { hurt(e, b.dmg, b.element, b.crit); if (b.burn) { e.burnT = Math.max(e.burnT, b.burn); e.burnDmg = Math.max(e.burnDmg, b.burnDmg || b.dmg * 0.25); } b.dead = true; }
            break;
          }
        }
        if (b.y < -20 || b.life <= 0) b.dead = true;
      }
      B.bullets = B.bullets.filter(b => !b.dead);

      const nurse = B.heroes.find(h => h.key === 'nurse');
      const auraSlow = nurse ? 0.85 : 1;
      for (const e of B.enemies) {
        if (e.dead) continue;
        e.stunT = Math.max(0, e.stunT - sdt); e.slowT = Math.max(0, e.slowT - sdt);
        e.shockT = Math.max(0, e.shockT - sdt);
        if (e.frozenT > 0) e.frozenT = Math.max(0, e.frozenT - sdt);
        // 灼烧 DoT：每 tick 持续掉血
        if (e.burnT > 0) {
          e.burnT = Math.max(0, e.burnT - sdt);
          hurtRaw(e, e.burnDmg * sdt, '燃', false);
          if (Math.random() < 0.3) B.particles.push({ x: e.x + (Math.random() * 16 - 8), y: e.y - 6, vx: 0, vy: -40, life: .35, max: .35, color: '#ff8a2a', r: 2 });
          if (e.dead) continue;
        }
        const shockSlow = e.shockT > 0 ? 0.7 : 1;  // 感电额外减速
        if (e.stunT <= 0) e.y += e.speed * (e.slowT > 0 ? 0.4 : 1) * auraSlow * shockSlow * sdt;
        e.wob += sdt * 6;
        if (e.y >= B.laneBottom) {
          let dmg = Math.round((e.isBoss ? 25 : (e.ti === 2 ? 12 : 6)) * (e.dmgMul || 1));
          // 护盾优先吸收
          if (B.shield > 0) { const absorbed = Math.min(B.shield, dmg); B.shield -= absorbed; dmg -= absorbed; }
          B.baseHp -= dmg; e.dead = true;
          B.shake = Math.max(B.shake, e.isBoss ? 14 : 6);
          sfx('hurt');
          B.floaters.push({ x: D.W / 2, y: B.laneBottom, txt: '-' + Math.round((e.isBoss ? 25 : (e.ti === 2 ? 12 : 6)) * (e.dmgMul || 1)), life: .7, color: '#ff4b3a', big: true });
        }
      }
      // ---- AABB 分离/推开：避免怪物(尤其是 Boss)重叠堆叠 ----
      separateEnemies(sdt);
      B.enemies = B.enemies.filter(e => !e.dead);

      for (const p of B.particles) { p.x += p.vx * sdt; p.y += p.vy * sdt; p.vy += (p.grav != null ? p.grav : 200) * sdt; p.life -= sdt; }
      B.particles = B.particles.filter(p => p.life > 0);
      if (B.zaps) { for (const z of B.zaps) z.life -= sdt; B.zaps = B.zaps.filter(z => z.life > 0); }
      for (const f of B.floaters) { f.y -= 30 * sdt; f.life -= sdt; }
      B.floaters = B.floaters.filter(f => f.life > 0);

      // 连杀计时：超过窗口未击杀则连杀清零
      if (B.combo > 0) { B.comboTimer -= sdt; if (B.comboTimer <= 0) B.combo = 0; }
      // 屏幕震动衰减
      if (B.shake > 0) B.shake = Math.max(0, B.shake - sdt * 28);
      // 过载(狂暴)计时衰减
      if (B.overdrive > 0) B.overdrive = Math.max(0, B.overdrive - sdt);

      if (B.baseHp <= 0) { B.baseHp = 0; endBattle(false); }
      else if (B.waveIndex >= B.waves.length && B.enemies.length === 0) endBattle(true);
    }

    function endBattle(win) {
      if (!B.running) return;
      B.running = false;
      sfx(win ? 'win' : 'lose');
      bgm('menu');   // 结算后回到菜单主题音乐
      const lvId = curLevel().id;
      const PR = window.__PROG;
      const firstClear = win && !(G.cleared && G.cleared[lvId]);
      // 真实防线剩余百分比 (长明灯油量)
      const barrierPct = Math.max(0, Math.round((B.baseHp / B.baseHpMax) * 100));
      G.barrierHp = win ? Math.max(barrierPct, 1) : 0;   // 失败=油尽

      // ===== 星级 / 通关记录 (真实) =====
      let res = { stars: win ? 1 : 0, prevStars: G.stars[lvId] || 0, bestStars: G.stars[lvId] || 0, firstClear, improved: false };
      if (PR && PR.recordResult) res = PR.recordResult(lvId, win, B.score, barrierPct);

      // ===== 经济结算：__ECON 统一计算金币/钻石/材料/装备掉落 =====
      let rw;
      if (window.__ECON && window.__ECON.rollBattleRewards) {
        rw = window.__ECON.rollBattleRewards(G.lvlIndex, win, {
          score: B.score, comboBest: B.comboBest, kills: B.kills, hard: G.hardMode, firstClear
        });
      } else {
        const stageMul = 1 + G.lvlIndex * 0.25;
        rw = { coins: Math.round((B.score / 5 + (win ? 60 : 10)) * stageMul), gems: win ? (firstClear ? 15 : 6) : 0, mats: {}, items: [] };
      }

      renderResult(win, rw);

    // ---- render ----
    function drawBackground() {
      const W = D.W, H = D.H;

      const g = ctx.createLinearGradient(0, 0, 0, H);

      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

      let drewBg = false;
      if (D.drawBgCover && D.bgUrlForLevel) {
        const url = D.bgUrlForLevel(curLevel());
        if (url) drewBg = D.drawBgCover(ctx, url, 0, 0, W, H);
      }
      // 背景图之上叠一层暗角，提升敌人/HUD 可读性
      if (drewBg) {
        const ov = ctx.createLinearGradient(0, 0, 0, H);
        ov.addColorStop(0, 'rgba(8,6,5,.35)'); ov.addColorStop(.5, 'rgba(8,6,5,.18)'); ov.addColorStop(1, 'rgba(8,6,5,.55)');
        ctx.fillStyle = ov; ctx.fillRect(0, 0, W, H);
      }
      // 行进车道参考线 (半透明，叠在背景上)
      ctx.strokeStyle = drewBg ? 'rgba(0,0,0,.12)' : 'rgba(0,0,0,.18)'; ctx.lineWidth = 1;
      for (let i = 0; i <= 6; i++) { const y = B.laneTop + (B.laneBottom - B.laneTop) * (i / 6); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
      // barricade (防线/最后一道关卡)
      ctx.fillStyle = drewBg ? 'rgba(36,26,20,.92)' : '#241a14'; ctx.fillRect(0, B.laneBottom, W, H - B.laneBottom);
      for (let x = 0; x < W; x += 46) { ctx.fillStyle = '#3a2a1c'; ctx.fillRect(x, B.laneBottom + 6, 40, 16); ctx.fillStyle = '#1e150d'; ctx.fillRect(x, B.laneBottom + 20, 40, 6); }
      ctx.strokeStyle = 'rgba(255,75,58,.35)'; ctx.lineWidth = 3; ctx.setLineDash([10, 8]);
      ctx.beginPath(); ctx.moveTo(0, B.laneBottom); ctx.lineTo(W, B.laneBottom); ctx.stroke(); ctx.setLineDash([]);
    }
    function elColorOf(elKey) { return (game_config.elements[elKey] && game_config.elements[elKey].color) || '#888'; }
    function elEmojiOf(elKey) { return (game_config.elements[elKey] && game_config.elements[elKey].emoji) || '✨'; }
    function elNameOf(elKey) { return (game_config.elements[elKey] && game_config.elements[elKey].name) || elKey; }
    // 系别能力说明：该系克制谁、被谁克制 (自然为平衡)
    function elAbilityText(elKey) {
      const els = game_config.elements;
      const e = els[elKey]; if (!e) return '';
      if (e.balanced) return '平衡之力 · 无克制无弱点';
      const beats = e.beats;                                   // 该系克制的目标
      const counteredBy = Object.keys(els).find(k => els[k].beats === elKey); // 克制该系的系别
      const parts = [];
      if (beats) parts.push(`克制 ${elEmojiOf(beats)}${elNameOf(beats)}`);
      if (counteredBy) parts.push(`惧 ${elEmojiOf(counteredBy)}${elNameOf(counteredBy)}`);
      return parts.join(' · ');
    }

    function drawEnemy(e) {
      const cx = e.x + Math.sin(e.wob) * 3, cy = e.y;
      const w = e.w, h = e.h;
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.beginPath(); ctx.ellipse(cx, cy + h / 2, w * 0.5, 6, 0, 0, Math.PI * 2); ctx.fill();
      // 精英脉冲光环
      if (e.isElite) {
        ctx.save(); ctx.globalAlpha = .35 + Math.sin(B.elapsed * 5 + e.wob) * .15; ctx.strokeStyle = elColorOf(e.element); ctx.lineWidth = 3; ctx.shadowColor = elColorOf(e.element); ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.arc(cx, cy - h * 0.1, w * 0.72, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
      }
      // element aura ring
      ctx.save(); ctx.globalAlpha = e.isBoss ? .5 : .3; ctx.fillStyle = elColorOf(e.element);
      ctx.beginPath(); ctx.arc(cx, cy - h * 0.1, w * 0.62, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      // 灼烧火焰底色
      if (e.burnT > 0) { ctx.save(); ctx.globalAlpha = .3 + Math.random() * .2; ctx.fillStyle = '#ff7a2a'; ctx.beginPath(); ctx.arc(cx, cy - h * 0.1, w * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
      // 冰封霜冻覆层
      if (e.frozenT > 0) { ctx.save(); ctx.globalAlpha = .45; ctx.fillStyle = '#bfe9ff'; ctx.beginPath(); ctx.arc(cx, cy - h * 0.1, w * 0.55, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore(); }
      // pet sprite (idle col=0; row = 形态 baby/teen/adult/elder)
      const size = (e.isBoss ? 96 : 52) * (1 + (e.formRow || 0) * 0.05);
      const formRow = e.formRow || 0;
      let drew = false;
      if (e.spriteUrl) drew = drawSheetCell(ctx, e.spriteUrl, formRow, 0, cx - size / 2, cy - size * 0.62, size, size);
      // 贴图仍在加载中：跳过 fallback，本帧不画身体，避免占位图一闪而过造成闪烁。
      if (!drew && !sheetPending(e.spriteUrl)) {
        // fallback drawn zombie
        ctx.save(); ctx.translate(cx, cy);
        ctx.fillStyle = e.slowT > 0 ? '#6f9bd6' : '#e8e6df'; ctx.fillRect(-w / 2, -h / 4, w, h * 0.55);
        ctx.fillStyle = e.theme.color; ctx.fillRect(-w / 2, h * 0.18, w, h * 0.28);
        ctx.fillStyle = e.isBoss ? '#9c6b4a' : '#cdb79a'; ctx.beginPath(); ctx.arc(0, -h / 2 + 6, w * 0.32, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
      // boss crown + 形态名
      if (e.isBoss) {
        ctx.font = '18px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('👑', cx, cy - h * 0.62 - 6);
        ctx.font = 'bold 9px sans-serif'; ctx.fillStyle = '#ffd24a';
        ctx.fillText(e.name, cx, cy - h * 0.62 - 22);
      }
      // elite crown-star + 标签
      if (e.isElite) {
        ctx.font = '13px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('⭐', cx, cy - h * 0.58 - 4);
        ctx.font = 'bold 8px sans-serif'; ctx.fillStyle = elColorOf(e.element); ctx.fillText('精英', cx, cy - h * 0.58 - 16);
      }
      // element badge
      ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(elEmojiOf(e.element), cx + w * 0.42, cy - h * 0.35);
      if (e.stunT > 0) { ctx.fillStyle = '#ffe14a'; ctx.font = '14px sans-serif'; ctx.fillText('✦', cx, cy - h / 2 - 8); }
      if (e.shockT > 0) { ctx.fillStyle = '#bdf0ff'; ctx.font = '13px sans-serif'; ctx.fillText('⚡', cx - w * 0.42, cy - h * 0.35); }
      if (e.burnT > 0) { ctx.fillStyle = '#ff8a2a'; ctx.font = '13px sans-serif'; ctx.fillText('🔥', cx - w * 0.42, cy - h * 0.1); }
      // hp bar
      if (e.hp < e.hpMax) {
        const bw = Math.max(e.w, e.isBoss ? 80 : 30); ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(cx - bw / 2, cy - e.h / 2 - 12, bw, 4);
        ctx.fillStyle = e.isBoss ? '#ff5a3c' : '#7CFC00'; ctx.fillRect(cx - bw / 2, cy - e.h / 2 - 12, bw * (e.hp / e.hpMax), 4);

    }
    function drawHero(h) {

      ctx.fillStyle = elColorOf(h.element); ctx.globalAlpha = .28; ctx.beginPath(); ctx.arc(x, y - 6, 24 + formRow * 2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
      // pet sprite (col=happy anim; row = 形态)，体型随形态变大

      // element badge

      ctx.fillText(h.def.name, startX, nameY);

      ctx.lineWidth = 1.5; ctx.strokeStyle = '#ffd24a'; ctx.stroke();

    // 角色技能冷却读条 (脚下小条)
    function drawHeroCdBar(h) {
      const bw = 34, bh = 4, bx = h.x - bw / 2, by = h.y + 32;
      const cdMax = h.cdMax || h.def.skill.fireRate || 1000;
      // h.cd 从 cdMax 递减到 0；进度 = 已冷却比例
      const prog = Math.max(0, Math.min(1, 1 - (h.cd / cdMax)));
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,.55)'; roundRect(bx, by, bw, bh, 2); ctx.fill();

      roundRect(bx, by, bw * prog, bh, 2); ctx.fill();
      ctx.shadowBlur = 0;

    function drawParticles() { for (const p of B.particles) { ctx.globalAlpha = Math.max(0, p.life / p.max); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); } ctx.globalAlpha = 1; }
    // 召唤物绘制 (民兵=圆形小兵带宠物缩略；炮塔=方形机枪)

    // ---- 开箱/获得装备的弹窗展示 ----
    function showLootPopup(items) {
      const EC = window.__ECON;
      const prev = document.getElementById('__lootPopup'); if (prev) prev.remove();
      const mask = el('div', 'fixed inset-0 z-[60] flex items-center justify-center'); mask.id = '__lootPopup';
      mask.style.background = 'rgba(0,0,0,.7)';
      const cards = items.map(it => {
        const rd = EC.rarityDef(it.rarity), sd = EC.slotDef(it.slot), st = EC.itemStats(it);
        const affixLines = [];
        affixLines.push(`${EC.ECON.statInfo[it.main.k].e} ${EC.ECON.statInfo[it.main.k].t} +${st[it.main.k]}`);
        return `<div class="flex flex-col items-center rounded-xl px-3 py-3 mx-1" style="background:rgba(0,0,0,.55);border:2px solid ${rd.color};min-width:96px;box-shadow:0 0 18px ${rd.color}66;">
            <div class="text-5xl leading-none">${it.emoji}</div>
            <div class="text-[12px] font-black mt-1" style="color:${rd.color};">${rd.name}</div>
            <div class="text-[11px] text-stone-200">${it.name}</div>
            <div class="text-[9px] text-stone-400">${sd.t}</div>
            <div class="text-[10px] text-emerald-300 mt-1">${affixLines.join('')}</div>
          </div>`;
      }).join('');
      mask.innerHTML = `<div class="rounded-2xl p-5 text-center" style="background:linear-gradient(160deg,#2a1c18,#171010);border:1px solid rgba(217,154,58,.5);box-shadow:0 10px 40px #000;">
          <div class="text-xl font-black text-amber-200 mb-3">🎉 获得装备</div>
          <div class="flex flex-wrap justify-center mb-4">${cards}</div>
          <button id="lootOk" class="px-8 py-2 rounded-full font-bold text-white" style="background:linear-gradient(#ffb733,#e07b0a);box-shadow:0 3px 0 #7a2408;">收下</button>
        </div>`;
      D.root.appendChild(mask);
      const close = () => mask.remove();
      mask.addEventListener('click', e => { if (e.target === mask) close(); });
      mask.querySelector('#lootOk').addEventListener('click', () => { sfx('pickCard'); close(); });
    }
    window.__showLootPopup = showLootPopup;
    window.__renderShop = renderShop;

    // ===================================================================
    //  背包 BAG  (角色立绘 + 6 装备槽真实穿戴 + 装备库 + 强化/出售/合成 + 素材)
    // ===================================================================
    const EQUIP_SLOTS = [
      { k: 'helmet', t: '头盔', e: '🪖' },
      { k: 'armor',  t: '护甲', e: '🦺' },
      { k: 'legs',   t: '护腿', e: '👖' },
      { k: 'boots',  t: '战靴', e: '🥾' },
      { k: 'gloves', t: '手套', e: '🧤' },
      { k: 'badge',  t: '徽章', e: '🎖️' }
    ];
    const BAG_TABS = [
      { k: 'gear', t: '装备', e: '🛡️' },
      { k: 'fuse', t: '合成', e: '🔮' },
      { k: 'mat',  t: '素材', e: '🧪' }
    ];
    let bagTab = 'gear';
    let bagHeroIdx = 0;        // 当前查看的已拥有英雄
    let bagFilterSlot = 'all'; // 装备库筛选槽位
    let fuseSel = [];          // 合成已选 itemId

    function ownedHeroes() { return game_config.heroes.filter(h => G.unlocked[h.key]); }
    function EC() { return window.__ECON; }

    function renderBag() {
      const body = scaffold('背包 / 装备', 'bag');
      const owned = ownedHeroes();
      bagHeroIdx = Math.max(0, Math.min(bagHeroIdx, owned.length - 1));
      const h = owned[bagHeroIdx] || game_config.heroes[0];
      EC().ensureEquipSlots(h.key);
      const eff = EC().effectiveStats(h.key);
      const power = EC().heroPower(h.key);

      // ===== 角色立绘 + 环绕 6 装备槽 =====
      const charBox = el('div', 'relative rounded-2xl my-2 overflow-hidden');
      charBox.style.height = '280px';
      charBox.style.background = `radial-gradient(circle at 50% 30%,${h.color}33,#120d0b 75%)`;
      const slots = G.equipped[h.key];
      charBox.innerHTML = `
        <button id="bagPrev" class="absolute left-1 bottom-2 w-9 h-9 rounded-full bg-black/50 text-white text-lg z-20">‹</button>
        <button id="bagNext" class="absolute right-1 bottom-2 w-9 h-9 rounded-full bg-black/50 text-white text-lg z-20">›</button>
        <div class="absolute inset-0 flex items-center justify-center">
          <canvas id="bagCanvas" width="200" height="200" style="image-rendering:auto;"></canvas>
          <div class="text-[12px] text-stone-300 absolute" id="bagEmoji">形象加载中…</div>
        </div>
        <div class="absolute top-2 left-2 z-10">
          <div class="text-lg font-black text-white" style="text-shadow:0 2px 4px #000;">${h.name}</div>
          <div class="text-[11px]" style="color:${elColor(h.element)};">${elEmoji(h.element)} ${elName(h.element)}系 · ${h.title}</div>
        </div>
        <div class="absolute top-2 right-2 z-10 text-right">
          <div class="text-[10px] text-stone-300">战力</div>
          <div id="bagPower" class="text-lg font-black text-amber-300" style="text-shadow:0 1px 3px #000;">⚡${power}</div>
        </div>
        <div id="bagSlotsL" class="absolute left-2 top-1/2 -translate-y-1/2 flex flex-col gap-1 z-10">
          ${EQUIP_SLOTS.slice(0,3).map(s => slotHtml(s, slots[s.k])).join('')}
        </div>
        <div id="bagSlotsR" class="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col gap-1 z-10">
          ${EQUIP_SLOTS.slice(3).map(s => slotHtml(s, slots[s.k])).join('')}
        </div>`;
      body.appendChild(charBox);

      // ===== 有效属性条 =====
      const stat = el('div', 'grid grid-cols-4 gap-1 mb-2');
      stat.id = 'bagStats';
      stat.innerHTML = bagStatsHtml(eff);
      body.appendChild(stat);

      // ===== 标签 + 标签内容(可局部刷新，不触动立绘) =====
      const lower = el('div');
      lower.id = 'bagLower';
      body.appendChild(lower);
      fillBagLower(lower, h);

      drawBagPortrait(h);

      charBox.querySelector('#bagPrev').addEventListener('click', () => { bagHeroIdx = (bagHeroIdx - 1 + owned.length) % owned.length; fuseSel = []; renderBag(); });
      charBox.querySelector('#bagNext').addEventListener('click', () => { bagHeroIdx = (bagHeroIdx + 1) % owned.length; fuseSel = []; renderBag(); });
      bindSlotClicks(charBox, h);
    }

    // 填充「三类标签 + 当前标签内容」（供整页渲染与局部刷新复用）
    function fillBagLower(lower, h) {
      lower.innerHTML = '';
      const tabs = el('div', 'flex gap-2 mb-2');
      tabs.innerHTML = BAG_TABS.map(t => `
        <button data-btab="${t.k}" class="flex-1 py-2 rounded-xl text-[12px] font-bold flex items-center justify-center gap-1"
          style="${t.k === bagTab ? 'background:linear-gradient(#c0392b,#7a1f15);color:#fff;box-shadow:0 2px 0 #4a120c;' : 'background:rgba(0,0,0,.4);color:#cbb;'}">
          <span>${t.e}</span><span>${t.t}</span>
        </button>`).join('');
      lower.appendChild(tabs);

      if (bagTab === 'gear') renderGearLib(lower, h);
      else if (bagTab === 'fuse') renderFuse(lower);
      else if (bagTab === 'mat') renderMatBag(lower);

      tabs.querySelectorAll('[data-btab]').forEach(b => b.addEventListener('click', () => { sfx('tab'); bagTab = b.getAttribute('data-btab'); refreshBagLower(h); }));
    }

    // 局部刷新下半部分(标签+内容)，立绘/装备槽/属性条保持不动
    function refreshBagLower(h) {
      const lower = document.getElementById('bagLower');
      if (lower) fillBagLower(lower, h);
      else renderBag();
    }

    // 有效属性条 HTML（供整页渲染与局部刷新复用）
    function bagStatsHtml(eff) {
      const si = EC().ECON.statInfo;
      return [['phys', eff.phys], ['crit', eff.crit], ['hp', eff.hp], ['rate', eff.rate]].map(([k, v]) => `
        <div class="rounded-lg py-1 text-center" style="background:rgba(0,0,0,.4);">
          <div class="text-[14px]">${si[k].e}</div>
          <div class="text-[9px] text-stone-400">${si[k].t}</div>
          <div class="text-[12px] font-bold text-amber-200">${v}${si[k].suffix}</div>
        </div>`).join('');
    }

    // 绑定装备槽点击：点已装备槽->卸下；点空槽->切到装备库并按该槽筛选
    function bindSlotClicks(container, h) {
      container.querySelectorAll('[data-slot]').forEach(b => b.addEventListener('click', () => {
        const slot = b.getAttribute('data-slot');
        if (G.equipped[h.key][slot]) { EC().unequip(h.key, slot); sfx('click'); toast('已卸下 ' + EQUIP_SLOTS.find(s => s.k === slot).t); refreshBagEquip(h); }
        else { bagFilterSlot = slot; bagTab = 'gear'; sfx('click'); refreshBagLower(h); }
      }));
    }

    // 局部刷新：装备/卸下后只更新装备槽、战力、有效属性条 与 装备库列表，避免整页重渲染(立绘闪烁)
    function refreshBagEquip(h) {
      EC().ensureEquipSlots(h.key);
      const slots = G.equipped[h.key];
      const slotsL = document.getElementById('bagSlotsL');
      const slotsR = document.getElementById('bagSlotsR');
      const powerEl = document.getElementById('bagPower');
      const statEl = document.getElementById('bagStats');
      if (slotsL) { slotsL.innerHTML = EQUIP_SLOTS.slice(0, 3).map(s => slotHtml(s, slots[s.k])).join(''); }
      if (slotsR) { slotsR.innerHTML = EQUIP_SLOTS.slice(3).map(s => slotHtml(s, slots[s.k])).join(''); }
      if (slotsL || slotsR) {
        const cb = (slotsL || slotsR).closest('.relative');
        if (cb) bindSlotClicks(cb, h);
      }
      if (powerEl) powerEl.textContent = '⚡' + EC().heroPower(h.key);
      if (statEl) statEl.innerHTML = bagStatsHtml(EC().effectiveStats(h.key));
      // 装备库列表（仅在装备页时刷新标记✓/装）
      if (bagTab === 'gear') refreshGearGrid(h);
    }

    // 装备槽 HTML：已装备显示该装备 emoji + 稀有度边框 + 强化等级；未装备显示空槽(灰色「空」占位)
    function slotHtml(s, itemId) {
      const it = itemId ? EC().findItem(itemId) : null;
      const rd = it ? EC().rarityDef(it.rarity) : null;
      const border = rd ? rd.color : 'rgba(255,255,255,.18)';
      return `<button data-slot="${s.k}" data-slotname="${s.t}" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center relative"
        style="background:rgba(0,0,0,.5);border:2px solid ${border};${rd ? 'box-shadow:0 0 8px ' + rd.color + '66;' : ''}">
        <div class="text-xl ${it ? '' : 'opacity-40 text-stone-500'}">${it ? it.emoji : '空'}</div>
        <div class="text-[7px] ${it ? 'text-amber-200' : 'text-stone-500'} -mt-[2px]">${it ? (it.level ? '+' + it.level : s.t) : s.t}</div>
        ${it ? '' : `<div class="absolute -bottom-1 -right-1 text-[10px] text-emerald-400">＋</div>`}
      </button>`;
    }

    // ===== 装备库：列出可用装备，支持筛选、装备、查看详情(强化/出售) =====
    function renderGearLib(body, h) {
      // 槽位筛选条
      const filterBar = el('div', 'flex gap-1 mb-2 overflow-x-auto scrollx');
      const filters = [{ k: 'all', t: '全部', e: '🎒' }, ...EQUIP_SLOTS];
      filterBar.innerHTML = filters.map(f => `
        <button data-flt="${f.k}" class="shrink-0 px-3 py-1 rounded-full text-[11px] font-bold"
          style="${f.k === bagFilterSlot ? 'background:#c0392b;color:#fff;' : 'background:rgba(0,0,0,.4);color:#cbb;'}">${f.e}${f.t}</button>`).join('');
      body.appendChild(filterBar);
      filterBar.querySelectorAll('[data-flt]').forEach(b => b.addEventListener('click', () => { sfx('click'); bagFilterSlot = b.getAttribute('data-flt'); refreshBagLower(h); }));

      const grid = el('div', 'grid grid-cols-4 gap-2 pb-3');
      grid.id = 'bagGearGrid';
      body.appendChild(grid);
      fillGearGrid(grid, h);
    }

    // 填充装备库网格内容并绑定点击（供整页渲染与局部刷新复用）
    function fillGearGrid(grid, h) {
      // 列表 (按战力降序)；隐藏已装备在「其它角色」身上的装备，只保留未装备的与当前角色已装备的
      let list = G.inventory.slice().filter(i => {
        const w = EC().wearerOf(i.id);
        return !w || w === h.key;
      });
      if (bagFilterSlot !== 'all') list = list.filter(i => i.slot === bagFilterSlot);
      list.sort((a, b) => EC().itemPower(b) - EC().itemPower(a));

      if (!list.length) {
        grid.className = 'pb-3';
        grid.innerHTML = `<div class="text-center text-[12px] text-stone-400 py-6">暂无装备，去商店开宝箱或打关掉落</div>`;
      } else {
        grid.className = 'grid grid-cols-4 gap-2 pb-3';
        grid.innerHTML = list.map(it => {
          const rd = EC().rarityDef(it.rarity);
          const wearer = EC().wearerOf(it.id);
          const onThis = wearer === h.key;
          return `<button data-item="${it.id}" class="aspect-square rounded-xl flex flex-col items-center justify-center relative"
            style="background:linear-gradient(${rd.color}22,#171210);border:2px solid ${rd.color};">
            <div class="text-2xl">${it.emoji}</div>
            <div class="text-[8px] mt-[1px]" style="color:${rd.color};">${rd.name}</div>
            ${it.level ? `<div class="absolute top-[2px] left-[3px] text-[9px] font-bold text-amber-300">+${it.level}</div>` : ''}
            ${wearer ? `<div class="absolute bottom-[1px] right-[2px] text-[9px] ${onThis ? 'text-emerald-400' : 'text-sky-400'}">${onThis ? '✓' : '装'}</div>` : ''}
          </button>`;
        }).join('');
      }
      grid.querySelectorAll('[data-item]').forEach(b => b.addEventListener('click', () => openItemDetail(b.getAttribute('data-item'), h)));
    }

    // 局部刷新装备库网格（装备/卸下后更新 ✓/装 标记）
    function refreshGearGrid(h) {
      const grid = document.getElementById('bagGearGrid');
      if (grid) fillGearGrid(grid, h);
    }

    // ===== 装备详情弹窗：属性、装备/卸下、强化、出售 =====
    function openItemDetail(itemId, h) {
      const it = EC().findItem(itemId); if (!it) return;
      const rd = EC().rarityDef(it.rarity), sd = EC().slotDef(it.slot), si = EC().ECON.statInfo;
      const wearer = EC().wearerOf(it.id);
      const onThis = wearer === h.key;
      const st = EC().itemStats(it);
      const lines = [];
      lines.push(`<div class="flex justify-between text-[12px]"><span class="text-stone-300">${si[it.main.k].e} ${si[it.main.k].t}(主)</span><span class="text-emerald-300 font-bold">+${st[it.main.k]}${si[it.main.k].suffix}</span></div>`);
      (it.affixes || []).forEach(a => {
        // 副词条单独展示其(含强化)的数值
        const v = Math.round(a.v * (1 + (it.level || 0) * EC().ECON.enhancePerLevel));
        lines.push(`<div class="flex justify-between text-[12px]"><span class="text-stone-300">${si[a.k].e} ${si[a.k].t}</span><span class="text-amber-200 font-bold">+${v}${si[a.k].suffix}</span></div>`);
      });
      const chk = EC().canEnhance(it);
      const cost = chk.cost || EC().enhanceCost(it);
      const matStr = Object.keys(cost.mats).filter(m => cost.mats[m]).map(m => `${EC().ECON.mats[m].e}${cost.mats[m]}`).join(' ');
      const atMax = (it.level || 0) >= rd.maxLvl;
      const sellRd = EC().rarityDef(it.rarity);
      const sellCoin = Math.round(sellRd.sellCoin * (1 + (it.level || 0) * 0.15));

      const prev = document.getElementById('__itemDetail'); if (prev) prev.remove();
      const mask = el('div', 'fixed inset-0 z-[60] flex items-center justify-center'); mask.id = '__itemDetail';
      mask.style.background = 'rgba(0,0,0,.66)';
      mask.innerHTML = `<div class="w-[84%] max-w-[330px] rounded-2xl p-4" style="background:linear-gradient(160deg,#2a1c18,#171010);border:2px solid ${rd.color};box-shadow:0 10px 40px #000;">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-14 h-14 rounded-xl flex items-center justify-center text-3xl" style="background:radial-gradient(circle at 40% 30%,${rd.color}55,#0a0706);border:2px solid ${rd.color};">${it.emoji}</div>
            <div>
              <div class="font-black text-[15px]" style="color:${rd.color};">${it.name} ${it.level ? '<span class="text-amber-300">+' + it.level + '</span>' : ''}</div>
              <div class="text-[11px] text-stone-300">${rd.name} · ${sd.t} · Lv.${it.level || 0}/${rd.maxLvl}</div>
            </div>
          </div>
          <div class="bg-black/40 rounded-xl p-3 mb-3 flex flex-col gap-1">${lines.join('')}</div>
          <div class="text-[10px] text-stone-400 mb-2">${atMax ? '已达强化上限' : ('强化花费：🪙' + cost.coin + (matStr ? '　' + matStr : ''))}</div>
          <div class="grid grid-cols-2 gap-2 mb-2">
            <button id="idEquip" class="py-2 rounded-xl font-bold text-white text-[13px]" style="background:${onThis ? 'rgba(80,80,80,.6)' : 'linear-gradient(#36c45a,#1e8a3a)'};box-shadow:${onThis ? 'none' : '0 2px 0 #115221'};">${onThis ? '卸下' : '装备'}</button>
            <button id="idEnh" class="py-2 rounded-xl font-bold text-white text-[13px] ${atMax ? 'opacity-50' : ''}" style="background:linear-gradient(#ffb733,#e07b0a);box-shadow:0 2px 0 #7a2408;">${atMax ? '满级' : '强化 ▲'}</button>
          </div>
          <div class="flex gap-2">
            <button id="idSell" class="flex-1 py-2 rounded-xl font-bold text-stone-200 text-[12px]" style="background:rgba(255,255,255,.1);">出售 🪙${sellCoin}</button>
            <button id="idClose" class="flex-1 py-2 rounded-xl font-bold text-stone-200 text-[12px]" style="background:rgba(255,255,255,.1);">关闭</button>
          </div>
        </div>`;
      D.root.appendChild(mask);
      const close = () => mask.remove();
      mask.addEventListener('click', e => { if (e.target === mask) close(); });
      mask.querySelector('#idClose').addEventListener('click', () => { sfx('click'); close(); });
      mask.querySelector('#idEquip').addEventListener('click', () => {
        sfx('click');
        if (onThis) EC().unequip(h.key, it.slot); else EC().equip(h.key, it.id);
        close(); refreshBagEquip(h);
      });
      mask.querySelector('#idEnh').addEventListener('click', () => {
        if (atMax) { toast('已达强化上限'); return; }
        const r = EC().enhance(it);
        if (r.ok) { sfx('levelup'); toast(it.name + ' 强化至 +' + r.level); close(); openItemDetail(itemId, h); refreshBagEquip(h); }
        else { sfx('noEnergy'); toast(r.reason === 'coin' ? '🪙 不足' : (r.reason === 'mat' ? '素材不足' : '无法强化')); }
      });
      mask.querySelector('#idSell').addEventListener('click', () => {
        window.__confirmModal({ title: '出售装备', body: `出售 <b style="color:${rd.color};">${it.name}</b> 可得 🪙${sellCoin}${sellRd.sellMatBonus ? ('　⚙️+' + sellRd.sellMatBonus) : ''}`, okText: '出售', onOk: () => {
          const r = EC().sellItem(it.id); if (r) { sfx('unlock'); toast('已出售 · 🪙+' + r.coin); } close(); refreshBagEquip(h);
        }});
      });
    }

    // ===== 合成：选 3 件同稀有度装备 -> 1 件高一档 =====
    function renderFuse(body) {
      const need = EC().ECON.fuseNeed;
      // 说明 + 当前选择
      const info = el('div', 'bg-black/40 rounded-xl p-3 mb-2 border border-purple-700/40');
      const selItems = fuseSel.map(EC().findItem).filter(Boolean);
      const sameR = selItems.length ? selItems[0].rarity : null;
      const allSame = selItems.length === need && selItems.every(i => i.rarity === sameR);
      const matNeed = sameR || 1;
      info.innerHTML = `
        <div class="text-[12px] font-bold text-purple-200 mb-1">🔮 装备合成</div>
        <div class="text-[10px] text-stone-400 mb-2">选择 ${need} 件<b>相同稀有度</b>的装备，消耗 ⚙️×稀有度 合成 1 件<b>高一档</b>装备(随机槽位)。</div>
        <div class="flex items-center justify-center gap-2 mb-2">
          ${Array.from({ length: need }).map((_, i) => {
            const it = selItems[i];
            const rd = it ? EC().rarityDef(it.rarity) : null;
            return `<div class="w-14 h-14 rounded-xl flex items-center justify-center text-2xl" style="background:rgba(0,0,0,.5);border:2px dashed ${rd ? rd.color : 'rgba(255,255,255,.2)'};">${it ? it.emoji : '?'}</div>`;
          }).join('<span class="text-stone-500">+</span>')}
          <span class="text-stone-400">→</span>
          <div class="w-14 h-14 rounded-xl flex items-center justify-center text-2xl" style="background:rgba(176,107,255,.15);border:2px solid ${sameR && sameR < 5 ? EC().rarityDef(sameR + 1).color : 'rgba(255,255,255,.2)'};">🎁</div>
        </div>
        <button id="fuseGo" class="w-full py-2 rounded-xl font-bold text-white text-[13px] ${allSame ? '' : 'opacity-50'}" style="background:linear-gradient(#a05bff,#6b2fb0);box-shadow:0 2px 0 #3a1a6a;">合成 (⚙️${matNeed} · 拥有 ${G.materials.gear || 0})</button>`;
      body.appendChild(info);
      info.querySelector('#fuseGo').addEventListener('click', () => {
        if (!allSame) { toast('需选择 ' + need + ' 件相同稀有度装备'); return; }
        const r = EC().fuse(fuseSel.slice());
        if (r.ok) { sfx('evolve'); fuseSel = []; window.__showLootPopup([r.item]); renderBag(); }
        else { sfx('noEnergy'); toast(r.reason === 'mat' ? ('⚙️ 不足(需' + r.need + ')') : (r.reason === 'rarity' ? '稀有度需一致' : (r.reason === 'max' ? '传说已是最高档' : '无法合成'))); }
      });

      // 可选装备列表 (未被装备的优先，传说不可作为材料若已是最高... 这里允许选)
      const list = G.inventory.slice().sort((a, b) => a.rarity - b.rarity || EC().itemPower(a) - EC().itemPower(b));
      const grid = el('div', 'grid grid-cols-4 gap-2 pb-3');
      grid.innerHTML = list.map(it => {
        const rd = EC().rarityDef(it.rarity);
        const sel = fuseSel.includes(it.id);
        const wearer = EC().wearerOf(it.id);
        return `<button data-fitem="${it.id}" class="aspect-square rounded-xl flex flex-col items-center justify-center relative"
          style="background:linear-gradient(${rd.color}22,#171210);border:2px solid ${sel ? '#fff' : rd.color};${sel ? 'box-shadow:0 0 10px #fff;' : ''}">
          <div class="text-2xl">${it.emoji}</div>
          <div class="text-[8px]" style="color:${rd.color};">${rd.name}${it.level ? '+' + it.level : ''}</div>
          ${sel ? '<div class="absolute top-[2px] right-[3px] text-[11px] text-white font-black">✓</div>' : ''}
          ${wearer ? '<div class="absolute bottom-[1px] right-[2px] text-[9px] text-sky-400">装</div>' : ''}
        </button>`;
      }).join('');
      body.appendChild(grid);
      grid.querySelectorAll('[data-fitem]').forEach(b => b.addEventListener('click', () => {
        const id = b.getAttribute('data-fitem');
        if (fuseSel.includes(id)) fuseSel = fuseSel.filter(x => x !== id);
        else { if (fuseSel.length >= need) { toast('最多选 ' + need + ' 件'); return; } fuseSel.push(id); }
        sfx('click'); renderBag();
      }));
    }

    // ===== 素材背包 =====
    function renderMatBag(body) {
      const mats = EC().ECON.mats;
      const grid = el('div', 'grid grid-cols-2 gap-2 pb-3');
      grid.innerHTML = Object.keys(mats).map(m => `
        <div class="rounded-xl flex items-center gap-3 px-3 py-3" style="background:linear-gradient(#2a221c,#171210);border:1px solid rgba(255,255,255,.08);">
          <div class="text-4xl">${mats[m].e}</div>
          <div class="flex-1">
            <div class="text-[13px] font-bold text-amber-100">${mats[m].t}</div>
            <div class="text-[11px] text-stone-400">用于装备强化/合成</div>
          </div>
          <div class="text-xl font-black text-amber-300">×${G.materials[m] || 0}</div>
        </div>`).join('');
      body.appendChild(grid);
      const tip = el('div', 'text-center text-[11px] text-stone-400 pb-4', '通关掉落或在商店「素材」页购买');
      body.appendChild(tip);
    }

    function drawBagPortrait(h) {
      const cv = document.getElementById('bagCanvas');
      const emoji = document.getElementById('bagEmoji');
      if (!cv || !h.spriteUrl) return;
      const cc = cv.getContext('2d');
      const lvl = G.heroLevel[h.key] || 1;
      const formRow = lvl >= 8 ? 3 : lvl >= 5 ? 2 : lvl >= 3 ? 1 : 0;
      const draw = () => { cc.clearRect(0, 0, cv.width, cv.height); const ok = D.drawSheetCell(cc, h.spriteUrl, formRow, 1, 10, 10, 180, 180); if (ok && emoji) emoji.style.display = 'none'; return ok; };
      if (!draw()) { let n = 0; const iv = setInterval(() => { if (draw() || ++n > 20) clearInterval(iv); }, 120); }
    }
    window.__renderBag = renderBag;

    // ===================================================================
    //  地图 MAP  (真实关卡推进：每关一个节点，按通关进度逐关解锁)
    // ===================================================================
    // 关卡节点坐标 (蜿蜒墓道布局，按 game_config.levels 数量自动生成 zig-zag 路径)
    function levelMapNodes() {
      const n = game_config.levels.length;
      return game_config.levels.map((lv, i) => {
        // zig-zag：奇偶行左右交错，纵向均匀分布
        const row = i;
        const x = (i % 2 === 0) ? 28 : 72;
        const y = 10 + (80 * row / Math.max(1, n - 1));
        return { idx: i, lv, x, y };
      });
    }

    function renderMap() {
      const body = scaffold('地图 · 古墓秘境', 'map');
      const PR = window.__PROG;
      const nodes = levelMapNodes();

      // 顶部进度条：总星数 / 已通关
      const totS = PR && PR.totalStars ? PR.totalStars() : 0;
      const maxS = PR && PR.maxStars ? PR.maxStars() : game_config.levels.length * 3;
      const clearedCnt = game_config.levels.filter(l => G.cleared[l.id]).length;
      const prog = el('div', 'flex items-center justify-between bg-black/40 rounded-xl px-3 py-2 mb-2 mt-1 border border-amber-900/40');
      prog.innerHTML = `
        <div class="text-[12px] text-stone-200">通关 <b class="text-amber-300">${clearedCnt}/${game_config.levels.length}</b></div>
        <div class="text-[12px] text-stone-200">⭐ <b class="text-amber-300">${totS}/${maxS}</b></div>
        <button id="mapShop" class="px-3 py-1 rounded-full text-[11px] font-bold text-white" style="background:linear-gradient(#36c45a,#1e8a3a);">🏪 补给</button>`;
      body.appendChild(prog);

      const board = el('div', 'relative rounded-2xl my-1 overflow-hidden');
      board.style.height = 'calc(100% - 56px)';
      board.style.minHeight = '440px';
      board.style.background = 'linear-gradient(180deg,#3a4a3a,#222018 70%,#15110d)';
      const mapBgUrl = (D.ART && D.ART.byId && D.ART.byId.ancient_tomb_hall && D.ART.byId.ancient_tomb_hall.imageUrl) || '';
      board.innerHTML = `
        ${mapBgUrl ? `<img src="${mapBgUrl}" alt="" class="absolute inset-0 w-full h-full object-cover opacity-45" onerror="this.style.display='none'">` : ''}
        <div class="absolute inset-0" style="background:linear-gradient(180deg,rgba(10,7,5,.35),rgba(10,7,5,.65));"></div>
        <div class="absolute inset-0 grain opacity-50"></div>`;

      // 连接线：依次连接各关卡节点 (已通关段亮、未解锁段暗)
      const lines = nodes.slice(0, -1).map((a, i) => {
        const b = nodes[i + 1];
        const seg = G.cleared[a.lv.id] ? 'rgba(255,210,74,.85)' : 'rgba(217,154,58,.35)';
        return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${seg}" stroke-width=".7" stroke-dasharray="2 1.5"/>`;
      }).join('');
      board.insertAdjacentHTML('beforeend', `<svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg>`);

      // 节点
      nodes.forEach(node => {
        const unlocked = window.__isLevelUnlocked ? window.__isLevelUnlocked(node.idx) : true;
        const cleared = !!G.cleared[node.lv.id];
        const stars = G.stars[node.lv.id] || 0;
        const isCur = node.idx === G.lvlIndex;
        const ring = !unlocked ? '#555' : (cleared ? '#36c45a' : (node.idx === game_config.levels.length - 1 ? '#f1c40f' : '#d99a3a'));
        const btn = el('button', 'absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center');
        btn.style.left = node.x + '%'; btn.style.top = node.y + '%';
        btn.setAttribute('data-mapidx', node.idx);
        // 星星条
        const starHtml = unlocked ? `<div class="flex gap-[1px] mt-[2px]">${[0,1,2].map(i=>`<span class="text-[8px]" style="${i<stars?'':'opacity:.3;'}">⭐</span>`).join('')}</div>` : '';
        btn.innerHTML = `
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl relative"
               style="background:radial-gradient(circle at 40% 30%,#fff2,#0006);border:3px solid ${ring};box-shadow:0 0 14px ${ring}66;${isCur?'outline:2px solid #fff;outline-offset:2px;':''}${unlocked?'':'filter:grayscale(.8);'}">
            ${unlocked ? node.lv.name.match(/[\u{1F300}-\u{1FAFF}]|🪦|🏛️|🌊|🚪|⛏️/u)?.[0] || ['🪦','🏛️','🌊','🏜️','🚪','🌴','🚢','⛏️'][node.idx % 8] : '🔒'}
            <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 px-[5px] py-[1px] rounded-full bg-black/80 text-[8px] font-bold text-amber-200 whitespace-nowrap">${node.idx + 1}</div>
          </div>
          <div class="mt-2 px-2 py-[1px] rounded-full bg-black/70 text-[9px] ${unlocked?'text-amber-100':'text-stone-500'} font-bold whitespace-nowrap">${node.lv.name.split('-')[1] || node.lv.name}</div>
          ${starHtml}`;
        board.appendChild(btn);
      });
      body.appendChild(board);

      prog.querySelector('#mapShop').addEventListener('click', () => { sfx('click'); window.__show('shop'); });
      board.querySelectorAll('[data-mapidx]').forEach(b => b.addEventListener('click', () => {
        const idx = +b.getAttribute('data-mapidx');
        const unlocked = window.__isLevelUnlocked ? window.__isLevelUnlocked(idx) : true;
        if (!unlocked) { sfx('noEnergy'); toast('🔒 需先通关上一关'); return; }
        sfx('click');
        G.lvlIndex = idx; D.saveProgress();
        // 回首页并选中该关 (玩家在首页确认体力后开战)
        window.__show('home');
      }));
    }
    window.__renderMap = renderMap;

  })();
  </script>

  <!-- ============ chunk 5: 每日奖励 / 签到 (Daily Rewards & Sinks) ============ -->
  <!-- 每日可领取一组免费奖励 (金币/材料/钻石/宝箱)，配合战斗产出与商店消耗形成完整经济循环。
       通过 __ECON.canClaimDaily/claimDaily 落地，按本地日期去重。 -->
  <script>
  (function () {
    'use strict';
    const D = window.__GD;
    const G = D.G;
    const toast = window.__toast || function () {};
    function sfx(name, ...args) { try { const a = window.__AUDIO; if (a && a.sfx && a.sfx[name]) a.sfx[name](...args); } catch (e) {} }
    function EC() { return window.__ECON; }

    // 每日奖励清单 (id 必须稳定，用于去重)。reward 描述领取后发放的内容。
    function dailyList() {
      const ec = EC();
      return [
        { id: 'd_coin', name: '每日金币', e: '🪙', desc: '🪙 ×600',  reward: { coins: 600 } },
        { id: 'd_screw', name: '补给箱',  e: '🔩', desc: '🔩 ×15',    reward: { mats: { screw: 15 } } },
        { id: 'd_gear',  name: '齿轮包',  e: '⚙️', desc: '⚙️ ×6',     reward: { mats: { gear: 6 } } },
        { id: 'd_gem',   name: '每日钻石', e: '💎', desc: '💎 ×30',    reward: { gems: 30 } },
        { id: 'd_chest', name: '免费宝箱', e: '🎁', desc: '随机装备×1', reward: { item: null }, isChest: true }
      ];
    }

    // 是否有任意可领取项 (用于首页红点)
    function dailyHasClaimable() {
      const ec = EC(); if (!ec) return false;
      return dailyList().some(d => ec.canClaimDaily(d.id));
    }
    window.__dailyHasClaimable = dailyHasClaimable;

    function renderDaily() {
      const ec = EC(); if (!ec) return;
      const prev = document.getElementById('__dailyModal'); if (prev) prev.remove();
      const mask = D.el('div', 'fixed inset-0 z-[60] flex items-center justify-center p-4'); mask.id = '__dailyModal';
      mask.style.background = 'rgba(0,0,0,.7)';
      const list = dailyList();
      const cards = list.map(d => {
        const claimable = ec.canClaimDaily(d.id);
        return `<div class="flex items-center gap-3 rounded-xl px-3 py-2" style="background:rgba(0,0,0,.45);border:1px solid ${claimable ? 'rgba(255,183,51,.5)' : 'rgba(255,255,255,.08)'};">
            <div class="text-3xl">${d.e}</div>
            <div class="flex-1">
              <div class="text-[13px] font-bold text-amber-100">${d.name}</div>
              <div class="text-[11px] text-stone-300">${d.desc}</div>
            </div>
            <button data-daily="${d.id}" class="px-4 py-[6px] rounded-full text-[12px] font-bold text-white ${claimable ? '' : 'opacity-50'}"
              style="background:${claimable ? 'linear-gradient(#36c45a,#1e8a3a)' : 'rgba(80,80,80,.6)'};${claimable ? 'box-shadow:0 2px 0 #115221;' : ''}">${claimable ? '领取' : '已领'}</button>
          </div>`;
      }).join('');
      mask.innerHTML = `<div class="w-full max-w-[340px] rounded-2xl p-4" style="background:linear-gradient(160deg,#2a1c18,#171010);border:1px solid rgba(217,154,58,.5);box-shadow:0 10px 40px #000;">
          <div class="flex items-center justify-between mb-3">
            <div class="text-lg font-black text-amber-200">📅 每日奖励</div>
            <button id="dailyClose" class="w-8 h-8 rounded-full bg-black/50 text-white">✕</button>
          </div>
          <div class="flex flex-col gap-2">${cards}</div>
          ${dailyHasClaimable() ? `<button id="dailyAll" class="w-full mt-3 py-2 rounded-xl font-bold text-white text-[13px]" style="background:linear-gradient(#ffb733,#e07b0a);box-shadow:0 2px 0 #7a2408;">一键领取全部</button>` : ''}
          <div class="text-[10px] text-stone-500 text-center mt-3">每日 0 点刷新 · 坚持登录领满全部奖励</div>
        </div>`;
      D.root.appendChild(mask);
      const close = () => mask.remove();
      mask.addEventListener('click', e => { if (e.target === mask) close(); });
      mask.querySelector('#dailyClose').addEventListener('click', () => { sfx('click'); close(); });
      const allBtn = mask.querySelector('#dailyAll');
      if (allBtn) allBtn.addEventListener('click', () => {
        const drops = [];
        list.forEach(d => {
          if (!ec.canClaimDaily(d.id)) return;
          const reward = Object.assign({}, d.reward);
          if (d.isChest) reward.item = ec.rollDropItem(G.lvlIndex + 1, false);
          if (ec.claimDaily(d.id, reward) && reward.item) drops.push(reward.item);
        });
        sfx('unlock'); toast('已领取全部每日奖励');
        if (drops.length && window.__showLootPopup) window.__showLootPopup(drops);
        renderDaily();
        if (window.__renderHome && G.screen === 'home') window.__renderHome();
      });
      mask.querySelectorAll('[data-daily]').forEach(b => b.addEventListener('click', () => {
        const id = b.getAttribute('data-daily');
        const d = list.find(x => x.id === id); if (!d) return;
        if (!ec.canClaimDaily(id)) { toast('今日已领取'); return; }
        // 宝箱类：实时生成一件随机装备作为奖励
        const reward = Object.assign({}, d.reward);
        if (d.isChest) reward.item = ec.rollDropItem(G.lvlIndex + 1, false);
        if (ec.claimDaily(id, reward)) {
          sfx('unlock');
          if (reward.item) { if (window.__showLootPopup) window.__showLootPopup([reward.item]); else toast('获得装备'); }
          else toast('领取成功 · ' + d.desc);
          renderDaily();                       // 刷新弹窗状态
          if (window.__renderHome && G.screen === 'home') window.__renderHome();  // 刷新红点/货币
        }
      }));
    }
    window.__renderDaily = renderDaily;
  })();
  </script>
</body>

</html>
