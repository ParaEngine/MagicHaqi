              <div class="relative flex-none rounded-full overflow-hidden" style="width:46px;height:46px;background:radial-gradient(circle at 40% 30%,${col}55,#120c08);border:2px solid ${col};">
                <canvas class="bestiaryArt" data-sprite="${m.spriteUrl}" data-ti="${m.ti}" data-form="${m.formRow||0}" width="92" height="92" style="width:46px;height:46px;image-rendering:auto;"></canvas>
                <div class="bestiaryFallback absolute inset-0 flex items-center justify-center text-2xl">${elEmojiOf(m.element)}</div>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                  <span class="text-base leading-none">${elEmojiOf(m.element)}</span>
                  <span class="text-[13px] font-bold" style="color:${col};">${elNameOf(m.element)}系凶物</span>
                </div>
                <div class="text-[11px] text-stone-200 mt-[2px] leading-tight">${elAbilityText(m.element)}</div>
              </div>
            </div>`;
        }).join('');
        // 绘制怪物 sprite (失败则保留 emoji 占位)
        bPanel.querySelectorAll('.bestiaryArt').forEach(cv => {
          const url = cv.getAttribute('data-sprite');
          const form = +cv.getAttribute('data-form') || 0;
          const fb = cv.parentElement.querySelector('.bestiaryFallback');
          if (!url) { cv.style.display = 'none'; return; }
          const cc = cv.getContext('2d');
          const draw = () => { cc.clearRect(0,0,cv.width,cv.height); return drawSheetCell(cc, url, form, 0, 4, 4, 84, 84); };
          if (draw()) { if (fb) fb.style.display = 'none'; }
          else { let n=0; const iv=setInterval(()=>{ if(draw()){ if(fb) fb.style.display='none'; clearInterval(iv);} else if(++n>20) clearInterval(iv); },120); }
        });
      }
      bToggle.addEventListener('click', () => {
        bestiaryOpen = !bestiaryOpen;
        bPanel.classList.toggle('hidden', !bestiaryOpen);
        bToggle.innerHTML = bestiaryOpen ? '📖 查看它们 ▴' : '📖 查看它们 ▾';
        if (bestiaryOpen) renderBestiary();
      });
      // draw character pet sprites (image占位) for character cards
      wrap.querySelectorAll('.cardArt').forEach(cv => {
        const url = cv.getAttribute('data-sprite');
        const fallback = cv.parentElement.querySelector('.cardArtFallback');
        if (!url) { cv.style.display = 'none'; return; }
        const cc = cv.getContext('2d');
        const draw = () => { cc.clearRect(0, 0, cv.width, cv.height); return drawSheetCell(cc, url, 0, 1, 6, 6, 108, 108); }; // 形态一, happy
        const ok = draw();
        if (ok) { if (fallback) fallback.style.display = 'none'; }
        else { let n = 0; const iv = setInterval(() => { if (draw()) { if (fallback) fallback.style.display = 'none'; clearInterval(iv); } else if (++n > 20) clearInterval(iv); }, 120); }
      });
      wrap.querySelectorAll('[data-i]').forEach(node => node.addEventListener('click', () => applyChoice(choices[+node.getAttribute('data-i')])));
    }
    function skillIcon(type) { return ({ explode: '💥', nail: '❄️', pierce: '🎯', rapid: '🔫', support: '💉', flame: '🔥', chain: '⚡', normal: '🔫' })[type] || '✨'; }

    // ---- input: 角色只能点击(显示技能范围)，不可拖动；tap pause/speed/ult ----
    function clientXY(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * (D.W / r.width), y: (e.clientY - r.top) * (D.H / r.height) }; }
    function hitHero(e) {
      const p = clientXY(e);
      let best = null, bd = 34 * 34;
      for (const h of B.heroes) { const dx = p.x - h.x, dy = p.y - (h.y - 6), d = dx * dx + dy * dy; if (d < bd) { bd = d; best = h; } }
      return best;
    }
    canvas.addEventListener('pointerdown', e => {
      if (!B.running || B.paused) return;
      if (hitPause(e)) { B.paused = true; renderPause(); return; }
      if (hitSpeed(e)) { B.speedMul = B.speedMul === 1 ? 1.5 : 1; return; }
      if (hitUlt(e)) { castUltimate(); return; }
      // 角色禁止拖动：按住某角色才显示该角色的攻击半径；按空白处不显示。
      const hh = hitHero(e);
      B.selectedHero = hh || null;
    });
    // 抬起时隐藏技能范围 (无拖动)
    window.addEventListener('pointerup', () => { B.selectedHero = null; });
    window.addEventListener('pointercancel', () => { B.selectedHero = null; });
    function hitPause(e) { const r = canvas.getBoundingClientRect(); const x = e.clientX - r.left, y = e.clientY - r.top; return x > 6 && x < 70 && y > 6 && y < 40; }
    function hitSpeed(e) { const r = canvas.getBoundingClientRect(); const x = e.clientX - r.left, y = e.clientY - r.top; return x > D.W - 70 && x < D.W - 6 && y > 6 && y < 40; }
    // 大招按钮在右下角(圆形)
    function ultBtnGeo() { return { cx: D.W - 52, cy: D.laneBottom + 56, r: 38 }; }
    function hitUlt(e) { const r = canvas.getBoundingClientRect(); const g = ultBtnGeo(); const x = e.clientX - r.left, y = e.clientY - r.top; return Math.hypot(x - g.cx, y - g.cy) <= g.r + 6; }

    function renderPause() {
      removeOverlay();
      const wrap = el('div', 'absolute inset-0 flex flex-col items-center justify-center z-30');
      wrap.style.background = 'rgba(8,6,5,.7)';
      wrap.innerHTML = `<div class="text-3xl font-black text-amber-200 mb-6">暂停中</div>
        <div class="text-[12px] text-stone-300 mb-6 text-center px-8">退出战斗将判定为<span style="color:#ff7b6a;font-weight:900;">失败</span>，确定要撤退吗？</div>
        <div class="flex gap-3">
          <button id="quitBtn" class="px-7 py-2 rounded-full font-bold text-white" style="background:linear-gradient(#5a93d6,#2a6ab0);box-shadow:0 3px 0 #1a447a;">退出战斗</button>
          <button id="resumeBtn" class="px-7 py-2 rounded-full font-bold text-white" style="background:linear-gradient(#ffb733,#e07b0a);box-shadow:0 3px 0 #7a2408;">继续战斗</button>
        </div>`;
      root.appendChild(wrap); overlayEl = wrap;
      wrap.querySelector('#resumeBtn').addEventListener('click', () => { B.paused = false; removeOverlay(); lastTime = performance.now(); });
      // 退出战斗 = 判定失败：结算为 DEFEAT 并展示结算界面
      wrap.querySelector('#quitBtn').addEventListener('click', () => { removeOverlay(); B.paused = false; endBattle(false); });
    }

    // ================= ULTIMATE / 大招系统 =================
    function leaderUnit() { return B.heroes.find(h => h.key === G.leader) || B.heroes[0]; }
    function castUltimate() {
      if (!B.running || B.paused) return;
      if (B.energy < B.energyMax) { B.floaters.push({ x: D.W / 2, y: B.laneBottom - 40, txt: '能量不足', life: .8, color: '#ffcf66' }); return; }
      const ld = leaderUnit(); if (!ld) return;
      const ult = ld.def.ult;
      if (!ult) { B.floaters.push({ x: D.W / 2, y: B.laneBottom - 40, txt: '该角色暂无大招', life: .9, color: '#ffcf66' }); return; }
      B.energy = 0; B.ultsUsed++;
      // 通用大招演出：全屏闪白 + 震动 + 子弹时间 + 大字
      B.flash = 0.5; B.shake = Math.max(B.shake, 16); B.slowmo = 0.5;
      B.floaters.push({ x: D.W / 2, y: D.H * 0.4, txt: '★ ' + ult.name + ' ★', life: 1.6, big: true, color: ld.color });
      const allEnemies = () => B.enemies.filter(e => !e.dead);
      const el = ld.element, crit = ld.def.stats.crit || 0, phys = 1 + (ld.def.stats.phys || 0) / 100;
      const D2 = v => v * phys * (1 + (ld.lvl - 1) * 0.12);  // 大招随领队等级成长
      switch (ult.type) {
        case 'meteor': { // 火雨：随机落点爆炸+点燃
          for (let i = 0; i < (ult.count || 12); i++) {
            const mx = D.W * (0.1 + Math.random() * 0.8), my = B.laneTop + Math.random() * (B.laneBottom - B.laneTop);
            setTimeout(() => { if (!B.running) return; explode(mx, my, 60, D2(ult.dmg), '#ff6b35', false, false, 'fire', crit); meteorFx(mx, my); for (const t of allEnemies()) { if (Math.hypot(t.x - mx, t.y - my) <= 60) { t.burnT = Math.max(t.burnT, ult.burn || 3); t.burnDmg = Math.max(t.burnDmg, ult.burnDmg || 10); } } }, i * 70);
          }
          break; }
        case 'field': { // 死亡罗网：全场雷区，持续麻痹+伤害
          B.fields.push({ kind: 'field', t: ult.dur || 4, dmg: D2(ult.dmg), element: el, color: '#9b6bff', tick: 0, stun: !!ult.stun });
          break; }
        case 'freezeAll': { // 冰封天陆：全体冻结+脆弱
          for (const t of allEnemies()) { t.stunT = Math.max(t.stunT, ult.dur || 3.5); t.frozenT = ult.dur || 3.5; t.vuln = ult.vuln || 1.5; hurt(t, D2(ult.dmg), 'ice', crit); }
          frostFx();
          break; }
        case 'heal': { // 生命圣域：大量回血+持续场效
          B.baseHp = Math.min(B.baseHpMax, B.baseHp + (ult.heal || 50));
          B.fields.push({ kind: 'sanctuary', t: ult.dur || 6, regen: ult.regen || 8, slowAll: ult.slowAll || 0.5, color: '#2ecc71', acc: 0 });
          break; }
        case 'shield': { // 广域护盾：回血+护盾+临时上限
          B.baseHp = Math.min(B.baseHpMax, B.baseHp + (ult.heal || 40));
          B.shield = (B.shield || 0) + (ult.shield || 60);
          B.fields.push({ kind: 'shieldglow', t: ult.dur || 8, color: '#16a085' });
          break; }
        case 'blade': { // 千本樱：全场多段穿透
          for (let k = 0; k < (ult.hits || 4); k++) setTimeout(() => { if (!B.running) return; for (const t of allEnemies()) hurt(t, D2(ult.dmg), el, crit); bladeFx(); B.shake = Math.max(B.shake, 5); }, k * 130);
          break; }
        case 'snipe': { // 雷射风暴：锁定高血量目标连射
          const targets = allEnemies().sort((a, b) => (b.isBoss ? 1e9 : b.hp) - (a.isBoss ? 1e9 : a.hp));
          for (let k = 0; k < (ult.shots || 10); k++) setTimeout(() => { if (!B.running) return; const list = allEnemies().sort((a, b) => (b.isBoss ? 1e9 : b.hp) - (a.isBoss ? 1e9 : a.hp)); const t = list[0]; if (t) { snipeFx(ld.x, ld.y - 30, t.x, t.y); hurt(t, D2(ult.dmg), el, crit); explode(t.x, t.y, 36, D2(ult.dmg) * 0.4, ld.color, false, false, el, crit); } }, k * 90);
          break; }
        case 'carpet': { // 地毯式轰炸：多波全场爆炸
          for (let w = 0; w < (ult.waves || 3); w++) setTimeout(() => { if (!B.running) return; for (let i = 0; i < 8; i++) { const mx = D.W * (0.08 + i / 8 * 0.84) + (Math.random() - .5) * 40, my = B.laneTop + Math.random() * (B.laneBottom - B.laneTop); explode(mx, my, 54, D2(ult.dmg), '#c0392b', false, false, el, crit); meteorFx(mx, my); } B.shake = Math.max(B.shake, 8); }, w * 320);
          break; }
        case 'thunderstorm': { // 天劫雷域：持续随机雷击
          B.fields.push({ kind: 'storm', t: ult.dur || 6, dmg: D2(ult.dmg), gap: ult.strikeGap || 0.35, acc: 0, element: el, crit });
          break; }
        case 'bullethell': { // 弹幕狂欢：原地泼洒大量子弹
          for (let i = 0; i < (ult.bullets || 60); i++) { const a = Math.random() * Math.PI * 2 - Math.PI; const sp = 300 + Math.random() * 260; B.bullets.push({ x: ld.x, y: ld.y - 26, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, dmg: D2(ult.dmg), type: 'normal', color: ld.color, element: el, crit, r: 4, life: 1.8, hits: [] }); }
          break; }
        case 'summonOverdrive': { spawnMinions(ult.summonCount || 2, ld); B.overdrive = Math.max(B.overdrive, ult.overdrive || 6); break; }
        case 'summonTurret': { for (let i = 0; i < (ult.turretCount || 2); i++) spawnTurret(ld, ult.turretDur || 12); break; }
        case 'freezeTurret': { for (const t of allEnemies()) { t.stunT = Math.max(t.stunT, ult.dur || 4); t.frozenT = ult.dur || 4; hurt(t, D2(ult.dmg), 'ice', crit); } frostFx(); for (let i = 0; i < (ult.turretCount || 1); i++) spawnTurret(ld, ult.turretDur || 10, 'ice'); break; }
        case 'summonStrike': { spawnMinions(ult.summonCount || 3, ld); for (const t of allEnemies()) hurt(t, D2(ult.dmg), el, crit); bladeFx(); break; }
        case 'summonRally': { spawnMinions(ult.summonCount || 3, ld); B.overdrive = Math.max(B.overdrive, ult.overdrive || 8); B.baseHp = Math.min(B.baseHpMax, B.baseHp + (ult.heal || 40)); break; }
        default: { for (const t of allEnemies()) hurt(t, D2(ult.dmg || 30), el, crit); }
      }
    }
    // 大招演出特效
    function meteorFx(x, y) { for (let i = 0; i < 16; i++) { const a = Math.random() * Math.PI * 2, sp = 80 + Math.random() * 220; B.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: .5, max: .5, color: i % 2 ? '#ffce4a' : '#ff5a1a', r: 2 + Math.random() * 4, grav: 0 }); } ringBlast(x, y, '#ff7a2a'); }
    function frostFx() { for (let i = 0; i < 50; i++) B.particles.push({ x: Math.random() * D.W, y: B.laneTop + Math.random() * (B.laneBottom - B.laneTop), vx: 0, vy: 30, life: .8, max: .8, color: '#bfe9ff', r: 2 + Math.random() * 2, grav: 0 }); B.flash = Math.max(B.flash, 0.4); }
    function bladeFx() { for (let i = 0; i < 10; i++) { const y = B.laneTop + Math.random() * (B.laneBottom - B.laneTop); B.zaps = B.zaps || []; B.zaps.push({ x1: 0, y1: y, x2: D.W, y2: y + (Math.random() - .5) * 30, life: 0.16, color: '#ffd6ee' }); } }
    function snipeFx(x1, y1, x2, y2) { B.zaps = B.zaps || []; B.zaps.push({ x1, y1, x2, y2, life: 0.14, color: '#bfe9ff' }); for (let i = 0; i < 6; i++) B.particles.push({ x: x2, y: y2, vx: (Math.random() - .5) * 160, vy: (Math.random() - .5) * 160, life: .35, max: .35, color: '#fff', r: 2, grav: 0 }); }

    // ================= SUMMONS / 召唤物 =================
    function spawnMinions(n, ld) {
      const S = game_config.summon || {};
      for (let i = 0; i < n; i++) {
        const off = (i - (n - 1) / 2) * 56;
        B.summons.push({ kind: 'minion', x: Math.max(40, Math.min(D.W - 40, ld.x + off)), y: B.laneBottom + 20, hp: S.minionHp || 40, hpMax: S.minionHp || 40,
          dmg: S.minionDmg || 8, rate: S.minionRate || 700, range: S.minionRange || 220, cd: 0, t: S.minionDur || 12, color: ld.color, element: ld.element, spriteUrl: ld.spriteUrl });
        for (let p = 0; p < 12; p++) { const a = Math.random() * Math.PI * 2; B.particles.push({ x: ld.x + off, y: B.laneBottom + 20, vx: Math.cos(a) * 100, vy: Math.sin(a) * 100, life: .4, max: .4, color: ld.color, r: 2, grav: 0 }); }
      }
      B.floaters.push({ x: D.W / 2, y: B.laneBottom - 10, txt: '援军登场!', life: 1.1, color: ld.color });
    }
    function spawnTurret(ld, dur, forceEl) {
      const S = game_config.summon || {};
      const x = Math.max(40, Math.min(D.W - 40, ld.x + (Math.random() - .5) * 120));
      B.summons.push({ kind: 'turret', x, y: B.laneBottom + 24, dmg: S.turretDmg || 14, rate: S.turretRate || 480, range: S.turretRange || 320, cd: 0, t: dur || 12, color: forceEl === 'ice' ? '#5fd0ff' : (ld.color), element: forceEl || ld.element });
      B.floaters.push({ x, y: B.laneBottom, txt: '🛡️', life: .9, color: ld.color });
    }
    function updateSummons(sdt) {
      if (!B.summons.length) return;
      for (const s of B.summons) {
        s.t -= sdt; if (s.t <= 0) { s.dead = true; continue; }
        s.cd -= sdt * 1000;
        if (s.cd <= 0 && B.enemies.length) {
          // 找范围内最近敌人
          let best = null, bd = s.range * s.range;
          for (const e of B.enemies) { if (e.dead) continue; const d = (e.x - s.x) * (e.x - s.x) + (e.y - s.y) * (e.y - s.y); if (d < bd) { bd = d; best = e; } }
          if (best) {
            s.cd = s.rate;
            const ang = Math.atan2(best.y - s.y, best.x - s.x);
            const isTurret = s.kind === 'turret';
            B.bullets.push({ x: s.x, y: s.y - 18, vx: Math.cos(ang) * (isTurret ? 600 : 460), vy: Math.sin(ang) * (isTurret ? 600 : 460), dmg: s.dmg, type: isTurret ? 'pierce' : 'normal', pierce: isTurret ? 2 : 0, color: s.color, element: s.element, crit: 0, r: 4, life: 2, hits: [], fromSummon: true, slow: s.element === 'ice' ? 0.5 : 0 });
          }
        }
      }
      B.summons = B.summons.filter(s => !s.dead);
    }
    // 持续场地效果
    function updateFields(sdt) {
      if (!B.fields.length) return;
      for (const f of B.fields) {
        f.t -= sdt; if (f.t <= 0) { f.dead = true; continue; }
        if (f.kind === 'field') { // 雷区：每0.4s伤害+麻痹
          f.tick = (f.tick || 0) + sdt;
          if (f.tick >= 0.4) { f.tick = 0; for (const e of B.enemies) { if (e.dead) continue; hurt(e, f.dmg * 0.4, f.element, 0); if (f.stun) e.stunT = Math.max(e.stunT, 0.6); } }
        } else if (f.kind === 'sanctuary') { // 圣域：回血+全场减速
          f.acc = (f.acc || 0) + sdt; if (f.acc >= 0.5) { f.acc = 0; B.baseHp = Math.min(B.baseHpMax, B.baseHp + (f.regen || 8) * 0.5); }
          for (const e of B.enemies) { if (!e.dead) e.slowT = Math.max(e.slowT, 0.3); }
        } else if (f.kind === 'storm') { // 雷暴云：随机雷击
          f.acc = (f.acc || 0) + sdt; if (f.acc >= f.gap) { f.acc = 0; const list = B.enemies.filter(e => !e.dead); if (list.length) { const t = list[Math.floor(Math.random() * list.length)]; snipeFx(t.x, B.laneTop - 30, t.x, t.y); hurt(t, f.dmg, f.element, f.crit); t.shockT = Math.max(t.shockT, 1.2); chainLightning(t.x, t.y, f.dmg * 0.6, 2, f.element, f.crit, new Set([t])); } }
        }
      }
      B.fields = B.fields.filter(f => !f.dead);
    }
    window.__castUlt = castUltimate;

    // ---- update ----
    function update(dt) {
      const sdt = dt * B.speedMul * (B.slowmo > 0 ? 0.35 : 1); B.elapsed += sdt;
      const c = curLevel();
      if (B.slowmo > 0) B.slowmo = Math.max(0, B.slowmo - dt);
      if (B.flash > 0) B.flash = Math.max(0, B.flash - dt * 1.4);
      // 角色发技能起伏动画：bob 在开火瞬间置 1，随后快速衰减
      for (const h of B.heroes) { if (h.bob > 0) h.bob = Math.max(0, h.bob - dt * 6); }
      updateSummons(sdt);
      updateFields(sdt);

      // ---- WAVE-BASED SPAWNING ----
      if (B.waveResting) {
        B.restTimer -= sdt * 1000;
        if (B.restTimer <= 0) {
          B.waveResting = false;
          B.waveSpawned = 0;
          B._bossSpawnedThisWave = 0;
          B._eliteSpawnedThisWave = 0;
          B.waveTarget = B.waves[B.waveIndex].count;
          announceWave();
        }
      } else if (B.waveIndex < B.waves.length) {
        const wave = B.waves[B.waveIndex];
        B.spawnTimer -= sdt * 1000;
        if (B.spawnTimer <= 0 && B.waveSpawned < B.waveTarget) {
          // Boss 波：先刷出 bossCount 只 Boss，其余全部刷成围绕 Boss 的小怪(随从)。
          // 这样「一个 Boss 周围配一些小怪」，且 Boss 数量受控、不会一堆叠在一起。
          let asBoss = false;
          if (wave.boss) {
            const maxBoss = wave.bossCount || 1;
            asBoss = B._bossSpawnedThisWave < maxBoss;
          }
          // 精英波：本波强制刷出 wave.elite 只精英
          let forceElite = false;
          if (!asBoss && wave.elite && B._eliteSpawnedThisWave < wave.elite) {
            // 把精英尽量平摊到本波刷怪里
            const remain = B.waveTarget - B.waveSpawned;
            const needElite = wave.elite - B._eliteSpawnedThisWave;
            if (remain <= needElite || Math.random() < needElite / Math.max(1, remain)) forceElite = true;
          }
          spawnEnemy(asBoss, forceElite); B.waveSpawned++; B.spawned++;
          if (asBoss) B._bossSpawnedThisWave++;
          if (forceElite) B._eliteSpawnedThisWave++;
          // swarm 冲锋潮：刷怪间隔大幅缩短；普通波 Boss 出场后小怪较快涌出
          const swarmMul = wave.swarm ? 0.42 : 1;
          B.spawnTimer = (c.spawnGap || 1200) * (asBoss ? 1.2 : 0.55) * swarmMul;
        }
        // wave cleared? advance
        if (B.waveSpawned >= B.waveTarget && B.enemies.length === 0) {
          B.waveIndex++;
          if (B.waveIndex < B.waves.length) {
            B.waveResting = true;
            B.restTimer = c.restGap || 2400;
            B.floaters.push({ x: D.W / 2, y: B.laneTop + 90, txt: '波次清空，准备下一波!', life: 1.4, color: '#7CFC00' });
          }
        }
      }

      heroFire(sdt * 1000);
      for (const h of B.heroes) if (h.muzzle) h.muzzle = Math.max(0, h.muzzle - sdt);

      for (const b of B.bullets) {
        b.x += b.vx * sdt; b.y += b.vy * sdt; b.life -= sdt;
        for (const e of B.enemies) {
          if (e.dead || b.hits.includes(e)) continue;
          if (Math.abs(e.x - b.x) < e.w / 2 + b.r && Math.abs(e.y - b.y) < e.h / 2 + b.r) {
            if (b.type === 'explode') { explode(b.x, b.y, b.radius, b.dmg, b.color, false, false, b.element, b.crit); B.shake = Math.max(B.shake, 4); b.dead = true; }
            else if (b.type === 'nail') { explode(b.x, b.y, b.radius, b.dmg, b.color, true, true, b.element, b.crit); b.dead = true; }
            else if (b.type === 'flame') { // 火焰弹：爆炸 + 范围灼烧
              explode(b.x, b.y, b.radius, b.dmg, b.color, false, false, b.element, b.crit);
              for (const t of B.enemies) { if (!t.dead && Math.hypot(t.x - b.x, t.y - b.y) <= b.radius) { t.burnT = Math.max(t.burnT, b.burn || 2.5); t.burnDmg = Math.max(t.burnDmg, b.burnDmg || b.dmg * 0.3); } }
              B.shake = Math.max(B.shake, 4); b.dead = true;
            }
            else if (b.type === 'chain') { // 连锁闪电
              const seen = new Set([e]); hurt(e, b.dmg, b.element, b.crit); e.shockT = Math.max(e.shockT, 1.4);
              chainLightning(e.x, e.y, b.dmg * 0.85, b.chain || 3, b.element, b.crit, seen); b.dead = true;
            }
            else if (b.type === 'pierce') { hurt(e, b.dmg, b.element, b.crit); if (b.shock) e.shockT = Math.max(e.shockT, 1.2); b.hits.push(e); b.pierce--; if (b.pierce <= 0) b.dead = true; }
            else { hurt(e, b.dmg, b.element, b.crit); if (b.burn) { e.burnT = Math.max(e.burnT, b.burn); e.burnDmg = Math.max(e.burnDmg, b.burnDmg || b.dmg * 0.25); } b.dead = true; }
            break;
          }
        }
        if (b.y < -20 || b.life <= 0) b.dead = true;
      }
      B.bullets = B.bullets.filter(b => !b.dead);

      const nurse = B.heroes.find(h => h.key === 'nurse');
      const auraSlow = nurse ? 0.85 : 1;
      for (const e of B.enemies) {
        if (e.dead) continue;
        e.stunT = Math.max(0, e.stunT - sdt); e.slowT = Math.max(0, e.slowT - sdt);
        e.shockT = Math.max(0, e.shockT - sdt);
        if (e.frozenT > 0) e.frozenT = Math.max(0, e.frozenT - sdt);
        // 灼烧 DoT：每 tick 持续掉血
        if (e.burnT > 0) {
          e.burnT = Math.max(0, e.burnT - sdt);
          hurtRaw(e, e.burnDmg * sdt, '燃', false);
          if (Math.random() < 0.3) B.particles.push({ x: e.x + (Math.random() * 16 - 8), y: e.y - 6, vx: 0, vy: -40, life: .35, max: .35, color: '#ff8a2a', r: 2 });
          if (e.dead) continue;
        }
        const shockSlow = e.shockT > 0 ? 0.7 : 1;  // 感电额外减速
        if (e.stunT <= 0) e.y += e.speed * (e.slowT > 0 ? 0.4 : 1) * auraSlow * shockSlow * sdt;
        e.wob += sdt * 6;
        if (e.y >= B.laneBottom) {
          let dmg = Math.round((e.isBoss ? 25 : (e.ti === 2 ? 12 : 6)) * (e.dmgMul || 1));
          // 护盾优先吸收
          if (B.shield > 0) { const absorbed = Math.min(B.shield, dmg); B.shield -= absorbed; dmg -= absorbed; }
          B.baseHp -= dmg; e.dead = true;
          B.shake = Math.max(B.shake, e.isBoss ? 14 : 6);
          B.floaters.push({ x: D.W / 2, y: B.laneBottom, txt: '-' + Math.round((e.isBoss ? 25 : (e.ti === 2 ? 12 : 6)) * (e.dmgMul || 1)), life: .7, color: '#ff4b3a', big: true });
        }
      }
      // ---- AABB 分离/推开：避免怪物(尤其是 Boss)重叠堆叠 ----
      separateEnemies(sdt);
      B.enemies = B.enemies.filter(e => !e.dead);

      for (const p of B.particles) { p.x += p.vx * sdt; p.y += p.vy * sdt; p.vy += (p.grav != null ? p.grav : 200) * sdt; p.life -= sdt; }
      B.particles = B.particles.filter(p => p.life > 0);
      if (B.zaps) { for (const z of B.zaps) z.life -= sdt; B.zaps = B.zaps.filter(z => z.life > 0); }
      for (const f of B.floaters) { f.y -= 30 * sdt; f.life -= sdt; }
      B.floaters = B.floaters.filter(f => f.life > 0);

      // 连杀计时：超过窗口未击杀则连杀清零
      if (B.combo > 0) { B.comboTimer -= sdt; if (B.comboTimer <= 0) B.combo = 0; }
      // 屏幕震动衰减
      if (B.shake > 0) B.shake = Math.max(0, B.shake - sdt * 28);
      // 过载(狂暴)计时衰减
      if (B.overdrive > 0) B.overdrive = Math.max(0, B.overdrive - sdt);

      if (B.baseHp <= 0) { B.baseHp = 0; endBattle(false); }
      else if (B.waveIndex >= B.waves.length && B.enemies.length === 0) endBattle(true);
    }

    function endBattle(win) {
      if (!B.running) return;
      B.running = false;
      // 奖励随关卡难度与连杀表现增长；首次通关额外给钻石
      const stageMul = 1 + G.lvlIndex * 0.25;
      const comboBonus = Math.round(B.comboBest * 1.5);
      const earn = Math.round((B.score / 5 + (win ? 60 : 10) + comboBonus) * stageMul);
      G.coins += earn; G.cash = (G.cash || 0) + B.cash;
      // 钻石：首次通关给较多，重复通关给少量，确保经济不膨胀
      let gemReward = 0;
      if (win) { const firstClear = !(G.cleared && G.cleared[curLevel().id]); gemReward = firstClear ? (15 + G.lvlIndex * 5) : 8; }
      G.gems += gemReward;
      B._lastEarn = earn; B._lastGem = gemReward;
      if (win) G.cleared[curLevel().id] = true;
      if (window.__saveProgress) window.__saveProgress();  // persist progress to localStorage
      renderResult(win, earn);
      try { window.parent.postMessage({ type: 'gameFinished', data: { earnedPoints: B.score, kills: B.kills, level: curLevel().id, win } }, '*'); } catch (e) {}
    }
    function renderResult(win, earn) {
      removeOverlay();
      const lv = curLevel();
      const hasNext = win && G.lvlIndex < game_config.levels.length - 1;
      const wrap = el('div', 'absolute inset-0 flex flex-col items-center justify-center z-30');
      wrap.style.background = 'rgba(8,6,5,.82)';
      wrap.innerHTML = `
        <div class="text-4xl font-black mb-2" style="color:${win ? '#7CFC00' : '#ff4b3a'};text-shadow:0 2px 6px #000;">${win ? '盗墓成功' : '葬身墓中'}</div>
        <div class="text-stone-300 mb-1">${lv.name}</div>
        <div class="text-amber-300 text-lg font-bold">击杀 ${B.kills}</div>
        <div class="text-amber-200 mb-1">分数 ${B.score} · 最高连杀 🔥${B.comboBest}</div>
        <div class="text-yellow-300">🪙 +${earn}${B._lastGem ? ('　💎 +' + B._lastGem) : ''}</div>
        <div class="mb-6"></div>
        <div class="flex gap-3">
          ${hasNext ? `<button id="nextBtn" class="px-6 py-2 rounded-full font-bold text-white" style="background:linear-gradient(#36c45a,#1e8a3a);box-shadow:0 3px 0 #115221;">下一关</button>` : ''}
          <button id="retryBtn" class="px-6 py-2 rounded-full font-bold text-white" style="background:linear-gradient(#ff7a2a,#e0480f);box-shadow:0 3px 0 #7a2408;">重打</button>
          <button id="homeBtn" class="px-6 py-2 rounded-full font-bold text-stone-200 bg-black/50 border border-stone-600">基地</button>
        </div>`;
      root.appendChild(wrap); overlayEl = wrap;
      const nb = wrap.querySelector('#nextBtn');
      if (nb) nb.addEventListener('click', () => { G.lvlIndex++; removeOverlay(); startBattle(); });
      wrap.querySelector('#retryBtn').addEventListener('click', () => { removeOverlay(); startBattle(); });
      wrap.querySelector('#homeBtn').addEventListener('click', () => { removeOverlay(); window.__show('home'); });
    }

    // ---- render ----
    function drawBackground() {
      const W = D.W, H = D.H;
      // 默认渐变底色 (背景图未就绪时回退)
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#3a3f33'); g.addColorStop(.55, '#4a4a45'); g.addColorStop(1, '#2a2622');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      // 关卡背景图 (盗墓题材场景，引用 art_assets)；cover 填满整屏
      let drewBg = false;
      if (D.drawBgCover && D.bgUrlForLevel) {
        const url = D.bgUrlForLevel(curLevel());
        if (url) drewBg = D.drawBgCover(ctx, url, 0, 0, W, H);
      }
      // 背景图之上叠一层暗角，提升敌人/HUD 可读性
      if (drewBg) {
        const ov = ctx.createLinearGradient(0, 0, 0, H);
        ov.addColorStop(0, 'rgba(8,6,5,.35)'); ov.addColorStop(.5, 'rgba(8,6,5,.18)'); ov.addColorStop(1, 'rgba(8,6,5,.55)');
        ctx.fillStyle = ov; ctx.fillRect(0, 0, W, H);
      }
      // 行进车道参考线 (半透明，叠在背景上)
      ctx.strokeStyle = drewBg ? 'rgba(0,0,0,.12)' : 'rgba(0,0,0,.18)'; ctx.lineWidth = 1;
      for (let i = 0; i <= 6; i++) { const y = B.laneTop + (B.laneBottom - B.laneTop) * (i / 6); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
      // barricade (防线/最后一道关卡)
      ctx.fillStyle = drewBg ? 'rgba(36,26,20,.92)' : '#241a14'; ctx.fillRect(0, B.laneBottom, W, H - B.laneBottom);
      for (let x = 0; x < W; x += 46) { ctx.fillStyle = '#3a2a1c'; ctx.fillRect(x, B.laneBottom + 6, 40, 16); ctx.fillStyle = '#1e150d'; ctx.fillRect(x, B.laneBottom + 20, 40, 6); }
      ctx.strokeStyle = 'rgba(255,75,58,.35)'; ctx.lineWidth = 3; ctx.setLineDash([10, 8]);
      ctx.beginPath(); ctx.moveTo(0, B.laneBottom); ctx.lineTo(W, B.laneBottom); ctx.stroke(); ctx.setLineDash([]);
    }
    function elColorOf(elKey) { return (game_config.elements[elKey] && game_config.elements[elKey].color) || '#888'; }
    function elEmojiOf(elKey) { return (game_config.elements[elKey] && game_config.elements[elKey].emoji) || '✨'; }
    function elNameOf(elKey) { return (game_config.elements[elKey] && game_config.elements[elKey].name) || elKey; }
    // 系别能力说明：该系克制谁、被谁克制 (自然为平衡)
    function elAbilityText(elKey) {
      const els = game_config.elements;
      const e = els[elKey]; if (!e) return '';
      if (e.balanced) return '平衡之力 · 无克制无弱点';
      const beats = e.beats;                                   // 该系克制的目标
      const counteredBy = Object.keys(els).find(k => els[k].beats === elKey); // 克制该系的系别
      const parts = [];
      if (beats) parts.push(`克制 ${elEmojiOf(beats)}${elNameOf(beats)}`);
      if (counteredBy) parts.push(`惧 ${elEmojiOf(counteredBy)}${elNameOf(counteredBy)}`);
      return parts.join(' · ');
    }

    function drawEnemy(e) {
      const cx = e.x + Math.sin(e.wob) * 3, cy = e.y;
      const w = e.w, h = e.h;
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.beginPath(); ctx.ellipse(cx, cy + h / 2, w * 0.5, 6, 0, 0, Math.PI * 2); ctx.fill();
      // 精英脉冲光环
      if (e.isElite) {
        ctx.save(); ctx.globalAlpha = .35 + Math.sin(B.elapsed * 5 + e.wob) * .15; ctx.strokeStyle = elColorOf(e.element); ctx.lineWidth = 3; ctx.shadowColor = elColorOf(e.element); ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.arc(cx, cy - h * 0.1, w * 0.72, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
      }
      // element aura ring
      ctx.save(); ctx.globalAlpha = e.isBoss ? .5 : .3; ctx.fillStyle = elColorOf(e.element);
      ctx.beginPath(); ctx.arc(cx, cy - h * 0.1, w * 0.62, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      // 灼烧火焰底色
      if (e.burnT > 0) { ctx.save(); ctx.globalAlpha = .3 + Math.random() * .2; ctx.fillStyle = '#ff7a2a'; ctx.beginPath(); ctx.arc(cx, cy - h * 0.1, w * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
      // 冰封霜冻覆层
      if (e.frozenT > 0) { ctx.save(); ctx.globalAlpha = .45; ctx.fillStyle = '#bfe9ff'; ctx.beginPath(); ctx.arc(cx, cy - h * 0.1, w * 0.55, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore(); }
      // pet sprite (idle col=0; row = 形态 baby/teen/adult/elder)
      const size = (e.isBoss ? 96 : 52) * (1 + (e.formRow || 0) * 0.05);
      const formRow = e.formRow || 0;
      let drew = false;
      if (e.spriteUrl) drew = drawSheetCell(ctx, e.spriteUrl, formRow, 0, cx - size / 2, cy - size * 0.62, size, size);
      if (!drew) {
        // fallback drawn zombie
        ctx.save(); ctx.translate(cx, cy);
        ctx.fillStyle = e.slowT > 0 ? '#6f9bd6' : '#e8e6df'; ctx.fillRect(-w / 2, -h / 4, w, h * 0.55);
        ctx.fillStyle = e.theme.color; ctx.fillRect(-w / 2, h * 0.18, w, h * 0.28);
        ctx.fillStyle = e.isBoss ? '#9c6b4a' : '#cdb79a'; ctx.beginPath(); ctx.arc(0, -h / 2 + 6, w * 0.32, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
      // boss crown + 形态名
      if (e.isBoss) {
        ctx.font = '18px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('👑', cx, cy - h * 0.62 - 6);
        ctx.font = 'bold 9px sans-serif'; ctx.fillStyle = '#ffd24a';
        ctx.fillText(e.name, cx, cy - h * 0.62 - 22);
      }
      // elite crown-star + 标签
      if (e.isElite) {
        ctx.font = '13px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('⭐', cx, cy - h * 0.58 - 4);
        ctx.font = 'bold 8px sans-serif'; ctx.fillStyle = elColorOf(e.element); ctx.fillText('精英', cx, cy - h * 0.58 - 16);
      }
      // element badge
      ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(elEmojiOf(e.element), cx + w * 0.42, cy - h * 0.35);
      if (e.stunT > 0) { ctx.fillStyle = '#ffe14a'; ctx.font = '14px sans-serif'; ctx.fillText('✦', cx, cy - h / 2 - 8); }
      if (e.shockT > 0) { ctx.fillStyle = '#bdf0ff'; ctx.font = '13px sans-serif'; ctx.fillText('⚡', cx - w * 0.42, cy - h * 0.35); }
      if (e.burnT > 0) { ctx.fillStyle = '#ff8a2a'; ctx.font = '13px sans-serif'; ctx.fillText('🔥', cx - w * 0.42, cy - h * 0.1); }
      // hp bar
      if (e.hp < e.hpMax) {
        const bw = Math.max(e.w, e.isBoss ? 80 : 30); ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(cx - bw / 2, cy - e.h / 2 - 12, bw, 4);
        ctx.fillStyle = e.isBoss ? '#ff5a3c' : '#7CFC00'; ctx.fillRect(cx - bw / 2, cy - e.h / 2 - 12, bw * (e.hp / e.hpMax), 4);
      }
    }
    function drawHero(h) {
      const x = h.x;
      const formRow = heroFormRow(h.lvl);
      // 发技能起伏：bob∈[0,1] → 用 sin 做一次向上的弹跳位移
      const bobOff = h.bob > 0 ? -Math.sin(h.bob * Math.PI) * 7 : 0;
      const y = h.y + bobOff;
      // 按下时绘制攻击半径圈 (画在最底层，半透明)；'ALL' = 显示全体
      if (B.selectedHero === h || B.selectedHero === 'ALL') {
        const range = skillRange(h);
        ctx.save();
        ctx.fillStyle = elColorOf(h.element); ctx.globalAlpha = 0.10;
        ctx.beginPath(); ctx.arc(h.x, h.y - 6, range, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.55; ctx.lineWidth = 2; ctx.setLineDash([8, 6]);
        ctx.strokeStyle = elColorOf(h.element);
        ctx.beginPath(); ctx.arc(h.x, h.y - 6, range, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
        // 半径数值标注
        ctx.globalAlpha = 0.85; ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('攻击半径 ' + Math.round(range), h.x, h.y - 6 - range - 4);
        ctx.restore();
      }
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,.35)'; ctx.beginPath(); ctx.ellipse(x, h.y + 28, 22, 6, 0, 0, Math.PI * 2); ctx.fill();
      // element aura ring (越高形态光环越大)
      ctx.fillStyle = elColorOf(h.element); ctx.globalAlpha = .28; ctx.beginPath(); ctx.arc(x, y - 6, 24 + formRow * 2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
      // pet sprite (col=happy anim; row = 形态)，体型随形态变大
      const size = 52 * (1 + formRow * 0.08);
      let drew = false;
      if (h.spriteUrl) drew = drawSheetCell(ctx, h.spriteUrl, formRow, 1, x - size / 2, y - size * 0.66, size, size);
      if (!drew) {
        // 宠物图未就绪时的占位：角色配色圆形 (不再用 emoji)
        ctx.fillStyle = h.def.color || '#888'; ctx.beginPath(); ctx.arc(x, y - 10, size * 0.42, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,.25)'; ctx.beginPath(); ctx.arc(x - size * 0.12, y - size * 0.22, size * 0.14, 0, Math.PI * 2); ctx.fill();
      }
      // muzzle flash
      if (h.muzzle) { ctx.fillStyle = 'rgba(255,200,80,.9)'; ctx.beginPath(); ctx.arc(x, y - 30, 5 + Math.random() * 3, 0, Math.PI * 2); ctx.fill(); }
      // elder 最终形态加金色光圈
      if (formRow >= 3) { ctx.strokeStyle = '#ffd24a'; ctx.globalAlpha = .6 + Math.sin(B.elapsed * 6) * .2; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y - 6, 26, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1; }
      // element badge
      ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic'; ctx.fillText(elEmojiOf(h.element), x + 16, y - 18);
      // 名字 + 等级徽章并排一行：名字居左、等级圆圈紧贴名字右侧，二者整体水平居中、互不重叠
      const lvNum = Math.floor(h.lvl);
      const nameY = h.y + 26, br = 7, gap = 4;
      ctx.font = 'bold 9px sans-serif';
      const nameW = ctx.measureText(h.def.name).width;
      const totalW = nameW + gap + br * 2;   // 名字 + 间隙 + 圆圈直径
      const startX = x - totalW / 2;          // 整体水平居中
      // 名字 (左对齐，从 startX 开始)
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic'; ctx.fillStyle = '#fff';
      ctx.fillText(h.def.name, startX, nameY);
      // 等级圆圈 (在名字右侧)
      const bx = startX + nameW + gap + br, by = nameY - 3;
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1208'; ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = '#ffd24a'; ctx.stroke();
      ctx.fillStyle = '#ffe7a0'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(lvNum), bx, by + 0.5);
      ctx.restore();
      // 技能 CD 读条：在角色脚下绘制一个小进度条 (满=即将发招)
      drawHeroCdBar(h);
    }
    // 角色技能冷却读条 (脚下小条)
    function drawHeroCdBar(h) {
      const bw = 34, bh = 4, bx = h.x - bw / 2, by = h.y + 32;
      const cdMax = h.cdMax || h.def.skill.fireRate || 1000;
      // h.cd 从 cdMax 递减到 0；进度 = 已冷却比例
      const prog = Math.max(0, Math.min(1, 1 - (h.cd / cdMax)));
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,.55)'; roundRect(bx, by, bw, bh, 2); ctx.fill();
      // 接近就绪渐变到亮色
      const ready = prog >= 0.999;
      ctx.fillStyle = ready ? '#ffd24a' : elColorOf(h.element);
      if (ready) { ctx.shadowColor = '#ffd24a'; ctx.shadowBlur = 6; }
      roundRect(bx, by, bw * prog, bh, 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255,255,255,.25)'; ctx.lineWidth = 1; roundRect(bx, by, bw, bh, 2); ctx.stroke();
      ctx.restore();
    }
    function drawBullets() { for (const b of B.bullets) { ctx.save(); ctx.shadowColor = b.color; ctx.shadowBlur = 8; ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); ctx.restore(); } }
    function drawParticles() { for (const p of B.particles) { ctx.globalAlpha = Math.max(0, p.life / p.max); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); } ctx.globalAlpha = 1; }
    // 召唤物绘制 (民兵=圆形小兵带宠物缩略；炮塔=方形机枪)
    function drawSummons() {
      for (const s of B.summons) {
        const fade = s.t < 1.5 ? (0.4 + 0.6 * Math.abs(Math.sin(B.elapsed * 12))) : 1;
        ctx.save(); ctx.globalAlpha = fade;
        ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.beginPath(); ctx.ellipse(s.x, s.y + 12, 16, 4, 0, 0, Math.PI * 2); ctx.fill();
        if (s.kind === 'turret') {
          // 炮塔：底座+炮管
          ctx.fillStyle = '#2a2a2e'; roundRect(s.x - 14, s.y - 6, 28, 18, 4); ctx.fill();
          ctx.fillStyle = s.color; roundRect(s.x - 5, s.y - 22, 10, 18, 3); ctx.fill();
          ctx.fillStyle = '#111'; ctx.fillRect(s.x - 3, s.y - 30, 6, 10);
          ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('🛡️', s.x, s.y + 6);
        } else {
          // 民兵：用领队宠物缩略图，否则配色圆
          let drew = false;
          if (s.spriteUrl) drew = drawSheetCell(ctx, s.spriteUrl, 0, 1, s.x - 18, s.y - 30, 36, 36);
          if (!drew) { ctx.fillStyle = s.color; ctx.beginPath(); ctx.arc(s.x, s.y - 8, 14, 0, Math.PI * 2); ctx.fill(); }
          ctx.strokeStyle = s.color; ctx.lineWidth = 2; ctx.globalAlpha = fade * .6; ctx.beginPath(); ctx.arc(s.x, s.y - 8, 18, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.restore();
        // 召唤物血条(民兵)
        if (s.kind === 'minion' && s.hp < s.hpMax) { ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(s.x - 16, s.y - 34, 32, 3); ctx.fillStyle = '#7CFC00'; ctx.fillRect(s.x - 16, s.y - 34, 32 * (s.hp / s.hpMax), 3); }
      }
    }
    // 持续场地效果绘制
    function drawFields() {
      for (const f of B.fields) {
        ctx.save();
        if (f.kind === 'field' || f.kind === 'storm') {
          ctx.globalAlpha = 0.12 + Math.sin(B.elapsed * 8) * 0.06; ctx.fillStyle = f.kind === 'storm' ? '#5a7bff' : '#9b6bff';
          ctx.fillRect(0, B.laneTop, D.W, B.laneBottom - B.laneTop);
          // 随机电弧
          if (Math.random() < 0.4) { const x = Math.random() * D.W; ctx.globalAlpha = .5; ctx.strokeStyle = f.kind === 'storm' ? '#bfe9ff' : '#d6baff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x, B.laneTop); ctx.lineTo(x + (Math.random() - .5) * 30, B.laneBottom); ctx.stroke(); }
        } else if (f.kind === 'sanctuary') {
          ctx.globalAlpha = 0.1 + Math.sin(B.elapsed * 4) * 0.05; ctx.fillStyle = '#2ecc71'; ctx.fillRect(0, B.laneTop, D.W, B.laneBottom - B.laneTop);
        } else if (f.kind === 'shieldglow') {
          ctx.globalAlpha = 0.25 + Math.sin(B.elapsed * 6) * 0.1; ctx.strokeStyle = '#16e0c0'; ctx.lineWidth = 5; ctx.strokeRect(2, 2, D.W - 4, B.laneBottom - 4);
        }
        ctx.restore();
      }
    }
    function drawFloaters() {
      ctx.textAlign = 'center';
      for (const f of B.floaters) {
        ctx.globalAlpha = Math.max(0, f.life / (f.big ? 1.6 : .7));
        ctx.font = f.big ? 'bold 22px sans-serif' : 'bold 14px sans-serif';
        ctx.fillStyle = f.color; ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.lineWidth = f.big ? 4 : 3;
        ctx.strokeText(f.txt, f.x, f.y); ctx.fillText(f.txt, f.x, f.y);
      }
      ctx.globalAlpha = 1;
    }

    function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }
    function fmt(s) { const m = Math.floor(s / 60), ss = Math.floor(s % 60); return (m < 10 ? '0' : '') + m + ':' + (ss < 10 ? '0' : '') + ss; }
    function drawHUD() {
      const W = D.W, H = D.H, c = curLevel();
      ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(0, 0, W, 50);
      ctx.fillStyle = 'rgba(0,0,0,.5)'; roundRect(8, 8, 56, 30, 6); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.fillRect(22, 15, 5, 16); ctx.fillRect(31, 15, 5, 16);
      ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left'; ctx.fillText(fmt(B.elapsed), 42, 27);
      ctx.textAlign = 'center'; ctx.font = 'bold 17px sans-serif'; ctx.fillStyle = '#ffe7c2'; ctx.fillText(c.name, W / 2, 24);
      const waveNo = Math.min(B.waveIndex + 1, B.waves.length);
      const waveTxt = B.waveResting ? '波次间隙…' : ('第 ' + waveNo + '/' + B.waves.length + ' 波' + (B.waves[B.waveIndex] && B.waves[B.waveIndex].boss ? ' 👑' : ''));
      ctx.font = '11px sans-serif'; ctx.fillStyle = '#ffd9a0'; ctx.fillText(waveTxt, W / 2, 40);
      ctx.fillStyle = B.speedMul > 1 ? '#e08a17' : 'rgba(0,0,0,.5)'; roundRect(W - 62, 8, 54, 30, 14); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('x' + B.speedMul.toFixed(1), W - 35, 27);
      ctx.fillStyle = 'rgba(0,0,0,.4)'; ctx.fillRect(0, 50, W, 6);
      ctx.fillStyle = '#ffd24a'; ctx.fillRect(0, 50, W * (B.xp / B.xpNeed), 6);
      ctx.fillStyle = 'rgba(40,20,12,.85)'; roundRect(8, 62, 110, 30, 5); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'left'; ctx.fillText('🧟 ' + B.kills + '/' + B.totalTarget, 16, 81);
      // 连杀计数 (居中偏上，连杀越高字越大越亮)
      if (B.combo >= 3) {
        const big = Math.min(1.8, 1 + B.combo * 0.012);
        ctx.textAlign = 'center'; ctx.font = 'bold ' + Math.round(16 * big) + 'px sans-serif';
        ctx.fillStyle = B.combo >= 25 ? '#ff5a3c' : (B.combo >= 10 ? '#ffd24a' : '#ffe7c2');
        ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.lineWidth = 3;
        ctx.strokeText('🔥 ' + B.combo + ' COMBO', W / 2, 108); ctx.fillText('🔥 ' + B.combo + ' COMBO', W / 2, 108);
      }
      // 过载(狂暴)提示
      if (B.overdrive > 0) {
        ctx.textAlign = 'center'; ctx.font = 'bold 14px sans-serif'; ctx.fillStyle = '#ff3a2a';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        const txt = '⚡ 过载狂暴 ' + B.overdrive.toFixed(1) + 's';
        ctx.strokeText(txt, W / 2, 130); ctx.fillText(txt, W / 2, 130);
      }
      ctx.textAlign = 'right'; ctx.font = 'bold 12px sans-serif';
      ctx.fillStyle = '#7CFC00'; ctx.fillText('💚 ' + B.cash, W - 12, B.laneBottom - 36);
      ctx.fillStyle = '#ffd24a'; ctx.fillText('⭐ ' + B.score, W - 12, B.laneBottom - 18);
      const bw = W - 24, bx = 12, by = H - 16;
      ctx.fillStyle = 'rgba(0,0,0,.6)'; roundRect(bx, by, bw, 8, 4); ctx.fill();
      const pct = B.baseHp / B.baseHpMax;
      ctx.fillStyle = pct > .5 ? '#33d35a' : (pct > .25 ? '#e0a017' : '#ff4b3a'); roundRect(bx, by, bw * pct, 8, 4); ctx.fill();
      // 护盾叠加显示(青色段)
      if (B.shield > 0) { const sp = Math.min(1, B.shield / B.baseHpMax); ctx.fillStyle = '#16e0c0'; roundRect(bx, by, bw * Math.min(1, pct + sp) , 4, 2); ctx.fill(); }
      ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('防线耐久 ' + Math.ceil(B.baseHp) + (B.shield > 0 ? (' +🛡' + Math.ceil(B.shield)) : ''), W / 2, by + 7);
      drawUltButton();
    }
    // ---- 大招按钮 + 能量环 (右下角) ----
    function drawUltButton() {
      const g = ultBtnGeo();
      const ld = leaderUnit(); if (!ld) return;
      const ready = B.energy >= B.energyMax;
      const pct = Math.min(1, B.energy / B.energyMax);
      const hasUlt = !!(ld.def && ld.def.ult);
      ctx.save();
      // 底盘
      ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.beginPath(); ctx.arc(g.cx, g.cy, g.r, 0, Math.PI * 2); ctx.fill();
      // 能量环
      ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.beginPath(); ctx.arc(g.cx, g.cy, g.r - 3, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = ready ? '#ffd24a' : ld.color; if (ready) { ctx.shadowColor = '#ffd24a'; ctx.shadowBlur = 14; }
      ctx.beginPath(); ctx.arc(g.cx, g.cy, g.r - 3, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct); ctx.stroke();
      ctx.shadowBlur = 0;
      // 中心图标(就绪时呼吸放大)
      const scale = ready ? (1 + Math.sin(B.elapsed * 6) * 0.08) : 1;
      const r2 = (g.r - 12) * scale;
      ctx.fillStyle = ready ? 'radial-gradient' : '';
      ctx.beginPath(); ctx.arc(g.cx, g.cy, r2, 0, Math.PI * 2);
      ctx.fillStyle = ready ? ld.color : 'rgba(60,40,30,.85)'; ctx.fill();
      // 大招宠物头像 or 图标
      let drew = false;
      if (ld.spriteUrl) drew = drawSheetCell(ctx, ld.spriteUrl, heroFormRow(ld.lvl), 1, g.cx - r2 * .8, g.cy - r2 * .85, r2 * 1.6, r2 * 1.6);
      ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
      if (!hasUlt) { ctx.fillText('无', g.cx, g.cy + 3); }
      else if (ready) { ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.fillText('大招!', g.cx, g.cy + g.r - 6); }
      else { ctx.fillStyle = '#ffd9a0'; ctx.fillText(Math.floor(pct * 100) + '%', g.cx, g.cy + g.r - 6); }
      ctx.restore();
    }
    function drawZaps() {
      if (!B.zaps || !B.zaps.length) return;
      ctx.save();
      for (const z of B.zaps) {
        const a = Math.max(0, z.life / 0.18);
        ctx.globalAlpha = a; ctx.strokeStyle = z.color || '#bdf0ff'; ctx.lineWidth = 2.5; ctx.shadowColor = z.color || '#bdf0ff'; ctx.shadowBlur = 10;
        // 折线闪电
        const segs = 4; ctx.beginPath(); ctx.moveTo(z.x1, z.y1);
        for (let i = 1; i < segs; i++) { const t = i / segs; const mx = z.x1 + (z.x2 - z.x1) * t + (Math.random() - .5) * 14; const my = z.y1 + (z.y2 - z.y1) * t + (Math.random() - .5) * 14; ctx.lineTo(mx, my); }
        ctx.lineTo(z.x2, z.y2); ctx.stroke();
      }
      ctx.restore();
    }
    function render() {
      ctx.save();
      // 屏幕震动
      if (B.shake > 0.5) { const s = B.shake; ctx.translate((Math.random() - .5) * s, (Math.random() - .5) * s); }
      ctx.clearRect(-20, -20, D.W + 40, D.H + 40);
      drawBackground();
      drawFields();
      // 过载狂暴时的红色脉冲叠加
      if (B.overdrive > 0) { ctx.save(); ctx.globalAlpha = 0.08 + Math.sin(B.elapsed * 10) * 0.05; ctx.fillStyle = '#ff3a2a'; ctx.fillRect(0, 0, D.W, D.H); ctx.restore(); }
      B.enemies.slice().sort((a, b) => a.y - b.y).forEach(drawEnemy);
      drawZaps(); drawBullets(); drawParticles();
      drawSummons();
      B.heroes.forEach(drawHero);
      drawFloaters();
      // 大招全屏闪白演出
      if (B.flash > 0) { ctx.save(); ctx.globalAlpha = Math.min(0.7, B.flash); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, D.W, D.H); ctx.restore(); }
      ctx.restore();
      drawHUD();
    }

    // ---- loop ----
    function loop(t) {
      const dt = Math.min(0.05, (t - lastTime) / 1000) || 0; lastTime = t;
      if (B.running && !B.paused) update(dt);
      if (G.screen === 'battle') render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>

  <!-- ============ chunk 4: 商店 / 背包 / 地图 三个主界面 (模拟参考图布局) ============ -->
  <script>
  (function () {
    'use strict';
    const D = window.__GD;
    const G = D.G, heroDef = D.heroDef, el = D.el, ui = D.ui;
    const buildBottomNav = window.__buildBottomNav, buildTopBar = window.__buildTopBar;
    const toast = window.__toast || function () {};
    const elColor = k => (game_config.elements[k] && game_config.elements[k].color) || '#888';

    // ---------- shared scaffold: full-screen column with top bar + body + bottom nav ----------

      wrap.appendChild(buildBottomNav(active));
      ui.innerHTML = '';
      ui.appendChild(wrap);

    }

    // ===================================================================
    //  商店 SHOP
    // ===================================================================
    const SHOP_TABS = [
      { k: 'gem',   t: '钻石', e: '💎' },
      { k: 'gear',  t: '装备', e: '🛡️' },
      { k: 'hero',  t: '角色', e: '🧑‍🤝‍🧑' },
      { k: 'daily', t: '每日', e: '📅' }
    ];
    let shopTab = 'gem';

    const SHOP_GOODS = {
      gem: [
        { id: 'g1', name: '一小袋钻石', emoji: '💎', amount: '×60',   price: '¥6',  tag: '' },
        { id: 'g2', name: '一把钻石',   emoji: '💎', amount: '×300',  price: '¥30', tag: '热卖' },
        { id: 'g3', name: '一堆钻石',   emoji: '💎', amount: '×680',  price: '¥68', tag: '超值' },
        { id: 'g4', name: '一箱钻石',   emoji: '💎', amount: '×1280', price: '¥128', tag: '' },
        { id: 'g5', name: '钻石宝库',   emoji: '💎', amount: '×3280', price: '¥328', tag: '尊享' },
        { id: 'g6', name: '钻石神殿',   emoji: '💎', amount: '×6480', price: '¥648', tag: 'MAX' }
      ],
      gear: [
        { id: 'e1', name: '钢制头盔', emoji: '🪖', amount: '+12 防御', price: '🪙 800',  tag: '' },
        { id: 'e2', name: '防弹背心', emoji: '🦺', amount: '+20 生命', price: '🪙 1200', tag: '推荐' },
        { id: 'e3', name: '战术手套', emoji: '🧤', amount: '+8 暴击',  price: '🪙 600',  tag: '' },
        { id: 'e4', name: '军用战靴', emoji: '🥾', amount: '+10 移速', price: '🪙 700',  tag: '' },

        { id: 'e6', name: '英雄勋章', emoji: '🏅', amount: '+30 全属', price: '💎 320',  tag: '史诗' }

      get hero() {
        return game_config.heroes.filter(h => h.locked).map(h => ({
          id: 'h_' + h.key, key: h.key, name: h.name, spriteUrl: h.spriteUrl, color: h.color,
          amount: h.title, price: '💎 ' + (h.unlockCost || 200), tag: '角色', element: h.element
        }));
      },
      daily: [
        { id: 'd1', name: '每日金币', emoji: '🪙', amount: '×500',  price: '免费', tag: '可领' },
        { id: 'd2', name: '每日钻石', emoji: '💎', amount: '×20',   price: '看广告', tag: '可领' },
        { id: 'd3', name: '体力补给', emoji: '🎟️', amount: '×5',   price: '🪙 200', tag: '' },
        { id: 'd4', name: '神秘礼盒', emoji: '🎁', amount: '随机奖励', price: '💎 50', tag: '限时' }

    function renderShop() {
      const body = scaffold('商店', 'shop');

      // tab strip
      const tabs = el('div', 'flex gap-2 py-2 sticky top-0 z-10');

          <span>${t.e}</span><span>${t.t}</span>
        </button>`).join('');
      body.appendChild(tabs);

      // featured banner
      const banner = el('div', 'rounded-xl p-3 mb-3 mt-1 relative overflow-hidden');
      banner.style.background = 'linear-gradient(110deg,#7a1f15,#c0392b 60%,#e0a017)';

      const goods = SHOP_GOODS[shopTab] || [];

        <div class="rounded-xl p-2 flex flex-col items-center text-center relative"

          ${g.tag ? `<div class="absolute top-1 left-1 px-2 py-[1px] rounded-full text-[9px] font-bold text-black bg-amber-400">${g.tag}</div>` : ''}
          <div class="mt-2 mb-1 flex items-center justify-center" style="height:48px;">
            ${g.spriteUrl ? D.petAvatarHTML(g.spriteUrl, 48) : `<div class="text-4xl">${g.emoji}</div>`}
          </div>
          <div class="text-[12px] font-bold text-amber-100">${g.name}</div>

          <button data-buy="${g.id}" class="mt-2 w-full py-[6px] rounded-lg text-[12px] font-black text-white"

        </div>`).join('');
      body.appendChild(grid);

      tabs.querySelectorAll('[data-stab]').forEach(b => b.addEventListener('click', () => { shopTab = b.getAttribute('data-stab'); renderShop(); }));

      grid.querySelectorAll('[data-buy]').forEach(b => b.addEventListener('click', () => {

        if (!g) return;

        if (shopTab === 'hero' && g.key) {
          const cost = heroDef(g.key)?.unlockCost || 200;
          if (G.unlocked[g.key]) { toast(g.name + ' 已拥有'); return; }
          if (G.gems >= cost) { G.gems -= cost; G.unlocked[g.key] = true; D.saveProgress(); toast('🎉 解锁 ' + g.name); renderShop(); }
          else toast('💎 不足');
          return;
        }
        if (shopTab === 'daily' && g.id === 'd1') { G.coins += 500; D.saveProgress(); toast('🪙 +500'); renderShop(); return; }
        if (shopTab === 'daily' && g.id === 'd2') { G.gems += 20; D.saveProgress(); toast('💎 +20'); renderShop(); return; }
        toast('（演示）已购买 ' + g.name);
      }));
    }
    window.__renderShop = renderShop;

    // ===================================================================
    //  背包 BAG  (角色立绘 + 6 个装备槽 + 三类背包标签)
    // ===================================================================
    // 6 装备槽 (对应参考图：头盔/护甲/护腿/战靴/手套/徽章)
    const EQUIP_SLOTS = [
      { k: 'helmet', t: '头盔', e: '🪖' },
      { k: 'armor',  t: '护甲', e: '🦺' },
      { k: 'legs',   t: '护腿', e: '👖' },
      { k: 'boots',  t: '战靴', e: '🥾' },
      { k: 'gloves', t: '手套', e: '🧤' },
      { k: 'badge',  t: '徽章', e: '🎖️' }
    ];
    const BAG_TABS = [
      { k: 'gear', t: '装备背包', e: '🛡️' },
      { k: 'badge', t: '徽章背包', e: '🎖️' },
      { k: 'mat', t: '素材背包', e: '🧪' }
    ];
    const BAG_ITEMS = {
      gear: [
        { e: '🪖', n: '钢盔', q: 2 }, { e: '🦺', n: '背心', q: 1 }, { e: '👖', n: '护腿', q: 3 },
        { e: '🥾', n: '战靴', q: 1 }, { e: '🧤', n: '手套', q: 2 }, { e: '🛡️', n: '盾牌', q: 1 }
      ],
      badge: [
        { e: '🎖️', n: '攻击徽章', q: 1 }, { e: '🏅', n: '防御徽章', q: 2 }, { e: '🥇', n: '暴击徽章', q: 1 },
        { e: '🎗️', n: '幸运徽章', q: 4 }
      ],
      mat: [
        { e: '🔩', n: '螺丝', q: 28 }, { e: '⚙️', n: '齿轮', q: 12 }, { e: '🧪', n: '强化液', q: 6 },
        { e: '💠', n: '结晶', q: 3 }, { e: '🪵', n: '木料', q: 40 }, { e: '🧱', n: '铁块', q: 17 }
      ]
    };
    let bagTab = 'gear';
    let bagHeroIdx = 0; // which owned hero to show

    function ownedHeroes() { return game_config.heroes.filter(h => G.unlocked[h.key]); }

    function renderBag() {
      const body = scaffold('背包', 'bag');
      const owned = ownedHeroes();
      bagHeroIdx = Math.max(0, Math.min(bagHeroIdx, owned.length - 1));
      const h = owned[bagHeroIdx] || game_config.heroes[0];

      // 角色立绘 + 环绕 6 装备槽
      const charBox = el('div', 'relative rounded-2xl my-2 overflow-hidden');
      charBox.style.height = '300px';
      charBox.style.background = `radial-gradient(circle at 50% 30%,${h.color}33,#120d0b 75%)`;
      charBox.innerHTML = `
        <button id="bagPrev" class="absolute left-1 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-black/50 text-white text-lg z-20">‹</button>
        <button id="bagNext" class="absolute right-1 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-black/50 text-white text-lg z-20">›</button>
        <!-- 立绘 (webp 宠物精灵占位) -->
        <div class="absolute inset-0 flex items-center justify-center">
          <canvas id="bagCanvas" width="200" height="200" style="image-rendering:auto;"></canvas>
          <div class="text-[12px] text-stone-300 absolute" id="bagEmoji">形象加载中…</div>
        </div>
        <!-- 名字 + 元素 -->
        <div class="absolute top-2 left-2 z-10">
          <div class="text-lg font-black text-white" style="text-shadow:0 2px 4px #000;">${h.name}</div>
          <div class="text-[11px]" style="color:${elColor(h.element)};">${elEmoji(h.element)} ${elName(h.element)}系 · ${h.title}</div>
        </div>
        <!-- 左侧 3 槽 -->
        <div class="absolute left-2 top-1/2 -translate-y-1/2 flex flex-col gap-2 z-10">
          ${EQUIP_SLOTS.slice(0,3).map(s => slotHtml(s)).join('')}
        </div>
        <!-- 右侧 3 槽 -->
        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col gap-2 z-10">
          ${EQUIP_SLOTS.slice(3).map(s => slotHtml(s)).join('')}
        </div>`;
      body.appendChild(charBox);

      // 战力条
      const power = el('div', 'flex items-center justify-between bg-black/40 rounded-xl px-3 py-2 mb-2 border border-amber-900/40');
      const lvl = G.heroLevel[h.key] || 1;
      power.innerHTML = `
        <div class="text-[12px] text-stone-300">综合战力</div>
        <div class="text-xl font-black text-amber-300">⚡ ${(h.stats.phys * 12 + h.stats.crit * 8 + lvl * 60)}</div>`;
      body.appendChild(power);

      // 三类背包标签
      const tabs = el('div', 'flex gap-2 mb-2');
      tabs.innerHTML = BAG_TABS.map(t => `
        <button data-btab="${t.k}" class="flex-1 py-2 rounded-xl text-[12px] font-bold flex items-center justify-center gap-1"
          style="${t.k === bagTab ? 'background:linear-gradient(#c0392b,#7a1f15);color:#fff;box-shadow:0 2px 0 #4a120c;' : 'background:rgba(0,0,0,.4);color:#cbb;'}">
          <span>${t.e}</span><span>${t.t}</span>
        </button>`).join('');
      body.appendChild(tabs);

      // 物品格子
      const items = BAG_ITEMS[bagTab] || [];
      const grid = el('div', 'grid grid-cols-4 gap-2 pb-3');
      grid.innerHTML = items.map(it => `
        <div class="aspect-square rounded-xl flex flex-col items-center justify-center relative"
          style="background:linear-gradient(#2a221c,#171210);border:1px solid rgba(255,255,255,.08);">
          <div class="text-3xl">${it.e}</div>
          <div class="text-[9px] text-stone-300 mt-[1px]">${it.n}</div>
          <div class="absolute bottom-[2px] right-[3px] text-[10px] font-bold text-amber-300">×${it.q}</div>
        </div>`).join('')
        // pad empty slots
        + Array.from({ length: Math.max(0, 8 - items.length) }).map(() => `
        <div class="aspect-square rounded-xl flex items-center justify-center" style="background:rgba(0,0,0,.3);border:1px dashed rgba(255,255,255,.08);"><span class="text-stone-600 text-lg">＋</span></div>`).join('');
      body.appendChild(grid);

      // draw portrait
      drawBagPortrait(h);

      charBox.querySelector('#bagPrev').addEventListener('click', () => { bagHeroIdx = (bagHeroIdx - 1 + owned.length) % owned.length; renderBag(); });
      charBox.querySelector('#bagNext').addEventListener('click', () => { bagHeroIdx = (bagHeroIdx + 1) % owned.length; renderBag(); });
      charBox.querySelectorAll('[data-slot]').forEach(b => b.addEventListener('click', () => toast('装备槽：' + b.getAttribute('data-slotname') + '（演示）')));
      tabs.querySelectorAll('[data-btab]').forEach(b => b.addEventListener('click', () => { bagTab = b.getAttribute('data-btab'); renderBag(); }));
    }

    function slotHtml(s) {
      return `<button data-slot="${s.k}" data-slotname="${s.t}" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center"
        style="background:rgba(0,0,0,.5);border:2px solid rgba(217,154,58,.45);">
        <div class="text-xl">${s.e}</div>
        <div class="text-[7px] text-stone-300 -mt-[2px]">${s.t}</div>
      </button>`;
    }

    function drawBagPortrait(h) {
      const cv = document.getElementById('bagCanvas');
      const emoji = document.getElementById('bagEmoji');
      if (!cv || !h.spriteUrl) return;
      const cc = cv.getContext('2d');
      const lvl = G.heroLevel[h.key] || 1;
      const formRow = lvl >= 8 ? 3 : lvl >= 5 ? 2 : lvl >= 3 ? 1 : 0;
      const draw = () => { cc.clearRect(0, 0, cv.width, cv.height); const ok = D.drawSheetCell(cc, h.spriteUrl, formRow, 1, 10, 10, 180, 180); if (ok && emoji) emoji.style.display = 'none'; return ok; };
      if (!draw()) { let n = 0; const iv = setInterval(() => { if (draw() || ++n > 20) clearInterval(iv); }, 120); }
    }
    window.__renderBag = renderBag;

    // ===================================================================
    //  地图 MAP  (古墓秘境/关卡节点)
    // ===================================================================
    const MAP_NODES = [
      { id: 1, name: '行脚商铺', e: '🏪', x: 18, y: 18, type: 'shop' },
      { id: 2, name: '荒废校墓', e: '🪦', x: 62, y: 14, type: 'lvl', lvl: 0 },
      { id: 3, name: '地下阴河', e: '🌊', x: 30, y: 42, type: 'lvl', lvl: 2 },
      { id: 4, name: '休整营地', e: '🏕️', x: 74, y: 40, type: 'heal' },
      { id: 5, name: '古墓主殿', e: '🏛️', x: 20, y: 66, type: 'lvl', lvl: 1 },
      { id: 6, name: '雪山铜门', e: '🚪', x: 58, y: 64, type: 'boss' },
      { id: 7, name: '矿井古墓', e: '⛏️', x: 40, y: 86, type: 'final' }
    ];

    function renderMap() {
      const body = scaffold('地图 · 古墓秘境', 'map');

      const board = el('div', 'relative rounded-2xl my-2 overflow-hidden');
      board.style.height = 'calc(100% - 16px)';
      board.style.minHeight = '440px';
      board.style.background = 'linear-gradient(180deg,#3a4a3a,#222018 70%,#15110d)';
      // 盗墓主殿场景作为地图底图 (引用 art_assets)，叠暗角与纹理
      const mapBgUrl = (D.ART && D.ART.byId && D.ART.byId.ancient_tomb_hall && D.ART.byId.ancient_tomb_hall.imageUrl) || '';
      board.innerHTML = `
        ${mapBgUrl ? `<img src="${mapBgUrl}" alt="" class="absolute inset-0 w-full h-full object-cover opacity-45" onerror="this.style.display='none'">` : ''}
        <div class="absolute inset-0" style="background:linear-gradient(180deg,rgba(10,7,5,.35),rgba(10,7,5,.65));"></div>
        <div class="absolute inset-0 grain opacity-50"></div>`;

      // connection lines (svg)
      const svg = `
        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
          ${[[2,1],[1,5],[5,3],[3,6],[6,4],[3,7]].map(([a,b])=>{
            const A = MAP_NODES.find(n=>n.id===a), Bn = MAP_NODES.find(n=>n.id===b);
            return `<line x1="${A.x}" y1="${A.y}" x2="${Bn.x}" y2="${Bn.y}" stroke="rgba(217,154,58,.5)" stroke-width=".6" stroke-dasharray="2 1.5"/>`;
          }).join('')}
        </svg>`;
      board.insertAdjacentHTML('beforeend', svg);

      // nodes
      MAP_NODES.forEach(n => {
        const cleared = n.type === 'lvl' && G.cleared && G.cleared[(game_config.levels[n.lvl] || {}).id];
        const node = el('button', 'absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center');
        node.style.left = n.x + '%';
        node.style.top = n.y + '%';
        node.setAttribute('data-node', n.id);
        const ring = n.type === 'boss' ? '#e84393' : n.type === 'final' ? '#f1c40f' : n.type === 'shop' ? '#36c45a' : '#d99a3a';
        node.innerHTML = `
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl relative"
               style="background:radial-gradient(circle at 40% 30%,#fff2,#0006);border:3px solid ${ring};box-shadow:0 0 14px ${ring}66;">
            ${n.e}
            ${cleared ? '<div class="absolute -top-1 -right-1 text-sm">✅</div>' : ''}
          </div>
          <div class="mt-1 px-2 py-[1px] rounded-full bg-black/70 text-[10px] text-amber-100 font-bold whitespace-nowrap">${n.name}</div>`;
        board.appendChild(node);
      });
      body.appendChild(board);

      board.querySelectorAll('[data-node]').forEach(b => b.addEventListener('click', () => {
        const n = MAP_NODES.find(x => x.id === +b.getAttribute('data-node'));
        if (!n) return;
        if (n.type === 'shop') { window.__show('shop'); return; }
        if (n.type === 'heal') { toast('�️ 已休整，长明灯油量恢复'); return; }
        if (n.type === 'lvl' && game_config.levels[n.lvl]) { G.lvlIndex = n.lvl; D.saveProgress(); window.__show('battle'); return; }
        if (n.type === 'boss') { G.lvlIndex = Math.min(2, game_config.levels.length - 1); window.__show('battle'); return; }
        if (n.type === 'final') { toast('⛏️ 墓主主墓 · 通关全部关卡后开放'); return; }
      }));
    }
    window.__renderMap = renderMap;

  })();
  </script>
</body>

</html>
