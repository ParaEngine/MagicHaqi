<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>盗墓笔记·守陵防线</title>
  <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    /* 固定游戏画面比例：root 由 JS 计算成固定 ratio 的居中盒子。
       四周留白(letterbox/pillarbox)区域使用古墓主题装饰背景图填充(宽屏/大屏更明显)，加载失败回退到纯黑。 */
    body {
      display: flex; align-items: center; justify-content: center;
      background-color: #000;
      background-image: url('https://cdn.keepwork.com/artassets/my_project/ancient_tomb_ui_background_20260615021246.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    #root { box-shadow: 0 0 40px rgba(0,0,0,.8); }
    * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
    #gameCanvas { display: block; touch-action: none; }
    .scrollx::-webkit-scrollbar { display: none; }
    @keyframes floatUp { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-40px) scale(1.4); } }
    @keyframes cardPop { from { opacity: 0; transform: translateY(30px) scale(.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 12px rgba(255,180,60,.5); } 50% { box-shadow: 0 0 28px rgba(255,180,60,.95); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px);} to { opacity:1; transform: translateY(0);} }
    .skill-card { animation: cardPop .35s ease both; }
    .screen { animation: slideUp .28s ease both; }
    @keyframes skillBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .skillNext { animation: skillBob 1.1s ease-in-out infinite; }
    .grain { background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px); background-size: 4px 4px; }
    .startbtn { background: repeating-linear-gradient(45deg,#f0a000,#f0a000 12px,#1a1a1a 12px,#1a1a1a 18px); }
    .startbtn-inner { background: linear-gradient(#ffb733,#e07b0a); }
    /* ===== 开战前漫画对话框 (带头像 + 一来一回) ===== */
    @keyframes bubblePopL { 0% { opacity:0; transform: translateX(-18px) scale(.9);} 60% { transform: translateX(2px) scale(1.02);} 100% { opacity:1; transform: translateX(0) scale(1);} }
    @keyframes bubblePopR { 0% { opacity:0; transform: translateX(18px) scale(.9);} 60% { transform: translateX(-2px) scale(1.02);} 100% { opacity:1; transform: translateX(0) scale(1);} }
    @keyframes bubblePopC { 0% { opacity:0; transform: translate(-50%,12px) scale(.85);} 60% { transform: translate(-50%,-2px) scale(1.03);} 100% { opacity:1; transform: translate(-50%,0) scale(1);} }
    .cbubble { position:absolute; display:flex; align-items:flex-end; gap:10px; max-width:86%; pointer-events:none; }
    .cbubble-left  { left:14px; flex-direction:row;          animation: bubblePopL .28s ease both; }
    .cbubble-right { right:14px; flex-direction:row-reverse;  animation: bubblePopR .28s ease both; }
    /* 头像：圆形描边 + 角色配色底 */
    .cbubble-av { flex:0 0 auto; width:62px; height:62px; border-radius:50%; border:3px solid #1a1208; overflow:hidden; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(0,0,0,.5); }
    .cbubble-av canvas { width:100%; height:100%; }
    .cbubble-box { position:relative; background:#eee8de; color:#1a1208; border:3px solid #1a1208; border-radius:14px; padding:14px 18px 26px; font-weight:800; font-size:15px; line-height:1.4; box-shadow:0 6px 18px rgba(0,0,0,.5); }
    .cbubble-name { position:absolute; top:-12px; background:#e07b0a; color:#fff; font-size:11px; font-weight:900; padding:1px 10px; border-radius:8px; border:2px solid #1a1208; }
    .cbubble-left  .cbubble-name { left:12px; }
    .cbubble-right .cbubble-name { right:12px; }
    /* 指向头像的小尾巴 */
    .cbubble-left  .cbubble-box::before { content:''; position:absolute; left:-13px; bottom:14px; width:0;height:0; border-top:9px solid transparent; border-bottom:9px solid transparent; border-right:13px solid #1a1208; }
    .cbubble-left  .cbubble-box::after  { content:''; position:absolute; left:-8px;  bottom:16px; width:0;height:0; border-top:6px solid transparent; border-bottom:6px solid transparent; border-right:9px solid #eee8de; }
    .cbubble-right .cbubble-box::before { content:''; position:absolute; right:-13px; bottom:14px; width:0;height:0; border-top:9px solid transparent; border-bottom:9px solid transparent; border-left:13px solid #1a1208; }
    .cbubble-right .cbubble-box::after  { content:''; position:absolute; right:-8px;  bottom:16px; width:0;height:0; border-top:6px solid transparent; border-bottom:6px solid transparent; border-left:9px solid #eee8de; }
    /* 重点居中：大字 + 头像在上方 */
    .cbubble-center { left:50%; transform:translateX(-50%); flex-direction:column; align-items:center; gap:6px; max-width:92%; animation: bubblePopC .28s ease both; }
    .cbubble-center .cbubble-av { width:72px; height:72px; }
    .cbubble-center .cbubble-box { font-size:19px; padding:16px 30px 28px; text-align:center; min-width:240px; }
    .cbubble-center .cbubble-name { position:static; margin-bottom:2px; }
    .cbubble-center .cbubble-box::before, .cbubble-center .cbubble-box::after { content:none; }
    /* 点击继续提示 */
    .cbubble-tap { position:absolute; bottom:8px; right:14px; font-size:11px; font-weight:900; color:#7a4a10; animation: tapBlink 1s ease-in-out infinite; }
    @keyframes tapBlink { 0%,100% { opacity:.35; } 50% { opacity:1; } }
    /* 战斗中登场冒泡 (头顶小对话框，自动消失，不挡操作) */
    @keyframes debutPop { 0% { opacity:0; transform:translate(-50%,8px) scale(.8);} 18% { opacity:1; transform:translate(-50%,0) scale(1.05);} 30% { transform:translate(-50%,0) scale(1);} 82% { opacity:1; } 100% { opacity:0; transform:translate(-50%,-10px) scale(.96);} }
    .debut-bubble { position:absolute; transform:translate(-50%,0); pointer-events:none; z-index:25;
      min-width:160px; max-width:280px; width:max-content;
      background:#eee8de; color:#1a1208; border:2px solid #1a1208; border-radius:10px; padding:6px 12px;
      font-size:13px; font-weight:800; line-height:1.35; text-align:center; white-space:normal; box-shadow:0 4px 12px rgba(0,0,0,.5);
      animation: debutPop 4.2s ease both; }
    .debut-bubble::after { content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%); width:0;height:0;
      border-left:7px solid transparent; border-right:7px solid transparent; border-top:9px solid #1a1208; }
    .debut-bubble .debut-name { font-size:10px; font-weight:900; margin-bottom:1px; }
    /* ===== 困难模式：跨场景的警戒封条 (STOP barricade tape) ===== */
    .danger-tape { position:absolute; left:-30%; right:-30%; height:34px; font-weight:900; font-size:15px; letter-spacing:6px;
      color:#1a1208; display:flex; align-items:center; justify-content:center; white-space:nowrap; overflow:hidden;
      background:repeating-linear-gradient(45deg,#f5c518 0 26px,#1a1208 26px 52px);
      border-top:2px solid #00000055; border-bottom:2px solid #00000055; box-shadow:0 4px 14px rgba(0,0,0,.55); pointer-events:none; }
    .danger-tape span { text-shadow:0 1px 0 #f5c51899; }
    .danger-tape-1 { top:30%; transform:rotate(-22deg); }
    .danger-tape-2 { top:54%; transform:rotate(20deg); }
    .danger-tape-3 { top:72%; transform:rotate(-14deg); }
    @keyframes dangerFlash { 0%,100%{opacity:.95;} 50%{opacity:.6;} }
    .danger-overlay { animation: dangerFlash 1.6s ease-in-out infinite; }
    .danger-skull { position:absolute; top:8px; left:50%; transform:translateX(-50%); font-size:30px; z-index:6;
      filter:drop-shadow(0 2px 4px #000); animation: dangerFlash 1.6s ease-in-out infinite; }
  </style>
</head>

<body class="bg-black text-white font-sans">
  <div id="root" class="relative overflow-hidden bg-[#14110f]" style="width:100%;height:100%;">
    <canvas id="gameCanvas" class="absolute inset-0 hidden"></canvas>
    <div id="ui" class="absolute inset-0"></div>
  </div>

  <!-- ============ Declarative data sections ============ -->
  <script>
  // Gameplay + AI-configurable story/world. A parent "setGameConfig" message can override any of this.
  game_config = {
    difficulty: "normal",
    laneCount: 4,
    baseHpStart: 100,
    startCash: 3000,
    maxSquad: 5,                 // up to 5 heroes deployed at once

    // ----- GLOBAL DIFFICULTY CURVE (新增数值体系核心) -----
    // 整体难度随「关卡序号」与「波次」双重指数式增长，让游戏逐渐变难。
    // enemy 最终 HP = baseEnemyHp * stageHpCurve(stage) * waveHpCurve(wave) * themeMul * bossMul
    curve: {
      stageHp: 0.26,        // 每推进一关，敌人血量额外 +26%（指数复利）
      stageSpd: 0.07,       // 每推进一关，敌人速度额外 +7%
      waveHp: 0.16,         // 每推进一波，敌人血量额外 +16%
      waveSpd: 0.035,       // 每推进一波，敌人速度额外 +3.5%
      eliteChanceBase: 0.06,// 精英怪基础出现概率
      eliteChancePerStage: 0.025, // 每关精英概率增量
      eliteHpMul: 2.4,      // 精英血量倍率
      eliteDmgMul: 1.6,     // 精英破防伤害倍率
      bossHpMul: 18,        // Boss 血量倍率（相对同波杂兵）
      bossDmgMul: 2.2,      // Boss 破防伤害倍率
      bountyCurve: 0.12     // 击杀奖励随关卡增长
    },

    // ----- ULTIMATE / 大招能量系统 -----
    // 主角(领队)拥有大招能量条，通过击杀与造成伤害积攒。满能量后可手动释放大招。
    // 不同大招类型(meteor/field/freezeAll/heal/summon*/blade/snipe/carpet/...)在战斗代码里实现。
    ult: {
      energyMax: 100,        // 满能量阈值
      gainPerKill: 6,        // 每击杀普通敌人获得能量
      gainPerElite: 14,      // 击杀精英
      gainPerBoss: 40,       // 击杀 Boss
      gainPerHit: 0.4,       // 每次造成命中获得少量能量
      startEnergy: 30        // 开局初始能量
    },

    // ----- SUMMON / 召唤物 -----
    // 召唤的友方单位(民兵/炮塔)会自动攻击最近敌人，存在一段时间后消失。
    summon: {
      minionHp: 40, minionDmg: 8, minionRate: 700, minionDur: 12, minionRange: 220,
      turretDmg: 14, turretRate: 480, turretRange: 320
    },

    // ----- 6 大系别 (取自 _pet_index.json 的 elementalAttribute) -----
    // 自然 = 平衡攻击，对所有人无差别 (balanced:true，既不克制也不被克制)。
    // 其余 5 系组成克制环 (环形)：火→冰→雷→暗→生命→火。
    // beats 指该系克制的目标；击中被克目标造成加成，击中克制自己的目标伤害减弱。
    elements: {
      nature: { key: "nature", name: "自然", color: "#2ecc71", emoji: "🌿", balanced: true },
      fire:   { key: "fire",   name: "火",   color: "#ff6b35", emoji: "🔥", beats: "ice"    },
      ice:    { key: "ice",    name: "冰",   color: "#5fd0ff", emoji: "❄️", beats: "thunder"},
      thunder:{ key: "thunder",name: "雷",   color: "#f1c40f", emoji: "⚡", beats: "dark"   },
      dark:   { key: "dark",   name: "暗",   color: "#8e44ad", emoji: "🌑", beats: "life"   },
      life:   { key: "life",   name: "生命", color: "#e84393", emoji: "💗", beats: "fire"   }
    },
    elementBonus: 1.75,          // 克制时伤害倍率（提高克制收益，鼓励配队博弈）
    elementPenalty: 0.55,        // 被克制时伤害倍率（加重被克惩罚）

    // ----- AI STORY CONFIG (editable by AI / parent) -----
    story: {
      title: "盗墓笔记·守陵防线",
      subtitle: "深入古墓秘境，挡住涌出的尸潮与守墓凶物",
      logo: "TOMB RAIDERS",
      intro: "一封泛黄的家族笔记，指向一座沉睡千年的古墓。带领你的盗墓小队，点亮长明灯、稳住阵脚，挡住墓中惊醒的粽子与守墓凶物，一路深入墓室核心，取出那件足以改写命运的明器。",
      // per-stage narrative shown before battle; AI can rewrite freely
      chapters: [
        { stage: "St.1-荒废校墓", text: "墓道入口尘封多年，先点亮长明灯、稳住第一道防线。" },
        { stage: "St.2-古墓主殿", text: "石棺四周机关密布，惊醒的粽子从甬道两侧涌来。" },
        { stage: "St.3-地下阴河", text: "暗河栈道湿滑，水中浮尸成群，小心精英凶物。" },
        { stage: "St.4-沙漠墓门", text: "黄沙掩埋的石门后，沉睡的守墓兽蠢蠢欲动。" },
        { stage: "St.5-雪山铜门", text: "裂谷深处的青铜巨门缓缓开启，寒气逼人。" },
        { stage: "St.6-雨林沼墓", text: "藤蔓缠绕的沼泽古墓，毒瘴与浮尸接连袭来。" },
        { stage: "St.7-沉船墓室", text: "半淹的沉船墓内，腐烂的水鬼从舱底爬出。" },
        { stage: "St.8-矿井古墓", text: "废弃矿井与古墓交错，墓主就在最深处，全力死守！" }
      ],

      // ----- PRE-BATTLE BANTER / 开战前随机对话 (盗墓题材) -----
      // 每次开战随机播放：领队开场重点台词(居中) → 一组「一来一回」对白(主角问、队友答) → 收尾重点台词(居中)。
      // 每句都带说话者头像；所有台词都需要玩家点击一下才继续。
      //   opening / closing : 居中放大的重点台词 (role:"leader" 由主角说)
      //   dialogues         : 成对对白数组，每组 = [ {role:"leader",txt}, {role:"mate",txt} ... ]
      //     role: "leader"=主角(领队)  "mate"=随机选中的某一名队友  (整组共用同一名队友)
      banter: {
        // 开场领队的重点宣言 (居中, 随机一句)
        opening: [
          "都打起精神！这趟，活着把东西取出来！",
          "灯不灭，人不退——守住这道防线！",
          "听我号令，护好长明灯，谁也别乱跑！"
        ],
        // 成对「一来一回」对白：主角(leader)与一名队友(mate)轮流说
        dialogues: [
          [
            { role: "leader", txt: "这墓的阴气……比家族笔记上写的还重。你跟紧点。" },
            { role: "mate",   txt: "放心，我从小在这行里混，鬼东西见多了。" }
          ],
          [
            { role: "leader", txt: "甬道深处有动静，粽子怕是要起来了。" },
            { role: "mate",   txt: "那就让它们起呗——枪我都压满了。" }
          ],
          [
            { role: "leader", txt: "记住老规矩，鸡鸣灯灭不摸金。" },
            { role: "mate",   txt: "可现在由不得咱们了，长明灯灭了就全交代在这儿。" }
          ],
          [
            { role: "leader", txt: "别盯着明器流口水，先保命要紧。" },
            { role: "mate",   txt: "明白！我盯左边甬道，你守长明灯。" }
          ],
          [
            { role: "leader", txt: "脚下都是水，小心浮尸从底下窜上来。" },
            { role: "mate",   txt: "我点了火把，它们最怕火光，靠不近。" }
          ],
          [
            { role: "leader", txt: "这棺材板压不住里头的东西，准备接招。" },
            { role: "mate",   txt: "来多少收多少，咱俩背靠背，谁也别想越过这道线！" }
          ]
        ],
        // 收尾重点台词 (居中, 随机一句, 由主角说)
        closing: [
          "它们来了——为了这趟买卖，死守这道防线！",
          "退无可退，今天就在这儿跟它们拼了！",
          "灯火为令，全力以赴——守住！"
        ],
        // 战斗中通过卡片首次登场时说的话 (头顶冒泡, 不暂停游戏, 随机一句)
        debut: [
          "我来助你一臂之力！",
          "这趟买卖，算我一个！",
          "粽子交给我，护好长明灯！",
          "来得正好，看我的！",
          "都让开，火力支援到了！",
          "别慌，我顶上来了！"
        ]
      }
    },

    // ----- LEVELS -----
    // 每关分多波(waves)。普通波 count 个杂兵，boss:true 的波会刷出强力 Boss。
    // 波与波之间有 restGap 毫秒的喘息。最后一波清空即通关。
    // boss:true 的波 = 1 只(或 bossCount 只)Boss + 其余刷成围绕 Boss 的小怪(随从)。
    // 波次额外属性：
    //   swarm:true   → 快速密集刷怪(冲锋潮)，spawnGap 减半
    //   elite:n      → 本波强制刷出 n 只精英怪
    //   speedMul     → 本波敌人速度额外倍率
    //   hpMul        → 本波敌人血量额外倍率
    //   tag          → HUD 上显示的波次提示语
    // bg: 引用 art_assets 里的场景 id，作为首页与战斗背景图
    levels: [
      // maxSquad: 本关允许出战角色数(含主角)，1~5，缺省=game_config.maxSquad(5)；开战时自动 trim/补齐到此值。
      { id: 1, name: "St.1-荒废校墓", diff: "简单", cost: 5,  enemyHp: 16, enemySpeed: 24, spawnGap: 1300, restGap: 2800, bg: "abandoned_school_courtyard", maxSquad: 3,
        waves: [
          { count: 10 },
          { count: 14, swarm: true, tag: "尸潮涌动" },
          { count: 10, boss: true, bossCount: 1 }
        ] },
      { id: 2, name: "St.2-古墓主殿", diff: "简单", cost: 5,  enemyHp: 22, enemySpeed: 28, spawnGap: 1200, restGap: 2700, bg: "ancient_tomb_hall",
        waves: [
          { count: 12 },
          { count: 16, elite: 2, tag: "精英先锋" },
          { count: 14, swarm: true, tag: "尸潮涌动" },
          { count: 12, boss: true, bossCount: 1 }
        ] },
      { id: 3, name: "St.3-地下阴河", diff: "普通", cost: 8, enemyHp: 30, enemySpeed: 32, spawnGap: 1100, restGap: 2500, bg: "underground_river_cavern",
        waves: [
          { count: 14 },
          { count: 18, elite: 3, tag: "凶物集结" },
          { count: 16, swarm: true, speedMul: 1.15, tag: "浮尸狂奔" },
          { count: 14, boss: true, bossCount: 1 },
          { count: 18, boss: true, bossCount: 2, tag: "双煞降临" }
        ] },
      { id: 4, name: "St.4-沙漠墓门", diff: "普通", cost: 10, enemyHp: 42, enemySpeed: 34, spawnGap: 1000, restGap: 2400, bg: "desert_ruins_tomb_gate",
        waves: [
          { count: 16, elite: 2 },
          { count: 20, swarm: true, tag: "黄沙突袭" },
          { count: 18, hpMul: 1.2, tag: "壮硕守墓兽" },
          { count: 16, boss: true, bossCount: 1, elite: 3 },
          { count: 20, boss: true, bossCount: 2, tag: "墓门守将" }
        ] },
      { id: 5, name: "St.5-雪山铜门", diff: "困难", cost: 12, enemyHp: 58, enemySpeed: 36, spawnGap: 950, restGap: 2300, bg: "snow_mountain_bronze_gate",
        waves: [
          { count: 18, elite: 3 },
          { count: 22, swarm: true, speedMul: 1.2, tag: "寒潮压境" },
          { count: 20, elite: 4, tag: "精英狂潮" },
          { count: 18, boss: true, bossCount: 1 },
          { count: 22, hpMul: 1.25, tag: "冰封凶物" },

  <!-- ============ chunk 0: Web Audio 音效 + 程序化 MIDI 风格背景音乐引擎 ============ -->
  <!-- 完全自包含：用 Web Audio API 实时合成所有音效与盗墓主题的循环 BGM (无需任何音频文件)。
       通过 window.__AUDIO 暴露给战斗/UI 逻辑调用；首次用户交互后自动解锁 AudioContext。 -->
  <script>
  (function () {
    'use strict';

    const SAVE_KEY = 'haqiLineDefenseAudioV1';
    const AC = window.AudioContext || window.webkitAudioContext;

    const A = {
      ctx: null,
      master: null,        // 总音量
      sfxGain: null,       // 音效总线
      musicGain: null,     // 音乐总线
      muted: false,        // 静音(影响音效与音乐)
      musicOn: true,       // 背景音乐开关
      sfxVol: 0.7,
      musicVol: 0.32,
      ready: false,
      music: { timer: null, step: 0, track: null, nextTime: 0, voices: [] }
    };

    // ---- persisted prefs ----
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) { const d = JSON.parse(raw); if (d && typeof d === 'object') { if (typeof d.muted === 'boolean') A.muted = d.muted; if (typeof d.musicOn === 'boolean') A.musicOn = d.musicOn; } }
    } catch (e) {}
    function save() { try { localStorage.setItem(SAVE_KEY, JSON.stringify({ muted: A.muted, musicOn: A.musicOn })); } catch (e) {} }

    function ensure() {
      if (A.ready) return true;
      if (!AC) return false;
      try {
        A.ctx = new AC();
        A.master = A.ctx.createGain(); A.master.gain.value = A.muted ? 0 : 1; A.master.connect(A.ctx.destination);
        A.sfxGain = A.ctx.createGain(); A.sfxGain.gain.value = A.sfxVol; A.sfxGain.connect(A.master);
        A.musicGain = A.ctx.createGain(); A.musicGain.gain.value = A.musicVol; A.musicGain.connect(A.master);
        A.ready = true;
        return true;
      } catch (e) { return false; }
    }

    function now() { return A.ctx ? A.ctx.currentTime : 0; }

    // ---- low-level tone synth (一个带包络的振荡器音符) ----
    function tone(opt) {
      if (!ensure() || A.muted) return;
      const o = opt || {};
      const t0 = (o.t != null ? o.t : now()) + (o.delay || 0);
      const type = o.type || 'sine';
      const f0 = o.freq || 440;
      const dur = o.dur != null ? o.dur : 0.18;
      const peak = (o.gain != null ? o.gain : 0.5);

      osc.type = type;
      osc.frequency.setValueAtTime(f0, t0);
      if (o.toFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(1, o.toFreq), t0 + dur);

      const atk = o.atk != null ? o.atk : 0.005;

      g.gain.exponentialRampToValueAtTime(peak, t0 + atk);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

        if (o.filterTo) lp.frequency.exponentialRampToValueAtTime(Math.max(40, o.filterTo), t0 + dur);

      } else {
        osc.connect(g);
      }
      g.connect(dest);
      osc.start(t0); osc.stop(t0 + dur + 0.02);
    }

      lp.frequency.setValueAtTime(o.filter || 1800, t0);
      if (o.filterTo) lp.frequency.exponentialRampToValueAtTime(Math.max(60, o.filterTo), t0 + dur);
      const g = A.ctx.createGain();
      g.gain.setValueAtTime(peak, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      src.connect(lp); lp.connect(g); g.connect(A.sfxGain);
      src.start(t0); src.stop(t0 + dur + 0.02);
    }

    // ===================== SFX 音效库 =====================
    // 每个音效按盗墓塔防的手感设计；用节流避免高频刷子弹时音爆。
    const throttleMap = {};
    function throttled(key, ms) {
      const t = performance.now();
      if (throttleMap[key] && t - throttleMap[key] < ms) return false;
      throttleMap[key] = t; return true;
    }

    const SFX = {
      // UI 点击 / 切换

      tab() { tone({ type: 'triangle', freq: 660, dur: 0.07, gain: 0.2 }); tone({ type: 'triangle', freq: 880, dur: 0.07, gain: 0.16, delay: 0.04 }); },
      // 不同英雄技能开火 (按类型给不同音色，节流防刷)
      shoot(type) {

        switch (type) {
          case 'pierce': tone({ type: 'sawtooth', freq: 900, toFreq: 1500, dur: 0.08, gain: 0.16, filter: 2600 }); break;
          case 'explode': tone({ type: 'square', freq: 220, toFreq: 120, dur: 0.1, gain: 0.2, filter: 900 }); break;
          case 'nail': tone({ type: 'triangle', freq: 1200, toFreq: 700, dur: 0.07, gain: 0.16 }); break;
          case 'chain': tone({ type: 'sawtooth', freq: 1400, toFreq: 2200, dur: 0.06, gain: 0.14, filter: 3000 }); break;
          case 'flame': noise({ filter: 1400, filterTo: 500, dur: 0.1, gain: 0.16 }); break;
          case 'rapid': tone({ type: 'square', freq: 700, toFreq: 500, dur: 0.05, gain: 0.12 }); break;
          default: tone({ type: 'square', freq: 760, toFreq: 560, dur: 0.06, gain: 0.14, filter: 1800 });
        }
      },
      // 子弹命中
      hit() { if (!throttled('hit', 40)) return; noise({ filter: 2400, filterTo: 800, dur: 0.05, gain: 0.12 }); },
      // 暴击 (清脆高音)
      crit() { if (!throttled('crit', 60)) return; tone({ type: 'triangle', freq: 1568, dur: 0.09, gain: 0.22 }); tone({ type: 'sine', freq: 2093, dur: 0.07, gain: 0.14, delay: 0.03 }); },
      // 爆炸
      explosion(big) {
        noise({ filter: big ? 900 : 1400, filterTo: 80, dur: big ? 0.5 : 0.3, gain: big ? 0.5 : 0.34 });
        tone({ type: 'sine', freq: big ? 90 : 140, toFreq: 40, dur: big ? 0.45 : 0.28, gain: big ? 0.45 : 0.3, filter: 600 });
      },
      // 敌人死亡 (短促闷响)
      kill() { if (!throttled('kill', 35)) return; noise({ filter: 1100, filterTo: 200, dur: 0.12, gain: 0.18 }); tone({ type: 'square', freq: 180, toFreq: 80, dur: 0.1, gain: 0.14 }); },
      // 精英死亡
      eliteKill() { tone({ type: 'sawtooth', freq: 300, toFreq: 90, dur: 0.22, gain: 0.26, filter: 1200, filterTo: 200 }); noise({ filter: 1600, filterTo: 120, dur: 0.2, gain: 0.22 }); },
      // Boss 死亡 (盛大)

        [392, 523, 659, 784].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.28, gain: 0.26, delay: 0.1 + i * 0.09 }));

      hurt() { if (!throttled('hurt', 80)) return; tone({ type: 'sawtooth', freq: 160, toFreq: 70, dur: 0.22, gain: 0.3, filter: 700, filterTo: 200 }); noise({ filter: 600, filterTo: 100, dur: 0.15, gain: 0.18 }); },
      // 升级/选卡弹出
      levelup() { [523, 659, 784, 1047].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.16, gain: 0.24, delay: i * 0.07 })); },
      // 选定技能卡

      // 新角色登场
      debut() { [440, 554, 659, 880].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.14, gain: 0.2, delay: i * 0.06 })); },
      // 进化
      evolve() { tone({ type: 'sawtooth', freq: 300, toFreq: 1200, dur: 0.5, gain: 0.24, filter: 800, filterTo: 3000 }); [784, 988, 1319].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.2, gain: 0.18, delay: 0.2 + i * 0.08 })); },
      // 大招就绪提示
      ultReady() { tone({ type: 'triangle', freq: 880, dur: 0.12, gain: 0.26 }); tone({ type: 'triangle', freq: 1175, dur: 0.14, gain: 0.22, delay: 0.1 }); },
      // 释放大招 (上扬充能 + 轰鸣)
      ultCast() {
        tone({ type: 'sawtooth', freq: 200, toFreq: 1400, dur: 0.45, gain: 0.3, filter: 600, filterTo: 4000 });
        SFX.explosion(true);
        [523, 659, 784, 1047, 1319].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.3, gain: 0.22, delay: 0.25 + i * 0.07 }));
      },
      // 大招能量不足
      noEnergy() { tone({ type: 'square', freq: 240, toFreq: 180, dur: 0.12, gain: 0.16, filter: 700 }); },
      // 连杀里程碑
      combo(n) { const base = 523 + Math.min(8, Math.floor(n / 10)) * 80; [base, base * 1.26, base * 1.5].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.12, gain: 0.2, delay: i * 0.05 })); },
      // 波次提示
      wave(boss) { if (boss) { tone({ type: 'sawtooth', freq: 110, toFreq: 70, dur: 0.6, gain: 0.3, filter: 500 }); tone({ type: 'square', freq: 220, dur: 0.3, gain: 0.18, delay: 0.1 }); } else { tone({ type: 'triangle', freq: 392, dur: 0.18, gain: 0.2 }); tone({ type: 'triangle', freq: 587, dur: 0.18, gain: 0.16, delay: 0.12 }); } },
      // 波次清空
      waveClear() { [659, 784, 988].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.16, gain: 0.2, delay: i * 0.08 })); },
      // 治疗/护盾
      heal() { tone({ type: 'sine', freq: 660, toFreq: 990, dur: 0.3, gain: 0.2, filter: 2000 }); tone({ type: 'sine', freq: 880, dur: 0.25, gain: 0.14, delay: 0.1 }); },
      // 召唤
      summon() { tone({ type: 'sawtooth', freq: 150, toFreq: 500, dur: 0.3, gain: 0.22, filter: 900 }); tone({ type: 'triangle', freq: 660, dur: 0.18, gain: 0.16, delay: 0.18 }); },
      // 解锁角色 / 购买
      unlock() { [523, 698, 880, 1047].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.2, gain: 0.24, delay: i * 0.08 })); },
      // 胜利结算
      win() { [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => tone({ type: 'triangle', freq: f, dur: 0.3, gain: 0.26, delay: i * 0.12 })); },
      // 失败结算
      lose() { [392, 330, 262, 196].forEach((f, i) => tone({ type: 'sawtooth', freq: f, dur: 0.4, gain: 0.26, delay: i * 0.16, filter: 1200, filterTo: 300 })); }
    };

    // ===================== 程序化 MIDI 风格 BGM =====================
    // 用一个 16 分音符步进的序列器实时合成循环背景音乐。
    // 每张曲子有：bass(低音)、arp(琶音/旋律)、pad(铺底)、drum(鼓点) 几个声部。
    // 盗墓神秘氛围：偏小调 (Aeolian/Harmonic minor)，慢速 80~96 BPM。
    const NOTE = { 'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13, 'E': 329.63, 'F': 349.23, 'F#': 369.99, 'G': 392.00, 'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88 };
    function nf(name, oct) { return NOTE[name] * Math.pow(2, (oct || 4) - 4); }

    // 主菜单/首页：A 小调神秘缓慢主题
    const TRACKS = {
      menu: {
        bpm: 84,
        // 每步一个琶音音符 (16 步循环)；'-' 为休止
        arp: ['A4', '-', 'C5', 'E5', '-', 'C5', 'A4', '-', 'G4', '-', 'B4', 'D5', '-', 'B4', 'G4', '-'],
        arpType: 'triangle',
        bass: ['A2', '-', '-', '-', 'F2', '-', '-', '-', 'G2', '-', '-', '-', 'E2', '-', '-', '-'],
        pad: ['A3', '-', '-', '-', 'F3', '-', '-', '-', 'G3', '-', '-', '-', 'E3', '-', '-', '-'],
        drum: ['k', '-', '-', 'h', 's', '-', '-', 'h', 'k', '-', 'k', 'h', 's', '-', 'h', '-']
      },
      // 战斗：更紧凑、推进感强的小调
      battle: {
        bpm: 132,
        arp: ['A4', 'E4', 'A4', 'C5', 'B4', 'E4', 'B4', 'D5', 'C5', 'G4', 'C5', 'E5', 'A4', 'E4', 'C5', 'A4'],
        arpType: 'sawtooth',
        bass: ['A2', 'A2', '-', 'A2', 'F2', 'F2', '-', 'F2', 'G2', 'G2', '-', 'G2', 'E2', 'E2', '-', 'E2'],
        pad: ['A3', '-', '-', '-', 'F3', '-', '-', '-', 'G3', '-', '-', '-', 'C4', '-', '-', '-'],
        drum: ['k', 'h', 's', 'h', 'k', 'h', 's', 'h', 'k', 'h', 's', 'h', 'k', 's', 's', 'h']
      },
      // Boss：阴森低沉 + 急促鼓
      boss: {
        bpm: 144,
        arp: ['A4', '-', 'G#4', 'A4', 'C5', '-', 'B4', 'C5', 'E5', '-', 'D5', 'E5', 'A4', 'C5', 'E5', 'A5'],
        arpType: 'square',
        bass: ['A1', 'A2', 'A1', 'A2', 'A1', 'A2', 'A1', 'A2', 'F1', 'F2', 'F1', 'F2', 'E1', 'E2', 'E1', 'G2'],
        pad: ['A3', '-', '-', '-', 'A3', '-', '-', '-', 'F3', '-', '-', '-', 'E3', '-', '-', '-'],
        drum: ['k', 's', 'k', 's', 'k', 's', 'k', 's', 'k', 's', 'k', 's', 'k', 'k', 's', 's']
      }
    };

    // 鼓声合成
    function drumKick(t) { tone({ t, type: 'sine', freq: 150, toFreq: 45, dur: 0.18, gain: 0.5, music: true }); }
    function drumSnare(t) { noise({ t, filter: 2600, filterTo: 800, dur: 0.12, gain: 0.22 }); tone({ t, type: 'triangle', freq: 220, dur: 0.08, gain: 0.12, music: true }); }
    function drumHat(t) { noise({ t, filter: 8000, filterTo: 5000, dur: 0.04, gain: 0.08 }); }

    function musicTone(name, oct, t, type, dur, gain, filter) {
      if (name === '-' || !name) return;
      // 支持 'A4' 这种写法
      let nm = name, o = oct;
      const m = /^([A-G]#?)(\d)$/.exec(name);
      if (m) { nm = m[1]; o = +m[2]; }
      tone({ t, type, freq: nf(nm, o), dur, gain, music: true, filter: filter || 0 });
    }

    function scheduleStep(track, step, t) {
      const T = TRACKS[track]; if (!T) return;
      const i = step % 16;
      const stepDur = 60 / T.bpm / 4; // 16 分音符时长
      // bass
      musicTone(T.bass[i], null, t, 'sawtooth', stepDur * 1.6, 0.16, 600);
      // arp/melody
      musicTone(T.arp[i], null, t, T.arpType || 'triangle', stepDur * 1.1, 0.1);
      // pad (每拍铺底，较弱长音)
      if (i % 4 === 0) musicTone(T.pad[i], null, t, 'sine', stepDur * 4.2, 0.06, 1400);
      // drums
      const d = T.drum[i];
      if (d === 'k') drumKick(t);
      else if (d === 's') drumSnare(t);
      else if (d === 'h') drumHat(t);
    }

    function stopMusic() {
      if (A.music.timer) { clearInterval(A.music.timer); A.music.timer = null; }
      A.music.track = null;
    }

    // 切换/播放 BGM 曲目
    function playMusic(track) {
      if (!ensure()) return;
      if (!A.musicOn || A.muted) { stopMusic(); A.music.track = track; return; }
      if (A.music.track === track && A.music.timer) return; // 已在播放
      stopMusic();
      A.music.track = track;
      A.music.step = 0;
      const T = TRACKS[track] || TRACKS.menu;
      const stepDur = 60 / T.bpm / 4;
      A.music.nextTime = now() + 0.1;
      // 提前调度的 lookahead 序列器
      A.music.timer = setInterval(() => {
        if (!A.ctx) return;
        const ahead = now() + 0.2;
        while (A.music.nextTime < ahead) {
          scheduleStep(A.music.track, A.music.step, A.music.nextTime);
          A.music.step++;
          A.music.nextTime += stepDur;
        }
      }, 50);
    }

    // ===================== 控制接口 =====================
    function applyMute() {
      if (A.master) A.master.gain.setTargetAtTime(A.muted ? 0 : 1, now(), 0.02);
    }
    function setMuted(v) {
      A.muted = !!v; applyMute(); save();
      if (A.muted) stopMusic();
      else if (A.musicOn && A.music.track) playMusic(A.music.track);
    }
    function toggleMute() { setMuted(!A.muted); return A.muted; }
    function setMusicOn(v) {
      A.musicOn = !!v; save();
      if (!A.musicOn) stopMusic();
      else if (!A.muted && A.music.track) playMusic(A.music.track);
    }

    // 首次用户交互解锁 AudioContext (浏览器自动播放策略)
    function unlock() {
      if (ensure() && A.ctx.state === 'suspended') A.ctx.resume();
      // 若菜单音乐曾被请求但因未解锁而未播放，这里补播
      if (A.musicOn && !A.muted && A.music.track && !A.music.timer) playMusic(A.music.track);
    }
    ['pointerdown', 'touchstart', 'keydown'].forEach(ev => window.addEventListener(ev, unlock, { passive: true }));

    // 暴露 API
    window.__AUDIO = {
      sfx: SFX,
      playMusic, stopMusic,
      toggleMute, setMuted, setMusicOn,
      isMuted: () => A.muted,
      isMusicOn: () => A.musicOn,
      unlock
    };
  })();
  </script>

  <!-- ============ Game script (chunk 1: core + screen router + home + story) ============ -->
  <script>
  (function () {
    'use strict';

    // ================= GLOBAL STATE =================
    // Build unlocked / heroLevel maps from the hero config so the 5 default heroes
    // start unlocked and the 10 paid heroes start locked.
    const _unlocked = {}, _heroLevel = {};
    game_config.heroes.forEach(h => { _unlocked[h.key] = !h.locked; _heroLevel[h.key] = 1; });

    const G = {
      screen: 'home',            // home | roster | story | battle | result
      lvlIndex: 0,
      cash: 0, gems: 1200, coins: 2200,
      // ===== 真实玩家进度 (Player progression) =====
      playerLevel: 1,            // 真实玩家等级 (由 XP 升级)
      playerXp: 0,               // 当前等级内累计经验
      medals: 0,                 // 🏅 荣誉勋章 (首通/三星奖励)
      // ===== 真实体力 (Stamina) =====
      energy: 30,                // 当前体力
      energyMax: 30,             // 体力上限 (随玩家等级提升)
      energyTs: Date.now(),      // 上次体力结算时间戳 (用于按真实时间回复)
      profileName: '摸金校尉.5eeb02db',
      unlocked: _unlocked,       // 默认解锁 5 个，其余需付费解锁
      heroLevel: _heroLevel,
      // leader: the single hero who always starts the battle alone
      leader: 'saya',
      // pool: up to 5 pre-selected candidates that may randomly join during the run
      squad: ['saya', 'takashi'],
      barrierHp: 100,            // 长明灯油量(%)：上一局结束时的真实防线剩余 (满=100)
      petCache: null,
      cleared: {},               // 已通关关卡 id 标记
      stars: {},                 // 每关真实星级评价 stars[levelId] = 0..3 (取历史最佳)
      bestScore: {},             // 每关历史最高分 bestScore[levelId]
      hardMode: false,           // 困难模式开关：敌人更强，首页显示警戒封条

      // ===== 装备 / 经济系统 (Equipment & Economy) =====
      // inventory: 玩家拥有的所有装备实例 [{id, slot, baseId, rarity, level, ...}]
      inventory: [],
      // equipped: 每个英雄各槽位装备的实例 id  equipped[heroKey][slot] = itemId | null
      equipped: {},
      // materials: 强化/合成素材库存  {screw, gear, potion, crystal}
      materials: { screw: 0, gear: 0, potion: 0, crystal: 0 },
      // 每日奖励领取记录 (按 yyyy-mm-dd 标记)
      dailyClaim: {},
      // 自增装备实例 id
      _itemSeq: 1,
      // 统计：累计赚取金币 / 通关次数 (用于平衡与成就)
      totalEarned: 0, totalRuns: 0
    };

    // ================= LOCALSTORAGE PERSISTENCE =================
    const SAVE_KEY = 'haqiLineDefenseSaveV3';   // V3: 真实体力/玩家等级/星级/勋章系统
    function saveProgress() {
      try {
        const data = {
          gems: G.gems, coins: G.coins, lvlIndex: G.lvlIndex, playerLevel: G.playerLevel,
          unlocked: G.unlocked, heroLevel: G.heroLevel, leader: G.leader, squad: G.squad, cleared: G.cleared,
          hardMode: G.hardMode,
          // 真实进度系统持久化
          playerXp: G.playerXp, medals: G.medals, energy: G.energy, energyMax: G.energyMax, energyTs: G.energyTs,
          barrierHp: G.barrierHp, stars: G.stars, bestScore: G.bestScore,
          // 装备/经济系统持久化
          inventory: G.inventory, equipped: G.equipped, materials: G.materials,
          dailyClaim: G.dailyClaim, _itemSeq: G._itemSeq, totalEarned: G.totalEarned, totalRuns: G.totalRuns
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      } catch (e) {}
    }
    function loadProgress() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const d = JSON.parse(raw);
        if (!d || typeof d !== 'object') return;
        if (typeof d.gems === 'number') G.gems = d.gems;
        if (typeof d.coins === 'number') G.coins = d.coins;
        if (typeof d.lvlIndex === 'number') G.lvlIndex = Math.min(d.lvlIndex, game_config.levels.length - 1);
        if (typeof d.playerLevel === 'number') G.playerLevel = d.playerLevel;
        if (d.unlocked) Object.keys(G.unlocked).forEach(k => { if (typeof d.unlocked[k] === 'boolean') G.unlocked[k] = d.unlocked[k]; });
        if (d.heroLevel) Object.keys(G.heroLevel).forEach(k => { if (typeof d.heroLevel[k] === 'number') G.heroLevel[k] = d.heroLevel[k]; });
        if (typeof d.leader === 'string' && heroDefSafe(d.leader)) G.leader = d.leader;
        if (Array.isArray(d.squad)) G.squad = d.squad.filter(k => heroDefSafe(k));
        if (d.cleared) G.cleared = d.cleared;
        if (typeof d.hardMode === 'boolean') G.hardMode = d.hardMode;
        // 真实进度系统读档
        if (typeof d.playerXp === 'number') G.playerXp = d.playerXp;
        if (typeof d.medals === 'number') G.medals = d.medals;
        if (typeof d.energy === 'number') G.energy = d.energy;
        if (typeof d.energyMax === 'number') G.energyMax = d.energyMax;
        if (typeof d.energyTs === 'number') G.energyTs = d.energyTs;
        if (typeof d.barrierHp === 'number') G.barrierHp = d.barrierHp;
        if (d.stars && typeof d.stars === 'object') G.stars = d.stars;
        if (d.bestScore && typeof d.bestScore === 'object') G.bestScore = d.bestScore;
        // 装备/经济系统读档
        if (Array.isArray(d.inventory)) G.inventory = d.inventory;
        if (d.equipped && typeof d.equipped === 'object') G.equipped = d.equipped;
        if (d.materials && typeof d.materials === 'object') Object.assign(G.materials, d.materials);
        if (d.dailyClaim && typeof d.dailyClaim === 'object') G.dailyClaim = d.dailyClaim;
        if (typeof d._itemSeq === 'number') G._itemSeq = d._itemSeq;
        if (typeof d.totalEarned === 'number') G.totalEarned = d.totalEarned;
        if (typeof d.totalRuns === 'number') G.totalRuns = d.totalRuns;
        if (!G.squad.length) G.squad = [G.leader];
      } catch (e) {}
    }
    function heroDefSafe(key) { return game_config.heroes.some(h => h.key === key); }
    window.__saveProgress = saveProgress;
    window.__G = G;

    // ================= 真实进度引擎 (Progression: 体力 / 玩家等级 / 星级 / 勋章) =================
    const PROG = {
      energyRegenSec: 180,       // 每 180 秒(3 分钟)回复 1 点体力
      energyPerLevel: 2,         // 玩家每升 1 级，体力上限 +2
      maxPlayerLevel: 60
    };
    // 玩家升级所需经验曲线 (累积到下一级)
    function playerXpNeed(level) { return Math.round(100 * Math.pow(level, 1.4)); }

    // ---- 体力：按真实时间结算回复 ----
    // 返回回复后的当前体力；不超过上限。energyTs 记录上次结算时间。
    function refreshEnergy() {
      const now = Date.now();
      const elapsed = Math.max(0, (now - (G.energyTs || now)) / 1000);
      if (G.energy < G.energyMax && elapsed >= PROG.energyRegenSec) {
        const gain = Math.floor(elapsed / PROG.energyRegenSec);
        G.energy = Math.min(G.energyMax, G.energy + gain);
        // 把"用掉"的整段时间推进，保留余数继续累计
        G.energyTs = now - Math.round((elapsed % PROG.energyRegenSec) * 1000);
        if (G.energy >= G.energyMax) G.energyTs = now;   // 满了就归零计时
      } else if (G.energy >= G.energyMax) {

      }
      return G.energy;
    }
    // 距离下一点体力回复的剩余秒数 (满时返回 0)
    function energyNextInSec() {
      if (G.energy >= G.energyMax) return 0;
      const now = Date.now();
      const elapsed = (now - (G.energyTs || now)) / 1000;
      return Math.max(0, Math.ceil(PROG.energyRegenSec - (elapsed % PROG.energyRegenSec)));

    function hasEnergy(cost) { refreshEnergy(); return G.energy >= cost; }
    function spendEnergy(cost) {

      if (G.energy >= G.energyMax) G.energyTs = Date.now();

      return true;
    }

    // ---- 玩家经验 / 升级 ----
    // 返回 {leveled:bool, levels:n, rewards:{coins,gems,energyMax}}
    function gainPlayerXp(amount) {
      if (amount <= 0) return { leveled: false, levels: 0 };
      G.playerXp += amount;
      let leveled = 0, gainCoins = 0, gainGems = 0;
      while (G.playerLevel < PROG.maxPlayerLevel && G.playerXp >= playerXpNeed(G.playerLevel)) {
        G.playerXp -= playerXpNeed(G.playerLevel);
        G.playerLevel++;

      if (win) G.cleared[levelId] = true;
      if (stars > prevStars) G.stars[levelId] = stars;

    // ================= STORY / DEPLOY SCREEN =================
    // Battle always starts with ONLY the leader. The other pre-selected candidates
    // may randomly join (or upgrade) via the 3-choose-1 card on each level-up.
    function ensureLeaderInSquad() {
      if (!G.unlocked[G.leader]) {
        // pick first unlocked as leader
        const firstUnlocked = game_config.heroes.find(h => G.unlocked[h.key]);
        if (firstUnlocked) G.leader = firstUnlocked.key;
      }
      if (!G.squad.includes(G.leader)) G.squad.unshift(G.leader);
    }

    // 关卡允许的出战角色数(含主角)：取关卡 lv.maxSquad，未配置则回退到 game_config.maxSquad，最终封顶 5、保底 1。
    function levelSquadCap(lv) {
      const HARD_CAP = 5;
      const raw = (lv && typeof lv.maxSquad === 'number') ? lv.maxSquad
                : (typeof game_config.maxSquad === 'number') ? game_config.maxSquad
                : HARD_CAP;
      return Math.max(1, Math.min(HARD_CAP, raw));
    }

    // 关卡启动时把出战阵容(含主角)对齐到 target 个：
    //  - 多了 → trim 掉末尾的候补(主角永远保留)
    //  - 少了 → 按「已解锁伙伴优先，其次任意伙伴」自动补齐
    function fitSquadToLevel(target) {
      ensureLeaderInSquad();
      const want = Math.max(1, target || 1);

      // 1) 多了就裁剪：保留主角 + 前面的候补，按当前顺序砍掉多余的末尾候补
      if (G.squad.length > want) {
        const reserves = G.squad.filter(k => k !== G.leader);
        const keep = reserves.slice(0, want - 1);            // 主角占 1 个名额
        G.squad = [G.leader, ...keep];
      }

      // 2) 少了就补齐：候选池先取已解锁、未在阵容里的伙伴，再退化到任意未在阵容的伙伴
      if (G.squad.length < want) {
        const pickFrom = (filterFn) => game_config.heroes
          .filter(h => h.key !== G.leader && h.usePet !== false && !G.squad.includes(h.key))
          .filter(filterFn)
          .map(h => h.key);
        const pool = [...pickFrom(h => !!G.unlocked[h.key]), ...pickFrom(h => !G.unlocked[h.key])];
        while (G.squad.length < want && pool.length) {
          G.squad.push(pool.shift());
        }
      }
    }
