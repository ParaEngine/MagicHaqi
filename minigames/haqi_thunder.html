  const hpEl = document.getElementById('htHp');
  const levelEl = document.getElementById('htLevel');
  const scoreEl = document.getElementById('htScore');
  const comboEl = document.getElementById('htCombo');
  const bestEl = document.getElementById('htBest');
  const skillsEl = document.getElementById('htSkills');
  const SKILL_BTNS = [
    { el: document.getElementById('htSkillDash'), key: 'dashCooldownUntil', cd: SKILLS.dash.cooldown },
    { el: document.getElementById('htSkillBomb'), key: 'bombCooldownUntil', cd: SKILLS.bomb.cooldown },
    { el: document.getElementById('htSkillDrone'), key: 'droneCooldownUntil', cd: SKILLS.drone.cooldown },
  ];
  const diffEls = [document.getElementById('htOverlayDifficulties')];

  function post(type, data) {
    try { window.parent?.postMessage({ type, data }, '*'); } catch (_) {}
  }

  function ensureLoadedPosted() {
    if (state.loadedPosted) return;
    state.loadedPosted = true;
    post('gameLoaded', { title: t('gameLoadedTitle') });
  }

  function difficulty() { return DIFFICULTIES[state.difficulty] || DIFFICULTIES.normal; }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.max(320, window.innerWidth || 320);
    const h = Math.max(420, window.innerHeight || 420);
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    player.scale = gameScale(w);
    player.x = player.x || w / 2;
    player.y = player.y || h - 96;
    player.x = clamp(player.x, 28, w - 28);
    player.y = clamp(player.y, 72, h - 36);
    initStars(w, h);
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function rand(min, max) { return min + Math.random() * (max - min); }
  function dist2(a, b) { const dx = a.x - b.x; const dy = a.y - b.y; return dx * dx + dy * dy; }
  function gameScale(w = canvas.clientWidth || window.innerWidth || DESIGN_WIDTH) { return clamp(w / DESIGN_WIDTH, .58, 1); }

  function initStars(w, h) {
    const target = Math.round((w * h) / 5200);
    while (state.stars.length < target) state.stars.push({ x: Math.random() * w, y: Math.random() * h, r: rand(.6, 2.2), s: rand(.025, .12), hue: rand(185, 285), tw: rand(0, 6.28) });
    if (state.stars.length > target) state.stars.length = target;
  }

  function setupDifficultyButtons() {
    const html = DIFFICULTY_ORDER.map(id => `<button class="ht-difficulty ${id === state.difficulty ? 'active' : ''}" type="button" data-difficulty="${id}">${DIFFICULTIES[id].label}</button>`).join('');
    diffEls.forEach(el => { if (el) el.innerHTML = html; });
    document.querySelectorAll('[data-difficulty]').forEach(btn => {
      btn.onclick = () => {
        state.difficulty = btn.dataset.difficulty || 'normal';
        localStorage.setItem(STORAGE_KEY_DIFFICULTY, state.difficulty);
        setupDifficultyButtons();
        if (!state.started || state.gameOver) resetGame(false);
      };
    });
  }

  function resetGame(autostart) {
    const diff = difficulty();
    state.started = false;
    state.paused = false;
    state.gameOver = false;
    state.won = false;
    state.lastTime = 0;
    state.elapsed = 0;
    state.score = 0;
    state.level = 1;
    state.combo = 0;
    state.playerHp = diff.playerHp;
    state.shield = 0;
    state.fireLevel = 1;
    state.weaponMode = 'bolt';
    state.laserUntil = 0;
    state.missileUntil = 0;
    state.orbitUntil = 0;
    state.rapidUntil = 0;
    state.spreadUntil = 0;
    state.magnetUntil = 0;
    state.overdriveUntil = 0;
    state.dashUntil = 0;
    state.dashCooldownUntil = 0;
    state.bombCooldownUntil = 0;
    state.droneUntil = 0;
    state.droneCooldownUntil = 0;
    state.scoreMultiplierUntil = 0;
    state.perfectKills = 0;
    state.nearMissTimer = 0;
    state.introTipUntil = 0;
    state.waveName = '';
    state.waveTimer = 0;
    state.hazardTimer = 0;
    state.hazardKind = '';
    state.impactWarningTimer = 0;
    state.bossWarning = 0;
    state.boss = null;
    state.bossSpawnedThisLevel = false;
    state.nextEnemyAt = 0.3;
    state.nextPowerAt = 3.5;
    state.nextShotAt = 0;
    state.bullets.length = 0;
    state.enemyBullets.length = 0;
    state.enemies.length = 0;
    state.powerups.length = 0;
    state.particles.length = 0;
    state.impactWarnings.length = 0;
    state.hazards.length = 0;
    state.allyDrones.length = 0;
    state.roundId = 'thunder_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    player.scale = gameScale();
    player.x = (window.innerWidth || 360) / 2;
    player.y = (window.innerHeight || 640) - 96;
    player.invuln = 1.6;
    updateHud();
    updateControls();
    if (autostart) startGame();
  }

  function startGame() {
    ensureAudio();
    hideOverlay();
    state.started = true;
    state.gameOver = false;
    state.paused = false;
    state.lastTime = 0;
    state.introTipUntil = state.elapsed + 4.2;
    player.invuln = Math.max(player.invuln, 1.1);
    updateControls();
    startMusic();
    post('gameStarted', { difficulty: state.difficulty, roundId: state.roundId });
  }

  function showOverlay(title, text, buttonText) {
    overlayTitleEl.textContent = title;
    overlayTextEl.textContent = text;
    startBtn.textContent = buttonText;
    overlayEl.hidden = false;
  }
  function hideOverlay() { overlayEl.hidden = true; }
  function updateControls() { shellEl.classList.toggle('playing', state.started && !state.gameOver); updateSkillButtons(); }

  function updateSkillButtons() {
    const show = state.started && !state.gameOver;
    if (skillsEl) skillsEl.style.visibility = show ? 'visible' : 'hidden';
    if (!show) return;
    for (const s of SKILL_BTNS) {
      if (!s.el) continue;
      const remain = (state[s.key] || 0) - state.elapsed;
      const ready = remain <= 0;
      s.el.style.setProperty('--cd', ready ? '0' : clamp(remain / s.cd, 0, 1).toFixed(3));
      s.el.classList.toggle('ready', ready);
      s.el.classList.toggle('cooldown', !ready);
    }
  }

  function updateHud() {
    hpEl.textContent = state.playerHp + (state.shield ? `+${state.shield}` : '');
    levelEl.textContent = state.level;
    comboEl.textContent = state.combo;
    scoreEl.textContent = Math.floor(state.score);
    bestEl.textContent = state.best;
  }

  function loop(ts) {
    const t = ts / 1000;
    const dt = Math.min(0.033, state.lastTime ? t - state.lastTime : 0.016);
    state.lastTime = t;
    if (state.started && !state.paused && !state.gameOver) { update(dt); updateMusic(dt); }
    draw();
    updateSkillButtons();
    state.rafId = requestAnimationFrame(loop);
  }

  function update(dt) {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    state.elapsed += dt;
    player.invuln = Math.max(0, player.invuln - dt);
    updatePlayer(dt, w, h);
    shoot(dt);
    updateSkills(dt, w, h);
    updateEvents(dt, w, h);
    spawnEnemies(dt, w, h);
    spawnPowerups(dt, w, h);
    updateBullets(dt, w, h);
    updateEnemies(dt, w, h);
    updateHazards(dt, w, h);
    updateAllyDrones(dt, w, h);
    updatePowerups(dt, w, h);
    updateParticles(dt, w, h);
    handleCollisions(w, h);
    maybeSpawnBoss(w);
    checkLevelClear();
    state.nearMissTimer = Math.max(0, state.nearMissTimer - dt);
    state.score += dt * (2 + state.level * .4) * difficulty().scoreScale * scoreMultiplier();
    updateHud();
  }

  function updatePlayer(dt, w, h) {
    let ax = 0, ay = 0;
    if (state.keys.a || state.keys.arrowleft) ax -= 1;
    if (state.keys.d || state.keys.arrowright) ax += 1;
    if (state.keys.w || state.keys.arrowup) ay -= 1;
    if (state.keys.s || state.keys.arrowdown) ay += 1;
    if (state.pointerActive) {
      const dx = state.pointerX - player.x;
      const dy = state.pointerY - player.y;
      const distance = Math.hypot(dx, dy);
      const maxStep = player.speed * 1000 * dt * (state.dashUntil > state.elapsed ? 2.8 : 1);
      if (distance > 0.5) {
        const step = Math.min(distance, maxStep);
        player.x += dx / distance * step;
        player.y += dy / distance * step;
      }
    }
    if (ax || ay) {
      const len = Math.hypot(ax, ay) || 1;
      const dashBoost = state.dashUntil > state.elapsed ? 2.8 : 1;
      player.x += ax / len * player.speed * 1000 * dt * dashBoost;
      player.y += ay / len * player.speed * 1000 * dt * dashBoost;
    }
    const margin = 24 * player.scale + 8;
    player.x = clamp(player.x, margin, w - margin);
    player.y = clamp(player.y, 78, h - 30 * player.scale);
  }

  function scoreMultiplier() {
    return (state.scoreMultiplierUntil > state.elapsed ? 2 : 1) + Math.min(2.5, Math.floor(state.combo / 12) * .25);
  }

  function playerHitRadius(base = 20) { return Math.max(11, base * player.scale); }

  function updateSkills(dt, w, h) {
    if (state.droneUntil > state.elapsed && state.allyDrones.length < 2) {
      state.allyDrones.push({ slot: state.allyDrones.length, x: player.x, y: player.y + 18, shootAt: 0 });
    }
    if (state.droneUntil <= state.elapsed && state.allyDrones.length) state.allyDrones.length = 0;
    if (state.magnetUntil > state.elapsed) {
      for (const p of state.powerups) {
        const dx = player.x - p.x, dy = player.y - p.y, d = Math.max(20, Math.hypot(dx, dy));
        if (d < 180) { p.x += dx / d * 220 * dt; p.y += dy / d * 220 * dt; }
      }
    }
  }

  function updateEvents(dt, w, h) {
    state.waveTimer = Math.max(0, state.waveTimer - dt);
    state.hazardTimer -= dt;
    if (state.hazardTimer <= 0 && state.level >= 2) {
      state.hazardKind = Math.random() > .52 ? 'meteor' : 'ion';
      state.hazardTimer = rand(10, 16);
      toast(state.hazardKind === 'meteor' ? t('meteorWarning') : t('ionStorm'));
      for (let i = 0; i < (state.hazardKind === 'meteor' ? 6 : 3); i++) spawnHazard(w, h, i);
    }
    state.impactWarningTimer -= dt;
    if (state.level >= 3 && state.impactWarningTimer <= 0) {
      state.impactWarningTimer = rand(7, 12);
      const count = state.level >= 7 ? 3 : state.level >= 5 ? 2 : 1;
      for (let i = 0; i < count; i++) spawnImpactWarning(w, h, i);
      toast(t('asteroidImpact'));
    }
  }

  function activateDash() {
    if (!state.started || state.gameOver || state.elapsed < state.dashCooldownUntil) return;
    state.dashUntil = state.elapsed + SKILLS.dash.duration;
    state.dashCooldownUntil = state.elapsed + SKILLS.dash.cooldown;
    player.invuln = Math.max(player.invuln, SKILLS.dash.duration + .12);
    spark(player.x, player.y, 20, '#67e8f9');
    beep(920, .06, 'triangle', .055);
  }

  function activateSkillBomb() {
    if (!state.started || state.gameOver || state.elapsed < state.bombCooldownUntil) return;
    state.bombCooldownUntil = state.elapsed + SKILLS.bomb.cooldown;
    pulseBomb();
    toast(t('activePulse'));
  }

  function activateDrone() {
    if (!state.started || state.gameOver || state.elapsed < state.droneCooldownUntil) return;
    state.droneUntil = state.elapsed + SKILLS.drone.duration;
    state.droneCooldownUntil = state.elapsed + SKILLS.drone.cooldown;
    toast(t('droneSupport'));
    beep(660, .08, 'square', .04);
  }

  function shoot(dt) {
    state.nextShotAt -= dt;
    if (state.nextShotAt > 0) return;
    const rapid = state.rapidUntil > state.elapsed || state.overdriveUntil > state.elapsed;
    const spread = state.spreadUntil > state.elapsed || state.overdriveUntil > state.elapsed;
    const laser = state.laserUntil > state.elapsed || state.overdriveUntil > state.elapsed;
    const missile = state.missileUntil > state.elapsed;
    const orbit = state.orbitUntil > state.elapsed;
    state.nextShotAt = laser ? (rapid ? 0.055 : 0.095) : rapid ? 0.095 : 0.16;
    const level = Math.min(4, state.fireLevel + (spread ? 1 : 0));
    const patterns = level <= 1 ? [0] : level === 2 ? [-.06, .06] : level === 3 ? [-.12, 0, .12] : [-.16, -.055, .055, .16];
    patterns.forEach(angle => {
      const speed = laser ? -820 : -610;
      state.bullets.push({ type: laser ? 'laser' : 'bolt', x: player.x + angle * 52, y: player.y - 32, vx: Math.sin(angle) * (laser ? 120 : 260), vy: speed * difficulty().bulletSpeed, r: laser ? 3.2 : 4.2, damage: (laser ? 6 : 8) + state.fireLevel * 2, color: laser ? '#22d3ee' : angle ? '#a78bfa' : '#67e8f9' });
    });
    if (missile) {
      const side = Math.floor(state.elapsed * 10) % 2 ? -1 : 1;
      state.bullets.push({ type: 'missile', x: player.x + side * 24, y: player.y - 16, vx: side * 80, vy: -430 * difficulty().bulletSpeed, r: 7, damage: 24 + state.fireLevel * 3, splash: 46, color: '#fb923c', turn: 0 });
    }
    if (orbit) {
      const phase = state.elapsed * 8;
      for (let i = 0; i < 2; i++) {
        const a = phase + i * Math.PI;
        state.bullets.push({ type: 'orb', x: player.x + Math.cos(a) * 32, y: player.y - 16 + Math.sin(a) * 12, vx: Math.cos(a) * 120, vy: -360, r: 6, damage: 12 + state.fireLevel * 2, color: '#34d399', pierce: 2 });
      }
    }
    beep(520, 0.018, 'triangle', 0.018);
  }

  function spawnEnemies(dt, w, h) {
    if (state.boss) return;
    state.nextEnemyAt -= dt;
    if (state.nextEnemyAt > 0) return;
    const diff = difficulty();
    const levelScale = 1 + state.level * .08;
    state.nextEnemyAt = Math.max(.28, diff.enemyRate - state.level * .025 + rand(-.08, .14));
    const typeRoll = Math.random();
    let type = 'drone';
    if (state.level >= 6 && typeRoll > .84) type = 'splitter';
    else if (state.level >= 5 && typeRoll > .72) type = 'sniper';
    else if (state.level >= 4 && typeRoll > .61) type = 'mine';
    else if (state.level >= 3 && typeRoll > .72) type = 'zig';
    else if (state.level >= 2 && typeRoll > .52) type = 'tank';
    spawnEnemy(type, rand(30, w - 30), -36, levelScale);
  }

  function spawnEnemy(type, x, y, levelScale = 1) {
    const diff = difficulty();
    const spec = ENEMY_TYPES[type] || ENEMY_TYPES.drone;
    const hp = spec.hp + state.level * (type === 'tank' ? 4 : type === 'splitter' ? 4 : 2.8);
    state.enemies.push({
      type, x, y, baseX: x, r: spec.r, hp, maxHp: hp,
      speed: rand(type === 'mine' ? 48 : 66, type === 'sniper' ? 92 : 116) * diff.enemySpeed * levelScale,
      phase: rand(0, 6.28), shootAt: rand(type === 'sniper' ? .8 : 1.2, type === 'sniper' ? 1.7 : 2.6), value: spec.value,
      color: spec.color, armed: false
    });
  }

  function maybeSpawnBoss(w) {
    if (state.boss || state.bossSpawnedThisLevel || state.level % 3 !== 0) return;
    if (state.elapsed < 12 + state.level * 1.6) return;
    state.bossWarning = 2.6;
    const hp = difficulty().bossHp * 1.75 + state.level * 42;
    const variants = [
      { id: 'mothership', name: t('bossMothership'), color: '#fb7185', core: '#facc15', r: 58, hpScale: 1.28, attack: 'fan' },
      { id: 'spinner', name: t('bossSpinner'), color: '#a78bfa', core: '#67e8f9', r: 52, hpScale: 1.08, attack: 'spiral' },
      { id: 'carrier', name: t('bossCarrier'), color: '#34d399', core: '#f97316', r: 62, hpScale: 1.42, attack: 'summon' },
      { id: 'laser', name: t('bossLaser'), color: '#38bdf8', core: '#fb7185', r: 56, hpScale: 1.22, attack: 'beam' },
      { id: 'asteroid', name: t('bossAsteroid'), color: '#fb923c', core: '#fef3c7', r: 64, hpScale: 1.5, attack: 'impact' },
    ];
    const variant = variants[Math.min(variants.length - 1, Math.floor(state.level / 3) - 1) % variants.length];
    state.boss = { ...variant, x: w / 2, y: -92, hp: Math.round(hp * variant.hpScale), maxHp: Math.round(hp * variant.hpScale), phase: 0, shootAt: 1.1, specialAt: 2.2, rageAt: .5, value: 680 + state.level * 120 };
    state.bossSpawnedThisLevel = true;
    toast(t('bossIncoming', { name: variant.name }));
  }

  function spawnPowerups(dt, w, h) {
    state.nextPowerAt -= dt;
    if (state.nextPowerAt > 0) return;
    state.nextPowerAt = rand(4.5, 7.5);
    const types = ['fire', 'shield', 'rapid', 'spread', 'heal', 'laser', 'missile', 'orbit', 'bomb', 'magnet', 'overdrive', 'score'];
    const type = types[Math.floor(Math.random() * types.length)];
    state.powerups.push({ type, x: rand(34, w - 34), y: -28, r: 17, vy: rand(78, 112), phase: 0 });
  }

  function updateBullets(dt, w, h) {
    for (const b of state.bullets) {
      if (b.type === 'missile') guideMissile(b, dt);
      b.x += b.vx * dt; b.y += b.vy * dt;
      if (b.type === 'missile') { b.vy -= 20 * dt; b.vx *= 0.995; }
    }
    for (const b of state.enemyBullets) { b.x += b.vx * dt; b.y += b.vy * dt; b.phase = (b.phase || 0) + dt; }
    state.bullets = state.bullets.filter(b => b.y > -40 && b.y < h + 40 && b.x > -40 && b.x < w + 40);
    state.enemyBullets = state.enemyBullets.filter(b => b.y > -50 && b.y < h + 60 && b.x > -50 && b.x < w + 50);
  }

  function guideMissile(b, dt) {
    let target = state.boss || null;
    if (!target && state.enemies.length) {
      target = state.enemies.reduce((best, e) => (!best || e.y > best.y) ? e : best, null);
    }
    if (!target) return;
    const a = Math.atan2(target.y - b.y, target.x - b.x);
    const desiredVx = Math.cos(a) * 250;
    const desiredVy = Math.sin(a) * 250 - 250;
    b.vx += (desiredVx - b.vx) * clamp(dt * 2.8, 0, 1);
    b.vy += (desiredVy - b.vy) * clamp(dt * 2.8, 0, 1);
  }

  function updateEnemies(dt, w, h) {
    for (const e of state.enemies) {
      e.phase += dt * (e.type === 'zig' ? 4 : 2);
      e.y += e.speed * dt;
      if (e.type === 'zig') e.x = e.baseX + Math.sin(e.phase) * 54;
      if (e.type === 'mine') e.x = e.baseX + Math.sin(e.phase * 1.6) * 26;
      if (e.type === 'splitter') e.x = e.baseX + Math.sin(e.phase * 1.15) * 38;
      e.x = clamp(e.x, 24, w - 24);
      e.shootAt -= dt;
      if (e.shootAt <= 0 && e.y > 40 && e.y < h * .72) {
        e.shootAt = e.type === 'tank' ? 1.25 : e.type === 'sniper' ? 1.05 : e.type === 'mine' ? 2.3 : 1.8;
        if (e.type === 'mine') {
          for (let i = 0; i < 8; i++) {
            const a = i * Math.PI * 2 / 8;
            state.enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 88, vy: Math.sin(a) * 88 + 72, r: 4.5, color: e.color });
          }
        } else if (e.type === 'sniper') {
          fireEnemyBullet(e.x, e.y + e.r * .7, player.x, player.y, 230 + state.level * 10, '#c084fc', 4.2);
        } else {
          fireEnemyBullet(e.x, e.y + e.r * .7, player.x, player.y, 150 + state.level * 8);
        }
      }
    }
    state.enemies = state.enemies.filter(e => e.y < h + 60 && e.hp > 0);
    if (state.boss) {
      const b = state.boss;
      b.phase += dt;
      b.y += (88 - b.y) * clamp(dt * 1.6, 0, 1);
      b.x = w / 2 + Math.sin(b.phase * (b.id === 'spinner' ? 1.9 : 1.2)) * Math.min(b.id === 'laser' ? 145 : 110, w * .28);
      b.shootAt -= dt;
      if (b.shootAt <= 0 && b.y > 20) {
        bossAttack(b);
      }
      b.specialAt -= dt;
      if (b.specialAt <= 0 && b.y > 20) {
        bossSpecial(b, w, h);
      }
    }
    state.bossWarning = Math.max(0, state.bossWarning - dt);
  }

  function bossAttack(b) {
    b.shootAt = Math.max(.32, (b.attack === 'spiral' ? .31 : b.attack === 'impact' ? .78 : 0.92) - state.level * .03);
    const hpPct = b.hp / b.maxHp;
    const rage = hpPct < .5;
    if (b.attack === 'spiral') {
      const arms = rage ? 5 : 3;
      for (let i = 0; i < arms; i++) {
        const a = b.phase * (rage ? 3.5 : 2.4) + i * Math.PI * 2 / arms;
        state.enemyBullets.push({ x: b.x, y: b.y + 12, vx: Math.cos(a) * (rage ? 175 : 145), vy: Math.sin(a) * (rage ? 175 : 145) + 96, r: 5, color: b.color });
      }
      return;
    }
    if (b.attack === 'beam') {
      fireEnemyBullet(b.x - 34, b.y + 24, player.x - 20, player.y, 185 + state.level * 9);
      fireEnemyBullet(b.x + 34, b.y + 24, player.x + 20, player.y, 185 + state.level * 9);
      if (rage) fireEnemyBullet(b.x, b.y + 40, player.x, player.y, 250 + state.level * 10, '#22d3ee', 6);
      return;
    }
    if (b.attack === 'impact') {
      for (let i = 0; i < (rage ? 4 : 3); i++) {
        const a = Math.PI / 2 + (i - 1.5) * .32 + Math.sin(b.phase) * .15;
        state.enemyBullets.push({ x: b.x, y: b.y + 30, vx: Math.cos(a) * 175, vy: Math.sin(a) * 175, r: 7, color: '#fb923c' });
      }
      return;
    }
    const count = rage ? 9 : state.level >= 6 ? 7 : 5;
    for (let i = 0; i < count; i++) {
      const a = Math.PI / 2 + (i - (count - 1) / 2) * .24 + Math.sin(b.phase) * .08;
      state.enemyBullets.push({ x: b.x, y: b.y + 30, vx: Math.cos(a) * 165, vy: Math.sin(a) * 165, r: 6, color: b.color });
    }
  }

  function bossSpecial(b, w, h) {
    const hpPct = b.hp / b.maxHp;
    const rage = hpPct < .5;
    b.specialAt = b.attack === 'summon' ? (rage ? 3.2 : 4.4) : b.attack === 'beam' ? (rage ? 2.7 : 3.6) : b.attack === 'impact' ? (rage ? 2.8 : 3.7) : (rage ? 2.45 : 3.1);
    if (hpPct < b.rageAt) {
      b.rageAt -= .25;
      toast(t('bossRage', { name: b.name }));
      for (let i = 0; i < 12; i++) {
        const a = i * Math.PI * 2 / 12;
        state.enemyBullets.push({ x: b.x, y: b.y + 18, vx: Math.cos(a) * 160, vy: Math.sin(a) * 160 + 65, r: 5.5, color: b.core });
      }
    }
    if (b.attack === 'summon') {
      const count = rage ? 5 : 3;
      for (let i = 0; i < count; i++) {
        const type = rage && i % 2 ? 'sniper' : 'drone';
        spawnEnemy(type, clamp(b.x + (i - (count - 1) / 2) * 50, 30, w - 30), b.y + 44, 1.25);
      }
      toast(t('bossSwarm'));
      return;
    }
    if (b.attack === 'beam') {
      state.enemyBullets.push({ type: 'beam', x: b.x, y: b.y + 42, vx: 0, vy: 310, r: 12, color: '#22d3ee' });
      if (rage) {
        state.enemyBullets.push({ type: 'beam', x: b.x - 56, y: b.y + 36, vx: -45, vy: 285, r: 10, color: '#67e8f9' });
        state.enemyBullets.push({ type: 'beam', x: b.x + 56, y: b.y + 36, vx: 45, vy: 285, r: 10, color: '#67e8f9' });
      }
      toast(t('prismBeam'));
      return;
    }
    if (b.attack === 'impact') {
      for (let i = 0; i < (rage ? 3 : 2); i++) spawnImpactWarning(w, h, i);
      for (let i = 0; i < 2; i++) spawnHazard(w, h, i);
      toast(t('bossMeteorImpact'));
      return;
    }
    if (b.attack === 'fan' && rage && Math.random() > .45) {
      spawnEnemy('splitter', clamp(b.x + rand(-70, 70), 30, w - 30), b.y + 50, 1.15);
    }
    const ringCount = b.attack === 'spiral' ? (rage ? 18 : 14) : (rage ? 14 : 10);
    for (let i = 0; i < ringCount; i++) {
      const a = i * Math.PI * 2 / ringCount + b.phase;
      state.enemyBullets.push({ x: b.x, y: b.y + 18, vx: Math.cos(a) * 135, vy: Math.sin(a) * 135 + 70, r: 5.5, color: b.core });
    }
  }

  function fireEnemyBullet(x, y, tx, ty, speed, color = '#f97316', r = 5) {
    const a = Math.atan2(ty - y, tx - x);
    state.enemyBullets.push({ x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, r, color });
  }

  function spawnHazard(w, h, i) {
    if (state.hazardKind === 'ion') {
      state.hazards.push({ type: 'ion', x: rand(50, w - 50), y: -80 - i * 70, r: rand(22, 36), vy: rand(150, 220), phase: rand(0, 6.28), life: 8 });
    } else {
      state.hazards.push({ type: 'meteor', x: rand(30, w - 30), y: -80 - i * 90, r: rand(18, 34), vx: rand(-60, 60), vy: rand(150, 240), phase: rand(0, 6.28), life: 10, hp: 20 + state.level * 3 });
    }
  }

  function spawnImpactWarning(w, h, i) {
    state.impactWarnings.push({ x: rand(48, w - 48), y: rand(h * .18, h * .78), r: rand(38, 58), timer: 1.35 + i * .22, maxTimer: 1.35 + i * .22, done: false });
  }

  function updateHazards(dt, w, h) {
    for (const mark of state.impactWarnings) {
      mark.timer -= dt;
      if (mark.timer <= 0 && !mark.done) {
        mark.done = true;
        asteroidImpact(mark.x, mark.y, mark.r);
      }
    }
    state.impactWarnings = state.impactWarnings.filter(mark => mark.timer > -0.25);
    for (const z of state.hazards) {
      z.phase += dt; z.life -= dt; z.y += z.vy * dt; z.x += (z.vx || Math.sin(z.phase) * 38) * dt;
      if (z.type === 'ion' && Math.random() < dt * 1.8) fireEnemyBullet(z.x, z.y, player.x, player.y, 120 + state.level * 7, '#22d3ee', 4);
    }
    state.hazards = state.hazards.filter(z => z.life > 0 && z.y < h + 90 && z.x > -80 && z.x < w + 80);
  }

  function asteroidImpact(x, y, radius) {
    destroyAt(x, y, '#fb923c', 38);
    state.enemyBullets.length = Math.floor(state.enemyBullets.length * .55);
    if (player.invuln <= 0 && dist2(player, { x, y }) < (radius + playerHitRadius(18)) ** 2) hurtPlayer(x, y);
    for (const e of state.enemies) {
      const d = Math.sqrt(dist2(e, { x, y }));
      if (d < radius + e.r) e.hp -= 45 + state.level * 6;
    }
    if (state.boss) {
      const d = Math.sqrt(dist2(state.boss, { x, y }));
      if (d < radius + state.boss.r) state.boss.hp -= 70 + state.level * 8;
    }
    for (let i = 0; i < 12; i++) {
      const a = i * Math.PI * 2 / 12;
      state.enemyBullets.push({ x, y, vx: Math.cos(a) * 150, vy: Math.sin(a) * 150, r: 4.5, color: '#fb923c' });
    }
    vibrate(90);
  }

  function updateAllyDrones(dt, w, h) {
    for (const d of state.allyDrones) {
      const side = d.slot === 0 ? -1 : 1;
      d.x += (player.x + side * 52 - d.x) * clamp(dt * 7, 0, 1);
      d.y += (player.y + 16 - d.y) * clamp(dt * 7, 0, 1);
      d.shootAt -= dt;
      if (d.shootAt <= 0) {
        d.shootAt = .22;
        state.bullets.push({ type: 'drone', x: d.x, y: d.y - 18, vx: side * 25, vy: -520 * difficulty().bulletSpeed, r: 3.5, damage: 8 + state.fireLevel, color: '#34d399' });
      }
    }
  }

  function updatePowerups(dt, w, h) {
    for (const p of state.powerups) { p.y += p.vy * dt; p.phase += dt; }
    state.powerups = state.powerups.filter(p => p.y < h + 50);
  }

  function updateParticles(dt, w, h) {
    for (const p of state.particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; p.vy += (p.gravity || 0) * dt; }
    state.particles = state.particles.filter(p => p.life > 0);
  }

  function handleCollisions(w, h) {
    for (let bi = state.bullets.length - 1; bi >= 0; bi--) {
      const bullet = state.bullets[bi];
      let hit = false;
      for (const e of state.enemies) {
        if (dist2(bullet, e) < (bullet.r + e.r) ** 2) {
          e.hp -= bullet.damage; hit = true; spark(bullet.x, bullet.y, 4, e.color); break;
        }
      }
      if (!hit && state.boss && dist2(bullet, state.boss) < (bullet.r + state.boss.r) ** 2) {
        state.boss.hp -= bullet.damage; hit = true; spark(bullet.x, bullet.y, 5, '#f472b6');
      }
      if (hit && bullet.splash) splashDamage(bullet.x, bullet.y, bullet.splash, bullet.damage * .55);
      if (hit && bullet.pierce) { bullet.pierce -= 1; hit = bullet.pierce < 0; }
      if (hit) state.bullets.splice(bi, 1);
    }

    for (let i = state.enemies.length - 1; i >= 0; i--) {
      const e = state.enemies[i];
      if (e.hp <= 0) {
        state.enemies.splice(i, 1);
        destroyAt(e.x, e.y, e.color);
        if (e.type === 'splitter') {
          spawnEnemy('drone', clamp(e.x - 22, 30, w - 30), e.y, 1.2);
          spawnEnemy('drone', clamp(e.x + 22, 30, w - 30), e.y, 1.2);
        }
        if (e.type === 'mine') {
          for (let j = 0; j < 10; j++) {
            const a = j * Math.PI * 2 / 10;
            state.enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 118, vy: Math.sin(a) * 118 + 62, r: 4.5, color: e.color });
          }
        }
        state.combo += 1;
        state.perfectKills += 1;
        if (state.perfectKills > 0 && state.perfectKills % 12 === 0) { state.scoreMultiplierUntil = state.elapsed + 8; toast(t('aceCombo')); }
        state.score += (e.value * difficulty().scoreScale + Math.min(100, state.combo * 3.5)) * scoreMultiplier();
        beep(170, .055, 'sawtooth', .04);
        continue;
      }
      if (player.invuln <= 0 && dist2(player, e) < (e.r + playerHitRadius(23)) ** 2) {
        state.enemies.splice(i, 1);
        hurtPlayer(e.x, e.y);
      }
    }

    if (state.boss && state.boss.hp <= 0) {
      destroyAt(state.boss.x, state.boss.y, '#f472b6', 34);
      state.score += state.boss.value * difficulty().scoreScale;
      state.boss = null;
      state.combo += 10;
      state.fireLevel = Math.min(4, state.fireLevel + 1);
      toast(t('bossDefeated'));
      beep(90, .18, 'square', .08);
      arpeggio([72, 76, 79, 84, 88], 'square', .07, .08);
    } else if (state.boss && player.invuln <= 0 && dist2(player, state.boss) < (state.boss.r + playerHitRadius(22)) ** 2) {
      hurtPlayer(state.boss.x, state.boss.y);
    }

    for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
      const b = state.enemyBullets[i];
      if (player.invuln <= 0 && dist2(player, b) < (b.r + playerHitRadius(20)) ** 2) {
        state.enemyBullets.splice(i, 1);
        hurtPlayer(b.x, b.y);
      } else if (!b.grazed && player.invuln <= 0 && dist2(player, b) < (b.r + playerHitRadius(43)) ** 2) {
        b.grazed = true;
        state.combo += 1;
        state.score += 12 * scoreMultiplier();
        state.nearMissTimer = .35;
        spark(player.x, player.y - 14, 3, '#facc15');
      }
    }

    for (let i = state.hazards.length - 1; i >= 0; i--) {
      const z = state.hazards[i];
      if (player.invuln <= 0 && dist2(player, z) < (z.r + playerHitRadius(20)) ** 2) {
        if (z.type === 'meteor') state.hazards.splice(i, 1);
        hurtPlayer(z.x, z.y);
      }
    }

    for (let i = state.powerups.length - 1; i >= 0; i--) {
      const p = state.powerups[i];
      if (dist2(player, p) < (p.r + playerHitRadius(25)) ** 2) {
        state.powerups.splice(i, 1);
        applyPowerup(p.type);
      }
    }
  }

  function hurtPlayer(x, y) {
    player.invuln = 1.3;
    state.combo = 0;
    state.perfectKills = 0;
    if (state.shield > 0) {
      state.shield -= 1;
      toast(t('shieldBlock'));
    } else {
      state.playerHp -= 1;
      toast(t('ufoHit'));
    }
    destroyAt(x, y, '#f97316', 16);
    vibrate(80);
    beep(70, .11, 'sawtooth', .08);
    if (state.playerHp <= 0) finish(false);
  }

  function applyPowerup(type) {
    const labels = { fire: t('powerFire'), shield: t('powerShield'), rapid: t('powerRapid'), spread: t('powerSpread'), heal: t('powerHeal'), laser: t('powerLaser'), missile: t('powerMissile'), orbit: t('powerOrbit'), bomb: t('powerBomb'), magnet: t('powerMagnet'), overdrive: t('powerOverdrive'), score: t('powerScore') };
    if (type === 'fire') state.fireLevel = Math.min(4, state.fireLevel + 1);
    if (type === 'shield') state.shield = Math.min(3, state.shield + 1);
    if (type === 'rapid') state.rapidUntil = state.elapsed + 7;
    if (type === 'spread') state.spreadUntil = state.elapsed + 8;
    if (type === 'heal') state.playerHp = Math.min(difficulty().playerHp, state.playerHp + 1);
    if (type === 'laser') { state.weaponMode = 'laser'; state.laserUntil = state.elapsed + 8; }
    if (type === 'missile') { state.weaponMode = 'missile'; state.missileUntil = state.elapsed + 9; }
    if (type === 'orbit') { state.weaponMode = 'orbit'; state.orbitUntil = state.elapsed + 9; state.shield = Math.min(3, state.shield + 1); }
    if (type === 'bomb') pulseBomb();
    if (type === 'magnet') state.magnetUntil = state.elapsed + 10;
    if (type === 'overdrive') state.overdriveUntil = state.elapsed + 7;
    if (type === 'score') state.scoreMultiplierUntil = state.elapsed + 10;
    state.score += 60 * scoreMultiplier();
    toast(labels[type] || t('item'));
    spark(player.x, player.y - 20, 18, '#67e8f9');
    arpeggio([72, 79, 84], 'triangle', .05, .06);
  }

  function splashDamage(x, y, radius, damage) {
    const rr = radius * radius;
    for (const e of state.enemies) {
      const d = dist2({ x, y }, e);
      if (d < rr) e.hp -= damage * (1 - Math.sqrt(d) / radius);
    }
    if (state.boss) {
      const d = dist2({ x, y }, state.boss);
      if (d < rr) state.boss.hp -= damage * .55 * (1 - Math.sqrt(d) / radius);
    }
    destroyAt(x, y, '#fb923c', 12);
  }

  function pulseBomb() {
    for (const e of state.enemies) e.hp -= 80 + state.level * 8;
    if (state.boss) state.boss.hp -= 90 + state.level * 12;
    state.enemyBullets.length = 0;
    destroyAt(player.x, player.y - 80, '#22d3ee', 42);
    vibrate(120);
  }

  function checkLevelClear() {
    if (state.level >= 9 && state.elapsed > 82 && !state.boss && state.bossSpawnedThisLevel) {
      finish(true); return;
    }
    const levelDuration = 18 + state.level * 2.5;
    if (state.elapsed > levelDuration && !state.boss) {
      state.level += 1;
      state.elapsed = 0;
      state.bossSpawnedThisLevel = false;
      state.enemies.length = 0;
      state.enemyBullets.length = 0;
      state.nextEnemyAt = .6;
      state.nextPowerAt = Math.min(state.nextPowerAt, 2.5);
      state.waveName = [t('waveAsteroid'), t('waveIon'), t('waveSwarm'), t('waveElite')][state.level % 4];
      state.waveTimer = 3;
      toast(t('enterLevel', { level: state.level, wave: state.waveName }));
      arpeggio([67, 72, 76, 79], 'square', .06, .07);
    }
  }

  function finish(won) {
    if (state.gameOver) return;
    state.gameOver = true;
    state.started = false;
    state.won = won;
    const score = Math.floor(state.score + (won ? 900 : 0) + state.level * 80);
    state.score = score;
    const best = Math.max(state.best, score);
    state.best = best;
    localStorage.setItem(STORAGE_KEY_BEST, String(best));
    updateHud();
    updateControls();
    stopMusic();
    const earnedPoints = Math.max(20, Math.min(260, Math.round(score / 16) + (won ? 40 : 0)));
    post('gameFinished', {
      earnedPoints, score, best, difficulty: state.difficulty, difficultyName: difficulty().label,
      level: state.level, won, bossLevels: Math.floor((state.level - 1) / 3), roundId: state.roundId, finishedAt: Date.now()
    });
    showOverlay(won ? t('winTitle') : t('loseTitle'), t('finishText', { score, level: state.level, message: won ? t('winMessage') : t('loseMessage') }), t('playAgain'));
  }

  function draw() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    ctx.clearRect(0, 0, w, h);
    drawGalaxy(w, h);
    state.powerups.forEach(drawPowerup);
    state.impactWarnings.forEach(drawImpactWarning);
    state.hazards.forEach(drawHazard);
    state.bullets.forEach(drawPlayerBullet);
    state.enemyBullets.forEach(drawEnemyBullet);
    state.enemies.forEach(drawEnemy);
    if (state.boss) drawBoss(state.boss, w);
    drawParticles();
    state.allyDrones.forEach(drawAllyDrone);
    drawPlayer();
    if (state.started && state.elapsed < state.introTipUntil) drawIntroTip(w, h);
    if (state.nearMissTimer > 0) drawGrazeText(w, h);
    if (state.waveTimer > 0) drawWaveBanner(w, h);
    if (state.bossWarning > 0) drawWarning(w, h);
    if (!state.started && !state.gameOver && overlayEl.hidden) drawCenterText(w, h, t('clickToStart'));
  }

  function drawGalaxy(w, h) {
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, '#020617'); g.addColorStop(.48, '#111827'); g.addColorStop(1, '#0b1b4f');
    ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    const ng = ctx.createRadialGradient(w * .22, h * .18, 10, w * .35, h * .28, Math.max(w, h) * .52);
    ng.addColorStop(0, 'rgba(168,85,247,.22)'); ng.addColorStop(.38, 'rgba(14,165,233,.12)'); ng.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ng; ctx.fillRect(0, 0, w, h);
    for (const s of state.stars) {
      s.y += s.s * (state.started ? 18 + state.level * 2 : 8);
      if (s.y > h + 8) { s.y = -8; s.x = Math.random() * w; }
      const a = .45 + Math.sin(performance.now() / 1000 * 2 + s.tw) * .28;
      ctx.fillStyle = `hsla(${s.hue}, 95%, 78%, ${a})`;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.scale(player.scale, player.scale);
    if (player.invuln > 0 && Math.floor(player.invuln * 12) % 2 === 0) ctx.globalAlpha = .58;
    const flame = 12 + Math.sin(performance.now() / 80) * 5;
    const fg = ctx.createLinearGradient(0, 22, 0, 54);
    fg.addColorStop(0, 'rgba(103,232,249,.9)'); fg.addColorStop(1, 'rgba(37,99,235,0)');
    ctx.fillStyle = fg; ctx.beginPath(); ctx.moveTo(-16, 24); ctx.quadraticCurveTo(0, 48 + flame, 16, 24); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(148,163,184,.95)'; ctx.beginPath(); ctx.ellipse(0, 10, 34, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(34,211,238,.32)'; ctx.beginPath(); ctx.ellipse(0, 2, 22, 12, 0, Math.PI, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(224,242,254,.85)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.ellipse(0, 10, 34, 14, 0, 0, Math.PI * 2); ctx.stroke();
    for (let i = -1; i <= 1; i++) { ctx.fillStyle = COLORS[(i + 2) % COLORS.length]; ctx.beginPath(); ctx.arc(i * 18, 10, 3, 0, Math.PI * 2); ctx.fill(); }
    drawPet(-20, -46, 40, 40);
    if (state.shield > 0) {
      ctx.strokeStyle = `rgba(103,232,249,${.46 + Math.sin(performance.now()/120)*.16})`; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(0, -5, 42, 48, 0, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
  }

  function drawPet(x, y, w, h) {
    if (state.petBitmap && state.petMeta?.uv) {
      const uv = state.petMeta.uv;
      try {
        ctx.drawImage(state.petBitmap, uv.x, uv.y, uv.width, uv.height, x, y, w, h);
      } catch (_) {
        // Bitmap was detached (e.g. closed during teardown) — fall back to emoji.
        ctx.font = `${Math.round(h * .75)}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(FALLBACK_PET, x + w / 2, y + h / 2);
      }
    } else {
      ctx.font = `${Math.round(h * .75)}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(FALLBACK_PET, x + w / 2, y + h / 2);
    }
  }

  function drawPlayerBullet(b) {
    ctx.save(); ctx.shadowColor = b.color; ctx.shadowBlur = 12; ctx.fillStyle = b.color;
    if (b.type === 'missile') {
      ctx.translate(b.x, b.y); ctx.rotate(Math.atan2(b.vy, b.vx) + Math.PI / 2);
      ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(-7, 9); ctx.lineTo(0, 5); ctx.lineTo(7, 9); ctx.closePath(); ctx.fill();
    } else if (b.type === 'orb') {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.ellipse(b.x, b.y, b.r, b.type === 'laser' ? b.r * 5 : b.r * 2.8, 0, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
  function drawEnemyBullet(b) { ctx.save(); ctx.shadowColor = b.color; ctx.shadowBlur = 10; ctx.fillStyle = b.color; if (b.type === 'beam') { ctx.beginPath(); ctx.ellipse(b.x, b.y, b.r * .62, b.r * 2.4, 0, 0, Math.PI * 2); ctx.fill(); } else { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); } ctx.restore(); }

  function drawEnemy(e) {
    ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(Math.sin(e.phase) * .15);
    ctx.fillStyle = e.color; ctx.shadowColor = e.color; ctx.shadowBlur = 10;
    if (e.type === 'tank') { roundShip(-24, -15, 48, 30, 10); }
    else if (e.type === 'mine') { ctx.beginPath(); for (let i = 0; i < 8; i++) { const a = i * Math.PI / 4; ctx.lineTo(Math.cos(a) * (i % 2 ? 12 : 22), Math.sin(a) * (i % 2 ? 12 : 22)); } ctx.closePath(); ctx.fill(); }
    else if (e.type === 'sniper') { ctx.beginPath(); ctx.moveTo(0, 24); ctx.lineTo(-18, -18); ctx.lineTo(0, -8); ctx.lineTo(18, -18); ctx.closePath(); ctx.fill(); ctx.fillRect(-4, 12, 8, 20); }
    else if (e.type === 'splitter') { ctx.beginPath(); ctx.ellipse(0, 0, 24, 18, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'rgba(15,23,42,.65)'; ctx.beginPath(); ctx.arc(-9, 0, 6, 0, Math.PI * 2); ctx.arc(9, 0, 6, 0, Math.PI * 2); ctx.fill(); }
    else { ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(-22, -16); ctx.lineTo(0, -7); ctx.lineTo(22, -16); ctx.closePath(); ctx.fill(); }
    ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(15,23,42,.76)'; ctx.fillRect(-18, -27, 36, 4); ctx.fillStyle = '#22c55e'; ctx.fillRect(-18, -27, 36 * Math.max(0, e.hp / e.maxHp), 4);
    ctx.restore();
  }

  function drawBoss(b, w) {
    ctx.save(); ctx.translate(b.x, b.y);
    ctx.shadowColor = b.color; ctx.shadowBlur = 20;
    ctx.fillStyle = b.id === 'carrier' ? '#064e3b' : b.id === 'spinner' ? '#312e81' : b.id === 'laser' ? '#164e63' : '#7c2d12'; ctx.beginPath(); ctx.ellipse(0, 0, b.r + 12, b.r * .66, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = b.color;
    if (b.id === 'spinner') {
      for (let i = 0; i < 4; i++) { ctx.save(); ctx.rotate(b.phase * 1.8 + i * Math.PI / 2); ctx.beginPath(); ctx.ellipse(48, 0, 42, 10, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    } else if (b.id === 'laser') {
      ctx.beginPath(); ctx.moveTo(-70, 8); ctx.lineTo(-102, 28); ctx.lineTo(-28, 30); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(70, 8); ctx.lineTo(102, 28); ctx.lineTo(28, 30); ctx.closePath(); ctx.fill(); ctx.fillRect(-9, 18, 18, 38);
    } else if (b.id === 'asteroid') {
      ctx.beginPath();
      for (let i = 0; i < 12; i++) { const a = i * Math.PI * 2 / 12; const rr = b.r * (i % 2 ? .72 : 1.04); ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr * .68); }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#7c2d12'; ctx.beginPath(); ctx.arc(-18, -8, 12, 0, Math.PI * 2); ctx.arc(18, 10, 16, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(-58, 10); ctx.lineTo(-96, 35); ctx.lineTo(-34, 28); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(58, 10); ctx.lineTo(96, 35); ctx.lineTo(34, 28); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = b.core; ctx.beginPath(); ctx.arc(0, -4, b.id === 'carrier' ? 20 : 16, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'rgba(15,23,42,.78)'; ctx.fillRect(28, 58, w - 56, 9); ctx.fillStyle = b.color; ctx.fillRect(28, 58, (w - 56) * Math.max(0, b.hp / b.maxHp), 9);
  }

  function roundShip(x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.fill();
  }

  function drawPowerup(p) {
    const icons = { fire: '🔥', shield: '🛡️', rapid: '⚡', spread: '✨', heal: '❤️', laser: '🔷', missile: '🚀', orbit: '🌀', bomb: '💥', magnet: '🧲', overdrive: '🌈', score: '💎' };
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.phase * 3) * .18); ctx.fillStyle = 'rgba(15,23,42,.78)'; ctx.strokeStyle = '#67e8f9'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(icons[p.type] || '⭐', 0, 1); ctx.restore();
  }
  function drawHazard(z) { ctx.save(); ctx.translate(z.x, z.y); ctx.rotate(z.phase); ctx.shadowBlur = 15; ctx.shadowColor = z.type === 'ion' ? '#22d3ee' : '#fb923c'; ctx.fillStyle = z.type === 'ion' ? 'rgba(34,211,238,.34)' : '#92400e'; ctx.strokeStyle = z.type === 'ion' ? '#67e8f9' : '#fed7aa'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, z.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); if (z.type === 'meteor') { ctx.fillStyle = '#fb923c'; ctx.beginPath(); ctx.arc(-z.r*.25, -z.r*.2, z.r*.35, 0, Math.PI*2); ctx.fill(); } ctx.restore(); }
  function drawImpactWarning(mark) { const pct = clamp(mark.timer / mark.maxTimer, 0, 1); ctx.save(); ctx.globalAlpha = .95; ctx.strokeStyle = `rgba(251,113,133,${.35 + .45 * (1 - pct)})`; ctx.fillStyle = `rgba(127,29,29,${.08 + .18 * (1 - pct)})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(mark.x, mark.y, mark.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.strokeStyle = '#fed7aa'; ctx.beginPath(); ctx.arc(mark.x, mark.y, mark.r * (1 - pct), 0, Math.PI * 2); ctx.stroke(); ctx.font = '900 18px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fecdd3'; ctx.fillText('☄', mark.x, mark.y + 6); ctx.restore(); }
  function drawAllyDrone(d) { ctx.save(); ctx.translate(d.x, d.y); ctx.fillStyle = '#34d399'; ctx.shadowColor = '#34d399'; ctx.shadowBlur = 12; ctx.beginPath(); ctx.ellipse(0, 0, 15, 9, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#ecfeff'; ctx.beginPath(); ctx.arc(0, -2, 4, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
  function drawWaveBanner(w, h) { ctx.save(); ctx.globalAlpha = Math.min(1, state.waveTimer); ctx.fillStyle = '#e0f2fe'; ctx.font = '1000 22px sans-serif'; ctx.textAlign = 'center'; ctx.shadowColor = '#38bdf8'; ctx.shadowBlur = 12; ctx.fillText(state.waveName, w / 2, h * .25); ctx.restore(); }
  function drawIntroTip(w, h) { const left = Math.max(0, state.introTipUntil - state.elapsed); ctx.save(); ctx.globalAlpha = Math.min(1, left / .8); ctx.fillStyle = 'rgba(8,13,31,.72)'; ctx.strokeStyle = 'rgba(125,211,252,.45)'; ctx.lineWidth = 1.5; const boxW = Math.min(w - 34, 420), boxH = 74, x = (w - boxW) / 2, y = h * .43 - boxH / 2; roundRect(x, y, boxW, boxH, 18); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#e0f2fe'; ctx.font = `900 ${Math.max(13, Math.min(16, w / 24))}px sans-serif`; ctx.textAlign = 'center'; ctx.fillText(t('introTip1'), w / 2, y + 29); ctx.fillStyle = '#bae6fd'; ctx.font = `800 ${Math.max(11, Math.min(13, w / 29))}px sans-serif`; ctx.fillText(t('introTip2'), w / 2, y + 53); ctx.restore(); }
  function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); }
  function drawParticles() { for (const p of state.particles) { ctx.globalAlpha = Math.max(0, p.life / p.maxLife); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; } }
  function drawWarning(w, h) { ctx.save(); ctx.fillStyle = `rgba(251,113,133,${.18 + Math.sin(performance.now()/80)*.08})`; ctx.fillRect(0, 0, w, h); ctx.fillStyle = '#fecdd3'; ctx.font = '900 28px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('⚠ BOSS WAVE ⚠', w/2, h*.34); ctx.restore(); }
  function drawCenterText(w, h, text) { ctx.save(); ctx.fillStyle = 'rgba(224,242,254,.9)'; ctx.font = '900 20px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(text, w / 2, h / 2); ctx.restore(); }
  function drawGrazeText(w, h) { ctx.save(); ctx.globalAlpha = Math.min(1, state.nearMissTimer / .25); ctx.fillStyle = '#facc15'; ctx.font = '900 16px sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom'; ctx.shadowColor = 'rgba(0,0,0,.8)'; ctx.shadowBlur = 4; ctx.fillText(t('grazeText'), w - 14, h - 16); ctx.restore(); }

  function spark(x, y, n, color) { for (let i = 0; i < n; i++) state.particles.push({ x, y, vx: rand(-130,130), vy: rand(-130,80), r: rand(1.5,4), life: rand(.18,.48), maxLife: .48, color, gravity: 120 }); }
  function destroyAt(x, y, color, n = 18) { spark(x, y, n, color); }

  function toast(text) {
    const el = document.createElement('div'); el.className = 'ht-toast'; el.textContent = text; document.body.appendChild(el); setTimeout(() => el.remove(), 1300);
  }
  function vibrate(ms) { try { navigator.vibrate?.(ms); } catch (_) {} }

  function ensureAudio() {
    if (sound.ctx) { if (sound.ctx.state === 'suspended') sound.ctx.resume().catch(() => {}); return; }
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    try {
      sound.ctx = new Ctx();
      sound.master = sound.ctx.createGain(); sound.master.gain.value = sound.muted ? 0 : .9; sound.master.connect(sound.ctx.destination);
      sound.sfxGain = sound.ctx.createGain(); sound.sfxGain.gain.value = .18; sound.sfxGain.connect(sound.master);
      sound.musicGain = sound.ctx.createGain(); sound.musicGain.gain.value = .12; sound.musicGain.connect(sound.master);
    } catch (_) {}
  }
  function beep(freq, dur, type, gain) {
    if (!sound.ctx || !sound.sfxGain) return;
    try {
      const osc = sound.ctx.createOscillator(); const g = sound.ctx.createGain();
      osc.type = type || 'sine'; osc.frequency.value = freq; g.gain.value = gain || .04;
      osc.connect(g); g.connect(sound.sfxGain); osc.start(); g.gain.exponentialRampToValueAtTime(.001, sound.ctx.currentTime + dur); osc.stop(sound.ctx.currentTime + dur + .02);
    } catch (_) {}
  }

  // --- MIDI-style chiptune music engine ---
  function playMusicNote(midi, dur, type, gain, dest) {
    if (!sound.ctx || midi <= 0) return;
    try {
      const t = sound.ctx.currentTime;
      const osc = sound.ctx.createOscillator(); const g = sound.ctx.createGain();
      osc.type = type; osc.frequency.value = midiFreq(midi);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(gain, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g); g.connect(dest); osc.start(t); osc.stop(t + dur + 0.02);
    } catch (_) {}
  }
  function startMusic() {
    if (!sound.ctx || !sound.musicGain) return;
    sound.musicPlaying = true;
    sound.musicTimer = 0;
  }
  function stopMusic() { sound.musicPlaying = false; }
  function updateMusic(dt) {
    if (!sound.musicPlaying || !sound.ctx || !sound.musicGain) return;
    const stepDur = 30 / MUSIC.bpm; // 8th-note seconds
    sound.musicTimer -= dt;
    if (sound.musicTimer > 0) return;
    sound.musicTimer = stepDur;
    const i = sound.musicStep % MUSIC.lead.length;
    playMusicNote(MUSIC.lead[i], stepDur * 0.95, 'square', .085, sound.musicGain);
    if (sound.musicStep % 2 === 0) playMusicNote(MUSIC.bass[i], stepDur * 1.7, 'triangle', .12, sound.musicGain);
    sound.musicStep++;
  }
  function arpeggio(notes, type = 'square', gap = 0.06, gain = .07) {
    if (!sound.ctx || !sound.sfxGain) return;
    notes.forEach((n, i) => {
      const t = sound.ctx.currentTime + i * gap;
      try {
        const osc = sound.ctx.createOscillator(); const g = sound.ctx.createGain();
        osc.type = type; osc.frequency.value = midiFreq(n);
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(gain, t + 0.008); g.gain.exponentialRampToValueAtTime(0.0001, t + gap + 0.05);
        osc.connect(g); g.connect(sound.sfxGain); osc.start(t); osc.stop(t + gap + 0.06);
      } catch (_) {}
    });
  }
  function setMuted(m) {
    sound.muted = m;
    if (sound.master) sound.master.gain.value = m ? 0 : .9;
    try { localStorage.setItem('haqiThunderMuted', m ? '1' : '0'); } catch (_) {}
    const btn = document.getElementById('htMute');
    if (btn) btn.textContent = m ? '🔇' : '🔊';
  }

  function requestPetImage() {
    const requestId = 'thunder_pet_' + Date.now();
    state.petRequestId = requestId;
    window.parent?.postMessage({ type: 'haqi_get_pet_image', requestId, anim: 'idle' }, '*');
    setTimeout(() => {
      if (state.petBitmap) return;
      window.parent?.postMessage({ type: 'haqi_get_pet_images', requestId: `thunder_pets_${Date.now()}`, anim: 'idle' }, '*');
    }, 900);
  }
  async function setPetImage(pet) {
    if (!pet?.imageBlob) return;
    try {
      // Build the new bitmap first; only swap once it's ready so the render
      // loop never sees a closed (detached) bitmap mid-await.
      const nextUrl = URL.createObjectURL(pet.imageBlob);
      const nextBitmap = await createImageBitmap(pet.imageBlob);
      const oldBitmap = state.petBitmap;
      const oldUrl = state.petUrl;
      state.petMeta = pet;
      state.petUrl = nextUrl;
      state.petBitmap = nextBitmap;
      if (oldBitmap?.close) oldBitmap.close();
      if (oldUrl) URL.revokeObjectURL(oldUrl);
    } catch (_) {}
  }
  async function handlePetImage(msg) {
    if (!msg?.ok || !msg.data?.imageBlob) return;
    await setPetImage(msg.data);
  }

  function bindEvents() {
    window.addEventListener('resize', resize);
    window.addEventListener('keydown', e => {
      const key = String(e.key || '').toLowerCase();
      if (['w','a','s','d','arrowup','arrowleft','arrowdown','arrowright',' ','shift','e'].includes(key)) e.preventDefault();
      if (key === 'shift') activateDash();
      if (key === ' ') activateSkillBomb();
      if (key === 'e') activateDrone();
      state.keys[key] = true;
      if (!state.started && overlayEl.hidden && !state.gameOver) startGame();
    }, { passive: false });
    window.addEventListener('keyup', e => { state.keys[String(e.key || '').toLowerCase()] = false; });
    let lastTap = 0;
    canvas.addEventListener('pointerdown', e => { e.preventDefault(); const now = performance.now(); if (now - lastTap < 280) activateDash(); lastTap = now; state.pointerActive = true; setPointer(e); if (!state.started && !state.gameOver) startGame(); }, { passive: false });
    canvas.addEventListener('pointermove', e => { if (state.pointerActive) setPointer(e); }, { passive: false });
    window.addEventListener('pointerup', () => { state.pointerActive = false; });
    window.addEventListener('pointercancel', () => { state.pointerActive = false; });
    window.addEventListener('message', e => {
      const msg = e.data || {};
      if (msg.type === 'setGameConfig' && msg.data?.difficulty && DIFFICULTIES[msg.data.difficulty]) {
        state.difficulty = msg.data.difficulty; setupDifficultyButtons(); resetGame(false);
      }
      if (msg.type === 'gameContinue') { resetGame(true); }
      if (msg.type === 'haqi_pet_image' && (!state.petRequestId || !msg.requestId || msg.requestId === state.petRequestId || msg.requestId === 'active_pet_config')) handlePetImage(msg);
      if (msg.type === 'haqi_pet_images' && msg.ok) {
        const firstPet = Array.isArray(msg.data?.pets) ? msg.data.pets[0] : null;
        if (firstPet) setPetImage(firstPet);
      }
      if (msg.type === 'setGameConfig' && msg.data?.petId) requestPetImage(msg.data.petId);
    });
    const openHelp = () => {
      if (state.started && !state.gameOver) state.paused = true;
      showOverlay(t('helpTitle'), t('helpText'), state.gameOver ? t('playAgain') : (state.started ? t('continueGame') : t('startBtn')));
    };
    document.getElementById('htMenu').onclick = openHelp;
    document.getElementById('htRestart').onclick = () => resetGame(true);
    const bindSkill = (id, fn) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); fn(); }, { passive: false });
    };
    bindSkill('htSkillDash', activateDash);
    bindSkill('htSkillBomb', activateSkillBomb);
    bindSkill('htSkillDrone', activateDrone);
    document.getElementById('htMute').onclick = () => { ensureAudio(); setMuted(!sound.muted); };
    startBtn.onclick = () => {
      if (state.gameOver) { resetGame(false); startGame(); return; }
      if (state.started && state.paused) { ensureAudio(); state.paused = false; state.lastTime = 0; hideOverlay(); return; }
      startGame();
    };
  }

  function setPointer(e) {
    const rect = canvas.getBoundingClientRect();
    state.pointerX = clamp(e.clientX - rect.left, 30, rect.width - 30);
    state.pointerY = clamp(e.clientY - rect.top, 78, rect.height - 36);
  }

  try { sound.muted = localStorage.getItem('haqiThunderMuted') === '1'; } catch (_) {}
  setupDifficultyButtons();
  resize();
  resetGame(false);
  bindEvents();
  setMuted(sound.muted);
  requestPetImage();
  ensureLoadedPosted();
  requestAnimationFrame(loop);
})();
</script>
