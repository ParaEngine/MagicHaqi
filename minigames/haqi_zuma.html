<body></body>
<script defer>
(function () {

      comboText: '连击 x{streak}',

      food: 'Food',
      score: 'Score',
      best: 'Best',
      hint: 'Drag to aim, release to shoot; swap current and next ball when needed',
      helpBtn: 'Help',
      restartBtn: 'Restart',
      swapAria: 'Swap current and next ball',
      menuAria: 'Help',
      overlayTitle: 'Pet Zuma',
      overlayText: 'Your current pet stands in the center and shoots colored balls. Drag to aim, release to fire; insert balls into the chain on the track. Three or more same-colored balls in a row will pop. Collect enough food hidden in the balls to advance to the next randomly generated level.',
      startChallenge: 'Start Challenge',
      diffEasy: 'Easy',
      diffNormal: 'Normal',
      diffHard: 'Hard',
      comboText: 'Combo x{streak}',
      collectFood: 'Food +{count}',
      winTitle: 'Level Clear!',
      winText: 'Level {level} complete — collected {foods}/{target} food.',
      nextLevel: 'Next Level',
      loseTitle: 'Challenge Failed',
      loseText: 'The chain is nearing the end — focus on popping the front same-colored balls first.',
      retry: 'Try Again',
      startMarker: 'S',
      endMarker: 'End',
      nextBall: 'Next',
      menuTitle: 'Pet Zuma',
      menuText: 'Drag to aim and release to shoot colored balls. Balls insert into the chain on contact; three or more same-colored balls in a row will pop. Collect enough food hidden in the balls to clear the level. Use the swap button to exchange the current and next ball.',
      continueGame: 'Continue',
      difficultiesAria: 'Select difficulty',
    },
  };
  function detectLang() {
    try {
      const params = new URLSearchParams(window.location.search);
      const lang = params.get('lang');
      if (lang && I18N[lang]) return lang;
    } catch (_) {}
    return 'zhCN';
  }
  const LANG = detectLang();
  const L = I18N[LANG];
  function t(key, vars) {
    let str = L[key] || I18N.zhCN[key] || key;
    if (vars) str = str.replace(/\{(\w+)\}/g, (m, n) => vars[n] != null ? String(vars[n]) : m);
    return str;
  }
  try { document.documentElement.setAttribute('lang', LANG === 'enUS' ? 'en' : 'zh-CN'); } catch (_) {}
  try { document.title = t('title'); } catch (_) {}

  const STORAGE_DIFFICULTY = 'haqiZumaDifficultyV1';
  const STORAGE_BEST_SCORE = 'haqiZumaBestScoreV1';
  const STORAGE_BEST_LEVEL = 'haqiZumaBestLevelV1';
  const PET_FALLBACK = '🐾';
  const FOOD_ICONS = ['🍎', '🍓', '🍇', '🍪', '🍯', '🍰', '🍒', '🍊', '🍉', '🥕'];
  const COLORS = [
    { name: 'berry', from: '#fb7185', to: '#e11d48', glow: 'rgba(251,113,133,.4)' },
    { name: 'sky', from: '#67e8f9', to: '#0284c7', glow: 'rgba(56,189,248,.36)' },
    { name: 'leaf', from: '#86efac', to: '#16a34a', glow: 'rgba(34,197,94,.36)' },
    { name: 'sun', from: '#fde68a', to: '#f59e0b', glow: 'rgba(245,158,11,.36)' },
    { name: 'violet', from: '#c4b5fd', to: '#7c3aed', glow: 'rgba(139,92,246,.36)' },
    { name: 'coral', from: '#fdba74', to: '#f97316', glow: 'rgba(249,115,22,.36)' },
  ];
  const DIFFICULTIES = {
    easy: { id: 'easy', label: t('diffEasy'), colorCount: 4, balls: 34, speed: 18, targetFoods: 5, score: 100, slowAfterPop: 980 },
    normal: { id: 'normal', label: t('diffNormal'), colorCount: 5, balls: 44, speed: 25, targetFoods: 7, score: 150, slowAfterPop: 720 },
    hard: { id: 'hard', label: t('diffHard'), colorCount: 6, balls: 56, speed: 34, targetFoods: 9, score: 210, slowAfterPop: 480 },
  };
  const DIFFICULTY_ORDER = ['easy', 'normal', 'hard'];

  const state = {
    difficulty: localStorage.getItem(STORAGE_DIFFICULTY) || 'normal',
    bestScore: Math.max(0, Number(localStorage.getItem(STORAGE_BEST_SCORE) || 0)),
    bestLevel: Math.max(1, Number(localStorage.getItem(STORAGE_BEST_LEVEL) || 1)),
    level: 1,
    score: 0,
    foods: 0,
    targetFoods: 0,
    started: false,
    finished: false,
    paused: false,
    loadedPosted: false,
    aiming: false,
    aimX: 0,
    aimY: 0,
    colorCount: 5,
    chain: [],
    path: [],
    samples: [],
    pathLength: 1,
    headS: 0,
    gap: 34,
    radius: 16,
    speed: 0.034,
    spawnPause: 0,
    chainMotion: null,
    pendingInsert: null,
    queuedShot: null,
    projectile: null,
    currentType: 0,
    nextType: 1,
    comboStreak: 0,
    particles: [],
    floatingTexts: [],
    shockwaves: [],
    recoilUntil: 0,
    roundId: '',
    petBitmap: null,
    petMeta: null,
    petRequestId: '',
    objectUrls: [],
  };
  const sound = { ctx: null, master: null, lastDangerAt: 0 };

  const root = document.createElement('div');
  root.id = 'haqiZuma';
  root.innerHTML = `
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        color: #15324b;
        background: linear-gradient(180deg, #b9f0ff 0%, #dcfce7 48%, #fde68a 100%);
        user-select: none;
        touch-action: none;
      }
      .mh-shell { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; }
      .mh-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
      .mh-top {
        position: absolute; left: 8px; right: 8px; top: 8px; z-index: 3;
        min-height: 48px; display: grid; grid-template-columns: 38px minmax(0, 1fr) auto; align-items: center; gap: 8px;
        padding: 7px 9px; border-radius: 14px; background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(240,253,250,.9));
        border: 2px solid rgba(255,255,255,.96); box-shadow: 0 5px 0 rgba(14,116,144,.13), 0 12px 24px rgba(15,23,42,.12);
        backdrop-filter: blur(8px);
      }
      .mh-title { min-width: 0; text-align: center; font-size: 18px; font-weight: 1000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mh-stats { display: flex; align-items: center; justify-content: flex-end; gap: 5px; flex-wrap: wrap; }
      .mh-pill {
        height: 29px; min-width: 48px; display: inline-flex; align-items: center; justify-content: center; gap: 3px;
        padding: 0 8px; border-radius: 999px; background: linear-gradient(180deg, #fff, #ecfeff); border: 1px solid rgba(14,116,144,.2);
        color: #0f766e; font-size: 12px; font-weight: 900; box-shadow: 0 2px 0 rgba(14,116,144,.12);
      }
      .mh-food-pill { min-width: 96px; position: relative; overflow: hidden; }
      .mh-food-fill { position: absolute; left: 4px; right: auto; bottom: 3px; width: 0%; height: 4px; border-radius: 999px; background: linear-gradient(90deg, #facc15, #22c55e); transition: width .22s ease; }
      .mh-food-pill b, .mh-food-pill span { position: relative; z-index: 1; }
      .mh-pill.danger { color: #b91c1c; background: linear-gradient(180deg, #fff, #fee2e2); border-color: rgba(239,68,68,.35); animation: mhPulseWarn .82s ease-in-out infinite; }
      .mh-icon-btn, .mh-action, .mh-start, .mh-difficulty { border: 0; cursor: pointer; font-weight: 900; }
      .mh-icon-btn { width: 34px; height: 34px; border-radius: 999px; background: linear-gradient(180deg, #fb923c, #ea580c); color: white; box-shadow: 0 3px 0 #9a3412; font-size: 18px; }
      .mh-bottom {
        position: absolute; left: 8px; right: 8px; bottom: 8px; z-index: 3;
        display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: end; gap: 8px; pointer-events: none;
      }
      .mh-hint {
        justify-self: center; min-height: 34px; display: inline-flex; align-items: center; justify-content: center; padding: 0 12px;
        border-radius: 999px; background: rgba(255,255,255,.86); border: 1px solid rgba(14,116,144,.2);
        color: #0f766e; font-size: 13px; font-weight: 900; box-shadow: 0 3px 0 rgba(14,116,144,.13); white-space: nowrap;
      }
      .mh-controls { pointer-events: auto; display: flex; align-items: center; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }
      .mh-action { height: 34px; border-radius: 999px; padding: 0 12px; background: linear-gradient(180deg, #38bdf8, #0284c7); color: white; box-shadow: 0 4px 0 #075985; }
      .mh-action.help { background: linear-gradient(180deg, #fb923c, #ea580c); box-shadow-color: #9a3412; }
      .mh-action.swap { min-width: 42px; padding: 0 10px; background: linear-gradient(180deg, #a78bfa, #7c3aed); box-shadow-color: #5b21b6; }
      .mh-difficulties { display: flex; align-items: center; gap: 4px; padding: 4px; border-radius: 999px; background: rgba(255,255,255,.82); border: 1px solid rgba(14,116,144,.16); }
      .mh-difficulty { height: 28px; min-width: 44px; padding: 0 9px; border-radius: 999px; background: transparent; color: #0f766e; font-size: 12px; }
      .mh-difficulty.active { background: linear-gradient(180deg, #34d399, #16a34a); color: white; box-shadow: 0 2px 0 #15803d; }
      .mh-action:active, .mh-start:active, .mh-icon-btn:active, .mh-difficulty:active { transform: translateY(2px); filter: brightness(.98); }
      .mh-overlay { position: fixed; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center; padding: 18px; background: rgba(15,39,71,.48); }
      .mh-card {
        width: min(92vw, 440px); padding: 20px; border-radius: 18px; background: linear-gradient(180deg, #fff, #eff6ff 58%, #f0fdf4);
        border: 3px solid #7dd3fc; box-shadow: 0 18px 44px rgba(15,23,42,.28), 0 0 0 7px rgba(255,255,255,.38); text-align: center;
      }
      .mh-card h1 { margin: 0 0 10px; color: #15324b; font-size: 26px; font-weight: 1000; }
      .mh-card p { margin: 0 0 14px; color: #0f766e; font-size: 15px; font-weight: 800; line-height: 1.55; }
      .mh-card-row { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; margin: 12px 0 16px; }
      .mh-start { border-radius: 999px; padding: 10px 24px; background: linear-gradient(180deg, #34d399, #16a34a); color: white; box-shadow: 0 5px 0 #15803d; }
      .mh-toast {
        position: fixed; left: 50%; top: 50%; z-index: 45; transform: translate(-50%, -50%); min-width: min(300px, 82vw);
        padding: 18px 22px; border-radius: 18px; background: white; border: 3px solid #86efac; color: #15803d;
        font-size: 22px; font-weight: 1000; text-align: center; box-shadow: 0 18px 42px rgba(15,23,42,.24); animation: mhToast 1.2s ease-out forwards; pointer-events: none;
      }
      .mh-confetti { position: fixed; top: -16px; z-index: 48; width: 9px; height: 15px; border-radius: 3px; background: var(--c); animation: mhConfetti var(--d) ease-in forwards; pointer-events: none; }
      [hidden] { display: none !important; }
      @keyframes mhToast { 0% { opacity: 0; transform: translate(-50%, -42%) scale(.84); } 18% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -76%) scale(.94); } }
      @keyframes mhConfetti { 100% { opacity: 0; transform: translate3d(var(--x), 112vh, 0) rotate(680deg); } }
      @keyframes mhPulseWarn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      @media (max-width: 560px) {
        .mh-top { grid-template-columns: 36px 1fr; }
        .mh-stats { grid-column: 1 / -1; justify-content: center; }
        .mh-bottom { grid-template-columns: 1fr; justify-items: center; }
        .mh-controls { justify-content: center; }
        .mh-hint { font-size: 12px; }
      }
      @media (max-height: 520px) {
        .mh-top { min-height: 42px; padding: 5px 7px; }
        .mh-stats .optional { display: none; }
        .mh-hint { display: none; }
      }
    </style>
    <div class="mh-shell">
      <canvas id="mhCanvas" class="mh-canvas" aria-label="${t('canvasAria')}"></canvas>
      <header class="mh-top">
        <button id="mhMenu" class="mh-icon-btn" type="button" aria-label="${t('menuAria')}">?</button>
        <div class="mh-title">${t('title')}</div>
        <div class="mh-stats" aria-label="${t('gameStatusAria')}">
          <span class="mh-pill">${t('level')} <b id="mhLevel">1</b></span>
          <span id="mhDangerPill" class="mh-pill mh-food-pill"><span>${t('food')}</span> <b id="mhFood">0</b>/<b id="mhTarget">0</b><i id="mhFoodFill" class="mh-food-fill"></i></span>
          <span class="mh-pill optional">${t('score')} <b id="mhScore">0</b></span>
          <span class="mh-pill optional">${t('best')} <b id="mhBest">0</b></span>
        </div>
      </header>
      <footer class="mh-bottom">
        <div class="mh-hint">${t('hint')}</div>
        <div class="mh-controls">
          <div id="mhDifficulties" class="mh-difficulties" aria-label="${t('difficultiesAria')}"></div>
          <button id="mhSwap" class="mh-action swap" type="button" aria-label="${t('swapAria')}">⇄</button>
          <button id="mhHelp" class="mh-action help" type="button">${t('helpBtn')}</button>
          <button id="mhRestart" class="mh-action" type="button">${t('restartBtn')}</button>
        </div>
      </footer>
      <div id="mhOverlay" class="mh-overlay">
        <div class="mh-card">
          <h1 id="mhOverlayTitle">${t('overlayTitle')}</h1>
          <p id="mhOverlayText">${t('overlayText')}</p>
          <div id="mhOverlayDifficulties" class="mh-card-row"></div>
          <button id="mhStart" class="mh-start" type="button">${t('startChallenge')}</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(root);

  const canvas = document.getElementById('mhCanvas');
  const ctx = canvas.getContext('2d');
  const overlayEl = document.getElementById('mhOverlay');
  const overlayTitleEl = document.getElementById('mhOverlayTitle');
  const overlayTextEl = document.getElementById('mhOverlayText');
  const startBtn = document.getElementById('mhStart');
  const hudEls = {
    level: document.getElementById('mhLevel'),
    food: document.getElementById('mhFood'),
    target: document.getElementById('mhTarget'),
    score: document.getElementById('mhScore'),
    best: document.getElementById('mhBest'),
    danger: document.getElementById('mhDangerPill'),
    foodFill: document.getElementById('mhFoodFill'),
  };

  let width = 0;
  let height = 0;
  let dpr = 1;
  let playTop = 72;
  let playBottom = 520;
  let shooterX = 0;
  let shooterY = 0;
  let rafId = 0;
  let lastTime = 0;

  function cfg() {
    return DIFFICULTIES[state.difficulty] || DIFFICULTIES.normal;
  }

  function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    width = Math.max(320, window.innerWidth);
    height = Math.max(240, window.innerHeight);
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = `${width}px`;
    canvas.style.height = `${height}px`;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    refreshLayout();
    if (state.path.length) rebuildLevelPath(false);
    draw(performance.now());
  }

  function refreshLayout() {
    const topBar = root.querySelector('.mh-top')?.getBoundingClientRect();
    const bottomBar = root.querySelector('.mh-bottom')?.getBoundingClientRect();
    playTop = Math.max(68, (topBar?.bottom || 54) + 12);
    playBottom = Math.max(playTop + 180, (bottomBar?.top || height - 48) - 8);
    shooterX = width / 2;
    shooterY = playTop + (playBottom - playTop) * 0.56;
    state.radius = clamp(Math.min(width, playBottom - playTop) * 0.037, 12, 22);
    state.gap = state.radius * 1.92;
  }

  function startGame(options = {}) {
    const keepLevel = options.keepLevel === true;
    stopLoop();
    if (!width) resize(); // ensure canvas/layout is sized if deferred boot resize hasn't run yet
    state.started = true;
    state.finished = false;
    state.paused = false;
    state.level = keepLevel ? Math.max(1, state.level) : 1;
    state.score = keepLevel ? state.score : 0;
    state.foods = 0;
    state.projectile = null;
    state.comboStreak = 0;
    state.chainMotion = null;
    state.pendingInsert = null;
    state.queuedShot = null;
    state.particles = [];
    state.floatingTexts = [];
    state.shockwaves = [];
    state.recoilUntil = 0;
    state.chainMotion = null;
    state.roundId = `${state.difficulty}-${state.level}-${Date.now()}`;
    generateLevel();
    hideOverlay();
    updateHud();
    post('gameStarted', {
      difficulty: DIFFICULTY_ORDER.indexOf(state.difficulty) + 1,
      difficultyId: state.difficulty,
      level: state.level,
      targetFood: state.targetFoods,
    });
    playSound('start');
    lastTime = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  function nextLevel() {
    state.level += 1;
    startGame({ keepLevel: true });
  }

  function generateLevel() {
    const config = cfg();
    const random = seededRandom(hashSeed(`${state.difficulty}:${state.level}:${Date.now() % 9973}`));
    const levelStep = Math.max(0, state.level - 1);
    const starterEase = state.level === 1 ? 0.86 : state.level === 2 ? 0.94 : 1;
    state.colorCount = clamp(config.colorCount + Math.floor(Math.max(0, state.level - 4) / 6), config.colorCount, COLORS.length);
    state.speed = config.speed * starterEase * (1 + Math.min(0.24, levelStep * 0.018));
    state.targetFoods = config.targetFoods + Math.floor(levelStep * (state.difficulty === 'hard' ? 0.65 : state.difficulty === 'normal' ? 0.45 : 0.28));
    state.path = createRandomPath(random);
    buildSamples();
    const count = config.balls + Math.floor(levelStep * (state.difficulty === 'hard' ? 1.85 : state.difficulty === 'normal' ? 1.35 : 0.9));
    state.headS = Math.min(state.pathLength * 0.34, count * state.gap * 0.42);
    state.chain = [];
    for (let i = 0; i < count; i++) {
      const lastType = state.chain[i - 1]?.type;
      const prevType = state.chain[i - 2]?.type;
      let type = Math.floor(random() * state.colorCount);
      if (lastType === type && prevType === type && random() < 0.82) type = (type + 1 + Math.floor(random() * (state.colorCount - 1))) % state.colorCount;
      state.chain.push({ type, food: '', wobble: random() * 12, born: 0 });
    }
    placeFoods(random);
    reflowChain();
    state.currentType = usefulType(random);
    state.nextType = usefulType(random);
  }

  function rebuildLevelPath(keepProgress) {
    const oldRatio = state.pathLength > 1 ? state.headS / state.pathLength : 0.2;
    state.path = createRandomPath(seededRandom(hashSeed(`${state.difficulty}:${state.level}:resize`)));
    buildSamples();
    if (keepProgress) state.headS = oldRatio * state.pathLength;
    reflowChain();
  }

  function createRandomPath(random) {
    const margin = Math.max(24, state.radius * 2.2);
    const left = margin;
    const right = width - margin;
    const top = playTop + state.radius * 1.2;
    const bottom = playBottom - state.radius * 1.4;
    const areaW = Math.max(220, right - left);
    const areaH = Math.max(160, bottom - top);
    const templates = [
      [[-0.1, 0.18], [0.18, 0.14], [0.74, 0.18], [0.88, 0.42], [0.22, 0.44], [0.18, 0.72], [0.72, 0.76], [0.82, 0.6], [0.54, 0.55], [0.88, 0.34]],
      [[1.1, 0.16], [0.76, 0.13], [0.22, 0.22], [0.14, 0.5], [0.72, 0.48], [0.84, 0.76], [0.28, 0.78], [0.22, 0.6], [0.48, 0.54], [0.12, 0.34]],
      [[0.16, -0.08], [0.14, 0.22], [0.78, 0.22], [0.82, 0.5], [0.24, 0.5], [0.24, 0.76], [0.68, 0.78], [0.68, 0.62], [0.42, 0.58], [0.88, 0.72]],
      [[0.88, -0.08], [0.82, 0.2], [0.3, 0.18], [0.18, 0.4], [0.78, 0.42], [0.8, 0.68], [0.28, 0.76], [0.18, 0.58], [0.48, 0.54], [0.12, 0.72]],
    ];
    const template = templates[Math.floor(random() * templates.length)];
    return template.map(([nx, ny], index) => {
      const isEdge = index === 0;
      const isTunnel = index === template.length - 1;
      const jitter = index > 0 && index < template.length - 1 ? 0.035 : 0;
      let point = {
        x: left + (nx + (random() - 0.5) * jitter) * areaW,
        y: top + (ny + (random() - 0.5) * jitter) * areaH,
      };
      if (!isEdge) {
        point.x = clamp(point.x, left + state.radius, right - state.radius);
        point.y = clamp(point.y, top + state.radius, bottom - state.radius);
        point = keepPointAwayFromShooter(point, left, right, top, bottom, isTunnel);
      }
      return point;
    });
  }

  function keepPointAwayFromShooter(point, left, right, top, bottom, isTunnel = false) {
    const clearance = isTunnel
      ? Math.max(state.radius * 10, Math.min(width, playBottom - playTop) * 0.28)
      : state.radius * 5.4;
    const dx = point.x - shooterX;
    const dy = point.y - shooterY;
    const dist = Math.hypot(dx, dy);
    if (dist >= clearance) return point;
    const angle = dist > 0.1 ? Math.atan2(dy, dx) : -Math.PI / 2;
    return {
      x: clamp(shooterX + Math.cos(angle) * clearance, left + state.radius, right - state.radius),
      y: clamp(shooterY + Math.sin(angle) * clearance, top + state.radius, bottom - state.radius),
    };
  }

  function buildSamples() {
    state.samples = [];
    let total = 0;
    for (let i = 0; i < state.path.length - 1; i++) {
      const a = state.path[i];
      const b = state.path[i + 1];
      const dist = distance(a.x, a.y, b.x, b.y);
      const steps = Math.max(8, Math.ceil(dist / 8));
      for (let step = 0; step < steps; step++) {
        const t = step / steps;
        const p = catmullPoint(state.path, i, t);
        const prev = state.samples[state.samples.length - 1];
        if (prev) total += distance(prev.x, prev.y, p.x, p.y);
        state.samples.push({ x: p.x, y: p.y, s: total });
      }
    }
    const end = state.path[state.path.length - 1];
    const prev = state.samples[state.samples.length - 1];
    if (prev) total += distance(prev.x, prev.y, end.x, end.y);
    state.samples.push({ x: end.x, y: end.y, s: total });
    state.pathLength = Math.max(1, total);
  }

  function catmullPoint(points, index, t) {
    const p0 = points[Math.max(0, index - 1)];
    const p1 = points[index];
    const p2 = points[Math.min(points.length - 1, index + 1)];
    const p3 = points[Math.min(points.length - 1, index + 2)];
    const t2 = t * t;
    const t3 = t2 * t;
    return {
      x: 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3),
      y: 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3),
    };
  }

  function placeFoods(random) {
    const foodCount = Math.min(state.chain.length, state.targetFoods + Math.ceil(state.level / 2));
    const indexes = state.chain.map((_, index) => index);
    shuffle(indexes, random);
    for (let i = 0; i < foodCount; i++) {
      state.chain[indexes[i]].food = FOOD_ICONS[Math.floor(random() * FOOD_ICONS.length)];
    }
  }

  function loop(now) {
    rafId = 0;
    if (!state.started || state.paused) return;
    const dt = Math.min(34, Math.max(0, now - lastTime || 16));
    lastTime = now;
    update(dt, now);
    draw(now);
    if (state.started && !state.paused) rafId = requestAnimationFrame(loop);
  }

  function update(dt, now) {
    if (state.finished) return;
    const slow = state.spawnPause > 0 ? 0.25 : 1;
    state.spawnPause = Math.max(0, state.spawnPause - dt);
    updateChainMotion(dt);
    if (!state.chainMotion && !state.pendingInsert) state.headS += state.speed * (dt / 1000) * slow;
    reflowChain();
    updatePendingInsert(dt);
    updateQueuedShot();
    updateChainVisuals(dt);
    updateProjectile(dt);
    state.particles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.0014 * dt;
      p.life -= dt;
      p.size *= 0.993;
    });
    state.floatingTexts.forEach(t => {
      t.y -= 0.035 * dt;
      t.life -= dt;
    });
    state.shockwaves.forEach(wave => {
      wave.radius += wave.speed * dt;
      wave.life -= dt;
    });
    state.particles = state.particles.filter(p => p.life > 0);
    state.floatingTexts = state.floatingTexts.filter(t => t.life > 0);
    state.shockwaves = state.shockwaves.filter(wave => wave.life > 0);
    if (!state.chain.length) finishLevel(true);
    else if (state.chain[0].s >= state.pathLength - state.radius * 0.8) finishLevel(false);
    else if (state.chain[0].s > state.pathLength * 0.82 && now - sound.lastDangerAt > 1300) {
      sound.lastDangerAt = now;
      playSound('danger');
    }
  }

  function reflowChain() {
    const motion = state.chainMotion;
    for (let i = 0; i < state.chain.length; i++) {
      let offset = 0;
      if (motion) {
        offset = i < motion.gapIndex ? motion.pullBack : motion.gapOffset;
      }
      state.chain[i].s = state.headS - i * state.gap - offset;
    }
  }

  function updateChainVisuals(dt) {
    const ease = 1 - Math.pow(0.0015, dt / 1000);
    state.chain.forEach(ball => {
      if (typeof ball.visualS !== 'number') {
        ball.visualS = ball.s;
        return;
      }
      const delta = ball.s - ball.visualS;
      if (Math.abs(delta) < 0.15) ball.visualS = ball.s;
      else ball.visualS += delta * ease;
    });
  }

  function updatePendingInsert(dt) {
    const insert = state.pendingInsert;
    if (!insert) return;
    insert.life -= dt;
    if (insert.life > 0) return;
    const index = Math.max(0, Math.min(insert.index, state.chain.length - 1));
    state.pendingInsert = null;
    reflowChain();
    resolveMatches(index);
  }

  function updateQueuedShot() {
    if (!state.queuedShot || state.pendingInsert || state.projectile) return;
    const shot = state.queuedShot;
    state.queuedShot = null;
    fireAt(shot.x, shot.y);
  }

  function updateChainMotion(dt) {
    const motion = state.chainMotion;
    if (!motion) return;
    if (!state.chain.length || motion.gapIndex <= 0 || motion.gapIndex >= state.chain.length) {
      state.chainMotion = null;
      return;
    }
    if (motion.pause > 0) {
      motion.pause = Math.max(0, motion.pause - dt);
      return;
    }
    const fillStep = Math.max(state.radius * 3.8, state.speed * 2.9) * (dt / 1000);
    if (motion.rollback) {
      motion.pullBack = Math.min(motion.maxGap, motion.pullBack + fillStep * 0.58);
      motion.gapOffset = Math.max(0, motion.gapOffset - fillStep * 0.42);
      if (motion.pullBack >= motion.gapOffset) completeChainMotion(true);
      return;
    }
    motion.gapOffset = Math.max(0, motion.gapOffset - fillStep);
    if (motion.gapOffset <= 0.5) completeChainMotion(false);
  }

  function completeChainMotion(tryCombo) {
    const motion = state.chainMotion;
    if (!motion) return;
    const comboIndex = Math.max(0, Math.min(motion.gapIndex, state.chain.length - 1));
    if (motion.pullBack > 0) state.headS = Math.max(0, state.headS - motion.pullBack);
    state.chainMotion = null;
    reflowChain();
    if (tryCombo && state.chain[comboIndex] && state.chain[comboIndex - 1] && state.chain[comboIndex].type === state.chain[comboIndex - 1].type) {
      resolveMatches(comboIndex, true);
    }
  }

  function updateProjectile(dt) {
    const projectile = state.projectile;
    if (!projectile) return;
    projectile.x += projectile.vx * dt;
    projectile.y += projectile.vy * dt;
    projectile.spin += dt * 0.012;
    projectile.age += dt;
    projectile.trail.push({ x: projectile.x, y: projectile.y, life: 220, maxLife: 220, type: projectile.type });
    projectile.trail.forEach(point => { point.life -= dt; });
    projectile.trail = projectile.trail.filter(point => point.life > 0).slice(-9);
    if (projectile.x < -state.radius * 4 || projectile.x > width + state.radius * 4 || projectile.y < -state.radius * 4 || projectile.y > height + state.radius * 4) {
      state.projectile = null;
      state.currentType = state.nextType;
      state.nextType = usefulType(Math.random);
      return;
    }
    for (let i = 0; i < state.chain.length; i++) {
      const ball = state.chain[i];
      if (ball.s < 0 || ball.s > state.pathLength) continue;
      const p = pathPoint(ball.s);
      if (distance(projectile.x, projectile.y, p.x, p.y) <= state.radius * 1.72) {
        makeShockwave(projectile.x, projectile.y, COLORS[projectile.type].glow, state.radius * 0.65);
        insertProjectile(i, projectile.x, projectile.y);
        return;
      }
    }
  }

  function insertProjectile(hitIndex, x, y) {
    const s = nearestPathS(x, y);
    const hit = state.chain[hitIndex];
    const insertIndex = s > hit.s ? hitIndex : hitIndex + 1;
    const projectile = state.projectile;
    const impactS = clamp(s, 0, state.pathLength);
    state.chain.splice(insertIndex, 0, {
      type: projectile.type,
      food: '',
      wobble: Math.random() * 12,
      born: performance.now(),
      visualS: impactS,
    });
    for (let i = 0; i < state.chain.length; i++) {
      if (i === insertIndex || typeof state.chain[i].visualS === 'number') continue;
      state.chain[i].visualS = state.chain[i].s;
    }
    state.headS += insertIndex === 0 ? state.gap : 0;
    state.projectile = null;
    reflowChain();
    state.pendingInsert = { index: insertIndex, life: 145 };
    playSound('insert');
    state.currentType = state.nextType;
    state.nextType = usefulType(Math.random);
    updateHud();
  }

  function resolveMatches(index, fromCombo = false) {
    const ball = state.chain[index];
    if (!ball) return;
    let start = index;
    let end = index;
    while (start > 0 && state.chain[start - 1].type === ball.type) start -= 1;
    while (end < state.chain.length - 1 && state.chain[end + 1].type === ball.type) end += 1;
    const count = end - start + 1;
    if (count < 3) {
      if (!fromCombo) state.comboStreak = 0;
      playSound('stick');
      return;
    }
    state.comboStreak = fromCombo || state.comboStreak > 0 ? state.comboStreak + 1 : 1;
    const removed = state.chain.splice(start, count);
    const foods = removed.filter(item => item.food).length;
    state.foods += foods;
    const basePoint = pathPoint(ball.s);
    removed.forEach((item, offset) => {
      const p = pathPoint(ball.s - (offset - Math.floor(count / 2)) * state.gap * 0.32);
      makeParticles(p.x, p.y, COLORS[item.type].glow, item.food, 9);
    });
    const comboBonus = Math.max(0, state.comboStreak - 1) * 45;
    const points = count * 24 + foods * 90 + Math.max(0, count - 3) * 15 + comboBonus;
    state.score += points;
    state.pendingInsert = null;
    beginGapMotion(start, count);
    showFloatingText(`+${points}`, basePoint.x, basePoint.y, foods ? '#f59e0b' : '#16a34a');
    if (state.comboStreak > 1) showFloatingText(t('comboText', { streak: state.comboStreak }), basePoint.x, basePoint.y - state.radius * 1.45, '#7c3aed');
    if (foods) showToast(t('collectFood', { count: foods }));
    playSound(foods ? 'food' : 'pop');
    reflowChain();
    updateHud();
    if (state.foods >= state.targetFoods) finishLevel(true);
  }

  function beginGapMotion(gapIndex, removedCount) {
    state.spawnPause = cfg().slowAfterPop;
    if (!state.chain.length) return;
    if (gapIndex <= 0) {
      state.headS = Math.max(0, state.headS - removedCount * state.gap);
      return;
    }
    if (gapIndex >= state.chain.length) return;
    const sameAcrossGap = state.chain[gapIndex - 1]?.type === state.chain[gapIndex]?.type;
    state.chainMotion = {
      gapIndex,
      pause: sameAcrossGap ? 340 : 460,
      gapOffset: removedCount * state.gap,
      maxGap: removedCount * state.gap,
      pullBack: 0,
      rollback: sameAcrossGap,
    };
  }

  function fireAt(x, y) {
    if (!state.started || state.finished || state.projectile) return;
    if (state.pendingInsert) {
      state.queuedShot = { x, y };
      state.aiming = false;
      return;
    }
    const angle = aimAngle(x, y);
    const speed = Math.max(width, height) * 0.00118;
    const muzzleX = shooterX + Math.cos(angle) * state.radius * 1.35;
    const muzzleY = shooterY + Math.sin(angle) * state.radius * 1.35;
    state.comboStreak = 0;
    state.projectile = {
      x: muzzleX,
      y: muzzleY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      type: state.currentType,
      spin: 0,
      age: 0,
      trail: [],
    };
    state.recoilUntil = performance.now() + 130;
    state.aiming = false;
    makeMuzzleFlash(muzzleX, muzzleY, angle, COLORS[state.currentType].glow);
    makeShockwave(muzzleX, muzzleY, COLORS[state.currentType].glow, state.radius * 0.35);
    playSound('shoot');
  }

  function finishLevel(won) {
    if (state.finished) return;
    state.finished = true;
    stopLoop();
    const difficultyLevel = DIFFICULTY_ORDER.indexOf(state.difficulty) + 1;
    if (won) {
      const bonus = Math.max(0, Math.round((state.pathLength - Math.max(0, state.chain[0]?.s || 0)) / 8)) + state.level * 18;
      state.score += bonus;
      state.bestScore = Math.max(state.bestScore, state.score);
      state.bestLevel = Math.max(state.bestLevel, state.level);
      localStorage.setItem(STORAGE_BEST_SCORE, String(state.bestScore));
      localStorage.setItem(STORAGE_BEST_LEVEL, String(state.bestLevel));
      updateHud();
      burstConfetti();
      playSound('win');
      showResult(t('winTitle'), t('winText', { level: state.level, foods: state.foods, target: state.targetFoods }), t('nextLevel'), nextLevel);
      post('gameFinished', {
        completed: true,
        passed: true,
        earnedPoints: Math.max(10, cfg().score + Math.floor(state.score / 12)),
        score: state.score,
        difficulty: difficultyLevel,
        difficultyId: state.difficulty,
        level: state.level,
        collected: state.foods,
        targetFood: state.targetFoods,
        finishedAt: Date.now(),
        roundId: state.roundId,
      });
    } else {
      playSound('hit');
      shakeScreen();
      showResult(t('loseTitle'), t('loseText'), t('retry'), () => startGame({ keepLevel: true }));
    }
  }

  function draw(now) {
    drawBackground(now);
    drawPath(now);
    drawChain(now);
    drawAimGuide();
    drawShooter(now);
    drawProjectile();
    drawShockwaves();
    drawParticles();
    drawFloatingTexts();
  }

  function drawBackground(now) {
    const sky = ctx.createLinearGradient(0, 0, 0, height);
    sky.addColorStop(0, '#bae6fd');
    sky.addColorStop(0.48, '#dcfce7');
    sky.addColorStop(1, '#fde68a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, width, height);
    ctx.save();
    ctx.globalAlpha = 0.52;
    drawCloud((now * 0.009) % (width + 180) - 130, height * 0.22, 58);
    drawCloud(width - ((now * 0.006) % (width + 190)), height * 0.34, 46);
    ctx.globalAlpha = 1;
    const hill = ctx.createLinearGradient(0, height * 0.76, 0, height);
    hill.addColorStop(0, '#86efac');
    hill.addColorStop(1, '#22c55e');
    ctx.fillStyle = hill;
    ctx.beginPath();
    ctx.moveTo(0, height);
    ctx.quadraticCurveTo(width * 0.24, height * 0.78, width * 0.5, height * 0.9);
    ctx.quadraticCurveTo(width * 0.74, height * 0.76, width, height * 0.87);
    ctx.lineTo(width, height);
    ctx.closePath();
    ctx.fill();
    drawTunnel(now);
    ctx.restore();
  }

  function drawPath(now) {
    if (state.samples.length < 2) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = state.radius * 2.25;
    ctx.strokeStyle = 'rgba(120,53,15,.36)';
    drawSamplePath();
    ctx.stroke();
    ctx.lineWidth = state.radius * 1.55;
    const track = ctx.createLinearGradient(0, playTop, 0, playBottom);
    track.addColorStop(0, '#fef3c7');
    track.addColorStop(0.5, '#fdba74');
    track.addColorStop(1, '#f59e0b');
    ctx.strokeStyle = track;
    drawSamplePath();
    ctx.stroke();
    ctx.setLineDash([4, 10]);
    ctx.lineWidth = Math.max(2, state.radius * 0.14);
    ctx.strokeStyle = 'rgba(120,53,15,.36)';
    ctx.lineDashOffset = -now * 0.018;
    drawSamplePath();
    ctx.stroke();
    drawPathMarkers(now);
    ctx.restore();
  }

  function drawPathMarkers(now) {
    const start = state.samples[0];
    if (!start) return;
    ctx.save();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,.86)';
    ctx.strokeStyle = 'rgba(14,116,144,.28)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(start.x, start.y, state.radius * 1.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#0f766e';
    ctx.font = `900 ${Math.round(state.radius * 0.62)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t('startMarker'), start.x, start.y + Math.sin(now * 0.006) * 1.5);
    ctx.restore();
  }

  function drawSamplePath() {
    ctx.beginPath();
    state.samples.forEach((p, index) => {
      if (index === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
  }

  function drawTunnel(now) {
    if (!state.samples.length) return;
    const end = state.samples[state.samples.length - 1];
    ctx.save();
    ctx.translate(end.x, end.y);
    const pulse = 1 + Math.sin(now * 0.004) * 0.04;
    const grad = ctx.createRadialGradient(0, 0, state.radius * 0.4, 0, 0, state.radius * 2.2 * pulse);
    grad.addColorStop(0, '#0f172a');
    grad.addColorStop(0.58, '#334155');
    grad.addColorStop(1, 'rgba(15,23,42,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, state.radius * 2.3 * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#facc15';
    ctx.font = `900 ${Math.round(state.radius * 0.72)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t('endMarker'), 0, -state.radius * 2.45);
    ctx.restore();
  }

  function drawChain(now) {
    for (let i = state.chain.length - 1; i >= 0; i--) {
      const ball = state.chain[i];
      if (ball.s < -state.radius * 2 || ball.s > state.pathLength + state.radius * 2) continue;
      const p = pathPoint(typeof ball.visualS === 'number' ? ball.visualS : ball.s);
      const wobble = Math.sin(now * 0.004 + ball.wobble) * state.radius * 0.04;
      const bornScale = ball.born ? clamp((now - ball.born) / 160, 0, 1) : 1;
      drawBall(p.x, p.y + wobble, state.radius * (0.86 + bornScale * 0.14), ball.type, ball.food);
    }
  }

  function drawBall(x, y, radiusValue, type, food) {
    const color = COLORS[type % COLORS.length];
    const gradient = ctx.createRadialGradient(x - radiusValue * 0.32, y - radiusValue * 0.38, radiusValue * 0.12, x, y, radiusValue);
    gradient.addColorStop(0, '#ffffff');
    gradient.addColorStop(0.2, color.from);
    gradient.addColorStop(1, color.to);
    ctx.save();
    ctx.shadowColor = color.glow;
    ctx.shadowBlur = radiusValue * 0.48;
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, radiusValue, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.lineWidth = Math.max(2, radiusValue * 0.1);
    ctx.strokeStyle = 'rgba(255,255,255,.72)';
    ctx.stroke();
    ctx.strokeStyle = 'rgba(15,23,42,.16)';
    ctx.lineWidth = Math.max(1, radiusValue * 0.04);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.72)';
    ctx.beginPath();
    ctx.ellipse(x - radiusValue * 0.28, y - radiusValue * 0.34, radiusValue * 0.24, radiusValue * 0.13, -0.55, 0, Math.PI * 2);
    ctx.fill();
    if (food) {
      ctx.font = `${Math.round(radiusValue * 0.86)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(15,23,42,.24)';
      ctx.shadowBlur = 4;
      ctx.strokeStyle = 'rgba(255,255,255,.76)';
      ctx.lineWidth = Math.max(2, radiusValue * 0.08);
      ctx.strokeText(food, x, y + radiusValue * 0.04);
      ctx.fillText(food, x, y + radiusValue * 0.04);
    }
    ctx.restore();
  }

  function drawAimGuide() {
    if (!state.started || state.finished || state.projectile) return;
    const tx = state.aiming ? state.aimX : shooterX + state.radius * 4;
    const ty = state.aiming ? state.aimY : shooterY - state.radius * 3;
    const angle = aimAngle(tx, ty);
    const guideLength = Math.min(Math.max(width, height) * 0.72, state.radius * 24);
    const endX = shooterX + Math.cos(angle) * guideLength;
    const endY = shooterY + Math.sin(angle) * guideLength;
    ctx.save();
    ctx.setLineDash([8, 8]);
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(15,118,110,.48)';
    ctx.shadowColor = 'rgba(255,255,255,.72)';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.moveTo(shooterX, shooterY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.restore();
  }

  function drawShooter(now) {
    const angle = aimAngle(state.aiming ? state.aimX : shooterX + state.radius * 4, state.aiming ? state.aimY : shooterY - state.radius * 3);
    const recoil = clamp((state.recoilUntil - now) / 130, 0, 1) * state.radius * 0.38;
    ctx.save();
    ctx.fillStyle = 'rgba(15,23,42,.22)';
    ctx.beginPath();
    ctx.ellipse(shooterX, shooterY + state.radius * 1.36, state.radius * 2.35, state.radius * 0.44, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.translate(shooterX, shooterY);
    ctx.rotate(angle + Math.PI / 2);
    ctx.translate(0, recoil);
    const barrel = ctx.createLinearGradient(0, -state.radius * 2.4, 0, state.radius * 0.5);
    barrel.addColorStop(0, '#fef3c7');
    barrel.addColorStop(1, '#f97316');
    ctx.fillStyle = barrel;
    roundRectPath(-state.radius * 0.36, -state.radius * 2.3, state.radius * 0.72, state.radius * 2.35, state.radius * 0.36);
    ctx.fill();
    ctx.strokeStyle = 'rgba(154,52,18,.42)';
    ctx.lineWidth = Math.max(2, state.radius * 0.12);
    ctx.stroke();
    ctx.restore();
    drawPetShadow(shooterX, shooterY + state.radius * 1.22, state.radius * 1.64);
    drawLauncherPet(shooterX, shooterY + state.radius * 0.18, state.radius * 1.75, now * 0.002);
    if (!state.projectile) {
      drawBall(shooterX, shooterY - state.radius * 1.35, state.radius * 0.8, state.currentType, '');
    } else {
      const reload = 0.5 + Math.sin(now * 0.012) * 0.12;
      ctx.save();
      ctx.globalAlpha = 0.38;
      ctx.strokeStyle = COLORS[state.nextType].glow;
      ctx.lineWidth = Math.max(2, state.radius * 0.12);
      ctx.beginPath();
      ctx.arc(shooterX, shooterY - state.radius * 1.35, state.radius * (0.54 + reload * 0.1), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    drawBall(shooterX + state.radius * 2.18, shooterY + state.radius * 0.92, state.radius * 0.54, state.nextType, '');
    ctx.font = `${Math.round(state.radius * 0.48)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#0f766e';
    ctx.fillText(t('nextBall'), shooterX + state.radius * 2.18, shooterY + state.radius * 1.62);
  }

  function drawProjectile() {
    if (!state.projectile) return;
    const projectile = state.projectile;
    const color = COLORS[projectile.type % COLORS.length];
    projectile.trail.forEach((point, index) => {
      const alpha = clamp(point.life / point.maxLife, 0, 1) * (index + 1) / Math.max(1, projectile.trail.length);
      ctx.save();
      ctx.globalAlpha = alpha * 0.62;
      ctx.fillStyle = color.glow;
      ctx.shadowColor = color.glow;
      ctx.shadowBlur = state.radius * 0.8;
      ctx.beginPath();
      ctx.arc(point.x, point.y, state.radius * (0.28 + alpha * 0.36), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    const squash = 1 + Math.min(0.12, projectile.age / 380 * 0.12);
    ctx.save();
    ctx.translate(projectile.x, projectile.y);
    ctx.rotate(projectile.spin);
    ctx.scale(squash, 1 / squash);
    drawBall(0, 0, state.radius * 0.94, projectile.type, '');
    ctx.restore();
  }

  function drawShockwaves() {
    state.shockwaves.forEach(wave => {
      ctx.save();
      ctx.globalAlpha = clamp(wave.life / wave.maxLife, 0, 1) * 0.62;
      ctx.strokeStyle = wave.color;
      ctx.lineWidth = Math.max(2, state.radius * 0.1);
      ctx.beginPath();
      ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    });
  }

  function drawPetShadow(x, y, size) {
    ctx.save();
    ctx.fillStyle = 'rgba(15,23,42,.22)';
    ctx.beginPath();
    ctx.ellipse(x, y, size * 0.82, size * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawLauncherPet(x, y, size, spin) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(spin) * 0.1);
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.54, 0, Math.PI * 2);
    ctx.clip();
    if (state.petBitmap && state.petMeta?.uv) {
      const uv = state.petMeta.uv;
      ctx.drawImage(state.petBitmap, uv.x, uv.y, uv.width, uv.height, -size * 0.56, -size * 0.62, size * 1.12, size * 1.12);
    } else {
      ctx.font = `${Math.round(size * 0.72)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(PET_FALLBACK, 0, size * 0.02);
    }
    ctx.restore();
  }

  function drawParticles() {
    state.particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
      if (p.food) {
        ctx.font = `${Math.round(p.size * 1.6)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.food, p.x, p.y);
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });
  }

  function drawFloatingTexts() {
    state.floatingTexts.forEach(item => {
      ctx.save();
      ctx.globalAlpha = clamp(item.life / item.maxLife, 0, 1);
      ctx.font = `900 ${Math.round(state.radius * 0.9)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = item.color;
      ctx.strokeStyle = 'rgba(255,255,255,.9)';
      ctx.lineWidth = 4;
      ctx.strokeText(item.text, item.x, item.y);
      ctx.fillText(item.text, item.x, item.y);
      ctx.restore();
    });
  }

  function drawCloud(x, y, size) {
    ctx.fillStyle = 'rgba(255,255,255,.82)';
    ctx.beginPath();
    ctx.arc(x, y, size * 0.36, 0, Math.PI * 2);
    ctx.arc(x + size * 0.34, y - size * 0.14, size * 0.44, 0, Math.PI * 2);
    ctx.arc(x + size * 0.78, y, size * 0.32, 0, Math.PI * 2);
    ctx.rect(x - size * 0.04, y, size * 0.9, size * 0.24);
    ctx.fill();
  }

  function pathPoint(s) {
    if (!state.samples.length) return { x: shooterX, y: shooterY };
    if (s <= 0) return state.samples[0];
    if (s >= state.pathLength) return state.samples[state.samples.length - 1];
    let lo = 0;
    let hi = state.samples.length - 1;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (state.samples[mid].s < s) lo = mid + 1;
      else hi = mid;
    }
    const b = state.samples[lo];
    const a = state.samples[Math.max(0, lo - 1)];
    const t = (s - a.s) / Math.max(1, b.s - a.s);
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
  }

  function nearestPathS(x, y) {
    let best = state.samples[0] || { s: 0, x: 0, y: 0 };
    let bestD = Infinity;
    for (let i = 0; i < state.samples.length; i += 2) {
      const p = state.samples[i];
      const d = distance(x, y, p.x, p.y);
      if (d < bestD) {
        bestD = d;
        best = p;
      }
    }
    return best.s;
  }

  function usefulType(randomSource) {
    const random = typeof randomSource === 'function' ? randomSource : Math.random;
    if (state.chain[0]?.s > state.pathLength * 0.74) {
      const frontCounts = new Map();
      state.chain.slice(0, Math.min(14, state.chain.length)).forEach(ball => frontCounts.set(ball.type, (frontCounts.get(ball.type) || 0) + 1));
      const rescue = Array.from(frontCounts.entries()).filter(([, count]) => count >= 2).map(([type]) => type);
      if (rescue.length && random() < 0.94) return rescue[Math.floor(random() * rescue.length)];
    }
    const counts = new Map();
    state.chain.forEach(ball => counts.set(ball.type, (counts.get(ball.type) || 0) + 1));
    const useful = Array.from(counts.entries()).filter(([, count]) => count >= 2).map(([type]) => type);
    if (useful.length && random() < 0.82) return useful[Math.floor(random() * useful.length)];
    return Math.floor(random() * state.colorCount);
  }

  function aimAngle(x, y) {
    return Math.atan2(y - shooterY, x - shooterX);
  }

  function makeParticles(x, y, color, food, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 0.16 + 0.04;
      state.particles.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 0.04,
        size: state.radius * (Math.random() * 0.18 + 0.12),
        color,
        food: food && i === 0 ? food : '',
        life: 520 + Math.random() * 360,
        maxLife: 880,
      });
    }
  }

  function makeMuzzleFlash(x, y, angle, color) {
    for (let i = 0; i < 12; i++) {
      const spread = angle + (Math.random() - 0.5) * 0.82;
      const speed = Math.random() * 0.22 + 0.08;
      state.particles.push({
        x,
        y,
        vx: Math.cos(spread) * speed,
        vy: Math.sin(spread) * speed,
        size: state.radius * (Math.random() * 0.12 + 0.08),
        color,
        food: '',
        life: 220 + Math.random() * 140,
        maxLife: 360,
      });
    }
  }

  function makeShockwave(x, y, color, radiusValue) {
    state.shockwaves.push({
      x,
      y,
      color,
      radius: radiusValue,
      speed: 0.035,
      life: 260,
      maxLife: 260,
    });
  }

  function showFloatingText(text, x, y, color) {
    state.floatingTexts.push({ text, x, y, color, life: 900, maxLife: 900 });
  }

  function swapBalls() {
    if (!state.started || state.finished || state.projectile || state.pendingInsert) return;
    [state.currentType, state.nextType] = [state.nextType, state.currentType];
    state.aiming = false;
    playSound('select');
    draw(performance.now());
  }

  function updateHud() {
    hudEls.level.textContent = String(state.level);
    hudEls.food.textContent = String(state.foods);
    hudEls.target.textContent = String(state.targetFoods);
    hudEls.score.textContent = String(state.score);
    hudEls.best.textContent = String(state.bestScore);
    const progress = state.targetFoods > 0 ? clamp(state.foods / state.targetFoods, 0, 1) : 0;
    if (hudEls.foodFill) hudEls.foodFill.style.width = `${Math.round(progress * 100)}%`;
    const danger = state.started && !state.finished && state.chain[0]?.s > state.pathLength * 0.78;
    hudEls.danger?.classList.toggle('danger', Boolean(danger));
  }

  function buildDifficulties() {
    const targets = [document.getElementById('mhDifficulties'), document.getElementById('mhOverlayDifficulties')];
    targets.forEach(target => {
      target.innerHTML = DIFFICULTY_ORDER.map(id => `<button class="mh-difficulty${state.difficulty === id ? ' active' : ''}" type="button" data-difficulty="${id}">${DIFFICULTIES[id].label}</button>`).join('');
      target.querySelectorAll('[data-difficulty]').forEach(btn => {
        btn.onclick = () => setDifficulty(btn.dataset.difficulty);
      });
    });
  }

  function setDifficulty(id) {
    if (!DIFFICULTIES[id]) return;
    state.difficulty = id;
    localStorage.setItem(STORAGE_DIFFICULTY, id);
    buildDifficulties();
    playSound('select');
    if (state.started && !state.projectile) startGame();
  }

  function showResult(title, text, buttonText, onClick) {
    overlayTitleEl.textContent = title;
    overlayTextEl.textContent = text;
    startBtn.textContent = buttonText;
    startBtn.onclick = onClick;
    overlayEl.hidden = false;
  }

  function hideOverlay() {
    overlayEl.hidden = true;
  }

  function showToast(text) {
    const old = document.querySelector('.mh-toast');
    old?.remove();
    const toast = document.createElement('div');
    toast.className = 'mh-toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1250);
  }

  function burstConfetti() {
    const colors = ['#f97316', '#22c55e', '#38bdf8', '#facc15', '#fb7185', '#a78bfa'];
    for (let i = 0; i < 54; i++) {
      const el = document.createElement('div');
      el.className = 'mh-confetti';
      el.style.left = `${Math.random() * 100}%`;
      el.style.setProperty('--x', `${(Math.random() - 0.5) * 160}px`);
      el.style.setProperty('--d', `${1.4 + Math.random() * 1.2}s`);
      el.style.setProperty('--c', colors[i % colors.length]);
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }
  }

  function shakeScreen() {
    canvas.style.transform = 'translateX(0)';
    let count = 0;
    const timer = setInterval(() => {
      count += 1;
      canvas.style.transform = `translateX(${count % 2 ? -5 : 5}px)`;
      if (count > 8) {
        clearInterval(timer);
        canvas.style.transform = '';
      }
    }, 34);
  }

  function stopLoop() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = 0;
  }

  function resumeLoop() {
    stopLoop();
    lastTime = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  function initSound() {
    if (sound.ctx) return;
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      sound.ctx = new AudioContext();
      sound.master = sound.ctx.createGain();
      sound.master.gain.value = 0.17;
      sound.master.connect(sound.ctx.destination);
    } catch (_) {}
  }

  function playSound(type) {
    initSound();
    if (!sound.ctx || !sound.master) return;
    try {
      if (sound.ctx.state === 'suspended') sound.ctx.resume();
      const now = sound.ctx.currentTime;
      if (type === 'shoot') {
        playTone(260, 620, 0.09, 'triangle', 0.15, now);
        playNoise(0.075, 0.07, now, 'highpass');
      } else if (type === 'insert') playTone(420, 300, 0.07, 'sine', 0.06, now);
      else if (type === 'stick') playTone(240, 180, 0.08, 'triangle', 0.1, now);
      else if (type === 'pop') {
        playSequence([620, 840, 1080], 0.045, 0.08, 'sine', now);
        playNoise(0.11, 0.055, now, 'bandpass');
      } else if (type === 'food') playSequence([760, 980, 1280, 1520], 0.055, 0.1, 'triangle', now);
      else if (type === 'hit') playTone(160, 68, 0.24, 'sawtooth', 0.18, now);
      else if (type === 'win') playSequence([523, 659, 784, 1046], 0.08, 0.12, 'triangle', now);
      else if (type === 'start') playSequence([392, 523, 659], 0.065, 0.08, 'sine', now);
      else if (type === 'select') playTone(520, 700, 0.055, 'sine', 0.08, now);
      else if (type === 'danger') playTone(150, 132, 0.18, 'sawtooth', 0.045, now);
    } catch (_) {}
  }

  function playTone(startFreq, endFreq, duration, wave, volume, startAt = sound.ctx.currentTime) {
    const osc = sound.ctx.createOscillator();
    const gain = sound.ctx.createGain();
    osc.type = wave || 'sine';
    osc.frequency.setValueAtTime(Math.max(1, startFreq), startAt);
    osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), startAt + duration);
    gain.gain.setValueAtTime(0.001, startAt);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.002, volume), startAt + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.001, startAt + duration);
    osc.connect(gain);
    gain.connect(sound.master);
    osc.start(startAt);
    osc.stop(startAt + duration + 0.03);
  }

  function playSequence(notes, step, volume, wave, startAt = sound.ctx.currentTime) {
    notes.forEach((note, index) => playTone(note, note * 1.08, step * 1.4, wave, volume, startAt + index * step));
  }

  function playNoise(duration, volume, startAt, filterType) {
    const sampleRate = sound.ctx.sampleRate;
    const buffer = sound.ctx.createBuffer(1, Math.max(1, Math.floor(sampleRate * duration)), sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const source = sound.ctx.createBufferSource();
    const filter = sound.ctx.createBiquadFilter();
    const gain = sound.ctx.createGain();
    filter.type = filterType || 'highpass';
    filter.frequency.value = filterType === 'bandpass' ? 900 : 1200;
    gain.gain.setValueAtTime(0.001, startAt);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.002, volume), startAt + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, startAt + duration);
    source.buffer = buffer;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(sound.master);
    source.start(startAt);
    source.stop(startAt + duration + 0.02);
  }

  function requestPetImage() {
    try {
      const requestId = `zuma_pet_${Date.now()}`;
      state.petRequestId = requestId;
      window.parent.postMessage({
        type: 'haqi_get_pet_image',
        requestId,
        anim: 'happy',
      }, '*');
      setTimeout(() => {
        if (state.petBitmap) return;
        window.parent.postMessage({ type: 'haqi_get_pet_images', requestId: `zuma_pets_${Date.now()}`, anim: 'happy' }, '*');
      }, 900);
    } catch (_) {}
  }

  async function setPetImage(pet) {
    cleanupPetImage();
    try {
      state.petMeta = pet;
      state.petBitmap = await createImageBitmap(pet.imageBlob);
      if (pet.imageBlob) state.objectUrls.push(URL.createObjectURL(pet.imageBlob));
      draw(performance.now());
    } catch (_) {
      state.petBitmap = null;
      state.petMeta = null;
    }
  }

  function cleanupPetImage() {
    state.petBitmap?.close?.();
    state.petBitmap = null;
    state.objectUrls.forEach(url => URL.revokeObjectURL(url));
    state.objectUrls = [];
  }

  function post(type, data = {}) {
    try { window.parent.postMessage({ type, data }, '*'); } catch (_) {}
  }

  function handlePointerStart(event) {
    if (event.target?.closest?.('button')) return;
    event.preventDefault();
    initSound();
    if (!state.started || state.finished) {
      startGame();
      return;
    }
    if (state.projectile) return;
    const p = pointerPoint(event);
    state.aiming = true;
    state.aimX = p.x;
    state.aimY = p.y;
  }

  function handlePointerMove(event) {
    if (!state.aiming) return;
    event.preventDefault();
    const p = pointerPoint(event);
    state.aimX = p.x;
    state.aimY = p.y;
  }

  function handlePointerEnd(event) {
    if (!state.aiming) return;
    event.preventDefault();
    const p = pointerPoint(event);
    fireAt(p.x, p.y);
  }

  function pointerPoint(event) {
    const touch = event.changedTouches?.[0] || event.touches?.[0];
    return { x: touch?.clientX ?? event.clientX ?? shooterX, y: touch?.clientY ?? event.clientY ?? shooterY - 120 };
  }

  function distance(ax, ay, bx, by) {
    return Math.hypot(ax - bx, ay - by);
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function shuffle(items, random) {
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
    return items;
  }

  function hashSeed(text) {
    let hash = 2166136261;
    for (let i = 0; i < text.length; i++) {
      hash ^= text.charCodeAt(i);
      hash = Math.imul(hash, 16777619);
    }
    return hash >>> 0;
  }

  function seededRandom(seed) {
    let value = seed || 1;
    return function () {
      value = Math.imul(1664525, value) + 1013904223;
      return ((value >>> 0) / 4294967296);
    };
  }

  function roundRectPath(x, y, w, h, r) {
    if (ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      return;
    }
    const radiusValue = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radiusValue, y);
    ctx.lineTo(x + w - radiusValue, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radiusValue);
    ctx.lineTo(x + w, y + h - radiusValue);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radiusValue, y + h);
    ctx.lineTo(x + radiusValue, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radiusValue);
    ctx.lineTo(x, y + radiusValue);
    ctx.quadraticCurveTo(x, y, x + radiusValue, y);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('pointerdown', handlePointerStart, { passive: false });
  window.addEventListener('pointermove', handlePointerMove, { passive: false });
  window.addEventListener('pointerup', handlePointerEnd, { passive: false });
  window.addEventListener('pointercancel', () => { state.aiming = false; });
  window.addEventListener('keydown', event => {
    if (event.code === 'KeyX') {
      event.preventDefault();
      swapBalls();
      return;
    }
    if (event.code === 'Space' || event.code === 'Enter') {
      event.preventDefault();
      if (!state.started || state.finished) startGame();
      else fireAt(state.aiming ? state.aimX : shooterX + state.radius * 4, state.aiming ? state.aimY : shooterY - state.radius * 3);
    }
  });
  window.addEventListener('message', event => {
    const msg = event.data || {};
    if (msg.type === 'gameContinue') {
      if (state.paused) {
        state.paused = false;
        hideOverlay();
        resumeLoop();
      } else if (!state.started || state.finished) {
        startGame();
      }
    }
    if (msg.type === 'haqi_pet_image' && msg.ok && (!state.petRequestId || !msg.requestId || msg.requestId === state.petRequestId || msg.requestId === 'active_pet_config')) setPetImage(msg.data);
    if (msg.type === 'haqi_pet_images' && msg.ok) {
      const firstPet = Array.isArray(msg.data?.pets) ? msg.data.pets[0] : null;
      if (firstPet) setPetImage(firstPet);
    }
    if (msg.type === 'setGameConfig' && msg.data?.petId) requestPetImage(msg.data.petId);
    if (msg.type === 'setGameConfig' && msg.data?.difficulty && DIFFICULTIES[msg.data.difficulty]) {
      setDifficulty(msg.data.difficulty);
      startGame();
    }
  });
  window.addEventListener('beforeunload', cleanupPetImage);

  document.getElementById('mhMenu').onclick = () => showResult(t('menuTitle'), t('menuText'), state.started && !state.finished ? t('continueGame') : t('startChallenge'), () => {
    if (state.started && !state.finished) {
      state.paused = false;
      hideOverlay();
      resumeLoop();
    } else {
      startGame();
    }
  });
  document.getElementById('mhHelp').onclick = document.getElementById('mhMenu').onclick;
  document.getElementById('mhRestart').onclick = () => startGame({ keepLevel: true });
  document.getElementById('mhSwap').onclick = swapBalls;
  startBtn.onclick = () => startGame();

  buildDifficulties();
  updateHud();
  post('gameLoaded');
  // The intro overlay (with difficulty picker) is the real initial screen and is
  // shown by default; defer canvas sizing / first background paint / pet-image
  // request off the critical path so DOMContentLoaded stays well under 50ms.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    resize();
    draw(performance.now());
    requestPetImage();
  }));
})();
</script>
