  function setCustomSelectOptions(input, options, { value = '', silent = true } = {}) {
    if (!input) return;
    const item = customSelects.get(input.id);
    if (!item) return;
    item.options = options.map(option => ({ value: String(option.value), label: String(option.label) }));
    item.menu.innerHTML = '';
    item.options.forEach((option) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'mh-select-option';
      btn.dataset.value = option.value;
      btn.textContent = option.label;
      btn.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        event.stopPropagation();
        setCustomSelectValue(input, option.value);
        closeCustomSelects();
      });
      item.menu.appendChild(btn);
    });
    const nextValue = value !== '' || item.options.some(option => option.value === '') ? value : (input.value || item.options[0]?.value || '');
    setCustomSelectValue(input, nextValue, { silent });
  }

  function setCustomSelectValue(input, value, { silent = false } = {}) {
    if (!input) return;
    const item = customSelects.get(input.id);
    const nextValue = String(value ?? '');
    input.value = nextValue;
    if (item) {
      const option = item.options.find(entry => entry.value === nextValue) || item.options[0];
      item.valueEl.textContent = option?.label || item.selectEl.dataset.placeholder || nextValue;
      item.menu.querySelectorAll('.mh-select-option').forEach((btn) => btn.classList.toggle('active', btn.dataset.value === nextValue));
    }
    if (!silent && typeof input.onchange === 'function') input.onchange({ target: input });
  }

      testMutationEl.onchange = () => { state.testMutationId = testMutationEl.value; };
    }
    root.querySelectorAll('.mh-test-route-btn').forEach((btn) => {
      btn.onclick = () => applyTestRoute(btn.dataset.route);
    });
    if (testPathEl) testPathEl.onchange = () => { state.testSpawnPathIndex = Number(testPathEl.value || 0); };
    if (testCountEl) testCountEl.onchange = () => { state.testSpawnCount = Number(testCountEl.value || 1); };
    if (testProgressEl) testProgressEl.onchange = () => { state.testSpawnProgress = Number(testProgressEl.value || 0); };
    if (testGapEl) testGapEl.onchange = () => { state.testSpawnGap = Number(testGapEl.value || 0); };
    if (testFrozenEl) testFrozenEl.onchange = () => { state.testSpawnFrozen = !!testFrozenEl.checked; };
    if (testFabEl) testFabEl.onclick = openTestSpawnPanel;
    if (testCloseEl) testCloseEl.onclick = closeTestSpawnPanel;
    if (testPanelEl) testPanelEl.addEventListener('pointerdown', (event) => {
      if (event.target === testPanelEl) closeTestSpawnPanel();
    });
    document.getElementById('mhTestSpawn').onclick = spawnSelectedTestEnemies;
    document.getElementById('mhTestRandomSpawn').onclick = randomSpawnTestEnemies;
    document.getElementById('mhTestClearEnemies').onclick = clearTestEnemies;
    renderTestBuffControls();
    refreshTestPathOptions();
    refreshTestPanelVisibility();
  }

  function enterPhantomDevice() {
    if (!IS_LIVE_PREVIEW) return;
    setScene(TEST_SCENE_ID, { silent: true });
    layoutSvgStage();
    applyResponsiveLayout(true);
    startGame({ testMode: true });
    showToast('幻影装置已启动');
  }

  function refreshTestPanelVisibility() {
    root.classList.toggle('phantom-active', isPhantomDeviceActive());
    if (phantomEntryRowEl) phantomEntryRowEl.hidden = !IS_LIVE_PREVIEW || state.awaitingEvolution;
    if (testFabEl) testFabEl.hidden = !isPhantomDeviceActive();
    if (testRoutesEl) testRoutesEl.hidden = !isPhantomDeviceActive();
    if (testMutationLabelEl) testMutationLabelEl.hidden = !isPhantomDeviceActive();
    if (testBuffsEl) testBuffsEl.hidden = !isPhantomDeviceActive();
    if (testPanelEl && !isPhantomDeviceActive()) testPanelEl.hidden = true;
    if (testEnemyEl) setCustomSelectValue(testEnemyEl, state.testSpawnKind, { silent: true });
    if (testMutationEl) setCustomSelectValue(testMutationEl, state.testMutationId, { silent: true });
    if (testCountEl) testCountEl.value = String(state.testSpawnCount);
    if (testProgressEl) testProgressEl.value = String(state.testSpawnProgress);
    if (testGapEl) setCustomSelectValue(testGapEl, String(state.testSpawnGap), { silent: true });
    if (testFrozenEl) testFrozenEl.checked = !!state.testSpawnFrozen;
    updateTestRouteButtons();
    updateTestMutationLabel();
    refreshTestPathOptions();
    refreshTestBuffControls();
  }

  function updateTestRouteButtons() {
    root.querySelectorAll('.mh-test-route-btn').forEach((btn) => btn.classList.toggle('active', btn.dataset.route === state.testRouteId));
  }

  function updateTestMutationLabel() {
    if (!testMutationLabelEl) return;
    const mutation = MUTATION_TYPES.find(item => item.id === state.testMutationId) || state.currentMutation;
    testMutationLabelEl.textContent = `当前变异：${mutation ? mutation.label : '稳定'}`;
  }

  function openTestSpawnPanel() {
    if (!isPhantomDeviceActive()) return;
    if (testPanelEl) testPanelEl.hidden = false;
  }

  function closeTestSpawnPanel() {
    if (testPanelEl) testPanelEl.hidden = true;
  }

  function applyTestRoute(routeId) {
    if (!IS_LIVE_PREVIEW || !TEST_ROUTE_TEMPLATES[routeId]) return;
    state.testRouteId = routeId;
    if (!isPhantomDeviceActive()) return;
    state.towers = [];
    state.enemies = [];
    state.shots = [];
    state.whiteCells = [];
    state.selectedTowerId = null;
    state.selectedSpotIndex = null;
    enemyById.clear();
    applyResponsiveLayout(true);
    layoutSvgStage();
    updateTestRouteButtons();
    refreshTestPathOptions();
    markRenderDirty('spots', 'hero', 'hud');
    renderAll();
    showToast('路线已切换');
  }

  function refreshTestPathOptions() {
    if (!testPathEl) return;
    const count = Math.max(1, pathInfos?.length || 1);
    const selected = Math.max(0, Math.min(count - 1, Number(state.testSpawnPathIndex || 0)));
    setCustomSelectOptions(testPathEl, Array.from({ length: count }, (_, index) => ({ value: String(index), label: `路径 ${index + 1}` })), { value: String(selected), silent: true });
    state.testSpawnPathIndex = selected;
  }

  function spawnSelectedTestEnemies() {
    if (!isPhantomDeviceActive()) return;
    if (!state.started || state.finished) startGame({ testMode: true });
    const kind = testEnemyEl?.value || state.testSpawnKind || 'bacteria';
    const count = Math.max(1, Math.min(40, Number(testCountEl?.value || state.testSpawnCount || 1)));
    const pathIndex = Math.max(0, Math.min(pathInfos.length - 1, Number(testPathEl?.value || state.testSpawnPathIndex || 0)));
    const progress = Math.max(0, Math.min(98, Number(testProgressEl?.value || state.testSpawnProgress || 0)));
    const gap = Math.max(0, Number(testGapEl?.value || state.testSpawnGap || 0));
    const frozen = !!testFrozenEl?.checked;
    const mutationId = testMutationEl?.value || '';
    const mutation = MUTATION_TYPES.find(item => item.id === mutationId) || null;
    state.testSpawnKind = kind;
    state.testSpawnCount = count;
    state.testSpawnPathIndex = pathIndex;
    state.testSpawnProgress = progress;
    state.testSpawnGap = gap;
    state.testSpawnFrozen = frozen;
    state.testMutationId = mutationId;
    const info = pathInfos[pathIndex] || pathInfos[0];
    const elite = kind === 'eliteShield' || kind === 'eliteArmor';
    const base = elite ? ENEMY_TYPES.find(enemy => enemy.kind === 'virus') : ENEMY_TYPES.find(enemy => enemy.kind === kind);
    if (!base || !info) return;
    const startDistance = info.total * progress / 100;
    const usableLength = Math.max(24, info.total - 18);
    for (let index = 0; index < count; index++) {
      const distance = (startDistance + index * gap) % usableLength;
      addEnemy(createEnemy(base, { elite, pathIndex, distance, frozen, mutation, defenseModeOverride: kind === 'eliteArmor' ? 'armor' : kind === 'eliteShield' ? 'shield' : '' }));
    }
    state.currentMutation = mutation;
    updateTestMutationLabel();
    closeTestSpawnPanel();
    markRenderDirty('hud');
    renderAll();
    showToast(frozen ? '已放置静止敌人' : '已生成敌人');
  }

  function randomSpawnTestEnemies() {
    if (!isPhantomDeviceActive()) return;
    const enemyOptions = [...ENEMY_TYPES.map(enemy => enemy.kind), 'eliteShield', 'eliteArmor'];
    const mutationOptions = ['', ...MUTATION_TYPES.map(mutation => mutation.id)];
    const gaps = [0, 18, 36, 72, 120];
    state.testSpawnKind = enemyOptions[Math.floor(Math.random() * enemyOptions.length)];
    state.testMutationId = mutationOptions[Math.floor(Math.random() * mutationOptions.length)];
    state.testSpawnCount = 6 + Math.floor(Math.random() * 15);
    state.testSpawnPathIndex = Math.floor(Math.random() * Math.max(1, pathInfos.length));
    state.testSpawnProgress = Math.floor(Math.random() * 86);
    state.testSpawnGap = gaps[Math.floor(Math.random() * gaps.length)];
    state.testSpawnFrozen = Math.random() < .35;
    refreshTestPanelVisibility();
    spawnSelectedTestEnemies();
  }

  function clearTestEnemies() {
    if (!isPhantomDeviceActive()) return;
    state.enemies = [];
    state.shots = [];
    enemyById.clear();
    renderAll();
    showToast('敌人已清空');
  }

  function renderTestBuffControls() {
    if (!testBuffsEl) return;
    const towerBuffIds = new Set(['acornDamage', 'bubbleSlow', 'flowerSplash', 'globalRange']);
    testBuffsEl.innerHTML = evolutionPool().filter(buff => towerBuffIds.has(buff.id)).map((buff) => {
      const controls = `<div class="mh-test-stepper"><button type="button" data-buff="${buff.id}" data-delta="-1">-</button><output data-buff-value="${buff.id}">0</output><button type="button" data-buff="${buff.id}" data-delta="1">+</button></div>`;
      return `<div class="mh-test-buff"><span><b>${buff.title}</b><span>${buff.desc}</span></span>${controls}</div>`;
    }).join('');
    testBuffsEl.querySelectorAll('button[data-buff]').forEach((btn) => {
      btn.onclick = () => adjustTestEvolution(btn.dataset.buff, Number(btn.dataset.delta || 1));
    });
    refreshTestBuffControls();
  }

  function adjustTestEvolution(id, delta) {
    if (!isPhantomDeviceActive()) return;
    if (!state.evolutions) state.evolutions = defaultEvolutions();
    if (delta > 0) {
      applyEvolution(id);
      spawnEvolutionAura(id);
    } else {
      removeTestEvolution(id);
    }
    hintEl.textContent = `幻影装置：${globalBoostText()}`;
    markRenderDirty('spots', 'hero', 'hud');
    refreshTestBuffControls();
    renderAll();
  }

  function removeTestEvolution(id) {
    const evo = state.evolutions || defaultEvolutions();
    state.evolutions = evo;
    if (id === 'acornDamage') evo.acornDamage = Math.max(0, evo.acornDamage - .18);
    if (id === 'bubbleSlow') evo.bubbleSlowMs = Math.max(0, evo.bubbleSlowMs - 450);
    if (id === 'flowerSplash') evo.flowerSplash = Math.max(0, evo.flowerSplash - 18);
    if (id === 'heroRate') evo.heroRate = Math.max(1, evo.heroRate - .16);
    if (id === 'globalRange') evo.globalRange = Math.max(0, evo.globalRange - 10);
  }

  function refreshTestBuffControls() {
    if (!testBuffsEl || !state.evolutions) return;
    const evo = state.evolutions;
    const values = {
      acornDamage: Math.round((evo.acornDamage || 0) / .18),
      bubbleSlow: Math.round((evo.bubbleSlowMs || 0) / 450),
      flowerSplash: Math.round((evo.flowerSplash || 0) / 18),
      heroRate: Math.max(0, Math.round(((evo.heroRate || 1) - 1) / .16)),
      globalRange: Math.round((evo.globalRange || 0) / 10)
    };
    Object.entries(values).forEach(([id, value]) => {
      const out = testBuffsEl.querySelector(`[data-buff-value="${id}"]`);
      if (out) out.textContent = String(value);
    });
  }

  function handleStageTap(event) {
    if (!state.started || state.finished) {
      deselectTower();
      return;
    }
    const point = clientToSvgPoint(event.clientX, event.clientY);
    const tower = towerAtPoint(point);
    if (tower) {
      handleTowerTap(tower.id);
      return;
    }
    if (petAtPoint(point)) {
      handlePetTap();
      return;
    }
    deselectTower();
  }

  function petAtPoint(point) {
    const pet = currentLayout.gate;
    return Math.hypot(point.x - pet.x, point.y - pet.y) <= 86;
  }

  function towerAtPoint(point) {
    let best = null;
    let bestDist = Infinity;
    state.towers.forEach((tower) => {
      const spot = buildSpots[tower.spotIndex];
      if (!spot) return;
      const dist = Math.hypot(point.x - spot.x, point.y - spot.y);
      if (dist <= 46 && dist < bestDist) {
        best = tower;
        bestDist = dist;
      }
    });
    return best;
  }

  async function onMessage(event) {
    const msg = event.data || {};
    if (msg.type === 'setGameConfig' && msg.data) {
      if (msg.data.difficulty) setDifficulty(msg.data.difficulty);
      if (msg.data.scene) setScene(msg.data.scene, { silent: true });
      return;
    }
    if (msg.type === 'haqi_pet_image' && msg.ok && msg.data) {
      await setPetImage(msg.data);
    }
  }

  async function requestPetImage() {
    try {
      window.parent.postMessage({ type: 'haqi_get_pet_image', requestId: `pet_td_${Date.now()}`, anim: 'happy' }, '*');
    } catch (_) {}
  }

  async function setPetImage(pet) {
    try {
      if (state.petUrl) URL.revokeObjectURL(state.petUrl);
      state.petUrl = URL.createObjectURL(pet.imageBlob);
      state.petMeta = pet;
      state.petImage = new Image();
      state.petImage.onload = () => renderAll();
      state.petImage.src = state.petUrl;
      markRenderDirty('hero');
      renderAll();
    } catch (_) {
      state.petUrl = '';
      state.petMeta = null;
      state.petImage = null;
      markRenderDirty('hero');
      renderAll();
    }
  }

  function postParent(type, data = {}) {
    try {
      window.parent.postMessage({ type, data }, '*');
    } catch (_) {}
  }

  function showToast(text) {
    const old = root.querySelector('.mh-toast');
    old?.remove();
    const toast = document.createElement('div');
    toast.className = 'mh-toast';
    toast.textContent = text;
    root.appendChild(toast);
    setTimeout(() => toast.remove(), 1300);
  }

  function startLoop() {
    if (rafId) return;
    lastTime = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  function stopLoop() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = 0;
  }

  function loop(now) {
    rafId = requestAnimationFrame(loop);
    const dt = Math.min(34, Math.max(0, now - lastTime || 16));
    lastTime = now;
    update(now, dt);
    renderAll();
  }

  window.addEventListener('message', (event) => {
    const msg = event.data || {};
    if (!treatmentMode || !msg || typeof msg !== 'object') return;
    if (msg.type === 'treatmentCuredPrompt') {
      clearTreatmentAutoEvolution();
      state.awaitingEvolution = true;
      state.paused = true;
      hintEl.textContent = '治疗完成，等待你的选择';
      return;
    }
    if (msg.type === 'treatmentContinue' && state.started && !state.finished && state.awaitingEvolution) {
      scheduleTreatmentAutoEvolution(250);
    }
  });

  function ensureAudio() {
    if (!sound.ctx) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      sound.ctx = new AudioContext();
      sound.master = sound.ctx.createGain();
      sound.master.gain.value = AUDIO_MASTER_GAIN;
      sound.master.connect(sound.ctx.destination);
    }
    if (sound.ctx.state === 'suspended') sound.ctx.resume?.();
    return sound.ctx;
  }

  function playSound(type, detail = {}) {
    try {
      const ctx = ensureAudio();
      if (!ctx) return;
      const now = ctx.currentTime;
      if (type === 'start') {
        playSequence([392, 520, 660], .06, .045, 'sine', now);
      } else if (type === 'wave') {
        playTone(420 + (detail.wave || 1) * 24, .1, 'triangle', .05, { slideTo: 540 + (detail.wave || 1) * 22, startAt: now });
      } else if (type === 'mutatedWave') {
        playTone(260 + (detail.wave || 1) * 18, .14, 'sawtooth', .045, { slideTo: 160, startAt: now });
        playNoise(.09, .028, now, 'bandpass', 760);
      } else if (type === 'shoot') {
        playTone(560, .035, 'sine', .03, { slideTo: 660, startAt: now });
      } else if (type === 'heroShoot') {
        playTone(700, .04, 'sine', .035, { slideTo: 820, startAt: now });
      } else if (type === 'weakHit') {
        playTone(1080, .04, 'triangle', .032, { slideTo: 1320, startAt: now });
      } else if (type === 'kill') {
        playSequence([720, 880], .05, .045, 'triangle', now);
      } else if (type === 'waveClear') {
        playSequence([520, 660, 840], .07, .048, 'triangle', now);
      } else if (type === 'build') {
        playTone(480, .075, 'triangle', .05, { slideTo: 640, startAt: now });
      } else if (type === 'upgrade') {
        playSequence([620, 780], .055, .05, 'triangle', now);
      } else if (type === 'select') {
        playTone(420, .045, 'sine', .03, { slideTo: 520, startAt: now });
      } else if (type === 'invalid') {
        playTone(170, .08, 'sawtooth', .045, { slideTo: 110, startAt: now });
      } else if (type === 'escape') {
        playTone(170, .13, 'sawtooth', .055, { slideTo: 92, startAt: now });
        playNoise(.08, .025, now, 'lowpass', 420);
      } else if (type === 'specialHint') {
        playTone(360, .05, 'sine', .035, { slideTo: 430, startAt: now });
      } else if (type === 'special') {
        playSequence([740, 980, 1240], .065, .062, 'triangle', now);
      } else if (type === 'whiteCellHit') {
        playTone(920, .045, 'triangle', .05, { slideTo: 1180, startAt: now });
      } else if (type === 'evolution') {
        playSequence([560, 740, 920], .075, .052, 'triangle', now);
      } else if (type === 'win') {
        playSequence([440, 587, 740, 880], .09, .056, 'triangle', now);
      } else if (type === 'lose') {
        playTone(220, .24, 'sawtooth', .055, { slideTo: 95, startAt: now });
        playNoise(.16, .035, now, 'lowpass', 360);
      } else {
        playTone(520, .07, 'sine', .04, { startAt: now });
      }
    } catch (_) {}
  }

  function playTone(freq, duration = .08, type = 'sine', gain = .05, options = {}) {
    try {
      if (!canPlayTone(freq, type)) return;
      const ctx = ensureAudio();
      if (!ctx || !sound.master) return;
      const startAt = options.startAt ?? ctx.currentTime;
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();
      const sourceGain = Math.min(AUDIO_MAX_SOURCE_GAIN, Math.max(.002, gain * AUDIO_PREAMP_GAIN));
      osc.type = type;
      osc.frequency.setValueAtTime(Math.max(1, freq), startAt);
      if (options.slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1, options.slideTo), startAt + duration);
      amp.gain.setValueAtTime(.001, startAt);
      amp.gain.exponentialRampToValueAtTime(sourceGain, startAt + Math.min(.018, duration * .45));
      amp.gain.exponentialRampToValueAtTime(.001, startAt + duration);
      osc.connect(amp);
      amp.connect(sound.master);
      osc.start(startAt);
      osc.stop(startAt + duration + .03);
    } catch (_) {}
  }

  function playSequence(notes, step, gain, type, startAt) {
    notes.forEach((note, index) => playTone(note, step * 1.45, type, gain, { slideTo: note * 1.08, startAt: startAt + index * step }));
  }

  function playNoise(duration, gain, startAt, filterType = 'bandpass', frequency = 1200) {
    try {
      const ctx = ensureAudio();
      if (!ctx || !sound.master) return;
      const length = Math.max(1, Math.floor(ctx.sampleRate * duration));
      const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
      const source = ctx.createBufferSource();
      const filter = ctx.createBiquadFilter();
      const amp = ctx.createGain();
      source.buffer = buffer;
      filter.type = filterType;
      filter.frequency.setValueAtTime(frequency, startAt);
      amp.gain.setValueAtTime(Math.min(AUDIO_MAX_SOURCE_GAIN, Math.max(.001, gain * AUDIO_PREAMP_GAIN)), startAt);
      amp.gain.exponentialRampToValueAtTime(.001, startAt + duration);
      source.connect(filter);
      filter.connect(amp);
      amp.connect(sound.master);
      source.start(startAt);
      source.stop(startAt + duration + .02);
    } catch (_) {}
  }

  function init() {
    layoutSvgStage();
    applyResponsiveLayout(true);
    initCustomSelects();
    makeDifficultyButtons();
    bindControls();
    layoutSvgStage();
    setScene(state.sceneId, { silent: true });
    overlayTextEl.textContent = helpText();
    renderAll();
    requestPetImage();
    updateHud();
    requestAnimationFrame(() => {
      layoutSvgStage();
      markRenderDirty('spots', 'hero', 'hud');
      renderAll();
    });
    if (!state.loadedPosted) {
      state.loadedPosted = true;
      postParent('gameLoaded');
    }
  }

  init();
})();
</script>
