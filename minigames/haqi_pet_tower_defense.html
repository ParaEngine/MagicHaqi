  function el(name, attrs = {}, children = []) {
    const node = document.createElementNS(SVG_NS, name);

        node.textContent = value;
      } else if (key === 'href') {
        node.setAttributeNS(XLINK_NS, 'href', value);
        node.setAttribute('href', value);
      } else {
        node.setAttribute(key, String(value));

    });
    children.forEach(child => node.appendChild(child));

  function buildPathInfo(points) {
    const segments = [];
    let total = 0;
    for (let i = 0; i < points.length - 1; i++) {
      const a = points[i];
      const b = points[i + 1];
      const len = Math.hypot(b.x - a.x, b.y - a.y);
      segments.push({ a, b, len, start: total });
      total += len;
    }
    return { segments, total };
  }

  function pointAt(distance, pathIndex = 0) {
    const info = pathInfos[pathIndex] || pathInfos[0];
    const d = Math.max(0, Math.min(info.total, distance));
    const seg = info.segments.find(item => d <= item.start + item.len) || info.segments[info.segments.length - 1];
    const t = seg.len ? (d - seg.start) / seg.len : 0;
    return { x: seg.a.x + (seg.b.x - seg.a.x) * t, y: seg.a.y + (seg.b.y - seg.a.y) * t };

      spikes.push(el('circle', { cx: -7, cy: -4, r: 4, fill: '#fff', opacity: .65 }));

      return el('g', {}, spikes);
    }
    if (enemy.kind === 'spore') {
      return el('g', {}, [
        el('path', { d: 'M-25 6 C-28 -20 -4 -35 18 -23 C37 -12 30 24 5 28 C-12 31 -24 22 -25 6Z', fill: enemy.color, stroke: enemy.stroke, 'stroke-width': 4, 'stroke-linejoin': 'round' }),
        el('circle', { cx: -8, cy: -8, r: 5, fill: '#fff', opacity: .72 }),

      el('line', { x1: -20, y1: -18, x2: -32, y2: -30, stroke: enemy.stroke, 'stroke-width': 4, 'stroke-linecap': 'round' }),
      el('line', { x1: 19, y1: -12, x2: 33, y2: -22, stroke: enemy.stroke, 'stroke-width': 4, 'stroke-linecap': 'round' }),
      el('line', { x1: -22, y1: 18, x2: -35, y2: 26, stroke: enemy.stroke, 'stroke-width': 4, 'stroke-linecap': 'round' }),
      el('circle', { cx: -8, cy: -4, r: 3.6, fill: '#172554' }),
      el('circle', { cx: 9, cy: -2, r: 3.6, fill: '#172554' }),
      el('path', { d: 'M-8 10 Q2 17 13 8', fill: 'none', stroke: '#172554', 'stroke-width': 3, 'stroke-linecap': 'round' })
    ]);
  }

  function renderShots() {
    clear(layers.shots);
    state.shots.forEach((shot) => {
      layers.shots.appendChild(el('line', { x1: shot.x, y1: shot.y, x2: shot.prevX, y2: shot.prevY, stroke: shot.color, 'stroke-width': 8, 'stroke-linecap': 'round', opacity: .55, filter: 'url(#sparkGlow)' }));
      layers.shots.appendChild(el('circle', { cx: shot.x, cy: shot.y, r: shot.hero ? 9 : 7, fill: shot.color, stroke: '#fff', 'stroke-width': 3, filter: 'url(#sparkGlow)' }));
    });
  }

    g.appendChild(el('path', { d: 'M-66 38 C-45 67 48 67 68 38', fill: 'none', stroke: '#fbbf24', 'stroke-width': 13, 'stroke-linecap': 'round', opacity: .82 }));

    g.appendChild(el('circle', { cx: -47, cy: -39, r: 9, fill: '#dbeafe', stroke: '#38bdf8', 'stroke-width': 3 }));
    g.appendChild(el('g', { transform: 'translate(-58 86)' }, [

      el('rect', { x: 4, y: 4, width: Math.max(0, 108 * healthRatio), height: 10, rx: 5, fill: healthColor }),
      el('rect', { x: 4, y: 4, width: 108, height: 10, rx: 5, fill: 'none', stroke: '#be123c', 'stroke-width': 2, opacity: .42 })

  }

  function renderFx() {
    clear(layers.fx);
    renderMutationField();
    state.energyFlys.forEach((energy) => {
      layers.fx.appendChild(el('g', { transform: `translate(${energy.x} ${energy.y})`, opacity: energy.opacity, filter: 'url(#sparkGlow)' }, [
        el('path', { d: 'M0 -14 L13 -7 L13 7 L0 14 L-13 7 L-13 -7Z', fill: '#fde68a', stroke: '#d97706', 'stroke-width': 3 }),
        el('text', { x: 0, y: 5, text: 'G', 'text-anchor': 'middle', fill: '#92400e', 'font-size': 14, 'font-weight': 1000 })
      ]));
    });
    state.whiteCells.forEach((cell) => {
      layers.fx.appendChild(el('g', { transform: `translate(${cell.x} ${cell.y}) scale(${cell.scale})`, opacity: cell.opacity, filter: 'url(#softShadow)' }, [
        el('circle', { cx: 0, cy: 0, r: 22, fill: '#f8fafc', stroke: '#94a3b8', 'stroke-width': 4 }),
        el('path', { d: 'M-9 -2 C-5 -14 13 -11 11 3 C9 17 -12 15 -9 -2Z', fill: '#c4b5fd', stroke: '#7c3aed', 'stroke-width': 3 }),
        el('circle', { cx: -7, cy: -7, r: 3, fill: '#fff', opacity: .85 })
      ]));
    });
    state.bursts.forEach((burst) => {
      layers.fx.appendChild(el('circle', { cx: burst.x, cy: burst.y, r: burst.r, fill: burst.fill, opacity: burst.opacity, stroke: burst.stroke, 'stroke-width': 4, filter: 'url(#sparkGlow)' }));
    });
    state.evolutionSparks.forEach((spark) => {
      layers.fx.appendChild(el('g', { transform: `translate(${spark.x} ${spark.y}) rotate(${spark.rotate})`, opacity: spark.opacity, filter: 'url(#sparkGlow)' }, [
        el('path', { d: `M0 ${-spark.size} L${spark.size * .36} ${-spark.size * .28} L${spark.size} 0 L${spark.size * .36} ${spark.size * .28} L0 ${spark.size} L${-spark.size * .36} ${spark.size * .28} L${-spark.size} 0 L${-spark.size * .36} ${-spark.size * .28}Z`, fill: spark.fill, stroke: '#fff', 'stroke-width': 2 })
      ]));
    });
    state.floating.forEach((text) => {
      layers.fx.appendChild(el('text', { x: text.x, y: text.y, text: text.text, 'text-anchor': 'middle', fill: text.color, 'font-size': text.size, 'font-weight': 1000, opacity: text.opacity, stroke: '#fff', 'stroke-width': 4, 'paint-order': 'stroke' }));
    });
  }

  function updateHud() {
    hudEls.wave.textContent = String(state.wave);
    hudEls.coins.textContent = String(state.coins);
    hudEls.score.textContent = String(state.score);
    if (hudEls.mutation) hudEls.mutation.textContent = state.currentMutation ? state.currentMutation.label : '稳定';
    if (hudEls.specialLabel) hudEls.specialLabel.textContent = state.specialCharge >= 100 ? '出击' : `${Math.floor(state.specialCharge)}%`;
    hudEls.mutation?.parentElement?.classList.toggle('mutation-active', !!state.currentMutation && state.started && !state.finished);
    specialBtn.disabled = !state.started || state.finished || state.specialCharge < 100;
    updateUpgradeButton();
    root.querySelectorAll('.mh-tower-btn').forEach((btn) => btn.classList.toggle('active', btn.dataset.type === state.selectedType));
  }

  function updateUpgradeButton() {
    const tower = selectedTower();
    upgradeBtn.hidden = !tower;
    if (!tower) return;
    if (tower.level >= MAX_TOWER_LEVEL) {
      hudEls.upgradeLabel.textContent = '已满级';
      upgradeBtn.disabled = true;
      return;
    }
    const cost = upgradeCost(tower);
    hudEls.upgradeLabel.textContent = `升级: ${cost}`;
    upgradeBtn.disabled = !state.started || state.finished;
  }

  function selectedTower() {
    return state.towers.find(item => item.id === state.selectedTowerId) || null;
  }

  function startGame(options = {}) {
    stopLoop();
    const conf = cfg();
    state.started = true;
    state.finished = false;
    state.paused = false;
    state.score = 0;
    state.coins = conf.coins;
    state.lives = conf.lives;
    state.wave = 1;
    state.enemiesToSpawn = 0;
    state.spawnTimer = 0;
    state.waveDelay = 1300;
    state.selectedTowerId = null;
    state.specialCharge = 0;
    state.heroCooldown = 0;
    state.awaitingEvolution = false;
    state.currentMutation = null;
    state.evolutions = defaultEvolutions();
    state.towers = [];
    state.enemies = [];
    state.shots = [];
    state.bursts = [];
    state.floating = [];
    state.energyFlys = [];
    state.evolutionSparks = [];
    state.whiteCells = [];
    state.roundId = `${state.difficulty}-${Date.now()}`;
    towerIdSeq = 1;
    enemyIdSeq = 1;
    shotIdSeq = 1;
    sparkIdSeq = 1;
    renderAll();
    overlayEl.hidden = true;
    postParent('gameStarted', { difficulty: state.difficulty, roundId: state.roundId });
    showToast('守护开始！');
    playTone(520, .08, 'sine');
    startLoop();
  }

  function startWave() {
    state.currentMutation = mutationForWave(state.wave);
    state.enemiesToSpawn = 6 + state.wave * 3 + (state.currentMutation?.countBonus || 0);
    state.spawnTimer = 1;
    state.waveDelay = 0;
    const waveText = state.currentMutation ? `第 ${state.wave} 波：${state.currentMutation.label}` : `第 ${state.wave} 波`;
    floatText(view.width * .5, 90, waveText, state.currentMutation?.color || '#0f766e', 28);
    hintEl.textContent = state.currentMutation ? `${state.currentMutation.label}：${state.currentMutation.text}` : '稳定波次，按克制关系布置防御';
    if (state.currentMutation) {
      paths.forEach((_, pathIndex) => {
        const p = pointAt(36, pathIndex);
        burstAt(p.x, p.y, state.currentMutation.color, '#ffffff', 38);
        spawnSparkBurst(p.x, p.y, state.currentMutation.color, 8, 640, 120);
      });
      playTone(260 + state.wave * 18, .12, 'sawtooth', .045);
    }
    playTone(420 + state.wave * 24, .1, 'triangle');
  }

  function mutationForWave(wave) {
    if (wave < 2) return null;
    return MUTATION_TYPES[(wave + DIFFICULTY_ORDER.indexOf(state.difficulty)) % MUTATION_TYPES.length];
  }

  function spawnEnemy() {
    const conf = cfg();
    const pathIndex = state.enemiesToSpawn % Math.max(1, pathInfos.length);
    const kindIndex = (state.wave + state.enemiesToSpawn) % ENEMY_TYPES.length;
    const base = ENEMY_TYPES[kindIndex];
    const elite = state.wave >= 4 && state.enemiesToSpawn % 7 === 0;
    const mutation = state.currentMutation;
    const hpFactor = mutation?.hp || 1;
    const speedFactor = mutation?.speed || 1;
    state.enemies.push({
      id: enemyIdSeq++,
      kind: elite ? 'eliteVirus' : base.kind,
      pathIndex,
      distance: 0,
      hp: Math.round((base.hp + state.wave * 17 + (elite ? 62 : 0)) * conf.enemyHp * hpFactor),
      maxHp: Math.round((base.hp + state.wave * 17 + (elite ? 62 : 0)) * conf.enemyHp * hpFactor),
      speed: (base.speed + state.wave * 3 - (elite ? 8 : 0)) * conf.enemySpeed * speedFactor,
      reward: base.reward + (elite ? 10 : 0) + (mutation?.reward || 0),
      color: elite ? '#fb7185' : base.color,
      stroke: elite ? '#9f1239' : base.stroke,
      slowUntil: 0,
      slowFactor: 1,
      mutationId: mutation?.id || ''
    });
  }

  function update(now, dt) {
    if (!state.started || state.finished || state.paused) return;
    if (state.waveDelay > 0) {
      state.waveDelay -= dt;
      if (state.waveDelay <= 0) startWave();
    }
    if (state.enemiesToSpawn > 0) {
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnEnemy();
        state.enemiesToSpawn--;
        state.spawnTimer = Math.max(300, (870 - state.wave * 35) * (state.currentMutation?.spawnGap || 1));
      }
    }
    updateEnemies(now, dt);
    updateTowers(now);
    updateHero(now);
    updateShots(dt);
    updateWhiteCells(dt);
    updateFx(dt);
    checkWaveDone();
  }

  function updateEnemies(now, dt) {
    const escaped = [];
    state.enemies.forEach((enemy) => {
      const slowActive = enemy.slowUntil > now;
      enemy.distance += enemy.speed * (slowActive ? enemy.slowFactor : 1) * dt / 1000;
      const info = pathInfos[enemy.pathIndex] || pathInfos[0];
      if (enemy.distance >= info.total - 12) escaped.push(enemy);
    });
    escaped.forEach((enemy) => {
      removeEnemy(enemy.id);
      state.lives--;
      burstAt(currentLayout.gate.x, currentLayout.gate.y, '#fee2e2', '#ef4444');
      playTone(150, .08, 'sawtooth');
      if (state.lives <= 0) endGame(false);
    });
  }

  function updateTowers(now) {
    state.towers.forEach((tower) => {
      if (tower.cooldown > now) return;
      const target = findTarget(buildSpots[tower.spotIndex], towerRange(tower));
      if (!target) return;
      fireShot(tower, target);
      tower.cooldown = now + Math.max(260, TOWER_TYPES[tower.type].rate * Math.pow(.84, tower.level - 1));
    });
  }

  function updateHero(now) {
    if (state.heroCooldown > now) return;
    const target = findTarget(currentLayout.hero, 230);
    if (!target) return;
    fireShot({ id: 'hero', type: 'hero', level: 1 }, target, true);
    state.heroCooldown = now + 690 / (state.evolutions?.heroRate || 1);
  }

  function updateShots(dt) {
    const remaining = [];
    state.shots.forEach((shot) => {
      const target = state.enemies.find(enemy => enemy.id === shot.targetId);
      if (!target) return;
      const p = pointAt(target.distance, target.pathIndex);
      shot.prevX = shot.x;
      shot.prevY = shot.y;
      const dx = p.x - shot.x;
      const dy = p.y - shot.y;
      const dist = Math.hypot(dx, dy);
      const step = shot.speed * dt / 1000;
      if (dist <= step + 8) {
        hitEnemy(target, shot);
      } else {
        shot.x += dx / dist * step;
        shot.y += dy / dist * step;
        remaining.push(shot);
      }
    });
    state.shots = remaining;
  }

  function updateFx(dt) {
    state.bursts = state.bursts.map((burst) => ({ ...burst, age: burst.age + dt, r: burst.r + dt * .075, opacity: Math.max(0, burst.opacity - dt / 420) })).filter(burst => burst.opacity > .02);
    state.floating = state.floating.map((text) => ({ ...text, age: text.age + dt, y: text.y - dt * .045, opacity: Math.max(0, 1 - text.age / text.life) })).filter(text => text.opacity > .02);
    state.energyFlys = state.energyFlys.map((energy) => {
      const nextAge = energy.age + dt;
      const t = Math.min(1, nextAge / energy.life);
      const ease = 1 - Math.pow(1 - t, 3);
      return {
        ...energy,
        age: nextAge,
        x: energy.startX + (energy.targetX - energy.startX) * ease,
        y: energy.startY + (energy.targetY - energy.startY) * ease - Math.sin(t * Math.PI) * 34,
        opacity: Math.max(0, 1 - Math.max(0, t - .74) / .26)
      };
    }).filter(energy => energy.age < energy.life);
    state.whiteCells = state.whiteCells.map((cell) => ({
      ...cell,
      age: cell.age + dt,
      opacity: Math.max(0, 1 - Math.max(0, cell.age - cell.life * .78) / (cell.life * .22))
    })).filter(cell => cell.age < cell.life && !cell.done);
    state.evolutionSparks = state.evolutionSparks.map((spark) => {
      const nextAge = spark.age + dt;
      const t = Math.min(1, nextAge / spark.life);
      return {
        ...spark,
        age: nextAge,
        x: spark.x + spark.vx * dt / 1000,
        y: spark.y + spark.vy * dt / 1000,
        rotate: spark.rotate + spark.spin * dt / 1000,
        opacity: Math.max(0, 1 - t),
        size: spark.baseSize * (1 + Math.sin(t * Math.PI) * .28)
      };
    }).filter(spark => spark.age < spark.life);
  }

  function updateWhiteCells(dt) {
    if (!state.whiteCells.length) return;
    state.whiteCells.forEach((cell) => {
      const info = pathInfos[cell.pathIndex] || pathInfos[0];
      cell.distance = Math.max(0, cell.distance - cell.speed * dt / 1000);
      const p = pointAt(cell.distance, cell.pathIndex);
      cell.x = p.x;
      cell.y = p.y + Math.sin((cell.age || 0) / 110 + cell.phase) * 4;
      const target = state.enemies
        .filter(enemy => enemy.pathIndex === cell.pathIndex && enemy.hp > 0)
        .find(enemy => Math.abs(enemy.distance - cell.distance) <= cell.hitRadius);
      if (target) {
        const hitPoint = pointAt(target.distance, target.pathIndex);
        damageEnemy(target, cell.damage);
        burstAt(hitPoint.x, hitPoint.y, '#e0f2fe', '#7c3aed', 34);
        cell.done = true;
        playTone(920, .045, 'triangle', .05);
      }
      if (cell.distance <= 8 || cell.distance >= info.total + 20) cell.done = true;
    });
    state.whiteCells = state.whiteCells.filter(cell => !cell.done);
  }

  function findTarget(origin, range) {
    if (!origin) return null;
    let best = null;
    state.enemies.forEach((enemy) => {
      const p = pointAt(enemy.distance, enemy.pathIndex);
      const dist = Math.hypot(p.x - origin.x, p.y - origin.y);
      if (dist <= range && (!best || enemy.distance > best.distance)) best = enemy;
    });
    return best;
  }

  function fireShot(tower, target, hero = false) {
    const origin = hero ? currentLayout.hero : buildSpots[tower.spotIndex];
    if (!origin) return;
    const type = TOWER_TYPES[tower.type] || { projectile: '#fde68a', damage: 16, range: 220, rate: 680 };
    const targetPoint = pointAt(target.distance, target.pathIndex);
    if (!hero) {
      tower.fireAt = performance.now();
      tower.fireAngle = Math.atan2(targetPoint.y - origin.y, targetPoint.x - origin.x);
    }
    const weakHit = !hero && isWeakHit(tower.type, target);
    const towerDamage = hero ? 16 + state.wave * 2 : modifiedTowerDamage(tower, type, target);
    state.shots.push({
      id: shotIdSeq++,
      targetId: target.id,
      x: origin.x,
      y: origin.y - (hero ? 25 : 8),
      prevX: origin.x,
      prevY: origin.y - (hero ? 25 : 8),
      speed: hero ? 610 : 520,
      color: hero ? '#fde047' : type.projectile,
      damage: towerDamage,
      slow: type.slow || 0,
      slowMs: (type.slowMs || 0) + (state.evolutions?.bubbleSlowMs || 0),
      splash: type.splash ? type.splash + tower.level * 8 + (state.evolutions?.flowerSplash || 0) : 0,
      hero,
      weakHit
    });
    playTone(hero ? 760 : 620, .035, 'sine', .035);
  }

  function hitEnemy(enemy, shot) {
    const p = pointAt(enemy.distance, enemy.pathIndex);
    if (shot.splash > 0) {
      [...state.enemies].forEach((other) => {
        if (other.id === enemy.id) return;
        const op = pointAt(other.distance, other.pathIndex);
        if (Math.hypot(op.x - p.x, op.y - p.y) <= shot.splash) damageEnemy(other, Math.round(shot.damage * .72));
      });
      burstAt(p.x, p.y, '#fbcfe8', '#db2777', 30);
    }
    if (shot.slow) {
      enemy.slowUntil = performance.now() + shot.slowMs;
      enemy.slowFactor = 1 - (1 - shot.slow) * (state.currentMutation?.slowResist || 1);
      burstAt(p.x, p.y, '#dbeafe', '#38bdf8', 24);
    }
    if (shot.weakHit) {
      burstAt(p.x, p.y, '#fef08a', '#f97316', 29);
      floatText(p.x, p.y - 38, '克制!', '#ea580c', 18);
      spawnSparkBurst(p.x, p.y, '#facc15', 7, 620, 150);
      playTone(1080, .035, 'triangle', .03);
    }
    damageEnemy(enemy, shot.damage);
    burstAt(p.x, p.y, shot.color, '#fff', shot.hero ? 23 : 17);
  }

  function damageEnemy(enemy, damage) {
    if (!enemy || enemy.hp <= 0) return;
    enemy.hp -= damage;
    if (enemy.hp <= 0) killEnemy(enemy);
  }

  function killEnemy(enemy) {
    const p = pointAt(enemy.distance, enemy.pathIndex);
    removeEnemy(enemy.id);
    const conf = cfg();
    const coins = Math.max(4, Math.round(enemy.reward + state.wave * 1.2));
    state.coins += coins;
    animateEnergyPill();
    state.score += conf.score + state.wave * 12;
    state.specialCharge = Math.min(100, state.specialCharge + 8 + state.wave * .6);
    floatText(p.x, p.y - 18, `葡萄糖 +${coins}`, '#d97706', 20);
    spawnGlucoseFly(p.x, p.y, coins);
    burstAt(p.x, p.y, '#fef3c7', '#f59e0b', 32);
    playTone(880, .05, 'triangle', .045);
    if (state.score > state.bestScore) {
      state.bestScore = state.score;
      localStorage.setItem(STORAGE_BEST_SCORE, String(state.bestScore));
    }
  }

  function removeEnemy(id) {
    state.enemies = state.enemies.filter(enemy => enemy.id !== id);
  }

  function checkWaveDone() {
    if (state.enemiesToSpawn > 0 || state.enemies.length > 0 || state.waveDelay > 0 || state.finished || state.awaitingEvolution) return;
    if (state.wave >= MAX_WAVE) {
      endGame(true);
      return;
    }
    state.wave++;
    if (state.wave > state.bestWave) {
      state.bestWave = state.wave;
      localStorage.setItem(STORAGE_BEST_WAVE, String(state.bestWave));
    }
    state.coins += cfg().reward + state.wave * 8 + (state.evolutions?.bonusIncome || 0);
    animateEnergyPill();
    state.waveDelay = 0;
    floatText(view.width * .5, 110, '守住了！选择免疫进化', '#16a34a', 25);
    playTone(660, .1, 'triangle');
    showEvolutionChoices();
  }

  function endGame(won) {
    if (state.finished) return;
    state.finished = true;
    stopLoop();
    state.bestScore = Math.max(state.bestScore, state.score);
    state.bestWave = Math.max(state.bestWave, state.wave);
    localStorage.setItem(STORAGE_BEST_SCORE, String(state.bestScore));
    localStorage.setItem(STORAGE_BEST_WAVE, String(state.bestWave));
    renderAll();
    overlayTitleEl.textContent = won ? '免疫防线成功！' : '宠物基地需要支援';
    overlayTextEl.textContent = won
      ? `你的宠物主角守住了 ${MAX_WAVE} 波病原体。得分 ${state.score}。`
      : `这次守到第 ${state.wave} 波，得分 ${state.score}。调整塔的位置，再来一次会更稳。`;
    startBtn.textContent = '再玩一次';
    overlayEl.hidden = false;
    postParent('gameFinished', {
      roundId: state.roundId,
      completed: won,
      passed: won,
      earnedPoints: state.score,
      score: state.score,
      level: state.wave,
      difficulty: state.difficulty,
      waves: state.wave,
      maxWave: MAX_WAVE
    });
    playTone(won ? 760 : 220, .14, won ? 'triangle' : 'sawtooth');
  }

  function handleSpotTap(index) {
    if (!state.started || state.finished) return;
    const existing = state.towers.find(tower => tower.spotIndex === index);
    if (existing) {
      handleTowerTap(existing.id);
      return;
    }
    const type = TOWER_TYPES[state.selectedType];
    if (state.coins < type.cost) {
      showToast('葡萄糖不够');
      playTone(160, .08, 'sawtooth');
      return;
    }
    state.coins -= type.cost;
    state.towers.push({ id: towerIdSeq++, spotIndex: index, type: type.id, level: 1, cooldown: 0 });
    state.selectedTowerId = null;
    hintEl.textContent = `${type.label}部署好了，点防御单元可以升级`;
    burstAt(buildSpots[index].x, buildSpots[index].y, type.glow, type.color, 42);
    playTone(560, .08, 'triangle');
    renderAll();
  }

  function handleTowerTap(id) {
    if (!state.started || state.finished) return;
    const tower = state.towers.find(item => item.id === id);
    if (!tower) return;
    state.selectedTowerId = tower.id;
    if (tower.level >= MAX_TOWER_LEVEL) {
      hintEl.textContent = `${TOWER_TYPES[tower.type].short}已满级，当前显示攻击范围`;
    } else {
      hintEl.textContent = `${TOWER_TYPES[tower.type].short}已选中，点底部升级按钮提升战力`;
    }
    renderAll();
  }

  function upgradeSelectedTower() {
    if (!state.started || state.finished) return;
    const tower = selectedTower();
    if (!tower) return;
    const cost = upgradeCost(tower);
    if (tower.level >= MAX_TOWER_LEVEL) {
      hintEl.textContent = '这座塔已经满级，范围会显示出来';
      renderAll();
      return;
    }
    if (state.coins >= cost) {
      const spot = buildSpots[tower.spotIndex];
      if (!spot) return;
      state.coins -= cost;
      tower.level++;
      hintEl.textContent = `${TOWER_TYPES[tower.type].short}战力升级到 lv${tower.level}`;
      burstAt(spot.x, spot.y, '#fef3c7', '#f59e0b', 48);
      floatText(spot.x, spot.y - 54, `lv${tower.level}`, '#0f766e', 22);
      playTone(700, .08, 'triangle');
    } else {
      hintEl.textContent = `升级需要 ${cost} 葡萄糖`;
      playTone(170, .07, 'sawtooth');
    }
    renderAll();
  }

  function deselectTower() {
    if (!state.selectedTowerId) return;
    state.selectedTowerId = null;
    hintEl.textContent = `已选择 ${TOWER_TYPES[state.selectedType].label}，点免疫节点部署`;
    renderAll();
  }

  function upgradeCost(tower) {
    const multipliers = [0, .72, 1.05, 1.42];
    return Math.round(TOWER_TYPES[tower.type].cost * (multipliers[tower.level] || 1.42));
  }

  function towerRange(tower) {
    return TOWER_TYPES[tower.type].range + (tower.level - 1) * 22 + (state.evolutions?.globalRange || 0);
  }

  function traitColor(type) {
    if (type === 'acorn') return '#b45309';
    if (type === 'bubble') return '#0284c7';
    if (type === 'flower') return '#16a34a';
    return '#be123c';
  }

  function isWeakHit(towerType, target) {
    return ENEMY_TRAITS[target.kind]?.weak === towerType;
  }

  function towerEvolutionAura(tower) {
    if (!state.evolutions) return null;
    if (tower.type === 'acorn' && state.evolutions.acornDamage > 0) return { fill: '#fef3c7', stroke: '#d97706', opacity: .18 };
    if (tower.type === 'bubble' && state.evolutions.bubbleSlowMs > 0) return { fill: '#dbeafe', stroke: '#0284c7', opacity: .18 };
    if (tower.type === 'flower' && state.evolutions.flowerSplash > 0) return { fill: '#dcfce7', stroke: '#16a34a', opacity: .18 };
    if (state.evolutions.globalRange > 0) return { fill: '#fff7ed', stroke: '#f59e0b', opacity: .12 };
    return null;
  }

  function modifiedTowerDamage(tower, type, target) {
    let damage = type.damage * (1 + (tower.level - 1) * .44);
    if (tower.type === 'acorn') damage *= 1 + (state.evolutions?.acornDamage || 0);
    const trait = ENEMY_TRAITS[target.kind];
    if (trait?.weak === tower.type) damage *= trait.weakFactor;
    return Math.round(damage);
  }

        id: sparkIdSeq++,

        vx: Math.cos(angle) * speed,

  function spawnGlucoseFly(x, y, amount) {
    const count = Math.min(5, Math.max(2, Math.round(amount / 6)));
    const target = glucoseTargetPoint();
    for (let i = 0; i < count; i++) {
      state.energyFlys.push({
        x,
        y,
        startX: x + (i - count / 2) * 9,
        startY: y + (i % 2 ? 10 : -8),
        targetX: target.x + (i - count / 2) * 4,

      });

  function glucoseTargetPoint() {
    const rect = hudEls.energyPill?.getBoundingClientRect();
    if (!rect || !rect.width || !rect.height) return { x: view.width * .5, y: 38 };
    return clientToSvgPoint(rect.left + rect.width * .5, rect.top + rect.height * .5);
  }

  function clientToSvgPoint(clientX, clientY) {
    const rect = svg.getBoundingClientRect();
    if (!rect.width || !rect.height) return { x: view.width * .5, y: 38 };
    const viewAspect = view.width / view.height;
    const rectAspect = rect.width / rect.height;
    let drawWidth = rect.width;
    let drawHeight = rect.height;
    let offsetX = 0;
    let offsetY = 0;
    if (rectAspect > viewAspect) {
      drawWidth = rect.height * viewAspect;
      offsetX = (rect.width - drawWidth) / 2;
    } else {
      drawHeight = rect.width / viewAspect;
      offsetY = (rect.height - drawHeight) / 2;
    }
    const x = (clientX - rect.left - offsetX) / Math.max(1, drawWidth) * view.width;
    const y = (clientY - rect.top - offsetY) / Math.max(1, drawHeight) * view.height;
    return { x: Math.max(0, Math.min(view.width, x)), y: Math.max(0, Math.min(view.height, y)) };
  }

  function spawnWhiteCellTroop() {
    const allocations = whiteCellAllocations(10);
    allocations.forEach((count, pathIndex) => {
      const info = pathInfos[pathIndex] || pathInfos[0];
      const speed = whiteCellSpeedForPath(pathIndex);
      const baseDistance = pathDistanceClosestTo(currentLayout.gate, pathIndex);
      for (let i = 0; i < count; i++) {
        const distance = Math.max(0, baseDistance - i * 22);
        const p = pointAt(distance, pathIndex);
        state.whiteCells.push({
          pathIndex,
          distance,
          x: p.x,
          y: p.y,
          speed,
          damage: 95 + state.wave * 18,
          hitRadius: 28,
          scale: .74 + (i % 3) * .1,
          phase: i * .9,
          opacity: 1,
          age: 0,
          life: Math.max(1400, (Math.max(baseDistance, info.total * .45) / Math.max(1, speed)) * 1000 + 500)
        });
      }
    });
  }

  function pathDistanceClosestTo(point, pathIndex) {
    const info = pathInfos[pathIndex] || pathInfos[0];
    let bestDistance = info.total;
    let bestGap = Infinity;
    info.segments.forEach((segment) => {
      const dx = segment.b.x - segment.a.x;
      const dy = segment.b.y - segment.a.y;
      const len2 = Math.max(1, dx * dx + dy * dy);
      const t = Math.max(0, Math.min(1, ((point.x - segment.a.x) * dx + (point.y - segment.a.y) * dy) / len2));
      const x = segment.a.x + dx * t;
      const y = segment.a.y + dy * t;
      const gap = Math.hypot(point.x - x, point.y - y);
      if (gap < bestGap) {
        bestGap = gap;
        bestDistance = segment.start + segment.len * t;
      }
    });
    return bestDistance;
  }

  function whiteCellAllocations(totalTroops) {
    const counts = pathInfos.map((_, pathIndex) => state.enemies.filter(enemy => enemy.pathIndex === pathIndex && enemy.hp > 0).length);
    const totalEnemies = counts.reduce((sum, count) => sum + count, 0);
    if (!totalEnemies) {
      return counts.map((_, index) => Math.floor(totalTroops / counts.length) + (index < totalTroops % counts.length ? 1 : 0));
    }
    const raw = counts.map(count => count ? count / totalEnemies * totalTroops : 0);
    const allocations = raw.map(value => Math.floor(value));
    let remaining = totalTroops - allocations.reduce((sum, value) => sum + value, 0);
    raw
      .map((value, index) => ({ index, rest: value - Math.floor(value), count: counts[index] }))
      .sort((a, b) => b.rest - a.rest || b.count - a.count)
      .forEach((item) => {
        if (remaining <= 0) return;
        allocations[item.index]++;
        remaining--;
      });
    return allocations;
  }

  function whiteCellSpeedForPath(pathIndex) {
    const enemies = state.enemies.filter(enemy => enemy.pathIndex === pathIndex && enemy.hp > 0);
    if (!enemies.length) return 82 + state.wave * 3;
    const total = enemies.reduce((sum, enemy) => {
      const slowActive = enemy.slowUntil > performance.now();
      return sum + enemy.speed * (slowActive ? enemy.slowFactor : 1);
    }, 0);
    return Math.max(45, total / enemies.length);
  }

      { id: 'flowerSplash', icon: '靶', title: '群体标记', desc: '靶向细胞溅射 +18' },
      { id: 'heroRate', icon: '宠', title: '宠物专注', desc: '宠物主角攻速 +16%' },
      { id: 'globalRange', icon: '环', title: '免疫感知', desc: '全部防御范围 +10' },

    const start = (state.wave * 2 + state.score) % pool.length;
    return [0, 3, 5].map(offset => pool[(start + offset) % pool.length]);

    evolutionChoicesEl.innerHTML = '';

      const btn = document.createElement('button');

      btn.onclick = () => chooseEvolution(choice.id, choice.title);
      evolutionChoicesEl.appendChild(btn);
    });
    overlayTitleEl.textContent = '免疫进化';

    startBtn.hidden = true;
    overlayEl.hidden = false;

    applyEvolution(id);
    spawnEvolutionAura(id);
    state.awaitingEvolution = false;
    state.paused = false;
    state.waveDelay = 1200;
    overlayEl.hidden = true;

    document.getElementById('mhOverlayDifficulties').hidden = false;

  function applyEvolution(id) {
    if (!state.evolutions) state.evolutions = defaultEvolutions();
    if (id === 'acornDamage') state.evolutions.acornDamage += .18;
    if (id === 'bubbleSlow') state.evolutions.bubbleSlowMs += 450;
    if (id === 'flowerSplash') state.evolutions.flowerSplash += 18;
    if (id === 'heroRate') state.evolutions.heroRate += .16;
    if (id === 'globalRange') state.evolutions.globalRange += 10;
    if (id === 'bonusIncome') state.evolutions.bonusIncome += 16;
    if (id === 'repair') state.lives = Math.min(cfg().lives, state.lives + 2);

    overlayTitleEl.textContent = '细胞免疫塔防';

    startBtn.textContent = state.started && !state.finished ? '继续守护' : '开始守护';

    overlayEl.hidden = true;

      state.paused = false;

      wrap.innerHTML = '';
      DIFFICULTY_ORDER.forEach((id) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'mh-difficulty';
        btn.textContent = DIFFICULTIES[id].label;

        btn.onclick = () => setDifficulty(id);

      });

    if (!DIFFICULTIES[id]) return;
    state.difficulty = id;
    localStorage.setItem(STORAGE_DIFFICULTY, id);
    refreshDifficultyButtons();

  function refreshDifficultyButtons() {
    root.querySelectorAll('.mh-difficulty').forEach((btn) => btn.classList.toggle('active', btn.dataset.difficulty === state.difficulty));
  }

  function bindControls() {
    root.querySelectorAll('.mh-tower-btn').forEach((btn) => {
      btn.onclick = () => {
        state.selectedType = btn.dataset.type;
        state.selectedTowerId = null;
        hintEl.textContent = `已选择 ${TOWER_TYPES[state.selectedType].label}，点免疫节点部署`;
        renderAll();
      };
    });
    document.getElementById('mhMenu').onclick = () => showOverlay(true);
    document.getElementById('mhRestart').onclick = () => startGame();
    startBtn.onclick = hideOverlay;
    specialBtn.onclick = useSpecial;
    upgradeBtn.onclick = upgradeSelectedTower;
    svg.addEventListener('pointerdown', () => deselectTower());
    window.addEventListener('resize', () => {
      layoutSvgStage();
      applyResponsiveLayout();
      renderAll();
    });
    window.addEventListener('message', onMessage);
  }

  async function onMessage(event) {
    const msg = event.data || {};
    if (msg.type === 'setGameConfig' && msg.data?.difficulty) {
      setDifficulty(msg.data.difficulty);
      return;
    }
    if (msg.type === 'haqi_pet_image' && msg.ok && msg.data) {
      await setPetImage(msg.data);
    }
  }

  async function requestPetImage() {
    try {
      window.parent.postMessage({ type: 'haqi_get_pet_image', requestId: `pet_td_${Date.now()}`, anim: 'happy' }, '*');
    } catch (_) {}
  }

  async function setPetImage(pet) {
    try {
      if (state.petUrl) URL.revokeObjectURL(state.petUrl);
      state.petUrl = URL.createObjectURL(pet.imageBlob);
      state.petMeta = pet;
      renderHero();
    } catch (_) {
      state.petUrl = '';
      state.petMeta = null;
      renderHero();
    }
  }

  function postParent(type, data = {}) {
    try {
      window.parent.postMessage({ type, data }, '*');
    } catch (_) {}
  }

  function showToast(text) {
    const old = root.querySelector('.mh-toast');
    old?.remove();
    const toast = document.createElement('div');
    toast.className = 'mh-toast';
    toast.textContent = text;
    root.appendChild(toast);
    setTimeout(() => toast.remove(), 1300);
  }

  function startLoop() {
    if (rafId) return;
    lastTime = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  function stopLoop() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = 0;
  }

  function loop(now) {
    rafId = requestAnimationFrame(loop);
    const dt = Math.min(40, now - lastTime || 16);
    lastTime = now;
    update(now, dt);
    renderAll();
  }

  function playTone(freq, duration = .08, type = 'sine', gain = .05) {
    try {
      if (!sound.ctx) {
        sound.ctx = new (window.AudioContext || window.webkitAudioContext)();
        sound.master = sound.ctx.createGain();
        sound.master.gain.value = .16;
        sound.master.connect(sound.ctx.destination);
      }
      const osc = sound.ctx.createOscillator();
      const amp = sound.ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      amp.gain.setValueAtTime(gain, sound.ctx.currentTime);
      amp.gain.exponentialRampToValueAtTime(.001, sound.ctx.currentTime + duration);
      osc.connect(amp);
      amp.connect(sound.master);
      osc.start();
      osc.stop(sound.ctx.currentTime + duration);
    } catch (_) {}
  }

  function init() {
    layoutSvgStage();
    applyResponsiveLayout(true);
    makeDifficultyButtons();
    bindControls();
    layoutSvgStage();
    renderAll();
    requestPetImage();
    updateHud();
    requestAnimationFrame(() => {
      layoutSvgStage();
      renderAll();
    });
    if (!state.loadedPosted) {
      state.loadedPosted = true;
      postParent('gameLoaded');
    }
  }

  init();
})();
</script>
