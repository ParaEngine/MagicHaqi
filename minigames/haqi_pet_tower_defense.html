  function generateTestBuildSpots(routePaths, viewBox, gate) {
    const spots = [];
    const minGap = BUILD_SPOT_MIN_GAP;
    const routeOffset = BUILD_SPOT_ROUTE_CLEARANCE + 10;
    const distanceBetween = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
    const routeDistance = (point) => {
      let best = Infinity;
      routePaths.forEach((path) => {
        for (let index = 0; index < path.length - 1; index++) {
          const a = path[index];
          const b = path[index + 1];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const len2 = dx * dx + dy * dy || 1;
          const t = Math.max(0, Math.min(1, ((point.x - a.x) * dx + (point.y - a.y) * dy) / len2));
          const x = a.x + dx * t;
          const y = a.y + dy * t;
          best = Math.min(best, Math.hypot(point.x - x, point.y - y));

      });
      return best;
    };
    const addSpot = (x, y) => {
      const spot = { x: Math.round(x), y: Math.round(y) };
      if (spot.x < BUILD_SPOT_EDGE_PADDING || spot.y < BUILD_SPOT_EDGE_PADDING || spot.x > viewBox.width - BUILD_SPOT_EDGE_PADDING || spot.y > viewBox.height - BUILD_SPOT_EDGE_PADDING) return;
      if (gate && distanceBetween(spot, gate) < BUILD_SPOT_GATE_CLEARANCE) return;
      if (routeDistance(spot) < BUILD_SPOT_ROUTE_CLEARANCE) return;
      if (spots.some(existing => distanceBetween(existing, spot) < minGap)) return;
      spots.push(spot);
    };
    routePaths.forEach((path) => {
      for (let index = 0; index < path.length - 1; index++) {
        const a = path[index];
        const b = path[index + 1];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.max(1, Math.hypot(dx, dy));
        const nx = -dy / len;
        const ny = dx / len;
        const steps = Math.max(1, Math.floor(len / 78));
        for (let step = 1; step <= steps; step++) {
          const t = step / (steps + 1);
          const px = a.x + dx * t;
          const py = a.y + dy * t;
          addSpot(px + nx * routeOffset, py + ny * routeOffset);
          addSpot(px - nx * routeOffset, py - ny * routeOffset);
        }
      }
    });
    return spots;
  }

      const x = 35 + ((i * 71) % Math.max(120, view.width - 70));
      const y = 82 + ((i * 47) % Math.max(160, view.height - 180));
      const size = 18 + (i % 4) * 7;
      layers.scene.appendChild(roundCellBackdrop(x, y, size, i));
    }
    renderCellOrganelleBackdrop(scene);
    layers.scene.appendChild(el('path', { d: currentLayout.tissue, fill: scene.soft, opacity: .54 }));
    paths.forEach((pathPoints, index) => {
      layers.scene.appendChild(el('path', { d: pathData(pathPoints), fill: 'none', stroke: '#020617', 'stroke-width': index ? 82 : 92, 'stroke-linecap': 'round', 'stroke-linejoin': 'round', opacity: .34 }));
      layers.scene.appendChild(el('path', { d: pathData(pathPoints), fill: 'none', stroke: scene.spot, 'stroke-width': index ? 68 : 78, 'stroke-linecap': 'round', 'stroke-linejoin': 'round', opacity: .42, filter: 'url(#sparkGlow)' }));
      layers.scene.appendChild(el('path', { d: pathData(pathPoints), fill: 'none', stroke: 'url(#pathGrad)', 'stroke-width': index ? 44 : 54, 'stroke-linecap': 'round', 'stroke-linejoin': 'round', opacity: .82 }));
      layers.scene.appendChild(el('path', { d: pathData(pathPoints), fill: 'none', stroke: '#e0f2fe', 'stroke-width': 4, 'stroke-linecap': 'round', 'stroke-dasharray': '18 24', opacity: .56 }));
    });
  }

  function renderCellOrganelleBackdrop(scene = currentScene()) {
    if (scene.id === 'intestine') return renderIntestineBackdrop(scene);
    if (scene.id === 'brain') return renderBrainBackdrop(scene);
    if (scene.id === 'lung') return renderLungBackdrop(scene);
    if (scene.id === 'stomach') return renderStomachBackdrop(scene);
    const gate = currentLayout.gate;
    const safeRadius = Math.max(120, Math.min(view.width, view.height) * .17);
    const items = [
      { kind: 'mito', dx: -210, dy: -118, s: 1.05, r: -18 },
      { kind: 'vesicle', dx: -144, dy: 126, s: .92, r: 0 },
      { kind: 'dna', dx: 128, dy: -138, s: .86, r: 14 },
      { kind: 'mito', dx: 170, dy: 118, s: .82, r: 26 },
      { kind: 'ribosome', dx: -264, dy: 64, s: .82, r: 0 },
      { kind: 'vesicle', dx: 240, dy: -46, s: .72, r: 0 },
      { kind: 'dna', dx: -58, dy: -206, s: .62, r: -20 },
      { kind: 'ribosome', dx: 72, dy: 214, s: .68, r: 0 }
    ];
    items.forEach((item, index) => {
      let x = gate.x + item.dx;
      let y = gate.y + item.dy;
      x = Math.max(54, Math.min(view.width - 54, x));
      y = Math.max(54, Math.min(view.height - 54, y));
      if (Math.hypot(x - gate.x, y - gate.y) < safeRadius) y = Math.max(54, Math.min(view.height - 54, y - safeRadius * .55));
      const g = el('g', { transform: `translate(${x} ${y}) rotate(${item.r}) scale(${item.s})`, opacity: .52 + (index % 3) * .08 });
      if (item.kind === 'mito') g.appendChild(mitochondrionShape());
      if (item.kind === 'vesicle') g.appendChild(vesicleShape(index));
      if (item.kind === 'dna') g.appendChild(dnaShape());
      if (item.kind === 'ribosome') g.appendChild(ribosomeShape());
      layers.scene.appendChild(g);
    });
  }

  function renderIntestineBackdrop(scene) {
    for (let i = 0; i < 14; i++) {
      const x = 44 + i * (view.width - 88) / 13;
      const h = 44 + (i % 4) * 15;
      layers.scene.appendChild(el('path', { d: `M${x - 18} ${view.height - 62} Q${x} ${view.height - 62 - h} ${x + 18} ${view.height - 62}Z`, fill: '#fff7ed', stroke: scene.accent, 'stroke-width': 3, opacity: .48 }));
    }
    for (let i = 0; i < 8; i++) layers.scene.appendChild(el('circle', { cx: 68 + i * 117 % view.width, cy: 84 + i * 71 % Math.max(160, view.height - 140), r: 18 + i % 3 * 7, fill: '#fde68a', stroke: scene.accent, 'stroke-width': 3, opacity: .28 }));
  }

  function renderBrainBackdrop(scene) {
    const nodes = [
      [120, 120], [260, 96], [410, 170], [610, 110], [780, 190], [190, 360], [420, 330], [650, 390], [820, 310]
    ].map(([x, y]) => ({ x: x / 1000 * view.width, y: y / 620 * view.height }));
    for (let i = 0; i < nodes.length - 1; i++) layers.scene.appendChild(el('path', { d: `M${nodes[i].x} ${nodes[i].y} C${nodes[i].x + 80} ${nodes[i].y - 50} ${nodes[i + 1].x - 80} ${nodes[i + 1].y + 50} ${nodes[i + 1].x} ${nodes[i + 1].y}`, fill: 'none', stroke: scene.accent, 'stroke-width': 5, opacity: .28, 'stroke-linecap': 'round' }));
    nodes.forEach((node, index) => layers.scene.appendChild(el('circle', { cx: node.x, cy: node.y, r: 18 + index % 3 * 5, fill: '#f5f3ff', stroke: scene.accent, 'stroke-width': 4, opacity: .45 })));
  }

  function renderLungBackdrop(scene) {
    const centerX = view.width * .5;
    layers.scene.appendChild(el('path', { d: `M${centerX - 26} 70 C${centerX - 38} 160 ${centerX - 48} 240 ${centerX - 55} 330`, fill: 'none', stroke: scene.accent, 'stroke-width': 16, opacity: .24, 'stroke-linecap': 'round' }));
    layers.scene.appendChild(el('path', { d: `M${centerX + 26} 70 C${centerX + 38} 160 ${centerX + 48} 240 ${centerX + 55} 330`, fill: 'none', stroke: scene.accent, 'stroke-width': 16, opacity: .24, 'stroke-linecap': 'round' }));
    for (let i = 0; i < 22; i++) {
      const side = i % 2 ? 1 : -1;
      const x = centerX + side * (92 + (i % 5) * 36);
      const y = 128 + (i * 41) % Math.max(180, view.height - 210);
      layers.scene.appendChild(el('circle', { cx: x, cy: y, r: 20 + i % 4 * 5, fill: '#ecfeff', stroke: scene.accent, 'stroke-width': 3, opacity: .38 }));
    }
  }

  function renderStomachBackdrop(scene) {
    for (let i = 0; i < 7; i++) {
      const y = 84 + i * (view.height - 168) / 6;
      layers.scene.appendChild(el('path', { d: `M70 ${y} C220 ${y - 50} 320 ${y + 50} 470 ${y} S720 ${y - 50} ${view.width - 70} ${y}`, fill: 'none', stroke: scene.accent, 'stroke-width': 8, opacity: .22, 'stroke-linecap': 'round' }));
    }
    for (let i = 0; i < 12; i++) layers.scene.appendChild(el('circle', { cx: 58 + i * 83 % view.width, cy: 94 + i * 67 % Math.max(160, view.height - 180), r: 9 + i % 4 * 4, fill: '#fef3c7', stroke: '#f59e0b', 'stroke-width': 3, opacity: .36 }));
  }

  function mitochondrionShape() {
    return el('g', {}, [
      el('path', { d: 'M-52 -5 C-46 -38 -5 -48 30 -32 C65 -16 62 25 24 39 C-14 53 -59 31 -52 -5Z', fill: '#fed7aa', stroke: '#fb923c', 'stroke-width': 5, 'stroke-linejoin': 'round' }),
      el('path', { d: 'M-31 -8 C-16 -24 -1 12 14 -6 C28 -22 34 7 45 -5', fill: 'none', stroke: '#ea580c', 'stroke-width': 5, 'stroke-linecap': 'round' }),
      el('circle', { cx: -25, cy: 15, r: 5, fill: '#fff7ed', opacity: .85 }),
      el('circle', { cx: 24, cy: -19, r: 4, fill: '#fff7ed', opacity: .72 })
    ]);
  }

  function vesicleShape(index) {
    return el('g', {}, [
      el('circle', { cx: 0, cy: 0, r: 32, fill: index % 2 ? '#ccfbf1' : '#dbeafe', stroke: index % 2 ? '#2dd4bf' : '#60a5fa', 'stroke-width': 4 }),
      el('circle', { cx: -10, cy: -11, r: 8, fill: '#fff', opacity: .65 }),
      el('circle', { cx: 11, cy: 10, r: 6, fill: '#fff', opacity: .45 })
    ]);
  }

  function dnaShape() {
    const children = [];
    for (let i = 0; i < 5; i++) {
      const y = -34 + i * 17;
      children.push(el('line', { x1: -18, y1: y, x2: 18, y2: y + 9, stroke: i % 2 ? '#a78bfa' : '#38bdf8', 'stroke-width': 4, 'stroke-linecap': 'round' }));
    }
    children.push(el('path', { d: 'M-22 -38 C22 -20 -22 -4 22 14 C-22 31 18 43 24 48', fill: 'none', stroke: '#7c3aed', 'stroke-width': 5, 'stroke-linecap': 'round' }));
    children.push(el('path', { d: 'M22 -38 C-22 -20 22 -4 -22 14 C22 31 -18 43 -24 48', fill: 'none', stroke: '#0ea5e9', 'stroke-width': 5, 'stroke-linecap': 'round' }));
    return el('g', {}, children);
  }

  function ribosomeShape() {
    const dots = [];
    for (let i = 0; i < 9; i++) {
      const angle = (i * 41) * Math.PI / 180;
      dots.push(el('circle', { cx: Math.cos(angle) * (14 + i % 3 * 8), cy: Math.sin(angle) * (12 + i % 2 * 9), r: 6 + i % 3, fill: '#fde68a', stroke: '#f59e0b', 'stroke-width': 2 }));
    }
    return el('g', {}, dots);
  }

  function roundCellBackdrop(x, y, r, index) {
    const scene = currentScene();
    const fill = index % 3 === 0 ? '#67e8f9' : index % 3 === 1 ? scene.soft : scene.spot;
    return el('g', { opacity: .2 + (index % 4) * .04, filter: 'url(#cellBlur)' }, [
      el('circle', { cx: x, cy: y, r: r * 1.25, fill }),
      el('circle', { cx: x - r * .32, cy: y - r * .24, r: r * .38, fill: '#e0f2fe', opacity: .24 }),
      el('circle', { cx: x + r * .24, cy: y + r * .18, r: r * .2, fill: scene.accent, opacity: .3 })
    ]);
  }

  function renderAll() {
    if (renderDirty.spots) renderSpots();
    renderCanvasWorld(performance.now());
    updateHud();
  }

  function renderCanvasWorld(now) {
    if (!ctx) return;
    resizeCanvas();
    const vp = canvasViewport();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(dpr * vp.scale, 0, 0, dpr * vp.scale, dpr * vp.offsetX, dpr * vp.offsetY);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    drawMutationCanvas(now);
    drawSelectedRangeCanvas();
    drawTowersCanvas(now);
    drawEnemiesCanvas(now);
    drawShotsCanvas();
    drawHeroCanvas();
    drawFxCanvas();
    renderDirty.hero = false;
  }

  function drawSelectedRangeCanvas() {
    const tower = selectedTower();
    if (!tower) return;
    const spot = buildSpots[tower.spotIndex];
    const type = TOWER_TYPES[tower.type];
    if (!spot || !type) return;
    ctx.save();
    ctx.globalAlpha = .18;
    ctx.fillStyle = type.glow;
    ctx.strokeStyle = '#e0f2fe';
    ctx.lineWidth = 4;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.arc(spot.x, spot.y, towerRange(tower), 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = .62;
    ctx.strokeStyle = type.color;
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(spot.x, spot.y, towerRange(tower) - 6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawTowersCanvas(now) {
    state.towers.forEach((tower) => {
      const spot = buildSpots[tower.spotIndex];
      const type = TOWER_TYPES[tower.type];
      if (!spot || !type) return;
      const anim = towerFireAnim(tower);
      const aimAngle = towerAimAngle(tower);
      ctx.save();
      ctx.translate(spot.x, spot.y);
      const aura = towerEvolutionAura(tower);
      if (aura) {
        const pulse = .55 + Math.sin(now / 260 + tower.id) * .18;
        ctx.save();
        ctx.globalAlpha = aura.opacity;
        ctx.fillStyle = aura.fill;
        ctx.strokeStyle = aura.stroke;
        ctx.lineWidth = 3;
        ctx.setLineDash([7, 9]);
        ctx.beginPath();
        ctx.arc(0, 9, 39 + pulse * 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
      drawEllipse(0, 10 + anim.squash * 5, 31 + anim.squash * 7, 31 - anim.squash * 8, type.glow, '#064e3b', 4);
      ctx.save();
      ctx.rotate(aimAngle);
      ctx.translate(-anim.recoilDistance, 0);
      ctx.scale(1 + anim.squash * .08, 1 - anim.squash * .12);
      drawTowerShapeCanvas(tower);
      if (anim.active) drawTowerMuzzleFlashCanvas(tower, type, anim);
      ctx.restore();
      drawTowerStatLabel(tower);
      drawTowerRouteBadges(tower);
      ctx.restore();
    });
  }

  function drawTowerStatLabel(tower) {
    const text = `lv${tower.level} 伤害${towerSelfDamagePercent(tower)}%`;
    drawRoundRect(-44, 48, 88, 18, 9, 'rgba(8,21,36,.84)', 'rgba(103,232,249,.56)', 2);
    drawTextCanvas(text, 0, 57, 11, '#e0f2fe', 'rgba(2,6,23,.75)', 2);
  }

  function drawTowerRouteBadges(tower) {
    const badges = towerRouteBadges(tower);
    if (!badges.length) return;
    const startX = -badges.length * 15 + 15;
    badges.forEach((badge, index) => {
      const x = startX + index * 30;
      drawRoundRect(x - 13, 70, 26, 16, 8, badge.color, 'rgba(255,255,255,.82)', 2);
      drawTextCanvas(badge.short, x, 78, 10, '#fff', 'rgba(2,6,23,.5)', 2);
    });
  }

  function towerRouteBadges(tower) {
    const badges = [];
    if (tower.tier2Branch && TOWER_BRANCHES.tier2[tower.tier2Branch]) badges.push(TOWER_BRANCHES.tier2[tower.tier2Branch]);
    if (tower.tier3Branch && TOWER_BRANCHES.tier3[tower.tier3Branch]) badges.push(TOWER_BRANCHES.tier3[tower.tier3Branch]);
    if (tower.tier4Branch && TOWER_BRANCHES.tier4[tower.tier4Branch]) badges.push(TOWER_BRANCHES.tier4[tower.tier4Branch]);
    return badges;
  }

  function drawTowerMuzzleFlashCanvas(tower, type, anim) {
    ctx.save();
    ctx.globalAlpha = .88;
    if (tower.type === 'acorn') {
      const muzzle = towerLocalMuzzleOffset(tower, anim.stretch * 12);
      ctx.save();
      ctx.translate(muzzle.x, muzzle.y);
      drawRoundRect(-8, -7, 20 + anim.stretch * 5, 14, 7, '#fff7ed', type.color, 3);
      drawRoundRect(2, -7, 10 + anim.stretch * 3, 14, 7, type.color, null, 0);
      drawLine(-3, 0, 18 + anim.stretch * 7, 0, '#fed7aa', 4);
      ctx.restore();
    } else if (tower.type === 'bubble') {
      const muzzle = towerLocalMuzzleOffset(tower, anim.stretch * 10);
      ctx.save();
      ctx.translate(muzzle.x, muzzle.y);
      drawLine(-10, 0, 10 + anim.stretch * 10, 0, '#bae6fd', 5);
      drawLine(1, 0, 15 + anim.stretch * 8, 0, '#0ea5e9', 3);
      drawCircle(12 + anim.stretch * 8, -1.5, 4 + anim.stretch * 1.6, '#e0f2fe', type.color, 3);
      ctx.restore();
    } else {
      const muzzle = towerLocalMuzzleOffset(tower, anim.stretch * 8);
      drawTowerCrosshair(muzzle.x, muzzle.y, 7 + anim.stretch * 2, '#22c55e', '#dcfce7');
      drawCircle(muzzle.x, muzzle.y, 12 + anim.stretch * 3, null, '#86efac', 2);
    }
    ctx.restore();
  }

  function rotateLocalPoint(x, y, angle) {
    return {
      x: x * Math.cos(angle) - y * Math.sin(angle),
      y: x * Math.sin(angle) + y * Math.cos(angle)
    };
  }

  function drawTowerCrosshair(x, y, radius, stroke, dotFill) {
    drawCircle(x, y, radius, null, stroke, 3);
    drawLine(x - radius - 7, y, x - radius + 1, y, stroke, 3);
    drawLine(x + radius - 1, y, x + radius + 7, y, stroke, 3);
    drawLine(x, y - radius - 7, x, y - radius + 1, stroke, 3);
    drawLine(x, y + radius - 1, x, y + radius + 7, stroke, 3);
    drawCircle(x, y, 4, dotFill, stroke, 2);
  }

  function drawCapsuleTowerCanvas(type) {
    drawRoundRect(-28, -14, 56, 28, 14, '#fff7ed', '#9a3412', 4);
    drawRoundRect(0, -14, 28, 28, 14, type.color, '#9a3412', 4);
    drawLine(0, -12, 0, 12, '#fed7aa', 3);
    drawLine(-21, 0, -11, 0, '#9a3412', 4);
    drawLine(-16, -5, -16, 5, '#9a3412', 4);
  }

  function drawSyringeTowerCanvas(type) {
    drawLine(22, 0, 33, 0, '#0f172a', 3);
    drawLine(33, 0, 39, -4, '#0f172a', 2);
    drawRoundRect(-10, -10, 32, 20, 6, '#eff6ff', '#0f172a', 4);
    drawRoundRect(-1, -7, 13, 14, 4, type.color, null, 0);
    drawLine(-20, 0, -10, 0, '#94a3b8', 6);
    drawLine(-28, -10, -28, 10, '#94a3b8', 4);
    drawLine(22, -8, 22, 8, '#cbd5e1', 3);
    drawCircle(22, 22, 6, '#bae6fd', '#0284c7', 3);
  }

  function drawMonoclonalTowerCanvas(type) {
    ctx.save();
    ctx.rotate(Math.PI / 2);
    drawRoundRect(-17, -17, 34, 42, 9, '#dcfce7', '#166534', 4);
    drawRoundRect(-11, -27, 22, 11, 4, '#bbf7d0', '#166534', 4);
    drawRoundRect(-8, -33, 16, 6, 3, '#14532d', null, 0);
    drawTowerCrosshair(0, 4, 10, '#15803d', '#22c55e');
    drawCircle(-22, -3, 4, type.glow, '#15803d', 2);
    drawCircle(22, 10, 4, type.glow, '#15803d', 2);
    drawCircle(10, 24, 3, type.glow, '#15803d', 2);
    ctx.restore();
  }

  function drawTowerShapeCanvas(tower) {
    const type = TOWER_TYPES[tower.type];
    if (tower.type === 'bubble') {
      drawSyringeTowerCanvas(type);
      return;
    }
    if (tower.type === 'flower') {
      drawMonoclonalTowerCanvas(type);
      return;
    }
    drawCapsuleTowerCanvas(type);
  }

  function drawEnemiesCanvas(now) {
    state.enemies.forEach((enemy) => {
      const p = enemy.x == null || enemy.y == null ? updateEnemyPosition(enemy) : enemy;
      const hpRatio = Math.max(0, enemy.hp / enemy.maxHp);
      const shieldRatio = enemy.maxShield ? Math.max(0, enemy.shield / enemy.maxShield) : 0;
      const armorActive = effectiveEnemyArmor(enemy, now) > 0;
      ctx.save();
      ctx.translate(p.x, p.y);
      drawEllipse(0, 19, 24, 7, 'rgba(15,23,42,.16)');
      drawEnemyShapeCanvas(enemy, now);
      drawEnemyStatusRings(enemy, now);
      if (enemy.slowUntil > now) {
        ctx.save();
        const pulse = 0.5 + Math.sin(now / 150) * 0.25;
        ctx.globalAlpha = pulse;
        const grad = ctx.createRadialGradient(0, -6, 4, 0, -6, 28);
        grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
        grad.addColorStop(0.6, 'rgba(125, 211, 252, 0.5)');
        grad.addColorStop(1, 'rgba(56, 189, 248, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, -6, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 4;
        ctx.globalAlpha = .72;
        ctx.setLineDash([5, 8]);
        ctx.beginPath();
        ctx.arc(0, 0, 34, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
      if (enemy.maxShield > 0) {
        drawRoundRect(-25, -51, 50, 6, 4, '#dbeafe', '#fff', 2);
        if (shieldRatio > 0) drawRoundRect(-25, -51, 50 * shieldRatio, 6, 4, '#0284c7');
      }
      drawRoundRect(-25, -42, 50, 7, 4, '#fee2e2', '#fff', 2);
      const hpColor = armorActive ? (hpRatio > .45 ? '#facc15' : '#fb923c') : (hpRatio > .45 ? '#22c55e' : '#ef4444');
      drawRoundRect(-25, -42, 50 * hpRatio, 7, 4, hpColor);
      drawEnemyStatusIcons(enemy, now);
      ctx.restore();
    });
  }

  function drawEnemyStatusIcons(enemy, now) {
    const icons = [];
    if (enemy.effects?.fire?.until > now) icons.push({ label: '灼', fill: STATUS_EFFECTS.fire.color, stroke: '#fff7ed' });
    if (enemy.effects?.toxin?.until > now) icons.push({ label: '毒', fill: STATUS_EFFECTS.toxin.color, stroke: '#dcfce7' });
    if (!icons.length) return;
    const y = enemy.maxShield > 0 ? -63 : -54;
    const startX = -icons.length * 8 + 8;
    icons.forEach((icon, index) => {
      const x = startX + index * 16;
      drawCircle(x, y, 7, icon.fill, icon.stroke, 2);
      drawTextCanvas(icon.label, x, y + .5, 8, '#fff', 'rgba(15,23,42,.28)', 1.4);
    });
  }

  function drawEnemyStatusRings(enemy, now) {
    if (enemy.maxShield && enemy.shield > 1) {
      ctx.save();
      ctx.globalAlpha = .32 + Math.sin(now / 180 + enemy.id) * .08;
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, enemy.kind === 'eliteVirus' ? 31 : 27, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    const fire = enemy.effects?.fire;
    const toxin = enemy.effects?.toxin;
    if (fire?.until > now) {
      ctx.save();
      ctx.strokeStyle = STATUS_EFFECTS.fire.color;
      ctx.lineWidth = 3;
      ctx.globalAlpha = .72;
      ctx.setLineDash([7, 7]);
      ctx.beginPath();
      ctx.arc(0, 0, enemy.kind === 'eliteVirus' ? 36 : 32, now / 220, now / 220 + Math.PI * 1.45);
      ctx.stroke();
      ctx.restore();
    }
    if (toxin?.until > now) {
      ctx.save();
      ctx.strokeStyle = STATUS_EFFECTS.toxin.color;
      ctx.lineWidth = 3;
      ctx.globalAlpha = .68;
      ctx.beginPath();
      ctx.arc(0, 0, enemy.kind === 'eliteVirus' ? 39 : 35, -now / 260, -now / 260 + Math.PI * 1.35);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawEnemyShapeCanvas(enemy, now = 0) {
    const phase = now / 280 + enemy.id * 1.7;
    const squash = Math.sin(phase);
    const wobble = Math.sin(now / 340 + enemy.id * 2.3) * 0.12;

    if (enemy.kind === 'virus' || enemy.kind === 'eliteVirus' || enemy.kind === 'fastVirus') {
      // 棘突长度独立脉动
      for (let i = 0; i < 12; i++) {
        ctx.save();
        ctx.rotate(i * 30 * Math.PI / 180);
        const spikeWiggle = Math.sin(now / 360 + i * 0.52 + enemy.id) * 4;
        drawLine(0, -20, 0, -31 - spikeWiggle, enemy.stroke, 5);
        ctx.restore();
      }
      drawCircle(0, 0, enemy.kind === 'eliteVirus' ? 25 : 21, enemy.color, enemy.stroke, 4);

  function drawLine(x1, y1, x2, y2, stroke, width) {
    ctx.save();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  function drawPolyline(points) {
    if (!points.length) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.stroke();
  }

  function drawCircle(x, y, r, fill, stroke, width = 0) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    if (fill) {
      ctx.fillStyle = fill;
      ctx.fill();
    }
    if (stroke && width) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = width;
      ctx.stroke();
    }
  }

  function drawEllipse(x, y, rx, ry, fill, stroke, width = 0) {
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
    if (fill) {
      ctx.fillStyle = fill;
      ctx.fill();
    }
    if (stroke && width) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = width;
      ctx.stroke();
    }
  }

  function drawRoundRect(x, y, width, height, radius, fill, stroke, lineWidth = 0) {
    const r = Math.min(radius, Math.abs(width) / 2, Math.abs(height) / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + width - r, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + r);
    ctx.lineTo(x + width, y + height - r);
    ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
    ctx.lineTo(x + r, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    if (fill) {
      ctx.fillStyle = fill;
      ctx.fill();
    }
    if (stroke && lineWidth) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = lineWidth;
      ctx.stroke();
    }
  }

  function drawPath(path, fill, stroke, width = 0) {
    let p = path2dCache.get(path);
    if (!p) {
      p = new Path2D(path);
      path2dCache.set(path, p);
    }
    if (fill) {
      ctx.fillStyle = fill;
      ctx.fill(p);
    }
    if (stroke && width) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = width;
      ctx.stroke(p);
    }
  }

  function drawTextCanvas(text, x, y, size, fill, stroke, strokeWidth = 0) {
    ctx.save();
    ctx.font = `1000 ${size}px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (stroke && strokeWidth) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = strokeWidth;
      ctx.strokeText(text, x, y);
    }
    ctx.fillStyle = fill;
    ctx.fillText(text, x, y);
    ctx.restore();
  }

        g.appendChild(el('circle', { cx: 0, cy: 0, r: selected ? 19 : 17, fill: selected ? 'rgba(34,211,238,.2)' : 'rgba(103,232,249,.12)', stroke: selected ? '#e0f2fe' : '#22d3ee', 'stroke-width': 2, opacity: .9 }));

  function towerFireAnim(tower) {
    const age = performance.now() - (tower.fireAt || 0);
    if (age < 0 || age > 260) return { active: false, squash: 0, stretch: 0, angle: tower.fireAngle || -Math.PI / 2, recoilDistance: 0 };
    const t = age / 260;
    const pulse = Math.sin(t * Math.PI);
    const push = Math.sin(Math.min(1, t * 1.35) * Math.PI);
    const angle = tower.fireAngle || -Math.PI / 2;
    return {
      active: true,
      squash: pulse,
      stretch: push,
      angle,
      recoilDistance: pulse * 5
    };
  }

  function normalizeAngle(angle) {
    let result = angle;
    while (result > Math.PI) result -= Math.PI * 2;
    while (result < -Math.PI) result += Math.PI * 2;
    return result;
  }

  function interpolateAngle(from, to, amount) {
    return from + normalizeAngle(to - from) * amount;
  }

  function towerAimAngle(tower) {
    return tower?.aimAngle ?? tower?.fireAngle ?? -Math.PI / 2;
  }

  function updateTowerAim(tower, origin, target, factor = .22) {
    if (!tower || !origin || !target) return;
    const targetPoint = target.x == null || target.y == null ? updateEnemyPosition(target) : target;
    const nextAngle = Math.atan2(targetPoint.y - origin.y, targetPoint.x - origin.x);
    tower.aimAngle = interpolateAngle(towerAimAngle(tower), nextAngle, factor);
    tower.lockedTargetId = target.id;
  }

  function towerLocalMuzzleOffset(tower, stretch = 0) {
    if (tower.type === 'bubble') return { x: 39 + stretch, y: -4 };
    if (tower.type === 'flower') return { x: 33 + stretch, y: 0 };
    return { x: 33 + stretch, y: 0 };
  }

  function towerMuzzlePoint(tower, origin) {
    const angle = towerAimAngle(tower);
    const offset = towerLocalMuzzleOffset(tower);
    return {
      x: origin.x + Math.cos(angle) * offset.x - Math.sin(angle) * offset.y,
      y: origin.y + Math.sin(angle) * offset.x + Math.cos(angle) * offset.y - 2
    };
  }

  function updateHud() {
    const tower = selectedTower();
    const showBuildPanel = state.started && !state.finished && (state.selectedSpotIndex != null && !tower || isPhantomDeviceActive() && !!tower);
    const showTowerPanel = state.started && !state.finished && !!tower;
    const values = {
      wave: String(state.wave),
      lives: String(state.lives),
      coins: String(state.coins),
      score: String(state.score),
      mutation: state.currentMutation ? state.currentMutation.label : '稳定',
      mutationActive: !!state.currentMutation && state.started && !state.finished,
      buildPanelHidden: !showBuildPanel,
      towerPanelHidden: !showTowerPanel,
      selectedType: state.selectedType,
      towerInfo: tower ? towerInfoText(tower) : ''
    };
    root.classList.toggle('phantom-tower-selected', isPhantomDeviceActive() && !!tower);
    if (hudCache.wave !== values.wave) hudEls.wave.textContent = values.wave;
    if (hudCache.lives !== values.lives && hudEls.lives) hudEls.lives.textContent = values.lives;
    if (hudCache.coins !== values.coins) hudEls.coins.textContent = values.coins;
    if (hudCache.score !== values.score) hudEls.score.textContent = values.score;
    if (hudCache.mutation !== values.mutation && hudEls.mutation) hudEls.mutation.textContent = values.mutation;
    if (hudCache.mutation !== values.mutation) updateTestMutationLabel();
    if (hudCache.mutationActive !== values.mutationActive) hudEls.mutation?.parentElement?.classList.toggle('mutation-active', values.mutationActive);
    if (hudCache.lives !== values.lives && hudEls.lives) hudEls.lives.parentElement?.classList.toggle('danger', state.lives <= Math.max(3, Math.ceil(cfg().lives * .25)) && state.started && !state.finished);
    if (hudCache.buildPanelHidden !== values.buildPanelHidden) buildPanel.hidden = values.buildPanelHidden;
    if (hudCache.towerPanelHidden !== values.towerPanelHidden) towerPanel.hidden = values.towerPanelHidden;
    if (deleteTowerBtn) deleteTowerBtn.hidden = !(isPhantomDeviceActive() && !!tower);
    if (hudCache.towerInfo !== values.towerInfo && towerInfoEl) towerInfoEl.innerHTML = values.towerInfo;
    updateUpgradeButton();
    if (hudCache.buildPanelHidden !== values.buildPanelHidden || hudCache.selectedType !== values.selectedType) towerButtons.forEach((btn) => btn.classList.toggle('active', showBuildPanel && btn.dataset.type === state.selectedType));
    Object.assign(hudCache, values);
    renderDirty.hud = false;
  }

  function updateUpgradeButton() {
    const tower = selectedTower();
    const branchTier = tower ? branchTierForUpgrade(tower) : 0;
    const showUpgrade = !!tower && branchTier === 0;
    const showBranches = !!tower && branchTier > 0;
    const showDowngrade = isPhantomDeviceActive() && !!tower && tower.level > 1;
    syncActionIcon(upgradeBtn, upgradeIconSvg(tower));
    if (downgradeBtn) syncActionIcon(downgradeBtn, downgradeIconSvg());
    if (hudCache.upgradeHidden !== !showUpgrade) upgradeBtn.hidden = !showUpgrade;
    if (hudCache.branchHidden !== !showBranches) {
      branchABtn.hidden = !showBranches;
      branchBBtn.hidden = !showBranches;
      branchCBtn.hidden = true;
    }
    if (downgradeBtn && hudCache.downgradeHidden !== !showDowngrade) downgradeBtn.hidden = !showDowngrade;
    hudCache.upgradeHidden = !showUpgrade;
    hudCache.branchHidden = !showBranches;
    hudCache.downgradeHidden = !showDowngrade;
    if (!tower) return;
    let label = '';
    let disabled = !state.started || state.finished;
    if (tower.level >= MAX_TOWER_LEVEL) {
      label = '已满级';
      disabled = true;
    } else if (showUpgrade) {
      const cost = upgradeCost(tower);
      label = `升级: ${testFreeBuildActive() ? 0 : cost}`;
    }
    if (showUpgrade && hudCache.upgradeLabel !== label) {
      hudEls.upgradeLabel.textContent = label;
      hudCache.upgradeLabel = label;
    }
    if (showUpgrade && hudCache.upgradeDisabled !== disabled) {
      upgradeBtn.disabled = disabled;
      hudCache.upgradeDisabled = disabled;
    }
    if (showBranches) {
      const cost = upgradeCost(tower);
      const branches = branchChoices(branchTier);
      const buttons = [branchABtn, branchBBtn, branchCBtn];
      const labels = [hudEls.branchALabel, hudEls.branchBLabel, hudEls.branchCLabel];
      const branchLabels = branches.map(branch => `${branch.short}: ${testFreeBuildActive() ? 0 : cost}`);
      buttons.forEach((btn, index) => {
        const branch = branches[index];
        btn.hidden = !branch;
        if (!branch) return;
        const cacheKey = `branch${index}Label`;
        if (hudCache[cacheKey] !== branchLabels[index]) {
          labels[index].textContent = branchLabels[index];
          hudCache[cacheKey] = branchLabels[index];
        }
        btn.dataset.branch = branch.id;
        btn.className = `mh-action branch ${branch.id}`;
        syncActionIcon(btn, branchIconSvg(branch));
        btn.setAttribute('aria-label', `${branch.label}，${branch.text}，需要 ${cost} 葡萄糖`);
        btn.disabled = disabled;
      });
      hudCache.branchDisabled = disabled;
    }
    if (showDowngrade) downgradeBtn.disabled = !state.started || state.finished;
  }

  function syncActionIcon(button, svgMarkup) {
    const slot = button?.querySelector('.mh-action-icon');
    if (!slot || slot.dataset.iconSvg === svgMarkup) return;
    slot.innerHTML = svgMarkup;
    slot.dataset.iconSvg = svgMarkup;
  }

  function upgradeIconSvg(tower) {
    const type = TOWER_TYPES[tower?.type] || TOWER_TYPES.acorn;
    return `<svg viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="36" r="25" fill="${type.glow}" stroke="${type.color}" stroke-width="4" opacity=".95"/><path d="M36 53V20" stroke="#fff" stroke-width="7" stroke-linecap="round"/><path d="M23 32l13-14 13 14" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><path d="M49 17l5 5 8-10" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="52" cy="52" r="8" fill="#fef3c7" stroke="#92400e" stroke-width="3"/></svg>`;
  }

  function branchIconSvg(branch) {
    const icons = {
      steady: `<svg viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="36" r="25" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/><path d="M20 38c8-8 24-8 32 0" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/><path d="M25 48h22" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/><path d="M36 18v30" stroke="#5b21b6" stroke-width="5" stroke-linecap="round"/><circle cx="36" cy="36" r="6" fill="#fff" stroke="#7c3aed" stroke-width="3"/></svg>`,
      range: `<svg viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="36" r="28" fill="rgba(20,184,166,.18)" stroke="#14b8a6" stroke-width="4" stroke-dasharray="7 6"/><circle cx="36" cy="36" r="17" fill="#ccfbf1" stroke="#0f766e" stroke-width="4"/><path d="M36 14v11M36 47v11M14 36h11M47 36h11" stroke="#ecfeff" stroke-width="5" stroke-linecap="round"/><circle cx="36" cy="36" r="5" fill="#0f766e"/></svg>`,
      multi: `<svg viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="36" r="25" fill="#fef3c7" stroke="#d97706" stroke-width="4"/><path d="M20 29l16-9 16 9v18l-16 9-16-9z" fill="#fde68a" stroke="#92400e" stroke-width="3"/><path d="M36 20v36M20 29l32 18M52 29L20 47" stroke="#fff7ed" stroke-width="4" stroke-linecap="round"/><circle cx="56" cy="20" r="7" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><circle cx="56" cy="52" r="7" fill="#fbbf24" stroke="#92400e" stroke-width="3"/></svg>`,
      rate: `<svg viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="36" r="25" fill="#dbeafe" stroke="#0284c7" stroke-width="4"/><path d="M41 8L23 38h13l-7 26 21-34H37z" fill="#fef08a" stroke="#075985" stroke-width="3" stroke-linejoin="round"/><path d="M15 28c5-8 12-13 21-16M57 45c-6 8-13 13-23 15" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/></svg>`,
      fire: `<svg viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="38" r="24" fill="#ffedd5" stroke="#ea580c" stroke-width="4"/><path d="M37 60c-12-6-18-15-15-25 2-8 10-11 11-22 10 8 18 18 17 30 5-4 7-9 7-15 9 14 3 28-20 32z" fill="#fb923c" stroke="#9a3412" stroke-width="3"/><path d="M38 54c-6-4-8-10-4-17 5 4 9 9 8 15" fill="#fef3c7"/></svg>`,
      toxin: `<svg viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="36" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/><path d="M22 44c12-24 28-24 28 0" fill="none" stroke="#14532d" stroke-width="5" stroke-linecap="round"/><circle cx="36" cy="35" r="13" fill="#86efac" stroke="#166534" stroke-width="4"/><path d="M36 23v25M24 35h24" stroke="#ecfdf5" stroke-width="5" stroke-linecap="round"/><circle cx="55" cy="19" r="6" fill="#bbf7d0" stroke="#166534" stroke-width="3"/></svg>`
    };
    return icons[branch?.id] || icons.range;
  }

  function downgradeIconSvg() {
    return `<svg viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="36" r="25" fill="#f8fafc" stroke="#475569" stroke-width="4"/><path d="M36 18v32" stroke="#64748b" stroke-width="7" stroke-linecap="round"/><path d="M23 39l13 14 13-14" fill="none" stroke="#64748b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 19h30" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/></svg>`;
  }

  function towerInfoText(tower) {
    const type = TOWER_TYPES[tower.type];
    if (!type) return '';
    const cost = tower.level >= MAX_TOWER_LEVEL ? 0 : upgradeCost(tower);
    const upgradeText = tower.level >= MAX_TOWER_LEVEL ? '满级' : `升级 ${cost}G`;
    const testText = testFreeBuildActive() && tower.level < MAX_TOWER_LEVEL ? ' · 测试 0G' : '';
    return `<b>${type.label} lv${tower.level}</b><span>伤害 ${towerSelfDamagePercent(tower)}% · 射程 ${Math.round(towerRange(tower))}</span><span>${towerRouteText(tower)} · ${upgradeText}${testText}</span>`;
  }

  function testFreeBuildActive() {
    return isPhantomDeviceActive();
  }

  function resetHudCache() {
    Object.keys(hudCache).forEach(key => delete hudCache[key]);
  }

  function startTutorialGuide() {
    if (!state.started || state.finished || state.towers.length > 0) return;
    tutorialStep = 'spot';
    hintEl.textContent = '先点击一个空白加号，再在底部选择防御单元';
    requestAnimationFrame(updateTutorialGuide);
  }

  function completeTutorialGuide() {
    tutorialStep = '';
    tutorialPointerEl.hidden = true;
  }

  function updateTutorialGuide() {
    if (!tutorialStep || !state.started || state.finished) {
      tutorialPointerEl.hidden = true;
      return;
    }
    const target = tutorialStep === 'tower' ? firstVisibleTowerButton() : firstEmptySpotElement();
    if (!target) {
      tutorialPointerEl.hidden = true;
      return;
    }
    const rect = target.getBoundingClientRect();
    const left = rect.left + rect.width / 2;
    const top = rect.top + rect.height / 2;
    tutorialPointerEl.style.left = `${left}px`;
    tutorialPointerEl.style.top = `${top}px`;
    tutorialLabelEl.textContent = '点击这里';
    tutorialPointerEl.classList.toggle('tower-step', tutorialStep === 'tower');
    tutorialPointerEl.hidden = false;
  }

  function firstEmptySpotElement() {
    const index = buildSpots.findIndex((_, spotIndex) => !state.towers.some(tower => tower.spotIndex === spotIndex));
    return index >= 0 ? layers.spots.querySelector(`[data-spot-index="${index}"]`) : null;
  }

  function firstVisibleTowerButton() {
    return towerButtons.find(btn => !btn.hidden && btn.offsetParent !== null) || null;
  }

  function trimFxBudget(list, maxCount) {
    if (list.length > maxCount) list.splice(0, list.length - maxCount);
  }

  function canPlayTone(freq, type) {
    const key = `${type}:${Math.round(freq / 40)}`;
    const now = performance.now();
    if (now - (sound.lastToneAt[key] || 0) < PERF_LIMITS.audioGapMs) return false;
    sound.lastToneAt[key] = now;
    return true;
  }

  function selectedTower() {
    return state.towers.find(item => item.id === state.selectedTowerId) || null;
  }

  function startGame(options = {}) {
    stopLoop();
    const conf = cfg();
    state.started = true;
    state.finished = false;
    state.paused = false;
    state.score = 0;
    state.coins = conf.coins;
    state.lives = conf.lives;
    state.wave = 1;
    state.enemiesToSpawn = 0;
    state.spawnTimer = 0;
    state.waveDelay = isPhantomDeviceActive() ? 0 : 1300;
    state.selectedTowerId = null;
    state.selectedSpotIndex = null;
    state.specialCharge = 0;
    state.specialCooldown = 0;
    state.heroCooldown = 0;
    state.awaitingEvolution = false;
    state.currentMutation = null;
    state.evolutions = defaultEvolutions();
    state.towers = [];
    state.enemies = [];
    state.shots = [];
    state.bursts = [];
    state.floating = [];
    state.energyFlys = [];
    state.evolutionSparks = [];
    state.whiteCells = [];
    enemyById.clear();
    refreshTestPathOptions();
    resetHudCache();
    markRenderDirty('spots', 'hero', 'hud');
    state.roundId = `${state.sceneId}-${state.difficulty}-${Date.now()}`;
    towerIdSeq = 1;
    enemyIdSeq = 1;
    shotIdSeq = 1;
    sparkIdSeq = 1;
    renderAll();
    overlayEl.hidden = true;
    hintEl.textContent = isPhantomDeviceActive() ? '幻影装置已启动：建造和升级 0 花费，可生成移动或静止敌人' : '点击空白加号部署防御单元；点击宠物释放白细胞';
    if (!isPhantomDeviceActive()) startTutorialGuide();
    postParent('gameStarted', { difficulty: state.difficulty, scene: state.sceneId, roundId: state.roundId });
    showToast('守护开始！');
    playSound('start');
    startLoop();
  }

  function startWave() {
    state.currentMutation = mutationForWave(state.wave);
    state.enemiesToSpawn = 7 + state.wave * 3 + Math.floor(state.wave / 3) + (state.currentMutation?.countBonus || 0);
    state.spawnTimer = 1;
    state.waveDelay = 0;
    const waveText = state.currentMutation ? `第 ${state.wave} 波：${state.currentMutation.label}` : `第 ${state.wave} 波`;
    floatText(view.width * .5, 90, waveText, state.currentMutation?.color || '#0f766e', 28);
    hintEl.textContent = state.currentMutation ? `${state.currentMutation.label}：${state.currentMutation.text}` : '稳定波次，按克制关系布置防御';
    if (state.currentMutation) {
      paths.forEach((_, pathIndex) => {
        const p = pointAt(36, pathIndex);
        burstAt(p.x, p.y, state.currentMutation.color, '#ffffff', 38);
        spawnSparkBurst(p.x, p.y, state.currentMutation.color, 8, 640, 120);
      });
      playSound('mutatedWave', { wave: state.wave });
    }
    playSound('wave', { wave: state.wave });
  }

  function mutationForWave(wave) {
    if (wave < 2) return null;
    return MUTATION_TYPES[(wave + DIFFICULTY_ORDER.indexOf(state.difficulty)) % MUTATION_TYPES.length];
  }

  function spawnEnemy() {
    const pathIndex = state.enemiesToSpawn % Math.max(1, pathInfos.length);
    const kindIndex = (state.wave + state.enemiesToSpawn) % ENEMY_TYPES.length;
    const base = ENEMY_TYPES[kindIndex];
    const eliteGap = state.wave >= 7 ? 4 : state.wave >= 5 ? 5 : 6;
    const elite = state.wave >= 3 && state.enemiesToSpawn % eliteGap === 0;
    addEnemy(createEnemy(base, { elite, pathIndex, mutation: state.currentMutation }));
  }

  function createEnemy(base, { elite = false, pathIndex = 0, distance = 0, mutation = state.currentMutation, frozen = false, defenseModeOverride = '' } = {}) {
    const conf = cfg();
    const hpFactor = mutation?.hp || 1;
    const speedFactor = mutation?.speed || 1;
    const waveHpBonus = state.wave * ENEMY_DEFENSE.waveHpBonus;
    const eliteHpBonus = elite ? ENEMY_DEFENSE.eliteHpBonus : 0;
    const maxHp = Math.round((base.hp + waveHpBonus + eliteHpBonus) * conf.enemyHp * hpFactor);
    const armorMultiplier = state.difficulty === 'hard' ? ENEMY_DEFENSE.eliteArmorHardMultiplier : 1;
    const defenseMode = elite ? (defenseModeOverride || (state.wave < 5 || (state.enemiesToSpawn + state.wave) % 2 === 0 ? 'shield' : 'armor')) : '';
    const baseArmor = defenseMode === 'armor' ? Math.round((ENEMY_DEFENSE.eliteArmorBase + Math.floor(state.wave * ENEMY_DEFENSE.eliteArmorWave)) * armorMultiplier) : 0;
    const shieldRatio = state.wave >= ENEMY_DEFENSE.shieldLateWave ? ENEMY_DEFENSE.eliteShieldLateRatio : ENEMY_DEFENSE.eliteShieldRatio;
    const maxShield = defenseMode === 'shield' ? Math.round(maxHp * shieldRatio) : 0;
    return {
      id: enemyIdSeq++,
      kind: elite ? 'eliteVirus' : base.kind,
      pathIndex,
      distance,
      hp: maxHp,
      maxHp,
      defenseMode,
      baseArmor,
      armor: baseArmor,
      shield: maxShield,
      maxShield,
      lastDamagedAt: 0,
      shieldRegenDelayMs: ENEMY_DEFENSE.shieldRegenDelayMs,
      shieldRegenPerSecond: ENEMY_DEFENSE.shieldRegenPerSecond,
      effects: Object.create(null),
      effectFloatAt: 0,
      speed: (base.speed + state.wave * 3 - (elite ? ENEMY_DEFENSE.eliteSpeedPenalty : 0)) * conf.enemySpeed * speedFactor,
      reward: base.reward + (elite ? ENEMY_DEFENSE.eliteRewardBonus : 0) + (mutation?.reward || 0),
      color: elite ? '#fb7185' : base.color,
      stroke: elite ? '#9f1239' : base.stroke,
      slowUntil: 0,
      slowFactor: 1,
      frozen,
      mutationId: mutation?.id || ''
    };
  }

  function addEnemy(enemy) {
    updateEnemyPosition(enemy);
    state.enemies.push(enemy);
    enemyById.set(enemy.id, enemy);
  }

  function update(now, dt) {
    if (!state.started || state.finished || state.paused) return;
    if (!isPhantomDeviceActive() && state.waveDelay > 0) {
      state.waveDelay -= dt;
      if (state.waveDelay <= 0) startWave();
    }
    if (!isPhantomDeviceActive() && state.enemiesToSpawn > 0) {
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnEnemy();
        state.enemiesToSpawn--;
        state.spawnTimer = Math.max(300, (870 - state.wave * 35) * (state.currentMutation?.spawnGap || 1));
      }
    }
    updateEnemies(now, dt);
    updateTowers(now);
    updateHero(now);
    updateShots(dt);
    updateWhiteCells(dt);
    updateFx(dt);
    if (!isPhantomDeviceActive()) checkWaveDone();
  }

  function updateEnemies(now, dt) {
    const escaped = [];
    state.enemies.forEach((enemy) => {
      updateEnemyEffects(enemy, now, dt);
      updateEnemyShield(enemy, now, dt);
      const slowActive = enemy.slowUntil > now;
      if (!enemy.frozen) enemy.distance += enemy.speed * (slowActive ? enemy.slowFactor : 1) * dt / 1000;
      updateEnemyPosition(enemy);
      const info = pathInfos[enemy.pathIndex] || pathInfos[0];
      if (!enemy.frozen && enemy.distance >= info.total - 12) escaped.push(enemy);
    });
    escaped.forEach((enemy) => {
      removeEnemy(enemy.id);
      state.lives--;
      markRenderDirty('hero', 'hud');
      burstAt(currentLayout.gate.x, currentLayout.gate.y, '#fee2e2', '#ef4444');
      playSound('escape');
      if (state.lives <= 0) endGame(false);
    });
  }

  function updateEnemyShield(enemy, now, dt) {
    if (!enemy.maxShield || enemy.shield >= enemy.maxShield || enemy.hp <= 0) return;
    if (now - (enemy.lastDamagedAt || 0) < enemy.shieldRegenDelayMs) return;
    enemy.shield = Math.min(enemy.maxShield, enemy.shield + enemy.maxShield * enemy.shieldRegenPerSecond * dt / 1000);
  }

  function updateEnemyEffects(enemy, now) {
    if (!enemy.effects) return;
    Object.keys(enemy.effects).forEach((type) => {
      const effect = enemy.effects[type];
      if (!effect || effect.until <= now) {
        delete enemy.effects[type];
        return;
      }
      while (effect.nextTickAt <= now && effect.until > effect.nextTickAt) {
        const tickDamage = effect.damagePerSecond * effect.tickEvery / 1000 * Math.max(1, effect.stacks || 1);
        damageEnemy(enemy, tickDamage, { isDot: true, effectType: type, bypassShield: !!effect.shieldBypass, source: effect.sourceId });
        effect.nextTickAt += effect.tickEvery;
      }
    });
  }

  function updateTowers(now) {
    state.towers.forEach((tower) => {
      const origin = buildSpots[tower.spotIndex];
      if (!origin) return;
      const target = findTarget(origin, towerRange(tower));
      if (target) updateTowerAim(tower, origin, target);
      if (tower.cooldown > now) return;
      if (!target) return;
      fireShot(tower, target);
      tower.cooldown = now + towerFireInterval(tower);
    });
  }

  function updateHero(now) {
    if (state.heroCooldown > now) return;
    const target = findTarget(currentLayout.hero, 230);
    if (!target) return;
    fireShot({ id: 'hero', type: 'hero', level: 1 }, target, true);
    state.heroCooldown = now + 690 / (state.evolutions?.heroRate || 1);
  }

  function updateShots(dt) {
    const processing = state.shots;
    state.shots = [];
    processing.forEach((shot) => {
      const target = enemyById.get(shot.targetId);
      if (!target) return;
      shot.prevX = shot.x;
      shot.prevY = shot.y;
      shot.age = (shot.age || 0) + dt;
      const dx = target.x - shot.x;
      const dy = target.y - shot.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) shot.angle = Math.atan2(dy, dx);
      const step = shot.speed * dt / 1000;
      if (dist <= step + 8) {
        hitEnemy(target, shot);
      } else {
        shot.x += dx / dist * step;
        shot.y += dy / dist * step;
        state.shots.push(shot);
      }
    });
  }

  function updateFx(dt) {
    state.bursts = state.bursts.filter((burst) => {
      burst.age += dt;
      burst.r += dt * .075;
      burst.opacity = Math.max(0, burst.opacity - dt / 420);
      return burst.opacity > .02;
    });
    state.floating = state.floating.filter((text) => {
      text.age += dt;
      text.y -= dt * .045;
      text.opacity = Math.max(0, 1 - text.age / text.life);
      return text.opacity > .02;
    });
    state.energyFlys = state.energyFlys.filter((energy) => {
      energy.age += dt;
      const t = Math.min(1, energy.age / energy.life);
      const ease = 1 - Math.pow(1 - t, 3);
      energy.x = energy.startX + (energy.targetX - energy.startX) * ease;
      energy.y = energy.startY + (energy.targetY - energy.startY) * ease - Math.sin(t * Math.PI) * 34;
      energy.opacity = Math.max(0, 1 - Math.max(0, t - .74) / .26);
      return energy.age < energy.life;
    });
    state.whiteCells = state.whiteCells.filter((cell) => {
      cell.age += dt;
      cell.opacity = Math.max(0, 1 - Math.max(0, cell.age - cell.life * .78) / (cell.life * .22));
      return cell.age < cell.life && !cell.done;
    });
    state.evolutionSparks = state.evolutionSparks.filter((spark) => {
      spark.age += dt;
      const t = Math.min(1, spark.age / spark.life);
      spark.x += spark.vx * dt / 1000;
      spark.y += spark.vy * dt / 1000;
      spark.rotate += spark.spin * dt / 1000;
      spark.opacity = Math.max(0, 1 - t);
      spark.size = spark.baseSize * (1 + Math.sin(t * Math.PI) * .28);
      return spark.age < spark.life;
    });
  }

  function updateWhiteCells(dt) {
    if (!state.whiteCells.length) return;
    state.whiteCells.forEach((cell) => {
      const info = pathInfos[cell.pathIndex] || pathInfos[0];
      cell.distance = Math.max(0, cell.distance - cell.speed * dt / 1000);
      const p = pointAt(cell.distance, cell.pathIndex);
      cell.x = p.x;
      cell.y = p.y + Math.sin((cell.age || 0) / 110 + cell.phase) * 4;
      let target = null;
      for (let i = 0; i < state.enemies.length; i++) {
        const enemy = state.enemies[i];
        if (enemy.pathIndex === cell.pathIndex && enemy.hp > 0 && Math.abs(enemy.distance - cell.distance) <= cell.hitRadius) {
          target = enemy;
          break;
        }
      }
      if (target) {
        const hitPoint = target.x == null || target.y == null ? updateEnemyPosition(target) : target;
        damageEnemy(target, cell.damage);
        burstAt(hitPoint.x, hitPoint.y, '#e0f2fe', '#7c3aed', 34);
        cell.done = true;
        playSound('whiteCellHit');
      }
      if (cell.distance <= 8 || cell.distance >= info.total + 20) cell.done = true;
    });
    state.whiteCells = state.whiteCells.filter(cell => !cell.done);
  }

  function findTarget(origin, range) {
    if (!origin) return null;
    let best = null;
    state.enemies.forEach((enemy) => {
      const p = enemy.x == null || enemy.y == null ? updateEnemyPosition(enemy) : enemy;
      const dist = Math.hypot(p.x - origin.x, p.y - origin.y);
      if (dist <= range && (!best || enemy.distance > best.distance)) best = enemy;
    });
    return best;
  }

  function fireShot(tower, target, hero = false) {
    const baseOrigin = hero ? currentLayout.hero : buildSpots[tower.spotIndex];
    if (!baseOrigin) return;
    const type = TOWER_TYPES[tower.type] || { projectile: '#fde68a', damage: 16, range: 220, rate: 680 };
    const targetPoint = target.x == null || target.y == null ? updateEnemyPosition(target) : target;
    if (!hero) {
      updateTowerAim(tower, baseOrigin, target, .92);
      tower.fireAt = performance.now();
      tower.fireAngle = towerAimAngle(tower);
    }
    const origin = hero ? baseOrigin : towerMuzzlePoint(tower, baseOrigin);
    const weakHit = !hero && isWeakHit(tower.type, target);
    const towerDamage = hero ? 16 + state.wave * 2 : modifiedTowerDamage(tower, type, target);
    addProjectileShot({
      tower,
      target,
      origin,
      type,
      hero,
      weakHit,
      damage: towerDamage
    });
    if (!hero && tower.tier3Branch === 'multi' && Math.random() < TOWER_BRANCHES.tier3.multi.chance) {
      const splitSide = Math.random() < .5 ? -1 : 1;
      addProjectileShot({
        tower,
        target,
        origin: {
          x: origin.x + Math.cos(tower.fireAngle + Math.PI / 2) * 6 * splitSide,
          y: origin.y + Math.sin(tower.fireAngle + Math.PI / 2) * 6 * splitSide
        },
        type,
        hero,
        weakHit: false,
        damage: Math.round(towerDamage * TOWER_BRANCHES.tier3.multi.secondDamage),
        speedScale: .94,
        isSplit: true
      });
      spawnSparkBurst(origin.x, origin.y - 10, TOWER_BRANCHES.tier3.multi.color, 4, 360, 80);
    }
    playSound(hero ? 'heroShoot' : 'shoot');
  }

  function addProjectileShot({ tower, target, origin, type, hero = false, weakHit = false, damage, speedScale = 1, isSplit = false }) {
    state.shots.push({
      id: shotIdSeq++,
      targetId: target.id,
      x: origin.x,
      y: origin.y - (hero ? 25 : 0),
      prevX: origin.x,
      prevY: origin.y - (hero ? 25 : 0),
      speed: (hero ? 610 : 520) * speedScale,
      color: hero ? '#fde047' : type.projectile,
      kind: hero ? 'hero' : type.id,
      angle: !hero && tower ? towerAimAngle(tower) : -Math.PI / 2,
      age: 0,
      spin: (Math.random() * .012 + .006) * (Math.random() > .5 ? 1 : -1),
      damage,
      slow: type.slow || 0,
      slowMs: (type.slowMs || 0) + (state.evolutions?.bubbleSlowMs || 0),
      splash: type.splash ? type.splash + tower.level * 7 + (state.evolutions?.flowerSplash || 0) : 0,
      sourceTowerId: tower.id,
      sourceTowerType: tower.type,
      statusType: !hero ? tower.tier4Branch || '' : '',
      hero,
      weakHit,
      isSplit
    });
  }

  function hitEnemy(enemy, shot) {
    const p = enemy.x == null || enemy.y == null ? updateEnemyPosition(enemy) : enemy;
    if (shot.statusType) applyStatusEffect(enemy, shot.statusType, shot, performance.now());
    damageEnemy(enemy, shot.damage, { source: shot.sourceTowerId, sourceType: shot.sourceTowerType });
    if (shot.splash > 0) {
      let splashed = 0;
      state.enemies.forEach((other) => {
        if (other.id === enemy.id) return;
        const op = other.x == null || other.y == null ? updateEnemyPosition(other) : other;
        if (Math.hypot(op.x - p.x, op.y - p.y) <= shot.splash) {
          state.shots.push({
            id: shotIdSeq++,
            targetId: other.id,
            x: p.x,
            y: p.y,
            prevX: p.x,
            prevY: p.y,
            speed: shot.speed * 0.85,
            color: shot.color,
            damage: Math.round(shot.damage * .72),
            slow: shot.slow,
            slowMs: shot.slowMs,
            splash: 0,
            sourceTowerId: shot.sourceTowerId,
            sourceTowerType: shot.sourceTowerType,
            statusType: shot.statusType,
            statusScale: .7,
            hero: shot.hero,
            weakHit: false,
            isSplash: true
          });
          splashed++;
        }
      });
      if (splashed > 0) {
        burstAt(p.x, p.y, '#bbf7d0', shot.color, 30);
      } else {
        burstAt(p.x, p.y, '#fbcfe8', '#db2777', 30);
      }
    }
    if (shot.slow) {
      enemy.slowUntil = performance.now() + shot.slowMs;
      enemy.slowFactor = 1 - (1 - shot.slow) * (state.currentMutation?.slowResist || 1);
      burstAt(p.x, p.y, '#dbeafe', '#38bdf8', 24);
    }
    if (shot.weakHit) {
      burstAt(p.x, p.y, '#fef08a', '#f97316', 29);
      floatText(p.x, p.y - 38, '克制!', '#ea580c', 18);
      spawnSparkBurst(p.x, p.y, '#facc15', 7, 620, 150);
      playSound('weakHit');
    }
    burstAt(p.x, p.y, shot.color, '#fff', shot.hero ? 23 : 17);
  }

  function applyStatusEffect(enemy, type, source, now = performance.now()) {
    const conf = STATUS_EFFECTS[type];
    if (!enemy || enemy.hp <= 0 || !conf) return;
    if (!enemy.effects) enemy.effects = Object.create(null);
    const scale = source.statusScale || 1;
    const existing = enemy.effects[type];
    const stacks = Math.min(conf.maxStacks, (existing?.stacks || 0) + 1);
    const damagePerSecond = (conf.dpsBase + state.wave * conf.dpsWave) * scale;
    enemy.effects[type] = {
      type,
      sourceId: source.sourceTowerId || source.id || '',
      until: now + conf.duration,
      tickEvery: conf.tickEvery,
      nextTickAt: existing?.nextTickAt && existing.nextTickAt > now ? existing.nextTickAt : now + conf.tickEvery,
      damagePerSecond: Math.max(existing?.damagePerSecond || 0, damagePerSecond),
      stacks,
      armorBreak: conf.armorBreakRatio ? Math.max(conf.minArmorBreak || 0, enemy.baseArmor * conf.armorBreakRatio) : 0,
      shieldBypass: !!conf.shieldBypass
    };
    const p = enemy.x == null || enemy.y == null ? updateEnemyPosition(enemy) : enemy;
    burstAt(p.x, p.y, conf.color, '#fff', 23);
  }

  function damageEnemy(enemy, damage, options = {}) {
    if (!enemy || enemy.hp <= 0) return;
    const now = performance.now();
    let remaining = Math.max(0, Number(damage) || 0);
    if (remaining <= 0) return;
    enemy.lastDamagedAt = now;
    const bypassShield = options.bypassShield || enemyHasShieldBypass(enemy, now);
    if (!bypassShield && enemy.shield > 0) {
      const absorbed = Math.min(enemy.shield, remaining);
      enemy.shield = Math.max(0, enemy.shield - absorbed);
      remaining -= absorbed;
      if (absorbed > 0 && now - (enemy.shieldFloatAt || 0) > 520) {
        const p = enemy.x == null || enemy.y == null ? updateEnemyPosition(enemy) : enemy;
        floatText(p.x, p.y - 52, '护膜', '#0284c7', 16);
        enemy.shieldFloatAt = now;
      }
    }
    if (remaining <= 0) return;
    let hpDamage = remaining;
    if (!options.ignoreArmor) {
      const armor = effectiveEnemyArmor(enemy, now);
      if (armor > 0) hpDamage = Math.max(1, hpDamage * 100 / (100 + armor * 8));
    }
    enemy.hp -= hpDamage;
    if (enemy.hp <= 0) killEnemy(enemy);
  }

  function enemyHasShieldBypass(enemy, now = performance.now()) {
    const toxin = enemy.effects?.toxin;
    return !!toxin && toxin.until > now && toxin.shieldBypass;
  }

  function effectiveEnemyArmor(enemy, now = performance.now()) {
    let armor = enemy.baseArmor || enemy.armor || 0;
    const fire = enemy.effects?.fire;
    if (fire && fire.until > now) armor -= fire.armorBreak || 0;
    return Math.max(0, armor);
  }

  function killEnemy(enemy) {
    const p = enemy.x == null || enemy.y == null ? updateEnemyPosition(enemy) : enemy;
    removeEnemy(enemy.id);
    const conf = cfg();
    const coins = Math.max(4, Math.round(enemy.reward + state.wave * 1.2));
    state.coins += coins;
    animateEnergyPill();
    state.score += conf.score + state.wave * 12;
    state.specialCharge = Math.min(100, state.specialCharge + Math.min(7, 4 + state.wave * .2));
    floatText(p.x, p.y - 18, `葡萄糖 +${coins}`, '#d97706', 20);
    spawnGlucoseFly(p.x, p.y, coins);
    burstAt(p.x, p.y, '#fef3c7', '#f59e0b', 32);
    playSound('kill');
    if (state.score > state.bestScore) {
      state.bestScore = state.score;
      localStorage.setItem(STORAGE_BEST_SCORE, String(state.bestScore));
    }
  }

  function removeEnemy(id) {
    state.enemies = state.enemies.filter(enemy => enemy.id !== id);
    enemyById.delete(id);
  }

  function checkWaveDone() {
    if (state.enemiesToSpawn > 0 || state.enemies.length > 0 || state.waveDelay > 0 || state.finished || state.awaitingEvolution) return;
    if (treatmentMode) postTreatmentWavePassed(state.wave);
    if (state.wave >= MAX_WAVE) {
      endGame(true);
      return;
    }
    state.wave++;
    if (state.wave > state.bestWave) {
      state.bestWave = state.wave;
      localStorage.setItem(STORAGE_BEST_WAVE, String(state.bestWave));
    }
    state.coins += cfg().reward + state.wave * 8;
    animateEnergyPill();
    state.waveDelay = 0;
    floatText(view.width * .5, 110, '守住了！选择免疫进化', '#16a34a', 25);
    playSound('waveClear');
    if (treatmentMode) {
      scheduleTreatmentAutoEvolution();
      return;
    }
    showEvolutionChoices();
  }

  function postTreatmentWavePassed(wave) {
    postParent('gameFinished', {
      roundId: `${state.roundId}:wave:${wave}`,
      treatmentCheckpoint: true,
      completed: true,
      passed: true,
      earnedPoints: state.score,
      score: state.score,
      level: wave,
      difficulty: state.difficulty,
      scene: state.sceneId,
      waves: wave,
      maxWave: MAX_WAVE,
      treatmentLevels: 1
    });
  }

  function scheduleTreatmentAutoEvolution(delay = 900) {
    clearTreatmentAutoEvolution();
    state.awaitingEvolution = true;
    state.paused = true;
    const choice = evolutionChoices()[0];
    hintEl.textContent = `第 ${state.wave - 1} 波已守住，正在自动准备第 ${state.wave} 波`;
    treatmentAutoEvolutionTimer = setTimeout(() => {
      treatmentAutoEvolutionTimer = 0;
      if (!state.started || state.finished || !state.awaitingEvolution) return;
      chooseEvolution(choice.id, choice.title);
    }, delay);
  }

  function clearTreatmentAutoEvolution() {
    if (!treatmentAutoEvolutionTimer) return;
    clearTimeout(treatmentAutoEvolutionTimer);
    treatmentAutoEvolutionTimer = 0;
  }

  function endGame(won) {
    if (state.finished) return;
    state.finished = true;
    stopLoop();
    state.bestScore = Math.max(state.bestScore, state.score);
    state.bestWave = Math.max(state.bestWave, state.wave);
    localStorage.setItem(STORAGE_BEST_SCORE, String(state.bestScore));
    localStorage.setItem(STORAGE_BEST_WAVE, String(state.bestWave));
    renderAll();
    overlayTitleEl.textContent = won ? '免疫防线成功！' : '宠物基地需要支援';
    overlayTextEl.textContent = won
      ? `你的宠物主角守住了 ${MAX_WAVE} 波病原体。得分 ${state.score}。`
      : `这次守到第 ${state.wave} 波，得分 ${state.score}。调整塔的位置，再来一次会更稳。`;
    startBtn.textContent = '再玩一次';
    if (sceneSelectEl) setCustomSelectValue(sceneSelectEl, state.sceneId, { silent: true });
    if (sceneRowEl) sceneRowEl.hidden = false;
    overlayEl.hidden = false;
    if (!treatmentMode) {
      postParent('gameFinished', {
        roundId: state.roundId,
        completed: won,
        passed: won,
        earnedPoints: state.score,
        score: state.score,
        level: state.wave,
        difficulty: state.difficulty,
        scene: state.sceneId,
        waves: state.wave,
        maxWave: MAX_WAVE
      });
    }
    playSound(won ? 'win' : 'lose');
  }

  function handleSpotTap(index) {
    if (!state.started || state.finished) return;
    const existing = state.towers.find(tower => tower.spotIndex === index);
    if (existing) {
      handleTowerTap(existing.id);
      return;
    }
    state.selectedSpotIndex = index;
    state.selectedTowerId = null;
    hintEl.textContent = '选择要部署的防御单元';
    playSound('select');
    markRenderDirty('spots', 'hud');
    renderAll();
    if (tutorialStep === 'spot') {
      tutorialStep = 'tower';
      requestAnimationFrame(updateTutorialGuide);
    }
  }

  function buildTowerAtSelectedSpot(typeId) {
    if (!state.started || state.finished || state.selectedSpotIndex == null) return;
    const index = state.selectedSpotIndex;
    if (state.towers.some(tower => tower.spotIndex === index)) return;
    const type = TOWER_TYPES[typeId];
    if (!type) return;
    if (!testFreeBuildActive() && state.coins < type.cost) {
      showToast('葡萄糖不够');
      playSound('invalid');
      return;
    }
    if (!testFreeBuildActive()) state.coins -= type.cost;
    state.towers.push({ id: towerIdSeq++, spotIndex: index, type: type.id, level: 1, cooldown: 0, aimAngle: -Math.PI / 2, fireAngle: -Math.PI / 2, lockedTargetId: '' });
    state.selectedType = type.id;
    state.selectedSpotIndex = null;
    state.selectedTowerId = null;
    markRenderDirty('spots', 'hud');
    hintEl.textContent = `${type.label}部署好了，点防御单元可以升级`;
    if (tutorialStep === 'tower') completeTutorialGuide();
    burstAt(buildSpots[index].x, buildSpots[index].y, type.glow, type.color, 42);
    playSound('build');
    renderAll();
  }

  function replaceSelectedTowerType(typeId) {
    if (!isPhantomDeviceActive() || !state.started || state.finished) return false;
    const tower = selectedTower();
    const type = TOWER_TYPES[typeId];
    if (!tower || !type) return false;
    tower.type = type.id;
    tower.level = 1;
    tower.cooldown = 0;
    tower.lockedTargetId = '';
    delete tower.tier2Branch;
    delete tower.tier3Branch;
    delete tower.tier4Branch;
    state.selectedType = type.id;
    const spot = buildSpots[tower.spotIndex];
    if (spot) {
      burstAt(spot.x, spot.y, type.glow, type.color, 42);
      floatText(spot.x, spot.y - 54, type.short, type.color, 22);
    }
    hintEl.textContent = `已替换为${type.label} lv1`;
    playSound('build');
    markRenderDirty('spots', 'hud');
    renderAll();
    return true;
  }

  function handleTowerTap(id) {
    if (!state.started || state.finished) return;
    const tower = state.towers.find(item => item.id === id);
    if (!tower) return;
    state.selectedTowerId = tower.id;
    state.selectedSpotIndex = null;
    if (tower.level >= MAX_TOWER_LEVEL) {
      hintEl.textContent = `${TOWER_TYPES[tower.type].short}已满级：${towerRouteText(tower)}；自身伤害 ${towerSelfDamagePercent(tower)}%；${globalBoostText()}`;
    } else if (branchTierForUpgrade(tower)) {
      hintEl.textContent = `${TOWER_TYPES[tower.type].short}可选分支；路线：${towerRouteText(tower)}；自身伤害 ${towerSelfDamagePercent(tower)}%；${globalBoostText()}`;
    } else {
      hintEl.textContent = `${TOWER_TYPES[tower.type].short}已选中；路线：${towerRouteText(tower)}；自身伤害 ${towerSelfDamagePercent(tower)}%；${globalBoostText()}`;
    }
    playSound('select');
    markRenderDirty('spots', 'hud');
    renderAll();
  }

  function upgradeSelectedTower(branchId = '') {
    if (!state.started || state.finished) return;
    const tower = selectedTower();
    if (!tower) return;
    const cost = upgradeCost(tower);
    if (tower.level >= MAX_TOWER_LEVEL) {
      hintEl.textContent = '这座塔已经满级，范围会显示出来';
      renderAll();
      return;
    }
    if (testFreeBuildActive() || state.coins >= cost) {
      const spot = buildSpots[tower.spotIndex];
      if (!spot) return;
      const branchTier = branchTierForUpgrade(tower);
      const branch = branchTier ? branchChoices(branchTier).find(item => item.id === branchId) : null;
      if (branchTier && !branch) return;
      if (!testFreeBuildActive()) state.coins -= cost;
      tower.level++;
      if (branchTier === 2) tower.tier2Branch = branch.id;
      if (branchTier === 3) tower.tier3Branch = branch.id;
      if (branchTier === 4) tower.tier4Branch = branch.id;
      const branchText = branch ? ` · ${branch.label}` : '';
      hintEl.textContent = `${TOWER_TYPES[tower.type].short}升级到 lv${tower.level}${branchText}；${globalBoostText()}`;
      burstAt(spot.x, spot.y, '#fef3c7', branch?.color || '#f59e0b', 48);
      floatText(spot.x, spot.y - 54, branch?.short || `lv${tower.level}`, branch?.color || '#0f766e', 22);
      playSound('upgrade');
    } else {
      hintEl.textContent = `升级需要 ${cost} 葡萄糖`;
      playSound('invalid');
    }
    renderAll();
  }

  function downgradeSelectedTower() {
    if (!isPhantomDeviceActive()) return;
    const tower = selectedTower();
    if (!tower) {
      showToast('先选择一座塔');
      return;
    }
    if (tower.level <= 1) {
      showToast('已经是 1 级');
      return;
    }
    if (tower.level === 4) delete tower.tier4Branch;
    if (tower.level === 3) delete tower.tier3Branch;
    if (tower.level === 2) delete tower.tier2Branch;
    tower.level--;
    const spot = buildSpots[tower.spotIndex];
    if (spot) floatText(spot.x, spot.y - 54, `lv${tower.level}`, '#0f766e', 20);
    hintEl.textContent = `${TOWER_TYPES[tower.type].short}降级到 lv${tower.level}`;
    markRenderDirty('spots', 'hud');
    renderAll();
  }

  function deleteSelectedTower() {
    if (!isPhantomDeviceActive()) return;
    const tower = selectedTower();
    if (!tower) {
      showToast('先选择一座塔');
      return;
    }
    const spot = buildSpots[tower.spotIndex];
    state.towers = state.towers.filter(item => item.id !== tower.id);
    state.selectedTowerId = null;
    state.selectedSpotIndex = null;
    if (spot) burstAt(spot.x, spot.y, '#ccfbf1', '#0f766e', 38);
    hintEl.textContent = '已删除选中的测试塔';
    markRenderDirty('spots', 'hud');
    renderAll();
  }

  function deselectTower() {
    if (!state.selectedTowerId && state.selectedSpotIndex == null) return;
    state.selectedTowerId = null;
    state.selectedSpotIndex = null;
    hintEl.textContent = '点击空白加号部署防御单元；点击宠物释放白细胞';
    markRenderDirty('spots', 'hud');
    renderAll();
    if (tutorialStep === 'tower') {
      tutorialStep = 'spot';
      requestAnimationFrame(updateTutorialGuide);
    }
  }

  function upgradeCost(tower) {
    const multipliers = [0, .72, 1.05, 1.42];
    return Math.round(TOWER_TYPES[tower.type].cost * (multipliers[tower.level] || 1.42));
  }

  function branchTierForUpgrade(tower) {
    if (!tower || tower.level >= MAX_TOWER_LEVEL) return 0;
    if (tower.level === 1 && !tower.tier2Branch) return 2;
    if (tower.level === 2 && !tower.tier3Branch) return 3;
    if (tower.level === 3 && !tower.tier4Branch) return 4;
    return 0;
  }

  function branchChoices(tier) {
    if (tier === 2) return [TOWER_BRANCHES.tier2.steady, TOWER_BRANCHES.tier2.range];
    if (tier === 3) return [TOWER_BRANCHES.tier3.multi, TOWER_BRANCHES.tier3.rate, TOWER_BRANCHES.tier3.range];
    return [TOWER_BRANCHES.tier4.fire, TOWER_BRANCHES.tier4.toxin];
  }

  function towerRange(tower) {
    return TOWER_TYPES[tower.type].range + towerBranchRangeBonus(tower) + (state.evolutions?.globalRange || 0);
  }

  function towerBranchRangeBonus(tower) {
    let bonus = 0;
    if (tower.tier2Branch === 'range') bonus += TOWER_BRANCHES.tier2.range.extraRange;
    if (tower.tier3Branch === 'range') bonus += TOWER_BRANCHES.tier3.range.extraRange;
    return bonus;
  }

  function towerRouteText(tower) {
    const parts = [];
    const tier2 = tower.tier2Branch ? TOWER_BRANCHES.tier2[tower.tier2Branch]?.short : '';
    const tier3 = tower.tier3Branch ? TOWER_BRANCHES.tier3[tower.tier3Branch]?.short : '';
    const tier4 = tower.tier4Branch ? TOWER_BRANCHES.tier4[tower.tier4Branch]?.short : '';
    if (tier2) parts.push(tier2);
    if (tier3) parts.push(tier3);
    if (tier4) parts.push(tier4);
    return parts.length ? parts.join(' / ') : '未分化';
  }

  function globalBoostText() {
    const evo = state.evolutions;
    if (!evo) return '进化：无';
    const parts = [];
    if (evo.acornDamage > 0) parts.push(`胶囊 +${Math.round(evo.acornDamage * 100)}%`);
    if (evo.bubbleSlowMs > 0) parts.push(`减速 +${evo.bubbleSlowMs}ms`);
    if (evo.flowerSplash > 0) parts.push(`溅射 +${evo.flowerSplash}`);
    if (evo.heroRate > 1) parts.push(`宠物攻速 +${Math.round((evo.heroRate - 1) * 100)}%`);
    if (evo.globalRange > 0) parts.push(`全域 +${evo.globalRange}`);
    return parts.length ? `进化：${parts.join(' / ')}` : '进化：无';
  }

  function towerFireInterval(tower) {
    const type = TOWER_TYPES[tower.type];
    if (!type) return 680;
    let interval = type.rate;
    if (tower.tier3Branch === 'rate') interval *= TOWER_BRANCHES.tier3.rate.interval;
    return Math.max(240, interval);
  }

  function isWeakHit(towerType, target) {
    return ENEMY_TRAITS[target.kind]?.weak === towerType;
  }

  function towerEvolutionAura(tower) {
    if (!state.evolutions) return null;
    if (tower.type === 'acorn' && state.evolutions.acornDamage > 0) return { fill: '#fef3c7', stroke: '#d97706', opacity: .18 };
    if (tower.type === 'bubble' && state.evolutions.bubbleSlowMs > 0) return { fill: '#dbeafe', stroke: '#0284c7', opacity: .18 };
    if (tower.type === 'flower' && state.evolutions.flowerSplash > 0) return { fill: '#dcfce7', stroke: '#16a34a', opacity: .18 };
    if (state.evolutions.globalRange > 0) return { fill: '#fff7ed', stroke: '#f59e0b', opacity: .12 };
    return null;
  }

  function modifiedTowerDamage(tower, type, target) {
    let damage = type.damage * towerDamageMultiplier(tower);
    if (tower.type === 'acorn') damage *= 1 + (state.evolutions?.acornDamage || 0);
    const trait = ENEMY_TRAITS[target.kind];
    if (trait?.weak === tower.type) damage *= trait.weakFactor;
    return Math.round(damage);
  }

  function towerDamageMultiplier(tower) {
    if (!tower) return 1;
    if (tower.level >= 4) return 1.25;
    if (tower.level >= 3) return 1.12;
    return 1;
  }

  function towerSelfDamagePercent(tower) {
    return Math.round(towerDamageMultiplier(tower) * 100);
  }

  function spawnSparkBurst(x, y, fill = '#facc15', count = 10, life = 760, power = 180) {
    if (state.evolutionSparks.length >= PERF_LIMITS.sparks) return;
    count = Math.min(count, PERF_LIMITS.sparks - state.evolutionSparks.length);
    for (let i = 0; i < count; i++) {
      const angle = Math.PI * 2 * i / count + (i % 2) * .24;
      const speed = power * (.55 + (i % 4) * .14);
      state.evolutionSparks.push({
        id: sparkIdSeq++,
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        fill,
        baseSize: 6 + (i % 3) * 2,
        size: 6 + (i % 3) * 2,
        rotate: i * 31,
        spin: i % 2 ? 150 : -150,
        opacity: 1,
        age: 0,
        life
      });
    }
  }

  function spawnEvolutionAura(id) {
    const colorMap = {
      acornDamage: '#f59e0b',
      bubbleSlow: '#38bdf8',
      flowerSplash: '#22c55e',
      heroRate: '#fde047',
      globalRange: '#fb923c',
      repair: '#fb7185',
      coins: '#fbbf24'
    };
    const color = colorMap[id] || '#facc15';

  function glucoseTargetPoint() {
    const rect = hudEls.energyPill?.getBoundingClientRect();
    if (!rect || !rect.width || !rect.height) return { x: view.width * .5, y: 38 };
    return clientToSvgPoint(rect.left + rect.width * .5, rect.top + rect.height * .5);
  }

  function clientToSvgPoint(clientX, clientY) {
    const rect = svg.getBoundingClientRect();
    if (!rect.width || !rect.height) return { x: view.width * .5, y: 38 };
    const viewAspect = view.width / view.height;
    const rectAspect = rect.width / rect.height;
    let drawWidth = rect.width;
    let drawHeight = rect.height;
    let offsetX = 0;
    let offsetY = 0;
    if (rectAspect > viewAspect) {
      drawWidth = rect.height * viewAspect;
      offsetX = (rect.width - drawWidth) / 2;
    } else {
      drawHeight = rect.width / viewAspect;
      offsetY = (rect.height - drawHeight) / 2;
    }
    const x = (clientX - rect.left - offsetX) / Math.max(1, drawWidth) * view.width;
    const y = (clientY - rect.top - offsetY) / Math.max(1, drawHeight) * view.height;
    return { x: Math.max(0, Math.min(view.width, x)), y: Math.max(0, Math.min(view.height, y)) };
  }

  function spawnWhiteCellTroop() {
    const allocations = whiteCellAllocations(SPECIAL_TROOP_COUNT);
    allocations.forEach((count, pathIndex) => {
      const info = pathInfos[pathIndex] || pathInfos[0];
      const speed = whiteCellSpeedForPath(pathIndex);
      const baseDistance = pathDistanceClosestTo(currentLayout.gate, pathIndex);
      for (let i = 0; i < count; i++) {
        const distance = Math.max(0, baseDistance - i * 22);
        const p = pointAt(distance, pathIndex);
        state.whiteCells.push({
          pathIndex,
          distance,
          x: p.x,
          y: p.y,
          speed,
          damage: 95 + state.wave * 18,
          hitRadius: 28,
          scale: .74 + (i % 3) * .1,
          phase: i * .9,
          opacity: 1,
          age: 0,
          life: Math.max(1400, (Math.max(baseDistance, info.total * .45) / Math.max(1, speed)) * 1000 + 500)
        });
      }
    });
  }

  function pathDistanceClosestTo(point, pathIndex) {
    const info = pathInfos[pathIndex] || pathInfos[0];
    let bestDistance = info.total;
    let bestGap = Infinity;
    info.segments.forEach((segment) => {
      const dx = segment.b.x - segment.a.x;
      const dy = segment.b.y - segment.a.y;
      const len2 = Math.max(1, dx * dx + dy * dy);
      const t = Math.max(0, Math.min(1, ((point.x - segment.a.x) * dx + (point.y - segment.a.y) * dy) / len2));
      const x = segment.a.x + dx * t;
      const y = segment.a.y + dy * t;
      const gap = Math.hypot(point.x - x, point.y - y);
      if (gap < bestGap) {
        bestGap = gap;
        bestDistance = segment.start + segment.len * t;
      }
    });
    return bestDistance;
  }

  function whiteCellAllocations(totalTroops) {
    const counts = pathInfos.map((_, pathIndex) => state.enemies.filter(enemy => enemy.pathIndex === pathIndex && enemy.hp > 0).length);
    const totalEnemies = counts.reduce((sum, count) => sum + count, 0);
    if (!totalEnemies) {
      return counts.map((_, index) => Math.floor(totalTroops / counts.length) + (index < totalTroops % counts.length ? 1 : 0));
    }
    const raw = counts.map(count => count ? count / totalEnemies * totalTroops : 0);
    const allocations = raw.map(value => Math.floor(value));
    let remaining = totalTroops - allocations.reduce((sum, value) => sum + value, 0);
    raw
      .map((value, index) => ({ index, rest: value - Math.floor(value), count: counts[index] }))
      .sort((a, b) => b.rest - a.rest || b.count - a.count)
      .forEach((item) => {
        if (remaining <= 0) return;
        allocations[item.index]++;
        remaining--;
      });
    return allocations;
  }

  function whiteCellSpeedForPath(pathIndex) {
    const enemies = state.enemies.filter(enemy => enemy.pathIndex === pathIndex && enemy.hp > 0);
    if (!enemies.length) return 82 + state.wave * 3;
    const total = enemies.reduce((sum, enemy) => {
      const slowActive = enemy.slowUntil > performance.now();
      return sum + enemy.speed * (slowActive ? enemy.slowFactor : 1);
    }, 0);
    return Math.max(45, total / enemies.length);
  }

  function toggleCustomSelect(id) {
    const item = customSelects.get(id);

    item.selectEl.classList.toggle('open', opening);
