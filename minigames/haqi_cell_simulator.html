<!DOCTYPE html>
<!--
================================================================================
 3D 细胞模拟器 — 开发者指南：如何添加更多细节 / LOD 模型 / 动画
 DEVELOPER GUIDE: How to add more detail (LOD models / animations)
================================================================================

 本文件是单文件 Three.js (r128) 应用，由多个内联脚本块按“迭代”顺序构建：
 This is a single-file Three.js (r128) app built in ordered inline-script "iterations":
   Iteration 1: 场景核心 / 相机 / 拾取 / LOD / 标签 / 渲染循环 (core, camera, pick, LOD, labels, render loop)
   Iteration 2: 主要细胞器 (nucleus, mitochondria, ER, Golgi)
   Iteration 3: 细节细胞器 + 植物/动物切换 (lysosome, vacuole, cytoskeleton, cell type switching)
   Iteration 4: 分子尺度超精细结构 (DNA, ATP synthase, vesicles, molecular crowd)
   Iteration 5: 神经元形态 (soma, dendrites, spines, axon, myelin, synapse, channels)
   Iteration 6: 动物/通用细胞精细结构 (microtubules, centrosome, microvilli, cilia, clathrin, junctions, ECM)
   Iteration 7: 神经元更深层结构与分子机器 (glia, growth cone, SNARE/Ca2+, PSD+AMPA/NMDA, kinesin/dynein, AP wave)
   Iteration 8: 动物细胞能量代谢机器 (hero mitochondrion w/ cristae+ETC, lipid droplets, glycogen)
   Iteration 9: 动物细胞膜运输与黏附 (integrin/focal adhesion, COPI/II, secretory vesicles, autophagosome, ER exit, ER ribosome)
   Iteration 10: 神经元突触前释放机器 (active zone, RRP, synaptotagmin, SNARE zip, glutamate quanta)
   Iteration 11: 神经元轴突结构与骨架 (node Na-channels, paranode, myelin lamellae, bouton, spine apparatus, filopodia)
   Iteration 12: 神经元递质化学与胶质微环境 (GABA bouton, dopamine varicosities, microglia, perineuronal net)
   Iteration 13: 动物细胞骨架运输与翻译 (cyto microtubule + motors, polyribosome, proteasome)
  Iteration 14: 神经元树突棘多样性与受体动态 (spine gallery, AMPA trafficking, endocytic zone)
  Iteration 15–34: 二十轮扩充细节：神经元特化结构 + 动物细胞膜/骨架/核内微区

 所有公共工具都挂在 `window.__CELL` 上，后续脚本块通过它获取。
 All shared helpers live on `window.__CELL`; later scripts destructure from it:
   const { THREE, scene, cell, register, registerLOD, markShell, makeCapsule, freezeStatic } = window.__CELL;
   // 神经元专属：const { neuronGroup } = ...; (parts go into C.neuronGroup, not `cell`)

 验证修改 (validate after editing)：用编辑器/浏览器检查；无语法错误且加载时控制台无报错即可。

--------------------------------------------------------------------------------
 A. 添加一个新的可点击结构 (ADD A NEW CLICKABLE STRUCTURE)
--------------------------------------------------------------------------------
 1) 在 `window.ORGANELLE_DATA` 中加一条知识条目 (knowledge entry)，key 为英文短名：
      myThing: { emoji:"🔬", name:"中文名", en:"English", desc:"...", facts:["...","..."] }
 2) 构建 Three.js 对象 (Group/Mesh)，定位好后加入容器：
      球形细胞用 `cell.add(obj)`；神经元用 `neuron.add(obj)` (= C.neuronGroup)。
 3) 注册以便点击 + 标签：`register(obj, 'myThing', true);`  (第三参 true = 显示 3D 标签)
 4) 若属于植物/动物专属，push 到 `plantOnly` / `animalOnly`；神经元结构放进 neuron 组即可。
 5) 若想出现在底部导航栏，把 key 加进对应的 *_KEYS 数组 (ANIMAL_KEYS / PLANT_KEYS / NEURON_KEYS)。

--------------------------------------------------------------------------------
 B. 添加 LOD 细节 (ADD LOD DETAIL — 越近越清晰)
--------------------------------------------------------------------------------
 - 用 `registerLOD(obj, minLevel)` 注册细节子组。minLevel: 1=中等 2=精细 3=分子尺度。
   全局 LOD 等级由相机距离决定 (lodForDistance)：>40→0, >24→1, >12→2, 否则→3。
 - 远处不显示细节：每个对象还要通过“邻近距离”过滤 (LOD_PROXIMITY)：
      { 1: Infinity, 2: 22, 3: 13 }  // level2 须 <22 单位，level3 须 <13 单位 才显示
   这样放大看某一处时，远处的同类细节仍保持粗略，节省性能。可在 LOD_PROXIMITY 调阈值。
 - 新加的细节默认建议放 LOD 2 或 3，这样远离时自动隐藏 → 绘制调用更少。
 - 细节对象的世界中心会被缓存 (_centerValid)；布局变化后调用 `window.__CELL_resetLOD()` 重算。

--------------------------------------------------------------------------------
 C. 添加动画 (ADD AN ANIMATION) — 必须遵守渲染按需 (render-on-demand) 规则
--------------------------------------------------------------------------------
 渲染循环只在“有变化”时才绘制 (needsRender)。因此动画函数必须：
 The render loop only draws when something changed. So an animation MUST:
   (1) 只对“可见”对象做工作：用 `window.__CELL_effVisible(obj)` 判断（会沿父链检查可见性）。
   (2) 当它确实移动了一个可见对象时，**返回 true**；否则返回 false。

 推荐写法 (pattern) —— 把动画推进既有的 `__animateOrganelles` 链：
   const _ev = window.__CELL_effVisible || (o => o.visible);
   const prev = window.__animateOrganelles;
   window.__animateOrganelles = function (dt, t) {
     let moved = prev ? !!prev(dt, t) : false;          // 先跑前一层
     if (_ev(myGroup)) { /* ...移动 myGroup 内对象... */ moved = true; }  // 只在可见时动
     return moved;                                       // 关键：返回是否移动
   };
 或在 Iteration 4/5 里直接 `microAnims.push(fn)` / `neuronAnims.push(fn)`（这些 fn 同样要返回 bool）。

 注意 (gotchas)：
   - 任何“非相机引起”的场景改动（改颜色/可见性/位置）后，调用 `window.__CELL_requestRender()`，
     否则画面不会刷新。相机移动会自动标脏 (applyCamera → markCameraDirty)。
   - 不要对“会动”的对象用 freezeStatic()（它会冻结矩阵）；只对永不移动的对象用。
   - 静止且数量很多的对象：定位并 add 到父级后调用 `freezeStatic(obj)`，停止逐帧矩阵计算（见树突棘）。

--------------------------------------------------------------------------------
 D. 拾取/点击的逐实例行为 (PER-INSTANCE CLICK BEHAVIOR)
--------------------------------------------------------------------------------
 - 拾取用 GPU 1 像素方案。给不需要被点的网格设 `o.userData._noPick = true` 以省开销
   （例如树突棘只让“头部”可点，颈部与内部细节跳过）。
 - 点击返回具体被点对象；若该对象有 `userData.onPick(obj)` 会被调用，可做高亮/展开/自定义信息。
 - 自定义信息面板：`window.__CELL.showCustomInfo({emoji,name,en,desc,facts}, activeKey)`。

--------------------------------------------------------------------------------
 E. Three.js r128 兼容性 (COMPATIBILITY — 这些较新 API 不可用)
--------------------------------------------------------------------------------
 - 没有 MeshPhysicalMaterial.thickness（用 transmission 即可，别加 thickness）。
 - 没有 CapsuleGeometry：用 `THREE.CapsuleGeometry ? new THREE.CapsuleGeometry(...) : 圆柱体` 兜底。
 - 圆柱几何体的轴是 +Y。要让圆柱朝向 dir：
     mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);  // 不要用 lookAt+rotateX
================================================================================
-->

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #04060f; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; touch-action: none; }

    /* Top bar */
    #topbar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; gap: 8px; padding: 10px 12px; pointer-events: none; z-index: 30; }
    /* interactive pills opt back into events and sit in their own stacking

    #topbar .pill { pointer-events: auto; position: relative; z-index: 31; }
    .pill { background: rgba(10, 18, 38, 0.72); backdrop-filter: blur(8px); border: 1px solid rgba(120, 180, 255, 0.25); color: #dceaff; border-radius: 999px; padding: 7px 14px; font-size: 13px; box-shadow: 0 4px 18px rgba(0,0,0,0.35); }

    #typePill { padding: 3px; display: flex; gap: 3px; pointer-events: auto; }

    #typePill .type-btn:hover { background: rgba(120,180,255,0.12); }

      color: #fff; box-shadow: 0 3px 12px rgba(70,110,255,0.4); }

    /* Organelle navigation tabs (bottom) */
    #navbar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 20; padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    #navbar::-webkit-scrollbar { display: none; }
    .nav-chip { flex: 0 0 auto; cursor: pointer; user-select: none; background: rgba(12, 22, 44, 0.78); border: 1px solid rgba(120,180,255,0.22); color: #cfe0ff; border-radius: 14px; padding: 8px 12px; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 60px; transition: all .18s ease; }

    #infoPanel { position: absolute; right: 12px; top: 58px; width: 290px; max-width: calc(100vw - 24px); z-index: 25; background: rgba(8, 16, 34, 0.86); backdrop-filter: blur(10px); border: 1px solid rgba(120,180,255,0.28); border-radius: 16px; color: #e7f0ff; padding: 14px 16px; box-shadow: 0 10px 36px rgba(0,0,0,0.5); transform: translateX(120%); opacity: 0; transition: transform .32s cubic-bezier(.2,.8,.2,1), opacity .32s; }

    #infoPanel .closeBtn { position: absolute; top: 10px; right: 12px; cursor: pointer; opacity: 0.6; font-size: 18px; line-height: 1; }
    #infoPanel .closeBtn:hover { opacity: 1; }
    /* expand/collapse toggle — hidden on desktop, shown on small screens.
       sits at the top-right, just left of the close button to save vertical space */
    #infoPanel .expandBtn { display: none; position: absolute; top: 8px; right: 36px; cursor: pointer; user-select: none; font-size: 11px; color: #9fc3ff; background: rgba(120,180,255,0.12); border: 1px solid rgba(120,180,255,0.3); border-radius: 999px; padding: 3px 9px; align-items: center; gap: 3px; }
    #infoPanel .expandBtn:active { background: rgba(120,180,255,0.25); }

    /* Zoom controls */
    #zoomCtl { position: absolute; left: 12px; bottom: 88px; z-index: 22; display: flex; flex-direction: column; gap: 8px; }
    .zbtn { width: 42px; height: 42px; border-radius: 12px; background: rgba(12,22,44,0.82); border: 1px solid rgba(120,180,255,0.25); color: #dceaff; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }

    /* Loading & hint */
    #loader { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: radial-gradient(circle at 50% 40%, #0b1430, #04060f 70%); z-index: 50; color: #bcd4ff; transition: opacity .5s; }

    @media (max-width: 640px) {
      /* compact top bar: smaller pills, no wrapping */
      #topbar { gap: 6px; padding: 8px 8px; flex-wrap: nowrap; }
      #topbar .pill { font-size: 11px; padding: 6px 10px; white-space: nowrap; }
      /* hide the "自转" label (icon is self-explanatory) but KEEP the LOD text */
      #toggleAuto .btn-text { display: none; }
      #typePill { padding: 2px; gap: 2px; }
      #typePill .type-btn { font-size: 11px; padding: 5px 9px; }

      #infoPanel { top: calc(52px + env(safe-area-inset-top)); bottom: auto; right: 8px; left: 8px; width: auto; padding: 9px 12px; transform: translateY(-130%);
        background: rgba(8, 16, 34, 0.6); backdrop-filter: blur(7px); border-radius: 13px; }
      #infoPanel.show { transform: translateY(0); }
      /* compact typography */
      #infoPanel h2 { font-size: 14px; margin-bottom: 4px; padding-right: 84px; }
      #infoPanel .en { font-size: 10px; }
      #infoPanel .desc { font-size: 11.5px; line-height: 1.45; }
      #infoPanel .closeBtn { top: 8px; right: 10px; font-size: 16px; }
      /* show the expand toggle on mobile, anchored top-right beside close */
      #infoPanel .expandBtn { display: inline-flex; top: 7px; right: 32px; }
      /* when collapsed: clamp the description to a SINGLE line + hide facts */
      #infoPanel:not(.expanded) .desc {
        display: -webkit-box; -webkit-line-clamp: 1; line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
      }
      #infoPanel:not(.expanded) .facts { display: none; }
      /* when expanded: allow scrolling within a capped height */
      #infoPanel.expanded { max-height: 48vh; overflow-y: auto; background: rgba(8, 16, 34, 0.9); }
    }
  </style>
</head>

  <script>
  const __CELL_TYPE_STORAGE_KEY = 'haqi_cell_simulator_cellType';
  window.__CELL_TYPE_STORAGE_KEY = __CELL_TYPE_STORAGE_KEY;
  const __savedCellType = (() => {
    try {
      const v = localStorage.getItem(__CELL_TYPE_STORAGE_KEY);
      return /^(animal|plant|neuron)$/.test(v) ? v : null;
    } catch (e) { return null; }
  })();
  game_config = {
    cellType: __savedCellType || "animal",          // "animal" | "plant" | "neuron"
    autoRotate: true,
    rotateSpeed: 0.25,
    showLabels: true
  };

    growth_cone_filopodia: {

      desc: "生长锥前端伸出的细长指状突起，由平行肌动蛋白束支撑，像“触手”一样探测周围的导向分子并指引轴突生长方向。",
      facts: [
        "生长锥前缘的指状探测突起",
        "由平行肌动蛋白束支撑",
        "感知吸引/排斥导向信号",

  <!-- ============ main game script ============ -->
  <script>
  (function () {
    'use strict';
    const D = window.ORGANELLE_DATA;
    const CFG = window.game_config;

    // ---------------- Scene core ----------------
    const app = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x04060f);
    scene.fog = new THREE.FogExp2(0x04060f, 0.012);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 14, 46);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    app.appendChild(renderer.domElement);

    // CSS label renderer (lightweight, manual projection)
    const labelLayer = document.createElement('div');
    labelLayer.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:10;overflow:hidden;';
    app.appendChild(labelLayer);

    // ---------------- Lighting ----------------
    scene.add(new THREE.AmbientLight(0x4a5e88, 0.7));
    const key = new THREE.DirectionalLight(0xffffff, 1.1); key.position.set(30, 40, 30); scene.add(key);
    const fill = new THREE.DirectionalLight(0x88aaff, 0.5); fill.position.set(-30, -10, -20); scene.add(fill);
    const rim = new THREE.PointLight(0x66ffd0, 0.8, 200); rim.position.set(0, 0, 0); scene.add(rim);

    // background star/particle dust
    (function dust() {
      const g = new THREE.BufferGeometry();
      const n = 600, arr = new Float32Array(n * 3);
      for (let i = 0; i < n; i++) {
        const r = 80 + Math.random() * 120;
        const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
        arr[i*3] = r * Math.sin(ph) * Math.cos(th);
        arr[i*3+1] = r * Math.sin(ph) * Math.sin(th);
        arr[i*3+2] = r * Math.cos(ph);
      }
      g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
      const m = new THREE.PointsMaterial({ color: 0x335588, size: 0.6, transparent: true, opacity: 0.6 });
      scene.add(new THREE.Points(g, m));
    })();

    // ---------------- Root group ----------------
    const cell = new THREE.Group();
    scene.add(cell);

    // registry of clickable organelles { mesh, key }
    const pickables = [];
    const labels = []; // {el, obj, key}

    // ---- Level of Detail (LOD) ----
    // Detail meshes are tagged with a minimum LOD level. The current level is
    // derived from camera distance: the closer you zoom, the more interior
    // structure is revealed.
    //   level 0 = far   (overview silhouettes only)
    //   level 1 = mid   (organelle interior structures appear)
    //   level 2 = close (finest sub-structures appear)
    const lodObjects = []; // { obj, minLevel, _center, _centerValid }
    let currentLOD = -1;   // force first update
    function registerLOD(obj, minLevel) {
      lodObjects.push({ obj, minLevel, _center: new THREE.Vector3(), _centerValid: false });
      return obj;
    }
    // invalidate cached LOD object centers (call after a layout change such as
    // switching cell type). The animate loop recomputes them on demand.
    window.__CELL_invalidateLODCenters = function () { for (const it of lodObjects) it._centerValid = false; };
    // map a camera distance to a LOD level
    //   level 0 = far    (overview silhouettes only)
    //   level 1 = mid    (organelle interior structures appear)
    //   level 2 = close  (fine sub-structures appear)
    //   level 3 = micro  (molecular-scale ultra detail appears)
    function lodForDistance(dist) {
      if (dist > 40) return 0;
      if (dist > 24) return 1;
      if (dist > 12) return 2;
      return 3;
    }
    // Per-level PROXIMITY caps: even when the global zoom level would reveal a
    // detail, only show it if the object itself is within this distance of the
    // camera. This keeps far-away structures coarse (no detail) while you zoom
    // into one nearby structure — less clutter, better performance. Higher
    // detail (level 2/3) requires being closer. (Level 0/1 = no proximity cap.)
    const LOD_PROXIMITY = { 1: Infinity, 2: 22, 3: 13 };
    function lodProximityCap(minLevel) { return LOD_PROXIMITY[minLevel] || Infinity; }

    function applyLOD(level) {
      const changed = level !== currentLOD;
      currentLOD = level;
      const camPos = camera.position;
      let needsRenderFromLOD = false;
      for (const it of lodObjects) {
        let vis = level >= it.minLevel;
        if (vis) {
          // distance gate: hide detail that is far from the camera even if the
          // global level allows it. Detail objects are static in world space,
          // so cache their center once (camera moves, objects don't).
          const cap = lodProximityCap(it.minLevel);
          if (cap !== Infinity) {
            if (!it._centerValid) {
              it.obj.updateWorldMatrix(true, false);
              it._center.setFromMatrixPosition(it.obj.matrixWorld);
              it._centerValid = true;
            }
            if (camPos.distanceTo(it._center) > cap) vis = false;
          }
        }
        if (it.obj.visible !== vis) { it.obj.visible = vis; needsRenderFromLOD = true; }
      }
      if (needsRenderFromLOD && window.__CELL_requestRender) window.__CELL_requestRender();
      if (!changed) return;
      // surface a hint of the active detail level in the top bar.
      // emoji stays as the icon; only the text span changes (text hidden on mobile)
      const ld = document.getElementById('lodLabel');
      const icons = ['🛰️', '🔬', '🧫', '⚛️'];
      const names = [' 概览', ' 中等细节', ' 精细结构', ' 分子尺度'];
      if (ld) {
        ld.firstChild.nodeValue = icons[level] || '🛰️';
        const lt = document.getElementById('lodText');
        if (lt) lt.textContent = names[level] || '';
      }
    }
    window.__CELL_applyLOD = applyLOD; // exposed for later script blocks if needed
    window.__CELL_resetLOD = function () {
      currentLOD = -1;                            // force re-apply next frame
      for (const it of lodObjects) it._centerValid = false; // recompute proximity centers
      // shell-fade proximity centers also move when the layout changes
      if (window.__CELL_resetShellFades) window.__CELL_resetShellFades();
    };

    // ---- GPU buffer picking (click-only) ----
    // Each pickable organelle gets a unique flat color. On CLICK we render a
    // parallel "pick scene" (object geometry mirrored into solid-colored
    // meshes) to a tiny off-screen target under the cursor, then read back 1
    // pixel to know exactly which organelle is there — robust even with
    // overlapping translucent meshes where raycasting against transparency is
    // unreliable. No per-frame hover work, so it costs nothing while idle.
    const pickScene = new THREE.Scene();
    const pickColorToKey = new Map();   // "r,g,b" -> key
    const pickColorToObj = new Map();   // "r,g,b" -> the specific registered object
    let _pickIdCounter = 0;
    function nextPickColor(key, obj) {
      // encode a sequential id into RGB (avoids id 0 = background black)
      const id = ++_pickIdCounter;
      const r = (id >> 16) & 0xff, g = (id >> 8) & 0xff, b = id & 0xff;
      pickColorToKey.set(r + ',' + g + ',' + b, key);
      if (obj) pickColorToObj.set(r + ',' + g + ',' + b, obj);
      return new THREE.Color(r / 255, g / 255, b / 255);
    }
    function addPickProxy(obj, key) {
      const col = nextPickColor(key, obj);
      const pickMat = new THREE.MeshBasicMaterial({ color: col });
      // mirror every mesh under obj into the pick scene; the proxy meshes
      // share geometry and copy the source world matrix each frame.
      obj.traverse(o => {
        if (o.isMesh && o.geometry && !o.userData._noPick) {
          const proxy = new THREE.Mesh(o.geometry, pickMat);
          proxy.matrixAutoUpdate = false;
          proxy.userData._src = o;       // remember source for per-frame sync
          proxy.userData._owner = obj;    // for visibility toggling
          // a proxy inherits the "shell" flag from its source mesh: enveloping
          // outer shells (e.g. the nuclear envelope) must stop blocking the
          // interior structures once the camera has zoomed inside.
          proxy.userData._shell = !!o.userData._shell;
          pickScene.add(proxy);
        }
      });
    }

    // ---- Distance-based shell fade (un-obstruct the interior) ----
    // Enveloping membrane shells (the plasma membrane, the nuclear envelope,
    // mitochondria, the ER/Golgi/vacuole/vesicle membranes, …) block the view
    // of the structures INSIDE them when you zoom in. Instead of a hard cut we
    // smoothly fade a shell's opacity toward (near) zero as the camera
    // approaches THAT shell, and restore it once you pull back — so the far
    // silhouette is intact but the interior is revealed up close.
    //
    // Two registration modes:
    //   • DISTANCE mode (registerFadeShell): fades by camera distance to the
    //     orbit (the big outermost membrane / soma use this).
    //   • PROXIMITY mode (auto via markShell): fades by camera distance to the
    //     shell's OWN world center, with thresholds scaled by the shell's
    //     radius. This is what un-obstructs every interior organelle membrane.
    const fadeShells = []; // { mesh, baseOpacity, minOpacity, near, far, proximity, _center, _centerValid }
    function registerFadeShell(mesh, opts) {
      if (!mesh || !mesh.material) return mesh;
      opts = opts || {};
      mesh.material.transparent = true;
      fadeShells.push({
        mesh,
        baseOpacity: (opts.baseOpacity != null) ? opts.baseOpacity : (mesh.material.opacity || 0.14),
        minOpacity: (opts.minOpacity != null) ? opts.minOpacity : 0.0,
        near: (opts.near != null) ? opts.near : 14,   // fully faded at/under this distance
        far:  (opts.far  != null) ? opts.far  : 30,   // fully opaque at/over this distance
        proximity: !!opts.proximity,
        _center: new THREE.Vector3(),
        _centerValid: false
      });
      return mesh;
    }
    window.__CELL_registerFadeShell = registerFadeShell;

    // Mark a mesh as a translucent "enveloping shell". When the camera is
    // zoomed inside (LOD >= 2) these shells are excluded from GPU picking so
    // their solid front face stops covering the organelles they enclose. The
    // shell itself is still clickable when viewed from a distance, and always
    // selectable via the bottom nav chips.
    //
    // It also auto-registers a PROXIMITY fade keyed off the shell's own size,
    // so any interior organelle membrane dissolves when you zoom into it and
    // reappears when you back away. Pass {fade:false} to opt a shell out of
    // fading (e.g. a tiny rigid capsule where fading would look odd).
    function markShell(meshOrGroup, opts) {
      if (!meshOrGroup) return meshOrGroup;
      meshOrGroup.traverse(o => { if (o.isMesh) o.userData._shell = true; });
      if (meshOrGroup.isMesh) meshOrGroup.userData._shell = true;
      opts = opts || {};
      if (opts.fade !== false && meshOrGroup.isMesh && meshOrGroup.material) {
        // estimate the shell radius from its geometry so the fade thresholds
        // scale with the organelle's size (a 1µm vesicle vs an 18-unit cell).
        let r = opts.radius;
        if (r == null) {
          const gp = meshOrGroup.geometry && meshOrGroup.geometry.parameters;
          if (gp && gp.radius != null) r = gp.radius;
          else { meshOrGroup.geometry && meshOrGroup.geometry.computeBoundingSphere(); r = (meshOrGroup.geometry && meshOrGroup.geometry.boundingSphere) ? meshOrGroup.geometry.boundingSphere.radius : 2; }
        }
        registerFadeShell(meshOrGroup, {
          baseOpacity: meshOrGroup.material.opacity,
          minOpacity: opts.minOpacity != null ? opts.minOpacity : 0.0,
          proximity: true,
          // start fading once the camera is within ~2.4× the radius; fully gone
          // by ~0.9× the radius (i.e. when you are basically inside it).
          far: (opts.far != null) ? opts.far : r * 2.4 + 4,
          near: (opts.near != null) ? opts.near : r * 0.9 + 1.5
        });
      }
      return meshOrGroup;
    }

    function updateShellFades(dist) {
      let changed = false;
      const camPos = camera.position;
      for (const f of fadeShells) {
        let metric;
        if (f.proximity) {
          if (!f._centerValid) {
            f.mesh.updateWorldMatrix(true, false);
            f._center.setFromMatrixPosition(f.mesh.matrixWorld);
            f._centerValid = true;
          }
          metric = camPos.distanceTo(f._center);
        } else {
          metric = dist;
        }
        // 0 at/under near → 1 at/over far (smoothstep for a gentle ramp)
        let t = (metric - f.near) / Math.max(0.001, (f.far - f.near));
        t = Math.max(0, Math.min(1, t));
        t = t * t * (3 - 2 * t);
        const op = f.minOpacity + (f.baseOpacity - f.minOpacity) * t;
        if (Math.abs(f.mesh.material.opacity - op) > 0.002) {
          f.mesh.material.opacity = op;
          // hide entirely when essentially invisible so it never blocks picking
          const vis = op > 0.01;
          if (f.mesh.visible !== vis) f.mesh.visible = vis;
          changed = true;
        }
      }
      if (changed && window.__CELL_requestRender) window.__CELL_requestRender();
    }
    window.__CELL_updateShellFades = updateShellFades;
    // invalidate cached proximity centers after a layout change (cell switch)
    window.__CELL_resetShellFades = function () { for (const f of fadeShells) f._centerValid = false; };

    // Large enveloping shells must NOT be pickable: their solid front face
    // would otherwise win every readback and block the interior organelles.
    // The cell wall in particular should never be picked. These shells are
    // still selectable via the bottom nav chips.
    const PICK_SKIP = new Set(['membrane', 'cytoplasm', 'cellwall']);

    function register(obj, key, withLabel) {
      obj.traverse(o => { if (o.isMesh) { o.userData.key = key; } });
      obj.userData.key = key;
      pickables.push(obj);
      if (!PICK_SKIP.has(key)) addPickProxy(obj, key);
      if (withLabel && CFG.showLabels && D[key]) {
        const el = document.createElement('div');
        el.className = 'label3d';
        el.textContent = D[key].emoji + ' ' + D[key].name;
        // anchor at the layer origin; actual position is driven entirely by
        // an interpolated translate3d transform each frame.
        el.style.position = 'absolute';
        el.style.left = '0';
        el.style.top = '0';
        el.style.willChange = 'transform';
        // Clicking a label centers the camera on this exact structure and
        // selects it (same behavior as clicking the structure or a nav chip).
        el.addEventListener('click', (ev) => {
          ev.stopPropagation();
          controls.autoRotate = false;
          showInfo(key);
          focusOn(key, obj);
        });
        labelLayer.appendChild(el);
        // Capture a STABLE local-space anchor once (the object's own center),
        // so the label tracks a fixed point rather than a per-frame bounding
        // box that wobbles when child meshes spin/animate. We project this
        // anchor through the object's world matrix each frame.
        const _box = new THREE.Box3().setFromObject(obj);
        const _worldCenter = new THREE.Vector3();
        _box.getCenter(_worldCenter);
        // convert world center to the object's local space so it stays fixed
        // relative to the (possibly moving) parent group
        obj.updateWorldMatrix(true, false);
        const anchorLocal = obj.worldToLocal(_worldCenter.clone());
        // sx/sy = current (interpolated) screen position; tx/ty = target;
        // init=false until the first valid projection so we snap on appear
        // instead of sliding in from (0,0).
        labels.push({ el, obj, key, anchorLocal, sx: 0, sy: 0, init: false });
      }
      return obj;
    }

    // ---------------- Cell membrane (Iteration 1) ----------------
    const CELL_R = 18;
    let membrane;
    function buildMembrane() {
      const geo = new THREE.SphereGeometry(CELL_R, 64, 48);
      const mat = new THREE.MeshPhysicalMaterial({
        color: 0x6fb6ff, transparent: true, opacity: 0.14,
        roughness: 0.15, metalness: 0.0, transmission: 0.6,
        side: THREE.DoubleSide, depthWrite: false
      });
      membrane = new THREE.Mesh(geo, mat);
      register(membrane, 'membrane', false);
      cell.add(membrane);
      // fade the membrane out as the camera moves in so it never blocks the
      // interior; it returns for the far overview silhouette.
      registerFadeShell(membrane, { baseOpacity: 0.14, minOpacity: 0.0, near: 14, far: 30 });

      // phospholipid bilayer hint: a slightly larger faint shell wireframe
      // (mid+ detail)
      const wire = new THREE.Mesh(
        new THREE.SphereGeometry(CELL_R + 0.25, 32, 24),
        new THREE.MeshBasicMaterial({ color: 0x4488dd, wireframe: true, transparent: true, opacity: 0.06 })
      );
      cell.add(wire);
      registerLOD(wire, 1);

      // surface proteins dotted on the membrane (the yellow spheres) —
      // registered so they are clickable and have an info entry.
      const protMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, emissive: 0x553300, roughness: 0.4 });
      const protGeo = new THREE.SphereGeometry(0.5, 10, 10);
      const protGroup = new THREE.Group();
      for (let i = 0; i < 60; i++) {
        const m = new THREE.Mesh(protGeo, protMat);
        const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
        // seat them right on the membrane shell (slightly embedded)
        const pr = CELL_R - 0.15;
        m.position.set(pr * Math.sin(ph) * Math.cos(th), pr * Math.sin(ph) * Math.sin(th), pr * Math.cos(ph));
        protGroup.add(m);
      }
      register(protGroup, 'membrane_protein', false);
      cell.add(protGroup);

      // CLOSE-UP detail: a dense phospholipid bilayer point cloud (two
      // concentric shells = the hydrophilic head rows) — only at LOD 2.
      const headGeo = new THREE.SphereGeometry(0.16, 6, 6);
      const headMat = new THREE.MeshStandardMaterial({ color: 0x9fd0ff, emissive: 0x12304f, roughness: 0.5 });
      const bilayer = new THREE.Group();
      [CELL_R - 0.55, CELL_R + 0.25].forEach(shellR => {
        for (let i = 0; i < 420; i++) {
          const h = new THREE.Mesh(headGeo, headMat);
          const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
          h.position.set(shellR * Math.sin(ph) * Math.cos(th), shellR * Math.sin(ph) * Math.sin(th), shellR * Math.cos(ph));
          bilayer.add(h);
        }
      });
      bilayer.visible = false;
      cell.add(bilayer);
      registerLOD(bilayer, 2);

      // ===== MOLECULAR-SCALE MEMBRANE CUTAWAY (fluid mosaic model) =====
      // A flat, textbook-style patch of the plasma membrane tangent to the
      // cell surface, showing the phospholipid BILAYER in full molecular
      // detail: two rows of hydrophilic phosphate "heads" (spheres) with their
      // hydrophobic fatty-acid "tails" (wavy chains) facing inward, plus an
      // integral transmembrane protein, a channel protein, a cholesterol
      // molecule wedged between the tails, and a surface glycoprotein sugar
      // chain. Clickable, with its own knowledge entry. Only shown at the
      // molecular LOD (level 3) and only when you are close to this patch.
      buildBilayerCutaway();
    }

    // Build the detailed molecular bilayer patch. Kept as its own function so
    // the close-up model is easy to find / extend.
    function buildBilayerCutaway() {
      const g = new THREE.Group();
      // seat the patch on the membrane surface (front of the cell, +Z) and
      // orient it so the bilayer "thickness" axis points radially outward.
      const surfDir = new THREE.Vector3(0.25, 0.15, 1).normalize();
      g.position.copy(surfDir.clone().multiplyScalar(CELL_R + 0.1));
      g.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), surfDir);

      const HALF = 0.95;        // half the bilayer thickness (head-row offset)
      const PATCH = 7;          // patch half-width in X/Y (local plane)
      const STEP = 0.85;        // spacing between phospholipids
      const headOutMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, emissive: 0x4a3000, roughness: 0.45 }); // outer leaflet heads (gold)
      const headInMat  = new THREE.MeshStandardMaterial({ color: 0x6fc0ff, emissive: 0x123a55, roughness: 0.45 }); // inner leaflet heads (blue)
      const tailMat    = new THREE.MeshStandardMaterial({ color: 0xe8e2c0, roughness: 0.7 });                       // fatty-acid tails (cream)
      const headGeoBig = new THREE.SphereGeometry(0.3, 12, 10);

      // a single phospholipid = one head sphere + two zig-zag fatty-acid tails
      function phospholipid(leaflet) {
        const p = new THREE.Group();
        const headMat = leaflet > 0 ? headOutMat : headInMat;
        const head = new THREE.Mesh(headGeoBig, headMat);
        head.position.z = leaflet * HALF;
        p.add(head);
        // two tails pointing toward the bilayer midplane (z = 0)
        for (let t = 0; t < 2; t++) {
          const ox = (t === 0 ? -0.12 : 0.12);
          const pts = [];
          const segs = 5;
          for (let s = 0; s <= segs; s++) {
            const f = s / segs;                       // 0 at head, 1 at midplane
            const z = leaflet * (HALF - 0.32) * (1 - f); // stop short of z=0
            const wob = Math.sin(f * Math.PI * 2 + t) * 0.07;
            pts.push(new THREE.Vector3(ox + wob, wob * 0.5, z));
          }
          const curve = new THREE.CatmullRomCurve3(pts);
          p.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 12, 0.05, 5, false), tailMat));
        }
        return p;
      }

      // lay out a grid of phospholipids for both leaflets, leaving a gap where
      // the integral protein sits so it reads clearly.
      const protGapX = 0, protGapY = 0, protGapR = 1.3;
      for (let x = -PATCH; x <= PATCH; x += STEP) {
        for (let y = -PATCH; y <= PATCH; y += STEP) {
          // round patch (looks like a disc cut from the membrane)
          if (x * x + y * y > PATCH * PATCH) continue;
          const inGap = ((x - protGapX) ** 2 + (y - protGapY) ** 2) < protGapR * protGapR;
          if (inGap) continue;
          for (const leaflet of [1, -1]) {
            const pl = phospholipid(leaflet);
            pl.position.set(x + (Math.random() - 0.5) * 0.12, y + (Math.random() - 0.5) * 0.12, 0);
            g.add(pl);
          }
        }
      }

      // ---- integral (transmembrane) protein spanning the bilayer ----
      const protMat = new THREE.MeshStandardMaterial({ color: 0xb98cff, emissive: 0x2c1456, roughness: 0.5 });
      const integral = new THREE.Mesh(new THREE.CylinderGeometry(0.95, 1.05, HALF * 2 + 0.7, 18), protMat);
      integral.rotation.x = Math.PI / 2; // align cylinder axis (Y) to membrane normal (Z)
      g.add(integral);

      // ---- channel protein (with a central pore) a bit to the side ----
      const channelMat = new THREE.MeshStandardMaterial({ color: 0x57e0c0, emissive: 0x0a4a3c, roughness: 0.5 });
      const channel = new THREE.Group(); channel.position.set(3.2, 1.0, 0);
      const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, HALF * 2 + 0.6, 18, 1, true), channelMat);
      ring.rotation.x = Math.PI / 2; channel.add(ring);
      // pore highlight
      const pore = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, HALF * 2 + 0.8, 12, 1, true), new THREE.MeshBasicMaterial({ color: 0x103040, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
      pore.rotation.x = Math.PI / 2; channel.add(pore);
      g.add(channel);

      // ---- cholesterol molecule wedged between the tails ----
      const cholMat = new THREE.MeshStandardMaterial({ color: 0xff8f6f, emissive: 0x4a1a0c, roughness: 0.5 });

      if (cameraDirty) {
        applyLOD(lodForDistance(controls.dist));
        if (CFG.showLabels) updateLabels(dt, true);
        cameraDirty = false;
      } else if (CFG.showLabels && labelsEasing) {
        // even with a static camera, labels may still be easing toward their
        // last target for a frame or two — finish the glide, then stop.
        updateLabels(dt, false);
      }

      // Continuous per-organelle / micro animations. These return true when
      // they moved at least one VISIBLE object, in which case we must redraw.
      if (window.__animateOrganelles) {
        const moved = window.__animateOrganelles(dt, clock.elapsedTime);
        if (moved) needsRender = true;
      }

      // Render only when something changed (camera moved, animation ran, or a
      // visibility/LOD toggle requested it). Warm-up frames always draw.
      if (needsRender || renderSettleFrames > 0) {
        renderer.render(scene, camera);
        needsRender = false;
        if (renderSettleFrames > 0) renderSettleFrames--;
      }
    }

    // ---------------- Boot ----------------
    function finishBoot() {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 500);
      const hint = document.getElementById('hint');
      setTimeout(() => { hint.style.opacity = '0'; }, 6000);
      try { window.parent.postMessage({ type: 'gameLoaded' }, '*'); } catch (e) {}
    }
    window.__CELL.finishBoot = finishBoot;
    window.__CELL.animate = animate;
    window.__CELL.controls = controls;
    window.__CELL.applyCameraImmediate = applyCamera;

    // start the loop now; organelles get added by later script blocks then call buildNavbar + finishBoot
    animate();
  })();

    // ============================================================
    // 1. SOMA (cell body) — translucent membrane shell + cytoplasm
    // ============================================================
    (function soma() {

    // Build a molecular phospholipid-bilayer patch tangent to the soma surface.
    function buildSomaBilayer() {
      const g = new THREE.Group();
      const surfDir = new THREE.Vector3(0.2, 0.55, 0.81).normalize();
      g.position.copy(SOMA_C).add(surfDir.clone().multiplyScalar(SOMA_R + 0.1));

        if (x * x + y * y > PATCH * PATCH) continue;
        if (x * x + y * y < gapR * gapR) continue;

    (function nissl() {

    (function organelles() {

      for (let i = 0; i < 5; i++) { const disc = new THREE.Mesh(new THREE.TorusGeometry(1.1 - i*0.12, 0.28, 8, 24, Math.PI*1.4), gMat); disc.position.y = i*0.5 - 1; disc.rotation.x = Math.PI/2; disc.rotation.z = i*0.05; gg.add(disc); }

    // ============================================================
    // 5. DENDRITES — branching processes from the soma

    // ============================================================
    const dendriteTips = [];
    (function dendrites() {
      const g = new THREE.Group();          // dendrite tubes (registered as 'dendrite')
      const mat = new THREE.MeshPhysicalMaterial({ color: 0xa79bff, transparent: true, opacity: 0.55, roughness: 0.4, side: THREE.DoubleSide });
      const headMatBase = new THREE.MeshStandardMaterial({ color: 0xc9b8ff, emissive: 0x2a1f5a, roughness: 0.5 });
      const neckMat = new THREE.MeshStandardMaterial({ color: 0xb6a6ff, emissive: 0x241a4a, roughness: 0.5 });

      function makeSpine(p, off, rad) {
        const sp = new THREE.Group();
        const dir = off.clone().normalize();
        // -- visible-at-distance shape: mushroom (neck + head) --
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.3, 6), neckMat);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 10), headMatBase.clone());
        neck.position.copy(p).add(dir.clone().multiplyScalar(rad + 0.15));
        head.position.copy(p).add(dir.clone().multiplyScalar(rad + 0.45));

        const detail = new THREE.Group();
        detail.position.copy(head.position);
        // CylinderGeometry's axis is +Y, so align +Y to `dir` (the outward
        // direction facing the synaptic cleft) for a correctly-capped PSD and
        // outward-pointing receptor channels.
        const yAxis = new THREE.Vector3(0, 1, 0);
        const qDir = new THREE.Quaternion().setFromUnitVectors(yAxis, dir);
        // tangent axes for spreading receptors across the flat PSD plane
        let t1 = new THREE.Vector3().crossVectors(dir, yAxis);
        if (t1.lengthSq() < 1e-6) t1.set(1, 0, 0); // dir parallel to Y → pick X
        t1.normalize();
        const t2 = new THREE.Vector3().crossVectors(dir, t1).normalize();

        // postsynaptic density (PSD): a flat disc capping the head's outer face,
        // its flat side facing the cleft.
        const psd = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.04, 16), psdMat);
        psd.position.copy(dir.clone().multiplyScalar(0.15));
        psd.quaternion.copy(qDir);
        detail.add(psd);
        // receptor channels embedded in the PSD, pointing OUTWARD along `dir`
        // (toward the cleft), spread across the disc face.
        for (let r = 0; r < 9; r++) {
          const a = r / 9 * Math.PI * 2, rr = 0.04 + Math.random() * 0.09;
          const rec = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.025, 0.09, 6), recMat);
          // seat the receptor so it straddles the PSD disc and protrudes out
          const base = dir.clone().multiplyScalar(0.17);
          rec.position.copy(base).addScaledVector(t1, Math.cos(a) * rr).addScaledVector(t2, Math.sin(a) * rr);
          rec.quaternion.copy(qDir);
          detail.add(rec);
        }

        for (let f = 0; f < 6; f++) {
          const a1 = new THREE.Vector3((Math.random()-0.5)*0.22, (Math.random()-0.5)*0.22, (Math.random()-0.5)*0.22);
          const a2 = new THREE.Vector3((Math.random()-0.5)*0.22, (Math.random()-0.5)*0.22, (Math.random()-0.5)*0.22);
          const fc = new THREE.CatmullRomCurve3([a1, a1.clone().lerp(a2,0.5).add(new THREE.Vector3((Math.random()-0.5)*0.1,(Math.random()-0.5)*0.1,(Math.random()-0.5)*0.1)), a2]);
          detail.add(new THREE.Mesh(new THREE.TubeGeometry(fc, 6, 0.012, 4, false), actinMat));
        }

        detail.traverse(o => { if (o.isMesh) o.userData._noPick = true; });
        sp.add(detail);
        registerLOD(detail, 3);   // only show the molecular interior when really close
        sp.userData._spineHead = head;
        sp.userData._spineDetail = detail;
        return sp;
      }

      const dirs = [ new THREE.Vector3(-1, 0.6, 0.3), new THREE.Vector3(-1, -0.7, -0.4), new THREE.Vector3(-0.6, 1, -0.5), new THREE.Vector3(-0.7, -0.4, 0.9), new THREE.Vector3(-0.3, 1.1, 0.6) ];
      function grow(start, dir, len, rad, depth) {
        const end = start.clone().add(dir.clone().normalize().multiplyScalar(len)).add(new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2));
        const mid = start.clone().lerp(end, 0.5).add(new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2));
        const curve = new THREE.CatmullRomCurve3([start, mid, end]);
        const tube = new THREE.Mesh(new THREE.TubeGeometry(curve, 24, rad, 8, false), mat);
        g.add(tube);
        // dendritic spines along this segment — each is its own clickable object
        for (let i = 0; i < 8; i++) {
