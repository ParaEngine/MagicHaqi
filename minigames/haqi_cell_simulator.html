              desc: '这是该树突上的第 ' + idx + ' 个树突棘——一个独立的兴奋性突触接收单元。镜头已对准它，靠近可看到内部分子结构。',
              facts: [
                '蘑菇状：细颈 + 膨大头部',
                '头部含突触后致密区 PSD（粉色盘）',
                'PSD 上密布 AMPA / NMDA 受体（蓝色通道）',
                '内部由肌动蛋白（绿色丝）支撑塑形',
                '其大小随学习记忆动态变化（突触可塑性）'
              ]
            }, 'dendritic_spine');
          };
          allSpines.push(sp);
          neuron.add(sp);
          // spines never move → freeze their matrices (huge win at high counts)
          if (freezeStatic) freezeStatic(sp);
        }
        dendriteTips.push(end.clone());
        if (depth > 0 && len > 3) {
          grow(end, dir.clone().applyAxisAngle(new THREE.Vector3(0,0,1), 0.6), len*0.6, rad*0.7, depth-1);
          grow(end, dir.clone().applyAxisAngle(new THREE.Vector3(0,0,1), -0.6), len*0.6, rad*0.7, depth-1);
        }
      }
      dirs.forEach(d => grow(SOMA_C.clone().add(d.clone().normalize().multiplyScalar(SOMA_R-1)), d, 9, 0.8, 2));

      register(g, 'dendrite', true);
      neuron.add(g);
    })();

    // ============================================================
    // 6. AXON HILLOCK + AXON + MYELIN SHEATH + NODES OF RANVIER
    // ============================================================
    const axonStart = SOMA_C.clone().add(new THREE.Vector3(SOMA_R - 1, 0, 0));
    (function axon() {
      // axon hillock — cone where soma meets axon
      const hill = new THREE.Group();
      const hillMat = new THREE.MeshPhysicalMaterial({ color: 0xb0a3ff, transparent: true, opacity: 0.6, roughness: 0.4, side: THREE.DoubleSide });
      const cone = new THREE.Mesh(new THREE.ConeGeometry(1.6, 2.2, 20, 1, true), hillMat);
      cone.position.copy(axonStart).add(new THREE.Vector3(-0.6, 0, 0));
      cone.rotation.z = -Math.PI/2;
      hill.add(cone);
      register(hill, 'axon_hillock', true);
      neuron.add(hill);

      // main axon tube (straight along +X)
      const axonMat = new THREE.MeshPhysicalMaterial({ color: 0x8b9bff, transparent: true, opacity: 0.7, roughness: 0.4, side: THREE.DoubleSide });
      const axonCurve = new THREE.CatmullRomCurve3([axonStart, axonStart.clone().lerp(AXON_END, 0.5).add(new THREE.Vector3(0, 1.5, 0)), AXON_END]);
      const axonTube = new THREE.Mesh(new THREE.TubeGeometry(axonCurve, 80, 0.55, 10, false), axonMat);
      const axonGrp = new THREE.Group(); axonGrp.add(axonTube);
      register(axonGrp, 'axon', true);
      neuron.add(axonGrp);
      C._axonCurve = axonCurve;

      // myelin sheath segments wrapping the axon, with gaps = nodes of Ranvier
      const myelinMat = new THREE.MeshPhysicalMaterial({ color: 0xf2e9c0, transparent: true, opacity: 0.85, roughness: 0.5, side: THREE.DoubleSide });
      const myelinGrp = new THREE.Group();
      const nodeGrp = new THREE.Group();
      const nodeMat = new THREE.MeshStandardMaterial({ color: 0x6fd0ff, emissive: 0x123a55, roughness: 0.5 });
      const segs = 7;
      for (let s = 0; s < segs; s++) {
        const t0 = 0.12 + s * (0.86 / segs);
        const t1 = t0 + (0.86 / segs) * 0.8; // 80% wrapped, 20% gap (node)
        const pts = [];
        const steps = 10;
        for (let i = 0; i <= steps; i++) pts.push(axonCurve.getPoint(t0 + (t1 - t0) * i / steps));
        const segCurve = new THREE.CatmullRomCurve3(pts);
        const wrap = new THREE.Mesh(new THREE.TubeGeometry(segCurve, 16, 1.05, 14, false), myelinMat);
        myelinGrp.add(wrap);
        // node of Ranvier marker (the gap before next segment): a small bright ring
        const nodeP = axonCurve.getPoint(t1 + 0.005);
        const ring = new THREE.Mesh(new THREE.SphereGeometry(0.62, 12, 8), nodeMat);
        ring.position.copy(nodeP);
        nodeGrp.add(ring);
      }
      register(myelinGrp, 'myelin_sheath', true);
      neuron.add(myelinGrp);
      register(nodeGrp, 'node_ranvier', true);
      neuron.add(nodeGrp);
    })();

    // ============================================================
    // 7. NEUROFILAMENTS + AXONAL MICROTUBULES inside the axon (LOD 2+)
    // ============================================================
    (function axonalCytoskeleton() {
      const axonCurve = C._axonCurve;
      const nfMat = new THREE.MeshStandardMaterial({ color: 0x8affe0, transparent: true, opacity: 0.6, roughness: 0.6 });
      const mtMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, transparent: true, opacity: 0.7, roughness: 0.5 });
      // a few parallel threads following the axon, offset radially
      const nfGrp = new THREE.Group();
      const mtGrp = new THREE.Group();
      for (let k = 0; k < 5; k++) {
        const ang = k / 5 * Math.PI * 2, off = 0.28;
        const pts = [];
        for (let i = 0; i <= 40; i++) {
          const t = 0.1 + i / 40 * 0.85;
          const p = axonCurve.getPoint(t);
          pts.push(p.clone().add(new THREE.Vector3(0, Math.cos(ang)*off, Math.sin(ang)*off)));
        }
        const curve = new THREE.CatmullRomCurve3(pts);
        nfGrp.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 60, 0.04, 5, false), nfMat));
      }
      for (let k = 0; k < 3; k++) {
        const ang = k / 3 * Math.PI * 2, off = 0.12;
        const pts = [];
        for (let i = 0; i <= 40; i++) { const t = 0.1 + i/40*0.85; const p = axonCurve.getPoint(t); pts.push(p.clone().add(new THREE.Vector3(0, Math.cos(ang)*off, Math.sin(ang)*off))); }
        const curve = new THREE.CatmullRomCurve3(pts);
        mtGrp.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 60, 0.07, 6, false), mtMat));
      }
      register(nfGrp, 'neurofilament', false); neuron.add(nfGrp); registerLOD(nfGrp, 2);
      register(mtGrp, 'axon_microtubule', false); neuron.add(mtGrp); registerLOD(mtGrp, 2);

      // motor-cargo (vesicles riding the microtubule tracks) — LOD 3 + animated
      const cargoMat = new THREE.MeshStandardMaterial({ color: 0xffe9a8, emissive: 0x4a3000, roughness: 0.5 });
      const cargo = [];
      const cargoGrp = new THREE.Group();
      for (let i = 0; i < 8; i++) {
        const v = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 8), cargoMat);
        cargoGrp.add(v);
        cargo.push({ v, t: Math.random(), speed: 0.05 + Math.random()*0.05, dir: Math.random()<0.5?1:-1 });
      }
      neuron.add(cargoGrp); registerLOD(cargoGrp, 3);
      const _ev = window.__CELL_effVisible || (o => o.visible);
      neuronAnims.push((dt) => {
        if (!_ev(cargoGrp)) return false;   // only animate when actually shown
        for (const cgo of cargo) {
          cgo.t += dt * cgo.speed * cgo.dir;
          if (cgo.t > 0.95) cgo.t = 0.1; if (cgo.t < 0.1) cgo.t = 0.95;
          cgo.v.position.copy(axonCurve.getPoint(cgo.t));
        }
        return true;
      });
    })();

    // ============================================================
    // 8. SYNAPTIC TERMINAL — axon terminal + vesicles + cleft + receptors
    //    plus the molecular machinery (Na/K channels, pumps, neurotransmitters)
    // ============================================================
    (function synapse() {
      const term = new THREE.Group(); term.position.copy(AXON_END);
      // presynaptic terminal bouton
      const boutonMat = new THREE.MeshPhysicalMaterial({ color: 0x8b9bff, transparent: true, opacity: 0.5, roughness: 0.4, side: THREE.DoubleSide });
      const bouton = new THREE.Mesh(new THREE.SphereGeometry(2.4, 32, 24), boutonMat);
      markShell(bouton);
      term.add(bouton);
      register(term, 'synapse', true);
      neuron.add(term);

      // synaptic vesicles inside the bouton (LOD 1+) — some animated toward the membrane
      const vesMat = new THREE.MeshStandardMaterial({ color: 0x6fa8ff, emissive: 0x12305a, roughness: 0.5 });
      const vesGrp = new THREE.Group(); vesGrp.position.copy(AXON_END);
      const releasing = [];
      for (let i = 0; i < 28; i++) {
        const v = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8), vesMat);
        v.position.set((Math.random()-0.5)*2.6, (Math.random()-0.5)*2.6, (Math.random()-0.5)*2.6);
        vesGrp.add(v);
        if (i < 4) releasing.push({ v, base: v.position.clone(), phase: Math.random()*Math.PI*2 });
      }
      register(vesGrp, 'synaptic_vesicle', true); neuron.add(vesGrp); registerLOD(vesGrp, 1);

      // synaptic cleft + neurotransmitter molecules crossing it (LOD 2+, animated)
      const cleftFront = AXON_END.clone().add(new THREE.Vector3(2.6, 0, 0));   // presyn membrane
      const postFace   = AXON_END.clone().add(new THREE.Vector3(4.4, 0, 0));   // postsyn membrane
      const ntMat = new THREE.MeshStandardMaterial({ color: 0xffe066, emissive: 0x5a4a00, roughness: 0.4 });
      const ntGrp = new THREE.Group();
      const nts = [];
      for (let i = 0; i < 30; i++) {
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), ntMat);
        ntGrp.add(m);
        nts.push({ m, t: Math.random(), y: (Math.random()-0.5)*2.6, z: (Math.random()-0.5)*2.6, speed: 0.2 + Math.random()*0.4 });
      }
      register(ntGrp, 'neurotransmitter', true); neuron.add(ntGrp); registerLOD(ntGrp, 2);

      // postsynaptic membrane patch + receptors
      // Kept as ONE compact representative receiving patch. The axon-terminal
      // arbor below now adds multiple small receiving patches, so this older
      // synapse patch should not read as one giant target cell/disc.
      const postGrp = new THREE.Group(); postGrp.position.copy(postFace);
      const postMembMat = new THREE.MeshPhysicalMaterial({ color: 0xff9bd0, transparent: true, opacity: 0.18, roughness: 0.4, side: THREE.DoubleSide });
      const postMemb = new THREE.Mesh(new THREE.CylinderGeometry(0.95, 0.95, 0.16, 24), postMembMat);
      postMemb.rotation.z = Math.PI/2; postGrp.add(postMemb);
      const recMat = new THREE.MeshStandardMaterial({ color: 0xff5fa2, emissive: 0x5a1030, roughness: 0.5 });
      const recGrp = new THREE.Group();
      for (let i = 0; i < 10; i++) {
        const r = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.28, 8), recMat);
        const a = Math.random()*Math.PI*2, rr = Math.random()*0.75;
        r.position.set(0.2, Math.cos(a)*rr, Math.sin(a)*rr); r.rotation.z = Math.PI/2;
        recGrp.add(r);
      }
      postGrp.add(recGrp);
      register(postGrp, 'receptor', true); neuron.add(postGrp);

      // ---- membrane channel/pump proteins on the presynaptic bouton surface ----
      // Voltage-gated Na+ channels (green), K+ channels (blue), Na/K pumps (orange)
      function channelMesh(color, emissive) {
        const m = new THREE.Group();
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.3, 0.7, 8), new THREE.MeshStandardMaterial({ color, emissive, roughness: 0.45 }));
        m.add(barrel);
        return m;
      }
      const naGrp = new THREE.Group(), kGrp = new THREE.Group(), pumpGrp = new THREE.Group();
      for (let i = 0; i < 14; i++) {
        const dir = onSphere(1).normalize();
        const seat = dir.clone().multiplyScalar(2.4);
        function place(grp, col, emi) { const c = channelMesh(col, emi); c.position.copy(AXON_END).add(seat); c.lookAt(AXON_END); c.rotateX(Math.PI/2); grp.add(c); }
        place(naGrp, 0x3ddc6e, 0x0a4a22);
      }
      for (let i = 0; i < 14; i++) { const dir = onSphere(1).normalize(); const seat = dir.clone().multiplyScalar(2.4); const c = channelMesh(0x4f9bff, 0x0a2a5a); c.position.copy(AXON_END).add(seat); c.lookAt(AXON_END); c.rotateX(Math.PI/2); kGrp.add(c); }
      for (let i = 0; i < 10; i++) { const dir = onSphere(1).normalize(); const seat = dir.clone().multiplyScalar(2.4); const c = channelMesh(0xff9b4f, 0x5a2a00); c.scale.set(1.3,1.3,1.3); c.position.copy(AXON_END).add(seat); c.lookAt(AXON_END); c.rotateX(Math.PI/2); pumpGrp.add(c); }
      register(naGrp, 'sodium_channel', true); neuron.add(naGrp); registerLOD(naGrp, 1);
      register(kGrp, 'potassium_channel', true); neuron.add(kGrp); registerLOD(kGrp, 1);
      register(pumpGrp, 'sodium_potassium_pump', true); neuron.add(pumpGrp); registerLOD(pumpGrp, 1);

      // animations: vesicles bobbing toward membrane, neurotransmitters crossing cleft
      const _ev = window.__CELL_effVisible || (o => o.visible);
      neuronAnims.push((dt, t) => {
        let moved = false;
        if (_ev(vesGrp)) { for (const r of releasing) { r.phase += dt * 1.5; const k = (Math.sin(r.phase)*0.5+0.5); r.v.position.copy(r.base).lerp(new THREE.Vector3(2.4,0,0), k*0.4); } moved = true; }
        if (_ev(ntGrp)) {
          for (const nt of nts) {
            nt.t += dt * nt.speed; if (nt.t > 1) nt.t -= 1;
            nt.m.position.copy(cleftFront).lerp(postFace, nt.t);
            nt.m.position.y += nt.y * 0.4; nt.m.position.z += nt.z * 0.4;
          }
          moved = true;
        }
        return moved;
      });
    })();

    // ---- re-apply current cell type now that the neuron exists, so the
    //      neuron group gets correct initial visibility + LOD evaluation. ----
    if (C.applyCellType) C.applyCellType(window.game_config.cellType || 'animal');
    if (window.__CELL_resetLOD) window.__CELL_resetLOD();
  })();
  </script>

  <!-- ============================================================
       Iteration 6: 动物/通用细胞精细结构补充
       (cytoskeleton fibers, surface specializations, junctions,
        nuclear envelope detail, protein machines, RNA molecules)
       All parts live in the spherical `cell` group. Animal-only parts
       toggle via C.onCellType callbacks (hidden for plant cells).
       ============================================================ -->
  <script>
  (function () {
    const C = window.__CELL;
    const { THREE, cell, register, registerLOD, markShell, freezeStatic, CELL_R } = C;
    const spinners = C.spinners;
    C.onCellType = C.onCellType || [];

    const animalOnly = []; // parts hidden when the plant cell is shown
    const microAnims = [];
    const prevAnimate = window.__animateOrganelles;
    window.__animateOrganelles = function (dt, t) {
      let moved = prevAnimate ? !!prevAnimate(dt, t) : false;
      for (const fn of microAnims) { try { if (fn(dt, t)) moved = true; } catch (e) {} }
      return moved;
    };
    const _ev = window.__CELL_effVisible || (o => o.visible);
    function onSphere(r) {
      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
      return new THREE.Vector3(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
    }

    // 6.1 — CYTOSKELETON: three distinct fiber systems radiating in the cytosol
    //   microtubules (thick hollow tubes), microfilaments (thin actin),
    //   intermediate filaments (rope-like). Each is individually clickable.
    (function cytoskeletonFibers() {
      // microtubules — thick, straight-ish, from center outward (LOD 1+)
      const mtMat = new THREE.MeshStandardMaterial({ color: 0x6fd0ff, transparent: true, opacity: 0.6, roughness: 0.5 });
      const mtGrp = new THREE.Group();
      for (let i = 0; i < 16; i++) {
        const dir = onSphere(1).normalize();
        const a = dir.clone().multiplyScalar(2 + Math.random() * 2);
        const b = dir.clone().multiplyScalar(CELL_R - 2 - Math.random() * 3).add(new THREE.Vector3((Math.random()-0.5)*4,(Math.random()-0.5)*4,(Math.random()-0.5)*4));
        const mid = a.clone().lerp(b, 0.5).add(new THREE.Vector3((Math.random()-0.5)*2,(Math.random()-0.5)*2,(Math.random()-0.5)*2));
        const curve = new THREE.CatmullRomCurve3([a, mid, b]);
        mtGrp.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 24, 0.12, 8, false), mtMat));
        // protofilament beading hint (LOD 3)
        const beads = new THREE.Group();
        const bGeo = new THREE.SphereGeometry(0.09, 5, 5);
        const bMat = new THREE.MeshStandardMaterial({ color: 0xbfeeff, emissive: 0x123a4f, roughness: 0.5 });
        for (let k = 0; k <= 18; k++) { const bd = new THREE.Mesh(bGeo, bMat); bd.position.copy(curve.getPoint(k/18)); beads.add(bd); }
        beads.visible = false; mtGrp.add(beads); registerLOD(beads, 3);
      }
      register(mtGrp, 'microtubule', true); cell.add(mtGrp); registerLOD(mtGrp, 1); animalOnly.push(mtGrp);

      // microfilaments — thin actin meshwork near the cell cortex (LOD 2+)
      const mfMat = new THREE.MeshStandardMaterial({ color: 0x9fffc0, transparent: true, opacity: 0.7, roughness: 0.6 });
      const mfGrp = new THREE.Group();
      for (let i = 0; i < 40; i++) {
        const base = onSphere(CELL_R - 1.5);
        const tan = new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)).normalize().multiplyScalar(3 + Math.random()*3);
        const a = base.clone(); const b = base.clone().add(tan);
        const mid = a.clone().lerp(b,0.5).add(new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)));
        const curve = new THREE.CatmullRomCurve3([a, mid, b]);
        mfGrp.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 12, 0.04, 5, false), mfMat));
      }
      register(mfGrp, 'microfilament', false); cell.add(mfGrp); registerLOD(mfGrp, 2); animalOnly.push(mfGrp);

      // intermediate filaments — rope-like, longer wandering threads (LOD 2+)
      const ifMat = new THREE.MeshStandardMaterial({ color: 0xffc97a, transparent: true, opacity: 0.6, roughness: 0.7 });
      const ifGrp = new THREE.Group();
      for (let i = 0; i < 14; i++) {
        const pts = [];
        let p = onSphere(3 + Math.random()*4);
        for (let k = 0; k < 5; k++) { pts.push(p.clone()); p = p.clone().add(new THREE.Vector3((Math.random()-0.5)*5,(Math.random()-0.5)*5,(Math.random()-0.5)*5)); }
        const curve = new THREE.CatmullRomCurve3(pts);
        ifGrp.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 40, 0.06, 6, false), ifMat));
      }
      register(ifGrp, 'intermediate_filament', false); cell.add(ifGrp); registerLOD(ifGrp, 2); animalOnly.push(ifGrp);
      freezeStatic(mtGrp); freezeStatic(mfGrp); freezeStatic(ifGrp);
    })();

    // 6.2 — CENTROSOME (a pair of perpendicular centrioles + pericentriolar
    //   material) near the nucleus. Animal-only MTOC. (LOD 1+ for the 9x3 barrels)
    (function centrosome() {
      const g = new THREE.Group();
      g.position.set(-3.5, 3.5, 1.5);
      function centriole() {
        const c = new THREE.Group();
        const tubMat = new THREE.MeshStandardMaterial({ color: 0x9bd0ff, emissive: 0x12304f, roughness: 0.5 });
        // 9 triplet microtubules around a barrel
        for (let i = 0; i < 9; i++) {
          const a = i / 9 * Math.PI * 2;
          for (let tk = 0; tk < 3; tk++) {
            const tub = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 1.3, 6), tubMat);
            const rr = 0.55 + tk * 0.13;
            tub.position.set(Math.cos(a) * rr, 0, Math.sin(a) * rr);
            c.add(tub);
          }
        }
        return c;
      }
      const c1 = centriole();
      const c2 = centriole(); c2.rotation.x = Math.PI / 2; c2.position.set(0.2, 0.9, 0.4);
      const barrels = new THREE.Group(); barrels.add(c1, c2);
      registerLOD(barrels, 1);
      g.add(barrels);
      // pericentriolar cloud (faint) + radiating aster microtubules
      const aster = new THREE.Group();
      const astMat = new THREE.MeshStandardMaterial({ color: 0x7fb8ff, transparent: true, opacity: 0.4, roughness: 0.6 });
      for (let i = 0; i < 18; i++) {
        const dir = onSphere(1).normalize();
        const ray = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, 3 + Math.random()*2, 5), astMat);
        const len = 3; ray.position.copy(dir.clone().multiplyScalar(len*0.6));
        ray.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
        aster.add(ray);
      }
      registerLOD(aster, 1); g.add(aster);
      register(g, 'centrosome', true); cell.add(g); animalOnly.push(g);
      // also re-point the existing 'centriole' info chip here
      const cAnchor = new THREE.Group(); cAnchor.position.copy(g.position);
      cAnchor.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false })));
      register(cAnchor, 'centriole', false); cell.add(cAnchor); animalOnly.push(cAnchor);
      spinners.push({ obj: barrels, axis: 'y', speed: 0.08 });
    })();

    // 6.3 — NUCLEAR ENVELOPE + NUCLEAR LAMINA: a clearer double-membrane shell
    //   around the nucleus (centered at 2,1,-1) with an inner fibrous lamina.
    (function nuclearEnvelope() {
      const NC = new THREE.Vector3(2, 1, -1);
      const g = new THREE.Group(); g.position.copy(NC);
      const outerMat = new THREE.MeshPhysicalMaterial({ color: 0x8b6bff, transparent: true, opacity: 0.10, roughness: 0.3, transmission: 0.5, side: THREE.DoubleSide, depthWrite: false });
      const outer = new THREE.Mesh(new THREE.SphereGeometry(6.5, 40, 30), outerMat);
      const inner = new THREE.Mesh(new THREE.SphereGeometry(6.1, 40, 30), outerMat.clone());
      markShell(outer); markShell(inner);
      g.add(outer, inner);
      register(g, 'nuclear_envelope', true); cell.add(g);
      // nuclear lamina: inner fibrous net (LOD 2+)
      const laminaMat = new THREE.MeshStandardMaterial({ color: 0xc7a8ff, transparent: true, opacity: 0.55, roughness: 0.6 });
      const lamina = new THREE.Group();
      for (let i = 0; i < 26; i++) {
        const a = onSphere(5.85), b = onSphere(5.85);
        const curve = new THREE.CatmullRomCurve3([a, a.clone().lerp(b,0.5).multiplyScalar(0.97), b]);
        lamina.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 14, 0.04, 4, false), laminaMat));
      }
      const lg = new THREE.Group(); lg.position.copy(NC); lg.add(lamina);
      register(lg, 'nuclear_lamina', false); cell.add(lg); registerLOD(lamina, 2);
      freezeStatic(g); freezeStatic(lg);
    })();

    // 6.4 — CONDENSED CHROMOSOME + NUCLEOSOME "beads on a string" near nucleus
    (function chromosomeDetail() {
      const NC = new THREE.Vector3(2, 1, -1);
      const g = new THREE.Group(); g.position.copy(NC).add(new THREE.Vector3(2.2, 1.5, 1.2));
      // a compact X-shaped condensed chromosome (two sister chromatids)
      const chrMat = new THREE.MeshStandardMaterial({ color: 0xff8ad0, emissive: 0x5a1840, roughness: 0.6 });
      function arm(x0, y0, x1, y1) {
        const c = new THREE.CatmullRomCurve3([new THREE.Vector3(x0,y0,0), new THREE.Vector3((x0+x1)/2,(y0+y1)/2,0.2), new THREE.Vector3(x1,y1,0)]);
        return new THREE.Mesh(new THREE.TubeGeometry(c, 16, 0.16, 7, false), chrMat);
      }
      g.add(arm(-0.7,1,0,0), arm(0.7,1,0,0), arm(-0.7,-1,0,0), arm(0.7,-1,0,0));
      const centromere = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 8), new THREE.MeshStandardMaterial({ color: 0xffd1ec, roughness: 0.5 }));
      g.add(centromere);
      register(g, 'chromosome', true); cell.add(g); registerLOD(g, 2);

      // nucleosome "beads on a string" (LOD 3) tucked nearby
      const ng = new THREE.Group(); ng.position.copy(NC).add(new THREE.Vector3(-2.5, 2.2, 1.5));
      const dnaMat = new THREE.MeshStandardMaterial({ color: 0xffe08a, emissive: 0x4a3000, roughness: 0.6 });
      const hisMat = new THREE.MeshStandardMaterial({ color: 0x7fd0ff, emissive: 0x123a4f, roughness: 0.5 });
      const pts = [];
      for (let i = 0; i < 10; i++) pts.push(new THREE.Vector3(i*0.45 - 2, Math.sin(i)*0.25, Math.cos(i)*0.25));
      const strand = new THREE.CatmullRomCurve3(pts);
      ng.add(new THREE.Mesh(new THREE.TubeGeometry(strand, 40, 0.03, 4, false), dnaMat));
      for (let i = 0; i < 8; i++) { const h = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 8), hisMat); h.position.copy(strand.getPoint((i+0.5)/8)); ng.add(h); }
      register(ng, 'nucleosome', false); cell.add(ng); registerLOD(ng, 3);
      freezeStatic(g); freezeStatic(ng);
    })();

    // 6.5 — SURFACE SPECIALIZATIONS: microvilli (animal) brush border on a patch
    //   of the membrane, plus a couple of beating cilia. (LOD 1+)
    (function surfaceProjections() {
      // microvilli — finger-like membrane protrusions on a top patch
      const mvMat = new THREE.MeshPhysicalMaterial({ color: 0x7fb6ff, transparent: true, opacity: 0.7, roughness: 0.4, side: THREE.DoubleSide });
      const actinMat = new THREE.MeshStandardMaterial({ color: 0x9fffc0, roughness: 0.6 });
      const mvGrp = new THREE.Group();
      const patchN = new THREE.Vector3(0, 1, 0.3).normalize();
      for (let i = 0; i < 40; i++) {
        const jitter = new THREE.Vector3((Math.random()-0.5)*0.5,(Math.random()-0.5)*0.5,(Math.random()-0.5)*0.5);
        const dir = patchN.clone().add(jitter).normalize();
        const base = dir.clone().multiplyScalar(CELL_R - 0.2);
        const h = 1.6 + Math.random()*0.8;
        const finger = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.18, h, 8, 1, false), mvMat);
        finger.position.copy(base).add(dir.clone().multiplyScalar(h/2));
        finger.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
        mvGrp.add(finger);
        // actin core bundle (LOD 3)
        const core = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, h*0.9, 5), actinMat);
        core.position.copy(finger.position); core.quaternion.copy(finger.quaternion);
        core.visible = false; mvGrp.add(core); registerLOD(core, 3);
      }
      register(mvGrp, 'microvilli', true); cell.add(mvGrp); registerLOD(mvGrp, 1); animalOnly.push(mvGrp);

      // cilia — a few longer 9+2 motile projections on another patch
      const cilMat = new THREE.MeshPhysicalMaterial({ color: 0xbfe0ff, transparent: true, opacity: 0.75, roughness: 0.4, side: THREE.DoubleSide });
      const cilGrp = new THREE.Group();
      const cilia = [];
      const cN = new THREE.Vector3(0.6, 0.7, -0.4).normalize();
      for (let i = 0; i < 6; i++) {
        const jitter = new THREE.Vector3((Math.random()-0.5)*0.4,(Math.random()-0.5)*0.4,(Math.random()-0.5)*0.4);
        const dir = cN.clone().add(jitter).normalize();
        const base = dir.clone().multiplyScalar(CELL_R - 0.2);
        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 4.5, 8), cilMat);
        const piv = new THREE.Group(); piv.position.copy(base);
        shaft.position.copy(dir.clone().multiplyScalar(2.25));
        shaft.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
        piv.add(shaft);
        cilGrp.add(piv);
        cilia.push({ piv, base: piv.rotation.z, phase: Math.random()*Math.PI*2, axis: dir });
      }
      register(cilGrp, 'cilia', true); cell.add(cilGrp); animalOnly.push(cilGrp);
      microAnims.push((dt, t) => {
        if (!_ev(cilGrp)) return false;
        for (const c of cilia) { c.phase += dt * 2.5; c.piv.rotation.z = Math.sin(c.phase) * 0.25; c.piv.rotation.x = Math.cos(c.phase*0.9) * 0.15; }
        return true;
      });
    })();

    // 6.6 — PROTEASOME barrels (animal/shared) drifting in cytosol (LOD 2+)
    (function proteasomes() {
      const capMat = new THREE.MeshStandardMaterial({ color: 0x8a6fff, emissive: 0x2a1a6a, roughness: 0.4 });
      const coreMat = new THREE.MeshStandardMaterial({ color: 0xb8a8ff, roughness: 0.5, transparent: true, opacity: 0.9 });
      for (let i = 0; i < 6; i++) {
        const g = new THREE.Group();
        const core = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.9, 16), coreMat);
        const capT = new THREE.Mesh(new THREE.SphereGeometry(0.42, 12, 8), capMat); capT.position.y = 0.62; capT.scale.y = 0.6;
        const capB = capT.clone(); capB.position.y = -0.62;
        g.add(core, capT, capB);
        g.position.copy(onSphere(6 + Math.random()*7));
        g.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
        register(g, 'proteasome', i === 0); cell.add(g); registerLOD(g, 2);
        spinners.push({ obj: g, axis: 'y', speed: 0.1 + Math.random()*0.1 });
      }
    })();

    // 6.7 — ENDOSOMES + CLATHRIN-COATED PITS: endocytosis machinery at the
    //   membrane. A clathrin lattice patch dimpling inward, and sorting endosomes.
    (function endocytosis() {
      // clathrin-coated pit on the membrane (LOD 2+)
      const pitDir = new THREE.Vector3(-0.5, 0.2, 0.85).normalize();
      const seat = pitDir.clone().multiplyScalar(CELL_R - 0.4);
      const cg = new THREE.Group(); cg.position.copy(seat);
      const latMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, emissive: 0x4a3000, roughness: 0.5 });
      // a curved hexagonal-ish lattice of struts forming a basket
      const inward = pitDir.clone().negate();
      const dome = new THREE.Mesh(new THREE.SphereGeometry(1.0, 12, 8, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshBasicMaterial({ color: 0xffe9a8, transparent: true, opacity: 0.18, side: THREE.DoubleSide }));
      dome.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), inward);
      cg.add(dome);
      for (let i = 0; i < 22; i++) {
        const a = onSphere(1).normalize();
        if (a.dot(inward) < 0.1) continue;
        const strut = new THREE.Mesh(new THREE.SphereGeometry(0.08, 5, 5), latMat);
        strut.position.copy(a.clone().multiplyScalar(0.95));
        cg.add(strut);
      }
      register(cg, 'clathrin', true); cell.add(cg); registerLOD(cg, 2); animalOnly.push(cg);

      // sorting endosomes (multivesicular bodies) (LOD 1+)
      const enMat = new THREE.MeshPhysicalMaterial({ color: 0x6fd0d0, transparent: true, opacity: 0.5, roughness: 0.4, side: THREE.DoubleSide });
      const ivMat = new THREE.MeshStandardMaterial({ color: 0x2a8a8a, roughness: 0.5 });
      for (let i = 0; i < 4; i++) {
        const g = new THREE.Group();
        const shell = new THREE.Mesh(new THREE.SphereGeometry(0.9 + Math.random()*0.3, 18, 14), enMat);
        markShell(shell); g.add(shell);
        const inner = new THREE.Group();
        for (let k = 0; k < 8; k++) { const iv = new THREE.Mesh(new THREE.SphereGeometry(0.16, 6, 6), ivMat); iv.position.set((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)); inner.add(iv); }
        g.add(inner); registerLOD(inner, 1);
        g.position.copy(onSphere(7 + Math.random()*6));
        register(g, 'endosome', i === 0); cell.add(g);
      }
    })();

    // 6.8 — RNA MOLECULES: mRNA strands exiting nuclear pores + tRNA cloverleaves
    (function rnaMolecules() {
      const NC = new THREE.Vector3(2, 1, -1);
      // mRNA: a wavy ribbon emerging from the nuclear region (LOD 3)
      const mrnaMat = new THREE.MeshStandardMaterial({ color: 0xffe066, emissive: 0x5a4a00, roughness: 0.5 });
      const baseMat = [0xff6f8f, 0x6fd0ff, 0x9fffc0, 0xffd36f].map(c => new THREE.MeshStandardMaterial({ color: c, roughness: 0.5 }));
      const mg = new THREE.Group();
      const start = NC.clone().add(new THREE.Vector3(6.2, 0, 0));
      const pts = [];
      for (let i = 0; i < 8; i++) pts.push(start.clone().add(new THREE.Vector3(i*0.7, Math.sin(i*1.1)*0.6, Math.cos(i*0.9)*0.6)));
      const curve = new THREE.CatmullRomCurve3(pts);
      mg.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 60, 0.07, 6, false), mrnaMat));
      for (let i = 0; i < 24; i++) { const b = new THREE.Mesh(new THREE.SphereGeometry(0.07, 5, 5), baseMat[i % 4]); b.position.copy(curve.getPoint(i/24)); mg.add(b); }
      register(mg, 'mrna', true); cell.add(mg); registerLOD(mg, 3);

      // tRNA: a few L-shaped clover molecules near a ribosome region (LOD 3)
      const tg = new THREE.Group(); tg.position.copy(onSphere(6)).add(new THREE.Vector3(0,2,0));
      const tMat = new THREE.MeshStandardMaterial({ color: 0x9fd0ff, emissive: 0x12304f, roughness: 0.5 });
      const aaMat = new THREE.MeshStandardMaterial({ color: 0xff8a5c, emissive: 0x4a1500, roughness: 0.5 });
      for (let i = 0; i < 5; i++) {
        const t = new THREE.Group();
        const c1 = new THREE.CatmullRomCurve3([new THREE.Vector3(0,0,0), new THREE.Vector3(0.3,0.4,0), new THREE.Vector3(0,0.8,0)]);
        const c2 = new THREE.CatmullRomCurve3([new THREE.Vector3(0,0.8,0), new THREE.Vector3(-0.4,0.9,0.2), new THREE.Vector3(-0.8,0.8,0)]);
        t.add(new THREE.Mesh(new THREE.TubeGeometry(c1, 10, 0.05, 4, false), tMat));
        t.add(new THREE.Mesh(new THREE.TubeGeometry(c2, 10, 0.05, 4, false), tMat));
        const aa = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), aaMat); aa.position.set(0,0,0); t.add(aa);
        t.position.set((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2);
        t.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
        tg.add(t);
      }
      register(tg, 'trna', false); cell.add(tg); registerLOD(tg, 3);
      freezeStatic(mg); freezeStatic(tg);
    })();

    // 6.9 — CELL JUNCTIONS (animal): a curved neighboring-cell wall patch with
    //   tight junction, gap junction, and desmosome between the two membranes.
    (function cellJunctions() {
      // a faint "neighbor cell" membrane bulge just outside our membrane
      const arcDir = new THREE.Vector3(0.9, -0.2, 0.3).normalize();
      // position the neighbor membrane just outside, facing us
      const ng = new THREE.Group();
      const neighG = new THREE.Mesh(new THREE.SphereGeometry(2.4, 24, 18),
        new THREE.MeshPhysicalMaterial({ color: 0x6fb6ff, transparent: true, opacity: 0.10, roughness: 0.2, side: THREE.DoubleSide, depthWrite: false }));
      neighG.position.copy(arcDir.clone().multiplyScalar(CELL_R + 2.4));
      markShell(neighG); ng.add(neighG);
      cell.add(ng); animalOnly.push(ng);

      // tangent frame on the membrane for laying junctions across the gap
      const yAxis = new THREE.Vector3(0,1,0);
      let t1 = new THREE.Vector3().crossVectors(arcDir, yAxis); if (t1.lengthSq()<1e-6) t1.set(1,0,0); t1.normalize();
      const t2 = new THREE.Vector3().crossVectors(arcDir, t1).normalize();
      const innerFace = arcDir.clone().multiplyScalar(CELL_R + 0.1);
      const outerFace = arcDir.clone().multiplyScalar(CELL_R + 1.7);
      function bridge(offset, mat, rad, label, key, withLabel) {
        const g = new THREE.Group();
        const a = innerFace.clone().addScaledVector(t1, offset.x).addScaledVector(t2, offset.y);
        const b = outerFace.clone().addScaledVector(t1, offset.x).addScaledVector(t2, offset.y);
        const len = a.distanceTo(b);
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(rad, rad, len, 8), mat);
        bar.position.copy(a.clone().lerp(b, 0.5));
        bar.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), b.clone().sub(a).normalize());
        g.add(bar);
        register(g, key, withLabel); cell.add(g); registerLOD(g, 1); animalOnly.push(g);
        return g;
      }
      // tight junction — tightly fused strands (green), top
      const tjMat = new THREE.MeshStandardMaterial({ color: 0x3ddc6e, emissive: 0x0a4a22, roughness: 0.4 });
      bridge(new THREE.Vector2(0, 1.4), tjMat, 0.10, 'tight', 'tight_junction', true);
      // gap junction — connexon channels (blue), middle
      const gjMat = new THREE.MeshStandardMaterial({ color: 0x4f9bff, emissive: 0x0a2a5a, roughness: 0.4 });
      for (let i = -1; i <= 1; i++) bridge(new THREE.Vector2(i*0.4, 0), gjMat, 0.14, 'gap', 'gap_junction', i===0);
      // desmosome — rivet plaque (orange), bottom
      const dmMat = new THREE.MeshStandardMaterial({ color: 0xff9b4f, emissive: 0x5a2a00, roughness: 0.5 });
      bridge(new THREE.Vector2(0, -1.4), dmMat, 0.18, 'desmo', 'desmosome', true);
    })();

    // 6.10 — EXTRACELLULAR MATRIX (animal): a fibrous collagen/fibronectin
    //   mesh outside the membrane, tethered by integrin-like anchors. (LOD 1+)
    (function extracellularMatrix() {
      const g = new THREE.Group();
      const colMat = new THREE.MeshStandardMaterial({ color: 0xcfe0ff, transparent: true, opacity: 0.45, roughness: 0.7 });
      const intMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, emissive: 0x4a3000, roughness: 0.5 });
      const anchors = [];
      for (let i = 0; i < 26; i++) anchors.push(onSphere(CELL_R + 1.5 + Math.random()*1.5));
      // weave fibers between nearby anchor points
      for (let i = 0; i < anchors.length; i++) {
        const a = anchors[i];
        for (let j = i + 1; j < anchors.length; j++) {
          const b = anchors[j];
          if (a.distanceTo(b) < 6) {
            const mid = a.clone().lerp(b, 0.5).multiplyScalar(1.02);
            const curve = new THREE.CatmullRomCurve3([a, mid, b]);
            g.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 8, 0.05, 4, false), colMat));
          }
        }
      }
      // integrin anchors tethering ECM to the membrane
      anchors.forEach(p => {
        const dir = p.clone().normalize();
        const seat = dir.clone().multiplyScalar(CELL_R);
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, p.distanceTo(seat), 5), intMat);
        stalk.position.copy(seat.clone().lerp(p, 0.5));
        stalk.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
        g.add(stalk);
      });
      register(g, 'extracellular_matrix', true); cell.add(g); registerLOD(g, 1); animalOnly.push(g);
      freezeStatic(g);
    })();

    // ---- visibility wiring: hide the animal-only additions on plant cells ----
    C.onCellType.push((isPlant) => { animalOnly.forEach(o => o.visible = !isPlant); });
    if (C.applyCellType) C.applyCellType(window.game_config.cellType || 'animal');
    if (window.__CELL_resetLOD) window.__CELL_resetLOD();
  })();
  </script>

  <!-- ============================================================
       Iteration 7: 神经元更深层结构与分子机器
       (glial cells, growth cone, SNARE/Ca2+ release machinery,
        PSD + AMPA/NMDA receptors, kinesin/dynein motors, action
        potential wavefront, tripartite synapse, ER in axon)
       All parts go into C.neuronGroup so they only show in neuron mode.
       ============================================================ -->
  <script>
  (function () {
    const C = window.__CELL;
    const neuron = C.neuronGroup;
    if (!neuron) return; // neuron iteration must have run first
    const { THREE, register, registerLOD, markShell, freezeStatic } = C;
    const spinners = C.spinners;

    const neuronAnims = [];
    const prevAnimate = window.__animateOrganelles;
    window.__animateOrganelles = function (dt, t) {
      let moved = prevAnimate ? !!prevAnimate(dt, t) : false;
      if (neuron.visible) for (const fn of neuronAnims) { try { if (fn(dt, t)) moved = true; } catch (e) {} }
      return moved;
    };
    const _ev = window.__CELL_effVisible || (o => o.visible);

    // mirror the neuron layout constants from Iteration 5
    const SOMA_C = new THREE.Vector3(-22, 0, 0);
    const SOMA_R = 8;
    const AXON_END = new THREE.Vector3(28, -2, 0);
    const axonCurve = C._axonCurve; // CatmullRom along the axon
    function onSphere(r) {
      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
      return new THREE.Vector3(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
    }

    // 7.1 — ASTROCYTE: a star-shaped glial cell whose end-feet wrap the synapse,
    //   forming (with pre/post) the tripartite synapse. (LOD 1+)
    (function astrocyte() {
      const g = new THREE.Group();
      const center = AXON_END.clone().add(new THREE.Vector3(3.5, 5.5, 2));
      g.position.copy(center);
      const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0x7be0c0, transparent: true, opacity: 0.45, roughness: 0.5, side: THREE.DoubleSide });
      const body = new THREE.Mesh(new THREE.SphereGeometry(1.8, 24, 18), bodyMat);
      markShell(body); g.add(body);
      // nucleus hint
      g.add(new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 12), new THREE.MeshStandardMaterial({ color: 0x2a8a6a, roughness: 0.7 })));
      // many star-like processes, some reaching toward the synaptic cleft
      const procMat = new THREE.MeshStandardMaterial({ color: 0x8affd0, transparent: true, opacity: 0.6, roughness: 0.6 });
      const cleft = AXON_END.clone().add(new THREE.Vector3(3.5, 0, 0));
      const procGrp = new THREE.Group();
      for (let i = 0; i < 14; i++) {
        let target;
        if (i < 4) target = cleft.clone().sub(center).add(onSphere(1.5)); // end-feet to synapse
        else target = onSphere(5 + Math.random()*4);
        const pts = [new THREE.Vector3(0,0,0), target.clone().multiplyScalar(0.5).add(onSphere(1.2)), target];
        const curve = new THREE.CatmullRomCurve3(pts);
        procGrp.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 20, 0.12 + Math.random()*0.06, 6, false), procMat));
        // end-foot bulb
        const foot = new THREE.Mesh(new THREE.SphereGeometry(0.28, 10, 8), bodyMat);
        foot.position.copy(target); procGrp.add(foot);
      }
      g.add(procGrp); registerLOD(procGrp, 1);
      register(g, 'astrocyte', true); neuron.add(g);
      // tripartite synapse info anchor near the cleft
      const tg = new THREE.Group(); tg.position.copy(cleft).add(new THREE.Vector3(0, 1.5, 0));
      tg.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false })));
      register(tg, 'tripartite_synapse', true); neuron.add(tg);
      freezeStatic(g);
    })();

    // 7.2 — SCHWANN CELL: highlight one myelin segment as a wrapped Schwann cell
    //   with its own nucleus bulging on the outside. (LOD 1+)
    (function schwannCell() {
      if (!axonCurve) return;
      const t = 0.4;
      const p = axonCurve.getPoint(t);
      const g = new THREE.Group(); g.position.copy(p);
      // outer wrap (slightly larger translucent sheath highlighting the cell)
      const wrapMat = new THREE.MeshPhysicalMaterial({ color: 0xffe9b0, transparent: true, opacity: 0.4, roughness: 0.5, side: THREE.DoubleSide });
      const tangent = axonCurve.getTangent(t);
      const wrap = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.35, 2.2, 18, 1, true), wrapMat);
      wrap.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), tangent);
      g.add(wrap);
      // spiral lines hinting the multi-layer wrapping (LOD 2)
      const spiralMat = new THREE.MeshStandardMaterial({ color: 0xd8b86a, roughness: 0.6 });
      const spiral = new THREE.Group();
      const up = new THREE.Vector3(0,1,0); let t1 = new THREE.Vector3().crossVectors(tangent, up); if (t1.lengthSq()<1e-6) t1.set(1,0,0); t1.normalize();
      const t2 = new THREE.Vector3().crossVectors(tangent, t1).normalize();
      const spts = [];
      for (let i = 0; i <= 60; i++) { const a = i/60*Math.PI*6; const rr = 1.0 + (i/60)*0.3; const along = (i/60 - 0.5)*2.0; spts.push(new THREE.Vector3().addScaledVector(tangent, along).addScaledVector(t1, Math.cos(a)*rr).addScaledVector(t2, Math.sin(a)*rr)); }
      spiral.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(spts), 80, 0.04, 4, false), spiralMat));
      g.add(spiral); registerLOD(spiral, 2);
      // schwann nucleus on the outside
      const nuc = new THREE.Mesh(new THREE.SphereGeometry(0.5, 14, 10), new THREE.MeshStandardMaterial({ color: 0xb89a4a, roughness: 0.7 }));
      nuc.position.copy(t1.clone().multiplyScalar(1.4)); nuc.scale.set(1.4,0.7,0.9); g.add(nuc);
      register(g, 'schwann_cell', true); neuron.add(g);
      freezeStatic(g);
    })();

    // 7.3 — OLIGODENDROCYTE: a CNS glial cell sending several arms to wrap
    //   multiple distant axon segments. (LOD 1+)
    (function oligodendrocyte() {
      if (!axonCurve) return;
      const center = axonCurve.getPoint(0.7).clone().add(new THREE.Vector3(0, 5, 3));
      const g = new THREE.Group(); g.position.copy(center);
      const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xc0a8ff, transparent: true, opacity: 0.45, roughness: 0.5, side: THREE.DoubleSide });
      g.add(new THREE.Mesh(new THREE.SphereGeometry(1.4, 22, 16), bodyMat));
      g.add(new THREE.Mesh(new THREE.SphereGeometry(0.6, 14, 10), new THREE.MeshStandardMaterial({ color: 0x6a4faa, roughness: 0.7 })));
      const armMat = new THREE.MeshStandardMaterial({ color: 0xd0c0ff, transparent: true, opacity: 0.6, roughness: 0.6 });
      const arms = new THREE.Group();
      const targets = [0.55, 0.62, 0.78, 0.85].map(tt => axonCurve.getPoint(tt));
      targets.forEach(tp => {
        const local = tp.clone().sub(center);
        const curve = new THREE.CatmullRomCurve3([new THREE.Vector3(0,0,0), local.clone().multiplyScalar(0.5).add(new THREE.Vector3(0,-1,0)), local]);
        arms.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 18, 0.1, 5, false), armMat));
        const cuff = new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 8), bodyMat); cuff.position.copy(local); arms.add(cuff);
      });
      g.add(arms); registerLOD(arms, 1);
      register(g, 'oligodendrocyte', true); neuron.add(g);
      freezeStatic(g);
    })();

    // 7.4 — GROWTH CONE: a sprouting exploratory tip branching off a dendrite
    //   region, with filopodia + lamellipodium. (LOD 1+)
    (function growthCone() {
      const base = SOMA_C.clone().add(new THREE.Vector3(-2, -8, 4));
      const g = new THREE.Group(); g.position.copy(base);
      const handMat = new THREE.MeshPhysicalMaterial({ color: 0x9fffc0, transparent: true, opacity: 0.5, roughness: 0.5, side: THREE.DoubleSide });
      // fan-shaped lamellipodium
      const lam = new THREE.Mesh(new THREE.SphereGeometry(1.2, 18, 12, 0, Math.PI*2, 0, Math.PI*0.55), handMat);
      lam.scale.set(1.4, 0.5, 1.4); g.add(lam);
      // filopodia spikes
      const filMat = new THREE.MeshStandardMaterial({ color: 0x6fffb0, roughness: 0.6 });
      const fils = new THREE.Group();
      for (let i = 0; i < 12; i++) {
        const a = i/12*Math.PI*2;
        const dir = new THREE.Vector3(Math.cos(a), 0.3 + Math.random()*0.4, Math.sin(a)).normalize();
        const len = 1.5 + Math.random()*1.5;
        const spike = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.06, len, 5), filMat);
        spike.position.copy(dir.clone().multiplyScalar(len/2 + 0.6));
        spike.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
        fils.add(spike);
      }
      g.add(fils); registerLOD(fils, 1);
      register(g, 'growth_cone', true); neuron.add(g);
      // subtle exploratory wobble of the filopodia
      neuronAnims.push((dt, t) => { if (!_ev(g)) return false; fils.rotation.y = Math.sin(t*0.001)*0.1; return true; });
    })();

    // 7.5 — RELEASE MACHINERY: at the presynaptic active zone, show Ca2+ channels,
    //   SNARE complexes zippering a docked vesicle, and Ca2+ influx animation.
    (function releaseMachinery() {
      const front = AXON_END.clone().add(new THREE.Vector3(2.2, 0, 0)); // presyn membrane facing cleft
      const g = new THREE.Group(); g.position.copy(front);
      const outward = new THREE.Vector3(1, 0, 0);
      // voltage-gated Ca2+ channels (orange) clustered at the active zone
      const caMat = new THREE.MeshStandardMaterial({ color: 0xff9b3c, emissive: 0x5a2a00, roughness: 0.45 });
      const caCh = [];
      const caGrp = new THREE.Group();
      for (let i = 0; i < 8; i++) {
        const ch = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 0.5, 8), caMat);
        const off = new THREE.Vector3(0, (Math.random()-0.5)*1.4, (Math.random()-0.5)*1.4);
        ch.position.copy(off); ch.rotation.z = Math.PI/2; caGrp.add(ch);
        caCh.push(off.clone());
      }
      g.add(caGrp); registerLOD(caGrp, 1);
      register(g, 'calcium_channel', true); neuron.add(g);

      // SNARE complexes: 4-helix bundles tethering a docked vesicle (LOD 3)
      const snareG = new THREE.Group(); snareG.position.copy(front).add(new THREE.Vector3(-0.5, 0, 0));
      const vMat = new THREE.MeshStandardMaterial({ color: 0x6fa8ff, roughness: 0.5 }); // v-SNARE
      const tMat = new THREE.MeshStandardMaterial({ color: 0xff6f8f, roughness: 0.5 }); // t-SNARE
      const docked = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 12), new THREE.MeshStandardMaterial({ color: 0x6fa8ff, emissive: 0x12305a, roughness: 0.5 }));
      docked.position.set(-0.7, 0, 0); snareG.add(docked);
      for (let i = 0; i < 3; i++) {
        const a = i/3*Math.PI*2, rr = 0.12;
        const helix = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.7, 5), i%2 ? vMat : tMat);
        helix.position.set(-0.2, Math.cos(a)*rr, Math.sin(a)*rr); helix.rotation.z = Math.PI/2;
        snareG.add(helix);
      }
      register(snareG, 'snare_complex', true); neuron.add(snareG); registerLOD(snareG, 3);

      // Ca2+ ions flowing in through the channels when an AP "arrives"
      const ionMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, emissive: 0x5a4000, roughness: 0.4 });
      const ions = [];
      const ionGrp = new THREE.Group(); ionGrp.position.copy(front);
      for (let i = 0; i < 12; i++) { const ion = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), ionMat); ionGrp.add(ion); ions.push({ ion, src: caCh[i % caCh.length], t: Math.random() }); }
      neuron.add(ionGrp); registerLOD(ionGrp, 2);
      neuronAnims.push((dt) => {
        if (!_ev(ionGrp)) return false;
        for (const it of ions) { it.t += dt * 0.8; if (it.t > 1) it.t -= 1; const from = it.src.clone().add(front); const to = from.clone().add(new THREE.Vector3(-1.4, 0, 0)); it.ion.position.copy(from).lerp(to, it.t); }
        return true;
      });
    })();

    // 7.6 — POSTSYNAPTIC DENSITY (PSD) with AMPA + NMDA receptors aligned to the
    //   active zone. Distinct receptor types so learners can compare. (LOD 1+)
    (function postsynapticDetail() {
      const postFace = AXON_END.clone().add(new THREE.Vector3(4.4, 0, 0));
      const g = new THREE.Group(); g.position.copy(postFace);
      // PSD scaffold slab just under the postsynaptic membrane. This is a
      // compact reference PSD; multiple small PSD pads are drawn at the branch
      // terminals, so avoid a misleading oversized pink disc here.
      const psdMat = new THREE.MeshStandardMaterial({ color: 0xff6f8f, emissive: 0x5a1326, roughness: 0.5, transparent: true, opacity: 0.42 });
      const psd = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 0.18, 28), psdMat);
      psd.rotation.z = Math.PI/2; psd.position.x = 0.4; g.add(psd);
      // scaffold mesh (PSD-95 lattice hint) — LOD 3
      const latMat = new THREE.MeshStandardMaterial({ color: 0xffb0c0, roughness: 0.6 });
      const lat = new THREE.Group();
      for (let i = 0; i < 12; i++) { const a = onSphere(0.7); const b = onSphere(0.7); a.x = b.x = 0.55; const c = new THREE.CatmullRomCurve3([a, a.clone().lerp(b,0.5), b]); lat.add(new THREE.Mesh(new THREE.TubeGeometry(c, 6, 0.014, 3, false), latMat)); }
      g.add(lat); registerLOD(lat, 3);
      register(g, 'psd', true); neuron.add(g);

      // AMPA receptors (blue) — fast, more peripheral
      const ampaMat = new THREE.MeshStandardMaterial({ color: 0x4f9bff, emissive: 0x0a2a5a, roughness: 0.45 });
      const ampaGrp = new THREE.Group();
      for (let i = 0; i < 8; i++) {
        const a = Math.random()*Math.PI*2, rr = 0.25 + Math.random()*0.45;
        const r = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.32, 8), ampaMat);
        r.position.copy(postFace).add(new THREE.Vector3(0.1, Math.cos(a)*rr, Math.sin(a)*rr)); r.rotation.z = Math.PI/2;
        ampaGrp.add(r);
      }
      register(ampaGrp, 'ampa_receptor', true); neuron.add(ampaGrp); registerLOD(ampaGrp, 1);

      // NMDA receptors (purple) — fewer, central, taller
      const nmdaMat = new THREE.MeshStandardMaterial({ color: 0xb06fff, emissive: 0x3a1a6a, roughness: 0.45 });
      const nmdaGrp = new THREE.Group();
      for (let i = 0; i < 5; i++) {
        const a = i/5*Math.PI*2, rr = 0.18 + Math.random()*0.28;
        const r = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.12, 0.38, 8), nmdaMat);
        r.position.copy(postFace).add(new THREE.Vector3(0.05, Math.cos(a)*rr, Math.sin(a)*rr)); r.rotation.z = Math.PI/2;
        nmdaGrp.add(r);
        // Mg2+ block bead at the mouth
        const mg = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), new THREE.MeshStandardMaterial({ color: 0xffe066, roughness: 0.5 }));
        mg.position.copy(r.position).add(new THREE.Vector3(-0.25, 0, 0)); nmdaGrp.add(mg);
      }
      register(nmdaGrp, 'nmda_receptor', true); neuron.add(nmdaGrp); registerLOD(nmdaGrp, 1);

      // synaptic cleft info anchor between the membranes
      const cg = new THREE.Group(); cg.position.copy(AXON_END).add(new THREE.Vector3(3.5, 0, 0));
      cg.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false })));
      register(cg, 'synaptic_cleft', true); neuron.add(cg);
    })();

    // 7.7 — AXONAL TRANSPORT MOTORS: kinesin (toward terminal) and dynein
    //   (toward soma) walking along a microtubule track, carrying cargo. (LOD 2+)
    (function transportMotors() {
      if (!axonCurve) return;
      // a single clear microtubule track slightly offset
      const trackMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, transparent: true, opacity: 0.8, roughness: 0.5 });
      const pts = [];
      const off = new THREE.Vector3(0, 0.9, 0);
      for (let i = 0; i <= 40; i++) { const t = 0.12 + i/40*0.8; pts.push(axonCurve.getPoint(t).clone().add(off)); }
      const track = new THREE.CatmullRomCurve3(pts);

      function makeMotor(color, cargoColor) {
        const m = new THREE.Group();
        const headMat = new THREE.MeshStandardMaterial({ color, emissive: 0x111111, roughness: 0.4 });
        // two "feet" + stalk + cargo bag
        const f1 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), headMat); f1.position.set(0.1, -0.18, 0);
        const f2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), headMat); f2.position.set(-0.1, -0.18, 0);
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.4, 5), headMat); stalk.position.y = 0.05;
        const cargo = new THREE.Mesh(new THREE.SphereGeometry(0.26, 12, 10), new THREE.MeshStandardMaterial({ color: cargoColor, emissive: 0x222200, roughness: 0.5 })); cargo.position.y = 0.4;
        m.add(f1, f2, stalk, cargo);
        return { m, f1, f2 };
      }
      const motors = [];
      const motorGrp = new THREE.Group();
      for (let i = 0; i < 3; i++) { const km = makeMotor(0x4fd08f, 0xffe9a8); motorGrp.add(km.m); motors.push({ ...km, t: Math.random(), speed: 0.05, dir: 1, phase: Math.random()*6 }); } // kinesin
      for (let i = 0; i < 2; i++) { const dm = makeMotor(0xff6f8f, 0xa8d0ff); motorGrp.add(dm.m); motors.push({ ...dm, t: Math.random(), speed: 0.045, dir: -1, phase: Math.random()*6 }); } // dynein
      neuron.add(motorGrp); registerLOD(motorGrp, 2);

      // register clickable info anchors for the two motor proteins
      const km0 = motors[0], dm0 = motors[motors.length-1];
      function anchorFor(motor, key) {
        const a = new THREE.Group();
        a.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false })));
        a.position.copy(track.getPoint(0.5));
        register(a, key, true); neuron.add(a);
      }
      anchorFor(km0, 'kinesin');
      anchorFor(dm0, 'dynein');
      const mtAnchor = new THREE.Group(); mtAnchor.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false }))); mtAnchor.position.copy(track.getPoint(0.3)); register(mtAnchor, 'axon_microtubule', false); neuron.add(mtAnchor);

      const up = new THREE.Vector3(0,1,0);
      neuronAnims.push((dt, t) => {
        if (!_ev(motorGrp)) return false;
        for (const mo of motors) {
          mo.t += dt * mo.speed * mo.dir;
          if (mo.t > 0.98) mo.t = 0.04; if (mo.t < 0.04) mo.t = 0.98;
          const p = track.getPoint(mo.t);
          mo.m.position.copy(p);
          // orient along the track
          const tan = track.getTangent(mo.t);
          mo.m.quaternion.setFromUnitVectors(up, tan);
          // walking gait: alternate the two feet
          mo.phase += dt * 8;
          mo.f1.position.y = -0.18 + Math.max(0, Math.sin(mo.phase)) * 0.12;
          mo.f2.position.y = -0.18 + Math.max(0, Math.sin(mo.phase + Math.PI)) * 0.12;
        }
        return true;
      });
    })();

    // 7.8 — ACTION POTENTIAL wavefront: a glowing band traveling down the axon
    //   (saltatory jumps node-to-node). Pure visual signal of excitation. (LOD 1+)
    (function actionPotential() {
      if (!axonCurve) return;
      const wave = new THREE.Mesh(
        new THREE.TorusGeometry(0.85, 0.22, 10, 20),
        new THREE.MeshStandardMaterial({ color: 0x66ffff, emissive: 0x0aa0a0, roughness: 0.3, transparent: true, opacity: 0.9 })
      );
      const waveGrp = new THREE.Group(); waveGrp.add(wave);
      neuron.add(waveGrp); registerLOD(waveGrp, 1);
      // info anchor at axon hillock (where the AP starts)
      const ag = new THREE.Group(); ag.position.copy(SOMA_C).add(new THREE.Vector3(SOMA_R, 1.5, 0));
      ag.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false })));
      register(ag, 'action_potential', true); neuron.add(ag);

      const up = new THREE.Vector3(0,1,0);
      let prog = 0;
      neuronAnims.push((dt) => {
        if (!_ev(waveGrp)) return false;
        // saltatory-ish: ease between discrete node positions
        prog += dt * 0.25; if (prog > 1) prog -= 1;
        const nodes = 7; const seg = Math.floor(prog * nodes) / nodes;
        const t = 0.12 + seg * 0.86; // map onto wrapped region
        const p = axonCurve.getPoint(Math.min(0.98, t));
        wave.position.copy(p);
        const tan = axonCurve.getTangent(Math.min(0.98, t));
        wave.quaternion.setFromUnitVectors(up, tan);
        const pulse = 0.7 + 0.3 * Math.sin(prog * nodes * Math.PI * 2);
        wave.scale.setScalar(pulse);
        return true;
      });
    })();

    // 7.9 — SMOOTH ER + GOLGI OUTPOST in a dendrite (local protein supply for
    //   spines). Shows neurons have satellite secretory machinery far from soma.
    (function dendriticOutpost() {
      const base = SOMA_C.clone().add(new THREE.Vector3(-6, 5, -2));
      const g = new THREE.Group(); g.position.copy(base);
      // smooth ER tubular network
      const erMat = new THREE.MeshPhysicalMaterial({ color: 0x6fd0ff, transparent: true, opacity: 0.5, roughness: 0.3, side: THREE.DoubleSide });
      for (let i = 0; i < 5; i++) {
        const pts = [];
        let p = new THREE.Vector3(0,0,0);
        for (let k = 0; k < 4; k++) { pts.push(p.clone()); p = p.clone().add(new THREE.Vector3((Math.random()-0.5)*1.6,(Math.random()-0.5)*1.6,(Math.random()-0.5)*1.6)); }
        const c = new THREE.CatmullRomCurve3(pts);
        g.add(new THREE.Mesh(new THREE.TubeGeometry(c, 20, 0.1, 6, false), erMat));
      }
      register(g, 'er_smooth', true); neuron.add(g); registerLOD(g, 1);
      // small Golgi outpost stack nearby
      const gg = new THREE.Group(); gg.position.copy(base).add(new THREE.Vector3(1.5, 0.5, 0.5));
      const golMat = new THREE.MeshPhysicalMaterial({ color: 0xffc861, transparent: true, opacity: 0.6, roughness: 0.3, side: THREE.DoubleSide });
      for (let i = 0; i < 4; i++) { const disc = new THREE.Mesh(new THREE.TorusGeometry(0.5 - i*0.07, 0.14, 8, 20, Math.PI*1.4), golMat); disc.position.y = i*0.28 - 0.4; disc.rotation.x = Math.PI/2; gg.add(disc); }
      // re-point golgi info chip exists already; just add a subtle clickable anchor
      register(gg, 'golgi', false); neuron.add(gg); spinners.push({ obj: gg, axis: 'y', speed: 0.05 });
      freezeStatic(g);
    })();

    // 7.10 — RECYCLING VESICLE POOL: after release, vesicles bud back from the
    //   presynaptic membrane via clathrin and refill — animated endocytosis. (LOD 2+)
    (function vesicleRecycling() {
      const center = AXON_END.clone();
      const recMat = new THREE.MeshStandardMaterial({ color: 0x8fd0ff, emissive: 0x123a5a, roughness: 0.5 });
      const coatMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, emissive: 0x4a3000, roughness: 0.5 });
      const pool = [];
      const g = new THREE.Group();
      for (let i = 0; i < 6; i++) {
        const v = new THREE.Group();
        v.add(new THREE.Mesh(new THREE.SphereGeometry(0.2, 10, 8), recMat));
        // clathrin coat bumps
        const coat = new THREE.Group();
        for (let k = 0; k < 10; k++) { const b = new THREE.Mesh(new THREE.SphereGeometry(0.05, 5, 5), coatMat); b.position.copy(onSphere(0.22)); coat.add(b); }
        v.add(coat); registerLOD(coat, 3);
        g.add(v);
        // route: from the presyn membrane back into the vesicle pool
        const membrane = center.clone().add(new THREE.Vector3(2.2, (Math.random()-0.5)*2, (Math.random()-0.5)*2));
        const home = center.clone().add(new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2));
        pool.push({ v, membrane, home, t: Math.random(), speed: 0.12 + Math.random()*0.1 });
      }
      neuron.add(g); registerLOD(g, 2);
      neuronAnims.push((dt) => {
        if (!_ev(g)) return false;
        for (const pv of pool) { pv.t += dt * pv.speed; if (pv.t > 1) pv.t -= 1; pv.v.position.copy(pv.membrane).lerp(pv.home, pv.t); }
        return true;
      });
    })();

    // ---- re-apply current cell type & refresh LOD now the parts exist ----
    if (C.applyCellType) C.applyCellType(window.game_config.cellType || 'animal');
    if (window.__CELL_resetLOD) window.__CELL_resetLOD();
  })();
  </script>

  <!-- ============================================================
       Iteration 8: 动物/通用细胞 — 能量与代谢机器深层细节
       (mitochondrial matrix + cristae + electron transport chain,
        lipid droplets, glycogen granules) — added into `cell`,
        animalOnly so they hide for the plant cell.
       ============================================================ -->
  <script>
  (function () {
    const C = window.__CELL;
    const { THREE, cell, register, registerLOD, markShell, freezeStatic, CELL_R } = C;
    const spinners = C.spinners;
    C.onCellType = C.onCellType || [];
    const animalOnly = [];
    const microAnims = [];
    const prevAnimate = window.__animateOrganelles;
    window.__animateOrganelles = function (dt, t) {
      let moved = prevAnimate ? !!prevAnimate(dt, t) : false;
      for (const fn of microAnims) { try { if (fn(dt, t)) moved = true; } catch (e) {} }
      return moved;
    };
    const _ev = window.__CELL_effVisible || (o => o.visible);
    function rand(a, b) { return a + Math.random() * (b - a); }
    function onSphere(r) {
      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
      return new THREE.Vector3(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
    }

    // 8.1 — A CUTAWAY "HERO" MITOCHONDRION showing the inner membrane folded
    //   into cristae, the matrix, and rows of respiratory-chain + ATP-synthase
    //   knobs. Bigger and clearer than the small mito instances. (LOD 1+)
    (function heroMitochondrion() {
      const g = new THREE.Group();
      g.position.set(rand(7, 10), rand(-3, 3), rand(-4, 4));
      g.rotation.set(rand(0,3), rand(0,3), rand(0,3));

      const outerMat = new THREE.MeshPhysicalMaterial({ color: 0xff9a6b, transparent: true, opacity: 0.32, roughness: 0.4, transmission: 0.4, side: THREE.DoubleSide, depthWrite: false });
      const L = 5.2, R = 2.0;
      const outer = C.makeCapsule(R, L, outerMat, 24);
      markShell(outer); g.add(outer);

      // matrix glow (clickable as mitochondrial_matrix)
      const matrix = new THREE.Mesh(C.makeCapsule ? new THREE.SphereGeometry(R - 0.35, 24, 18) : new THREE.SphereGeometry(R - 0.35, 24, 18),
        new THREE.MeshBasicMaterial({ color: 0xffcf9a, transparent: true, opacity: 0.14, side: THREE.BackSide, depthWrite: false }));
      matrix.scale.set(1, (L + R) / (R), 1);
      const matrixGrp = new THREE.Group(); matrixGrp.add(matrix);
      register(matrixGrp, 'mitochondrial_matrix', true); g.add(matrixGrp);

      // cristae — folded inner-membrane shelves running across the body
      const cristaeMat = new THREE.MeshStandardMaterial({ color: 0xffb877, emissive: 0x4a2310, roughness: 0.5, side: THREE.DoubleSide });
      const cristaeGrp = new THREE.Group();
      const knobMat = new THREE.MeshStandardMaterial({ color: 0xffe08a, emissive: 0x554400, roughness: 0.4 });
      const etcMat = new THREE.MeshStandardMaterial({ color: 0x6fd0ff, emissive: 0x123a55, roughness: 0.45 });
      const etcGrp = new THREE.Group();   // electron transport chain complexes
      const knobGrp = new THREE.Group();   // ATP synthase F1 knobs
      const nFolds = 9;
      for (let i = 0; i < nFolds; i++) {
        const y = -L/2 + (i + 0.5) * (L / nFolds);
        const shelf = new THREE.Mesh(new THREE.TorusGeometry(R - 0.55, 0.12, 6, 18, Math.PI * 1.5), cristaeMat);
        shelf.position.y = y; shelf.rotation.x = Math.PI / 2; shelf.rotation.z = rand(0, 6);
        cristaeGrp.add(shelf);
        // dot the shelf rim with ETC complexes and ATP-synthase knobs
        for (let k = 0; k < 8; k++) {
          const a = k / 8 * Math.PI * 1.5 + shelf.rotation.z;
          const rr = R - 0.55;
          const px = Math.cos(a) * rr, pz = Math.sin(a) * rr;
          if (k % 2 === 0) {
            const c = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.22, 0.18), etcMat);
            c.position.set(px, y, pz); etcGrp.add(c);
          } else {
            const knobStalk = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.18, 5), knobMat);
            const knobHead = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), knobMat);
            knobHead.position.y = 0.14;
            const kg = new THREE.Group(); kg.add(knobStalk, knobHead);
            kg.position.set(px, y, pz);
            kg.lookAt(0, y, 0); kg.rotateX(Math.PI / 2);
            knobGrp.add(kg);
          }
        }
      }
      g.add(cristaeGrp); registerLOD(cristaeGrp, 1);
      register(cristaeGrp, 'cristae', true);
      g.add(etcGrp); registerLOD(etcGrp, 2); register(etcGrp, 'electron_transport_chain', true);
      g.add(knobGrp); registerLOD(knobGrp, 2);

      // wandering mtDNA loops + a couple of mito-ribosomes in the matrix (LOD 3)
      const dnaMat = new THREE.MeshStandardMaterial({ color: 0x9affd0, emissive: 0x115533, roughness: 0.6 });
      const inner = new THREE.Group();
      for (let i = 0; i < 3; i++) {
        const loop = new THREE.Mesh(new THREE.TorusGeometry(rand(0.35, 0.6), 0.04, 5, 24), dnaMat);
        loop.position.set(rand(-0.6,0.6), rand(-L/2+0.6, L/2-0.6), rand(-0.6,0.6));
        loop.rotation.set(rand(0,3), rand(0,3), rand(0,3));
        inner.add(loop);
      }
      g.add(inner); registerLOD(inner, 3);

      register(g, 'mitochondria', true);
      cell.add(g); animalOnly.push(g);
      spinners.push({ obj: g, axis: 'y', speed: 0.025 });

      // protons shuttling along a crista (pumped by ETC → used by ATP synthase)
      const protMat = new THREE.MeshBasicMaterial({ color: 0x9fe8ff });
      const protons = [];
      const pg = new THREE.Group();

  <!-- ============================================================
       Iteration 9: 动物/通用细胞 — 膜运输与黏附机器

  <script>
  (function () {

    // 9.1 — INTEGRINS + FOCAL ADHESION: a patch on the membrane where clustered

        const dir = dockDir.clone().applyAxisAngle(new THREE.Vector3(0,1,0), rand(-0.6,0.6)).applyAxisAngle(new THREE.Vector3(1,0,0), rand(-0.6,0.6));
        const dock = dir.clone().multiplyScalar(CELL_R - 1.2);

  (function () {

      return moved;

    function rand(a, b) { return a + Math.random() * (b - a); }

      return new THREE.Vector3(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
    }

    //   vesicles + clustered Ca channels, precisely facing the PSD. (LOD 1+)
    (function activeZone() {
      const g = new THREE.Group(); g.position.copy(PRESYN);
      const azMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, emissive: 0x4a3000, roughness: 0.5, transparent: true, opacity: 0.85 });
      const plaque = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, 0.25, 24), azMat);
      plaque.rotation.z = Math.PI / 2; g.add(plaque);
      // dense projections (the "pyramid" scaffold that captures vesicles)
      const projMat = new THREE.MeshStandardMaterial({ color: 0xffe9a8, roughness: 0.5 });
      const proj = new THREE.Group();
      for (let i = 0; i < 10; i++) { const a = Math.random()*Math.PI*2, rr = Math.random()*1.2; const c = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.5, 6), projMat); c.position.set(0.2, Math.cos(a)*rr, Math.sin(a)*rr); c.rotation.z = -Math.PI/2; proj.add(c); }
      g.add(proj); registerLOD(proj, 2);
      register(g, 'active_zone', true); neuron.add(g);

      const caMat = new THREE.MeshStandardMaterial({ color: 0xff9a3c, emissive: 0x4a2400, roughness: 0.4 });
      const caGrp = new THREE.Group();

    (function releaseMachinery() {

      const vesMat = new THREE.MeshStandardMaterial({ color: 0x6fb6ff, emissive: 0x123a5a, roughness: 0.45 });

      register(rrp, 'readily_releasable_pool', true); neuron.add(rrp); registerLOD(rrp, 1);

      // synaptotagmin info anchor
      const sa = new THREE.Group(); sa.position.copy(docked[0].home);
      sa.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false })));
      register(sa, 'synaptotagmin', true); neuron.add(sa);

      // SNARE bundles drawn at each docked vesicle (helical 4-bundle hint)
      const snareMat = new THREE.MeshStandardMaterial({ color: 0x8affc8, emissive: 0x115533, roughness: 0.5 });
      const snareGrp = new THREE.Group();

  <!-- ============================================================
       Iteration 13: 动物/通用细胞 — 细胞骨架运输与核糖体翻译细节
       (kinesin/dynein on a cytoplasmic microtubule carrying a vesicle,

       ============================================================ -->
  <script>
  (function () {
    const C = window.__CELL;
    const { THREE, cell, register, registerLOD, markShell, freezeStatic, CELL_R } = C;
    const spinners = C.spinners;
    C.onCellType = C.onCellType || [];
    const animalOnly = [];
    const microAnims = [];
    const prevAnimate = window.__animateOrganelles;
    window.__animateOrganelles = function (dt, t) {
      let moved = prevAnimate ? !!prevAnimate(dt, t) : false;
      for (const fn of microAnims) { try { if (fn(dt, t)) moved = true; } catch (e) {} }
      return moved;
    };
    const _ev = window.__CELL_effVisible || (o => o.visible);
    function rand(a, b) { return a + Math.random() * (b - a); }
    function onSphere(r) {
      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
      return new THREE.Vector3(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
    }
    const up = new THREE.Vector3(0, 1, 0);

    // 13.1 — A CYTOPLASMIC MICROTUBULE TRACK with motor proteins (kinesin +
    //   dynein) hauling a vesicle across the cytosol — same machinery shown for
    //   the axon, now in the generic cell so animal-cell learners see it too.
    (function cytoTransport() {
      const a = onSphere(CELL_R - 4), b = onSphere(CELL_R - 4);
      const mid = a.clone().lerp(b, 0.5).add(onSphere(4));
      const track = new THREE.CatmullRomCurve3([a, mid, b]);
      const tubeMat = new THREE.MeshStandardMaterial({ color: 0x6fe0a0, transparent: true, opacity: 0.7, roughness: 0.5 });
      const g = new THREE.Group();
      g.add(new THREE.Mesh(new THREE.TubeGeometry(track, 60, 0.12, 8, false), tubeMat));
      // dotted protofilament bumps along it (LOD 3)
      const bumpMat = new THREE.MeshStandardMaterial({ color: 0x9affd0, roughness: 0.6 });
      const bumps = new THREE.Group();
      for (let i = 0; i <= 40; i++) { const p = track.getPoint(i/40); const bm = new THREE.Mesh(new THREE.SphereGeometry(0.07, 5, 5), bumpMat); bm.position.copy(p); bumps.add(bm); }
      g.add(bumps); registerLOD(bumps, 3);

      function makeMotor(color, cargoColor) {
        const m = new THREE.Group();
        const hm = new THREE.MeshStandardMaterial({ color, roughness: 0.4 });
        const f1 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), hm); f1.position.set(0.1, -0.18, 0);
        const f2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), hm); f2.position.set(-0.1, -0.18, 0);

        const cargo = new THREE.Mesh(new THREE.SphereGeometry(0.26, 12, 10), new THREE.MeshStandardMaterial({ color: cargoColor, roughness: 0.5 })); cargo.position.y = 0.4;
        m.add(f1, f2, stalk, cargo);

      const mg = new THREE.Group();
      for (let i = 0; i < 2; i++) { const k = makeMotor(0x4fd08f, 0xffe9a8); mg.add(k.m); motors.push({ ...k, t: Math.random(), speed: 0.05, dir: 1, phase: rand(0,6) }); }
      for (let i = 0; i < 1; i++) { const d = makeMotor(0xff6f8f, 0xa8d0ff); mg.add(d.m); motors.push({ ...d, t: Math.random(), speed: 0.045, dir: -1, phase: rand(0,6) }); }
      cell.add(mg); animalOnly.push(mg); registerLOD(mg, 2);
      // motor info anchors
      const ka = new THREE.Group(); ka.position.copy(track.getPoint(0.4)); ka.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false }))); register(ka, 'kinesin', true); cell.add(ka); animalOnly.push(ka);
      const da = new THREE.Group(); da.position.copy(track.getPoint(0.6)); da.add(new THREE.Mesh(new THREE.SphereGeometry(0.01,3,3), new THREE.MeshBasicMaterial({ visible:false }))); register(da, 'dynein', true); cell.add(da); animalOnly.push(da);
      microAnims.push((dt) => {
        if (!_ev(mg)) return false;
        for (const mo of motors) {
          mo.t += dt * mo.speed * mo.dir; if (mo.t > 0.98) mo.t = 0.04; if (mo.t < 0.04) mo.t = 0.98;

        }

    // 13.2 — POLYRIBOSOME: many ribosomes translating a single mRNA loop at once

        const pc = new THREE.CatmullRomCurve3([pos, pos.clone().add(tail.clone().multiplyScalar(0.5)), pos.clone().add(tail)]);

    //   unfolded, ubiquitin-tagged substrate fed in from the top. (LOD 2+)
    (function proteasome() {
      const c = onSphere(CELL_R - 9);
      const g = new THREE.Group(); g.position.copy(c);
      const barrelMat = new THREE.MeshStandardMaterial({ color: 0x8fa0ff, emissive: 0x1a1a4a, roughness: 0.45 });
      const capMat = new THREE.MeshStandardMaterial({ color: 0xb0a0ff, roughness: 0.5 });
      // four stacked rings = the 20S core
      for (let i = 0; i < 4; i++) { const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.32, 18, 1, true), barrelMat); ring.position.y = i * 0.34 - 0.5; g.add(ring); }
      const capTop = new THREE.Mesh(new THREE.SphereGeometry(0.55, 16, 10, 0, Math.PI*2, 0, Math.PI/2), capMat); capTop.position.y = 0.7; g.add(capTop);
      const capBot = new THREE.Mesh(new THREE.SphereGeometry(0.55, 16, 10, 0, Math.PI*2, Math.PI/2, Math.PI/2), capMat); capBot.position.y = -0.7; g.add(capBot);
      // a substrate strand being threaded in (with ubiquitin beads)
      const subMat = new THREE.MeshStandardMaterial({ color: 0xffd36f, roughness: 0.6 });
      const ubMat = new THREE.MeshStandardMaterial({ color: 0xff79c6, roughness: 0.5 });
      const sub = new THREE.Group();
      const sp = [];
      for (let i = 0; i <= 12; i++) { sp.push(new THREE.Vector3(Math.sin(i*0.8)*0.2, 1.1 + i*0.12, Math.cos(i*0.8)*0.2)); }
      sub.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(sp), 24, 0.04, 4, false), subMat));
      for (let i = 0; i < 3; i++) { const u = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 8), ubMat); u.position.copy(sp[sp.length - 1 - i*2]); sub.add(u); }
      g.add(sub);
      register(g, 'proteasome', true); cell.add(g); animalOnly.push(g); registerLOD(g, 2);
      // slowly feed the substrate downward
      let off = 0;
      microAnims.push((dt) => { if (!_ev(g)) return false; off += dt * 0.4; sub.position.y = -((off % 1) * 0.4); return true; });
    })();

    C.onCellType.push((isPlant) => { animalOnly.forEach(o => o.visible = !isPlant); });
    if (C.applyCellType) C.applyCellType(window.game_config.cellType || 'animal');
    if (window.__CELL_resetLOD) window.__CELL_resetLOD();
  })();

  <!-- ============================================================

  <script>
  (function () {
    const C = window.__CELL;
    const neuron = C.neuronGroup;
    if (!neuron) return;
    const { THREE, register, registerLOD, markShell, freezeStatic } = C;
    const spinners = C.spinners;
    const neuronAnims = [];

      if (neuron.visible) for (const fn of neuronAnims) { try { if (fn(dt, t)) moved = true; } catch (e) {} }
      return moved;
    };
    const _ev = window.__CELL_effVisible || (o => o.visible);
    function rand(a, b) { return a + Math.random() * (b - a); }
    function onSphere(r) {
      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
      return new THREE.Vector3(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
    }
    const SOMA_C = new THREE.Vector3(-22, 0, 0);
