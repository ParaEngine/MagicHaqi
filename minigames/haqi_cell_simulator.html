    // 14.1 — DENDRITIC-SPINE GALLERY: a short dendrite shaft carrying the three
    //   classic spine shapes (mushroom / thin / stubby) side by side so learners
    //   can compare. Each mushroom head gets a tiny PSD patch. (LOD 1+)
    (function spineGallery() {
      const dir = new THREE.Vector3(-0.3, 0.9, -0.5).normalize();
      const shaftStart = SOMA_C.clone().add(dir.clone().multiplyScalar(SOMA_R + 1));
      const shaftEnd = shaftStart.clone().add(new THREE.Vector3(-4, 3, -2));
      const shaftMat = new THREE.MeshPhysicalMaterial({ color: 0x9b8bff, transparent: true, opacity: 0.55, roughness: 0.4, side: THREE.DoubleSide });
      const g = new THREE.Group();
      const shaftCurve = new THREE.CatmullRomCurve3([shaftStart, shaftStart.clone().lerp(shaftEnd, 0.5), shaftEnd]);
      g.add(new THREE.Mesh(new THREE.TubeGeometry(shaftCurve, 30, 0.55, 10, false), shaftMat));

      const spineMat = new THREE.MeshPhysicalMaterial({ color: 0xb0a3ff, transparent: true, opacity: 0.7, roughness: 0.4, side: THREE.DoubleSide });
      const psdMat = new THREE.MeshStandardMaterial({ color: 0xff6f8f, emissive: 0x5a1326, roughness: 0.5 });
      const mushroomHeads = [];
      // build a spine of a given style at parameter u along the shaft
      function spineAt(u, style) {
        const base = shaftCurve.getPoint(u);
        const tan = shaftCurve.getTangent(u);
        const outDir = new THREE.Vector3().crossVectors(tan, up).normalize();
        const sp = new THREE.Group(); sp.position.copy(base);
        if (style === 'mushroom') {
          const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.6, 8), spineMat);
          neck.position.copy(outDir.clone().multiplyScalar(0.45)); neck.quaternion.setFromUnitVectors(up, outDir); sp.add(neck);
          const head = new THREE.Mesh(new THREE.SphereGeometry(0.42, 16, 12), spineMat);
          head.position.copy(outDir.clone().multiplyScalar(0.95)); head.userData._noPick = false; sp.add(head);
          const psd = new THREE.Mesh(new THREE.CircleGeometry(0.3, 16), psdMat);
          psd.position.copy(outDir.clone().multiplyScalar(1.35)); psd.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), outDir); sp.add(psd);
          mushroomHeads.push(head.position.clone().add(base));
        } else if (style === 'thin') {
          const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.08, 0.9, 8), spineMat);
          neck.position.copy(outDir.clone().multiplyScalar(0.55)); neck.quaternion.setFromUnitVectors(up, outDir); sp.add(neck);
          const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 14, 10), spineMat);
          head.position.copy(outDir.clone().multiplyScalar(1.1)); sp.add(head);
        } else { // stubby
          const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 14, 10), spineMat);
          head.position.copy(outDir.clone().multiplyScalar(0.4)); head.scale.set(1, 0.8, 1); sp.add(head);
        }
        return sp;
      }
      g.add(spineAt(0.2, 'mushroom'));
      g.add(spineAt(0.4, 'thin'));
      g.add(spineAt(0.55, 'stubby'));
      g.add(spineAt(0.75, 'mushroom'));
      register(g, 'dendritic_spine', true); neuron.add(g); registerLOD(g, 1);
      C._spineHeads = mushroomHeads;
      freezeStatic(g);
    })();

    // 14.2 — AMPA RECEPTOR TRAFFICKING: receptors diffuse on the membrane and
    //   are inserted/removed at a mushroom-spine PSD — the cellular basis of
    //   learning (LTP/LTD). Animated little blue receptors sliding to/from the
    //   synapse. (LOD 1+)
    (function ampaTrafficking() {
      const heads = C._spineHeads || [];
      if (!heads.length) return;
      const target = heads[0];
      const g = new THREE.Group();
      const recMat = new THREE.MeshStandardMaterial({ color: 0x4f9bff, emissive: 0x0a2a5a, roughness: 0.45 });
      const recs = [];
      for (let i = 0; i < 10; i++) {
        const r = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 0.28, 8), recMat);
        const home = target.clone().add(onSphere(rand(0.5, 1.8)));
        r.position.copy(home);

      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
      return new THREE.Vector3(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
    }

      const mid = a.clone().lerp(b, 0.5);

      m.position.copy(a.clone().lerp(b, 0.5));

      return m;
    }
    (function epspIpspColorCoding() {
      // EPSP: color existing dendritic spine heads blue. Bias toward distal
      // spines, because excitatory synapses are mostly on distal dendrites and
      // dendritic spines. No new 3D marker geometry is created.
      const spineTargets = [];
      neuron.updateWorldMatrix(true, true);
      neuron.traverse(o => {
        if (!o.userData || !o.userData._spineHead) return;
        const head = o.userData._spineHead;
        head.updateWorldMatrix(true, false);
        const pos = new THREE.Vector3().setFromMatrixPosition(head.matrixWorld);
        spineTargets.push({ head, dist: pos.distanceTo(SOMA_C) });
      });
      spineTargets.sort((a, b) => b.dist - a.dist);
      const epspCount = spineTargets.length;
      for (let i = 0; i < epspCount; i++) {
        const head = spineTargets[i].head;
        if (head.material && head.material.color) head.material.color.setHex(0x4f9bff);
        if (head.material && head.material.emissive) head.material.emissive.setHex(0x0a2a5a);
        head.userData.epsp = true;
      }

      // Also color already-existing excitatory synapse / AMPA/NMDA structures blue.
      neuron.traverse(o => {
        if (!o.isMesh || !o.material || !o.material.color) return;
        const key = o.userData && o.userData.key;

          if (o.material.emissive) o.material.emissive.setHex(0x0a2a5a);

        let dir = onSphere(1).normalize();
        // bias toward lower/front soma and proximal dendrite side, but still on surface
        dir.y = dir.y * 0.55 - 0.18;
        dir.normalize();
        const base = SOMA_C.clone().add(dir.clone().multiplyScalar(SOMA_R + 0.12));
        const tip = SOMA_C.clone().add(dir.clone().multiplyScalar(SOMA_R + 0.62 + Math.random() * 0.22));
        const neck = cylBetween(base, tip, 0.055, neckMat, 7);
        const bouton = new THREE.Mesh(new THREE.SphereGeometry(0.28 + Math.random() * 0.08, 12, 10), boutonMat);
        bouton.position.copy(tip);
        bouton.scale.y = 0.82;
        somaBoutons.add(neck, bouton);
      }
      register(somaBoutons, 'inhibitory_synapse', false);
      neuron.add(somaBoutons);
      registerLOD(somaBoutons, 1);

    })();

    // Whole-neuron signal loop: dendritic EPSP/IPSP inputs integrate in the
    // soma, AIS reaches threshold, an action potential jumps down the axon,
    // then the terminal opens Ca2+ channels and releases transmitter. This is a
    // lightweight overlay: it does not block normal orbit/zoom/click inspection.
    (function neuralSignalCycle() {
      const D = window.ORGANELLE_DATA || {};
      D.neural_signal_cycle = D.neural_signal_cycle || {
        emoji: '⚡', name: '神经信号循环', en: 'Whole-Neuron Signal Cycle',
        desc: '从树突接收兴奋/抑制输入，胞体整合离子电位，轴突初段（AIS）触发动作电位，再沿轴突传到末梢并释放神经递质的连续动画。',
        facts: [
          '蓝色脉冲表示兴奋性输入（EPSP）向胞体汇聚',
          '红色脉冲表示抑制性输入（IPSP）调节放电阈值',
          '胞体内的离子云越亮，表示膜电位越接近阈值',
          'AIS 金色闪光表示动作电位被触发',
          '青色波沿轴突跳跃传播，末梢随后释放绿色递质颗粒'
        ]
      };

      const axonCurve = C._axonCurve;
      if (!axonCurve) return;

      const signalRoot = new THREE.Group();
      signalRoot.userData._signalOverlay = true;
      neuron.add(signalRoot);

      const up = new THREE.Vector3(0, 1, 0);
      const AXON_END = axonCurve.getPoint(1);
      const AIS_POS = axonCurve.getPoint(0.08);

      function makePulse(color, emissive, radius) {
        const pulse = new THREE.Mesh(
          new THREE.SphereGeometry(radius || 0.18, 12, 10),
          new THREE.MeshStandardMaterial({ color, emissive, roughness: 0.25, transparent: true, opacity: 0.0 })
        );
        pulse.material.depthTest = false;
        return pulse;
      }
      function glowSphere(radius, color, opacity) {
        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(radius, 24, 18),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: opacity || 0.0, depthWrite: false })
        );
        glow.material.depthTest = false;
        return glow;
      }

      // 1) Dendritic input routes into the soma.
      const inputGroup = new THREE.Group();
      const inputRoutes = [];
      const routeSpecs = [
        { from: new THREE.Vector3(-36, 8, -5), mid: new THREE.Vector3(-31, 5, -2), color: 0x4f9bff, emissive: 0x0a2a5a, phase: 0.00, kind: 'epsp' },
        { from: new THREE.Vector3(-34, -7, 4), mid: new THREE.Vector3(-30, -4, 2), color: 0x4f9bff, emissive: 0x0a2a5a, phase: 0.18, kind: 'epsp' },
        { from: new THREE.Vector3(-28, 11, 5), mid: new THREE.Vector3(-26, 6, 2), color: 0x4f9bff, emissive: 0x0a2a5a, phase: 0.35, kind: 'epsp' },
        { from: new THREE.Vector3(-16, -8, -3), mid: new THREE.Vector3(-19, -5, -1), color: 0xff5f6f, emissive: 0x5a1018, phase: 0.52, kind: 'ipsp' },
        { from: new THREE.Vector3(-18, 7, 3), mid: new THREE.Vector3(-20, 4, 1), color: 0xff5f6f, emissive: 0x5a1018, phase: 0.72, kind: 'ipsp' }
      ];
      routeSpecs.forEach(spec => {
        const target = SOMA_C.clone().add(new THREE.Vector3(0.5, spec.kind === 'ipsp' ? -0.8 : 0.4, 0));
        const curve = new THREE.CatmullRomCurve3([spec.from, spec.mid, target]);
        const guide = new THREE.Mesh(
          new THREE.TubeGeometry(curve, 36, spec.kind === 'ipsp' ? 0.045 : 0.055, 6, false),
          new THREE.MeshBasicMaterial({ color: spec.color, transparent: true, opacity: spec.kind === 'ipsp' ? 0.18 : 0.24, depthWrite: false, depthTest: false })
        );
        inputGroup.add(guide);
        const pulse = makePulse(spec.color, spec.emissive, spec.kind === 'ipsp' ? 0.28 : 0.34);
        inputGroup.add(pulse);
        inputRoutes.push({ curve, pulse, phase: spec.phase, kind: spec.kind });
      });
      signalRoot.add(inputGroup);

      // 2) Soma integration: ion cloud + threshold ring.
      const somaGlow = glowSphere(2.5, 0x6fd0ff, 0.0);
      somaGlow.position.copy(SOMA_C);
      signalRoot.add(somaGlow);

      const ionMat = new THREE.MeshBasicMaterial({ color: 0x8fe8ff, transparent: true, opacity: 0.0 });
      const ionGroup = new THREE.Group();
      ionGroup.position.copy(SOMA_C);
      const somaIons = [];
      for (let i = 0; i < 34; i++) {
        const ion = new THREE.Mesh(new THREE.SphereGeometry(0.055, 6, 6), ionMat.clone());
        ionGroup.add(ion);
        somaIons.push({ ion, r: 0.35 + Math.random() * 2.0, a: Math.random() * Math.PI * 2, b: Math.random() * Math.PI * 2, speed: 0.6 + Math.random() * 1.2 });
      }
      signalRoot.add(ionGroup);

      const aisRing = new THREE.Mesh(
        new THREE.TorusGeometry(0.9, 0.12, 10, 28),
        new THREE.MeshStandardMaterial({ color: 0xffe066, emissive: 0x5a4000, roughness: 0.22, transparent: true, opacity: 0.0 })
      );
      aisRing.position.copy(AIS_POS);
      aisRing.quaternion.setFromUnitVectors(up, axonCurve.getTangent(0.08).normalize());
      signalRoot.add(aisRing);

      // 3) Action potential wave along the axon.
      const apWave = new THREE.Mesh(
        new THREE.TorusGeometry(1.05, 0.24, 10, 32),
        new THREE.MeshStandardMaterial({ color: 0x66ffff, emissive: 0x00a0a0, roughness: 0.2, transparent: true, opacity: 0.0 })
      );
      apWave.material.depthTest = false;
      signalRoot.add(apWave);

      const axonGuidePts = [];
      for (let i = 0; i <= 72; i++) axonGuidePts.push(axonCurve.getPoint(0.08 + i / 72 * 0.88));
      const axonGuide = new THREE.Mesh(
        new THREE.TubeGeometry(new THREE.CatmullRomCurve3(axonGuidePts), 96, 0.08, 6, false),
        new THREE.MeshBasicMaterial({ color: 0x66ffff, transparent: true, opacity: 0.26, depthWrite: false, depthTest: false })
      );
      signalRoot.add(axonGuide);

      const axonBeads = [];
      const beadMat = new THREE.MeshBasicMaterial({ color: 0x8fffff, transparent: true, opacity: 0.85, depthWrite: false, depthTest: false });
      for (let i = 0; i < 7; i++) {
        const bead = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8), beadMat.clone());
        signalRoot.add(bead);
        axonBeads.push({ bead, phase: i / 7 });
      }

      // 4) Terminal Ca2+ flash + vesicle fusion + transmitter release.
      const terminalGlow = glowSphere(1.8, 0x66ffff, 0.0);
      terminalGlow.position.copy(AXON_END).add(new THREE.Vector3(1.7, 0, 0));
      signalRoot.add(terminalGlow);

      const vesicleMat = new THREE.MeshStandardMaterial({ color: 0x7fb6ff, emissive: 0x12305a, roughness: 0.4, transparent: true, opacity: 0.0, depthTest: false });
      const vesicleGroup = new THREE.Group();
      const vesicles = [];
      for (let i = 0; i < 9; i++) {
        const v = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 8), vesicleMat.clone());
        const base = AXON_END.clone().add(new THREE.Vector3(1.2 + Math.random() * 0.8, (Math.random() - 0.5) * 1.8, (Math.random() - 0.5) * 1.8));
        v.position.copy(base);
        vesicleGroup.add(v);
        vesicles.push({ v, base, phase: Math.random() });
      }
      signalRoot.add(vesicleGroup);

      const ntMat = new THREE.MeshBasicMaterial({ color: 0x7dff9a, transparent: true, opacity: 0.0, depthWrite: false, depthTest: false });
      const ntGroup = new THREE.Group();
      const transmitters = [];
      for (let i = 0; i < 28; i++) {
        const n = new THREE.Mesh(new THREE.SphereGeometry(0.065, 6, 6), ntMat.clone());
        ntGroup.add(n);
        transmitters.push({ n, y: (Math.random() - 0.5) * 1.3, z: (Math.random() - 0.5) * 1.3, speed: 0.75 + Math.random() * 0.5 });
      }
      signalRoot.add(ntGroup);

      register(signalRoot, 'neural_signal_cycle', false);

      function smooth01(x) {
        x = Math.max(0, Math.min(1, x));
        return x * x * (3 - 2 * x);
      }
      function triangularWindow(x, center, width) {
        return Math.max(0, 1 - Math.abs(x - center) / width);
      }

      const signalAnims = [];
      const prevAnimate = window.__animateOrganelles;
      window.__animateOrganelles = function (dt, t) {
        let moved = prevAnimate ? !!prevAnimate(dt, t) : false;
        if (neuron.visible) {
          for (const fn of signalAnims) { try { if (fn(dt, t)) moved = true; } catch (e) {} }
        }
        return moved;
      };

      // One full cycle: inputs (0–0.34) → integration (0.22–0.48) → AIS (0.48)
      // → axon conduction (0.50–0.82) → terminal release (0.78–1.0), repeated.
      signalAnims.push((dt, t) => {
        if (!_ev(signalRoot)) return false;
        const cycleSec = 6.5;
        const phase = (t % cycleSec) / cycleSec;
        const smallJitter = 0.035 * Math.sin(t * 1.7) + 0.02 * Math.sin(t * 3.1);

        inputRoutes.forEach(route => {
          const local = (phase - route.phase + 1) % 1;
          const active = local < 0.32;
          if (active) {
            const u = smooth01(local / 0.32);
            route.pulse.position.copy(route.curve.getPoint(u));
            route.pulse.material.opacity = route.kind === 'ipsp' ? 0.75 : 0.9;
            route.pulse.scale.setScalar(0.85 + 0.35 * Math.sin(local * Math.PI * 8));
          } else {
            route.pulse.material.opacity = 0.0;
          }
        });

        const integration = Math.max(0, Math.min(1, (phase - 0.18) / 0.32));
        const threshold = triangularWindow(phase, 0.48, 0.08);
        somaGlow.material.opacity = 0.03 + 0.23 * smooth01(integration) + 0.18 * threshold;
        ionGroup.rotation.y += dt * (0.6 + 1.3 * integration);
        somaIons.forEach((it, idx) => {
          const a = it.a + t * it.speed + idx * 0.11;
          const b = it.b + t * it.speed * 0.7;
          const r = it.r * (0.78 + 0.18 * Math.sin(t * 1.2 + idx));
          it.ion.position.set(Math.cos(a) * Math.sin(b) * r, Math.cos(b) * r * 0.75, Math.sin(a) * Math.sin(b) * r);
          it.ion.material.opacity = 0.12 + 0.55 * integration + 0.25 * threshold;
          it.ion.scale.setScalar(0.8 + 0.45 * threshold);
        });

        aisRing.material.opacity = 0.15 + 0.85 * threshold;
        aisRing.scale.setScalar(1 + threshold * 0.85 + smallJitter);
        aisRing.rotation.z += dt * (1.6 + threshold * 8);

        const axonStart = 0.50, axonEnd = 0.82;
        const axonU = (phase - axonStart) / (axonEnd - axonStart);
        axonBeads.forEach((it, idx) => {
          const beadU = (phase * 1.55 + it.phase) % 1;
          const u = 0.08 + beadU * 0.88;
          it.bead.position.copy(axonCurve.getPoint(u));
          const beat = 0.55 + 0.45 * Math.sin((beadU * Math.PI * 2 * 3) - idx * 0.7);
          it.bead.material.opacity = 0.32 + 0.55 * beat;
          it.bead.scale.setScalar(0.9 + 0.9 * beat);
        });
        if (axonU >= 0 && axonU <= 1) {
          const u = 0.08 + smooth01(axonU) * 0.88;
          apWave.position.copy(axonCurve.getPoint(u));
          apWave.quaternion.setFromUnitVectors(up, axonCurve.getTangent(u).normalize());
          apWave.material.opacity = 0.95;
          apWave.scale.setScalar(0.85 + 0.35 * Math.sin(axonU * Math.PI * 9));
        } else {
          apWave.material.opacity = 0.0;
        }

        const release = Math.max(0, Math.min(1, (phase - 0.78) / 0.20));
        const releasePulse = Math.sin(release * Math.PI);
        terminalGlow.material.opacity = Math.max(0, 0.42 * releasePulse);
        vesicles.forEach((it, idx) => {
          const towardMembrane = AXON_END.clone().add(new THREE.Vector3(2.55, 0, 0));
          const wobble = new THREE.Vector3(0, Math.sin(t * 2 + idx) * 0.08, Math.cos(t * 1.7 + idx) * 0.08);
          it.v.position.copy(it.base).lerp(towardMembrane, Math.max(0, release - 0.15) * 0.65).add(wobble);
          it.v.material.opacity = 0.28 + 0.72 * releasePulse;
          it.v.scale.setScalar(1 - 0.45 * Math.max(0, release - 0.55));
        });
        transmitters.forEach((it, idx) => {
          const ntPhase = Math.max(0, Math.min(1, (release - idx * 0.015) * it.speed));
          if (release > 0.06 && ntPhase > 0) {
            const from = AXON_END.clone().add(new THREE.Vector3(2.55, 0, 0));
            const to = AXON_END.clone().add(new THREE.Vector3(4.45, it.y, it.z));
            it.n.position.copy(from).lerp(to, ntPhase);
            it.n.material.opacity = Math.max(0, 0.9 * (1 - ntPhase));
          } else {
            it.n.material.opacity = 0.0;
          }
        });

        return true;
      });
    })();

    if (C.applyCellType) C.applyCellType(window.game_config.cellType || 'animal');
    if (window.__CELL_resetLOD) window.__CELL_resetLOD();
  })();
  </script>
