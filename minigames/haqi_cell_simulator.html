<!DOCTYPE html>
<!--
================================================================================
 3D 细胞模拟器 — 开发者指南：如何添加更多细节 / LOD 模型 / 动画
 DEVELOPER GUIDE: How to add more detail (LOD models / animations)
================================================================================

 本文件是单文件 Three.js (r128) 应用，由多个内联脚本块按“迭代”顺序构建：
 This is a single-file Three.js (r128) app built in ordered inline-script "iterations":
   Iteration 1: 场景核心 / 相机 / 拾取 / LOD / 标签 / 渲染循环 (core, camera, pick, LOD, labels, render loop)
   Iteration 2: 主要细胞器 (nucleus, mitochondria, ER, Golgi)
   Iteration 3: 细节细胞器 + 植物/动物切换 (lysosome, vacuole, cytoskeleton, cell type switching)
   Iteration 4: 分子尺度超精细结构 (DNA, ATP synthase, vesicles, molecular crowd)
   Iteration 5: 神经元形态 (soma, dendrites, spines, axon, myelin, synapse, channels)
   Iteration 6: 动物/通用细胞精细结构 (microtubules, centrosome, microvilli, cilia, clathrin, junctions, ECM)
   Iteration 7: 神经元更深层结构与分子机器 (glia, growth cone, SNARE/Ca2+, PSD+AMPA/NMDA, kinesin/dynein, AP wave)
   Iteration 8: 动物细胞能量代谢机器 (hero mitochondrion w/ cristae+ETC, lipid droplets, glycogen)
   Iteration 9: 动物细胞膜运输与黏附 (integrin/focal adhesion, COPI/II, secretory vesicles, autophagosome, ER exit, ER ribosome)
   Iteration 10: 神经元突触前释放机器 (active zone, RRP, synaptotagmin, SNARE zip, glutamate quanta)
   Iteration 11: 神经元轴突结构与骨架 (node Na-channels, paranode, myelin lamellae, bouton, spine apparatus, filopodia)
   Iteration 12: 神经元递质化学与胶质微环境 (GABA bouton, dopamine varicosities, microglia, perineuronal net)
   Iteration 13: 动物细胞骨架运输与翻译 (cyto microtubule + motors, polyribosome, proteasome)
  Iteration 14: 神经元树突棘多样性与受体动态 (spine gallery, AMPA trafficking, endocytic zone)
  Iteration 15–34: 二十轮扩充细节：神经元特化结构 + 动物细胞膜/骨架/核内微区

 所有公共工具都挂在 `window.__CELL` 上，后续脚本块通过它获取。
 All shared helpers live on `window.__CELL`; later scripts destructure from it:
   const { THREE, scene, cell, register, registerLOD, markShell, makeCapsule, freezeStatic } = window.__CELL;
   // 神经元专属：const { neuronGroup } = ...; (parts go into C.neuronGroup, not `cell`)

 验证修改 (validate after editing)：用编辑器/浏览器检查；无语法错误且加载时控制台无报错即可。

--------------------------------------------------------------------------------
 A. 添加一个新的可点击结构 (ADD A NEW CLICKABLE STRUCTURE)
--------------------------------------------------------------------------------
 1) 在 `window.ORGANELLE_DATA` 中加一条知识条目 (knowledge entry)，key 为英文短名：
      myThing: { emoji:"🔬", name:"中文名", en:"English", desc:"...", facts:["...","..."] }
 2) 构建 Three.js 对象 (Group/Mesh)，定位好后加入容器：
      球形细胞用 `cell.add(obj)`；神经元用 `neuron.add(obj)` (= C.neuronGroup)。
 3) 注册以便点击 + 标签：`register(obj, 'myThing', true);`  (第三参 true = 显示 3D 标签)
 4) 若属于植物/动物专属，push 到 `plantOnly` / `animalOnly`；神经元结构放进 neuron 组即可。
 5) 若想出现在底部导航栏，把 key 加进对应的 *_KEYS 数组 (ANIMAL_KEYS / PLANT_KEYS / NEURON_KEYS)。

--------------------------------------------------------------------------------
 B. 添加 LOD 细节 (ADD LOD DETAIL — 越近越清晰)
--------------------------------------------------------------------------------
 - 用 `registerLOD(obj, minLevel)` 注册细节子组。minLevel: 1=中等 2=精细 3=分子尺度。
   全局 LOD 等级由相机距离决定 (lodForDistance)：>40→0, >24→1, >12→2, 否则→3。
 - 远处不显示细节：每个对象还要通过“邻近距离”过滤 (LOD_PROXIMITY)：
      { 1: Infinity, 2: 22, 3: 13 }  // level2 须 <22 单位，level3 须 <13 单位 才显示
   这样放大看某一处时，远处的同类细节仍保持粗略，节省性能。可在 LOD_PROXIMITY 调阈值。
 - 新加的细节默认建议放 LOD 2 或 3，这样远离时自动隐藏 → 绘制调用更少。
 - 细节对象的世界中心会被缓存 (_centerValid)；布局变化后调用 `window.__CELL_resetLOD()` 重算。

--------------------------------------------------------------------------------
 C. 添加动画 (ADD AN ANIMATION) — 必须遵守渲染按需 (render-on-demand) 规则
--------------------------------------------------------------------------------
 渲染循环只在“有变化”时才绘制 (needsRender)。因此动画函数必须：
 The render loop only draws when something changed. So an animation MUST:
   (1) 只对“可见”对象做工作：用 `window.__CELL_effVisible(obj)` 判断（会沿父链检查可见性）。
   (2) 当它确实移动了一个可见对象时，**返回 true**；否则返回 false。

 推荐写法 (pattern) —— 把动画推进既有的 `__animateOrganelles` 链：
   const _ev = window.__CELL_effVisible || (o => o.visible);
   const prev = window.__animateOrganelles;
   window.__animateOrganelles = function (dt, t) {
     let moved = prev ? !!prev(dt, t) : false;          // 先跑前一层
     if (_ev(myGroup)) { /* ...移动 myGroup 内对象... */ moved = true; }  // 只在可见时动
     return moved;                                       // 关键：返回是否移动
   };
 或在 Iteration 4/5 里直接 `microAnims.push(fn)` / `neuronAnims.push(fn)`（这些 fn 同样要返回 bool）。

 注意 (gotchas)：
   - 任何“非相机引起”的场景改动（改颜色/可见性/位置）后，调用 `window.__CELL_requestRender()`，
     否则画面不会刷新。相机移动会自动标脏 (applyCamera → markCameraDirty)。
   - 不要对“会动”的对象用 freezeStatic()（它会冻结矩阵）；只对永不移动的对象用。
   - 静止且数量很多的对象：定位并 add 到父级后调用 `freezeStatic(obj)`，停止逐帧矩阵计算（见树突棘）。

--------------------------------------------------------------------------------
 D. 拾取/点击的逐实例行为 (PER-INSTANCE CLICK BEHAVIOR)
--------------------------------------------------------------------------------
 - 拾取用 GPU 1 像素方案。给不需要被点的网格设 `o.userData._noPick = true` 以省开销
   （例如树突棘只让“头部”可点，颈部与内部细节跳过）。
 - 点击返回具体被点对象；若该对象有 `userData.onPick(obj)` 会被调用，可做高亮/展开/自定义信息。
 - 自定义信息面板：`window.__CELL.showCustomInfo({emoji,name,en,desc,facts}, activeKey)`。

--------------------------------------------------------------------------------
 E. Three.js r128 兼容性 (COMPATIBILITY — 这些较新 API 不可用)
--------------------------------------------------------------------------------
 - 没有 MeshPhysicalMaterial.thickness（用 transmission 即可，别加 thickness）。
 - 没有 CapsuleGeometry：用 `THREE.CapsuleGeometry ? new THREE.CapsuleGeometry(...) : 圆柱体` 兜底。
 - 圆柱几何体的轴是 +Y。要让圆柱朝向 dir：
     mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);  // 不要用 lookAt+rotateX
================================================================================
-->

  <!-- ============ deferred boot: run heavy three.js init off the critical path ============
       All scene/geometry/texture/organelle construction lives (minified + base64) in
       <script id="cellsrc" type="text/plain"> above, instead of executable script tags,
       so it does NOT block DOMContentLoaded. The lightweight intro (loader spinner)
       paints first; after the first paint we load three.js and execute each code block
       one per animation frame, so the 3D simulation is built up progressively. -->
  <script>
  (function () {
    // The deferred source lives (minified + base64) in <script id="cellsrc"
    // type="text/plain">. A non-JS script type is NOT compiled by the browser and
    // script-data tokenization is cheap, so it barely affects DOMContentLoaded.
    // IMPORTANT: do NOT decode it here at top level — this <script> runs during
    // parse, and base64-decoding ~200KB would block DOMContentLoaded. We decode
    // lazily inside start(), i.e. after the first paint.
    var blocks = null;
    function decodeBlocks() {
      var el = document.getElementById('cellsrc');
      if (!el) { blocks = []; return; }
      var b64 = (el.textContent || '').replace(/\s+/g, '');
      var decoded = decodeURIComponent(escape(atob(b64)));   // UTF-8 safe (CJK strings)
      blocks = decoded.split('/*__CELLBLOCK__*/').filter(function (s) {
        return s.trim().length;
      });
    }
    // Suppress the expensive per-block applyCellType / resetLOD reframing while
    // the scene graph is being built up; we apply it once at the very end.
    window.__CELL_deferBuild = true;
    var i = 0;
    function finalize() {
      window.__CELL_deferBuild = false;
      try {
        var C = window.__CELL;
        if (C && C.applyCellType) C.applyCellType(window.game_config.cellType || 'animal');
        if (window.__CELL_resetLOD) window.__CELL_resetLOD();
        if (C && C.hideLoader) C.hideLoader();   // scene is ready → drop the spinner
      } catch (e) {
        try { console.error('[cell finalize]', e); } catch (_) {}
      }
    }
    function runOne() {
      if (i >= blocks.length) { finalize(); return; } // all blocks built
      // Run pieces under a per-frame time budget: this build is already off the
      // critical path (it starts after the first paint / load), so we can pack a
      // few small pieces into one frame to finish the scene quickly, while still
      // yielding to the browser so the page stays responsive between frames.
      var frameStart = (performance && performance.now) ? performance.now() : Date.now();
      do {
        var code = blocks[i];
        i++;
        try {
          (0, window.eval)(code);   // execute in global scope (like an inline <script>)
        } catch (e) {
          try { console.error('[cell deferred block]', i, e); } catch (_) {}
        }
        var now = (performance && performance.now) ? performance.now() : Date.now();
      } while (i < blocks.length && (now - frameStart) < 25);
      requestAnimationFrame(runOne);
    }
    function loadThree(cb) {
      if (window.THREE) { cb(); return; }
      var s = document.createElement('script');
      s.src = window.__THREE_SRC;
      s.onload = cb;
      s.onerror = function () { try { console.error('[three.js load failed]'); } catch (_) {} };
      document.head.appendChild(s);
    }
    function kick() {
      // decode the source + load three.js (all off the critical path) and begin
      // progressively building the scene one block per frame.
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          decodeBlocks();
          loadThree(function () { requestAnimationFrame(runOne); });
        });
      });
    }
    function start() {
      // Defer the heavy build until well after the first paint and the load event,
      // so it never blocks DOMContentLoaded / first paint. The short settle delay
      // lets the lightweight intro (loader spinner) render and stay interactive
      // before we begin progressively building the 3D scene a piece per frame.
      requestAnimationFrame(function () { setTimeout(kick, 80); });
    }
    if (document.readyState === 'complete') {
      start();
    } else {
      window.addEventListener('load', start, { once: true });
    }
  })();
  </script>
