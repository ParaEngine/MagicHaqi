    if (biome === 'desert') return n > .62 ? 'rgba(234,212,140,.36)' : n < .32 ? 'rgba(120,89,45,.28)' : '';
    if (biome === 'forest') return n > .6 ? 'rgba(22,101,52,.34)' : n < .34 ? 'rgba(74,124,55,.28)' : '';
    if (biome === 'wetland') return n > .62 ? 'rgba(45,212,191,.26)' : n < .34 ? 'rgba(22,101,52,.28)' : '';
    if (biome === 'snow') return n > .68 ? 'rgba(255,255,255,.22)' : n < .24 ? 'rgba(147,197,253,.16)' : '';
    if (biome === 'lawn') return fine > .5 ? 'rgba(236,252,203,.28)' : 'rgba(34,139,64,.24)';
    return fine > .5 ? 'rgba(190,242,100,.24)' : 'rgba(63,143,70,.22)';
  }

  function smoothstep(t) { return t * t * (3 - 2 * t); }
  function valueNoise(x, y, scale, seedOffset = 0) {
    const gx = Math.floor(x / scale), gy = Math.floor(y / scale);
    const fx = x / scale - gx, fy = y / scale - gy;
    const sx = smoothstep(fx), sy = smoothstep(fy);
    const a = hash2(gx, gy, state.worldSeed + seedOffset);
    const b = hash2(gx + 1, gy, state.worldSeed + seedOffset);
    const c = hash2(gx, gy + 1, state.worldSeed + seedOffset);
    const d = hash2(gx + 1, gy + 1, state.worldSeed + seedOffset);
    return lerp(lerp(a, b, sx), lerp(c, d, sx), sy);
  }

  function biomeAt(x, y) {
    const height = valueNoise(x, y, 520, 11) * .62 + valueNoise(x, y, 160, 12) * .38;
    const moisture = valueNoise(x, y, 620, 21) * .7 + valueNoise(x, y, 210, 22) * .3;
    const temp = valueNoise(x, y, 760, 31);
    if (height < .31) return 'water';
    if (height < .38 && moisture > .48) return 'wetland';
    if (temp < .2 && moisture > .32) return 'snow';
    if (moisture < .28 && temp > .42) return 'desert';
    if (moisture > .68) return 'forest';
    if (moisture > .48) return 'lawn';
    return 'land';
  }

  function generateWorld() {
    state.objects = [];
    state.enemies = [];
    state.team = [];
    state.roster = [];
    state.houses = [];
    state.torchUntil = 0;
    state.lastTorchNoticeAt = 0;
    state.lastNightUnsafeAt = 0;
    state.lastDuskNoticeDay = 0;
    state.rosterOpen = false;
    state.mergeSourceId = '';
    state.autoWork = { kind: '', id: '', target: null, progress: 0, needed: 1 };
    state.worldSeed = Math.floor(Math.random() * 999999);
    state.terrainSeed = state.worldSeed;
    terrainMetaCache.clear();
    terrainChunkCache.clear();
    state.chunks = new Map();
    state.particles = [];
    state.terrain = [];
    state.groundDetails = [];
    state.fireflies = [];
    ensureChunksAround(player.x, player.y);
    const cfg = difficultyConfig();
    for (let i = 0; i < Math.ceil(cfg.enemyCount / 4); i++) spawnEnemyPack(rand(90, WORLD_W - 90), rand(90, WORLD_H - 120), i < 2 ? 'boar' : undefined, rand(2, 5));
    for (let i = 0; i < 22; i++) state.fireflies.push({ x: rand(0, WORLD_W), y: rand(0, WORLD_H), t: rand(0, 6.28), s: rand(.5, 1.2) });
  }

  function ensureChunksAround(x, y) {
    const cx = Math.floor(x / CHUNK_SIZE), cy = Math.floor(y / CHUNK_SIZE);
    for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) ensureChunk(cx + dx, cy + dy);
  }

  function ensureChunk(cx, cy) {
    if (cx < 0 || cy < 0 || cx * CHUNK_SIZE > WORLD_W || cy * CHUNK_SIZE > WORLD_H) return;
    const key = `${cx},${cy}`;
    if (state.chunks.has(key)) return;
    state.chunks.set(key, true);
    const x0 = cx * CHUNK_SIZE, y0 = cy * CHUNK_SIZE;
    for (let i = 0; i < 22; i++) {
      const x = x0 + hash2(cx * 31 + i, cy * 17 + i, state.worldSeed + 101) * CHUNK_SIZE;
      const y = y0 + hash2(cx * 43 + i, cy * 29 + i, state.worldSeed + 102) * CHUNK_SIZE;
      const biome = biomeAt(x, y);
      const roll = hash2(cx * 53 + i, cy * 47 + i, state.worldSeed + 103);
      state.groundDetails.push({ x, y, biome, t: biome === 'water' ? 'ripple' : biome === 'desert' ? (roll < .7 ? 'pebble' : 'dry') : biome === 'forest' ? (roll < .55 ? 'leaf' : 'blade') : roll < .62 ? 'blade' : roll < .82 ? 'pebble' : 'flower', c: roll * 6.28, s: .7 + roll * .8 });
    }
    for (let i = 0; i < 5; i++) {
      const x = x0 + hash2(cx * 71 + i, cy * 61 + i, state.worldSeed + 201) * CHUNK_SIZE;
      const y = y0 + hash2(cx * 83 + i, cy * 67 + i, state.worldSeed + 202) * CHUNK_SIZE;
      const biome = biomeAt(x, y);
      if (['forest', 'land', 'lawn'].includes(biome) && hash2(cx, cy + i, state.worldSeed + 203) < (biome === 'forest' ? .78 : .08)) addObject('tree', x, y);
      else if (biome !== 'water' && hash2(cx, cy + i, state.worldSeed + 204) < .42) addObject(hash2(cx, cy + i, state.worldSeed + 205) < .66 ? 'berry' : 'mushroom', x, y);
    }
    for (let i = 0; i < 5; i++) {
      const x = x0 + hash2(cx * 97 + i, cy * 89 + i, state.worldSeed + 206) * CHUNK_SIZE;
      const y = y0 + hash2(cx * 109 + i, cy * 101 + i, state.worldSeed + 207) * CHUNK_SIZE;
      const biome = biomeAt(x, y);
      if (['land', 'lawn', 'forest'].includes(biome) && hash2(cx + i, cy, state.worldSeed + 208) < (biome === 'forest' ? .38 : .3)) addObject('branch', x, y);
    }
    if (hash2(cx, cy, state.worldSeed + 501) < .55) {
      const x = x0 + hash2(cx, cy, state.worldSeed + 502) * CHUNK_SIZE;
      const y = y0 + hash2(cx, cy, state.worldSeed + 503) * CHUNK_SIZE;
      if (biomeAt(x, y) !== 'water') spawnEnemyPack(x, y, undefined, 2 + Math.floor(hash2(cx, cy, state.worldSeed + 504) * 3));
    }
    if (hash2(cx, cy, state.worldSeed + 801) < .035) {
      const x = x0 + hash2(cx, cy, state.worldSeed + 802) * CHUNK_SIZE;
      const y = y0 + hash2(cx, cy, state.worldSeed + 803) * CHUNK_SIZE;
      if (Math.hypot(x - player.x, y - player.y) > 360 && biomeAt(x, y) !== 'water') spawnBoss(x, y, pick(regionSpeciesAt(x, y)));
    }
  }

  function regionSpeciesAt(x, y) {
    const rx = Math.floor(x / (CHUNK_SIZE * 2));
    const ry = Math.floor(y / (CHUNK_SIZE * 2));
    const biome = biomeAt(x, y);
    const base = biome === 'desert' ? ['boar', 'fox', 'mushpet'] : biome === 'forest' ? ['wolf', 'fox', 'mushpet'] : biome === 'wetland' ? ['mushpet', 'boar', 'fox'] : ['wolf', 'boar', 'fox', 'mushpet'];
    const offset = Math.floor(hash2(rx, ry, state.worldSeed + 700) * base.length);
    return [base[offset % base.length], base[(offset + 1) % base.length], base[(offset + 2) % base.length]].slice(0, hash2(rx, ry, state.worldSeed + 701) < .55 ? 2 : 3);
  }

  function addObject(type, x, y) {
    const size = type === 'tree' ? rand(42, 58) : type === 'meat' ? rand(24, 32) : type === 'branch' ? rand(18, 26) : rand(22, 30);
    state.objects.push({ id: `obj_${Date.now()}_${state.objects.length}_${Math.floor(rand(1000, 9999))}`, type, x, y, w: size, h: size, hp: type === 'tree' ? 3 : 1, taken: false, grow: rand(0, 6.28) });
  }

  function spawnEnemy(x, y, type = pick(['wolf', 'boar', 'fox', 'mushpet']), boss = false) {
    const cfg = difficultyConfig();
    const baseHp = type === 'boar' ? 72 : type === 'wolf' ? 58 : 46;
    const hp = Math.round(baseHp * cfg.enemyHp * (boss ? 4.2 : 1));
    const enemy = {
      id: `${boss ? 'boss' : 'enemy'}_${Date.now()}_${state.enemies.length}_${Math.floor(rand(1000, 9999))}`,
      type, boss, x, y, w: boss ? 48 : 32, h: boss ? 48 : 32, hp, maxHp: hp, state: 'wild', vx: 0, vy: 0,
      speed: rand(boss ? 34 : 44, boss ? 54 : 78) * cfg.enemySpeed,
      attackCd: rand(.2, 1.2), captureUntil: 0, hurtUntil: 0, wander: rand(0, 6.28), name: boss ? `首领${petName(type)}` : petName(type)
    };
    assignEnemyArt(enemy);
    state.enemies.push(enemy);
  }

  function spawnBoss(x, y, type = pick(['wolf', 'boar', 'fox', 'mushpet'])) {
    spawnEnemy(x, y, type, true);
    setMessage('⚠️ 首领怪物出现！击败它会掉落大量肉。', 3200);
  }

  function spawnEnemyPack(x, y, type, count = rand(3, 7)) {
    const n = Math.max(2, Math.round(count));
    const species = regionSpeciesAt(x, y);
    const baseType = type || pick(species);
    for (let i = 0; i < n; i++) {
      const a = rand(0, Math.PI * 2);
      const r = rand(8, 58);
      const px = clamp(x + Math.cos(a) * r, 30, WORLD_W - 30);
      const py = clamp(y + Math.sin(a) * r, 34, WORLD_H - 34);
      if (biomeAt(px, py) === 'water') continue;
      spawnEnemy(px, py, Math.random() < .76 ? baseType : pick(species));
    }
  }

  function petName(type) {
    return { wolf: '夜狼', boar: '岩猪', fox: '火狐', mushpet: '菇菇兽' }[type] || '荒野宠物';
  }

  function resetGame() {
    generateWorld();
    rosterOverlay.hidden = true;
    Object.assign(player, { x: WORLD_W / 2, y: WORLD_H - 340, dirX: 0, dirY: -1, facing: 'up', attackUntil: 0, attackStartedAt: 0, attackHitId: 0, workAnimUntil: 0, workAnimKind: '', hurtUntil: 0, animTime: 0 });
    snapCameraToPlayer();
    state.score = 0; state.hp = 100; state.hunger = 100; state.stamina = 100; state.movementEnergy = .5; state.eatingUntil = 0; state.lastAutoEatAt = 0; state.food = difficultyConfig().initialFood; state.wood = 0; state.captured = 0; state.defeated = 0; state.bossesDefeated = 0; state.campsBuilt = 0; state.torchUntil = 0;
    state.dayTime = 0; state.day = 1; state.finished = false; state.paused = false; state.finishPosted = false; state.gameStartAt = now(); state.roundId = `haqi_hungry_${Date.now()}`;
    ui.restart.hidden = true;
    ui.hint.hidden = false;
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => { ui.hint.hidden = true; }, 10000);
    setMessage(`${difficultyConfig().name}难度开始！先找浆果和蘑菇，夜晚前捕获伙伴。`, 3200);
    updateHud();
  }

  function startGame() {
    if (!state.started) post('gameStarted', { title: '宠物荒野生存' });
    state.started = true;
    ui.start.hidden = true;
    ui.continue.hidden = true;
    overlay.hidden = true;
    resetGame();
    loadRandomPetImages();
  }

  async function loadPetCatalog() {
    if (state.petCatalog.length) return state.petCatalog;
    if (state.petCatalogLoading) return [];
    state.petCatalogLoading = true;
    try {
      const res = await fetch(PET_INDEX_URL, { cache: 'force-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const list = await res.json();
      state.petCatalog = Array.isArray(list) ? list.filter(p => p?.imageSheetUrl) : [];
    } catch (err) {
      state.petCatalog = [];
      requestPetImages();
    } finally {
      state.petCatalogLoading = false;
    }
    return state.petCatalog;
  }

  async function makePixelPetBitmap(entry, index, stage = PET_SHEET_STAGES[index % PET_SHEET_STAGES.length], pixelated = true, anim = 'idle') {
    const image = new Image();
    image.crossOrigin = 'anonymous';
    image.decoding = 'async';
    const loaded = new Promise((resolve, reject) => { image.onload = resolve; image.onerror = reject; });
    image.src = entry.imageSheetUrl;
    await loaded;
    try { await image.decode?.(); } catch (err) {}
    const sw = Math.floor(image.naturalWidth / PET_SHEET_COLS);
    const sh = Math.floor(image.naturalHeight / PET_SHEET_ROWS);
    if (!sw || !sh) return null;
    const stageName = PET_SHEET_STAGES.includes(stage) ? stage : PET_SHEET_STAGES[0];
    const row = PET_SHEET_STAGES.indexOf(stageName);
    const col = PET_ANIM_COLS[anim] == null ? PET_ANIM_COLS.idle : PET_ANIM_COLS[anim];
    const pixelSize = pixelated ? 32 : 72;
    const displaySize = pixelated ? 40 : 72;
    const tiny = document.createElement('canvas');
    tiny.width = pixelSize;
    tiny.height = pixelSize;
    const tctx = tiny.getContext('2d', { willReadFrequently: true });
    tctx.imageSmoothingEnabled = false;
    tctx.clearRect(0, 0, pixelSize, pixelSize);
    tctx.drawImage(image, col * sw, row * sh, sw, sh, 0, 0, pixelSize, pixelSize);
    if (pixelated) posterizeCanvas(tctx, pixelSize, pixelSize);
    const off = document.createElement('canvas');
    off.width = displaySize;
    off.height = displaySize;
    const octx = off.getContext('2d');
    octx.imageSmoothingEnabled = false;
    octx.clearRect(0, 0, displaySize, displaySize);
    octx.drawImage(tiny, 0, 0, displaySize, displaySize);
    const bitmap = await createImageBitmap(off);
    return { bitmap, uv: { x: 0, y: 0, width: displaySize, height: displaySize }, name: entry.name, sourceId: entry.id, stage: stageName, anim, imageSheetUrl: entry.imageSheetUrl, element: entry.traits?.element || '' };
  }

  function posterizeCanvas(pctx, w, h) {
    try {
      const img = pctx.getImageData(0, 0, w, h);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const a = d[i + 3];
        if (a < 22) { d[i + 3] = 0; continue; }
        d[i] = Math.round(d[i] / 32) * 32;
        d[i + 1] = Math.round(d[i + 1] / 32) * 32;
        d[i + 2] = Math.round(d[i + 2] / 32) * 32;
        d[i + 3] = a < 150 ? Math.max(110, Math.round(a / 48) * 48) : 255;
      }
      pctx.putImageData(img, 0, 0);
    } catch (err) {}
  }

  function assignEnemyArt(enemy) {
    if (!enemy || !state.petBitmaps.length) return;
    const artIndex = state.petArtCursor++ % state.petBitmaps.length;
    enemy.artIndex = artIndex;
    enemy.name = state.petBitmaps[artIndex]?.name || enemy.name;
    enemy.sourceId = state.petBitmaps[artIndex]?.sourceId || '';
    enemy.imageSheetUrl = state.petBitmaps[artIndex]?.imageSheetUrl || '';
    enemy.element = state.petBitmaps[artIndex]?.element || '';
  }

  function refreshEnemyArt() {
    if (!state.petBitmaps.length) return;
    for (const e of state.enemies) {
      if (e.state === 'gone' || e.state === 'captured') continue;
      if (typeof e.artIndex === 'number') continue;
      assignEnemyArt(e);
    }
  }

  async function loadRandomPetImages() {
    try {
      const catalog = await loadPetCatalog();
      if (!catalog.length) return;
      for (const old of state.petBitmaps) old.bitmap?.close?.();
      state.petBitmaps = [];
      const picked = shuffle(catalog).slice(0, Math.max(PET_MAX_TEAM, 10));
      const bitmaps = await Promise.all(picked.map((entry, index) => makePixelPetBitmap(entry, index, 'baby', true)));
      state.petBitmaps = bitmaps.filter(Boolean);
      state.petArtCursor = 0;
      refreshEnemyArt();
      if (state.petBitmaps.length) setMessage(`本局随机宠物：${state.petBitmaps.slice(0, 3).map(p => p.name).join('、')} 等`, 3600);
    } catch (err) {
      requestPetImages();
    }
  }

  function updateHud() {
    ui.day.textContent = `第${state.day}天`;
    ui.food.textContent = state.food;
    ui.wood.textContent = state.wood;
    ui.pets.textContent = `${state.team.length}/${PET_MAX_TEAM}(${state.roster.length})`;
    ui.score.textContent = Math.round(state.score);
    ui.best.textContent = state.best;
    ui.hp.style.setProperty('--pct', `${clamp(state.hp, 0, 100)}%`);
    ui.hunger.style.setProperty('--pct', `${clamp(state.hunger, 0, 100)}%`);
    ui.stamina?.style.setProperty('--pct', `${clamp(state.stamina, 0, 100)}%`);
    updateHouseButton();
    updateWarnings();
  }

  function updateHouseButton() {
    if (!ui.buildHouse) return;
    const canBuild = state.started && !state.finished && !state.paused && overlay.hidden !== false && state.wood >= HOUSE_WOOD_COST;
    ui.buildHouse.hidden = !canBuild;
    if (canBuild) ui.buildHouse.querySelector('small').textContent = `消耗 ${HOUSE_WOOD_COST} 木材 · 已搭 ${state.houses.length} 顶 · 夜晚安全光圈`;
  }

  function buildHouse() {
    if (!state.started || state.finished || state.wood < HOUSE_WOOD_COST) return;
    if (isWaterAt(player.x, player.y)) { setMessage('水面上不能建房子，先走到陆地。', 1800); return; }
    state.wood -= HOUSE_WOOD_COST;
    const house = { id: `house_${Date.now()}_${state.houses.length}`, x: player.x, y: player.y + 18, builtAt: now() };
    state.houses.push(house);
    state.score += 160 + state.houses.length * 35;
    spawnParticles(house.x, house.y, 36, '#facc15');
    playSound('win');
    showToast('🏕️ 安全帐篷搭好了！');
    setMessage('帐篷夜晚会点亮火把，光圈内不会被怪物攻击。', 4200);
    updateHud();
  }

  function playerSafeLightRadius() {
    if (!isNight()) return 0;
    if (now() < state.torchUntil) return 86;
    return 0;
  }

  function isInHouseLight(target = player) {
    if (!isNight()) return false;
    return state.houses.some(h => Math.hypot(target.x - h.x, target.y - h.y) <= HOUSE_SAFE_RADIUS);
  }

  function isPlayerProtectedAtNight() {
    return isNight() && (now() < state.torchUntil || isInHouseLight(player));
  }

  function updateNightSurvival(dt) {
    if (!isNight() || state.finished) return;
    const t = now();
    if (t >= state.torchUntil && !isInHouseLight(player) && state.wood >= TORCH_WOOD_COST) {
      state.wood -= TORCH_WOOD_COST;
      state.torchUntil = t + TORCH_SECONDS * 1000;
      state.lastTorchNoticeAt = t;
      spawnParticles(player.x, player.y - 16, 14, '#f59e0b');
      showToast('🔥 自动点燃火把 -1 木材');
      setMessage('夜晚降临！火把会消耗木材，没有光会持续百分比掉血。', 3600);
      playSound('gather');
    }
    if (isPlayerProtectedAtNight()) return;
    const phase = (state.dayTime % DAY_SECONDS) / DAY_SECONDS;
    const deepNight = phase > .78 || phase < .06 ? 1.45 : 1;
    const nearbyEnemies = state.enemies.filter(e => e.state === 'wild' && Math.hypot(e.x - player.x, e.y - player.y) < 320).length;
    const danger = (nearbyEnemies + 1) * deepNight;
    const percentDamage = (1.9 + state.day * .28) * danger * difficultyConfig().enemyDamage;
    state.hp = clamp(state.hp - state.hp * (percentDamage / 100) * dt, 0, 100);
    if (t > state.lastNightUnsafeAt + 2200) {
      state.lastNightUnsafeAt = t;
      spawnParticles(player.x, player.y, 12, '#7f1d1d');
      playSound('hurt');
      setMessage('黑夜太危险了！没有火把或小屋光圈会按百分比快速掉血。', 2100);
    }
    if (state.hp <= 0) recoverAtCamp('黑夜吞没了你，营地伙伴把你救了回来。');
  }

  function updateWarnings() {
    const lowHp = state.started && !state.finished && state.hp <= 25;
    const lowHunger = state.started && !state.finished && state.hunger <= 22;
    shell.classList.toggle('warn-hp', lowHp);
    shell.classList.toggle('warn-hunger', lowHunger);
    ui.hpBar?.classList.toggle('warn', lowHp);
    ui.hungerBar?.classList.toggle('warn', lowHunger);
    ui.hpBar?.style.setProperty('--warn', 'rgba(239,68,68,.9)');
    ui.hungerBar?.style.setProperty('--warn', 'rgba(250,204,21,.95)');
  }

  function getAxis() {
    let ax = 0, ay = 0;
    if (input.left) ax -= 1;
    if (input.right) ax += 1;
    if (input.up) ay -= 1;
    if (input.down) ay += 1;
    if (input.joyActive) { ax += input.joyX / 46; ay += input.joyY / 46; }
    const len = Math.hypot(ax, ay);
    return len > 1 ? { x: ax / len, y: ay / len } : { x: ax, y: ay };
  }

  function updatePlayer(dt) {
    const axis = getAxis();
    const moving = Math.hypot(axis.x, axis.y) > .08;
    const sprinting = input.sprint && state.stamina > 8 && moving;
    const speed = sprinting ? SPRINT_SPEED : PLAYER_SPEED;
    if (moving) {
      const facing = Math.abs(axis.x) > Math.abs(axis.y) ? (axis.x > 0 ? 'right' : 'left') : (axis.y > 0 ? 'down' : 'up');
      setPlayerFacing(facing);
      player.animTime += dt * (sprinting ? 11 : 7);
    }
    else player.animTime += dt * 3;
      state.movementEnergy = moving ? (sprinting ? 1.28 : 1) : .5;
    const nx = clamp(player.x + axis.x * speed * dt, 20, WORLD_W - 20);
    const ny = clamp(player.y + axis.y * speed * dt, 30, WORLD_H - 28);
    if (!isWaterAt(nx, ny)) { player.x = nx; player.y = ny; }
    else if (!isWaterAt(nx, player.y)) player.x = nx;
    else if (!isWaterAt(player.x, ny)) player.y = ny;
    ensureChunksAround(player.x, player.y);
    state.stamina = clamp(state.stamina + (sprinting ? -18 : 16) * dt, 0, 100);
    autoAttack();
  }

  function isWaterAt(x, y) {
    return biomeAt(x, y) === 'water';
  }

  function canPetEnterWater(pet) {
    return pet?.element === '水系';
  }

  function removePetFromRoster(pet, reason = 'defeated') {
    if (!pet) return;
    state.roster = state.roster.filter(item => item !== pet);
    state.team = state.team.filter(item => item !== pet);
    if (state.mergeSourceId === pet.id) state.mergeSourceId = '';
    spawnParticles(pet.x, pet.y, 18, '#64748b');
    showToast(reason === 'defeated' ? `💔 ${pet.name || '宠物'} 阵亡` : `💔 ${pet.name || '宠物'} 离队`);
    syncTeamFromRoster();
    updateHud();
  }

  function findPetTeleportSpot(pet) {
    for (let i = 0; i < 16; i++) {
      const a = i / 16 * Math.PI * 2;
      const r = 32 + (i % 4) * 14;
      const x = clamp(player.x + Math.cos(a) * r, 20, WORLD_W - 20);
      const y = clamp(player.y + Math.sin(a) * r, 26, WORLD_H - 26);
      if (!canPetEnterWater(pet) && isWaterAt(x, y)) continue;
      return { x, y };
    }
    return null;
  }

  function moveEntity(entity, ax, ay, step, canEnterWater = true) {
    const nx = clamp(entity.x + ax * step, 20, WORLD_W - 20);
    const ny = clamp(entity.y + ay * step, 26, WORLD_H - 26);
    if (!canEnterWater && isWaterAt(nx, ny)) {
      const tryX = clamp(entity.x + ax * step, 20, WORLD_W - 20);
      const tryY = entity.y;
      if (!isWaterAt(tryX, tryY)) { entity.x = tryX; return; }
      const altY = clamp(entity.y + ay * step, 26, WORLD_H - 26);
      if (!isWaterAt(entity.x, altY)) entity.y = altY;
      return;
    }
    entity.x = nx; entity.y = ny;
  }

  function autoAttack() {
    if (!state.started || state.finished || isNight() || now() < player.attackUntil || state.stamina < 4) return;
    initAudio();
    let hit = null;
    let best = 9999;
    for (const e of state.enemies) {
      if (e.state !== 'wild') continue;
      const d = Math.hypot(e.x - player.x, e.y - player.y);
      if (d < AUTO_ATTACK_RANGE && d < best) { best = d; hit = e; }
    }
    if (!hit) return;
    player.attackStartedAt = now();
    player.attackUntil = player.attackStartedAt + 420;
    player.attackHitId++;
    state.stamina = Math.max(0, state.stamina - 4);
    const dx = hit.x - player.x, dy = hit.y - player.y;
    if (Math.abs(dx) > Math.abs(dy)) setPlayerFacing(dx > 0 ? 'right' : 'left');
    else setPlayerFacing(dy > 0 ? 'down' : 'up');
    const dir = getFacingVector();
    const hitX = player.x + dir.x * (ATTACK_RANGE * .58);
    const hitY = player.y + dir.y * (ATTACK_RANGE * .58);
    spawnParticles(hitX, hitY, 8, '#f97316');
    playSound('hit');
    damageEnemy(hit, 24, true);
    spawnParticles(hit.x, hit.y, 16, '#fb7185');
  }

  function setPlayerFacing(facing) {
    player.facing = facing;
    const v = facingVector(facing);
    player.dirX = v.x;
    player.dirY = v.y;
  }

  function facingVector(facing = player.facing) {
    if (facing === 'left') return { x: -1, y: 0 };
    if (facing === 'right') return { x: 1, y: 0 };
    if (facing === 'down') return { x: 0, y: 1 };
    return { x: 0, y: -1 };
  }

  function getFacingVector() {
    const v = facingVector();
    player.dirX = v.x;
    player.dirY = v.y;
    return v;
  }

  function updateAutoWork(dt) {
    if (!state.started || state.finished) return resetAutoWork();
    const candidate = findAutoWorkTarget();
    if (!candidate) { resetAutoWork(); return; }
    const work = state.autoWork;
    if (work.kind !== candidate.kind || work.id !== candidate.id) {
      state.autoWork = { ...candidate, progress: 0 };
    } else {
      work.progress += dt;
      work.target = candidate.target;
      work.needed = candidate.needed;
      if (work.progress >= work.needed) completeAutoWork(work);
    }
  }

  function findAutoWorkTarget() {
    const capturable = nearestCapturable();
    if (capturable) return { kind: 'capture', id: capturable.id || `${capturable.type}_${capturable.x}_${capturable.y}`, target: capturable, needed: CAPTURE_SECONDS };
    let obj = null;
    let best = 9999;
    for (const o of state.objects) {
      if (o.taken) continue;
      const d = Math.hypot(o.x - player.x, o.y - player.y);
      if (d < (o.type === 'tree' ? 58 : 48) && d < best) { best = d; obj = o; }
    }
    if (!obj) return null;
    return { kind: 'gather', id: obj.id || `${obj.type}_${obj.x}_${obj.y}`, target: obj, needed: obj.type === 'tree' ? GATHER_SECONDS + .8 : GATHER_SECONDS };
  }

  function resetAutoWork() {
    state.autoWork = { kind: '', id: '', target: null, progress: 0, needed: 1 };
  }

  function completeAutoWork(work) {
    const target = work.target;
    resetAutoWork();
    if (!target) return;
    if (work.kind === 'capture') { capturePet(target); return; }
    player.workAnimUntil = now() + 380;
    player.workAnimKind = target.type === 'tree' ? 'chop' : 'gather';
    gatherObject(target);
  }

  function gatherObject(obj) {
    if (!obj || obj.taken) return;
    obj.hp -= obj.type === 'tree' ? 3 : 2;
    spawnParticles(obj.x, obj.y, 10, obj.type === 'tree' ? '#8b5a2b' : '#f87171');
    if (obj.hp <= 0) {
      obj.taken = true;
      if (obj.type === 'tree') { state.wood += 2; state.score += 14; showToast('🪵 木材 +2'); }
      else if (obj.type === 'branch') { state.wood += 1; state.score += 8; showToast('🪵 树枝 +1'); }
      else if (obj.type === 'meat') {
        state.food += 4;
        state.hunger = clamp(state.hunger + 26, 0, 100);
        state.stamina = clamp(state.stamina + 14, 0, 100);
        state.score += 72;
        showToast('🥩 肉 +4');
      }
      else {
        const amount = obj.type === 'berry' ? 2 : 1;
        state.food += amount;
        state.hunger = clamp(state.hunger + amount * 9, 0, 100);
        state.score += amount * 18;
        showToast(`🍖 食物 +${amount}`);
      }
      if (state.score > state.best) { state.best = Math.round(state.score); localStorage.setItem(STORAGE_BEST, String(state.best)); }
      playSound('gather');
    }
    updateHud();
    checkMission();
  }

  function nearestCapturable() {
    let result = null;
    let best = 9999;
    for (const e of state.enemies) {
      if (e.state !== 'down' || now() > e.captureUntil) continue;
      const d = Math.hypot(e.x - player.x, e.y - player.y);
      const range = e.boss ? 86 : 64;
      if (d < range && d < best) { best = d; result = e; }
    }
    return result;
  }

  function capturePet(e) {
    e.state = 'captured';
    state.captured++;
    playSound('capture');
    const rosterIndex = state.roster.length;
    const artIndex = typeof e.artIndex === 'number' ? e.artIndex : (rosterIndex % Math.max(1, state.petBitmaps.length));
    const art = state.petBitmaps[artIndex];
    const petName = art?.name || e.name;
    const sourceId = e.sourceId || art?.sourceId || `wild_${e.type}`;
    const level = e.boss ? Math.max(3, Math.min(8, 3 + state.day + state.bossesDefeated)) : 1;
    const maxHp = 72 + petPower({ level, stage: stageForLevel(level) }) * 8;
    const pet = {
      id: `pet_${Date.now()}_${rosterIndex}_${Math.floor(rand(1000, 9999))}`,
      sourceId, imageSheetUrl: e.imageSheetUrl || art?.imageSheetUrl || '', element: e.element || art?.element || '', stage: stageForLevel(level), level,
      type: e.type, x: e.x, y: e.y, w: 30, h: 30, hp: maxHp, maxHp, attackCd: rand(.08, .34), index: rosterIndex, artIndex, name: petName,
      active: state.team.length < PET_MAX_TEAM,
      followBack: rand(34, 54) + rosterIndex * 8,
      followSide: (rosterIndex - 1) * rand(26, 36) + rand(-8, 8),
      followWave: rand(5, 13),
      speed: rand(142, 184),
      phase: rand(0, Math.PI * 2),
      roam: rand(0, Math.PI * 2),
      targetOffset: rand(0, Math.PI * 2),
      targetRadius: rand(22, 34),
    };
    state.roster.push(pet);
    syncTeamFromRoster();
    state.score += (e.boss ? 220 : 90) + Math.min(state.roster.length, PET_MAX_TEAM) * 25 + level * 12;
    showToast(e.boss ? `👑 捕获首领 ${petName} Lv.${level}！` : `🐾 捕获 ${petName}！`);
    setMessage(e.boss ? `${petName} 首领捕获成功，直接成为 Lv.${level} ${stageName(pet.stage)} 宠物！` : `${petName} 捕获成功！可在宠物列表中选择最多 3 只上阵。`, 2600);
    spawnParticles(e.x, e.y, 26, '#a78bfa');
    updateHud();
    openRosterOverlay();
    checkMission();
  }

  function activeRosterPets() {
    return state.roster.filter(p => p.active).slice(0, PET_MAX_TEAM);
  }

  function syncTeamFromRoster() {
    state.team = activeRosterPets();
    state.team.forEach((p, i) => { p.index = i; });
  }

  function drawSheetCellToCanvas(canvasEl, imageSheetUrl, stage, pixelated = false) {
    if (!canvasEl || !imageSheetUrl) return false;
    const rctx = canvasEl.getContext('2d');
    rctx.imageSmoothingEnabled = !pixelated;
    rctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
    const image = new Image();
    image.crossOrigin = 'anonymous';
    image.onload = () => {
      const sw = Math.floor(image.naturalWidth / PET_SHEET_COLS);
      const sh = Math.floor(image.naturalHeight / PET_SHEET_ROWS);
      if (!sw || !sh) return;
      const row = stageIndex(stage);
      rctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
      rctx.imageSmoothingEnabled = !pixelated;
      rctx.drawImage(image, 0, row * sh, sw, sh, 4, 4, canvasEl.width - 8, canvasEl.height - 8);
    };
    image.src = imageSheetUrl;
    return true;
  }

  function drawRosterSprite(canvasEl, pet) {
    const rctx = canvasEl.getContext('2d');
    rctx.imageSmoothingEnabled = true;
    rctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
    if (drawSheetCellToCanvas(canvasEl, pet.imageSheetUrl, pet.stage, false)) return;
    const bmp = state.petBitmaps[(typeof pet.artIndex === 'number' ? pet.artIndex : pet.index) % Math.max(1, state.petBitmaps.length)] || null;
    if (bmp?.bitmap && bmp?.uv) {
      const u = bmp.uv;
      rctx.drawImage(bmp.bitmap, u.x, u.y, u.width, u.height, 4, 4, canvasEl.width - 8, canvasEl.height - 8);
      return;
    }
    rctx.fillStyle = '#a3e635'; rctx.fillRect(10, 16, 28, 22);
    rctx.fillStyle = '#0f172a'; rctx.fillRect(18, 22, 4, 4); rctx.fillRect(30, 22, 4, 4);
  }

  function stageName(stage) { return PET_STAGE_NAMES[stage] || stage || '幼年'; }
  function stageIndex(stage) { return Math.max(0, PET_SHEET_STAGES.indexOf(stage)); }
  function stageForLevel(level) { return PET_SHEET_STAGES[Math.min(PET_SHEET_STAGES.length - 1, Math.floor((Math.max(1, Number(level) || 1) - 1) / 2))]; }
  function normalizePetStage(pet) { if (pet) pet.stage = stageForLevel(pet.level || 1); return pet?.stage || 'baby'; }
  function petPower(pet) { return (Number(pet.level) || 1) + stageIndex(normalizePetStage(pet)) * 3; }
  function canMergePets(a, b) { return !!a && !!b && a !== b && a.sourceId === b.sourceId && a.stage === b.stage && (a.level || 1) === (b.level || 1); }
  function activeCount() { return state.roster.filter(p => p.active).length; }

  function makeRosterCard(pet, options = {}) {
    const card = document.createElement('button');
    card.type = 'button';
    const source = state.mergeSourceId ? state.roster.find(p => p.id === state.mergeSourceId) : null;
    const mergeSource = source === pet;
    const mergeTarget = source && canMergePets(source, pet);
    card.className = `hh-pet-card${pet.active ? ' active' : ''}${mergeSource ? ' merge-source' : ''}${mergeTarget ? ' merge-target' : ''}${options.slot ? ' slot' : ''}`;
    card.draggable = false;
    card.dataset.petId = pet.id;
    normalizePetStage(pet);
    card.innerHTML = `<canvas width="64" height="64"></canvas><span class="hh-pet-level">Lv.${pet.level || 1}</span><b></b><small></small>`;
    drawRosterSprite(card.querySelector('canvas'), pet);
    card.querySelector('b').textContent = pet.name || '宠物';
    card.querySelector('small').textContent = `${stageName(pet.stage)} · ${pet.active ? '上阵' : '背包'}`;
    card.addEventListener('click', () => handlePetClick(pet, options.slotIndex));
    return card;
  }

  function handlePetClick(pet, slotIndex = null) {
    const source = state.mergeSourceId ? state.roster.find(p => p.id === state.mergeSourceId) : null;
    if (source && source !== pet) {
      if (canMergePets(source, pet)) mergePets(source, pet);
      else if (slotIndex !== null) { putPetInSlot(source, slotIndex); state.mergeSourceId = ''; }
      else if (!pet.active && activeRosterPets().length < PET_MAX_TEAM) { putPetInSlot(source, activeRosterPets().length); state.mergeSourceId = ''; }
      else { state.mergeSourceId = ''; setMessage('只有相同种类、相同等级的宠物才能合并。', 1400); }
      renderRosterOverlay(); updateHud(); return;
    }
    if (slotIndex !== null) { setActivePet(pet, slotIndex); renderRosterOverlay(); updateHud(); return; }
    state.mergeSourceId = source === pet ? '' : pet.id;
    renderRosterOverlay();
  }

  function setActivePet(pet, slotIndex = null) {
    if (!pet) return;
    if (pet.active) { pet.active = false; syncTeamFromRoster(); return; }
    if (slotIndex !== null) {
      const current = activeRosterPets()[slotIndex];
      if (current) current.active = false;
      pet.active = true;
    } else if (activeCount() < PET_MAX_TEAM) pet.active = true;
    else { setMessage('上阵位已满：点击第一排位置或先取消一只。', 1500); return; }
    syncTeamFromRoster();
  }

  function putPetInSlot(pet, slotIndex) {
    if (!pet) return;
    const activePets = activeRosterPets();
    const current = activePets[slotIndex];
    if (current && current !== pet) current.active = false;
    pet.active = true;
    syncTeamFromRoster();
  }

  function mergePets(source, target) {
    target.level = Math.max(Number(target.level) || 1, Number(source.level) || 1) + 1;
    target.stage = stageForLevel(target.level);
    target.hp = target.maxHp = 72 + petPower(target) * 8;
    target.speed = (target.speed || 160) + 6;
    if (source.active && !target.active) target.active = true;
    state.roster = state.roster.filter(p => p !== source);
    showToast(`✨ ${target.name} 合成升级！`);
    playSound('merge');
    setMessage(`${target.name} 合并到 ${stageName(target.stage)} Lv.${target.level}。`, 2200);
    state.score += 120 + petPower(target) * 24;
    state.mergeSourceId = '';
    syncTeamFromRoster();
  }

  function renderRosterOverlay() {
    rosterGrid.innerHTML = '';
    teamSlots.innerHTML = '';
    const activePets = activeRosterPets();
    rosterHint.textContent = `${activePets.length}/${PET_MAX_TEAM} 上阵 · 背包 ${state.roster.length} 只 · ${state.mergeSourceId ? '已选中：再点上阵位或合成目标' : '点击宠物选中；再点击目标上阵/合成'}`;
    for (let i = 0; i < PET_MAX_TEAM; i++) {
      const pet = activePets[i];
      if (pet) teamSlots.appendChild(makeRosterCard(pet, { slot: true, slotIndex: i }));
      else {
        const empty = document.createElement('button');
        empty.type = 'button'; empty.className = 'hh-pet-card slot';
        empty.innerHTML = '<b>空位</b><small>选中后点此上阵</small>';
        empty.addEventListener('click', () => { const pet = state.roster.find(p => p.id === state.mergeSourceId); putPetInSlot(pet, i); state.mergeSourceId = ''; renderRosterOverlay(); updateHud(); });
        teamSlots.appendChild(empty);
      }
    }
    for (const pet of state.roster.filter(p => !p.active)) rosterGrid.appendChild(makeRosterCard(pet));
  }

  function openRosterOverlay() {
    state.rosterOpen = true;
    state.paused = true;
    renderRosterOverlay();
    rosterOverlay.hidden = false;
  }

  function closeRosterOverlay() {
    state.rosterOpen = false;
    state.paused = false;
    rosterOverlay.hidden = true;
    syncTeamFromRoster();
    updateHud();
  }

  function damageEnemy(e, amount, fromPlayer = false) {
    if (e.state !== 'wild') return;
    e.hp -= amount;
    e.hurtUntil = now() + 180;
    spawnParticles(e.x, e.y, 9, fromPlayer ? '#fb7185' : '#38bdf8');
    if (!fromPlayer) playSound('hit');
    if (e.hp <= 0) {
      e.state = 'down';
      e.captureUntil = now() + (e.boss ? 12000 : 9000);
      e.hp = 0;
      state.defeated++;
      state.score += e.boss ? 260 : 55;
      if (e.boss) {
        state.bossesDefeated++;
        dropBossLoot(e);
        showToast('👑 首领击败！');
        setMessage('首领怪物掉落了肉！靠近可捕获为高等级宠物。', 3200);
      } else {
        if (Math.random() < .72) addObject('berry', clamp(e.x + rand(-36, 36), 40, WORLD_W - 40), clamp(e.y + rand(-36, 36), 40, WORLD_H - 40));
        showToast('宠物被打败，靠近按 ✋ 捕获！');
        setMessage('打败野生宠物后会短暂虚弱，快靠近捕获。', 2300);
      }
    }
  }

  function dropBossLoot(e) {
    const drops = 3 + Math.floor(rand(0, 3));
    for (let i = 0; i < drops; i++) {
      const a = i / drops * Math.PI * 2 + rand(-.35, .35);
      const r = rand(18, 54);
      addObject('meat', clamp(e.x + Math.cos(a) * r, 40, WORLD_W - 40), clamp(e.y + Math.sin(a) * r, 40, WORLD_H - 80));
    }
    if (Math.random() < .65) addObject('berry', clamp(e.x + rand(-58, 58), 40, WORLD_W - 40), clamp(e.y + rand(-58, 58), 40, WORLD_H - 80));
  }

  function damagePlayer(amount) {
    if (now() < player.hurtUntil || state.finished) return;
    player.hurtUntil = now() + 650;
    state.hp = clamp(state.hp - amount * difficultyConfig().enemyDamage, 0, 100);
    spawnParticles(player.x, player.y, 14, '#ef4444');
    playSound('hurt');
    setMessage('受到攻击！让伙伴帮你战斗，注意回血和饥饿。', 1500);
    if (state.hp <= 0) recoverAtCamp('生命耗尽，营地伙伴把你救了回来。');
  }

  function updateEnemies(dt) {
    const night = isNight();
    for (const e of state.enemies) {
      if (e.state === 'captured') continue;
      if (e.state === 'down') {
        if (now() > e.captureUntil) { e.state = 'gone'; e.taken = true; }
        continue;
      }
      if (e.state === 'gone') continue;
      const nearPlayer = Math.hypot(e.x - player.x, e.y - player.y);
      const protectedByLight = night && isPlayerProtectedAtNight();
      const playerAggroRange = protectedByLight ? 48 : (night ? 230 : 150);
      let target = nearPlayer < playerAggroRange ? player : null;
      for (const p of state.team) {
        const d = Math.hypot(e.x - p.x, e.y - p.y);
        if ((!protectedByLight || d < 44) && d < 170 && (!target || d < Math.hypot(e.x - target.x, e.y - target.y))) target = p;
      }
      let ax = 0, ay = 0;
      if (target) {
        const dx = target.x - e.x, dy = target.y - e.y, len = Math.hypot(dx, dy) || 1;
        ax = dx / len; ay = dy / len;
        if (len < 34) {
          e.attackCd -= dt;
          if (e.attackCd <= 0) {
            const nightStacks = night ? Math.min(4.2, 1.35 + state.day * .18 + state.enemies.filter(other => other.state === 'wild' && Math.hypot(other.x - e.x, other.y - e.y) < 130).length * .28) : 1;
            e.attackCd = night ? .56 : .92;
            const bossMul = e.boss ? 1.75 : 1;
            if (target === player) {
              if (isPlayerProtectedAtNight()) { e.attackCd += .38; spawnParticles(e.x, e.y, 6, '#facc15'); }
              else damagePlayer((night ? 10 : 9) * bossMul * nightStacks);
            }
            else { target.hp -= (night ? 9 : 7) * bossMul * nightStacks; spawnParticles(target.x, target.y, e.boss ? 14 : 8, '#fb7185'); }
          }
        }
      } else {
        e.wander += dt * rand(.5, 1.1);
        ax = Math.cos(e.wander) * .55;
        ay = Math.sin(e.wander * .8) * .55;
      }
      const sp = e.speed * (night ? 1.28 : 1);
      moveEntity(e, ax, ay, sp * dt, e.element === '水系');
    }
    state.enemies = state.enemies.filter(e => e.state !== 'gone');
    if (state.enemies.filter(e => e.state === 'wild' && !e.boss).length < difficultyConfig().enemyMin) {
      const a = rand(0, Math.PI * 2), r = rand(260, 620);
      spawnEnemyPack(clamp(player.x + Math.cos(a) * r, 60, WORLD_W - 60), clamp(player.y + Math.sin(a) * r, 60, WORLD_H - 180), undefined, rand(2, 5));
    }
    const bossLimit = state.day >= 4 ? 2 : 1;
    if (state.enemies.filter(e => e.state === 'wild' && e.boss).length < bossLimit && Math.random() < dt * .018 * difficultyConfig().spawn) {
      const a = rand(0, Math.PI * 2), r = rand(520, 860);
      const x = clamp(player.x + Math.cos(a) * r, 80, WORLD_W - 80);
      const y = clamp(player.y + Math.sin(a) * r, 80, WORLD_H - 160);
      if (biomeAt(x, y) !== 'water') spawnBoss(x, y, pick(regionSpeciesAt(x, y)));
    }
  }

  function updateTeam(dt) {
    const teamCount = Math.max(1, state.team.length);
    const t = now() / 1000;
    const night = isNight();
    const dir = Math.hypot(player.dirX, player.dirY) > .1 ? { x: player.dirX, y: player.dirY } : facingVector();
    const side = { x: -dir.y, y: dir.x };
    for (let i = 0; i < state.team.length; i++) {
      const p = state.team[i];
      if (p.hp <= 0) { removePetFromRoster(p, 'defeated'); i--; continue; }
      if (Math.hypot(p.x - player.x, p.y - player.y) > 420) {
        const spot = findPetTeleportSpot(p);
        if (spot) { p.x = spot.x; p.y = spot.y; spawnParticles(p.x, p.y, 10, '#a78bfa'); }
      }
      let target = null;
      let best = 9999;
      if (!night) {
        for (const e of state.enemies) {
          if (e.state !== 'wild') continue;
          const d = Math.hypot(e.x - p.x, e.y - p.y);
          const playerNear = Math.hypot(e.x - player.x, e.y - player.y) < 190;
          if ((d < 165 || playerNear) && d + i * 4 < best) { best = d + i * 4; target = e; }
        }
      }
      p.roam += dt * (.42 + i * .08);
      const movingEnergy = state.movementEnergy || .08;
      const idleMotion = target ? 1 : clamp(movingEnergy, 0, 1);
      const wave = Math.sin(t * 1.45 + p.phase) * p.followWave * (.18 + idleMotion * .55);
      const driftX = Math.cos(p.roam) * 4 * idleMotion;
      const driftY = Math.sin(p.roam * .83) * 3 * idleMotion;
      const follow = {
        x: player.x - dir.x * (p.followBack + wave) + side.x * (p.followSide + Math.sin(t * 1.1 + p.phase) * 2.5 * idleMotion) + driftX,
        y: player.y - dir.y * (p.followBack + wave) + side.y * (p.followSide + Math.cos(t * 1.05 + p.phase) * 2.5 * idleMotion) + driftY,
      };
      const approachAngle = target ? p.targetOffset + i * (Math.PI * 2 / teamCount) + Math.sin(t + p.phase) * .25 : 0;
      const dest = target ? { x: target.x + Math.cos(approachAngle) * p.targetRadius, y: target.y + Math.sin(approachAngle) * p.targetRadius } : follow;
      const dx = dest.x - p.x, dy = dest.y - p.y, len = Math.hypot(dx, dy) || 1;
      let ax = len > (target ? 10 : 12) ? dx / len : 0;
      let ay = len > (target ? 10 : 12) ? dy / len : 0;
      if (target) {
        for (const other of state.team) {
          if (other === p) continue;
          const odx = p.x - other.x, ody = p.y - other.y, od = Math.hypot(odx, ody) || 1;
          if (od < 24) { ax += odx / od * (1 - od / 24) * .45; ay += ody / od * (1 - od / 24) * .45; }
        }
      }
      const fromPlayerX = p.x - player.x, fromPlayerY = p.y - player.y, playerDist = Math.hypot(fromPlayerX, fromPlayerY) || 1;
      if (!target && playerDist < 24) { ax += fromPlayerX / playerDist * .9; ay += fromPlayerY / playerDist * .9; }
      const alen = Math.hypot(ax, ay) || 1;
      const speed = (target ? p.speed + 24 : p.speed + 34) * (len > 120 ? 1.24 : 1);
      if (Math.hypot(ax, ay) > .05) {
        const step = Math.min(speed * dt, len * (target ? 1 : .62));
        moveEntity(p, ax / alen, ay / alen, step, canPetEnterWater(p));
      }
      if (target && Math.hypot(target.x - p.x, target.y - p.y) < 42) {
        p.attackCd -= dt;
        if (p.attackCd <= 0) { p.attackCd = Math.max(.42, .72 - petPower(p) * .025); damageEnemy(target, 16 + petPower(p) * 3, false); }
      } else p.attackCd = Math.max(0, p.attackCd - dt);
    }
  }

  function updateNeeds(dt) {
    if (state.finished) return;
    state.dayTime += dt;
    const nextDay = Math.floor(state.dayTime / DAY_SECONDS) + 1;
    if (nextDay !== state.day) {
      state.day = nextDay;
      if (state.food > 0) { state.food--; state.hunger = clamp(state.hunger + 28, 0, 100); showToast('🍖 早餐消耗食物 -1'); }
      setMessage(`第 ${state.day} 天！夜晚更危险，继续储备食物和伙伴。`, 2800);
    }
    if (isDusk() && state.lastDuskNoticeDay !== state.day) {
      state.lastDuskNoticeDay = state.day;
      setMessage('黄昏来了，天色正在变暗！准备火把或靠近帐篷。', 3200);
    }
    const activity = clamp(state.movementEnergy ?? .5, .5, 1.28);
    const hungryRate = (isNight() ? 2.8 : 1.75) * difficultyConfig().hunger * activity;
    state.hunger = clamp(state.hunger - hungryRate * dt, 0, 100);
    updateNightSurvival(dt);
    autoEatWhenIdle();
    if (state.hunger <= 0) state.hp = clamp(state.hp - 8 * dt, 0, 100);
    else if (state.hunger > 55 && state.hp < 100) state.hp = clamp(state.hp + 2.4 * dt, 0, 100);
    if (state.hp <= 0) recoverAtCamp('饥饿耗尽，营地伙伴把你救了回来。');
    if (Math.random() < dt * .26 * (2 - difficultyConfig().spawn)) addObject(Math.random() < .75 ? 'berry' : 'mushroom', rand(50, WORLD_W - 50), rand(50, WORLD_H - 100));
  }

  function autoEatWhenIdle() {
    if (state.food <= 0 || state.hunger > 72 || (state.movementEnergy ?? .5) > .55) return;
    const t = now();
    if (t < state.lastAutoEatAt + 1800) return;
    state.food--;
    state.hunger = clamp(state.hunger + 28, 0, 100);
    state.stamina = clamp(state.stamina + 22, 0, 100);
    state.eatingUntil = t + 760;
    state.lastAutoEatAt = t;
    spawnParticles(player.x, player.y - 10, 12, '#facc15');
    showToast('🍖 自动进食');
    playSound('gather');
    updateHud();
  }

  function updateParticles(dt) {
    for (const p of state.particles) { p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 60 * dt; }
    state.particles = state.particles.filter(p => p.life > 0);
    for (const f of state.fireflies) { f.t += dt * f.s; f.x += Math.cos(f.t) * 7 * dt; f.y += Math.sin(f.t * .8) * 6 * dt; }
  }

  function updateCamera(dt) {
    const vw = window.innerWidth, vh = window.innerHeight;
    const targetX = clamp(player.x - vw * .5, 0, WORLD_W - vw);
    const targetY = clamp(player.y - vh * .52, 0, WORLD_H - vh);
    state.camera.x = lerp(state.camera.x, targetX, 1 - Math.pow(0.0002, dt));
    state.camera.y = lerp(state.camera.y, targetY, 1 - Math.pow(0.0002, dt));
  }

  function snapCameraToPlayer() {
    const vw = window.innerWidth, vh = window.innerHeight;
    state.camera.x = clamp(player.x - vw * .5, 0, WORLD_W - vw);
    state.camera.y = clamp(player.y - vh * .52, 0, WORLD_H - vh);
  }

  function checkMission() {
    if (state.finished) return;
    const targetFood = 12 + state.campsBuilt * 6;
    const targetDay = 4 + state.campsBuilt * 2;
    if (state.day >= targetDay || (state.roster.length >= PET_MAX_TEAM && state.food >= targetFood)) buildCampMilestone(targetFood, targetDay);
  }

  function buildCampMilestone(targetFood, targetDay) {
    state.campsBuilt++;
    const milestoneBonus = 180 + state.campsBuilt * 45 + Math.min(state.food, targetFood) * 8 + state.team.length * 30;
    state.score += milestoneBonus;
    state.hp = clamp(state.hp + 18, 0, 100);
    state.hunger = clamp(state.hunger + 32, 0, 100);
    state.stamina = 100;
    makeConfetti();
    showToast(`🏕️ 荒野营地 +${milestoneBonus}`);
    setMessage(`第 ${state.campsBuilt} 个荒野营地建成！目标已刷新，继续探索更远的地方。`, 5200);
    post('gameProgress', {
      earnedPoints: Math.max(0, Math.round(state.score)), score: Math.round(state.score), food: state.food, captured: state.captured, defeated: state.defeated, teamSize: state.team.length, rosterSize: state.roster.length,
      difficulty: state.difficulty, difficultyName: difficultyConfig().name, day: state.day, campsBuilt: state.campsBuilt, targetFood, targetDay, roundId: state.roundId
    });
  }

  function recoverAtCamp(reason) {
    state.hp = 55;
    state.hunger = Math.max(state.hunger, 45);
    state.stamina = 82;
    state.food = Math.max(0, state.food - 2);
    state.score = Math.max(0, state.score - 80);
    player.hurtUntil = now() + 1800;
    spawnParticles(player.x, player.y, 28, '#facc15');
    showToast('🏕️ 营地救援');
    setMessage(`${reason} 游戏不会结束，休整后继续探索！`, 4200);
    updateHud();
  }

  function endGame(won) {
    if (state.finished) return;
    state.finished = true;
    const timeSec = Math.max(1, Math.round((now() - state.gameStartAt) / 1000));
    const surviveBonus = won ? Math.max(0, 260 - timeSec) : 0;
    state.score = (state.score + surviveBonus + state.food * 12 + state.roster.length * 28 + state.team.length * 45) * difficultyConfig().score;
    state.best = Math.max(state.best, Math.round(state.score));
    localStorage.setItem(STORAGE_BEST, String(state.best));
    updateHud();
    if (won) { makeConfetti(); showToast(`荒野生存成功！+${surviveBonus}`); setMessage('你和宠物小队建立了荒野营地！', 6000); }
    else { showToast('荒野失败，再试一次！'); setMessage('生命或饥饿耗尽了，重新挑战吧。', 6000); }
    playSound(won ? 'win' : 'lose');
    ui.restart.hidden = false;
    ui.restart.textContent = won ? '再玩一次' : '重新挑战';
    overlay.hidden = false;
    if (!state.finishPosted) {
      state.finishPosted = true;
      post('gameFinished', {
        earnedPoints: Math.max(0, Math.round(state.score)), score: Math.round(state.score), food: state.food, captured: state.captured, defeated: state.defeated, teamSize: state.team.length, rosterSize: state.roster.length,
        won, difficulty: state.difficulty, difficultyName: difficultyConfig().name, day: state.day, timeSec, roundId: state.roundId, bondBonus: won ? 30 : 12, moodBonus: won ? 10 : 4, finishedAt: Date.now()
      });
    }
  }

  function update(dt) {
    if (!state.started) return;
    if (state.paused) { updateCamera(dt); return; }
    if (!state.finished) {
      updatePlayer(dt); updateAutoWork(dt); updateTeam(dt); updateEnemies(dt); updateNeeds(dt); checkMission();
      if (state.score > state.best) { state.best = Math.round(state.score); localStorage.setItem(STORAGE_BEST, String(state.best)); }
    }
    updateParticles(dt); updateCamera(dt); updateHud(); updateWorkProgressUi();
    if (now() > state.messageUntil) ui.message.hidden = true;
  }

  function isNight() {
    const phase = (state.dayTime % DAY_SECONDS) / DAY_SECONDS;
    return phase >= NIGHT_START;
  }

  function isDusk() {
    const phase = (state.dayTime % DAY_SECONDS) / DAY_SECONDS;
    return phase >= DUSK_START && phase < NIGHT_START;
  }

  function spawnParticles(x, y, n, color) {
    for (let i = 0; i < n; i++) state.particles.push({ x, y, vx: rand(-80, 80), vy: rand(-110, -20), life: rand(.32, .72), max: .72, size: rand(2, 5), color });
  }

  function drawRect(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); }
  function drawBox(x, y, w, h, color) {
    const left = w < 0 ? x + w : x;
    const top = h < 0 ? y + h : y;
    drawRect(left, top, Math.abs(w), Math.abs(h), color);
  }
  function screenX(x) { return Math.round(x - state.camera.x); }
  function screenY(y) { return Math.round(y - state.camera.y); }

  const sheetImageCache = new Map();
  function getSheetImage(url) {
    if (!url) return null;
    const cached = sheetImageCache.get(url);
    if (cached) return cached;
    const entry = { image: new Image(), loaded: false, error: false };
    entry.image.crossOrigin = 'anonymous';
    entry.image.onload = () => { entry.loaded = true; };
    entry.image.onerror = () => { entry.error = true; };
    entry.image.src = url;
    sheetImageCache.set(url, entry);
    return entry;
  }

  function drawPetSheetCell(url, stage, anim, x, y, w, h) {
    const entry = getSheetImage(url);
    if (!entry?.loaded || entry.error) return false;
    const sw = Math.floor(entry.image.naturalWidth / PET_SHEET_COLS);
    const sh = Math.floor(entry.image.naturalHeight / PET_SHEET_ROWS);
    if (!sw || !sh) return false;
    const row = stageIndex(stage);
    const col = PET_ANIM_COLS[anim] == null ? PET_ANIM_COLS.idle : PET_ANIM_COLS[anim];
    ctx.drawImage(entry.image, col * sw, row * sh, sw, sh, x, y, w, h);
    return true;
  }

  function draw() {
    const vw = window.innerWidth, vh = window.innerHeight;
    drawBackground(vw, vh);
    drawTerrain();
    drawGroundDetails();
    drawHouseLights();
    drawObjects();
    drawHouses();
    drawEnemies();
    drawTeam();
    drawPlayer();
    drawParticles();
    drawNightOverlay(vw, vh);
    drawMiniMap(vw, vh);
  }

  function updateWorkProgressUi() {
    const work = state.autoWork;
    if (!work?.kind || !work.target || state.finished || state.paused) { ui.work.classList.remove('show'); return; }
    const pct = clamp(work.progress / work.needed * 100, 0, 100);
    ui.workText.textContent = work.kind === 'capture' ? '捕获中' : (work.target.type === 'tree' ? '砍伐中' : '采集中');
    ui.workBar.style.setProperty('--pct', `${pct}%`);
    ui.work.style.left = `${screenX(work.target.x)}px`;
    ui.work.style.top = `${screenY(work.target.y - 34)}px`;
    ui.work.classList.add('show');
  }

  function drawBackground(vw, vh) {
    const night = isNight();
    const dusk = isDusk();
    const g = ctx.createLinearGradient(0, 0, 0, vh);
    g.addColorStop(0, night ? '#12312e' : dusk ? '#8f7a4a' : '#93d46d');
    g.addColorStop(.62, night ? '#173a31' : dusk ? '#8d8a50' : '#78c562');
    g.addColorStop(1, night ? '#0e2725' : dusk ? '#5f7f45' : '#66ad58');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, vw, vh);
    const grid = 24;
    ctx.fillStyle = night ? 'rgba(255,255,255,.025)' : dusk ? 'rgba(120,53,15,.055)' : 'rgba(255,255,255,.045)';
    const ox = -state.camera.x % grid, oy = -state.camera.y % grid;
    for (let x = ox; x < vw; x += grid) ctx.fillRect(Math.round(x), 0, 1, vh);
    for (let y = oy; y < vh; y += grid) ctx.fillRect(0, Math.round(y), vw, 1);
    const fine = 12;
    ctx.fillStyle = night ? 'rgba(0,0,0,.04)' : dusk ? 'rgba(92,64,35,.065)' : 'rgba(20,83,45,.045)';
    const fox = -state.camera.x % fine, foy = -state.camera.y % fine;
    for (let x = fox; x < vw; x += fine) for (let y = foy; y < vh; y += fine) if (((Math.floor((x + state.camera.x) / fine) + Math.floor((y + state.camera.y) / fine)) & 3) === 0) ctx.fillRect(Math.round(x), Math.round(y), 1, 1);
  }

  function drawTerrain() {
    createTerrainAtlas();
    const visibleStartCx = Math.floor(state.camera.x / CHUNK_SIZE);
    const visibleStartCy = Math.floor(state.camera.y / CHUNK_SIZE);
    const visibleEndCx = Math.floor((state.camera.x + window.innerWidth) / CHUNK_SIZE);
    const visibleEndCy = Math.floor((state.camera.y + window.innerHeight) / CHUNK_SIZE);
    pruneTerrainChunkCache(visibleStartCx - 1, visibleStartCy - 1, visibleEndCx + 1, visibleEndCy + 1);
    const camX = state.camera.x, camY = state.camera.y;
    for (let cy = visibleStartCy; cy <= visibleEndCy; cy++) {
      for (let cx = visibleStartCx; cx <= visibleEndCx; cx++) {
        const chunk = getTerrainChunkCanvas(cx, cy);
        if (!chunk) continue;
        ctx.drawImage(chunk, Math.round(cx * CHUNK_SIZE - camX), Math.round(cy * CHUNK_SIZE - camY));
      }
    }
    ctx.globalAlpha = 1;
  }

  function pruneTerrainChunkCache(minCx, minCy, maxCx, maxCy) {
    const prefix = `${state.terrainSeed}:`;
    for (const key of terrainChunkCache.keys()) {
      if (!key.startsWith(prefix)) { terrainChunkCache.delete(key); continue; }
      const comma = key.indexOf(',', prefix.length);
      const cx = Number(key.slice(prefix.length, comma));
      const cy = Number(key.slice(comma + 1));
      if (cx < minCx || cx > maxCx || cy < minCy || cy > maxCy) terrainChunkCache.delete(key);
    }
  }

  function getTerrainChunkCanvas(cx, cy) {
    if (cx < 0 || cy < 0 || cx * CHUNK_SIZE > WORLD_W || cy * CHUNK_SIZE > WORLD_H) return null;
    const key = `${state.terrainSeed}:${cx},${cy}`;
    const cached = terrainChunkCache.get(key);
    if (cached) return cached;
    const canvasEl = document.createElement('canvas');
    canvasEl.width = CHUNK_SIZE;
    canvasEl.height = CHUNK_SIZE;
    const oldCtx = ctx;
    const cctx = canvasEl.getContext('2d');
    cctx.imageSmoothingEnabled = false;
    ctx = cctx;
    const startTx = Math.floor(cx * CHUNK_SIZE / TERRAIN_TILE);
    const startTy = Math.floor(cy * CHUNK_SIZE / TERRAIN_TILE);
    const tileCount = Math.ceil(CHUNK_SIZE / TERRAIN_TILE);
    const oldCameraX = state.camera.x, oldCameraY = state.camera.y;
    state.camera.x = cx * CHUNK_SIZE;
    state.camera.y = cy * CHUNK_SIZE;
    const atlas = createTerrainAtlas();
    try {
      for (let oy = 0; oy < tileCount; oy++) {
        const ty = startTy + oy;
        const wy = ty * TERRAIN_TILE;
        for (let ox = 0; ox < tileCount; ox++) {
          const tx = startTx + ox;
          const wx = tx * TERRAIN_TILE;
          const meta = terrainTileMeta(tx, ty);
          cctx.drawImage(atlas, meta.variant * TERRAIN_TEXTURE_TILE, meta.biomeRow * TERRAIN_TEXTURE_TILE, TERRAIN_TEXTURE_TILE, TERRAIN_TEXTURE_TILE, ox * TERRAIN_TILE, oy * TERRAIN_TILE, TERRAIN_TILE, TERRAIN_TILE);
          drawInteriorTerrainVariation(wx, wy, meta.biome, tx, ty, meta.tileSeed, meta);
          drawTerrainTransitions(wx, wy, meta.biome, tx, ty, meta);
        }
      }
    } finally {
      state.camera.x = oldCameraX;
      state.camera.y = oldCameraY;
      ctx = oldCtx;
    }
    terrainChunkCache.set(key, canvasEl);
    return canvasEl;
  }

  function drawTerrainTransitions(wx, wy, biome, tx, ty, meta = null) {
    const cx = wx + TERRAIN_TILE * .5, cy = wy + TERRAIN_TILE * .5;
    const north = meta ? meta.north : biomeAt(cx, cy - TERRAIN_TILE);
    const east = meta ? meta.east : biomeAt(cx + TERRAIN_TILE, cy);
    const south = meta ? meta.south : biomeAt(cx, cy + TERRAIN_TILE);
    const west = meta ? meta.west : biomeAt(cx - TERRAIN_TILE, cy);
    drawTerrainTransitionSide(wx, wy, biome, north, 'n', tx, ty, 0, -1);
    drawTerrainTransitionSide(wx, wy, biome, east, 'e', tx, ty, 1, 0);
    drawTerrainTransitionSide(wx, wy, biome, south, 's', tx, ty, 0, 1);
    drawTerrainTransitionSide(wx, wy, biome, west, 'w', tx, ty, -1, 0);
    const nw = meta ? meta.nw : biomeAt(cx - TERRAIN_TILE, cy - TERRAIN_TILE);
    const ne = meta ? meta.ne : biomeAt(cx + TERRAIN_TILE, cy - TERRAIN_TILE);
    const se = meta ? meta.se : biomeAt(cx + TERRAIN_TILE, cy + TERRAIN_TILE);
    const sw = meta ? meta.sw : biomeAt(cx - TERRAIN_TILE, cy + TERRAIN_TILE);
    drawTerrainTransitionCorner(wx, wy, biome, nw, 'nw', tx, ty);
    drawTerrainTransitionCorner(wx, wy, biome, ne, 'ne', tx, ty);
    drawTerrainTransitionCorner(wx, wy, biome, se, 'se', tx, ty);
    drawTerrainTransitionCorner(wx, wy, biome, sw, 'sw', tx, ty);
  }

  function drawTerrainTransitionSide(wx, wy, biome, otherBiome, side, tx, ty, dx, dy) {
    if (otherBiome === biome || ((BIOME_PRIORITY[otherBiome] ?? 0) < (BIOME_PRIORITY[biome] ?? 0))) return;
    drawBiomeSplat(wx, wy, side, otherBiome, hash2(tx + dx * 17, ty + dy * 19, state.worldSeed + 360));
  }

  function drawTerrainTransitionCorner(wx, wy, biome, otherBiome, side, tx, ty) {
    if (otherBiome === biome || ((BIOME_PRIORITY[otherBiome] ?? 0) < (BIOME_PRIORITY[biome] ?? 0))) return;
    drawBiomeCornerSplat(wx, wy, side, otherBiome, hash2(tx, ty, state.worldSeed + side.charCodeAt(0) * 13));
  }

  function drawBiomeSplat(wx, wy, side, biome, seed) {
    const sx = Math.round(screenX(wx)), sy = Math.round(screenY(wy));
    const color = TRANSITION_COLORS[biome] || 'rgba(255,255,255,.45)';
    ctx.fillStyle = color;
    for (let i = 0; i < TERRAIN_TILE; i += 2) {
      const jitter = Math.floor(localHash(i, Math.floor(seed * 1000), state.worldSeed + 420) * 4);
      const w = 1 + Math.floor(localHash(i, 7, state.worldSeed + 421) * 3);
      if (side === 'n') drawRect(sx + i, sy, 2, 2 + jitter, color);
      else if (side === 's') drawRect(sx + i, sy + TERRAIN_TILE - 2 - jitter, 2, 2 + jitter, color);
      else if (side === 'e') drawRect(sx + TERRAIN_TILE - 2 - jitter, sy + i, 2 + jitter, 2, color);
      else if (side === 'w') drawRect(sx, sy + i, 2 + jitter, 2, color);
      if (w > 2 && localHash(i, 11, state.worldSeed + 422) > .6) {
        if (side === 'n' || side === 's') drawRect(sx + i, sy + (side === 'n' ? 3 + jitter : TERRAIN_TILE - 5 - jitter), 2, 1, color);
        else drawRect(sx + (side === 'w' ? 3 + jitter : TERRAIN_TILE - 5 - jitter), sy + i, 1, 2, color);
      }
    }
  }

  function drawBiomeCornerSplat(wx, wy, side, biome, seed) {
    const sx = Math.round(screenX(wx)), sy = Math.round(screenY(wy));
    const color = TRANSITION_COLORS[biome] || 'rgba(255,255,255,.35)';
    const left = side.includes('w'), top = side.includes('n');
    for (let y = 0; y < 6; y += 2) for (let x = 0; x < 6; x += 2) {
      if (x + y + localHash(x, y, Math.floor(seed * 999)) * 5 > 7) continue;
      drawRect(sx + (left ? x : TERRAIN_TILE - 2 - x), sy + (top ? y : TERRAIN_TILE - 2 - y), 2, 2, color);
    }
  }

  function drawBiomePatch(x, y, t, palette, alpha = .34) {
    const rx = t.r * (t.sx || 1), ry = t.r * (t.sy || .6);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = palette.base;
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, Math.sin(t.seed) * .2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = alpha * .8;
    ctx.fillStyle = palette.alt;
    for (let i = 0; i < 6; i++) drawRect(x - rx * .72 + i * rx * .28, y + Math.sin(t.seed + i) * ry * .45, Math.max(5, rx * .12), 2, ctx.fillStyle);
    ctx.globalAlpha = 1;
  }

  function drawLandPatch(x, y, t) {
    drawBiomePatch(x, y, t, BIOMES.land, .2);
  }

  function drawLawnPatch(x, y, t) {
    drawBiomePatch(x, y, t, BIOMES.lawn, .34);
  }

  function drawForestPatch(x, y, t) {
    drawBiomePatch(x, y, t, BIOMES.forest, .42);
    const rx = t.r * (t.sx || 1), ry = t.r * (t.sy || .6);
    ctx.fillStyle = 'rgba(25,83,45,.22)';
    for (let i = 0; i < 9; i++) drawRect(x + Math.cos(t.seed + i) * rx * .72, y + Math.sin(t.seed * 1.4 + i) * ry * .56, 5, 3, ctx.fillStyle);
  }

  function drawWetlandPatch(x, y, t) {
    drawBiomePatch(x, y, t, BIOMES.wetland, .36);
    const rx = t.r * (t.sx || 1), ry = t.r * (t.sy || .6);
    ctx.fillStyle = 'rgba(61,174,194,.2)';
    for (let i = 0; i < 7; i++) drawRect(x + Math.cos(t.seed + i) * rx * .68, y + Math.sin(t.seed + i) * ry * .5, 8, 2, ctx.fillStyle);
  }

  function drawGrassPatch(x, y, t) {
    ctx.globalAlpha = .28;
    ctx.fillStyle = COLORS.grass2;
    ctx.beginPath();
    ctx.ellipse(x, y, t.r, t.r * .52, Math.sin(t.seed) * .2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = .22;
    ctx.fillStyle = '#a7df7a';
    for (let i = 0; i < 5; i++) drawRect(x - t.r * .65 + i * t.r * .32, y + Math.sin(t.seed + i) * 5, Math.max(5, t.r * .18), 2, ctx.fillStyle);
    ctx.globalAlpha = 1;
  }

  function drawSandPatch(x, y, t) {
    drawBiomePatch(x, y, t, BIOMES.desert, .5);
    const rx = t.r * (t.sx || 1), ry = t.r * (t.sy || .6);
    ctx.fillStyle = 'rgba(146, 109, 52, .24)';
    for (let i = 0; i < 10; i++) drawRect(x + Math.cos(t.seed + i) * rx * .7, y + Math.sin(t.seed * 1.3 + i) * ry * .55, 2, 1, ctx.fillStyle);
    ctx.globalAlpha = 1;
  }

  function drawFlowerPatch(x, y, t) {
    drawGrassPatch(x, y, t);
    const colors = ['#f472b6', '#fde047', '#c084fc', '#fb7185'];
    for (let i = 0; i < 7; i++) {
      const px = x + Math.cos(t.seed + i * 1.7) * t.r * .55;
      const py = y + Math.sin(t.seed + i * 1.2) * t.r * .28;
      drawRect(px, py, 2, 2, colors[i % colors.length]);
      drawRect(px + 1, py - 1, 1, 1, '#fff7ed');
    }
  }

  function drawPond(x, y, t) {
    ctx.globalAlpha = 1;
    const rx = Math.max(WATER_TILE * 2, t.r * (t.sx || 1.08));
    const ry = Math.max(WATER_TILE, t.r * (t.sy || .58));
    const left = Math.floor((t.x - rx) / WATER_TILE) * WATER_TILE;
    const right = Math.ceil((t.x + rx) / WATER_TILE) * WATER_TILE;
    const top = Math.floor((t.y - ry) / WATER_TILE) * WATER_TILE;
    const bottom = Math.ceil((t.y + ry) / WATER_TILE) * WATER_TILE;
    for (let wy = top; wy <= bottom; wy += WATER_TILE) {
      for (let wx = left; wx <= right; wx += WATER_TILE) {
        const sx = screenX(wx), sy = screenY(wy);
        if (sx < -WATER_TILE || sy < -WATER_TILE || sx > window.innerWidth + WATER_TILE || sy > window.innerHeight + WATER_TILE) continue;
        const nx = (wx + WATER_TILE * .5 - t.x) / rx;
        const ny = (wy + WATER_TILE * .5 - t.y) / ry;
        if (nx * nx + ny * ny > 1) continue;
        const edge = nx * nx + ny * ny;
        const pattern = (Math.floor(wx / WATER_TILE) * 7 + Math.floor(wy / WATER_TILE) * 3 + Math.floor(t.seed * 10)) % 9;
        ctx.fillStyle = edge > .78 ? '#5fc3cf' : pattern === 0 ? '#73d6df' : pattern === 1 ? '#2f9ab2' : BIOMES.water.base;
        drawRect(sx, sy, WATER_TILE, WATER_TILE, ctx.fillStyle);
        if (pattern === 0) drawRect(sx + 1, sy + 1, WATER_TILE - 3, 1, 'rgba(255,255,255,.38)');
      }
    }
    ctx.fillStyle = 'rgba(21,94,117,.28)';
    for (let wx = left; wx <= right; wx += WATER_TILE * 2) {
      if (Math.abs((wx - t.x) / rx) < .9) drawRect(screenX(wx), screenY(t.y + Math.sin(t.seed + wx * .03) * ry * .25), WATER_TILE, 2, ctx.fillStyle);
    }
    ctx.globalAlpha = 1;
  }

  function drawGroundDetails() {
    for (const d of state.groundDetails) {
      const x = screenX(d.x), y = screenY(d.y);
      if (x < -12 || y < -12 || x > window.innerWidth + 12 || y > window.innerHeight + 12) continue;
      if (d.t === 'blade') {
        drawRect(x, y, 1, 4 * d.s, '#3f8f46');
        if (d.s > 1.1) drawRect(x + 2, y + 1, 1, 3, '#5aa957');
      } else if (d.t === 'pebble') {
        drawRect(x, y, 2, 1, 'rgba(62,80,64,.35)');
      } else {
        drawRect(x, y, 2, 2, Math.sin(d.c) > 0 ? '#fde047' : '#f9a8d4');
      }
    }
  }

  function drawObjects() {
    const items = state.objects.filter(o => !o.taken).sort((a, b) => a.y - b.y);
    for (const o of items) {
      const x = screenX(o.x), y = screenY(o.y);
      if (x < -80 || y < -100 || x > window.innerWidth + 80 || y > window.innerHeight + 80) continue;
      if (o.type === 'tree') drawTree(x, y, o);
      else if (o.type === 'branch') drawBranch(x, y, o);
      else if (o.type === 'berry') drawBerry(x, y, o);
      else if (o.type === 'meat') drawMeat(x, y, o);
      else drawMushroom(x, y, o);
    }
  }

  function drawHouseLights() {
    if (!isNight()) return;
    for (const h of state.houses) drawLightCircle(screenX(h.x), screenY(h.y), HOUSE_SAFE_RADIUS, 'rgba(251,191,36,.12)');
    drawLightCircle(screenX(player.x), screenY(player.y - 10), now() < state.torchUntil ? playerSafeLightRadius() : 54, now() < state.torchUntil ? 'rgba(251,146,60,.16)' : 'rgba(254,243,199,.08)');
  }

  function drawLightCircle(x, y, radius, color) {
    if (!radius) return;
    const g = ctx.createRadialGradient(x, y, 8, x, y, radius);
    g.addColorStop(0, color);
    g.addColorStop(.52, color.replace(/\.\d+\)/, '.12)'));
    g.addColorStop(1, 'rgba(251,191,36,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHouses() {
    for (const h of state.houses.slice().sort((a, b) => a.y - b.y)) {
      const x = screenX(h.x), y = screenY(h.y);
      if (x < -120 || y < -120 || x > window.innerWidth + 120 || y > window.innerHeight + 120) continue;
      drawHouse(x, y, h);
    }
  }

    drawRect(x - 39, y + 20, 78, 5, '#5b341c');
    drawRect(x - 4, y - 45, 8, 70, '#5b341c');
    drawRect(x - 36, y - 18, 72, 42, '#d97706');
    drawRect(x - 31, y - 22, 62, 10, '#f59e0b');
    drawRect(x - 26, y - 30, 52, 9, '#fbbf24');
    drawRect(x - 19, y - 38, 38, 10, '#f97316');
    drawRect(x - 12, y - 46, 24, 11, '#ea580c');
    drawRect(x - 34, y - 14, 10, 34, '#b45309');
    drawRect(x + 24, y - 14, 10, 34, '#b45309');
    drawRect(x - 3, y - 20, 6, 44, '#78350f');
    drawRect(x - 14, y - 6, 28, 30, '#451a03');
    drawRect(x - 8, y - 1, 16, 25, isNight() ? '#78350f' : '#7c2d12');
    drawRect(x - 33, y - 25, 4, 48, '#3f2a1d');
    drawRect(x + 29, y - 25, 4, 48, '#3f2a1d');
    drawRect(x - 45, y + 21, 14, 3, '#3f2a1d');
    drawRect(x + 31, y + 21, 14, 3, '#3f2a1d');
    drawRect(x - 24, y - 19, 6, 38, 'rgba(254,243,199,.22)');
    drawRect(x + 15, y - 18, 5, 36, 'rgba(120,53,15,.28)');
