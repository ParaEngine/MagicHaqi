    drawRect(x - 6, y - 33, 12, 3, '#fdba74');
    if (isNight()) {
      const flicker = 1 + Math.sin(now() / 120 + h.builtAt) * .18;
      drawRect(x - 48, y - 11, 4, 28, '#78350f');
      drawRect(x - 52, y - 22, 12, 13 * flicker, '#f97316');
      drawRect(x - 49, y - 19, 6, 8 * flicker, '#fde047');
      drawRect(x + 44, y - 11, 4, 28, '#78350f');
      drawRect(x + 40, y - 22, 12, 13 * flicker, '#f97316');
      drawRect(x + 43, y - 19, 6, 8 * flicker, '#fde047');
      drawRect(x - 6, y + 2, 12, 21, 'rgba(251,191,36,.32)');
    }
  }

  function drawTree(x, y, o) {
    drawRect(x - 24, y + 16, 48, 6, 'rgba(15,23,42,.16)');
    drawRect(x - 7, y - 9, 14, 27, COLORS.wood);
    drawRect(x - 4, y - 8, 3, 24, '#a66f3a');
    drawRect(x + 4, y - 5, 2, 19, '#6f4428');
    drawRect(x - 23, y - 31, 46, 24, '#2f9e50');
    drawRect(x - 18, y - 39, 36, 25, '#35b45a');
    drawRect(x - 12, y - 48, 24, 18, '#56c86a');
    drawRect(x - 28, y - 24, 18, 16, '#268c47');
    drawRect(x + 10, y - 26, 19, 17, '#2a944b');
    drawRect(x - 9, y - 43, 5, 3, 'rgba(255,255,255,.18)');
    drawRect(x + 7, y - 35, 6, 3, 'rgba(255,255,255,.14)');
  }

  function drawBranch(x, y, o) {
    const a = Math.sin(o.grow) * .45;
    ctx.save();
    ctx.translate(Math.round(x), Math.round(y));
    ctx.rotate(a);
    drawRect(-12, 3, 24, 5, '#8b5a2b');
    drawRect(-9, 1, 14, 3, '#a66f3a');
    drawRect(0, -5, 4, 10, '#6f4428');
    drawRect(6, -2, 7, 3, '#5b341c');
    drawRect(-14, 8, 28, 3, 'rgba(15,23,42,.14)');
    ctx.restore();
  }

  function drawBerry(x, y, o) {
    const bob = 0;
    drawRect(x - 9, y - 4 + bob, 18, 13, '#2f9e50');
    drawRect(x - 6, y - 10 + bob, 4, 8, '#248542');
    drawRect(x + 2, y - 9 + bob, 4, 8, '#248542');
    drawRect(x - 12, y - 10 + bob, 7, 7, COLORS.berry);
    drawRect(x + 4, y - 11 + bob, 7, 7, '#f43f5e');
    drawRect(x - 4, y - 16 + bob, 7, 7, '#dc2626');
    drawRect(x - 10, y - 9 + bob, 2, 2, '#fecdd3');
    drawRect(x + 6, y - 10 + bob, 2, 2, '#ffe4e6');
    drawRect(x - 12, y + 12, 24, 4, 'rgba(15,23,42,.16)');
  }

  function drawMushroom(x, y, o) {
    const bob = 0;
    drawRect(x - 6, y - 1 + bob, 12, 14, '#fde68a');
    drawRect(x - 3, y + 2 + bob, 6, 11, '#f9d37a');
    drawRect(x - 15, y - 12 + bob, 30, 13, '#f97316');
    drawRect(x - 11, y - 17 + bob, 22, 8, '#fb923c');
    drawRect(x - 8, y - 10 + bob, 5, 4, '#fff7ed');
    drawRect(x + 5, y - 9 + bob, 4, 3, '#fff7ed');
    drawRect(x - 1, y - 14 + bob, 3, 3, '#ffedd5');
    drawRect(x - 12, y + 13, 24, 4, 'rgba(15,23,42,.16)');
  }

  function drawMeat(x, y, o) {
    const bob = Math.sin(now() / 220 + o.grow) * 1.5;
    drawRect(x - 14, y + 12, 28, 5, 'rgba(15,23,42,.18)');
    drawRect(x - 12, y - 8 + bob, 22, 15, '#b91c1c');
    drawRect(x - 9, y - 11 + bob, 16, 7, '#ef4444');
    drawRect(x + 7, y - 3 + bob, 8, 5, '#fee2e2');
    drawRect(x + 13, y - 5 + bob, 5, 5, '#fff7ed');
    drawRect(x + 13, y + 2 + bob, 5, 5, '#fff7ed');
    drawRect(x - 7, y - 8 + bob, 5, 3, '#fecaca');
    drawRect(x - 10, y + 2 + bob, 4, 2, '#7f1d1d');
  }

  function drawPlayer() {
    const x = screenX(player.x), y = screenY(player.y);
    const upperY = y - 1;
    const hurt = now() < player.hurtUntil;
    const eating = now() < state.eatingUntil;
    const activeWorkKind = state.autoWork?.kind === 'capture' ? 'gather' : (state.autoWork?.kind === 'gather' ? (state.autoWork.target?.type === 'tree' ? 'chop' : 'gather') : '');
    const working = now() < player.workAnimUntil || !!activeWorkKind;
    const workKind = activeWorkKind || player.workAnimKind;
    const workPulse = working ? Math.sin(now() / 42) : 0;
    const step = Math.floor(player.animTime) % 2;
    const shirt = state.masterStyle === 'girl' ? '#f472b6' : '#38bdf8';
    const hair = state.masterStyle === 'girl' ? '#4a2c2a' : '#1f2937';
    if (hurt && Math.floor(now() / 80) % 2 === 0) ctx.globalAlpha = .45;
    drawRect(x - 12, y + 13, 24, 6, 'rgba(15,23,42,.2)');
    const legA = 13 + step * 2;
    const legB = 13 + (1 - step) * 2;
    if (player.facing === 'up') {
      drawRect(x - 8, upperY - 22, 16, 14, hair);
      drawRect(x - 11, upperY - 19, 22, 11, hair);
      drawRect(x - 6, upperY - 24, 12, 5, '#111827');
      drawRect(x - 5, upperY - 14, 10, 5, hair);
      drawRect(x - 10, upperY - 8, 20, 20, shirt);
      drawRect(x - 8, upperY - 8, 16, 4, hair);
      drawRect(x - 15, upperY - 4 + (working ? workPulse * 2 : 0), 5, 17, '#fed7aa');
      drawRect(x + 10, upperY - 4 - (working ? workPulse * 2 : 0), 5, 17, '#fed7aa');
      drawRect(x - 8, y + 11, 6, legA, '#334155');
      drawRect(x + 2, y + 11, 6, legB, '#334155');
    } else if (player.facing === 'down') {
      drawRect(x - 8, upperY - 21, 16, 13, '#fed7aa');
      drawRect(x - 9, upperY - 24, 18, 7, hair);
      drawRect(x - 10, upperY - 8, 20, 20, shirt);
      drawRect(x - 14, upperY - 5 + (working ? workPulse * 2 : 0), 5, 18, '#fed7aa');
      drawRect(x + 9, upperY - 5 - (working ? workPulse * 2 : 0), 5, 18, '#fed7aa');
      if (eating) drawEatingFood(x, upperY - 10);
      drawRect(x - 8, y + 11, 6, legA, '#334155');
      drawRect(x + 2, y + 11, 6, legB, '#334155');
      drawRect(x - 4, upperY - 15, 3, 3, '#0f172a');
      drawRect(x + 5, upperY - 15, 3, 3, '#0f172a');
      drawRect(x - 2, upperY - 10, 4, 2, '#9a3412');
    } else {
      const faceSide = player.facing === 'left' ? -1 : 1;
      const backSide = -faceSide;
      drawRect(x - 8, upperY - 21, 16, 13, '#fed7aa');
      drawRect(x - 9, upperY - 24, 18, 8, hair);
      drawBox(x + backSide * 7, upperY - 21, backSide * 5, 13, hair);
      drawRect(x - 10, upperY - 8, 20, 20, shirt);
      drawRect(x + faceSide * 6 - 1, upperY - 15, 3, 3, '#0f172a');
      drawRect(x + faceSide * 6 - 1, upperY - 10, 4, 2, '#9a3412');
      drawBox(x + backSide * 10, upperY - 4 - (working ? workPulse * 2 : 0), backSide * 5, 17, '#fed7aa');
      drawBox(x + faceSide * 9, upperY - 4 + (working ? workPulse * 3 : 0), faceSide * 5, 17, '#fed7aa');
      if (eating) drawEatingFood(x + faceSide * 9, upperY - 11);
      drawRect(x - 8, y + 11, 6, legA, '#334155');
      drawRect(x + 2, y + 11, 6, legB, '#334155');
    }
    if (eating && player.facing === 'up') drawEatingFood(x, upperY - 18);
    if (now() < player.attackUntil) drawAttackSwing(x, y);
    else if (working && workKind === 'chop') drawAttackSwing(x, y, .68, (now() / 260) % 1);
    ctx.globalAlpha = 1;
  }

  function drawEatingFood(x, y) {
    const chew = Math.floor(now() / 120) % 2;
    drawRect(x - 3, y + chew, 7, 5, '#f97316');
    drawRect(x - 1, y - 1 + chew, 3, 2, '#facc15');
    drawRect(x + 3, y + 1 + chew, 2, 2, '#fff7ed');
  }

  function drawAttackSwing(x, y, scaleMul = 1, overrideProgress = null) {
    const dir = getFacingVector();
    const progress = overrideProgress == null ? clamp((now() - player.attackStartedAt) / 300, 0, 1) : clamp(overrideProgress, 0, 1);
    const swing = Math.sin(progress * Math.PI);
    const baseAngle = player.facing === 'right' ? 0 : player.facing === 'left' ? Math.PI : player.facing === 'down' ? Math.PI / 2 : -Math.PI / 2;
    const angle = baseAngle + (progress - .5) * 1.35;
    const reach = (18 + swing * 14) * scaleMul;
    const handX = x + dir.x * 10;
    const handY = y - 3 + dir.y * 8;
    const axeX = x + dir.x * reach;
    const axeY = y - 8 + dir.y * reach;
    drawRect(handX - 4, handY - 4, 8, 8, '#fed7aa');
    ctx.save();
    ctx.translate(Math.round(axeX), Math.round(axeY));
    ctx.rotate(angle);
    ctx.imageSmoothingEnabled = false;
    ctx.globalAlpha = .28 + swing * .28;
    drawRect(-13, -15, 26, 30, 'rgba(255,237,213,.42)');
    ctx.globalAlpha = 1;
    drawRect(-13, -2, 25, 5, '#7c4a2d');
    drawRect(-7, -1, 17, 2, '#a16207');
    drawRect(6, -8, 11, 16, '#cbd5e1');
    drawRect(10, -12, 7, 8, '#f8fafc');
    drawRect(10, 4, 7, 8, '#94a3b8');
    drawRect(16, -7, 3, 14, '#64748b');
    drawRect(5, -3, 4, 6, '#78350f');
    drawRect(18, -10, 2, 20, '#f97316');
    ctx.restore();
    ctx.imageSmoothingEnabled = false;
  }

  function drawTeam() {
    for (const p of state.team.slice().sort((a, b) => a.y - b.y)) drawPetLike(p, screenX(p.x), screenY(p.y), true, p.index);
  }

  function drawEnemies() {
    for (const e of state.enemies.slice().sort((a, b) => a.y - b.y)) {
      if (e.state === 'captured' || e.state === 'gone') continue;
      const x = screenX(e.x), y = screenY(e.y);
      if (x < -80 || y < -80 || x > window.innerWidth + 80 || y > window.innerHeight + 80) continue;
      if (e.state === 'down') ctx.globalAlpha = .68 + Math.sin(now() / 130) * .18;
      drawPetLike(e, x, y, false, 0);
      ctx.globalAlpha = 1;
      if (e.state === 'wild' && !state.petBitmaps.length) drawHpBar(x, y - 28, e.hp / e.maxHp, '#ef4444');
      if (e.state === 'down') {
        drawRect(x - 22, y - 39, 44, 15, '#fff7ed');
        ctx.fillStyle = '#7c2d12'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('捕获!', x, y - 28);
      }
    }
  }

  function drawPetLike(p, x, y, friendly, index) {
    const scale = p.boss ? 1.45 : 1;
    drawRect(x - 15 * scale, y + 13, 30 * scale, 6 * scale, p.boss ? 'rgba(127,29,29,.28)' : 'rgba(15,23,42,.2)');
    const bmp = state.petBitmaps[(typeof p.artIndex === 'number' ? p.artIndex : index) % Math.max(1, state.petBitmaps.length)] || null;
    if (bmp && bmp.bitmap && bmp.uv) {
      try {
        const u = bmp.uv;
        const useSheetSleep = !friendly && p.state === 'down' && (p.imageSheetUrl || bmp.imageSheetUrl);
        const bob = Math.sin(now() / 180 + index + (p.artIndex || 0) * .37) * (friendly ? 1.5 : 1.1);
        const hurt = !friendly && now() < (p.hurtUntil || 0);
        if (hurt) ctx.globalAlpha *= .62;
        ctx.imageSmoothingEnabled = false;
        const size = (40 + Math.min(10, petPower(p) * 1.2)) * scale;
        if (useSheetSleep && drawPetSheetCell(p.imageSheetUrl || bmp.imageSheetUrl, p.stage || bmp.stage || 'baby', 'sleep', x - size / 2, y - 27 + bob - (size - 40) * .45, size, size)) {
          // drawPetSheetCell is async-backed via cached image; fallback may draw below on first frame.
        } else {
          ctx.drawImage(bmp.bitmap, u.x, u.y, u.width, u.height, x - size / 2, y - 27 + bob - (size - 40) * .45, size, size);
        }
        ctx.imageSmoothingEnabled = false;
        if (hurt) ctx.globalAlpha = 1;
        if (p.boss) drawBossMarker(x, y - size * .72);
        drawHpBar(x, y - 33, p.hp / p.maxHp, friendly ? '#22c55e' : '#ef4444');
        return;
      } catch (err) {}
    }
    const body = p.type === 'wolf' ? '#64748b' : p.type === 'boar' ? '#a16207' : p.type === 'fox' ? '#f97316' : '#a3e635';
    const accent = friendly ? '#38bdf8' : '#facc15';
    const bob = Math.sin(now() / 180 + index) * 1.5;
    drawRect(x - 14, y - 11 + bob, 28, 23, body);
    drawRect(x - 10, y - 20 + bob, 20, 13, body);
    drawRect(x - 14, y - 24 + bob, 7, 8, body);
    drawRect(x + 7, y - 24 + bob, 7, 8, body);
    drawRect(x - 6, y - 15 + bob, 3, 3, '#0f172a');
    drawRect(x + 4, y - 15 + bob, 3, 3, '#0f172a');
    drawRect(x - 3, y - 10 + bob, 6, 3, '#111827');
    drawRect(x - 15, y + 10 + bob, 6, 8, accent);
    drawRect(x + 9, y + 10 + bob, 6, 8, accent);
    if (friendly) drawRect(x - 18, y - 28 + bob, 36, 4, '#22c55e');
    if (p.boss) drawBossMarker(x, y - 38 + bob);
  }

  function drawBossMarker(x, y) {
    drawRect(x - 12, y - 5, 24, 5, '#facc15');
    drawRect(x - 9, y - 9, 5, 5, '#facc15');
    drawRect(x - 2, y - 11, 4, 7, '#fde047');
    drawRect(x + 5, y - 9, 5, 5, '#facc15');
    drawRect(x - 10, y, 20, 2, '#92400e');
  }

  function drawHpBar(x, y, pct, color) {
    pct = clamp(pct || 0, 0, 1);
    drawRect(x - 17, y, 34, 5, 'rgba(15,23,42,.45)');
    drawRect(x - 16, y + 1, 32 * pct, 3, color);
  }

  function drawParticles() {
    for (const p of state.particles) {
      ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
      drawRect(screenX(p.x), screenY(p.y), p.size, p.size, p.color);
    }
    ctx.globalAlpha = 1;
  }

  function drawNightOverlay(vw, vh) {
    const phase = (state.dayTime % DAY_SECONDS) / DAY_SECONDS;
    const duskAmount = phase >= DUSK_START && phase < NIGHT_START ? clamp((phase - DUSK_START) / (NIGHT_START - DUSK_START), 0, 1) : 0;
    if (duskAmount > 0 && !isNight()) {
      const quickDrop = clamp((phase - DUSK_START) / .018, 0, 1);
      const duskOpacity = quickDrop * (.22 + duskAmount * .08);
      ctx.fillStyle = `rgba(92, 54, 24, ${duskOpacity})`;
      ctx.fillRect(0, 0, vw, vh);
    }
    const darkness = phase >= NIGHT_START ? clamp((phase - NIGHT_START) / .055, 0, 1) : 0;
    if (darkness > 0) {
      const unsafe = state.started && !state.finished && !isPlayerProtectedAtNight();
      const px = screenX(player.x), py = screenY(player.y - 8);
      const sightRadius = (now() < state.torchUntil ? 96 : 62) * (isPlayerProtectedAtNight() ? 1.16 : 1);
      const nightMask = ctx.createRadialGradient(px, py, 8, px, py, Math.max(vw, vh) * .82);
      nightMask.addColorStop(0, `rgba(1, 4, 12, ${darkness * (now() < state.torchUntil ? .2 : .36)})`);
      nightMask.addColorStop(Math.min(.42, sightRadius / Math.max(vw, vh)), `rgba(1, 4, 12, ${darkness * (unsafe ? .72 : .62)})`);
      nightMask.addColorStop(1, `rgba(1, 4, 12, ${darkness * (unsafe ? .96 : .9)})`);
      ctx.fillStyle = nightMask;
      ctx.fillRect(0, 0, vw, vh);
      for (const h of state.houses) {
        const hx = screenX(h.x), hy = screenY(h.y);
        const hg = ctx.createRadialGradient(hx, hy, 12, hx, hy, HOUSE_SAFE_RADIUS * .82);
        hg.addColorStop(0, 'rgba(251,191,36,.2)');
        hg.addColorStop(.55, 'rgba(251,191,36,.07)');
        hg.addColorStop(1, 'rgba(251,191,36,0)');
        ctx.fillStyle = hg;
        ctx.beginPath();
        ctx.arc(hx, hy, HOUSE_SAFE_RADIUS * .82, 0, Math.PI * 2);
        ctx.fill();
      }
      if (unsafe) {
        const pulse = .12 + Math.sin(now() / 180) * .05;
        ctx.fillStyle = `rgba(127, 29, 29, ${pulse})`;
        ctx.fillRect(0, 0, vw, vh);
        ctx.fillStyle = `rgba(0, 0, 0, ${darkness * .34})`;
        ctx.fillRect(0, 0, vw, 22 + Math.sin(now() / 230) * 8);
        ctx.fillRect(0, vh - 26 - Math.cos(now() / 210) * 8, vw, 34);
      }
      for (const f of state.fireflies) {
        const x = screenX(f.x), y = screenY(f.y);
        if (x < 0 || y < 0 || x > vw || y > vh) continue;
        ctx.globalAlpha = darkness * (.45 + Math.sin(f.t * 2) * .25);
        drawRect(x, y, 3, 3, '#fde68a');
      }
      ctx.globalAlpha = 1;
    }
    drawDayNightClock(phase);
    if (isNight() && state.started) {
      const safe = isPlayerProtectedAtNight();
      const text = safe ? '🔥 光圈安全' : '☠️ 无光危险';
      const phaseY = window.innerWidth <= 640 ? 128 : 128;
      ctx.fillStyle = safe ? 'rgba(254,243,199,.86)' : 'rgba(127,29,29,.82)';
      ctx.fillRect(48, phaseY - 8, 88, 18);
      ctx.fillStyle = safe ? '#78350f' : '#fee2e2';
      ctx.font = '11px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(text, 92, phaseY + 5);
    }
  }

  function drawDayNightClock(phase) {
    const x = 24;
    const y = window.innerWidth <= 640 ? 128 : 128;
    const r = 15;
    const cx = Math.round(x) + .5;
    const cy = Math.round(y) + .5;
    ctx.save();
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(6,40,29,.9)';
    ctx.fillStyle = 'rgba(255,247,237,.9)';
    ctx.beginPath();
    ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    const duskA0 = DUSK_START * Math.PI * 2 - Math.PI / 2;
    const duskA1 = NIGHT_START * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, -Math.PI / 2, duskA0, false);
    ctx.closePath();
    ctx.fillStyle = '#fde68a';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, duskA0, duskA1, false);
    ctx.closePath();
    ctx.fillStyle = '#8b5a2b';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, duskA1, Math.PI * 1.5, false);
    ctx.closePath();
    ctx.fillStyle = '#0f172a';
    ctx.fill();
    const a = phase * Math.PI * 2 - Math.PI / 2;
    const hx = cx + Math.cos(a) * (r - 3);
    const hy = cy + Math.sin(a) * (r - 3);
    ctx.strokeStyle = isNight() ? '#fde047' : '#ea580c';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(hx, hy);
    ctx.stroke();
    ctx.fillStyle = 'rgba(6,40,29,.9)';
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isNight() ? '#fde047' : '#ea580c';
    ctx.beginPath();
    ctx.arc(hx, hy, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawMiniMap(vw, vh) {
    const w = 66, h = 94, x = vw - w - 10, y = vh - h - 86;
    drawRect(x, y, w, h, 'rgba(255,247,237,.72)');
    drawRect(x + 3, y + 3, w - 6, h - 6, 'rgba(20,83,45,.58)');
    for (const hse of state.houses) {
      const hx = x + 3 + hse.x / WORLD_W * (w - 6);
      const hy = y + 3 + hse.y / WORLD_H * (h - 6);
      drawRect(hx - 3, hy - 3, 6, 6, '#facc15');
      drawRect(hx - 2, hy - 1, 4, 4, '#92400e');
      drawRect(hx - 1, hy - 4, 2, 2, '#fde68a');
    }
    drawRect(x + 3 + player.x / WORLD_W * (w - 6) - 2, y + 3 + player.y / WORLD_H * (h - 6) - 2, 4, 4, '#f97316');
    for (const p of state.team) drawRect(x + 3 + p.x / WORLD_W * (w - 6) - 1, y + 3 + p.y / WORLD_H * (h - 6) - 1, 3, 3, '#38bdf8');
  }

  function loop(t) {
    const dt = Math.min(0.033, Math.max(0, (t - state.lastTime) / 1000 || 0));
    state.lastTime = t;
    update(dt); draw();
    state.rafId = requestAnimationFrame(loop);
  }

  async function setPetImages(data) {
    const pets = data?.pets || [];
    if (!pets.length) return;
    try {
      for (const old of state.petBitmaps) old.bitmap?.close?.();
      state.petBitmaps = [];
      for (const pet of pets.slice(0, PET_MAX_TEAM)) {
        if (!pet?.imageBlob || !pet?.uv) continue;
        const bitmap = await createImageBitmap(pet.imageBlob);
        state.petBitmaps.push({ bitmap, uv: pet.uv, name: pet.name });
      }
    } catch (err) {}
  }

  function requestPetImages() {
    const requestId = `haqi_hungry_pets_${Date.now()}`;
    try { window.parent?.postMessage({ type: 'haqi_get_pet_images', requestId, anim: 'idle' }, '*'); } catch (err) {}
  }

  function onKey(e, down) {
    const k = e.key.toLowerCase();
    if (['arrowleft', 'a'].includes(k)) input.left = down;
    if (['arrowright', 'd'].includes(k)) input.right = down;
    if (['arrowup', 'w'].includes(k)) input.up = down;
    if (['arrowdown', 's'].includes(k)) input.down = down;
    if (k === 'shift') input.sprint = down;
    if (k === 'j' || k === ' ' || k === 'spacebar') { input.attack = down; if (down) e.preventDefault(); }
    if (k === 'e' || k === 'enter') { input.gather = down; if (down) e.preventDefault(); }
    if (k === 'escape' && down) toggleOverlay();
  }

  function setJoystickVisible(visible, x = input.joyStartX, y = input.joyStartY) {
    joystick.classList.toggle('show', visible);
    joystick.style.setProperty('--x', `${x}px`);
    joystick.style.setProperty('--y', `${y}px`);
  }

  function updateJoystick(clientX, clientY) {
    input.joyX = clamp(clientX - input.joyStartX, -46, 46);
    input.joyY = clamp(clientY - input.joyStartY, -46, 46);
    knob.style.setProperty('--kx', `${input.joyX}px`);
    knob.style.setProperty('--ky', `${input.joyY}px`);
  }

  function onPointerDown(e) {
    if (!state.started || overlay.hidden === false) return;
    if (e.pointerType !== 'touch') return;
    if (input.joyId === null) {
      input.joyId = e.pointerId; input.joyActive = true; input.joyStartX = e.clientX; input.joyStartY = e.clientY;
      shell.setPointerCapture?.(e.pointerId); setJoystickVisible(true, e.clientX, e.clientY); updateJoystick(e.clientX, e.clientY); e.preventDefault();
    }
  }

  function onPointerMove(e) { if (e.pointerId === input.joyId) { updateJoystick(e.clientX, e.clientY); e.preventDefault(); } }
  function onPointerUp(e) {
    if (e.pointerId === input.joyId) {
      input.joyId = null; input.joyActive = false; input.joyX = 0; input.joyY = 0;
      knob.style.setProperty('--kx', '0px'); knob.style.setProperty('--ky', '0px'); setJoystickVisible(false); e.preventDefault();
    }
  }

  function toggleOverlay() {
    overlay.hidden = !overlay.hidden;
    ui.start.hidden = state.started;
    ui.continue.hidden = !state.started || state.finished || overlay.hidden;
    ui.restart.hidden = !state.finished;
    updateHouseButton();
  }

  root.querySelector('#hhHelp').addEventListener('click', toggleOverlay);
  ui.buildHouse.addEventListener('click', () => { initAudio(); playSound('click'); buildHouse(); });
  ui.start.addEventListener('click', () => { initAudio(); playSound('click'); startGame(); });
  ui.continue.addEventListener('click', () => { initAudio(); playSound('click'); overlay.hidden = true; ui.continue.hidden = true; });
  ui.restart.addEventListener('click', () => { initAudio(); playSound('click'); overlay.hidden = true; resetGame(); });
  root.querySelector('#hhRosterDone').addEventListener('click', () => { initAudio(); playSound('click'); closeRosterOverlay(); });
  root.querySelectorAll('[data-master]').forEach(btn => btn.addEventListener('click', () => { initAudio(); playSound('click'); state.masterStyle = btn.dataset.master; localStorage.setItem(STORAGE_MASTER, state.masterStyle); updateMasterButtons(); }));
  root.querySelectorAll('[data-difficulty]').forEach(btn => btn.addEventListener('click', () => { initAudio(); playSound('click'); state.difficulty = DIFFICULTIES[btn.dataset.difficulty] ? btn.dataset.difficulty : 'normal'; localStorage.setItem(STORAGE_DIFFICULTY, state.difficulty); updateMasterButtons(); }));
  root.querySelector('#hhAttack').addEventListener('pointerdown', e => { input.attack = true; autoAttack(); e.preventDefault(); });
  root.querySelector('#hhAttack').addEventListener('pointerup', e => { input.attack = false; e.preventDefault(); });
  root.querySelector('#hhAttack').addEventListener('pointercancel', () => { input.attack = false; });
  root.querySelector('#hhGather').addEventListener('pointerdown', e => { input.actionPointers.add(e.pointerId); input.gather = true; e.preventDefault(); });
  root.querySelector('#hhGather').addEventListener('pointerup', e => { input.actionPointers.delete(e.pointerId); input.gather = input.actionPointers.size > 0; e.preventDefault(); });
  root.querySelector('#hhGather').addEventListener('pointercancel', e => { input.actionPointers.delete(e.pointerId); input.gather = input.actionPointers.size > 0; });
  window.addEventListener('keydown', e => onKey(e, true));
  window.addEventListener('keyup', e => onKey(e, false));
  shell.addEventListener('pointerdown', onPointerDown, { passive: false });
  shell.addEventListener('pointermove', onPointerMove, { passive: false });
  shell.addEventListener('pointerup', onPointerUp, { passive: false });
  shell.addEventListener('pointercancel', onPointerUp, { passive: false });
  canvas.addEventListener('click', e => { if (!state.started || state.finished || overlay.hidden === false) return; });
  window.addEventListener('resize', resize);
  window.addEventListener('message', event => {
    const msg = event.data || {};
    if (msg.type === 'haqi_pet_images' && msg.ok) setPetImages(msg.data);
    if (msg.type === 'haqi_pet_image' && msg.ok) setPetImages({ pets: [msg.data] });
    if (msg.type === 'setGameConfig' && msg.data?.masterStyle) { state.masterStyle = msg.data.masterStyle === 'girl' ? 'girl' : 'boy'; localStorage.setItem(STORAGE_MASTER, state.masterStyle); updateMasterButtons(); }
  });

  updateMasterButtons(); resize(); generateWorld(); updateHud(); draw(); loadPetCatalog();
  if (!state.loadedPosted) { state.loadedPosted = true; post('gameLoaded', { title: '宠物荒野生存' }); }
  state.lastTime = performance.now(); state.rafId = requestAnimationFrame(loop);
})();
</script>
