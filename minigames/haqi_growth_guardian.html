<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f8fafc">
  <title>哈奇成长守护</title>
  <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
  <style>
    :root {
      --ink: #163438;
      --muted: #698085;
      --line: #d8e7e5;
      --aqua: #17b89e;
      --aqua-deep: #08766c;
      --coral: #f4686f;
      --sun: #f2ad27;
      --sky: #49a9cf;
      --paper: #ffffff;
      --panel-line: #cfded9;
      --panel-radius: 8px;
      --shadow-soft: 0 18px 45px rgba(30, 76, 74, .10), 0 2px 8px rgba(30, 76, 74, .05);
      --shadow-lift: 0 22px 55px rgba(22, 52, 56, .16), 0 5px 14px rgba(22, 52, 56, .08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; color: var(--ink); font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    body {
      background-color: #f4f8f5;
      background-image: linear-gradient(rgba(16, 99, 90, .035) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 99, 90, .035) 1px, transparent 1px), linear-gradient(145deg, #f8fbf8 0%, #edf7f4 52%, #fff8e9 100%);
      background-size: 28px 28px, 28px 28px, 100% 100%;
    }
    button, input, select { font: inherit; }
    button { touch-action: manipulation; }
    .app-shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 20px; border-bottom: 1px solid rgba(8,118,108,.14); background: rgba(250,253,251,.88); box-shadow: 0 8px 30px rgba(22,52,56,.06); backdrop-filter: blur(18px) saturate(1.25); }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 8px; color: white; font-size: 22px; background: linear-gradient(145deg, #19bba2, #08766c); box-shadow: 0 7px 16px rgba(8,118,108,.26), inset 0 1px rgba(255,255,255,.32); }
    .brand-title { font-weight: 900; font-size: 18px; letter-spacing: 0; white-space: nowrap; }
    .brand-sub { font-size: 11px; color: var(--muted); }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .currency-display { min-height: 42px; display: flex; align-items: center; gap: 7px; padding: 0 13px; border: 1px solid #e8c653; border-radius: 8px; color: #65410a; background: linear-gradient(145deg, #fff8ce, #ffe47b); box-shadow: 0 7px 16px rgba(166,112,18,.14), inset 0 1px rgba(255,255,255,.72); }
    .currency-icon { font-size: 21px; filter: drop-shadow(0 2px 2px rgba(140,91,8,.18)); }
    .currency-value { min-width: 18px; font-size: 19px; font-weight: 900; text-align: center; font-variant-numeric: tabular-nums; }
    .mode-switch { display: flex; align-items: center; gap: 4px; padding: 4px; border: 1px solid var(--line); border-radius: 8px; background: rgba(235,244,241,.82); }
    .mode-btn { min-height: 34px; padding: 0 14px; border: 0; border-radius: 6px; background: transparent; color: #526b6c; font-weight: 800; cursor: pointer; transition: color .2s ease, background .2s ease, box-shadow .2s ease; }
    .mode-btn.active { color: var(--aqua-deep); background: white; box-shadow: 0 3px 10px rgba(26,73,70,.12); }
    .main { width: min(1440px, 100%); margin: 0 auto; padding: 18px; }
    .panel { background: rgba(255,255,255,.94); border: 1px solid var(--panel-line); border-radius: var(--panel-radius); box-shadow: var(--shadow-soft); }
    .btn { min-height: 40px; border: 0; border-radius: 8px; padding: 0 16px; font-weight: 900; cursor: pointer; transition: transform .18s ease, box-shadow .18s ease, filter .18s ease; }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }
    .btn-primary { color: white; background: linear-gradient(145deg, #119b8a, #08766c); box-shadow: 0 7px 16px rgba(8,118,108,.22); }
    .btn-sun { color: #493000; background: linear-gradient(145deg, #ffd45f, #f2ad27); box-shadow: 0 8px 18px rgba(212,139,15,.24); }
    .btn-primary:hover, .btn-sun:hover { filter: saturate(1.08) brightness(1.02); box-shadow: var(--shadow-lift); }
    .btn-soft { color: var(--ink); background: #edf5f7; border: 1px solid var(--line); }
    .btn-danger { color: #be123c; background: #fff1f2; border: 1px solid #fecdd3; }
    .icon-btn { width: 38px; height: 38px; display: grid; place-items: center; padding: 0; border: 1px solid var(--line); border-radius: 8px; background: white; cursor: pointer; }
    .child-layout { display: grid; grid-template-columns: minmax(260px, 380px) minmax(0, 1fr); gap: clamp(12px, 1.5vw, 18px); align-items: stretch; }
    .pet-stage { position: relative; min-height: 610px; overflow: hidden; display: flex; flex-direction: column; align-items: center; padding: 26px 24px 20px; border-color: var(--panel-line); background: linear-gradient(180deg, #d5f3ed 0%, #eaf8f6 49%, #cfe9bf 49.2%, #b9d990 100%); box-shadow: var(--shadow-soft); }
    .pet-stage::before { content: ""; position: absolute; inset: 0; opacity: .62; background-image: radial-gradient(ellipse at 17% 17%, rgba(255,255,255,.9) 0 22px, transparent 23px), radial-gradient(ellipse at 78% 12%, rgba(255,255,255,.82) 0 31px, transparent 32px), linear-gradient(164deg, transparent 58%, rgba(79,137,67,.14) 58.5% 66%, transparent 66.5%); }
    .pet-stage::after { content: ""; position: absolute; left: 12%; right: 12%; bottom: 96px; height: 38px; border-radius: 50%; background: rgba(52,93,57,.16); filter: blur(10px); transform: perspective(120px) rotateX(58deg); }
    .pet-head { position: relative; z-index: 2; width: 100%; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .eyebrow { color: var(--aqua-deep); font-size: 12px; font-weight: 900; }
    .pet-name { margin-top: 2px; font-size: 27px; font-weight: 900; }
    .stage-actions { display: grid; justify-items: end; gap: 7px; }
    .stage-badge { padding: 7px 10px; border-radius: 999px; color: #65410a; background: rgba(255,244,194,.9); border: 1px solid #ebc454; box-shadow: 0 5px 12px rgba(138,91,13,.11); font-weight: 900; font-size: 12px; backdrop-filter: blur(8px); }
    .today-change-badge { display: none; min-height: 30px; align-items: center; gap: 5px; padding: 0 9px; border: 1px solid rgba(8,118,108,.22); border-radius: 7px; color: var(--aqua-deep); background: rgba(255,255,255,.88); font-size: 10px; font-weight: 800; box-shadow: 0 5px 12px rgba(26,73,70,.1); }
    .today-change-badge strong { font-size: 13px; }
    .today-change-badge.positive strong { color: #087a52; }
    .today-change-badge.negative strong { color: #be3348; }
    .pet-art-wrap { position: relative; z-index: 2; flex: 1; width: min(310px, 90%); min-height: 300px; display: grid; place-items: center; }
    .pet-art { width: 260px; height: 260px; background-repeat: no-repeat; background-position: center; background-size: contain; filter: drop-shadow(0 24px 18px rgba(32,79,77,.24)); animation: petFloat 3.6s ease-in-out infinite; }
    .pet-art.placeholder { display: grid; place-items: center; border-radius: 50%; background: #fff7ed; border: 8px solid #fed7aa; font-size: 112px; }
    .pet-art.placeholder::after { content: "🥚"; }
    .stage-spark { position: absolute; inset: 8% 0 auto; text-align: center; font-size: 24px; color: #f59e0b; animation: twinkle 1.8s ease-in-out infinite; }
    .energy-card { position: relative; z-index: 2; width: 100%; padding: 15px; background: rgba(255,255,255,.84); border: 1px solid rgba(255,255,255,.94); border-radius: 8px; box-shadow: 0 15px 34px rgba(42,92,72,.13); backdrop-filter: blur(14px); }
    .mobile-pet-actions { position: relative; z-index: 2; width: 100%; display: none; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; margin-bottom: 10px; }
    .mobile-pet-action { min-width: 0; min-height: 50px; display: grid; place-items: center; align-content: center; gap: 2px; padding: 5px 2px; border: 1px solid rgba(8,118,108,.18); border-radius: 8px; color: #244f52; background: rgba(255,255,255,.88); box-shadow: 0 6px 14px rgba(26,73,70,.1); font-size: 10px; font-weight: 900; text-decoration: none; backdrop-filter: blur(10px); }
    .mobile-pet-action span { font-size: 19px; line-height: 1; }
    .mobile-panel-close { display: none; }
    .energy-row { display: flex; align-items: center; justify-content: space-between; font-weight: 900; }
    .energy-track { position: relative; height: 14px; margin-top: 10px; border-radius: 999px; overflow: hidden; background: #dbe7ea; box-shadow: inset 0 1px 2px rgba(34,72,78,.12); }
    .energy-fill { position: absolute; inset: 0 auto 0 0; border-radius: inherit; background: #8faeb1; transition: width .5s ease; }
    .energy-delta { position: absolute; inset-block: 0; transition: left .5s ease, width .5s ease; }
    .energy-delta.positive { background: linear-gradient(90deg, #16a66f, #55cf91); box-shadow: 0 0 10px rgba(22,166,111,.28); }
    .energy-delta.negative { background: linear-gradient(90deg, #ef6b72, #cf3f52); box-shadow: 0 0 10px rgba(207,63,82,.22); }
    .energy-baseline { position: absolute; z-index: 2; top: -3px; bottom: -3px; width: 2px; margin-left: -1px; border-radius: 2px; background: #244f52; box-shadow: 0 0 0 1px rgba(255,255,255,.78); }
    .energy-tick { position: absolute; z-index: 3; inset-block: 0; width: 1px; background: rgba(255,255,255,.92); box-shadow: 1px 0 rgba(36,79,82,.42); pointer-events: none; }
    .energy-scale { position: relative; height: 17px; margin-top: 3px; color: var(--muted); font-size: 9px; font-weight: 800; }
    .energy-scale span { position: absolute; transform: translateX(-50%); }
    .energy-scale span:first-child { transform: none; }
    .energy-scale span:last-child { transform: translateX(-100%); }
    .energy-daily { display: flex; justify-content: space-between; gap: 10px; margin-top: 7px; color: var(--muted); font-size: 11px; font-weight: 800; }
    .energy-change.positive { color: #087a52; }
    .energy-change.negative { color: #be3348; }
    .next-copy { margin-top: 8px; color: var(--muted); font-size: 12px; }
    .child-main { min-width: 0; display: grid; grid-template-columns: minmax(0, 1fr); grid-template-rows: auto auto 1fr; gap: 14px; }
    .child-main > * { min-width: 0; max-width: 100%; }
    .hero-copy { position: relative; overflow: hidden; padding: 26px; display: flex; align-items: center; justify-content: space-between; gap: 18px; border-color: rgba(255,255,255,.1); background: linear-gradient(120deg, #163e43 0%, #0d6260 68%, #167b70 100%); color: white; box-shadow: 0 22px 48px rgba(16,73,72,.2); }
    .hero-copy::after { content: "成长日记"; position: absolute; right: 17%; bottom: -11px; color: rgba(255,255,255,.055); font-size: 64px; line-height: 1; font-weight: 900; pointer-events: none; }
    .hero-copy > * { position: relative; z-index: 1; }
    .hero-copy h1 { margin: 2px 0 8px; font-size: clamp(23px, 3vw, 38px); line-height: 1.15; font-weight: 900; letter-spacing: 0; }
    .hero-copy p { margin: 0; color: #c9dce9; font-size: 14px; }
    .today-score { flex: 0 0 auto; min-width: 118px; text-align: center; padding: 13px; border: 1px solid rgba(255,255,255,.26); border-radius: 8px; background: rgba(255,255,255,.1); box-shadow: inset 0 1px rgba(255,255,255,.1); backdrop-filter: blur(10px); }
    .today-score strong { display: block; font-size: 32px; color: #fbbf24; }
    .focus-panel { position: relative; padding: 20px; border-left: 4px solid var(--sun); }
    .section-title { margin: 0; font-size: 18px; font-weight: 900; }
    .section-desc { margin: 5px 0 0; overflow-wrap: anywhere; color: var(--muted); font-size: 13px; }
    .focus-options { display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-top: 16px; }
    .focus-controls { display: flex; gap: 8px; min-width: 0; }
    .select { min-height: 42px; width: 100%; padding: 0 12px; border: 1px solid var(--line); border-radius: 8px; color: var(--ink); background: white; font-weight: 700; outline: none; }
    .duration-tabs { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; }
    .duration-btn { min-width: 68px; height: 38px; border-radius: 8px; border: 1px solid var(--line); background: white; font-weight: 900; color: #526579; cursor: pointer; }
    .duration-btn.active { color: var(--aqua-deep); border-color: var(--aqua); background: #e8fbf6; }
    .custom-duration { display: flex; align-items: center; gap: 6px; }
    .custom-duration .input { width: 78px; height: 38px; padding: 0 9px; }
    .custom-duration .duration-btn { min-width: 58px; }
    .shop-vault { display: flex; min-height: 0; flex-direction: column; overflow: hidden; border-color: var(--panel-line); background: #f7fbf9; }
    .reward-vault-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 17px 18px 14px; }
    .shop-sections { display: grid; min-height: 0; grid-template-columns: minmax(0, 1fr); overflow-x: hidden; overflow-y: auto; overscroll-behavior: contain; scrollbar-gutter: stable; border-top: 1px solid var(--panel-line); -webkit-overflow-scrolling: touch; }
    .shop-sections::-webkit-scrollbar { width: 7px; }
    .shop-sections::-webkit-scrollbar-track { background: transparent; }
    .shop-sections::-webkit-scrollbar-thumb { border: 2px solid transparent; border-radius: 999px; background: rgba(79, 167, 149, .38); background-clip: padding-box; }
    .shop-section { min-width: 0; padding-top: 14px; background: #fffdf5; }
    .shop-section + .shop-section { position: relative; border-top: 0; background: #f2fbf8; }
    .shop-section + .shop-section::before { content: ""; position: absolute; top: 0; left: 18px; right: 18px; height: 1px; background: linear-gradient(90deg, transparent, rgba(79,167,149,.52) 18%, rgba(79,167,149,.52) 82%, transparent); }
    .shop-section-head { padding: 0 18px 11px; }
    .shop-section-head h3 { display: flex; align-items: center; gap: 7px; margin: 0; font-size: 14px; font-weight: 900; }
    .shop-section-head h3::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(105,128,133,.18), transparent); }
    .shop-section-head p { margin: 4px 0 0; color: var(--muted); font-size: 11px; }
    .coin-balance { flex: 0 0 auto; display: flex; align-items: center; gap: 9px; padding: 8px 12px; border: 1px solid #edcf68; border-radius: 8px; color: #65410a; background: linear-gradient(145deg, #fff7c8, #ffe88a); box-shadow: 0 7px 16px rgba(166,112,18,.12); }
    .coin-balance span { font-size: 22px; }
    .coin-balance strong { font-size: 22px; }
    .coin-progress { height: 7px; margin-top: 7px; overflow: hidden; border-radius: 999px; background: #eee5c8; }
    .coin-progress > div { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #f2ad27, #f7d154); }
    .reward-list { width: 100%; max-width: 100%; display: grid; grid-auto-flow: column; grid-auto-columns: minmax(175px, 1fr); gap: 9px; padding: 0 18px 18px; overflow-x: auto; }
    .reward-card { min-height: 116px; display: grid; grid-template-rows: auto 1fr auto; gap: 7px; padding: 12px; border: 1px solid #eadba8; border-radius: 8px; background: rgba(255,255,255,.82); }
    .reward-icon { font-size: 24px; }
    .reward-name { font-size: 13px; line-height: 1.35; font-weight: 900; }
    .reward-redeem { min-height: 34px; border: 0; border-radius: 7px; color: #5d3b05; background: #ffe795; font-weight: 900; cursor: pointer; }
    .reward-redeem:disabled { color: #84908d; background: #edf1ef; cursor: not-allowed; }
    .cosmetic-list { width: 100%; max-width: 100%; display: grid; grid-auto-flow: column; grid-auto-columns: minmax(170px, 1fr); gap: 9px; padding: 0 18px 18px; overflow-x: auto; }
    .cosmetic-card { min-height: 142px; display: grid; grid-template-rows: 48px auto 1fr auto; gap: 6px; padding: 11px; border: 1px solid #cce5e0; border-radius: 8px; background: rgba(255,255,255,.9); }
    .cosmetic-preview { overflow: hidden; display: grid; place-items: center; border-radius: 6px; color: white; font-size: 23px; text-shadow: 0 2px 6px rgba(0,0,0,.24); }
    .cosmetic-type { color: var(--aqua-deep); font-size: 10px; font-weight: 900; }
    .cosmetic-name { font-size: 13px; font-weight: 900; }
    .cosmetic-action { min-height: 32px; border: 0; border-radius: 7px; color: white; background: var(--aqua-deep); font-weight: 900; cursor: pointer; }
    .cosmetic-action.equipped { color: #526579; background: #e6eeec; cursor: default; }
    .preview-focus_default { background: linear-gradient(135deg, #102c3c, #176e70); }
    .preview-focus_starry { background: radial-gradient(circle at 25% 28%, #fff 0 1px, transparent 2px), radial-gradient(circle at 75% 63%, #fde68a 0 1px, transparent 2px), linear-gradient(135deg, #141b4b, #3b2468); }
    .preview-focus_forest { background: linear-gradient(155deg, #103d35 0 55%, #4d7545 56%); }
    .preview-pet_default { background: linear-gradient(#d5f3ed 0 50%, #b9d990 51%); }
    .preview-pet_sunset { background: linear-gradient(#ffb37d 0 48%, #f7df8d 49%); }
    .preview-pet_space { background: linear-gradient(145deg, #12213f, #315b77); }
    .preview-frame_none { color: #526579; background: #edf3f2; }
    .preview-frame_stars { color: #b87900; background: #fff8d8; border: 3px solid #f6c94c; }
    .preview-frame_mint { color: #08766c; background: #e7fbf5; border: 3px double #19bba2; }
    .redemption-list { display: grid; gap: 8px; padding: 0 18px 18px; }
    .redemption-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; padding: 11px; border: 1px solid var(--line); border-radius: 8px; background: #f9fcfb; }
    .redemption-actions { display: flex; gap: 6px; }
    .bottom-grid { display: grid; grid-template-columns: 1fr; gap: 14px; min-height: 220px; }
    .list-panel { padding: 18px; min-width: 0; border-color: var(--panel-line); }
    .timeline { display: grid; gap: 9px; margin-top: 14px; }
    .timeline-item { display: grid; grid-template-columns: 36px 1fr auto; gap: 10px; align-items: center; padding: 10px; border: 1px solid #e2ece9; border-radius: 8px; background: linear-gradient(120deg, #fbfefd, #f5faf8); transition: transform .18s ease, border-color .18s ease; }
    .timeline-item:hover { transform: translateX(3px); border-color: #aadacf; }
    .timeline-icon { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 8px; background: #e8fbf6; }
    .timeline-title { font-size: 13px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .timeline-time { color: var(--muted); font-size: 11px; }
    .delta { font-size: 16px; font-weight: 900; }
    .delta.positive { color: #059669; }
    .delta.negative { color: #e11d48; }
    .empty { padding: 24px 10px; color: var(--muted); text-align: center; font-size: 13px; }
    .milestone-list { display: grid; gap: 10px; margin-top: 14px; }
    .milestone { display: grid; grid-template-columns: 64px 1fr; gap: 12px; align-items: center; padding: 11px; border-radius: 8px; background: linear-gradient(120deg, #fffaf0, #fff5ce); border: 1px solid #efd77c; box-shadow: 0 5px 14px rgba(152,112,24,.06); }
    .milestone.locked { background: #f6f8fa; border-color: var(--line); }
    .milestone-art { width: 64px; height: 64px; border-radius: 8px; background-color: rgba(255,255,255,.78); background-repeat: no-repeat; box-shadow: inset 0 0 0 1px rgba(22,52,56,.08); }
    .milestone-art.locked { display: grid; place-items: center; color: #7b898b; background: #e7ecec; font-size: 30px; font-weight: 900; }
    .milestone strong { display: block; font-size: 13px; }
    .milestone span { color: var(--muted); font-size: 11px; }
    .parent-layout { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 16px; }
    .profile-panel { position: sticky; top: 82px; align-self: start; overflow: hidden; }
    .profile-pet { min-height: 210px; display: grid; place-items: center; padding: 15px; background: linear-gradient(180deg, #e7f8f5, #fff7e8); }
    .profile-pet .pet-art { width: 175px; height: 175px; }
    .profile-info { padding: 16px; }
    .profile-info h2 { margin: 0; font-size: 21px; font-weight: 900; }
    .mini-stat { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .mini-stat > div { padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #f8fbfc; }
    .mini-stat span { display: block; color: var(--muted); font-size: 10px; }
    .mini-stat strong { font-size: 17px; }
    .parent-main { min-width: 0; }
    .parent-tabs { display: flex; gap: 6px; padding: 8px; margin-bottom: 12px; overflow-x: auto; }
    .parent-tab { height: 38px; border: 0; border-radius: 7px; padding: 0 15px; color: #5b6d7d; background: transparent; font-weight: 900; cursor: pointer; white-space: nowrap; }
    .parent-tab.active { color: var(--aqua-deep); background: #e8fbf6; }
    .parent-more { flex: 0 0 112px; width: 112px; min-height: 38px; padding-inline: 9px; font-size: 12px; }
    .metrics-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px; margin-bottom: 12px; }
    .search { min-height: 40px; width: min(320px, 100%); padding: 0 12px; border: 1px solid var(--line); border-radius: 8px; outline: none; }
    .metric-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .metric-section { padding: 14px; }
    .metric-section.positive { border-top: 3px solid #10b981; }
    .metric-section.negative { border-top: 3px solid #fb7185; }
    .metric-heading { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .metric-heading h3 { margin: 0; font-size: 15px; font-weight: 900; }
    .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 9px; }

  async function loadAwardNotifications(link) {
    if (!link?.sitePath || !link?.studentId || !guardianSdk?.loadPage) return [];
    try {
      const result = await guardianSdk.loadPage({ sitePath: link.sitePath, pagePath: `${GROWTH_LINK_ROOT}/notifications/index.json` });
      const text = typeof result === 'string' ? result : String(result?.content ?? result?.data?.content ?? '');
      const parsed = JSON.parse(text || '[]');
      const notifications = Array.isArray(parsed) ? parsed : [];
      return notifications
        .filter(item => ['award_submitted', 'award_processed'].includes(item?.type) && item?.studentId === link.studentId)
        .sort((a, b) => Number(b.notifiedAt || b.processedAt || 0) - Number(a.notifiedAt || a.processedAt || 0));
    } catch (_) {
      return [];
    }
  }

  function notifyNewAwardNotification(notifications) {
    if (!notifications.length) return;
    const latest = notifications[0];
    const latestEventId = String(latest?.eventId || latest?.id || '');
    const latestAt = Number(latest?.notifiedAt || latest?.processedAt || 0);
    const seenEventId = String(state.schoolLink?.lastSeenNotificationEventId || '');
    const seenAt = Number(state.schoolLink?.lastSeenNotificationAt || 0);
    if (!latestEventId) return;
    if (latest.id && latest.id === lastAwardNotificationId) return;
    if (latestEventId === seenEventId && (!latestAt || latestAt <= seenAt)) return;
    if (latestAt && seenAt && latestAt <= seenAt) return;
    lastAwardNotificationId = latest.id || latestEventId;
    state.schoolLink.lastSeenNotificationEventId = latestEventId;
    state.schoolLink.lastSeenNotificationAt = latestAt || Date.now();
    saveState();
    const reason = latest.reason || '老师发布了新的课堂奖励';
    const teacher = latest.teacherUsername ? `，来自 ${latest.teacherUsername}` : '';
    toast(`学校消息：${reason}${teacher}`);
  }

  function freshState() {
    const childId = `child_${Date.now()}`;
    return {
      version: 2,
      activeChildId: childId,
      children: [{ id: childId, name: '小小守护者', petName: '哈奇', energy: game_config.initialEnergy, lifetimeStars: 0, createdAt: Date.now(), dailyEnergy: { date: localDateKey(), baseline: game_config.initialEnergy } }],
      petProgress: {},
      metrics: DEFAULT_METRICS.map(item => ({ ...item })),
      ledger: [],
      focusSessions: [],
      rewards: DEFAULT_REWARDS.map(item => ({ ...item })),
      redemptions: [],
      schoolLink: { teacherUsername: '', sitePath: '', classId: '', studentId: '', studentName: '', appliedEventIds: [], ignoredEventIds: [], pendingReceipts: [], lastSeenNotificationEventId: '', lastSeenNotificationAt: 0 },
      generatedPets: [],
      cosmeticPurchases: [],
      equippedCosmetics: { focusBackground: 'focus_default', petBackground: 'pet_default', petFrame: 'frame_none' }
    };
  }

  function normalizeState(parsed) {
    if (!parsed?.children?.length || !Array.isArray(parsed.metrics) || !Array.isArray(parsed.ledger)) return null;
    if (!Array.isArray(parsed.rewards)) parsed.rewards = DEFAULT_REWARDS.map(item => ({ ...item }));
    if (!Array.isArray(parsed.redemptions)) parsed.redemptions = [];
    if (!parsed.schoolLink || typeof parsed.schoolLink !== 'object') parsed.schoolLink = {};
    parsed.schoolLink.teacherUsername = String(parsed.schoolLink.teacherUsername || '');
    parsed.schoolLink.sitePath = String(parsed.schoolLink.sitePath || '').trim().replace(/^\/+|\/+$/g, '');
    parsed.schoolLink.classId = String(parsed.schoolLink.classId || '');
    parsed.schoolLink.studentId = String(parsed.schoolLink.studentId || '');
    parsed.schoolLink.studentName = String(parsed.schoolLink.studentName || '');
    if (!Array.isArray(parsed.schoolLink.appliedEventIds)) parsed.schoolLink.appliedEventIds = [];
    if (!Array.isArray(parsed.schoolLink.ignoredEventIds)) parsed.schoolLink.ignoredEventIds = [];
    if (!Array.isArray(parsed.schoolLink.pendingReceipts)) parsed.schoolLink.pendingReceipts = [];
    parsed.schoolLink.lastSeenNotificationEventId = String(parsed.schoolLink.lastSeenNotificationEventId || '');
    parsed.schoolLink.lastSeenNotificationAt = Number(parsed.schoolLink.lastSeenNotificationAt || 0);
    if (!Array.isArray(parsed.generatedPets)) parsed.generatedPets = [];
    if (!Array.isArray(parsed.cosmeticPurchases)) parsed.cosmeticPurchases = [];
    if (!parsed.equippedCosmetics) parsed.equippedCosmetics = { focusBackground: 'focus_default', petBackground: 'pet_default', petFrame: 'frame_none' };
    if (!parsed.petProgress || typeof parsed.petProgress !== 'object') parsed.petProgress = {};
    parsed.children.forEach(child => {
      if (!child.selectedPetId && parsed.selectedPetId) child.selectedPetId = parsed.selectedPetId;
      const petKey = petKeyForChild(child);
      if (petKey && !parsed.petProgress[petKey]) {
        parsed.petProgress[petKey] = createPetProgress(child, petKey, clampEnergy(child.energy));
        parsed.petProgress[petKey].lifetimeStars = Number(child.lifetimeStars) || 0;
        parsed.petProgress[petKey].dailyEnergy = child.dailyEnergy || parsed.petProgress[petKey].dailyEnergy;
      }
      if (petKey) {
        const progress = parsed.petProgress[petKey];
        child.energy = clampEnergy(progress.energy);
        child.dailyEnergy = progress.dailyEnergy || { date: localDateKey(), baseline: child.energy };
        parsed.ledger.forEach(entry => {
          if (entry.childId === child.id && !entry.petKey) entry.petKey = petKey;
        });
      }
    });
    parsed.version = 2;
    return parsed;
  }

  function loadLegacyState() {
    try {
      const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      return normalizeState(parsed);
    } catch (_) {}
    return null;
  }

  function saveState() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => queueCloudWrite(CLOUD_STATE_PATH, JSON.stringify(state)), 500);
  }

  function persistStateNow() {
    clearTimeout(saveTimer);
    saveTimer = 0;
    return queueCloudWrite(CLOUD_STATE_PATH, JSON.stringify(state));
  }

  function queueCloudWrite(path, content) {
    saveQueue = saveQueue
      .catch(() => undefined)
      .then(() => guardianStore.createFile(path, content));
    saveQueue.catch(error => toast(`Keepwork 保存失败：${error?.message || error}`));
    return saveQueue;
  }

  async function readCloudFile(path) {
    try {
      return (await guardianStore.readFile(path, 1, 99999)) || '';
    } catch (_) {
      try { return (await guardianStore.readFile(path)) || ''; } catch (__) { return ''; }
    }
  }

  async function loadCloudData(sdk) {
    if (!sdk.personalPageStore) throw new Error('Keepwork PersonalPageStore 不可用');
    guardianSdk = sdk;
    guardianStore = typeof sdk.personalPageStore.withWorkspace === 'function'
      ? sdk.personalPageStore.withWorkspace('MagicHaqi')
      : sdk.personalPageStore;
    const [cloudStateText, cloudPin] = await Promise.all([
      readCloudFile(CLOUD_STATE_PATH),
      readCloudFile(CLOUD_PIN_PATH)
    ]);
    let cloudState = null;
    try { cloudState = normalizeState(JSON.parse(cloudStateText || 'null')); } catch (_) {}
    const legacyState = cloudState ? null : loadLegacyState();
    state = cloudState || legacyState || freshState();
    parentPinHash = cloudPin.trim() || localStorage.getItem(PIN_KEY) || '';
    if (legacyState || (!cloudPin.trim() && parentPinHash)) {
      await Promise.all([
        legacyState ? queueCloudWrite(CLOUD_STATE_PATH, JSON.stringify(state)) : Promise.resolve(),
        !cloudPin.trim() && parentPinHash ? queueCloudWrite(CLOUD_PIN_PATH, parentPinHash) : Promise.resolve()
      ]);
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(PIN_KEY);
    }
  }

  function activeChild() {
    return state.children.find(child => child.id === state.activeChildId) || state.children[0];
  }

  function petKeyForChild(child = activeChild()) {
    if (child.famousPetId) return `famous:${child.famousPetId}`;
    if (child.generatedPetId) return `generated:${child.generatedPetId}`;
    if (child.selectedPetId) return `pet:${child.selectedPetId}`;
    return `default:${child.id}`;
  }

  function createPetProgress(child, petKey, energy = 0) {
    const currentEnergy = clampEnergy(energy);
    return {
      petKey,
      petName: child.petName || '哈奇',
      energy: currentEnergy,
      lifetimeStars: 0,
      dailyEnergy: { date: localDateKey(), baseline: currentEnergy },
      selectedAt: Date.now(),
      lastUsedAt: Date.now()
    };
  }

  function activePetProgress(create = true) {
    const child = activeChild();
    const petKey = petKeyForChild(child);
    if (!petKey) return null;
    if (!state.petProgress[petKey] && create) state.petProgress[petKey] = createPetProgress(child, petKey);
    return state.petProgress[petKey] || null;
  }

  function syncChildFromPetProgress() {
    const child = activeChild();
    const progress = activePetProgress();
    if (!progress) {
      child.energy = game_config.initialEnergy;
      child.lifetimeStars = 0;
      child.dailyEnergy = { date: localDateKey(), baseline: child.energy };
      return;
    }
    progress.petName = child.petName || progress.petName;
    progress.lastUsedAt = Date.now();
    child.energy = clampEnergy(progress.energy);
    child.lifetimeStars = Number(progress.lifetimeStars) || 0;
    child.dailyEnergy = progress.dailyEnergy || { date: localDateKey(), baseline: child.energy };
  }

  function updateActivePetEnergy(energy, lifetimeStars) {
    const child = activeChild();
    child.energy = clampEnergy(energy);
    if (Number.isFinite(lifetimeStars)) child.lifetimeStars = lifetimeStars;
    const progress = activePetProgress();
    if (!progress) return;
    progress.energy = child.energy;
    progress.lifetimeStars = child.lifetimeStars;
    progress.petName = child.petName;
    progress.dailyEnergy = child.dailyEnergy;
    progress.lastUsedAt = Date.now();
  }

  function clampEnergy(value) {
    return Math.max(0, Math.min(200, Math.round(Number(value) || 0)));
  }

  function localDateKey(date = new Date()) {
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
  }

  function syncDailyEnergyBaselines() {
    const date = localDateKey();
    let changed = false;
    state.children.forEach(child => {
      if (child.dailyEnergy?.date === date && Number.isFinite(Number(child.dailyEnergy.baseline))) return;
      child.dailyEnergy = { date, baseline: clampEnergy(child.energy) };
      const progress = child.id === state.activeChildId ? activePetProgress(false) : null;
      if (progress) progress.dailyEnergy = child.dailyEnergy;
      changed = true;
    });
    return changed;
  }

  function dailyEnergyStats(child = activeChild()) {
    const baseline = clampEnergy(child.dailyEnergy?.baseline ?? child.energy);
    const current = clampEnergy(child.energy);
    return { baseline, current, change: current - baseline };
  }

  function scheduleDailyEnergyReset() {
    clearTimeout(dailyResetTimer);
    const now = new Date();
    const nextMidnight = new Date(now);
    nextMidnight.setHours(24, 0, 0, 0);
    dailyResetTimer = setTimeout(() => {
      if (syncDailyEnergyBaselines()) {
        saveState();
        if (!focusSession) render();
      }
      scheduleDailyEnergyReset();
    }, nextMidnight.getTime() - now.getTime() + 50);
  }

  function levelForEnergy(energy) {
    const levels = game_config.levels;
    for (let index = levels.length - 1; index >= 0; index -= 1) {
      if (energy >= levels[index].min) return { ...levels[index], index };
    }
    return { ...levels[0], index: 0 };
  }

  function nextLevel(energy) {
    return game_config.levels.find(level => level.min > energy) || null;
  }

  function currentPetArtClass(extra = '') {
    return `pet-art${petObjectUrl ? '' : ' placeholder'}${extra ? ` ${extra}` : ''}`;

  function selectedGeneratedPet() {
    const child = activeChild();
    return state.generatedPets.find(pet => pet.childId === child.id && pet.id === child.generatedPetId) || null;
  }

  function syncCurrentPetArt() {
    const child = activeChild();
    const generatedPet = selectedGeneratedPet();
    if (generatedPet?.imageSheetUrl) {
      petObjectUrl = generatedPet.imageSheetUrl;
      currentPetId = generatedPet.id;
      return;
    }
    const famousPet = famousPets.find(pet => pet.id === child.famousPetId);
    if (famousPet) {
      petObjectUrl = famousPet.imageSheetUrl;
      currentPetId = famousPet.id;
      return;
    }
    const selectedPetId = child.selectedPetId || state.selectedPetId || currentPetId;
    petObjectUrl = petObjectUrls.get(String(selectedPetId || '')) || '';
    currentPetId = selectedPetId || currentPetId;
  }

  function petArtStyle(energy) {
    const level = levelForEnergy(energy);
    return petArtStyleForLevel(level.index);
  }

  function petArtStyleForLevel(levelIndex) {
    if (!petObjectUrl) return '';
    const row = Math.max(0, Math.min(3, levelIndex));
    const column = levelIndex >= 4 ? 1 : 0;
    return `background-image:url(&quot;${petObjectUrl}&quot;);background-size:400% 400%;background-position:${column * 100 / 3}% ${row * 100 / 3}%;`;
  }

  function todayEntries(childId = activeChild().id) {
    const start = new Date();
    start.setHours(0, 0, 0, 0);
    const petKey = childId === activeChild().id ? petKeyForChild() : '';
    return state.ledger.filter(item => item.childId === childId && (!petKey || item.petKey === petKey) && !item.revokedAt && item.createdAt >= start.getTime());
  }

  function todayScore() {
    return dailyEnergyStats().change;
  }

  function autoPointsToday() {
    return todayEntries().filter(item => item.source === 'focus_session').reduce((sum, item) => sum + Math.max(0, item.delta), 0);
  }

  function coinStats(childId = activeChild().id) {
    const positivePoints = state.ledger
      .filter(item => item.childId === childId && !item.revokedAt && item.delta > 0)
      .reduce((sum, item) => sum + item.delta, 0);
    const earned = Math.floor(positivePoints / 10);
    const spent = state.redemptions
      .filter(item => item.childId === childId && !item.cancelledAt)
      .reduce((sum, item) => sum + item.cost, 0);
    const cosmeticSpent = state.cosmeticPurchases
      .filter(item => item.childId === childId)
      .reduce((sum, item) => sum + item.cost, 0);
    return { positivePoints, earned, spent: spent + cosmeticSpent, balance: Math.max(0, earned - spent - cosmeticSpent), progress: positivePoints % 10 };
  }

  function equippedCosmetic(type) {
    const defaults = { focusBackground: 'focus_default', petBackground: 'pet_default', petFrame: 'frame_none' };
    return state.equippedCosmetics?.[type] || defaults[type];
  }

  function ownsCosmetic(cosmetic, childId = activeChild().id) {
    return cosmetic.cost === 0 || state.cosmeticPurchases.some(item => item.childId === childId && item.cosmeticId === cosmetic.id);
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
  }

  function formatTime(timestamp) {
    const date = new Date(timestamp);
    const today = new Date();
    const sameDay = date.toDateString() === today.toDateString();
    return `${sameDay ? '今天' : `${date.getMonth() + 1}月${date.getDate()}日`} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
  }

  function toast(message) {
    const element = document.createElement('div');
    element.className = 'toast';
    element.textContent = message;
    document.getElementById('toastStack').appendChild(element);
    setTimeout(() => element.remove(), 2800);
  }

  function post(type, data = {}) {
    try { window.parent.postMessage({ type, data }, '*'); } catch (_) {}
  }

            </div>
          </div>
        </header>

  }

              <div class="shop-section"><div class="shop-section-head"><h3>✨ 装扮道具</h3><p>永久解锁，拥有后可以随时切换。</p></div><div class="cosmetic-list">${COSMETICS.map(cosmetic => cosmeticCard(cosmetic, coins.balance)).join('')}</div></div>

            <section class="panel list-panel" id="mobileRecent"><a class="mobile-panel-close" href="#" aria-label="关闭">×</a><h2 class="section-title">最近成长</h2><div class="timeline">${recent.length ? recent.map(entry => timelineItem(entry)).join('') : '<div class="empty">还没有成长记录，完成第一个小目标吧。</div>'}</div></section>
            <section class="panel list-panel" id="mobileGuide"><a class="mobile-panel-close" href="#" aria-label="关闭">×</a><h2 class="section-title">成长图鉴</h2><div class="milestone-list">${game_config.levels.slice(1).map((item, index) => milestoneItem(item, index + 1, child)).join('')}</div></section>
          </div>

      </div>`;
  }

  function rewardCard(reward, balance) {
    const canRedeem = balance >= reward.cost;
    return `<article class="reward-card"><div class="reward-icon">${escapeHtml(reward.icon || '🎁')}</div><div class="reward-name">${escapeHtml(reward.name)}</div><button class="reward-redeem" data-redeem="${reward.id}" ${canRedeem ? '' : 'disabled'}>${reward.cost} 🪙 · ${canRedeem ? '兑换' : '金币不足'}</button></article>`;
  }

  function cosmeticCard(cosmetic, balance) {
    const owned = ownsCosmetic(cosmetic);
    const equipped = equippedCosmetic(cosmetic.type) === cosmetic.id;
    const canBuy = balance >= cosmetic.cost;
    const label = equipped ? '使用中' : owned ? '装备' : canBuy ? `${cosmetic.cost} 🪙 · 解锁` : `${cosmetic.cost} 🪙 · 金币不足`;
    return `<article class="cosmetic-card"><div class="cosmetic-preview preview-${cosmetic.id}">${cosmetic.icon}</div><div class="cosmetic-type">${cosmetic.typeName}</div><div class="cosmetic-name">${cosmetic.name}</div><button class="cosmetic-action ${equipped ? 'equipped' : ''}" data-cosmetic="${cosmetic.id}" ${equipped || (!owned && !canBuy) ? 'disabled' : ''}>${label}</button></article>`;
  }

  function timelineItem(entry) {
    return `<div class="timeline-item"><div class="timeline-icon">${entry.source === 'focus_session' ? '⏱' : (ICONS[entry.category] || '✨')}</div><div><div class="timeline-title">${escapeHtml(entry.reason)}</div><div class="timeline-time">${formatTime(entry.createdAt)}${entry.note ? ` · ${escapeHtml(entry.note)}` : ''}</div></div><div class="delta ${entry.delta >= 0 ? 'positive' : 'negative'}">${entry.delta > 0 ? '+' : ''}${entry.delta}</div></div>`;
  }

  function milestoneItem(level, index, child) {
    const unlocked = child.energy >= level.min;
    const art = unlocked
      ? `<div class="milestone-art" style="${petArtStyleForLevel(index)}" role="img" aria-label="${escapeHtml(child.petName)}的${level.name}"></div>`
      : '<div class="milestone-art locked" aria-label="尚未解锁">?</div>';
    return `<div class="milestone ${unlocked ? '' : 'locked'}">${art}<div><strong>${level.name}</strong><span>${unlocked ? `成长能量 ${level.min} 已解锁` : `成长能量达到 ${level.min} 解锁`}</span></div></div>`;
  }

  function parentView() {
    const child = activeChild();
    const level = levelForEnergy(child.energy);
    const secondaryTabs = [
      ['history', '历史记录'], ['metrics', '指标管理'], ['rewards', '奖励管理'], ['pets', '宠物形象'], ['settings', '家庭设置']
    ];
    return `
      <div class="parent-layout">
        <aside class="panel profile-panel">
          <div class="profile-pet"><div class="${currentPetArtClass()}" style="${petArtStyle(child.energy)}"></div></div>
          <div class="profile-info"><div class="eyebrow">当前孩子</div><h2>${escapeHtml(child.name)}</h2><div class="mini-stat"><div><span>成长能量</span><strong>${child.energy}</strong></div><div><span>当前形态</span><strong style="font-size:13px">${level.name}</strong></div><div><span>今日变化</span><strong>${todayScore() > 0 ? '+' : ''}${todayScore()}</strong></div><div><span>终身成长星</span><strong>${child.lifetimeStars}</strong></div></div><button class="btn btn-soft" id="editChildBtn" style="width:100%;margin-top:12px">编辑孩子与宠物</button></div>
        </aside>
        <div class="parent-main">
          <nav class="panel parent-tabs" aria-label="家长功能"><button class="parent-tab ${parentTab === 'score' ? 'active' : ''}" data-parent-tab="score">评价行为</button><button class="parent-tab ${parentTab === 'school' ? 'active' : ''}" data-parent-tab="school">学校收件箱${schoolInboxEvents().length ? ` (${schoolInboxEvents().length})` : ''}</button><select class="select parent-more" id="parentMoreTabs" aria-label="更多家长功能"><option value="" ${['score', 'school'].includes(parentTab) ? 'selected' : ''}>更多管理</option>${secondaryTabs.map(([id, label]) => `<option value="${id}" ${parentTab === id ? 'selected' : ''}>${label}</option>`).join('')}</select></nav>
          ${parentTab === 'score' ? scoreView() : parentTab === 'school' ? schoolInboxView() : parentTab === 'history' ? historyView() : parentTab === 'metrics' ? metricsView() : parentTab === 'rewards' ? rewardsView() : parentTab === 'pets' ? petsView() : settingsView()}
        </div>
      </div>`;
  }

  function safeCloudPart(value) {
    return String(value || '').trim().replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 80);
  }

  function normalizeSchoolEventSummary(item, link = state.schoolLink) {
    if (!item?.id || item?.eventType !== 'school_award') return null;
    if (item.classId !== link.classId || item.studentId !== link.studentId) return null;
    if (!['submitted', 'published'].includes(item.status)) return null;
    return {
      id: item.id,
      eventType: item.eventType,
      status: item.status,
      createdAt: Number(item.createdAt) || 0,
      submittedAt: Number(item.submittedAt) || 0,
      classId: item.classId,
      className: item.className || '',
      studentId: item.studentId,
      studentUuid: item.studentUuid || '',
      studentName: item.studentName || '',
      delta: Math.max(0, Math.trunc(Number(item.delta) || 0)),
      reason: item.reason || '',
      category: item.category || '学习',
      note: item.note || ''
    };
  }

  function schoolEventBasePath(link = state.schoolLink) {
    return `${GROWTH_LINK_ROOT}/events`;
  }

  function schoolPolicyPath(link = state.schoolLink) {
    return `${GROWTH_LINK_ROOT}/access-policy.json`;
  }

  function schoolStudentProfilePath(link = state.schoolLink) {
    return `${GROWTH_LINK_ROOT}/student-profile.json`;
  }

  function schoolReceiptPath(eventId) {
    return `${GROWTH_LINK_ROOT}/receipts/${safeCloudPart(eventId)}.json`;
  }

  function validSchoolSitePath(sitePath) {
    return /^[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:\/[a-zA-Z0-9_-]+)*$/.test(String(sitePath || '').trim());
  }

  function schoolLinkFromUrl() {
    const params = new URLSearchParams(location.search);
    const sitePath = String(params.get('guardianSite') || '').trim().replace(/^\/+|\/+$/g, '');
    const classId = String(params.get('guardianClass') || '').trim();
    const studentId = String(params.get('guardianStudent') || '').trim();
    if (!validSchoolSitePath(sitePath) || !classId || !studentId) return null;
    return {
      sitePath,
      classId,
      studentId,
      studentName: String(params.get('guardianName') || '').trim(),
      teacherUsername: String(params.get('guardianTeacher') || '').trim()
    };
  }

  function sharedPageContent(result) {
    if (typeof result === 'string') return result;
    return String(result?.content ?? result?.data?.content ?? '');
  }

  async function readSchoolSharedPage(link, pagePath) {
    if (typeof guardianSdk?.loadPage !== 'function') throw new Error('当前 Keepwork SDK 不支持共享站点读取');
    if (!validSchoolSitePath(link.sitePath)) throw new Error('请填写教师提供的家庭专用 Keepwork 站点路径');
    try {
      return sharedPageContent(await guardianSdk.loadPage({ sitePath: link.sitePath, pagePath }));
    } catch (error) {
      throw new Error(`无法读取家庭专用站点。请确认当前家长账号已被加入该站点，且路径正确：${error?.message || error}`);
    }
  }

  function guardianUsername() {
    return safeCloudPart(guardianUser?.username || guardianUser?.name || '');
  }

  function validateSchoolAccessPolicy(policy, link) {
    const account = guardianUsername();
    if (!account) return '未获得当前家长 Keepwork 账号，请重新登录';
    if (!policy || typeof policy !== 'object' || policy.version !== 2 || policy.privacyScope !== 'family') return '该家庭站点尚未发布家庭隔离授权策略。请让教师在“云端授权”中为该学生配置独立家庭站点并发布';
    if (safeCloudPart(policy.classId) !== safeCloudPart(link.classId)) return '班级授权策略不匹配';
    const student = Array.isArray(policy.students) ? policy.students.find(item => item?.id === link.studentId) : null;
    if (!student || !Array.isArray(student.roles) || !student.roles.includes('student')) return '该家庭站点不包含当前学生的授权记录';
    const allowlist = Array.isArray(student.guardianAllowlist) ? student.guardianAllowlist.map(safeCloudPart) : [];
    if (!allowlist.includes(account)) return `当前账号 ${account} 不在该学生的家长白名单中`;
    return '';
  }

  async function queueSchoolReceipt(event, decision, growthEntryId = '') {
    const receipt = { version: 2, privacyScope: 'family', eventId: event.id, classId: state.schoolLink.classId, studentId: state.schoolLink.studentId, decision, decidedAt: Date.now(), guardianUsername: guardianUsername(), growthEntryId };
    state.schoolLink.pendingReceipts = state.schoolLink.pendingReceipts.filter(item => item.eventId !== event.id);
    state.schoolLink.pendingReceipts.unshift(receipt);
    await persistStateNow();
    await publishPendingSchoolReceipts();
  }

  async function publishPendingSchoolReceipts() {
    const link = state.schoolLink;
    if (publishingSchoolReceipts || !link?.sitePath || !link?.classId || !link?.studentId || !guardianSdk?.savePage || !link.pendingReceipts.length) return;
    publishingSchoolReceipts = true;
    schoolReceiptSyncError = '';
    try {
      const policy = JSON.parse(await readSchoolSharedPage(link, schoolPolicyPath(link)) || 'null');
      const accessError = validateSchoolAccessPolicy(policy, link);
      if (accessError) throw new Error(accessError);
      for (const receipt of [...link.pendingReceipts]) {
        await guardianSdk.savePage({ sitePath: link.sitePath, pagePath: schoolReceiptPath(receipt.eventId), content: JSON.stringify(receipt, null, 2), commitMessage: '同步家长学校奖励处理结果' });
        link.pendingReceipts = link.pendingReceipts.filter(item => item !== receipt);
        await persistStateNow();
      }
    } catch (error) {
      schoolReceiptSyncError = error?.message || String(error);
      console.warn('同步学校奖励处理结果失败', error);
    } finally {
      publishingSchoolReceipts = false;
      if (mode === 'parent' && parentTab === 'school') render();
    }
  }

  async function refreshSchoolInbox() {
    const link = state.schoolLink;
    if (!link?.sitePath || !link?.classId || !link?.studentId || !guardianSdk) return;
    schoolInboxLoadError = '';
    schoolStudentProfile = null;
    try {
      const policyText = await readSchoolSharedPage(link, schoolPolicyPath(link));
      let policy = null;
      try { policy = JSON.parse(policyText || 'null'); } catch (_) {}
      const accessError = validateSchoolAccessPolicy(policy, link);
      if (accessError) throw new Error(accessError);
      publishPendingSchoolReceipts();
      try {
        const profileText = await readSchoolSharedPage(link, schoolStudentProfilePath(link));
        const profile = JSON.parse(profileText || 'null');
        if (profile?.version === 2 && profile?.privacyScope === 'family' && profile?.classId === link.classId && profile?.student?.id === link.studentId) schoolStudentProfile = profile;
      } catch (_) {}
      const basePath = schoolEventBasePath(link);
      const indexText = await readSchoolSharedPage(link, `${basePath}/index.json`);
      let index = [];
      try { index = JSON.parse(indexText || '[]'); } catch (_) {}
      if (!Array.isArray(index)) index = [];
      const summarizedEvents = [];
      const detailLookupItems = [];
      index.slice(0, 100).forEach(item => {
        const summaryEvent = normalizeSchoolEventSummary(item, link);
        if (summaryEvent) summarizedEvents.push(summaryEvent);
        else if (item?.id) detailLookupItems.push(item);
      });
      const detailEvents = await Promise.all(detailLookupItems.map(async item => {
        try {
          const text = await readSchoolSharedPage(link, `${basePath}/${safeCloudPart(item.id)}.json`);
          const event = JSON.parse(text || 'null');
          return event?.classId === link.classId && event?.studentId === link.studentId ? event : null;
        } catch (_) { return null; }
      }));
      schoolInboxCache = [...summarizedEvents, ...detailEvents.filter(Boolean)]
        .filter(event => event?.eventType === 'school_award' && event.studentId === link.studentId && ['submitted', 'published'].includes(event.status))
        .sort((left, right) => Number(right.createdAt || 0) - Number(left.createdAt || 0));
      const notifications = await loadAwardNotifications(link);
      notifyNewAwardNotification(notifications);
    } catch (error) {
      schoolInboxCache = [];
      schoolInboxLoadError = error?.message || '无法读取学校云端消息';
    }
    if (mode === 'parent' && parentTab === 'school') render();
  }

  function schoolInboxEvents() {
    const link = state.schoolLink;
    if (!link?.studentId) return [];

  async function loadGuardianSdk() {
    if (window.keepwork?.aiGenerators?.genImage && typeof window.keepwork.showLoginWindow === 'function') return window.keepwork;
    sdkLoadPromise ||= (async () => {
      window.KEEPWORK_DEFAULT_OPTIONS = {
        timeout: 30000,
        autoReloadAfterRedirectLogin: false,
        wxAuth: { scope: 'snsapi_base' }
      };
      const explicitSdk = new URLSearchParams(location.search).get('sdk');
      const isLocal = !location.hostname || ['localhost', '127.0.0.1', '::1'].includes(location.hostname);
      const localSdk = 'http://127.0.0.1:5001/index.ts';
      const sdkUrls = [
        explicitSdk,
        ...(isLocal || location.protocol === 'file:' ? [localSdk] : []),
        'https://cdn.keepwork.com/sdk/keepworkSDK.iife.js?v=20260619a',
        ...(isLocal || location.protocol === 'file:' ? [] : [localSdk])
      ].filter(Boolean);
      let lastError;
      for (const url of sdkUrls) {
        try {
          if (/(^|\/)index\.(?:ts|mjs|js)(?:[?#].*)?$/.test(url)) {
            await new Function('src', 'return import(src)')(url);
          } else {
            await new Promise((resolve, reject) => {
              const script = document.createElement('script');
              script.src = url;
              script.onload = resolve;
              script.onerror = reject;
              document.head.appendChild(script);
            });
          }
          if (window.keepwork?.aiGenerators?.genImage && typeof window.keepwork.showLoginWindow === 'function') {
            window.keepwork._autoReloadAfterRedirectLogin = false;
            window.keepwork?.wxAuth?.setScope?.('snsapi_base');
            await window.keepwork.localAPIKeySettings?.load?.();
            return window.keepwork;
          }
        } catch (error) {
          lastError = error;
        }
      }
      throw new Error(`KeepworkSDK 加载失败：${lastError?.message || 'unknown'}`);
    })();
    return sdkLoadPromise;
  }

  function clearGuardianAuthParams() {
    try {
      const url = new URL(location.href);
      ['token', 'code', 'state', 'wxauth', 'googleauth', 'scope', 'authuser', 'prompt', 'error'].forEach(key => url.searchParams.delete(key));
      history.replaceState({}, '', `${url.pathname}${url.search}${url.hash}`);
    } catch (_) {}
  }

  async function ensureGuardianLogin(sdk) {
    try {
      const urlToken = new URL(location.href).searchParams.get('token');
      const savedToken = localStorage.getItem(AUTH_TOKEN_KEY);
      if (!sdk.token && (urlToken || savedToken)) sdk.token = urlToken || savedToken;
      await sdk.whenRedirectLoginSettled?.();
    } catch (_) {}
    if (sdk) sdk._autoReloadAfterRedirectLogin = false;
    sdk?.wxAuth?.setScope?.('snsapi_base');
    if (sdk.token) {
      try {
        const user = typeof sdk.getUserProfile === 'function'
          ? await sdk.getUserProfile()
          : typeof sdk.getCurrentUser === 'function'
            ? await sdk.getCurrentUser()
            : sdk.user;
        if (user) {
          localStorage.setItem(AUTH_TOKEN_KEY, sdk.token);
          clearGuardianAuthParams();
          return user;
        }
      } catch (_) {}
      sdk.token = null;
      localStorage.removeItem(AUTH_TOKEN_KEY);
    }
    if (typeof sdk.showLoginWindow === 'function') await sdk.showLoginWindow({ title: '登录哈奇成长守护', wechatScope: 'snsapi_base' });
    else if (sdk.loginWindow?.show) await new Promise(resolve => sdk.loginWindow.show({ onLogin: resolve, onClose: resolve }));
    else if (sdk.login) await sdk.login();
    if (!sdk.token) throw new Error('需要先登录 Keepwork 才能进入成长守护');
    localStorage.setItem(AUTH_TOKEN_KEY, sdk.token);
    clearGuardianAuthParams();
    const user = typeof sdk.getUserProfile === 'function'
      ? await sdk.getUserProfile()
      : typeof sdk.getCurrentUser === 'function'
        ? await sdk.getCurrentUser()
        : sdk.user;
    if (!user) throw new Error('未获得 Keepwork 用户资料，请重新登录');
    return user;
  }

  async function hashPin(pin) {
    if (crypto?.subtle) {
      const bytes = new TextEncoder().encode(`haqi-guardian:${pin}`);
      const digest = await crypto.subtle.digest('SHA-256', bytes);
      return Array.from(new Uint8Array(digest)).map(value => value.toString(16).padStart(2, '0')).join('');
    }
    return btoa(`haqi-guardian:${pin}`);
  }

  function showPinModal(forceChange = false) {
    const hasPin = Boolean(parentPinHash);
    const setup = forceChange || !hasPin;
    modal(`<h2>${setup ? '设置家长 PIN' : '验证家长身份'}</h2><p>${setup ? '请设置 4–8 位数字。此 PIN 将安全保存到你的 Keepwork 空间。' : '请输入家长 PIN 进入管理台。'}</p><form id="pinForm"><div class="field"><label>PIN</label><input class="input" id="pinInput" inputmode="numeric" type="password" minlength="4" maxlength="8" pattern="[0-9]{4,8}" required autocomplete="off"></div>${setup ? '<div class="field"><label>再次输入</label><input class="input" id="pinConfirm" inputmode="numeric" type="password" minlength="4" maxlength="8" pattern="[0-9]{4,8}" required autocomplete="off"></div>' : ''}<div class="modal-actions"><button type="button" class="btn btn-soft" id="cancelModal">取消</button><button class="btn btn-primary" type="submit">${setup ? '保存 PIN' : '进入管理台'}</button></div></form>`);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    document.getElementById('pinForm').addEventListener('submit', async event => {
      event.preventDefault();
      const pin = document.getElementById('pinInput').value;
      if (setup) {
        if (pin !== document.getElementById('pinConfirm').value) return toast('两次输入的 PIN 不一致');
        parentPinHash = await hashPin(pin);
        await queueCloudWrite(CLOUD_PIN_PATH, parentPinHash);
        parentUnlocked = true;
        toast('家长 PIN 已保存');
      } else if (await hashPin(pin) === parentPinHash) {
        parentUnlocked = true;
      } else {
        return toast('PIN 不正确');
      }
      closeModal();
      mode = 'parent';
      render();
    });
    setTimeout(() => document.getElementById('pinInput')?.focus(), 0);
  }

  function addLedgerEntry(entry) {
    if (syncDailyEnergyBaselines()) saveState();
    const child = activeChild();
    const oldLevel = levelForEnergy(child.energy);
    const petKey = petKeyForChild(child);
    const record = { id: `entry_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`, childId: child.id, petKey, createdAt: Date.now(), actorId: entry.source === 'parent' ? 'parent' : child.id, revokedAt: null, ...entry };
    state.ledger.unshift(record);
    updateActivePetEnergy(child.energy + record.delta, child.lifetimeStars + Math.max(0, record.delta));
    const newLevel = levelForEnergy(child.energy);
    saveState();
    render();
    if (newLevel.index > oldLevel.index) toast(`${child.petName}进化为${newLevel.name}！`);
    else toast(`${record.reason} ${record.delta > 0 ? '+' : ''}${record.delta} 分`);
    return record;
  }

  async function approveSchoolEvent(eventId) {
    const event = schoolInboxEvents().find(item => item.id === eventId);
    if (!event) return toast('这条学校消息已处理或不存在');
    try {
      if (state.ledger.some(entry => String(entry.externalEventId || '') === event.id)) {
        if (!state.schoolLink.appliedEventIds.includes(event.id)) state.schoolLink.appliedEventIds.unshift(event.id);
        await queueSchoolReceipt(event, 'approved', state.ledger.find(entry => String(entry.externalEventId || '') === event.id)?.id || '');
        render();
        return toast('这条学校奖励已入账，不会重复计入');
      }
      state.schoolLink.appliedEventIds.unshift(event.id);
      const record = addLedgerEntry({ category: event.category || '学习', delta: Math.max(0, Math.trunc(Number(event.delta) || 0)), source: 'school_sync', actorId: event.actor?.userId || 'teacher', reason: `学校同步：${event.reason || '课堂成长记录'}`, note: event.note || `${event.className || '学校'}课堂记录`, externalEventId: event.id });
      await queueSchoolReceipt(event, 'approved', record.id);
      toast(state.schoolLink.pendingReceipts.length ? '奖励已入账，回执等待同步' : '奖励已入账并已通知教师');
    } catch (error) {
      schoolReceiptSyncError = error?.message || String(error);
      render();
      toast(`奖励已保留，云端同步失败：${schoolReceiptSyncError}`);
    }
  }

  async function ignoreSchoolEvent(eventId) {
    const event = schoolInboxEvents().find(item => item.id === eventId);
    if (!event) return toast('这条学校消息已处理或不存在');
    try {
      state.schoolLink.ignoredEventIds.unshift(event.id);
      await queueSchoolReceipt(event, 'ignored');
      toast(state.schoolLink.pendingReceipts.length ? '决定已保存，回执等待同步' : '已通知教师暂不计入家庭成长');

      schoolReceiptSyncError = error?.message || String(error);
      render();
      toast(`决定已保留，云端同步失败：${schoolReceiptSyncError}`);
    }
  }

  function revokeEntry(entryId) {
    if (syncDailyEnergyBaselines()) saveState();
    const entry = state.ledger.find(item => item.id === entryId && !item.revokedAt);
    if (!entry || !confirm('确认撤销这条记录？账本中仍会保留撤销痕迹。')) return;
    entry.revokedAt = Date.now();
    const child = state.children.find(item => item.id === entry.childId);
    const progress = state.petProgress[entry.petKey];
    if (progress) {
      progress.energy = clampEnergy(progress.energy - entry.delta);
      if (entry.delta > 0) progress.lifetimeStars = Math.max(0, (Number(progress.lifetimeStars) || 0) - entry.delta);
      if (entry.petKey === petKeyForChild()) syncChildFromPetProgress();
    } else if (child) {
      child.energy = clampEnergy(child.energy - entry.delta);
    }
    saveState();
    render();
    toast('记录已撤销');
  }

    });
  }

  function showAddRewardModal() {
    modal(`<h2>新建兑换奖励</h2><p>奖励应具体、可兑现，并提前和孩子约定清楚。</p><form id="rewardForm"><div class="field"><label>奖励名称</label><input class="input" id="rewardName" maxlength="40" required placeholder="例如：周末一起去公园"></div><div class="field"><label>图标</label><select class="input" id="rewardIcon"><option>🎁</option><option>🎮</option><option>🍓</option><option>🎨</option><option>🏕️</option><option>📚</option><option>⚽</option><option>🎬</option></select></div><div class="field"><label>所需金币（1–99）</label><input class="input" id="rewardCost" type="number" min="1" max="99" value="5" required></div><div class="modal-actions"><button type="button" class="btn btn-soft" id="cancelModal">取消</button><button class="btn btn-primary" type="submit">保存奖励</button></div></form>`);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    document.getElementById('rewardForm').addEventListener('submit', event => {
      event.preventDefault();
      const cost = Math.round(Number(document.getElementById('rewardCost').value));
      if (cost < 1 || cost > 99) return toast('金币数量必须是 1 到 99 之间的整数');
      state.rewards.push({ id: `reward_${Date.now()}`, name: document.getElementById('rewardName').value.trim(), icon: document.getElementById('rewardIcon').value, cost, active: true });
      saveState();
      closeModal();
      render();
      toast('新奖励已添加');
    });
  }

  function showEditChildModal() {
    const child = activeChild();
    modal(`<h2>编辑孩子与宠物</h2><p>名称变化不会影响已有成长记录。</p><form id="childForm"><div class="field"><label>孩子昵称</label><input class="input" id="childName" maxlength="16" required value="${escapeHtml(child.name)}"></div><div class="field"><label>宠物昵称</label><input class="input" id="petName" maxlength="16" required value="${escapeHtml(child.petName)}"></div><div class="modal-actions"><button type="button" class="btn btn-soft" id="cancelModal">取消</button><button class="btn btn-primary" type="submit">保存</button></div></form>`);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    document.getElementById('childForm').addEventListener('submit', event => {
      event.preventDefault();
      child.name = document.getElementById('childName').value.trim();
      child.petName = document.getElementById('petName').value.trim();
      const progress = activePetProgress(false);
      if (progress) progress.petName = child.petName;
      saveState(); closeModal(); render(); toast('资料已更新');
    });
  }

  function showPetPicker() {
    if (!availablePets.length) {
      modal(`<h2>选择成长伙伴</h2><p>在蛋蛋星球中领养宠物后，这里会显示你的宠物列表。当前使用小蛋形象作为离线伙伴。</p><div class="modal-actions"><button class="btn btn-primary" id="cancelModal">知道了</button></div>`);
      document.getElementById('cancelModal').addEventListener('click', closeModal);
      return;
    }
    modal(`<h2>选择成长伙伴</h2><p>选择一只宠物代表你的成长。以后可以随时更换，积分和图鉴不会丢失。</p><div class="metric-grid">${availablePets.map(pet => `<article class="metric-card"><div class="metric-top"><div class="metric-icon">🐾</div><div><div class="metric-name">${escapeHtml(pet.name || '哈奇宠物')}</div><div class="metric-category">${pet.petId === currentPetId ? '当前伙伴' : '可选择'}</div></div></div><button class="score-btn" data-choose-pet="${escapeHtml(pet.petId || '')}">${pet.petId === currentPetId ? '已选择' : '选择'}</button></article>`).join('')}</div><div class="modal-actions"><button class="btn btn-soft" id="cancelModal">取消</button></div>`);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    document.querySelectorAll('[data-choose-pet]').forEach(button => button.addEventListener('click', () => {
      const pet = availablePets.find(item => String(item.petId || '') === button.dataset.choosePet);
      if (!pet) return;
      closeModal();
      selectParentPet(String(pet.petId || ''), 'available');
    }));
  }

  function showHelp() {
    modal(`<h2>怎样让哈奇长大？</h2><p>家长记录孩子真实、具体的日常表现，孩子通过专注守护获得自动奖励。</p><div class="milestone-list"><div class="milestone"><div class="milestone-icon">1</div><div><strong>完成一件具体的小事</strong><span>例如主动完成作业、阅读或整理物品。</span></div></div><div class="milestone"><div class="milestone-icon">2</div><div><strong>每 50 能量进化一次</strong><span>每只宠物都有独立能量，切换后不会互相转移。</span></div></div><div class="milestone"><div class="milestone-icon">3</div><div><strong>图鉴跟随当前能量</strong><span>能量低于形态门槛时，对应图鉴会重新锁定。</span></div></div></div><div class="modal-actions"><button class="btn btn-primary" id="cancelModal">知道了</button></div>`);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
  }

  async function startFocus() {
    if (focusSession) return;
    const task = document.getElementById('focusTask')?.value || '成长任务';
    const durationMs = selectedDuration * 60 * 1000;
    focusSession = { id: `focus_${Date.now()}`, task, duration: selectedDuration, durationMs, startedAt: Date.now(), remainingMs: durationMs, lastTick: Date.now(), paused: false, exitedFullscreen: false };
    renderFocusScreen();
    post('gameStarted', { task, duration: selectedDuration });
    try {
      await document.getElementById('focusScreen')?.requestFullscreen?.();
    } catch (_) {
      toast('浏览器未允许全屏，计时仍可继续');
    }
    focusSession.lastTick = Date.now();
    focusTimer = window.setInterval(tickFocus, 250);
  }

  function focusReward(minutes) {
    return game_config.focusRewards[minutes] || Math.max(1, Math.floor(minutes / 10));
  }

  function renderFocusScreen() {
    const session = focusSession;
    if (!session) return;
    const percent = Math.max(0, Math.min(100, 100 * (1 - session.remainingMs / session.durationMs)));
    const seconds = Math.ceil(session.remainingMs / 1000);
    const minutesText = String(Math.floor(seconds / 60)).padStart(2, '0');
    const secondsText = String(seconds % 60).padStart(2, '0');
    document.getElementById('modalRoot').innerHTML = `<section class="focus-screen ${equippedCosmetic('focusBackground')}" id="focusScreen"><div class="focus-content"><div class="focus-task">${escapeHtml(session.task)} · ${session.duration} 分钟守护</div><div class="${currentPetArtClass(`focus-pet ${equippedCosmetic('petFrame')}`)}" style="${petArtStyle(activeChild().energy)}"></div><div class="focus-time">${minutesText}:${secondsText}</div><div class="focus-hint">${session.paused ? '已暂停，继续后会从这里计时' : '保持页面可见，和哈奇安静完成这一件事'}</div><div class="focus-progress"><div style="width:${percent}%"></div></div><div class="focus-actions"><button class="btn btn-soft" id="pauseFocusBtn">${session.paused ? '继续' : '暂停'}</button><button class="btn btn-danger" id="stopFocusBtn">结束本次守护</button></div></div></section>`;
    document.getElementById('pauseFocusBtn').addEventListener('click', toggleFocusPause);
    document.getElementById('stopFocusBtn').addEventListener('click', () => finishFocus(false));
  }

  function tickFocus() {
    if (!focusSession) return;
    const now = Date.now();
    const elapsed = now - focusSession.lastTick;
    focusSession.lastTick = now;
    if (!focusSession.paused && document.visibilityState === 'visible') focusSession.remainingMs -= elapsed;
    if (focusSession.remainingMs <= 0) finishFocus(true);
    else {
      const screen = document.getElementById('focusScreen');
      if (!screen) {
        renderFocusScreen();
        return;
      }
      const percent = Math.max(0, Math.min(100, 100 * (1 - focusSession.remainingMs / focusSession.durationMs)));
      const seconds = Math.ceil(focusSession.remainingMs / 1000);
      screen.querySelector('.focus-time').textContent = `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
      screen.querySelector('.focus-progress > div').style.width = `${percent}%`;
    }
  }

  function toggleFocusPause() {
    if (!focusSession) return;
    focusSession.paused = !focusSession.paused;
    focusSession.lastTick = Date.now();
    renderFocusScreen();
  }

  async function finishFocus(completed) {
    if (!focusSession) return;
    const session = focusSession;
    focusSession = null;
    clearInterval(focusTimer);
    focusTimer = 0;
    try { if (document.fullscreenElement) await document.exitFullscreen(); } catch (_) {}
    closeModal();
    const elapsedMinutes = Math.max(0, Math.round((session.durationMs - Math.max(0, session.remainingMs)) / 60000));
    const reward = completed ? Math.max(0, Math.min(focusReward(session.duration), game_config.dailyAutoPointCap - autoPointsToday())) : 0;
    state.focusSessions.unshift({ id: session.id, childId: activeChild().id, task: session.task, plannedMinutes: session.duration, elapsedMinutes, completed, reward, startedAt: session.startedAt, finishedAt: Date.now() });
    saveState();
    if (reward > 0) {
      addLedgerEntry({ metricId: 'focus_guard', category: '自律', delta: reward, source: 'focus_session', reason: `${session.task} · 专注守护 ${session.duration} 分钟`, note: '自动奖励' });
      post('gameFinished', { completed: true, passed: true, earnedPoints: reward, score: reward, focusMinutes: session.duration, task: session.task, roundId: session.id, finishedAt: Date.now() });
    } else {
      render();
      toast(completed ? '今日自动奖励已达上限，本次专注仍已记录' : '本次守护已结束，不扣分');
      post('gameFinished', { completed: false, passed: false, earnedPoints: 0, score: 0, focusMinutes: elapsedMinutes, task: session.task, roundId: session.id, finishedAt: Date.now() });
    }
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `哈奇成长账本-${new Date().toISOString().slice(0, 10)}.json`;
    link.click();
    URL.revokeObjectURL(url);
  }

  async function resetData() {
    if (!confirm('确认清除 Keepwork 中的全部成长守护数据？此操作不可撤销。')) return;
    clearTimeout(saveTimer);
    await Promise.all([
      queueCloudWrite(CLOUD_STATE_PATH, ''),
      queueCloudWrite(CLOUD_PIN_PATH, '')
    ]);
    location.reload();
  }

  function requestPetImage(petId = '') {
    const requestId = `guardian_pet_${Date.now()}`;
    petRequestId = requestId;
    currentPetId = petId || activeChild().selectedPetId || currentPetId;
    window.parent.postMessage({ type: 'haqi_get_pet_image', requestId, anim: 'happy', petId: currentPetId || undefined }, '*');
    setTimeout(() => {
      if (availablePets.length) return;
      window.parent.postMessage({ type: 'haqi_get_pet_images', requestId: `guardian_pets_${Date.now()}`, anim: 'happy' }, '*');
    }, 900);
  }

  function setPetImage(pet) {
    if (!pet?.imageBlob) return;
    const key = String(pet.petId || 'active');
    if (!petObjectUrls.has(key)) petObjectUrls.set(key, URL.createObjectURL(pet.imageBlob));
    const selectedPetId = activeChild().selectedPetId || state.selectedPetId;
    if (!activeChild().generatedPetId && !activeChild().famousPetId && (!selectedPetId || key === String(selectedPetId))) {
      petObjectUrl = petObjectUrls.get(key);
      currentPetId = pet.petId || currentPetId;
    }
    const child = activeChild();
    if (pet.name && child.petName === '哈奇') child.petName = pet.name;
    saveState();
    render();
  }

  window.addEventListener('message', event => {
    const message = event.data || {};
    if (message.type === 'setGameConfig' && message.data && typeof message.data === 'object') {
      if (message.data.petId) requestPetImage(message.data.petId);
      if (Array.isArray(message.data.focusDurations)) game_config.focusDurations = message.data.focusDurations.filter(value => Number(value) > 0);
    }
    if (message.type === 'haqi_pet_image' && message.ok && message.data && (!petRequestId || !message.requestId || message.requestId === petRequestId || message.requestId === 'active_pet_config')) setPetImage(message.data);
    if (message.type === 'haqi_pet_images' && message.ok) {
      availablePets = Array.isArray(message.data?.pets) ? message.data.pets.filter(pet => pet?.imageBlob) : [];
      availablePets.forEach(pet => {
        const key = String(pet.petId || '');
        if (key && !petObjectUrls.has(key)) petObjectUrls.set(key, URL.createObjectURL(pet.imageBlob));
      });
      const selectedId = activeChild().selectedPetId || state.selectedPetId;
      const selectedPet = availablePets.find(pet => pet.petId === selectedId) || availablePets.find(pet => pet.petId === currentPetId) || availablePets[0];
      if (selectedPet) setPetImage(selectedPet);
      if (parentTab === 'pets' && mode === 'parent') render();
    }
  });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && syncDailyEnergyBaselines()) {
      saveState();
      if (!focusSession) render();
      scheduleDailyEnergyReset();
    }
    if (!document.hidden) publishPendingSchoolReceipts();
    if (!document.hidden) refreshVisibleSchoolInbox();
    if (focusSession) focusSession.lastTick = Date.now();
  });

  window.addEventListener('online', () => {
    publishPendingSchoolReceipts();
    refreshVisibleSchoolInbox();
  });

  document.addEventListener('fullscreenchange', () => {
    if (!focusSession || document.fullscreenElement) return;
    focusSession.paused = true;
    focusSession.exitedFullscreen = true;
    renderFocusScreen();
    toast('已退出全屏，守护计时暂停，不会扣分');
  });

  window.addEventListener('beforeunload', () => {
    clearTimeout(dailyResetTimer);
    clearInterval(schoolInboxRefreshTimer);
    petObjectUrls.forEach(url => URL.revokeObjectURL(url));
  });

  startGuardian();
})();
</script>
</body>
</html>
