    try {
      const params = new URLSearchParams(window.location.search);
      const lang = params.get('lang');
      if (lang && I18N[lang]) return lang;
    } catch (_) {}
    return 'zhCN';
  }
  const LANG = detectLang();
  const L = I18N[LANG];
  function t(key, vars) {
    let str = L[key] || I18N.zhCN[key] || key;
    if (vars) str = str.replace(/\{(\w+)\}/g, (m, n) => vars[n] != null ? String(vars[n]) : m);
    return str;
  }
  try { document.documentElement.setAttribute('lang', LANG === 'enUS' ? 'en' : 'zh-CN'); } catch (_) {}
  try { document.title = t('title'); } catch (_) {}
  const STORAGE_KEY_DIFFICULTY = 'haqiSokobanLastDifficulty';
  const STORAGE_KEY_BEST = 'haqiSokobanBestLevel';
  const FALLBACK_PET = '🐾';
  const DIRS = [
    { key: 'up', dr: -1, dc: 0, label: '↑' },
    { key: 'right', dr: 0, dc: 1, label: '→' },
    { key: 'down', dr: 1, dc: 0, label: '↓' },
    { key: 'left', dr: 0, dc: -1, label: '←' },
  ];
  const DIFFICULTIES = {
    easy: { id: 'easy', label: t('diffEasy'), size: 7, boxes: 2, walls: 5, minPushes: 4, attempts: 60, maxNodes: 6000, timeBudget: 260, reward: 70 },
    normal: { id: 'normal', label: t('diffNormal'), size: 8, boxes: 3, walls: 8, minPushes: 8, attempts: 80, maxNodes: 10000, timeBudget: 420, reward: 95 },
    hard: { id: 'hard', label: t('diffHard'), size: 8, boxes: 3, walls: 12, minPushes: 12, attempts: 105, maxNodes: 14000, timeBudget: 620, reward: 125 },
    expert: { id: 'expert', label: t('diffExpert'), size: 9, boxes: 4, walls: 14, minPushes: 16, attempts: 130, maxNodes: 18000, timeBudget: 850, reward: 160 },
  };
  const DIFFICULTY_ORDER = ['easy', 'normal', 'hard', 'expert'];

  const state = {
    difficulty: normalizeDifficulty(localStorage.getItem(STORAGE_KEY_DIFFICULTY)),
    level: 1,
    bestLevel: Number(localStorage.getItem(STORAGE_KEY_BEST) || 1),
    started: false,
    finished: false,
    generating: false,
    board: null,
    walls: new Set(),
    goals: new Set(),
    boxes: [],
    player: 0,
    moves: 0,
    pushes: 0,
    seconds: 0,
    timer: null,
    solutionPushes: 0,
    petAsset: null,
    petRequestId: '',
    objectUrls: [],
    pointer: null,
  };

  const root = document.createElement('div');
  root.id = 'haqiSokoban';
  root.innerHTML = `
    <style>

      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        color: #17314a;
        background:
          radial-gradient(circle at 18% 16%, rgba(255,255,255,.82) 0 7%, transparent 22%),
          radial-gradient(circle at 76% 18%, rgba(125,211,252,.42) 0 9%, transparent 24%),
          linear-gradient(180deg, #d8f5ff 0%, #fff1b8 48%, #baf2c4 100%);
        touch-action: none;
        user-select: none;
      }
      .mh-shell { position: relative; z-index: 1; height: 100vh; display: grid; grid-template-rows: auto minmax(0, 1fr) auto; gap: 9px; padding: 9px; overflow: hidden; }

      .mh-top {
        min-height: 48px; display: grid; grid-template-columns: 40px minmax(0,1fr) auto; align-items: center; gap: 8px;
        padding: 7px 9px; border-radius: 14px; background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(240,253,250,.86)); border: 2px solid rgba(255,255,255,.95);

      }

        border: 0; cursor: pointer; font-weight: 900; color: inherit;
      }
      .mh-icon-btn { width: 34px; height: 34px; border-radius: 999px; background: linear-gradient(180deg, #fb923c, #ea580c); color: white; box-shadow: 0 3px 0 #9a3412, 0 7px 14px rgba(154,52,18,.22); font-size: 18px; text-shadow: 0 1px 0 rgba(124,45,18,.38); }
      .mh-title { min-width: 0; text-align: center; font-size: 17px; font-weight: 1000; color: #16324f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mh-stats { display: flex; align-items: center; justify-content: flex-end; gap: 5px; flex-wrap: wrap; }
      .mh-pill { min-width: 46px; height: 28px; display: inline-flex; align-items: center; justify-content: center; gap: 3px; padding: 0 8px; border-radius: 999px; background: linear-gradient(180deg, #fff, #ecfeff); border: 1px solid rgba(14,116,144,.18); color: #0f766e; font-size: 12px; font-weight: 900; box-shadow: 0 2px 0 rgba(14,116,144,.12), inset 0 1px 0 rgba(255,255,255,.9); }
      .mh-stage { min-height: 0; display: grid; place-items: center; overflow: hidden; padding: 2px 0; }
      .mh-board-wrap {
        position: relative; width: min(86vw, calc(100vh - 154px), 560px); max-width: calc(100vw - 18px); max-height: 100%; aspect-ratio: 1; padding: 10px; border-radius: 18px;
        background: linear-gradient(145deg, #0f766e, #115e59 46%, #14532d); border: 3px solid rgba(255,255,255,.95);

      }

      }

      .mh-cell.floor {
        background:
            radial-gradient(circle at 26% 20%, rgba(255,255,255,.09) 0 10%, transparent 24%),

          linear-gradient(180deg, var(--tile-top), var(--tile-bottom));
      }
      .mh-cell.floor::before {
        content: ''; position: absolute; inset: 0; pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
          linear-gradient(180deg, rgba(15,23,42,.2) 1px, transparent 1px);

      }

      .mh-cell.tone-1 { --tile-top: #633811; --tile-bottom: #351c0a; }
      .mh-cell.tone-2 { --tile-top: #754a1c; --tile-bottom: #45270f; }
      .mh-cell.tone-3 { --tile-top: #55300f; --tile-bottom: #2f1908; }
      .mh-cell.floor.reachable::before {
        background:
          radial-gradient(circle at 50% 50%, rgba(45,212,191,.18), transparent 58%),
          linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
          linear-gradient(180deg, rgba(15,23,42,.2) 1px, transparent 1px);
        background-size: auto, 50% 50%, 50% 50%;
      }
      .mh-cell.wall {
        background:
          linear-gradient(135deg, rgba(255,255,255,.54) 0 14%, transparent 14% 100%),
          linear-gradient(145deg, #ffb36b 0%, #ea7a32 47%, #b84d1e 100%);
        box-shadow: inset 4px 4px 0 rgba(255,255,255,.42), inset -5px -6px 0 rgba(91,33,14,.24), 0 3px 0 rgba(91,33,14,.48), 0 6px 12px rgba(15,23,42,.24);
      }
      .mh-cell.wall::before {
        content: ''; position: absolute; inset: 7%; border-radius: 5px; border: 2px solid rgba(255,237,213,.34); box-shadow: inset 0 -2px 0 rgba(91,33,14,.18), 0 1px 0 rgba(255,255,255,.16);
      }
      .mh-cell.goal { box-shadow: inset 0 1px 0 rgba(255,255,255,.16), inset 0 -2px 0 rgba(69,26,3,.18), 0 0 0 2px rgba(74,222,128,.22); }

        content: ''; position: absolute; left: 50%; top: 50%; width: 56%; height: 56%; border-radius: 9px;

        border: 2px solid rgba(187,247,208,.9); box-shadow: 0 0 13px rgba(74,222,128,.55), inset 0 0 0 2px rgba(22,101,52,.16);

      @media (max-width: 520px) {

    </style>
    <div class="mh-bg" aria-hidden="true"></div>
    <div class="mh-shell">
      <header class="mh-top">
        <button id="mhMenu" class="mh-icon-btn" type="button" aria-label="${t('menuAria')}">?</button>
        <div class="mh-title">${t('title')} Lv.<span id="mhLevel">1</span></div>
        <div class="mh-stats" aria-label="${t('gameStatusAria')}">
          <span class="mh-pill">${t('difficultyLabel')} <b id="mhDifficultyLabel">${t('diffNormal')}</b></span>
          <span class="mh-pill">${t('pushesLabel')} <b id="mhPushes">0</b></span>
          <span class="mh-pill">${t('movesLabel')} <b id="mhMoves">0</b></span>

      <footer class="mh-bottom">
        <div class="mh-controls">
          <div class="mh-difficulties" id="mhDifficulties" aria-label="${t('selectDiffAria')}"></div>

          <button id="mhRestart" class="mh-action" type="button">${t('restartBtn')}</button>
          <button id="mhNew" class="mh-action" type="button">${t('newLevelBtn')}</button>
        </div>
        <div class="mh-dpad" aria-label="${t('dirControlAria')}">
          <button class="mh-dir up" type="button" data-dir="up" aria-label="${t('dirUp')}">↑</button>
          <button class="mh-dir left" type="button" data-dir="left" aria-label="${t('dirLeft')}">←</button>
          <button class="mh-dir down" type="button" data-dir="down" aria-label="${t('dirDown')}">↓</button>
          <button class="mh-dir right" type="button" data-dir="right" aria-label="${t('dirRight')}">→</button>

        <p>${t('howToText')}</p>

    <div id="mhWin" class="mh-overlay" role="dialog" aria-modal="true" aria-labelledby="mhWinTitle" hidden>

        <h1 id="mhWinTitle">${t('winTitle')}</h1>
        <p id="mhWinText">${t('winTextDefault')}</p>
        <button id="mhNext" class="mh-next" type="button">${t('nextLevel')}</button>

  function boot() {
    document.body.appendChild(root);
    renderDifficultyButtons();
    bindEvents();
    requestPetImage();
    prepareLevel(1);
    showHowTo();
    post('gameLoaded');
  }

    byId('mhMenu').onclick = showHowTo;
    byId('mhHelp').onclick = showHowTo;
    byId('mhStart').onclick = () => {
      byId('mhHowTo').hidden = true;
      if (!state.started) startGame();
    };
    byId('mhRestart').onclick = () => {
      if (state.generating || !state.board) return;
      restoreSnapshot(state.board);
      state.moves = 0;
      state.pushes = 0;
      state.finished = false;
      startTimer();
      updateStats();
      renderBoard();
      post('gameStarted');
    };
    byId('mhNew').onclick = () => prepareAndStart(state.level + 1);
    byId('mhNext').onclick = () => {
      byId('mhWin').hidden = true;
      prepareAndStart(state.level + 1);
    };
    document.querySelectorAll('[data-dir]').forEach((btn) => {
      btn.onclick = () => movePlayer(btn.dataset.dir);
    });
    window.addEventListener('keydown', onKeyDown);
    byId('mhBoard').addEventListener('pointerdown', onPointerDown);
    byId('mhBoard').addEventListener('pointerup', onPointerUp);
    window.addEventListener('message', (event) => {
      const msg = event.data || {};
      if (msg.type === 'gameContinue' && !state.started) startGame();
      if (msg.type === 'setGameConfig' && msg.data?.petId) requestPetImage(msg.data.petId);
      if (msg.type === 'haqi_pet_image' && msg.ok && msg.data && (!state.petRequestId || !msg.requestId || msg.requestId === state.petRequestId || msg.requestId === 'active_pet_config')) setPetImage(msg.data);
      if (msg.type === 'haqi_pet_images' && msg.ok) {
        const firstPet = Array.isArray(msg.data?.pets) ? msg.data.pets[0] : null;
        if (firstPet) setPetImage(firstPet);
      }
    });
  }

  function renderDifficultyButtons() {
    const wrap = byId('mhDifficulties');
    wrap.innerHTML = DIFFICULTY_ORDER.map((id) => {
      const difficulty = DIFFICULTIES[id];
      return `<button class="mh-difficulty${id === state.difficulty ? ' active' : ''}" type="button" data-difficulty="${id}">${difficulty.label}</button>`;
    }).join('');
    wrap.querySelectorAll('[data-difficulty]').forEach((btn) => {
      btn.onclick = () => {
        const next = normalizeDifficulty(btn.dataset.difficulty);
        if (next === state.difficulty || state.generating) return;
        state.difficulty = next;
        localStorage.setItem(STORAGE_KEY_DIFFICULTY, next);
        renderDifficultyButtons();
        prepareAndStart(1);
      };
    });
  }

  function startGame() {
    state.started = true;
    state.finished = false;
    state.moves = 0;
    state.pushes = 0;
    startTimer();
    updateStats();
    post('gameStarted');
  }

  function prepareAndStart(level) {
    prepareLevel(level);
    if (state.started) {
      startTimer();
      post('gameStarted');
    }
  }

  function startTimer() {
    clearInterval(state.timer);
    state.seconds = 0;
    state.timer = setInterval(() => {
      if (state.finished || state.generating) return;
      state.seconds += 1;
      updateStats();
    }, 1000);
  }

  function prepareLevel(level) {
    state.generating = true;
    byId('mhGenerating').hidden = false;
    const puzzle = generatePuzzle(state.difficulty, level);
    state.level = level;
    state.board = puzzle;
    state.solutionPushes = puzzle.solutionPushes;
    restoreSnapshot(puzzle);
    state.moves = 0;
    state.pushes = 0;
    state.finished = false;
    state.generating = false;
    byId('mhGenerating').hidden = true;
    updateStats();
    renderBoard();
  }

  function generatePuzzle(difficultyId, level) {
    const difficulty = DIFFICULTIES[difficultyId] || DIFFICULTIES.normal;
    let best = null;
    const startedAt = Date.now();
    for (let attempt = 0; attempt < difficulty.attempts; attempt++) {
      if (attempt > 8 && Date.now() - startedAt > difficulty.timeBudget) break;
      const candidate = randomPuzzleCandidate(difficulty, level, attempt);
      const solution = solvePuzzle(candidate, difficulty.maxNodes);
      if (!solution.solved) continue;
      candidate.solutionPushes = solution.pushes;
      candidate.solutionMoves = solution.moves;
      if (!best || candidate.solutionPushes > best.solutionPushes) best = candidate;
      const target = difficulty.minPushes + Math.min(10, Math.floor(level * 1.15));
      if (candidate.solutionPushes >= target) return candidate;
    }
    return best || fallbackPuzzle(difficulty);
  }

  function randomPuzzleCandidate(difficulty, level, attempt) {
    const size = difficulty.size;
    const cells = innerCells(size);
    const walls = new Set(borderWalls(size));
    const wallBudget = difficulty.walls + Math.min(5, Math.floor(level / 3));
    shuffle(cells);
    for (const pos of cells) {
      if (walls.size >= borderWalls(size).length + wallBudget) break;
      const row = rowOf(pos, size);
      const col = colOf(pos, size);
      if ((row === 1 && col === 1) || (row === size - 2 && col === size - 2)) continue;
      if (Math.random() < .68) walls.add(pos);
    }

    let open = cells.filter(pos => !walls.has(pos));
    if (largestOpenArea(open, walls, size) < Math.max(18, difficulty.boxes * 7)) {
      walls.clear();
      borderWalls(size).forEach(pos => walls.add(pos));
      open = cells.filter(pos => !walls.has(pos));
    }
    shuffle(open);

    const goals = [];
    const boxes = [];
    for (const pos of open) {
      if (goals.length >= difficulty.boxes) break;
      if (nearBorder(pos, size) && Math.random() < .45) continue;
      goals.push(pos);
    }
    const blocked = new Set([...goals]);
    const boxPool = open.filter(pos => !blocked.has(pos) && !isSimpleCorner(pos, walls, size));
    shuffle(boxPool);
    for (const pos of boxPool) {
      if (boxes.length >= difficulty.boxes) break;
      if (boxes.some(box => manhattan(box, pos, size) < 2)) continue;
      boxes.push(pos);
    }
    const occupied = new Set([...goals, ...boxes]);
    const playerPool = open.filter(pos => !occupied.has(pos));
    const player = playerPool[(attempt + level + Math.floor(Math.random() * playerPool.length)) % Math.max(1, playerPool.length)] || open[0];
    return {
      size,
      walls,
      goals: new Set(goals),
      boxes: normalizeBoxes(boxes),
      player,
      difficultyId: difficulty.id,
      seed: `${difficulty.id}-${level}-${Date.now().toString(36)}-${attempt}`,
      solutionPushes: 0,
      solutionMoves: 0,
    };
  }

  function fallbackPuzzle(difficulty) {
    const size = Math.max(7, difficulty.size);
    const walls = new Set(borderWalls(size));
    const layoutWalls = [idx(2, 2, size), idx(2, 5, size), idx(3, 5, size), idx(4, 2, size), idx(5, 4, size)];
    layoutWalls.forEach(pos => { if (rowOf(pos, size) < size - 1 && colOf(pos, size) < size - 1) walls.add(pos); });
    const goals = new Set([idx(1, size - 2, size), idx(3, size - 2, size), idx(size - 2, size - 3, size), idx(size - 3, 1, size)].slice(0, difficulty.boxes));
    const boxes = normalizeBoxes([idx(1, 3, size), idx(3, 3, size), idx(size - 3, 3, size), idx(size - 2, 2, size)].slice(0, difficulty.boxes));
    const puzzle = { size, walls, goals, boxes, player: idx(size - 2, 1, size), difficultyId: difficulty.id, seed: 'fallback', solutionPushes: 0, solutionMoves: 0 };
    const solution = solvePuzzle(puzzle, difficulty.maxNodes * 2);
    puzzle.solutionPushes = solution.solved ? solution.pushes : difficulty.minPushes;
    puzzle.solutionMoves = solution.solved ? solution.moves : difficulty.minPushes * 2;
    return puzzle;
  }

  function solvePuzzle(puzzle, maxNodes) {
    const startBoxes = normalizeBoxes(puzzle.boxes);
    const startKey = stateKey(puzzle.player, startBoxes);
    const seen = new Set([startKey]);
    const queue = [{ player: puzzle.player, boxes: startBoxes, pushes: 0, moves: 0 }];
    let cursor = 0;
    while (cursor < queue.length && seen.size < maxNodes) {
      const node = queue[cursor++];
      if (isSolvedBoxes(node.boxes, puzzle.goals)) return { solved: true, pushes: node.pushes, moves: node.moves };
      const reachable = reachableCells(node.player, node.boxes, puzzle);
      for (const box of node.boxes) {
        for (const dir of DIRS) {
          const pushFrom = box - dir.dr * puzzle.size - dir.dc;
          const pushedTo = box + dir.dr * puzzle.size + dir.dc;
          if (!reachable.has(pushFrom)) continue;
          if (!isFree(pushedTo, node.boxes, puzzle)) continue;
          const nextBoxes = normalizeBoxes(node.boxes.map(pos => pos === box ? pushedTo : pos));
          if (hasDeadBox(nextBoxes, puzzle)) continue;
          const key = stateKey(box, nextBoxes);
          if (seen.has(key)) continue;
          seen.add(key);
          const walk = reachable.get(pushFrom) || 0;
          queue.push({ player: box, boxes: nextBoxes, pushes: node.pushes + 1, moves: node.moves + walk + 1 });
        }
      }
    }
    return { solved: false, pushes: Infinity, moves: Infinity };
  }

  function reachableCells(player, boxes, puzzle) {
    const boxSet = new Set(boxes);
    const reached = new Map([[player, 0]]);
    const queue = [player];
    let cursor = 0;
    while (cursor < queue.length) {
      const pos = queue[cursor++];
      const distance = reached.get(pos) || 0;
      for (const dir of DIRS) {
        const next = pos + dir.dr * puzzle.size + dir.dc;
        if (reached.has(next) || puzzle.walls.has(next) || boxSet.has(next)) continue;
        reached.set(next, distance + 1);
        queue.push(next);
      }
    }
    return reached;
  }

  function movePlayer(dirKey) {
    if (state.finished || state.generating || !state.board) return;
    const dir = DIRS.find(item => item.key === dirKey);
    if (!dir) return;
    const size = state.board.size;
    const next = state.player + dir.dr * size + dir.dc;
    if (state.walls.has(next)) return;
    const boxIndex = state.boxes.indexOf(next);
    if (boxIndex >= 0) {
      const pushedTo = next + dir.dr * size + dir.dc;
      if (state.walls.has(pushedTo) || state.boxes.includes(pushedTo)) return;
      state.boxes[boxIndex] = pushedTo;
      state.boxes = normalizeBoxes(state.boxes);
      state.pushes += 1;
    }
    state.player = next;
    state.moves += 1;
    updateStats();
    renderBoard();
    if (isSolvedBoxes(state.boxes, state.goals)) winLevel();
  }

  function renderBoard() {
    const board = byId('mhBoard');
    if (!state.board) return;
    const size = state.board.size;
    board.style.setProperty('--size', size);
    board.innerHTML = '';
    const reachable = state.finished ? new Map() : reachableCells(state.player, state.boxes, state.board);
    for (let pos = 0; pos < size * size; pos++) {
      const cell = document.createElement('div');
      const row = rowOf(pos, size);
      const col = colOf(pos, size);
      const tone = (row * 3 + col * 5 + size) % 4;
      const isWall = state.walls.has(pos);
      const isGoal = state.goals.has(pos);
      cell.className = `mh-cell ${isWall ? 'wall' : `floor tone-${tone}`}${isGoal ? ' goal' : ''}${reachable.has(pos) && !isWall ? ' reachable' : ''}`;
      cell.dataset.pos = String(pos);
      const boxHere = state.boxes.includes(pos);
      if (boxHere) cell.appendChild(createBoxElement(isGoal));
      if (state.player === pos) cell.appendChild(createPlayerElement());
      board.appendChild(cell);
    }
  }

  function createBoxElement(done) {
    const el = document.createElement('span');
    el.className = `mh-box${done ? ' done' : ''}`;
    el.innerHTML = createCrateSvg(done);
    return el;
  }

      : { top: '#f7c88f', mid: '#d9863f', low: '#8f451d', rail: '#ffe0b0', railShadow: '#8a3f17', metal: '#d38a45', shine: '#fff1c7' };

          <circle cx="28" cy="50" r="3.3"/><circle cx="72" cy="50" r="3.3"/>
        </g>
        <g fill="#fff7ed" opacity=".55">
          <circle cx="13.8" cy="13.5" r="1.2"/><circle cx="83.8" cy="13.5" r="1.2"/><circle cx="26.9" cy="48.6" r="1"/>

  function createPlayerElement() {
    const el = document.createElement('span');
    el.className = 'mh-player';
    if (state.petAsset?.url) {
      const sprite = document.createElement('span');
      sprite.className = 'sprite';
      sprite.style.backgroundImage = `url("${state.petAsset.url}")`;
      const uv = state.petAsset.uv;
      sprite.style.backgroundSize = uv.cols > 1 || uv.rows > 1 ? `${uv.cols * 100}% ${uv.rows * 100}%` : 'contain';
      sprite.style.backgroundPosition = uv.cols > 1 || uv.rows > 1 ? `${uv.col * 100 / Math.max(1, uv.cols - 1)}% ${uv.row * 100 / Math.max(1, uv.rows - 1)}%` : 'center';
      el.appendChild(sprite);
    } else {
      el.classList.add('fallback-player');
      const fallback = document.createElement('span');
      fallback.className = 'fallback';
      fallback.textContent = FALLBACK_PET;
      el.appendChild(fallback);
    }
    return el;
  }

  function winLevel() {
    state.finished = true;
    clearInterval(state.timer);
    state.bestLevel = Math.max(state.bestLevel, state.level + 1);
    localStorage.setItem(STORAGE_KEY_BEST, String(state.bestLevel));
    const difficulty = DIFFICULTIES[state.difficulty];
    const efficiency = Math.max(0, state.solutionPushes ? state.solutionPushes - state.pushes : 0);
    const earnedPoints = difficulty.reward + state.level * 8 + efficiency * 4;
    byId('mhWinText').textContent = t('winText', { level: state.level, label: difficulty.label, pushes: state.pushes, solution: state.solutionPushes });
    byId('mhWin').hidden = false;
    showToast(t('toastWin'));
    launchConfetti();
    post('gameFinished', {
      earnedPoints,
      score: earnedPoints,
      difficulty: state.difficulty,
      difficultyLabel: difficulty.label,
      level: state.level,
      moves: state.moves,
      pushes: state.pushes,
      solutionPushes: state.solutionPushes,
      seconds: state.seconds,
      finishedAt: Date.now(),
    });
  }

  function updateStats() {
    const difficulty = DIFFICULTIES[state.difficulty] || DIFFICULTIES.normal;
    byId('mhLevel').textContent = String(state.level);
    byId('mhDifficultyLabel').textContent = difficulty.label;
    byId('mhPushes').textContent = String(state.pushes);
    byId('mhMoves').textContent = String(state.moves);
    byId('mhTime').textContent = String(state.seconds);
  }

  function onKeyDown(event) {
    if (byId('mhHowTo').hidden === false || byId('mhWin').hidden === false) return;
    const keyMap = {
      ArrowUp: 'up', w: 'up', W: 'up',
      ArrowRight: 'right', d: 'right', D: 'right',
      ArrowDown: 'down', s: 'down', S: 'down',
      ArrowLeft: 'left', a: 'left', A: 'left',
    };
    const dir = keyMap[event.key];
    if (!dir) return;
    event.preventDefault();
    movePlayer(dir);
  }

  function onPointerDown(event) {
    state.pointer = { x: event.clientX, y: event.clientY };
  }

  function onPointerUp(event) {
    if (!state.pointer) return;
    const dx = event.clientX - state.pointer.x;
    const dy = event.clientY - state.pointer.y;
    state.pointer = null;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) {
      const cell = event.target.closest?.('.mh-cell');
      if (cell?.dataset?.pos) moveToward(Number(cell.dataset.pos));
      return;
    }
    if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 'right' : 'left');
    else movePlayer(dy > 0 ? 'down' : 'up');
  }

  function moveToward(pos) {
    if (!state.board) return;
    const playerRow = rowOf(state.player, state.board.size);
    const playerCol = colOf(state.player, state.board.size);
    const targetRow = rowOf(pos, state.board.size);
    const targetCol = colOf(pos, state.board.size);
    const dr = targetRow - playerRow;
    const dc = targetCol - playerCol;
    if (Math.abs(dr) + Math.abs(dc) !== 1) return;
    if (dr < 0) movePlayer('up');
    else if (dr > 0) movePlayer('down');
    else if (dc < 0) movePlayer('left');
    else if (dc > 0) movePlayer('right');
  }

  function restoreSnapshot(puzzle) {
    state.walls = new Set(puzzle.walls);
    state.goals = new Set(puzzle.goals);
    state.boxes = normalizeBoxes(puzzle.boxes);
    state.player = puzzle.player;
  }

  function showHowTo() {
    byId('mhHowTo').hidden = false;
  }

  function showToast(text) {
    const toast = document.createElement('div');
    toast.className = 'mh-toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1300);
  }

  function launchConfetti() {
    const colors = ['#f97316', '#facc15', '#22c55e', '#38bdf8', '#ec4899', '#8b5cf6'];
    for (let i = 0; i < 44; i++) {
      const piece = document.createElement('span');
      piece.className = 'mh-confetti';
      piece.style.left = `${Math.random() * 100}vw`;
      piece.style.setProperty('--x', `${(Math.random() - .5) * 150}px`);
      piece.style.setProperty('--c', colors[i % colors.length]);
      piece.style.setProperty('--d', `${1.2 + Math.random() * .9}s`);
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 2300);
    }
  }

  function requestPetImage(petId = '') {
    const requestId = `sokoban_pet_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
    state.petRequestId = requestId;
    post('haqi_get_pet_image', { requestId, anim: 'idle', petId: petId || undefined }, { requestId, anim: 'idle', petId: petId || undefined });
    setTimeout(() => {
      if (state.petAsset?.url) return;
      const fallbackId = `sokoban_pets_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
      post('haqi_get_pet_images', { requestId: fallbackId, anim: 'idle' }, { requestId: fallbackId, anim: 'idle' });
    }, 900);
  }

  function setPetImage(pet) {
    if (!pet?.imageBlob || !pet?.uv) return;
    if (state.petAsset?.url) {
      URL.revokeObjectURL(state.petAsset.url);
      state.objectUrls = state.objectUrls.filter(url => url !== state.petAsset.url);
    }
    const url = URL.createObjectURL(pet.imageBlob);
    state.objectUrls.push(url);
    state.petAsset = { url, uv: pet.uv };
    renderBoard();
  }

  function isFree(pos, boxes, puzzle) {
    return pos >= 0 && pos < puzzle.size * puzzle.size && !puzzle.walls.has(pos) && !boxes.includes(pos);
  }

  function isSolvedBoxes(boxes, goals) {
    return boxes.every(pos => goals.has(pos));
  }

  function hasDeadBox(boxes, puzzle) {
    return boxes.some(pos => !puzzle.goals.has(pos) && isSimpleCorner(pos, puzzle.walls, puzzle.size));
  }

  function isSimpleCorner(pos, walls, size) {
    const up = walls.has(pos - size);
    const down = walls.has(pos + size);
    const left = walls.has(pos - 1);
    const right = walls.has(pos + 1);
    return (up || down) && (left || right);
  }

  function largestOpenArea(open, walls, size) {
    const openSet = new Set(open);
    const seen = new Set();
    let largest = 0;
    for (const start of openSet) {
      if (seen.has(start)) continue;
      let count = 0;
      const queue = [start];
      seen.add(start);
      for (let cursor = 0; cursor < queue.length; cursor++) {
        const pos = queue[cursor];
        count++;
        for (const dir of DIRS) {
          const next = pos + dir.dr * size + dir.dc;
          if (seen.has(next) || walls.has(next) || !openSet.has(next)) continue;
          seen.add(next);
          queue.push(next);
        }
      }
      largest = Math.max(largest, count);
    }
    return largest;
  }

  function innerCells(size) {
    const cells = [];
    for (let r = 1; r < size - 1; r++) {
      for (let c = 1; c < size - 1; c++) cells.push(idx(r, c, size));
    }
    return cells;
  }

  function borderWalls(size) {
    const cells = [];
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (r === 0 || c === 0 || r === size - 1 || c === size - 1) cells.push(idx(r, c, size));
      }
    }
    return cells;
  }

  function normalizeBoxes(boxes) {
    return [...boxes].sort((a, b) => a - b);
  }

  function stateKey(player, boxes) {
    return `${player}|${boxes.join(',')}`;
  }

  function normalizeDifficulty(value) {
    return DIFFICULTIES[value] ? value : 'normal';
  }

  function nearBorder(pos, size) {
    const r = rowOf(pos, size);
    const c = colOf(pos, size);
    return r === 1 || c === 1 || r === size - 2 || c === size - 2;
  }

  function manhattan(a, b, size) {
    return Math.abs(rowOf(a, size) - rowOf(b, size)) + Math.abs(colOf(a, size) - colOf(b, size));
  }

  function rowOf(pos, size) { return Math.floor(pos / size); }
  function colOf(pos, size) { return pos % size; }
  function idx(row, col, size) { return row * size + col; }

  function shuffle(items) {
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
    return items;
  }

  function post(type, data = {}, extra = {}) {
    try {
      window.parent.postMessage({ type, data, ...extra }, '*');
    } catch (_) {}
  }

  function byId(id) {
    return document.getElementById(id);
  }

  window.addEventListener('beforeunload', () => {
    clearInterval(state.timer);
    state.objectUrls.forEach(url => URL.revokeObjectURL(url));
  });

  boot();
})();
</script>
