<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>哈奇个人宠物积分 · 演示版</title>
  <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply m-0 min-h-screen bg-orange-50 text-slate-800; }
      button { @apply min-h-10 rounded-xl border border-orange-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-orange-300 hover:bg-orange-50 active:translate-y-0 disabled:cursor-not-allowed disabled:opacity-50; }
      button.primary { @apply border-orange-500 bg-orange-500 text-white hover:border-orange-600 hover:bg-orange-600; }
      button.selected { @apply border-orange-500 bg-orange-100 text-orange-800 ring-2 ring-orange-300; }
      input, select { @apply min-h-10 rounded-xl border border-orange-200 bg-white px-3 text-sm outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200; }
    }
    @layer components {
      .card { @apply rounded-3xl border border-orange-100 bg-white p-4 shadow-lg shadow-orange-100/50; }
      .pet-stage { @apply relative min-h-[315px] overflow-hidden rounded-[2rem] border border-orange-100 bg-gradient-to-b from-sky-100 via-amber-50 to-lime-100; }
      .pet-sprite { @apply absolute left-1/2 top-[56%] h-44 w-44 -translate-x-1/2 -translate-y-1/2 bg-no-repeat; background-size: 400% 400%; image-rendering: auto; filter: drop-shadow(0 18px 12px rgb(120 53 15 / .22)); }
      .pet-sprite.growth-2 { filter: drop-shadow(0 18px 14px rgb(120 53 15 / .28)) saturate(1.08); }
      .pet-sprite.growth-3 { filter: drop-shadow(0 18px 18px rgb(245 158 11 / .48)) saturate(1.18) brightness(1.04); }
      .pet-sprite.growth-4 { filter: drop-shadow(0 18px 22px rgb(168 85 247 / .58)) saturate(1.28) brightness(1.08); }
      .pet-sprite.idle { animation: pet-bob 2.2s ease-in-out infinite; }
      .pet-sprite.happy { animation: pet-happy .48s ease-in-out 4; }
      .pet-sprite.cry { animation: pet-cry .65s ease-in-out 4; }
      .pet-sprite.feed { animation: pet-feed .75s ease-in-out 3; }
      .pet-sprite.play { animation: pet-play .42s ease-in-out 5; }
      .pet-sprite.pet { animation: pet-pet .55s ease-in-out 4; }
      .pet-sprite.celebrate { animation: pet-celebrate .52s cubic-bezier(.2,.8,.3,1) 4; }
      .pet-sprite.cheer { animation: pet-cheer .42s ease-in-out 5; }
      .pet-sprite.sad { animation: pet-sad .72s ease-in-out 3; }
      .pet-sprite.dizzy { animation: pet-dizzy .85s ease-in-out 3; }
      .pet-sprite.sleep { animation: pet-sleep 1.8s ease-in-out infinite; }
      .pet-effect { @apply pointer-events-none absolute left-1/2 top-[54%] z-10 -translate-x-1/2 -translate-y-1/2 text-3xl; animation: pet-effect 1.7s ease-out both; }
      .pet-effect.positive { filter: drop-shadow(0 2px 3px rgb(244 63 94 / .35)); }
      .pet-effect.negative { filter: drop-shadow(0 2px 3px rgb(59 130 246 / .35)); }
      .speech { @apply absolute left-1/2 top-6 z-20 max-w-[78%] -translate-x-1/2 rounded-2xl bg-white/90 px-3 py-1.5 text-center text-xs font-bold text-orange-900 shadow-md; }
      .speech::after { content: ''; @apply absolute bottom-[-8px] left-1/2 h-4 w-4 -translate-x-1/2 rotate-45 bg-white/90; }
      .cloud { @apply absolute rounded-full bg-white/75 blur-[1px]; animation: cloud-drift 14s linear infinite; }
      .student-card { @apply w-full rounded-2xl border p-3 text-left transition hover:-translate-y-0.5; }
      .student-card.active { @apply border-orange-400 bg-orange-50 ring-2 ring-orange-200; }
      .progress { @apply block h-4 w-full overflow-hidden rounded-full bg-orange-100; }
      .progress > span { @apply block h-full rounded-full bg-gradient-to-r from-orange-400 to-amber-400 transition-all duration-500; }
      .pet-choice { @apply relative min-h-[110px] overflow-hidden rounded-2xl border border-orange-100 bg-orange-50 p-2 text-left; }
      .pet-choice.selected { @apply border-orange-500 bg-orange-100 ring-2 ring-orange-300; }
      .pet-picker-card { @apply relative flex min-h-[172px] flex-col overflow-hidden rounded-2xl border border-sky-100 bg-white p-0 text-left shadow-sm hover:border-sky-300 hover:shadow-md; }
      .pet-picker-card.selected { @apply border-orange-500 ring-2 ring-orange-300; }
      .pet-picker-portrait { @apply relative flex min-h-0 flex-1 items-center justify-center overflow-hidden bg-gradient-to-b from-sky-50 to-amber-50; }
      #petPickerScreen:not(.hidden) { display: flex; align-items: center; justify-content: center; }
      #petPickerScreen > div { width: min(1120px, 100%); height: min(86dvh, 820px); margin: 0; }
      .pet-mini { @apply mx-auto h-16 w-16 bg-no-repeat; background-size: 400% 400%; }
      .pet-mini.growth-3 { filter: drop-shadow(0 4px 4px rgb(245 158 11 / .38)) saturate(1.12); }
      .pet-mini.growth-4 { filter: drop-shadow(0 4px 6px rgb(168 85 247 / .5)) saturate(1.22) brightness(1.05); }
    }
    @keyframes pet-bob { 0%,100% { transform: translate(-50%, -50%) translateY(0) rotate(-1deg); } 50% { transform: translate(-50%, -50%) translateY(-12px) rotate(1deg); } }
    @keyframes pet-happy { 0%,100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) translateY(-22px) scale(1.12) rotate(7deg); } }
    @keyframes pet-cry { 0%,100% { transform: translate(-50%, -50%) translateX(0) rotate(0); } 25% { transform: translate(-50%, -50%) translateX(-10px) rotate(-5deg); } 75% { transform: translate(-50%, -50%) translateX(10px) rotate(5deg); } }
    @keyframes pet-feed { 0%,100% { transform: translate(-50%, -50%) scale(1); } 45% { transform: translate(-50%, -50%) scale(.88,1.16); } 75% { transform: translate(-50%, -50%) scale(1.08,.94); } }
    @keyframes pet-play { 0%,100% { transform: translate(-50%, -50%) translateX(0) rotate(0); } 25% { transform: translate(-50%, -50%) translateX(-34px) rotate(-10deg); } 75% { transform: translate(-50%, -50%) translateX(34px) rotate(10deg); } }
    @keyframes pet-pet { 0%,100% { transform: translate(-50%, -50%) rotate(0) scale(1); } 35% { transform: translate(-50%, -50%) translateY(-10px) rotate(-9deg) scale(1.08); } 70% { transform: translate(-50%, -50%) rotate(7deg) scale(1.04); } }
    @keyframes pet-celebrate { 0%,100% { transform: translate(-50%, -50%) scale(1) rotate(0); } 35% { transform: translate(-50%, -50%) translateY(-34px) scale(1.18) rotate(-10deg); } 65% { transform: translate(-50%, -50%) translateY(-12px) scale(1.1) rotate(10deg); } }
    @keyframes pet-cheer { 0%,100% { transform: translate(-50%, -50%) rotate(0); } 25% { transform: translate(-50%, -50%) translateX(-20px) rotate(-14deg); } 75% { transform: translate(-50%, -50%) translateX(20px) rotate(14deg); } }
    @keyframes pet-sad { 0%,100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) translateY(16px) scale(.9,.82) rotate(-5deg); } }
    @keyframes pet-dizzy { 0% { transform: translate(-50%, -50%) rotate(0) scale(1); } 50% { transform: translate(-50%, -50%) rotate(360deg) scale(.88); } 100% { transform: translate(-50%, -50%) rotate(720deg) scale(1); } }
    @keyframes pet-effect { 0% { opacity: 0; transform: translate(-50%, -20%) scale(.45) rotate(-12deg); } 25% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -180%) scale(1.35) rotate(12deg); } }
    @keyframes pet-sleep { 0%,100% { transform: translate(-50%, -50%) translateY(2px); opacity: .83; } 50% { transform: translate(-50%, -50%) translateY(12px); opacity: 1; } }
    @keyframes cloud-drift { from { transform: translateX(-80px); } to { transform: translateX(520px); } }
    @media (max-width: 640px) {
      button { min-height: 44px; }
      #pageContent { padding: 10px; }
      #pageContent > header { margin-bottom: 10px; padding: 14px; border-radius: 8px; }
      #pageContent > header > div:first-child > p:first-child,
      #pageContent > header > div:first-child > p:last-child { display: none; }
      #pageContent > header h1 { font-size: 20px; }
      #pageContent > header > div:last-child { width: 100%; justify-content: space-between; }
      #pageContent > header button { min-height: 44px; padding-inline: 10px; font-size: 12px; }
      #roleSwitch { flex: 1; justify-content: stretch; }
      #roleSwitch button { flex: 1; }
      #app { gap: 10px; }
      .card { padding: 12px; border-radius: 8px; box-shadow: 0 6px 18px rgb(251 146 60 / .12); }
      .pet-stage { min-height: 270px; border-radius: 8px; }
      .pet-sprite { width: 150px; height: 150px; }
      .speech { top: 10px; max-width: 88%; }
      #studentFormScreen { padding: env(safe-area-inset-top) 0 0; }
      #studentFormScreen > div { min-height: 78dvh; margin-top: 22dvh; max-width: none; border-radius: 8px 8px 0 0; padding: 18px 18px max(18px, env(safe-area-inset-bottom)); }
      #studentFormScreen [data-action="close-student-form"],
      #petPickerScreen [data-action="close-pet-picker"] { min-width: 44px; min-height: 44px; }
      #petPickerScreen { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
      #petPickerScreen > div { height: 100%; border-radius: 0; }
      #readonlyScreen { padding: max(6px, env(safe-area-inset-top)) 6px max(6px, env(safe-area-inset-bottom)); }
      #readonlyScreen [data-action="close-readonly"],
      #readonlyScreen [data-action="readonly-prev"],
      #readonlyScreen [data-action="readonly-next"] { min-height: 44px; }
    }
  </style>
</head>

  <script>
    (async () => {
      const STORAGE_KEY = 'MagicHaqi.personalPetPoints.demo.v1';
      const CLASS_CONFIG_KEY = 'MagicHaqi.personalPetPoints.classConfig.v1';
      try { Object.assign(game_config, JSON.parse(localStorage.getItem(CLASS_CONFIG_KEY)) || {}); } catch (_) { /* 使用默认班级配置 */ }
      function classLabel() {
        const grade = String(game_config.grade || '').trim();
        const classNumber = String(game_config.classNumber || '').trim();
        return grade && classNumber ? `${grade}${classNumber}班` : String(game_config.className || '未设置班级');
      }
      game_config.className = classLabel();
      // 离线回退清单；启动时优先读取 famous-pets/_pet_index.json。
      const fallbackPets = [
        { id: 'dragon1', name: '阿凡紫', species: '蜜糖蜜蜂', color: '薄荷绿', rarity: 64, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/dragon1_20260525031133.webp' },
        { id: 'milk_moo_bubu', name: '奶沫哞布布', species: '奶糖小牛兽', color: '奶白焦糖', rarity: 88, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/milk_moo_bubu_20260523165501.webp' },
        { id: 'star_horse_nuomi', name: '糯糯星马', species: '星鬃小马驹', color: '薰衣草紫', rarity: 91, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/star_horse_nuomi_20260524120457.webp' },
        { id: 'flame_puppy_doudou', name: '豆豆火汪', species: '棉花糖小狗', color: '橘色奶油白', rarity: 86, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/flame_puppy_doudou_20260524132225.webp' },
        { id: 'zodiac_rabbit_ruanruan', name: '软软月兔', species: '月绒兔耳鸟', color: '月光银白', rarity: 91, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_rabbit_ruanruan_20260524132501.webp' },
        { id: 'zodiac_dragon_bobo', name: '波波小龙', species: '祥云泡泡龙', color: '彩虹渐变', rarity: 98, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_dragon_bobo_20260524132332.webp' },
        { id: 'zodiac_rat_mimi', name: '米米鼠团', species: '灵穗小鼠', color: '珍珠白', rarity: 88, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_rat_mimi_20260524154201.webp' },
        { id: 'zodiac_ox_nainai', name: '奶奶哞哞', species: '福角小牛', color: '奶茶棕', rarity: 89, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_ox_nainai_20260524133030.webp' },
        { id: 'zodiac_tiger_tangtang', name: '糖糖虎爪', species: '焰纹奶虎', color: '橘金色', rarity: 92, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_tiger_tangtang_20260524161411.webp' },
        { id: 'zodiac_snake_youyou', name: '悠悠团蛇', species: '玉环小蛇', color: '翡翠青绿', rarity: 90, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_snake_youyou_20260524163751.webp' },
        { id: 'zodiac_horse_dudu', name: '嘟嘟云马', species: '风鬃小马', color: '奶油杏色', rarity: 93, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_horse_dudu_20260524124614.webp' },
        { id: 'zodiac_goat_mianmian', name: '绵绵咩咩', species: '云绒小羊', color: '棉花糖白', rarity: 87, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_goat_mianmian_20260524124724.webp' },
        { id: 'zodiac_monkey_qiqi', name: '奇奇桃猴', species: '桃叶灵猴', color: '焦糖金棕', rarity: 91, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_monkey_qiqi_20260528041713.webp' },
        { id: 'zodiac_rooster_jiji', name: '叽叽彩冠', species: '朝霞小鸡', color: '玫瑰红渐变金黄', rarity: 89, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_rooster_jiji_20260524152704.webp' },
        { id: 'zodiac_dog_wangwang', name: '汪汪福豆', species: '福豆小犬', color: '芝麻奶黄', rarity: 88, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_dog_wangwang_20260524132956.webp' },
        { id: 'zodiac_pig_lulu', name: '噜噜元宝', species: '元宝小猪', color: '樱花粉', rarity: 90, url: 'https://cdn.keepwork.com/maisi/magichaqi/pet/zodiac_pig_lulu_20260524161535.webp' }
      ];
      let pets = fallbackPets;
      try {
        const response = await fetch('../famous-pets/_pet_index.json');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const petIndex = await response.json();
        const indexedPets = Array.isArray(petIndex) ? petIndex.filter(pet => pet?.id && pet?.name && pet?.imageSheetUrl).map(pet => ({
          id: pet.id,

          clearInterval(pendingAwardRetryTimer);
          pendingAwardRetryTimer = setInterval(publishPendingAwards, 60 * 1000);
          clearInterval(schoolReceiptRefreshTimer);
          refreshVisibleSchoolReceipts();
          schoolReceiptRefreshTimer = setInterval(refreshVisibleSchoolReceipts, 45 * 1000);
        }
      }
      async function loginWithKeepwork() {
        keepworkLoginButton.disabled = true;
        loginGateHint.textContent = '正在连接 KeepWork 登录服务…';
        try {
          const sdk = await getKeepworkSdk();
          let user = await ensureKeepworkLogin(sdk);
          if (loginRole === 'student') {
            loginGateHint.textContent = '正在校验学生绑定并读取个人档案…';
            const boundStudent = await loadBoundStudent(user);
            window.studentSessionSnapshot ||= {
              students: state.students,
              selectedStudentId: state.selectedStudentId,
              role: state.role
            };
            state.students = [boundStudent];
            state.selectedStudentId = boundStudent.id;
            state.role = 'student';
          }
          enterAfterLogin(user, sdk);
        } catch (error) {
          loginGateHint.textContent = error?.message || '登录失败，请重试。';
          keepworkLoginButton.disabled = false;
        }
      }
      async function restoreKeepworkSession() {
        const savedLogin = (() => { try { return JSON.parse(localStorage.getItem(LOGIN_STATE_KEY)); } catch (_) { return null; } })();
        if (!savedLogin?.active) return;
        if (savedLogin.role === 'student') {
          localStorage.removeItem(LOGIN_STATE_KEY);
          loginRole = 'student';
          loginGateHint.textContent = '请使用教师提供的学生登录链接，并通过 KeepWork 账号验证。';
          updateLoginRoleButtons();
          return;
        }
        loginRole = savedLogin.role === 'student' ? 'student' : 'teacher';
        updateLoginRoleButtons();
        enterAfterLogin({ username: savedLogin.username || 'KeepWork 用户' });
      }
      async function bootstrapKeepworkSession() {
        await restoreKeepworkSession();
        if (!loginGate.classList.contains('hidden')) {
          const urlToken = new URL(location.href).searchParams.get('token');
          const savedToken = localStorage.getItem(AUTH_TOKEN_KEY);
          if (urlToken || savedToken) {
            keepworkLoginButton.disabled = true;
            loginGateHint.textContent = '正在验证 KeepWork 登录状态…';
            try {
              const sdk = await getKeepworkSdk();
              const user = await ensureKeepworkLogin(sdk);
              enterAfterLogin(user, sdk);
            } catch (error) {
              loginGateHint.textContent = error?.message || '登录失败，请重试。';
              keepworkLoginButton.disabled = false;
            }
          }
        }
      }
      document.querySelectorAll('[data-login-role]').forEach(button => {
        button.addEventListener('click', () => {
          loginRole = button.dataset.loginRole === 'student' ? 'student' : 'teacher';
          loginGateHint.textContent = loginRole === 'student' ? '学生登录后仅可访问学生查看板块。' : '教师登录后可管理班级、学生与积分。';
          updateLoginRoleButtons();
        });
      });
      keepworkLoginButton.addEventListener('click', loginWithKeepwork);
      updateLoginRoleButtons();
      bootstrapKeepworkSession().catch(() => {});
      updateRestingPets();
      setInterval(updateRestingPets, 60 * 1000);
      window.parent?.postMessage({ type: 'gameLoaded', data: { id: 'haqi_personal_pet_points' } }, '*');
    })();
  </script>
</body>
</html>
