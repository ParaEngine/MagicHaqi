<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>一颗蛋降落在你的夜晚</title>
  <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* 与主游戏 zoom-space 层一致的宇宙渐变背景（见 css/planet.css） */
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background:
        radial-gradient(ellipse at 77% 62%, rgba(40, 190, 255, 0.18) 0%, transparent 34%),
        radial-gradient(ellipse at 24% 18%, rgba(179, 92, 255, 0.24) 0%, transparent 30%),
        radial-gradient(ellipse at 42% 78%, rgba(255, 184, 91, 0.10) 0%, transparent 28%),
        radial-gradient(ellipse at 50% 40%, #1a1e63 0%, #0a1137 48%, #020617 100%);
      background-attachment: fixed;
    }

    /* ---- nebula glow layer (mirrors .space-bg::before) ---- */
    #nebula {
      position: fixed; inset: -18%; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 22% 38%, rgba(77, 221, 255, 0.20), transparent 32%),
        radial-gradient(ellipse at 62% 18%, rgba(255, 222, 138, 0.14), transparent 26%),
        radial-gradient(ellipse at 78% 74%, rgba(168, 112, 255, 0.22), transparent 34%),
        radial-gradient(ellipse at 42% 58%, rgba(35, 252, 184, 0.08), transparent 30%);
      filter: blur(14px);
      animation: nebulaDrift 24s ease-in-out infinite alternate;
    }
    @keyframes nebulaDrift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(2%, -2%) scale(1.05); }
    }

    /* ---- star field ---- */
    #starfield { position: fixed; inset: 0; z-index: 1; }
    /* 星点配色与主游戏一致：白 / 金(hue44) / 青(hue190)，叠加 lighter 发光 */
    .star { position: absolute; border-radius: 50%; mix-blend-mode: lighter; animation: twinkle var(--dur) ease-in-out infinite alternate; }
    @keyframes twinkle { 0% { opacity: var(--o1); transform: scale(1); } 100% { opacity: var(--o2); transform: scale(1.35); } }

    /* ---- floating egg ---- */
    .egg-float { animation: eggFloat 3s ease-in-out infinite; }
    @keyframes eggFloat { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-18px) rotate(2deg); } }

    .egg-wobble { animation: eggWobble 0.5s ease-in-out; }
    @keyframes eggWobble { 0% { transform: rotate(0); } 20% { transform: rotate(-12deg); } 40% { transform: rotate(10deg); } 60% { transform: rotate(-6deg); } 80% { transform: rotate(4deg); } 100% { transform: rotate(0); } }

    .egg-glow { filter: drop-shadow(0 0 24px rgba(255,220,150,0.6)); }

    /* ---- 星球缓慢自转：仅旋转陆地纹理层（高光/阴影固定不动）---- */
    .mh-planet-spin { animation: mhPlanetSpin 48s linear infinite; }
    @keyframes mhPlanetSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ---- 转场：蛋变小、身后星球变大（一小一大，同时进行）---- */
    .push-layer {
      position: absolute; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; pointer-events: none;
    }
    .push-from, .push-to {
      position: absolute; left: 50%; top: 50%;
      display: flex; align-items: center; justify-content: center;
      will-change: transform, opacity;
    }
    /* FROM = 前景的蛋：由正常大小逐渐缩小，露出身后的星球。停在前面（z 更高）。 */
    .push-from {
      z-index: 2;
      transform: translate(-50%, -50%) scale(1);
      animation: pushFromShrink var(--push-dur, 2s) cubic-bezier(.4, 0, .25, 1) forwards;
    }
    @keyframes pushFromShrink {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(var(--push-from-end, 0.18)); opacity: 0; }
    }
    /* TO = 蛋身后的星球：由很小逐渐变大，到正常大小。在后面（z 更低）。 */
    .push-to {
      z-index: 1;
      transform: translate(-50%, -50%) scale(var(--push-to-start, 0.1));
      opacity: 0;
      animation: pushToGrow var(--push-dur, 2s) cubic-bezier(.22, .6, .25, 1) forwards;
    }
    @keyframes pushToGrow {
      0%   { transform: translate(-50%, -50%) scale(var(--push-to-start, 0.1)); opacity: 0; }
      25%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    /* 转场后新场景主体从小放大入场，承接"星球继续变大"的惯性。 */
    @keyframes pushArrive {
      0%   { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    /* 镜头落定后，UI 面板从底部飞入；离场时飞出底部。不重建视觉。 */
    .push-ui-panel {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 5;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 24px 7%;
      gap: 10px;
      opacity: 0;
      transform: translateY(120%);
      transition: opacity 0.45s ease, transform 0.55s cubic-bezier(.22,1,.36,1);
    }
    .push-ui-panel.is-in { opacity: 1; transform: translateY(0); }

    /* ---- hatch animation ---- */
    .hatch-crack { animation: hatchShake 0.8s ease-in-out; }
    @keyframes hatchShake {
      0% { transform: rotate(0) scale(1); } 15% { transform: rotate(-8deg) scale(1.02); }
      30% { transform: rotate(6deg) scale(1.04); } 45% { transform: rotate(-4deg) scale(1.06); }
      60% { transform: rotate(3deg) scale(1.08); } 75% { transform: rotate(-2deg) scale(1.05); }
      100% { transform: rotate(0) scale(1); }
    }

    .hatch-burst { animation: hatchBurst 1.2s ease-out forwards; }
    @keyframes hatchBurst {
      0% { transform: scale(1); opacity: 1; filter: brightness(1); }
      40% { transform: scale(1.3); opacity: 1; filter: brightness(2.5); }
      100% { transform: scale(0.2); opacity: 0; filter: brightness(4); }
    }

    .pet-appear { animation: petAppear 1s ease-out forwards; }
    @keyframes petAppear {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; filter: brightness(3); }
      60% { transform: scale(1.15) rotate(3deg); opacity: 1; filter: brightness(1.5); }
      100% { transform: scale(1) rotate(0); opacity: 1; filter: brightness(1); }
    }

    /* ---- scene transitions ---- */
    .scene-enter { animation: sceneIn 0.8s ease-out forwards; }
    @keyframes sceneIn { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

    .scene-exit { animation: sceneOut 0.5s ease-in forwards; }
    @keyframes sceneOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }

    /* ---- typewriter cursor ---- */
    .typewriter-cursor::after { content: '▍'; animation: blink 0.8s step-end infinite; color: rgba(255,220,150,0.8); }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* ---- option buttons ---- */
    .opt-btn {
      transition: all 0.3s ease;
      border: 1.5px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
    }
    .opt-btn:hover, .opt-btn:active {
      border-color: rgba(255,220,150,0.6);
      background: rgba(255,220,150,0.12) !important;
      transform: scale(1.04);
      box-shadow: 0 0 20px rgba(255,220,150,0.2);
    }
    .opt-btn.selected {
      border-color: rgba(255,220,150,0.8);
      background: rgba(255,220,150,0.18) !important;
      box-shadow: 0 0 24px rgba(255,220,150,0.3);
    }

    /* ---- input ---- */
    .planet-input {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,220,150,0.3);
      color: #ffdc96;
      caret-color: #ffdc96;
      outline: none;
      transition: all 0.3s;
    }
    .planet-input:focus {
      border-color: rgba(255,220,150,0.7);
      box-shadow: 0 0 20px rgba(255,220,150,0.15);
    }
    .planet-input::placeholder { color: rgba(255,220,150,0.3); }

    /* ---- confirm button ---- */
    .confirm-btn {
      background: linear-gradient(135deg, rgba(255,220,150,0.25), rgba(255,180,100,0.2));
      border: 1.5px solid rgba(255,220,150,0.5);
      color: #ffdc96;
      transition: all 0.3s;
    }
    .confirm-btn:hover, .confirm-btn:active {
      background: linear-gradient(135deg, rgba(255,220,150,0.4), rgba(255,180,100,0.35));
      box-shadow: 0 0 24px rgba(255,220,150,0.3);
      transform: scale(1.03);
    }
    .confirm-btn:disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    /* ---- touch ripple ---- */
    .touch-ripple {
      position: absolute; border-radius: 50%;
      border: 2px solid rgba(255,220,150,0.6);
      animation: rippleOut 1s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleOut {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 200px; height: 200px; opacity: 0; margin-left: -100px; margin-top: -100px; }
    }

    /* ---- warmth glow on touch ---- */
    .warmth-glow {
      animation: warmthPulse 1.5s ease-in-out;
    }
    @keyframes warmthPulse {
      0% { filter: drop-shadow(0 0 12px rgba(255,180,100,0.3)); }
      50% { filter: drop-shadow(0 0 40px rgba(255,180,100,0.8)); }
      100% { filter: drop-shadow(0 0 20px rgba(255,180,100,0.5)); }
    }

    /* ---- DNA helix ---- */
    .dna-strand { animation: dnaRotate 4s linear infinite; }
    @keyframes dnaRotate { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }

    /* ---- memorial card：底色取自主游戏宇宙渐变（#1a1e63 / #0a1137 / #020617） ---- */
    .card-shimmer {
      background:
        radial-gradient(ellipse at 22% 16%, rgba(168, 112, 255, 0.18), transparent 40%),
        radial-gradient(ellipse at 80% 84%, rgba(77, 221, 255, 0.14), transparent 42%),
        linear-gradient(135deg, #1a1e63 0%, #0a1137 45%, #14163f 60%, #0a1137 100%);
      background-size: 100% 100%, 100% 100%, 200% 200%;
      animation: shimmer 7s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { background-position: 0% 0%, 100% 100%, 0% 50%; }
      50% { background-position: 0% 0%, 100% 100%, 100% 50%; }
    }

    /* ---- particles ---- */
    .particle {
      position: absolute; border-radius: 50%; pointer-events: none;
      animation: particleFly var(--pdur) ease-out forwards;
    }
    @keyframes particleFly {
      0% { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
    }

    /* ---- progress dots ---- */
    .progress-dot { transition: all 0.4s ease; }
    .progress-dot.active { background: rgba(255,220,150,0.9); box-shadow: 0 0 8px rgba(255,220,150,0.5); }
    .progress-dot.done { background: rgba(255,220,150,0.4); }

    /* ---- scrollbar hide ---- */
    ::-webkit-scrollbar { display: none; }

    /* ---- food bounce ---- */
    .food-bounce { animation: foodBounce 0.6s ease-out; }
    @keyframes foodBounce {
      0% { transform: scale(0.5) translateY(20px); opacity: 0; }
      60% { transform: scale(1.15) translateY(-8px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .food-absorb { animation: foodAbsorb 0.8s ease-in forwards; }
    @keyframes foodAbsorb {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.6) translateY(-30px); opacity: 0.6; }
      100% { transform: scale(0) translateY(-60px); opacity: 0; }
    }
  </style>
</head>

<body>

  <div id="nebula"></div>
  <!-- star field background -->
  <div id="starfield"></div>

  <!-- progress dots -->
  <div id="progressBar" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex gap-2 items-center" style="display:none;">
    <div class="progress-dot w-2 h-2 rounded-full bg-white/20" data-scene="1"></div>
    <div class="progress-dot w-2 h-2 rounded-full bg-white/20" data-scene="2"></div>
    <div class="progress-dot w-2 h-2 rounded-full bg-white/20" data-scene="3"></div>

</body>

  // ======== 宇宙氛围音乐（Web Audio 程序化合成，无需外部文件）========
  // 风格：没有任何持续底噪 —— 只有偶尔、极轻的钟铃音，像从遥远星辰传来的回声。
  // 浏览器要求用户手势后才能播放音频，因此在首次点击（蛋）时启动。
  const Music = (function () {
    let ctx = null;          // AudioContext
    let master = null;       // 总输出增益
    let echoSend = null;     // 远星回声（延迟）发送节点
    let started = false;     // 是否已启动
    let echoTimer = null;    // 星辰回声定时器
    let muted = false;

    // MIDI 音高 → 频率（A4 = 69 = 440Hz）。
    function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

    // 确保 AudioContext 存在并已 resume（须在用户手势后调用）。
    function ensureCtx() {
      if (!ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctx = new AC();
        master = ctx.createGain();
        // 整体很安静：作为"遥远"的回声，总音量压低。
        master.gain.value = muted ? 0 : 0.0001;
        master.connect(ctx.destination);
        const now = ctx.currentTime;
        master.gain.cancelScheduledValues(now);
        master.gain.setValueAtTime(master.gain.value, now);
        master.gain.linearRampToValueAtTime(muted ? 0 : 0.32, now + 2.5);

        // ---- 远星回声：长延迟 + 反馈 + 低通，让每个音像在虚空里反复回荡后渐隐 ----
        echoSend = ctx.createGain();
        echoSend.gain.value = 1;
        const delay = ctx.createDelay(2.0);
        delay.delayTime.value = 0.42;
        const fb = ctx.createGain();
        fb.gain.value = 0.55;                 // 多次回声逐渐衰减
        const echoLP = ctx.createBiquadFilter();
        echoLP.type = 'lowpass';
        echoLP.frequency.value = 1800;        // 回声越远越闷
        echoSend.connect(delay);
        delay.connect(echoLP);
        echoLP.connect(fb);
        fb.connect(delay);                    // 反馈回路
        echoLP.connect(master);               // 回声进入总线
      }
      if (ctx.state === 'suspended') { ctx.resume().catch(() => {}); }
      return ctx;
    }

    // ---- 一颗远星的回声：极轻的纯正弦钟音，缓起、长衰减，并送入回声延迟 ----
    // 五声音阶，偏高音区，听起来纤细、遥远。
    const PENTA = [72, 74, 76, 79, 81, 84, 86, 88];
    function star(midi, when, vel) {
      if (!ctx) return;
      const t0 = when != null ? when : ctx.currentTime;
      const osc = ctx.createOscillator();
      osc.type = 'sine';                       // 纯净，无谐波杂音
      osc.frequency.value = midiToFreq(midi);

      const g = ctx.createGain();
      const peak = (vel != null ? vel : 0.05); // 很轻
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(peak, t0 + 0.08);            // 柔和淡入
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 3.6);      // 很长的余韵

      osc.connect(g);
      g.connect(master);                       // 直达声（很轻）
      if (echoSend) g.connect(echoSend);       // 同时送入远星回声

      osc.start(t0);
      osc.stop(t0 + 3.8);
    }

    // 偶尔、随机地点亮一颗远星回声 —— 间隔很长、很稀疏，毫不喧闹。
    function scheduleEchoes() {
      if (echoTimer) clearTimeout(echoTimer);
      function step() {
        if (ctx && !muted && Math.random() < 0.85) {
          const midi = PENTA[Math.floor(Math.random() * PENTA.length)];
          star(midi, ctx.currentTime, 0.035 + Math.random() * 0.03);
        }
        // 4 ~ 9 秒才有一声，像偶尔传来的遥远信号。
        echoTimer = setTimeout(step, 4000 + Math.random() * 5000);
      }
      echoTimer = setTimeout(step, 2500 + Math.random() * 2500);
    }

    // 公开：启动（首次用户手势调用）。无持续底噪，仅开始稀疏的星辰回声。
    function start() {
      if (started) { ensureCtx(); return; }
      if (!ensureCtx()) return;
      started = true;
      scheduleEchoes();
    }

    // 公开：UI 飞入时——两三声很轻的远星回声，似有若无。
    function flyIn() {
      if (!ensureCtx() || muted) return;
      const base = ctx.currentTime + 0.02;
      const notes = [79, 84, 88]; // 高音区上行，纤细
      notes.forEach((m, i) => star(m, base + i * 0.16, 0.05 - i * 0.01));
    }

    // 公开：破壳 / 庆祝——稍密一点的远星回声，但依旧轻柔。
    function sparkle() {
      if (!ensureCtx() || muted) return;
      const base = ctx.currentTime + 0.02;
      const notes = [76, 81, 84, 88, 91];
      notes.forEach((m, i) => star(m, base + i * 0.12, 0.055 - i * 0.008));
    }

    // ---- 点击专用回声：与氛围星音不同——更清脆、更短促的"水滴/信号"声，带快速下滑音 ----
    function clickBlip(rootMidi, vel) {
      if (!ctx) return;
      const t0 = ctx.currentTime + 0.005;
      const osc = ctx.createOscillator();
      osc.type = 'triangle';                   // 比纯正弦更有"质感"，区别于氛围星音
      const f0 = midiToFreq(rootMidi);
      osc.frequency.setValueAtTime(f0 * 1.5, t0);            // 起音偏高
      osc.frequency.exponentialRampToValueAtTime(f0, t0 + 0.12); // 快速下滑，像一颗信号落定

      const g = ctx.createGain();
      const peak = (vel != null ? vel : 0.09);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(peak, t0 + 0.012);      // 干脆的起音
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.9); // 短促衰减（比星音短得多）

      osc.connect(g);
      g.connect(master);                       // 直达声更清晰
      if (echoSend) g.connect(echoSend);       // 仍送入回声，余韵飘向远方

      osc.start(t0);
      osc.stop(t0 + 1.0);
    }

    // 公开：点击蛋的回声（较低、较实，"咚—"带回响）。
    function clickEgg() {
      if (!ensureCtx() || muted) return;
      clickBlip(67, 0.11);     // G4 左右
    }

    // 公开：点击按钮 / 选项的回声（较高、轻快，"叮—"带回响）。
    function clickButton() {
      if (!ensureCtx() || muted) return;
      clickBlip(74 + Math.floor(Math.random() * 4), 0.08); // 高音区轻微随机，避免单调
    }

    function setMuted(v) {
      muted = !!v;
      if (master && ctx) {
        const now = ctx.currentTime;
        master.gain.cancelScheduledValues(now);
        master.gain.setValueAtTime(master.gain.value, now);
        master.gain.linearRampToValueAtTime(muted ? 0 : 0.32, now + 0.6);
      }
    }
    function isMuted() { return muted; }

    return { start, flyIn, sparkle, clickEgg, clickButton, setMuted, isMuted };
  })();

  // ---- 随机名字生成（仅给真正的新用户做默认建议） ----
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    const pool = (game_config.randomNames && game_config.randomNames[LANG]) || game_config.randomNames.zhCN;
    const adj = pick(pool.planetAdj);
    const noun = pick(pool.planetNoun);
    return LANG === 'enUS' ? `${adj} ${noun}` : `${adj}${noun}`;
  }

  // 应用父级返回的用户档案，用于预填星球名 / 称呼。
  function applyUserProfile(data) {
    if (!data || typeof data !== 'object') return;
    state.profileLoaded = true;
    const accountPlanet = (typeof data.planetName === 'string') ? data.planetName.trim() : '';
    const accountNick = (typeof data.nickname === 'string') ? data.nickname.trim() : '';
    // 记录是否为真正的新用户（账号无星球名 / 无昵称）。
    state.isNewPlanet = !accountPlanet;
    state.isNewOwner = !accountNick;
    // 仅当本局尚未让用户改名时，用账号档案做默认值。
    if (!state.planetName && accountPlanet) state.planetName = accountPlanet;
    if (!state.ownerNickname && accountNick) state.ownerNickname = accountNick;
    // 新用户：没有任何已有名字时，主动生成一个随机默认名作为建议。
    if (!state.planetName) state.planetName = randomPlanetName();
    if (!state.ownerNickname) state.ownerNickname = randomOwnerName();
    if (typeof data.username === 'string') state.profileUsername = data.username;
    if (typeof data.gender === 'string') state.profileGender = data.gender;
    // 若当前停留在星球命名 / 称呼场景，刷新输入框默认值。
    prefillProfileInputs();
  }

  // 把已知的星球名 / 称呼回填到当前可见的输入框（若存在）。
  // 当输入框为空，或仍是未编辑的随机建议（data-random）且账号有真实名字时，覆盖之。
  function fillInputValue(el, value, stillRandom) {
    el.value = value;
    el.dataset.random = stillRandom ? '1' : '';
    // 直接启用对应确认按钮（用 closest 容器内的 .confirm-btn），避免触发会清除 random 标记的 input 监听。
    const wrap = el.closest('.scene-enter') || document;
    const confirmBtn = wrap.querySelector('.confirm-btn');
    if (confirmBtn) confirmBtn.disabled = !el.value.trim();
  }

  function prefillProfileInputs() {
    const planetInput = document.getElementById('planetNameInput');
    if (planetInput && state.planetName) {
      const isRandom = planetInput.dataset.random === '1';
      if (!planetInput.value || (isRandom && !state.isNewPlanet)) {
        fillInputValue(planetInput, state.planetName, state.isNewPlanet);
      }
    }
    const nickInput = document.getElementById('ownerNickInput');
    if (nickInput && state.ownerNickname) {
      const isRandom = nickInput.dataset.random === '1';
      if (!nickInput.value || (isRandom && !state.isNewOwner)) {
        fillInputValue(nickInput, state.ownerNickname, state.isNewOwner);
      }
    }
  }

  // 这是「领养新蛋」的诞生仪式：蛋此刻还没有形象，始终只用内置的金黄色蛋。

  // ---- star field ----
  function createStarfield() {
    const container = document.getElementById('starfield');
    const count = Math.min(120, Math.floor(window.innerWidth * window.innerHeight / 6000));
    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      // 与主游戏 createPlanetStarfield 一致的星点配色：白 / 金(hue44) / 青(hue190)。
      let color = '#fff';
      if (i % 5 === 0) color = 'hsl(44 100% 82%)';
      else if (i % 3 === 0) color = 'hsl(190 100% 82%)';
      star.style.background = color;
      star.style.boxShadow = `0 0 ${(2 + size * 1.5).toFixed(1)}px ${color}`;
      star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
      star.style.setProperty('--o1', (0.2 + Math.random() * 0.3).toFixed(2));
      star.style.setProperty('--o2', (0.58 + Math.random() * 0.4).toFixed(2));
      star.style.animationDelay = (Math.random() * 4) + 's';
      container.appendChild(star);
    }
  }

  // ---- typewriter ----
  function typewrite(element, text, speed = 45) {
    return new Promise(resolve => {
      element.textContent = '';
      element.classList.add('typewriter-cursor');
      const lines = text.split('\n');
      let lineIdx = 0, charIdx = 0;
      function render() {
        let html = '';
        for (let l = 0; l <= lineIdx && l < lines.length; l++) {
          const line = l < lineIdx ? lines[l] : lines[l].substring(0, charIdx);
          html += (l > 0 ? '<br>' : '') + line;
        }
        element.innerHTML = html;
      }
      function tick() {
        if (lineIdx >= lines.length) {
          element.classList.remove('typewriter-cursor');
          resolve();
          return;
        }
        if (charIdx <= lines[lineIdx].length) {
          render();
          if (charIdx < lines[lineIdx].length) {
            charIdx++;
            setTimeout(tick, speed);
          } else {
            lineIdx++;
            charIdx = 0;
            setTimeout(tick, speed * 3);
          }
        }
      }
      tick();
    });
  }

  // ---- particles ----
  function spawnParticles(x, y, count, color) {
    const container = document.getElementById('sceneContainer');
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 3 + Math.random() * 5;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = color || 'rgba(255,220,150,0.8)';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      const angle = Math.random() * Math.PI * 2;
      const dist = 40 + Math.random() * 80;
      p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
      p.style.setProperty('--pdur', (0.6 + Math.random() * 0.8) + 's');
      container.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }
  }

  // 合成画面：一颗小小的蛋停在家园星球的顶部表面（参考用户示意图：红点=蛋，停在星球顶上）。
  // 用于"给星球起名字"场景，呈现星球全貌 + 蛋落点的位置关系。
  function buildPlanetWithEggDot(size) {
    const sz = size || 150;
    const box = document.createElement('div');
    box.style.position = 'relative';
    box.style.width = sz + 'px';
    box.style.height = (sz * 1.12) + 'px';

    // 星球本体（占据下方主体）。
    const planet = document.createElement('div');
    planet.style.position = 'absolute';
    planet.style.left = '50%';
    planet.style.bottom = '0';
    planet.style.width = sz + 'px';
    planet.style.height = sz + 'px';
    planet.style.transform = 'translateX(-50%)';
    planet.style.filter = 'drop-shadow(0 0 26px rgba(92,236,228,0.5))';
    planet.innerHTML = homePlanetSVG();

    // 蛋：一颗小蛋，停在星球的顶部弧面上（轻轻浮动），用 createPetVisual 以便后续宠物图就位。
    const egg = document.createElement('div');
    egg.className = 'egg-float';
    egg.style.position = 'absolute';
    egg.style.left = '50%';
    // 让蛋底部正好坐在星球顶部弧线上：星球顶 ≈ box 高度 - sz。
    egg.style.top = (sz * 0.12 - sz * 0.28) + 'px';
    egg.style.transform = 'translateX(-50%)';
    egg.style.zIndex = '2';
    const eggSize = Math.round(sz * 0.34); // 小蛋（示意图里的小红点）
    egg.appendChild(createPetVisual(eggSize));

    box.appendChild(planet);
    box.appendChild(egg);
    return box;
  }

  // 合成画面：蛋停在星球地表（近景）——一段向上拱起的绿色地表 + 其上的蛋。

    ground.style.background = 'linear-gradient(180deg, rgba(143,245,220,0.85), rgba(20,136,169,0.8))';
    ground.style.boxShadow = 'inset 0 14px 22px rgba(255,255,255,0.22), 0 -6px 20px rgba(92,236,228,0.22)';

  // ---- pet visual element ----
  // 诞生仪式中蛋还没有形象，这里始终渲染内置的蛋 SVG。
  function createPetVisual(size, extraClass) {
    const sz = size || 140;
    const div = document.createElement('div');
    div.id = 'petVisual';
    div.style.width = sz + 'px';
    // 与 buildEggSvg viewBox(120x140) 一致的纵横比，避免蛋被拉伸。
    div.style.height = (sz * 140 / 120) + 'px';
    div.style.filter = 'drop-shadow(0 6px 16px rgba(255,200,100,0.28))';
    div.innerHTML = eggSVG();
    if (extraClass) div.className = extraClass;
    return div;
  }

  // ---- scene container ----
  const sceneContainer = document.getElementById('sceneContainer');

  function clearScene(instant) {
    return new Promise(resolve => {
      const children = sceneContainer.children;
      if (children.length === 0) { resolve(); return; }
      // instant=true：立即清空（用于推镜头转场前，避免淡出空档打断连续镜头）。
      if (instant) {
        sceneContainer.innerHTML = '';
        resolve();
        return;
      }
      Array.from(children).forEach(child => {
        if (child.id === 'progressBar') return;
        child.classList.add('scene-exit');
      });
      setTimeout(() => {
        sceneContainer.innerHTML = '';
        resolve();
      }, 500);
    });
  }

  function addScene(html) {
    const div = document.createElement('div');
    div.className = 'scene-enter w-full h-full flex flex-col items-center justify-center px-6';
    div.innerHTML = html;
    sceneContainer.appendChild(div);
    return div;
  }

  // ======== 转场：前景的蛋变小、身后的目标画面变大（一小一大，同时发生）========
  // 镜头移动结束后【不刷新场景】：保留落定的目标画面（toNode），由调用方在其周围补充 UI。
  // buildFrom() 构建前景（蛋）：从正常大小逐渐缩小、淡出。
  // buildTo()   构建背景（星球 / 蛋+地表）：从很小逐渐变大到正常大小并停住。
  // 返回 { layer, toEl, toNode }：layer 作为持久化场景容器；toNode 是落定后的视觉主体。
  function pushTransition(buildFrom, buildTo, opts = {}) {
    return new Promise((resolve) => {
      const dur = opts.duration || 2000;
      const layer = document.createElement('div');
      layer.className = 'push-layer';
      layer.style.setProperty('--push-dur', (dur / 1000) + 's');

      // FROM：前景的蛋 —— 逐渐缩小并淡出，结束后移除。
      const fromEl = document.createElement('div');
      fromEl.className = 'push-from';
      fromEl.style.setProperty('--push-from-end', String(opts.fromEnd != null ? opts.fromEnd : 0.18));
      const fromNode = buildFrom();
      if (fromNode) fromEl.appendChild(fromNode);

      // TO：目标画面 —— 由小逐渐变大并停住（保留）。
      const toEl = document.createElement('div');
      toEl.className = 'push-to';
      toEl.style.setProperty('--push-to-start', String(opts.toStart != null ? opts.toStart : 0.1));
      const toNode = buildTo();
      if (toNode) toEl.appendChild(toNode);

      layer.appendChild(fromEl);
      layer.appendChild(toEl);
      sceneContainer.appendChild(layer);

      // 过程中撒一点星屑点缀。
      const dust = setInterval(() => {
        spawnParticles(
          window.innerWidth * (0.3 + Math.random() * 0.4),
          window.innerHeight * (0.3 + Math.random() * 0.4),
          3, 'rgba(255,255,255,0.5)'
        );
      }, 200);

      setTimeout(() => {
        clearInterval(dust);
        // 镜头停住：移除前景蛋，保留目标画面，不刷新/重建场景。
        fromEl.remove();
        resolve({ layer, toEl, toNode });
      }, dur);
    });
  }

  // ======== 转场（scene1 → scene2）：复用同一颗蛋，蛋缩小并飞向星球右上角 ========
  // 不重建蛋：把 scene1 点击的那颗蛋节点接管过来，星球在其身后由小变大，
  // 同时这颗蛋缩小并平移到星球的右上角弧面处，最后停在那里（不刷新、不再造蛋/星球）。
  // 参数：eggNode = 复用的蛋元素（来自 scene1），eggStartRect = 蛋当前在视口中的位置。
  // 返回 { layer, planetEl, eggEl, planetSize }：planetEl 为落定的星球容器，eggEl 为停驻的蛋。
  function pushEggToPlanet(eggNode, eggStartRect, opts = {}) {
    return new Promise((resolve) => {
      const dur = opts.duration || 2000;
      const planetSize = opts.planetSize || 180;
      const eggEndScale = opts.eggEndScale != null ? opts.eggEndScale : 0.34; // 蛋停驻时的相对缩放

      const layer = document.createElement('div');
      layer.className = 'push-layer';
      layer.style.pointerEvents = 'none';

      const vw = window.innerWidth, vh = window.innerHeight;

      // ---- 身后的星球：从很小（中心）逐渐变大到正常大小并停住 ----
      const planetEl = document.createElement('div');
      planetEl.style.position = 'absolute';
      planetEl.style.left = '50%';
      planetEl.style.top = '50%';
      planetEl.style.width = planetSize + 'px';
      planetEl.style.height = planetSize + 'px';
      planetEl.style.zIndex = '1';
      planetEl.style.filter = 'drop-shadow(0 0 26px rgba(92,236,228,0.5))';
      planetEl.style.transformOrigin = 'center center';
      planetEl.style.transform = 'translate(-50%, -50%) scale(0.08)';
      planetEl.style.opacity = '0';
      planetEl.style.transition = `transform ${dur}ms cubic-bezier(.22,.6,.25,1), opacity ${dur * 0.3}ms ease`;
      planetEl.innerHTML = homePlanetSVG();

      // ---- 复用的蛋：接管 scene1 的蛋节点，从其当前位置缩小并平移到星球右上角 ----
      // 计算蛋起始位置（视口坐标 → 相对 layer 的居中坐标）。
      const startCX = eggStartRect.left + eggStartRect.width / 2;
      const startCY = eggStartRect.top + eggStartRect.height / 2;
      const startW = eggStartRect.width;
      const startH = eggStartRect.height;

      // 星球落定后中心在视口正中：(vw/2, vh/2)，半径 planetSize/2。
      // 蛋的终点：星球右上角弧面外侧（约 45° 方向，蛋坐在表面之上，露出在星球右上边缘）。
      const R = planetSize / 2;
      const ang = -Math.PI / 4; // 右上方向
      const endCX = vw / 2 + Math.cos(ang) * R * 1.02;
      const endCY = vh / 2 + Math.sin(ang) * R * 1.02;

      const eggHolder = document.createElement('div');
      eggHolder.style.position = 'fixed';
      eggHolder.style.left = '0';
      eggHolder.style.top = '0';
      eggHolder.style.zIndex = '3';
      eggHolder.style.width = startW + 'px';
      // 保持蛋自身纵横比，用 transform 做缩放/平移，transformOrigin 设为中心。
      eggHolder.style.transformOrigin = 'center center';
      eggHolder.style.willChange = 'transform';
      // 初始：把蛋放到它在 scene1 的位置（以中心对齐）。
      eggHolder.style.transform =
        `translate(${startCX - startW / 2}px, ${startCY - startH / 2}px) scale(1)`;
      eggHolder.style.transition = `transform ${dur}ms cubic-bezier(.4,0,.25,1)`;
      // 接管蛋节点本身（保留其内容 / 宠物图），去掉浮动动画避免与平移冲突。
      eggNode.classList.remove('egg-float', 'egg-glow', 'egg-wobble');
      eggNode.style.width = startW + 'px';
      eggHolder.appendChild(eggNode);

      layer.appendChild(planetEl);
      layer.appendChild(eggHolder);
      sceneContainer.appendChild(layer);

      // 触发动画（下一帧）。
      requestAnimationFrame(() => {
        planetEl.style.opacity = '1';
        planetEl.style.transform = 'translate(-50%, -50%) scale(1)';
        // 蛋：缩小 + 平移到星球右上角。transformOrigin 为中心，scale 围绕中心。
        // 先 translate 使盒子中心对齐到 (endCX, endCY)，再缩放（中心不变）。
        const tx = endCX - startW / 2;
        const ty = endCY - startH / 2;
        eggHolder.style.transform = `translate(${tx}px, ${ty}px) scale(${eggEndScale})`;
      });

      // 过程中撒一点星屑点缀。
      const dust = setInterval(() => {
        spawnParticles(
          vw * (0.3 + Math.random() * 0.4),
          vh * (0.3 + Math.random() * 0.4),
          3, 'rgba(255,255,255,0.5)'
        );
      }, 200);

      setTimeout(() => {
        clearInterval(dust);
        // 停住：蛋恢复轻微浮动，停在星球右上角。不刷新 / 不重建。
        eggNode.classList.add('egg-float');
        layer.style.pointerEvents = 'auto';
        resolve({ layer, planetEl, eggEl: eggHolder, eggNode, planetSize });
      }, dur);
    });
  }

  // 在"镜头落定"的持久层里，让目标视觉从居中漂浮位上移到顶部，并淡入一段 UI 面板，
  // 不重建视觉、不清场景。返回填充 UI 的容器（一个底部对齐的面板）。
  function settleSceneUI(layer, toEl, opts = {}) {
    // 目标视觉：从画面中央过渡到上半区，给下方 UI 留出空间。
    toEl.style.transition = 'top 0.6s cubic-bezier(.4,0,.2,1), transform 0.6s cubic-bezier(.4,0,.2,1)';
    toEl.style.top = opts.visualTop || '30%';
    // UI 面板：底部对齐，淡入上移。
    const panel = document.createElement('div');
    panel.className = 'push-ui-panel';
    layer.appendChild(panel);
    // 让被保留的层可以接收点击（转场时是 none）。
    layer.style.pointerEvents = 'auto';
    requestAnimationFrame(() => panel.classList.add('is-in'));
    return panel;
  }

  // 针对 pushEggToPlanet 落定结果（星球 + 右上角的蛋）补充 UI：
  // 星球与蛋保持原位不动，仅淡入一段底部 UI 面板（从底部飞入）。不重建、不刷新。
  function settlePlanetUI(settled, opts = {}) {
    const { layer } = settled;
    // UI 面板：底部对齐，从底部飞入。星球 / 蛋保持原位。
    const panel = document.createElement('div');
    panel.className = 'push-ui-panel';
    layer.appendChild(panel);
    layer.style.pointerEvents = 'auto';
    requestAnimationFrame(() => { panel.classList.add('is-in'); Music.flyIn(); });
    return panel;
  }

  // ======== SCENE 1: Deep Night Signal ========
  async function scene1() {
    state.currentScene = 1;
    updateProgress(1);
    await clearScene();

    const wrapper = document.createElement('div');
    wrapper.className = 'scene-enter w-full h-full flex flex-col items-center justify-center px-6 relative';

    // narration
    const narration = document.createElement('div');
    narration.className = 'text-center text-white/80 text-lg leading-relaxed mb-12 max-w-md';
    narration.style.fontSize = 'clamp(15px, 3.5vw, 20px)';

    // egg
    const eggWrap = document.createElement('div');
    eggWrap.className = 'egg-float egg-glow cursor-pointer relative';
    eggWrap.style.transition = 'all 0.5s';
    const petEl = createPetVisual(130);
    eggWrap.appendChild(petEl);

    // hint
    const hint = document.createElement('div');
    hint.className = 'text-white/40 text-sm mt-8';
    hint.textContent = t('scene1Hint');

    wrapper.appendChild(narration);
    wrapper.appendChild(eggWrap);
    wrapper.appendChild(hint);
    sceneContainer.appendChild(wrapper);

    await typewrite(narration, t('scene1Narration'), 55);

    // 点击蛋 → 复用同一颗蛋：星球在身后由小变大，这颗蛋缩小并飞到星球右上角并停住。
    let clicked = false;
    eggWrap.addEventListener('click', function onEggClick(e) {
      if (clicked) return;
      clicked = true;
      // 启动音乐（若尚未启动）并发出"点击蛋"的专属回声（较低、较实）。
      Music.start();
      Music.clickEgg();
      eggWrap.classList.remove('egg-float');
      eggWrap.classList.add('egg-wobble');

      // light up dot
      const dots = touchIndicator.querySelectorAll('div');
      if (touches <= neededTouches) {

        dots[touches - 1].style.boxShadow = '0 0 8px rgba(255,220,150,0.5)';

      touchLine.style.opacity = '0';
      setTimeout(() => {
        touchLine.textContent = touchTexts[touches - 1] || '';

      if (touches >= neededTouches) {
        eggWrap.removeEventListener('click', onTouch);
        hint.style.opacity = '0';
        eggWrap.classList.add('warmth-glow');
        // 第 3 次触碰：立即进入下一步。
        setTimeout(() => scene6(), 700);
      }
    });

  function drawDNA(canvas) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    let frame = 0;

    function render() {
      ctx.clearRect(0, 0, w, h);
      const cx = w / 2;
      const points = 20;
      for (let i = 0; i < points; i++) {
        const y = 10 + (h - 20) * i / (points - 1);
        const phase = frame * 0.03 + i * 0.4;
        const x1 = cx + Math.sin(phase) * 30;
        const x2 = cx - Math.sin(phase) * 30;
        const alpha = 0.3 + 0.4 * Math.abs(Math.sin(phase));

        // connecting bar
        ctx.strokeStyle = `rgba(255,220,150,${alpha * 0.3})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x1, y);
        ctx.lineTo(x2, y);
        ctx.stroke();

        // left node
        ctx.fillStyle = `rgba(255,180,100,${alpha})`;
        ctx.beginPath();
        ctx.arc(x1, y, 3, 0, Math.PI * 2);
        ctx.fill();

        // right node
        ctx.fillStyle = `rgba(150,200,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(x2, y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      frame++;
      if (state.currentScene === 6) requestAnimationFrame(render);
    }
    render();
  }

    // 父级返回用户档案：星球名、昵称、性别等。
    if (msg.type === 'haqi_user_profile' && msg.ok && msg.data &&
        (!state.profileRequestId || !msg.requestId || msg.requestId.indexOf('profile_') === 0 || msg.requestId === state.profileRequestId)) {
      applyUserProfile(msg.data);
    }
    // 父级也可能在 setGameConfig 里直接附带档案字段。
    if (msg.type === 'setGameConfig' && msg.data && (msg.data.planetName != null || msg.data.nickname != null)) {
      applyUserProfile({
        planetName: msg.data.planetName,
        nickname: msg.data.nickname,
        username: msg.data.username,
        gender: msg.data.gender,
      });
    }
    if (msg.type === 'gameContinue') {
      // no-op for onboarding
    }
  });

  // ---- 音乐开关 ----
  (function initMusicToggle() {
    const btn = document.getElementById('musicToggle');
    if (!btn) return;
    btn.addEventListener('click', () => {
      // 若尚未启动（用户还没点过蛋），点开关也算一次手势，可直接启动音乐。
      Music.start();
      const next = !Music.isMuted();
      Music.setMuted(next);
      btn.textContent = next ? '🔇' : '🔊';
      btn.style.color = next ? 'rgba(255,255,255,0.4)' : '#ffdc96';
    });
  })();

  // ---- 音乐：从一开始就尝试启动稀疏星辰回声 ----
  // 浏览器通常要求用户手势后才出声，所以：先尝试直接启动；若被拦截，
  // 在首次任意交互（指针 / 键盘 / 触摸）时再启动一次（仅一次）。
  function bootMusic() { try { Music.start(); } catch (_) {} }
  bootMusic();
  (function armFirstGestureAutostart() {
    let armed = true;
    function onFirst() {
      if (!armed) return;
      armed = false;
      bootMusic();
      window.removeEventListener('pointerdown', onFirst, true);
      window.removeEventListener('keydown', onFirst, true);
      window.removeEventListener('touchstart', onFirst, true);
    }
    window.addEventListener('pointerdown', onFirst, true);
    window.addEventListener('keydown', onFirst, true);
    window.addEventListener('touchstart', onFirst, true);
  })();

  // ---- 全局按钮点击回声：所有 <button> 点击都发出"按钮回声"（蛋有自己的回声，单独处理） ----
  document.addEventListener('click', (e) => {
    const btn = e.target.closest && e.target.closest('button');
    if (!btn) return;
    if (btn.id === 'musicToggle') return;     // 开关自己不发声，避免与静音冲突
    Music.clickButton();
  }, true);

  // ---- init ----
  createStarfield();
  requestUserProfile();
  post('gameLoaded');

  // start scene 1（看到蛋）。点击蛋后镜头继续推进，依次展示星球、蛋+星球。
  scene1();

  if (!state.gameStarted) {
    state.gameStarted = true;
    post('gameStarted');
  }
})();
</script>

</html>
