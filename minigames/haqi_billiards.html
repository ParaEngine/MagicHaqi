  function currentGraphicsPreset() {

  function monitorGraphicsQuality(now) {
    if (state.graphics.mode !== 'auto') return;
    const graphics = state.graphics;
    if (!graphics.sampleStartedAt) {
      graphics.sampleStartedAt = now;
      graphics.frames = 0;
      return;
    }
    graphics.frames += 1;
    const elapsed = now - graphics.sampleStartedAt;
    if (elapsed < GRAPHICS_FPS_SAMPLE_MS) return;
    const fps = graphics.frames * 1000 / elapsed;
    const canDowngrade = graphics.level < GRAPHICS_PRESETS.length - 1 && now - graphics.lastDowngradeAt > GRAPHICS_DOWNGRADE_COOLDOWN_MS;
    if (fps < GRAPHICS_LOW_FPS && canDowngrade) applyGraphicsQuality(graphics.level + 1, now);
    graphics.sampleStartedAt = now;
    graphics.frames = 0;
  }

  function applyGraphicsQuality(level, now = performance.now()) {

    const preset = currentGraphicsPreset();
    setRendererPixelRatio();
    if (three.renderer?.shadowMap) {
      three.renderer.shadowMap.enabled = preset.shadows;
      three.renderer.shadowMap.needsUpdate = true;
    }
    if (three.light) {
      three.light.castShadow = preset.shadows;
      if (preset.shadowMapSize) {
        three.light.shadow.mapSize.width = preset.shadowMapSize;
        three.light.shadow.mapSize.height = preset.shadowMapSize;
      }
      if (three.light.shadow.map) {
        three.light.shadow.map.dispose();
        three.light.shadow.map = null;
      }
    }
    if (three.renderer && els.stage) resize();
  }

    state.graphics.frames = 0;

    const surfaceMat = railMat.clone();
    surfaceMat.side = THREE.DoubleSide;
    const hiddenInnerSideMat = new THREE.MeshBasicMaterial({ visible: false, depthWrite: false });
    const halfW = TABLE.width / 2;
    const halfH = TABLE.height / 2;
    const outer = TABLE.rail * 1.08;
    const pocketRadius = TABLE.pocket * .92;
    const surfaceY = -.11 + railHeight + .022;
    const railDepth = .39;

    function addRailSurface(shape, isInnerSideTriangle) {
      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: railDepth,
        bevelEnabled: false,
        curveSegments: IS_MOBILE ? 18 : 28,
      }).toNonIndexed();
      assignRailCapMaterials(geometry, isInnerSideTriangle);
      const mesh = new THREE.Mesh(geometry, [surfaceMat, railMat, hiddenInnerSideMat]);
      mesh.rotation.x = Math.PI / 2;
      mesh.position.y = surfaceY;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      three.tableGroup.add(mesh);
    }

    function assignRailCapMaterials(geometry, isInnerSideTriangle) {
      const position = geometry.attributes.position;
      const epsilon = .004;
      geometry.clearGroups();
      for (let vertex = 0; vertex < position.count; vertex += 3) {
        const p0 = { x: position.getX(vertex), y: position.getY(vertex), z: position.getZ(vertex) };
        const p1 = { x: position.getX(vertex + 1), y: position.getY(vertex + 1), z: position.getZ(vertex + 1) };
        const p2 = { x: position.getX(vertex + 2), y: position.getY(vertex + 2), z: position.getZ(vertex + 2) };
        const isCapSurface = Math.abs(p0.z - p1.z) < epsilon && Math.abs(p1.z - p2.z) < epsilon;
        const materialIndex = isCapSurface ? 0 : isInnerSideTriangle(p0, p1, p2, epsilon) ? 2 : 1;
        geometry.addGroup(vertex, 3, materialIndex);
      }
    }

    function addLongRailSurface(sign) {
      const innerZ = sign * halfH;
      const outerZ = sign * (halfH + outer);
      const clockwiseArc = sign < 0;
      const shape = new THREE.Shape();
      shape.moveTo(-halfW - outer, outerZ);
      shape.lineTo(halfW + outer, outerZ);
      shape.lineTo(halfW + outer, innerZ);
      shape.lineTo(halfW + pocketRadius, innerZ);
      shape.absarc(halfW, innerZ, pocketRadius, 0, Math.PI, clockwiseArc);
      shape.lineTo(pocketRadius, innerZ);
      shape.absarc(0, innerZ, pocketRadius, 0, Math.PI, clockwiseArc);
      shape.lineTo(-halfW + pocketRadius, innerZ);
      shape.absarc(-halfW, innerZ, pocketRadius, 0, Math.PI, clockwiseArc);
      shape.lineTo(-halfW - outer, innerZ);
      shape.lineTo(-halfW - outer, outerZ);
      addRailSurface(shape, (p0, p1, p2, epsilon) => [p0, p1, p2].every(point => Math.abs(point.y - innerZ) < epsilon));
    }

    function addSideRailSurface(sign) {
      const innerX = sign * halfW;
      const outerX = sign * (halfW + outer);
      const shape = new THREE.Shape();
      if (sign < 0) {
        shape.moveTo(outerX, -halfH - outer);
        shape.lineTo(innerX, -halfH - outer);
        shape.lineTo(innerX, -halfH - pocketRadius);
        shape.absarc(innerX, -halfH, pocketRadius, -Math.PI / 2, Math.PI / 2, true);
        shape.lineTo(innerX, halfH - pocketRadius);
        shape.absarc(innerX, halfH, pocketRadius, -Math.PI / 2, Math.PI / 2, true);
        shape.lineTo(innerX, halfH + outer);
        shape.lineTo(outerX, halfH + outer);
      } else {
        shape.moveTo(outerX, -halfH - outer);
        shape.lineTo(outerX, halfH + outer);
        shape.lineTo(innerX, halfH + outer);
        shape.lineTo(innerX, halfH + pocketRadius);
        shape.absarc(innerX, halfH, pocketRadius, Math.PI / 2, -Math.PI / 2, true);
        shape.lineTo(innerX, -halfH + pocketRadius);
        shape.absarc(innerX, -halfH, pocketRadius, Math.PI / 2, -Math.PI / 2, true);
        shape.lineTo(innerX, -halfH - outer);
      }
      shape.lineTo(outerX, -halfH - outer);
      addRailSurface(shape, (p0, p1, p2, epsilon) => [p0, p1, p2].every(point => Math.abs(point.x - innerX) < epsilon));
    }

    addLongRailSurface(1);
    addLongRailSurface(-1);
    addSideRailSurface(-1);
    addSideRailSurface(1);
  }

  function addCushionSegments(cushionMat) {
    const segments = frameCutSegments();
    const cushionCenterY = cushionBottomY + cushionHeight / 2;
    [1, -1].forEach(sign => {
      addLongFramePieces(segments.long, sign * (TABLE.height / 2 + cushionDepth / 2), cushionCenterY, cushionDepth, cushionHeight, cushionMat, -TABLE.rail * .42);
      addShortFramePieces(segments.short, sign * (TABLE.width / 2 + cushionDepth / 2), cushionCenterY, cushionDepth, cushionHeight, cushionMat, -TABLE.rail * .42);
    });
  }

  function makeFeltTexture(profile) {
    const THREE = window.THREE;
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const base = `#${profile.felt.toString(16).padStart(6, '0')}`;
    const dark = `#${profile.feltDark.toString(16).padStart(6, '0')}`;
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = .18;
    for (let y = 0; y < canvas.height; y += 3) {
      ctx.fillStyle = y % 12 === 0 ? dark : 'rgba(255,255,255,.22)';
      ctx.fillRect(0, y, canvas.width, 1);
    }
    ctx.globalAlpha = .12;
    for (let x = -canvas.height; x < canvas.width; x += 22) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + canvas.height, canvas.height);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.globalAlpha = .18;
    const vignette = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 90, canvas.width / 2, canvas.height / 2, canvas.width * .62);
    vignette.addColorStop(0, 'rgba(255,255,255,.42)');
    vignette.addColorStop(1, 'rgba(0,0,0,.5)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(TABLE.width / 4.8, TABLE.height / 3);
    texture.anisotropy = 8;
    texture.encoding = THREE.sRGBEncoding;
    return texture;
  }

  function makeCarpetTexture(profile) {
    const THREE = window.THREE;
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const base = `#${profile.floor.toString(16).padStart(6, '0')}`;
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = .16;
    for (let y = 0; y < canvas.height; y += 42) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, y, canvas.width, 2);
    }
    for (let x = 0; x < canvas.width; x += 42) {
      ctx.fillStyle = '#000000';
      ctx.fillRect(x, 0, 2, canvas.height);
    }
    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(6, 4);
    texture.anisotropy = 4;
    texture.encoding = THREE.sRGBEncoding;
    return texture;
  }

  function addCushionSegments(material) {
    const THREE = window.THREE;
    const cornerGap = TABLE.pocket * .9;
    const sideGap = TABLE.pocket * 1.54;
    const longZ = TABLE.height / 2 + cushionDepth / 2;
    const shortX = TABLE.width / 2 + cushionDepth / 2;

    [-1, 1].forEach(sign => {
      const leftStart = -TABLE.width / 2 + cornerGap;
      const leftEnd = -sideGap / 2;
      const rightStart = sideGap / 2;
      const rightEnd = TABLE.width / 2 - cornerGap;
      addCushionBox(leftStart, leftEnd, sign * longZ, true, material);
      addCushionBox(rightStart, rightEnd, sign * longZ, true, material);

      const bottomStart = -TABLE.height / 2 + cornerGap;
      const topEnd = TABLE.height / 2 - cornerGap;
      addCushionBox(bottomStart, topEnd, sign * shortX, false, material);
    });
  }

  function addCushionBox(start, end, fixedPosition, horizontal, material) {
    const THREE = window.THREE;
    const length = Math.max(.2, end - start);
    const cushionCenterY = cushionBottomY + cushionHeight / 2;
    const geometry = horizontal ? new THREE.BoxGeometry(length, cushionHeight, cushionDepth) : new THREE.BoxGeometry(cushionDepth, cushionHeight, length);
    const mesh = new THREE.Mesh(geometry, material);
    if (horizontal) mesh.position.set((start + end) / 2, cushionCenterY, fixedPosition);
    else mesh.position.set(fixedPosition, cushionCenterY, (start + end) / 2);
    mesh.castShadow = true;
    three.tableGroup.add(mesh);
  }

  function addPocketCutouts(material) {
    const THREE = window.THREE;
    const wellGeo = new THREE.CircleGeometry(TABLE.pocket * .86, IS_MOBILE ? 30 : 48);

    pocketCenters().forEach((p) => {
      const well = new THREE.Mesh(wellGeo, material);
      well.rotation.x = -Math.PI / 2;
      well.position.set(p.x, .006, p.y);
      three.tableGroup.add(well);

      const liner = new THREE.Mesh(linerGeo, linerMat);
      liner.position.set(p.x, -.075, p.y);
      three.tableGroup.add(liner);

  function addTableDiamondSites(material) {
    const THREE = window.THREE;
    const diamondGeo = new THREE.BoxGeometry(.08, .026, .08);

    for (let i = 1; i < 8; i++) {

      const x = -TABLE.width / 2 + TABLE.width * i / 8;

        diamond.position.set(x, .32, z);
