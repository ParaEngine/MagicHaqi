  function rackBalls() {
    clearBalls();
    if (state.mode === 'snooker') rackSnooker();
    else rackEightBall();
    syncBallMeshes();
    updateUI();
  }

  function clearBalls() {
    for (const mesh of state.ballMeshes.values()) three.scene.remove(mesh);
    state.ballMeshes.clear();
    clearPocketEffects();
    state.balls = [];
    state.pocketed = [[], []];
    state.groupOwner = { solids: null, stripes: null };
    state.snookerNext = 'red';
    state.turnPots = [];
  }

  function rackEightBall() {
    state.balls.push(makeBall('cue', 0, -TABLE.width * .28, 0, 'cue', EIGHT_COLORS[0], 0));
    const startX = TABLE.width * .22;
    const gap = BALL_RADIUS * 2.08;
    const order = [1, 9, 2, 10, 8, 3, 11, 4, 12, 5, 13, 6, 14, 7, 15];
    let index = 0;
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col <= row; col++) {
        const number = order[index++];
        const x = startX + row * gap * .92;
        const y = (col - row / 2) * gap;
        state.balls.push(makeBall(`b${number}`, number, x, y, number === 8 ? 'eight' : number <= 7 ? 'solid' : 'stripe', EIGHT_COLORS[number], number));
      }
    }
  }

  function rackSnooker() {
    state.balls.push(makeBall('cue', 0, -TABLE.width * .34, 0, 'cue', SNOOKER_COLORS.cue, 0));
    const redStartX = TABLE.width * .18;
    const gap = BALL_RADIUS * 2.05;
    let id = 1;
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col <= row; col++) {
        const x = redStartX + row * gap * .9;
        const y = (col - row / 2) * gap;
        state.balls.push(makeBall(`r${id++}`, 1, x, y, 'red', SNOOKER_COLORS.red, 1));
      }
    }
    [
      ['yellow', -TABLE.width * .32, -TABLE.height * .22, 2],
      ['green', -TABLE.width * .32, TABLE.height * .22, 3],
      ['brown', -TABLE.width * .32, 0, 4],
      ['blue', 0, 0, 5],
      ['pink', TABLE.width * .09, 0, 6],
      ['black', TABLE.width * .39, 0, 7],
    ].forEach(([type, x, y, points]) => state.balls.push(makeBall(type, points, x, y, type, SNOOKER_COLORS[type], points)));
  }

  function makeBall(id, label, x, y, type, color, points) {
    return { id, label, x, y, vx: 0, vy: 0, spinSide: 0, spinForward: 0, spinDirX: 0, spinDirY: 0, type, color, points, pocketed: false, pocketFall: null, respot: { x, y }, rollQuat: null };
  }

  function syncBallMeshes() {
    state.balls.forEach(ball => {
      if (state.ballMeshes.has(ball.id)) return;
      const mesh = createBallMesh(ball);
      state.ballMeshes.set(ball.id, mesh);
      three.scene.add(mesh);
    });
    updateBallMeshes();
  }

  function createBallMesh(ball) {
    const THREE = window.THREE;
    const group = new THREE.Group();
    ball.rollQuat = new THREE.Quaternion();
    const material = new THREE.MeshStandardMaterial({ map: makeBallTexture(ball), roughness: .2, metalness: .02 });
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS, BALL_WIDTH_SEGMENTS, BALL_HEIGHT_SEGMENTS), material);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    group.userData.rollables = [sphere];
    group.add(sphere);
    const shine = new THREE.Mesh(
      new THREE.SphereGeometry(BALL_RADIUS * .18, IS_MOBILE ? 8 : 10, IS_MOBILE ? 6 : 8),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: .34, depthWrite: false })
    );
    shine.position.set(-BALL_RADIUS * .32, BALL_RADIUS * .36, BALL_RADIUS * .42);
    group.add(shine);
    return group;
  }

  function makeBallTexture(ball) {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = ball.color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (ball.type === 'stripe') {
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(0, 88, canvas.width, 80);
    }
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    ctx.fillRect(0, 0, canvas.width, 26);
    ctx.fillStyle = 'rgba(15,23,42,.12)';
    ctx.fillRect(0, canvas.height - 34, canvas.width, 34);
    const label = ballLabel(ball);
    if (label) {
      const centers = [[128, 128], [384, 128]];
      centers.forEach(([x, y]) => drawTextureNumber(ctx, x, y, label, ball));
    }
    const texture = new THREE.CanvasTexture(canvas);
    texture.anisotropy = 4;
    texture.encoding = THREE.sRGBEncoding;
    texture.needsUpdate = true;
    return texture;
  }

  function ballLabel(ball) {
    if (ball.type === 'cue') return '';
    if (state.mode === 'eight') return String(ball.label || '');
    if (ball.type === 'red') return '';
    return String(ball.points || '');
  }

  function drawTextureNumber(ctx, x, y, label, ball) {
    const radius = state.mode === 'eight' ? 50 : 42;
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = state.mode === 'eight' ? '#f8fafc' : 'rgba(15,23,42,.52)';
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(15,23,42,.18)';
    ctx.stroke();
    ctx.fillStyle = '#111827';
    if (state.mode !== 'eight') ctx.fillStyle = '#f8fafc';
    ctx.font = `900 ${label.length > 1 ? 54 : 66}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 2);
    ctx.restore();
  }

  function makeThoughtTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 180;
    canvas.height = 92;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,.94)';
    ctx.strokeStyle = 'rgba(14,116,144,.28)';
    ctx.lineWidth = 5;
    roundRect(ctx, 18, 10, 142, 52, 24);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#0f766e';
    ctx.font = '900 24px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('思考中', 89, 36);
    ctx.fillStyle = 'rgba(255,255,255,.94)';
    [[52, 70, 10], [36, 82, 6]].forEach(([x, y, r]) => {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    });
    return new THREE.CanvasTexture(canvas);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function updateBallMeshes() {
    state.balls.forEach(ball => {
      const mesh = state.ballMeshes.get(ball.id);
      if (!mesh) return;
      const fall = ball.pocketFall;
      const falling = isBallFalling(ball);
      const fallT = fall ? clamp(fall.elapsed / fall.duration, 0, 1) : 0;
      mesh.visible = !ball.pocketed || falling;
      mesh.position.set(ball.x, BALL_RADIUS - POCKET_FALL_DEPTH * fallT * fallT, ball.y);
      const highlighted = shouldHighlightLegalTarget(ball);
      mesh.scale.setScalar(falling ? 1 - fallT * .34 : highlighted ? 1.08 : 1);
      (mesh.userData.rollables || []).forEach((part) => {
        if (ball.rollQuat) part.quaternion.copy(ball.rollQuat);
        updateBallHighlight(part, highlighted);
      });
    });
  }

  function shouldHighlightLegalTarget(ball) {
    if (!ball || ball.pocketed || ball.type === 'cue') return false;
    return canHumanShoot() && state.inputMode !== 'swing' && legalTargetsFor(0).includes(ball);
  }

  function updateBallHighlight(part, highlighted) {
    const mat = part?.material;
    if (!mat || !mat.emissive) return;
    mat.emissive.setHex(highlighted ? 0x164e2f : 0x000000);
    mat.emissiveIntensity = highlighted ? .42 : 0;
  }

  function startGame() {
    if (!state.started || state.finished) {
      state.started = true;
      state.finished = false;
      state.running = false;
      state.currentPlayer = 0;
      state.playerScore = 0;
      state.petScore = 0;
      state.seconds = 0;
      state.shotCount = 0;
      state.turnSummary = '';
      resetHitPoint();
      rackBalls();
      state.inputMode = 'view';
      state.cuePlacement.active = state.mode === 'snooker';
      state.cuePlacement.afterScratch = false;
      startTimer();
      window.parent.postMessage({ type: 'gameStarted' }, '*');
    }
    els.overlay.hidden = true;
    state.message = state.cuePlacement.active ? '斯诺克开局：拖动白球摆位' : '拖动调整视角，然后拖动或点击下面白色球挥杆';
    updateUI();
    startLoop();
  }

  function resetGame(fromButton) {
    state.started = false;
    state.finished = false;
    state.running = false;
    state.aiThinking = false;
    state.currentPlayer = 0;
    state.playerScore = 0;
    state.petScore = 0;
    state.seconds = 0;
    state.shotCount = 0;
    state.turnSummary = '';
    state.inputMode = 'view';
    resetHitPoint();
    state.cuePlacement.active = false;
    state.cuePlacement.pointer = null;
    state.cuePlacement.afterScratch = false;
    cancelAim();
    hidePetActor(true);
    stopTimer();
    rackBalls();
    state.message = fromButton ? '已重摆，点击开始' : '准备开球';
    updateUI();
  }

  function startTimer() {
    stopTimer();
    state.timer = setInterval(() => {
      if (state.started && !state.finished) {
        state.seconds += 1;
        updateUI();
      }
    }, 1000);
  }

  function stopTimer() {
    if (state.timer) clearInterval(state.timer);
    state.timer = null;
  }

  function startLoop() {
    cancelAnimationFrame(state.frame);
    state.lastTime = performance.now();
    state.frame = requestAnimationFrame(loop);
  }

  function loop(now) {
    const dt = Math.min(MAX_FRAME_DT, Math.max(0, (now - state.lastTime) / 1000));
    state.lastTime = now;
    state.accumulator += dt;
    let stepped = false;
    while (state.accumulator >= FIXED_DT) {
      stepPhysics(FIXED_DT);
      state.accumulator -= FIXED_DT;
      stepped = true;
    }
    updateBallMeshes();
    if (state.running) {
      applyAutoCameraOriginShift();
      updateCamera();
    }
    updateAimVisuals();
    updatePetActor(now);
    updatePocketEffects(dt);
    three.renderer.render(three.scene, three.camera);
    monitorGraphicsQuality(now);
    if (stepped) afterPhysicsCheck();
    state.frame = requestAnimationFrame(loop);
  }

  function stepPhysics(dt) {
    if (!state.running) return;
    updatePocketFalls(dt);
    state.balls.forEach(ball => {
      if (ball.pocketed) return;
      const dx = ball.vx * dt;
      const dy = ball.vy * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      applyBallRoll(ball, dx, dy);
      const decay = Math.pow(FRICTION, dt);
      ball.vx *= decay;
      ball.vy *= decay;
      if (Math.hypot(ball.vx, ball.vy) < STOP_SPEED) {
        ball.vx = 0;
        ball.vy = 0;
        resetBallSpin(ball);
      }
      applyCueSpin(ball, dt);
      handleCushion(ball);
    });

    for (let i = 0; i < state.balls.length; i++) {
      const first = state.balls[i];
      if (first.pocketed) continue;
      for (let j = i + 1; j < state.balls.length; j++) {
        const second = state.balls[j];
        if (!second.pocketed) resolveBallCollision(first, second);
      }
    }
    checkPockets();
  }

  function handleCushion(ball) {
    const minX = -TABLE.width / 2 + BALL_RADIUS;
    const maxX = TABLE.width / 2 - BALL_RADIUS;
    const minY = -TABLE.height / 2 + BALL_RADIUS;
    const maxY = TABLE.height / 2 - BALL_RADIUS;
    let hitX = false;
    let hitY = false;
    if (ball.x < minX) { playRailSound(Math.abs(ball.vx)); ball.x = minX; ball.vx = Math.abs(ball.vx) * CUSHION_RESTITUTION; hitX = true; }
    if (ball.x > maxX) { playRailSound(Math.abs(ball.vx)); ball.x = maxX; ball.vx = -Math.abs(ball.vx) * CUSHION_RESTITUTION; hitX = true; }
    if (ball.y < minY) { playRailSound(Math.abs(ball.vy)); ball.y = minY; ball.vy = Math.abs(ball.vy) * CUSHION_RESTITUTION; hitY = true; }
    if (ball.y > maxY) { playRailSound(Math.abs(ball.vy)); ball.y = maxY; ball.vy = -Math.abs(ball.vy) * CUSHION_RESTITUTION; hitY = true; }
    applyCueSpinCushion(ball, hitX, hitY);
  }

  function resolveBallCollision(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.hypot(dx, dy);
    const minDist = BALL_RADIUS * 2;
    if (!dist || dist >= minDist) return;
    const nx = dx / dist;
    const ny = dy / dist;
    const overlap = minDist - dist;
    a.x -= nx * overlap * .5;
    a.y -= ny * overlap * .5;
    b.x += nx * overlap * .5;
    b.y += ny * overlap * .5;

    const rvx = b.vx - a.vx;
    const rvy = b.vy - a.vy;
    const velAlongNormal = rvx * nx + rvy * ny;
    if (velAlongNormal > 0) return;
    const impulse = -(1 + BALL_RESTITUTION) * velAlongNormal / 2;
    playCollisionSound(Math.abs(impulse));
    const ix = impulse * nx;
    const iy = impulse * ny;
    a.vx -= ix;
    a.vy -= iy;
    b.vx += ix;
    b.vy += iy;
    applyCueSpinCollision(a);
    applyCueSpinCollision(b);
  }

  function applyCueSpin(ball, dt) {
    if (ball.type !== 'cue') return;
    const speed = Math.hypot(ball.vx, ball.vy);
    if (!speed) return;
    const side = ball.spinSide || 0;
    if (Math.abs(side) > .001) {
      const ux = ball.vx / speed;
      const uy = ball.vy / speed;
      const curve = side * speed * CUE_SPIN_CURVE * dt;
      ball.vx += -uy * curve;
      ball.vy += ux * curve;
    }
    const decay = Math.pow(CUE_SPIN_DECAY, dt);
    ball.spinSide *= decay;
    ball.spinForward *= decay;
  }

  function applyCueSpinCollision(ball) {
    if (ball.type !== 'cue') return;
    const forward = ball.spinForward || 0;
    const side = ball.spinSide || 0;
    if (Math.abs(forward) < .02 && Math.abs(side) < .02) return;
    const dirX = ball.spinDirX || 0;
    const dirY = ball.spinDirY || 0;
    if (!dirX && !dirY) return;
    ball.vx += dirX * forward * CUE_SPIN_COLLISION;
    ball.vy += dirY * forward * CUE_SPIN_COLLISION;
    ball.vx += -dirY * side * CUE_SPIN_COLLISION * .42;
    ball.vy += dirX * side * CUE_SPIN_COLLISION * .42;
    ball.spinForward *= .34;
    ball.spinSide *= .62;
  }

  function applyCueSpinCushion(ball, hitX, hitY) {
    if (ball.type !== 'cue' || (!hitX && !hitY)) return;
    const side = ball.spinSide || 0;
    if (Math.abs(side) < .02) return;
    if (hitX) ball.vy += side * Math.abs(ball.vx) * CUE_SPIN_CUSHION;
    if (hitY) ball.vx -= side * Math.abs(ball.vy) * CUE_SPIN_CUSHION;
    ball.spinSide *= .72;
  }

  function resetBallSpin(ball) {
    if (!ball) return;
    ball.spinSide = 0;
    ball.spinForward = 0;
    ball.spinDirX = 0;
    ball.spinDirY = 0;
  }

  function applyBallRoll(ball, dx, dy) {
    const distance = Math.hypot(dx, dy);
    if (!distance || ball.pocketed) return;
    const THREE = window.THREE;
    if (!ball.rollQuat) ball.rollQuat = new THREE.Quaternion();
    const reusable = three.reusable;
    reusable.rollAxis.set(dy, 0, -dx).normalize();
    reusable.rollStepQuat.setFromAxisAngle(reusable.rollAxis, distance / BALL_RADIUS);
    ball.rollQuat.premultiply(reusable.rollStepQuat).normalize();
  }

  function checkPockets() {
    const pockets = pocketCenters();
    state.balls.forEach(ball => {
      if (ball.pocketed) return;
      const hit = pockets.find(p => Math.hypot(ball.x - p.x, ball.y - p.y) < TABLE.pocket);
      if (!hit) return;
      startPocketFall(ball, hit);
      ball.vx = 0;
      ball.vy = 0;
      resetBallSpin(ball);
      state.turnPots.push(ball);
      playPocketSound();
    });
  }

  function startPocketFall(ball, pocket) {
    ball.pocketed = true;
    createPocketEffect(ball, pocket);
    ball.pocketFall = {
      elapsed: 0,
      duration: POCKET_FALL_DURATION,
      startX: ball.x,
      startY: ball.y,
      targetX: pocket.x,
      targetY: pocket.y,
      done: false,
    };
  }

  function updatePocketFalls(dt) {
    state.balls.forEach(ball => {
      const fall = ball.pocketFall;
      if (!fall || fall.done) return;
      fall.elapsed = Math.min(fall.duration, fall.elapsed + dt);
      const t = clamp(fall.elapsed / fall.duration, 0, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      ball.x = fall.startX + (fall.targetX - fall.startX) * ease;
      ball.y = fall.startY + (fall.targetY - fall.startY) * ease;
      if (t >= 1) fall.done = true;
    });
  }

  function isBallFalling(ball) {
    return !!ball.pocketFall && !ball.pocketFall.done;
  }

  function createPocketEffect(ball, pocket) {
    const THREE = window.THREE;
    if (!three.scene) return;
    const result = pocketResultFor(ball);
    const group = new THREE.Group();
    group.position.set(pocket.x, BALL_RADIUS * 1.45, pocket.y);
    const emoji = new THREE.Sprite(new THREE.SpriteMaterial({ map: makeEmojiTexture(result.emoji), transparent: true, depthWrite: false }));
    emoji.scale.set(.46, .46, 1);
    emoji.position.y = .12;
    emoji.renderOrder = 35;
    group.add(emoji);
    const particles = [];
    const count = IS_MOBILE ? 10 : 16;
    for (let index = 0; index < count; index++) {
      const angle = Math.PI * 2 * index / count + Math.random() * .32;
      const speed = result.good ? .5 + Math.random() * .38 : .34 + Math.random() * .28;
      const particle = new THREE.Mesh(
        new THREE.SphereGeometry(result.good ? .026 : .022, IS_MOBILE ? 8 : 10, IS_MOBILE ? 6 : 8),
        new THREE.MeshBasicMaterial({ color: index % 2 ? result.color : result.accent, transparent: true, opacity: .92, depthWrite: false })
      );
      particle.position.set(0, 0, 0);
      particle.userData.velocity = {
        x: Math.cos(angle) * speed,
        y: result.good ? .48 + Math.random() * .46 : .22 + Math.random() * .25,
        z: Math.sin(angle) * speed,
      };
      group.add(particle);
      particles.push(particle);
    }
    three.scene.add(group);
    state.pocketEffects.push({ age: 0, duration: POCKET_EFFECT_DURATION, group, emoji, particles, good: result.good });
  }

  function updatePocketEffects(dt) {
    for (let index = state.pocketEffects.length - 1; index >= 0; index--) {
      const effect = state.pocketEffects[index];
      effect.age += dt;
      const t = clamp(effect.age / effect.duration, 0, 1);
      const opacity = Math.max(0, 1 - t);
      effect.emoji.position.y = .12 + t * .62;
      effect.emoji.scale.setScalar(.46 + Math.sin(Math.min(1, t * 2.8) * Math.PI) * .16);
      effect.emoji.material.opacity = opacity;
      effect.particles.forEach(particle => {
        const velocity = particle.userData.velocity;
        particle.position.x += velocity.x * dt;
        particle.position.y += velocity.y * dt;
        particle.position.z += velocity.z * dt;
        velocity.y -= (effect.good ? .56 : .9) * dt;
        particle.material.opacity = opacity * .9;
        particle.scale.setScalar(1 + t * (effect.good ? 1.2 : .45));
      });
      if (t >= 1) {
        disposePocketEffect(effect);
        state.pocketEffects.splice(index, 1);
      }
    }
  }

  function clearPocketEffects() {
    state.pocketEffects.forEach(disposePocketEffect);
    state.pocketEffects = [];
  }

  function disposePocketEffect(effect) {
    if (!effect?.group) return;
    effect.group.traverse(object => {
      object.geometry?.dispose?.();
      if (object.material) {
        object.material.map?.dispose?.();
        object.material.dispose?.();
      }
    });
    three.scene?.remove(effect.group);
  }

  function makeEmojiTexture(emoji) {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    ctx.beginPath();
    ctx.arc(64, 64, 48, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '76px Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, 64, 68);
    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
  }

  function pocketResultFor(ball) {
    if (ball.type === 'cue') return { good: false, emoji: '😵', color: 0xef4444, accent: 0xf97316 };
    if (state.mode === 'snooker') {
      const expectedRed = state.snookerNext === 'red';
      const legal = expectedRed ? ball.type === 'red' : ball.type !== 'red';
      return legal
        ? { good: true, emoji: '😄', color: 0x22c55e, accent: 0xfacc15 }
        : { good: false, emoji: '😵', color: 0xef4444, accent: 0x60a5fa };
    }
    const ownGroup = playerGroup(state.currentPlayer);
    if (ball.type === 'eight') {
      const remainingOwn = ownGroup ? state.balls.some(other => other.type === ownGroup && !other.pocketed) : true;
      return remainingOwn
        ? { good: false, emoji: '😵', color: 0xef4444, accent: 0xf97316 }
        : { good: true, emoji: '😄', color: 0x22c55e, accent: 0xfacc15 };
    }
    const opponentGroup = ownGroup === 'solid' ? 'stripe' : ownGroup === 'stripe' ? 'solid' : null;
      if (opponentGroup && ball.type === opponentGroup) return { good: false, emoji: '😬', color: 0x60a5fa, accent: 0xef4444 };
      return { good: true, emoji: '😄', color: 0x22c55e, accent: 0xfacc15 };
  }

  function afterPhysicsCheck() {
    if (!state.running || ballsMoving()) return;
    state.running = false;
    settleTurn();
  }

  function ballsMoving() {
    return state.balls.some(ball => isBallFalling(ball) || (!ball.pocketed && Math.hypot(ball.vx, ball.vy) > STOP_SPEED));
  }

  function settleTurn() {
    hidePetActor(true);
    const cue = cueBall();
    const cuePotted = state.turnPots.some(b => b.type === 'cue');
    if (cuePotted) respotCue();
    const scoringPots = state.turnPots.filter(b => b.type !== 'cue');
    state.turnSummary = '';
    let keepTurn = scoringPots.length > 0 && !cuePotted;
    if (state.mode === 'eight') keepTurn = settleEight(scoringPots, cuePotted);
    else keepTurn = settleSnooker(scoringPots, cuePotted);
    state.turnPots = [];
    if (isGameOver()) return finishGame();
    if (!keepTurn) state.currentPlayer = state.currentPlayer ? 0 : 1;
    state.inputMode = 'view';
    state.cuePlacement.active = false;
    state.cuePlacement.afterScratch = false;
    if (cuePotted && state.currentPlayer === 0) {
      state.cuePlacement.active = true;
      state.cuePlacement.afterScratch = true;
    }
    if (state.currentPlayer === 0) resetHitPoint();
    const nextAction = state.cuePlacement.active
      ? '白球进袋：拖动白球摆位，然后点击下面白色球确认'
      : state.currentPlayer === 0
        ? '拖动调整视角，或点击白球/下面白色球挥杆'
        : '宠物正在瞄准';
    state.message = state.turnSummary ? `${state.turnSummary} · ${nextAction}` : nextAction;
    updateUI();
    if (state.currentPlayer === 1) scheduleAIShot();
    if (cue) {
      cue.pocketed = false;
      cue.pocketFall = null;
    }
  }

  function settleEight(scoringPots, cuePotted) {
    let keepTurn = scoringPots.length > 0 && !cuePotted;
    let foulEight = false;
    scoringPots.forEach(ball => {
      if (ball.type === 'eight') {
        const ownGroup = playerGroup(state.currentPlayer);
        const remainingOwn = ownGroup ? state.balls.some(b => b.type === ownGroup && !b.pocketed) : true;
        if (remainingOwn) {
          foulEight = true;
          recordPottedBall(state.currentPlayer ? 0 : 1, ball);
        } else {
          addScore(state.currentPlayer, 3);
          recordPottedBall(state.currentPlayer, ball);
        }
        return;
      }
      if (!playerGroup(0) && !playerGroup(1) && (ball.type === 'solid' || ball.type === 'stripe')) {
        state.groupOwner[ball.type === 'solid' ? 'solids' : 'stripes'] = state.currentPlayer;
        state.groupOwner[ball.type === 'solid' ? 'stripes' : 'solids'] = state.currentPlayer ? 0 : 1;
      }
      const ownGroup = playerGroup(state.currentPlayer);
      if (!ownGroup || ball.type === ownGroup) {
        addScore(state.currentPlayer, 1);
        recordPottedBall(state.currentPlayer, ball);
      } else {
        const opponent = state.currentPlayer ? 0 : 1;
        addScore(opponent, 1);
        recordPottedBall(opponent, ball);
      }
    });
    if (cuePotted) {
      keepTurn = false;
      addScore(state.currentPlayer ? 0 : 1, 1);
      state.turnSummary = '白球进袋，对手得分';
    }
    if (foulEight) {
      addScore(state.currentPlayer ? 0 : 1, 4);
      state.turnSummary = '误进黑八，对手得分';
    }
    if (!state.turnSummary) {
      if (scoringPots.length) state.turnSummary = keepTurn ? '进球，继续' : '进球后换人';
      else state.turnSummary = '没有进球，换人';
    }
    return keepTurn && !foulEight;
  }

  function settleSnooker(scoringPots, cuePotted) {
    let keepTurn = scoringPots.length > 0 && !cuePotted;
    let illegalPot = false;
    if (cuePotted) {
      addScore(state.currentPlayer ? 0 : 1, 4);
      state.turnSummary = '白球进袋，对手加4分';
    }
    scoringPots.forEach(ball => {
      const expectedRed = state.snookerNext === 'red';
      const legal = expectedRed ? ball.type === 'red' : ball.type !== 'red';
      if (legal) {
        addScore(state.currentPlayer, ball.points);
        recordPottedBall(state.currentPlayer, ball);
        state.snookerNext = expectedRed ? 'color' : 'red';
      } else {
        const opponent = state.currentPlayer ? 0 : 1;
        addScore(opponent, Math.max(4, ball.points || 4));
        recordPottedBall(opponent, ball);
        keepTurn = false;
        illegalPot = true;
      }
      if (ball.type !== 'red' && redsRemaining()) respotColored(ball);
    });
    if (!redsRemaining()) state.snookerNext = 'color';
    if (!state.turnSummary) {
      if (illegalPot) state.turnSummary = '打错目标，对手得分';
      else if (scoringPots.length) state.turnSummary = keepTurn ? '进球，继续' : '进球后换人';
      else state.turnSummary = '没有进球，换人';
    }
    return keepTurn;
  }

  function addScore(player, points) {
    if (player === 0) state.playerScore += points;
    else state.petScore += points;
  }

  function recordPottedBall(player, ball) {
    if (!ball || ball.type === 'cue') return;
    const list = state.pocketed[player] || (state.pocketed[player] = []);
    list.unshift({ id: ball.id, type: ball.type, color: ball.color, label: ballLabel(ball), points: ball.points });
    if (list.length > 36) list.length = 36;
  }

  function renderPottedBalls() {
    renderPottedBallStrip(els.playerPots, state.pocketed[0] || []);
    renderPottedBallStrip(els.petPots, state.pocketed[1] || []);
  }

  function renderPottedBallStrip(container, balls) {
    if (!container) return;
    const key = balls.map(ball => `${ball.id}:${ball.type}:${ball.label}`).join('|');
    if (container.dataset.potsKey === key) return;
    container.replaceChildren(...balls.map(makePottedBallElement));
    container.dataset.potsKey = key;
    if (container.classList.contains('pet')) container.scrollLeft = container.scrollWidth;
    else container.scrollLeft = 0;
  }

  function makePottedBallElement(ball) {
    const el = document.createElement('span');
    el.className = `mh-pot-ball ${ball.type || ''}`;
    el.style.setProperty('--ball-color', ball.color || '#f8fafc');
    el.title = potBallTitle(ball);
    const label = document.createElement('span');
    label.className = 'mh-pot-label';
    label.textContent = ball.label || '';
    el.appendChild(label);
    return el;
  }

  function potBallTitle(ball) {
    if (ball.type === 'red') return '红球';
    if (ball.type === 'eight') return '黑八';
    if (state.mode === 'snooker' && ball.points) return `${ball.points}分球`;
    return ball.label ? `${ball.label}号球` : '进球';
  }

  function playerGroup(player) {
    if (state.groupOwner.solids === player) return 'solid';
    if (state.groupOwner.stripes === player) return 'stripe';
    return null;
  }

  function redsRemaining() {
    return state.balls.some(b => b.type === 'red' && !b.pocketed);
  }

  function isGameOver() {
    if (state.mode === 'eight') {
      const eight = state.balls.find(b => b.type === 'eight');
      return eight?.pocketed || !state.balls.some(b => b.type !== 'cue' && b.type !== 'eight' && !b.pocketed);
    }
    return !state.balls.some(b => b.type !== 'cue' && !b.pocketed) || Math.max(state.playerScore, state.petScore) >= DIFFICULTIES[state.difficulty].targetScore + 6;
  }

  function finishGame() {
    state.finished = true;
    state.started = false;
    state.running = false;
    state.inputMode = 'view';
    state.cuePlacement.active = false;
    cancelAim();
    stopTimer();
    const won = state.playerScore >= state.petScore;
    const earnedPoints = Math.max(1, state.playerScore * 10 + (won ? 30 : 8) - Math.floor(state.seconds / 9));
    state.best = Math.max(state.best, earnedPoints);
    localStorage.setItem(BEST_KEY, String(state.best));
    state.message = won ? '你赢啦' : '宠物赢了';
    updateUI();
    toast(won ? '胜利！' : '对局结束');
    playFinishSound(won);
    window.parent.postMessage({
      type: 'gameFinished',
      data: {
        earnedPoints,
        score: state.playerScore,
        petScore: state.petScore,
        mode: state.mode,
        difficulty: state.difficulty,
        seconds: state.seconds,
        passed: won,
        rewardCoins: Math.max(10, Math.min(DIFFICULTIES[state.difficulty].reward, Math.round(earnedPoints / 8))),
        roundId: `billiards_${Date.now()}`,
      }
    }, '*');
  }

  function respotCue() {
    const cue = cueBall();
    if (!cue) return;
    cue.pocketed = false;
    cue.pocketFall = null;
    cue.x = -TABLE.width * .34;
    cue.y = 0;
    cue.vx = 0;
    cue.vy = 0;
    resetBallSpin(cue);
    cue.rollQuat?.identity?.();
    nudgeIfOverlapping(cue);
  }

  function respotColored(ball) {
    ball.pocketed = false;
    ball.pocketFall = null;
    ball.x = ball.respot.x;
    ball.y = ball.respot.y;
    ball.vx = 0;
    ball.vy = 0;
    resetBallSpin(ball);
    ball.rollQuat?.identity?.();
    nudgeIfOverlapping(ball);
  }

  function nudgeIfOverlapping(ball) {
    for (let tries = 0; tries < 18; tries++) {
      const overlap = state.balls.some(other => other !== ball && !other.pocketed && Math.hypot(other.x - ball.x, other.y - ball.y) < BALL_RADIUS * 2.2);
      if (!overlap) return;
      ball.y += (tries % 2 ? -1 : 1) * BALL_RADIUS * .9;
      if (Math.abs(ball.y) > TABLE.height / 2 - BALL_RADIUS) ball.y = 0;
    }
  }

  function cueBall() {
    return state.balls.find(b => b.type === 'cue');
  }

  function toggleSwingMode() {
    if (state.inputMode !== 'swing') enterSwingMode();
  }

  function onHitControlDown(event) {
    if (!canHumanShoot()) return;
    ensureAudio();
    state.hitControl = { active: true, pointer: event.pointerId, moved: false, startX: event.clientX, startY: event.clientY };
    els.swing.setPointerCapture?.(event.pointerId);
    event.preventDefault();
  }

  function onHitControlMove(event) {
    const control = state.hitControl;
    if (!control.active || control.pointer !== event.pointerId) return;
    const moved = Math.hypot(event.clientX - control.startX, event.clientY - control.startY) >= HIT_POINT_DRAG_THRESHOLD;
    if (moved) {
      control.moved = true;
      state.hitPoint = hitPointFromEvent(event);
      updateHitPointUI();
      state.message = '击球点已调整，松手进入挥杆';
      updateUI();
    }
    event.preventDefault();
  }

  function onHitControlUp(event) {
    const control = state.hitControl;
    if (!control.active || control.pointer !== event.pointerId) return;
    if (control.moved) state.hitPoint = hitPointFromEvent(event);
    state.hitControl = { active: false, pointer: null, moved: false, startX: 0, startY: 0 };
    updateHitPointUI();
    enterSwingMode();
    event.preventDefault();
  }

  function onHitControlCancel(event) {
    if (state.hitControl.pointer !== event.pointerId) return;
    state.hitControl = { active: false, pointer: null, moved: false, startX: 0, startY: 0 };
  }

  function hitPointFromEvent(event) {
    const rect = els.swing.getBoundingClientRect();
    const radius = Math.min(rect.width, rect.height) * .38;
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let x = (event.clientX - centerX) / radius;
    let y = (event.clientY - centerY) / radius;
    const length = Math.hypot(x, y);
    if (length > 1) {
      x /= length;
      y /= length;
    }
    return { x: clamp(x, -1, 1), y: clamp(y, -1, 1) };
  }

  function updateHitPointUI() {
    if (!els.hitDot) return;
    els.hitDot.style.left = `${50 + state.hitPoint.x * 32}%`;
    els.hitDot.style.top = `${50 + state.hitPoint.y * 32}%`;
    const side = Math.round(state.hitPoint.x * 100);
    const vertical = Math.round(-state.hitPoint.y * 100);
    els.swing.setAttribute('aria-label', `挥杆击球点，左右 ${side}，上下 ${vertical}`);
  }

  function resetHitPoint() {
    state.hitPoint = { x: 0, y: 0 };
    updateHitPointUI();
  }

  function enterSwingMode() {
    if (!canHumanShoot()) return;
    state.cuePlacement.active = false;
    state.cuePlacement.pointer = null;
    state.inputMode = 'swing';
    state.aim.dir = cameraShotDirection();
    state.aim.power = 0;
    state.message = '挥杆模式：拖动蓄力，松手击球';
    updateUI();
  }

  function exitSwingMode(message = '拖动调整视角，然后拖动或点击下面白色球挥杆') {
    cancelAim();
    state.inputMode = 'view';
    state.message = message;
    updateUI();
  }

  function cancelSwingFromZone(event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    if (state.inputMode !== 'swing') return;
    exitSwingMode('已取消挥杆，可继续调整视角');
  }

  function canPlaceCue() {
    return canHumanShoot() && state.cuePlacement.active && state.inputMode === 'view';
  }

  function pointerNearCue(point, cue) {
    return point && cue && Math.hypot(point.x - cue.x, point.y - cue.y) < BALL_RADIUS * 4.2;
  }

  function placeCueBall(point) {
    const cue = cueBall();
    if (!cue || !point) return;
    const fullTable = state.cuePlacement.afterScratch;
    cue.x = fullTable
      ? clamp(point.x, -TABLE.width / 2 + BALL_RADIUS * 2.2, TABLE.width / 2 - BALL_RADIUS * 2.2)
      : clamp(point.x, -TABLE.width / 2 + BALL_RADIUS * 2.2, -TABLE.width * .24);
    cue.y = fullTable
      ? clamp(point.y, -TABLE.height / 2 + BALL_RADIUS * 2.2, TABLE.height / 2 - BALL_RADIUS * 2.2)
      : clamp(point.y, -TABLE.height * .3, TABLE.height * .3);
    cue.vx = 0;
    cue.vy = 0;
    resetBallSpin(cue);
    cue.rollQuat?.identity?.();
    nudgeIfOverlapping(cue);
    updateBallMeshes();
  }

  function onPointerDown(event) {
    ensureAudio();
    const point = screenToTable(event.clientX, event.clientY);
    const cue = cueBall();
    if (canPlaceCue() && pointerNearCue(point, cue)) {
      els.stage.setPointerCapture?.(event.pointerId);
      state.cuePlacement.pointer = event.pointerId;
      placeCueBall(point);
      state.message = state.cuePlacement.afterScratch ? '拖动白球自由摆位，然后点击下面白色球确认' : '拖动白球摆位，然后点击下面白色球确认';
      updateUI();
      event.preventDefault();
      return;
    }
    if (canHumanShoot() && state.inputMode === 'view' && pointerNearCue(point, cue)) {
      enterSwingMode();
      event.preventDefault();
      return;
    }
    if (state.aim.active) return;
    const shouldAim = canHumanShoot() && state.inputMode === 'swing' && point && cue && !cue.pocketed;
    if (!shouldAim) {
      startCameraPointer(event);
      return;
    }
    els.stage.setPointerCapture?.(event.pointerId);
    state.pointer = event.pointerId;
    state.aim.active = true;
    state.aim.intentReady = false;
    state.aim.blocked = false;
    state.aim.startX = point.x;
    state.aim.startY = point.y;
    state.aim.screenStartX = event.clientX;
    state.aim.screenStartY = event.clientY;
    state.aim.x = point.x;
    state.aim.y = point.y;
    state.aim.power = 0;
    updateCancelZoneText();
    three.cue.visible = false;
    three.aimLine.visible = false;
    three.targetLine.visible = false;
    event.preventDefault();
  }

  function onPointerMove(event) {
    if (state.cuePlacement.pointer === event.pointerId) {
      const point = screenToTable(event.clientX, event.clientY);
      placeCueBall(point);
      event.preventDefault();
      return;
    }
    if (!state.aim.active || state.pointer !== event.pointerId) {
      updateCameraPointer(event);
      return;
    }
    const dragPixels = Math.hypot(event.clientX - state.aim.screenStartX, event.clientY - state.aim.screenStartY);
    if (dragPixels < AIM_INTENT_PIXEL_THRESHOLD) {
      state.aim.intentReady = false;
      state.aim.power = 0;
      els.powerBar.style.height = '0%';
      updateCancelZoneText();
      three.cue.visible = false;
      three.aimLine.visible = false;
      three.targetLine.visible = false;
      event.preventDefault();
      return;
    }
    const point = screenToTable(event.clientX, event.clientY);
    if (!point) return;
    state.aim.intentReady = true;
    updateCancelZoneText();
    const dx = state.aim.startX - point.x;
    const dy = state.aim.startY - point.y;
    const length = Math.hypot(dx, dy);
    if (length > .001) {
      state.aim.dir = { x: dx / length, y: dy / length };
      state.aim.power = Math.min(1, dragPixels / AIM_FULL_POWER_PIXELS);
    }
    state.aim.x = point.x;
    state.aim.y = point.y;
    els.powerBar.style.height = `${Math.round(state.aim.power * 100)}%`;
    event.preventDefault();
  }

  function onPointerUp(event) {
    if (state.cuePlacement.pointer === event.pointerId) {
      state.cuePlacement.pointer = null;
      state.message = '白球已摆好，点击下面白色球开始瞄准';
      updateUI();
      event.preventDefault();
      return;
    }
    if (!state.aim.active || state.pointer !== event.pointerId) {
      endCameraPointer(event.pointerId);
      return;
    }
    if (isPointOverElement(event, els.cancelZone)) {
      exitSwingMode('已取消挥杆，可继续调整视角');
      event.preventDefault();
      return;
    }
    const power = state.aim.power;
    const dir = { ...state.aim.dir };
    const blocked = state.aim.blocked;
    cancelAim();
    if (blocked) {
      state.message = '这个角度球杆被挡住了，换个方向试试';
      state.inputMode = 'swing';
      updateUI();
      return;
    }
    if (power < .055) {
      state.message = '力度太小，再拖远一点';
      updateUI();
      return;
    }
    state.inputMode = 'view';
    shoot(dir, power, 0, { ...state.hitPoint });
    event.preventDefault();
  }

  function onPointerCancel(event) {
    if (state.cuePlacement.pointer === event.pointerId) state.cuePlacement.pointer = null;
    if (state.aim.active && state.pointer === event.pointerId) cancelAim();
    endCameraPointer(event.pointerId);
  }

  function cancelAim() {
    state.aim.active = false;
    state.aim.intentReady = false;
    state.aim.blocked = false;
    state.pointer = null;
    els.powerBar.style.height = '0%';
    updateCancelZoneText();
    three.cue.visible = false;
    if (three.cueHitDot) three.cueHitDot.visible = false;
    three.aimLine.visible = false;
    three.targetLine.visible = false;
    if (three.pocketLine) three.pocketLine.visible = false;
    if (three.ghostBall) three.ghostBall.visible = false;
  }

  function startCameraPointer(event) {
    els.stage.setPointerCapture?.(event.pointerId);
    state.cameraControl.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
    resetCameraGesture();
    if (!state.running && !state.aiThinking) {
      state.message = state.started ? '拖动旋转视角，双指缩放/平移' : '拖动调整视角，双指缩放/平移';
      updateUI();
    }
    event.preventDefault();
  }

  function updateCameraPointer(event) {
    const control = state.cameraControl;
    if (!control.pointers.has(event.pointerId)) return;
    control.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
    applyCameraGesture();
    event.preventDefault();
  }

  function endCameraPointer(pointerId) {
    const control = state.cameraControl;
    if (!control.pointers.has(pointerId)) return;
    control.pointers.delete(pointerId);
    resetCameraGesture();
    if (!control.pointers.size && state.started && !state.running && !state.aiThinking) {
      state.message = state.currentPlayer === 0 ? (state.cuePlacement.active ? '拖动白球摆位，然后点击下面白色球确认' : '拖动调整视角，然后拖动或点击下面白色球挥杆') : '宠物正在瞄准';
      updateUI();
    }
  }

  function resetCameraGesture() {
    const metrics = cameraPointerMetrics();
    state.cameraControl.gesture = metrics ? { ...metrics } : null;
  }

  function cameraPointerMetrics() {
    const points = [...state.cameraControl.pointers.values()];
    if (!points.length) return null;
    if (points.length === 1) return { count: 1, x: points[0].x, y: points[0].y, distance: 0 };
    const a = points[0];
    const b = points[1];
    return {
      count: points.length,
      x: (a.x + b.x) / 2,
      y: (a.y + b.y) / 2,
      distance: Math.max(1, Math.hypot(a.x - b.x, a.y - b.y)),
    };
  }

  function applyCameraGesture() {
    const control = state.cameraControl;
    const prev = control.gesture;
    const next = cameraPointerMetrics();
    if (!prev || !next || prev.count !== next.count) {
      resetCameraGesture();
      return;
    }
    control.autoDistance = false;
    if (next.count === 1) {
      const dx = next.x - prev.x;
      const dy = next.y - prev.y;
      const rotateSpeed = cameraRotateSpeed(Math.hypot(dx, dy));
      control.yaw -= dx * rotateSpeed;
      control.pitch = clamp(control.pitch + dy * rotateSpeed * .78, CAMERA_PITCH_MIN, CAMERA_PITCH_MAX);
      applyAutoCameraOriginShift();
    } else {
      const zoomRatio = prev.distance / next.distance;
      control.distance = clamp(control.distance * zoomRatio, CAMERA_DISTANCE_MIN, CAMERA_DISTANCE_MAX);
      applyAutoCameraOriginShift();
      panCameraTarget(next.x - prev.x, next.y - prev.y);
    }
    control.gesture = { ...next };
    updateCamera();
  }

  function cameraRotateSpeed(deltaPixels) {
    const aiming = state.inputMode === 'swing';
    const slow = aiming ? CAMERA_ROTATE_AIM_SLOW : CAMERA_ROTATE_VIEW_SLOW;
    const fast = aiming ? CAMERA_ROTATE_AIM_FAST : CAMERA_ROTATE_VIEW_FAST;
    const startPixels = aiming ? CAMERA_ROTATE_AIM_ACCEL_START_PIXELS : CAMERA_ROTATE_VIEW_ACCEL_START_PIXELS;
    const accelPixels = aiming ? CAMERA_ROTATE_AIM_ACCEL_PIXELS : CAMERA_ROTATE_VIEW_ACCEL_PIXELS;
    const t = clamp((deltaPixels - startPixels) / accelPixels, 0, 1);
    const smooth = t * t * (3 - 2 * t);
    return slow + (fast - slow) * smooth;
  }

  function applyAutoCameraOriginShift() {
    if (state.inputMode !== 'view') return;
    const cue = cueBall();
    if (!cue || cue.pocketed) return;
    const control = state.cameraControl;
    const zoomOutT = clamp((control.distance - AUTO_CAMERA_ORIGIN_ZOOM_IN_DISTANCE) / (AUTO_CAMERA_ORIGIN_ZOOM_OUT_DISTANCE - AUTO_CAMERA_ORIGIN_ZOOM_IN_DISTANCE), 0, 1);
    const cueWeight = 1 - zoomOutT;
    const forwardX = -Math.sin(control.yaw);
    const cueAnchorX = clamp(cue.x + forwardX * AUTO_CAMERA_ORIGIN_LOOK_AHEAD, -TABLE.width * .32, TABLE.width * .32);
    const cueAnchorY = clamp(cue.y, -TABLE.height * .32, TABLE.height * .32);
    const targetX = cueAnchorX * cueWeight;
    const targetY = cueAnchorY * cueWeight;
    const cueSpeed = Math.hypot(cue.vx || 0, cue.vy || 0);
    const fastT = clamp(cueSpeed / AUTO_CAMERA_ORIGIN_FAST_SPEED, 0, 1);
    const movingEase = AUTO_CAMERA_ORIGIN_MOVING_EASE + (AUTO_CAMERA_ORIGIN_FAST_EASE - AUTO_CAMERA_ORIGIN_MOVING_EASE) * fastT;
    const ease = state.running ? movingEase : AUTO_CAMERA_ORIGIN_EASE;
    control.targetX += (targetX - control.targetX) * ease;
    control.targetY += (targetY - control.targetY) * ease;
  }

  function panCameraTarget(dx, dy) {
    const control = state.cameraControl;
    const scale = control.distance * .00155;
    const right = { x: Math.cos(control.yaw), y: -Math.sin(control.yaw) };
    const forward = { x: Math.sin(control.yaw), y: Math.cos(control.yaw) };
    control.targetX = clamp(control.targetX - right.x * dx * scale + forward.x * dy * scale, -TABLE.width * .32, TABLE.width * .32);
    control.targetY = clamp(control.targetY - right.y * dx * scale + forward.y * dy * scale, -TABLE.height * .32, TABLE.height * .32);
  }

  function onWheel(event) {
    state.cameraControl.autoDistance = false;
    state.cameraControl.distance = clamp(state.cameraControl.distance * (1 + Math.sign(event.deltaY) * .09), CAMERA_DISTANCE_MIN, CAMERA_DISTANCE_MAX);
    applyAutoCameraOriginShift();
    updateCamera();
    event.preventDefault();
  }

  function canHumanShoot() {
    return state.started && !state.finished && !state.running && state.currentPlayer === 0 && !state.aiThinking;
  }

  function shoot(dir, power, player, hitPoint = { x: 0, y: 0 }) {
    const cue = cueBall();
    if (!cue || cue.pocketed || state.running) return;
    state.inputMode = 'view';
    state.cuePlacement.active = false;
    state.turnPots = [];
    state.currentPlayer = player;
    const speed = 6.2 + power * 8.8;
    ensureAudio();
    playShootSound(power);
    if (player === 1) {
      state.aiThinking = false;
    }
    cue.vx = dir.x * speed;
    cue.vy = dir.y * speed;
    const contact = normalizeHitPoint(hitPoint);
    cue.spinSide = contact.x * power;
    cue.spinForward = -contact.y * power;
    cue.spinDirX = dir.x;
    cue.spinDirY = dir.y;
    state.running = true;
    state.shotCount += 1;
    state.message = '球在运动中';
    updateUI();
  }

  function scheduleAIShot() {
    if (state.aiThinking || state.finished) return;
    state.inputMode = 'view';
    state.cuePlacement.active = false;
    state.aiThinking = true;
    showThinkingPetActor();
    updateUI();
    setTimeout(() => {
      if (state.currentPlayer !== 1 || state.running || state.finished) return;
      const shot = chooseAIShot();
      startPetHitAnimation(shot);
    }, 460 + Math.random() * 360);
  }

  function showThinkingPetActor() {
    const cue = cueBall();
    if (!cue || !three.petActor) return;
    positionPetActor({ dir: { x: 1, y: 0 }, power: .35 });
    three.petActor.visible = true;
    if (three.petStick) three.petStick.visible = true;
    if (three.petThought) three.petThought.visible = true;
    state.aiShotAnimation.active = false;
  }

  function startPetHitAnimation(shot) {
    if (!three.petActor) {
      state.aiThinking = false;
      shoot(shot.dir, shot.power, 1);
      return;
    }
    positionPetActor(shot);
    three.petActor.visible = true;
    if (three.petStick) three.petStick.visible = true;
    if (three.petThought) three.petThought.visible = false;
    state.aiShotAnimation = { active: true, startedAt: performance.now(), duration: 680, shot, fired: false };
  }

  function hidePetActor(force = false) {
    if (!force && state.currentPlayer === 1 && state.running) return;
    if (three.petActor) three.petActor.visible = false;
    if (three.petStick) three.petStick.visible = false;
    state.aiShotAnimation.active = false;
  }

  function positionPetActor(shot) {
    const cue = cueBall();
    if (!cue || !three.petActor || !shot?.dir) return;
    const dir = normalize(shot.dir);
    const side = { x: -dir.y, y: dir.x };
    const bodyDistance = .92;
    const sideOffset = .36;
    const x = cue.x - dir.x * bodyDistance + side.x * sideOffset;
    const z = cue.y - dir.y * bodyDistance + side.y * sideOffset;
    three.petActor.position.set(x, BALL_RADIUS, z);
    three.petActor.rotation.y = Math.atan2(dir.x, dir.y);
    updatePetStickPose(dir, shot.power || .55, 0);
  }

  function movePetAsideAfterStroke(shot) {
    const cue = cueBall();
    if (!cue || !three.petActor || !shot?.dir) return;
    const dir = normalize(shot.dir);
    const side = { x: dir.y, y: -dir.x };
    let x;
    let z;
    if (Math.abs(side.x) > Math.abs(side.y)) {
      x = side.x > 0 ? TABLE.width / 2 + .78 : -TABLE.width / 2 - .78;
      z = clamp(cue.y + side.y * 1.2, -TABLE.height / 2 + .62, TABLE.height / 2 - .62);
    } else {
      x = clamp(cue.x + side.x * 1.2, -TABLE.width / 2 + .72, TABLE.width / 2 - .72);
      z = side.y > 0 ? TABLE.height / 2 + .78 : -TABLE.height / 2 - .78;
    }
    three.petActor.position.set(x, BALL_RADIUS, z);
    const face = normalize({ x: -x, y: -z });
    three.petActor.rotation.y = Math.atan2(face.x, face.y);
    three.petActor.scale.setScalar(.94);
    if (three.petStick) {
      three.petStick.visible = true;
      three.petStick.position.set(x + face.x * .28, BALL_RADIUS * 3.2, z + face.y * .28);
      three.petStick.quaternion.setFromUnitVectors(three.reusable.cueUp, three.reusable.cueDir.set(face.x * .22, .96, face.y * .22).normalize());
    }
  }

  function updatePetStickPose(dir, power, phase) {
    const cue = cueBall();
    if (!cue || !three.petStick) return;
    const pull = .18 + power * .5;
    const strikeOffset = phase < .45 ? phase / .45 * pull : (1 - (phase - .45) / .55) * pull * .38;
    const tipGap = BALL_RADIUS + .08 + pull - strikeOffset;
    const tip = { x: cue.x - dir.x * tipGap, y: cue.y - dir.y * tipGap };
    const back = { x: tip.x - dir.x * 2.25, y: tip.y - dir.y * 2.25 };
    three.petStick.position.set((tip.x + back.x) / 2, BALL_RADIUS * 1.45, (tip.y + back.y) / 2);
    three.petStick.quaternion.setFromUnitVectors(three.reusable.cueUp, three.reusable.cueDir.set(dir.x, 0, dir.y).normalize());
  }

  function updatePetActor(now) {
    if (!three.petActor || !three.petActor.visible) return;
    const actor = three.petActor;
    actor.position.y = BALL_RADIUS + Math.sin(now * .004) * .025;
    if (three.petThought?.visible) three.petThought.position.y = 1.24 + Math.sin(now * .006) * .04;
    const anim = state.aiShotAnimation;
    if (!anim.active || !anim.shot) return;
    const phase = clamp((now - anim.startedAt) / anim.duration, 0, 1);
    const dir = normalize(anim.shot.dir);
    updatePetStickPose(dir, anim.shot.power, phase);
    actor.scale.setScalar(1 + Math.sin(phase * Math.PI) * .06);
    if (!anim.fired && phase >= .56) {
      anim.fired = true;
      shoot(anim.shot.dir, anim.shot.power, 1);
      movePetAsideAfterStroke(anim.shot);
      anim.active = false;
      actor.scale.setScalar(.94);
      return;
    }
    if (phase >= 1) {
      anim.active = false;
      actor.scale.setScalar(1);
    }
  }

  function chooseAIShot() {
    const cue = cueBall();
    const targets = legalTargetsFor(1);
    let bestShot = null;
    let bestScore = -Infinity;
    const pockets = pocketCenters();
    targets.forEach(ball => {
      pockets.forEach(pocket => {
        const candidate = pocketShotFor(cue, ball, pocket);
        if (!candidate) return;
        const cueToGhost = distance(cue, candidate.ghost);
        const ballToPocket = distance(ball, pocket);
        const anglePenalty = Math.abs(candidate.cutAngle) * 1.35;
        const score = -cueToGhost - ballToPocket * .74 - anglePenalty + Math.random() * .28;
        if (score > bestScore) { bestScore = score; bestShot = candidate; }
      });
    });
    const best = bestShot?.ball || targets[0] || state.balls.find(b => b.type !== 'cue' && !b.pocketed);
    if (!best) return { dir: { x: 1, y: 0 }, power: .48 };
    const aim = bestShot ? bestShot.dir : ghostAim(cue, best);
    const diff = DIFFICULTIES[state.difficulty];
    const angle = Math.atan2(aim.y, aim.x) + (Math.random() - .5) * diff.aiNoise;
    const dist = bestShot ? distance(cue, bestShot.ghost) + distance(best, bestShot.pocket) * .34 : Math.hypot(best.x - cue.x, best.y - cue.y);
    const power = Math.max(.32, Math.min(.96, (.34 + dist / 7.5) * diff.aiPower));
    return { dir: { x: Math.cos(angle), y: Math.sin(angle) }, power };
  }

  function pocketShotFor(cue, ball, pocket) {
    if (!cue || !ball || !pocket) return null;
    const targetToPocket = normalize({ x: pocket.x - ball.x, y: pocket.y - ball.y });
    const ghost = { x: ball.x - targetToPocket.x * BALL_RADIUS * 2, y: ball.y - targetToPocket.y * BALL_RADIUS * 2 };
    const cueToGhost = normalize({ x: ghost.x - cue.x, y: ghost.y - cue.y });
    const cutAngle = Math.acos(clamp(cueToGhost.x * targetToPocket.x + cueToGhost.y * targetToPocket.y, -1, 1));
    if (cutAngle > Math.PI * .54) return null;
    if (!isPathClear(cue, ghost, cue, ball, BALL_RADIUS * 2.16)) return null;
    if (!isPathClear(ball, pocket, ball, null, BALL_RADIUS * 1.72)) return null;
    return { ball, pocket, ghost, dir: cueToGhost, cutAngle };
  }

  function isPathClear(from, to, ignoreA, ignoreB, clearance) {
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const lengthSq = dx * dx + dy * dy;
    if (lengthSq <= .0001) return false;
    return !state.balls.some(ball => {
      if (ball.pocketed || ball === ignoreA || ball === ignoreB || ball.type === 'cue') return false;
      const t = clamp(((ball.x - from.x) * dx + (ball.y - from.y) * dy) / lengthSq, 0, 1);
      const closestX = from.x + dx * t;
      const closestY = from.y + dy * t;
      return Math.hypot(ball.x - closestX, ball.y - closestY) < clearance;
    });
  }

  function legalTargetsFor(player) {
    if (state.mode === 'eight') {
      const group = playerGroup(player);
      if (group) {
        const groupBalls = state.balls.filter(b => b.type === group && !b.pocketed);
        if (groupBalls.length) return groupBalls;
        return state.balls.filter(b => b.type === 'eight' && !b.pocketed);
      }
      return state.balls.filter(b => (b.type === 'solid' || b.type === 'stripe') && !b.pocketed);
    }
    if (state.snookerNext === 'red' && redsRemaining()) return state.balls.filter(b => b.type === 'red' && !b.pocketed);
    return state.balls.filter(b => !['cue', 'red'].includes(b.type) && !b.pocketed);
  }

  function ghostAim(cue, target) {
    const pockets = pocketCenters();
    const pocket = pockets.reduce((a, p) => distance(target, p) < distance(target, a) ? p : a, pockets[0]);
    const tx = pocket.x - target.x;
    const ty = pocket.y - target.y;
    const td = Math.hypot(tx, ty) || 1;
    const ghostX = target.x - tx / td * BALL_RADIUS * 2;
    const ghostY = target.y - ty / td * BALL_RADIUS * 2;
    const dx = ghostX - cue.x;
    const dy = ghostY - cue.y;
    const d = Math.hypot(dx, dy) || 1;
    return { x: dx / d, y: dy / d };
  }

  function updateAimVisuals() {
    const cue = cueBall();
    if (!cue) {
      if (three.cueHitDot) three.cueHitDot.visible = false;
      return;
    }
    const dir = state.aim.dir;
    const power = state.aim.power;
    if (!state.aim.active) {
      const showSwingPreview = state.inputMode === 'swing' && canHumanShoot() && !cue.pocketed;
      const showHitControlPreview = state.hitControl.active && canHumanShoot() && !cue.pocketed;
      if (showSwingPreview || showHitControlPreview) {
        state.aim.dir = cameraShotDirection();
        if (showSwingPreview) setCueStickPose(cue, state.aim.dir, 0);
        else three.cue.visible = false;
      } else {
        three.cue.visible = false;
      }
      updateCueHitDot(cue, state.aim.dir);
      three.aimLine.visible = false;
      three.targetLine.visible = false;
      if (three.pocketLine) three.pocketLine.visible = false;
      if (three.ghostBall) three.ghostBall.visible = false;
      return;
    }
    if (!state.aim.intentReady) {
      setCueStickPose(cue, state.aim.dir, 0);
      updateCueHitDot(cue, state.aim.dir);
      three.aimLine.visible = false;
      three.targetLine.visible = false;
      if (three.pocketLine) three.pocketLine.visible = false;
      if (three.ghostBall) three.ghostBall.visible = false;
      return;
    }
    updateCueHitDot(cue, dir);
    state.aim.blocked = !setCueStickPose(cue, dir, power);
    if (state.aim.blocked) {
      three.aimLine.visible = false;
      three.targetLine.visible = false;
      if (three.pocketLine) three.pocketLine.visible = false;
      if (three.ghostBall) three.ghostBall.visible = false;
      els.guideText.textContent = '这个角度球杆被挡住了，换个方向试试';
      return;
    }
    els.guideText.textContent = state.message;
    const prediction = predictCueHit(cue, dir);
    const aimEnd = prediction ? prediction.contact : extendToTableEdge(cue, dir, 5.4);
    setLine(three.aimLine, cue.x, cue.y, aimEnd.x, aimEnd.y);
    three.aimLine.visible = true;

    if (prediction) {
      const out = prediction.targetDir;
      const targetEnd = extendToTableEdge(prediction.ball, out, 2.8);
      setLine(three.targetLine, prediction.ball.x, prediction.ball.y, targetEnd.x, targetEnd.y);
      three.targetLine.visible = true;
      if (three.pocketLine) three.pocketLine.visible = false;
      if (three.ghostBall) {
        three.ghostBall.position.set(prediction.contact.x, BALL_RADIUS * 1.04, prediction.contact.y);
        three.ghostBall.visible = true;
      }
    } else {
      three.targetLine.visible = false;
      if (three.pocketLine) three.pocketLine.visible = false;
      if (three.ghostBall) three.ghostBall.visible = false;
    }
  }

  function updateCueHitDot(cue, dir) {
    if (!three.cueHitDot) return;
    const show = (state.inputMode === 'swing' || state.hitControl.active) && canHumanShoot() && cue && !cue.pocketed;
    if (!show) {
      three.cueHitDot.visible = false;
      return;
    }
    const shotDir = normalize(dir || state.aim.dir || { x: 1, y: 0 });
    const point = normalizeHitPoint(state.hitPoint);
    const maxOffset = .68;
    const offsetX = point.x * maxOffset;
    const offsetY = -point.y * maxOffset;
    const faceDepth = Math.sqrt(Math.max(.18, 1 - offsetX * offsetX - offsetY * offsetY));
    const side = three.reusable.cueHitSide.set(-shotDir.y, 0, shotDir.x).normalize();
    const normal = three.reusable.cueHitNormal
      .set(-shotDir.x * faceDepth, offsetY, -shotDir.y * faceDepth)
      .addScaledVector(side, offsetX)
      .normalize();
    three.cueHitDot.position.set(
      cue.x + normal.x * (BALL_RADIUS + .012),
      BALL_RADIUS + normal.y * (BALL_RADIUS + .012),
      cue.y + normal.z * (BALL_RADIUS + .012)
    );
    three.cueHitDot.visible = true;
  }

  function cameraShotDirection() {
    const yaw = state.cameraControl?.yaw || DEFAULT_CAMERA.yaw;
    return normalize({ x: -Math.sin(yaw), y: -Math.cos(yaw) });
  }

  function setCueStickPose(cue, dir, power) {
    const pullBack = power * CUE_STICK_PULLBACK;
    const cueTip = { x: cue.x - dir.x * (BALL_RADIUS + .1 + pullBack), y: cue.y - dir.y * (BALL_RADIUS + .1 + pullBack) };
    const stickSpace = cueStickSpace(cue, dir, cueTip);
    const visibleLength = stickSpace.length;
    if (visibleLength < CUE_STICK_MIN_VISIBLE) {
      three.cue.visible = false;
      return false;
    }
    const cueBack = { x: cueTip.x - dir.x * visibleLength, y: cueTip.y - dir.y * visibleLength };
    const elevationT = stickSpace.elevated ? clamp((CUE_STICK_LENGTH - stickSpace.railLength) / CUE_STICK_LENGTH, 0, 1) : 0;
    const lift = stickSpace.elevated ? .18 + elevationT * .58 + power * .22 : 0;
    three.cue.visible = true;
    three.cue.scale.set(1, visibleLength / CUE_STICK_MESH_LENGTH, 1);
    three.cue.position.set((cueTip.x + cueBack.x) / 2, BALL_RADIUS * 1.08 + lift * .5, (cueTip.y + cueBack.y) / 2);
    three.cue.quaternion.setFromUnitVectors(three.reusable.cueUp, three.reusable.cueDir.set(dir.x, -lift / Math.max(visibleLength, .001), dir.y).normalize());
    return true;
  }

  function cueStickSpace(cue, dir, cueTip) {
    const back = { x: -dir.x, y: -dir.y };
    const railLength = cueStickRailLength(cueTip, back);
    const cueEdgeGap = cueStickRailLength(cue, back);
    let ballLength = CUE_STICK_LENGTH;

    state.balls.forEach(ball => {
      if (ball === cue || ball.pocketed) return;
      const ox = ball.x - cueTip.x;
      const oy = ball.y - cueTip.y;
      const projection = ox * back.x + oy * back.y;
      if (projection <= 0 || projection >= ballLength) return;
      const perp = Math.abs(ox * back.y - oy * back.x);
      if (perp < BALL_RADIUS * 1.18) ballLength = Math.min(ballLength, projection - BALL_RADIUS * 1.32);
    });
    const elevated = railLength < ballLength && cueEdgeGap > CUE_STICK_EDGE_BLOCK_GAP;
    const length = elevated ? ballLength : Math.min(ballLength, railLength);
    return { length: Math.max(0, length), railLength, elevated };
  }

  function cueStickRailLength(point, back) {
    const minX = -TABLE.width / 2 + BALL_RADIUS * .55;
    const maxX = TABLE.width / 2 - BALL_RADIUS * .55;
    const minY = -TABLE.height / 2 + BALL_RADIUS * .55;
    const maxY = TABLE.height / 2 - BALL_RADIUS * .55;
    let length = CUE_STICK_LENGTH;
    if (back.x > .001) length = Math.min(length, (maxX - point.x) / back.x - .05);
    if (back.x < -.001) length = Math.min(length, (minX - point.x) / back.x - .05);
    if (back.y > .001) length = Math.min(length, (maxY - point.y) / back.y - .05);
    if (back.y < -.001) length = Math.min(length, (minY - point.y) / back.y - .05);
    return Math.max(0, length);
  }

  function predictCueHit(cue, dir) {
    const maxDistance = 7.5;
    let best = null;
    legalTargetsFor(0).forEach(ball => {
      if (ball.pocketed) return;
      const ox = ball.x - cue.x;
      const oy = ball.y - cue.y;
      const projection = ox * dir.x + oy * dir.y;
      if (projection <= BALL_RADIUS * 2 || projection > maxDistance) return;
      const closestSq = ox * ox + oy * oy - projection * projection;
      const assist = DIFFICULTIES[state.difficulty]?.aimHelp || 0;
      const hitRadius = BALL_RADIUS * (2.08 + assist * .55);
      if (closestSq > hitRadius * hitRadius) return;
      const offset = Math.sqrt(Math.max(0, hitRadius * hitRadius - closestSq));
      const t = projection - offset;
      if (t <= 0 || (best && t >= best.t)) return;
      const contact = { x: cue.x + dir.x * t, y: cue.y + dir.y * t };
      const targetDir = normalize({ x: ball.x - contact.x, y: ball.y - contact.y });
      best = { ball, t, contact, targetDir };
    });
    return best;
  }

  function extendToTableEdge(origin, dir, fallbackLength) {
    const minX = -TABLE.width / 2 + BALL_RADIUS;
    const maxX = TABLE.width / 2 - BALL_RADIUS;
    const minY = -TABLE.height / 2 + BALL_RADIUS;
    const maxY = TABLE.height / 2 - BALL_RADIUS;
    const distances = [];
    if (dir.x > .001) distances.push((maxX - origin.x) / dir.x);
    if (dir.x < -.001) distances.push((minX - origin.x) / dir.x);
    if (dir.y > .001) distances.push((maxY - origin.y) / dir.y);
    if (dir.y < -.001) distances.push((minY - origin.y) / dir.y);
    const distance = Math.min(fallbackLength, ...distances.filter(v => v > 0));
    return { x: origin.x + dir.x * distance, y: origin.y + dir.y * distance };
  }

  function bestPocketForBall(ball) {
    const pockets = pocketCenters();
    if (!ball || !pockets.length) return null;
    return pockets.reduce((best, pocket) => distance(ball, pocket) < distance(ball, best) ? pocket : best, pockets[0]);
  }

  function setLine(line, x1, y1, x2, y2) {
    const position = line.geometry.attributes.position;
    position.setXYZ(0, x1, BALL_RADIUS * 1.25, y1);
    position.setXYZ(1, x2, BALL_RADIUS * 1.25, y2);
    position.needsUpdate = true;
  }

  function createLineGeometry() {
    const THREE = window.THREE;
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0, 0, 0, 0], 3));
    return geometry;
  }

  function screenToTable(clientX, clientY) {
    const rect = three.renderer.domElement.getBoundingClientRect();
    const x = ((clientX - rect.left) / rect.width) * 2 - 1;
    const y = -(((clientY - rect.top) / rect.height) * 2 - 1);
    const reusable = three.reusable;
    reusable.pointerNdc.set(x, y);
    reusable.raycaster.setFromCamera(reusable.pointerNdc, three.camera);
    const point = reusable.tablePoint;
    if (!reusable.raycaster.ray.intersectPlane(reusable.tablePlane, point)) return null;
    return { x: point.x, y: point.z };
  }

  function resize() {
    updateUIScale();
    const rect = els.stage.getBoundingClientRect();
    const width = Math.max(1, rect.width);
    const height = Math.max(1, rect.height);
    setRendererPixelRatio();
    three.renderer.setSize(width, height, false);
    three.camera.aspect = width / height;
    const portrait = height > width;
    if (state.cameraControl.autoDistance) state.cameraControl.distance = portrait ? DEFAULT_CAMERA.distancePortrait : DEFAULT_CAMERA.distanceLandscape;
    three.camera.fov = portrait ? 48 : 40;
    updateCamera();
    three.renderer.render(three.scene, three.camera);
  }

  function updateUIScale() {
    const width = window.innerWidth || document.documentElement.clientWidth || 0;
    const height = window.innerHeight || document.documentElement.clientHeight || 0;
    const shortSide = Math.min(width, height);
    const longSide = Math.max(width, height);
    const landscapeReference = Math.min(shortSide / 720, longSide / 1280);
    const portraitReference = Math.min(shortSide / 390, longSide / 844);
    const reference = height > width ? portraitReference : landscapeReference;
    const scale = clamp(reference, 1, IS_MOBILE ? 1.12 : 1.34);
    root.style.setProperty('--mh-ui-scale', scale.toFixed(3));
  }

  function currentGraphicsPreset() {
    return GRAPHICS_PRESETS[state.graphics.level] || GRAPHICS_PRESETS[0];
  }

  function setRendererPixelRatio() {
    if (!three.renderer) return;
    const preset = currentGraphicsPreset();
    three.renderer.setPixelRatio(Math.min(MAX_PIXEL_RATIO, preset.pixelRatio, window.devicePixelRatio || 1));
  }

  function monitorGraphicsQuality(now) {
    if (state.graphics.mode !== 'auto') return;
    const graphics = state.graphics;
    if (!graphics.sampleStartedAt) {
      graphics.sampleStartedAt = now;
      graphics.frames = 0;
      return;
    }
    graphics.frames += 1;
    const elapsed = now - graphics.sampleStartedAt;
    if (elapsed < GRAPHICS_FPS_SAMPLE_MS) return;
    const fps = graphics.frames * 1000 / elapsed;
    const canDowngrade = graphics.level < GRAPHICS_PRESETS.length - 1 && now - graphics.lastDowngradeAt > GRAPHICS_DOWNGRADE_COOLDOWN_MS;
    if (fps < GRAPHICS_LOW_FPS && canDowngrade) applyGraphicsQuality(graphics.level + 1, now);
    graphics.sampleStartedAt = now;
    graphics.frames = 0;
  }

  function applyGraphicsQuality(level, now = performance.now()) {
    state.graphics.level = clamp(Math.round(level), 0, GRAPHICS_PRESETS.length - 1);
    state.graphics.lastDowngradeAt = now;
    const preset = currentGraphicsPreset();
    setRendererPixelRatio();
    if (three.renderer?.shadowMap) {
      three.renderer.shadowMap.enabled = preset.shadows;
      three.renderer.shadowMap.needsUpdate = true;
    }
    if (three.light) {
      three.light.castShadow = preset.shadows;
      if (preset.shadowMapSize) {
        three.light.shadow.mapSize.width = preset.shadowMapSize;
        three.light.shadow.mapSize.height = preset.shadowMapSize;
      }
      if (three.light.shadow.map) {
        three.light.shadow.map.dispose();
        three.light.shadow.map = null;
      }
    }
    if (three.renderer && els.stage) resize();
  }

  function updateCamera() {
    const control = state.cameraControl;
    const horizontal = Math.cos(control.pitch) * control.distance;
    const target = three.reusable.cameraTarget.set(control.targetX, 0, control.targetY);
    three.camera.position.set(
      target.x + Math.sin(control.yaw) * horizontal,
      Math.sin(control.pitch) * control.distance,
      target.z + Math.cos(control.yaw) * horizontal
    );
    three.camera.lookAt(target);
    three.camera.updateProjectionMatrix();
  }

  function pocketCenters() {
    return [
      { x: -TABLE.width / 2, y: -TABLE.height / 2 },
      { x: 0, y: -TABLE.height / 2 - .02 },
      { x: TABLE.width / 2, y: -TABLE.height / 2 },
      { x: -TABLE.width / 2, y: TABLE.height / 2 },
      { x: 0, y: TABLE.height / 2 + .02 },
      { x: TABLE.width / 2, y: TABLE.height / 2 },
    ];
  }

  function updateUI() {
    els.bestScore.textContent = String(state.best);
    els.playerScore.textContent = String(state.playerScore);
    els.petScore.textContent = String(state.petScore);
    renderPottedBalls();
    const targetHint = currentTargetHint();
    els.centerNote.textContent = `${MODES[state.mode].label} · ${targetHint} · ${formatTime(state.seconds)}`;
    els.guideText.textContent = state.finished ? '点击开始再来一局' : state.started ? state.message : '选择模式和难度，点击开始';
    els.playerHud.classList.toggle('active', state.currentPlayer === 0 && state.started && !state.running);
    els.petHud.classList.toggle('active', state.currentPlayer === 1 && state.started && !state.running);
    const swingAvailable = canHumanShoot();
    els.swing.hidden = !swingAvailable || state.inputMode === 'swing';
    els.cancelZone.hidden = !(swingAvailable && state.inputMode === 'swing');
    updateCancelZoneText();
    els.swing.disabled = !swingAvailable;
    updateHitPointUI();
    els.start.hidden = state.started && !state.finished;
    els.start.textContent = state.finished ? '开始' : '开始';
    document.querySelectorAll('[data-card-mode]').forEach(btn => btn.classList.toggle('active', btn.dataset.cardMode === state.mode));
    updateQualityUI();
    els.modeSelect.value = state.mode;
    els.difficultySelect.value = state.difficulty;
  }

  function updateQualityUI() {
    els.qualityButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.quality === state.graphics.mode));
  }

  function currentTargetHint() {
    if (!state.started || state.finished) return '准备';
    if (state.mode === 'snooker') return state.snookerNext === 'red' && redsRemaining() ? '目标红球' : '目标彩球';
    const group = playerGroup(state.currentPlayer);
    if (group === 'solid') return '目标小号';
    if (group === 'stripe') return '目标大号';
    return '目标任意';
  }

  function isPointOverElement(event, element) {
    if (!element || element.hidden) return false;
    const rect = element.getBoundingClientRect();
    return event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
  }

  function updateCancelZoneText() {
    els.cancelZone.textContent = state.aim.active && state.aim.intentReady ? '拖到这里取消挥杆' : '点击取消挥杆';
  }

  function normalizeHitPoint(point) {
    if (!point) return { x: 0, y: 0 };
    let x = Number(point.x) || 0;
    let y = Number(point.y) || 0;
    const length = Math.hypot(x, y);
    if (length > 1) {
      x /= length;
      y /= length;
    }
    return { x: clamp(x, -1, 1), y: clamp(y, -1, 1) };
  }

  function setMode(mode, rerack) {
    const previousMode = state.mode;
    state.mode = normalizeMode(mode);
    refreshTableForMode();
    saveSettings();
    if (rerack || !state.started || previousMode !== state.mode) resetGame(false);
    updateUI();
  }

  function setDifficulty(difficulty, silent) {
    state.difficulty = normalizeDifficulty(difficulty);
    saveSettings();
    if (!silent) toast(`难度：${DIFFICULTIES[state.difficulty].label}`);
    updateUI();
  }

  function handleMessage(event) {
    const msg = event.data || {};
    if (msg.type === 'setGameConfig') applyGameConfig(msg.data || msg.config || {});
    if (msg.type === 'haqi_pet_image' && msg.ok) applyPetImages([msg.data]);
    if (msg.type === 'haqi_pet_images' && msg.ok) applyPetImages(msg.data?.pets || []);
  }

  function applyGameConfig(config) {
    if (config.mode) state.mode = normalizeMode(config.mode);
    if (config.difficulty) state.difficulty = normalizeDifficulty(config.difficulty);
    refreshTableForMode();
    saveSettings();
    resetGame(false);
  }

  function requestPets() {
    const requestId = `billiards_pets_${Date.now()}`;
    window.parent.postMessage({ type: 'haqi_get_pet_images', requestId, anim: 'idle' }, '*');
    setTimeout(() => {
      if (!state.petAssets.length) applyFallbackPets();
    }, 1200);
  }

  function applyPetImages(pets) {
    if (!Array.isArray(pets) || !pets.length) return;
    cleanupObjectUrls();
    state.petAssets = pets.slice(0, 2).map((pet, index) => ({ pet, index }));
    const currentPet = state.petAssets[0]?.pet;
    if (currentPet) {
      setPetBillboard(currentPet);
      els.petName.textContent = currentPet.name || '宠物';
    }
  }

  function applyFallbackPets() {
    els.petName.textContent = '宠物';
  }

  function setPetBillboard(pet) {
    if (!three.petBillboard) return;
    if (!pet?.imageBlob) {
      three.petBillboard.visible = false;
      three.petActor?.userData?.modelParts?.forEach(part => { part.visible = true; });
      return;
    }
    const url = URL.createObjectURL(pet.imageBlob);
    state.objectUrls.push(url);
    const THREE = window.THREE;
    const texture = new THREE.TextureLoader().load(url, () => {
      const aspect = texture.image?.width && texture.image?.height ? texture.image.width / texture.image.height : 1;
      three.petBillboard.scale.set(.86 * Math.max(.7, Math.min(1.4, aspect)), .86, 1);
      texture.needsUpdate = true;
    });
    const uv = pet.uv || { cols: 1, rows: 1, col: 0, row: 0 };
    if (uv.cols > 1 || uv.rows > 1) {
      texture.repeat.set(1 / uv.cols, 1 / uv.rows);
      texture.offset.set((uv.col || 0) / uv.cols, 1 - ((uv.row || 0) + 1) / uv.rows);
    }
    if (three.petBillboardTexture) three.petBillboardTexture.dispose?.();
    three.petBillboardTexture = texture;
    three.petBillboard.material.map = texture;
    three.petBillboard.material.needsUpdate = true;
    three.petBillboard.visible = true;
    three.petActor?.userData?.modelParts?.forEach(part => { part.visible = false; });
  }

  function cleanupObjectUrls() {
    if (three.petBillboardTexture) {
      three.petBillboardTexture.dispose?.();
      three.petBillboardTexture = null;
    }
    if (three.petBillboard) {
      three.petBillboard.material.map = null;
      three.petBillboard.material.needsUpdate = true;
      three.petBillboard.visible = false;
      three.petActor?.userData?.modelParts?.forEach(part => { part.visible = true; });
    }
    state.objectUrls.forEach(url => URL.revokeObjectURL(url));
    state.objectUrls = [];
  }

  function ensureAudio() {
    if (state.audio.ctx) {
      if (state.audio.ctx.state === 'suspended') state.audio.ctx.resume?.();
      state.audio.enabled = true;
      return state.audio.ctx;
    }
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return null;
    const ctx = new AudioContext();
    const master = ctx.createGain();
    master.gain.value = .18;
    master.connect(ctx.destination);
    state.audio.ctx = ctx;
    state.audio.master = master;
    state.audio.enabled = true;
    return ctx;
  }

  function playTone({ frequency = 440, duration = .08, type = 'sine', gain = .12, slideTo = null }) {
    const ctx = ensureAudio();
    if (!ctx || !state.audio.master || !state.audio.enabled) return;
    const start = ctx.currentTime;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(frequency, start);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), start + duration);
    amp.gain.setValueAtTime(0, start);
    amp.gain.linearRampToValueAtTime(gain, start + .008);
    amp.gain.exponentialRampToValueAtTime(.0001, start + duration);
    osc.connect(amp);
    amp.connect(state.audio.master);
    osc.start(start);
    osc.stop(start + duration + .02);
  }

  function playShootSound(power) {
    playTone({ frequency: 150 + power * 120, slideTo: 72, duration: .13, type: 'triangle', gain: .16 + power * .08 });
  }

  function playRailSound(speed) {
    if (speed < .45) return;
    playTone({ frequency: 180 + Math.min(320, speed * 36), duration: .045, type: 'square', gain: Math.min(.08, speed * .012) });
  }

  function playCollisionSound(strength) {
    const now = performance.now();
    if (strength < .18 || now - state.audio.lastCollisionAt < 28) return;
    state.audio.lastCollisionAt = now;
    playTone({ frequency: 360 + Math.min(420, strength * 48), slideTo: 210, duration: .055, type: 'triangle', gain: Math.min(.13, .04 + strength * .008) });
  }

  function playPocketSound() {
    playTone({ frequency: 210, slideTo: 72, duration: .18, type: 'sine', gain: .12 });
    setTimeout(() => playTone({ frequency: 96, slideTo: 56, duration: .16, type: 'triangle', gain: .08 }), 70);
  }

  function playFinishSound(won) {
    if (won) {
      [330, 440, 660].forEach((frequency, index) => setTimeout(() => playTone({ frequency, duration: .12, type: 'sine', gain: .11 }), index * 90));
    } else {
      playTone({ frequency: 220, slideTo: 130, duration: .22, type: 'triangle', gain: .11 });
    }
  }

  function toast(text) {
    const el = document.createElement('div');
    el.className = 'mh-toast';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }

  function distance(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  function normalize(v) {
    const d = Math.hypot(v.x, v.y) || 1;
    return { x: v.x / d, y: v.y / d };
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function readSettings() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {}; } catch (_) { return {}; }
  }

  function saveSettings() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ mode: state.mode, difficulty: state.difficulty, graphicsMode: state.graphics.mode }));
  }

  function normalizeMode(mode) {
    return MODES[mode] ? mode : 'eight';
  }

  function normalizeDifficulty(difficulty) {
    return DIFFICULTIES[difficulty] ? difficulty : 'normal';
  }

  function normalizeGraphicsMode(mode) {
    return GRAPHICS_MODE_LABELS[mode] ? mode : 'auto';
  }

  function graphicsLevelForMode(mode) {
    const normalized = normalizeGraphicsMode(mode);
    if (normalized === 'low') return GRAPHICS_PRESETS.length - 1;
    return 0;
  }
})();
</script>
