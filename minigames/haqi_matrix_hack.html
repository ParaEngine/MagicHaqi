    nextUsed.add(keyOf(pos.x, pos.y));
    const open = countOpenNeighbors(pos, nextUsed, size);
    if (open === 0 && path.length + 1 < target) return -1000;
    const center = (size - 1) / 2;
    const centerPull = 1 - ((Math.abs(pos.x - center) + Math.abs(pos.y - center)) / Math.max(1, size - 1));
    const boundary = isBoundary(pos, size) ? -1 : 0;
    const earlyBoundary = path.length < size * 2 && isBoundary(pos, size) ? -1.25 : 0;
    const turn = lastDir && (lastDir.dx !== pos.dx || lastDir.dy !== pos.dy) ? .42 : 0;
    const openPressure = (4 - open) * .28;
    const contactPenalty = Math.max(0, countUsedNeighbors(pos, used, size) - 1) * -.18;
    return centerPull * .9 + boundary + earlyBoundary + turn + openPressure + contactPenalty + Math.random() * .55;
  }

  function weightedPick(scored) {
    const min = Math.min(...scored.map((item) => item.score));
    const weights = scored.map((item) => Math.max(.01, item.score - min + .2));
    const total = weights.reduce((sum, weight) => sum + weight, 0);
    let roll = Math.random() * total;
    for (let i = 0; i < scored.length; i += 1) {
      roll -= weights[i];
      if (roll <= 0) return scored[i];
    }
    return scored[scored.length - 1];
  }

  function routeShapeScore(path, size, minLength) {
    const lengthScore = Math.min(path.length, minLength) * 2;
    const boundaryPenalty = boundaryRatio(path, size) * path.length * 1.1;
    const earlyPenalty = boundaryRatio(path.slice(0, Math.min(path.length, size * 2)), size) * size * 1.4;
    const turnScore = turnRatio(path) * path.length * 1.6;
    const box = routeBox(path);
    const areaScore = ((box.maxX - box.minX + 1) * (box.maxY - box.minY + 1)) / (size * size) * 18;
    return lengthScore + turnScore + areaScore - boundaryPenalty - earlyPenalty;
  }

  function routeShapeOk(path, size) {
    if (path.length < size * 4) return true;
    const early = path.slice(0, Math.min(path.length, size * 2));
    return boundaryRatio(path, size) <= .46 && boundaryRatio(early, size) <= .58 && turnRatio(path) >= .18;
  }

  function boundaryRatio(path, size) {
    if (!path.length) return 1;
    return path.filter((pos) => isBoundary(pos, size)).length / path.length;
  }

  function turnRatio(path) {
    if (path.length < 3) return 0;
    let turns = 0;
    for (let i = 2; i < path.length; i += 1) {
      const a = path[i - 1];
      const b = path[i];
      const p = path[i - 2];
      if ((a.x - p.x) !== (b.x - a.x) || (a.y - p.y) !== (b.y - a.y)) turns += 1;
    }
    return turns / (path.length - 2);
  }

  function routeBox(path) {
    return path.reduce((box, pos) => ({ minX: Math.min(box.minX, pos.x), maxX: Math.max(box.maxX, pos.x), minY: Math.min(box.minY, pos.y), maxY: Math.max(box.maxY, pos.y) }), { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity });
  }

  function isBoundary(pos, size) {
    return pos.x === 0 || pos.y === 0 || pos.x === size - 1 || pos.y === size - 1;
  }

  function countUsedNeighbors(pos, used, size) {
    return DIRS.reduce((total, [dx, dy]) => {
      const x = pos.x + dx;
      const y = pos.y + dy;
      return total + (inBounds(x, y, size) && used.has(keyOf(x, y)) ? 1 : 0);
    }, 0);
  }

  function countOpenNeighbors(pos, used, size) {
    return DIRS.reduce((total, [dx, dy]) => {
      const x = pos.x + dx;
      const y = pos.y + dy;
      return total + (inBounds(x, y, size) && !used.has(keyOf(x, y)) ? 1 : 0);
    }, 0);
  }

  function choosePowerForBlocker(pool, powerPos, blockerPos, preferPurify, config) {
    const available = pool.filter((id) => id === 'purify' || affectsPosition(id, powerPos, blockerPos));
    if (preferPurify && available.includes('purify')) return 'purify';
    const weighted = [];
    (available.length ? available : ['purify']).forEach((id) => {
      let weight = 2;
      if (['expert', 'nightmare'].includes(config.id) && ['cross', 'row', 'col', 'rotate', 'rotateCcw'].includes(id)) weight = 5;
      if (['expert', 'nightmare'].includes(config.id) && id === 'purify') weight = 1;
      for (let i = 0; i < weight; i += 1) weighted.push(id);
    });
    return sample(weighted);
  }

  function selectLevelPowerPool(config) {
    const pool = config.pool.slice();
    if (pool.length <= 3) return pool;
    const maxDistinct = Math.min(pool.length - 1, config.id === 'nightmare' ? 6 : 5);
    const minDistinct = config.id === 'normal' ? 3 : 4;
    const target = randInt(minDistinct, maxDistinct);
    const selected = new Set();
    if (requiresRotationSolution(config)) selected.add(sample(['rotate', 'rotateCcw']));
    if (['hard', 'expert', 'nightmare'].includes(config.id)) {
      const tactical = pool.filter((id) => ['cross', 'row', 'col', 'rotate', 'rotateCcw'].includes(id));
      selected.add(sample(tactical));
    }
    shuffle(pool).forEach((id) => {
      if (selected.size < target) selected.add(id);
    });
    return [...selected];
  }

  function affectsPosition(power, origin, target) {
    if (power === 'purify') return true;
    if (power === 'pulse') return Math.max(Math.abs(origin.x - target.x), Math.abs(origin.y - target.y)) === 1;
    if (isRotationPower(power)) return Math.max(Math.abs(origin.x - target.x), Math.abs(origin.y - target.y)) === 1;
    if (power === 'cross') return ((origin.x === target.x && Math.abs(origin.y - target.y) <= 2) || (origin.y === target.y && Math.abs(origin.x - target.x) <= 2)) && !(origin.x === target.x && origin.y === target.y);
    if (power === 'row') return origin.y === target.y;
    if (power === 'col') return origin.x === target.x;
    return false;
  }

  function affectedCells(power, origin, size) {
    const cells = [];
    for (let y = 0; y < size; y += 1) {
      for (let x = 0; x < size; x += 1) {
        if (power === 'pulse' && Math.max(Math.abs(origin.x - x), Math.abs(origin.y - y)) === 1) cells.push({ x, y });
        if (isRotationPower(power) && Math.max(Math.abs(origin.x - x), Math.abs(origin.y - y)) === 1) cells.push({ x, y });
        if (power === 'cross' && ((origin.x === x && Math.abs(origin.y - y) <= 2) || (origin.y === y && Math.abs(origin.x - x) <= 2)) && !(origin.x === x && origin.y === y)) cells.push({ x, y });
        if (power === 'row' && origin.y === y) cells.push({ x, y });
        if (power === 'col' && origin.x === x) cells.push({ x, y });
      }
    }
    return cells;
  }

  function isRotationPower(power) {
    return power === 'rotate' || power === 'rotateCcw';
  }

  function requiresRotationSolution(config) {
    return config.pool.some((id) => isRotationPower(id));
  }

  function rotationStep(power) {
    return power === 'rotateCcw' ? -1 : 1;
  }

  function nodeIcon(id, className = 'mh-node-svg') {
    const icons = {
      start: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="24" fill="#9cffce" fill-opacity=".08" stroke="#9cffce" stroke-width="3"/><path d="M27 20l18 12-18 12z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/><path d="M12 32h9M43 32h9" stroke="#9cffce" stroke-width="3" stroke-linecap="round"/></svg>`,
      end: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="24" fill="#ffbf5f" fill-opacity=".08" stroke="#ffbf5f" stroke-width="3"/><circle cx="32" cy="32" r="12" fill="none" stroke="#ffffff" stroke-width="3"/><path d="M32 8v11M32 45v11M8 32h11M45 32h11" stroke="#ffbf5f" stroke-width="3" stroke-linecap="round"/><path d="M25 32h14" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/></svg>`,
      checkpoint: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><path d="M32 8l24 24-24 24L8 32z" fill="#b8a0ff" fill-opacity=".08" stroke="#b8a0ff" stroke-width="3" stroke-linejoin="round"/><circle cx="32" cy="32" r="8" fill="none" stroke="#ffffff" stroke-width="3"/><path d="M32 18v8M32 38v8M18 32h8M38 32h8" stroke="#b8a0ff" stroke-width="3" stroke-linecap="round"/></svg>`,
      obstacle: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><rect x="13" y="13" width="38" height="38" rx="4" fill="#a0aebc" fill-opacity=".08" stroke="#9fb0bd" stroke-width="3"/><path d="M19 19l26 26M45 19L19 45" stroke="#dce8ee" stroke-width="3" stroke-linecap="round"/><path d="M26 13v38M38 13v38" stroke="#5d7180" stroke-width="2" opacity=".8"/></svg>`,
      hardObstacle: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><path d="M32 8l22 9v15c0 14-8 22-22 27C18 54 10 46 10 32V17z" fill="#ff6b6b" fill-opacity=".08" stroke="#ff6b6b" stroke-width="3" stroke-linejoin="round"/><path d="M23 32v-7a9 9 0 0118 0v7" stroke="#ffd6d6" stroke-width="4" fill="none" stroke-linecap="round"/><rect x="20" y="31" width="24" height="17" rx="3" fill="none" stroke="#ff6b6b" stroke-width="3"/><path d="M32 36v6" stroke="#ffd6d6" stroke-width="3" stroke-linecap="round"/></svg>`,
      pulse: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="6" fill="#ffffff"/><circle cx="32" cy="32" r="17" fill="none" stroke="#d7b8ff" stroke-width="3"/><circle cx="32" cy="32" r="27" fill="none" stroke="#b8a0ff" stroke-width="2" opacity=".75"/><path d="M32 5v8M32 51v8M5 32h8M51 32h8" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/></svg>`,
      cross: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><path d="M32 8v48M8 32h48" stroke="#73e8ff" stroke-width="5" stroke-linecap="round"/><circle cx="32" cy="32" r="9" fill="#04131d" stroke="#ffffff" stroke-width="3"/><path d="M18 18l8 8M46 18l-8 8M18 46l8-8M46 46l-8-8" stroke="#73e8ff" stroke-width="2" stroke-linecap="round" opacity=".85"/></svg>`,
      row: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><path d="M8 32h48" stroke="#9cc3ff" stroke-width="5" stroke-linecap="round"/><path d="M18 22L8 32l10 10M46 22l10 10-10 10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><rect x="25" y="24" width="14" height="16" rx="2" fill="none" stroke="#9cc3ff" stroke-width="3"/></svg>`,
      col: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><path d="M32 8v48" stroke="#9cffce" stroke-width="5" stroke-linecap="round"/><path d="M22 18L32 8l10 10M22 46l10 10 10-10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><rect x="24" y="25" width="16" height="14" rx="2" fill="none" stroke="#9cffce" stroke-width="3"/></svg>`,
      rotate: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><path d="M48 24a18 18 0 00-30-7" fill="none" stroke="#b8a0ff" stroke-width="4" stroke-linecap="round"/><path d="M47 13l3 13-13-3" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 40a18 18 0 0030 7" fill="none" stroke="#b8a0ff" stroke-width="4" stroke-linecap="round"/><rect x="25" y="25" width="14" height="14" rx="2" fill="none" stroke="#ffffff" stroke-width="3"/></svg>`,
      rotateCcw: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><path d="M16 24a18 18 0 0130-7" fill="none" stroke="#ff9fb4" stroke-width="4" stroke-linecap="round"/><path d="M17 13l-3 13 13-3" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M48 40a18 18 0 01-30 7" fill="none" stroke="#ff9fb4" stroke-width="4" stroke-linecap="round"/><rect x="25" y="25" width="14" height="14" rx="2" fill="none" stroke="#ffffff" stroke-width="3"/></svg>`,
      purify: `<svg class="${className}" viewBox="0 0 64 64" aria-hidden="true"><path d="M32 8c9 10 17 20 17 31a17 17 0 01-34 0C15 28 23 18 32 8z" fill="#ffbf5f" fill-opacity=".08" stroke="#ffbf5f" stroke-width="3" stroke-linejoin="round"/><path d="M23 38l6 6 13-17" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M48 12l3 7 7 3-7 3-3 7-3-7-7-3 7-3z" fill="none" stroke="#ffbf5f" stroke-width="2" stroke-linejoin="round"/></svg>`,
    };
    return icons[id] || '';
  }

  function buildLevel() {
    const config = DIFFICULTIES[state.difficulty];
    let level = null;
    for (let attempt = 0; attempt < 1400; attempt += 1) {
      const grid = makeEmptyGrid(config.size);
      const route = createRoute(config.size, config.pathMin, config.pathMax);
      if (route.length < config.pathMin) continue;
      const routeKeys = new Set(route.map((pos) => keyOf(pos.x, pos.y)));
      const levelPowerPool = selectLevelPowerPool(config);
      const protectedKeys = new Set(['0,0', keyOf(route[route.length - 1].x, route[route.length - 1].y)]);
      const plannedPowerups = [];
      const blockerKeys = new Set();
      const segment = Math.max(3, Math.floor((route.length - 3) / (config.powerups + 1)));
      for (let i = 0; i < config.powerups; i += 1) {
        const powerIndex = Math.min(route.length - 3, 1 + i * segment + randInt(0, Math.max(0, segment - 2)));
        const blockerIndex = Math.min(route.length - 2, powerIndex + 1);
        const powerPos = route[powerIndex];
        const blockerPos = route[blockerIndex];
        const powerKey = keyOf(powerPos.x, powerPos.y);
        const blockerKey = keyOf(blockerPos.x, blockerPos.y);
        if (protectedKeys.has(powerKey) || protectedKeys.has(blockerKey) || blockerKeys.has(powerKey)) continue;
        const power = choosePowerForBlocker(levelPowerPool, powerPos, blockerPos, i % 4 === 1, config);
        const source = isRotationPower(power) ? rotationSourceForTarget(power, powerPos, blockerPos, config.size) : null;
        if (source) {
          const sourceKey = keyOf(source.x, source.y);
          if (!routeKeys.has(sourceKey)) protectedKeys.add(sourceKey);
        }
        plannedPowerups.push({ power, pos: powerPos, blocker: blockerPos, blockerIndex });
        protectedKeys.add(powerKey);
        protectedKeys.add(blockerKey);
        blockerKeys.add(blockerKey);
      }
      if (plannedPowerups.length < config.powerups) continue;
      if (requiresRotationSolution(config) && !plannedPowerups.some((item) => isRotationPower(item.power))) continue;
      grid[0][0].type = 'start';
      const end = route[route.length - 1];
      grid[end.y][end.x].type = 'end';
      plannedPowerups.forEach(({ power, pos, blocker }) => {
        grid[pos.y][pos.x].type = 'power';
        grid[pos.y][pos.x].power = power;
        grid[blocker.y][blocker.x].type = 'obstacle';
      });
      placeRouteGates(grid, route, routeKeys, plannedPowerups, protectedKeys, config);
      const checkpointCandidates = route
        .slice(2, -2)
        .filter((pos) => !protectedKeys.has(keyOf(pos.x, pos.y)) && grid[pos.y][pos.x].type === 'normal');
      if (checkpointCandidates.length < config.checkpoints) continue;
      shuffle(checkpointCandidates).slice(0, config.checkpoints).forEach((pos) => {
        grid[pos.y][pos.x].type = 'checkpoint';
      });
      placeExtraObstacles(grid, routeKeys, plannedPowerups, config);
      const solution = computeRouteSolution(grid, route);
      if (!solution.ok) continue;
      if (requiresRotationSolution(config) && !solution.actions.some((action) => action.type === 'power' && isRotationPower(action.power))) continue;
      level = { grid, route };
      break;
    }
    if (!level) {
      throw new Error(t('errorBuildLevel', { label: config.label }));
    }
    state.grid = level.grid;
    state.route = level.route;
    state.checkpoints = new Set();
    state.grid.flat().forEach((cell) => {
      if (cell.type === 'checkpoint') state.checkpoints.add(keyOf(cell.x, cell.y));
    });
  }

  function placeExtraObstacles(grid, routeKeys, plannedPowerups, config) {
    const size = config.size;
    const solvableKeys = new Set();
    let hasPurify = false;
    plannedPowerups.forEach(({ power, pos }) => {
      if (power === 'purify') {
        hasPurify = true;
      } else if (!isRotationPower(power)) {
        affectedCells(power, pos, size).forEach((target) => solvableKeys.add(keyOf(target.x, target.y)));
      }
    });
    const targetObstacles = Math.floor(size * size * config.obstacleRate);
    const candidates = grid.flat().filter((cell) => cell.type === 'normal' && !routeKeys.has(keyOf(cell.x, cell.y)));
    let placed = grid.flat().filter((cell) => cell.type === 'obstacle').length;
    const placedCells = grid.flat().filter((cell) => cell.type === 'obstacle' || cell.type === 'hardObstacle');
    const sectorCounts = new Map();
    placedCells.forEach((cell) => addSectorCount(sectorCounts, cell, size));
    while (placed < targetObstacles && candidates.length) {
      const cell = pickSpreadCandidate(candidates, placedCells, sectorCounts, size);
      candidates.splice(candidates.indexOf(cell), 1);
      const key = keyOf(cell.x, cell.y);
      const canBeSolved = hasPurify || solvableKeys.has(key) || ['hard', 'expert', 'nightmare'].includes(config.id);
      if (config.hardRate > 0 && Math.random() < config.hardRate) {
        cell.type = 'hardObstacle';
        placed += 1;
        placedCells.push(cell);
        addSectorCount(sectorCounts, cell, size);
      } else if (canBeSolved) {
        cell.type = 'obstacle';
        placed += 1;
        placedCells.push(cell);
        addSectorCount(sectorCounts, cell, size);
      }
    }
  }

  function isRouteAutoSolvable(grid, route) {
    return computeRouteSolution(grid, route).ok;
  }

  function computeRouteSolution(grid, route) {
    if (!route.length) return { ok: false, actions: [] };
    const sim = makeSimState(grid);
    const actions = [];
    for (let index = 0; index < route.length; index += 1) {
      const pos = route[index];
      const previous = route[index - 1] || null;
      if (index > 0 && (!previous || Math.abs(previous.x - pos.x) + Math.abs(previous.y - pos.y) !== 1)) return { ok: false, actions };
      if (!prepareSimCell(sim, previous, pos, index, actions)) return { ok: false, actions };
      if (!enterSimCell(sim, pos)) return { ok: false, actions };
    }
    const end = route[route.length - 1];
    const endCell = sim.grid[end.y]?.[end.x];
    return { ok: Boolean(endCell && endCell.type === 'end' && sim.visitedCheckpoints.size === sim.checkpoints.size), actions };
  }

  function makeSimState(grid) {
    const sim = { grid: cloneGrid(grid), path: [], pathKeys: new Set(), heldPowers: [], purifyReady: false, checkpoints: new Set(), visitedCheckpoints: new Set() };
    syncSimCheckpoints(sim);
    return sim;
  }

  function prepareSimCell(sim, origin, target, routeIndex, actions) {
    const cell = sim.grid[target.y]?.[target.x];
    if (!cell || sim.pathKeys.has(keyOf(target.x, target.y)) || cell.type === 'hardObstacle') return false;
    if (cell.type !== 'obstacle') return true;
    const powerIndex = findSimPowerForTarget(sim, origin, target);
    if (powerIndex >= 0) {
      const power = sim.heldPowers.splice(powerIndex, 1)[0];
      applyPowerToGrid(sim.grid, power, origin);
      if (isRotationPower(power)) syncSimCheckpoints(sim);
      actions.push({ routeIndex, type: 'power', power });
      const nextCell = sim.grid[target.y]?.[target.x];
      return Boolean(nextCell && nextCell.type !== 'obstacle' && nextCell.type !== 'hardObstacle');
    }
    if (sim.purifyReady) {
      sim.purifyReady = false;
      cell.type = 'normal';
      actions.push({ routeIndex, type: 'purify' });
      return true;
    }
    return false;
  }

  function enterSimCell(sim, pos) {
    const cell = sim.grid[pos.y]?.[pos.x];
    if (!cell) return false;
    if (cell.type === 'end' && sim.visitedCheckpoints.size < sim.checkpoints.size) return false;
    const key = keyOf(pos.x, pos.y);
    sim.path.push({ x: pos.x, y: pos.y });
    sim.pathKeys.add(key);
    if (cell.type === 'checkpoint') sim.visitedCheckpoints.add(key);
    if (cell.type === 'power' && !cell.used) {
      const power = POWERUPS[cell.power];
      if (!power) return false;
      if (power.type === 'status') sim.purifyReady = true;
      else sim.heldPowers.push(cell.power);
      cell.type = 'normal';
      cell.power = null;
      cell.used = true;
    }
    return true;
  }

  function findSimPowerForTarget(sim, origin, target) {
    if (!origin) return -1;
    return sim.heldPowers.findIndex((power) => powerOpensTarget(sim.grid, power, origin, target));
  }

  function powerOpensTarget(grid, power, origin, target) {
    if (!origin || !affectsPosition(power, origin, target)) return false;
    const trial = cloneGrid(grid);
    applyPowerToGrid(trial, power, origin);
    const cell = trial[target.y]?.[target.x];
    return Boolean(cell && cell.type !== 'obstacle' && cell.type !== 'hardObstacle');
  }

  function applyPowerToGrid(grid, power, origin) {
    if (isRotationPower(power)) {
      rotateGridAround(grid, origin, rotationStep(power));
      return;
    }
    affectedCells(power, origin, grid.length).forEach(({ x, y }) => {
      const cell = grid[y]?.[x];
      if (cell?.type === 'obstacle') cell.type = 'normal';
    });
  }

  function rotateGridAround(grid, origin, step = 1) {
    const ring = rotateRing(origin, grid.length);
    const data = ring.map((pos) => copyCellState(grid[pos.y][pos.x]));
    ring.forEach((pos, index) => {
      const targetPos = ring[(index + step + ring.length) % ring.length];
      Object.assign(grid[targetPos.y][targetPos.x], data[index]);
    });
  }

  function syncSimCheckpoints(sim) {
    sim.checkpoints = new Set();
    sim.grid.flat().forEach((cell) => {
      if (cell.type === 'checkpoint') sim.checkpoints.add(keyOf(cell.x, cell.y));
    });
    sim.visitedCheckpoints = new Set();
    sim.path.forEach((pos) => {
      const key = keyOf(pos.x, pos.y);
      if (sim.checkpoints.has(key)) sim.visitedCheckpoints.add(key);
    });
  }

  function rotationSourceForTarget(power, origin, target, size) {
    const ring = rotateRing(origin, size);
    const targetIndex = ring.findIndex((pos) => samePos(pos, target));
    if (targetIndex < 0) return null;
    return ring[(targetIndex - rotationStep(power) + ring.length) % ring.length] || null;
  }

  function placeRouteGates(grid, route, routeKeys, plannedPowerups, protectedKeys, config) {
    if (!['hard', 'expert', 'nightmare'].includes(config.id)) return;
    const size = config.size;
    plannedPowerups.forEach(({ blockerIndex, blocker }) => {
      const allowed = new Set([
        keyOf(route[blockerIndex - 1]?.x, route[blockerIndex - 1]?.y),
        keyOf(route[blockerIndex + 1]?.x, route[blockerIndex + 1]?.y),
        keyOf(blocker.x, blocker.y),
      ]);
      DIRS.map(([dx, dy]) => ({ x: blocker.x + dx, y: blocker.y + dy }))
        .filter((pos) => inBounds(pos.x, pos.y, size))
        .forEach((pos) => {
          const key = keyOf(pos.x, pos.y);
          const cell = grid[pos.y][pos.x];
          if (allowed.has(key) || routeKeys.has(key) || protectedKeys.has(key) || cell.type !== 'normal') return;
          cell.type = Math.random() < config.hardRate * .45 ? 'hardObstacle' : 'obstacle';
        });
    });
  }

  function isLevelTooOpen(grid, config) {
    if (!['hard', 'expert', 'nightmare'].includes(config.id)) return false;
    const access = analyzeNoToolAccess(grid, config.size);
    if (access.endReachable && access.checkpointsReachable >= config.checkpoints) return true;
    if (config.id === 'nightmare' && access.endReachable) return true;
    if (config.id === 'nightmare' && access.reachableRatio > .48) return true;
    if (config.id === 'expert' && access.reachableRatio > .58) return true;
    return false;
  }

  function analyzeNoToolAccess(grid, size) {
    const queue = [{ x: 0, y: 0 }];
    const seen = new Set(['0,0']);
    let endReachable = false;
    let checkpointsReachable = 0;
    for (let i = 0; i < queue.length; i += 1) {
      const pos = queue[i];
      const cell = grid[pos.y][pos.x];
      if (cell.type === 'end') endReachable = true;
      if (cell.type === 'checkpoint') checkpointsReachable += 1;
      DIRS.forEach(([dx, dy]) => {
        const next = { x: pos.x + dx, y: pos.y + dy };
        const key = keyOf(next.x, next.y);
        if (!inBounds(next.x, next.y, size) || seen.has(key)) return;
        const nextCell = grid[next.y][next.x];
        if (nextCell.type === 'obstacle' || nextCell.type === 'hardObstacle') return;
        seen.add(key);
        queue.push(next);
      });
    }
    return { endReachable, checkpointsReachable, reachableRatio: seen.size / (size * size) };
  }

  function pickSpreadCandidate(candidates, placedCells, sectorCounts, size) {
    const pool = shuffle(candidates).slice(0, Math.min(candidates.length, 18));
    return pool.sort((a, b) => spreadScore(b, placedCells, sectorCounts, size) - spreadScore(a, placedCells, sectorCounts, size))[0];
  }

  function spreadScore(cell, placedCells, sectorCounts, size) {
    const minDistance = placedCells.length ? Math.min(...placedCells.map((other) => Math.abs(cell.x - other.x) + Math.abs(cell.y - other.y))) : size;
    const sectorPenalty = sectorCounts.get(sectorKey(cell, size)) || 0;
    const edgeBias = Math.min(cell.x, cell.y, size - 1 - cell.x, size - 1 - cell.y) * .12;
    return minDistance * 3 - sectorPenalty * 4 + edgeBias + Math.random() * .35;
  }

  function addSectorCount(sectorCounts, cell, size) {
    const key = sectorKey(cell, size);
    sectorCounts.set(key, (sectorCounts.get(key) || 0) + 1);
  }

  function sectorKey(cell, size) {
    const band = Math.max(1, Math.ceil(size / 3));
    return `${Math.floor(cell.x / band)},${Math.floor(cell.y / band)}`;
  }

  function resetLevel(keepRound) {
    stopTimer();
    state.visitedCheckpoints = new Set();
    state.path = [];
    state.pathKeys = new Set();
    state.heldPowers = [];
    state.purifyReady = false;
    state.dragging = false;
    state.finished = false;
    state.seconds = 0;
    state.timeline = [];
    state.lastTimelineStep = -1;
    state.score = 0;
    els.rewindOverlay.hidden = true;
    els.newGuideOverlay.hidden = true;
    if (!keepRound) state.round += 1;
    buildLevel();
    collectNewGuideNodes();
    renderAll();
    queueTimelineSnapshot(true);
    if (els.overlay.hidden) maybeShowNewGuide();
  }

  function collectNewGuideNodes() {
    state.pendingGuide = [];
    presentGuideIds().forEach((id) => {
      if (!state.knownGuides.has(id)) state.pendingGuide.push(id);
      else if (POWERUPS[id] && !state.knownPowerups.has(id)) state.knownPowerups.add(id);
    });
    saveKnownPowerups();
  }

  function markGuideKnown(id) {
    if (!guideData(id)) return;
    state.knownGuides.add(id);
    if (POWERUPS[id]) state.knownPowerups.add(id);
    saveKnownGuides();
    saveKnownPowerups();
  }

  function presentGuideIds() {
    const ids = new Set();
    state.grid.flat().forEach((cell) => {
      if (cell.type === 'power') ids.add(cell.power);
      else if (guideData(cell.type)) ids.add(cell.type);
    });
    return ['start', 'end', 'checkpoint', 'obstacle', 'hardObstacle', ...Object.keys(POWERUPS)].filter((id) => ids.has(id));
  }

  function renderAll() {
    const config = DIFFICULTIES[state.difficulty];
    els.board.style.setProperty('--size', config.size);
    els.difficultyTitle.textContent = config.label;
    els.round.textContent = state.round;
    els.time.textContent = state.seconds;
    els.checkpointTotal.textContent = state.checkpoints.size;
    els.checkpoints.textContent = state.visitedCheckpoints.size;
    els.steps.textContent = Math.max(0, state.path.length - 1);
    renderBoard();
    renderLines();
    renderHeld();
    renderDifficulties();
    renderStatus();
    els.next.hidden = !state.finished;
    els.undo.disabled = state.autoSolving || state.timeline.length === 0 || state.finished;
    els.guide.disabled = state.autoSolving;
    els.restart.disabled = state.autoSolving;
    els.next.disabled = state.autoSolving;
    els.autoSolve.hidden = !IS_LIVE_PREVIEW;
    els.autoSolve.disabled = state.autoSolving || state.finished;
  }

  function renderBoard() {
    els.board.innerHTML = '';
    const currentKey = state.path.length ? keyOf(state.path[state.path.length - 1].x, state.path[state.path.length - 1].y) : '';
    state.grid.flat().forEach((cell) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `mh-cell ${cellClass(cell)}`;
      button.dataset.x = cell.x;
      button.dataset.y = cell.y;
      const cellKey = keyOf(cell.x, cell.y);
      if (state.pathKeys.has(cellKey)) button.classList.add('visited');
      if (cellIcon(cell)) button.classList.add('has-icon');
      if (currentKey === cellKey) button.classList.add('current');
      if (cell.type === 'checkpoint' && state.visitedCheckpoints.has(cellKey)) button.classList.add('done');
      if (cell.type === 'power' && cell.used) button.classList.add('used');
      button.innerHTML = cellIcon(cell);
      button.addEventListener('pointerdown', onPointerDown);
      button.addEventListener('pointerenter', onPointerEnter);
      els.board.appendChild(button);
    });
  }

  function cellClass(cell) {
    if (cell.type === 'power') return `power ${POWERUPS[cell.power].cls}`;
    return cell.type;
  }

  function cellIcon(cell) {
    if (cell.type === 'power') return nodeIcon(cell.power, 'mh-cell-icon');
    if (['start', 'end', 'checkpoint', 'obstacle', 'hardObstacle'].includes(cell.type)) return nodeIcon(cell.type, 'mh-cell-icon');
    return '';
  }

  function renderLines() {
    const size = DIFFICULTIES[state.difficulty].size;
    const points = state.path.map((pos) => `${((pos.x + .5) / size) * 100},${((pos.y + .5) / size) * 100}`).join(' ');
    els.lines.setAttribute('viewBox', '0 0 100 100');
    if (!points) {
      els.lines.innerHTML = '';
      return;
    }
    const nodes = state.path.map((pos) => {
      const cx = ((pos.x + .5) / size) * 100;
      const cy = ((pos.y + .5) / size) * 100;
      return `<circle cx="${cx}" cy="${cy}" r=".95" fill="#f8fdff" stroke="#73e8ff" stroke-width=".32"/>`;
    }).join('');
    els.lines.innerHTML = `<polyline points="${points}" fill="none" stroke="#73e8ff" stroke-width="2.65" stroke-linecap="round" stroke-linejoin="round" opacity=".28"/><polyline points="${points}" fill="none" stroke="#f8fdff" stroke-width="1.18" stroke-linecap="round" stroke-linejoin="round"/><polyline points="${points}" fill="none" stroke="#ffbf5f" stroke-width=".36" stroke-linecap="round" stroke-linejoin="round" opacity=".82"/>${nodes}`;
  }

  function renderHeld() {
    const purifyText = state.purifyReady ? `<div class="mh-token done">${t('purifyActive')}</div>` : `<div class="mh-token">${t('purifyInactive')}</div>`;
    if (!state.heldPowers.length) {
      els.held.innerHTML = `<div class="mh-held-card"><span>${t('noActivePower')}</span><button class="mh-use" disabled>${t('btnRelease')}</button></div>${purifyText}`;
      return;
    }
    const grouped = [];
    state.heldPowers.forEach((power) => {
      const group = grouped.find((item) => item.power === power);
      if (group) group.count += 1;
      else grouped.push({ power, count: 1 });
    });
    const items = grouped.map(({ power, count }) => {
      const item = POWERUPS[power];
      return `<div class="mh-held-card"><span>${nodeIcon(power, 'mh-held-icon')} ${item.label}<b class="mh-held-count">×${count}</b></span><button class="mh-use" type="button" data-power-id="${power}">${t('btnRelease')}</button></div>`;
    });
    els.held.innerHTML = `${items.join('')}${purifyText}`;
    els.held.querySelectorAll('[data-power-id]').forEach((button) => {
      button.disabled = state.autoSolving;
      button.addEventListener('click', () => {
        if (state.autoSolving) return;
        useHeldPower(state.heldPowers.indexOf(button.dataset.powerId));
      });
    });
  }

  function renderDifficulties() {
    els.difficulties.innerHTML = DIFFICULTY_ORDER.map((id) => `<button class="mh-difficulty ${state.difficulty === id ? 'active' : ''}" type="button" data-difficulty="${id}">${DIFFICULTIES[id].label}</button>`).join('');
    els.difficulties.querySelectorAll('button').forEach((button) => {
      button.disabled = state.autoSolving;
      button.addEventListener('click', () => {
        if (state.autoSolving) return;
        state.difficulty = button.dataset.difficulty;
        state.round = 1;
        localStorage.setItem(STORAGE_KEY_DIFFICULTY, state.difficulty);
        resetLevel(true);
      });
    });
  }

  function renderStatus() {
    if (state.finished) {
      els.status.textContent = t('statusFinished', { score: state.score });
    } else if (!state.path.length) {
      els.status.textContent = t('statusStart');
    } else if (state.purifyReady) {
      els.status.textContent = t('statusPurify');
    } else if (state.heldPowers.length) {
      els.status.textContent = t('statusHeld', { count: state.heldPowers.length });
    } else {
      els.status.textContent = t('statusContinue');
    }
  }

  function onPointerDown(event) {
    event.preventDefault();
    if (state.autoSolving || state.finished || state.animating) return;
    state.dragging = true;
    try { event.currentTarget.setPointerCapture?.(event.pointerId); } catch (error) {}
    attemptMove(Number(event.currentTarget.dataset.x), Number(event.currentTarget.dataset.y));
    startTimer();
  }

  function onPointerEnter(event) {
    if (state.autoSolving || !state.dragging || state.finished || state.animating) return;
    attemptMove(Number(event.currentTarget.dataset.x), Number(event.currentTarget.dataset.y));
  }

  function onPointerMove(event) {
    if (state.autoSolving || !state.dragging || state.finished || state.animating) return;
    const target = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.mh-cell');
    if (target) attemptMove(Number(target.dataset.x), Number(target.dataset.y));
  }

  function onPointerUp() {
    state.dragging = false;
  }

  function attemptMove(x, y) {
    if (state.animating) return;
    const cell = state.grid[y]?.[x];
    if (!cell) return;
    const key = keyOf(x, y);
    if (!state.path.length) {
      if (cell.type !== 'start') return;
      enterCell(cell);
      renderAll();
      maybeRecordTimelineSnapshot();
      return;
    }
    const last = state.path[state.path.length - 1];
    if (Math.abs(last.x - x) + Math.abs(last.y - y) !== 1) return;
    if (state.pathKeys.has(key)) return;
    if (cell.type === 'hardObstacle') return flashPathEnd();
    if (cell.type === 'obstacle' && !state.purifyReady) return flashPathEnd();
    if (cell.type === 'end' && state.visitedCheckpoints.size < state.checkpoints.size) return;
    if (cell.type === 'obstacle' && state.purifyReady) {
      state.purifyReady = false;
      cell.type = 'normal';
      animatePurify(cell);
    }
    enterCell(cell);
    if (cell.type === 'end' && state.visitedCheckpoints.size === state.checkpoints.size) finishGame();
    renderAll();
    maybeRecordTimelineSnapshot();
  }

  function enterCell(cell) {
    const key = keyOf(cell.x, cell.y);
    state.path.push({ x: cell.x, y: cell.y });
    state.pathKeys.add(key);
    if (cell.type === 'checkpoint') state.visitedCheckpoints.add(key);
    if (cell.type === 'power' && !cell.used) collectPower(cell);
  }

  function collectPower(cell) {
    const power = POWERUPS[cell.power];
    const powerId = cell.power;
    cell.type = 'normal';
    cell.power = null;
    cell.used = true;
    if (power.type === 'status') {
      state.purifyReady = true;
      animatePurify(cell);
      toast(t('toastPurifyActive'));
    } else {
      state.heldPowers.push(powerId);
      toast(t('toastGotPower', { label: power.label }));
    }
  }

  function useHeldPower(index) {
    if (state.animating || index < 0 || index >= state.heldPowers.length || state.finished || !state.path.length) return;
    const power = state.heldPowers[index];
    const origin = state.path[state.path.length - 1];
    const size = DIFFICULTIES[state.difficulty].size;
    state.heldPowers.splice(index, 1);
    renderHeld();
    renderStatus();
    if (isRotationPower(power)) {
      state.dragging = false;
      state.animating = true;
      animateRotateAround(origin, size, rotationStep(power), () => {
        const moved = rotateAround(origin, size, rotationStep(power));
        syncCheckpointsFromGrid();
        animatePower(power, origin, moved);
        state.animating = false;
        toast(power === 'rotateCcw' ? t('toastRotateCcw') : t('toastRotateCw'));
        renderAll();
        recordTimelineSnapshot(true);
      });
      return;
    }
    const targets = affectedCells(power, origin, size)
      .map(({ x, y }) => state.grid[y][x])
      .filter((cell) => cell.type === 'obstacle');
    animatePower(power, origin, targets);
    if (['row', 'col', 'cross'].includes(power)) {
      window.setTimeout(() => {
        targets.forEach((cell) => {
          cell.type = 'normal';
        });
        toast(targets.length ? t('toastCleared', { count: targets.length }) : t('toastReleased'));
        renderAll();
        recordTimelineSnapshot(true);
      }, 320);
    } else {
      targets.forEach((cell) => {
        cell.type = 'normal';
        animateFlash(cell);
      });
      toast(targets.length ? t('toastCleared', { count: targets.length }) : t('toastReleased'));
      renderAll();
      recordTimelineSnapshot(true);
    }
  }

  function rotateAround(origin, size, step = 1) {
    const ring = rotateRing(origin, size);
    const data = ring.map((pos) => copyCellState(state.grid[pos.y][pos.x]));
    ring.forEach((pos, index) => {
      const targetPos = ring[(index + step + ring.length) % ring.length];
      const target = state.grid[targetPos.y][targetPos.x];
      Object.assign(target, data[index]);
    });
    return ring.map((pos) => state.grid[pos.y][pos.x]);
  }

  function rotateRing(origin, size) {
    return [
      { x: origin.x - 1, y: origin.y - 1 },
      { x: origin.x, y: origin.y - 1 },
      { x: origin.x + 1, y: origin.y - 1 },
      { x: origin.x + 1, y: origin.y },
      { x: origin.x + 1, y: origin.y + 1 },
      { x: origin.x, y: origin.y + 1 },
      { x: origin.x - 1, y: origin.y + 1 },
      { x: origin.x - 1, y: origin.y },
    ].filter((pos) => inBounds(pos.x, pos.y, size));
  }

  function copyCellState(cell) {
    return { type: cell.type, power: cell.power, used: cell.used };
  }

  function syncCheckpointsFromGrid() {
    state.checkpoints = new Set();
    state.grid.flat().forEach((cell) => {
      if (cell.type === 'checkpoint') state.checkpoints.add(keyOf(cell.x, cell.y));
    });
    syncVisitedCheckpoints();
  }

  function syncVisitedCheckpoints() {
    state.visitedCheckpoints = new Set();
    state.path.forEach((pos) => {
      const key = keyOf(pos.x, pos.y);
      if (state.checkpoints.has(key)) state.visitedCheckpoints.add(key);
    });
  }

  function timelineInterval() {
    return Math.max(3, Math.ceil(DIFFICULTIES[state.difficulty].size / 2));
  }

  function maybeRecordTimelineSnapshot() {
    const step = Math.max(0, state.path.length - 1);
    if (step === 0 || step === state.lastTimelineStep || step % timelineInterval() !== 0) return;
    recordTimelineSnapshot(false);
  }

  function queueTimelineSnapshot(force) {
    window.requestAnimationFrame(() => recordTimelineSnapshot(force));
  }

  function recordTimelineSnapshot(force) {
    const step = Math.max(0, state.path.length - 1);
    if (!force && step === state.lastTimelineStep) return;
    state.timeline.push(makeTimelineSnapshot(step));
    state.lastTimelineStep = step;
    if (state.timeline.length > 10) state.timeline.shift();
    renderAll();
  }

  function makeTimelineSnapshot(step) {
    const data = {
      step,
      seconds: state.seconds,
      difficulty: state.difficulty,
      grid: cloneGrid(state.grid),
      route: state.route.map((pos) => ({ ...pos })),
      checkpoints: [...state.checkpoints],
      visitedCheckpoints: [...state.visitedCheckpoints],
      path: state.path.map((pos) => ({ ...pos })),
      heldPowers: state.heldPowers.slice(),
      purifyReady: state.purifyReady,
      score: state.score,
    };
    return { ...data, thumb: renderTimelineThumb(data) };
  }

  function cloneGrid(grid) {
    return grid.map((row) => row.map((cell) => ({ x: cell.x, y: cell.y, type: cell.type, power: cell.power, used: cell.used })));
  }

  function showRewind() {
    if (state.autoSolving || !state.timeline.length || state.finished || state.animating) return;
    const newestFirst = state.timeline.map((snapshot, index) => ({ snapshot, index })).slice().reverse();
    els.rewindList.innerHTML = newestFirst.map(({ snapshot, index }) => `
      <button class="mh-rewind-item" type="button" data-timeline-index="${index}">
        <img src="${snapshot.thumb}" alt="${t('rewindThumbAlt', { step: snapshot.step })}">
        <span class="mh-rewind-meta"><b>${t('rewindSteps', { step: snapshot.step })}</b><span>${snapshot.seconds}s · ${t('rewindPowers', { count: snapshot.heldPowers.length })} · ${t('rewindCheckpoints', { visited: snapshot.visitedCheckpoints.length, total: snapshot.checkpoints.length })}</span></span>
      </button>
    `).join('');
    els.rewindList.querySelectorAll('[data-timeline-index]').forEach((button) => {
      button.addEventListener('click', () => restoreTimelineSnapshot(Number(button.dataset.timelineIndex)));
    });
    els.rewindOverlay.hidden = false;
  }

  function restoreTimelineSnapshot(index) {
    const snapshot = state.timeline[index];
    if (!snapshot || state.animating) return;
    state.grid = cloneGrid(snapshot.grid);
    state.route = snapshot.route.map((pos) => ({ ...pos }));
    state.checkpoints = new Set(snapshot.checkpoints);
    state.visitedCheckpoints = new Set(snapshot.visitedCheckpoints);
    state.path = snapshot.path.map((pos) => ({ ...pos }));
    state.pathKeys = new Set(state.path.map((pos) => keyOf(pos.x, pos.y)));
    state.heldPowers = snapshot.heldPowers.slice();
    state.purifyReady = snapshot.purifyReady;
    state.seconds = snapshot.seconds;
    state.score = snapshot.score;
    state.finished = false;
    state.dragging = false;
    state.timeline = state.timeline.slice(0, index + 1);
    state.lastTimelineStep = snapshot.step;
    els.rewindOverlay.hidden = true;
    syncVisitedCheckpoints();
    renderAll();
    toast(t('toastRewind', { step: snapshot.step }));
  }

  function renderTimelineThumb(snapshot) {
    const size = DIFFICULTIES[snapshot.difficulty].size;
    const canvas = document.createElement('canvas');
    canvas.width = 180;
    canvas.height = 180;
    const ctx = canvas.getContext('2d');
    const pad = 10;
    const gap = Math.max(1, Math.floor(5 - size / 3));
    const cellSize = (canvas.width - pad * 2 - gap * (size - 1)) / size;
    ctx.fillStyle = '#082f49';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    snapshot.grid.flat().forEach((cell) => drawThumbCell(ctx, cell, pad, gap, cellSize));
    drawThumbPath(ctx, snapshot.path, pad, gap, cellSize);
    return canvas.toDataURL('image/png');
  }

  function drawThumbCell(ctx, cell, pad, gap, cellSize) {
    const x = pad + cell.x * (cellSize + gap);
    const y = pad + cell.y * (cellSize + gap);
    const color = { normal: '#0f3f5a', start: '#22c55e', end: '#f59e0b', checkpoint: '#8b5cf6', obstacle: '#111827', hardObstacle: '#7f1d1d', power: '#06b6d4' }[cell.type] || '#0f3f5a';
    ctx.fillStyle = color;
    ctx.fillRect(x, y, cellSize, cellSize);
    if (cell.type === 'power') {
      ctx.fillStyle = cell.power === 'rotateCcw' ? '#fb7185' : '#f0f9ff';
      ctx.beginPath();
      ctx.arc(x + cellSize / 2, y + cellSize / 2, Math.max(2, cellSize * .18), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawThumbPath(ctx, path, pad, gap, cellSize) {
    if (path.length < 2) return;
    ctx.lineWidth = Math.max(2, cellSize * .18);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#67e8f9';
    ctx.beginPath();
    path.forEach((pos, index) => {
      const x = pad + pos.x * (cellSize + gap) + cellSize / 2;
      const y = pad + pos.y * (cellSize + gap) + cellSize / 2;
      if (index === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function finishGame() {
    state.finished = true;
    stopTimer();
    const config = DIFFICULTIES[state.difficulty];
    state.score = Math.max(10, config.baseScore + state.checkpoints.size * 20 - state.seconds * 2);
    toast(t('toastWin', { score: state.score }));
    window.parent?.postMessage({ type: 'gameFinished', data: { earnedPoints: state.score, difficulty: config.label } }, '*');
  }

  function startTimer() {
    if (state.timer) return;
    window.parent?.postMessage({ type: 'gameStarted' }, '*');
    state.timer = setInterval(() => {
      state.seconds += 1;
      els.time.textContent = state.seconds;
    }, 1000);
  }

  function stopTimer() {
    if (state.timer) clearInterval(state.timer);
    state.timer = null;
  }

  function flashCell(x, y) {
    const el = els.board.querySelector(`[data-x="${x}"][data-y="${y}"]`);
    if (!el) return;
    el.classList.remove('blocked');
    void el.offsetWidth;
    el.classList.add('blocked');
  }

  function flashPathEnd() {
    const last = state.path[state.path.length - 1];
    if (last) flashCell(last.x, last.y);
  }

  function cellRect(cell) {
    const target = els.board.querySelector(`[data-x="${cell.x}"][data-y="${cell.y}"]`);
    const boardRect = els.boardWrap.getBoundingClientRect();
    const rect = target.getBoundingClientRect();
    return { left: rect.left - boardRect.left, top: rect.top - boardRect.top, width: rect.width, height: rect.height, cx: rect.left - boardRect.left + rect.width / 2, cy: rect.top - boardRect.top + rect.height / 2 };
  }

  function animatePower(power, origin, targets = []) {
    const rect = cellRect(origin);
    if (power === 'pulse' || isRotationPower(power)) {
      const ring = document.createElement('div');
      ring.className = 'mh-ring';
      ring.style.left = `${rect.cx - rect.width * 1.15}px`;
      ring.style.top = `${rect.cy - rect.height * 1.15}px`;
      ring.style.width = `${rect.width * 2.3}px`;
      ring.style.height = `${rect.height * 2.3}px`;
      els.boardWrap.appendChild(ring);
      setTimeout(() => ring.remove(), 700);
      return;
    }
    if (['row', 'col', 'cross'].includes(power)) {
      animateLaserShots(power, rect, targets);
      return;
    }
    const beam = document.createElement('div');
    beam.className = 'mh-beam';
    if (power === 'row') {
      beam.style.left = '9px';
      beam.style.right = '9px';
      beam.style.top = `${rect.cy - rect.height * .18}px`;
      beam.style.height = `${rect.height * .36}px`;
    } else if (power === 'col') {
      beam.style.top = '9px';
      beam.style.bottom = '9px';
      beam.style.left = `${rect.cx - rect.width * .18}px`;
      beam.style.width = `${rect.width * .36}px`;
    } else {
      beam.style.inset = '9px';
      beam.style.clipPath = `polygon(${rect.cx - rect.width * .18}px 0, ${rect.cx + rect.width * .18}px 0, ${rect.cx + rect.width * .18}px 100%, ${rect.cx - rect.width * .18}px 100%, ${rect.cx - rect.width * .18}px ${rect.cy - rect.height * .18}px, 0 ${rect.cy - rect.height * .18}px, 0 ${rect.cy + rect.height * .18}px, 100% ${rect.cy + rect.height * .18}px, 100% ${rect.cy - rect.height * .18}px, ${rect.cx - rect.width * .18}px ${rect.cy - rect.height * .18}px)`;
    }
    els.boardWrap.appendChild(beam);
    setTimeout(() => beam.remove(), 650);
  }

  function animateRotateAround(origin, size, step, done) {
    const ring = rotateRing(origin, size);
    if (ring.length < 2) {
      done();
      return;
    }
    ring.forEach((pos, index) => {
      const next = ring[(index + step + ring.length) % ring.length];
      const cell = state.grid[pos.y][pos.x];
      const from = cellRect(cell);
      const to = cellRect(state.grid[next.y][next.x]);
      const ghost = document.createElement('div');
      ghost.className = 'mh-rotate-ghost';
      ghost.style.left = `${from.left}px`;
      ghost.style.top = `${from.top}px`;
      ghost.style.width = `${from.width}px`;
      ghost.style.height = `${from.height}px`;
      ghost.style.setProperty('--dx', `${to.left - from.left}px`);
      ghost.style.setProperty('--dy', `${to.top - from.top}px`);
      ghost.style.setProperty('--turn', `${step * 90}deg`);
      ghost.innerHTML = cellIcon(cell);
      els.boardWrap.appendChild(ghost);
      window.setTimeout(() => ghost.remove(), 700);
    });
    window.setTimeout(done, 620);
  }

  function animateLaserShots(power, rect, targets) {
    const boardRect = els.boardWrap.getBoundingClientRect();
    const pad = 9;
    const directions = [];
    const shortLength = rect.width * 2.35;
    if (power === 'row') directions.push({ angle: 0, length: boardRect.width - rect.cx - pad }, { angle: 180, length: rect.cx - pad });
    if (power === 'col') directions.push({ angle: 90, length: boardRect.height - rect.cy - pad }, { angle: -90, length: rect.cy - pad });
    if (power === 'cross') directions.push({ angle: 0, length: shortLength }, { angle: 180, length: shortLength }, { angle: 90, length: shortLength }, { angle: -90, length: shortLength });
    directions.forEach((direction) => {
      const shot = document.createElement('div');
      shot.className = 'mh-shot';
      shot.style.left = `${rect.cx}px`;
      shot.style.top = `${rect.cy - 4}px`;
      shot.style.width = `${Math.max(0, direction.length)}px`;
      shot.style.setProperty('--r', `${direction.angle}deg`);
      els.boardWrap.appendChild(shot);
      setTimeout(() => shot.remove(), 380);
    });
    window.setTimeout(() => targets.forEach((cell) => animateImpact(cell)), 260);
  }

  function animatePurify(cell) {
    const rect = cellRect(cell);
    const ring = document.createElement('div');
    ring.className = 'mh-ring';
    ring.style.borderColor = 'rgba(251,146,60,.95)';
    ring.style.left = `${rect.left}px`;
    ring.style.top = `${rect.top}px`;
    ring.style.width = `${rect.width}px`;
    ring.style.height = `${rect.height}px`;
    els.boardWrap.appendChild(ring);
    setTimeout(() => ring.remove(), 700);
  }

  function animateFlash(cell) {
    const rect = cellRect(cell);
    const flash = document.createElement('div');
    flash.className = 'mh-flash';
    flash.style.left = `${rect.left}px`;
    flash.style.top = `${rect.top}px`;
    flash.style.width = `${rect.width}px`;
    flash.style.height = `${rect.height}px`;
    els.boardWrap.appendChild(flash);
    setTimeout(() => flash.remove(), 560);
  }

  function animateImpact(cell) {
    const rect = cellRect(cell);
    const impact = document.createElement('div');
    impact.className = 'mh-impact';
    impact.style.left = `${rect.left}px`;
    impact.style.top = `${rect.top}px`;
    impact.style.width = `${rect.width}px`;
    impact.style.height = `${rect.height}px`;
    els.boardWrap.appendChild(impact);
    setTimeout(() => impact.remove(), 420);
  }

  function toast(text) {
    const el = document.createElement('div');
    el.className = 'mh-toast';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }

  function showGuide(selectedId) {
    const items = [
      ...Object.entries(CORE_GUIDES).filter(([id]) => id !== 'hardObstacle' || ['expert', 'nightmare'].includes(state.difficulty)).map(([id, data]) => ({ id, ...data })),
      ...[...state.knownPowerups].filter((id) => POWERUPS[id]).map((id) => ({ id, ...POWERUPS[id] })),
    ];
    const selected = items.find((item) => item.id === selectedId) || items[0];
    els.guideList.innerHTML = items.map((item) => `<button class="mh-guide-item ${selected.id === item.id ? 'active' : ''}" type="button" data-guide="${item.id}">${nodeIcon(item.id)}${item.label}</button>`).join('');
    els.guideDetail.innerHTML = `<div class="mh-guide-icon">${nodeIcon(selected.id)}</div><div><h2>${selected.label}</h2><div>${selected.desc}</div></div>`;
    els.guideList.querySelectorAll('button').forEach((button) => button.addEventListener('click', () => showGuide(button.dataset.guide)));
    els.guideOverlay.hidden = false;
  }

  function maybeShowNewGuide() {
    if (!state.pendingGuide.length) return;
    showNewGuideStep();
  }

  function showNewGuideStep() {
    const id = state.pendingGuide[0];
    const data = guideData(id);
    if (!data) {
      state.pendingGuide.shift();
      maybeShowNewGuide();
      return;
    }
    const total = Number(els.newGuideOverlay.dataset.total || state.pendingGuide.length || 1);
    const index = total - state.pendingGuide.length + 1;
    els.newGuideOverlay.dataset.total = total;
    els.newGuidePrompt.textContent = state.pendingGuide.length > 1 ? t('newGuideMulti') : t('newGuideSingle');
    els.newGuideDetail.innerHTML = `<div class="mh-guide-icon">${nodeIcon(id)}</div><div><h2>${data.label}</h2><div>${data.desc}</div></div>`;
    els.newGuideProgress.textContent = `${index}/${total}`;
    els.newGuideNext.textContent = state.pendingGuide.length > 1 ? t('newGuideNextMore') : t('gotIt');
    els.newGuideOverlay.hidden = false;
  }

  function advanceNewGuide() {
    markGuideKnown(state.pendingGuide.shift());
    if (state.pendingGuide.length) {
      showNewGuideStep();
      return;
    }
    els.newGuideOverlay.hidden = true;
    delete els.newGuideOverlay.dataset.total;
    flashGuideButton();
  }

  function flashGuideButton() {
    els.guide.classList.remove('guide-hint');
    void els.guide.offsetWidth;
    els.guide.classList.add('guide-hint');
    window.setTimeout(() => els.guide.classList.remove('guide-hint'), 2100);
  }

  function sleep(ms) {
    return new Promise((resolve) => window.setTimeout(resolve, ms));
  }

  function currentPathPos() {
    return state.path[state.path.length - 1] || null;
  }

  function samePos(a, b) {
    return Boolean(a && b && a.x === b.x && a.y === b.y);
  }

  function routeIndexForCurrent() {
    const current = currentPathPos();
    if (!current) return -1;
    return state.route.findIndex((pos) => samePos(pos, current));
  }

  function findHeldPowerForTarget(origin, target) {
    return state.heldPowers.findIndex((power) => powerOpensTarget(state.grid, power, origin, target));
  }

  async function waitForAutoIdle(token) {
    for (let i = 0; i < 80 && token === state.autoToken && state.animating; i += 1) {
      await sleep(40);
    }
    await sleep(AUTO_STEP_DELAY);
  }

  async function prepareAutoRouteCell(target, token) {
    for (let guard = 0; guard < 8 && token === state.autoToken; guard += 1) {
      const cell = state.grid[target.y]?.[target.x];
      const origin = currentPathPos();
      if (!cell || !origin) return false;
      if (cell.type === 'hardObstacle') return false;
      if (cell.type !== 'obstacle') return true;
      const powerIndex = findHeldPowerForTarget(origin, target);
      if (powerIndex >= 0) {
        useHeldPower(powerIndex);
        await sleep(AUTO_POWER_DELAY);
        await waitForAutoIdle(token);
      } else if (state.purifyReady) {
        return true;
      } else {
        return false;
      }
    }
    const cell = state.grid[target.y]?.[target.x];
    return Boolean(cell && (cell.type !== 'obstacle' || state.purifyReady) && cell.type !== 'hardObstacle');
  }

  async function autoAttemptMove(target, token) {
    if (token !== state.autoToken || state.finished) return false;
    const ready = state.path.length ? await prepareAutoRouteCell(target, token) : true;
    if (!ready || token !== state.autoToken) return false;
    const beforeStep = state.path.length;
    attemptMove(target.x, target.y);
    await waitForAutoIdle(token);
    const current = currentPathPos();
    return samePos(current, target) && state.path.length > beforeStep;
  }

  async function autoSolve() {
    if (!IS_LIVE_PREVIEW) return false;
    if (state.autoSolving) return false;
    if (!state.route.length) return false;
    state.autoSolving = true;
    state.autoToken += 1;
    state.dragging = false;
    const token = state.autoToken;
    els.overlay.hidden = true;
    els.guideOverlay.hidden = true;
    els.newGuideOverlay.hidden = true;
    els.rewindOverlay.hidden = true;
    startTimer();
    renderAll();
    toast(t('toastAutoStart'));
    try {
      if (!state.path.length) {
        const movedToStart = await autoAttemptMove(state.route[0], token);
        if (!movedToStart) throw new Error(t('errorAutoStart'));
      }
      for (let guard = 0; guard < state.route.length * 3 && token === state.autoToken && !state.finished; guard += 1) {
        const routeIndex = routeIndexForCurrent();
        if (routeIndex < 0 || routeIndex >= state.route.length - 1) break;
        const moved = await autoAttemptMove(state.route[routeIndex + 1], token);
        if (!moved) throw new Error(t('errorAutoBlocked'));
      }
      if (!state.finished && token === state.autoToken) throw new Error(t('errorAutoIncomplete'));
      return state.finished;
    } catch (error) {
      if (token === state.autoToken) {
        toast(error.message || t('errorAutoInterrupted'));
        return false;
      }
      return false;
    } finally {
      if (token === state.autoToken) {
        state.autoSolving = false;
        state.dragging = false;
        renderAll();
      }
    }
  }

  function runAutoSolveStressTest(options = {}) {
    if (!IS_LIVE_PREVIEW) return { ok: false, error: t('errorLivePreviewOnly') };
    const count = Math.max(1, Number(options.count || 500));
    const difficulty = normalizeDifficulty(options.difficulty || 'nightmare');
    const previousDifficulty = state.difficulty;
    const previousRound = state.round;
    const previousOverlayHidden = els.overlay.hidden;
    const failures = [];
    stopTimer();
    state.difficulty = difficulty;
    for (let i = 0; i < count; i += 1) {
      state.visitedCheckpoints = new Set();
      state.path = [];
      state.pathKeys = new Set();
      state.heldPowers = [];
      state.purifyReady = false;
      state.dragging = false;
      state.animating = false;
      state.finished = false;
      state.timeline = [];
      state.lastTimelineStep = -1;
      buildLevel();
      const config = DIFFICULTIES[difficulty];
      const solution = computeRouteSolution(state.grid, state.route);
      const usesRotation = solution.actions.some((action) => action.type === 'power' && isRotationPower(action.power));
      const ok = state.route.length >= config.pathMin
        && state.checkpoints.size === config.checkpoints
        && routeShapeOk(state.route, config.size)
        && (!requiresRotationSolution(config) || usesRotation)
        && solution.ok;
      if (!ok) {
        failures.push({ index: i + 1, routeLength: state.route.length, checkpoints: state.checkpoints.size, boundaryRatio: boundaryRatio(state.route, config.size), turnRatio: turnRatio(state.route), usesRotation, solutionOk: solution.ok });
        break;
      }
    }
    state.difficulty = previousDifficulty;
    state.round = previousRound;
    resetLevel(true);
    els.overlay.hidden = previousOverlayHidden;
    const result = { ok: failures.length === 0, count, difficulty, failures };
    console.log('[haqiMatrixHack] auto solve stress test', result);
    return result;
  }

  function runAllDifficultyStressTest(options = {}) {
    if (!IS_LIVE_PREVIEW) return { ok: false, error: t('errorLivePreviewOnly') };
    const count = Math.max(1, Number(options.count || 200));
    const results = DIFFICULTY_ORDER.map((difficulty) => runAutoSolveStressTest({ count, difficulty }));
    const result = { ok: results.every((item) => item.ok), count, results };
    console.log('[haqiMatrixHack] all difficulty stress test', result);
    return result;
  }

  els.start.addEventListener('click', () => {
    if (state.autoSolving) return;
    els.overlay.hidden = true;
    maybeShowNewGuide();
  });
  els.guide.addEventListener('click', () => { if (!state.autoSolving) showGuide(); });
  els.guideClose.addEventListener('click', () => { if (!state.autoSolving) els.guideOverlay.hidden = true; });
  els.newGuideNext.addEventListener('click', () => { if (!state.autoSolving) advanceNewGuide(); });
  els.undo.addEventListener('click', showRewind);
  els.rewindClose.addEventListener('click', () => { if (!state.autoSolving) els.rewindOverlay.hidden = true; });
  els.autoSolve.addEventListener('click', autoSolve);
  els.restart.addEventListener('click', () => { if (!state.autoSolving) resetLevel(true); });
  els.next.addEventListener('click', () => { if (!state.autoSolving) resetLevel(false); });
  window.addEventListener('pointermove', onPointerMove, { passive: false });
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerUp);
  window.addEventListener('message', (event) => {
    const message = event.data || {};
    if (state.autoSolving) return;
    if (message.type === 'setGameConfig' && message.difficulty) {
      state.difficulty = normalizeDifficulty(message.difficulty);
      localStorage.setItem(STORAGE_KEY_DIFFICULTY, state.difficulty);
      resetLevel(true);
    }
  });

  buildLevel();
  collectNewGuideNodes();
  renderAll();
  queueTimelineSnapshot(true);
  if (IS_LIVE_PREVIEW) {
    window.haqiMatrixHackAutoSolve = autoSolve;
    window.haqiMatrixHackRunAutoTest = runAutoSolveStressTest;
    window.haqiMatrixHackRunAllDifficultyTest = runAllDifficultyStressTest;
    window.haqiMatrixHack = Object.assign(window.haqiMatrixHack || {}, { autoSolve, runAutoSolveStressTest, runAllDifficultyStressTest });
  }
  window.parent?.postMessage({ type: 'gameLoaded' }, '*');
})();
</script>
