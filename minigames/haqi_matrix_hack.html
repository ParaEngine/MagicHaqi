    const target = randInt(minLength, Math.min(maxLength, size * size - 1));

      const path = [{ x: 0, y: 0 }];

      while (path.length < target) {

  function buildLevel() {
    const config = DIFFICULTIES[state.difficulty];
    let level = null;
    for (let attempt = 0; attempt < 220; attempt += 1) {
      const grid = makeEmptyGrid(config.size);
      const route = createRoute(config.size, config.pathMin, config.pathMax);
      if (route.length < config.pathMin) continue;
      const levelPowerPool = selectLevelPowerPool(config);
      const protectedKeys = new Set(['0,0', keyOf(route[route.length - 1].x, route[route.length - 1].y)]);

      const blockerKeys = new Set();
      const segment = Math.max(3, Math.floor((route.length - 3) / (config.powerups + 1)));
      for (let i = 0; i < config.powerups; i += 1) {

        const powerPos = route[powerIndex];

        const powerKey = keyOf(powerPos.x, powerPos.y);
        const blockerKey = keyOf(blockerPos.x, blockerPos.y);
        if (protectedKeys.has(powerKey) || protectedKeys.has(blockerKey) || blockerKeys.has(powerKey)) continue;
        const power = choosePowerForBlocker(levelPowerPool, powerPos, blockerPos, i % 4 === 1, config);
        plannedPowerups.push({ power, pos: powerPos, blocker: blockerPos, blockerIndex });
        protectedKeys.add(powerKey);
        protectedKeys.add(blockerKey);
        blockerKeys.add(blockerKey);

      const end = route[route.length - 1];
      grid[end.y][end.x].type = 'end';
      plannedPowerups.forEach(({ power, pos, blocker }) => {
        grid[pos.y][pos.x].type = 'power';
        grid[pos.y][pos.x].power = power;
        grid[blocker.y][blocker.x].type = 'obstacle';
      });

      const checkpointCandidates = route
        .slice(2, -2)
        .filter((pos) => !protectedKeys.has(keyOf(pos.x, pos.y)) && grid[pos.y][pos.x].type === 'normal');
      if (checkpointCandidates.length < config.checkpoints) continue;
      shuffle(checkpointCandidates).slice(0, config.checkpoints).forEach((pos) => {
        grid[pos.y][pos.x].type = 'checkpoint';

      grid[end.y][end.x].type = 'end';

        keyOf(blocker.x, blocker.y),
      ]);
      DIRS.map(([dx, dy]) => ({ x: blocker.x + dx, y: blocker.y + dy }))
        .filter((pos) => inBounds(pos.x, pos.y, size))
        .forEach((pos) => {
          const key = keyOf(pos.x, pos.y);
          const cell = grid[pos.y][pos.x];
          if (allowed.has(key) || protectedKeys.has(key) || cell.type !== 'normal') return;
          cell.type = Math.random() < config.hardRate * .45 ? 'hardObstacle' : 'obstacle';
        });
    });
  }

  function isLevelTooOpen(grid, config) {
    if (!['hard', 'expert', 'nightmare'].includes(config.id)) return false;
    const access = analyzeNoToolAccess(grid, config.size);
    if (access.endReachable && access.checkpointsReachable >= config.checkpoints) return true;
    if (config.id === 'nightmare' && access.endReachable) return true;
    if (config.id === 'nightmare' && access.reachableRatio > .48) return true;
    if (config.id === 'expert' && access.reachableRatio > .58) return true;
    return false;
  }

  function analyzeNoToolAccess(grid, size) {
    const queue = [{ x: 0, y: 0 }];
    const seen = new Set(['0,0']);
    let endReachable = false;
    let checkpointsReachable = 0;
    for (let i = 0; i < queue.length; i += 1) {
      const pos = queue[i];
      const cell = grid[pos.y][pos.x];
      if (cell.type === 'end') endReachable = true;
      if (cell.type === 'checkpoint') checkpointsReachable += 1;
      DIRS.forEach(([dx, dy]) => {
        const next = { x: pos.x + dx, y: pos.y + dy };
        const key = keyOf(next.x, next.y);
        if (!inBounds(next.x, next.y, size) || seen.has(key)) return;
        const nextCell = grid[next.y][next.x];
        if (nextCell.type === 'obstacle' || nextCell.type === 'hardObstacle') return;
        seen.add(key);
        queue.push(next);
      });
    }
    return { endReachable, checkpointsReachable, reachableRatio: seen.size / (size * size) };
  }

  function pickSpreadCandidate(candidates, placedCells, sectorCounts, size) {
    const pool = shuffle(candidates).slice(0, Math.min(candidates.length, 18));
    return pool.sort((a, b) => spreadScore(b, placedCells, sectorCounts, size) - spreadScore(a, placedCells, sectorCounts, size))[0];
  }

  function spreadScore(cell, placedCells, sectorCounts, size) {
    const minDistance = placedCells.length ? Math.min(...placedCells.map((other) => Math.abs(cell.x - other.x) + Math.abs(cell.y - other.y))) : size;
    const sectorPenalty = sectorCounts.get(sectorKey(cell, size)) || 0;
    const edgeBias = Math.min(cell.x, cell.y, size - 1 - cell.x, size - 1 - cell.y) * .12;
    return minDistance * 3 - sectorPenalty * 4 + edgeBias + Math.random() * .35;
  }

  function addSectorCount(sectorCounts, cell, size) {
    const key = sectorKey(cell, size);
    sectorCounts.set(key, (sectorCounts.get(key) || 0) + 1);
  }

  function sectorKey(cell, size) {
    const band = Math.max(1, Math.ceil(size / 3));
    return `${Math.floor(cell.x / band)},${Math.floor(cell.y / band)}`;
  }

  function resetLevel(keepRound) {
    stopTimer();
    state.visitedCheckpoints = new Set();
    state.path = [];
    state.pathKeys = new Set();
    state.heldPowers = [];
    state.purifyReady = false;
    state.dragging = false;
    state.finished = false;
    state.seconds = 0;
    state.timeline = [];
    state.lastTimelineStep = -1;
    state.score = 0;
    els.rewindOverlay.hidden = true;
    els.newGuideOverlay.hidden = true;
    if (!keepRound) state.round += 1;
    buildLevel();
    collectNewGuideNodes();
    renderAll();
    queueTimelineSnapshot(true);
    if (els.overlay.hidden) maybeShowNewGuide();
  }

  function collectNewGuideNodes() {
    state.pendingGuide = [];
    presentGuideIds().forEach((id) => {
      if (!state.knownGuides.has(id)) state.pendingGuide.push(id);
      else if (POWERUPS[id] && !state.knownPowerups.has(id)) state.knownPowerups.add(id);
    });
    saveKnownPowerups();
  }

  function markGuideKnown(id) {
    if (!guideData(id)) return;
    state.knownGuides.add(id);
    if (POWERUPS[id]) state.knownPowerups.add(id);
    saveKnownGuides();
    saveKnownPowerups();
  }

  function presentGuideIds() {
    const ids = new Set();
    state.grid.flat().forEach((cell) => {
      if (cell.type === 'power') ids.add(cell.power);
      else if (guideData(cell.type)) ids.add(cell.type);
    });
    return ['start', 'end', 'checkpoint', 'obstacle', 'hardObstacle', ...Object.keys(POWERUPS)].filter((id) => ids.has(id));
  }

  function renderAll() {
    const config = DIFFICULTIES[state.difficulty];
    els.board.style.setProperty('--size', config.size);
    els.difficultyTitle.textContent = config.label;
    els.round.textContent = state.round;
    els.time.textContent = state.seconds;
    els.checkpointTotal.textContent = state.checkpoints.size;
    els.checkpoints.textContent = state.visitedCheckpoints.size;
    els.steps.textContent = Math.max(0, state.path.length - 1);
    renderBoard();
    renderLines();
    renderHeld();
    renderDifficulties();
    renderStatus();
    els.next.hidden = !state.finished;
    els.undo.disabled = state.timeline.length === 0 || state.finished;
  }

  function renderBoard() {
    els.board.innerHTML = '';
    const currentKey = state.path.length ? keyOf(state.path[state.path.length - 1].x, state.path[state.path.length - 1].y) : '';
    state.grid.flat().forEach((cell) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `mh-cell ${cellClass(cell)}`;
      button.dataset.x = cell.x;
      button.dataset.y = cell.y;
      const cellKey = keyOf(cell.x, cell.y);
      if (state.pathKeys.has(cellKey)) button.classList.add('visited');
      if (cellIcon(cell)) button.classList.add('has-icon');
      if (currentKey === cellKey) button.classList.add('current');
      if (cell.type === 'checkpoint' && state.visitedCheckpoints.has(cellKey)) button.classList.add('done');
      if (cell.type === 'power' && cell.used) button.classList.add('used');
      button.innerHTML = cellIcon(cell);
      button.addEventListener('pointerdown', onPointerDown);
      button.addEventListener('pointerenter', onPointerEnter);
      els.board.appendChild(button);
    });
  }

  function cellClass(cell) {
    if (cell.type === 'power') return `power ${POWERUPS[cell.power].cls}`;
    return cell.type;
  }

  function cellIcon(cell) {
    if (cell.type === 'power') return nodeIcon(cell.power, 'mh-cell-icon');
    if (['start', 'end', 'checkpoint', 'obstacle', 'hardObstacle'].includes(cell.type)) return nodeIcon(cell.type, 'mh-cell-icon');
    return '';
  }

  function renderLines() {
    const size = DIFFICULTIES[state.difficulty].size;
    const points = state.path.map((pos) => `${((pos.x + .5) / size) * 100},${((pos.y + .5) / size) * 100}`).join(' ');
    els.lines.setAttribute('viewBox', '0 0 100 100');
    els.lines.innerHTML = points ? `<polyline points="${points}" fill="none" stroke="#67e8f9" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><polyline points="${points}" fill="none" stroke="#fef08a" stroke-width=".65" stroke-linecap="round" stroke-linejoin="round"/>` : '';
  }

  function renderHeld() {
    const purifyText = state.purifyReady ? '<div class="mh-token done">净化：下一次障碍突破有效</div>' : '<div class="mh-token">净化：未生效</div>';
    if (!state.heldPowers.length) {
      els.held.innerHTML = `<div class="mh-held-card"><span>主动道具：无</span><button class="mh-use" disabled>释放</button></div>${purifyText}`;
      return;
    }
    const grouped = [];
    state.heldPowers.forEach((power) => {
      const group = grouped.find((item) => item.power === power);
      if (group) group.count += 1;
      else grouped.push({ power, count: 1 });
    });
    const items = grouped.map(({ power, count }) => {
      const item = POWERUPS[power];
      return `<div class="mh-held-card"><span>${nodeIcon(power, 'mh-held-icon')} ${item.label}<b class="mh-held-count">×${count}</b></span><button class="mh-use" type="button" data-power-id="${power}">释放</button></div>`;
    });
    els.held.innerHTML = `${items.join('')}${purifyText}`;
    els.held.querySelectorAll('[data-power-id]').forEach((button) => {
      button.addEventListener('click', () => useHeldPower(state.heldPowers.indexOf(button.dataset.powerId)));
    });
  }

  function renderDifficulties() {
    els.difficulties.innerHTML = DIFFICULTY_ORDER.map((id) => `<button class="mh-difficulty ${state.difficulty === id ? 'active' : ''}" type="button" data-difficulty="${id}">${DIFFICULTIES[id].label}</button>`).join('');
    els.difficulties.querySelectorAll('button').forEach((button) => {
      button.addEventListener('click', () => {
        state.difficulty = button.dataset.difficulty;
        state.round = 1;
        localStorage.setItem(STORAGE_KEY_DIFFICULTY, state.difficulty);
        resetLevel(true);
      });
    });
  }

  function renderStatus() {
    if (state.finished) {
      els.status.textContent = `破解完成，得分 ${state.score}。`;
    } else if (!state.path.length) {
      els.status.textContent = '从左上角起点开始连接路径。';
    } else if (state.purifyReady) {
      els.status.textContent = '净化生效中：下一次普通障碍突破有效。';
    } else if (state.heldPowers.length) {
      els.status.textContent = `当前持有 ${state.heldPowers.length} 个主动道具，可选择合适时机释放。`;
    } else {
      els.status.textContent = '继续连接必经点，并判断哪些道具值得获取。';
    }
  }

  function onPointerDown(event) {
    event.preventDefault();
    if (state.finished || state.animating) return;
    state.dragging = true;
    try { event.currentTarget.setPointerCapture?.(event.pointerId); } catch (error) {}
    attemptMove(Number(event.currentTarget.dataset.x), Number(event.currentTarget.dataset.y));
    startTimer();
  }

  function onPointerEnter(event) {
    if (!state.dragging || state.finished || state.animating) return;
    attemptMove(Number(event.currentTarget.dataset.x), Number(event.currentTarget.dataset.y));
  }

  function onPointerMove(event) {
    if (!state.dragging || state.finished || state.animating) return;
    const target = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.mh-cell');
    if (target) attemptMove(Number(target.dataset.x), Number(target.dataset.y));
  }

  function onPointerUp() {
    state.dragging = false;
  }

  function attemptMove(x, y) {
    if (state.animating) return;
    const cell = state.grid[y]?.[x];
    if (!cell) return;
    const key = keyOf(x, y);
    if (!state.path.length) {
      if (cell.type !== 'start') return;
      enterCell(cell);
      renderAll();
      maybeRecordTimelineSnapshot();
      return;
    }
    const last = state.path[state.path.length - 1];
    if (Math.abs(last.x - x) + Math.abs(last.y - y) !== 1) return;
    if (state.pathKeys.has(key)) return;
    if (cell.type === 'hardObstacle') return flashPathEnd();
    if (cell.type === 'obstacle' && !state.purifyReady) return flashPathEnd();
    if (cell.type === 'end' && state.visitedCheckpoints.size < state.checkpoints.size) return;
    if (cell.type === 'obstacle' && state.purifyReady) {
      state.purifyReady = false;
      cell.type = 'normal';
      animatePurify(cell);
    }
    enterCell(cell);
    if (cell.type === 'end' && state.visitedCheckpoints.size === state.checkpoints.size) finishGame();
    renderAll();
    maybeRecordTimelineSnapshot();
  }

  function enterCell(cell) {
    const key = keyOf(cell.x, cell.y);
    state.path.push({ x: cell.x, y: cell.y });
    state.pathKeys.add(key);
    if (cell.type === 'checkpoint') state.visitedCheckpoints.add(key);
    if (cell.type === 'power' && !cell.used) collectPower(cell);
  }

  function collectPower(cell) {
    const power = POWERUPS[cell.power];
    const powerId = cell.power;
    cell.type = 'normal';
    cell.power = null;
    cell.used = true;
    if (power.type === 'status') {
      state.purifyReady = true;
      animatePurify(cell);
      toast('净化生效');
    } else {
      state.heldPowers.push(powerId);
      toast(`获得${power.label}`);
    }
  }

  function useHeldPower(index) {
    if (state.animating || index < 0 || index >= state.heldPowers.length || state.finished || !state.path.length) return;
    const power = state.heldPowers[index];
    const origin = state.path[state.path.length - 1];
    const size = DIFFICULTIES[state.difficulty].size;
    state.heldPowers.splice(index, 1);
    renderHeld();
    renderStatus();
    if (isRotationPower(power)) {
      state.dragging = false;
      state.animating = true;
      animateRotateAround(origin, size, rotationStep(power), () => {
        const moved = rotateAround(origin, size, rotationStep(power));
        syncCheckpointsFromGrid();
        animatePower(power, origin, moved);
        state.animating = false;
        toast(power === 'rotateCcw' ? '周围节点已逆旋' : '周围节点已顺旋');
        renderAll();
        recordTimelineSnapshot(true);
      });
      return;
    }
    const targets = affectedCells(power, origin, size)
      .map(({ x, y }) => state.grid[y][x])
      .filter((cell) => cell.type === 'obstacle');
    animatePower(power, origin, targets);
    if (['row', 'col', 'cross'].includes(power)) {
      window.setTimeout(() => {
        targets.forEach((cell) => {
          cell.type = 'normal';
        });
        toast(targets.length ? `清除 ${targets.length} 个障碍` : '道具已释放');
        renderAll();
        recordTimelineSnapshot(true);
      }, 320);
    } else {
      targets.forEach((cell) => {
        cell.type = 'normal';
        animateFlash(cell);
      });
      toast(targets.length ? `清除 ${targets.length} 个障碍` : '道具已释放');
      renderAll();
      recordTimelineSnapshot(true);
    }
  }

  function rotateAround(origin, size, step = 1) {
    const ring = rotateRing(origin, size);
    const data = ring.map((pos) => copyCellState(state.grid[pos.y][pos.x]));
    ring.forEach((pos, index) => {
      const targetPos = ring[(index + step + ring.length) % ring.length];
      const target = state.grid[targetPos.y][targetPos.x];
      Object.assign(target, data[index]);
    });
    return ring.map((pos) => state.grid[pos.y][pos.x]);
  }

  function rotateRing(origin, size) {
    return [
      { x: origin.x - 1, y: origin.y - 1 },
      { x: origin.x, y: origin.y - 1 },
      { x: origin.x + 1, y: origin.y - 1 },
      { x: origin.x + 1, y: origin.y },
      { x: origin.x + 1, y: origin.y + 1 },
      { x: origin.x, y: origin.y + 1 },
      { x: origin.x - 1, y: origin.y + 1 },
      { x: origin.x - 1, y: origin.y },
    ].filter((pos) => inBounds(pos.x, pos.y, size));
  }

  function copyCellState(cell) {
    return { type: cell.type, power: cell.power, used: cell.used };
  }

  function syncCheckpointsFromGrid() {
    state.checkpoints = new Set();
    state.grid.flat().forEach((cell) => {
      if (cell.type === 'checkpoint') state.checkpoints.add(keyOf(cell.x, cell.y));
    });
    syncVisitedCheckpoints();
  }

  function syncVisitedCheckpoints() {
    state.visitedCheckpoints = new Set();
    state.path.forEach((pos) => {
      const key = keyOf(pos.x, pos.y);
      if (state.checkpoints.has(key)) state.visitedCheckpoints.add(key);
    });
  }

  function timelineInterval() {
    return Math.max(3, Math.ceil(DIFFICULTIES[state.difficulty].size / 2));
  }

  function maybeRecordTimelineSnapshot() {
    const step = Math.max(0, state.path.length - 1);
    if (step === 0 || step === state.lastTimelineStep || step % timelineInterval() !== 0) return;
    recordTimelineSnapshot(false);
  }

  function queueTimelineSnapshot(force) {
    window.requestAnimationFrame(() => recordTimelineSnapshot(force));
  }

  function recordTimelineSnapshot(force) {
    const step = Math.max(0, state.path.length - 1);
    if (!force && step === state.lastTimelineStep) return;
    state.timeline.push(makeTimelineSnapshot(step));
    state.lastTimelineStep = step;
    if (state.timeline.length > 10) state.timeline.shift();
    renderAll();
  }

  function makeTimelineSnapshot(step) {
    const data = {
      step,
      seconds: state.seconds,
      difficulty: state.difficulty,
      grid: cloneGrid(state.grid),
      route: state.route.map((pos) => ({ ...pos })),
      checkpoints: [...state.checkpoints],
      visitedCheckpoints: [...state.visitedCheckpoints],
      path: state.path.map((pos) => ({ ...pos })),
      heldPowers: state.heldPowers.slice(),
      purifyReady: state.purifyReady,
      score: state.score,
    };
    return { ...data, thumb: renderTimelineThumb(data) };
  }

  function cloneGrid(grid) {
    return grid.map((row) => row.map((cell) => ({ x: cell.x, y: cell.y, type: cell.type, power: cell.power, used: cell.used })));
  }

  function showRewind() {
    if (!state.timeline.length || state.finished || state.animating) return;
    const newestFirst = state.timeline.map((snapshot, index) => ({ snapshot, index })).slice().reverse();
    els.rewindList.innerHTML = newestFirst.map(({ snapshot, index }) => `
      <button class="mh-rewind-item" type="button" data-timeline-index="${index}">
        <img src="${snapshot.thumb}" alt="${snapshot.step} 步状态缩略图">
        <span class="mh-rewind-meta"><b>${snapshot.step} 步</b><span>${snapshot.seconds}s · ${snapshot.heldPowers.length} 道具 · ${snapshot.visitedCheckpoints.length}/${snapshot.checkpoints.length} 必经</span></span>
      </button>
    `).join('');
    els.rewindList.querySelectorAll('[data-timeline-index]').forEach((button) => {
      button.addEventListener('click', () => restoreTimelineSnapshot(Number(button.dataset.timelineIndex)));
    });
    els.rewindOverlay.hidden = false;
  }

  function restoreTimelineSnapshot(index) {
    const snapshot = state.timeline[index];
    if (!snapshot || state.animating) return;
    state.grid = cloneGrid(snapshot.grid);
    state.route = snapshot.route.map((pos) => ({ ...pos }));
    state.checkpoints = new Set(snapshot.checkpoints);
    state.visitedCheckpoints = new Set(snapshot.visitedCheckpoints);
    state.path = snapshot.path.map((pos) => ({ ...pos }));
    state.pathKeys = new Set(state.path.map((pos) => keyOf(pos.x, pos.y)));
    state.heldPowers = snapshot.heldPowers.slice();
    state.purifyReady = snapshot.purifyReady;
    state.seconds = snapshot.seconds;
    state.score = snapshot.score;
    state.finished = false;
    state.dragging = false;
    state.timeline = state.timeline.slice(0, index + 1);
    state.lastTimelineStep = snapshot.step;
    els.rewindOverlay.hidden = true;
    syncVisitedCheckpoints();
    renderAll();
    toast(`已倒退到 ${snapshot.step} 步`);
  }

  function renderTimelineThumb(snapshot) {
    const size = DIFFICULTIES[snapshot.difficulty].size;
    const canvas = document.createElement('canvas');
    canvas.width = 180;
    canvas.height = 180;
    const ctx = canvas.getContext('2d');
    const pad = 10;
    const gap = Math.max(1, Math.floor(5 - size / 3));
    const cellSize = (canvas.width - pad * 2 - gap * (size - 1)) / size;
    ctx.fillStyle = '#082f49';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    snapshot.grid.flat().forEach((cell) => drawThumbCell(ctx, cell, pad, gap, cellSize));
    drawThumbPath(ctx, snapshot.path, pad, gap, cellSize);
    return canvas.toDataURL('image/png');
  }

  function drawThumbCell(ctx, cell, pad, gap, cellSize) {
    const x = pad + cell.x * (cellSize + gap);
    const y = pad + cell.y * (cellSize + gap);
    const color = { normal: '#0f3f5a', start: '#22c55e', end: '#f59e0b', checkpoint: '#8b5cf6', obstacle: '#111827', hardObstacle: '#7f1d1d', power: '#06b6d4' }[cell.type] || '#0f3f5a';
    ctx.fillStyle = color;
    ctx.fillRect(x, y, cellSize, cellSize);
    if (cell.type === 'power') {
      ctx.fillStyle = cell.power === 'rotateCcw' ? '#fb7185' : '#f0f9ff';
      ctx.beginPath();
      ctx.arc(x + cellSize / 2, y + cellSize / 2, Math.max(2, cellSize * .18), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawThumbPath(ctx, path, pad, gap, cellSize) {
    if (path.length < 2) return;
    ctx.lineWidth = Math.max(2, cellSize * .18);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#67e8f9';
    ctx.beginPath();
    path.forEach((pos, index) => {
      const x = pad + pos.x * (cellSize + gap) + cellSize / 2;
      const y = pad + pos.y * (cellSize + gap) + cellSize / 2;
      if (index === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function finishGame() {
    state.finished = true;
    stopTimer();
    const config = DIFFICULTIES[state.difficulty];
    state.score = Math.max(10, config.baseScore + state.checkpoints.size * 20 - state.seconds * 2);
    toast(`破解成功 ${state.score}分`);
    window.parent?.postMessage({ type: 'gameFinished', data: { earnedPoints: state.score, difficulty: config.label } }, '*');
  }

  function startTimer() {
    if (state.timer) return;
    window.parent?.postMessage({ type: 'gameStarted' }, '*');
    state.timer = setInterval(() => {
      state.seconds += 1;
      els.time.textContent = state.seconds;
    }, 1000);
  }

  function stopTimer() {
    if (state.timer) clearInterval(state.timer);
    state.timer = null;
  }

  function flashCell(x, y) {
    const el = els.board.querySelector(`[data-x="${x}"][data-y="${y}"]`);
    if (!el) return;
    el.classList.remove('blocked');
    void el.offsetWidth;
    el.classList.add('blocked');
  }

  function flashPathEnd() {
    const last = state.path[state.path.length - 1];
    if (last) flashCell(last.x, last.y);
  }

  function cellRect(cell) {
    const target = els.board.querySelector(`[data-x="${cell.x}"][data-y="${cell.y}"]`);
    const boardRect = els.boardWrap.getBoundingClientRect();
    const rect = target.getBoundingClientRect();
    return { left: rect.left - boardRect.left, top: rect.top - boardRect.top, width: rect.width, height: rect.height, cx: rect.left - boardRect.left + rect.width / 2, cy: rect.top - boardRect.top + rect.height / 2 };
  }

  function animatePower(power, origin, targets = []) {
    const rect = cellRect(origin);
    if (power === 'pulse' || isRotationPower(power)) {
      const ring = document.createElement('div');
      ring.className = 'mh-ring';
      ring.style.left = `${rect.cx - rect.width * 1.15}px`;
      ring.style.top = `${rect.cy - rect.height * 1.15}px`;
      ring.style.width = `${rect.width * 2.3}px`;
      ring.style.height = `${rect.height * 2.3}px`;
      els.boardWrap.appendChild(ring);
      setTimeout(() => ring.remove(), 700);
      return;
    }
    if (['row', 'col', 'cross'].includes(power)) {
      animateLaserShots(power, rect, targets);
      return;
    }
    const beam = document.createElement('div');
    beam.className = 'mh-beam';
    if (power === 'row') {
      beam.style.left = '9px';
      beam.style.right = '9px';
      beam.style.top = `${rect.cy - rect.height * .18}px`;
      beam.style.height = `${rect.height * .36}px`;
    } else if (power === 'col') {
      beam.style.top = '9px';
      beam.style.bottom = '9px';
      beam.style.left = `${rect.cx - rect.width * .18}px`;
      beam.style.width = `${rect.width * .36}px`;
    } else {
      beam.style.inset = '9px';
      beam.style.clipPath = `polygon(${rect.cx - rect.width * .18}px 0, ${rect.cx + rect.width * .18}px 0, ${rect.cx + rect.width * .18}px 100%, ${rect.cx - rect.width * .18}px 100%, ${rect.cx - rect.width * .18}px ${rect.cy - rect.height * .18}px, 0 ${rect.cy - rect.height * .18}px, 0 ${rect.cy + rect.height * .18}px, 100% ${rect.cy + rect.height * .18}px, 100% ${rect.cy - rect.height * .18}px, ${rect.cx - rect.width * .18}px ${rect.cy - rect.height * .18}px)`;
    }
    els.boardWrap.appendChild(beam);
    setTimeout(() => beam.remove(), 650);
  }

  function animateRotateAround(origin, size, step, done) {
    const ring = rotateRing(origin, size);
    if (ring.length < 2) {
      done();
      return;
    }
    ring.forEach((pos, index) => {
      const next = ring[(index + step + ring.length) % ring.length];
      const cell = state.grid[pos.y][pos.x];
      const from = cellRect(cell);
      const to = cellRect(state.grid[next.y][next.x]);
      const ghost = document.createElement('div');
      ghost.className = 'mh-rotate-ghost';
      ghost.style.left = `${from.left}px`;
      ghost.style.top = `${from.top}px`;
      ghost.style.width = `${from.width}px`;
      ghost.style.height = `${from.height}px`;
      ghost.style.setProperty('--dx', `${to.left - from.left}px`);
      ghost.style.setProperty('--dy', `${to.top - from.top}px`);
      ghost.style.setProperty('--turn', `${step * 90}deg`);
      ghost.innerHTML = cellIcon(cell);
      els.boardWrap.appendChild(ghost);
      window.setTimeout(() => ghost.remove(), 700);
    });
    window.setTimeout(done, 620);
  }

  function animateLaserShots(power, rect, targets) {
    const boardRect = els.boardWrap.getBoundingClientRect();
    const pad = 9;
    const directions = [];
    const shortLength = rect.width * 2.35;
    if (power === 'row') directions.push({ angle: 0, length: boardRect.width - rect.cx - pad }, { angle: 180, length: rect.cx - pad });
    if (power === 'col') directions.push({ angle: 90, length: boardRect.height - rect.cy - pad }, { angle: -90, length: rect.cy - pad });
    if (power === 'cross') directions.push({ angle: 0, length: shortLength }, { angle: 180, length: shortLength }, { angle: 90, length: shortLength }, { angle: -90, length: shortLength });
    directions.forEach((direction) => {
      const shot = document.createElement('div');
      shot.className = 'mh-shot';
      shot.style.left = `${rect.cx}px`;
      shot.style.top = `${rect.cy - 4}px`;
      shot.style.width = `${Math.max(0, direction.length)}px`;
      shot.style.setProperty('--r', `${direction.angle}deg`);
      els.boardWrap.appendChild(shot);
      setTimeout(() => shot.remove(), 380);
    });
    window.setTimeout(() => targets.forEach((cell) => animateImpact(cell)), 260);
  }

  function animatePurify(cell) {
    const rect = cellRect(cell);
    const ring = document.createElement('div');
    ring.className = 'mh-ring';
    ring.style.borderColor = 'rgba(251,146,60,.95)';
    ring.style.left = `${rect.left}px`;
    ring.style.top = `${rect.top}px`;
    ring.style.width = `${rect.width}px`;
    ring.style.height = `${rect.height}px`;
    els.boardWrap.appendChild(ring);
    setTimeout(() => ring.remove(), 700);
  }

  function animateFlash(cell) {
    const rect = cellRect(cell);
    const flash = document.createElement('div');
    flash.className = 'mh-flash';
    flash.style.left = `${rect.left}px`;
    flash.style.top = `${rect.top}px`;
    flash.style.width = `${rect.width}px`;
    flash.style.height = `${rect.height}px`;
    els.boardWrap.appendChild(flash);
    setTimeout(() => flash.remove(), 560);
  }

  function animateImpact(cell) {
    const rect = cellRect(cell);
    const impact = document.createElement('div');
    impact.className = 'mh-impact';
    impact.style.left = `${rect.left}px`;
    impact.style.top = `${rect.top}px`;
    impact.style.width = `${rect.width}px`;
    impact.style.height = `${rect.height}px`;
    els.boardWrap.appendChild(impact);
    setTimeout(() => impact.remove(), 420);
  }

  function toast(text) {
    const el = document.createElement('div');
    el.className = 'mh-toast';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }

  function showGuide(selectedId) {
    const items = [
      ...Object.entries(CORE_GUIDES).filter(([id]) => id !== 'hardObstacle' || ['expert', 'nightmare'].includes(state.difficulty)).map(([id, data]) => ({ id, ...data })),
      ...[...state.knownPowerups].filter((id) => POWERUPS[id]).map((id) => ({ id, ...POWERUPS[id] })),
    ];
    const selected = items.find((item) => item.id === selectedId) || items[0];
    els.guideList.innerHTML = items.map((item) => `<button class="mh-guide-item ${selected.id === item.id ? 'active' : ''}" type="button" data-guide="${item.id}">${nodeIcon(item.id)}${item.label}</button>`).join('');
    els.guideDetail.innerHTML = `<div class="mh-guide-icon">${nodeIcon(selected.id)}</div><div><h2>${selected.label}</h2><div>${selected.desc}</div></div>`;
    els.guideList.querySelectorAll('button').forEach((button) => button.addEventListener('click', () => showGuide(button.dataset.guide)));
    els.guideOverlay.hidden = false;
  }

  function maybeShowNewGuide() {
    if (!state.pendingGuide.length) return;
    showNewGuideStep();
  }

  function showNewGuideStep() {
    const id = state.pendingGuide[0];
    const data = guideData(id);
    if (!data) {
      state.pendingGuide.shift();
      maybeShowNewGuide();
      return;
    }
    const total = Number(els.newGuideOverlay.dataset.total || state.pendingGuide.length || 1);
    const index = total - state.pendingGuide.length + 1;
    els.newGuideOverlay.dataset.total = total;
    els.newGuidePrompt.textContent = state.pendingGuide.length > 1 ? '连续查看本局新出现的节点。' : '查看这个节点的作用。';
    els.newGuideDetail.innerHTML = `<div class="mh-guide-icon">${nodeIcon(id)}</div><div><h2>${data.label}</h2><div>${data.desc}</div></div>`;
    els.newGuideProgress.textContent = `${index}/${total}`;
    els.newGuideNext.textContent = state.pendingGuide.length > 1 ? '下一个' : '知道了';
    els.newGuideOverlay.hidden = false;
  }

  function advanceNewGuide() {
    markGuideKnown(state.pendingGuide.shift());
    if (state.pendingGuide.length) {
      showNewGuideStep();
      return;
    }
    els.newGuideOverlay.hidden = true;
    delete els.newGuideOverlay.dataset.total;
    flashGuideButton();
  }

  function flashGuideButton() {
    els.guide.classList.remove('guide-hint');
    void els.guide.offsetWidth;
    els.guide.classList.add('guide-hint');
    window.setTimeout(() => els.guide.classList.remove('guide-hint'), 2100);
  }

  els.start.addEventListener('click', () => {
    els.overlay.hidden = true;
    maybeShowNewGuide();
  });
  els.guide.addEventListener('click', () => showGuide());
  els.guideClose.addEventListener('click', () => { els.guideOverlay.hidden = true; });
  els.newGuideNext.addEventListener('click', advanceNewGuide);
  els.undo.addEventListener('click', showRewind);
  els.rewindClose.addEventListener('click', () => { els.rewindOverlay.hidden = true; });
  els.restart.addEventListener('click', () => resetLevel(true));
  els.next.addEventListener('click', () => resetLevel(false));
  window.addEventListener('pointermove', onPointerMove, { passive: false });
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerUp);
  window.addEventListener('message', (event) => {
    const message = event.data || {};
    if (message.type === 'setGameConfig' && message.difficulty) {
      state.difficulty = normalizeDifficulty(message.difficulty);
      localStorage.setItem(STORAGE_KEY_DIFFICULTY, state.difficulty);
      resetLevel(true);
    }
  });

  buildLevel();
  collectNewGuideNodes();
  renderAll();
  queueTimelineSnapshot(true);
  window.parent?.postMessage({ type: 'gameLoaded' }, '*');
})();
</script>

</html>
