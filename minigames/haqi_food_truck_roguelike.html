<script defer>
(function () {
  'use strict';

  const CFG = game_config, A = CFG.arena, P = CFG.progression, PAL = CFG.palette, EL = CFG.elementColors;
  const WEAPONS = CFG.weapons, ITEMS = CFG.items, BUFFS = CFG.buffs, BOSSES = CFG.bosses;
  const wById = id => WEAPONS.find(w => w.id === id);
  const iById = id => ITEMS.find(i => i.id === id);
  const bById = id => BUFFS.find(b => b.id === id);
  const randBuff = () => BUFFS[(Math.random() * BUFFS.length) | 0].id;

  // ---------- 画布 ----------
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;display:block;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  addEventListener('resize', resize); resize();
  const cx = () => W / 2, cy = () => H / 2;

  // ---------- 摄像机：始终跟随餐车（吸血鬼幸存者式自由移动 + 世界滚动） ----------
  const cam = { x: 0, y: 0 };
  function project(wx, wy, z) {
    const rx = wx - cam.x, ry = wy - cam.y;
    return [cx() + (rx - ry) * 0.5, cy() + (rx + ry) * 0.25 - (z || 0)];
  }
  function screenToWorldDelta(dsx, dsy) { return [dsx + 2 * dsy, -dsx + 2 * dsy]; }
  function screenToWorldPoint(sx, sy) { const d = screenToWorldDelta(sx - cx(), sy - cy()); return [cam.x + d[0], cam.y + d[1]]; }
  function fillPoly(pts, color) {
    ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath(); ctx.fillStyle = color; ctx.fill();
  }
  function drawCube(wx, wy, s, h, col, z) {
    const hs = s / 2, zb = z || 0;
    const a = project(wx - hs, wy - hs, zb), b = project(wx + hs, wy - hs, zb),
          c = project(wx + hs, wy + hs, zb), d = project(wx - hs, wy + hs, zb);
    const up = p => [p[0], p[1] - h];
    fillPoly([up(d), up(c), c, d], col.dark);
    fillPoly([up(b), up(c), c, b], col.base);
    fillPoly([up(a), up(b), up(c), up(d)], col.light);
    ctx.strokeStyle = 'rgba(0,0,0,.18)'; ctx.lineWidth = 1; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(up(a)[0], up(a)[1]);
    [up(b), up(c), up(d)].forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.closePath(); ctx.stroke();
  }
  function shadow(wx, wy, rx) {
    const p = project(wx, wy, 0);
    ctx.save(); ctx.globalAlpha = 0.26; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(p[0], p[1], rx, rx * 0.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  function groundCircle(wx, wy, r, stroke, fill) {
    const p = project(wx, wy, 0);
    ctx.beginPath(); ctx.ellipse(p[0], p[1], r, r * 0.5, 0, 0, Math.PI * 2);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
  }

  // ---------- 运行时状态 ----------
  const truck = { x: 0, y: 0, hp: CFG.truck.maxHp, maxHp: CFG.truck.maxHp, facing: { x: 0, y: -1 }, bob: 0, hurtFlash: 0 };
  const enemies = [], shots = [], zones = [], beams = [], pickups = [], floaters = [], enemyShots = [], telegraphs = [], particles = [];
  const owned = [];           // 装备的武器（整局保留）[{def, level, cd, golden}]
  const ownedItems = {};      // id -> 层数（整局保留）
  const activeBuffs = [];     // {def, t}
  let boss = null, encounter = null, spawnTimer = 0;

  // 打击感：屏幕震动 / 顿帧 / 连击 / 受击泛红
  const fx = { shake: 0, hitstop: 0, combo: 0, comboT: 0, redFlash: 0 };
  function addShake(m) { fx.shake = Math.min(30, fx.shake + m); }
  function hitstop(t) { fx.hitstop = Math.max(fx.hitstop, t); }
  // 移动端自适应缩放系数（基于较短边）
  function uiScale() { return Math.max(0.62, Math.min(1, Math.min(W, H) / 760)); }
  const SS = '"Segoe UI Emoji","Apple Color Emoji",system-ui,sans-serif';

  const game = {
    phase: 'start',           // start | map | battle | reward | event | win | lose
    paused: false, over: false, won: false,
    level: 1, xp: 0, xpNeed: P.xpBase, pendingLevels: 0,
    kills: 0, score: 0, time: 0,
    afterReward: null, levelOpts: {}
  };
  // 整局元进度（节点地图 / 事件改写）
  const run = { actIdx: 0, floor: 0, nodeIdx: 0, act: null, pending: null, maxHpMul: 1, enemySpeedMul: 1 };

  // ---------- 属性聚合 ----------
  let STATS = {};
  function computeStats() {
    const s = {
      damage: 1, area: 1, projSpeed: 1, projAdd: 0, pierceAdd: 0, duration: 1,
      haste: 0, moveSpeed: 1, maxHp: CFG.truck.maxHp, regen: CFG.truck.regen,
      pickup: 78, crit: 0.05, critMult: 2, armor: 0, luck: 0, xpGain: 1, dodge: 0,
      invincible: false, lifesteal: false, magnet: false, onHitBurn: false, onHitSlow: false,
      thorns: false, scoreX2: false, onHitChain: false, knockback: false, enemySlow: 1
    };
    for (const id in ownedItems) { const m = iById(id).mod, n = ownedItems[id]; for (const k in m) s[k] += m[k] * n; }
    for (const ab of activeBuffs) {
      const m = ab.def.mod;
      if (m) for (const k in m) s[k] += m[k];
      if (ab.def.flag) { if (ab.def.flag === 'enemySlow') s.enemySlow = 0.4; else if (ab.def.flag !== 'fullHeal') s[ab.def.flag] = true; }
    }
    s.maxHp *= run.maxHpMul;
    STATS = s; truck.maxHp = s.maxHp; if (truck.hp > truck.maxHp) truck.hp = truck.maxHp;
  }
  function wp(w) {
    const d = w.def, lv = w.level, s = STATS, g = w.golden ? 2 : 1;
    return {
      dmg: d.dmg * (1 + 0.16 * (lv - 1)) * s.damage * g,
      cd: (d.cd || 1) * (1 - Math.min(0.55, 0.05 * (lv - 1))) * Math.max(0.35, 1 - s.haste),
      count: (d.count || 1) + Math.floor((lv - 1) * (d.countGrow || 0)) + s.projAdd,
      speed: (d.speed || 420) * s.projSpeed,
      pierce: (d.pierce || 0) + s.pierceAdd,
      radius: (d.radius || 14) * (1 + 0.08 * (lv - 1)) * s.area,
      range: (d.range || 160) * (1 + 0.07 * (lv - 1)) * s.area,
      angle: (d.angle || 60), el: d.el || 'none', knock: (d.knock || 0)
    };
  }

  // ---------- 输入 ----------
  const keys = {};
  addEventListener('keydown', e => { keys[(e.key || '').toLowerCase()] = true; });
  addEventListener('keyup', e => { keys[(e.key || '').toLowerCase()] = false; });
  let mouse = null;
  canvas.addEventListener('pointermove', e => { if (mouse) { mouse.sx = e.clientX; mouse.sy = e.clientY; } });
  canvas.addEventListener('pointerdown', e => { onPointerDown(e.clientX, e.clientY); mouse = { sx: e.clientX, sy: e.clientY, held: true }; });
  canvas.addEventListener('pointerup', () => { if (mouse) mouse.held = false; });

  function onPointerDown(sx, sy) {
    if (game.phase === 'map') { mapClick(sx, sy); }
    else if (game.phase === 'win' || game.phase === 'lose') { /* 由结算按钮处理 */ }
  }

  // ---------- 伤害 / 状态 ----------
  function killEnemy(e, idx) {
    const def = e.def;
    game.kills++; game.score += (def.xp || 1) * 10 * (STATS.scoreX2 ? 2 : 1);
    fx.combo++; fx.comboT = 2.6;
    pickups.push({ x: e.x, y: e.y, type: 'xp', val: def.xp || 1, t: 0 });
    const luck = STATS.luck;
    if (Math.random() < 0.03 + luck * 0.008) pickups.push({ x: e.x, y: e.y, type: 'heal', val: 14, t: 0 });
    if (Math.random() < 0.018 + luck * 0.006) pickups.push({ x: e.x, y: e.y, type: 'buff', buff: randBuff(), t: 0 });
    if (Math.random() < 0.5) pickups.push({ x: e.x, y: e.y, type: 'gold', val: 1, t: 0 });
    const c = PAL[def.color];
    burst(e.x, e.y, c.light, e.isBoss ? 40 : 8, true);
    ring(e.x, e.y, e.isBoss ? 200 : 26 * (e.size || def.size), c.light);
    if (e.isBoss) { boss = null; encounter && (encounter.bossCleared = true); addShake(26); hitstop(0.12); for (let k = 0; k < 5; k++) ring(e.x, e.y, 60 + k * 50, c.light); }
    else { addShake(e.elite ? 9 : 1.6); if (e.elite) hitstop(0.05); }
    if (e.elite) { applyBuff(randBuff()); pickups.push({ x: e.x, y: e.y, type: 'heal', val: 16, t: 0 }); }
    enemies.splice(idx != null && idx >= 0 ? idx : enemies.indexOf(e), 1);
  }
  function hitEnemy(e, baseDmg, opt) {
    opt = opt || {};
    let dmg = baseDmg, crit = false;
    if (Math.random() < STATS.crit) { dmg *= STATS.critMult; crit = true; }
    dmg = Math.round(dmg); e.hp -= dmg;
    e.flash = 1; // 受击白闪
    floaters.push({ x: e.x, y: e.y - 6, txt: '' + dmg, crit, life: crit ? 0.85 : 0.55, sc: 0 });
    burst(e.x, e.y, '#fff', crit ? 5 : 2, true);
    if (crit) { addShake(3); }
    let el = opt.el || 'none';
    if (STATS.onHitBurn && el === 'none') el = 'fire';
    if (STATS.onHitSlow && el === 'none') el = 'ice';
    if (el === 'fire') { e.burnT = 3 * STATS.duration; e.burnDps = Math.max(e.burnDps || 0, 8 * STATS.damage); }
    else if (el === 'ice') { e.slowT = Math.max(e.slowT || 0, 2 * STATS.duration); }
    else if (el === 'poison') { e.poiT = 3 * STATS.duration; e.poiDps = Math.max(e.poiDps || 0, 5 * STATS.damage); }
    else if (el === 'shock') { e.stunT = Math.max(e.stunT || 0, 0.4); }
    const kb = opt.knock || (STATS.knockback ? 18 : 0);
    if (kb && !e.isBoss) { const dx = e.x - (opt.sx != null ? opt.sx : truck.x), dy = e.y - (opt.sy != null ? opt.sy : truck.y), l = Math.hypot(dx, dy) || 1; e.x += dx / l * kb; e.y += dy / l * kb; }
    if (STATS.lifesteal) heal(dmg * 0.12);
    if (STATS.onHitChain && Math.random() < 0.35) {
      let best = null, bd = 16000; for (const o of enemies) { if (o === e) continue; const dd = (o.x - e.x) ** 2 + (o.y - e.y) ** 2; if (dd < bd) { bd = dd; best = o; } }
      if (best) { best.hp -= dmg * 0.5; spark(e.x, e.y, best.x, best.y); if (best.hp <= 0) killEnemy(best); }
    }
    if (e.hp <= 0) killEnemy(e);
  }
  function heal(v) { truck.hp = Math.min(truck.maxHp, truck.hp + v); }
  function damageTruck(v) {
    if (STATS.invincible) return;
    if (Math.random() < STATS.dodge) { floaters.push({ x: truck.x, y: truck.y - 20, txt: '闪避', crit: false, life: 0.5, good: true }); return; }
    if (v > 3) v = Math.max(1, v - STATS.armor);
    truck.hp -= v; truck.hurtFlash = 0.2;
    if (v > 3) { addShake(Math.min(18, 5 + v * 0.4)); fx.redFlash = Math.min(0.7, fx.redFlash + v * 0.03); }
    if (truck.hp <= 0) { truck.hp = 0; addShake(28); loseRun(); }
  }

  // ---------- 粒子 / 特效 ----------
  function burst(x, y, color, n, glow) { for (let i = 0; i < n; i++) { const a = Math.random() * 6.28, sp = 40 + Math.random() * 110; particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, color, life: 0.35 + Math.random() * 0.35, z: 8, glow: !!glow, sz: 2 + Math.random() * 2 }); } }
  function spark(x1, y1, x2, y2) { particles.push({ line: [x1, y1, x2, y2], color: '#fde047', life: 0.12, z: 10, glow: true }); }
  function ring(x, y, r, color) { particles.push({ ring: true, x, y, r0: 6, r, color, life: 0.34, z: 6 }); }
  function muzzle(x, y, color) { particles.push({ x, y, vx: 0, vy: 0, color, life: 0.12, z: 18, glow: true, sz: 6 }); }

  // ============================================================================
  //  武器开火（数据驱动原型）
  // ============================================================================
  function spawnShot(o) { shots.push(Object.assign({ hitSet: new Set(), spin: 0, life: 3, t: 0 }, o)); }
  function nearestEnemies(n) { return enemies.map(e => ({ e, d: (e.x - truck.x) ** 2 + (e.y - truck.y) ** 2 })).sort((a, b) => a.d - b.d).slice(0, n).map(o => o.e); }
  function faceToward(t) { if (!t) return; const dx = t.x - truck.x, dy = t.y - truck.y, l = Math.hypot(dx, dy) || 1; truck.facing = { x: dx / l, y: dy / l }; }
  function facingAngle() { return Math.atan2(truck.facing.y, truck.facing.x); }

  function fireWeapon(w) {
    const p = wp(w), k = w.def.kind;
    if (k !== 'orbit' && k !== 'aura' && k !== 'mine' && k !== 'drop') muzzle(truck.x, truck.y, EL[p.el].light);
    if (k === 'nearest' || k === 'homing') {
      const tg = nearestEnemies(p.count);
      for (let i = 0; i < p.count; i++) {
        const t = tg[i % Math.max(1, tg.length)]; let vx, vy;
        if (t) { const dx = t.x - truck.x, dy = t.y - truck.y, l = Math.hypot(dx, dy) || 1; vx = dx / l; vy = dy / l; }
        else { const a = Math.random() * 6.28; vx = Math.cos(a); vy = Math.sin(a); }
        spawnShot({ x: truck.x, y: truck.y, vx: vx * p.speed, vy: vy * p.speed, dmg: p.dmg, pierce: p.pierce, radius: p.radius, el: p.el, knock: p.knock, homing: k === 'homing', target: t });
      }
      faceToward(tg[0]);
    } else if (k === 'spread') {
      const baseA = facingAngle(), spread = (w.def.spread || 40) * Math.PI / 180;
      for (let i = 0; i < p.count; i++) { const off = p.count > 1 ? (i / (p.count - 1) - 0.5) * spread : 0, a = baseA + off; spawnShot({ x: truck.x, y: truck.y, vx: Math.cos(a) * p.speed, vy: Math.sin(a) * p.speed, dmg: p.dmg, pierce: p.pierce, radius: p.radius, el: p.el }); }
    } else if (k === 'random') {
      for (let i = 0; i < p.count; i++) { const a = Math.random() * 6.28; spawnShot({ x: truck.x, y: truck.y, vx: Math.cos(a) * p.speed, vy: Math.sin(a) * p.speed, dmg: p.dmg, pierce: p.pierce, radius: p.radius, el: p.el, bounce: w.def.bounce, life: 2.4 }); }
    } else if (k === 'boomerang') {
      const tg = nearestEnemies(1)[0], a = tg ? Math.atan2(tg.y - truck.y, tg.x - truck.x) : facingAngle();
      spawnShot({ x: truck.x, y: truck.y, vx: Math.cos(a) * p.speed, vy: Math.sin(a) * p.speed, dmg: p.dmg, pierce: 99, radius: p.radius, el: p.el, boomerang: true, phase: 'out', life: 4 });
    } else if (k === 'chain') {
      const tg = nearestEnemies(1)[0], a = tg ? Math.atan2(tg.y - truck.y, tg.x - truck.x) : facingAngle();
      spawnShot({ x: truck.x, y: truck.y, vx: Math.cos(a) * p.speed, vy: Math.sin(a) * p.speed, dmg: p.dmg, pierce: 0, radius: p.radius, el: p.el, homing: true, target: tg, chains: (w.def.chains || 3), life: 2.5 });
    } else if (k === 'beam' || k === 'whip') {
      const dirs = k === 'whip' ? [0, Math.PI] : [null];
      for (const dd of dirs) {
        const tg = nearestEnemies(1)[0], a = dd != null ? dd : (tg ? Math.atan2(tg.y - truck.y, tg.x - truck.x) : facingAngle());
        const wid = (w.def.width || 30) * STATS.area, hw = wid / 2, ca = Math.cos(a), sa = Math.sin(a);
        beams.push({ x: truck.x, y: truck.y, a, len: p.range, w: wid, life: 0.18, color: EL[p.el].base });
        for (const e of enemies.slice()) { const rx = e.x - truck.x, ry = e.y - truck.y, along = rx * ca + ry * sa, perp = -rx * sa + ry * ca; if (along > 0 && along < p.range && Math.abs(perp) < hw + 14 * e.def.size) hitEnemy(e, p.dmg, { el: p.el, sx: truck.x, sy: truck.y }); }
      }
    } else if (k === 'cone') {
      const baseA = facingAngle(), half = p.angle * Math.PI / 180 / 2;
      beams.push({ x: truck.x, y: truck.y, a: baseA, len: p.range, w: 0, cone: p.angle, life: 0.16, color: EL[p.el].base });
      for (const e of enemies.slice()) { const dx = e.x - truck.x, dy = e.y - truck.y, d = Math.hypot(dx, dy); if (d < p.range) { let da = Math.atan2(dy, dx) - baseA; while (da > Math.PI) da -= 6.28; while (da < -Math.PI) da += 6.28; if (Math.abs(da) < half) hitEnemy(e, p.dmg, { el: p.el, sx: truck.x, sy: truck.y }); } }
    } else if (k === 'nova') {
      zones.push({ x: truck.x, y: truck.y, mode: 'ring', r: 10, maxR: p.radius, dmg: p.dmg, el: p.el, hitSet: new Set(), life: 1 });
    } else if (k === 'lob') {
      const tg = nearestEnemies(1)[0], tx = tg ? tg.x : truck.x + (Math.random() - .5) * 220, ty = tg ? tg.y : truck.y + (Math.random() - .5) * 220;
      shots.push({ lob: true, x: truck.x, y: truck.y, sx: truck.x, sy: truck.y, tx, ty, t: 0, dur: 0.6, dmg: p.dmg, radius: p.radius, el: p.el, hitSet: new Set() });
    } else if (k === 'drop') {
      const tg = nearestEnemies(1)[0], tx = tg ? tg.x : truck.x, ty = tg ? tg.y : truck.y;
      zones.push({ x: tx, y: ty, mode: 'patch', r: p.radius, dmg: p.dmg, el: p.el, interval: (w.def.interval || 0.5), timer: 0, life: (w.def.life || 3) * STATS.duration });
    } else if (k === 'mine') {
      const a = Math.random() * 6.28, dist = 60 + Math.random() * 120;
      zones.push({ x: truck.x + Math.cos(a) * dist, y: truck.y + Math.sin(a) * dist, mode: 'mine', r: p.radius, dmg: p.dmg, el: p.el, life: 8 });
    }
  }

  function syncOrbiters(w) { const c = wp(w).count; w.orbiters = []; for (let i = 0; i < c; i++) w.orbiters.push({ a: i / c * 6.28, cdMap: new Map() }); }
  function updatePersistent(dt) {
    for (const w of owned) {
      const k = w.def.kind, p = wp(w);
      if (k === 'orbit') {
        if (!w.orbiters || w.orbiters.length !== p.count) syncOrbiters(w);
        for (const ob of w.orbiters) {
          ob.a += dt * 2.4; const ox = truck.x + Math.cos(ob.a) * p.radius, oy = truck.y + Math.sin(ob.a) * p.radius; ob.x = ox; ob.y = oy;
          for (const e of enemies.slice()) { const cd = ob.cdMap.get(e) || 0; if (cd <= 0 && Math.hypot(e.x - ox, e.y - oy) < 18 + 14 * e.def.size) { hitEnemy(e, p.dmg, { el: p.el, knock: p.knock, sx: ox, sy: oy }); ob.cdMap.set(e, 0.5); } else if (cd > 0) ob.cdMap.set(e, cd - dt); }
        }
      } else if (k === 'aura') {
        w.tick = (w.tick || 0) + dt; const iv = w.def.interval || 0.4;
        if (w.tick >= iv) { w.tick -= iv; for (const e of enemies.slice()) if (Math.hypot(e.x - truck.x, e.y - truck.y) < p.radius) hitEnemy(e, p.dmg, { el: p.el, sx: truck.x, sy: truck.y }); }
      }
    }
  }

  // ============================================================================
  //  节点地图（杀戮尖塔式）
  // ============================================================================
  const NODE_ICON = { start: '🚚', battle: '⚔️', elite: '💀', event: '❓', treasure: '🎁', rest: '🏕️', boss: '👹' };
  function nodeType(floor) {
    const r = Math.random();
    if (floor === 1) return r < 0.7 ? 'battle' : (r < 0.85 ? 'event' : 'treasure');
    if (r < 0.42) return 'battle';
    if (r < 0.60) return 'event';
    if (r < 0.74) return 'treasure';
    if (r < 0.86) return 'rest';

  function genAct(idx) {
    run.actIdx = idx; run.floor = 0; run.nodeIdx = 0;
    const F = P.floorsPerAct, floors = [];
    const mk = (col, type, floor) => ({ col, type, floor, cleared: false, edges: [], event: Math.random() < 0.5 ? 'ximi' : 'wuxin' });
    floors.push([mk(1.5, 'start', 0)]);
    for (let f = 1; f <= F; f++) { const n = 2 + (Math.random() * 2 | 0), row = []; for (let i = 0; i < n; i++) row.push(mk((i + 0.5) * (3 / n), nodeType(f), f)); floors.push(row); }
    floors.push([mk(1.5, 'boss', F + 1)]);
    for (let f = 0; f < floors.length - 1; f++) {
      const cur = floors[f], nxt = floors[f + 1];
      for (const node of cur) { const sorted = nxt.map((nn, j) => ({ j, d: Math.abs(nn.col - node.col) })).sort((a, b) => a.d - b.d); const k = 1 + (Math.random() < 0.45 ? 1 : 0); for (let m = 0; m < Math.min(k, sorted.length); m++) if (!node.edges.includes(sorted[m].j)) node.edges.push(sorted[m].j); }
      for (let j = 0; j < nxt.length; j++) { if (!cur.some(nd => nd.edges.includes(j))) { let best = 0, bd = 1e9; cur.forEach((nd, ci) => { const d = Math.abs(nd.col - nxt[j].col); if (d < bd) { bd = d; best = ci; } }); cur[best].edges.push(j); } }

  }
  function enterNode(node) {

  function nextAct() {

  }

  // ---------- 战斗遭遇 ----------
  function depth() { return run.actIdx * (P.floorsPerAct + 1) + run.floor; }
  function startEncounter(type, node) {
    [enemies, shots, zones, beams, pickups, floaters, enemyShots, telegraphs, particles].forEach(a => a.length = 0);
    truck.x = 0; truck.y = 0; cam.x = 0; cam.y = 0; boss = null; spawnTimer = 0;
    game.phase = 'battle'; game.paused = false;
    const dur = type === 'elite' ? P.surviveElite : P.surviveBattle;
    encounter = { type, timer: type === 'boss' ? Infinity : dur, t: 0, bossCleared: false };
    if (type === 'boss') startBoss(run.actIdx);
    if (type === 'elite') spawnElite();
    const names = { battle: '⚔️ 街头遭遇战', elite: '💀 精英来袭', boss: '👹 BOSS 战' };
    banner(names[type], type === 'boss' ? BOSSES[run.actIdx].name : '坚持 ' + Math.round(dur) + ' 秒！', type === 'boss' ? '#f87171' : '#fde047');
  }
  function winEncounter() {
    if (game.phase !== 'battle') return;
    const node = run.pending, type = encounter.type;
    if (type === 'elite') { heal(truck.maxHp * 0.10); }
    if (type === 'boss') { heal(truck.maxHp * 0.15); game.score += 500; }
    encounter = null;
    rewardThen(node, { title: type === 'boss' ? '🏆 击败 Boss！选取战利品' : '✅ 遭遇通过！' });
  }
  function loseRun() { game.over = true; game.won = false; game.phase = 'lose'; showEnd(); }

  function rewardThen(node, opts) {
    game.levelOpts = opts || {}; game.afterReward = () => advanceNode(node);
    game.pendingLevels++; openLevelUp();
  }

  function spawnElite() {
    const def = Object.assign({}, CFG.enemies.brute), hp = def.hp * 6;

  }

  // ============================================================================
  //  刷怪（遭遇内，随深度缩放，始终围绕餐车/摄像机）
  // ============================================================================
  function pickEnemyType() {
    const d = depth(), r = Math.random();
    if (d >= 14 && r < 0.16) return 'brute';
    if (d >= 9 && r < 0.30) return 'bat';
    if (d >= 5 && r < 0.46) return 'crab';

  }
  function hpScaleNow() { return 1 + 0.09 * depth() + run.actIdx * 0.46; }      // 怪物血量随深度/区域增长
  function touchScale() { return 1 + run.actIdx * 0.23; }                      // 接触伤害随区域增长
  function bossDmgScale() { return 1 + run.actIdx * 0.20; }                    // Boss 技能伤害随区域增长
  function enemySpeedScale() { return 1 + run.actIdx * 0.09; }                 // 怪物移速随区域增长（越后越难逃）
  function spawnEnemy(type) {
    type = type || pickEnemyType();
    const def = CFG.enemies[type], ang = Math.random() * 6.28, r = A.spawnRingR + Math.random() * 110;
    const hp = def.hp * hpScaleNow();
    enemies.push({ x: truck.x + Math.cos(ang) * r, y: truck.y + Math.sin(ang) * r, def, type, hp, maxHp: hp, bob: Math.random() * 6.28, weave: Math.random() * 6.28 });
  }
  function startBoss(tier) {
    const def = BOSSES[tier];

    enemies.push(boss);
  }
  function updateBoss(e, dt) {
    if (e.dashWind > 0) { e.dashWind -= dt; if (e.dashWind <= 0) { e.dashT = 0.5; addShake(6); } }

    e.atkTimer -= dt;
    if (e.atkTimer <= 0) {
      const ds = bossDmgScale(), pats = e.bossDef.patterns, pat = pats[e.patIdx % pats.length]; e.patIdx++; e.atkTimer = Math.max(1.2, 2.5 - run.actIdx * 0.13) + Math.random() * 1.2;
      if (pat === 'slam') telegraphs.push({ x: truck.x, y: truck.y, r: 100, t: 1.15, dmg: 24 * ds });
      else if (pat === 'rings') for (let k = 0; k < 3; k++) { const a = Math.random() * 6.28, dist = 90 + k * 78; telegraphs.push({ x: truck.x + Math.cos(a) * dist, y: truck.y + Math.sin(a) * dist, r: 74, t: 0.95 + k * 0.25, dmg: 18 * ds }); }
      else if (pat === 'frostnova') { telegraphs.push({ x: e.x, y: e.y, r: 250, t: 1.25, dmg: 16 * ds }); for (const o of enemies) if (!o.isBoss) o.slowT = 3; }

  }

  // ============================================================================
  //  经验 / 升级三选一

  function gainXp(v) {

  function buildChoices() {

      if (owned.length < P.maxWeapons) for (const d of WEAPONS) if (!owned.find(o => o.def.id === d.id)) pool.push({ type: 'new', def: d });
    }
    for (const it of ITEMS) { const n = ownedItems[it.id] || 0; if (n < P.itemCap && (n > 0 || Object.keys(ownedItems).length < P.maxItems)) pool.push({ type: 'item', def: it, n }); }
    for (let i = pool.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0;[pool[i], pool[j]] = [pool[j], pool[i]]; }

        <div class="flex flex-col gap-3">

  function resolveEvent(node, msg) { hideOverlay(); if (msg) banner(msg, '', '#fde047'); advanceNode(node); }

  function showStart() {
    showOverlay(`<div class="text-center max-w-lg px-6">
      <div class="text-6xl mb-3">🚚🐉</div>
      <div class="text-4xl font-extrabold text-orange-400 mb-2">哈奇深夜餐车</div>

  }

  }
  let bannerObj = null;
  function banner(title, sub, color) { bannerObj = { title, sub, color: color || '#fde047', t: 2.4 }; }

  function applyBuff(id) {
    const def = bById(id);
    if (def.flag === 'fullHeal') { heal(truck.maxHp); banner(def.emoji + ' ' + def.name, '生命全满！', '#22c55e'); return; }
    const ex = activeBuffs.find(b => b.def.id === id); if (ex) ex.t = def.dur; else activeBuffs.push({ def, t: def.dur });
    banner(def.emoji + ' ' + def.name, '增益 ' + def.dur + 's', '#a855f7'); computeStats();
  }

  // ============================================================================
  //  更新
  // ============================================================================
  function update(dt) {
    if (_deferred) { const fn = _deferred; _deferred = null; fn(); }
    if (game.phase !== 'battle' || game.paused || game.over) return;
    computeStats();
    game.time += dt; truck.bob += dt * 6;
    if (truck.hurtFlash > 0) truck.hurtFlash -= dt;
    if (STATS.regen) heal(STATS.regen * dt);
    for (let i = activeBuffs.length - 1; i >= 0; i--) { activeBuffs[i].t -= dt; if (activeBuffs[i].t <= 0) activeBuffs.splice(i, 1); }
    if (bannerObj) { bannerObj.t -= dt; if (bannerObj.t <= 0) bannerObj = null; }
    if (fx.shake > 0) fx.shake = Math.max(0, fx.shake - dt * 60);
    if (fx.redFlash > 0) fx.redFlash = Math.max(0, fx.redFlash - dt * 1.6);
    if (fx.comboT > 0) { fx.comboT -= dt; if (fx.comboT <= 0) fx.combo = 0; }

    // --- 自由走位（无边界，摄像机跟随） ---
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    const spd = CFG.truck.moveSpeed * STATS.moveSpeed;
    if (mx || my) { const [wx, wy] = screenToWorldDelta(mx, my), l = Math.hypot(wx, wy) || 1; truck.x += wx / l * spd * dt; truck.y += wy / l * spd * dt; }
    else if (mouse && mouse.held) { const [wx, wy] = screenToWorldPoint(mouse.sx, mouse.sy); const dx = wx - truck.x, dy = wy - truck.y, d = Math.hypot(dx, dy); if (d > 6) { const st = Math.min(spd * dt, d); truck.x += dx / d * st; truck.y += dy / d * st; } }
    cam.x = truck.x; cam.y = truck.y; // 摄像机锁定餐车

    // --- 刷怪（Boss 战减量） ---
    spawnTimer += dt;
    const interval = Math.max(P.spawnMin - run.actIdx * 0.006, P.spawnBase - depth() * 0.032) * (encounter.type === 'boss' ? 2.0 : 1);
    if (spawnTimer >= interval && enemies.length < 300) { spawnTimer = 0; const n = 1 + ((Math.random() * Math.min(5, 1.5 + depth() / 3.5)) | 0); for (let i = 0; i < n; i++) spawnEnemy(); }

    // --- 敌人 ---
    const tScale = touchScale();
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i], def = e.def; e.bob += dt * 5;
      if (e.flash > 0) e.flash = Math.max(0, e.flash - dt * 6);
      if (e.burnT > 0) { e.burnT -= dt; e.hp -= e.burnDps * dt; if (e.hp <= 0) { killEnemy(e, i); continue; } }

    for (const f of floaters) { const p = project(f.x, f.y, 40 + (f.dy || 0)), sc = f.sc != null ? (0.6 + 0.4 * f.sc) : 1; ctx.save(); ctx.globalAlpha = Math.max(0, f.life * 1.6); const size = (f.crit ? 22 : 15) * sc; ctx.font = 'bold ' + size + 'px system-ui'; ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.strokeText(f.txt, p[0], p[1]); ctx.fillStyle = f.good ? '#4ade80' : (f.crit ? '#fbbf24' : '#fff'); ctx.fillText(f.txt, p[0], p[1]); ctx.restore(); }
  }

  function drawBattleHUD() {
    const u = uiScale(), pad = 14 * u, barW = Math.min(W - 2 * pad, 250 * Math.max(u, 0.82));
    // HP
    ctx.fillStyle = 'rgba(0,0,0,.5)'; rr(pad, pad, barW, 20 * u, 6 * u); ctx.fill();
    const hpFrac = Math.max(0, truck.hp / truck.maxHp), hg = ctx.createLinearGradient(pad, 0, pad + barW, 0); hg.addColorStop(0, '#ef4444'); hg.addColorStop(1, '#f87171'); ctx.fillStyle = hg; rr(pad + 2, pad + 2, (barW - 4) * hpFrac, 16 * u, 5 * u); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (12 * u) + 'px system-ui'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillText('🐉 ' + Math.ceil(truck.hp) + ' / ' + Math.round(truck.maxHp), pad + 8, pad + 10 * u);
    // XP
    const xy = pad + 24 * u; ctx.fillStyle = 'rgba(0,0,0,.5)'; rr(pad, xy, barW, 10 * u, 4 * u); ctx.fill();
    ctx.fillStyle = '#38bdf8'; rr(pad + 2, xy + 2, (barW - 4) * Math.min(1, game.xp / game.xpNeed), 6 * u, 3 * u); ctx.fill();
    ctx.fillStyle = '#e2e8f0'; ctx.font = 'bold ' + (9 * u) + 'px system-ui'; ctx.fillText('Lv.' + game.level, pad + 4, xy + 5 * u);
    // 武器 / 道具 / buff 行
    let row = pad + 40 * u, ic = 19 * u, sp = 28 * u; ctx.textBaseline = 'alphabetic';
    let wx = pad; for (const w of owned) { ctx.font = ic + 'px ' + SS; ctx.fillStyle = '#fff'; ctx.fillText(w.def.emoji, wx, row + ic); ctx.fillStyle = w.golden ? '#fbbf24' : '#fde047'; ctx.font = 'bold ' + (9 * u) + 'px system-ui'; ctx.fillText((w.golden ? '✦' : '') + w.level, wx + ic * 0.85, row + ic + 5 * u); wx += sp; }
    let ix = pad, iy = row + 28 * u; for (const id in ownedItems) { ctx.font = (15 * u) + 'px ' + SS; ctx.fillStyle = '#fff'; ctx.fillText(iById(id).emoji, ix, iy + 13 * u); ctx.fillStyle = '#94a3b8'; ctx.font = (8 * u) + 'px system-ui'; ctx.fillText('×' + ownedItems[id], ix + 13 * u, iy + 16 * u); ix += 24 * u; }
    let bx = pad, by = iy + 24 * u; for (const ab of activeBuffs) { ctx.font = (15 * u) + 'px ' + SS; ctx.fillStyle = '#fff'; ctx.fillText(ab.def.emoji, bx, by + 13 * u); ctx.fillStyle = '#c4b5fd'; ctx.font = (8 * u) + 'px system-ui'; ctx.fillText(ab.t.toFixed(0), bx + 13 * u, by + 16 * u); bx += 22 * u; }

    // 右上：区/击杀/分数
    ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#fde047'; ctx.font = 'bold ' + (14 * u) + 'px system-ui'; ctx.fillText('第' + (run.actIdx + 1) + '区 ☠' + game.kills, W - pad, pad + 13 * u);
    ctx.fillStyle = 'rgba(255,255,255,.65)'; ctx.font = (11 * u) + 'px system-ui'; ctx.fillText('分数 ' + game.score, W - pad, pad + 30 * u);
    // 中上：生存倒计时
    if (encounter && encounter.type !== 'boss') { ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (22 * u) + 'px system-ui'; ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,.5)'; const tt = '⏱ ' + Math.ceil(Math.max(0, encounter.timer)) + 's'; ctx.strokeText(tt, W / 2, pad + 22 * u); ctx.fillText(tt, W / 2, pad + 22 * u); }
    // 连击
    if (fx.combo >= 3) { ctx.textAlign = 'center'; const cc = fx.combo >= 30 ? '#f87171' : fx.combo >= 12 ? '#fb923c' : '#fde047', csz = (18 + Math.min(14, fx.combo * 0.3)) * u; ctx.globalAlpha = Math.min(1, fx.comboT); ctx.fillStyle = cc; ctx.font = 'bold ' + csz + 'px system-ui'; ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.strokeText('连击 ×' + fx.combo, W / 2, pad + 48 * u); ctx.fillText('连击 ×' + fx.combo, W / 2, pad + 48 * u); ctx.globalAlpha = 1; }
    // Boss 血条
    if (boss) { const bw = Math.min(W - 60, 520 * Math.max(u, 0.8)), bx2 = (W - bw) / 2, byy = H - 50 * u; ctx.fillStyle = 'rgba(0,0,0,.55)'; rr(bx2 - 4, byy - 4, bw + 8, 24 * u, 6 * u); ctx.fill(); ctx.fillStyle = boss.bossDef.color2; rr(bx2, byy, bw * Math.max(0, boss.hp / boss.maxHp), 16 * u, 5 * u); ctx.fill(); ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (12 * u) + 'px system-ui'; ctx.textAlign = 'center'; ctx.fillText(boss.bossDef.emoji + ' ' + boss.bossDef.name, W / 2, byy - 8 * u); }
    // 底部提示（窄屏精简）
    ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,.42)'; ctx.font = (11 * u) + 'px system-ui';
    ctx.fillText(W < 520 ? 'WASD/拖动 走位躲技能 · 自动开火' : 'WASD / 方向键 / 按住鼠标 自由驾驶碾过掉落物 · 武器自动开火', W / 2, H - 12 * u);
    drawBanner();
  }
  function drawBanner() { if (bannerObj) { const u = uiScale(); ctx.save(); ctx.globalAlpha = Math.min(1, bannerObj.t); ctx.textAlign = 'center'; ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(0,0,0,.55)'; ctx.font = 'bold ' + (30 * u) + 'px system-ui'; ctx.strokeText(bannerObj.title, W / 2, H * 0.26); ctx.fillStyle = bannerObj.color; ctx.fillText(bannerObj.title, W / 2, H * 0.26); if (bannerObj.sub) { ctx.fillStyle = '#e2e8f0'; ctx.font = (15 * u) + 'px system-ui'; ctx.fillText(bannerObj.sub, W / 2, H * 0.26 + 28 * u); } ctx.restore(); } }
  function drawVignette() {
    const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75); vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,.45)'); ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
    if (fx.redFlash > 0) { ctx.save(); ctx.globalAlpha = fx.redFlash; const rg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.2, W / 2, H / 2, Math.max(W, H) * 0.7); rg.addColorStop(0, 'rgba(239,68,68,0)'); rg.addColorStop(1, 'rgba(239,68,68,.6)'); ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H); ctx.restore(); }
  }

  // ---------- 地图渲染（响应式） ----------
  function drawMap() {
    const u = uiScale();
    const g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#0f1626'); g.addColorStop(1, '#1e1630'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 30; i++) { const tw = 0.3 + 0.3 * Math.sin(game.time * 2 + i); ctx.fillStyle = i % 2 ? `rgba(125,211,252,${tw})` : `rgba(253,224,71,${tw})`; ctx.fillRect((i * 137) % W, (i * 89) % (H * 0.5), 2, 2); }
    const narrow = W < 560;
    const floors = run.act.floors, F = floors.length - 1, topPad = (narrow ? 104 : 92) * Math.max(u, 0.85), margin = 74 * Math.max(u, 0.85), rowH = (H - margin - topPad) / F, leftPad = W * (narrow ? 0.13 : 0.16), nr = Math.max(18, 24 * u);
    floors.forEach((row, f) => row.forEach((node, ni) => { node.sx = leftPad + node.col / 3 * (W - 2 * leftPad); node.sy = H - margin - f * rowH; node.idx = ni; }));
    const reach = reachableNodes();
    // 连线
    floors.forEach((row, f) => { if (f + 1 >= floors.length) return; row.forEach(node => node.edges.forEach(j => { const nn = floors[f + 1][j]; const lit = node.cleared || (f === run.floor); ctx.lineWidth = lit ? 4 : 2; ctx.strokeStyle = lit ? 'rgba(251,191,36,.45)' : 'rgba(148,163,184,.16)'; ctx.beginPath(); ctx.moveTo(node.sx, node.sy); ctx.lineTo(nn.sx, nn.sy); ctx.stroke(); })); });
    // 节点
    floors.forEach(row => row.forEach(node => {
      const reachable = reach.includes(node), current = (node === floors[run.floor][run.nodeIdx]);
      if (reachable) glowDot(node.sx, node.sy, nr * 1.6, 'rgba(251,191,36,.5)', 0.8);
      if (node.type === 'boss') glowDot(node.sx, node.sy, nr * 1.6, 'rgba(248,113,113,.45)', 0.7);
      ctx.beginPath(); ctx.arc(node.sx, node.sy, nr, 0, 6.28); ctx.fillStyle = node.cleared ? '#3a4a63' : (reachable ? '#243049' : '#18223a'); ctx.fill();
      if (reachable) { const pulse = nr + 4 * Math.sin(game.time * 6 + node.sx); ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(node.sx, node.sy, pulse, 0, 6.28); ctx.stroke(); }
      else { ctx.strokeStyle = current ? '#4ade80' : 'rgba(148,163,184,.4)'; ctx.lineWidth = current ? 3 : 2; ctx.beginPath(); ctx.arc(node.sx, node.sy, nr, 0, 6.28); ctx.stroke(); }
      ctx.globalAlpha = (node.cleared || reachable || current) ? 1 : 0.5;
      ctx.font = (nr * 1.05) + 'px ' + SS; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(NODE_ICON[node.type], node.sx, node.sy); ctx.globalAlpha = 1;
    }));
    // 标题 + 图例（窄屏分两行）
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#fbbf24'; ctx.font = 'bold ' + (22 * Math.max(u, 0.8)) + 'px system-ui'; ctx.fillText('🗺️ 哈奇小镇 · 第 ' + (run.actIdx + 1) + ' / ' + P.acts + ' 区', W / 2, 36 * Math.max(u, 0.85));
    ctx.fillStyle = 'rgba(226,232,240,.8)'; ctx.font = (12.5 * Math.max(u, 0.82)) + 'px system-ui';
    if (narrow) { ctx.fillText('⚔️战斗 💀精英 ❓事件 🎁补给 🏕️休整 👹Boss', W / 2, 60 * Math.max(u, 0.85)); ctx.fillText('点亮的节点可前往，点击选路', W / 2, 80 * Math.max(u, 0.85)); }
    else ctx.fillText('点亮的节点可前往，点击选路 — ⚔️战斗 💀精英 ❓事件 🎁补给 🏕️休整 👹Boss', W / 2, 66 * Math.max(u, 0.85));
    // 底部 build
    ctx.textAlign = 'left'; ctx.font = (14 * Math.max(u, 0.8)) + 'px ' + SS; ctx.fillStyle = '#fff';
    ctx.fillText('Lv.' + game.level + ' ❤' + Math.ceil(truck.hp) + '/' + Math.round(truck.maxHp) + ' ' + owned.map(w => w.def.emoji + (w.golden ? '✦' : '')).join(''), 14, H - 18);
    drawBanner();
  }

  function render() {
    if (game.phase === 'battle' || game.phase === 'reward') {
      let ox = 0, oy = 0; if (fx.shake > 0) { ox = (Math.random() * 2 - 1) * fx.shake; oy = (Math.random() * 2 - 1) * fx.shake; }
      ctx.save(); ctx.translate(ox, oy);
      drawGround(); drawZones(); drawTelegraphs(); drawPickups();
      drawShots(); drawEnemyShots(); drawBeams();
      drawEnemies(); drawOrbiters(); drawTruck();
      drawParticles(); drawFloaters();
      ctx.restore();
      drawVignette(); drawBattleHUD();
    } else if (game.phase === 'map' && run.act) {
      drawMap(); drawVignette();
    } else { ctx.fillStyle = '#0b1224'; ctx.fillRect(0, 0, W, H); }
  }

  // ============================================================================
  //  初始化 & 主循环
  // ============================================================================
  computeStats();
  owned.push({ def: wById('sushi_dart'), level: 1, cd: 0 });
  showStart();

  let last = performance.now();
  function loop(now) { const dt = Math.min((now - last) / 1000, 0.05); last = now; if (fx.hitstop > 0) { fx.hitstop -= dt; } else { update(dt); } render(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);

  window.HaqiFoodTruck = { CFG, truck, game, run, owned, ownedItems, activeBuffs, applyBuff, STATS: () => STATS,
    _test: { keys, cam: () => cam, enemies: () => enemies, pickups: () => pickups, telegraphs: () => telegraphs, enemyShots: () => enemyShots, startEncounter, winEncounter, genAct, enterNode, reachableNodes, depth, fx } };
})();
