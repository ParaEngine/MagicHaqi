<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>落在麦思星球上的抱抱龙蛋</title>
  <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background:
        radial-gradient(ellipse at 77% 62%, rgba(40, 190, 255, 0.18) 0%, transparent 34%),
        radial-gradient(ellipse at 24% 18%, rgba(179, 92, 255, 0.24) 0%, transparent 30%),
        radial-gradient(ellipse at 42% 78%, rgba(255, 184, 91, 0.10) 0%, transparent 28%),
        radial-gradient(ellipse at 50% 40%, #1a1e63 0%, #0a1137 48%, #020617 100%);
      background-attachment: fixed;
      color: #fff;
    }
    button { -webkit-tap-highlight-color: transparent; }

    #nebula {
      position: fixed; inset: -18%; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 22% 38%, rgba(77, 221, 255, 0.20), transparent 32%),
        radial-gradient(ellipse at 62% 18%, rgba(255, 222, 138, 0.14), transparent 26%),
        radial-gradient(ellipse at 78% 74%, rgba(168, 112, 255, 0.22), transparent 34%),
        radial-gradient(ellipse at 42% 58%, rgba(35, 252, 184, 0.08), transparent 30%);
      filter: blur(14px);
      animation: nebulaDrift 24s ease-in-out infinite alternate;
    }
    @keyframes nebulaDrift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(2%, -2%) scale(1.05); } }
    #starfield { position: fixed; inset: 0; z-index: 1; }
    .star { position: absolute; border-radius: 50%; mix-blend-mode: lighter; animation: starIn .6s ease-out both, twinkle var(--dur) ease-in-out var(--delay) infinite alternate; }
    @keyframes starIn { from { opacity: 0; transform: scale(0.3); } to { opacity: var(--o1); transform: scale(1); } }
    @keyframes twinkle { 0% { opacity: var(--o1); transform: scale(1); } 100% { opacity: var(--o2); transform: scale(1.35); } }

    #sceneContainer { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .scene { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 76px 22px 28px; position: relative; }
    .scene-enter { animation: sceneIn .65s ease-out forwards; }
    .scene-exit { animation: sceneOut .38s ease-in forwards; }
    @keyframes sceneIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes sceneOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-18px); } }

    .push-layer {
      position: absolute; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; pointer-events: none;
    }
    .push-ui-panel {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 5;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 24px 7%;
      gap: 10px;
      opacity: 0;
      transform: translateY(120%);
      transition: opacity .45s ease, transform .55s cubic-bezier(.22,1,.36,1);
    }
    .push-ui-panel.is-in { opacity: 1; transform: translateY(0); }

    .hud {
      position: fixed; left: 50%; top: 16px; transform: translateX(-50%); z-index: 50;
      min-width: min(88vw, 340px); padding: 10px 16px; text-align: center;
      border: 1px solid rgba(255, 220, 150, .22); border-radius: 18px;
      background: rgba(4, 12, 38, .46); backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }
    .hud-title { color: rgba(255, 232, 181, .95); font-weight: 700; font-size: 15px; letter-spacing: .04em; }
    .hud-sub { color: rgba(255,255,255,.58); font-size: 12px; margin-top: 2px; }
    .music-toggle {
      position: fixed; right: 14px; top: 14px; z-index: 60; width: 38px; height: 38px;
      border-radius: 999px; display: grid; place-items: center; color: #ffdc96;
      border: 1px solid rgba(255,220,150,.24); background: rgba(255,255,255,.06); backdrop-filter: blur(8px);
    }

    .stage {
      width: min(94vw, 460px); min-height: min(78vh, 650px); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; text-align: center;
    }
    .landing-stage {
      justify-content: flex-start;
      padding-top: 6px;
    }
    .landing-text-slot {
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .landing-bubble-slot {
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .landing-button-slot {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .story-text {
      color: rgba(255,255,255,.80); font-size: clamp(18px, 4.8vw, 25px); line-height: 1.62;
      text-shadow: 0 2px 14px rgba(0,0,0,.22); white-space: pre-line;
    }
    .small-text { color: rgba(255,255,255,.62); font-size: clamp(13px, 3.4vw, 16px); line-height: 1.55; white-space: pre-line; }
    .egg-bubble {
      max-width: min(86vw, 360px); padding: 13px 18px; border-radius: 22px 22px 22px 7px;
      color: rgba(255, 238, 201, .96); background: rgba(255, 255, 255, .09);
      border: 1px solid rgba(255, 220, 150, .24); backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,.14); font-size: clamp(15px, 3.8vw, 18px); line-height: 1.58; white-space: pre-line;
    }
    .confirm-btn {
      min-width: 168px; border-radius: 18px; padding: 13px 28px; font-weight: 700;
      color: #ffe7ad; border: 1.5px solid rgba(255,220,150,.50);
      background: linear-gradient(135deg, rgba(255,220,150,.24), rgba(255, 172, 90, .20));
      box-shadow: 0 12px 28px rgba(255,170,80,.10); transition: transform .22s ease, box-shadow .22s ease, background .22s ease;
    }
    .confirm-btn:hover, .confirm-btn:active { transform: scale(1.035); background: linear-gradient(135deg, rgba(255,220,150,.38), rgba(255, 172, 90, .31)); box-shadow: 0 0 26px rgba(255,220,150,.22); }
    .ghost-btn { min-width: 150px; border-radius: 16px; padding: 11px 22px; color: rgba(255,255,255,.75); border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); }

    .planet-wrap { position: relative; width: min(75vw, 270px); height: min(75vw, 270px); filter: drop-shadow(0 0 28px rgba(92,236,228,.45)); }
    .planet-spin { animation: planetSpin 58s linear infinite; transform-origin: 100px 100px; }
    @keyframes planetSpin { to { transform: rotate(360deg); } }
    .nest {
      position: absolute; left: 50%; top: 25%; width: 112px; height: 46px; transform: translate(-50%, -50%) rotate(-4deg);
      border-radius: 50%; background: radial-gradient(ellipse at center, rgba(255,236,176,.38), rgba(97,214,196,.22) 56%, transparent 72%);
      box-shadow: 0 0 20px rgba(255,220,150,.18); opacity: 0; transition: opacity .45s, box-shadow .45s;
    }
    .nest.visible { opacity: 1; }
    .nest.awake { box-shadow: 0 0 34px rgba(255,220,150,.50), inset 0 0 18px rgba(255,255,255,.16); }
    .planet-egg { position: absolute; left: 50%; top: 14%; transform: translate(-50%, -50%) scale(.44); transform-origin: center; z-index: 4; opacity: 0; transition: opacity .45s, transform .45s; }
    .planet-egg.visible { opacity: 1; transform: translate(-50%, -50%) scale(.50); }

    .egg-holder {
      width: 142px; height: 142px; position: relative;
      background-image: var(--egg-sprite, url('https://cdn.keepwork.com/maisi/magichaqi/pet/dragon_green_20260528090748.webp'));
      background-size: 400% 400%;
      background-position: 0% 0%;
      background-repeat: no-repeat;
      filter: drop-shadow(0 9px 18px rgba(255,200,100,.26));
    }
    .egg-holder.egg-normal { background-position: 0% 0%; }
    .egg-holder.egg-happy { background-position: 33.333% 0%; }
    .egg-holder.pattern-careful::before,
    .egg-holder.pattern-brave::before,
    .egg-holder.pattern-wise::before {
      content: '';
      position: absolute;
      inset: 9% 13% 13%;
      border-radius: 999px;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .egg-holder.pattern-careful::before { box-shadow: inset 0 -10px 20px rgba(145,244,168,.55), 0 0 18px rgba(145,244,168,.45); }
    .egg-holder.pattern-brave::before { box-shadow: inset 0 -10px 20px rgba(255,177,94,.55), 0 0 18px rgba(255,177,94,.45); }
    .egg-holder.pattern-wise::before { box-shadow: inset 0 -10px 20px rgba(201,167,255,.55), 0 0 18px rgba(201,167,255,.45); }
    .egg-holder.awakened::after {
      content: '✦';
      position: absolute;
      right: 15%; top: 10%;
      color: #fff4a8;
      font-size: 22px;
      text-shadow: 0 0 8px rgba(255,220,104,.9);
      transform: rotate(12deg);
    }
    .egg-float { animation: eggFloat 3.2s ease-in-out infinite; }
    .egg-breathe { animation: eggBreathe 2.6s ease-in-out infinite; }
    .egg-wobble { animation: eggWobble .62s ease-in-out; }
    .egg-glow { filter: drop-shadow(0 0 26px rgba(255,220,150,.65)); }
    @keyframes eggFloat { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-14px) rotate(2deg); } }
    @keyframes eggBreathe { 0%,100% { transform: scale(1); filter: drop-shadow(0 6px 16px rgba(255,200,100,.28)); } 50% { transform: scale(1.025); filter: drop-shadow(0 0 28px rgba(255,220,150,.45)); } }
    @keyframes eggWobble { 0% { transform: rotate(0); } 18% { transform: rotate(-10deg); } 40% { transform: rotate(8deg); } 62% { transform: rotate(-5deg); } 82% { transform: rotate(3deg); } 100% { transform: rotate(0); } }
    .egg-holder svg { width: 100%; height: 100%; display: block; overflow: visible; }
    .pattern-layer { opacity: 0; transition: opacity .45s; }
    .egg-holder.pattern-careful .pattern-careful, .egg-holder.pattern-brave .pattern-brave, .egg-holder.pattern-wise .pattern-wise { opacity: 1; }
    .egg-holder.awakened .star-mark { opacity: 1; transform: scale(1); }
    .star-mark { opacity: 0; transform: scale(.4); transform-origin: 86px 39px; transition: opacity .55s, transform .55s; }
    .pattern-careful { stroke: #91f4a8; fill: rgba(145,244,168,.16); filter: drop-shadow(0 0 5px rgba(145,244,168,.85)); }
    .pattern-brave { stroke: #ffb15e; fill: rgba(255,177,94,.14); filter: drop-shadow(0 0 5px rgba(255,177,94,.85)); animation: sparkPulse 1.3s ease-in-out infinite alternate; }
    .pattern-wise { stroke: #c9a7ff; fill: rgba(201,167,255,.15); filter: drop-shadow(0 0 5px rgba(201,167,255,.85)); }
    @keyframes sparkPulse { from { opacity: .72; } to { opacity: 1; } }

    .meteor { position: absolute; left: -80px; top: 12%; width: 18px; height: 18px; border-radius: 999px; background: #ffe6a8; box-shadow: 0 0 18px #ffe6a8, -38px -16px 20px rgba(255,220,150,.28); opacity: 0; }
    .meteor.fly { animation: meteorFly 1.8s cubic-bezier(.25,.75,.35,1) forwards; }
    @keyframes meteorFly { 0% { opacity: 0; transform: translate(0, 0) scale(.5); } 12% { opacity: 1; } 100% { opacity: 0; transform: translate(calc(50vw + 15px), 35vh) scale(.85); } }

    .wish-grid { display: grid; gap: 13px; width: min(92vw, 430px); }
    .wish-card {
      text-align: left; padding: 15px 16px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.065); backdrop-filter: blur(10px); transition: transform .2s, border-color .2s, box-shadow .2s, background .2s;
    }
    .wish-card:hover, .wish-card:active { transform: translateY(-2px) scale(1.012); border-color: rgba(255,220,150,.55); background: rgba(255,220,150,.10); }
    .wish-card.selected { border-color: rgba(255,220,150,.75); background: rgba(255,220,150,.14); box-shadow: 0 0 22px rgba(255,220,150,.22); }
    .wish-title { color: rgba(255,238,201,.96); font-size: 16px; font-weight: 800; margin-bottom: 5px; }
    .wish-desc { color: rgba(255,255,255,.60); font-size: 13px; line-height: 1.45; }
    .wish-chip { width: 34px; height: 34px; display: inline-grid; place-items: center; border-radius: 999px; margin-right: 8px; }
    .chip-careful { background: rgba(145,244,168,.15); color: #a8ffb8; }
    .chip-brave { background: rgba(255,177,94,.16); color: #ffc071; }
    .chip-wise { background: rgba(201,167,255,.16); color: #d6bdff; }

    .opt-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: min(92vw, 430px); }
    .opt-btn {
      min-width: 92px; padding: 12px 16px; border-radius: 18px;
      color: rgba(255,255,255,.82); border: 1.5px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.065); backdrop-filter: blur(9px);
      transition: transform .22s ease, border-color .22s ease, background .22s ease, box-shadow .22s ease;
    }
    .opt-btn:hover, .opt-btn:active, .opt-btn.selected {
      transform: scale(1.035); border-color: rgba(255,220,150,.58);
      background: rgba(255,220,150,.12); box-shadow: 0 0 20px rgba(255,220,150,.16);
    }
    .food-btn { min-width: 96px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .food-emoji { font-size: 32px; }
    .food-desc { color: rgba(255,255,255,.48); font-size: 12px; }
    .food-fly {
      position: fixed;
      z-index: 85;
      pointer-events: none;
      font-size: 34px;
      transform-origin: center center;
      animation: foodFlyToEgg .82s cubic-bezier(.24,.72,.22,1) forwards;
    }
    @keyframes foodFlyToEgg {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      58% { transform: translate(calc(var(--tx) * .72), calc(var(--ty) * .72 - 24px)) scale(.9); opacity: .92; }
      100% { transform: translate(var(--tx), var(--ty)) scale(.12); opacity: 0; }
    }
    .energy-fly {
      position: fixed;
      z-index: 85;
      pointer-events: none;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: radial-gradient(circle, #fff7ad 0%, #ffd66b 45%, rgba(255,214,107,0) 72%);
      box-shadow: 0 0 14px rgba(255,220,120,.86);
      animation: energyFlyToEgg var(--edur, 1s) cubic-bezier(.2,.72,.22,1) forwards;
    }
    @keyframes energyFlyToEgg {
      0% { transform: translate(0, 0) scale(.45); opacity: 0; }
      14% { opacity: 1; }
      72% { transform: translate(calc(var(--tx) * .75), calc(var(--ty) * .75 + var(--arc))) scale(1); opacity: .95; }
      100% { transform: translate(var(--tx), var(--ty)) scale(.12); opacity: 0; }
    }
    .touch-ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,220,150,.62);
      animation: rippleOut 1s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleOut {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 190px; height: 190px; opacity: 0; margin-left: -95px; margin-top: -95px; }
    }

    .mini-game-card {
      width: min(94vw, 470px); height: min(82vh, 525px); padding: 20px 18px; border-radius: 28px;
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.055));
      border: 1px solid rgba(255,220,150,.22); backdrop-filter: blur(12px);
      box-shadow: 0 18px 60px rgba(0,0,0,.18);
    }
    .palace-title { position: absolute; left: 20px; top: 24px; margin: 0; text-align: left; }
    .palace-prompt {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 74px;
      min-height: 48px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      text-align: left;
      white-space: pre-line;
    }
    .palace-board {
      display: grid;
      gap: 7px;
      width: min(76vw, 330px);
      height: min(76vw, 330px);
      position: absolute;
      left: 50%;
      top: 132px;
      transform: translateX(-50%);
      padding: 7px;
      border-radius: 22px;
      background: rgba(255,255,255,.90);
      box-shadow: 0 14px 38px rgba(0,0,0,.18), inset 0 0 0 1px rgba(255,255,255,.45);
      transition: transform var(--rotate-duration, 1.2s) linear;
      transform-origin: center center;
    }
    .palace-feedback { position: absolute; left: 20px; right: 20px; bottom: 20px; min-height: 44px; text-align: center; }
    .palace-cell {
      border: none;
      border-radius: 14px;
      background: #8a83ff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
      cursor: pointer;
      transition: background .2s ease, transform .18s ease, box-shadow .18s ease;
    }
    .palace-cell.has-dragon { z-index: 5; }
    .palace-cell:hover, .palace-cell:active { transform: scale(1.035); box-shadow: 0 0 0 4px rgba(255,220,150,.18); }
    .palace-cell.correct { background: #22c55e; }
    .palace-cell.incorrect { background: #fb7185; }
    .palace-dragon {
      width: 72%;
      height: 72%;
      background-image: var(--egg-sprite, url('https://cdn.keepwork.com/maisi/magichaqi/pet/dragon_green_20260528090748.webp'));
      background-size: 400% 400%;
      background-position: 0% 0%;
      background-repeat: no-repeat;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.16));
      pointer-events: none;
    }
    .palace-dragon.happy { background-position: 33.333% 0%; }
    .palace-result-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 3;
      transform: rotate(var(--counter-rotation, 0deg));
    }
    .palace-result-wrap .palace-memory-bubble { bottom: 78%; }
    .palace-memory-bubble {
      position: absolute;
      left: 50%;
      bottom: 82%;
      transform: translateX(-50%);
      z-index: 4;
      white-space: nowrap;
      padding: 5px 9px;
      border-radius: 999px;
      color: #5b3a12;
      background: rgba(255,238,201,.96);
      border: 1px solid rgba(255,220,150,.78);
      box-shadow: 0 5px 14px rgba(0,0,0,.14);
      font-size: clamp(10px, 2.2vw, 13px);
      font-weight: 700;
      pointer-events: none;
      animation: memoryBubbleFloat 1.4s ease-in-out infinite;
    }
    .palace-memory-bubble::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      border-width: 6px 5px 0 5px;
      border-style: solid;
      border-color: rgba(255,238,201,.96) transparent transparent transparent;
    }
    @keyframes memoryBubbleFloat {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, -4px); }
    }
    .palace-click-cue {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 72%;
      height: 72%;
      border: 3px solid rgba(255,220,150,.92);
      border-radius: 999px;
      transform: translate(-50%, -50%) scale(.88);
      pointer-events: none;
      animation: palaceClickCue 1.05s ease-out infinite;
      box-shadow: 0 0 18px rgba(255,220,150,.42);
    }
    @keyframes palaceClickCue {
      0% { opacity: .95; transform: translate(-50%, -50%) scale(.76); }
      70% { opacity: .18; transform: translate(-50%, -50%) scale(1.16); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.24); }
    }
    .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 20px auto 16px; width: min(88vw, 330px); }
    .star-btn {
      aspect-ratio: 1; border-radius: 24px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.07);
      font-size: 42px; display: grid; place-items: center; transition: transform .18s, background .18s, box-shadow .18s;
    }
    .star-btn:hover, .star-btn:active { transform: scale(1.05); background: rgba(255,255,255,.12); }
    .star-btn.hint { box-shadow: 0 0 24px rgba(102,210,255,.58), inset 0 0 18px rgba(102,210,255,.16); animation: hintPulse .8s ease-in-out infinite alternate; }
    .star-btn.correct { animation: correctJump .7s ease-out forwards; }
    @keyframes hintPulse { from { transform: scale(1); } to { transform: scale(1.06); } }
    @keyframes correctJump { 0% { transform: translateY(0) scale(1); } 40% { transform: translateY(-18px) scale(1.16); } 100% { transform: translateY(0) scale(1.05); } }
    .thinking-star { font-size: 44px; filter: drop-shadow(0 0 18px rgba(255,230,140,.65)); animation: starFloat 2.4s ease-in-out infinite; }
    @keyframes starFloat { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-10px) rotate(4deg); } }
    .star-fly { position: fixed; z-index: 80; pointer-events: none; font-size: 42px; animation: starFly 1.05s cubic-bezier(.22,.8,.28,1) forwards; }
    @keyframes starFly { to { transform: translate(var(--tx), var(--ty)) scale(.35) rotate(80deg); opacity: .15; } }

    .particle { position: fixed; border-radius: 50%; pointer-events: none; z-index: 70; animation: particleFly var(--pdur) ease-out forwards; }
    @keyframes particleFly { 0% { opacity: 1; transform: translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); } }
    .typewriter-cursor::after { content: '▍'; animation: blink .8s step-end infinite; color: rgba(255,220,150,.85); }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>

<body>
  <div id="nebula"></div>
  <div id="starfield"></div>
  <button id="musicToggle" class="music-toggle" title="音乐开关" aria-label="music toggle">🔊</button>
  <div id="sceneContainer"></div>
</body>

<script>
game_config = {
  difficulty: "easy",
  planetName: "麦思星球",

    return new Promise(resolve => {
      if (!sourceEl || !egg) { resolve(); return; }
      const from = sourceEl.getBoundingClientRect();
      const to = egg.getBoundingClientRect();
      const fly = document.createElement('div');
      fly.className = 'food-fly';
      fly.textContent = emoji || '🍪';
      fly.style.left = (from.left + from.width / 2 - 17) + 'px';
      fly.style.top = (from.top + from.height / 2 - 17) + 'px';
      fly.style.setProperty('--tx', (to.left + to.width / 2 - from.left - from.width / 2) + 'px');
      fly.style.setProperty('--ty', (to.top + to.height / 2 - from.top - from.height / 2) + 'px');
      document.body.appendChild(fly);
      fly.addEventListener('animationend', () => {
        fly.remove();
        resolve();
      }, { once: true });
      setTimeout(() => {
        if (fly.parentNode) {
          fly.remove();
          resolve();
        }
      }, 1000);
    });
  }

    return new Promise(resolve => {
      if (!egg) { resolve(); return; }
      const rect = egg.getBoundingClientRect();

      const targetY = rect.top + rect.height / 2;

    const container = document.getElementById('starfield');
    container.innerHTML = '';
    const count = Math.min(120, Math.floor(window.innerWidth * window.innerHeight / 6000));
    // 保留原有的发光/闪烁星点视觉(box-shadow + mix-blend-mode + twinkle)，但不再一次性
    // 插入上百个星点(那会造成约 120-230ms 的同步样式/绘制长任务)。改为每帧只生成一小批，
    // 配合 .star 的 starIn 淡入动画，让星星“逐帧浮现”，既不卡顿也不突兀。
    const PER_FRAME = 6;
    let i = 0;
    function makeStar(idx) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      const color = idx % 5 === 0 ? 'hsl(44 100% 82%)' : idx % 3 === 0 ? 'hsl(190 100% 82%)' : '#fff';
      star.style.cssText =
        `width:${size}px;height:${size}px;` +
        `left:${(Math.random() * 100).toFixed(2)}%;top:${(Math.random() * 100).toFixed(2)}%;` +
        `background:${color};box-shadow:0 0 ${(2 + size * 1.5).toFixed(1)}px ${color};` +
        `--dur:${(2 + Math.random() * 4).toFixed(2)}s;` +
        `--o1:${(0.2 + Math.random() * 0.3).toFixed(2)};--o2:${(0.58 + Math.random() * 0.4).toFixed(2)};` +
        // twinkle 在 starIn(0.6s)淡入之后再开始，并加少量随机错相，避免整片同步闪烁
        `--delay:${(0.6 + Math.random() * 1.4).toFixed(2)}s`;
      container.appendChild(star);
    }
    function batch() {
      const end = Math.min(i + PER_FRAME, count);
      for (; i < end; i++) makeStar(i);
      if (i < count) requestAnimationFrame(batch);
    }
    batch();
  }

  function typewrite(element, text, speed = 36) {
    return new Promise(resolve => {
      element.textContent = '';
      element.classList.add('typewriter-cursor');
      const lines = String(text || '').split('\n');
      let lineIdx = 0, charIdx = 0;
      function render() {
        let html = '';
        for (let l = 0; l <= lineIdx && l < lines.length; l++) {
          const line = l < lineIdx ? lines[l] : lines[l].substring(0, charIdx);
          html += (l > 0 ? '<br>' : '') + line;
        }
        element.innerHTML = html;
      }
      function tick() {
        if (lineIdx >= lines.length) {
          element.classList.remove('typewriter-cursor');
          resolve();
          return;
        }
        if (charIdx <= lines[lineIdx].length) {
          render();
          if (charIdx < lines[lineIdx].length) {
            charIdx++;
            setTimeout(tick, speed);
          } else {
            lineIdx++; charIdx = 0;
            setTimeout(tick, speed * 2.4);
          }
        }
      }
      tick();
    });
  }

  function spawnParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 3 + Math.random() * 6;
      p.style.width = size + 'px'; p.style.height = size + 'px';
      p.style.left = x + 'px'; p.style.top = y + 'px';
      p.style.background = color || 'rgba(255,220,150,.8)';
      const angle = Math.random() * Math.PI * 2;
      const dist = 38 + Math.random() * 88;
      p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
      p.style.setProperty('--pdur', (.6 + Math.random() * .8) + 's');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }
  }

  function pushEggToPlanet(eggNode, eggStartRect, opts = {}) {
    return new Promise(resolve => {
      const dur = opts.duration || 2000;
      const planetSize = opts.planetSize || 220;
      const eggEndScale = opts.eggEndScale != null ? opts.eggEndScale : 0.34;
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const layer = document.createElement('div');
      layer.className = 'push-layer';

      const planetEl = document.createElement('div');
      planetEl.style.position = 'absolute';
      planetEl.style.left = '50%';
      planetEl.style.top = '50%';
      planetEl.style.width = planetSize + 'px';
      planetEl.style.height = planetSize + 'px';
      planetEl.style.zIndex = '1';
      planetEl.style.filter = 'drop-shadow(0 0 28px rgba(92,236,228,.48))';
      planetEl.style.transformOrigin = 'center center';
      planetEl.style.transform = 'translate(-50%, -50%) scale(.08)';
      planetEl.style.opacity = '0';
      planetEl.style.transition = `transform ${dur}ms cubic-bezier(.22,.6,.25,1), opacity ${dur * .3}ms ease`;
      planetEl.innerHTML = planetSVG();

      const startCX = eggStartRect.left + eggStartRect.width / 2;
      const startCY = eggStartRect.top + eggStartRect.height / 2;
      const startW = eggStartRect.width;
      const startH = eggStartRect.height;
      const radius = planetSize / 2;
      const angle = -Math.PI / 2;
      const endCX = vw / 2 + Math.cos(angle) * radius * .88;
      const endCY = vh / 2 + Math.sin(angle) * radius * .88;

      const eggHolder = document.createElement('div');
      eggHolder.style.position = 'fixed';
      eggHolder.style.left = '0';
      eggHolder.style.top = '0';
      eggHolder.style.zIndex = '3';
      eggHolder.style.width = startW + 'px';
      eggHolder.style.height = startH + 'px';
      eggHolder.style.transformOrigin = 'center center';
      eggHolder.style.willChange = 'transform';
      eggHolder.style.transform = `translate(${startCX - startW / 2}px, ${startCY - startH / 2}px) scale(1)`;
      eggHolder.style.transition = `transform ${dur}ms cubic-bezier(.4,0,.25,1)`;

      eggNode.classList.remove('egg-float', 'egg-glow', 'egg-wobble');
      eggNode.style.width = startW + 'px';
      eggNode.style.height = startH + 'px';
      eggHolder.appendChild(eggNode);

      layer.appendChild(planetEl);
      layer.appendChild(eggHolder);
      sceneContainer.appendChild(layer);

      requestAnimationFrame(() => {
        planetEl.style.opacity = '1';
        planetEl.style.transform = 'translate(-50%, -50%) scale(1)';
        const tx = endCX - startW / 2;
        const ty = endCY - startH / 2;
        eggHolder.style.transform = `translate(${tx}px, ${ty}px) scale(${eggEndScale})`;
      });

      const dust = setInterval(() => {
        spawnParticles(
          vw * (.3 + Math.random() * .4),
          vh * (.3 + Math.random() * .4),
          3,
          'rgba(255,255,255,.5)'
        );
      }, 200);

      setTimeout(() => {
        clearInterval(dust);
        eggNode.classList.add('egg-float');
        layer.style.pointerEvents = 'auto';
        resolve({ layer, planetEl, eggEl: eggHolder, eggNode, planetSize });
      }, dur);
    });
  }

    hint.className = 'small-text';
    hint.textContent = t('scene6Hint');

    const dots = document.createElement('div');
    dots.className = 'flex gap-3';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('div');
      dot.className = 'w-3 h-3 rounded-full bg-white/20 transition-all duration-500';

    }

    stage.appendChild(bubble);
    stage.appendChild(egg);
    stage.appendChild(touchLine);
    stage.appendChild(hint);
    stage.appendChild(dots);
    scene.appendChild(stage);

    await typewrite(bubble, t('scene6PetSays'), 42);

    let touches = 0;
    const lines = [t('scene6Touch1'), t('scene6Touch2'), t('scene6Touch3')];
    egg.addEventListener('click', function onTouch(e) {
      if (touches >= 3) return;
      touches++;
      Music.start(); Music.egg();

      const rect = egg.getBoundingClientRect();
      const ripple = document.createElement('div');
      ripple.className = 'touch-ripple';
      ripple.style.left = (e.clientX - rect.left) + 'px';
      ripple.style.top = (e.clientY - rect.top) + 'px';
      egg.appendChild(ripple);
      setTimeout(() => ripple.remove(), 1000);

      egg.classList.remove('egg-float');
      egg.classList.add('egg-wobble');
      flashEggHappy(egg, 700);
      setTimeout(() => {
        egg.classList.remove('egg-wobble');
        if (touches < 3) egg.classList.add('egg-float');
      }, 520);

      const dot = dots.children[touches - 1];
      if (dot) {
        dot.style.background = 'rgba(255,220,150,.86)';
        dot.style.boxShadow = '0 0 10px rgba(255,220,150,.55)';
      }
      spawnParticles(e.clientX, e.clientY, 8, 'rgba(255,220,150,.62)');
      touchLine.textContent = lines[touches - 1] || '';

      if (touches >= 3) {
        egg.removeEventListener('click', onTouch);
        hint.style.opacity = '0';
        setTimeout(() => scene6NeedStar(), 850);
      }
    });
  }

  async function runPalaceRound() {
    await clearScene();
    const scene = addScene();
    const card = document.createElement('div');
    card.className = 'mini-game-card scene-enter';
    const size = [2, 3, 4][state.palaceLevelIndex] || 4;
    const title = document.createElement('div');
    title.className = 'story-text';
    title.style.fontSize = 'clamp(22px, 5.5vw, 30px)';
    title.textContent = t('palaceTitle');
    const prompt = document.createElement('div');
    prompt.className = 'small-text';
    prompt.textContent = t('palacePrompt', { cur: state.palaceAttempts + 1, size });
    const board = document.createElement('div');
    board.className = 'palace-board';
    board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
    board.style.gridTemplateRows = `repeat(${size}, 1fr)`;
    const feedback = document.createElement('div');
    feedback.className = 'small-text palace-feedback';

    const outer = [];
    for (let i = 0; i < size * size; i++) {
      const row = Math.floor(i / size);
      const col = i % size;
      if (row === 0 || row === size - 1 || col === 0 || col === size - 1) outer.push(i);
    }
    const targetIndex = outer[Math.floor(Math.random() * outer.length)];
    const rotations = size >= 3 ? [-270, -90, 90, 180, 270] : [-90, 90, 180];
    const rotation = rotations[Math.floor(Math.random() * rotations.length)];
    const rotateDuration = Math.abs(rotation) * 13;
    let phase = 'find';

    function rotatedIndex(index, deg) {
      let row = Math.floor(index / size);
      let col = index % size;
      let turns = ((deg / 90) % 4 + 4) % 4;
      for (let t = 0; t < turns; t++) {
        const nextRow = col;
        const nextCol = size - 1 - row;
        row = nextRow;
        col = nextCol;
      }
      return row * size + col;
    }
    const answerIndex = targetIndex;

    function finishRound(success) {
      state.palaceAttempts++;
      if (success) {
        state.palaceLevelIndex = Math.min(2, state.palaceLevelIndex + 1);
      }
      if (state.palaceAttempts >= 4) {
        state.first_game_completed = true;
        state.thinking_star_count = 1;
        feedback.innerHTML = t('palaceGotEnergy');
        track('first_game_success', { palaceAttempts: state.palaceAttempts, palaceLevel: size });
        track('thinking_star_get', { thinking_star_count: 1 });
        setTimeout(() => scene8EnergyFinish(), 720);
      } else {
        setTimeout(() => runPalaceRound(), 820);
      }
    }

    for (let i = 0; i < size * size; i++) {
      const cell = document.createElement('button');
      cell.className = 'palace-cell';
      if (i === targetIndex) {
        cell.classList.add('has-dragon');
        const dragon = document.createElement('div');
        dragon.className = 'palace-dragon';
        dragon.style.setProperty('--egg-sprite', `url('${DRAGON_EGG_SPRITES[state.dragonColor] || DRAGON_EGG_SPRITES.green}')`);
        const memoryBubble = document.createElement('div');
        memoryBubble.className = 'palace-memory-bubble';
        memoryBubble.textContent = t('palaceMemoryHint');
        const cue = document.createElement('div');
        cue.className = 'palace-click-cue';
        cell.appendChild(memoryBubble);
        cell.appendChild(dragon);
        cell.appendChild(cue);
      }
      cell.addEventListener('click', () => {
        Music.start(); Music.click();
        if (phase === 'find') {
          if (i !== targetIndex) return;
          phase = 'rotate';
          cell.innerHTML = '';
          feedback.textContent = t('palaceRotating');
          Music.rotate();
          board.style.setProperty('--rotate-duration', `${rotateDuration}ms`);
          board.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
          setTimeout(() => {
            phase = 'answer';
            prompt.textContent = t('palaceAnswerPrompt');
            feedback.textContent = '';
          }, rotateDuration + 120);
          return;
        }
        if (phase !== 'answer') return;
        phase = 'done';
        if (i === answerIndex) {
          cell.classList.add('correct');
          cell.classList.add('has-dragon');
          cell.appendChild(createPalaceDragon(t('palaceCorrectSay'), 'happy', -rotation));
          Music.success();
          const r = cell.getBoundingClientRect();
          spawnParticles(r.left + r.width / 2, r.top + r.height / 2, 18, 'rgba(34,197,94,.7)');
          feedback.textContent = size < 4 ? t('palaceFoundGrow') : t('palaceFound');
          finishRound(true);
        } else {
          cell.classList.add('incorrect');
          const correctCell = board.children[answerIndex];
          if (correctCell) {
            correctCell.classList.add('correct');
            correctCell.classList.add('has-dragon');
            correctCell.appendChild(createPalaceDragon(t('palaceWrongSay'), 'normal', -rotation));
          }
          Music.error();
          feedback.textContent = t('palaceTryAgain');
          finishRound(false);
        }
      });
      board.appendChild(cell);
    }

    card.appendChild(title);
    card.appendChild(prompt);
    card.appendChild(board);
    card.appendChild(feedback);
    scene.appendChild(card);
  }

  function finishGame() {
    if (state.finished) return;
    state.finished = true;
    track('daily_training_start_click');
    // 抱抱龙颜色 → petId：孵化时以 petId 为准，覆盖其他选择（食性 / 元素属性等）。
    const dragonColor = state.wish?.dragon_color || state.dragonColor || 'green';
    const petId = (game_config.dragonColorToPetId || {})[dragonColor] || '';
    post('gameFinished', {
      earnedPoints: 10,
      planetName: state.planetName || t('scene2DefaultName'),
      personality: state.personality || '',
      // ---- 孵化目标：明确指定 petId，孵化时优先使用它并覆盖其他属性 ----
      petId, // 由抱抱龙颜色决定：dragon_green / dragon_orange / dragon_purple
      // ---- DNA 相关：与 planet boarding 一致，游戏收到后据此生成 / 偏置宠物 DNA ----
      elementalAttribute: state.elementalAttribute || '', // 元素属性（自然 / 火 / 冰 / 生命 / 暗 / 雷），由性格决定
      diet: state.firstFood?.diet || state.firstFood?.id || '', // 食性：omnivore / carnivore / herbivore
      firstFood: state.firstFood?.id || '',
      wish_type: state.wish?.wish_type || '',
      dragon_color: dragonColor,
      egg_pattern: state.wish?.egg_pattern || '',
      first_game_completed: state.first_game_completed,
      thinking_star_count: state.thinking_star_count,
      egg_awakened: state.egg_awakened,
      tutorial_completed: true,
      pet_stage: 'egg',
      status: t('statusAwake')
    });
  }

  window.addEventListener('message', event => {
    const msg = event.data || {};
    if (msg.type === 'setGameConfig' && msg.data && typeof msg.data === 'object') {
      Object.assign(game_config, msg.data);
    }
    if (msg.type === 'gameContinue') {
      // no-op for onboarding story
    }
  });

  document.addEventListener('click', (e) => {
    const btn = e.target.closest && e.target.closest('button');
    if (!btn || btn.id === 'musicToggle') return;
    Music.start();
  }, true);

  (function initMusicToggle() {
    const btn = document.getElementById('musicToggle');
    btn.addEventListener('click', () => {
      Music.start();
      const next = !Music.isMuted();
      Music.setMuted(next);
      btn.textContent = next ? '🔇' : '🔊';
      btn.style.color = next ? 'rgba(255,255,255,.42)' : '#ffdc96';
    });
  })();

  function bootMusic() { try { Music.start(); } catch (_) {} }
  bootMusic();
  ['pointerdown', 'keydown', 'touchstart'].forEach(type => window.addEventListener(type, bootMusic, { once: true, capture: true }));

  post('gameLoaded');
  scene1();
  if (!state.gameStarted) {
    state.gameStarted = true;
    post('gameStarted');
  }
  // 星空(约120个带阴影的星点，绘制开销大)与龙蛋贴图预载均为装饰/预热，
  // 位于场景内容背后，推迟到首帧绘制之后执行，不阻塞启动且无可见闪烁。
  requestAnimationFrame(() => { createStarfield(); preloadEggSprite(); });
