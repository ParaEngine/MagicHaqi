<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>数字复读机</title>
  <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
  <style>
    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%;
      margin: 0
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #bfdbfe, #99f6e4);
      color: #0f2747;
      overflow: hidden
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 12px
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(255, 255, 255, .88);
      border: 2px solid #dbeafe;
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 5px 0 rgba(30, 64, 175, .16)
    }

    .title {
      font-size: 18px;
      font-weight: 900
    }

    .target {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      color: #2563eb
    }

    .target b {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2563eb;
      color: #fff;
      font-size: 22px
    }

    .topActions {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .helpBtn {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: #f97316;
      color: white;
      font-weight: 900;
      box-shadow: 0 4px 0 #9a3412
    }

    .grid {
      align-self: center;
      justify-self: center;
      width: min(76vmin, 420px);
      height: min(76vmin, 420px);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px
    }

    .cell {
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, #fff, #e0f2fe);
      box-shadow: 0 5px 0 #0e7490, 0 10px 18px rgba(15, 23, 42, .16);
      font-size: clamp(18px, 5vmin, 34px);
      font-weight: 900;
      color: #0f766e
    }

    .cell.hit {
      background: #bbf7d0;
      color: #047857;
      box-shadow: 0 3px 0 #059669
    }

    .cell.miss {
      background: #fee2e2;
      color: #b91c1c;
      box-shadow: 0 3px 0 #dc2626
    }

    .bottom {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-weight: 900;
      color: #0f766e
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 22px;
      background: #0ea5e9;
      color: white;
      font-weight: 900;
      box-shadow: 0 5px 0 #1e3a8a
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border: 2px solid #5eead4;
      border-radius: 16px;
      padding: 18px 22px;
      font-weight: 900;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .25)
    }

    .howToOverlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 39, 71, .42)
    }

    .howToCard {
      width: min(92vw, 360px);
      background: #fff;
      border: 3px solid #5eead4;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, .28)
    }

    .howToTitle {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 900;
      color: #0f2747
    }

    .howToText {
      margin: 0 0 16px;
      line-height: 1.55;
      font-weight: 800;
      color: #0f766e
    }

    [hidden] {
      display: none !important
    }

    @media (max-width: 420px) {
      .top {
        align-items: flex-start;
        flex-direction: column
      }

      .topActions {
        width: 100%;
        justify-content: space-between
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="top">
      <div class="title">🔢 数字复读机</div>
      <div class="topActions">
        <div class="target">找到 <b id="target">0</b></div>
        <button id="help" class="helpBtn" type="button">玩法</button>
      </div>
    </div>
    <div id="grid" class="grid"></div>
    <div class="bottom"><span>轮次 <b id="round">1</b>/8</span><span>得分 <b id="score">0</b></span><button id="restart"
        class="btn">重新开始</button></div>
  </div>
  <div id="howTo" class="howToOverlay" role="dialog" aria-modal="true" aria-labelledby="howToTitle" hidden>
    <div class="howToCard">
      <h1 id="howToTitle" class="howToTitle">怎么玩</h1>
      <p class="howToText">看顶部提示的数字，在方格里点到相同数字。答对加分，点错会扣一点分，共 8 轮。</p>
      <button id="startPlay" class="btn" type="button">开始玩</button>
    </div>
  </div>
  <script>
    const grid = document.getElementById('grid'); let target = 0, round = 1, score = 0, locked = false;
    const howTo = document.getElementById('howTo'); let hasStarted = false;
    function post(type, data = {}) { try { window.parent.postMessage({ type, data }, '*') } catch (e) { } }
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min }
    function buildRound() { locked = false; document.getElementById('round').textContent = round; document.getElementById('score').textContent = score; target = rand(1, 9); document.getElementById('target').textContent = target; grid.innerHTML = ''; const targetIndex = rand(0, 24); for (let i = 0; i < 25; i++) { const n = i === targetIndex ? target : rand(1, 9); const b = document.createElement('button'); b.className = 'cell'; b.textContent = n; b.onclick = () => hit(b, Number(b.textContent) === target); grid.appendChild(b) } }
    function hit(btn, ok) { if (locked) return; locked = true; if (ok) { score += 12; btn.classList.add('hit') } else { score = Math.max(0, score - 3); btn.classList.add('miss'); Array.from(grid.children).find(el => Number(el.textContent) === target)?.classList.add('hit') } setTimeout(() => { round++; if (round > 8) finish(); else buildRound() }, 520) }
    function finish() { document.getElementById('score').textContent = score; const box = document.createElement('div'); box.className = 'toast'; box.textContent = `完成！得分 ${score}`; document.body.appendChild(box); post('gameFinished', { earnedPoints: score, finishedAt: Date.now() }); setTimeout(() => box.remove(), 1400) }
    function start() { round = 1; score = 0; post('gameStarted'); buildRound() }
    function showHowTo() { howTo.hidden = false }
    function closeHowTo() { howTo.hidden = true; if (!hasStarted) { hasStarted = true; start() } }
    document.getElementById('help').onclick = showHowTo; document.getElementById('startPlay').onclick = closeHowTo; document.getElementById('restart').onclick = () => { hasStarted = true; start() }; window.addEventListener('message', e => { if (e.data?.type === 'gameContinue') { hasStarted = true; start() } }); post('gameLoaded'); showHowTo();
  </script>
</body>

</html>
