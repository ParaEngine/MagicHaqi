	function sample(list) {

	}

	function shuffle(list) {
		const copy = list.slice();
		for (let i = copy.length - 1; i > 0; i--) {

	function buildMainPath(size) {
		const start = { r: size - 2, c: 1 };
		const baby = { r: 1, c: size - 2 };
		const path = [{ ...start }];
		let r = start.r;
		let c = start.c;
		let guard = 0;
		while ((r !== baby.r || c !== baby.c) && guard++ < size * size * 4) {
			const moves = [];
			if (r > baby.r) moves.push({ dr: -1, dc: 0, weight: 4 });
			if (c < baby.c) moves.push({ dr: 0, dc: 1, weight: 4 });
			if (r < size - 2) moves.push({ dr: 1, dc: 0, weight: 1 });
			if (c > 1) moves.push({ dr: 0, dc: -1, weight: 1 });
			const weighted = [];
			moves.forEach(move => { for (let i = 0; i < move.weight; i++) weighted.push(move); });
			const move = sample(weighted);
			const nr = r + move.dr;
			const nc = c + move.dc;

			r = nr;
			c = nc;

	function generateLevel() {
		stopTimers();
		const difficulty = DIFFICULTIES[state.difficulty];
		state.size = difficulty.size;

			for (let c = 0; c < state.size; c++) {

		const main = buildMainPath(state.size);
		state.start = main.start;
		state.baby = main.baby;
		state.path = main.path;
		state.pet = { ...state.start };
		cellAt(state.start.r, state.start.c).type = 'start';
		cellAt(state.baby.r, state.baby.c).type = 'baby';

		const pathKeys = new Set(state.path.map(p => key(p.r, p.c)));
		const candidatePath = state.path.slice(2, -2).filter((_, index) => index % 2 === 0);
		const blockers = shuffle(candidatePath).slice(0, difficulty.blockers);
		const needed = { mirrorSlash: 1, mirrorBack: 1, wrench: 1, bomb: 1, fan: 1, bucket: 0, hammer: 0 };
		blockers.forEach((pos, index) => {
			const type = BLOCKER_TYPES[index % BLOCKER_TYPES.length];
			cellAt(pos.r, pos.c).type = type;
			if (type === 'fire' || type === 'lava') needed.bucket += 1;
			if (type === 'rock') needed.bomb += 1;
			if (type === 'ice') needed.hammer += 1;
			if (type === 'gas') needed.fan += 1;

		for (let r = 1; r < state.size - 1; r++) {

			}
		}
		shuffle(free).slice(0, difficulty.clutter).forEach((pos, index) => {
			const type = index % 4 === 0 ? 'wall' : (index % 4 === 1 ? 'rock' : (index % 4 === 2 ? 'ice' : 'floor'));
			cellAt(pos.r, pos.c).type = type;
		});
		shuffle(free.filter(pos => cellAt(pos.r, pos.c).type === 'floor')).slice(0, difficulty.mines).forEach(pos => {
			cellAt(pos.r, pos.c).type = 'mine';
		});

		needed.mirrorSlash += Math.max(1, Math.ceil(difficulty.lasers / 2));
		needed.mirrorBack += Math.max(1, Math.floor(difficulty.lasers / 2));

				div.setAttribute('aria-label', `${r},${c}`);
				div.innerHTML = cellInnerSvg(cell);
				if (cell.type === 'baby') div.appendChild(babyElement());
				div.addEventListener('click', () => onCellClick(r, c));
				els.board.appendChild(div);
			}
		}
		renderPet();
		renderTools();
		renderLasers();
		updateHud();
	}

	function babyElement() {
		const mark = document.createElement('div');
		mark.className = 'mh-baby-mark';
		mark.innerHTML = dishSvg();
		return mark;
	}

	function renderPet() {
		els.pet.style.setProperty('--r', state.pet.r);
		els.pet.style.setProperty('--c', state.pet.c);
		els.pet.classList.toggle('dead', state.dead);
		els.pet.classList.toggle('walking', state.moving && !state.dead && !state.finished);
		els.pet.innerHTML = '';
		if (state.petAsset) {
			els.pet.appendChild(wrapPetArt(makeSpriteElement(state.petAsset)));
		} else {
			const fallback = document.createElement('div');
			fallback.className = 'mh-fallback';
			fallback.textContent = FALLBACK_PET;
			els.pet.appendChild(fallback);
		}
	}

	function renderTools() {
		els.tools.innerHTML = '';
		TOOL_DEFS.forEach(tool => {
			const count = state.inventory[tool.id] || 0;
			const btn = document.createElement('button');
			btn.type = 'button';
			btn.className = `mh-tool${state.selectedTool === tool.id ? ' active' : ''}`;
			btn.disabled = count <= 0 || state.finished || state.dead;
			btn.innerHTML = `${tool.icon}<span>${tool.label} <b>x${count}</b></span>`;
			btn.addEventListener('click', () => {
				state.selectedTool = state.selectedTool === tool.id ? null : tool.id;
				clearPlannedRoute();
				setStatus(toolHint(state.selectedTool));
				render();
			});
			els.tools.appendChild(btn);
		});
	}

	function updateHud() {
		const difficulty = DIFFICULTIES[state.difficulty];
		els.level.textContent = state.level;
		els.difficultyLabel.textContent = difficulty.label;
		els.moves.textContent = state.moves;
		els.toolsUsed.textContent = state.toolsUsed;
		els.pulse.textContent = laserPulseLabel();
		els.time.textContent = state.seconds;
		els.best.textContent = state.best;
		els.fanDir.textContent = DIRS[state.selectedFanDir].arrow;
		els.fanDir.classList.toggle('active', state.selectedTool === 'fan');
		els.undo.disabled = !state.lastToolSnapshot || state.moving || state.finished || state.dead;
		[...els.difficulties.children].forEach(btn => btn.classList.toggle('active', btn.dataset.id === state.difficulty));
	}

	function renderLasers() {
		els.laserLayer.innerHTML = '';
		const unit = 100 / state.size;
		state.laserCells.forEach((dirs, laserKey) => {
			const [r, c] = laserKey.split(',').map(Number);
			const cell = cellAt(r, c);
			dirs.forEach(dir => {
				if (cell?.item === 'mirror') {
					appendLaserSegment(r, c, dir, unit, 'entry');
					appendLaserSegment(r, c, reflect(dir, cell.mirror), unit, 'exit');
				} else {
					appendLaserSegment(r, c, dir, unit, 'full');
				}
			});
		});
	}

	function appendLaserSegment(r, c, dir, unit, mode) {
		const seg = document.createElement('div');
		const vertical = dir === 0 || dir === 2;
		const half = unit * .5;
		seg.className = `mh-laser-seg${vertical ? ' v' : ''}${dir === 0 || dir === 3 ? ' rev' : ''}`;
		if (vertical) {
			seg.style.left = `${c * unit + unit * .43}%`;
			seg.style.width = `${unit * .14}%`;
			if (mode === 'entry') {
				seg.style.top = `${r * unit + (dir === 0 ? half : 0)}%`;
				seg.style.height = `${half}%`;
			} else if (mode === 'exit') {
				seg.style.top = `${r * unit + (dir === 2 ? half : 0)}%`;
				seg.style.height = `${half}%`;
			} else {
				seg.style.top = `${r * unit}%`;
				seg.style.height = `${unit}%`;
			}
		} else {
			seg.style.top = `${r * unit + unit * .43}%`;
			seg.style.height = `${unit * .14}%`;
			if (mode === 'entry') {
				seg.style.left = `${c * unit + (dir === 3 ? half : 0)}%`;
				seg.style.width = `${half}%`;
			} else if (mode === 'exit') {
				seg.style.left = `${c * unit + (dir === 1 ? half : 0)}%`;
				seg.style.width = `${half}%`;
			} else {
				seg.style.left = `${c * unit}%`;
				seg.style.width = `${unit}%`;
			}
		}
		els.laserLayer.appendChild(seg);
	}

	function cellInnerSvg(cell) {
		if (cell.type === 'wall') return wallSvg();
		if (cell.type === 'rock') return rockSvg();
		if (cell.type === 'ice') return iceSvg();
		if (cell.type === 'fire') return fireSvg();
		if (cell.type === 'lava') return lavaSvg();
		if (cell.type === 'gas') return gasSvg();
		if (cell.type === 'mine') return mineSvg();
		if (cell.type === 'emitter') return emitterSvg(cell.dir);
		if (cell.item === 'mirror') return mirrorSvg(cell.mirror);
		if (cell.item === 'bomb') return bombSvg();
		if (cell.item === 'fan') return fanPlacedSvg(cell.dir);
		return '';
	}

	function onCellClick(r, c) {
		if (state.finished || state.dead) return;
		if (!state.started) startGame();
		const cell = cellAt(r, c);
		if (state.selectedTool) {
			useTool(state.selectedTool, cell);
			return;
		}
		if (state.moving) return;
		if (!PASSABLE.has(cell.type) || cell.item) {
			clearPlannedRoute();
			setStatus(t('statusCantWalk'));
			render();
			return;
		}
		const route = findPath(state.pet, { r, c });
		if (!route.length) {
			clearPlannedRoute();
			setStatus(t('statusNoRoute'));
			render();
			return;
		}
		if (state.plannedTarget && state.plannedTarget.r === r && state.plannedTarget.c === c) {
			const plannedRoute = state.plannedRoute.slice();
			clearPlannedRoute();
			walkRoute(plannedRoute);
			return;
		}
		state.plannedRoute = route;
		state.plannedTarget = { r, c };
		const danger = routeHasDanger(route);
		setStatus(danger ? t('statusRouteDanger') : t('statusRouteSafe'));
		render();
	}

	function clearPlannedRoute() {
		state.plannedRoute = [];
		state.plannedTarget = null;
	}

	function routeHasDanger(route) {
		return route.some(pos => isDangerousCell(cellAt(pos.r, pos.c)));
	}

	function isDangerousCell(cell) {
		if (!cell) return false;
		return state.laserCells.has(key(cell.r, cell.c)) || cell.type === 'fire' || cell.type === 'lava' || cell.type === 'gas' || cell.type === 'mine';
	}

	function toolPreviewCells() {
		const tool = state.selectedTool;
		if (!tool) return [];
		if (tool === 'bucket') return allCells().filter(cell => cell.type === 'fire' || cell.type === 'lava');
		if (tool === 'hammer') return allCells().filter(cell => cell.type === 'ice' || cell.type === 'rock');
		if (tool === 'wrench') return allCells().filter(cell => cell.item === 'mirror' || cell.item === 'fan' || cell.type === 'emitter');
		return [];
	}

	function allCells() {
		return state.cells.flatMap(row => row);
	}

	function laserPulseLabel() {
		if (!state.lasers.length) return t('laserSafe');
		const active = state.lasers.filter(isLaserActive).length;
		return active ? t('laserOn', { active, total: state.lasers.length }) : t('laserAllOff');
	}

	function useTool(tool, cell) {
		if ((state.inventory[tool] || 0) <= 0) return;
		if (!isToolTarget(cell)) {
			setStatus(invalidToolHint(tool));
			return;
		}
		const snapshot = makeToolSnapshot();
		let used = false;
		if ((tool === 'mirrorSlash' || tool === 'mirrorBack') && canPlaceOn(cell)) {
			cell.item = 'mirror';
			cell.mirror = tool === 'mirrorSlash' ? '/' : '\\';
			used = true;
			setStatus(t('toolMirrorPlaced'));
		} else if (tool === 'wrench' && (cell.item === 'mirror' || cell.item === 'fan' || cell.type === 'emitter')) {
			if (cell.item === 'mirror') cell.mirror = cell.mirror === '/' ? '\\' : '/';
			if (cell.item === 'fan') cell.dir = (cell.dir + 1) % 4;
			if (cell.type === 'emitter') cell.dir = (cell.dir + 1) % 4;
			state.lasers.forEach(laser => { if (laser.r === cell.r && laser.c === cell.c) laser.dir = cell.dir; });
			used = true;
			setStatus(t('toolRotated'));
		} else if (tool === 'bomb' && canPlaceOn(cell)) {
			cell.item = 'bomb';
			used = true;
			setStatus(t('toolBombPlaced'));
		} else if (tool === 'fan' && canPlaceOn(cell)) {
			cell.item = 'fan';
			cell.dir = state.selectedFanDir;
			blowFan(cell);
			used = true;
			setStatus(t('toolFanPlaced'));
		} else if (tool === 'bucket' && (cell.type === 'fire' || cell.type === 'lava')) {
			cell.type = cell.type === 'lava' ? 'water' : 'floor';
			used = true;
			setStatus(t('toolBucketUsed'));
		} else if (tool === 'hammer' && (cell.type === 'ice' || cell.type === 'rock')) {
			cell.type = 'floor';
			used = true;
			setStatus(t('toolHammerUsed'));
		}
		if (!used) {
			setStatus(toolHint(tool));
			return;
		}
		state.lastToolSnapshot = snapshot;
		clearPlannedRoute();
		state.inventory[tool] -= 1;
		state.toolsUsed += 1;
		state.selectedTool = null;
		simulateLasers(true);
		render();
		checkPetDanger();
	}

	function makeToolSnapshot() {
		return {
			cells: state.cells.map(row => row.map(cell => ({ ...cell }))),
			lasers: state.lasers.map(laser => ({ ...laser })),
			inventory: { ...state.inventory },
			toolsUsed: state.toolsUsed,
			selectedFanDir: state.selectedFanDir,
		};
	}

	function undoLastTool() {
		const snapshot = state.lastToolSnapshot;
		if (!snapshot || state.moving || state.finished || state.dead) return;
		state.cells = snapshot.cells.map(row => row.map(cell => ({ ...cell })));
		state.lasers = snapshot.lasers.map(laser => ({ ...laser }));
		state.inventory = { ...snapshot.inventory };
		state.toolsUsed = snapshot.toolsUsed;
		state.selectedFanDir = snapshot.selectedFanDir;
		state.selectedTool = null;
		state.lastToolSnapshot = null;
		clearPlannedRoute();
		simulateLasers(false);
		render();
		setStatus('已撤销上一次工具操作。');
		checkPetDanger();
	}

	function canPlaceOn(cell) {
		return PASSABLE.has(cell.type) && !cell.item && !isSame(cell, state.pet) && !isSame(cell, state.baby) && !isSame(cell, state.start);
	}

	function isToolTarget(cell) {
		const tool = state.selectedTool;
		if (!tool) return false;
		if (tool === 'mirrorSlash' || tool === 'mirrorBack' || tool === 'bomb' || tool === 'fan') return canPlaceOn(cell);
		if (tool === 'wrench') return cell.item === 'mirror' || cell.item === 'fan' || cell.type === 'emitter';
		if (tool === 'bucket') return cell.type === 'fire' || cell.type === 'lava';
		if (tool === 'hammer') return cell.type === 'ice' || cell.type === 'rock';
		return false;
	}

	function toolHint(tool) {
		const hints = {
			mirrorSlash: t('hintMirrorSlash'),
			mirrorBack: t('hintMirrorBack'),
			wrench: t('hintWrench'),
			bomb: t('hintBomb'),
			fan: t('hintFan'),
			bucket: t('hintBucket'),
			hammer: t('hintHammer'),
		};
		return hints[tool] || t('hintDefault');
	}

	function invalidToolHint(tool) {
		const hints = {
			mirrorSlash: t('invalidMirror'),
			mirrorBack: t('invalidMirror'),
			wrench: t('invalidWrench'),
			bomb: t('invalidBomb'),
			fan: t('invalidFan'),
			bucket: t('invalidBucket'),
			hammer: t('invalidHammer'),
		};
		return hints[tool] || toolHint(tool);
	}

	function blowFan(cell) {
		const dir = DIRS[cell.dir];
		let r = cell.r + dir.dr;
		let c = cell.c + dir.dc;
		while (inBounds(r, c)) {
			const target = cellAt(r, c);
			if (target.type === 'wall' || target.type === 'rock' || target.type === 'emitter') break;
			if (target.type === 'gas') target.type = 'floor';
			r += dir.dr;
			c += dir.dc;
		}
	}

	function simulateLasers(allowChain) {
		state.laserCells = new Map();
		const bombsToExplode = [];
		state.lasers.forEach(laser => {
			if (!isLaserActive(laser)) return;
			traceLaser(laser, bombsToExplode);
		});
		if (allowChain && bombsToExplode.length) {
			bombsToExplode.forEach(cell => explodeBomb(cell));
			state.laserCells = new Map();
			state.lasers.forEach(laser => { if (isLaserActive(laser)) traceLaser(laser, []); });
			showToast(t('chainBoom'));
		}
	}

	function isLaserActive(laser) {
		return ((state.pulse + laser.phase) % laser.period) < Math.ceil(laser.period / 2);
	}

	function traceLaser(laser, bombsToExplode) {
		let dir = laser.dir;
		let r = laser.r + DIRS[dir].dr;
		let c = laser.c + DIRS[dir].dc;
		const seen = new Set();
		let guard = 0;
		while (inBounds(r, c) && guard++ < state.size * state.size * 4) {
			const traceKey = `${r},${c},${dir}`;
			if (seen.has(traceKey)) break;
			seen.add(traceKey);
			const cell = cellAt(r, c);
			if (cell.type === 'wall' || cell.type === 'rock' || cell.type === 'ice' || cell.type === 'emitter') break;
			const laserKey = key(r, c);
			if (!state.laserCells.has(laserKey)) state.laserCells.set(laserKey, []);
			state.laserCells.get(laserKey).push(dir);
			if (cell.item === 'bomb') bombsToExplode.push(cell);
			if (cell.item === 'mirror') dir = reflect(dir, cell.mirror);
			r += DIRS[dir].dr;
			c += DIRS[dir].dc;
		}
	}

	function reflect(dir, mirror) {
		if (mirror === '/') return [1, 0, 3, 2][dir];
		return [3, 2, 1, 0][dir];
	}

	function explodeBomb(cell) {
		cell.item = null;
		for (let dr = -1; dr <= 1; dr++) {
			for (let dc = -1; dc <= 1; dc++) {
				const target = cellAt(cell.r + dr, cell.c + dc);
				if (!target) continue;
				if (target.type === 'rock' || target.type === 'ice' || target.type === 'fire' || target.type === 'gas') target.type = 'floor';
				if (target.type === 'lava') target.type = 'water';
			}
		}
	}

	function findReachable() {
		const out = [];
		const queue = [{ ...state.pet }];
		const seen = new Set([key(state.pet.r, state.pet.c)]);
		while (queue.length) {
			const cur = queue.shift();
			out.push(cur);
			DIRS.forEach(dir => {
				const nr = cur.r + dir.dr;
				const nc = cur.c + dir.dc;
				const next = cellAt(nr, nc);
				const nextKey = key(nr, nc);
				if (!next || seen.has(nextKey) || !PASSABLE.has(next.type) || next.item) return;
				seen.add(nextKey);
				queue.push({ r: nr, c: nc });
			});
		}
		return out;
	}

	function findPath(from, to) {
		const queue = [{ ...from, prev: null }];
		const seen = new Set([key(from.r, from.c)]);
		let end = null;
		while (queue.length) {
			const cur = queue.shift();
			if (cur.r === to.r && cur.c === to.c) { end = cur; break; }
			DIRS.forEach(dir => {
				const nr = cur.r + dir.dr;
				const nc = cur.c + dir.dc;
				const next = cellAt(nr, nc);
				const nextKey = key(nr, nc);
				if (!next || seen.has(nextKey) || !PASSABLE.has(next.type) || next.item) return;
				seen.add(nextKey);
				queue.push({ r: nr, c: nc, prev: cur });
			});
		}
		if (!end) return [];
		const route = [];
		let cur = end;
		while (cur && !(cur.r === from.r && cur.c === from.c)) {
			route.push({ r: cur.r, c: cur.c });
			cur = cur.prev;
		}
		return route.reverse();
	}

	function walkRoute(route) {
		clearInterval(state.routeTimer);
		state.route = route.slice();
		state.moving = state.route.length > 0;
		els.pet.classList.toggle('walking', state.moving);
		setStatus(t('statusWalking'));
		state.routeTimer = setInterval(() => {
			if (!state.route.length || state.dead || state.finished) {
				clearInterval(state.routeTimer);
				state.routeTimer = null;
				state.moving = false;
				els.pet.classList.remove('walking');
				render();
				return;
			}
			const next = state.route.shift();
			state.pet = next;
			state.moves += 1;
			renderPet();
			updateHud();
			checkPetDanger();
			if (!state.dead && isSame(state.pet, state.baby)) finishLevel();
		}, 360);
	}

	function checkPetDanger() {
		const cell = cellAt(state.pet.r, state.pet.c);
		if (state.laserCells.has(key(state.pet.r, state.pet.c))) return failLevel(t('failLaser'));
		if (cell.type === 'fire') return failLevel(t('failFire'));
		if (cell.type === 'lava') return failLevel(t('failLava'));
		if (cell.type === 'gas') return failLevel(t('failGas'));
		if (cell.type === 'mine') return failLevel(t('failMine'));
	}

	function failLevel(reason) {
		state.dead = true;
		state.moving = false;
		clearInterval(state.routeTimer);
		state.routeTimer = null;
		setStatus(t('failRetry', { reason }));
		showToast(t('toastFail'));
		renderPet();
	}

	function finishLevel() {
		state.finished = true;
		state.moving = false;
		clearInterval(state.routeTimer);
		clearInterval(state.tickTimer);
		const difficulty = DIFFICULTIES[state.difficulty];
		const efficiency = Math.max(0, 40 - state.moves - state.toolsUsed * 2 - Math.floor(state.seconds / 2));
		const earnedPoints = difficulty.reward + state.level * 8 + efficiency;
		state.best = Math.max(state.best, earnedPoints);
		localStorage.setItem(STORAGE_BEST, String(state.best));
		post('gameFinished', {
			earnedPoints,
			score: earnedPoints,
			difficulty: state.difficulty,
			level: state.level,
			moves: state.moves,
			toolsUsed: state.toolsUsed,
			time: state.seconds,
		});
		showToast(t('toastReachDish', { points: earnedPoints }));
		confetti();
		setStatus(t('statusNextLevel'));
		setTimeout(() => {
			state.level += 1;
			generateLevel();
			render();
			startTimers();
		}, 1500);
	}

	function tick() {
		if (!state.started || state.finished || state.dead) return;
		state.pulse += 1;
		if (state.pulse % 2 === 0) state.seconds += 1;
		simulateLasers(true);
		render();
		checkPetDanger();
	}

	function startGame() {
		if (!state.started) {
			state.started = true;
			post('gameStarted', { difficulty: state.difficulty });
		}
		startTimers();
	}

	function startTimers() {
		clearInterval(state.tickTimer);
		state.tickTimer = setInterval(tick, 520);
	}

	function stopTimers() {
		clearInterval(state.routeTimer);
		clearInterval(state.tickTimer);
		state.routeTimer = null;
		state.tickTimer = null;
	}

	function resetLevel() {
		generateLevel();
		render();
		if (state.started) startTimers();
		setStatus(t('statusNewMaze'));
	}

	function setDifficulty(id) {
		state.difficulty = normalizeDifficulty(id);
		localStorage.setItem(STORAGE_DIFFICULTY, state.difficulty);
		state.level = 1;
		resetLevel();
	}

	function setStatus(text) {
		els.status.textContent = text;
	}

	function showToast(text) {
		const toast = document.createElement('div');
		toast.className = 'mh-toast';
		toast.textContent = text;
		document.body.appendChild(toast);
		setTimeout(() => toast.remove(), 1300);
	}

	function confetti() {
		const colors = ['#38bdf8', '#34d399', '#facc15', '#fb7185', '#a78bfa', '#fb923c'];
		for (let i = 0; i < 32; i++) {
			const piece = document.createElement('div');
			piece.className = 'mh-confetti';
			piece.style.left = `${randInt(8, 92)}vw`;
			piece.style.setProperty('--c', sample(colors));
			piece.style.setProperty('--x', `${randInt(-80, 80)}px`);
			piece.style.setProperty('--d', `${randInt(900, 1600)}ms`);
			document.body.appendChild(piece);
			setTimeout(() => piece.remove(), 1700);
		}
	}

	function makeSpriteElement(pet) {
		const el = document.createElement('div');
		el.className = 'mh-sprite';
		el.style.backgroundImage = `url("${pet.url}")`;
		if (pet.uv && (pet.uv.cols > 1 || pet.uv.rows > 1)) {
			el.style.backgroundSize = `${pet.uv.cols * 100}% ${pet.uv.rows * 100}%`;
			el.style.backgroundPosition = `${pet.uv.col * 100 / Math.max(1, pet.uv.cols - 1)}% ${pet.uv.row * 100 / Math.max(1, pet.uv.rows - 1)}%`;
		} else {
			el.style.backgroundSize = 'contain';
			el.style.backgroundPosition = 'center';
		}
		return el;
	}

	function wrapPetArt(el) {
		const wrap = document.createElement('div');
		wrap.className = 'mh-pet-flip';
		wrap.appendChild(el);
		return wrap;
	}

	function requestPetImage() {
		const requestId = `laser_pet_${Date.now()}_${Math.random().toString(16).slice(2)}`;
		const onMessage = event => {
			const msg = event.data || {};
			if (msg.type !== 'haqi_pet_image' || msg.requestId !== requestId) return;
			window.removeEventListener('message', onMessage);
			if (!msg.ok || !msg.data?.imageBlob) return;
			const url = URL.createObjectURL(msg.data.imageBlob);
			state.objectUrls.push(url);
			state.petAsset = { ...msg.data, url };
			render();
		};
		window.addEventListener('message', onMessage);
		try { window.parent?.postMessage({ type: 'haqi_get_pet_image', requestId, anim: 'idle' }, '*'); } catch (err) {}
		setTimeout(() => window.removeEventListener('message', onMessage), 3500);
	}

	function initDifficulties() {
		els.difficulties.innerHTML = '';
		DIFFICULTY_ORDER.forEach(id => {
			const btn = document.createElement('button');
			btn.type = 'button';
			btn.className = `mh-difficulty${id === state.difficulty ? ' active' : ''}`;
			btn.dataset.id = id;
			btn.textContent = DIFFICULTIES[id].label;
			btn.addEventListener('click', () => setDifficulty(id));
			els.difficulties.appendChild(btn);
		});
	}

	function bindEvents() {
		els.help.addEventListener('click', () => { els.overlay.hidden = false; });
		els.start.addEventListener('click', () => {
			els.overlay.hidden = true;
			startGame();
			setStatus(t('statusStartPlay'));
		});
		els.reset.addEventListener('click', resetLevel);
		els.undo.addEventListener('click', undoLastTool);
		els.wait.addEventListener('click', () => {
			if (!state.started) startGame();
			clearPlannedRoute();
			tick();
			setStatus(t('statusWaitBeat'));
			render();
		});
		els.fanDir.addEventListener('click', () => {
			state.selectedFanDir = (state.selectedFanDir + 1) % 4;
			updateHud();
			setStatus(t('statusFanDir', { dir: DIRS[state.selectedFanDir].name }));
		});
		window.addEventListener('message', event => {
			const msg = event.data || {};
			if (msg.type === 'setGameConfig' && msg.data?.difficulty) setDifficulty(msg.data.difficulty);
		});
		window.addEventListener('beforeunload', () => {
			state.objectUrls.forEach(url => URL.revokeObjectURL(url));
			stopTimers();
		});
	}

		`);

	initDifficulties();
	bindEvents();
	generateLevel();
	render();
	requestPetImage();
	post('gameLoaded', { title: t('title') });
})();
</script>
