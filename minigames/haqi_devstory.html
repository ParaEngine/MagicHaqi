- + 📑 论文 x 8
- NPL 最初是为了写一个基于「相似原理」的人脑仿真程序

- /clear

    storm:[['precip','rain'],['clouds','overcast'],['wind','on'],['sky','dusk']], 暴风雨:[['precip','rain'],['clouds','overcast'],['wind','on'],['sky','dusk']], 暴雨:[['precip','rain'],['clouds','overcast'],['wind','on']],

    city:['scene','city'], buildings:['scene','city'], skyline:['scene','city'], urban:['scene','city'], 高楼:['scene','city'], 高楼大厦:['scene','city'], 城市:['scene','city'], 都市:['scene','city'],

  function buildWorld(chapters) {
    const items = [];
    const events = [];
    // resolve a command's tokens into atmosphere events anchored at world-x
    const emitEvents = (toks, x) => {
      for (const tk of toks) {
        let maps = CMD_MAP[tk] || CMD_MAP[String(tk).toLowerCase()];
        if (!maps) continue;
        if (typeof maps[0] === 'string') maps = [maps];
        for (const mp of maps) events.push({ x, channel: mp[0], value: mp[1] });
      }
    };
    (chapters._preCmds || []).forEach(cm => emitEvents(cm.toks, 0));
    let col = 0;
    chapters.forEach((ch, ci) => {
      ch.startCol = col;
      let c = col + MARGIN;
      ch._itemCols = [];
      ch.items.forEach((it, ii) => {
        ch._itemCols[ii] = c;   // record each story line's column, to anchor unique collectables
        const _cmds = ch._cmds || [];
        for (const cm of _cmds) if (cm.at === ii) emitEvents(cm.toks, c * TILE);
        const entry = { kind: it.kind, text: it.text, emoji: it.emoji || '', chapter: ci, unlocked: false };
        if (it.kind === 'minor') {
          const prow = GROUND_ROW - PLAT_RISE;
          entry.platform = { c0: c - 1, row: prow, w: 3 };
          const px = c * TILE + TILE / 2;
          entry.w = 30; entry.h = 30;
          entry.x = px - entry.w / 2;
          entry.y = prow * TILE - entry.h - 4;
          entry.icon = '💡';
        } else if (it.kind === 'monster') {
          entry.w = 34; entry.h = 34;
          entry.x = c * TILE + (TILE - entry.w) / 2;
          entry.y = GROUND_ROW * TILE - entry.h;
          entry.homeX = entry.x; entry.vx = (ci % 2 ? -1 : 1) * 34; entry.defeated = false;
          entry.hp = 1; // 1 → 0, drains over BATTLE_SECS of contact (jump-stomp kills instantly)
        } else { // major
          entry.w = 30; entry.h = 30;
          entry.x = c * TILE + (TILE - entry.w) / 2;
          entry.y = GROUND_ROW * TILE - 42;
          entry.icon = '❓';
        }
        items.push(entry);
        c += SPACING;
      });
      { const _cmds = ch._cmds || []; for (const cm of _cmds) if (cm.at >= ch.items.length) emitEvents(cm.toks, c * TILE); }
      const span = MARGIN + ch.items.length * SPACING + END_MARGIN;
      ch.endCol = col + span;
      col = ch.endCol;
    });

    const cols = col + 6;
    const tiles = new Uint8Array(cols * WORLD_ROWS);
    for (let cc = 0; cc < cols; cc++) {
      for (let r = GROUND_ROW; r < WORLD_ROWS; r++) tiles[r * cols + cc] = 1;
    }
    // platforms for minor items
    items.forEach(it => {
      if (it.platform) {
        for (let dc = 0; dc < it.platform.w; dc++) {
          const cc = it.platform.c0 + dc;
          if (cc >= 0 && cc < cols) tiles[it.platform.row * cols + cc] = 2;
        }
      }
    });

    world.cols = cols;
    world.tiles = tiles;
    world.chapters = chapters;
    world.items = items;
    world.goalX = (cols - 4) * TILE;
    world.total = items.length;
    world.events = events.sort((a, b) => a.x - b.x);

    // Era start years parsed from each chapter title (first 4-digit number); used by the timeline.
    world.years = chapters.map((ch, i) => {
      const m = (ch.title || '').match(/\d{4}/);
      return m ? parseInt(m[0], 10) : 2004 + i * 4;
    });

    // Columns occupied by gameplay objects, so scenery (trees/flowers) keeps clear of them.
    world.occupied = new Set();
    const mark = c => { world.occupied.add(c - 1); world.occupied.add(c); world.occupied.add(c + 1); };
    items.forEach(it => {
      mark(Math.round((it.x + it.w / 2) / TILE));
      if (it.platform) for (let dc = -1; dc <= it.platform.w; dc++) world.occupied.add(it.platform.c0 + dc);
    });
    mark(cols - 4);

    // Collectables: floating trails of tokens. Collection is purely a function of the hero's
    // horizontal position (token to the left of him = collected), so it reverses when walking back.
    // Tokens of the same emoji+label share one inventory "bucket" chip, so later lines (positive or
    // negative) add to / subtract from the same running total. A negative line spills its tokens
    // out of the inventory back into the scene as the hero walks past them.
    world.collectables = [];
    world.buckets = new Map();
    // Buckets are keyed by NAME only, so the same item under a different icon (e.g. 👶 女儿 → 👧 女儿,
    // or an emoji → image) shares one chip; the icon just gets replaced as later tokens are collected.
    const bucketFor = (emoji, label) => {
      const key = label || '';

        const k = (def.at || 0) - 1;
        return (k >= 0 && cols[k] != null) ? cols[k] * TILE + TILE / 2 + TILE * 1.6 : x0 + TILE;
      };
      // Build every entry first, recording the anchor (just right of the story line its `+` follows)
      // so a trail can begin at the exact moment it appears — never before its place on the timeline.
      const built = defs.map((def, di) => {
        const sign = def.count < 0 ? -1 : 1, mag = Math.abs(def.count);
        const n = clamp(mag, 1, 12);
        const base = Math.floor(mag / n), rem = mag - base * n;
        const bucket = bucketFor(def.emoji, def.label);
        const entry = { id: ci + ':' + di, emoji: def.emoji, label: def.label, total: def.count, bucket, tokens: [] };
        for (let k = 0; k < n; k++) entry.tokens.push({ value: sign * (base + (k < rem ? 1 : 0)), x: 0, yBase: 0, collected: false });
        world.collectables.push(entry);
        return { entry, ax: clamp(anchorX(def), x0, x1) };
      });

        const tokens = b.entry.tokens;
        if (tokens.length === 1) {
          // a single (unique) item sits right beside its story line, not spread across the chapter
          tokens[0].x = b.ax;
          tokens[0].yBase = GROUND_ROW * TILE - 74;
          return;
        }
        // a bulk trail begins AT this line's anchor and flows rightward, stopping before the next
        // collectable's anchor (or the chapter end), so it never spills back over earlier moments.
        const lo = b.ax;
        let end = x1;
        for (let j = bi + 1; j < built.length; j++) { if (built[j].ax > lo) { end = built[j].ax; break; } }
        const width = Math.min(Math.max(TILE * 2, end - lo), tokens.length * TILE * 1.8);

        });
      });

    // token in the whole world. Only unique items float their custom picture in the scene; bulk

    // to the total, so they don't count toward uniqueness — a unique item stays unique on re-appearance.
    world.labelTokenCount = {};

  // ---------- timeline (current in-game date + scrub-to-jump) ----------
  function dateAt(x) {
    if (!world.chapters.length) return { year: 2004, month: 1 };
    const col = x / TILE;
    const i = chapterIndexAtCol(col);
    const ch = world.chapters[i];
    const span = (ch.endCol - ch.startCol) || 1;
    const f = clamp((col - ch.startCol) / span, 0, 1);
    const y0 = world.years[i];
    const y1 = (i < world.chapters.length - 1) ? world.years[i + 1] : (y0 + 2);
    const yf = y0 + f * (y1 - y0);
    const year = Math.floor(yf);
    return { year, month: clamp(Math.floor((yf - year) * 12) + 1, 1, 12) };
  }
  // Ticks/labels live on a fixed-scale ruler (PX_PER_COL px per world column). On a narrow
  // screen the ruler is wider than the viewport, so it scrolls instead of compressing; year
  // labels sit below the ticks.
  function rulerWidth() { return world.cols * PX_PER_COL; }
  function buildTimeline() {
    const ruler = els.tlRuler;
    ruler.querySelectorAll('.ds-tl-tick, .ds-tl-lab').forEach(n => n.remove());
    ruler.style.width = rulerWidth() + 'px';
    const frag = document.createDocumentFragment();
    world.chapters.forEach((ch, i) => {
      const major = document.createElement('div'); major.className = 'ds-tl-tick major'; major.style.left = (ch.startCol * PX_PER_COL) + 'px'; frag.appendChild(major);
      const lab = document.createElement('div'); lab.className = 'ds-tl-lab'; lab.style.left = (ch.startCol * PX_PER_COL) + 'px'; lab.textContent = world.years[i]; frag.appendChild(lab);
      const y0 = world.years[i], y1 = (i < world.chapters.length - 1) ? world.years[i + 1] : (y0 + 2);
      const span = (ch.endCol - ch.startCol) || 1;
      for (let yy = y0 + 1; yy < y1; yy++) {
        const col = ch.startCol + ((yy - y0) / (y1 - y0)) * span;
        const mt = document.createElement('div'); mt.className = 'ds-tl-tick'; mt.style.left = (col * PX_PER_COL) + 'px'; frag.appendChild(mt);
      }

  function updateTimeline() {
    const rw = rulerWidth();
    const vw = els.timeline.clientWidth || 1;

    els.tlThumb.style.left = thumbX + 'px';

    // date readout (e.g. "2004年 5月") is never clipped at the start/finish of the timeline.
    const PAD = 58;
    const offset = clamp(vw / 2 - thumbX, Math.min(PAD, vw - PAD - rw), PAD);
    els.tlRuler.style.transform = 'translateX(' + offset + 'px)';

  // The engine is reusable: a "story" is just Markdown. Anyone can write their own life as a story,
  // save it to their own KeepWork personal page store, and share it by URL — the SAME html file
  // loads any of them, so one engine powers everyone's stories.

  // One markdown file holds the story, then (optionally) the item docs after an @@ITEMS@@ line.
  const STORY_DIR = 'stories';
  const ITEMS_DELIM = '@@ITEMS@@';

  // KeepworkSDK is loaded from CDN ON DEMAND — only when the maker or a shared link needs it.
  let _sdkPromise = null;
  function ensureSdk() {
    if (window.__haqiDevstorySdk) return Promise.resolve(window.__haqiDevstorySdk);
    if (_sdkPromise) return _sdkPromise;
    _sdkPromise = new Promise((resolve, reject) => {
      if (window.KeepworkSDK) return resolve();
      const s = document.createElement('script');
      s.src = 'https://cdn.keepwork.com/sdk/keepworkSDK.iife.js?v=20260627a';
      s.async = true; s.onload = () => resolve(); s.onerror = () => reject(new Error('SDK load failed'));
      document.head.appendChild(s);
    }).then(() => {
      if (!window.KeepworkSDK) throw new Error('KeepworkSDK undefined');
      const sdk = window.keepwork || new window.KeepworkSDK({ timeout: 30000 });
      try { if (sdk.setUserApiKey && window.KeepworkSDK.API_KEYS && window.KeepworkSDK.API_KEYS.maisi) sdk.setUserApiKey(window.KeepworkSDK.API_KEYS.maisi); } catch (_) {}
      window.__haqiDevstorySdk = sdk;
      return sdk;
    }).catch((e) => { _sdkPromise = null; throw e; });
    return _sdkPromise;

  // one combined markdown file  <->  { story, items }
  function splitStoryMarkdown(md) {
    const text = String(md || '');
    const m = text.match(new RegExp('^\\s*' + ITEMS_DELIM + '\\s*$', 'm'));
    if (!m) return { story: text, items: '' };
    return { story: text.slice(0, m.index).replace(/\s+$/, ''), items: text.slice(m.index + m[0].length).replace(/^\s+/, '') };
  }
  function joinStoryMarkdown(story, items) {
    const s = String(story || '').replace(/\s+$/, '');
    const i = String(items || '').trim();
    return i ? (s + '\n\n' + ITEMS_DELIM + '\n' + i + '\n') : (s + '\n');
  }

  // apply a story to the running game and rebuild the world

    if (typeof items === 'string') { game_config.itemMarkdown = items; itemDocs = parseItemDocs(items); rebuildSprites(); }

  // fetch a shared story (from a personal page store, or a plain URL) and run it
  async function loadSharedStory(opts) {

      const clean = String(story).replace(/^\/+/, '').replace(/\\/g, '/');
      if (clean.includes('..') || !/^[\w./-]+$/.test(clean)) throw new Error('bad story path');
      const abs = '//' + String(from).replace(/[^\w-]/g, '') + '/edunotes/store/' + 'MagicHaqi' + '/' + clean;
      text = (await sdk.personalPageStore.readFile(abs, 1, 99999)) || '';

  async function makerAiGenerate() {
    const desc = (maker.ai.value || '').trim();
    if (!desc) { showMakerStatus(t('makerGenEmpty'), 'err'); return; }
    showMakerStatus(t('makerGenerating'));
    try {
      const sdk = await ensureSdk();
      if (!sdk.aiChat || !sdk.aiChat.createSession) throw new Error('aiChat unavailable');
      const sess = sdk.aiChat.createSession({ systemPrompt: AI_SYSTEM_PROMPT, modId: 'magichaqi', chatId: 'devstory_maker' });
      const userMsg = (maker.name.value ? ('标题：' + maker.name.value + '\n') : '') + desc;
      let full = '';
      if (typeof sess.send === 'function') {
        const r = await sess.send(userMsg, { onChunk: (d) => { if (typeof d === 'string') { full += d; maker.story.value = stripFence(full); } } });
        if (!full && typeof r === 'string') full = r;
        if (!full && r && r.text) full = r.text;
      } else if (sdk.aiChat.chat) {
        const r = await sdk.aiChat.chat({ messages: [{ role: 'system', content: AI_SYSTEM_PROMPT }, { role: 'user', content: userMsg }] });
        full = (r && r.text) || r || '';
      }
      full = stripFence(full);
      if (!full.trim()) throw new Error('empty');
      const parts = splitStoryMarkdown(full);
      maker.story.value = parts.story;
      if (parts.items) maker.item.value = parts.items;
      if (maker.status) maker.status.hidden = true;
    } catch (e) {
      console.warn('ai generate failed', e);
      showMakerStatus(t('makerGenFail'), 'err');
    }
  }

  async function copyText(text) {
    try { if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); return true; } } catch (_) {}
    try {
      const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); return true;
    } catch (_) { return false; }
  }

  async function makerSaveShare() {
    const story = (maker.story.value || '').trim();
    if (!story) { showMakerStatus(t('makerEmpty'), 'err'); return; }
    showMakerStatus(t('makerSaving'));
    try {
      const sdk = await ensureSdk();
      let user = null;
      try { user = sdk.getCurrentUser && await sdk.getCurrentUser(); } catch (_) {}
      if ((!user || !user.username) && sdk.loginWindow && sdk.loginWindow.open) {
        try { await sdk.loginWindow.open(); } catch (_) {}
        try { user = sdk.getCurrentUser && await sdk.getCurrentUser(); } catch (_) {}
      }

      if (!username) { showMakerStatus(t('makerLoginNeeded'), 'err'); return; }

  // Banner shows just the era name — strip a leading "YYYY-YYYY：" date prefix so the title stays
  // short and never clips. The full title (with year) is kept in the data for the timeline & card.
  function chapterTitle(ch) {
    if (!ch) return t('chapterDefault');
    const s = (ch.title || '').trim();
    const m = s.match(/^[^：:]*\d[^：:]*[：:]\s*(.+)$/);
    return m ? m[1].trim() : (s || t('chapterDefault'));
  }
  // big centered title shown at the start of each chapter (full title incl. the year range,
  // e.g. "2004–2009：游戏引擎的诞生"). Rendered on one line, or split into two at the colon
  // ("2004–2009：" / "游戏引擎的诞生"); neither line wraps — the font auto-scales to fit width.
  function chapterTitleLines(ch) {
    const s = (ch && (ch.title || '').trim()) || chapterTitle(ch);
    const i = s.search(/[：:]/);
    if (i >= 0 && i < s.length - 1) return [s.slice(0, i + 1).trim(), s.slice(i + 1).trim()];
    return [s];
  }
  function fitChapterTitle() {
    const el = els.bigTitle;
    if (!el || !el.firstChild) return;
    const MAX = 48, MIN = 14;
    el.style.fontSize = MAX + 'px';
    const avail = (shell ? shell.clientWidth : viewW) * 0.9;
    let w = 0;
    el.querySelectorAll('.ds-ct-line').forEach(ln => { w = Math.max(w, ln.scrollWidth); });
    if (w > avail) el.style.fontSize = Math.max(MIN, Math.floor(MAX * avail / w)) + 'px';
  }
  function showChapterTitle(ci) {
    const ch = world.chapters[ci];
    if (!ch || !els.bigTitle) return;
    // don't flash the title when resuming a save deep inside a chapter: only show it if the
    // hero is still near this chapter's start (i.e. it would not already have faded out).
    if (player.x - ch.startCol * TILE > TILE * 7) return;
    const lines = chapterTitleLines(ch);
    els.bigTitle.innerHTML = lines.map(() => '<span class="ds-ct-line"></span>').join('');
    lines.forEach((line, k) => {
      const span = els.bigTitle.children[k]; if (span) span.textContent = line;
    });
    fitChapterTitle();
    state.bigTitleX = player.x;
    // re-trigger the CSS fade even if it was already showing for a previous chapter
    els.bigTitle.classList.remove('show');
    void els.bigTitle.offsetWidth;
    els.bigTitle.classList.add('show');
  }

  // ---------- narrative card ----------
  // The card stays visible while the protagonist is near the memory. It hides only when he
  // walks far enough away, or the player taps the close button; walking back near re-shows it.
  const CARD_RANGE = TILE * 2.2;
  function renderCard(it) {
    els.cardText.textContent = (it.kind === 'monster' && it.emoji ? it.emoji + ' ' : '') + (it.text || '');
  }
  function showCard(it) { state.cardItem = it; state.cardDismissed = null; renderCard(it); els.card.classList.add('show'); }
  function hideCard() { els.card.classList.remove('show'); state.cardItem = null; }
  function updateCard() {
    const pcx = player.x + player.w / 2;
    let near = null, best = 1e9;
    for (const it of world.items) {
      const got = it.kind === 'monster' ? it.defeated : it.unlocked;
      if (!got) continue;
      const d = Math.abs(pcx - (it.x + it.w / 2));
      if (d < CARD_RANGE && d < best) { best = d; near = it; }
    }
    if (!near) { state.cardDismissed = null; if (state.cardItem) hideCard(); return; }
    if (near === state.cardDismissed) { if (state.cardItem) hideCard(); return; } // user closed this one, still nearby
    state.cardDismissed = null;
    if (state.cardItem !== near) showCard(near);
  }

  // ---------- inventory (position-based collectables) ----------
  // A token's value is added to its bucket while it sits behind the hero (collected). Positive
  // tokens raise the bucket total, negative tokens lower it — same rule, opposite sign.
  function sumBuckets() {
    for (const b of world.buckets.values()) { b.collected = 0; b._iconX = -Infinity; }
    for (const def of world.collectables || []) {
      for (const tk of def.tokens) {
        if (!tk.collected) continue;
        def.bucket.collected += tk.value;
        // the rightmost (latest) collected token wins the icon, so 👶→👧 swaps as the story advances
        if (tk.x > def.bucket._iconX) { def.bucket._iconX = tk.x; def.bucket.emoji = def.emoji; }
      }
    }
  }
  function computeInventory() {
    const pcx = player.x + player.w / 2;
    for (const def of world.collectables || []) {
      for (const tk of def.tokens) tk.collected = pcx >= tk.x;
    }
    sumBuckets();
  }
  // Each frame: collected = tokens behind the hero. Detect crossings to animate + refresh chips.
  function updateInventory() {
    const pcx = player.x + player.w / 2;
    let changed = false;
    for (const def of world.collectables || []) {
      for (const tk of def.tokens) {
        const c = pcx >= tk.x;
        if (c !== tk.collected) {
          tk.collected = c; changed = true;
          const sx = tk.x - camera.x;
          // positive: crossing right flies into the inventory; negative is reversed — crossing right
          // flies out of the inventory back into the scene.
          if (sx > -40 && sx < viewW + 40) spawnFly(def, tk, c === (tk.value >= 0));
        }
      }
    }
    if (changed) { sumBuckets(); renderInventory(); }
  }
  // Render an icon (emoji glyph or markdown image) into an element. Reused by chips and the fly sprite.
  function setIcon(el, icon) {
    const v = icon || '⭐';
    if (isImgIcon(v)) { el.innerHTML = ''; const img = document.createElement('img'); img.src = imgUrlOf(v); img.alt = ''; el.appendChild(img); }
    else { el.textContent = v; }
  }
  function renderInventory() {
    for (const b of world.buckets.values()) {
      if (b.collected > 0) {
        if (!b.chipEl) {
          const c = document.createElement('div'); c.className = 'ds-chip'; c.title = b.label || ''; c.setAttribute('role', 'button'); c.tabIndex = 0;
          const num = document.createElement('b'); num.className = 'num';
          const em = document.createElement('span'); em.className = 'em';
          const lab = document.createElement('span'); lab.className = 'lab'; lab.textContent = b.label || '';
          c.appendChild(num); c.appendChild(em); c.appendChild(lab);
          c.addEventListener('click', () => openItemDoc(b));
          c.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openItemDoc(b); } });
          b.chipEl = c; b.chipNum = num; b.chipEm = em; els.inv.appendChild(c);
        }
        // a sprite directive (if any) fills the slot as its background; otherwise show the emoji
        const sp = itemSprites[b.label];
        if (sp) {
          if (b.spriteShown !== sp) { b.chipEm.innerHTML = ''; b.chipEm.appendChild(makeSpriteCanvas(sp, 'ds-chipimg')); b.chipEl.classList.add('has-img'); b.spriteShown = sp; b.emojiShown = null; }
        } else if (b.emojiShown !== b.emoji) { setIcon(b.chipEm, b.emoji); b.emojiShown = b.emoji; }
        if (b.chipShown !== b.collected) {
          b.chipNum.textContent = b.collected;
          if (b.collected > (b.chipShown < 0 ? 0 : b.chipShown)) { b.chipEl.classList.remove('bump'); void b.chipEl.offsetWidth; b.chipEl.classList.add('bump'); }
          b.chipShown = b.collected;
        }
        b.chipEl.style.display = '';
      } else if (b.chipEl) {
        b.chipEl.style.display = 'none';
        b.chipShown = 0;
      }
    }
  }
  // Popup the item's description (basic markdown) in a scrollable dialog with a close button.
  function openItemDoc(b) {
    if (!b) return;
    setIcon(els.itemEm, b.emoji);
    els.itemTitle.textContent = b.label || '';
    // a leading sprite directive (![](url#x_y_w_h)) renders as its CROPPED sub-region at the top of
    // the popup (never the whole sheet); the rest of the description follows as markdown.
    const sp = itemSprites[b.label];
    const doc = (itemDocs[b.label] || '').replace(SPRITE_RE, '').trim();
    els.itemBody.innerHTML = doc ? mdToHtml(doc) : (sp ? '' : '<p class="ds-itemdoc-empty">' + escHtml(t('noItemDoc')) + '</p>');
    if (sp) els.itemBody.insertBefore(makeSpriteCanvas(sp), els.itemBody.firstChild);
    els.itemBody.scrollTop = 0;
    els.itemOverlay.hidden = false;
  }
  function spawnFly(def, tk, toInv) {
    const sx = tk.x - camera.x, sy = tk.yBase - camera.y;
    const ref = def.bucket.chipEl || els.inv;
    const r = ref.getBoundingClientRect();
    const ix = r.left + Math.min(r.width / 2, 40), iy = r.top + r.height / 2;
    const from = toInv ? { x: sx, y: sy } : { x: ix, y: iy };
    const to = toInv ? { x: ix, y: iy } : { x: sx, y: sy };
    const el = document.createElement('div'); el.className = 'ds-fly';
    // match the scene token: only UNIQUE items fly their picture; bulk items fly the emoji
    const fsp = world.labelTokenCount[def.label] === 1 ? itemSprites[def.label] : null;
    if (fsp) el.appendChild(makeSpriteCanvas(fsp, 'ds-flyimg')); else setIcon(el, def.emoji);
    el.style.transform = 'translate(' + from.x + 'px,' + from.y + 'px)';
    el.style.opacity = '1';
    root.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = 'translate(' + to.x + 'px,' + to.y + 'px) scale(' + (toInv ? 0.6 : 1.15) + ')';
      el.style.opacity = '0.15';
    }));
    setTimeout(() => el.remove(), 560);
  }

  function unlock(item) {
    if (item.unlocked) return;
    item.unlocked = true;
    state.unlocked++;
    els.prog.textContent = state.unlocked;
    showCard(item);
    audio.sfx(item.kind === 'monster' ? 'defeat' : 'unlock');
    post('gameProgress', { unlocked: state.unlocked, total: world.total });
    spawnPop(item.x + item.w / 2, item.y + item.h / 2);
    saveProgress();
  }

  // ---------- particles ----------
  const particles = [];
  function spawnPop(x, y) {
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 120;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60, life: 0.6 + Math.random() * 0.3, c: ['#fbbf24', '#34d399', '#60a5fa', '#f472b6'][i % 4] });
    }
  }
  // small impact burst at the fist on each battle stroke
  function spawnHit(x, y) {
    for (let i = 0; i < 5; i++) {
      const a = Math.random() * Math.PI * 2, sp = 70 + Math.random() * 90;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30, life: 0.18 + Math.random() * 0.14, c: ['#fff7cc', '#ffd54a', '#ff8a3d'][i % 3] });
    }
  }

  // ---------- physics ----------
  // True if any tile in row `row` is solid across the actor's horizontal span.
  function rowSolid(x, w, row) {
    const c0 = Math.floor(x / TILE), c1 = Math.floor((x + w - 1) / TILE);
    for (let c = c0; c <= c1; c++) if (isSolid(tileAt(c, row))) return true;
    return false;
  }
  // Axis-separated movement that SNAPS to exact tile boundaries (no integer step-back loop, so a
  // resting actor lands on the same pixel every frame — fixes the 1px standing jitter).
  function moveActor(a, dt) {
    // horizontal
    if (a.vx) {
      const nx = a.x + a.vx * dt;
      const r0 = Math.floor(a.y / TILE), r1 = Math.floor((a.y + a.h - 1) / TILE);
      if (a.vx > 0) {
        const col = Math.floor((nx + a.w - 1) / TILE);
        let hit = false; for (let r = r0; r <= r1; r++) if (isSolid(tileAt(col, r))) { hit = true; break; }
        if (hit) { a.x = col * TILE - a.w; a.vx = 0; } else a.x = nx;
      } else {
        const col = Math.floor(nx / TILE);
        let hit = false; for (let r = r0; r <= r1; r++) if (isSolid(tileAt(col, r))) { hit = true; break; }
        if (hit) { a.x = (col + 1) * TILE; a.vx = 0; } else a.x = nx;
      }
    }
    // vertical (gravity)
    a.vy = clamp(a.vy + GRAVITY * dt, -2000, MAX_FALL);
    const ny = a.y + a.vy * dt;
    a.grounded = false;
    a.headBumpRow = -1;
    if (a.vy >= 0) {
      const row = Math.floor((ny + a.h) / TILE);
      if (rowSolid(a.x, a.w, row)) { a.y = row * TILE - a.h; a.vy = 0; a.grounded = true; }
      else a.y = ny;
    } else {
      const row = Math.floor(ny / TILE);
      if (rowSolid(a.x, a.w, row)) { a.y = (row + 1) * TILE; a.vy = 0; a.headBumpRow = row; }
      else a.y = ny;
    }
  }

  function jump() {
    if (player.grounded) { player.vy = -JUMP_SPEED; player.grounded = false; audio.sfx('jump'); }
  }

  // ---------- update ----------
  function update(dt) {
    const axis = getAxis();
    player.vx = axis * MOVE_SPEED;
    if (axis < -0.05) player.dir = -1; else if (axis > 0.05) player.dir = 1;
    if (input.jumpQueued) { input.jumpQueued = false; jump(); }
    moveActor(player, dt);
    if (Math.abs(player.vx) > 4 && player.grounded) player.anim += dt * 10;

    // remember a safe spot while standing on solid ground
    if (player.grounded && player.y + player.h <= (GROUND_ROW + 0.5) * TILE + 2) {
      player.lastSafe.x = player.x; player.lastSafe.y = player.y;
    }
    // fell out of the world → gently respawn (no death)
    if (player.y > WORLD_H + 80) {
      player.x = player.lastSafe.x; player.y = player.lastSafe.y - 8; player.vx = 0; player.vy = 0;
      audio.sfx('bump');
    }

    // Super-Mario style: bumping a platform from below collects the memory resting on it.
    if (player.headBumpRow >= 0) {
      const pc0 = Math.floor(player.x / TILE), pc1 = Math.floor((player.x + player.w - 1) / TILE);
      for (const it of world.items) {
        if (it.kind === 'minor' && !it.unlocked && it.platform && it.platform.row === player.headBumpRow &&
            pc1 >= it.platform.c0 && pc0 <= it.platform.c0 + it.platform.w - 1) {
          it.bumpT = nowMs();
          unlock(it);
        }
      }
    }

    // items
    for (const it of world.items) {
      if (it.kind === 'monster') {
        if (it.defeated) continue;
        // patrol
        it.x += it.vx * dt;
        if (it.x < it.homeX - TILE * 1.4) { it.x = it.homeX - TILE * 1.4; it.vx *= -1; }
        if (it.x > it.homeX + TILE * 1.4) { it.x = it.homeX + TILE * 1.4; it.vx *= -1; }
        if (intersects(player, it)) {
          // Reliable stomp: coming down onto the top of the monster.
          const fromAbove = player.vy > 40 && (player.y + player.h) < it.y + it.h * 0.8;
          if (fromAbove) {
            // Jumping on its head is the quick kill — defeat it instantly.
            it.hp = 0;
            it.defeated = true;
            player.vy = -JUMP_SPEED * 0.6;
            unlock(it);
          } else if (!it.unlocked) {
            // Walking into it triggers an auto-battle: its health drains over
            // BATTLE_SECS of contact, then it's defeated. Stepping away leaves the
            // health where it is, so you can walk past without fully killing it.
            it.hp = Math.max(0, it.hp - dt / BATTLE_SECS);
            it.battleT = nowMs();
            player.battleT = nowMs();
            player.dir = (it.x + it.w / 2) >= (player.x + player.w / 2) ? 1 : -1; // face the monster
            // discrete strokes: each lands a punch — sound + impact spark + arm thrust
            if (nowMs() - (player.strokeT || 0) > STROKE_MS) {
              player.strokeT = nowMs();
              audio.sfx('hit');
              spawnHit(player.x + player.w / 2 + player.dir * (player.w / 2 + 10), player.y + 24);
            }
            if (it.hp <= 0) {
              it.defeated = true;
              unlock(it);
            } else {
              // Gentle resistance so the monster feels like a guard, but never a hard
              // wall: moveActor already advanced the player this frame, so a small
              // push-back keeps net motion forward (no soft-lock). Jump to stomp it.
              player.x -= player.dir * 2;
            }
          }
        }
      } else {
        if (it.unlocked) continue;
        if (intersects(player, it)) unlock(it);
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt; if (p.life <= 0) { particles.splice(i, 1); continue; }
      p.vy += 320 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    }

    // active chapter banner
    const px = player.x + player.w / 2;
    let ci = 0;
    for (let i = 0; i < world.chapters.length; i++) {
      if (px >= world.chapters[i].startCol * TILE) ci = i; else break;
    }
    if (ci !== state.activeChapter) {
      state.activeChapter = ci;
      els.banner.textContent = chapterTitle(world.chapters[ci]);
      showChapterTitle(ci);
    }
    // big centered chapter title fades out once the hero has walked some distance in
    if (els.bigTitle && els.bigTitle.classList.contains('show') &&
        Math.abs(player.x - state.bigTitleX) > TILE * 7) {
      els.bigTitle.classList.remove('show');
    }

    // memory card follows proximity to unlocked memories
    updateCard();
    // collectables collected/returned purely by horizontal position
    updateInventory();

    // reach goal → finish
    if (!state.finished && player.x + player.w >= world.goalX) finish();

    // camera
    const targetX = clamp(player.x + player.w / 2 - viewW * 0.42, 0, Math.max(0, world.cols * TILE - viewW));
    camera.x = lerp(camera.x, targetX, 1 - Math.pow(0.0001, dt));
    camera.y = WORLD_H - viewH; // align world bottom to screen bottom (calm, no vertical scroll)

    updateTimeline();
    // throttled autosave of progress + position
    if (nowMs() - lastSave > 1500) { lastSave = nowMs(); saveProgress(); }
  }

  // ---------- atmosphere: day/night + weather + skyline (driven by slash-commands) ----------
  // `atmos` is the live, smoothly-lerped scene state; each frame we read the target from
  // world.events at the hero's position and ease toward it (instant when state.atmosSnap is set,
  // e.g. on load / timeline scrub). Colours are RGB arrays so they can be interpolated.
  const SKY = {
    day:   { top: [124, 199, 255], mid: [189, 224, 254], bot: [230, 245, 239], dark: 0.0,  star: 0 },
    dawn:  { top: [255, 154, 120], mid: [255, 214, 165], bot: [253, 233, 210], dark: 0.16, star: 0.15 },
    dusk:  { top: [59, 58, 107],   mid: [201, 111, 134], bot: [246, 199, 155], dark: 0.42, star: 0.4 },
    night: { top: [10, 18, 52],    mid: [26, 40, 92],    bot: [44, 56, 110],   dark: 0.82, star: 1 },
  };
  const atmos = {
    dark: 0, star: 0, cloud: 0.25, rain: 0, snow: 0, wind: 0, city: 0,
    top: SKY.day.top.slice(), mid: SKY.day.mid.slice(), bot: SKY.day.bot.slice(),
  };
  function lerpArr(a, b, k) { return [lerp(a[0], b[0], k), lerp(a[1], b[1], k), lerp(a[2], b[2], k)]; }
  function rgb(a) { return 'rgb(' + (a[0] | 0) + ',' + (a[1] | 0) + ',' + (a[2] | 0) + ')'; }
  function resolveAtmos(st) {
    const s = SKY[st.sky] || SKY.day;
    let cloud = st.clouds === 'overcast' ? 1 : st.clouds === 'cloudy' ? 0.6 : 0.25;
    const rain = st.precip === 'rain' ? 1 : 0;
    const snow = st.precip === 'snow' ? 1 : 0;
    if (rain) cloud = Math.max(cloud, 0.95);
    if (snow) cloud = Math.max(cloud, 0.7);
    const wind = st.wind === 'on' ? 1 : 0;
    const city = st.scene === 'city' ? 1 : 0;
    const dark = Math.min(0.9, s.dark + (st.clouds === 'overcast' ? 0.12 : 0) + (rain ? 0.1 : 0));
    return { top: s.top, mid: s.mid, bot: s.bot, dark, star: s.star, cloud, rain, snow, wind, city };
  }
  function updateAtmos() {
    const px = player.x + player.w / 2;
    const st = { sky: 'day', clouds: 'clear', precip: 'none', wind: 'off', scene: 'nature' };
    const evs = world.events || [];
    for (const ev of evs) { if (ev.x <= px) st[ev.channel] = ev.value; else break; }
    const tg = resolveAtmos(st);
    const k = state.atmosSnap ? 1 : 0.06;
    state.atmosSnap = false;
    atmos.dark = lerp(atmos.dark, tg.dark, k);
    atmos.star = lerp(atmos.star, tg.star, k);
    atmos.cloud = lerp(atmos.cloud, tg.cloud, k);
    atmos.rain = lerp(atmos.rain, tg.rain, k);
    atmos.snow = lerp(atmos.snow, tg.snow, k);
    atmos.wind = lerp(atmos.wind, tg.wind, k);
    atmos.city = lerp(atmos.city, tg.city, k);
    atmos.top = lerpArr(atmos.top, tg.top, k);
    atmos.mid = lerpArr(atmos.mid, tg.mid, k);
    atmos.bot = lerpArr(atmos.bot, tg.bot, k);
  }

  // starfield (screen-space, faint parallax) — fades in as the sky darkens
  const stars = [];
  function ensureStars() { if (stars.length) return; for (let i = 0; i < 90; i++) stars.push({ x: hash(i * 1.3), y: hash(i * 2.7) * 0.5, r: 0.6 + hash(i * 3.1) * 1.5, tw: hash(i * 4.9) * 6.28 }); }
  function drawStars() {
    const a = clamp((atmos.dark - 0.28) / 0.6, 0, 1); if (a <= 0.01) return;
    ctx.fillStyle = '#fdfdff';
    const period = viewW;
    for (const s of stars) {
      const tw = 0.55 + 0.45 * Math.sin(nowMs() * 0.002 + s.tw * 7);
      ctx.globalAlpha = a * tw;
      let X = (s.x * viewW - camera.x * 0.04) % period; if (X < 0) X += period;
      ctx.beginPath(); ctx.arc(X, s.y * viewH, s.r, 0, 6.3); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // sun by day, moon by night — fixed high on screen, behind the skyline/clouds
  function drawCelestial() {
    const cx = viewW * 0.8, cy = viewH * 0.18;
    const sunA = clamp(1 - atmos.dark * 1.7, 0, 1);
    if (sunA > 0.01) {
      ctx.globalAlpha = sunA * 0.28; ctx.fillStyle = '#fff3b0'; ctx.beginPath(); ctx.arc(cx, cy, 46, 0, 6.3); ctx.fill();
      ctx.globalAlpha = sunA; ctx.fillStyle = '#ffe680'; ctx.beginPath(); ctx.arc(cx, cy, 26, 0, 6.3); ctx.fill();
    }
    const moonA = clamp((atmos.dark - 0.34) / 0.5, 0, 1);
    if (moonA > 0.01) {
      ctx.globalAlpha = moonA * 0.3; ctx.fillStyle = '#dfe8ff'; ctx.beginPath(); ctx.arc(cx, cy, 38, 0, 6.3); ctx.fill();
      ctx.globalAlpha = moonA; ctx.fillStyle = '#eef3ff'; ctx.beginPath(); ctx.arc(cx, cy, 21, 0, 6.3); ctx.fill();
      ctx.fillStyle = rgb(atmos.top); ctx.beginPath(); ctx.arc(cx + 9, cy - 5, 19, 0, 6.3); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // parallax skyscraper skyline (far band, behind the hills) — windows light up at night
  function drawSkyline() {
    const amt = atmos.city; if (amt < 0.02) return;
    const base = GROUND_ROW * TILE - camera.y + 10;
    const p = 0.22, spacing = 58;
    const startIdx = Math.floor((camera.x * p) / spacing) - 1;
    const endIdx = startIdx + Math.ceil(viewW / spacing) + 3;
    const lit = clamp((atmos.dark - 0.2) / 0.5, 0, 1);
    for (let idx = startIdx; idx <= endIdx; idx++) {
      const x = idx * spacing - camera.x * p;
      const s1 = hash(idx * 2.17), s2 = hash(idx * 5.31);
      const bw = 30 + Math.floor(s1 * 24);
      const bh = 64 + Math.floor(s2 * 150);
      const bx = x + (spacing - bw) / 2, by = base - bh;
      const body = lerpArr([150, 165, 188], [38, 46, 74], clamp(atmos.dark, 0, 1));
      ctx.globalAlpha = amt;
      ctx.fillStyle = rgb(body); ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = rgb(lerpArr(body, [255, 255, 255], 0.12)); ctx.fillRect(bx, by, bw, 4);
      const cols = Math.max(2, Math.floor(bw / 9)), rows = Math.floor(bh / 12);
      for (let wr = 0; wr < rows; wr++) {
        for (let wc = 0; wc < cols; wc++) {
          const wx = bx + 4 + wc * 9, wy = by + 8 + wr * 12;
          if (wx + 5 > bx + bw - 2) continue;
          const on = hash(idx * 13.1 + wr * 3.7 + wc * 1.9) > 0.45;
          if (lit > 0.05 && on) { ctx.globalAlpha = amt * (0.5 + 0.5 * lit); ctx.fillStyle = '#ffe9a8'; }
          else { ctx.globalAlpha = amt * 0.5; ctx.fillStyle = lit > 0.5 ? '#2a3350' : '#cfe0f2'; }
          ctx.fillRect(wx, wy, 5, 6);
        }
      }
    }
    ctx.globalAlpha = 1;
  }
  // rain / snow particle pools (screen-space; slanted/drifted by wind)
  const rainDrops = [], snowFlakes = [];
  function newDrop() { return { x: Math.random() * (viewW + 140) - 70, y: Math.random() * viewH, len: 11 + Math.random() * 11, sp: 11 + Math.random() * 8 }; }
  function newFlake() { return { x: Math.random() * (viewW + 80) - 40, y: Math.random() * viewH, r: 1.5 + Math.random() * 2.5, sp: 1.1 + Math.random() * 1.6, dr: Math.random() * 6.28 }; }
  function drawPrecip() {
    const rt = Math.floor(atmos.rain * atmos.rain * 320);
    while (rainDrops.length < rt) rainDrops.push(newDrop());
    if (rainDrops.length) {
      const slant = 0.28 + atmos.wind * 1.2;
      ctx.strokeStyle = 'rgba(200,218,240,' + (0.3 + 0.45 * atmos.rain) + ')';
      ctx.lineWidth = 1.4; ctx.beginPath();
      for (let i = rainDrops.length - 1; i >= 0; i--) {
        const d = rainDrops[i]; d.y += d.sp; d.x += d.sp * slant;
        if (d.y > viewH + 12) {
          if (rainDrops.length > rt) { rainDrops.splice(i, 1); continue; }
          d.y = -14 - Math.random() * 40; d.x = Math.random() * (viewW + 140) - 70;
        } else if (d.x > viewW + 70) {
          // strong wind slant pushes drops off the right edge faster than they fall;
          // wrap them back to the left so the storm keeps covering the full screen
          d.x -= viewW + 140;
        }
        ctx.moveTo(d.x, d.y); ctx.lineTo(d.x - slant * d.len, d.y - d.len);
      }
      ctx.stroke();
    }
    const stk = Math.floor(atmos.snow * 200);
    while (snowFlakes.length < stk) snowFlakes.push(newFlake());
    if (snowFlakes.length) {
      ctx.fillStyle = 'rgba(255,255,255,' + (0.55 + 0.35 * atmos.snow) + ')';
      const drift = 0.6 + atmos.wind * 2.2;
      for (let i = snowFlakes.length - 1; i >= 0; i--) {
        const f = snowFlakes[i]; f.y += f.sp; f.dr += 0.03; f.x += Math.sin(f.dr) * drift;
        if (f.y > viewH + 8) {
          if (snowFlakes.length > stk) { snowFlakes.splice(i, 1); continue; }
          f.y = -10 - Math.random() * 30; f.x = Math.random() * (viewW + 80) - 40;
        }
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, 6.3); ctx.fill();
      }
    }
  }
  // faint wind streaks across the screen when it is windy but not raining
  function drawWind() {
    if (atmos.wind < 0.25 || atmos.rain > 0.3) return;
    const n = Math.round(atmos.wind * 5);
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.1 * atmos.wind) + ')'; ctx.lineWidth = 2;
    for (let i = 0; i < n; i++) {
      const yy = (i * 71 % Math.max(1, viewH - 40)) + 20;
      const phase = (nowMs() * 0.0007 + i * 0.37) % 1;
      const xx = phase * (viewW + 220) - 110;
      ctx.beginPath(); ctx.moveTo(xx, yy); ctx.quadraticCurveTo(xx + 46, yy - 7, xx + 92, yy); ctx.stroke();
    }
  }

  // ---------- draw ----------
  function draw() {
    ensureClouds(); ensureStars();
    updateAtmos();
    // sky (day/night palette, smoothly lerped)
    const g = ctx.createLinearGradient(0, 0, 0, viewH);
    g.addColorStop(0, rgb(atmos.top)); g.addColorStop(0.55, rgb(atmos.mid)); g.addColorStop(1, rgb(atmos.bot));
    ctx.fillStyle = g; ctx.fillRect(0, 0, viewW, viewH);

    drawStars();
    drawCelestial();
    drawSkyline();
    drawClouds();
    drawHills();

    const ox = -camera.x, oy = -camera.y;
    const c0 = Math.max(0, Math.floor(camera.x / TILE) - 1);
    const c1 = Math.min(world.cols - 1, Math.floor((camera.x + viewW) / TILE) + 1);

    drawTrees(ox, oy, c0, c1);

    // ground tiles (biome-tinted) — surface row gets a grass cap, fill rows are dirt
    for (let c = c0; c <= c1; c++) {
      const b = biomeAtCol(c);
      for (let r = GROUND_ROW; r < WORLD_ROWS; r++) {
        const v = world.tiles[r * world.cols + c];
        if (!v) continue;
        const x = c * TILE + ox, y = r * TILE + oy;
        if (r === GROUND_ROW) {
          ctx.fillStyle = b.dirt1; ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = b.grassTop; ctx.fillRect(x, y, TILE, 9);
          ctx.fillStyle = b.grassEdge; ctx.fillRect(x, y + 7, TILE, 3);
        } else {
          ctx.fillStyle = (r + c) % 2 ? b.dirt1 : b.dirt2; ctx.fillRect(x, y, TILE, TILE);
          if (hash(r * 31 + c) > 0.84) { ctx.fillStyle = b.dirt2; ctx.fillRect(x + 6, y + 8, 5, 5); }
        }
      }
    }
    drawGroundDetail(ox, oy, c0, c1);
    // platforms (value 2 may be above ground row)
    for (let c = c0; c <= c1; c++) {
      for (let r = 0; r < GROUND_ROW; r++) {
        if (world.tiles[r * world.cols + c] === 2) {
          const x = c * TILE + ox, y = r * TILE + oy;
          ctx.fillStyle = '#caa472'; ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = '#8c6239'; ctx.fillRect(x, y + TILE - 6, TILE, 6);
          ctx.fillStyle = '#9bd96b'; ctx.fillRect(x, y, TILE, 5);
        }
      }
    }

    // goal flag
    const gx = world.goalX + ox, gy = GROUND_ROW * TILE + oy;
    if (gx > -60 && gx < viewW + 60) {
      ctx.fillStyle = '#475569'; ctx.fillRect(gx, gy - TILE * 4, 5, TILE * 4);
      ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.moveTo(gx + 5, gy - TILE * 4); ctx.lineTo(gx + 5 + 34, gy - TILE * 4 + 12); ctx.lineTo(gx + 5, gy - TILE * 4 + 24); ctx.closePath(); ctx.fill();
      ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🏁', gx + 22, gy - 16);
    }

    // items
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (const it of world.items) {
      const x = it.x + ox, y = it.y + oy;
      if (x < -60 || x > viewW + 60) continue;
      if (it.kind === 'monster') {
        if (it.defeated) {
          // beaten → the same glowing memory star as collected memories (clearly visible, opaque),
          // instead of a faint translucent puff that looked like a rendering bug.
          const bob = Math.sin(nowMs() / 400 + it.x) * 3;
          const cx = x + it.w / 2, cy = y + it.h / 2 + bob;
          ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.beginPath(); ctx.arc(cx, cy, it.w * 0.5, 0, 6.3); ctx.fill();
          drawStar(cx, cy, it.w * 0.44, '#fde047', '#ca8a04');
        } else {
          // shadow + emoji body
          ctx.fillStyle = 'rgba(0,0,0,.16)'; ctx.beginPath(); ctx.ellipse(x + it.w / 2, y + it.h - 2, it.w * 0.5, 5, 0, 0, 6.3); ctx.fill();
          // restore an opaque fill before the emoji — on platforms that render emoji as
          // monochrome glyphs they inherit the shadow's translucent fill and look see-through
          ctx.fillStyle = '#1f2937'; ctx.font = '30px serif'; ctx.fillText(it.emoji || '👾', x + it.w / 2, y + it.h / 2);
          // health bar — shown once the monster has taken any damage from an auto-battle
          if (it.hp != null && it.hp < 1) {
            const bw = it.w + 6, bh = 5, bx = x + it.w / 2 - bw / 2, by = y - 10;
            ctx.fillStyle = 'rgba(0,0,0,.45)'; roundRect(bx - 1, by - 1, bw + 2, bh + 2, 3); ctx.fill();
            ctx.fillStyle = '#4b5563'; roundRect(bx, by, bw, bh, 2.5); ctx.fill();
            const hp = Math.max(0, it.hp);
            ctx.fillStyle = hp > 0.5 ? '#22c55e' : hp > 0.25 ? '#f59e0b' : '#ef4444';
            roundRect(bx, by, bw * hp, bh, 2.5); ctx.fill();
            ctx.fillStyle = '#1f2937';
          }
          // hint arrow for un-unlocked monsters near the player
          if (Math.abs((it.x) - player.x) < TILE * 4) { ctx.font = '14px serif'; ctx.fillText('▼', x + it.w / 2, y - 12); }
        }
      } else {
        const bob = Math.sin(nowMs() / 400 + it.x) * 3;
        if (it.unlocked) {
          // collected memory → a soft glowing star (bumps up briefly when head-bumped)
          const pop = it.bumpT ? Math.max(0, 1 - (nowMs() - it.bumpT) / 260) * -9 : 0;
          const cx = x + it.w / 2, cy = y + it.h / 2 + bob + pop;
          ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.beginPath(); ctx.arc(cx, cy, it.w * 0.5, 0, 6.3); ctx.fill();
          drawStar(cx, cy, it.w * 0.44, '#fde047', '#ca8a04');
        } else {
          // golden block
          ctx.fillStyle = it.kind === 'minor' ? '#a78bfa' : '#fbbf24';
          roundRect(x, y + bob, it.w, it.h, 7); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,.5)'; roundRect(x + 3, y + 3 + bob, it.w - 6, 7, 4); ctx.fill();
          ctx.font = '18px serif'; ctx.fillStyle = '#7c2d12';
          ctx.fillText(it.kind === 'minor' ? '?' : '?', x + it.w / 2, y + it.h / 2 + bob + 1);
        }
      }
    }

    // collectable tokens floating in the scene (only those not yet collected). Drawn in TWO passes
    // so a UNIQUE collectable (its lit portrait) always sits ABOVE neighbouring bulk emoji tokens,
    // never half-hidden behind one that happens to come later in the list.
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = '22px serif';
    const drawToken = (def, tk, unique) => {
      // positive tokens wait in the scene until collected; negative tokens are the reverse —
      // they appear in the scene only after the hero passes (returned from the inventory).
      if (tk.value < 0 ? !tk.collected : tk.collected) return;
      const x = tk.x - camera.x;
      if (x < -30 || x > viewW + 30) return;
      const y = tk.yBase - camera.y + Math.sin(nowMs() / 500 + tk.x) * 3;
      const icon = def.emoji || '⭐';
      // Only UNIQUE collectables (one token) carry a custom picture in the scene; bulk items stay
      // emoji here and reveal their picture only in the inventory slot/popup. The picture stays
      // hidden (shown as the emoji) until the hero walks up close, then it "lights up": a bigger,
      // round-bordered, glowing portrait. Falls back to the emoji while the image still loads.
      const usp = unique ? itemSprites[def.label] : null;
      const lit = usp && Math.abs((player.x + player.w / 2) - tk.x) < TILE * 3;
      if (lit && drawSpriteCircle(ctx, usp, x, y, 24)) return;
      ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(x, y, 14, 0, 6.3); ctx.fill();
      if (isImgIcon(icon)) { const im = iconImg(imgUrlOf(icon)); if (im.complete && im.naturalWidth) ctx.drawImage(im, x - 13, y - 13, 26, 26); else ctx.fillText('⭐', x, y); }
      else ctx.fillText(icon, x, y);
    };
    for (const def of world.collectables || []) { if (world.labelTokenCount[def.label] === 1) continue; for (const tk of def.tokens) drawToken(def, tk, false); }
    for (const def of world.collectables || []) { if (world.labelTokenCount[def.label] !== 1) continue; for (const tk of def.tokens) drawToken(def, tk, true); }

    drawPlayer(ox, oy);

    // night darkening over the whole world (the sky already carries its own palette)
    if (atmos.dark > 0.01) { ctx.fillStyle = 'rgba(10,16,40,' + (atmos.dark * 0.4) + ')'; ctx.fillRect(0, 0, viewW, viewH); }
    // weather, drawn on top so it reads against the dimmed scene
    drawPrecip();
    drawWind();

    // particles
    for (const p of particles) {
      ctx.globalAlpha = clamp(p.life * 2, 0, 1);
      ctx.fillStyle = p.c; ctx.fillRect(p.x + ox - 3, p.y + oy - 3, 6, 6);
    }
    ctx.globalAlpha = 1;
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }
  // five-point star used to mark a collected memory (replaces the plain ✅)
  function drawStar(cx, cy, R, fill, stroke) {
    const spikes = 5, inner = R * 0.45;
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
      const ang = -Math.PI / 2 + i * Math.PI / spikes;
      const rad = i % 2 === 0 ? R : inner;
      const px = cx + Math.cos(ang) * rad, py = cy + Math.sin(ang) * rad;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = fill; ctx.fill();
    if (stroke) { ctx.lineWidth = 2; ctx.strokeStyle = stroke; ctx.stroke(); }
    ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.beginPath(); ctx.arc(cx - R * 0.22, cy - R * 0.22, R * 0.16, 0, 6.3); ctx.fill();
  }

  // ---------- scenery: per-era biomes, parallax hills, clouds, trees ----------
  // Each chapter (era) gets a distinct palette so the 20 years read as different places,
  // in the spirit of haqi_adventure's biome variety.
  const BIOMES = [
    { grassTop: '#7ec850', grassEdge: '#5aa838', dirt1: '#a6743f', dirt2: '#8f6336', hillFar: '#a7dba8', hillNear: '#83c489', tree: '#4caf50', treeDark: '#2e7d32', flower: '#ff6b9d' },
    { grassTop: '#67bf46', grassEdge: '#469a2f', dirt1: '#8a5a36', dirt2: '#754c30', hillFar: '#8fd0a0', hillNear: '#67b87f', tree: '#3a9d3a', treeDark: '#246b24', flower: '#ffd166' },
    { grassTop: '#cba23c', grassEdge: '#a9862f', dirt1: '#9c6b3f', dirt2: '#855a34', hillFar: '#ddc079', hillNear: '#c6a455', tree: '#d4792b', treeDark: '#a85a1e', flower: '#ff8c42' },
    { grassTop: '#3fc39a', grassEdge: '#2a9b78', dirt1: '#5d6b78', dirt2: '#4b5965', hillFar: '#9bd6cf', hillNear: '#71b9b2', tree: '#2bb0a6', treeDark: '#1e857d', flower: '#7df9ff' },
    { grassTop: '#8b7ad6', grassEdge: '#6b5cc0', dirt1: '#6a5a7a', dirt2: '#574a68', hillFar: '#c3b5ec', hillNear: '#a08fdb', tree: '#9a7fd0', treeDark: '#6f57b0', flower: '#ffd1f0' },
  ];
  function chapterIndexAtCol(col) {
    let idx = 0;
    for (let i = 0; i < world.chapters.length; i++) { if (col >= world.chapters[i].startCol) idx = i; else break; }
    return idx;
  }
  function biomeAtCol(c) { return BIOMES[chapterIndexAtCol(c) % BIOMES.length]; }
  // cheap deterministic pseudo-random for decoration placement
  function hash(n) { const s = Math.sin(n * 127.1) * 43758.5453; return s - Math.floor(s); }

  const clouds = [];
  // Clouds are spaced at a FIXED screen pixel gap (CLOUD_GAP), so their density is the same on any
  // screen width — narrow phones no longer cram them together.
  const CLOUD_GAP = 150;
  function ensureClouds() { if (clouds.length) return; for (let i = 0; i < 120; i++) clouds.push({ x: i * CLOUD_GAP + (i * 71 % 70), y: 16 + (i * 57 % 160), s: 0.7 + (i * 29 % 60) / 100, vis: hash(i * 1.7) }); }
  function drawClouds() {
    const cover = atmos.cloud;
    const show = clamp(0.22 + cover * 0.9, 0.2, 1);          // fraction of the cloud set drawn
    const heavy = clamp((cover - 0.4) / 0.6, 0, 1);          // 0 = wispy, 1 = solid overcast
    const period = clouds.length * CLOUD_GAP;
    const speed = 0.004 * (1 + atmos.wind * 3);              // clouds rush when it is windy
    const off = ((camera.x * 0.18 + nowMs() * speed) % period + period) % period;
    let col = lerpArr([255, 255, 255], [150, 156, 170], heavy);
    col = [col[0] * (1 - atmos.dark * 0.5), col[1] * (1 - atmos.dark * 0.5), col[2] * (1 - atmos.dark * 0.45)];
    ctx.fillStyle = 'rgba(' + (col[0] | 0) + ',' + (col[1] | 0) + ',' + (col[2] | 0) + ',' + (0.7 + 0.22 * heavy) + ')';
    for (const cl of clouds) {
      if (cl.vis > show) continue;
      let sx = (cl.x - off) % period; if (sx < 0) sx += period;
      if (sx < -120 || sx > viewW + 120) continue;
      const r = 14 * cl.s, y = cl.y;
      ctx.beginPath();
      ctx.arc(sx, y, r, 0, 6.3); ctx.arc(sx + r, y + 3, r * 0.8, 0, 6.3);
      ctx.arc(sx - r, y + 4, r * 0.7, 0, 6.3); ctx.arc(sx + r * 0.3, y - r * 0.5, r * 0.7, 0, 6.3);
      ctx.fill();
    }
  }
  // Two parallax hill bands; each hill tinted by the biome under it.
  function drawHills() {
    const base = GROUND_ROW * TILE - camera.y;
    const bands = [{ p: 0.35, dy: 8, rb: 70, ra: 60, alpha: 0.9 }, { p: 0.55, dy: 26, rb: 50, ra: 44, alpha: 1 }];
    for (const band of bands) {
      ctx.globalAlpha = band.alpha;
      for (let i = -1; i < 60; i++) {
        const wx = i * 230 + (i * 53 % 70);
        const x = wx - camera.x * band.p;
        if (x < -200 || x > viewW + 200) continue;
        const worldCol = (camera.x * band.p + x) / TILE;
        const b = biomeAtCol(clamp(Math.round(worldCol), 0, world.cols - 1));
        ctx.fillStyle = band.p < 0.45 ? b.hillFar : b.hillNear;
        const r = band.rb + (i * 37 % band.ra);
        ctx.beginPath(); ctx.arc(x, base + band.dy, r, Math.PI, 0); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
  function drawTrees(ox, oy, c0, c1) {
    const groundY = GROUND_ROW * TILE + oy;
    for (let c = c0; c <= c1; c++) {
      if (world.occupied && world.occupied.has(c)) continue;
      if (hash(c * 1.37) <= 0.9) continue;
      const seed = hash(c * 3.1);
      const cx = c * TILE + ox + TILE / 2;
      const b = biomeAtCol(c);
      const hgt = 40 + Math.floor(seed * 30);
      const fy = groundY - hgt, fr = 18 + seed * 10;
      const sway = Math.sin(nowMs() * 0.0015 + c * 0.7) * atmos.wind * 5;   // crowns lean in the wind
      // trunk runs up INTO the foliage (drawn next, covering the overlap) so there is no gap/crack
      const trunkTop = fy + fr * 0.5;
      ctx.fillStyle = '#6b4423'; ctx.fillRect(cx - 4, trunkTop, 8, groundY - trunkTop);
      const fcx = cx + sway;
      ctx.fillStyle = b.treeDark; ctx.beginPath(); ctx.arc(fcx, fy + 6, fr, 0, 6.3); ctx.fill();
      ctx.fillStyle = b.tree;
      ctx.beginPath();
      ctx.arc(fcx - fr * 0.45, fy + 2, fr * 0.66, 0, 6.3);
      ctx.arc(fcx + fr * 0.5, fy, fr * 0.66, 0, 6.3);
      ctx.arc(fcx, fy - fr * 0.45, fr * 0.66, 0, 6.3);
      ctx.fill();
    }
  }
  // little grass blades + occasional flower along the surface row
  function drawGroundDetail(ox, oy, c0, c1) {
    const gy = GROUND_ROW * TILE + oy;
    for (let c = c0; c <= c1; c++) {
      const b = biomeAtCol(c), gx = c * TILE + ox;
      ctx.strokeStyle = b.grassEdge; ctx.lineWidth = 2;
      for (let k = 0; k < 3; k++) {
        const hx = gx + 6 + k * 9 + hash(c * 9 + k) * 4;
        const bh = 4 + hash(c * 5 + k) * 4;
        ctx.beginPath(); ctx.moveTo(hx, gy); ctx.lineTo(hx + (hash(c + k) - 0.5) * 4, gy - bh); ctx.stroke();
      }
      if (hash(c * 7.7) > 0.82 && !(world.occupied && world.occupied.has(c))) {
        const fx = gx + 10 + hash(c * 2.3) * 12;
        ctx.fillStyle = b.flower; ctx.beginPath(); ctx.arc(fx, gy - 7, 3, 0, 6.3); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillRect(fx - 1, gy - 8, 2, 2);
      }
    }
    ctx.lineWidth = 1;
  }

  // The protagonist: a pixel boy with glasses (lixizhi, the developer).
  function drawPlayer(ox, oy) {
    const x = player.x + ox, y = player.y + oy, w = player.w, h = player.h, dir = player.dir;
    const walk = player.grounded && Math.abs(player.vx) > 4 ? Math.sin(player.anim) : 0;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,.14)';
    ctx.beginPath(); ctx.ellipse(x + w / 2, y + h - 1, w * 0.55, 4, 0, 0, 6.3); ctx.fill();
    // legs
    ctx.fillStyle = '#374151';
    ctx.fillRect(x + 3, y + h - 13 + walk * 2, 7, 13);
    ctx.fillRect(x + w - 10, y + h - 13 - walk * 2, 7, 13);
    // shoes
    ctx.fillStyle = '#1f2937';
    ctx.fillRect(x + 2, y + h - 3 + walk * 2, 9, 3);
    ctx.fillRect(x + w - 11, y + h - 3 - walk * 2, 9, 3);
    // body shirt + collar
    ctx.fillStyle = '#2563eb'; ctx.fillRect(x + 1, y + 18, w - 2, h - 30);
    ctx.fillStyle = '#1d4ed8'; ctx.fillRect(x + 1, y + 18, w - 2, 4);
    // arms + hands
    // during an auto-battle the front arm jabs forward; `punch` is 1 right after a
    // stroke and eases back to 0 before the next one (STROKE_MS cadence)
    const sinceStroke = player.battleT && (nowMs() - player.battleT < 200) ? nowMs() - (player.strokeT || 0) : 1e9;
    const punch = sinceStroke < 160 ? Math.max(0, 1 - sinceStroke / 160) : 0;
    const backX = dir > 0 ? x - 2 : x + w - 2;     // arm away from facing dir — plain sleeve
    ctx.fillStyle = '#1e40af'; ctx.fillRect(backX, y + 20, 4, 13);
    ctx.fillStyle = '#f1c39b'; ctx.fillRect(backX, y + 32, 4, 4);
    if (punch > 0.02) {
      // front arm thrust out horizontally toward the monster, fist at the end
      const reach = 5 + punch * 11, ay = y + 23;
      const sx = dir > 0 ? x + w - 2 : x + 2 - reach;
      ctx.fillStyle = '#1e40af'; ctx.fillRect(sx, ay, reach, 4);
      ctx.fillStyle = '#f1c39b'; ctx.fillRect(dir > 0 ? sx + reach - 1 : sx - 4, ay - 1, 5, 5);
    } else {
      const frontX = dir > 0 ? x + w - 2 : x - 2;  // resting vertical sleeve
      ctx.fillStyle = '#1e40af'; ctx.fillRect(frontX, y + 20, 4, 13);
      ctx.fillStyle = '#f1c39b'; ctx.fillRect(frontX, y + 32, 4, 4);
    }
    // head
    ctx.fillStyle = '#f4c8a0'; ctx.fillRect(x + 3, y + 2, w - 6, 17);
    ctx.fillStyle = '#e9b48a'; ctx.fillRect(x + 2, y + 9, 2, 4); ctx.fillRect(x + w - 4, y + 9, 2, 4); // ears
    // short boy hair with a side part
    ctx.fillStyle = '#2b1d16';
    ctx.fillRect(x + 2, y, w - 4, 7);
    ctx.fillRect(x + 2, y, 4, 12);
    ctx.fillRect(x + w - 6, y, 4, 10);
    ctx.fillRect(x + 3, y + 6, w - 6, 2);
    // glasses: two lenses + bridge
    const ly = y + 10;
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(x + 4, ly, 6, 6);
    ctx.fillRect(x + 12, ly, 6, 6);
    ctx.fillRect(x + 10, ly + 2, 2, 2);
    ctx.fillStyle = '#d4ecff';
    ctx.fillRect(x + 5, ly + 1, 4, 4);
    ctx.fillRect(x + 13, ly + 1, 4, 4);
    // pupils glance toward facing direction
    ctx.fillStyle = '#0f172a';
    const pdx = dir > 0 ? 2 : 0;
    ctx.fillRect(x + 6 + pdx, ly + 2, 2, 2);
    ctx.fillRect(x + 14 + pdx, ly + 2, 2, 2);
  }

  // ---------- loop ----------
  let lastT = 0, raf = 0;
  function loop(ts) {
    raf = requestAnimationFrame(loop);
    if (!lastT) lastT = ts;
    let dt = (ts - lastT) / 1000; lastT = ts;
    dt = Math.min(dt, 0.033);
    // Keep updating after the goal too, so the hero can stroll back and forth and re-read the story.
    // finish() only fires once (it's guarded), so reaching the end again won't replay the celebration.
    if (state.started) update(dt);
    draw();
  }
  requestAnimationFrame(loop);

  // ---------- finish ----------
  function finish() {
    if (state.finished) return;
    state.finished = true;
    audio.sfx('finish');
    const earned = state.unlocked * POINTS_PER + (state.unlocked >= world.total ? 50 : 0);
    els.doneDesc.textContent = t('doneDesc', { n: state.unlocked, t: world.total });
    els.done.hidden = false;
    post('gameFinished', {
      completed: true, earnedPoints: earned, unlocked: state.unlocked, total: world.total,
      roundId: state.roundId, finishedAt: Date.now(),
    });
  }

  // ---------- journal ----------
  function openJournal() {
    const body = els.journalBody;
    body.innerHTML = '';
    let any = false;
    world.chapters.forEach((ch, ci) => {
      const frags = world.items.filter(it => it.chapter === ci && it.unlocked);
      if (!frags.length) return;
      any = true;
      const h = document.createElement('h2'); h.textContent = ch.title; body.appendChild(h);
      frags.forEach(it => {
        const d = document.createElement('div');
        d.className = 'frag click' + (it.kind === 'monster' ? ' mon' : '');
        d.textContent = (it.kind === 'monster' && it.emoji ? it.emoji + ' ' : '') + it.text;
        const hint = document.createElement('span'); hint.className = 'ds-jumphint'; hint.textContent = t('replay');
        d.appendChild(hint);
        d.addEventListener('click', () => jumpToItem(it));
        body.appendChild(d);
      });
    });
    if (!any) { const d = document.createElement('div'); d.className = 'frag'; d.textContent = t('journalEmpty'); body.appendChild(d); }
    els.journalOverlay.hidden = false;
  }

  // ---------- input wiring ----------
  function onKey(e, down) {
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') { input.left = down; }
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') { input.right = down; }
    else if (k === ' ' || k === 'ArrowUp' || k === 'w' || k === 'W') { if (down && !input.jumpHeld) input.jumpQueued = true; input.jumpHeld = down; e.preventDefault(); }
  }
  window.addEventListener('keydown', e => onKey(e, true));
  window.addEventListener('keyup', e => onKey(e, false));

  // joystick (drag anywhere on the shell that isn't UI): horizontal = move; each upward movement = a jump
  const JOY_JUMP = 34; // px of upward movement that triggers one jump
  function updateJoy(clientX, clientY) {
    input.joyDX = clamp(clientX - input.joyStartX, -46, 46);
    input.joyDY = clamp(clientY - input.joyStartY, -46, 46);
    els.knob.style.setProperty('--kx', input.joyDX + 'px');
    els.knob.style.setProperty('--ky', input.joyDY + 'px');
    // Relative up-flick detection: every JOY_JUMP px of *upward* movement queues a jump and resets the
    // anchor, so dragging up again (without releasing) jumps again. Moving down lowers the anchor.
    if (clientY < input.jumpAnchorY - JOY_JUMP) {
      input.jumpAnchorY = clientY;
      input.jumpQueued = true;
      els.joy.classList.add('up');
    } else if (clientY > input.jumpAnchorY) {
      input.jumpAnchorY = clientY;
      els.joy.classList.remove('up');
    }
  }
  shell.addEventListener('pointerdown', (e) => {
    if (e.target.closest('button, .ds-pill, .ds-top, .ds-inv, .ds-chip, .ds-overlay, .ds-bottom')) return;
    if (!state.started) return;
    input.joyActive = true; input.joyId = e.pointerId;
    input.joyStartX = e.clientX; input.joyStartY = e.clientY; input.joyDX = 0; input.joyDY = 0; input.jumpAnchorY = e.clientY;
    els.joy.style.setProperty('--x', e.clientX + 'px');
    els.joy.style.setProperty('--y', e.clientY + 'px');
    els.joy.classList.add('show'); els.joy.classList.remove('up');
    els.knob.style.setProperty('--kx', '0px'); els.knob.style.setProperty('--ky', '0px');
    try { shell.setPointerCapture(e.pointerId); } catch (_) {}
  });
  shell.addEventListener('pointermove', (e) => { if (input.joyActive && e.pointerId === input.joyId) updateJoy(e.clientX, e.clientY); });
  function endJoy(e) {
    if (e.pointerId !== input.joyId) return;
    input.joyActive = false; input.joyId = null; input.joyDX = 0; input.joyDY = 0;
    els.joy.classList.remove('show', 'up');
  }
  shell.addEventListener('pointerup', endJoy);
  shell.addEventListener('pointercancel', endJoy);

  // timeline: drag the ruler left/right to scrub through time (and jump the protagonist there)
  let tlDrag = false, tlStartX = 0, tlStartCol = 0;
  els.timeline.addEventListener('pointerdown', (e) => {
    if (!state.started) return;
    tlDrag = true; tlStartX = e.clientX; tlStartCol = (player.x + player.w / 2) / TILE;
    try { els.timeline.setPointerCapture(e.pointerId); } catch (_) {}
    e.stopPropagation();
  });
  els.timeline.addEventListener('pointermove', (e) => {
    if (!tlDrag) return;
    const dCol = (tlStartX - e.clientX) / PX_PER_COL;   // drag left → move forward in time
    jumpTo((tlStartCol + dCol) * TILE - player.w / 2);
  });
  els.timeline.addEventListener('pointerup', () => { if (tlDrag) { tlDrag = false; saveProgress(); } });
  els.timeline.addEventListener('pointercancel', () => { tlDrag = false; });

  // persist progress when the page is hidden / closed
  window.addEventListener('pagehide', saveProgress);
  window.addEventListener('visibilitychange', () => { if (document.hidden) { saveProgress(); music.stop(); } else if (state.started) music.start(); });

  // journal + start + finish + close
  root.querySelector('#dsCardClose').addEventListener('click', (e) => { e.stopPropagation(); if (state.cardItem) state.cardDismissed = state.cardItem; hideCard(); });
  root.querySelector('#dsMusicBtn').addEventListener('click', () => { const on = music.toggle(); els.musicBtn.textContent = on ? '🎵' : '🔇'; });
  root.querySelector('#dsJournalBtn').addEventListener('click', openJournal);
  root.querySelector('#dsJournalClose').addEventListener('click', () => { els.journalOverlay.hidden = true; });
  root.querySelector('#dsJournalRestart').addEventListener('click', () => {
    if (!window.confirm(t('restartConfirm'))) return;
    try { localStorage.removeItem(SAVE_KEY); } catch (_) {}
    state.finished = false; state.activeChapter = -1; state.cardItem = null; state.cardDismissed = null;
    hideCard();
    els.done.hidden = true;
    els.journalOverlay.hidden = true;
    initWorld();   // no save → fresh start: memories relocked, inventory cleared, hero back at the beginning
    els.banner.textContent = chapterTitle(world.chapters[0]);
    audio.sfx('start');
  });
  root.querySelector('#dsFinishBtn').addEventListener('click', () => { els.done.hidden = true; });
  // story maker (创造你的故事): open from the journal or the finish screen
  root.querySelector('#dsJournalMake').addEventListener('click', openMaker);
  root.querySelector('#dsDoneMake').addEventListener('click', openMaker);
  root.querySelector('#dsMakerClose').addEventListener('click', closeMaker);
  maker.overlay.addEventListener('click', (e) => { if (e.target === maker.overlay) closeMaker(); });
  root.querySelector('#dsMakerAiBtn').addEventListener('click', makerAiGenerate);
  root.querySelector('#dsMakerPreview').addEventListener('click', () => {
    if (!(maker.story.value || '').trim()) { showMakerStatus(t('makerEmpty'), 'err'); return; }
    applyStory(maker.story.value, maker.item.value, maker.name.value);
    closeMaker();
  });
  root.querySelector('#dsMakerShare').addEventListener('click', makerSaveShare);
  root.querySelector('#dsMakerRules').addEventListener('click', openRules);
  root.querySelector('#dsRulesClose').addEventListener('click', closeRules);
  root.querySelector('#dsRulesOverlay').addEventListener('click', (e) => { if (e.target.id === 'dsRulesOverlay') closeRules(); });
  // item description dialog: close via × or tapping the backdrop
  root.querySelector('#dsItemClose').addEventListener('click', () => { els.itemOverlay.hidden = true; });
  els.itemOverlay.addEventListener('click', (e) => { if (e.target === els.itemOverlay) els.itemOverlay.hidden = true; });
  root.querySelector('#dsStartBtn').addEventListener('click', startGame);

  function startGame() {
    audio.sfx('start');
    music.start();
    els.start.hidden = true;
    state.started = true;
    post('gameStarted', { roundId: state.roundId });
    setTimeout(() => els.hint.classList.add('fade'), 6000);
  }

  // ---------- ready ----------
  function postLoaded() { if (!state.loadedPosted) { state.loadedPosted = true; post('gameLoaded', {}); } }
  postLoaded();
})();
</script>

</html>
