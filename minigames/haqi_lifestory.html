<!DOCTYPE html>
<!--
  岁月留声 · 我的回忆录 (haqi_lifestory.html)  — 书本版 UI (v2)
  SilverMind 银龄回忆录：整个界面就是书桌上一本摊开的宣纸线装书。
  - 丝带书签 = 章节导航；平板横屏双页、手机竖屏单页；CSS 3D 翻页。
  - 魔法笔：AI 提问以墨字逐字写出；长者口述先落成淡墨草稿，随后泛金光
    「晕开」成更优美的文字 + emoji（点击可看原话）。
  - 草稿本：砚台话筒(语音) / 键盘 / 毛笔手指画画 / 老照片(胶带贴上)。
  - 聊天/成文: sdk.aiChat (modId magichaqi)   插画: sdk.aiGenerators.genImage
  - 语音输入: sdk.speech.speechToText          朗读: sdk.speech.playKeepworkAudio
  - 原声气泡: 加号菜单可录一段声音(MediaRecorder, opus/aac ≤200KB)，微信语音样式
    插进书页，可拖动；文件传 sdk.cloudDrive.uploadUserCDNFile (永久用户 CDN)；
    CDN 失败时单文件存 personalPageStore lifestory/recordings|photos/，未登录暂存本机待补传
  - 老照片同样走 CDN 独立文件（音频/照片永不内联进 entries JSON，避免撑大 git 存储；
    旧内联照片在登录加载后由 flushPendingMedia 自动迁移上 CDN）
  - 对着照片聊: 贴完照片 AI 看图主动提问（askAboutPhoto，多模态 image_url 走章节会话，
    失败退化为通用照片问题），问题便签插在照片正下方
  - 未寄出的信: 隐藏第八章（✉️ 书签，不进目录），写给未来的信（文字+原声），
    选日子或"亲手交给TA"后封存；分享视图到日期才能拆开（约定式，不加密）；letters.json
  - 存档: personalPageStore workspace MagicHaqi, 目录 lifestory/
    (profile.json / meta.json / entries_<ch>.json；自动迁移 v1 chat_<ch>.json+book.json)
  - 分享: haqi_lifestory.html?from=<username>&book=1  (只读翻书)
  - 互动人生: 生成 devstory 剧本 -> haqi_devstory.html?from=..&story=..
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>岁月留声 · 我的回忆录</title>
<script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
</head>
<body>
<script>
game_config = {
    storageDir: 'lifestory',
    pointsPerAnswer: 15,
    pointsPerChapterWritten: 40,
    maxPhotosPerChapter: 4,
    photoMaxSize: 640,
    magicMaxLen: 90,
    illustrationStyle: '中国水墨画风格插图，宣纸底色，淡彩晕染，温暖怀旧，构图简洁留白，画面中不出现任何文字',
    chapters: [
        { id: 'childhood', icon: '🏞️', title: '童年时光', short: '童年', hint: '老家的样子、父母长辈、儿时的玩伴与趣事',
          ribbon: '#a2543c',
          starter: '咱们先聊聊您的童年吧。您小时候生活在什么地方？那是个什么样的地方呢？' },
        { id: 'school', icon: '📚', title: '求学岁月', short: '求学', hint: '上学的经历、难忘的老师和同学',
          ribbon: '#3c5a78',
          starter: '聊聊您上学那会儿的事吧。您还记得第一天上学时的情景吗？' },
        { id: 'work', icon: '🛠️', title: '工作奋斗', short: '工作', hint: '第一份工作、奋斗的岁月、同事与成就',
          ribbon: '#6b6b3a',
          starter: '您的第一份工作是做什么的呀？当时是怎么开始的？' },
        { id: 'love', icon: '💞', title: '成家立业', short: '成家', hint: '与老伴相识相守的故事',
          ribbon: '#96434f',
          starter: '能讲讲您和老伴当年是怎么认识的吗？' },
        { id: 'family', icon: '👨‍👩‍👧', title: '儿女家庭', short: '儿女', hint: '孩子出生、成长中的点点滴滴',
          ribbon: '#4f7a5a',
          starter: '说说您的孩子吧，他们小时候是什么样的？' },
        { id: 'moments', icon: '✨', title: '难忘时刻', short: '难忘', hint: '人生中的大事、转折与骄傲的瞬间',
          ribbon: '#8a6a2f',
          starter: '在您的人生里，有没有一件事让您至今想起来都特别难忘？' },
        { id: 'retire', icon: '🍵', title: '如今生活', short: '如今', hint: '退休后的生活、爱好与心愿',
          ribbon: '#5d5a75',
          starter: '现在的日子过得怎么样？平时都喜欢做点什么？' }
    ]
};
</script>
<script>
art_assets = [];
</script>
<script>
(function () {
    'use strict';
    const CFG = (typeof game_config === 'object' && game_config) ? game_config : { chapters: [] };
    const DIR = CFG.storageDir || 'lifestory';
    const QS = new URLSearchParams(location.search);

    function post(type, data) {
        try { window.parent && window.parent !== window && window.parent.postMessage({ type, data: data || {} }, '*'); } catch (_) {}
    }

    // ===================== 数据模型 =====================
    // 每章 entries: { t, ... }
    //   t:'q'     AI 的话（墨字）            { text }
    //   t:'a'     长者的话                    { text(润色后), raw(原话), fine(bool) }
    //   t:'quote' 章首金句                    { text }
    //   t:'narr'  成文段落                    { text }
    //   t:'photo' 老照片                      { url(CDN), w, h, scale?, br? }（旧数据 c:[chunks]，登录后自动迁移；兜底同 voice: ref/pend）
    //   t:'voice' 原声录音                    { url(CDN), mime, dur(秒), size, txt?(字幕) }
    //             CDN 失败时: ref='recordings/xxx.json'(个人存储单文件) 或 pend=<id>(未登录，暂存本机等补传)
    //   t:'draw'  手指画                      { strokes:[[x,y,x,y,...]] 归一化 0..1 }
    //   t:'illu'  AI 插画                     { url }
    const DEFAULT_PROFILE = { name: '', birthYear: '', voiceOn: true,
        textStyle: 'plain', chatTone: 'junior', theme: 'classic', fontSize: 'm' };
    // 回忆录文字风格（用于魔法润色与整理成文）
    const TEXT_STYLES = {
        plain: '质朴平实，像写给家人的亲笔家书，不堆辞藻',
        concise: '简洁明快，多用短句，干净利落',
        emotional: '深情细腻，注重情感与心境的描写',
        literary: '文雅书卷气，可少量引用诗句或成语，但不晦涩',
    };
    // 陪聊口吻（用于对话追问）
    const CHAT_TONES = {
        junior: '一位亲切、耐心的晚辈倾听者，像孙辈陪长辈喝茶聊天',
        friend: '一位相识多年的老朋友，轻松地闲话家常，偶尔打趣',
        interview: '一位温和的口述历史采访者，问题更有条理、按时间线索展开',
    };
    const state = {
        sdk: null, user: null,
        readonly: false, sharedFrom: '',
        profile: Object.assign({}, DEFAULT_PROFILE),
        facts: [],             // 长者档案：跨章节记住的事实（人名/地名/年代…）
        letters: [],           // 未寄出的信 [{id,to,openHint,openAt,body,voice?,createdAt}]
        chapters: {},          // chId -> { entries: [] }
        meta: { title: '', info: {}, updatedAt: 0 },  // info[chId] = {written, imagePrompt}
        sessions: {},
        pages: [],             // 全书页列表 [{kind:'cover'|'toc'|'body', ch, items:[entryIdx], first}]
        pageIdx: 0,            // 当前（左）页
        spread: false,         // 双页模式
        flipping: false,
        writing: false, writeQueue: [],
        drawTarget: null,      // 正在画画的 entry
        recording: null, recordingOn: false,
        speaking: null,
        sessionPoints: 0, sessionAnswers: 0,
        roundId: 'lifestory_' + Date.now(),
        started: false, loadedPosted: false,
        saveTimers: {}, busyDepth: 0,
        activeCh: null,        // 当前聊天章节
    };

    function chapterById(id) { return CFG.chapters.find((c) => c.id === id); }
    function chEntries(chId) {
        if (!state.chapters[chId]) state.chapters[chId] = { entries: [] };
        return state.chapters[chId].entries;
    }
    function chInfo(chId) {
        if (!state.meta.info) state.meta.info = {};
        if (!state.meta.info[chId]) state.meta.info[chId] = {};
        return state.meta.info[chId];
    }
    function answerCount(chId) { return chEntries(chId).filter((e) => e.t === 'a').length; }
    // 一条提问算「已回答」：它后面出现过长者的回答（任意 a 条目）
    function qAnswered(chId, idx) {
        const entries = chEntries(chId);
        for (let i = idx + 1; i < entries.length; i++) if (entries[i].t === 'a') return true;
        return false;
    }
    function displayName() { return state.profile.name || (state.user && (state.user.nickname || state.user.username)) || ''; }

    // ===================== SDK / 登录 / 存储 =====================
    let _sdkPromise = null;
    function ensureSdk() {
        if (state.sdk) return Promise.resolve(state.sdk);
        if (_sdkPromise) return _sdkPromise;
        _sdkPromise = new Promise((resolve, reject) => {
            if (window.KeepworkSDK) return resolve();
            const s = document.createElement('script');
            s.src = 'https://cdn.keepwork.com/sdk/keepworkSDK.iife.js?v=20260627a';
            s.async = true; s.onload = () => resolve(); s.onerror = () => reject(new Error('SDK load failed'));
            document.head.appendChild(s);
        }).then(() => {
            if (!window.KeepworkSDK) throw new Error('KeepworkSDK undefined');
            const sdk = window.keepwork || new window.KeepworkSDK({ timeout: 45000 });
            try {
                if (sdk.setUserApiKey && window.KeepworkSDK.API_KEYS && window.KeepworkSDK.API_KEYS.maisi) {
                    sdk.setUserApiKey(window.KeepworkSDK.API_KEYS.maisi);
                }
            } catch (_) {}
            state.sdk = sdk;
            return sdk;
        }).catch((e) => { _sdkPromise = null; throw e; });
        return _sdkPromise;
    }
    async function ensureLogin(silent) {
        const sdk = await ensureSdk();
        if (state.user && state.user.username) return state.user;
        let user = null;
        try { user = sdk.getCurrentUser && await sdk.getCurrentUser(); } catch (_) {}
        if ((!user || !user.username) && !silent && sdk.loginWindow && sdk.loginWindow.open) {
            try { await sdk.loginWindow.open(); } catch (_) {}
            try { user = sdk.getCurrentUser && await sdk.getCurrentUser(); } catch (_) {}
        }
        if (!user || !user.username) throw new Error('login required');
        state.user = user;
        return user;
    }
    function getStore() {
        const sdk = state.sdk;
        if (!sdk || !sdk.personalPageStore) return null;
        return sdk.personalPageStore.withWorkspace ? sdk.personalPageStore.withWorkspace('MagicHaqi') : sdk.personalPageStore;
    }

    const LS_KEY = 'haqiLifeStoryV2';
    function lsLoad() { try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : null; } catch (_) { return null; } }
    function lsSave() {
        try {
            localStorage.setItem(LS_KEY, JSON.stringify({ profile: state.profile, chapters: state.chapters, meta: state.meta, facts: state.facts, letters: state.letters, ts: Date.now() }));
        } catch (_) {}
    }
    async function storeWrite(rel, obj) {
        try {
            await ensureLogin(true);  // 后台保存不弹登录窗，未登录时仅存本地
            const store = getStore();
            if (!store) return false;
            await store.createFile(DIR + '/' + rel, JSON.stringify(obj, null, 1));
            return true;
        } catch (e) { console.warn('storeWrite 失败', rel, e); return false; }
    }
    async function storeReadJson(rel) {
        try {
            const store = getStore();
            if (!store) return null;
            const text = await store.readFile(DIR + '/' + rel, 1, 999999);
            if (!text || !String(text).trim()) return null;
            return JSON.parse(text);
        } catch (_) { return null; }
    }
    async function storeReadShared(username, rel) {
        const sdk = await ensureSdk();
        const clean = String(rel).replace(/^\/+/, '').replace(/\\/g, '/');
        if (clean.includes('..') || !/^[\w./-]+$/.test(clean)) throw new Error('bad path');
        const abs = '//' + String(username).replace(/[^\w-]/g, '') + '/edunotes/store/MagicHaqi/' + clean;
        const text = await sdk.personalPageStore.readFile(abs, 1, 999999);
        if (!text || !String(text).trim()) return null;
        return JSON.parse(text);
    }
    function scheduleSave(kind, chId) {
        lsSave();
        if (state.readonly) return;
        const key = kind + ':' + (chId || '');
        if (state.saveTimers[key]) clearTimeout(state.saveTimers[key]);
        state.saveTimers[key] = setTimeout(() => {
            delete state.saveTimers[key];
            if (kind === 'profile') storeWrite('profile.json', state.profile);
            else if (kind === 'entries') storeWrite('entries_' + chId + '.json', state.chapters[chId] || { entries: [] });
            else if (kind === 'meta') { state.meta.updatedAt = Date.now(); storeWrite('meta.json', state.meta); }
            else if (kind === 'facts') storeWrite('facts.json', { facts: state.facts });
            else if (kind === 'letters') storeWrite('letters.json', { letters: state.letters });
        }, 1200);
    }

    // v1 迁移：chat_<ch>.json + book.json -> entries
    function migrateV1(chats, book) {
        for (const ch of CFG.chapters) {
            if ((state.chapters[ch.id] || { entries: [] }).entries.length) continue;
            const entries = [];
            const bc = (book && book.chapters && book.chapters[ch.id]) || {};
            if (bc.quote) entries.push({ t: 'quote', text: bc.quote, ts: bc.updatedAt || 0 });
            if (bc.imageUrl) entries.push({ t: 'illu', url: bc.imageUrl, ts: bc.updatedAt || 0 });
            if (bc.narrative) for (const p of String(bc.narrative).split(/\n+/).filter((s) => s.trim())) {
                entries.push({ t: 'narr', text: p.trim(), ts: bc.updatedAt || 0 });
            }
            for (const p of (bc.photos || [])) {
                const c = Array.isArray(p && p.c) ? p.c : (typeof p === 'string' ? [p] : null);
                if (c) entries.push({ t: 'photo', c, ts: 0 });
            }
            const msgs = (chats && chats[ch.id]) || [];
            for (const m of msgs) {
                if (!m || !m.text) continue;
                if (m.role === 'user') entries.push({ t: 'a', text: m.text, raw: m.text, fine: false, ts: m.ts || 0 });
                else entries.push({ t: 'q', text: m.text, ts: m.ts || 0 });
            }
            if (entries.length) {
                state.chapters[ch.id] = { entries };
                if (bc.narrative) chInfo(ch.id).written = true;
            }
        }
        if (book && book.title) state.meta.title = book.title;
    }

    async function loadAllFromStore() {
        try { await ensureLogin(true); } catch (_) { return; }
        const profile = await storeReadJson('profile.json');
        if (profile && typeof profile === 'object') state.profile = Object.assign({}, DEFAULT_PROFILE, state.profile, profile);
        const facts = await storeReadJson('facts.json');
        if (facts && Array.isArray(facts.facts)) state.facts = facts.facts;
        const letters = await storeReadJson('letters.json');
        if (letters && Array.isArray(letters.letters) && letters.letters.length >= state.letters.length) state.letters = letters.letters;
        const meta = await storeReadJson('meta.json');
        let hasV2 = false;
        if (meta && typeof meta === 'object') { state.meta = Object.assign(state.meta, meta); hasV2 = true; }
        for (const ch of CFG.chapters) {
            const data = await storeReadJson('entries_' + ch.id + '.json');
            if (data && Array.isArray(data.entries) && data.entries.length >= chEntries(ch.id).length) {
                state.chapters[ch.id] = data;
                hasV2 = true;
            }
        }
        if (!hasV2) {
            // 尝试 v1 数据
            const book = await storeReadJson('book.json');
            const chats = {};
            for (const ch of CFG.chapters) {
                const d = await storeReadJson('chat_' + ch.id + '.json');
                if (d && Array.isArray(d.messages)) chats[ch.id] = d.messages;
            }
            migrateV1(chats, book);
        }
        lsSave();
        if (typeof applyTheme === 'function') applyTheme();
        rebuildBook({ keepPage: true });
        flushPendingMedia();   // 已登录：把上次没传成的原声静默补传 CDN
    }

    // ===================== 工具 =====================
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
    function stripFence(s) { return String(s || '').trim().replace(/^```[a-zA-Z]*\s*\n?/, '').replace(/\n?```\s*$/, ''); }
    // 把 AI 回复末尾的「话头：词A｜词B」拆出来，正文与话头分开用
    function splitHints(text) {
        let hints = [];
        const t = String(text || '').replace(/\n?\s*话头[:：]\s*(.+)\s*$/m, (m, g) => {
            hints = g.split(/[|｜、，,/]/).map((s) => s.trim().replace(/^「|」$/g, '')).filter((s) => s && s.length <= 6).slice(0, 3);
            return '';
        }).trim();
        return { text: t, hints };
    }
    function parseAiJson(s) {
        const t = stripFence(s);
        const m = t.match(/\{[\s\S]*\}/);
        if (!m) return null;
        try { return JSON.parse(m[0]); } catch (_) {}
        try { return JSON.parse(m[0].replace(/,\s*([}\]])/g, '$1')); } catch (_) {}
        return null;
    }
    // e.c 内联分块是老数据格式（mediaSrc 读取兼容，flushPendingMedia 会迁到 CDN），新照片/语音一律独立文件
    // 照片宽度（占页面 %）：由 e.scale 决定，钳在 [30, 92]——最小三张一行，最大近整行
    function photoWidth(e) { return Math.min(92, Math.max(30, Math.round(46 * (e.scale || 1)))); }
    // 实际显示宽度：在 photoWidth 基础上按宽高比限高——保证照片完整放进一页、绝不裁切拉伸
    function photoDisplayWidth(e) {
        let w = photoWidth(e);
        if (e.w && e.h && pageDims.h > 60) {
            const maxImgH = pageDims.h * 0.82 - 44;              // 相框边框和胶带留量
            const maxEntryPx = maxImgH * (e.w / e.h) / 0.94;     // img 占条目 94% 宽
            const cap = Math.floor(maxEntryPx / pageDims.w * 100);
            w = Math.max(20, Math.min(w, cap));
        }
        return w;
    }
    function splitParagraphs(text, maxLen) {
        const out = [];
        for (const para of String(text).split(/\n+/)) {
            const p = para.trim();
            if (!p) continue;
            if (p.length <= maxLen) { out.push(p); continue; }
            let cur = '';
            for (const seg of p.split(/(?<=[。！？；.!?])/)) {
                if (cur && (cur + seg).length > maxLen) { out.push(cur); cur = seg; } else cur += seg;
            }
            if (cur) out.push(cur);
        }
        return out;
    }
    function toast(msg, ms) {
        const el = $('#lsToast');
        el.textContent = msg; el.hidden = false;
        clearTimeout(toast._t); toast._t = setTimeout(() => { el.hidden = true; }, ms || 2600);
    }
    function busy(msg) {
        state.busyDepth++;
        $('#lsBusyText').textContent = msg || '请稍候…';
        $('#lsBusy').hidden = false;
    }
    function unbusy() {
        state.busyDepth = Math.max(0, state.busyDepth - 1);
        if (!state.busyDepth) $('#lsBusy').hidden = true;
    }
    async function copyText(text) {
        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                // 页面未聚焦时 writeText 可能一直挂起：超时就走降级方案
                const ok = await Promise.race([
                    navigator.clipboard.writeText(text).then(() => true, () => false),
                    new Promise((res) => setTimeout(() => res(false), 1200)),
                ]);
                if (ok) return true;
            }
        } catch (_) {}
        try {
            const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); return true;
        } catch (_) { return false; }
    }

    // ===================== 语音 =====================
    function stopSpeak() {
        const h = state.speaking;
        state.speaking = null;
        try { if (h && typeof h.pause === 'function') h.pause(); } catch (_) {}
    }
    async function speak(text) {
        if (!state.profile.voiceOn) return;
        const t = String(text || '').replace(/[*#>`\[\]]/g, '').trim();
        if (!t) return;
        try {
            const sdk = await ensureSdk();
            if (!sdk.speech || !sdk.speech.playKeepworkAudio) return;
            stopSpeak();
            const h = await sdk.speech.playKeepworkAudio(t.slice(0, 500), {
                spd: 3, gender: 'female', age: 28, useCache: true, fallbackMode: 'silent',
            });
            state.speaking = h;
        } catch (e) { console.warn('朗读失败', e); }
    }
    function extractSttText(r) {
        if (!r) return '';
        if (typeof r === 'string') return r;
        if (typeof r.text === 'string') return r.text;
        if (Array.isArray(r.result)) return r.result.join('');
        if (r.data) {
            if (typeof r.data === 'string') return r.data;
            if (typeof r.data.text === 'string') return r.data.text;
            if (Array.isArray(r.data.result)) return r.data.result.join('');
        }
        return '';
    }
    async function toggleRecord() {
        const btn = $('#lsMicBtn');
        if (state.recordingOn) {
            try { state.recording && state.recording.stop(); } catch (_) {}
            return;
        }

    // ===================== 原声录音（书页上的语音气泡） =====================
    // CDN 单文件上限 200KB（SDK 强制），24kbps opus 一分钟约 180KB；
    // 录制时实时累计字节，逼近上限就自动收尾，保证怎么录都传得上去。
    const VOICE_MAX_SEC = CFG.voiceMaxSec || 60;
    const VOICE_MAX_BYTES = 190 * 1024;
    let vrec = null;   // { rec, stream, chunks, bytes, t0, timer, mime, blob, dur, prevUrl }

    // 音频永远不内联进 entries JSON（那份要进 git）。播放来源优先级：
    // CDN url > 未登录暂存(本机 localStorage) > 个人存储 recordings/ 单文件（异步取，进缓存）
    const mediaRefCache = new Map();   // ref -> dataURL
    function mediaSrc(e) { return e.url || pendGet(e.pend) || mediaRefCache.get(e.ref) || (Array.isArray(e.c) ? e.c.join('') : ''); }
    async function loadMediaRef(e) {
        if (!e.ref || mediaRefCache.has(e.ref)) return mediaRefCache.get(e.ref) || '';
        let obj = null;
        try {
            obj = state.readonly && state.sharedFrom
                ? await storeReadShared(state.sharedFrom, DIR + '/' + e.ref)
                : await storeReadJson(e.ref);
        } catch (err) { console.warn('取原声文件失败', e.ref, err); }
        const src = obj && typeof obj.b64 === 'string' ? obj.b64 : '';
        if (src) mediaRefCache.set(e.ref, src);
        return src;
    }
    // 未登录时的本机暂存（localStorage，独立 key，不进云端/git），登录后 flushPendingMedia 补传 CDN
    const VOICE_PEND_KEY = 'haqiLifeStoryVoicePend';
    function pendLoad() { try { return JSON.parse(localStorage.getItem(VOICE_PEND_KEY)) || {}; } catch (_) { return {}; } }
    function pendSave(m) { try { localStorage.setItem(VOICE_PEND_KEY, JSON.stringify(m)); return true; } catch (_) { return false; } }
    function pendGet(id) { return id ? (pendLoad()[id] || '') : ''; }
    function pendStash(dataUrl) {
        const m = pendLoad();
        const id = 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        m[id] = dataUrl;
        return pendSave(m) ? id : null;   // 存储配额满时返回 null
    }
    function pendDrop(id) { const m = pendLoad(); if (id in m) { delete m[id]; pendSave(m); } }
    function dataUrlToBlob(u) {
        const i = u.indexOf(',');
        const mime = (u.slice(5, i).split(';')[0]) || 'audio/webm';
        const bin = atob(u.slice(i + 1));
        const a = new Uint8Array(bin.length);
        for (let j = 0; j < bin.length; j++) a[j] = bin.charCodeAt(j);
        return new Blob([a], { type: mime });
    }
    let _mediaFlushing = false;
    // 后台静默补传：①未登录时暂存本机的语音/照片 ②老数据里内联 base64 的照片（迁成 CDN 独立文件）
    async function flushPendingMedia() {
        if (_mediaFlushing || state.readonly) return;
        _mediaFlushing = true;
        try {
            for (const ch of CFG.chapters) {
                for (const e of chEntries(ch.id)) {
                    if ((e.t !== 'voice' && e.t !== 'photo') || e.url) continue;
                    try {
                        if (e.pend) {
                            const dataUrl = pendGet(e.pend);
                            if (!dataUrl) continue;
                            e.url = e.t === 'voice'
                                ? await uploadVoiceBlob(dataUrlToBlob(dataUrl), e.mime, true)
                                : await uploadMediaBlob((await photoBlobUnderLimit(dataUrl)).blob, 'photo', 'jpg', true);
                            pendDrop(e.pend); delete e.pend;
                        } else if (e.t === 'photo' && Array.isArray(e.c) && e.c.length) {
                            const shrunk = await photoBlobUnderLimit(e.c.join(''));
                            e.url = await uploadMediaBlob(shrunk.blob, 'photo', 'jpg', true);
                            delete e.c;
                        } else continue;
                    } catch (_) { return; }   // 没登录/没网，下次再试
                    scheduleSave('entries', ch.id);
                }
            }
            // 未寄出的信里的原声同样补传
            for (const L of (state.letters || [])) {
                const v = L.voice;
                if (!v || v.url || !v.pend) continue;
                const dataUrl = pendGet(v.pend);
                if (!dataUrl) continue;
                try { v.url = await uploadVoiceBlob(dataUrlToBlob(dataUrl), v.mime, true); }
                catch (_) { return; }
                pendDrop(v.pend); delete v.pend;
                scheduleSave('letters');
            }
        } finally { _mediaFlushing = false; }
    }
    function fmtDur(s) { s = Math.max(1, Math.round(s || 1)); return s < 60 ? s + '″' : Math.floor(s / 60) + '′' + (s % 60 ? (s % 60) + '″' : ''); }
    function pickVoiceMime() {
        const M = window.MediaRecorder;
        if (!M || !M.isTypeSupported) return '';
        for (const m of ['audio/webm;codecs=opus', 'audio/mp4', 'audio/webm', 'audio/ogg;codecs=opus'])
            if (M.isTypeSupported(m)) return m;
        return '';
    }
    function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
            const fr = new FileReader();
            fr.onload = () => resolve(fr.result);
            fr.onerror = reject;
            fr.readAsDataURL(blob);
        });
    }
    // 录音浮层是可复用的：书页原声、未寄出的信里都用它。
    // recordVoiceFlow() 返回 Promise，「确认」时给出 {blob, dur, mime}，取消/失败给 null。
    function recordVoiceFlow(acceptLabel) {
        return new Promise((resolve) => {
            $('#lsVoiceUse').textContent = acceptLabel || '✔ 放进书里';
            startVoiceCapture(resolve);
        });
    }
    async function startVoiceCapture(resolve) {
        if (state.recordingOn) { toast('正在听您说话呢，先说完这一句'); resolve(null); return; }
        if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || !window.MediaRecorder) {
            toast('这台设备不支持录音'); resolve(null); return;
        }
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
            });
        } catch (e) { console.warn('麦克风不可用', e); toast('用不了麦克风，请检查录音权限'); resolve(null); return; }
        stopSpeak(); stopVoicePlay();
        const mime = pickVoiceMime();
        let rec;
        try {
            rec = new MediaRecorder(stream, mime ? { mimeType: mime, audioBitsPerSecond: 24000 } : { audioBitsPerSecond: 24000 });
        } catch (e) {
            try { stream.getTracks().forEach((t) => t.stop()); } catch (_) {}
            console.warn('MediaRecorder 创建失败', e); toast('这台设备不支持录音'); resolve(null); return;
        }
        vrec = { rec, stream, chunks: [], bytes: 0, t0: Date.now(), timer: 0, mime: rec.mimeType || mime || 'audio/webm', blob: null, dur: 0, prevUrl: '', resolve };
        rec.ondataavailable = (ev) => {
            if (!vrec || !ev.data || !ev.data.size) return;
            vrec.chunks.push(ev.data); vrec.bytes += ev.data.size;
            // iOS 的 AAC 不一定听 24kbps 的话，按实际字节数兜底自动收尾
            if (vrec.bytes >= VOICE_MAX_BYTES && rec.state === 'recording') { toast('录满啦，这段就到这里'); rec.stop(); }
        };
        rec.onerror = (ev) => {
            console.warn('录音出错', ev);
            closeVoiceOverlay();
            toast('录音没有成功，请再试一次');
        };
        rec.onstop = () => {
            if (!vrec) return;
            try { vrec.stream.getTracks().forEach((t) => t.stop()); } catch (_) {}
            clearInterval(vrec.timer);
            vrec.dur = Math.min(VOICE_MAX_SEC, Math.max(1, Math.round((Date.now() - vrec.t0) / 1000)));
            vrec.blob = new Blob(vrec.chunks, { type: vrec.mime });
            if (!vrec.blob.size) { closeVoiceOverlay(); toast('没录到声音，再试一次'); return; }
            showVoicePreview();
        };
        // 打开录音浮层
        $('#lsVoicePrev').hidden = true;
        $('#lsVoiceRecing').hidden = false;
        $('#lsVoiceTime').textContent = '0:00';
        $('#lsVoiceOverlay').hidden = false;
        rec.start(500);
        vrec.timer = setInterval(() => {
            if (!vrec) return;
            const s = Math.round((Date.now() - vrec.t0) / 1000);
            $('#lsVoiceTime').textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
            if (s >= VOICE_MAX_SEC && vrec.rec.state === 'recording') { toast('录满一分钟啦'); vrec.rec.stop(); }
        }, 250);
    }
    function showVoicePreview() {
        if (!vrec || !vrec.blob) return;
        try { if (vrec.prevUrl) URL.revokeObjectURL(vrec.prevUrl); } catch (_) {}
        vrec.prevUrl = URL.createObjectURL(vrec.blob);
        $('#lsVoiceRecing').hidden = true;
        $('#lsVoicePrevDur').textContent = fmtDur(vrec.dur);
        $('#lsVoicePrev').hidden = false;
    }
    function closeVoiceOverlay(keepPromise) {
        $('#lsVoiceOverlay').hidden = true;
        const v = vrec; vrec = null;
        if (!v) return;
        clearInterval(v.timer);
        try { if (v.rec && v.rec.state === 'recording') v.rec.onstop = null, v.rec.stop(); } catch (_) {}
        try { v.stream.getTracks().forEach((t) => t.stop()); } catch (_) {}
        try { if (v.prevUrl) URL.revokeObjectURL(v.prevUrl); } catch (_) {}
        stopVoicePlay();
        if (!keepPromise && v.resolve) v.resolve(null);
    }
    // 存一段音频：CDN 独立文件 > 个人存储单文件(ref) > 本机暂存(pend)。返回可并入 entry/letter 的字段。
    async function storeVoicePayload(blob, mime, dur) {
        try {
            return { url: await uploadVoiceBlob(blob, mime) };
        } catch (e1) {
            console.warn('原声传 CDN 失败，改走兜底', e1);
            const dataUrl = await blobToDataUrl(blob).catch(() => '');
            if (!dataUrl) return null;
            const name = 'recordings/voice_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7) + '.json';
            if (await storeWrite(name, { mime, dur, b64: dataUrl })) {
                mediaRefCache.set(name, dataUrl);
                return { ref: name };
            }
            const pid = pendStash(dataUrl);   // 未登录：暂存本机，登录后自动补传
            return pid ? { pend: pid } : null;
        }
    }
    async function uploadMediaBlob(blob, prefix, ext, silent) {
        await ensureLogin(!!silent);   // 传永久 CDN 需要登录：未登录会弹登录窗（后台补传时静默）
        const sdk = state.sdk;
        if (!sdk || !sdk.cloudDrive || !sdk.cloudDrive.uploadUserCDNFile) throw new Error('cloudDrive unavailable');
        const name = prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7) + '.' + ext;
        const res = await sdk.cloudDrive.uploadUserCDNFile(blob, { key: DIR + '/' + name, filename: name });
        if (!res || !res.url) throw new Error('upload returned no url');
        return res.url;
    }
    function uploadVoiceBlob(blob, mime, silent) {
        const ext = /mp4/.test(mime) ? 'm4a' : (/ogg/.test(mime) ? 'ogg' : 'webm');
        return uploadMediaBlob(blob, 'voice', ext, silent);
    }
    function imgFromSrc(src) {
        return new Promise((resolve, reject) => {
            const im = new Image();
            im.onload = () => resolve(im); im.onerror = reject; im.src = src;
        });
    }
    // 照片压到 CDN 200KB 限制以内（640px q0.62 基本都在 80KB 内，这里只是极端情况的保险）
    async function photoBlobUnderLimit(dataUrl) {
        let out = dataUrl, blob = dataUrlToBlob(dataUrl);
        for (const q of [0.5, 0.38, 0.28]) {
            if (blob.size <= 195 * 1024) break;
            const im = await imgFromSrc(dataUrl);
            const cv = document.createElement('canvas');
            cv.width = im.naturalWidth; cv.height = im.naturalHeight;
            cv.getContext('2d').drawImage(im, 0, 0);
            out = cv.toDataURL('image/jpeg', q);
            blob = dataUrlToBlob(out);
        }
        return { blob, dataUrl: out };
    }
    // 加号菜单入口：录一段原声插进书页
    async function recordVoiceIntoBook() {
        if (state.readonly) return;
        const startPos = currentInsertPos() || (state.activeCh ? { ch: state.activeCh, idx: chEntries(state.activeCh).length } : null);
        if (!startPos) { toast('先点一个丝带书签，翻到想放声音的篇章'); return; }
        const v = await recordVoiceFlow('✔ 放进书里');
        if (!v) return;
        // 录音期间可能翻过页：优先插到现在看着的这一页
        const pos = currentInsertPos() || startPos;
        busy('正在把这段原声放进书里…');
        const entry = { t: 'voice', mime: v.mime, dur: v.dur, size: v.blob.size, ts: Date.now() };
        const stored = await storeVoicePayload(v.blob, v.mime, v.dur);
        if (!stored) { unbusy(); toast('这段原声没有存下来，请先登录再录'); return; }
        Object.assign(entry, stored);
        chEntries(pos.ch).splice(Math.min(pos.idx, chEntries(pos.ch).length), 0, entry);
        scheduleSave('entries', pos.ch);
        rebuildBook({ keepPage: true });
        const pi = state.pages.findIndex((pg) => pg.kind === PAGE_KINDS.BODY && pg.ch === pos.ch && pg.items.includes(pos.idx));
        if (pi >= 0 && !visiblePages().includes(pi)) flipTo(pi);
        unbusy();
        toast(entry.pend ? '原声先存在这台设备上了 🎙️ 登录后会自动传好' : '原声放进书里了 🎙️ 按住气泡可以拖动');
        sttCaption(v.blob, entry, pos.ch);   // 背景里配一行小字幕，不挡操作
        if (entry.url) flushPendingMedia(); // 这次登录成功了：顺手补传以前欠着的
    }
    // 给原声气泡配一行文字小字幕（尽力而为，失败就不显示）
    async function sttCaption(blob, entry, chId) {
        try {
            const sdk = await ensureSdk();
            if (!sdk.speech || !sdk.speech.convertToWavBase64 || !sdk.speech.callSpeechToTextAPI) return;
            const b64 = await sdk.speech.convertToWavBase64(blob, 16000);
            const r = await sdk.speech.callSpeechToTextAPI(b64);
            const t = extractSttText(r).trim();
            if (!t) return;
            entry.txt = t.slice(0, 120);
            scheduleSave('entries', chId);
            rebuildBook({ keepPage: true });
        } catch (e) { console.warn('原声字幕失败', e); }
    }
    // ---------- 原声播放：全书共用一个 <audio>，微信语音式点了就放 ----------
    let voiceAudio = null, voicePlayingEl = null;
    function stopVoicePlay() {
        try { if (voiceAudio) voiceAudio.pause(); } catch (_) {}
        if (voicePlayingEl) voicePlayingEl.classList.remove('playing');
        voicePlayingEl = null;
    }
    function toggleVoicePlay(e, div) {
        if (voicePlayingEl === div) { stopVoicePlay(); return; }
        stopSpeak(); stopVoicePlay();
        let src = mediaSrc(e);
        if (!src && e.ref) {
            // 存在个人存储里的原声：先取回来再放
            div.classList.add('loading');
            loadMediaRef(e).then((s) => {
                div.classList.remove('loading');
                if (s) toggleVoicePlay(e, div);
                else toast('这段原声没有取到，过会儿再试');
            });
            return;
        }
        if (!src) { toast('这段原声还没有传好'); return; }
        if (!voiceAudio) {
            voiceAudio = new Audio();
            voiceAudio.addEventListener('ended', stopVoicePlay);
            voiceAudio.addEventListener('error', () => { if (voicePlayingEl) toast('这段原声播放不了'); stopVoicePlay(); });
        }
        voiceAudio.src = src;
        voicePlayingEl = div;
        div.classList.add('playing');
        voiceAudio.play().catch((err) => { console.warn('原声播放失败', err); toast('这段原声播放不了'); stopVoicePlay(); });
    }

    async function ensureSession(ch) {

    async function aiOneShot(systemPrompt, userMsg, chatId) {
        const sdk = await ensureSdk();
        if (!sdk.aiChat) throw new Error('aiChat unavailable');
        let full = '';
        if (sdk.aiChat.createSession) {
            const sess = sdk.aiChat.createSession({ systemPrompt, modId: 'magichaqi', chatId: chatId || 'lifestory_writer' });
            if (typeof sess.send === 'function') {
                const r = await sess.send(userMsg, { onChunk: (d) => { if (typeof d === 'string') full += d; } });
                if (!full && typeof r === 'string') full = r;
                if (!full && r && r.text) full = r.text;
                return full;

        }
        if (sdk.aiChat.chat) {
            const r = await sdk.aiChat.chat({ messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }] });

    // 长者档案：从回答中沉淀事实，让所有章节的追问都能「记得」
    async function extractFacts(ch, raw) {
        try {
            const known = state.facts.slice(-40).join('\n');
            const sys = [
                '你在为一位长者的回忆录维护一份「人物档案」。',
                '从长者刚说的一段话中提取值得长期记住的新事实：人名、地名、年代、职业、重要物件、重要事件。',
                '每条事实一句话、不超过 20 字，第三人称省略主语（例：18 岁在南京读书）。',
                '只输出 JSON：{"facts":["…"]}；没有值得记的新事实就输出 {"facts":[]}。',
                '已记住的事实（不要重复输出相同或相近的）：\n' + (known || '（还没有）'),
            ].join('\n');
            const out = await aiOneShot(sys, '章节【' + ch.title + '】长者说：' + raw, 'lifestory_facts');
            const j = parseAiJson(out);
            if (!j || !Array.isArray(j.facts)) return;
            let added = false;
            for (const f of j.facts) {
                const s = String(f || '').trim().slice(0, 40);
                if (s && !state.facts.includes(s)) { state.facts.push(s); added = true; }
            }
            if (added) {
                if (state.facts.length > 80) state.facts = state.facts.slice(-80);
                scheduleSave('facts');
            }
        } catch (e) { console.warn('档案提取失败', e); }
    }

    // ===================== 对着照片聊：照片是最好的记忆钩子 =====================
    // 长者贴完照片，AI 主动看图提问；聊出来的故事自然排在照片旁边。
    const PHOTO_Q_POOL = [
        '这张照片是什么时候照的呀？里面都有谁？',
        '这张照片背后有什么故事吗？您还记得那天的情形吗？',
        '看到这张照片，您最先想起来的是什么？',
    ];
    function insertEntryAfter(chId, afterIdx, entry) {
        const entries = chEntries(chId);
        const at = Math.max(0, Math.min(afterIdx + 1, entries.length));
        entries.splice(at, 0, entry);
        scheduleSave('entries', chId);
        rebuildBook({ keepPage: true });
        const pi = state.pages.findIndex((pg) => pg.kind === PAGE_KINDS.BODY && pg.ch === chId && pg.items.includes(at));
        if (pi >= 0 && !visiblePages().includes(pi)) flipTo(pi);
        return at;
    }
    async function askAboutPhoto(chId, photoEntry) {
        if (state.readonly || state.sending) return;
        const ch = chapterById(chId);
        if (!ch) return;
        state.activeCh = chId;
        state.sending = true;
        try {
            let qText = '', hints = [];
            try {
                const src = photoEntry.url || mediaSrc(photoEntry);   // CDN 地址优先；兜底 dataURL（SDK 会自动转临时 CDN）
                if (!src) throw new Error('no photo src');
                const sess = await ensureSession(ch);
                const prompt = '（系统提示，长者看不到这句话：长者刚往回忆录书页上贴了一张老照片，就是本条消息附带的图片。请：' +
                    '1. 用一两句话说出你从照片里看到的具体内容，像晚辈惊喜地凑过来看照片那样；' +
                    '2. 围绕照片问一个具体的问题，比如什么时候照的、里面都有谁、当天的故事；' +
                    '3. 最后另起一行输出「话头：词A｜词B」。' +
                    '如果图片看不清或无法识别，就不要描述内容，直接亲切地问这张照片是什么时候照的、里面都有谁。）';
                let full = '';
                const r = await sess.send([
                    { type: 'text', text: prompt },
                    { type: 'image_url', image_url: { url: src } },
                ], { onChunk: (d) => { if (typeof d === 'string') full += d; } });
                if (!full && typeof r === 'string') full = r;
                if (!full && r && r.text) full = r.text;
                full = stripFence(full).trim();
                if (!full) throw new Error('empty reply');
                const parsed = splitHints(full);
                qText = parsed.text; hints = parsed.hints;
            } catch (e) {
                console.warn('照片看图追问失败，用通用问题', e);
                qText = PHOTO_Q_POOL[Math.floor(Math.random() * PHOTO_Q_POOL.length)];
            }
            const pIdx = chEntries(chId).indexOf(photoEntry);
            const entry = { t: 'q', text: qText, hints, photo: true, ts: Date.now() };
            const qIdx = pIdx >= 0 ? insertEntryAfter(chId, pIdx, entry) : appendEntry(chId, entry);
            speak(qText);
            await typewrite(chId, qIdx);
        } finally {
            state.sending = false;
            updateTray();
        }
    }

    // ===================== 未寄出的信（隐藏的第八章 / 时间胶囊） =====================
    // 写给未来的悄悄话：封存后到了日子家人才能拆开。文案只讲喜事和成长节点，
    // 绝不出现任何催促身后事的暗示。封存是约定式的（客户端控制），不做加密。
    const LETTERS_KEY = '__letters';
    function todayStr() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function letterCanOpen(L) { return !state.readonly || !!(L.openAt && todayStr() >= L.openAt); }
    function letterWhenText(L) {
        if (!L.openAt) return '🤲 由我亲手交给 TA';
        return '📅 ' + L.openAt.replace(/-/g, ' 年 ').replace(/ 年 (\d+)$/, ' 月 $1 日') + ' 拆开' + (L.openHint ? '（' + L.openHint + '）' : '');
    }
    function paginateLetters() {
        const per = 4;
        const pages = [];
        for (let i = 0; i < state.letters.length; i += per) {
            pages.push({ kind: 'letters', items: state.letters.slice(i, i + per).map((_, k) => i + k), first: i === 0 });
        }
        if (!pages.length) pages.push({ kind: 'letters', items: [], first: true });
        return pages;
    }
    function lettersFirstPage() { return state.pages.findIndex((p) => p.kind === 'letters'); }
    function lettersPageEl(p, body) {
        if (p.first) {

            const sub = document.createElement('div');
            sub.className = 'ls-ltsub';
            sub.textContent = state.readonly
                ? '这里封着写给未来的悄悄话，到了信封上的日子才能拆开。'
                : '有些话，现在说太早，不说又怕忘。写下来封好，到了日子，它会替您说。';
            body.appendChild(sub);
        }
        for (const i of p.items) {
            const L = state.letters[i];
            if (!L) continue;
            const env = document.createElement('button');
            env.type = 'button';
            env.className = 'ls-envelope' + (state.readonly && !letterCanOpen(L) ? ' locked' : '');
            env.innerHTML = '<span class="ls-env-wax">封</span><div class="ls-env-to"></div><div class="ls-env-when"></div>';
            env.querySelector('.ls-env-to').textContent = '给 ' + (L.to || '家人') + ' 的信' + (L.voice ? ' 🎙️' : '');

            env.addEventListener('click', (ev) => {
                ev.stopPropagation();
                if (state.readonly && !letterCanOpen(L)) {
                    toast(L.openAt ? '这封信要到 ' + L.openAt.replace(/-/g, '.') + ' 才能拆开 ✉️' : '这封信，要等长辈亲手交给你 ✉️', 3600);
                    return;
                }
                openLetterView(i);
            });
            body.appendChild(env);
        }
        if (!state.readonly) {
            const isLastLettersPage = !state.pages.some((pg, i) => pg.kind === 'letters' && i > state.pages.indexOf(p));
            if (isLastLettersPage || p.items.length === 0) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'ls-pbtn primary ls-ltnew';
                btn.textContent = '✉️ 写一封新的信';
                btn.addEventListener('click', (ev) => { ev.stopPropagation(); openLetterEdit(null); });
                body.appendChild(btn);
            }
        } else if (p.first && !state.letters.length) {
            const hint = document.createElement('div');
            hint.className = 'ls-pagehint';
            hint.textContent = '这里还没有封存的信。';
            body.appendChild(hint);
        }
    }
    // ---------- 看一封信 ----------
    function openLetterView(i) {
        const L = state.letters[i];

        let html = '<h2>✉️ 给 ' + esc(L.to || '家人') + ' 的信</h2>' +
            '<div class="ls-ltsub">' + esc(letterWhenText(L)) + '</div>' +

            html += '<div class="ls-e-voice ls-ltvoice"><button class="ls-vbubble" type="button">' +
                '<span class="ls-vplay">▶</span><span class="ls-vwave"><i></i><i></i><i></i><i></i><i></i></span>' +
                '<span class="ls-vdur">' + esc(fmtDur(L.voice.dur)) + '</span></button></div>';
        }
        html += '<div class="ls-pbtnrow">';
        if (!state.readonly) html += '<button class="ls-pbtn" data-act="edit">✏️ 拆开改一改</button><button class="ls-pbtn" data-act="del">🗑️ 不留了</button>';

        if (vb) vb.querySelector('.ls-vbubble').addEventListener('click', () => toggleVoicePlay(L.voice, vb));
        body.querySelectorAll('button[data-act]').forEach((b) => {
            b.addEventListener('click', () => {
                const act = b.dataset.act;
                if (act === 'close') { stopVoicePlay(); $('#lsLetterViewOverlay').hidden = true; return; }

                    rebuildBook({ keepPage: true });
                    toast('这封信收回了');
                }
            });

        $('#lsLetterViewOverlay').hidden = false;
    }
    // ---------- 写/改一封信 ----------
    const letterDraft = { editing: -1, voice: null, openMode: 'hand' };
    function openLetterEdit(i) {
        const L = i != null && i >= 0 ? state.letters[i] : null;
        letterDraft.editing = L ? i : -1;
        letterDraft.voice = L ? (L.voice || null) : null;
        letterDraft.openMode = L && L.openAt ? 'date' : 'hand';
        $('#lsLtTo').value = L ? (L.to || '') : '';
        $('#lsLtBody').value = L ? (L.body || '') : '';
        $('#lsLtDate').value = L ? (L.openAt || '') : '';
        $('#lsLtHint').value = L ? (L.openHint || '') : '';

        $('#lsLetterEditOverlay').hidden = false;
        try { $('#lsLtTo').focus(); } catch (_) {}
    }
    function renderLetterEditState() {
        $('#lsLtWhenHand').classList.toggle('on', letterDraft.openMode === 'hand');
        $('#lsLtWhenDate').classList.toggle('on', letterDraft.openMode === 'date');
        $('#lsLtDateRow').hidden = letterDraft.openMode !== 'date';

        $('#lsLtRecBtn').textContent = letterDraft.voice ? '🎙️ 重录一段' : '🎙️ 录一段悄悄话';
    }
    async function recordLetterVoice() {
        const v = await recordVoiceFlow('✔ 就用这段');
        $('#lsLetterEditOverlay').hidden = false;   // 录音浮层盖住过编辑框，回来
        if (!v) return;
        busy('正在收好这段悄悄话…');
        const stored = await storeVoicePayload(v.blob, v.mime, v.dur);
        unbusy();
        if (!stored) { toast('这段没有存下来，请再录一次'); return; }
        letterDraft.voice = Object.assign({ mime: v.mime, dur: v.dur }, stored);
        renderLetterEditState();
    }
    function sealLetter() {
        const to = ($('#lsLtTo').value || '').trim().slice(0, 20);
        const bodyText = ($('#lsLtBody').value || '').trim().slice(0, 2000);
        if (!to) { toast('先写上这封信给谁'); return; }
        if (!bodyText && !letterDraft.voice) { toast('写几句话，或者录一段悄悄话'); return; }
        let openAt = '', openHint = '';
        if (letterDraft.openMode === 'date') {
            openAt = $('#lsLtDate').value || '';
            if (!openAt) { toast('选一个拆开的日子'); return; }
            openHint = ($('#lsLtHint').value || '').trim().slice(0, 30);
        }
        const L = {
            id: letterDraft.editing >= 0 && state.letters[letterDraft.editing] ? state.letters[letterDraft.editing].id : 'L' + Date.now().toString(36),
            to, body: bodyText, openAt, openHint,
            voice: letterDraft.voice || undefined,
            createdAt: letterDraft.editing >= 0 && state.letters[letterDraft.editing] ? state.letters[letterDraft.editing].createdAt : Date.now(),
        };
        if (letterDraft.editing >= 0 && state.letters[letterDraft.editing]) state.letters[letterDraft.editing] = L;
        else state.letters.push(L);
        $('#lsLetterEditOverlay').hidden = true;
        scheduleSave('letters');
        rebuildBook({ keepPage: true });
        // 封缄仪式：信封合上，火漆落印
        const fx = $('#lsSealFx');
        fx.hidden = false;
        clearTimeout(sealLetter._t);
        sealLetter._t = setTimeout(() => { fx.hidden = true; }, 1700);
        toast('信封好了 ✉️ 到了日子，TA 才能拆开', 4000);
    }

    // ===================== 书页排版 =====================
    const PAGE_KINDS = { COVER: 'cover', TOC: 'toc', BODY: 'body' };

    function renderEntryEl(chId, idx, e) {
        const div = document.createElement('div');
        div.className = 'ls-entry ls-e-' + e.t;
        div.dataset.ch = chId; div.dataset.idx = idx;
        if (e.t === 'q') {
            const fam = !!e.from;  // 家人留的问题
            if (fam) div.classList.add('family');
            if (qAnswered(chId, idx)) {
                // 已回答的问题收起成一行小字，点一下可展开
                div.classList.add('answered');
                div.innerHTML = '<span class="ls-qmark">' + (fam ? '💌' : '问') + '</span><span class="ls-etext"></span>';
            } else if (fam) {
                // 家人的问题原样保留，不给换问题/话头
                div.innerHTML = '<div class="ls-qfrom">💌 ' + esc(e.from) + ' 想问您</div><span class="ls-etext"></span>';
            } else {
                // 待回答的问题：贴在纸上的便签，附可点的话头
                let acts = '';
                if (!state.readonly) {
                    // 不是提问（如安慰、建议休息的话）就不放「想不起来了」
                    const isAsking = /[？?]/.test(e.text || '');
                    const hints = (Array.isArray(e.hints) ? e.hints : []).concat(isAsking ? ['想不起来了'] : []);
                    acts = '<div class="ls-qacts">' +
                        hints.map((h) => '<button class="ls-qhint">' + esc(h) + '</button>').join('') +
                        '<button class="ls-qswap">🔄 换个问题</button></div>';
                }
                div.innerHTML = '<span class="ls-qmark">问</span><span class="ls-etext"></span>' + acts;
            }
            div.querySelector('.ls-etext').textContent = e.text || '';
        } else if (e.t === 'a') {
            div.innerHTML = '<span class="ls-etext"></span>' +
                (e.fine && e.raw && e.raw !== e.text ? '<span class="ls-rawline" hidden></span>' : '');
            div.querySelector('.ls-etext').textContent = e.text || '';
            if (!e.fine) div.classList.add('draft');
            const rawEl = div.querySelector('.ls-rawline');
            if (rawEl) rawEl.textContent = '原话：' + e.raw;
        } else if (e.t === 'quote') {
            div.innerHTML = '<span class="ls-etext"></span>';
            div.querySelector('.ls-etext').textContent = '「' + (e.text || '') + '」';
        } else if (e.t === 'narr') {
            div.innerHTML = '<span class="ls-etext"></span>';
            div.querySelector('.ls-etext').textContent = e.text || '';
        } else if (e.t === 'photo') {
            div.innerHTML = '<img alt="老照片">';
            const img = div.querySelector('img');
            const psrc = mediaSrc(e);
            img.src = psrc;
            if (!psrc && e.ref) loadMediaRef(e).then((s) => { if (s) img.src = s; });   // 个人存储兜底的照片：取回再显示
            img.draggable = false;  // 禁掉浏览器原生的「拖拽图片」，否则 PC 上鼠标拖不动
            // 关键：解码前就告诉布局图片的宽高比，分页测量才能拿到真实高度（否则会挤在一页被切掉）
            if (e.w && e.h) img.style.aspectRatio = e.w + ' / ' + e.h;
            div.style.width = photoDisplayWidth(e) + '%';  // 行内块：默认两张一行，宽高比锁定
            if (e.br) div.classList.add('brk');            // 「另起一行」的照片
            if (!e.w || !e.h) {
                // 老数据没存尺寸：加载后补量一次并重排
                img.addEventListener('load', () => {
                    if (e.w || !img.naturalWidth) return;
                    e.w = img.naturalWidth; e.h = img.naturalHeight;
                    scheduleSave('entries', chId);
                    clearTimeout(window.__lsPhotoReflow);
                    window.__lsPhotoReflow = setTimeout(() => rebuildBook({ keepPage: true }), 80);
                }, { once: true });
            }
        } else if (e.t === 'voice') {
            // 微信语音式的原声气泡：▶ + 声波 + 时长，下面可选一行小字幕
            div.innerHTML = '<button class="ls-vbubble" type="button" title="点一下听原声">' +
                '<span class="ls-vplay">▶</span>' +
                '<span class="ls-vwave"><i></i><i></i><i></i><i></i><i></i></span>' +
                '<span class="ls-vdur"></span></button>' +
                (e.txt ? '<span class="ls-vtxt"></span>' : '');
            div.querySelector('.ls-vdur').textContent = fmtDur(e.dur);
            const vt = div.querySelector('.ls-vtxt');
            if (vt) vt.textContent = e.txt;
            if (e.br) div.classList.add('brk');
        } else if (e.t === 'illu') {
            div.innerHTML = '<img alt="插画">';
            div.querySelector('img').src = e.url || '';
        } else if (e.t === 'draw') {
            div.appendChild(drawSvg(e));
        }
        return div;
    }
    function drawSvg(e) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 100 62');
        svg.setAttribute('preserveAspectRatio', 'none');
        svg.classList.add('ls-drawsvg');
        for (const s of (e.strokes || [])) {
            if (!s || s.length < 4) continue;
            let d = 'M' + (s[0] * 100).toFixed(1) + ' ' + (s[1] * 62).toFixed(1);
            for (let i = 2; i < s.length; i += 2) d += ' L' + (s[i] * 100).toFixed(1) + ' ' + (s[i + 1] * 62).toFixed(1);
            const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            p.setAttribute('d', d);
            svg.appendChild(p);
        }
        return svg;
    }

    let measurer = null;
    const pageDims = { w: 520, h: 700 };  // 页面内容区尺寸缓存（照片按高度限宽用）
    function getMeasurer() {
        if (!measurer) {
            measurer = document.createElement('div');
            measurer.className = 'ls-pagebody ls-measure';
            $('#lsBook').appendChild(measurer);
        }
        const ref = $('.ls-page .ls-pagebody');
        if (ref) {
            const r = ref.getBoundingClientRect();
            measurer.style.width = r.width + 'px';
            measurer.style.height = r.height + 'px';
            pageDims.w = r.width; pageDims.h = r.height;
        } else {
            // 首帧还没有渲染出书页时的近似回退（减去 pagebody 的内边距）
            const pr = $('#lsPageR').getBoundingClientRect();
            measurer.style.width = Math.max(100, pr.width - 68) + 'px';
            measurer.style.height = Math.max(100, pr.height - 74) + 'px';
            pageDims.w = Math.max(100, pr.width - 68); pageDims.h = Math.max(100, pr.height - 74);
        }
        return measurer;
    }
    function paginateChapter(ch) {
        const entries = chEntries(ch.id);
        const m = getMeasurer();
        m.innerHTML = '';
        const head = document.createElement('div');
        head.className = 'ls-chhead';
        head.innerHTML = '<span class="ls-chtitle"></span><span class="ls-seal">' + esc(ch.short) + '</span>';
        head.querySelector('.ls-chtitle').textContent = ch.icon + ' ' + ch.title;
        m.appendChild(head);
        const pages = [];
        let cur = [];
        let firstPage = true;
        for (let i = 0; i < entries.length; i++) {
            const el = renderEntryEl(ch.id, i, entries[i]);
            m.appendChild(el);
            if (m.scrollHeight > m.clientHeight + 2 && cur.length > 0) {
                pages.push({ kind: PAGE_KINDS.BODY, ch: ch.id, items: cur, first: firstPage });
                firstPage = false;
                cur = [];
                m.innerHTML = '';
                m.appendChild(renderEntryEl(ch.id, i, entries[i]));
            }
            cur.push(i);
        }
        pages.push({ kind: PAGE_KINDS.BODY, ch: ch.id, items: cur, first: firstPage });
        m.innerHTML = '';
        return pages;
    }
    function rebuildBook(opts) {
        detectSpread();
        const keep = opts && opts.keepPage ? currentLocator() : null;
        const pages = [{ kind: PAGE_KINDS.COVER }];
        // 双页模式：目录和每一章都从左页开始，末尾不足补空白页——一个对开面永远只属于一个章节
        const tocPages = paginateToc();
        pages.push(...tocPages);
        if (state.spread && tocPages.length % 2 === 1) pages.push({ kind: 'blank' });
        for (const ch of CFG.chapters) {
            if (state.readonly && !chEntries(ch.id).length) continue;
            const chPages = paginateChapter(ch);
            pages.push(...chPages);
            if (state.spread && chPages.length % 2 === 1) pages.push({ kind: 'blank' });
        }
        // 隐藏的第八章：未寄出的信（分享视图里没有信就整章不出现）
        if (!state.readonly || state.letters.length) {
            const lPages = paginateLetters();
            pages.push(...lPages);
            if (state.spread && lPages.length % 2 === 1) pages.push({ kind: 'blank' });
        }
        state.pages = pages;
        if (keep) restoreLocator(keep);
        clampPage();
        renderSpread();
        renderBookmarks();
    }
    function currentLocator() {
        const p = state.pages[state.pageIdx];
        if (!p) return null;
        if (p.kind !== PAGE_KINDS.BODY) return { kind: p.kind };
        return { kind: p.kind, ch: p.ch, entry: p.items.length ? p.items[0] : 0 };
    }
    function restoreLocator(loc) {
        if (!loc) return;
        if (loc.kind !== PAGE_KINDS.BODY) {
            state.pageIdx = Math.max(0, state.pages.findIndex((p) => p.kind === loc.kind));
            return;
        }
        let best = -1;
        state.pages.forEach((p, i) => {
            if (p.kind === PAGE_KINDS.BODY && p.ch === loc.ch && p.items[0] <= loc.entry) best = i;
        });
        if (best >= 0) state.pageIdx = best;
    }
    function chapterFirstPage(chId) {
        return state.pages.findIndex((p) => p.kind === PAGE_KINDS.BODY && p.ch === chId);
    }
    function chapterLastPage(chId) {
        let last = -1;
        state.pages.forEach((p, i) => { if (p.kind === PAGE_KINDS.BODY && p.ch === chId) last = i; });
        return last;
    }
    function clampPage() {
        state.pageIdx = Math.max(0, Math.min(state.pageIdx, state.pages.length - 1));
        if (state.spread && state.pageIdx > 0 && state.pageIdx % 2 === 0) state.pageIdx--;
        // 双页模式：封面单独占右页（pageIdx 0）；正文从奇数页开始成对
    }

    // ===================== 页面渲染 =====================
    function pageHtml(p) {
        if (p && p.kind === PAGE_KINDS.COVER) return coverHtml();
        return '';
    }
    function coverHtml() {

    }
    function tocRowEl(ch) {
        const n = answerCount(ch.id);
        const st = chInfo(ch.id).written ? '已成文' : (n > 0 ? '已记 ' + n + ' 句' : '待开启');

    function tocHeadEl() {
        const d = document.createElement('div');
        d.className = 'ls-tochead';
        d.textContent = '目 录';
        return d;
    }
    function tocHintEl() {
        const d = document.createElement('div');
        d.className = 'ls-tochint';
        d.textContent = '点章节名，或点上方书签，翻到那一章';
        return d;
    }
    // 目录也按页高分页，放不下的章节行流到下一页
    function paginateToc() {
        const list = CFG.chapters.filter((ch) => !(state.readonly && !chEntries(ch.id).length));
        const m = getMeasurer();
        m.innerHTML = '';
        m.appendChild(tocHeadEl());
        const pages = [];
        let cur = [];
        let first = true;
        for (const ch of list) {
            m.appendChild(tocRowEl(ch));
            if (m.scrollHeight > m.clientHeight + 2 && cur.length > 0) {
                pages.push({ kind: PAGE_KINDS.TOC, items: cur, first });
                first = false;
                cur = [];
                m.innerHTML = '';
                m.appendChild(tocRowEl(ch));
            }
            cur.push(ch.id);
        }
        // 提示行：能放下才放在最后一页
        m.appendChild(tocHintEl());
        const hintFits = m.scrollHeight <= m.clientHeight + 2;
        pages.push({ kind: PAGE_KINDS.TOC, items: cur, first, hint: hintFits });
        m.innerHTML = '';
        return pages;
    }
    // ---------- 扉页（封面翻开后的左页）：题词 + 今日话头 ----------
    function defaultDedication() {
        const name = state.readonly ? (state.meta.authorName || '') : displayName();
        return '谨以此书，\n献给我爱的家人。' + (name ? '\n—— ' + name : '');
    }
    function todayHintData() {
        if (state.readonly) return null;
        const fresh = CFG.chapters.find((c) => !chEntries(c.id).length);
        if (fresh) return { ch: fresh.id, text: '今天想讲讲「' + fresh.title + '」的事吗？点这里开始' };
        let best = null, bt = -1;
        for (const c of CFG.chapters) for (const e of chEntries(c.id)) if ((e.ts || 0) > bt) { bt = e.ts || 0; best = c; }
        return best ? { ch: best.id, text: '上次讲到「' + best.title + '」，今天接着聊聊？' } : null;
    }
    function flyleafHtml() {
        const total = CFG.chapters.reduce((n, c) => n + chEntries(c.id).length, 0);
        if (!total && !state.readonly) {
            return '<div class="ls-dedic ls-guide">这本书还空着呢。<br>点右上角的丝带书签选一个篇章，<br>按下面的 🎙️ 说上一句，<br>您的回忆录就开始了。</div>';
        }
        const text = state.meta.dedication || defaultDedication();
        let html = '<div class="ls-dedic">' + esc(text).replace(/\n/g, '<br>') + '</div>';
        if (!state.readonly) html += '<div class="ls-dedic-edit">✏️ 点题词，可以改成您想说的话</div>';
        const hint = todayHintData();
        if (hint) html += '<button class="ls-todayhint" data-ch="' + esc(hint.ch) + '">🖋️ ' + esc(hint.text) + '</button>';

    }
    function openDedicationEdit() {
        state.editTarget = { dedication: true };
        $('#lsEditInput').value = state.meta.dedication || defaultDedication();
        $('#lsEditRaw').hidden = true;
        $('#lsEditOverlay').hidden = false;
