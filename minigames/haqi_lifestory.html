    }

    function fillBodyPage(el, p) {
        el.innerHTML = '';
        const body = document.createElement('div');
        body.className = 'ls-pagebody';
        if (p && p.kind === PAGE_KINDS.BODY) {
            const ch = chapterById(p.ch);
            body.dataset.pageIdx = String(state.pages.indexOf(p));  // 照片拖拽落点用
            body.dataset.ch = p.ch;
            if (p.first) {
                const head = document.createElement('div');
                head.className = 'ls-chhead';
                head.innerHTML = '<span class="ls-chtitle"></span><span class="ls-seal">' + esc(ch.short) + '</span>';
                head.querySelector('.ls-chtitle').textContent = ch.icon + ' ' + ch.title;
                body.appendChild(head);
            }
            const entries = chEntries(p.ch);
            for (const i of p.items) {
                if (entries[i]) body.appendChild(renderEntryEl(p.ch, i, entries[i]));
            }
            if (p.first && !p.items.length && !state.readonly) {
                const hint = document.createElement('div');
                hint.className = 'ls-pagehint';
                hint.textContent = '这一页还空着。按下面的砚台 🎙️ 说说「' + ch.title + '」，魔法笔就开始写啦。';
                body.appendChild(hint);
            }
        } else if (p && p.kind === PAGE_KINDS.TOC) {
            if (p.first) body.appendChild(tocHeadEl());
            for (const id of (p.items || [])) {
                const ch = chapterById(id);
                if (ch) body.appendChild(tocRowEl(ch));
            }
            if (p.hint) body.appendChild(tocHintEl());
        } else if (p && p.kind === PAGE_KINDS.COVER) {
            body.classList.add('ls-special');
            body.innerHTML = pageHtml(p);
        } else if (p && p.kind === 'flyleaf') {
            body.classList.add('ls-flyleaf');
            body.innerHTML = flyleafHtml();
        } else if (p && p.kind === 'letters') {
            body.classList.add('ls-letterspage');
            lettersPageEl(p, body);
        } else {
            body.classList.add('ls-blank');
        }
        el.appendChild(body);
        const no = state.pages.indexOf(p);
        if (p && p.kind === PAGE_KINDS.BODY && no > 0) {
            const num = document.createElement('div');
            num.className = 'ls-pageno';
            num.textContent = String(no - 1);
            el.appendChild(num);
        }
        bindPageEvents(el);
    }
    function bindPageEvents(el) {
        el.querySelectorAll('.ls-tocrow').forEach((b) => {
            b.addEventListener('click', (ev) => { ev.stopPropagation(); gotoChapter(b.dataset.ch, true); });
        });
        el.querySelectorAll('.ls-entry').forEach((d) => {
            if (d.__lsBound) return; d.__lsBound = true;
            d.addEventListener('click', (ev) => {
                if (state.writing || state.drawTarget) return;
                if (state.photoDragging || Date.now() - (state.photoDropped || 0) < 350) return;  // 刚拖完不当点击
                const chId = d.dataset.ch, idx = +d.dataset.idx;
                const e = chEntries(chId)[idx];
                if (!e) return;
                ev.stopPropagation();
                if (e.t === 'q' && d.classList.contains('answered')) {
                    // 收起的旧问题：点一下展开/收起
                    d.classList.toggle('open');
                    return;
                }
                if (e.t === 'voice' && ev.target.closest('.ls-vbubble')) {
                    // 点气泡 = 播放/暂停原声（分享阅读也能听）
                    toggleVoicePlay(e, d);
                    return;
                }
                if (state.readonly) {
                    // 只读分享：点长者的话可看原话
                    const raw = d.querySelector('.ls-rawline');
                    if (raw) raw.hidden = !raw.hidden;
                    return;
                }
                if (e.t === 'draw') { resumeDrawing(chId, idx); return; }
                if (e.t === 'q') {
                    // 点问题便签 = 准备回答：高亮、再读一遍、提示按麦克风
                    state.activeCh = chId;
                    focusQuestion(d, e);
                    return;
                }
                openEntryMenu(chId, idx);
            });
            const swap = d.querySelector('.ls-qswap');
            if (swap) swap.addEventListener('click', (ev) => {
                ev.stopPropagation();
                if (state.writing || state.sending) return;
                changeQuestion(d.dataset.ch, +d.dataset.idx);
            });
            d.querySelectorAll('.ls-qhint').forEach((hb) => {
                hb.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    if (state.writing || state.sending) return;
                    changeQuestion(d.dataset.ch, +d.dataset.idx, hb.textContent);
                });
            });
            if ((d.classList.contains('ls-e-photo') || d.classList.contains('ls-e-voice')) && !state.readonly) bindPhotoDrag(d);
        });
        el.querySelectorAll('.ls-cover').forEach((c) => {
            c.addEventListener('click', (ev) => { ev.stopPropagation(); flipTo(1); });
        });
        const ded = el.querySelector('.ls-dedic:not(.ls-guide)');
        if (ded && !state.readonly) ded.addEventListener('click', (ev) => { ev.stopPropagation(); openDedicationEdit(); });
        const th = el.querySelector('.ls-todayhint');
        if (th) th.addEventListener('click', (ev) => { ev.stopPropagation(); gotoChapter(th.dataset.ch); });
    }
    // ---------- 照片/原声拖拽：拖起来，松手放到书页上的新位置 ----------
    function bindPhotoDrag(ph) {
        ph.addEventListener('pointerdown', (ev) => {
            if (state.writing || state.drawTarget || state.sending) return;
            const chId = ph.dataset.ch, idx = +ph.dataset.idx;
            const startX = ev.clientX, startY = ev.clientY;
            let ghost = null;
            const onMove = (mv) => {
                if (!ghost) {
                    if (Math.hypot(mv.clientX - startX, mv.clientY - startY) < 12) return;
                    state.photoDragging = true;
                    ph.classList.add('dragging');
                    const img = ph.querySelector('img');
                    if (img) {
                        ghost = document.createElement('img');
                        ghost.src = img.src;
                        ghost.className = 'ls-dragghost';
                    } else {
                        ghost = document.createElement('div');
                        ghost.className = 'ls-dragghost ls-dragghost-voice';
                        ghost.textContent = '🎙️';
                    }
                    document.body.appendChild(ghost);
                }
                ghost.style.left = mv.clientX + 'px';
                ghost.style.top = mv.clientY + 'px';
            };
            const onUp = (uv) => {
                window.removeEventListener('pointermove', onMove);
                window.removeEventListener('pointerup', onUp);
                window.removeEventListener('pointercancel', onUp);
                if (!ghost) return;  // 没拖起来，当普通点击处理
                ghost.remove();
                ph.classList.remove('dragging');
                state.photoDropped = Date.now();
                setTimeout(() => { state.photoDragging = false; }, 0);
                const drop = resolvePhotoDrop(uv.clientX, uv.clientY, chId, idx);
                if (drop) { movePhotoEntry(chId, idx, drop); toast(ph.classList.contains('ls-e-voice') ? '挪好了 🎙️' : '挪好了 📷'); }
            };
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onUp);
            window.addEventListener('pointercancel', onUp);
        });
    }
    // 松手位置 -> 应插入到哪一章的第几条
    function resolvePhotoDrop(x, y, srcCh, srcIdx) {
        const t = document.elementFromPoint(x, y);
        if (!t) return null;
        const entryEl = t.closest && t.closest('.ls-entry');
        if (entryEl) {
            if (entryEl.dataset.ch === srcCh && +entryEl.dataset.idx === srcIdx) return null;  // 放回了原处
            const r = entryEl.getBoundingClientRect();
            const ch = entryEl.dataset.ch, idx = +entryEl.dataset.idx;
            if (entryEl.classList.contains('ls-e-photo')) {
                // 落在照片下沿 -> 另起一行；落在照片左/右半 -> 尽量同一行
                if (y > r.top + r.height * 0.68) return { ch, idx: idx + 1, newline: true };
                return { ch, idx: idx + (x < r.left + r.width / 2 ? 0 : 1), sameRow: true };
            }
            // 落在文字上按上下分：放到这段文字的前面或后面
            return { ch, idx: idx + (y < r.top + r.height / 2 ? 0 : 1) };
        }
        const bodyEl = t.closest && t.closest('.ls-pagebody');
        if (bodyEl && bodyEl.dataset.ch) {
            const pg = state.pages[+bodyEl.dataset.pageIdx];
            if (pg && pg.kind === PAGE_KINDS.BODY) {
                return { ch: pg.ch, idx: pg.items.length ? pg.items[pg.items.length - 1] + 1 : chEntries(pg.ch).length };
            }
        }
        return null;
    }
    function movePhotoEntry(srcCh, srcIdx, drop) {
        const src = chEntries(srcCh);
        const entry = src[srcIdx];
        if (!entry) return;
        let dstIdx = drop.idx;
        src.splice(srcIdx, 1);
        if (drop.ch === srcCh && dstIdx > srcIdx) dstIdx--;
        const dst = chEntries(drop.ch);
        dstIdx = Math.max(0, Math.min(dstIdx, dst.length));
        dst.splice(dstIdx, 0, entry);
        if (drop.newline) {
            entry.br = true;  // 放到图片下方：另起一行
        } else if (drop.sameRow) {
            entry.br = false;  // 放到图片旁边：尽量同一行
            const prev = dst[dstIdx - 1], next = dst[dstIdx + 1];
            const partner = (prev && prev.t === 'photo') ? prev : ((next && next.t === 'photo') ? next : null);
            if (partner) {
                if (partner === next && next.br) { entry.br = true; next.br = false; }  // 插到行首，接过换行标记
                if (photoWidth(entry) + photoWidth(partner) > 94) { entry.scale = 1; partner.scale = 1; }  // 挤不下就一起缩成两张一行
            }
        }
        scheduleSave('entries', srcCh);
        if (drop.ch !== srcCh) scheduleSave('entries', drop.ch);
        rebuildBook({ keepPage: true });
    }

    function renderSpread() {
        detectSpread();
        const leftEl = $('#lsPageL'), rightEl = $('#lsPageR');
        if (state.spread) {
            $('#lsBook').classList.remove('single');
            const li = state.pageIdx % 2 === 1 ? state.pageIdx : state.pageIdx - 1;
            // 封面（idx0）单独显示在右侧，左侧是扉页（题词页）
            if (state.pageIdx === 0) {
                fillBodyPage(leftEl, { kind: 'flyleaf' });
                fillBodyPage(rightEl, state.pages[0]);
            } else {
                fillBodyPage(leftEl, state.pages[li] || null);
                fillBodyPage(rightEl, state.pages[li + 1] || null);
            }
        } else {
            $('#lsBook').classList.add('single');
            fillBodyPage(rightEl, state.pages[state.pageIdx] || null);
            fillBodyPage(leftEl, null);
        }
        renderBookmarks();
        updateTray();
    }
    function detectSpread() {
        const w = innerWidth, h = innerHeight;
        state.spread = w > h * 1.12 && w > 760;
    }

    // ===================== 翻页 =====================
    function visiblePages() {
        if (!state.spread) return [state.pageIdx];
        if (state.pageIdx === 0) return [0];
        const li = state.pageIdx % 2 === 1 ? state.pageIdx : state.pageIdx - 1;
        return [li, li + 1];
    }
    function flipTo(target, instant) {
        target = Math.max(0, Math.min(target, state.pages.length - 1));
        if (state.spread && target > 0 && target % 2 === 0) target--;
        if (target === state.pageIdx || state.flipping) { if (target === state.pageIdx) renderSpread(); return; }
        const forward = target > state.pageIdx;
        if (instant) { state.pageIdx = target; renderSpread(); return; }
        // 3D 翻页：一张活页绕书脊翻转。
        // 关键点：底下的书页会立刻换成目标页，所以要在“活页落下才盖住”的那一侧
        // 垫一层旧页内容（underlay），动画结束一起移除，避免文字瞬跳。
        state.flipping = true;
        const book = $('#lsBook');
        const oldIdx = state.pageIdx;
        const oldLi = oldIdx % 2 === 1 ? oldIdx : oldIdx - 1; // 双页模式下旧的左页下标
        const sheet = document.createElement('div');
        sheet.className = 'ls-sheet' + (forward ? '' : ' back');
        const front = document.createElement('div'); front.className = 'ls-sheetface front';
        const backf = document.createElement('div'); backf.className = 'ls-sheetface backf';
        sheet.appendChild(front); sheet.appendChild(backf);
        const underlay = document.createElement('div');
        underlay.className = 'ls-underlay ' + (forward ? 'fw' : 'bk');
        const reveal = document.createElement('div');
        reveal.className = 'ls-revealshade ' + (forward ? 'fw' : 'bk');
        if (state.spread) {
            if (forward) {
                // 活页正面 = 旧右页，背面 = 新左页；左边垫旧左页
                fillBodyPage(front, oldIdx === 0 ? state.pages[0] : (state.pages[oldLi + 1] || null));
                fillBodyPage(backf, state.pages[target] || null);
                fillBodyPage(underlay, oldIdx === 0 ? null : (state.pages[oldLi] || null));
            } else {
                // 活页正面 = 新右页，背面 = 旧左页；右边垫旧右页
                fillBodyPage(front, target === 0 ? state.pages[0] : (state.pages[target + 1] || state.pages[target] || null));
                fillBodyPage(backf, state.pages[oldLi] || null);
                fillBodyPage(underlay, state.pages[oldLi + 1] || null);
            }
        } else if (forward) {
            fillBodyPage(front, state.pages[oldIdx]);
            fillBodyPage(backf, state.pages[target]);
        } else {
            // 向后翻：活页从左边翻回来，落下的正面 = 目标页，抬起时可见的背面 = 当前页
            fillBodyPage(front, state.pages[target]);
            fillBodyPage(backf, state.pages[oldIdx]);
            fillBodyPage(underlay, state.pages[oldIdx]);
        }
        // 单页模式向前翻时活页从第 0 帧就盖满整本书，不需要垫层；
        // 单页模式向后翻时没有被掀开的一侧，不需要散去的阴影
        book.appendChild(sheet);
        if (state.spread || !forward) book.appendChild(underlay);
        if (state.spread || forward) book.appendChild(reveal);
        // 底下先换好目标页
        state.pageIdx = target;
        renderSpread();
        requestAnimationFrame(() => sheet.classList.add('go'));
        // 清理不放在 rAF 里：后台标签页 rAF 不执行，会让 flipping 永远卡住
        setTimeout(() => { sheet.remove(); underlay.remove(); reveal.remove(); state.flipping = false; }, 620);
        try { flipSound(); } catch (_) {}
    }
    function flipDelta(dir) {
        const step = state.spread ? 2 : 1;
        let t = state.pageIdx + dir * step;
        if (state.pageIdx === 0 && dir > 0) t = 1;
        flipTo(t);
    }
    // 书签 = 接着聊（翻到最后一页的待答便签）；目录 = 从头看（fromStart）
    function gotoChapter(chId, fromStart) {
        const first = chapterFirstPage(chId);
        state.activeCh = chId;
        if (first < 0) startChapter(chId);
        else flipTo(fromStart ? first : chapterLastPage(chId));
        renderBookmarks();
        updateTray();
    }
    // 轻微的翻纸声
    let audioCtx = null;
    function flipSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = audioCtx, t = ctx.currentTime;
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.18, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.2) * 0.5;
        const src = ctx.createBufferSource(); src.buffer = buf;
        const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2600; f.Q.value = 0.7;
        const g = ctx.createGain(); g.gain.setValueAtTime(0.25, t);
        src.connect(f); f.connect(g); g.connect(ctx.destination);
        src.start(t);
    }

    // ===================== 书签 =====================
    function renderBookmarks() {
        const wrap = $('#lsMarks');
        const vis = visiblePages();
        const li = vis[0], ri = vis[vis.length - 1];
        // 每个书签：整章都在当前页之前 -> 左侧；整章都在之后 -> 右侧；正翻开着 -> 大旗标
        const tabs = [];
        let tocFirst = -1, tocLast = -1;
        state.pages.forEach((p, i) => {
            if (p.kind === PAGE_KINDS.TOC) { if (tocFirst < 0) tocFirst = i; tocLast = i; }
        });
        const tocTab = { key: 'toc', icon: '📑', short: '目录', ribbon: '#7a6a4f', first: tocFirst, last: tocLast };
        for (const ch of CFG.chapters) {
            if (state.readonly && !chEntries(ch.id).length) continue;
            tabs.push({ key: ch.id, icon: ch.icon, short: ch.short, ribbon: ch.ribbon,
                first: chapterFirstPage(ch.id), last: chapterLastPage(ch.id) });
        }
        const lFirst = lettersFirstPage();
        if (lFirst >= 0) {
            let lLast = -1;
            state.pages.forEach((p, i) => { if (p.kind === 'letters') lLast = i; });
            tabs.push({ key: LETTERS_KEY, icon: '✉️', short: '信', ribbon: '#5d556e', first: lFirst, last: lLast });
        }
        function tabHtml(t, cur) {
            const label = esc(t.short).split('').join('<br>');
            return '<button class="ls-mark' + (cur ? ' cur' : '') + '" data-key="' + t.key + '" ' +
                'style="--ribbon:' + t.ribbon + '"><i>' + label + '</i></button>';
        }
        let left = '', right = '';
        const all = [tocTab].concat(tabs);
        for (const t of all) {
            if (t.first < 0) continue;
            if (t.last < li) left += tabHtml(t, false);
            else if (t.first > ri) right += tabHtml(t, false);
            else {
                // 正翻开着的章节：加大的真书签，三角尖插进纸面，留在它所属的一侧
                if (state.spread && t.first > li) right += tabHtml(t, true);
                else left += tabHtml(t, true);
            }
        }
        wrap.innerHTML = '<div class="ls-mgroup">' + left + '</div><div class="ls-mgroup">' + right + '</div>';
        wrap.querySelectorAll('.ls-mark').forEach((b) => {
            b.addEventListener('click', () => {
                const key = b.dataset.key;
                if (key === 'toc') { flipTo(1); return; }
                if (key === LETTERS_KEY) { flipTo(lettersFirstPage()); return; }
                gotoChapter(key);
            });
        });
    }

    // ===================== 魔法笔书写 =====================
    const pen = { el: null };
    function penEl() { if (!pen.el) pen.el = $('#lsPen'); return pen.el; }
    function movePenTo(rect) {
        const p = penEl();
        const host = $('#lsStage').getBoundingClientRect();
        p.style.opacity = '1';
        p.style.transform = 'translate(' + (rect.right - host.left - 4) + 'px,' + (rect.top - host.top - 34) + 'px) rotate(-38deg)';
    }
    function hidePen() { const p = penEl(); p.style.opacity = '0'; }

    function findEntryEl(chId, idx) {
        return $('#lsBook').querySelector('.ls-entry[data-ch="' + chId + '"][data-idx="' + idx + '"]');
    }
    // 逐字书写 entry 的文字（须已在可见页上）
    function typewrite(chId, idx, opts) {
        return new Promise((resolve) => {
            const el = findEntryEl(chId, idx);
            const e = chEntries(chId)[idx];
            if (!el || !e) return resolve();
            const textEl = el.querySelector('.ls-etext');
            if (!textEl) return resolve();
            const full = e.text || '';
            const speed = (opts && opts.speed) || 70;
            textEl.innerHTML = '<span class="ls-done"></span><span class="ls-caret"></span>';
            const doneEl = textEl.querySelector('.ls-done');
            const caret = textEl.querySelector('.ls-caret');
            let i = 0;
            state.writing = true;
            const timer = setInterval(() => {
                i++;
                doneEl.textContent = full.slice(0, i);
                try { movePenTo(caret.getBoundingClientRect()); } catch (_) {}
                if (i >= full.length) {
                    clearInterval(timer);
                    textEl.textContent = full;
                    state.writing = false;
                    hidePen();
                    resolve();
                }
            }, Math.max(24, speed - Math.floor(full.length / 3)));
        });
    }
    // 草稿 -> 魔法落定
    function magicSettle(chId, idx) {
        const el = findEntryEl(chId, idx);
        const e = chEntries(chId)[idx];
        if (!el || !e) return;
        el.classList.add('magic');
        for (let i = 0; i < 5; i++) {
            const sp = document.createElement('span');
            sp.className = 'ls-spark';
            sp.textContent = '✨';
            sp.style.left = (10 + Math.random() * 80) + '%';
            sp.style.top = (Math.random() * 70) + '%';
            sp.style.animationDelay = (Math.random() * 0.5) + 's';
            el.appendChild(sp);
        }
        setTimeout(() => {
            const fresh = renderEntryEl(chId, idx, e);
            fresh.classList.add('settle');
            el.replaceWith(fresh);
            bindPageEvents(fresh.parentElement || $('#lsBook'));
            // 内容变短/变长后可能溢出 -> 重排
            setTimeout(() => { rebuildBook({ keepPage: true }); }, 900);
        }, 1100);
    }

    // 追加 entry 并翻到它所在的页
    function appendEntry(chId, entry) {
        const entries = chEntries(chId);
        entries.push(entry);
        scheduleSave('entries', chId);
        rebuildBook({ keepPage: true });
        const last = chapterLastPage(chId);
        if (!visiblePages().includes(last)) flipTo(last);
        return entries.length - 1;
    }

    // ===================== 对话流程 =====================
    async function startChapter(chId) {
        const ch = chapterById(chId);
        if (!ch) return;
        state.activeCh = chId;
        if (!chEntries(chId).length) {
            const name = displayName();
            const hello = (name ? name + '，您好呀！' : '您好呀！') + '我是您的回忆录小助手。' + ch.starter;
            const idx = appendEntry(chId, { t: 'q', text: hello, ts: Date.now() });
            setTimeout(() => { typewrite(chId, idx); speak(hello); }, 650);
        } else {
            flipTo(chapterLastPage(chId));
        }
        renderBookmarks();
        updateTray();
        try { await ensureLogin(); } catch (_) { toast('登录后才能保存您的回忆，请先登录'); }
    }

    // 语音听写后的「重说」窗口：草稿上纸时出现，写完后再留几秒
    const redoBar = { st: null };
    function openRedoBar() {
        const st = { clicked: false, resolve: null };
        redoBar.st = st;
        $('#lsRedoBar').hidden = false;
        return st;
    }
    function waitRedo(st, ms) {
        return new Promise((res) => {
            if (st.clicked) return res(true);
            let done = false;
            st.resolve = () => { if (!done) { done = true; res(true); } };
            setTimeout(() => {
                if (done || st.clicked) return;
                done = true;
                if (redoBar.st === st) { redoBar.st = null; $('#lsRedoBar').hidden = true; }
                res(false);
            }, ms);
        });
    }

    async function submitAnswer(text, opts) {
        const chId = state.activeCh;
        const ch = chapterById(chId);
        if (!ch || !text || state.sending) return;
        if (!state.started) { state.started = true; post('gameStarted', { roundId: state.roundId }); }
        state.sending = true;
        // 1) 草稿写上纸
        const entry = { t: 'a', text, raw: text, fine: false, ts: Date.now() };
        const redoSt = (opts && opts.voice) ? openRedoBar() : null;
        const idx = appendEntry(chId, entry);
        await typewrite(chId, idx, { speed: 46 });
        // 听写可能有误：写完再留几秒「重说」的机会，期间不惊动 AI
        if (redoSt && await waitRedo(redoSt, 4000)) {
            const i = chEntries(chId).indexOf(entry);
            if (i >= 0) { chEntries(chId).splice(i, 1); scheduleSave('entries', chId); rebuildBook({ keepPage: true }); }
            state.sending = false;
            toggleRecord();  // 直接又开始听
            return;
        }
        state.sessionAnswers++;
        state.sessionPoints += (CFG.pointsPerAnswer || 15);
        post('gameProgress', { answers: state.sessionAnswers, points: state.sessionPoints });
        if (text.length >= 6) extractFacts(ch, text);  // 后台沉淀档案，不阻塞对话
        // 2) 魔法润色（失败则保留原话）
        beautify(ch, text).then((fine) => {
            const i = chEntries(chId).indexOf(entry);
            if (i < 0) return;  // 已被「重说」撤掉或删除
            entry.text = fine; entry.fine = true; scheduleSave('entries', chId); magicSettle(chId, i);
        }).catch((err) => {
            console.warn('魔法润色失败', err);
            const i = chEntries(chId).indexOf(entry);
            if (i < 0) return;
            entry.fine = true; scheduleSave('entries', chId); magicSettle(chId, i);
        });
        // 3) AI 追问（聊得久了就温柔收势，提醒长者歇歇）
        try {
            const sess = await ensureSession(ch);
            let sendText = text;
            if (state.sessionAnswers % (CFG.restEvery || 8) === 0) {
                sendText += '\n\n（系统提示，长者看不到这句话：长者已经连着聊了很久。这次请先真诚回应上面的内容，' +
                    '然后温柔地提议今天先歇一歇，说一句下次想听什么，不要再提问，也不要输出话头。）';
            }
            let full = '';
            const r = await sess.send(sendText, { onChunk: (d) => { if (typeof d === 'string') full += d; } });
            if (!full && typeof r === 'string') full = r;
            if (!full && r && r.text) full = r.text;
            full = stripFence(full).trim();
            if (!full) throw new Error('empty reply');
            const parsed = splitHints(full);
            const qIdx = appendEntry(chId, { t: 'q', text: parsed.text, hints: parsed.hints, ts: Date.now() });
            speak(parsed.text);  // 边写边读，不让长者干等笔写完
            await typewrite(chId, qIdx);
        } catch (e) {
            console.warn('AI 回复失败', e);
            const fbText = '嗯嗯，这段我先记下来了。您歇口气，再多给我讲讲当时的情形？';
            const qIdx = appendEntry(chId, { t: 'q', text: fbText, ts: Date.now() });
            speak(fbText);
            await typewrite(chId, qIdx);
        }
        state.sending = false;
        updateTray();
    }

    // 点问题便签：高亮它、读一遍、让麦克风跳一跳提示「按这里回答」
    function focusQuestion(el, e) {
        el.classList.remove('focus');
        void el.offsetWidth;  // 重新触发动画
        el.classList.add('focus');
        const keep = state.profile.voiceOn;
        state.profile.voiceOn = true; speak(e.text); state.profile.voiceOn = keep;
        const mic = $('#lsMicBtn');
        mic.classList.remove('pulse');
        void mic.offsetWidth;
        mic.classList.add('pulse');
        clearTimeout(focusQuestion._t);
        focusQuestion._t = setTimeout(() => mic.classList.remove('pulse'), 2600);
    }
    // 改写当前问题：steer 为空 = 换个问题；'想不起来了' = 换记忆钩子；其他 = 顺着话头问
    async function changeQuestion(chId, idx, steer) {
        const ch = chapterById(chId);
        const e = chEntries(chId)[idx];
        if (!ch || !e || e.t !== 'q' || state.sending) return;
        state.sending = true;
        stopSpeak();
        toast(steer && steer !== '想不起来了' ? '好嘞，那咱就说说「' + steer + '」…' : '好嘞，我想想换个什么问题…');
        try {
            const tail = '如果合适，最后另起一行输出「话头：词A｜词B」。';
            let sys = buildChatSystemPrompt(ch);
            let userMsg;
            if (steer === '想不起来了') {
                userMsg = '长者说这个问题想不起来了：「' + (e.text || '') + '」。请先安慰一句（想不起来很正常，不着急这类），' +
                    '再借那个年代常见的生活细节（老物件、吃食、声音、集市、广播…）换一个更容易唤起回忆的小问题。只输出这一两句话。' + tail;
            } else if (steer) {
                userMsg = '长者对「' + steer + '」有话想说。请顺着这个话头，问一个具体的小问题（当时的人、地点、声音、气味、心情）。只输出这一两句话。' + tail;
            } else {
                sys += '\n补充：长者不太想回答你刚提的问题，请换一个角度完全不同的新问题。';
                userMsg = '刚才的问题是：「' + (e.text || '') + '」。请先用半句话轻松接住（比如「没关系，咱聊点别的」），' +
                    '再问一个角度完全不同的新问题。只输出这一两句话本身。' + tail;
            }
            const out = stripFence(await aiOneShot(sys, userMsg, 'lifestory_swapq')).trim();
            if (!out) throw new Error('empty swap');
            const parsed = splitHints(out);
            e.text = parsed.text; e.hints = parsed.hints; e.ts = Date.now();
            delete state.sessions[chId];  // 下一轮对话按换过的问题重新续上
            scheduleSave('entries', chId);
            rebuildBook({ keepPage: true });
            const last = chapterLastPage(chId);
            if (!visiblePages().includes(last)) flipTo(last);
            speak(parsed.text);
            await typewrite(chId, idx);
        } catch (err) {
            console.warn('换问题失败', err);
            toast('换问题没成功，请再试一次');
        }
        state.sending = false;
    }

    // ===================== 画画（神笔） =====================
    function startDrawing() {
        if (!state.activeCh) { toast('先点一个丝带书签，翻到想画的篇章'); return; }
        const chId = state.activeCh;
        const idx = appendEntry(chId, { t: 'draw', strokes: [], ts: Date.now() });
        state.drawTarget = { ch: chId, idx, isNew: true };
        setTimeout(() => enterDrawMode(), 350);
    }
    // 点书页上已画好的画 -> 接着画
    function resumeDrawing(chId, idx) {
        state.activeCh = chId;
        state.drawTarget = { ch: chId, idx, isNew: false };
        enterDrawMode();
    }
    function enterDrawMode() {
        const t = state.drawTarget;
        if (!t) return;
        const el = findEntryEl(t.ch, t.idx);
        if (!el) { state.drawTarget = null; return; }
        const entry0 = chEntries(t.ch)[t.idx];
        if (!Array.isArray(entry0.strokes)) entry0.strokes = [];
        t.orig = JSON.parse(JSON.stringify(entry0.strokes));  // 「不画了」时恢复原样
        el.classList.add('drawing');
        const pad = document.createElement('div');
        pad.className = 'ls-drawpad';
        el.appendChild(pad);
        $('#lsDrawBar').hidden = false;
        $('#lsTray').hidden = true;
        let cur = null;
        const entry = chEntries(t.ch)[t.idx];
        function pt(ev) {
            const r = el.getBoundingClientRect();
            const x = Math.min(1, Math.max(0, (ev.clientX - r.left) / r.width));
            const y = Math.min(1, Math.max(0, (ev.clientY - r.top) / r.height));
            return [x, y];
        }
        function redraw() {
            const old = el.querySelector('svg');
            const svg = drawSvg(entry);
            if (old) old.replaceWith(svg); else el.insertBefore(svg, pad);
        }
        pad.addEventListener('pointerdown', (ev) => {
            ev.preventDefault();
            pad.setPointerCapture(ev.pointerId);
            const [x, y] = pt(ev);
            cur = [x, y];
            entry.strokes.push(cur);
        });
        pad.addEventListener('pointermove', (ev) => {
            if (!cur) return;
            const [x, y] = pt(ev);
            cur.push(x, y);
            redraw();
        });
        const up = () => { cur = null; scheduleSave('entries', t.ch); };
        pad.addEventListener('pointerup', up);
        pad.addEventListener('pointercancel', up);
        state.drawCtx = { el, pad, entry, redraw };
    }
    function endDrawMode(cancel) {
        const t = state.drawTarget, c = state.drawCtx;
        $('#lsDrawBar').hidden = true;
        $('#lsTray').hidden = state.readonly;
        state.drawTarget = null; state.drawCtx = null;
        if (!t) return;
        if (cancel) {
            if (t.isNew) chEntries(t.ch).splice(t.idx, 1);
            else chEntries(t.ch)[t.idx].strokes = t.orig || [];
        } else if (!(chEntries(t.ch)[t.idx].strokes || []).length) {
            chEntries(t.ch).splice(t.idx, 1);
        }
        scheduleSave('entries', t.ch);
        rebuildBook({ keepPage: true });
    }
    function undoStroke() {
        const c = state.drawCtx;
        if (!c || !c.entry.strokes.length) return;
        c.entry.strokes.pop();
        c.redraw();
    }
    // 简笔画 -> 白底黑线的图片（作为 genImage 的参考图）
    function strokesToDataUrl(entry) {
        const W = 1000, H = 620;
        const cv = document.createElement('canvas');
        cv.width = W; cv.height = H;
        const ctx = cv.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = '#222222'; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        for (const s of (entry.strokes || [])) {
            if (!s || s.length < 4) continue;
            ctx.beginPath();
            ctx.moveTo(s[0] * W, s[1] * H);
            for (let i = 2; i < s.length; i += 2) ctx.lineTo(s[i] * W, s[i + 1] * H);
            ctx.stroke();
        }
        return cv.toDataURL('image/png');
    }
    // ✨ 把手绘的简笔画根据本章回忆变成一幅真正的 2D 插画（保留 strokes 可改回手绘）
    async function sketchToImage() {
        const t = state.drawTarget;
        if (!t) return;
        const entry = chEntries(t.ch)[t.idx];
        if (!entry || !(entry.strokes || []).length) { toast('先画上几笔，我才好帮您变呀 🖌️'); return; }
        const ch = chapterById(t.ch);
        busy('魔法笔正在把您的画变成图片（约半分钟）…');
        try {
            const sdk = await ensureSdk();
            if (!sdk.aiGenerators || !sdk.aiGenerators.genImage) throw new Error('genImage unavailable');
            const sketch = strokesToDataUrl(entry);
            const ctxTexts = chEntries(t.ch).filter((e) => e.t === 'a' || e.t === 'narr')
                .slice(-4).map((e) => e.raw || e.text).join('；').slice(0, 220);
            const prompt = '参考图是一位长者亲手画的黑白简笔画。请完全保留这幅简笔画的构图、物体和内容，' +
                '把它画成一幅干净、温暖的2D彩色插画：简洁的手绘水彩风，怀旧温馨，画面中不出现任何文字。' +
                (ch ? '主题与「' + ch.title + '」的回忆有关。' : '') +
                (ctxTexts ? '这幅画讲的是：' + ctxTexts : '');
            const url = await sdk.aiGenerators.genImage(prompt, {
                width: 2560, height: 1600,  // Seedream 要求 ≥368 万像素
                images: [{ url: sketch, role: 'reference' }],
            });
            if (!url) throw new Error('empty url');
            entry.t = 'illu'; entry.url = url;
            state.drawTarget = null; state.drawCtx = null;
            $('#lsDrawBar').hidden = true;
            $('#lsTray').hidden = state.readonly;
            scheduleSave('entries', t.ch);
            rebuildBook({ keepPage: true });
            toast('画变成图片啦 🎨 点它还能挪动或改回手绘', 4000);
        } catch (e) {
            console.warn('简笔画变图片失败', e);
            toast('这次没有变成，过一会儿再试试');
        }
        unbusy();
    }

    // ===================== 条目编辑（点书页上的内容） =====================
    function entryBrief(e) {
        if (e.t === 'photo') return '这张老照片';
        if (e.t === 'illu') return '这幅插画';
        if (e.t === 'voice') return '这段原声（' + fmtDur(e.dur) + '）';
        const cs = Array.from(String(e.text || ''));  // 按字符截断，避免拆开 emoji
        return '「' + (cs.length > 24 ? cs.slice(0, 24).join('') + '…' : cs.join('')) + '」';
    }
    function openEntryMenu(chId, idx) {
        const e = chEntries(chId)[idx];
        if (!e) return;
        state.activeCh = chId;
        const isImg = e.t === 'photo' || e.t === 'illu';
        const isText = e.t === 'a' || e.t === 'narr' || e.t === 'quote';  // 提问不走编辑菜单
        const isVoice = e.t === 'voice';
        if (!isImg && !isText && !isVoice) return;
        const body = $('#lsEntryMenu');
        let html = '<div class="ls-embrief">' + esc(entryBrief(e)) + '</div>';
        if (isImg) {
            html += '<img class="ls-emimg" src="' + esc(e.t === 'photo' ? mediaSrc(e) : (e.url || '')) + '" alt="">';
            if (e.t === 'photo') {
                html += '<div class="ls-pbtnrow">' +
                    '<button class="ls-pbtn" data-act="bigger">🔍 大一点</button>' +
                    '<button class="ls-pbtn" data-act="smaller">🔎 小一点</button></div>';
            }
            html += '<div class="ls-pbtnrow">' +
                '<button class="ls-pbtn" data-act="up">⬆️ 往上挪</button>' +
                '<button class="ls-pbtn" data-act="down">⬇️ 往下挪</button></div>';
            if (e.t === 'illu' && Array.isArray(e.strokes) && e.strokes.length) {
                html += '<button class="ls-pbtn" data-act="sketch">🖌️ 改回我的手绘</button>';
            }
        }
        if (isVoice) {
            html += '<div class="ls-pbtnrow">' +
                '<button class="ls-pbtn" data-act="up">⬆️ 往上挪</button>' +
                '<button class="ls-pbtn" data-act="down">⬇️ 往下挪</button></div>';
        }
        if (isText) html += '<button class="ls-pbtn" data-act="edit">✏️ 改一改这段话</button>';
        html += '<button class="ls-pbtn" data-act="del">🗑️ 删掉</button>';
        html += '<button class="ls-pbtn primary" data-act="close">先不动，关闭</button>';
        body.innerHTML = html;
        $('#lsEntryOverlay').hidden = false;
        body.querySelectorAll('button').forEach((b) => {
            b.addEventListener('click', () => {
                const act = b.dataset.act;
                if (act === 'close') { $('#lsEntryOverlay').hidden = true; return; }
                if (act === 'edit') { $('#lsEntryOverlay').hidden = true; openEditDialog(chId, idx); return; }
                if (act === 'del') {
                    // 防误触：要按两下才真的删除
                    if (!b.dataset.sure) { b.dataset.sure = '1'; b.textContent = '🗑️ 再按一下，真的删掉'; return; }
                    $('#lsEntryOverlay').hidden = true;
                    if (e.t === 'voice') stopVoicePlay();
                    if (e.pend) pendDrop(e.pend);
                    chEntries(chId).splice(idx, 1);
                    scheduleSave('entries', chId);
                    rebuildBook({ keepPage: true });
                    toast('删掉了');
                    return;
                }
                if (act === 'bigger' || act === 'smaller') {
                    const cur = e.scale || 1;
                    const next = Math.round((cur + (act === 'bigger' ? 0.25 : -0.25)) * 100) / 100;
                    const oldW = photoDisplayWidth(e);
                    e.scale = next;
                    const newW = photoDisplayWidth(e);
                    if (newW === oldW) {
                        e.scale = cur;
                        toast(act === 'bigger' ? (photoWidth(e) < 92 ? '再大这一页就放不下啦' : '已经最大啦') : '已经最小啦');
                        return;
                    }
                    $('#lsEntryOverlay').hidden = true;
                    scheduleSave('entries', chId);
                    rebuildBook({ keepPage: true });
                    toast(act === 'bigger' ? '放大了一点 🔍' : '缩小了一点 🔎');
                    return;
                }
                if (act === 'up' || act === 'down') {
                    const entries = chEntries(chId);
                    const j = idx + (act === 'up' ? -1 : 1);
                    if (j < 0 || j >= entries.length) { toast(act === 'up' ? '已经在最前面啦' : '已经在最后面啦'); return; }
                    const tmp = entries[idx]; entries[idx] = entries[j]; entries[j] = tmp;
                    $('#lsEntryOverlay').hidden = true;
                    scheduleSave('entries', chId);
                    rebuildBook({ keepPage: true });
                    toast(act === 'up' ? '往上挪好了 ⬆️' : '往下挪好了 ⬇️');
                    return;
                }
                if (act === 'sketch') {
                    $('#lsEntryOverlay').hidden = true;
                    e.t = 'draw'; delete e.url;
                    scheduleSave('entries', chId);
                    rebuildBook({ keepPage: true });
                    toast('改回手绘啦，点它可以接着画 🖌️');
                }
            });
        });

    // ===================== 照片 =====================
    function readPhotoFile(file) {
        return new Promise((resolve, reject) => {
            const fr = new FileReader();
            fr.onload = () => {
                const img = new Image();
                img.onload = () => {
                    const max = CFG.photoMaxSize || 640;
                    const scale = Math.min(1, max / Math.max(img.width, img.height));
                    const w = Math.max(1, Math.round(img.width * scale));
                    const h = Math.max(1, Math.round(img.height * scale));
                    const cv = document.createElement('canvas');
                    cv.width = w; cv.height = h;
                    cv.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve({ dataUrl: cv.toDataURL('image/jpeg', 0.62), w, h });
                };
                img.onerror = reject;
                img.src = fr.result;
            };
            fr.onerror = reject;
            fr.readAsDataURL(file);
        });
    }
    // 照片插到「现在看着的这一页」末尾，而不是章节最后
    function currentInsertPos() {
        const vis = visiblePages().map((i) => state.pages[i]).filter((p) => p && p.kind === PAGE_KINDS.BODY);
        if (!vis.length) return null;
        const pg = vis.find((p) => p.ch === state.activeCh) || vis[vis.length - 1];
        return { ch: pg.ch, idx: pg.items.length ? pg.items[pg.items.length - 1] + 1 : chEntries(pg.ch).length };
    }
    async function onPhotoPicked(file) {
        if (!file) return;
        const pos = currentInsertPos() || (state.activeCh ? { ch: state.activeCh, idx: chEntries(state.activeCh).length } : null);
        if (!pos) return;
        const chId = pos.ch;
        const photoN = chEntries(chId).filter((e) => e.t === 'photo').length;
        const maxN = CFG.maxPhotosPerChapter || 4;
        if (photoN >= maxN) { toast('这一章最多贴 ' + maxN + ' 张照片啦'); return; }
        busy('正在把照片贴到书页上…');
        try {
            const p = await readPhotoFile(file);
            // 和原声同一套存法：CDN 独立文件 > 个人存储单文件 > 本机暂存等补传，绝不内联进 entries JSON
            const shrunk = await photoBlobUnderLimit(p.dataUrl);
            const entry = { t: 'photo', w: p.w, h: p.h, ts: Date.now() };
            try {
                entry.url = await uploadMediaBlob(shrunk.blob, 'photo', 'jpg', false);
            } catch (e1) {
                console.warn('照片传 CDN 失败，改走兜底', e1);
                const name = 'photos/photo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7) + '.json';
                if (await storeWrite(name, { b64: shrunk.dataUrl })) {
                    entry.ref = name; mediaRefCache.set(name, shrunk.dataUrl);
                } else {
                    const pid = pendStash(shrunk.dataUrl);
                    if (!pid) { unbusy(); toast('照片没有贴上，请先登录再试'); return; }
                    entry.pend = pid;
                }
            }
            chEntries(chId).splice(pos.idx, 0, entry);
            scheduleSave('entries', chId);
            if (entry.url) flushPendingMedia();   // 这次登录成功了：顺手补传以前欠着的
            rebuildBook({ keepPage: true });
            const pi = state.pages.findIndex((pg) => pg.kind === PAGE_KINDS.BODY && pg.ch === chId && pg.items.includes(pos.idx));
            if (pi >= 0 && !visiblePages().includes(pi)) flipTo(pi);
            toast('照片贴好了 📷 按住可以拖到想放的位置');
            setTimeout(() => askAboutPhoto(chId, entry), 900);   // 让 AI 凑过来看看这张照片
        } catch (e) {
            console.warn('照片处理失败', e);
            toast('照片没有贴上，换一张试试');
        }
        unbusy();
    }

    // ===================== 整理成文 / 插画 =====================
    async function writeChapter(chId) {
        const ch = chapterById(chId);
        if (!ch) return;
        if (answerCount(chId) < 2) { toast('先和我多聊几句「' + ch.title + '」，我才好为您动笔呀'); return; }
        busy('正在为您撰写「' + ch.title + '」…');
        try {
            const talk = chEntries(chId).filter((e) => e.t === 'q' || e.t === 'a')
                .map((e) => (e.t === 'a' ? '长者' : '倾听者') + '：' + (e.raw || e.text)).join('\n');
            const sys = [
                '你是一位温柔、文笔细腻的传记作家，为长者撰写回忆录章节。',
                '根据对话记录，用第一人称（长者的口吻）写一段 300~450 字的回忆录正文：',
                '只写长者真实讲过的内容，可以润色语言但绝不虚构事实；保留具体的人名、地名、年代与细节；分 2~3 个自然段。',
                '文字风格：' + (TEXT_STYLES[state.profile.textStyle] || TEXT_STYLES.plain) + '。',
                '另外提炼一句最打动人的话作为「金句」（20 字以内，可从原话中提取），',
                '并为本章写一个适合配图的中文画面描述 imagePrompt（40 字以内，描述一个具体场景，不出现人名）。',
                '严格只输出 JSON，格式：{"narrative":"…","quote":"…","imagePrompt":"…"}',
            ].join('\n');
            const userMsg = '章节：' + ch.title + '（' + ch.hint + '）\n' +
                (displayName() ? '长者称呼：' + displayName() + '\n' : '') +
                (state.profile.birthYear ? '出生年份：约' + state.profile.birthYear + '\n' : '') +
                '对话记录：\n' + talk;
            const out = await aiOneShot(sys, userMsg);
            const data = parseAiJson(out);
            if (!data || !data.narrative) throw new Error('bad json');
            // 移除旧成文，插到章首
            const entries = chEntries(chId).filter((e) => e.t !== 'narr' && e.t !== 'quote');
            const head = [];
            if (data.quote) head.push({ t: 'quote', text: String(data.quote).trim(), ts: Date.now() });
            for (const p of splitParagraphs(String(data.narrative), 160)) head.push({ t: 'narr', text: p, ts: Date.now() });
            state.chapters[chId].entries = head.concat(entries);
            chInfo(chId).written = true;
            chInfo(chId).imagePrompt = String(data.imagePrompt || '').trim();
            state.meta.title = state.meta.title || ((displayName() || '我') + '的回忆录');
            scheduleSave('entries', chId);
            scheduleSave('meta');
            state.sessionPoints += (CFG.pointsPerChapterWritten || 40);
            post('gameProgress', { answers: state.sessionAnswers, points: state.sessionPoints });
            rebuildBook({ keepPage: false });
            flipTo(chapterFirstPage(chId));
            toast('「' + ch.title + '」写好了 ✍️');
        } catch (e) {
            console.warn('整理成文失败', e);
            toast('这次没有写成，请稍后再试一次');
        }
        unbusy();
    }
    async function genIllustration(chId) {
        const ch = chapterById(chId);
        const info = chInfo(chId);
        if (!info.written) { toast('先点「整理成文」，我才知道画什么呀'); return; }
        busy('正在为「' + ch.title + '」画插画（约半分钟）…');
        try {
            const sdk = await ensureSdk();
            if (!sdk.aiGenerators || !sdk.aiGenerators.genImage) throw new Error('genImage unavailable');
            const prompt = (info.imagePrompt || (ch.title + '的温馨回忆场景')) + '，' + (CFG.illustrationStyle || '水墨插画');
            const url = await sdk.aiGenerators.genImage(prompt, { width: 1024, height: 768 });
            if (!url) throw new Error('empty url');
            const entries = chEntries(chId).filter((e) => e.t !== 'illu');
            const qi = entries.findIndex((e) => e.t === 'narr');
            entries.splice(qi >= 0 ? qi : 0, 0, { t: 'illu', url, ts: Date.now() });
            state.chapters[chId].entries = entries;
            scheduleSave('entries', chId);
            rebuildBook({ keepPage: false });
            flipTo(chapterFirstPage(chId));
            toast('插画画好了 🎨');
        } catch (e) {
            console.warn('插画生成失败', e);
            toast('插画没有画成，请稍后再试');
        }
        unbusy();
    }

    async function makeInteractiveStory() {
        const done = CFG.chapters.filter((c) => chInfo(c.id).written);
        if (done.length < 2) { toast('先整理出两章以上回忆录，才够做成互动小游戏'); return; }
        busy('正在把您的人生做成互动小游戏…');
        try {
            const user = await ensureLogin();

                chEntries(c.id).filter((e) => e.t === 'narr').map((e) => e.text).join('\n')).join('\n\n');
            const sys = [
                '你是"人生故事"横版小游戏的剧本作者。把下面的回忆录改写成游戏剧本 Markdown，只输出 Markdown 正文，不要解释、不要代码块围栏。',

                '· # 标题 —— 一个人生阶段（章节），建议含年份，按时间先后排列；共 ' + Math.min(done.length, 7) + ' 章。',

                '· 可在章首用 - /day /night /rain /city /nature 等命令设置场景氛围（每章 1~2 个）。',
                '· 不要使用图片、怪物或收集物指令。',
            ].join('\n');
            const md = stripFence(await aiOneShot(sys, source)).trim();
            if (!md || !/^#\s/m.test(md)) throw new Error('bad story md');
            const store = getStore();
            const relPath = 'stories/lifestory_' + Date.now().toString(36) + '.md';

            const url = new URL('haqi_devstory.html', location.href);

        } catch (e) {
            console.warn('互动人生生成失败', e);
            toast('这次没有做成，请稍后再试');
        }
        unbusy();
    }

</div>

<div id="lsToast" hidden></div>
`;
    document.body.appendChild(root);
    function $(sel) { return root.querySelector(sel); }

    // ---------- 章节菜单（当前章的操作） ----------
    function updateTray() {
        const rb = $('#lsRewardBtn');
        rb.hidden = state.sessionPoints <= 0;
        if (!rb.hidden) rb.textContent = '🎁 领奖励 ' + state.sessionPoints;
        $('#lsTray').hidden = state.readonly || !!state.drawTarget;
        const menu = $('#lsChapterMenu');
        const p = state.pages[state.pageIdx];
        const visible = visiblePages().map((i) => state.pages[i]).filter(Boolean);
        const bodyPage = visible.find((x) => x && x.kind === PAGE_KINDS.BODY);
        if (!bodyPage) { menu.hidden = true; return; }
        const chId = bodyPage.ch;
        const ch = chapterById(chId);
        const info = chInfo(chId);
        let html = '';
        // 翻远了就给一根「书签绳」：一键回到正在聊的那页
        const talkPage = state.activeCh ? chapterLastPage(state.activeCh) : -1;
        if (!state.readonly && talkPage >= 0 && !visiblePages().includes(talkPage)) {
            html += '<button class="ls-chmbtn ls-back" data-act="back">🖋️ 回到正在聊的地方</button>';
        }
        if (!state.readonly) {
            if (answerCount(chId) >= 2) html += '<button class="ls-chmbtn" data-act="write">✍️ ' + (info.written ? '重新整理成文' : '整理成文') + '</button>';
            if (info.written) html += '<button class="ls-chmbtn" data-act="illu">🎨 生成插画</button>';
        }
        html += '<button class="ls-chmbtn" data-act="read">🔊 朗读本页</button>';
        menu.innerHTML = html;
        menu.hidden = !html;
        menu.querySelectorAll('.ls-chmbtn').forEach((b) => {
            b.addEventListener('click', () => {
                const act = b.dataset.act;
                if (act === 'back') { const p = chapterLastPage(state.activeCh); if (p >= 0) flipTo(p); return; }
                if (act === 'write') writeChapter(chId);
                else if (act === 'illu') genIllustration(chId);
                else if (act === 'read') {
                    const texts = visiblePages().map((i) => state.pages[i]).filter((x) => x && x.kind === PAGE_KINDS.BODY)
                        .flatMap((pg) => pg.items.map((i) => { const e = chEntries(pg.ch)[i]; return e && e.t !== 'q' && e.text; }))
                        .filter(Boolean).join('。');
                    if (texts) { const keep = state.profile.voiceOn; state.profile.voiceOn = true; speak(texts); state.profile.voiceOn = keep; }
                }
            });
        });
    }

    // ---------- 主题 / 字号应用 ----------
    function applyTheme() {
        if (state.profile.theme && state.profile.theme !== 'classic') root.dataset.theme = state.profile.theme;
        else delete root.dataset.theme;
        root.classList.toggle('fs-l', state.profile.fontSize === 'l');
        root.classList.toggle('fs-xl', state.profile.fontSize === 'xl');
    }

    // ===================== 事件 =====================
    function markSelected(setName, value) {
        const grp = $('.ls-opts[data-set="' + setName + '"]');
        if (!grp) return;
        grp.querySelectorAll('button').forEach((b) => b.classList.toggle('sel', b.dataset.v === value));
    }
    function selectedValue(setName, fallback) {
        const b = $('.ls-opts[data-set="' + setName + '"] button.sel');
        return (b && b.dataset.v) || fallback;
    }
    root.querySelectorAll('.ls-opts').forEach((grp) => {
        grp.addEventListener('click', (e) => {
            const b = e.target.closest('button');
            if (!b) return;
            grp.querySelectorAll('button').forEach((x) => x.classList.toggle('sel', x === b));
        });
    });
    $('#lsSettingsBtn').addEventListener('click', () => {
        $('#lsNameInput').value = state.profile.name || '';
        $('#lsYearInput').value = state.profile.birthYear || '';
        markSelected('textStyle', state.profile.textStyle || 'plain');
        markSelected('chatTone', state.profile.chatTone || 'junior');
        markSelected('theme', state.profile.theme || 'classic');
        markSelected('fontSize', state.profile.fontSize || 'm');
        const sw = $('#lsVoiceSwitch');
        sw.textContent = state.profile.voiceOn ? '开' : '关';
        sw.classList.toggle('on', !!state.profile.voiceOn);
        $('#lsSettingsOverlay').hidden = false;
    });
    $('#lsSettingsClose').addEventListener('click', () => { $('#lsSettingsOverlay').hidden = true; });
    $('#lsVoiceSwitch').addEventListener('click', () => {
        const sw = $('#lsVoiceSwitch');
        const on = !sw.classList.contains('on');
        sw.classList.toggle('on', on);
        sw.textContent = on ? '开' : '关';
    });
    $('#lsSettingsSave').addEventListener('click', () => {
        state.profile.name = ($('#lsNameInput').value || '').trim();
        state.profile.birthYear = ($('#lsYearInput').value || '').trim().replace(/\D/g, '').slice(0, 4);
        state.profile.voiceOn = $('#lsVoiceSwitch').classList.contains('on');
        state.profile.textStyle = selectedValue('textStyle', 'plain');
        state.profile.chatTone = selectedValue('chatTone', 'junior');
        state.profile.theme = selectedValue('theme', 'classic');
        state.profile.fontSize = selectedValue('fontSize', 'm');
        state.sessions = {};  // 称呼/口吻变了，重建会话
        scheduleSave('profile');
        $('#lsSettingsOverlay').hidden = true;
        applyTheme();
        rebuildBook({ keepPage: true });  // 字号变化需要重新分页
        toast('已保存 ✅');
    });
    $('#lsHelpClose').addEventListener('click', () => {
        $('#lsHelpOverlay').hidden = true;
        if (state.pageIdx === 0) flipTo(1);
    });
    $('#lsVoiceToggle').addEventListener('click', () => {
        state.profile.voiceOn = !state.profile.voiceOn;
        if (!state.profile.voiceOn) stopSpeak();
        $('#lsVoiceToggle').textContent = state.profile.voiceOn ? '🔊' : '🔇';
        scheduleSave('profile');
        toast(state.profile.voiceOn ? '已打开自动朗读 🔊' : '已关闭自动朗读 🔇');
    });
    $('#lsRewardBtn').addEventListener('click', claimReward);
    $('#lsShareBtn').addEventListener('click', shareBook);
    $('#lsShareClose').addEventListener('click', () => { $('#lsShareOverlay').hidden = true; });
    $('#lsShareCopy').addEventListener('click', async () => {
        const ok = await copyText($('#lsShareLink').textContent);
        toast(ok ? '已复制 ✅' : '复制失败，请长按链接手动复制');
    });
    $('#lsShareOpen').addEventListener('click', (e) => {
        const href = e.currentTarget.dataset.href || $('#lsShareLink').textContent;
        if (href) { try { window.open(href, '_blank'); } catch (_) { location.href = href; } }
    });
    $('#lsShareGame').addEventListener('click', () => { $('#lsShareOverlay').hidden = true; makeInteractiveStory(); });
    // 只读分享页：家人给长者留问题
    $('#lsAskBtn').addEventListener('click', () => {
        const grp = $('#lsAskChs');
        if (!grp.children.length) {
            grp.innerHTML = CFG.chapters.map((c, i) =>
                '<button data-v="' + esc(c.id) + '"' + (i === 0 ? ' class="sel"' : '') + '>' + esc(c.title) + '</button>').join('');
        }
        $('#lsAskLink').hidden = true;
        $('#lsAskOverlay').hidden = false;
    });
    $('#lsAskClose').addEventListener('click', () => { $('#lsAskOverlay').hidden = true; });
    $('#lsAskMake').addEventListener('click', async () => {
        const q = ($('#lsAskText').value || '').trim();
        if (!q) { toast('先写下想问的问题呀'); return; }
        const name = ($('#lsAskName').value || '').trim();
        const chId = selectedValue('askCh', (CFG.chapters[0] || {}).id);
        const url = new URL(location.href);
        for (const k of [...url.searchParams.keys()]) url.searchParams.delete(k);
        url.searchParams.set('ask', q.slice(0, 120));
        if (name) url.searchParams.set('asker', name.slice(0, 12));
        if (chId) url.searchParams.set('askch', chId);
        url.searchParams.set('askid', Date.now().toString(36) + Math.random().toString(36).slice(2, 6));
        const link = url.href;
        const box = $('#lsAskLink');
        box.textContent = link;
        box.hidden = false;
        const ok = await copyText(link);
        toast(ok ? '链接已复制，微信发给 TA，TA 打开就能看到您的问题 💌' : '请长按下面的链接手动复制', 4500);
    });
    $('#lsPrevBtn').addEventListener('click', () => flipDelta(-1));
    $('#lsNextBtn').addEventListener('click', () => flipDelta(1));
    $('#lsMicBtn').addEventListener('click', toggleRecord);
    $('#lsMicHint').addEventListener('click', toggleRecord);  // 录音中：大按钮「说完了」
    $('#lsMoreBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        const sh = $('#lsMoreSheet');
        sh.hidden = !sh.hidden;
    });
    $('#lsMoreSheet').addEventListener('click', () => { $('#lsMoreSheet').hidden = true; });
    document.addEventListener('click', (e) => {
        const sh = $('#lsMoreSheet');
        if (!sh.hidden && !e.target.closest('#lsMoreSheet, #lsMoreBtn')) sh.hidden = true;
    });
    $('#lsRedoBtn').addEventListener('click', () => {
        const st = redoBar.st;
        if (!st) return;
        st.clicked = true;
        redoBar.st = null;
        $('#lsRedoBar').hidden = true;
        if (st.resolve) st.resolve();
    });
    $('#lsBrushBtn').addEventListener('click', startDrawing);
    $('#lsUndoBtn').addEventListener('click', undoStroke);
    $('#lsDrawCancel').addEventListener('click', () => endDrawMode(true));
    $('#lsDrawDone').addEventListener('click', () => endDrawMode(false));
    $('#lsSketchGen').addEventListener('click', sketchToImage);
    $('#lsEditCancel').addEventListener('click', () => { $('#lsEditOverlay').hidden = true; state.editTarget = null; });
    $('#lsEditSave').addEventListener('click', () => {
        const t = state.editTarget;
        const v = ($('#lsEditInput').value || '').trim();
        $('#lsEditOverlay').hidden = true;
        state.editTarget = null;
        if (!t) return;
        if (t.dedication) {
            if (v && v !== state.meta.dedication) {
                state.meta.dedication = v.slice(0, 120);
                scheduleSave('meta');
                toast('题词写好了 ✅');
            }
            renderSpread();
            return;
        }
        const e = chEntries(t.ch)[t.idx];
        if (!e) return;
        if (!v) { toast('改成空白就等于删掉，请用「删掉」按钮'); return; }
        if (v === e.text) return;
        e.text = v;
        if (e.t === 'a') e.fine = true;
        scheduleSave('entries', t.ch);
        rebuildBook({ keepPage: true });
        toast('改好了 ✅');
    });
    $('#lsKbBtn').addEventListener('click', () => {
        if (!state.activeCh) { toast('先点一个丝带书签，翻到想聊的篇章'); return; }
        $('#lsKbInput').value = '';
        $('#lsKbOverlay').hidden = false;
        try { $('#lsKbInput').focus(); } catch (_) {}
    });
    $('#lsKbClose').addEventListener('click', () => { $('#lsKbOverlay').hidden = true; });
    $('#lsKbSend').addEventListener('click', () => {
        const t = ($('#lsKbInput').value || '').trim();
        $('#lsKbOverlay').hidden = true;
        if (t) submitAnswer(t);
    });
    $('#lsPhotoBtn').addEventListener('click', () => {
        if (!state.activeCh && !currentInsertPos()) { toast('先点一个丝带书签，翻到想贴照片的篇章'); return; }
        $('#lsPhotoInput').click();
    });
    $('#lsPhotoInput').addEventListener('change', (e) => {
        const f = e.target.files && e.target.files[0];
        e.target.value = '';
        if (f) onPhotoPicked(f);
    });
    $('#lsVoiceBtn').addEventListener('click', recordVoiceIntoBook);
    // 未寄出的信
    $('#lsLtToChips').addEventListener('click', (e) => {
        const b = e.target.closest('.ls-ltchip');
        if (b) { $('#lsLtTo').value = b.textContent; }
    });
    $('#lsLtWhenHand').addEventListener('click', () => { letterDraft.openMode = 'hand'; renderLetterEditState(); });
    $('#lsLtWhenDate').addEventListener('click', () => { letterDraft.openMode = 'date'; renderLetterEditState(); });
    $('#lsLtRecBtn').addEventListener('click', recordLetterVoice);
    $('#lsLtVoiceDel').addEventListener('click', () => {
        if (letterDraft.voice && letterDraft.voice.pend) pendDrop(letterDraft.voice.pend);
        letterDraft.voice = null;
        renderLetterEditState();
    });
    $('#lsLtCancel').addEventListener('click', () => { $('#lsLetterEditOverlay').hidden = true; });
    $('#lsLtSeal').addEventListener('click', sealLetter);
    $('#lsVoiceStop').addEventListener('click', () => { try { vrec && vrec.rec.state === 'recording' && vrec.rec.stop(); } catch (_) {} });
    $('#lsVoiceCancel').addEventListener('click', () => closeVoiceOverlay());
    $('#lsVoiceDiscard').addEventListener('click', () => closeVoiceOverlay());
    $('#lsVoiceRetry').addEventListener('click', () => {
        if (!vrec) return;
        const res = vrec.resolve;
        closeVoiceOverlay(true);       // 保住 promise，重新开录
        startVoiceCapture(res);
    });
    $('#lsVoiceUse').addEventListener('click', () => {
        const v = vrec;
        if (!v || !v.blob) return;
        if (v.blob.size > 200 * 1024) { toast('这段太长了存不下，请重录短一点'); return; }
        const payload = { blob: v.blob, dur: v.dur, mime: v.mime };
        const res = v.resolve;
        closeVoiceOverlay(true);
        if (res) res(payload);
    });
    $('#lsVoicePrevPlay').addEventListener('click', function () {
        if (!vrec || !vrec.prevUrl) return;
        // 试听：直接借用全局播放器
        if (voiceAudio && !voiceAudio.paused && voiceAudio.src === vrec.prevUrl) { stopVoicePlay(); return; }
        toggleVoicePlay({ url: vrec.prevUrl }, this.parentElement);
    });
    // 点页面左右边缘翻页 + 滑动翻页
    (function bindFlipGestures() {
        const stage = $('#lsStage');
        let sx = 0, sy = 0, moved = false;
        stage.addEventListener('pointerdown', (e) => { sx = e.clientX; sy = e.clientY; moved = false; });
        stage.addEventListener('pointermove', (e) => { if (Math.abs(e.clientX - sx) > 12) moved = true; });
        stage.addEventListener('pointerup', (e) => {
            if (state.drawTarget || state.writing) return;
            if (state.photoDragging || Date.now() - (state.photoDropped || 0) < 350) return;  // 拖照片不算翻页手势
            const dx = e.clientX - sx;
            if (moved && Math.abs(dx) > 46 && Math.abs(dx) > Math.abs(e.clientY - sy)) {
                flipDelta(dx < 0 ? 1 : -1);
                return;
            }
            if (moved) return;
            // 点边缘翻页（避开按钮/条目）
            if (e.target.closest('button, .ls-entry, .ls-cover, .ls-drawpad')) return;
            const r = $('#lsBook').getBoundingClientRect();
            const x = (e.clientX - r.left) / r.width;
            if (x > 0.86) flipDelta(1);
            else if (x < 0.14) flipDelta(-1);
        });
    })();
    window.addEventListener('resize', () => {
        clearTimeout(window.__lsResizeT);
        window.__lsResizeT = setTimeout(() => rebuildBook({ keepPage: true }), 220);
    });
    window.addEventListener('message', (event) => {
        const msg = event.data || {};
        if (msg.type === 'setGameConfig' && msg.data) {
            try {
                if (typeof msg.data.elderName === 'string' && !state.profile.name) state.profile.name = msg.data.elderName;
            } catch (_) {}
            rebuildBook({ keepPage: true });
        }
    });

    // ===================== 启动 =====================
    // 家人通过链接留下的问题（?ask=…），翻开书时贴成粉色便签并读出来
    function handleFamilyAsk() {
        if (state.readonly) return;
        const q = (QS.get('ask') || '').trim();
        if (!q) return;
        const askId = QS.get('askid') || ('ask_' + q.slice(0, 20));
        let seen = [];
        try { seen = JSON.parse(localStorage.getItem('haqiLifeStoryAsks') || '[]'); } catch (_) {}
        if (seen.includes(askId)) return;  // 同一个链接只贴一次
        seen.push(askId);
        try { localStorage.setItem('haqiLifeStoryAsks', JSON.stringify(seen.slice(-50))); } catch (_) {}
        const asker = (QS.get('asker') || '家里人').slice(0, 12);
        const ch = chapterById(QS.get('askch')) || CFG.chapters[0];
        if (!ch) return;
        state.activeCh = ch.id;
        const idx = appendEntry(ch.id, { t: 'q', text: q.slice(0, 200), from: asker, ts: Date.now() });
        toast('💌 ' + asker + '给您留了一个问题', 4500);
        setTimeout(() => {
            const keep = state.profile.voiceOn;
            state.profile.voiceOn = true; speak(asker + '想问您：' + q); state.profile.voiceOn = keep;
            typewrite(ch.id, idx);
        }, 800);
    }
    async function bootShared(from) {
        state.readonly = true;
        state.sharedFrom = from;
        $('#lsTray').hidden = true;
        $('#lsShareBtn').hidden = true;
        $('#lsSettingsBtn').hidden = true;
        busy('正在翻开这本回忆录…');
        try {
            const meta = await storeReadShared(from, DIR + '/meta.json');
            if (meta) state.meta = meta;
            let any = false;
            for (const ch of CFG.chapters) {
                try {
                    const d = await storeReadShared(from, DIR + '/entries_' + ch.id + '.json');
                    if (d && Array.isArray(d.entries) && d.entries.length) { state.chapters[ch.id] = d; any = true; }
                } catch (_) {}
            }
            try {
                const L = await storeReadShared(from, DIR + '/letters.json');
                if (L && Array.isArray(L.letters)) state.letters = L.letters;
            } catch (_) {}
            if (!any) throw new Error('empty book');
            rebuildBook({});
            state.pageIdx = 0;
            renderSpread();
            $('#lsAskBtn').hidden = false;
        } catch (e) {
            console.warn('分享回忆录加载失败', e);
            toast('这本回忆录还没准备好，请让家人重新分享一次', 5000);
        }
        unbusy();
    }
    function boot() {
        const cached = lsLoad();
        if (cached) {
            if (cached.profile) state.profile = Object.assign({}, DEFAULT_PROFILE, cached.profile);
            if (cached.chapters) state.chapters = cached.chapters;
            if (cached.meta) state.meta = Object.assign(state.meta, cached.meta);
            if (Array.isArray(cached.facts)) state.facts = cached.facts;
            if (Array.isArray(cached.letters)) state.letters = cached.letters;
        } else {
            const v1 = (function () { try { const r = localStorage.getItem('haqiLifeStoryV1'); return r ? JSON.parse(r) : null; } catch (_) { return null; } })();
            if (v1) {
                if (v1.profile) state.profile = Object.assign({}, DEFAULT_PROFILE, v1.profile);
                migrateV1(v1.chats, v1.book);
                lsSave();
            }
        }
        applyTheme();
        const from = QS.get('from');
        if (from && QS.get('book')) {
            bootShared(from);
        } else {
            rebuildBook({});
            state.pageIdx = 0;
            renderSpread();
            if (!cached) $('#lsHelpOverlay').hidden = false;
            loadAllFromStore().then(handleFamilyAsk).catch(handleFamilyAsk);
        }
        $('#lsVoiceToggle').textContent = state.profile.voiceOn ? '🔊' : '🔇';
        if (!state.loadedPosted) { state.loadedPosted = true; post('gameLoaded', {}); }
    }
    boot();
})();
