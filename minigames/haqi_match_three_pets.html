	function boot() {
		document.body.appendChild(root);
		loadSavedSettings();
		renderLevelSelect();
		bindEvents();
		loadPetAssets().then((pets) => {
			state.pets = pets;
			renderPreview();
			showHowTo();
			post('gameLoaded');
		});
	}

	function bindEvents() {
		byId('mhHelp').onclick = () => {
			playSound('tap');
			showHowTo();
		};
		byId('mhHint').onclick = () => {
			playSound('select');
			showHint();
		};
		byId('mhStart').onclick = () => {
			playSound('start');
			byId('mhHowTo').hidden = true;
			if (!state.started || state.finished) startGame();
		};
		byId('mhResultRetry').onclick = () => {
			playSound('start');
			byId('mhResult').hidden = true;
			startGame();
		};
		byId('mhResultClose').onclick = () => {
			playSound('tap');
			byId('mhResult').hidden = true;
		};
		byId('mhRestart').onclick = () => {
			playSound('start');
			startGame();
		};
		byId('mhLevelSelect').onchange = (event) => {
			const config = getLevelConfig(event.target.value);
			if (!config) return;
			state.levelConfig = config;
			saveSettings();
			playSound('start');
			if (state.started) startGame();
		};
		window.addEventListener('message', (event) => {
			const msg = event.data || {};
			if (msg.type === 'gameContinue') startGame();
			if (isLevelConfigMessage(msg)) {
				applyIncomingLevelConfigs(msg.data || msg.config || msg.levelConfig || msg);
				if (state.started) startGame();
			}
		});
		window.addEventListener('beforeunload', cleanupObjectUrls);
	}

	async function loadPetAssets() {
		const requestId = `match_three_pets_${Date.now()}`;
		const parentPets = await requestPetImages(requestId);
		const assets = [];
		for (const pet of parentPets.slice(0, TYPE_COUNT)) {
			const asset = petAssetFromPayload(pet, assets.length);
			if (asset) assets.push(asset);
		}
		for (const fallback of FALLBACK_PETS) {
			if (assets.length >= TYPE_COUNT) break;
			assets.push({ kind: 'emoji', name: fallback.name, emoji: fallback.emoji, jelly: JELLY_COLORS[assets.length % JELLY_COLORS.length] });
		}
		return assets.slice(0, TYPE_COUNT);
	}

	function requestPetImages(requestId) {
		return new Promise((resolve) => {
			let settled = false;
			const timer = setTimeout(() => finish([]), 1200);
			function finish(pets) {
				if (settled) return;
				settled = true;
				clearTimeout(timer);
				window.removeEventListener('message', onMessage);
				resolve(Array.isArray(pets) ? pets : []);
			}
			function onMessage(event) {
				const msg = event.data || {};
				if (msg.type !== 'haqi_pet_images' || msg.requestId !== requestId) return;
				finish(msg.ok ? msg.data?.pets : []);
			}
			window.addEventListener('message', onMessage);
			post('haqi_get_pet_images', { requestId, anim: 'happy' }, { requestId, anim: 'happy' });
		});
	}

	function petAssetFromPayload(pet, index) {
		if (!pet?.imageBlob || !pet?.uv) return null;
		const url = URL.createObjectURL(pet.imageBlob);
		state.objectUrls.push(url);
		return {
			kind: 'pet',
			name: pet.name || t('defaultPetName'),
			url,
			uv: pet.uv,
			imageWidth: pet.imageWidth || 0,
			imageHeight: pet.imageHeight || 0,
			jelly: JELLY_COLORS[index % JELLY_COLORS.length],
		};
	}

	function startGame() {
		state.levelConfig = state.levelConfig || state.levelConfigs[0];
		byId('mhResult').hidden = true;
		state.started = true;
		state.finished = false;
		state.locked = false;
		state.selected = null;
		state.hintCells.clear();
		state.moves = activeConfig().moves;
		state.score = 0;
		state.combo = 0;
		state.goalCollected = 0;
		state.tilesCleared = 0;
		state.glassCleared = 0;
		state.vinesCleared = 0;
		state.objectsCollected = 0;
		state.board = createBoard();
		state.tiles = createTiles();
		state.glass = createGlass();
		state.vines = createVines();
		state.objects = createObjects();
		ensurePlayableBoard();
		post('gameStarted');
		updateStats();
		updateObjectives();
		renderBoard();
		setTip(t('startLevelTip', { level: difficultyLabel(activeConfig()) }));
		if (activeConfig().id === 'story1') setTimeout(() => {
			if (state.started && !state.finished && !state.locked && !state.selected) showHint();
		}, 650);
	}

	function createBoard() {
		const board = [];
		for (let row = 0; row < BOARD_SIZE; row++) {
			board[row] = [];
			for (let col = 0; col < BOARD_SIZE; col++) {
				let type = randomType();
				let guard = 0;
				while (wouldCreateMatch(board, row, col, type) && guard < 20) {
					type = randomType();
					guard++;
				}
				board[row][col] = type;
			}
		}
		return board;
	}

	function ensurePlayableBoard(options = {}) {
		if (!findMatches().length && findValidMove()) return false;
		for (let attempt = 0; attempt < 60; attempt++) {
			if (options.reshuffleExisting) shuffleBoardValues();
			else state.board = createBoard();
			if (!findMatches().length && findValidMove()) return true;
		}
		state.board = createBoard();
		return true;
	}

	function shuffleBoardValues() {
		const values = [];
		for (let row = 0; row < BOARD_SIZE; row++) {
			for (let col = 0; col < BOARD_SIZE; col++) values.push(state.board[row][col]);
		}
		shuffle(values);
		for (let row = 0, index = 0; row < BOARD_SIZE; row++) {
			for (let col = 0; col < BOARD_SIZE; col++, index++) state.board[row][col] = values[index];
		}
	}

	function findValidMove() {
		for (let row = 0; row < BOARD_SIZE; row++) {
			for (let col = 0; col < BOARD_SIZE; col++) {
				if (state.vines[row]?.[col]) continue;
				const current = { row, col };
				const candidates = [{ row, col: col + 1 }, { row: row + 1, col }];
				for (const next of candidates) {
					if (!isInsideBoard(next.row, next.col) || state.vines[next.row]?.[next.col]) continue;
					if (wouldSwapCreateMatch(current, next)) return { first: current, second: next };
				}
			}
		}
		return null;
	}

	function wouldSwapCreateMatch(first, second) {
		if (isSpecial(state.board[first.row]?.[first.col]) || isSpecial(state.board[second.row]?.[second.col])) return true;
		swap(first, second);
		const ok = findMatches().length > 0;
		swap(first, second);
		return ok;
	}

	function showHint() {
		if (state.locked || state.finished) return;
		const move = findValidMove();
		state.hintCells.clear();
		if (!move) {
			state.locked = true;
			ensurePlayableBoard({ reshuffleExisting: true });
			renderBoard();
			pulseShuffle();
			showToast(t('boardShuffled'));
			setTip(t('noMovesTip'));
			setTimeout(() => { state.locked = false; renderBoard(); }, 480);
			return;
		}
		state.hintCells.add(key(move.first.row, move.first.col));
		state.hintCells.add(key(move.second.row, move.second.col));
		renderBoard();
		setTip(t('hintTip'));
		setTimeout(() => {
			state.hintCells.clear();
			if (!state.locked && !state.finished) renderBoard();
		}, 2600);
	}

	function clearHint() {
		if (!state.hintCells.size) return;
		state.hintCells.clear();
	}

	function createTiles() {
		const tiles = emptyGrid(null);
		const count = clamp(Math.floor(activeConfig().tileCount || 0), 0, BOARD_SIZE * BOARD_SIZE);
		const cells = shuffledCells();
		shuffle(cells);
		cells.slice(0, count).forEach(({ row, col }, index) => {
			tiles[row][col] = MAP_TERRAINS[index % MAP_TERRAINS.length];
		});
		return tiles;
	}

	function createGlass() {
		const glass = emptyGrid(0);
		const count = clamp(Math.floor(activeConfig().glassCount || 0), 0, BOARD_SIZE * BOARD_SIZE);
		shuffledCells().slice(0, count).forEach(({ row, col }, index) => {
			glass[row][col] = index % 4 === 0 ? 2 : 1;
		});
		return glass;
	}

	function createVines() {
		const vines = emptyGrid(false);
		const count = clamp(Math.floor(activeConfig().vineCount || 0), 0, BOARD_SIZE * BOARD_SIZE);
		const cells = shuffledCells().filter(({ row, col }) => !state.glass[row]?.[col]);
		cells.slice(0, count).forEach(({ row, col }) => {
			vines[row][col] = true;
		});
		return vines;
	}

	function createObjects() {
		const objects = emptyGrid(null);
		const count = clamp(Math.floor(activeConfig().objectCount || 0), 0, BOARD_SIZE * BOARD_SIZE);
		const cells = shuffledCells().filter(({ row, col }) => !state.vines[row]?.[col]);
		cells.slice(0, count).forEach(({ row, col }, index) => {
			objects[row][col] = MAP_OBJECTS[index % MAP_OBJECTS.length];
		});
		return objects;
	}

	function activeConfig() {
		return normalizeLevelConfig(state.levelConfig || state.levelConfigs[0], 0);
	}

	function getLevelConfig(id) {
		return state.levelConfigs.find((config) => config.id === id) || state.levelConfigs[0];
	}

	function loadSavedSettings() {
		let saved = null;
		try {
			saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
		} catch (_) {}
		if (saved?.version === SETTINGS_VERSION && Array.isArray(saved?.levelConfigs) && saved.levelConfigs.length) {
			state.levelConfigs = saved.levelConfigs.map(normalizeLevelConfig).slice(0, 12);
		}
		if (saved?.bestResults && typeof saved.bestResults === 'object') state.bestResults = saved.bestResults;
		state.levelConfig = getLevelConfig(saved?.selectedLevelId) || state.levelConfigs[0];
	}

	function saveSettings() {
		try {
			localStorage.setItem(STORAGE_KEY, JSON.stringify({
				version: SETTINGS_VERSION,
				selectedLevelId: state.levelConfig?.id || state.levelConfigs[0]?.id,
				levelConfigs: state.levelConfigs,
				bestResults: state.bestResults,
			}));
		} catch (_) {}
	}

	function renderLevelSelect() {
		const select = byId('mhLevelSelect');
		if (!select) return;
		select.innerHTML = '';
		state.levelConfigs.forEach((config) => {
			const option = document.createElement('option');
			option.value = config.id;
			option.textContent = difficultyLabel(config);
			if (state.levelConfig?.id === config.id) option.selected = true;
			select.appendChild(option);
		});
	}

	function isLevelConfigMessage(msg) {
		return ['haqi_match_three_level_config', 'setMatchThreeLevelConfig', 'setLevelConfig', 'updateLevelConfig'].includes(String(msg?.type || ''));
	}

	function applyIncomingLevelConfigs(payload) {
		const rawConfigs = Array.isArray(payload) ? payload : (payload?.levels || payload?.difficulties || payload?.configs || [payload]);
		const incoming = rawConfigs.map(normalizeLevelConfig).filter(Boolean);
		if (!incoming.length) return;
		state.levelConfigs = incoming.slice(0, 12);
		const selectedId = payload?.selectedLevelId || payload?.selectedId || payload?.id || state.levelConfig?.id;
		state.levelConfig = getLevelConfig(selectedId) || state.levelConfigs[0];
		renderLevelSelect();
		saveSettings();
		showToast(t('levelUpdated'));
		post('levelConfigSaved', { selectedLevelId: state.levelConfig.id, count: state.levelConfigs.length });
	}

	function normalizeLevelConfig(config, index = 0) {
		const fallback = LEVEL_PRESETS[index % LEVEL_PRESETS.length];
		if (!config || typeof config !== 'object') return { ...fallback };
		const goalType = Number.isInteger(config.goalType) ? clamp(config.goalType, 0, TYPE_COUNT - 1) : fallback.goalType;
		return {
			id: String(config.id || `ai_${index + 1}`),
			title: String(config.title || config.name || fallback.title),
			moves: clamp(Number(config.moves ?? config.maxMoves ?? fallback.moves), 10, 60),
			targetScore: clamp(Number(config.targetScore ?? config.scoreTarget ?? fallback.targetScore), 300, 9999),
			goalType,
			goalCount: clamp(Number(config.goalCount ?? config.collectCount ?? fallback.goalCount ?? 0), 0, 80),
			tileCount: clamp(Number(config.tileCount ?? config.terrainCount ?? fallback.tileCount ?? 0), 0, BOARD_SIZE * BOARD_SIZE),
			glassCount: clamp(Number(config.glassCount ?? config.overlayCount ?? fallback.glassCount ?? 0), 0, BOARD_SIZE * BOARD_SIZE),
			vineCount: clamp(Number(config.vineCount ?? config.entangledCount ?? config.entangleCount ?? fallback.vineCount ?? 0), 0, BOARD_SIZE * BOARD_SIZE),
			objectCount: clamp(Number(config.objectCount ?? config.mapObjectCount ?? config.treasureCount ?? fallback.objectCount ?? 0), 0, BOARD_SIZE * BOARD_SIZE),
			special: config.special !== false,
		};
	}

	function difficultyLabel(config) {
		const title = String(config?.title || config?.name || t('defaultDifficulty'));
		return title.replace(/^Lv\.?\s*\d+\s*/i, '').trim() || title;
	}

	function wouldCreateMatch(board, row, col, type) {
		const left = col >= 2 && board[row][col - 1] === type && board[row][col - 2] === type;
		const up = row >= 2 && board[row - 1][col] === type && board[row - 2][col] === type;
		return left || up;
	}

	function renderPreview() {
		const preview = byId('mhPetPreview');
		preview.innerHTML = '';
		state.pets.forEach((asset) => {
			const node = document.createElement('div');
			node.className = 'mh-preview-token';
			node.appendChild(createToken(asset));
			preview.appendChild(node);
		});
	}

	function renderBoard(changed = new Set()) {
		const boardEl = byId('mhBoard');
		boardEl.innerHTML = '';
		for (let row = 0; row < BOARD_SIZE; row++) {
			for (let col = 0; col < BOARD_SIZE; col++) {
				const cell = document.createElement('button');
				cell.type = 'button';
				cell.className = 'mh-cell';
				cell.disabled = state.locked || state.finished;
				cell.dataset.row = row;
				cell.dataset.col = col;
				if (state.selected && state.selected.row === row && state.selected.col === col) cell.classList.add('selected');
				if (state.hintCells.has(key(row, col))) cell.classList.add('hint');
				if (changed.has(key(row, col))) cell.classList.add('drop');
				const terrain = state.tiles[row]?.[col];
				if (terrain) cell.classList.add('has-terrain', 'has-tile', `terrain-${terrain}`);
				if (state.vines[row]?.[col]) cell.classList.add('blocked');
				const value = state.board[row][col];
				const type = baseType(value);
				cell.setAttribute('aria-label', `${state.pets[type]?.name || t('defaultPetName')}${specialLabel(value)} ${row + 1}-${col + 1}`);
				cell.appendChild(createToken(state.pets[type], value));
				appendMapLayers(cell, row, col);
				cell.addEventListener('pointerdown', (event) => handlePointerDown(event, row, col));
				boardEl.appendChild(cell);
			}
		}
	}

	function appendMapLayers(cell, row, col) {
		const object = state.objects[row]?.[col];
		if (object) {
			const objectEl = document.createElement('span');
			objectEl.className = `mh-object object-${object.id}`;
			const icon = document.createElement('span');
			icon.className = 'mh-object-icon';
			icon.textContent = object.icon;
			objectEl.appendChild(icon);
			cell.appendChild(objectEl);
		}
		const glassHp = state.glass[row]?.[col] || 0;
		if (glassHp > 0) {
			const glass = document.createElement('span');
			glass.className = `mh-glass hp-${glassHp}`;
			cell.appendChild(glass);
		}
		if (state.vines[row]?.[col]) {
			const vine = document.createElement('span');
			vine.className = 'mh-vine';
			vine.textContent = '🌿';
			cell.appendChild(vine);
		}
	}

	function updateObjectives() {
		const wrap = byId('mhObjectives');
		if (!wrap) return;
		const config = activeConfig();
		const objectives = [`<span class="mh-objective">⭐ ${state.score}/${config.targetScore}</span>`];
		if (Number.isInteger(config.goalType) && config.goalCount > 0) {
			objectives.push(`<span class="mh-objective">${state.pets[config.goalType]?.emoji || '🐾'} ${state.goalCollected}/${config.goalCount}</span>`);
		}
		if (config.tileCount > 0) {
			objectives.push(`<span class="mh-objective">🌿 ${state.tilesCleared}/${config.tileCount}</span>`);
		}
		if (config.glassCount > 0) {
			objectives.push(`<span class="mh-objective">🧊 ${state.glassCleared}/${config.glassCount}</span>`);
		}
		if (config.vineCount > 0) {
			objectives.push(`<span class="mh-objective">🌱 ${state.vinesCleared}/${config.vineCount}</span>`);
		}
		if (config.objectCount > 0) {
			objectives.push(`<span class="mh-objective">🍎 ${state.objectsCollected}/${config.objectCount}</span>`);
		}
		wrap.innerHTML = objectives.join('');
	}

	function handlePointerDown(event, row, col) {
		if (state.locked || state.finished) return;
		clearHint();
		if (state.vines[row]?.[col]) {
			playSound('invalid');
			showInvalidSwap([{ row, col }]);
			setTip(t('vineBlockTip'));
			return;
		}
		playSound('tap');
		event.preventDefault();
		const cell = event.currentTarget;
		cell.setPointerCapture?.(event.pointerId);
		cell.classList.add('dragging');
		state.drag = {
			row,
			col,
			startX: event.clientX,
			startY: event.clientY,
			pointerId: event.pointerId,
			cell,
			target: null,
			targetCell: null,
			didMove: false,
			dx: 0,
			dy: 0,
		};
		window.addEventListener('pointermove', handlePointerMove, { passive: false });
		window.addEventListener('pointerup', handlePointerUp, { passive: false });
		window.addEventListener('pointercancel', handlePointerCancel, { passive: false });
	}

	function handlePointerMove(event) {
		if (!state.drag || event.pointerId !== state.drag.pointerId) return;
		event.preventDefault();
		const rawDx = event.clientX - state.drag.startX;
		const rawDy = event.clientY - state.drag.startY;
		const cellStep = getBoardCellStep();
		const distance = Math.sqrt(rawDx * rawDx + rawDy * rawDy);
		state.drag.didMove = distance > 6;

		let dx = rawDx;
		let dy = rawDy;
		let target = null;
		if (Math.abs(rawDx) > Math.abs(rawDy)) {
			dy = 0;
			dx = clamp(rawDx, -cellStep, cellStep);
			if (Math.abs(dx) > cellStep * 0.28) target = { row: state.drag.row, col: state.drag.col + (dx > 0 ? 1 : -1) };
		} else {
			dx = 0;
			dy = clamp(rawDy, -cellStep, cellStep);
			if (Math.abs(dy) > cellStep * 0.28) target = { row: state.drag.row + (dy > 0 ? 1 : -1), col: state.drag.col };
		}

		state.drag.dx = dx;
		state.drag.dy = dy;
		state.drag.cell.style.transform = `translate(${dx}px, ${dy}px)`;
		setDragTarget(target && isInsideBoard(target.row, target.col) && !state.vines[target.row]?.[target.col] ? target : null);
		updateDragTargetTransform();
	}

	function handlePointerUp(event) {
		if (!state.drag || event.pointerId !== state.drag.pointerId) return;
		event.preventDefault();
		const drag = state.drag;
		const target = drag.target;
		cleanupPointerDrag(false, Boolean(target));
		if (target) {
			swapAndResolve({ row: drag.row, col: drag.col }, target, { dragged: true, dragOffset: { dx: drag.dx, dy: drag.dy } });
			return;
		}
		animateDragBack(drag.cell);
		if (!drag.didMove) selectCell(drag.row, drag.col);
	}

	function handlePointerCancel(event) {
		if (!state.drag || event.pointerId !== state.drag.pointerId) return;
		const cell = state.drag.cell;
		cleanupPointerDrag(false);
		animateDragBack(cell);
	}

	function setDragTarget(target) {
		if (sameOptionalCell(state.drag?.target, target)) return;
		clearDragTarget();
		state.drag.target = target;
		state.drag.targetCell = null;
		if (!target) return;
		state.drag.targetCell = document.querySelector(`[data-row="${target.row}"][data-col="${target.col}"]`);
		state.drag.targetCell?.classList.add('swap-target');
	}

	function updateDragTargetTransform() {
		if (!state.drag?.targetCell) return;
		state.drag.targetCell.style.transform = `translate(${-state.drag.dx}px, ${-state.drag.dy}px)`;
	}

	function clearDragTarget() {
		document.querySelectorAll('.mh-cell.swap-target').forEach((cell) => {
			cell.classList.remove('swap-target');
			cell.style.transform = '';
		});
	}

	function cleanupPointerDrag(resetTransform = true, keepTargetTransform = false) {
		window.removeEventListener('pointermove', handlePointerMove);
		window.removeEventListener('pointerup', handlePointerUp);
		window.removeEventListener('pointercancel', handlePointerCancel);
		if (keepTargetTransform && state.drag?.targetCell) {
			state.drag.targetCell.classList.remove('swap-target');
		} else {
			clearDragTarget();
		}
		if (state.drag?.cell) {
			state.drag.cell.classList.remove('dragging');
			if (resetTransform) state.drag.cell.style.transform = '';
		}
		state.drag = null;
	}

	function animateDragBack(cell) {
		if (!cell) return;
		cell.classList.add('swapping');
		requestAnimationFrame(() => {
			cell.style.transform = '';
			setTimeout(() => cell.classList.remove('swapping'), 190);
		});
	}

	function animateSwapCells(first, second, options = {}) {
		const firstCell = document.querySelector(`[data-row="${first.row}"][data-col="${first.col}"]`);
		const secondCell = document.querySelector(`[data-row="${second.row}"][data-col="${second.col}"]`);
		if (!firstCell || !secondCell) return Promise.resolve();

		const step = getBoardCellStep();
		const dx = (second.col - first.col) * step;
		const dy = (second.row - first.row) * step;
		firstCell.classList.add('swapping');
		secondCell.classList.add('swapping');

		if (options.dragged && options.dragOffset) {
			firstCell.style.transform = `translate(${options.dragOffset.dx}px, ${options.dragOffset.dy}px)`;
			secondCell.style.transform = `translate(${-options.dragOffset.dx}px, ${-options.dragOffset.dy}px)`;
		} else {
			firstCell.style.transform = 'translate(0, 0)';
			secondCell.style.transform = 'translate(0, 0)';
		}

		return new Promise((resolve) => {
			requestAnimationFrame(() => {
				firstCell.style.transform = `translate(${dx}px, ${dy}px)`;
				secondCell.style.transform = `translate(${-dx}px, ${-dy}px)`;
				setTimeout(() => {
					if (options.holdFinal) {
						resolve();
						return;
					}
					firstCell.classList.remove('swapping');
					secondCell.classList.remove('swapping');
					firstCell.style.transform = '';
					secondCell.style.transform = '';
					resolve();
				}, 190);
			});
		});
	}

	function animateSwapBackFromHeld(first, second) {
		const firstCell = document.querySelector(`[data-row="${first.row}"][data-col="${first.col}"]`);
		const secondCell = document.querySelector(`[data-row="${second.row}"][data-col="${second.col}"]`);
		if (!firstCell || !secondCell) return Promise.resolve();

		firstCell.classList.add('swapping');
		secondCell.classList.add('swapping');

		return new Promise((resolve) => {
			requestAnimationFrame(() => {
				firstCell.style.transform = 'translate(0, 0)';
				secondCell.style.transform = 'translate(0, 0)';
				setTimeout(() => {
					firstCell.classList.remove('swapping');
					secondCell.classList.remove('swapping');
					firstCell.style.transform = '';
					secondCell.style.transform = '';
					resolve();
				}, 190);
			});
		});
	}

	function createToken(asset, value = 0) {
		const token = document.createElement('span');
		token.className = 'mh-token';
		if (isSpecial(value)) token.classList.add('special', specialClass(specialKind(value)));
		applyJellyStyle(token, asset);
		if (asset?.kind === 'pet') {
			const sprite = document.createElement('span');
			const uv = asset.uv;
			sprite.className = 'mh-sprite';
			sprite.style.backgroundImage = `url("${asset.url}")`;
				if (asset.imageWidth && asset.imageHeight && uv.width && uv.height) {
					const sizeX = asset.imageWidth / uv.width * 100;
					const sizeY = asset.imageHeight / uv.height * 100;
					const posX = asset.imageWidth === uv.width ? 0 : uv.x / (asset.imageWidth - uv.width) * 100;
					const posY = asset.imageHeight === uv.height ? 0 : uv.y / (asset.imageHeight - uv.height) * 100;
					sprite.style.backgroundSize = `${sizeX}% ${sizeY}%`;
					sprite.style.backgroundPosition = `${posX}% ${posY}%`;
				} else if (uv.cols > 1 || uv.rows > 1) {
					sprite.style.backgroundSize = `${uv.cols * 100}% ${uv.rows * 100}%`;
					sprite.style.backgroundPosition = `${uv.cols > 1 ? uv.col * 100 / (uv.cols - 1) : 0}% ${uv.rows > 1 ? uv.row * 100 / (uv.rows - 1) : 0}%`;
			} else {
				sprite.style.backgroundSize = 'contain';
				sprite.style.backgroundPosition = 'center';
			}
			token.appendChild(sprite);
			appendSpecialArt(token, value);
			return token;
		}
		const emoji = document.createElement('span');
		emoji.className = 'mh-emoji';
		emoji.textContent = asset?.emoji || '⭐';
		token.appendChild(emoji);
		appendSpecialArt(token, value);
		return token;
	}

	function appendSpecialArt(token, value) {
		if (!isSpecial(value)) return;
		const core = document.createElement('span');
		core.className = 'mh-special-core';
		const glyph = document.createElement('span');
		glyph.className = 'mh-special-glyph';
		core.appendChild(glyph);
		token.appendChild(core);
	}

	function applyJellyStyle(token, asset) {
		const jelly = asset?.jelly || JELLY_COLORS[0];
		token.style.setProperty('--jelly-from', jelly.from);
		token.style.setProperty('--jelly-to', jelly.to);
		token.style.setProperty('--jelly-shine', jelly.shine);
	}

	function selectCell(row, col) {
		if (state.locked || state.finished) return;
		clearHint();
		if (state.vines[row]?.[col]) {
			playSound('invalid');
			showInvalidSwap([{ row, col }]);
			setTip(t('vineBlockTip'));
			return;
		}
		const current = { row, col };
		if (!state.selected) {
			playSound('select');
			state.selected = current;
			renderBoard();
			return;
		}
		if (sameCell(state.selected, current)) {
			playSound('tap');
			state.selected = null;
			renderBoard();
			return;
		}
		if (!isAdjacent(state.selected, current)) {
			playSound('select');
			state.selected = current;
			renderBoard();
			return;
		}
		swapAndResolve(state.selected, current);
	}

	async function swapAndResolve(first, second, options = {}) {
		if (state.vines[first.row]?.[first.col] || state.vines[second.row]?.[second.col]) {
			playSound('invalid');
			showInvalidSwap([first, second]);
			return;
		}
		state.locked = true;
		playSound('swap');
		await animateSwapCells(first, second, { ...options, holdFinal: true });
		swap(first, second);
		state.selected = null;
		clearSelectedVisual();

		const specialCombo = specialComboCells(first, second);
		let matches = specialCombo.length ? [specialCombo] : findMatches();
		const directSpecials = [first, second].filter(({ row, col }) => isSpecial(state.board[row][col]));
		if (!matches.length && directSpecials.length) matches = [directSpecials];
		if (!matches.length) {
			swap(first, second);
			await animateSwapBackFromHeld(first, second);
			playSound('invalid');
			showInvalidSwap([first, second]);
			state.locked = false;
			setTip(t('noMatchTip'));
			return;
		}

		renderBoard();
		await delay(160);

		state.moves--;
		state.combo = 0;
		updateStats();
		if (specialCombo.length) showComboBanner(t('skillCombo'));
		await resolveMatches(matches);
		state.locked = false;
		renderBoard();
		checkFinish();
	}

	async function resolveMatches(matches) {
		while (matches.length) {
			state.combo++;
			const specialPlan = createSpecialsForMatches(matches);
			const cells = expandSpecialCells(uniqueCells(matches.flat()));
			const activatedSpecial = cells.some(({ row, col }) => isSpecial(state.board[row]?.[col]));
			if (activatedSpecial || specialPlan.length) {
				playSound('special', specialPlan.length || 1);
				pulseStage3D();
			}
			playSound(state.combo > 1 ? 'combo' : 'match', state.combo);
			markMatching(cells);
			createParticles(cells);
			const mapBonus = collectMapRewards(cells);
			const gained = cells.length * 10 + Math.max(0, state.combo - 1) * 20 + specialPlan.length * 35 + mapBonus;
			collectObjectives(cells);
			state.score += gained;
			updateStats();
			updateObjectives();
			showScoreFloat(gained, cells);
			if (state.combo > 1) showComboBanner(state.combo);
			if (cells.length >= 8) showComboBanner(t('bigClear'));
			pulseBoard();
			await delay(260);
			clearCells(cells);
			placeSpecials(specialPlan, cells);
			const changed = collapseBoard();
			renderBoard(changed);
			await delay(170);
			matches = findMatches();
		}
		if (state.moves > 0 && ensurePlayableBoard({ reshuffleExisting: true })) {
			state.hintCells.clear();
			renderBoard();
			pulseShuffle();
			showToast(t('boardShuffled'));
			await delay(260);
		}
		setTip(state.combo > 1 ? t('comboTip', { combo: state.combo }) : t('keepLooking'));
	}

	function findMatches() {
		const matches = [];
		for (let row = 0; row < BOARD_SIZE; row++) {
			let runStart = 0;
			for (let col = 1; col <= BOARD_SIZE; col++) {
				if (col < BOARD_SIZE && baseType(state.board[row][col]) === baseType(state.board[row][runStart])) continue;
				if (col - runStart >= 3) matches.push(range(runStart, col).map((c) => ({ row, col: c })));
				runStart = col;
			}
		}
		for (let col = 0; col < BOARD_SIZE; col++) {
			let runStart = 0;
			for (let row = 1; row <= BOARD_SIZE; row++) {
				if (row < BOARD_SIZE && baseType(state.board[row][col]) === baseType(state.board[runStart][col])) continue;
				if (row - runStart >= 3) matches.push(range(runStart, row).map((r) => ({ row: r, col })));
				runStart = row;
			}
		}
		return matches;
	}

	function createSpecialsForMatches(matches) {
		if (!activeConfig().special) return [];
		const specials = [];
		matches.forEach((group) => {
			if (group.length < 4) return;
			if (group.some(({ row, col }) => isSpecial(state.board[row][col]))) return;
			const pivot = group[Math.floor(group.length / 2)];
			const value = state.board[pivot.row][pivot.col];
			const kind = group.length >= 5
				? SPECIAL_KIND.BOMB
				: (group.every((cell) => cell.row === group[0].row) ? SPECIAL_KIND.ROW : SPECIAL_KIND.COL);
			specials.push({ ...pivot, value: makeSpecial(baseType(value), kind) });
		});
		return specials;
	}

	function expandSpecialCells(cells) {
		const queue = [...cells];
		const selected = new Map(cells.map((cell) => [key(cell.row, cell.col), cell]));
		while (queue.length) {
			const cell = queue.shift();
			const value = state.board[cell.row]?.[cell.col];
			if (!isSpecial(value)) continue;
			const extra = specialAffectedCells(cell.row, cell.col, specialKind(value));
			extra.forEach((next) => {
				const cellKey = key(next.row, next.col);
				if (selected.has(cellKey)) return;
				selected.set(cellKey, next);
				queue.push(next);
			});
		}
		return [...selected.values()];
	}

	function specialAffectedCells(row, col, kind) {
		if (kind === SPECIAL_KIND.ROW) return range(0, BOARD_SIZE).map((c) => ({ row, col: c }));
		if (kind === SPECIAL_KIND.COL) return range(0, BOARD_SIZE).map((r) => ({ row: r, col }));
		const cells = [];
		for (let r = row - 1; r <= row + 1; r++) {
			for (let c = col - 1; c <= col + 1; c++) {
				if (isInsideBoard(r, c)) cells.push({ row: r, col: c });
			}
		}
		return cells;
	}

	function specialComboCells(first, second) {
		const firstValue = state.board[first.row]?.[first.col];
		const secondValue = state.board[second.row]?.[second.col];
		if (!isSpecial(firstValue) || !isSpecial(secondValue)) return [];
		const firstKind = specialKind(firstValue);
		const secondKind = specialKind(secondValue);
		if (firstKind === SPECIAL_KIND.BOMB && secondKind === SPECIAL_KIND.BOMB) {
			return uniqueCells([...radiusCells(first.row, first.col, 2), ...radiusCells(second.row, second.col, 2)]);
		}
		const lineKind = firstKind === SPECIAL_KIND.BOMB ? secondKind : firstKind;
		const lineCell = firstKind === SPECIAL_KIND.BOMB ? second : first;
		if (firstKind === SPECIAL_KIND.BOMB || secondKind === SPECIAL_KIND.BOMB) {
			if (lineKind === SPECIAL_KIND.ROW) return uniqueCells(range(lineCell.row - 1, lineCell.row + 2).flatMap((row) => rowCells(row)));
			if (lineKind === SPECIAL_KIND.COL) return uniqueCells(range(lineCell.col - 1, lineCell.col + 2).flatMap((col) => colCells(col)));
			return radiusCells(lineCell.row, lineCell.col, 2);
		}
		if (firstKind === SPECIAL_KIND.ROW && secondKind === SPECIAL_KIND.ROW) return uniqueCells([...rowCells(first.row), ...rowCells(second.row)]);
		if (firstKind === SPECIAL_KIND.COL && secondKind === SPECIAL_KIND.COL) return uniqueCells([...colCells(first.col), ...colCells(second.col)]);
		return uniqueCells([...rowCells(first.row), ...colCells(second.col), ...rowCells(second.row), ...colCells(first.col)]);
	}

	function rowCells(row) {
		if (row < 0 || row >= BOARD_SIZE) return [];
		return range(0, BOARD_SIZE).map((col) => ({ row, col }));
	}

	function colCells(col) {
		if (col < 0 || col >= BOARD_SIZE) return [];
		return range(0, BOARD_SIZE).map((row) => ({ row, col }));
	}

	function radiusCells(centerRow, centerCol, radius) {
		const cells = [];
		for (let row = centerRow - radius; row <= centerRow + radius; row++) {
			for (let col = centerCol - radius; col <= centerCol + radius; col++) {
				if (isInsideBoard(row, col)) cells.push({ row, col });
			}
		}
		return cells;
	}

	function collectObjectives(cells) {
		const config = activeConfig();
		if (!Number.isInteger(config.goalType) || config.goalCount <= 0) return;
		cells.forEach(({ row, col }) => {
			if (baseType(state.board[row][col]) === config.goalType) state.goalCollected++;
		});
	}

	function collectMapRewards(cells) {
		let bonus = 0;
		const terrainCleared = clearTerrains(cells);
		const glassCracked = crackGlass(cells);
		const vinesCleared = clearVines(cells);
		const objectsCollected = collectObjects(cells);
		if (terrainCleared) playSound('terrain', terrainCleared);
		if (glassCracked) playSound('glass', glassCracked);
		if (vinesCleared) playSound('vine', vinesCleared);
		if (objectsCollected) playSound('object', objectsCollected);
		bonus += terrainCleared * 8;
		bonus += glassCracked * 18;
		bonus += vinesCleared * 15;
		bonus += objectsCollected * 35;
		return bonus;
	}

	function clearTerrains(cells) {
		let cleared = 0;
		cells.forEach(({ row, col }) => {
			if (!state.tiles[row]?.[col]) return;
			createCellShards(row, col, { count: 7, scale: 0.78 });
			state.tiles[row][col] = null;
			state.tilesCleared++;
			cleared++;
			document.querySelector(`[data-row="${row}"][data-col="${col}"]`)?.classList.add('tile-cleared', 'terrain-cleared');
		});
		return cleared;
	}

	function crackGlass(cells) {
		let cracked = 0;
		const affected = new Map();
		cells.forEach((cell) => [cell, ...neighborCells(cell.row, cell.col)].forEach(({ row, col }) => affected.set(key(row, col), { row, col })));
		affected.forEach(({ row, col }) => {
			if (!state.glass[row]?.[col]) return;
			state.glass[row][col]--;
			if (state.glass[row][col] <= 0) {
				createCellShards(row, col, { count: 10 });
				state.glass[row][col] = 0;
				state.glassCleared++;
				cracked++;
			} else {
				cracked += 0.5;
			}
		});
		return cracked;
	}

	function clearVines(cells) {
		let cleared = 0;
		const affected = new Map();
		cells.forEach((cell) => [cell, ...neighborCells(cell.row, cell.col)].forEach(({ row, col }) => affected.set(key(row, col), { row, col })));
		affected.forEach(({ row, col }) => {
			if (!state.vines[row]?.[col]) return;
			createCellShards(row, col, { count: 6, color: '#22c55e', scale: 0.72 });
			state.vines[row][col] = false;
			state.vinesCleared++;
			cleared++;
		});
		return cleared;
	}

	function collectObjects(cells) {
		let collected = 0;
		cells.forEach(({ row, col }) => {
			if (!state.objects[row]?.[col]) return;
			createCellShards(row, col, { count: 8, scale: 0.82 });
			state.objects[row][col] = null;
			state.objectsCollected++;
			collected++;
		});
		return collected;
	}

	function placeSpecials(specials, clearedCells) {
		const cleared = new Set(clearedCells.map((cell) => key(cell.row, cell.col)));
		specials.forEach((special) => {
			if (!cleared.has(key(special.row, special.col))) return;
			state.board[special.row][special.col] = special.value;
		});
	}

	function markMatching(cells) {
		cells.forEach(({ row, col }) => {
			const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
			cell?.classList.add('matching');
			if (isSpecial(state.board[row]?.[col])) cell?.classList.add('special-activating');
		});
	}

	function createParticles(cells) {
		const colors = ['#f97316', '#facc15', '#22c55e', '#38bdf8', '#ec4899', '#a855f7'];
		cells.forEach(({ row, col }) => {
			const rect = cellRect(row, col);
			if (!rect) return;
			const x = rect.left + rect.width / 2;
			const y = rect.top + rect.height / 2;
			for (let i = 0; i < 7; i++) {
				const particle = document.createElement('span');
				const angle = (Math.PI * 2 * i / 7) + Math.random() * 0.55;
				const power = 24 + Math.random() * 26;
				particle.className = 'mh-particle';
				particle.style.left = `${x}px`;
				particle.style.top = `${y}px`;
				particle.style.setProperty('--dx', `${Math.cos(angle) * power}px`);
				particle.style.setProperty('--dy', `${Math.sin(angle) * power}px`);
				particle.style.setProperty('--mh-particle-color', colors[(row + col + i) % colors.length]);
				document.body.appendChild(particle);
				setTimeout(() => particle.remove(), 650);
			}
		});
	}

	function createCellShards(row, col, options = {}) {
		const rect = cellRect(row, col);
		if (!rect) return;
		const color = options.color || cellColor(row, col);
		const count = options.count || 8;
		const baseSize = Math.max(5, Math.min(rect.width, rect.height) * 0.14 * (options.scale || 1));
		const centerX = rect.left + rect.width / 2;
		const centerY = rect.top + rect.height / 2;
		for (let i = 0; i < count; i++) {
			const shard = document.createElement('span');
			const size = baseSize + Math.random() * baseSize * 0.9;
			const offsetX = (Math.random() - 0.5) * rect.width * 0.58;
			const offsetY = (Math.random() - 0.5) * rect.height * 0.58;
			shard.className = 'mh-shard';
			shard.style.left = `${centerX + offsetX}px`;
			shard.style.top = `${centerY + offsetY}px`;
			shard.style.width = `${size}px`;
			shard.style.height = `${size}px`;
			shard.style.setProperty('--mh-shard-color', color);
			shard.style.setProperty('--initial-rotation', `${Math.random() * 360}deg`);
			shard.style.setProperty('--spread-x', `${(Math.random() - 0.5) * 86}px`);
			shard.style.setProperty('--rotation', `${(Math.random() - 0.5) * 760}deg`);
			shard.style.setProperty('--fall-delay', `${Math.random() * 0.08}s`);
			document.body.appendChild(shard);
			setTimeout(() => shard.remove(), 850);
		}
	}

	function cellColor(row, col) {
		const value = state.board[row]?.[col];
		const asset = state.pets[baseType(value)] || state.pets[0];
		return asset?.jelly?.from || JELLY_COLORS[baseType(value) % JELLY_COLORS.length]?.from || '#7dd3fc';
	}

	function showScoreFloat(points, cells) {
		const center = cellsCenter(cells);
		if (!center) return;
		const float = document.createElement('div');
		float.className = 'mh-score-float';
		float.textContent = `+${points}`;
		float.style.left = `${center.x}px`;
		float.style.top = `${center.y}px`;
		document.body.appendChild(float);
		setTimeout(() => float.remove(), 980);
	}

	function showComboBanner(combo) {
		const banner = document.createElement('div');
		banner.className = 'mh-combo-banner';
		banner.textContent = typeof combo === 'number' ? t('comboBanner', { combo }) : combo;
		document.body.appendChild(banner);
		setTimeout(() => banner.remove(), 980);
	}

	function pulseBoard() {
		const wrap = document.querySelector('.mh-board-wrap');
		if (!wrap) return;
		wrap.classList.remove('combo');
		void wrap.offsetWidth;
		wrap.classList.add('combo');
		setTimeout(() => wrap.classList.remove('combo'), 520);
	}

	function pulseStage3D() {
		const wrap = document.querySelector('.mh-board-wrap');
		if (!wrap) return;
		wrap.classList.remove('stage-pulse');
		void wrap.offsetWidth;
		wrap.classList.add('stage-pulse');
		setTimeout(() => wrap.classList.remove('stage-pulse'), 540);
	}

	function pulseShuffle() {
		const wrap = document.querySelector('.mh-board-wrap');
		if (!wrap) return;
		wrap.classList.remove('shuffle');
		void wrap.offsetWidth;
		wrap.classList.add('shuffle');
		setTimeout(() => wrap.classList.remove('shuffle'), 500);
	}

	function showInvalidSwap(cells) {
		cells.forEach(({ row, col }) => {
			const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
			if (!cell) return;
			cell.classList.remove('invalid');
			void cell.offsetWidth;
			cell.classList.add('invalid');
			setTimeout(() => cell.classList.remove('invalid'), 300);
		});
	}

	function clearSelectedVisual() {
		document.querySelectorAll('.mh-cell.selected').forEach((cell) => cell.classList.remove('selected'));
	}

	function cellRect(row, col) {
		return document.querySelector(`[data-row="${row}"][data-col="${col}"]`)?.getBoundingClientRect() || null;
	}

	function cellsCenter(cells) {
		let totalX = 0;
		let totalY = 0;
		let count = 0;
		cells.forEach(({ row, col }) => {
			const rect = cellRect(row, col);
			if (!rect) return;
			totalX += rect.left + rect.width / 2;
			totalY += rect.top + rect.height / 2;
			count++;
		});
		return count ? { x: totalX / count, y: totalY / count } : null;
	}

	function clearCells(cells) {
		cells.forEach(({ row, col }) => {
			state.board[row][col] = null;
		});
	}

	function collapseBoard() {
		const changed = new Set();
		for (let col = 0; col < BOARD_SIZE; col++) {
			const values = [];
			for (let row = BOARD_SIZE - 1; row >= 0; row--) {
				if (state.board[row][col] !== null) values.push(state.board[row][col]);
			}
			while (values.length < BOARD_SIZE) values.push(randomType());
			for (let row = BOARD_SIZE - 1, index = 0; row >= 0; row--, index++) {
				if (state.board[row][col] !== values[index]) changed.add(key(row, col));
				state.board[row][col] = values[index];
			}
		}
		return changed;
	}

	function checkFinish() {
		const config = activeConfig();
		const scoreDone = state.score >= config.targetScore;
		const goalDone = !Number.isInteger(config.goalType) || config.goalCount <= 0 || state.goalCollected >= config.goalCount;
		const tilesDone = config.tileCount <= 0 || state.tilesCleared >= config.tileCount;
		const glassDone = config.glassCount <= 0 || state.glassCleared >= config.glassCount;
		const vinesDone = config.vineCount <= 0 || state.vinesCleared >= config.vineCount;
		const objectsDone = config.objectCount <= 0 || state.objectsCollected >= config.objectCount;
		if (scoreDone && goalDone && tilesDone && glassDone && vinesDone && objectsDone) {
			finish(true, t('goalReached'));
			return;
		}
		if (state.moves <= 0) finish(false, t('noMovesLeft'));
	}

	function finish(won, text) {
		if (state.finished) return;
		state.finished = true;
		state.locked = true;
		state.hintCells.clear();
		renderBoard();
		const stars = calculateStars(won);
		const best = saveBestResult(won, stars);
		const earnedPoints = won ? Math.max(60, Math.round(state.score / 10)) : Math.max(20, Math.round(state.score / 18));
		playSound(won ? 'win' : 'lose');
		if (won) launchConfetti();
		showComboBanner(won ? t('done') : t('tryAgain'));
		showToast(`${text}<br>${t('moodGain', { points: earnedPoints })}`);
		showResultPanel(won, text, earnedPoints, stars, best);
		post('gameFinished', {
			earnedPoints,
			score: state.score,
			stars,
			bestScore: best.score,
			bestStars: best.stars,
			movesLeft: state.moves,
			levelId: activeConfig().id,
			levelTitle: difficultyLabel(activeConfig()),
			goalCollected: state.goalCollected,
			tilesCleared: state.tilesCleared,
			glassCleared: state.glassCleared,
			vinesCleared: state.vinesCleared,
			objectsCollected: state.objectsCollected,
			won,
			finishedAt: Date.now(),
		});
	}

	function calculateStars(won) {
		if (!won) return 0;
		const config = activeConfig();
		const scoreRatio = state.score / Math.max(1, config.targetScore);
		const moveRatio = state.moves / Math.max(1, config.moves);
		if (scoreRatio >= 1.35 || moveRatio >= 0.34) return 3;
		if (scoreRatio >= 1.12 || moveRatio >= 0.18) return 2;
		return 1;
	}

	function saveBestResult(won, stars) {
		const id = activeConfig().id;
		const previous = state.bestResults[id] || { score: 0, stars: 0, wins: 0 };
		const next = {
			score: Math.max(previous.score || 0, state.score),
			stars: Math.max(previous.stars || 0, stars),
			wins: (previous.wins || 0) + (won ? 1 : 0),
			updatedAt: Date.now(),
		};
		state.bestResults[id] = next;
		saveSettings();
		return next;
	}

	function showResultPanel(won, text, earnedPoints, stars, best) {
		byId('mhResultTitle').textContent = won ? t('goalReached') : text;
		byId('mhResultStars').textContent = won ? `${'★'.repeat(stars)}${'☆'.repeat(3 - stars)}` : '☆☆☆';
		byId('mhResultDetail').innerHTML = [
			t('resultScore', { score: state.score, moves: state.moves }),
			t('resultBest', { score: best.score, stars: best.stars }),
			t('moodGain', { points: earnedPoints }),
		].join('<br>');
		setTimeout(() => {
			byId('mhResult').hidden = false;
		}, won ? 650 : 360);
	}

	function launchConfetti() {
		const colors = ['#f97316', '#facc15', '#22c55e', '#38bdf8', '#ec4899', '#a855f7'];
		for (let i = 0; i < 42; i++) {
			const piece = document.createElement('span');
			piece.className = 'mh-confetti';
			piece.style.left = `${Math.random() * 100}vw`;
			piece.style.setProperty('--dx', `${(Math.random() - 0.5) * 150}px`);
			piece.style.setProperty('--mh-confetti-color', colors[i % colors.length]);
			piece.style.setProperty('--mh-confetti-duration', `${1.25 + Math.random() * 0.85}s`);
			document.body.appendChild(piece);
			setTimeout(() => piece.remove(), 2300);
		}
	}

	function swap(a, b) {
		const temp = state.board[a.row][a.col];
		state.board[a.row][a.col] = state.board[b.row][b.col];
		state.board[b.row][b.col] = temp;
	}

	function updateStats() {
		byId('mhMovesBig').textContent = String(state.moves);
		updateMoveCountdownState();
	}

	function updateMoveCountdownState() {
		const countdown = byId('mhMoveCountdown');
		if (!countdown) return;
		countdown.classList.toggle('critical', state.moves <= 3 && state.started && !state.finished);
		countdown.classList.toggle('low', state.moves > 3 && state.moves <= 7 && state.started && !state.finished);
	}

	function setTip(text) {
		byId('mhTip').textContent = text;
	}

	function showToast(html) {
		const toast = document.createElement('div');
		toast.className = 'mh-toast';
		toast.innerHTML = html;
		document.body.appendChild(toast);
		setTimeout(() => toast.remove(), 1350);
	}

	function showHowTo() {
		byId('mhHowTo').hidden = false;
	}

	function post(type, data = {}, extra = {}) {
		try {
			window.parent.postMessage({ type, data, ...extra }, '*');
		} catch (_) {}
	}

	function getAudioContext() {
		const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
		if (!AudioContextCtor) return null;
		if (!sound.ctx) {
			sound.ctx = new AudioContextCtor();
			sound.master = sound.ctx.createGain();
			sound.master.gain.value = 0.18;
			sound.master.connect(sound.ctx.destination);
		}
		if (sound.ctx.state === 'suspended') sound.ctx.resume?.();
		return sound.ctx;
	}

	function midiFrequency(note) {
		return 440 * Math.pow(2, (note - 69) / 12);
	}

	function playTone(note, options = {}) {
		const ctx = getAudioContext();
		if (!ctx || !sound.master) return;
		const startAt = ctx.currentTime + (options.delay || 0);
		const duration = options.duration || 0.09;
		const oscillator = ctx.createOscillator();
		const gain = ctx.createGain();
		oscillator.type = options.type || 'square';
		oscillator.frequency.setValueAtTime(midiFrequency(note), startAt);
		if (options.bendTo) oscillator.frequency.exponentialRampToValueAtTime(midiFrequency(options.bendTo), startAt + duration);
		gain.gain.setValueAtTime(0.0001, startAt);
		gain.gain.exponentialRampToValueAtTime(options.gain || 0.055, startAt + 0.012);
		gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
		oscillator.connect(gain);
		gain.connect(sound.master);
		oscillator.start(startAt);
		oscillator.stop(startAt + duration + 0.02);
	}

	function playArpeggio(notes, options = {}) {
		notes.forEach((note, index) => playTone(note, {
			...options,
			delay: (options.delay || 0) + index * (options.step || 0.055),
		}));
	}

	function playNoise(options = {}) {
		const ctx = getAudioContext();
		if (!ctx || !sound.master) return;
		const duration = options.duration || 0.08;
		const buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * duration)), ctx.sampleRate);
		const data = buffer.getChannelData(0);
		for (let i = 0; i < data.length; i++) {
			data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
		}
		const source = ctx.createBufferSource();
		const filter = ctx.createBiquadFilter();
		const gain = ctx.createGain();
		const startAt = ctx.currentTime + (options.delay || 0);
		source.buffer = buffer;
		filter.type = options.filter || 'highpass';
		filter.frequency.value = options.frequency || 1100;
		gain.gain.setValueAtTime(0.0001, startAt);
		gain.gain.exponentialRampToValueAtTime(options.gain || 0.04, startAt + 0.01);
		gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
		source.connect(filter);
		filter.connect(gain);
		gain.connect(sound.master);
		source.start(startAt);
		source.stop(startAt + duration + 0.02);
	}

	function playSound(name, value = 1) {
		if (document.hidden) return;
		switch (name) {
			case 'tap':
				playTone(72, { duration: 0.035, gain: 0.025, type: 'triangle' });
				break;
			case 'select':
				playTone(76, { duration: 0.055, gain: 0.035, type: 'triangle' });
				break;
			case 'start':
				playArpeggio([67, 72, 76], { duration: 0.08, gain: 0.05, type: 'square', step: 0.06 });
				break;
			case 'swap':
				playTone(69, { duration: 0.07, gain: 0.04, type: 'square', bendTo: 74 });
				break;
			case 'invalid':
				playTone(50, { duration: 0.11, gain: 0.045, type: 'sawtooth', bendTo: 45 });
				break;
			case 'match':
				playArpeggio([72, 76, 79], { duration: 0.075, gain: 0.045, type: 'square', step: 0.045 });
				break;
			case 'combo':
				playArpeggio([76, 79, 83 + Math.min(value, 4)], { duration: 0.085, gain: 0.05, type: 'square', step: 0.04 });
				break;
			case 'special':
				playArpeggio([79, 86, 91], { duration: 0.11, gain: 0.05, type: 'triangle', step: 0.035 });
				playNoise({ duration: 0.07, gain: 0.02, frequency: 2200, delay: 0.02 });
				break;
			case 'glass':
				playNoise({ duration: 0.075, gain: 0.035, frequency: 2800 });
				playTone(88, { duration: 0.045, gain: 0.026, type: 'triangle', delay: 0.015 });
				break;
			case 'vine':
				playNoise({ duration: 0.11, gain: 0.032, frequency: 620, filter: 'bandpass' });
				playTone(55, { duration: 0.07, gain: 0.025, type: 'triangle', bendTo: 60 });
				break;
			case 'object':
				playArpeggio([84, 88, 91], { duration: 0.07, gain: 0.04, type: 'triangle', step: 0.032 });
				break;
			case 'terrain':
				playTone(64, { duration: 0.055, gain: 0.028, type: 'sine', bendTo: 67 });
				break;
			case 'win':
				playArpeggio([72, 76, 79, 84, 88], { duration: 0.13, gain: 0.055, type: 'triangle', step: 0.075 });
				break;
			case 'lose':
				playArpeggio([57, 53, 50], { duration: 0.16, gain: 0.045, type: 'triangle', step: 0.09 });
				break;
		}
	}

	function byId(id) {
		return document.getElementById(id);
	}

	function randomType() {
		return Math.floor(Math.random() * TYPE_COUNT);
	}

	function emptyGrid(value) {
		return Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(value));
	}

	function shuffledCells() {
		const cells = [];
		for (let row = 0; row < BOARD_SIZE; row++) {
			for (let col = 0; col < BOARD_SIZE; col++) cells.push({ row, col });
		}
		return shuffle(cells);
	}

	function neighborCells(row, col) {
		return [
			{ row: row - 1, col },
			{ row: row + 1, col },
			{ row, col: col - 1 },
			{ row, col: col + 1 },
		].filter((cell) => isInsideBoard(cell.row, cell.col));
	}

	function isSpecial(value) {
		return Number.isInteger(value) && value >= SPECIAL_BASE;
	}

	function baseType(value) {
		if (!isSpecial(value)) return value;
		return (value - SPECIAL_BASE) % TYPE_COUNT;
	}

	function specialKind(value) {
		if (!isSpecial(value)) return null;
		return Math.floor((value - SPECIAL_BASE) / TYPE_COUNT);
	}

	function makeSpecial(type, kind) {
		return SPECIAL_BASE + kind * TYPE_COUNT + type;
	}

	function specialIcon(kind) {
		if (kind === SPECIAL_KIND.ROW) return '➜';
		if (kind === SPECIAL_KIND.COL) return '↯';
		return '✦';
	}

	function specialClass(kind) {
		if (kind === SPECIAL_KIND.ROW) return 'special-row';
		if (kind === SPECIAL_KIND.COL) return 'special-col';
		return 'special-bomb';
	}

	function specialLabel(value) {
		if (!isSpecial(value)) return '';
		const kind = specialKind(value);
		if (kind === SPECIAL_KIND.ROW) return t('specialRow');
		if (kind === SPECIAL_KIND.COL) return t('specialCol');
		return t('specialBomb');
	}

	function shuffle(items) {
		for (let i = items.length - 1; i > 0; i--) {
			const j = Math.floor(Math.random() * (i + 1));
			[items[i], items[j]] = [items[j], items[i]];
		}
		return items;
	}

	function isInsideBoard(row, col) {
		return row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE;
	}

	function getCellSize() {
		const cell = document.querySelector('.mh-cell');
		return cell ? Math.min(cell.offsetWidth, cell.offsetHeight) : 44;
	}

	function getCellStep() {
		const first = document.querySelector('[data-row="0"][data-col="0"]');
		const next = document.querySelector('[data-row="0"][data-col="1"]') || document.querySelector('[data-row="1"][data-col="0"]');
		if (!first || !next) return getCellSize();
		const a = first.getBoundingClientRect();
		const b = next.getBoundingClientRect();
		return Math.max(Math.abs(b.left - a.left), Math.abs(b.top - a.top), getCellSize());
	}

	function getBoardCellStep() {
		const boardEl = byId('mhBoard');
		if (!boardEl) return getCellStep();
		const rect = boardEl.getBoundingClientRect();
		const styles = getComputedStyle(boardEl);
		const gap = parseFloat(styles.columnGap || styles.gap || '0') || 0;
		return (rect.width - gap * (BOARD_SIZE - 1)) / BOARD_SIZE + gap;
	}

	function clamp(value, min, max) {
		return Math.max(min, Math.min(max, value));
	}

	function key(row, col) {
		return `${row}:${col}`;
	}

	function range(start, end) {
		return Array.from({ length: end - start }, (_, index) => start + index);
	}

	function uniqueCells(cells) {
		const seen = new Set();
		return cells.filter((cell) => {
			const cellKey = key(cell.row, cell.col);
			if (seen.has(cellKey)) return false;
			seen.add(cellKey);
			return true;
		});
	}

	function sameCell(a, b) {
		return a.row === b.row && a.col === b.col;
	}

	function sameOptionalCell(a, b) {
		if (!a && !b) return true;
		if (!a || !b) return false;
		return sameCell(a, b);
	}

	function isAdjacent(a, b) {
		return Math.abs(a.row - b.row) + Math.abs(a.col - b.col) === 1;
	}

	function delay(ms) {
		return new Promise((resolve) => setTimeout(resolve, ms));
	}

	function cleanupObjectUrls() {
		state.objectUrls.forEach((url) => URL.revokeObjectURL(url));
		state.objectUrls = [];
	}

	boot();
})();

</script>
