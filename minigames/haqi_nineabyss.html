<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>九幽笔记 · NINE ABYSS</title>
  <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    /* 固定竖屏比例：root 由 JS 计算成固定 ratio 的居中盒子。四周留白用古墓主题做旧背景填充。 */
    body {
      display: flex; align-items: center; justify-content: center;
      background-color: #07060a;
      background-image:
        radial-gradient(ellipse at 50% 0%, #2a1c10 0%, #100a08 55%, #050304 100%);
      background-size: cover; background-position: center; background-repeat: no-repeat;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #root { box-shadow: 0 0 60px rgba(0,0,0,.9); background:#0c0a09; }
    * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
    #gameCanvas { display: block; touch-action: none; image-rendering: optimizeSpeed; }
    .scrollx::-webkit-scrollbar { display: none; }
    .scrolly::-webkit-scrollbar { width:0; display:none; }

    /* ===== 做旧民国账本/符箓质感 ===== */
    .paper { background:
        repeating-linear-gradient(0deg, rgba(0,0,0,.02) 0 2px, transparent 2px 4px),
        linear-gradient(160deg,#e8dcc0,#cdb88f); color:#221608; }
    .grain { background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px); background-size: 5px 5px; }
    .ink { color:#1a120a; }
    .gold { color:#f0c060; }
    .seal { font-family:"KaiTi","STKaiti",serif; }

    /* ===== 动画 ===== */
    @keyframes floatUp { from { opacity:1; transform: translateY(0) scale(1);} to { opacity:0; transform: translateY(-46px) scale(1.4);} }
    @keyframes cardPop { from { opacity:0; transform: translateY(34px) scale(.92);} to { opacity:1; transform: translateY(0) scale(1);} }
    @keyframes slideUp { from { opacity:0; transform: translateY(26px);} to { opacity:1; transform: translateY(0);} }
    @keyframes fadeIn { from { opacity:0;} to { opacity:1;} }
    @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 12px rgba(240,180,60,.45);} 50% { box-shadow: 0 0 30px rgba(240,180,60,.95);} }
    @keyframes spinSlow { to { transform: rotate(360deg);} }
    @keyframes tapBlink { 0%,100%{opacity:.35;} 50%{opacity:1;} }
    @keyframes dangerFlash { 0%,100%{opacity:.95;} 50%{opacity:.45;} }
    @keyframes shake { 0%,100%{transform:translate(0,0);} 25%{transform:translate(-3px,2px);} 50%{transform:translate(3px,-2px);} 75%{transform:translate(-2px,-2px);} }
    @keyframes glowText { 0%,100%{text-shadow:0 0 8px rgba(240,200,90,.5);} 50%{text-shadow:0 0 22px rgba(240,200,90,.95);} }
    .screen { animation: slideUp .3s ease both; }
    .card-pop { animation: cardPop .35s ease both; }
    .fade-in { animation: fadeIn .35s ease both; }
    .pulse-glow { animation: pulseGlow 1.6s ease-in-out infinite; }
    .danger-flash { animation: dangerFlash 1.2s ease-in-out infinite; }
    .glow-title { animation: glowText 2.4s ease-in-out infinite; }

    /* 品质边框 */
    .q-common  { border-color:#8d8374; box-shadow:0 0 0 1px #5b5346 inset; }
    .q-fine    { border-color:#4fa3ff; box-shadow:0 0 10px rgba(79,163,255,.4); }
    .q-rare    { border-color:#b06bff; box-shadow:0 0 14px rgba(176,107,255,.5); }
    .q-legend  { border-color:#ffae3b; box-shadow:0 0 20px rgba(255,174,59,.7); }

    /* 撤离警戒封条 */
    .danger-tape { position:absolute; left:-30%; right:-30%; height:30px; font-weight:900; font-size:13px; letter-spacing:5px;
      color:#1a1208; display:flex; align-items:center; justify-content:center; white-space:nowrap; overflow:hidden;
      background:repeating-linear-gradient(45deg,#f5c518 0 24px,#1a1208 24px 48px);
      box-shadow:0 4px 14px rgba(0,0,0,.55); pointer-events:none; z-index:40; }

    /* 触屏摇杆 */
    .stick-base { position:absolute; border-radius:50%; border:2px solid rgba(255,220,150,.35); background:rgba(20,14,8,.4); }
    .stick-knob { position:absolute; border-radius:50%; background:radial-gradient(circle at 35% 30%,#ffd98a,#b9802a); border:2px solid #1a1208; box-shadow:0 3px 8px rgba(0,0,0,.6); }

    /* 漫画对白气泡（开战前剧情） */
    .cbubble { position:absolute; display:flex; align-items:flex-end; gap:10px; max-width:88%; pointer-events:none; }
    .cbubble-left  { left:14px; flex-direction:row; animation: cardPop .3s ease both; }
    .cbubble-right { right:14px; flex-direction:row-reverse; animation: cardPop .3s ease both; }
    .cbubble-av { flex:0 0 auto; width:58px; height:58px; border-radius:50%; border:3px solid #1a1208; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 4px 12px rgba(0,0,0,.5); }
    .cbubble-box { position:relative; background:#eee2c8; color:#1a1208; border:3px solid #1a1208; border-radius:14px; padding:12px 16px 22px; font-weight:700; font-size:14px; line-height:1.45; box-shadow:0 6px 18px rgba(0,0,0,.5); }
    .cbubble-name { position:absolute; top:-12px; background:#9a3b1a; color:#fff; font-size:11px; font-weight:900; padding:1px 10px; border-radius:8px; border:2px solid #1a1208; }
    .cbubble-left .cbubble-name { left:12px; } .cbubble-right .cbubble-name { right:12px; }
    .cbubble-tap { position:absolute; bottom:6px; right:12px; font-size:10px; font-weight:900; color:#7a4a10; animation: tapBlink 1s ease-in-out infinite; }

    .btn-3d { position:relative; border:2px solid #1a1208; border-radius:12px; font-weight:800;
      background:linear-gradient(#d99a3a,#a9651b); color:#1a1208; box-shadow:0 4px 0 #5e3a10; transition:transform .08s, box-shadow .08s; }
    .btn-3d:active { transform:translateY(3px); box-shadow:0 1px 0 #5e3a10; }
    .btn-ghost { border:2px solid rgba(240,200,120,.4); border-radius:12px; color:#f0d8a8; background:rgba(30,22,14,.55); font-weight:700; }
    .btn-ghost:active { transform:scale(.96); }
    .chip { border:1px solid rgba(240,200,120,.35); border-radius:999px; background:rgba(30,22,14,.55); }
    .vignette::after { content:''; position:absolute; inset:0; pointer-events:none;
      box-shadow: inset 0 0 120px 30px rgba(0,0,0,.75); }
  </style>
</head>

      if(A.ready) return true; if(!AC) return false;

        A.ctx=new AC();

      const g=A.ctx.createGain();
      g.gain.setValueAtTime(0.0001,t0);
      g.gain.exponentialRampToValueAtTime(peak,t0+(o.atk!=null?o.atk:0.005));

      g.connect(o.music?A.musicGain:A.sfxGain);

      const g=A.ctx.createGain(); g.gain.setValueAtTime(peak,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);

      const spb=60/tk.bpm;

    function playMusic(track){
      if(!ensure())return; if(!A.musicOn||A.muted){ A.music.track=track; return; }
      stopMusic(); A.music.track=track; A.music.step=0;

    sel:{ school:null, weapon:null, teammate:null, chapter:0, abyss:false, abyssFloor:1 },

  };

  // ---------- 父窗口通信 ----------
  let gameLoadedSent=false;
  function sendParent(type,data){ try{ window.parent.postMessage(Object.assign({type},data?{data}:{}), '*'); }catch(e){} }
  function notifyLoaded(){ if(gameLoadedSent)return; gameLoadedSent=true; sendParent('gameLoaded'); }

  // 宠物贴图请求（作为主角头像/立绘）
  let petReqId='';
  function requestPetImage(petId){
    const rid='pet_'+Date.now(); petReqId=rid;
    sendParent('haqi_get_pet_image', undefined);
    try{ window.parent.postMessage({type:'haqi_get_pet_image', requestId:rid, anim:'happy', petId:petId||G.currentPetId||undefined}, '*'); }catch(e){}
    setTimeout(()=>{ if(G.petBitmap)return; try{ window.parent.postMessage({type:'haqi_get_pet_images', requestId:'pets_'+Date.now(), anim:'happy'}, '*'); }catch(e){} }, 900);
  }
  async function setPetPayload(p){
    if(!p||!p.imageBlob)return;
    try{ const bm=await createImageBitmap(p.imageBlob); if(G.petBitmap&&G.petBitmap.close)G.petBitmap.close(); G.petBitmap=bm; G.petUV=p.uv; G.petPayload=p; }catch(e){}
  }
  window.addEventListener('message', async (event)=>{
    const msg=event.data||{};
    if(msg.type==='setGameConfig' && msg.data){
      try{ deepMerge(CFG, msg.data); }catch(e){}
      if(msg.data.petId){ G.currentPetId=msg.data.petId; requestPetImage(msg.data.petId); }
    }
    if(msg.type==='haqi_pet_image' && msg.ok && msg.data &&
       (!petReqId || !msg.requestId || msg.requestId===petReqId || msg.requestId==='active_pet_config')){
      await setPetPayload(msg.data);
    }
    if(msg.type==='haqi_pet_images' && msg.ok){
      const first=Array.isArray(msg.data&&msg.data.pets)?msg.data.pets[0]:null; if(first) await setPetPayload(first);
    }
  });
  function deepMerge(t,s){ for(const k in s){ if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k])&&t[k]&&typeof t[k]==='object'){ deepMerge(t[k],s[k]); } else { t[k]=s[k]; } } return t; }

  // ---------- 主角立绘绘制（Canvas）。无宠物时回退为符号头像 ----------
  function drawPet(g, x, y, w, h, fallbackEmoji){
    if(G.petBitmap && G.petUV){
      const uv=G.petUV;
      try{ g.drawImage(G.petBitmap, uv.x, uv.y, uv.width, uv.height, x, y, w, h); return true; }catch(e){}
    }
    g.save(); g.font=Math.floor(h*0.8)+'px serif'; g.textAlign='center'; g.textBaseline='middle';
    g.fillText(fallbackEmoji||'🧭', x+w/2, y+h/2); g.restore(); return false;
  }

  function toast(text, color){
    const t=el('div','fixed left-1/2 -translate-x-1/2 px-4 py-2 rounded-xl text-sm font-bold z-50 pointer-events-none', text);
    t.style.bottom='14%'; t.style.background='rgba(20,14,8,.92)'; t.style.color=color||'#f0d8a8';
    t.style.border='1px solid rgba(240,200,120,.4)'; t.style.animation='fadeIn .2s ease';
    root.appendChild(t); setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 1300);
  }
  function flashScreen(color, ms){
    const f=el('div','absolute inset-0 pointer-events-none z-40'); f.style.background=color; f.style.opacity='0.5';
    fx.appendChild(f); f.style.transition='opacity '+(ms||220)+'ms'; requestAnimationFrame(()=>{ f.style.opacity='0'; });

  }

  // ---------- 羁绊队友 ----------

    let lv=1; for(let i=0;i<thresh.length;i++){ if(pts>=thresh[i])lv=i+1; }
    lv=Math.min(lv,5);
    const cur=thresh[lv-1]||0, next=thresh[lv]||thresh[thresh.length-1];
    return { lv, pts, cur, next, names:['同行','信任','默契','过命','生死之交'] };
  }

  // ============================================================
  //  战斗引擎（俯视角 Roguelike 刷子射击）
  // ============================================================
  const HUD_H=56;                 // 顶部 HUD 占高
  let R=null;                     // 当前下斗运行态
  let rafId=null, lastT=0;

  // ---------- 计算玩家属性（门派 + 武器 + 护身物 + 队友 + 词条）----------
  function computeStats(){
    const sc=CFG.schools.find(s=>s.key===R.school);
    const w=R.weapon;
    const s={
      maxHp: sc.base.hp,
      dmgMul: 1*(sc.base.dmg||1),
      rateMul: 1*(sc.base.fireRate||1),
      spdMul: 1*(sc.base.speed||1),
      luck: (sc.base.luck||0),
      crit: (sc.base.crit||0), critDmg:1.6,
      lifesteal:(sc.base.lifesteal||0),
      regen:0, dmgTaken:1,
      pellets: w.pellets, pierce:(w.pierce||0), bounce:0, explode:0,
      curse:(sc.base.curse||0), slowOnHit:0, magnet:0,
      lowHpRage:(sc.base.lowHpRage||0), killHeal:0,
      autoTurret:(R.school==='qiaojiang')?1:0, autoTurretMs:(R.school==='qiaojiang')?9000:8000,
      orbit:0, qualityUp:0
    };
    // 护身物（来自 stash，简单全部生效）
    (R.charms||[]).forEach(c=>{ const st=c.stat||{}; if(st.hp)s.maxHp+=st.hp; if(st.regen)s.regen+=st.regen; if(st.luck)s.luck+=st.luck; if(st.dmg)s.dmgMul+=st.dmg; if(st.speed)s.spdMul+=st.speed; });
    // 队友 buff
    if(R.teammate){ const t=CFG.teammates.find(x=>x.key===R.teammate); if(t){ const b=t.buff||{};
      if(b.hp)s.maxHp+=b.hp; if(b.dmgTaken)s.dmgTaken+=b.dmgTaken; if(b.rateMul)s.rateMul+=b.rateMul;
      if(b.luck)s.luck+=b.luck; if(b.critAdd)s.crit+=b.critAdd; if(b.curse)s.curse+=b.curse; if(b.qualityUp)s.qualityUp+=b.qualityUp; } }
    // 词条
    (R.perks||[]).forEach(p=>applyPerk(s,p.apply));
    s.maxHp=Math.max(20,Math.round(s.maxHp));
    R.stats=s;
  }
  function applyPerk(s,a){
    if(!a)return;
    if(a.dmgMul)s.dmgMul+=a.dmgMul;
    if(a.rateMul)s.rateMul+=a.rateMul;
    if(a.hpAdd){ s.maxHp+=a.hpAdd; }
    if(a.hpMul)s.maxHp=Math.round(s.maxHp*(1+a.hpMul));
    if(a.spdMul)s.spdMul+=a.spdMul;
    if(a.rangeMul)s.rangeMul=(s.rangeMul||0)+a.rangeMul;
    if(a.luckAdd)s.luck+=a.luckAdd;
    if(a.critAdd)s.crit+=a.critAdd;
    if(a.critDmgAdd)s.critDmg+=a.critDmgAdd;
    if(a.pelletsAdd)s.pellets+=a.pelletsAdd;
    if(a.pelletsMul)s.pellets=Math.round(s.pellets*a.pelletsMul);
    if(a.pierceAdd)s.pierce+=a.pierceAdd;
    if(a.lifestealAdd)s.lifesteal+=a.lifestealAdd;
    if(a.regenAdd)s.regen+=a.regenAdd;
    if(a.slowOnHit)s.slowOnHit=Math.max(s.slowOnHit,a.slowOnHit);
    if(a.bounceAdd)s.bounce+=a.bounceAdd;
    if(a.explodeAdd)s.explode+=a.explodeAdd;
    if(a.curseAdd)s.curse+=a.curseAdd;
    if(a.magnetAdd)s.magnet+=a.magnetAdd;
    if(a.autoTurret)s.autoTurret+=a.autoTurret;
    if(a.orbitAdd)s.orbit+=a.orbitAdd;
    if(a.killHeal)s.killHeal+=a.killHeal;
  }

  // ---------- 构建章节房间链 ----------
  function buildRooms(){
    const rooms=[];
    if(R.abyss){
      // 深渊地宫：无尽，本批生成 6 间，最后一间每 5 层一个 BOSS
      const n=6; const bossFloor=(R.abyssFloor%5===0);
      for(let i=0;i<n;i++){ rooms.push({ type:(i===n-1&&bossFloor)?'boss':(i%3===2?'treasure':'combat'), idx:i }); }
      R.bossRoom=bossFloor?n-1:-1;
    } else {
      const ch=CFG.chapters[R.chapter];
      const n=ch.rooms;
      for(let i=0;i<n;i++){
        let type='combat';
        if(i===n-1)type='boss';
        else if(i>0 && i%3===0)type='treasure';
        rooms.push({ type, idx:i });
      }
      R.bossRoom=n-1;
    }
    R.rooms=rooms; R.roomIndex=0;
  }

  // ---------- 主题取色 ----------
  function theme(){ return R.abyss?{ floor:"#1a0c20", wall:"#0a0410", accent:"#b060ff", fog:"rgba(40,10,60,.5)"} : CFG.chapters[R.chapter].theme; }
  function chapterDef(){ return R.abyss?{ name:'深渊地宫 第 '+R.abyssFloor+' 层', short:'深渊', enemies:["wraith","frozen","mummy","bronze"], boss:'abyssLord' }:CFG.chapters[R.chapter]; }

  // ---------- 难度倍率 ----------
  function diffMul(){
    const c=CFG.curve;
    const chN=R.abyss?(6+R.abyssFloor):R.chapter;
    let hp=Math.pow(1+c.chHp, R.chapter)*Math.pow(1+c.roomHp, R.roomIndex);
    let spd=1+c.chSpd*R.chapter;
    let dmg=1+c.chDmg*R.chapter;
    if(R.abyss){ hp*=Math.pow(1+c.abyssHpPerFloor,R.abyssFloor); spd*=Math.pow(1+c.abyssSpdPerFloor,R.abyssFloor); dmg*=Math.pow(1+c.abyssHpPerFloor*0.5,R.abyssFloor); }
    return { hp, spd, dmg };
  }

  // ---------- 开始一局下斗 ----------
  function startRun(){
    const w=CFG.weapons.find(x=>x.key===G.sel.weapon)||CFG.weapons[0];
    R={
      school:G.sel.school, weapon:JSON.parse(JSON.stringify(w)),
      teammate:G.sel.teammate||'', chapter:G.sel.chapter, abyss:G.sel.abyss, abyssFloor:G.sel.abyssFloor,
      perks:[], charms:(SAVE.stash||[]).filter(it=>it.kind==='charm'),
      artifact:null, stats:null,
      ult:0, ultMax:CFG.ult?CFG.ult.energyMax:100,
      coins:0, score:0, kills:0, loot:[], clueGot:false, insured:0,
      phase:'play',  // play | cleared | extract | done
      extractT:0, extractMax:0,
    };
    // 默认大招能量配置
    if(!CFG.ult)CFG.ult={ energyMax:100, gainPerKill:6, gainPerElite:14, gainPerBoss:40, gainPerHit:0.4, startEnergy:30 };
    R.ult=CFG.ult.startEnergy;
    computeStats();
    buildRooms();
    // 实体容器
    R.player={ x:W/2, y:H*0.6, r:14, hp:R.stats.maxHp, maxHp:R.stats.maxHp, aimX:0, aimY:-1, lastShot:0, invuln:0, dashT:0, face:1 };
    R.enemies=[]; R.bullets=[]; R.ebullets=[]; R.parts=[]; R.pickups=[]; R.objects=[]; R.turrets=[]; R.summons=[]; R.orbits=[]; R.texts=[]; R.ally=null; R.traps=[];
    R.lastTurret=0; R.shake=0; R.timeMs=0;
    // 队友实体
    if(R.teammate){ const t=CFG.teammates.find(x=>x.key===R.teammate);
      R.ally={ x:W/2-30, y:H*0.6+20, r:11, lastShot:0, def:t };
      if(t.buff&&t.buff.startTurret){ R.startTurretPending=1; }
    }
    setupCombatUI();
    // ui 内含战斗 HUD（摇杆/按钮/血条）叠加在 canvas 之上，必须保持可见
    G.screen='run'; ui.style.display='block'; canvas.classList.remove('hidden');
    sendParent('gameStarted');
    bgm('battle');
    enterRoom(0);
    lastT=now(); if(rafId)cancelAnimationFrame(rafId); rafId=requestAnimationFrame(loop);
  }

  // ---------- 进入房间 ----------
  function enterRoom(idx){
    R.roomIndex=idx;
    const room=R.rooms[idx];
    R.phase='play';
    R.enemies.length=0; R.ebullets.length=0; R.pickups.length=0; R.objects.length=0; R.traps.length=0;
    R.bullets.length=0;
    R.doorOpen=false; R.extractPortal=null;
    // 玩家放到下方入口
    R.player.x=W/2; R.player.y=H-90; R.player.invuln=Math.max(R.player.invuln,600);
    const t=theme();
    if(room.type==='treasure'){
      // 宝藏房：摆 3-4 个棺/箱，无敌人（搜刮房）
      const n=randInt(3,4);
      for(let i=0;i<n;i++){ R.objects.push(makeObject(rand(W*0.2,W*0.8), rand(HUD_H+50,H*0.55), Math.random()<0.5?'coffin':'chest')); }
      R.phase='cleared'; openDoor();
      banner('🏺 搜刮房', '开棺取宝，踩门进入下一墓室', t.accent);
    } else if(room.type==='boss'){
      spawnBoss();
      banner('☠ BOSS · '+CFG.bosses[chapterDef().boss].name, '击败墓主，方能撤离', '#d6443a');
      sfx('boss');
    } else {
      spawnWave(room);
      // 战斗房偶尔带一个棺
      if(Math.random()<0.5)R.objects.push(makeObject(rand(W*0.25,W*0.75), rand(HUD_H+60,H*0.45), 'coffin'));
      // 机关房：放置一些机关
      if(Math.random()<0.45)spawnTraps(randInt(2,4));
      banner('墓室 '+(idx+1)+'/'+R.rooms.length, '清剿粽子', t.accent);
    }
    // 起手炮台（苏盏）
    if(R.startTurretPending){ R.startTurretPending=0; spawnTurret(R.player.x, R.player.y-40, 999999); }
    updateCombatHUD();
  }

  function banner(title, sub, color){
    const b=el('div','absolute left-1/2 -translate-x-1/2 text-center pointer-events-none z-30'); b.style.top='14%';
    b.innerHTML=`<div class="seal text-2xl font-black" style="color:${color||'#f0c060'};text-shadow:0 2px 12px #000">${title}</div><div class="text-[12px] text-amber-100/80 mt-0.5">${sub||''}</div>`;
    b.style.animation='fadeIn .3s ease'; root.appendChild(b);
    setTimeout(()=>{ b.style.transition='opacity .5s'; b.style.opacity='0'; setTimeout(()=>b.remove(),500); },1700);
  }

  // ---------- 生成敌人波 ----------
  function spawnWave(room){
    const ch=chapterDef();
    const dm=diffMul();
    const base=R.abyss?7:5;
    const count=base+Math.floor(R.roomIndex*1.1)+R.chapter+(R.abyss?R.abyssFloor:0);
    const eliteChance=CFG.curve.eliteChanceBase+CFG.curve.eliteChancePerCh*R.chapter+(R.abyss?0.02*R.abyssFloor:0);
    for(let i=0;i<count;i++){
      const key=pick(ch.enemies);
      const elite=Math.random()<eliteChance;
      spawnEnemy(key, edgePos(), dm, elite);
    }
    R.spawnLeft=Math.floor(count*0.4); // 后续分批补充
    R.nextSpawn=now()+1500;
  }
  function edgePos(){
    const side=randInt(0,3); const m=24;
    if(side===0)return{ x:rand(m,W-m), y:HUD_H+m };
    if(side===1)return{ x:W-m, y:rand(HUD_H+m,H-m) };
    if(side===2)return{ x:rand(m,W-m), y:H-m };
    return{ x:m, y:rand(HUD_H+m,H-m) };
  }
  function spawnEnemy(key, pos, dm, elite){
    const d=CFG.enemies[key]; if(!d)return;
    const e={
      key, name:d.name, emoji:d.emoji, x:pos.x, y:pos.y, r:d.r*(elite?1.35:1),
      hp:Math.round(d.hp*dm.hp*(elite?CFG.curve.eliteHpMul:1)), maxHp:0,
      speed:d.speed*dm.spd, dmg:d.dmg*dm.dmg*(elite?CFG.curve.eliteDmgMul:1),
      ai:d.ai, armor:d.armor||0, score:d.score, elite:!!elite, phase:!!d.phase,
      slow:0, curse:0, curseT:0, hit:0, burrow:0, lastRanged:0, vx:0, vy:0
    };
    e.maxHp=e.hp;
    R.enemies.push(e);
  }
  function spawnBoss(){
    const ch=chapterDef(); const bd=CFG.bosses[ch.boss]; const dm=diffMul();
    const b={ key:ch.boss, name:bd.name, emoji:bd.emoji, x:W/2, y:HUD_H+90, r:bd.r,
      hp:Math.round(bd.hp*dm.hp*(R.abyss?1+R.abyssFloor*0.2:1)), maxHp:0, speed:bd.speed*dm.spd,
      dmg:bd.dmg*dm.dmg, ai:'boss', skill:bd.skill, score:bd.score, boss:true, elite:true,
      slow:0, curse:0, curseT:0, hit:0, skillT:now()+2500, vx:0, vy:0 };
    b.maxHp=b.hp; R.enemies.push(b); R.boss=b;
  }
  function spawnTraps(n){

  function updateCombatHUD(){

    else hudEls.btnArt.style.display='none';

  // ---------- 输入绑定 ----------
  // 全屏拖动控制（参考 haqi_pet_snake）：在屏幕任意位置按下即以触点为摇杆原点（auto origin），
  // 拖动方向 = 移动方向；松手归位。手动瞄准时朝移动方向开火。
  function bindCombatInput(){
    const base=document.getElementById('stickBase'); const knob=document.getElementById('stickKnob');
    const hint=document.getElementById('stickHint');
    let stickId=null, baseCx=0, baseCy=0; const maxR=54;
    function showStick(cx,cy){
      const rr=root.getBoundingClientRect(); const lx=cx-rr.left, ly=cy-rr.top;
      base.style.left=(lx-60)+'px'; base.style.top=(ly-60)+'px'; base.style.display='block';
      knob.style.left=(lx-27)+'px'; knob.style.top=(ly-27)+'px'; knob.style.display='block'; knob.style.transform='translate(0,0)';
      if(hint)hint.style.display='none';
    }
    function stickStart(id,cx,cy){ stickId=id; baseCx=cx; baseCy=cy; showStick(cx,cy); }
    function stickMove(cx,cy){ let dx=cx-baseCx, dy=cy-baseCy; const d=Math.hypot(dx,dy); if(d>maxR){ dx=dx/d*maxR; dy=dy/d*maxR; }
      knob.style.transform='translate('+dx+'px,'+dy+'px)';
      IN.moveX=(dx/maxR); IN.moveY=(dy/maxR);
    }
    function stickEnd(){ stickId=null; IN.moveX=0; IN.moveY=0; base.style.display='none'; knob.style.display='none'; }
    // 全屏：任意非按钮区域按下都启动摇杆
    const stage=document.getElementById('combatHud');
    function isUI(t){ return t && t.closest && t.closest('button'); }
    stage.addEventListener('touchstart',(e)=>{
      for(const t of e.changedTouches){ if(isUI(t.target))continue;
        if(stickId===null){ stickStart(t.identifier,t.clientX,t.clientY); }
      }
    },{passive:true});
    stage.addEventListener('touchmove',(e)=>{
      for(const t of e.changedTouches){ if(t.identifier===stickId)stickMove(t.clientX,t.clientY); }
    },{passive:true});
    const endTouch=(e)=>{ for(const t of e.changedTouches){ if(t.identifier===stickId)stickEnd(); } };
    stage.addEventListener('touchend',endTouch,{passive:true}); stage.addEventListener('touchcancel',endTouch,{passive:true});
    // 鼠标（桌面调试）：全屏拖动
    let mouseStick=false;
    stage.addEventListener('mousedown',(e)=>{ if(isUI(e.target))return; mouseStick=true; stickStart('m',e.clientX,e.clientY); });
    window.addEventListener('mousemove',(e)=>{ if(mouseStick)stickMove(e.clientX,e.clientY); });
    window.addEventListener('mouseup',()=>{ if(mouseStick){ mouseStick=false; stickEnd(); } });
    // 键盘
    window.addEventListener('keydown',(e)=>{ IN.keys[e.key.toLowerCase()]=true; if(e.key===' '){ tryUlt(); } });
    window.addEventListener('keyup',(e)=>{ IN.keys[e.key.toLowerCase()]=false; });
    // 按钮
    hudEls.btnUlt.onclick=()=>{ tryUlt(); };
    hudEls.btnArt.onclick=()=>{ useArtifact(); };
    hudEls.btnAim.onclick=()=>{ G.autoAim=!G.autoAim; sfx('click'); updateCombatHUD(); };
    document.getElementById('btnPause').onclick=()=>{ togglePause(); };
  }

  let paused=false;
  function togglePause(){
    paused=!paused; sfx('click');
    if(paused){
      const m=el('div','absolute inset-0 z-50 flex flex-col items-center justify-center gap-3','');
      m.id='pauseMask'; m.style.background='rgba(0,0,0,.8)';
      m.innerHTML=`<div class="seal text-3xl font-black gold mb-2">暂 停</div>
        <button id="pResume" class="btn-3d px-10 py-3 text-lg">继续下斗</button>
        <button id="pAbandon" class="btn-ghost px-10 py-2.5 text-sm">放弃撤离（损失战利品）</button>`;
      root.appendChild(m);
      m.querySelector('#pResume').onclick=()=>{ togglePause(); };
      m.querySelector('#pAbandon').onclick=()=>{ paused=false; document.getElementById('pauseMask')?.remove(); gameOver(false,'你放弃了下斗'); };
    } else { document.getElementById('pauseMask')?.remove(); lastT=now(); }
  }

  // ---------- 主循环 ----------
  function loop(t){
    rafId=requestAnimationFrame(loop);
    let dt=(t-lastT)/1000; lastT=t; if(dt>0.05)dt=0.05; if(dt<0)dt=0;
    if(paused){ render(); return; }
    if(G.screen!=='run'){ return; }
    update(dt);
    render();
  }

  // ---------- 更新 ----------
  function update(dt){
    const p=R.player, s=R.stats; R.timeMs+=dt*1000;
    // 输入向量
    let mx=IN.moveX, my=IN.moveY;
    if(IN.keys['w']||IN.keys['arrowup'])my=-1; if(IN.keys['s']||IN.keys['arrowdown'])my=1;
    if(IN.keys['a']||IN.keys['arrowleft'])mx=-1; if(IN.keys['d']||IN.keys['arrowright'])mx=1;
    const ml=Math.hypot(mx,my); if(ml>1){ mx/=ml; my/=ml; }
    const lowRage=s.lowHpRage?1+s.lowHpRage*(1-p.hp/p.maxHp):1;
    const baseSpeed=185*s.spdMul;
    if(p.dashT>0){ p.dashT-=dt; p.x+=p.dashVx*dt; p.y+=p.dashVy*dt; p.invuln=Math.max(p.invuln,16); }
    else { p.x+=mx*baseSpeed*dt; p.y+=my*baseSpeed*dt; if(mx)p.face=mx>0?1:-1; }
    p.x=clamp(p.x,p.r+6,W-p.r-6); p.y=clamp(p.y,HUD_H+p.r+6,H-p.r-6);
    if(p.invuln>0)p.invuln-=dt*1000;
    // 回血
    if(s.regen>0&&p.hp<p.maxHp){ p.hp=Math.min(p.maxHp,p.hp+s.regen*dt); }

    // 瞄准：自动 = 锁最近敌人；手动 = 朝移动方向开火（单摇杆射击）
    let aimX=p.aimX, aimY=p.aimY;
    if(G.autoAim){ const tgt=nearestEnemy(p.x,p.y); if(tgt){ const d=Math.hypot(tgt.x-p.x,tgt.y-p.y)||1; aimX=(tgt.x-p.x)/d; aimY=(tgt.y-p.y)/d; } }
    else if(ml>0.15){ const d=Math.hypot(mx,my)||1; aimX=mx/d; aimY=my/d; }
    p.aimX=aimX; p.aimY=aimY;
    // 自动射击（有敌人时；手动瞄准时持续开火）
    const canShoot = (R.enemies.length>0) || (!G.autoAim);
    const fireDelay=R.weapon.fireRate*s.rateMul;
    if(canShoot && now()-p.lastShot>=fireDelay){ p.lastShot=now(); firePlayer(aimX,aimY,lowRage); }

    // 自动炮台（巧匠门 / 词条）
    if(s.autoTurret>0 && now()-R.lastTurret>s.autoTurretMs){ R.lastTurret=now(); for(let i=0;i<s.autoTurret;i++)spawnTurret(p.x+rand(-40,40),p.y+rand(-30,30),12000); }

    updateBullets(dt);
    updateEnemies(dt,lowRage);
    updateEbullets(dt);
    updateAlly(dt);
    updateTurrets(dt);
    updateSummons(dt);
    updateOrbits(dt);
    updateObjects(dt);
    updateTraps(dt);
    updatePickups(dt);
    updateParticles(dt);
    if(R.shake>0)R.shake=Math.max(0,R.shake-dt*60);

    // 房间清剿判定
    if(R.phase==='play'){
      const room=R.rooms[R.roomIndex];
      if(room.type!=='treasure'){
        if(R.enemies.length===0 && (R.spawnLeft||0)<=0){
          if(room.type==='boss')onBossDown(); else onRoomCleared();
        } else if(R.spawnLeft>0 && now()>R.nextSpawn){
          const k=Math.min(2,R.spawnLeft); for(let i=0;i<k;i++){ spawnEnemy(pick(chapterDef().enemies), edgePos(), diffMul(), Math.random()<0.1); } R.spawnLeft-=k; R.nextSpawn=now()+1800;
        }
      }
    }
    // 清剿后：踩门推进
    if(R.phase==='cleared'&&R.door){ if(dist2(p.x,p.y,R.door.x,R.door.y)<(R.door.r+p.r)*(R.door.r+p.r)){ R.door=null; advanceRoom(); } }
    // 撤离倒计时
    if(R.phase==='extract'){
      R.extractT-=dt;
      if(Math.ceil(R.extractT)!==R.lastTick){ R.lastTick=Math.ceil(R.extractT); if(R.extractT<=5&&R.extractT>0)sfx('tick'); }
      // 尸潮持续涌出
      if(now()>R.nextSurge){ R.nextSurge=now()+CFG.extraction.surgeRate; spawnEnemy(pick(chapterDef().enemies), edgePos(), diffMul(), false); }
      if(R.extractT<=0){ extractDone(false); }
      // 到达撤离口
      if(R.extractPortal){ const pt=R.extractPortal; if(dist2(p.x,p.y,pt.x,pt.y)<(pt.r+p.r)*(pt.r+p.r)){ extractDone(true); } }
    }

    if(p.hp<=0){ gameOver(false); return; }
    updateCombatHUD();
  }

  // ---------- 玩家射击 ----------
  function firePlayer(ax,ay,rageMul){
    const s=R.stats, w=R.weapon;
    const pellets=Math.max(1,s.pellets);
    const baseAng=Math.atan2(ay,ax);
    const spread=(w.spread||0)+(pellets>1?0.04*pellets:0);
    for(let i=0;i<pellets;i++){
      const off=pellets>1?(i/(pellets-1)-0.5)*spread*2:(Math.random()-0.5)*spread;
      const ang=baseAng+off;
      const crit=Math.random()<(s.crit+(w.crit||0));
      let dmg=w.dmg*s.dmgMul*rageMul; if(crit)dmg*=s.critDmg;
      const spd=w.speed*(1+(s.rangeMul||0));
      R.bullets.push({ x:R.player.x+ax*16, y:R.player.y+ay*16, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
        dmg, crit, r:crit?5:4, pierce:s.pierce, bounce:s.bounce, explode:s.explode,
        curse:s.curse, slow:s.slowOnHit, lifesteal:s.lifesteal, life:w.range/spd+0.2, from:'player' });
    }
    sfx('shoot', w.key);
    R.player.recoil=4;
  }
  function spawnBullet(x,y,ax,ay,dmg,spd,opt){ opt=opt||{}; R.bullets.push(Object.assign({ x,y,vx:ax*spd,vy:ay*spd,dmg,crit:false,r:4,pierce:opt.pierce||0,bounce:0,explode:0,curse:opt.curse||0,slow:0,lifesteal:0,life:opt.life||1.2,from:opt.from||'turret' },opt)); }

  function nearestEnemy(x,y,maxD){
    let best=null,bd=maxD?maxD*maxD:Infinity;
    for(const e of R.enemies){ const d=dist2(x,y,e.x,e.y); if(d<bd){ bd=d; best=e; } }
    return best;
  }

  // ---------- 子弹更新 ----------
  function updateBullets(dt){
    const arr=R.bullets;
    for(let i=arr.length-1;i>=0;i--){
      const b=arr[i]; b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
      if(b.life<=0||b.x<-20||b.x>W+20||b.y<HUD_H-20||b.y>H+20){ arr.splice(i,1); continue; }
      let hitOne=false;
      for(const e of R.enemies){
        if(b.hitSet&&b.hitSet.has(e))continue;
        const rr=(e.r+b.r); if(dist2(b.x,b.y,e.x,e.y)<rr*rr){
          dealDamage(e,b.dmg,b.crit,b);
          if(b.lifesteal>0){ healPlayer(b.dmg*b.lifesteal); }
          if(b.curse>0){ e.curse=Math.max(e.curse,b.dmg*b.curse); e.curseT=now()+3000; }
          if(b.slow>0){ e.slow=Math.max(e.slow,b.slow); e.slowT=now()+1200; }
          if(b.explode>0){ explodeAt(b.x,b.y,b.dmg*0.7,40+b.explode*10); }
          hitOne=true;
          if(b.pierce>0){ b.pierce--; (b.hitSet||(b.hitSet=new Set())).add(e); }
          else if(b.bounce>0){ b.bounce--; (b.hitSet||(b.hitSet=new Set())).add(e); const nt=nearestUnhit(b); if(nt){ const d=Math.hypot(nt.x-b.x,nt.y-b.y)||1; const sp=Math.hypot(b.vx,b.vy); b.vx=(nt.x-b.x)/d*sp; b.vy=(nt.y-b.y)/d*sp; } else { arr.splice(i,1); } }
          else { arr.splice(i,1); }
          break;
        }
      }
    }
  }
  function nearestUnhit(b){ let best=null,bd=Infinity; for(const e of R.enemies){ if(b.hitSet&&b.hitSet.has(e))continue; const d=dist2(b.x,b.y,e.x,e.y); if(d<bd){bd=d;best=e;} } return best; }

  function dealDamage(e,amount,crit,src){
    let amt=amount*(1-(e.armor||0));
    e.hp-=amt; e.hit=now();
    addText(e.x,e.y-e.r-4, Math.round(amt), crit?'#ffd24a':'#fff', crit);
    if(crit)sfx('crit'); else sfx('hit');
    addParticles(e.x,e.y,crit?6:3,'#d6443a',2.2);
    if(e.hp<=0)killEnemy(e);
  }
  function killEnemy(e){
    const idx=R.enemies.indexOf(e); if(idx<0)return; R.enemies.splice(idx,1);
    R.kills++; R.score+=e.score||5;
    addParticles(e.x,e.y,e.boss?40:(e.elite?16:8), e.boss?'#b060ff':'#d6443a', e.boss?5:3);
    sfx(e.boss?'boss':'kill');
    // 大招能量
    R.ult=Math.min(R.ultMax,R.ult+(e.boss?CFG.ult.gainPerBoss:(e.elite?CFG.ult.gainPerElite:CFG.ult.gainPerKill)));
    // 击杀回血（蛮山帮 / 词条）
    const heal=(R.stats.killHeal?2:0)+(R.school==='manshan'?3:0); if(heal)healPlayer(heal*(R.stats.killHeal?2:1));
    // 阴符宗 诅咒爆毒云
    if(e.curse>0&&R.school==='yinfu'&&Math.random()<0.5){ explodeAt(e.x,e.y,8,46); addParticles(e.x,e.y,10,'#8e44ad',2.5); }
    // 掉落铜钱
    const coinN=e.boss?CFG.economy.coinPerBoss:(e.elite?CFG.economy.coinPerElite:CFG.economy.coinPerKill);
    const luck=1+(R.stats.luck||0);
    for(let i=0;i<Math.min(8,Math.ceil(coinN*luck/3));i++)dropCoin(e.x+rand(-12,12),e.y+rand(-12,12), Math.ceil(coinN*luck/Math.min(8,Math.ceil(coinN*luck/3))));
    // 精英 / boss 可能掉装备
    if(e.boss){ /* boss 掉落在 onBossDown 处理 */ }
    else if(e.elite&&Math.random()<0.4+luck*0.1){ dropItemPickup(e.x,e.y); }
    R.shake=Math.max(R.shake, e.boss?14:(e.elite?5:0));
  }
  function explodeAt(x,y,dmg,radius){
    addParticles(x,y,12,'#ff8a3a',3.5); R.shake=Math.max(R.shake,4);
    for(const e of R.enemies.slice()){ if(dist2(x,y,e.x,e.y)<(radius+e.r)*(radius+e.r)){ dealDamage(e,dmg,false); } }
  }
  function healPlayer(a){ R.player.hp=Math.min(R.player.maxHp,R.player.hp+a); }
  function damagePlayer(a){ const p=R.player; if(p.invuln>0)return; a*=R.stats.dmgTaken; p.hp-=a; p.invuln=600; R.shake=Math.max(R.shake,8); flashScreen('rgba(200,30,20,.35)',180); sfx('hurt'); addText(p.x,p.y-p.r-6,'-'+Math.round(a),'#ff6a4a',false); }

  // ---------- 敌人更新 ----------
  function updateEnemies(dt,rageMul){
    const p=R.player;
    for(const e of R.enemies){
      // 诅咒持续伤害
      if(e.curse>0&&now()<e.curseT){ e.hp-=e.curse*dt; if(Math.random()<0.06)addParticles(e.x,e.y,1,'#8e44ad',1.5); if(e.hp<=0){ killEnemy(e); continue; } }
      let spd=e.speed; if(e.slow>0&&now()<e.slowT)spd*=(1-e.slow);
      const dx=p.x-e.x, dy=p.y-e.y, d=Math.hypot(dx,dy)||1;
      if(e.ai==='boss'){ updateBoss(e,dt,dx,dy,d,spd); }
      else if(e.ai==='burrow'){
        e.burrow-=dt; if(e.burrow<=0){ if(e.under){ e.under=false; e.x=p.x+rand(-60,60); e.y=p.y+rand(-60,60); e.y=clamp(e.y,HUD_H+20,H-20); e.burrow=rand(1.5,3); addParticles(e.x,e.y,8,'#d6a93a',2);} else { e.under=true; e.burrow=rand(0.8,1.6);} }
        if(!e.under){ e.x+=dx/d*spd*dt; e.y+=dy/d*spd*dt; }
      }
      else if(e.ai==='ranged'){
        if(d>180){ e.x+=dx/d*spd*dt; e.y+=dy/d*spd*dt; } else if(d<120){ e.x-=dx/d*spd*0.5*dt; e.y-=dy/d*spd*0.5*dt; }
        if(now()-e.lastRanged>1600){ e.lastRanged=now(); R.ebullets.push({ x:e.x,y:e.y,vx:dx/d*220,vy:dy/d*220,r:6,dmg:e.dmg,life:3 }); }
      }
      else { // chase / swarm
        e.x+=dx/d*spd*dt; e.y+=dy/d*spd*dt;
        if(e.ai==='swarm'){ e.x+=Math.sin(R.timeMs*0.01+e.x)*spd*0.3*dt; }
      }
      // 与玩家碰撞 → 接触伤害
      if(!e.under && dist2(e.x,e.y,p.x,p.y)<(e.r+p.r)*(e.r+p.r)){ damagePlayer(e.dmg*0.5); const k=22; e.x-=dx/d*k; e.y-=dy/d*k; }
      e.x=clamp(e.x,12,W-12); e.y=clamp(e.y,HUD_H+12,H-12);
    }
    // 敌人之间轻微分离，避免完全重叠
    sepEnemies();
  }
  let sepTick=0;
  function sepEnemies(){ sepTick++; if(sepTick%2)return; const arr=R.enemies; for(let i=0;i<arr.length;i++){ for(let j=i+1;j<arr.length;j++){ const a=arr[i],b=arr[j]; const dx=b.x-a.x,dy=b.y-a.y; const mind=a.r+b.r; const d2=dx*dx+dy*dy; if(d2<mind*mind&&d2>0.01){ const d=Math.sqrt(d2); const ov=(mind-d)/2; const nx=dx/d*ov,ny=dy/d*ov; a.x-=nx;a.y-=ny;b.x+=nx;b.y+=ny; } } } }

  function updateBoss(e,dt,dx,dy,d,spd){
    const p=R.player;
    if(d>90){ e.x+=dx/d*spd*dt; e.y+=dy/d*spd*dt; }
    if(dist2(e.x,e.y,p.x,p.y)<(e.r+p.r)*(e.r+p.r)){ damagePlayer(e.dmg*0.6); }
    if(now()>e.skillT){ e.skillT=now()+rand(2600,4200); bossSkill(e); }
  }
  function bossSkill(e){
    const p=R.player; const sk=e.skill;
    R.shake=Math.max(R.shake,6);
    const doNail=()=>{ for(let i=0;i<10;i++){ const a=i/10*Math.PI*2; R.ebullets.push({ x:e.x,y:e.y,vx:Math.cos(a)*200,vy:Math.sin(a)*200,r:6,dmg:e.dmg*0.6,life:3 }); } sfx('shoot','rifle'); };
    const doRing=()=>{ for(let i=0;i<16;i++){ const a=i/16*Math.PI*2; R.ebullets.push({ x:e.x,y:e.y,vx:Math.cos(a)*160,vy:Math.sin(a)*160,r:7,dmg:e.dmg*0.5,life:3.5 }); } sfx('boss'); };
    const doSummon=()=>{ for(let i=0;i<3;i++)spawnEnemy(pick(chapterDef().enemies), {x:e.x+rand(-40,40),y:e.y+rand(-30,30)}, diffMul(), false); };
    const doShards=()=>{ for(let i=0;i<6;i++){ const a=Math.atan2(p.y-e.y,p.x-e.x)+(i-2.5)*0.18; R.ebullets.push({ x:e.x,y:e.y,vx:Math.cos(a)*260,vy:Math.sin(a)*260,r:6,dmg:e.dmg*0.7,life:2.5 }); } };
    if(sk==='nail')doNail(); else if(sk==='ring')doRing(); else if(sk==='summon')doSummon();
    else if(sk==='burrow'){ e.x=p.x+rand(-80,80); e.y=clamp(p.y+rand(-80,80),HUD_H+30,H-30); addParticles(e.x,e.y,16,'#d6a93a',3); doNail(); }
    else if(sk==='swarm'){ for(let i=0;i<4;i++)spawnEnemy('bug',{x:e.x+rand(-30,30),y:e.y+rand(-30,30)},diffMul(),false); }
    else if(sk==='shards')doShards();
    else if(sk==='all'){ pick([doNail,doRing,doSummon,doShards])(); }
  }

  // ---------- 敌弹更新 ----------
  function updateEbullets(dt){
    const p=R.player; const arr=R.ebullets;
    for(let i=arr.length-1;i>=0;i--){ const b=arr[i]; b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
      if(b.life<=0||b.x<-20||b.x>W+20||b.y<HUD_H-20||b.y>H+20){ arr.splice(i,1); continue; }
      if(dist2(b.x,b.y,p.x,p.y)<(b.r+p.r)*(b.r+p.r)){ damagePlayer(b.dmg); arr.splice(i,1); }
    }
  }

  // ---------- 队友 / 炮台 / 召唤 / 环魂 ----------
  function updateAlly(dt){
    const a=R.ally; if(!a)return; const p=R.player;
    const tx=p.x-30, ty=p.y+22; a.x=lerp(a.x,tx,Math.min(1,dt*4)); a.y=lerp(a.y,ty,Math.min(1,dt*4));
    const tgt=nearestEnemy(a.x,a.y,360); if(tgt&&now()-a.lastShot>520){ a.lastShot=now(); const d=Math.hypot(tgt.x-a.x,tgt.y-a.y)||1; spawnBullet(a.x,a.y,(tgt.x-a.x)/d,(tgt.y-a.y)/d, 8*R.stats.dmgMul, 520, {from:'ally',life:1.0,curse:R.stats.curse}); }
  }
  function spawnTurret(x,y,life){ R.turrets.push({ x:clamp(x,20,W-20), y:clamp(y,HUD_H+20,H-20), r:12, lastShot:0, end:now()+life }); sfx('pickup'); }
  function updateTurrets(dt){ const arr=R.turrets; const c=CFG.summon||{turretDmg:14,turretRate:480,turretRange:320};
    for(let i=arr.length-1;i>=0;i--){ const t=arr[i]; if(now()>t.end){ arr.splice(i,1); continue; }
      const tgt=nearestEnemy(t.x,t.y,c.turretRange); if(tgt&&now()-t.lastShot>c.turretRate){ t.lastShot=now(); const d=Math.hypot(tgt.x-t.x,tgt.y-t.y)||1; spawnBullet(t.x,t.y-6,(tgt.x-t.x)/d,(tgt.y-t.y)/d, c.turretDmg*R.stats.dmgMul,560,{from:'turret',pierce:1,life:1.2}); } } }
  function spawnSummon(x,y,life){ R.summons.push({ x,y,r:10,lastShot:0,end:now()+life,vx:0,vy:0 }); }
  function updateSummons(dt){ const arr=R.summons; const c=CFG.summon||{minionDmg:8,minionRate:700,minionRange:220};
    for(let i=arr.length-1;i>=0;i--){ const m=arr[i]; if(now()>m.end){ arr.splice(i,1); continue; }
      const tgt=nearestEnemy(m.x,m.y,c.minionRange); if(tgt){ const d=Math.hypot(tgt.x-m.x,tgt.y-m.y)||1; m.x+=(tgt.x-m.x)/d*90*dt; m.y+=(tgt.y-m.y)/d*90*dt;
        if(now()-m.lastShot>c.minionRate){ m.lastShot=now(); spawnBullet(m.x,m.y,(tgt.x-m.x)/d,(tgt.y-m.y)/d,c.minionDmg*R.stats.dmgMul,460,{from:'summon',curse:0.5,life:1.0}); } }
      else { const p=R.player; m.x=lerp(m.x,p.x+rand(-30,30),dt*2); m.y=lerp(m.y,p.y+rand(-30,30),dt*2); } } }
  function updateOrbits(dt){ const n=R.stats.orbit; if(!n){ R.orbits.length=0; return; }
    while(R.orbits.length<n)R.orbits.push({ang:R.orbits.length/n*Math.PI*2});
    const p=R.player; const radius=52;
    for(const o of R.orbits){ o.ang+=dt*3; const ox=p.x+Math.cos(o.ang)*radius, oy=p.y+Math.sin(o.ang)*radius;
      for(const e of R.enemies){ if(dist2(ox,oy,e.x,e.y)<(e.r+8)*(e.r+8)){ if(!o.cd||now()>o.cd){ dealDamage(e, R.weapon.dmg*R.stats.dmgMul*0.4,false); o.cd=now()+180; } } }
      o.x=ox;o.y=oy; } }

  // ---------- 棺/箱 搜刮 ----------
  function updateObjects(dt){ const p=R.player;
    for(const o of R.objects){ if(o.opened)continue; if(dist2(o.x,o.y,p.x,p.y)<(o.r+p.r+4)*(o.r+p.r+4)){ openObject(o); } } }
  function openObject(o){ o.opened=true; sfx('loot'); addParticles(o.x,o.y,14,'#f0c060',3);
    // 铜钱
    const luck=1+(R.stats.luck||0); const coins=Math.ceil(rand(8,18)*luck); for(let i=0;i<6;i++)dropCoin(o.x+rand(-16,16),o.y+rand(-16,16),Math.ceil(coins/6));
    // 装备掉落
    if(o.kind==='chest'||Math.random()<0.6)dropItemPickup(o.x,o.y);
  }

  // ---------- 机关 ----------
  function updateTraps(dt){ const p=R.player;
    for(const t of R.traps){ t.t+=dt*1000;
      if(t.type==='spike'){ const cycle=t.t%1600; t.active=cycle<500; if(t.active&&dist2(t.x,t.y,p.x,p.y)<(t.r+p.r)*(t.r+p.r))damagePlayer(8*diffMul().dmg); }
      else if(t.type==='flame'){ const cycle=t.t%2000; t.active=cycle<700; if(t.active&&dist2(t.x,t.y,p.x,p.y)<(t.r+8+p.r)*(t.r+8+p.r)){ damagePlayer(6*diffMul().dmg); } if(t.active)addParticles(t.x,t.y,1,'#ff8a3a',1.5); }
      else if(t.type==='arrow'){ if(t.t>1800){ t.t=0; const dirs=[[1,0],[-1,0],[0,1],[0,-1]]; const dd=dirs[t.dir]; R.ebullets.push({ x:t.x,y:t.y,vx:dd[0]*280,vy:dd[1]*280,r:5,dmg:7*diffMul().dmg,life:3 }); } }
    } }

  // ---------- 掉落 ----------
  function dropCoin(x,y,val){ R.pickups.push({ x,y,vx:rand(-40,40),vy:rand(-60,-10),kind:'coin',val:val||1,r:6,t:0 }); }
  function dropItemPickup(x,y){ const it=rollItem(); R.pickups.push({ x,y,vx:rand(-30,30),vy:rand(-50,-10),kind:'item',item:it,r:12,t:0 }); }
  function updatePickups(dt){ const p=R.player; const mag=80+(R.stats.magnet?160:0);
    for(let i=R.pickups.length-1;i>=0;i--){ const k=R.pickups[i]; k.t+=dt; k.vy+=200*dt; k.x+=k.vx*dt; k.y+=k.vy*dt;
      if(k.y>H-14){ k.y=H-14; k.vy*=-0.3; k.vx*=0.7; } if(k.x<10){k.x=10;k.vx*=-0.5;} if(k.x>W-10){k.x=W-10;k.vx*=-0.5;}
      const d=Math.hypot(p.x-k.x,p.y-k.y);
      if(k.kind==='coin'&&d<mag){ k.x+=(p.x-k.x)/d*260*dt; k.y+=(p.y-k.y)/d*260*dt; }
      if(d<p.r+k.r){ collect(k); R.pickups.splice(i,1); } } }
  function collect(k){ if(k.kind==='coin'){ R.coins+=k.val; sfx('coin'); addParticles(k.x,k.y,2,'#f0c060',1.5); }
    else if(k.kind==='item'){ pickItem(k.item); }
    else if(k.kind==='clue'){ sfx('legend'); flashScreen('rgba(214,68,58,.25)',400); toast('🔍 拾得线索：'+k.clue.name,'#ffae3b'); addParticles(k.x,k.y,18,'#d6443a',3); } }

  // ---------- 装备随机 ----------
  function rollItem(){
    const qUp=R.stats.qualityUp||0;
    const r=Math.random(); let q= r<0.5?'common':r<0.82?'fine':r<0.96?'rare':'legend';
    const order=['common','fine','rare','legend']; let qi=order.indexOf(q)+qUp; q=order[clamp(qi,0,3)];
    const kindR=Math.random(); let pool, kind;
    if(kindR<0.4){ pool=CFG.weapons; kind='weapon'; }
    else if(kindR<0.75){ pool=CFG.artifacts; kind='artifact'; }
    else { pool=CFG.charms; kind='charm'; }
    const it=Object.assign({},pick(pool)); it.kind=kind; it.q=q; return it;
  }
  function pickItem(it){
    sfx(it.q==='legend'?'legend':'loot');
    if(it.q==='legend')flashScreen('rgba(255,174,59,.25)',400);
    if(it.kind==='weapon'){ R.weapon=JSON.parse(JSON.stringify(it)); computeStats(); R.player.maxHp=R.stats.maxHp; toast('换装：'+it.name+' '+QITEMNAME[it.q],QCOLOR[it.q]); }
    else if(it.kind==='artifact'){ R.artifact=it; R.artCdEnd=0; toast('得法器：'+it.name,QCOLOR[it.q]); }
    else if(it.kind==='charm'){ R.charms.push(it); computeStats(); R.player.hp=Math.min(R.player.maxHp+ (it.stat&&it.stat.hp||0), R.player.maxHp); R.player.maxHp=R.stats.maxHp; toast('佩戴：'+it.name,QCOLOR[it.q]); }
    R.loot.push(it);
    updateCombatHUD();
  }

  // ---------- 大招 / 法器 ----------
  function tryUlt(){
    if(!R||R.ult<R.ultMax)return; R.ult=0; sfx('ult'); flashScreen('rgba(176,96,255,.3)',300); R.shake=8;
    const p=R.player;
    switch(R.school){
      case 'qiaojiang': for(let i=0;i<4;i++)spawnTurret(p.x+Math.cos(i/4*6.28)*50,p.y+Math.sin(i/4*6.28)*50,12000); break;
      case 'xunlong': R.enemies.forEach(e=>{ e.slow=0.6; e.slowT=now()+6000; e.marked=now()+6000; }); break;
      case 'manshan': { const a=Math.atan2(p.aimY,p.aimX); p.dashT=0.35; p.dashVx=Math.cos(a)*620; p.dashVy=Math.sin(a)*620; p.invuln=700; R.ultDash=now()+400; } break;
      case 'yinfu': for(let i=0;i<4;i++)spawnSummon(p.x+rand(-30,30),p.y+rand(-30,30),14000); break;
    }
    updateCombatHUD();
  }
  function useArtifact(){
    if(!R||!R.artifact)return; if(now()<(R.artCdEnd||0))return;
    const a=R.artifact; R.artCdEnd=now()+a.cd; const p=R.player;
    switch(a.type){
      case 'control': R.enemies.forEach(e=>{ e.slow=0.95; e.slowT=now()+2500; }); sfx('bell'); flashScreen('rgba(120,200,255,.2)',250); break;
      case 'nova': explodeAt(p.x,p.y, R.weapon.dmg*R.stats.dmgMul*2.2, 130); R.enemies.forEach(e=>{ const d=Math.hypot(e.x-p.x,e.y-p.y)||1; if(d<160){ e.x+=(e.x-p.x)/d*40; e.y+=(e.y-p.y)/d*40; } }); sfx('thunder'); break;
      case 'firefield': { const fx2={ x:p.x+p.aimX*80, y:p.y+p.aimY*80, end:now()+4000, r:60 }; R.fireField=fx2; sfx('shoot','shotgun'); } break;
      case 'chain': { let t=nearestEnemy(p.x,p.y,400); const hit=new Set(); for(let i=0;i<5&&t;i++){ dealDamage(t,R.weapon.dmg*R.stats.dmgMul*1.6,true); hit.add(t); addParticles(t.x,t.y,8,'#f1c40f',3); let nx=null,nd=Infinity; for(const e of R.enemies){ if(hit.has(e))continue; const d=dist2(t.x,t.y,e.x,e.y); if(d<nd&&d<140*140){nd=d;nx=e;} } t=nx; } sfx('thunder'); } break;
      case 'shield': p.invuln=5000; toast('金钟罩 · 5 秒无敌','#ffae3b'); sfx('bell'); break;
    }
    updateCombatHUD();
  }

  // ---------- 粒子 / 飘字 ----------
  function addParticles(x,y,n,color,spd){ for(let i=0;i<n;i++){ const a=Math.random()*6.28, s=rand(0.4,1)*(spd||2)*60; R.parts.push({ x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(0.3,0.7),max:0.7,color,r:rand(1.5,3.5) }); } }
  function addText(x,y,t,color,big){ R.texts.push({ x,y,t:''+t,color,life:0.8,big:!!big }); }
  function updateParticles(dt){ for(let i=R.parts.length-1;i>=0;i--){ const p=R.parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92; p.life-=dt; if(p.life<=0)R.parts.splice(i,1); }
    for(let i=R.texts.length-1;i>=0;i--){ const t=R.texts[i]; t.y-=40*dt; t.life-=dt; if(t.life<=0)R.texts.splice(i,1); }
    if(R.fireField){ if(now()>R.fireField.end)R.fireField=null; else { const ff=R.fireField; addParticles(ff.x+rand(-ff.r,ff.r),ff.y+rand(-ff.r,ff.r),1,'#ff8a3a',1.5); if(!ff.cd||now()>ff.cd){ ff.cd=now()+250; for(const e of R.enemies){ if(dist2(ff.x,ff.y,e.x,e.y)<(ff.r+e.r)*(ff.r+e.r))dealDamage(e,R.weapon.dmg*R.stats.dmgMul*0.5,false); } } } } }

  // ============================================================
  //  渲染
  // ============================================================
  function render(){
    if(!R)return; const t=theme();
    ctx.save();
    // 屏幕震动
    if(R.shake>0){ ctx.translate(rand(-R.shake,R.shake),rand(-R.shake,R.shake)); }
    // 地面
    ctx.fillStyle=t.floor; ctx.fillRect(-20,-20,W+40,H+40);
    drawFloorPattern(t);
    // 墙边
    ctx.strokeStyle=t.wall; ctx.lineWidth=10; ctx.strokeRect(5,HUD_H+5,W-10,H-HUD_H-10);
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=2; ctx.strokeRect(11,HUD_H+11,W-22,H-HUD_H-22);
    // 机关
    R.traps.forEach(tr=>drawTrap(tr));
    // 火海法器
    if(R.fireField){ const ff=R.fireField; ctx.save(); ctx.globalAlpha=0.4; ctx.fillStyle='#ff6a2a'; ctx.beginPath(); ctx.arc(ff.x,ff.y,ff.r,0,6.28); ctx.fill(); ctx.restore(); }
    // 门 / 撤离口
    if(R.phase==='cleared'&&R.door)drawDoor(R.door,t.accent);
    if(R.phase==='extract'&&R.extractPortal)drawPortal(R.extractPortal);
    // 棺 / 箱
    R.objects.forEach(o=>drawObject(o));
    // 掉落
    R.pickups.forEach(k=>drawPickup(k));
    // 友方
    R.turrets.forEach(tu=>drawUnit(tu,'⚙️',12,'#9a7b30'));
    R.summons.forEach(m=>drawUnit(m,'👻',11,'#8e44ad'));
    if(R.ally)drawAlly(R.ally);
    // 敌人
    R.enemies.forEach(e=>drawEnemy(e));
    // 环魂飞剑
    R.orbits.forEach(o=>{ if(o.x!=null){ ctx.save(); ctx.font='16px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🗡️',o.x,o.y); ctx.restore(); } });
    // 子弹
    drawBullets();
    // 玩家
    drawPlayer();
    // 粒子 + 飘字
    drawParticles();
    // 雾气 vignette
    const fg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.75);
    fg.addColorStop(0,'rgba(0,0,0,0)'); fg.addColorStop(1,t.fog);
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
    ctx.restore();
    // BOSS 血条（不随震动）
    if(R.boss&&R.enemies.includes(R.boss))drawBossBar();
    // 撤离封条 + 倒计时
    if(R.phase==='extract')drawExtractUI();
  }
  function drawFloorPattern(t){ ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle=t.wall; ctx.lineWidth=1;
    const gs=44; for(let x=gs;x<W;x+=gs){ ctx.beginPath(); ctx.moveTo(x,HUD_H); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=HUD_H+gs;y<H;y+=gs){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    ctx.restore(); }
  function drawTrap(tr){ ctx.save(); ctx.translate(tr.x,tr.y);
    if(tr.type==='spike'){ ctx.fillStyle=tr.active?'#d6443a':'#5a4a30'; for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*8-4,8); ctx.lineTo(i*8,tr.active?-12:-2); ctx.lineTo(i*8+4,8); ctx.fill(); } ctx.strokeStyle='#000'; ctx.globalAlpha=.4; ctx.strokeRect(-tr.r,-tr.r,tr.r*2,tr.r*2); }
    else if(tr.type==='flame'){ ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(tr.active?'🔥':'🕳️',0,0); }
    else if(tr.type==='arrow'){ ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🏹',0,0); }
    ctx.restore(); }
  function drawDoor(d,accent){ ctx.save(); ctx.translate(d.x,d.y); const pulse=0.6+0.4*Math.sin(R.timeMs*0.006);
    ctx.shadowColor=accent; ctx.shadowBlur=20*pulse; ctx.fillStyle=accent; ctx.globalAlpha=0.85;
    ctx.fillRect(-22,-20,44,40); ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.font='24px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🚪',0,0);
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif'; ctx.fillText('前进 ▲',0,32); ctx.restore(); }
  function drawPortal(d){ ctx.save(); ctx.translate(d.x,d.y); const pulse=0.6+0.4*Math.sin(R.timeMs*0.01);
    ctx.shadowColor='#5fffae'; ctx.shadowBlur=26*pulse; ctx.font='34px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🚪',0,0);
    ctx.shadowBlur=0; ctx.fillStyle='#5fffae'; ctx.font='bold 11px sans-serif'; ctx.fillText('撤离！',0,26); ctx.restore(); }
  function drawObject(o){ ctx.save(); ctx.translate(o.x,o.y); ctx.font='30px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    if(o.opened){ ctx.globalAlpha=0.4; ctx.fillText(o.kind==='coffin'?'⚰️':'📦',0,0); }
    else { const b=1+0.05*Math.sin(R.timeMs*0.005+o.x); ctx.scale(b,b); ctx.shadowColor='#f0c060'; ctx.shadowBlur=10; ctx.fillText(o.kind==='coffin'?'⚰️':'📦',0,0); }
    ctx.restore(); }
  function drawPickup(k){ ctx.save(); ctx.translate(k.x,k.y); ctx.textAlign='center'; ctx.textBaseline='middle';
    if(k.kind==='coin'){ ctx.font='13px serif'; ctx.fillText('🪙',0,0); }
    else if(k.kind==='clue'){ const pulse=0.6+0.4*Math.sin(R.timeMs*0.008); ctx.shadowColor='#d6443a'; ctx.shadowBlur=18*pulse; ctx.fillStyle='#d6443a'; ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(0,0,16,0,6.28); ctx.fill(); ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.font='20px serif'; ctx.fillText('📜',0,0); ctx.fillStyle='#ffd24a'; ctx.font='bold 9px sans-serif'; ctx.fillText('线索',0,20); }
    else if(k.item){ const q=k.item.q; ctx.shadowColor=QCOLOR[q]; ctx.shadowBlur=12; ctx.fillStyle=QCOLOR[q]; ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(0,0,14,0,6.28); ctx.fill(); ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.font='18px serif'; ctx.fillText(k.item.emoji,0,0); }
    ctx.restore(); }
  function drawUnit(u,emoji,size,color){ ctx.save(); ctx.translate(u.x,u.y); ctx.font=size+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(emoji,0,0); ctx.restore(); }
  function drawAlly(a){ ctx.save(); ctx.translate(a.x,a.y); ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(a.def.emoji,0,0); ctx.restore(); }
  function drawEnemy(e){ ctx.save(); ctx.translate(e.x,e.y);
    if(e.under){ ctx.globalAlpha=0.3; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(0,4,e.r,e.r*0.4,0,0,6.28); ctx.fill(); ctx.restore(); return; }
    const flash=now()-e.hit<90;
    if(e.marked&&now()<e.marked){ ctx.shadowColor='#ff4a4a'; ctx.shadowBlur=12; }
    if(e.elite&&!e.boss){ ctx.shadowColor='#ffae3b'; ctx.shadowBlur=10; }
    const sz=e.r*1.7; ctx.font=Math.round(sz)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    if(flash){ ctx.globalAlpha=0.9; }
    if(e.curse>0&&now()<e.curseT){ ctx.globalAlpha=0.85; }
    ctx.fillText(e.emoji,0,0);
    ctx.shadowBlur=0;
    if(flash){ ctx.globalCompositeOperation='source-atop'; ctx.fillStyle='rgba(255,80,60,.6)'; ctx.fillRect(-sz/2,-sz/2,sz,sz); ctx.globalCompositeOperation='source-over'; }
    // 小血条（精英/受伤）
    if((e.elite||e.hp<e.maxHp)&&!e.boss){ const w=e.r*1.6; ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(-w/2,e.r+2,w,3); ctx.fillStyle=e.elite?'#ffae3b':'#e0402a'; ctx.fillRect(-w/2,e.r+2,w*clamp(e.hp/e.maxHp,0,1),3); }
    ctx.restore(); }
  function drawBullets(){
    ctx.save();
    for(const b of R.bullets){ ctx.fillStyle=b.crit?'#ffd24a':(b.from==='player'?'#fff0b0':'#aef'); ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=6; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.28); ctx.fill(); }
    ctx.shadowBlur=0; ctx.fillStyle='#b060ff';
    for(const b of R.ebullets){ ctx.fillStyle='#c86bff'; ctx.shadowColor='#c86bff'; ctx.shadowBlur=6; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.28); ctx.fill(); }
    ctx.restore(); }
  function drawPlayer(){ const p=R.player; ctx.save(); ctx.translate(p.x,p.y);
    // 阴影
    ctx.globalAlpha=0.3; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(0,p.r-2,p.r*0.9,p.r*0.4,0,0,6.28); ctx.fill(); ctx.globalAlpha=1;
    // 无敌闪烁
    const blink=p.invuln>0&&Math.floor(R.timeMs/80)%2===0;
    if(!blink){ const sz=p.r*2.4; const drew=drawPet(ctx,-sz/2,-sz/2-2,sz,sz,'🧭'); if(!drew){} }
    // 瞄准线
    ctx.strokeStyle='rgba(255,220,140,.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p.aimX*16,p.aimY*16); ctx.lineTo(p.aimX*40,p.aimY*40); ctx.stroke();
    ctx.fillStyle='rgba(255,220,140,.8)'; ctx.beginPath(); ctx.arc(p.aimX*44,p.aimY*44,3,0,6.28); ctx.fill();
    ctx.restore(); }
  function drawParticles(){ for(const p of R.parts){ ctx.globalAlpha=clamp(p.life/p.max,0,1); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); } ctx.globalAlpha=1;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(const t of R.texts){ ctx.globalAlpha=clamp(t.life/0.8,0,1); ctx.fillStyle=t.color; ctx.font='bold '+(t.big?16:12)+'px sans-serif'; ctx.fillText(t.t,t.x,t.y); } ctx.globalAlpha=1; }
  function drawBossBar(){ const b=R.boss; ctx.save();
    const w=W*0.8, x=(W-w)/2, y=HUD_H+12;
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(x-2,y-2,w+4,12);
    ctx.fillStyle='#7a1010'; ctx.fillRect(x,y,w,8);
    ctx.fillStyle='#d6443a'; ctx.fillRect(x,y,w*clamp(b.hp/b.maxHp,0,1),8);
    ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText('☠ '+b.name,W/2,y-6); ctx.restore(); }
  function drawExtractUI(){ ctx.save();
    ctx.fillStyle='#f5c518'; ctx.font='bold 20px sans-serif'; ctx.textAlign='center';
    const sec=Math.max(0,Math.ceil(R.extractT)); ctx.fillStyle=sec<=5?'#ff4a4a':'#f5c518';
    ctx.fillText('撤离倒计时 '+sec+'s',W/2,H*0.5); ctx.restore(); }

  // ============================================================
  //  房间流程：清剿 → 词条 → 门 → 推进
  // ============================================================
  function openDoor(){ R.door={ x:W/2, y:HUD_H+24, r:26 }; R.doorOpen=true; sfx('door'); }
  function onRoomCleared(){
    R.phase='cleared'; sfx('win'); R.ult=Math.min(R.ultMax,R.ult+8);
    showPerkChoice();
  }
  function advanceRoom(){ if(R.roomIndex+1<R.rooms.length){ sfx('door'); enterRoom(R.roomIndex+1); } }

  function rollPerks(n){
    const out=[]; const pool=CFG.perks.slice(); const taken=new Set();
    const rr=CFG.perkRarity;
    while(out.length<n&&pool.length){
      const r=Math.random(); let q= r<rr.common?'common':r<rr.common+rr.fine?'fine':r<rr.common+rr.fine+rr.rare?'rare':'legend';
      let cand=pool.filter(p=>p.q===q&&!taken.has(p.key));
      if(!cand.length)cand=pool.filter(p=>!taken.has(p.key));
      if(!cand.length)break;
      const p=pick(cand); taken.add(p.key); out.push(p);
    }
    return out;
  }
  function showPerkChoice(){
    const perks=rollPerks(3);
    const cards=perks.map((p,i)=>`
      <button data-perk="${i}" class="perkcard q-${p.q}" style="animation-delay:${i*0.08}s">
        <div class="text-3xl">${p.emoji}</div>
        <div class="seal text-base font-black mt-1" style="color:${QCOLOR[p.q]}">${p.name}</div>
        <div class="text-[10px] font-bold" style="color:${QCOLOR[p.q]}">${QNAME[p.q]}</div>
        <div class="text-[12px] text-amber-100/90 mt-1.5 leading-snug">${p.desc}</div>
      </button>`).join('');
    const mask=el('div','absolute inset-0 z-40 flex flex-col items-center justify-center p-4','');
    mask.id='perkMask'; mask.style.background='rgba(0,0,0,.78)';
    mask.innerHTML=`<div class="seal text-2xl font-black gold mb-1">墓道叉口 · 择术而行</div>
      <div class="text-[12px] text-amber-100/60 mb-3">三选一 · 强化你的下斗流派</div>
      <div class="flex flex-col gap-2.5 w-full max-w-[92%]">${cards}</div>
      <style>.perkcard{ background:rgba(28,20,12,.95); border:2px solid; border-radius:14px; padding:12px; display:flex; flex-direction:column; align-items:center; text-align:center; animation:cardPop .35s ease both; transition:transform .08s;} .perkcard:active{transform:scale(.97);}</style>`;
    root.appendChild(mask);
    mask.querySelectorAll('[data-perk]').forEach(b=>b.onclick=()=>{
      const p=perks[parseInt(b.getAttribute('data-perk'))]; sfx(p.q==='legend'?'legend':'loot');
      R.perks.push(p); const oldMax=R.stats.maxHp; computeStats(); R.player.maxHp=R.stats.maxHp; R.player.hp=Math.min(R.player.hp+(R.stats.maxHp-oldMax), R.stats.maxHp);
      mask.remove(); openDoor(); banner('门已开','踩上发光的门 🚪 进入下一墓室','#5fd0ff');
      updateCombatHUD();
    });
  }

  // ============================================================
  //  BOSS 击败 → 撤离 → 结算
  // ============================================================
  function onBossDown(){
    R.boss=null; R.phase='extract'; sfx('win'); flashScreen('rgba(240,200,90,.3)',400);
    // BOSS 掉落：章节线索 + 战利品
    const ch=chapterDef();
    if(!R.abyss){ const c=CFG.chapters[R.chapter]; if(!SAVE.cluesFound.includes(c.clue.id)){ R.clueGot=c.clue; } }
    // 撒一波宝
    for(let i=0;i<4;i++)dropItemPickup(W/2+rand(-80,80),H/2+rand(-40,40));
    for(let i=0;i<14;i++)dropCoin(W/2+rand(-100,100),H/2+rand(-60,60),CFG.economy.coinPerBoss/6);
    if(R.clueGot)R.pickups.push({ x:W/2,y:H/2,vx:0,vy:-30,kind:'clue',clue:R.clueGot,r:14,t:0 });
    // 撤离口在顶部
    R.extractPortal={ x:W/2, y:HUD_H+34, r:26 };
    R.extractMax=CFG.extraction.baseSeconds; R.extractT=R.extractMax; R.lastTick=Math.ceil(R.extractT);
    R.nextSurge=now()+CFG.extraction.surgeRate;
    banner('墓室坍塌！','限时跑到 🚪 撤离，带走全部战利品！','#ff4a4a');
  }
  // 撤离时拾取线索 pickup
  function maybeCollectClue(){ /* handled in collect() extension below */ }

  function extractDone(success){
    R.phase='done';
    settle(success);
  }

  function settle(extracted){
    if(rafId)cancelAnimationFrame(rafId); rafId=null;
    // 结算：撤离成功带走全部；失败损失部分铜钱与未保险掉落
    let coinGain=R.coins, lostText='';
    if(!extracted){ const loss=Math.floor(R.coins*CFG.economy.extractFailLossPct); coinGain=R.coins-loss; lostText=`撤离失败 · 损失 ${loss} 铜钱与部分战利品`; }
    SAVE.coins+=coinGain;
    SAVE.totalRuns++; SAVE.totalKills+=R.kills;
    if(R.score>SAVE.bestScore)SAVE.bestScore=R.score;
    // 线索
    let clueText='';
    if(extracted&&R.clueGot&&!SAVE.cluesFound.includes(R.clueGot.id)){ SAVE.cluesFound.push(R.clueGot.id); clueText=R.clueGot.name; }
    // 羁绊
    if(R.teammate){ SAVE.bonds[R.teammate]=(SAVE.bonds[R.teammate]||0)+ (extracted?40:15) + R.kills; }
    // 章节解锁推进
    let newChapter=false;
    if(extracted&&!R.abyss){ if(R.chapter>=SAVE.chaptersCleared){ SAVE.chaptersCleared=Math.min(CFG.chapters.length,R.chapter+1); newChapter=true; } }
    if(extracted&&R.abyss){ if(R.abyssFloor>SAVE.abyssBest)SAVE.abyssBest=R.abyssFloor; }
    persist();
    showSettlement(extracted, coinGain, lostText, clueText, newChapter);
    // 通知父窗口
    sendParent('gameFinished', { earnedPoints:R.score, kills:R.kills, coins:coinGain, win:extracted, chapter:R.chapter, level:R.chapter+1 });
  }

  function gameOver(win, reason){
    if(R.phase==='done')return;
    R.phase='done';
    if(rafId)cancelAnimationFrame(rafId); rafId=null;
    sfx('lose');
    // 阵亡视作撤离失败结算
    settle(false);
  }

  // ---------- 结算屏 ----------
  function showSettlement(extracted, coinGain, lostText, clueText, newChapter){
    canvas.classList.add('hidden'); ui.style.display='block'; G.screen='over'; bgm('inn');
    const ch=R.abyss?{name:'深渊地宫 第 '+R.abyssFloor+' 层',short:'深渊'}:CFG.chapters[R.chapter];
    const lootRows=R.loot.length?R.loot.slice(-8).map(it=>`<span class="chip px-2 py-0.5 text-[11px]" style="color:${QCOLOR[it.q]}">${it.emoji} ${it.name}</span>`).join(''):'<span class="text-[12px] text-amber-100/40">本局未拾得装备</span>';
    const clueBlock=clueText?`<div class="paper rounded-xl border-2 border-[#1a1208] p-3 mt-3">
        <div class="text-[11px] ink/60 font-bold">🔍 新线索入墙</div>
        <div class="seal text-lg font-black ink mt-0.5">${clueText}</div>
        <div class="text-[12px] ink/85 mt-1 leading-snug">${(R.clueGot&&R.clueGot.text)||''}</div>
      </div>`:'';
    // 继续按钮
    let contBtn='';
    if(extracted&&!R.abyss&&newChapter&&R.chapter+1<CFG.chapters.length){ contBtn=`<button id="stCont" class="btn-3d flex-1 py-3 text-base">继续下一章 ▶</button>`; }
    else if(extracted&&R.abyss){ contBtn=`<button id="stCont" class="btn-3d flex-1 py-3 text-base">深入第 ${R.abyssFloor+1} 层 ▼</button>`; }
    else if(extracted&&!R.abyss&&R.chapter+1>=CFG.chapters.length){ contBtn=`<button id="stCont" class="btn-3d flex-1 py-3 text-base">挑战深渊地宫 🕳️</button>`; }

    const finale=(extracted&&!R.abyss&&R.chapter===CFG.chapters.length-1);
    ui.innerHTML=`
    <div class="screen absolute inset-0 flex flex-col items-center justify-center p-5 vignette" style="background:radial-gradient(ellipse at 50% 30%, ${extracted?'#1a2a14':'#2a1410'}, #070504)">
      <div class="text-5xl mb-2">${extracted?'🏆':'💀'}</div>
      <div class="seal text-3xl font-black ${extracted?'gold':'text-red-400'}">${extracted?'撤离成功！':'下斗失利'}</div>
      <div class="text-[12px] text-amber-100/60 mt-1">${ch.name} · ${R.kills} 杀 · 得分 ${R.score}</div>
      ${lostText?`<div class="text-[12px] text-red-300/90 mt-1">${lostText}</div>`:''}
      <div class="w-full max-w-[92%] mt-4">
        <div class="flex justify-between text-[13px] text-amber-100/90 mb-1"><span>🪙 入库铜钱</span><span class="gold font-bold">+${coinGain}</span></div>
        <div class="flex flex-wrap gap-1.5">${lootRows}</div>
        ${clueBlock}
        ${finale?`<div class="paper rounded-xl border-2 border-[#1a1208] p-3 mt-3"><div class="seal text-lg font-black ink">九幽之门，已在眼前。</div><div class="text-[12px] ink/85 mt-1">家族九代的执念到此应验——而真相，永远解开一点，又打开一个更大的问号。深渊之下，还有深渊。</div></div>`:''}
      </div>
      <div class="w-full max-w-[92%] mt-5 flex flex-col gap-2.5">
        <div class="flex gap-2.5">
          ${contBtn}
          <button id="stRetry" class="btn-ghost ${contBtn?'px-5':'flex-1'} py-3 text-base">再次下斗</button>
        </div>
        <button id="stHub" class="btn-ghost w-full py-2.5 text-sm">返回落脚客栈</button>
      </div>
    </div>`;
    const cont=document.getElementById('stCont');
    if(cont)cont.onclick=()=>{ sfx('door');
      if(R.abyss){ G.sel.abyssFloor=R.abyssFloor+1; startRun(); }
      else if(R.chapter+1<CFG.chapters.length){ G.sel.chapter=R.chapter+1; startRun(); }
      else { G.sel.abyss=true; G.sel.abyssFloor=1; show('school'); }
    };
    document.getElementById('stRetry').onclick=()=>{ sfx('click'); startRun(); };
    document.getElementById('stHub').onclick=()=>{ sfx('click'); R=null; show('hub'); };
  }

  // ============================================================
  //  启动
  // ============================================================
  requestPetImage();
  notifyLoaded();
  show('title');
  })();
  </script>
</body>
