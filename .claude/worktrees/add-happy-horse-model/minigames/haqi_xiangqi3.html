<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三国象棋 - 三人对弈</title>
<script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #1a1208; }
  #c3d { position: absolute; inset: 0; touch-action: none; }
  .petIcon {
    width: 3.6rem; height: 3.6rem; border-radius: 50%;
    background: rgba(255,248,230,.92); box-shadow: 0 2px 10px rgba(0,0,0,.45);
    border: 3px solid; overflow: hidden; position: relative;
    display: grid; place-items: center; font-size: 1.8rem;
  }
  .petSprite { width: 100%; height: 100%; background-repeat: no-repeat; }
</style>
</head>
<body>
<div id="c3d"></div>

<!-- HUD: turn indicator -->
<div id="hud" class="absolute top-2 left-1/2 -translate-x-1/2 flex flex-col gap-1 items-center pointer-events-none z-10">
  <div id="turnBadge" class="px-4 py-1.5 rounded-full text-white font-bold text-sm shadow-lg bg-red-700">红方回合</div>
  <div id="aiInfo" class="text-[11px] font-bold text-amber-200/80 drop-shadow"></div>
</div>

<!-- 两只宠物对手头像：左上曹魏(蓝) / 右上东吴(绿) -->
<div class="absolute top-2 left-2 z-10 flex flex-col items-center gap-0.5 pointer-events-none">
  <div id="petIconBlue" class="petIcon" style="border-color:#2471b5">🐱</div>
  <div class="text-xs font-bold" style="color:#7db6e8">曹魏·凶猛</div>
</div>
<div class="absolute top-2 right-2 z-10 flex flex-col items-center gap-0.5 pointer-events-none">
  <div id="petIconGreen" class="petIcon" style="border-color:#1e8a4c">🐶</div>
  <div class="text-xs font-bold" style="color:#7fd6a4">东吴·稳健</div>
</div>

<!-- Toast 提示 -->
<div id="toast" class="hidden absolute top-14 left-1/2 -translate-x-1/2 px-5 py-2 rounded-xl text-white font-bold text-sm shadow-xl z-20 transition-opacity duration-700 pointer-events-none"></div>

<!-- 三方战力 / 存活实况 + 形势条 -->
<div id="strengthTray" class="hidden absolute bottom-14 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-1 pointer-events-none">
  <div id="powerBar" class="w-44 h-2 rounded-full overflow-hidden flex shadow bg-black/30">
    <div data-seat="0" class="h-full bg-red-500 transition-all duration-500" style="width:33.3%"></div>
    <div data-seat="1" class="h-full bg-emerald-500 transition-all duration-500" style="width:33.3%"></div>
    <div data-seat="2" class="h-full bg-sky-500 transition-all duration-500" style="width:33.3%"></div>
  </div>
  <div class="flex gap-2">
    <div data-seat="0" class="strPill px-2.5 py-1 rounded-lg text-white text-xs font-bold shadow-lg bg-red-700/85">红</div>
    <div data-seat="1" class="strPill px-2.5 py-1 rounded-lg text-white text-xs font-bold shadow-lg bg-emerald-700/85">绿</div>
    <div data-seat="2" class="strPill px-2.5 py-1 rounded-lg text-white text-xs font-bold shadow-lg bg-sky-700/85">蓝</div>
  </div>
</div>

<!-- 重新开始 -->
<div id="restartBar" class="hidden absolute bottom-6 left-1/2 -translate-x-1/2 z-20">
  <button id="restartBtn" class="px-8 py-2.5 rounded-xl bg-amber-600 hover:bg-amber-500 text-white font-bold text-lg shadow-xl">再来一局</button>
</div>

<!-- 悔棋（每回合可悔1次，回退到你上一步之前） -->
<div id="undoBar" class="hidden absolute bottom-6 left-3 z-20">
  <button id="undoBtn" class="px-5 py-2.5 rounded-xl bg-slate-700/85 hover:bg-slate-600 text-white font-bold text-base shadow-xl disabled:opacity-40 disabled:cursor-not-allowed">📺 悔棋</button>
</div>

<!-- Rules modal -->
<div id="rulesModal" class="absolute inset-0 z-30 flex items-center justify-center bg-black/60">
  <div class="bg-amber-50 rounded-2xl p-6 max-w-md mx-4 shadow-2xl text-amber-950">
    <h1 class="text-2xl font-bold mb-3 text-center">♟️ 三国象棋</h1>
    <ul class="text-sm leading-6 mb-4 list-disc pl-5">
      <li>三方对弈：<b class="text-red-700">红</b>、<b class="text-emerald-700">绿</b>、<b class="text-sky-700">蓝</b>，棋盘中央为三角形河界。</li>
      <li>每方棋盘的河岸与另外两方相连，棋子过河可进入任一邻方领地。</li>
      <li>规则同中国象棋；<b>先吃掉某方主帅者，接管其全部剩余棋子！</b></li>
      <li>最后存活主帅的一方获胜。你执红，先行。</li>
    </ul>
    <div class="flex flex-col items-center gap-2 mb-4">
      <span class="text-sm font-bold">AI 难度</span>
      <div id="diffGroup" class="flex flex-wrap justify-center gap-1.5">
        <button data-diff="easy" class="diffBtn px-3 py-1.5 rounded-lg text-sm font-bold border-2 border-amber-700 text-amber-800">简单</button>
        <button data-diff="normal" class="diffBtn px-3 py-1.5 rounded-lg text-sm font-bold border-2 border-amber-700 bg-amber-700 text-white">普通</button>
        <button data-diff="hard" class="diffBtn px-3 py-1.5 rounded-lg text-sm font-bold border-2 border-amber-700 text-amber-800">困难</button>
        <button data-diff="master" class="diffBtn px-3 py-1.5 rounded-lg text-sm font-bold border-2 border-rose-700 text-rose-700">大师</button>
      </div>
    </div>
    <button id="startBtn" class="w-full py-2.5 rounded-xl bg-red-700 hover:bg-red-600 text-white font-bold text-lg">开始对弈</button>
  </div>
</div>
<button id="helpBtn" class="absolute bottom-3 right-3 z-20 w-10 h-10 rounded-full bg-amber-700/80 text-white text-xl shadow-lg hidden">❓</button>

<script>
game_config = {
  difficulty: "normal",          // easy | normal | hard  (AI 搜索强度)
  humanPlayers: [0],             // 哪些座位由人类控制（0=红 1=绿 2=蓝），其余为 AI
  aiMoveDelay: 800               // AI 落子延迟(ms)
};
</script>
<script>
art_assets = [];
</script>

<script>
// 难度选择必须"即时可用"：主逻辑(#xqGameCode)是点「开始对弈」后才懒加载执行的，
// 若把难度按钮事件留在主逻辑里，开局（未点开始前）就根本无法选难度。这里即时绑定，
// 只改 game_config.difficulty + 高亮，游戏启动时读取该值即可。
(function bindDifficultyEager() {
  const btns = document.querySelectorAll('.diffBtn');
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      game_config.difficulty = btn.dataset.diff;
      btns.forEach(b => {
        const on = b === btn;
        b.classList.toggle('bg-amber-700', on);
        b.classList.toggle('text-white', on);
        b.classList.toggle('text-amber-800', !on);
      });
    });
  });
})();
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode0">
// ============ 基础 3D 场景 ============
const PLAYER_COLORS = [0xc0392b, 0x1e8a4c, 0x2471b5];
const PLAYER_NAMES = ['红', '绿', '蓝'];

let scene, camera, renderer;
const container = document.getElementById('c3d');

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1208);
  scene.fog = new THREE.Fog(0x1a1208, 60, 140);

  camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 200);
  camera.position.set(0, 18, 14);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  const amb = new THREE.AmbientLight(0xffffff, 0.55);
  scene.add(amb);
  const sun = new THREE.DirectionalLight(0xfff2dd, 0.9);
  sun.position.set(8, 20, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -15; sun.shadow.camera.right = 15;
  sun.shadow.camera.top = 15; sun.shadow.camera.bottom = -15;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0xaaccff, 0.25);
  fill.position.set(-10, 8, -8);
  scene.add(fill);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (typeof userZoomed !== 'undefined') userZoomed = false;  // 尺寸变化后重新适配整桌
  if (typeof updateCamera === 'function') updateCamera();
});

let lastFrameT = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const nowT = performance.now();
  const dt = Math.min(0.05, (nowT - lastFrameT) / 1000);
  lastFrameT = nowT;
  if (typeof updateFX === 'function') updateFX(dt);
  renderer.render(scene, camera);
}

// ============ 启动 ============
let gameStarted = false;
initScene();
animate();
window.parent.postMessage({ type: 'gameLoaded' }, '*');

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('rulesModal').classList.add('hidden');
  document.getElementById('helpBtn').classList.remove('hidden');
  document.getElementById('undoBar').classList.remove('hidden');
  document.getElementById('strengthTray').classList.remove('hidden');
  if (!gameStarted) {
    gameStarted = true;
    window.parent.postMessage({ type: 'gameStarted' }, '*');
  }
  if (typeof updateUndoButton === 'function') updateUndoButton();
  if (typeof updateStrengthTray === 'function') updateStrengthTray();
  if (typeof updateCheckMarkers === 'function') updateCheckMarkers();
});
document.getElementById('helpBtn').addEventListener('click', () => {
  document.getElementById('rulesModal').classList.remove('hidden');
});

window.addEventListener('message', (e) => {
  const msg = e.data || {};
  if (msg.type === 'setGameConfig' && msg.data && typeof msg.data === 'object') {
    Object.assign(game_config, msg.data);
    if (msg.data.petId) requestPetIcons();
  }
  if (msg.type === 'haqi_pet_images' && msg.ok) {
    const pets = Array.isArray(msg.data?.pets) ? msg.data.pets : [];
    if (pets[0]) mountPetIcon('petIconBlue', pets[0]);
    if (pets[1]) mountPetIcon('petIconGreen', pets[1]);
    else if (pets[0]) mountPetIcon('petIconGreen', pets[0]);
  }
});

// 难度选择
document.querySelectorAll('.diffBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    game_config.difficulty = btn.dataset.diff;
    document.querySelectorAll('.diffBtn').forEach(b => {
      const on = b === btn;
      b.classList.toggle('bg-amber-700', on);
      b.classList.toggle('text-white', on);
      b.classList.toggle('text-amber-800', !on);
    });
  });
});

// 宠物头像：请求当前星球宠物列表，取前两只作为蓝/绿对手
const petUrls = {};
function requestPetIcons() {
  window.parent.postMessage({ type: 'haqi_get_pet_images', requestId: `xq3_pets_${Date.now()}`, anim: 'happy' }, '*');
}
function mountPetIcon(elId, pet) {
  if (!pet?.imageBlob || !pet?.uv) return;
  if (petUrls[elId]) URL.revokeObjectURL(petUrls[elId]);
  const url = URL.createObjectURL(pet.imageBlob);
  petUrls[elId] = url;
  const uv = pet.uv;
  const el = document.createElement('div');
  el.className = 'petSprite';
  el.style.backgroundImage = `url("${url}")`;
  if (uv.cols > 1 || uv.rows > 1) {
    el.style.backgroundSize = `${uv.cols * 100}% ${uv.rows * 100}%`;
    el.style.backgroundPosition =
      `${uv.cols > 1 ? uv.col * 100 / (uv.cols - 1) : 50}% ${uv.rows > 1 ? uv.row * 100 / (uv.rows - 1) : 50}%`;
  } else {
    el.style.backgroundSize = 'contain';
    el.style.backgroundPosition = 'center';
  }
  const host = document.getElementById(elId);
  host.textContent = '';
  host.appendChild(el);
}
requestPetIcons();
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode1">
// ============ 棋盘拓扑 ============
// 三个半盘（zone 0/1/2），每盘 5 行(r:0后排..4河岸) x 9 列(c:0..8)，绕中心 120° 旋转。
// 中央三角形为河界；河岸点经"过河桥"与相邻两盘的河岸相连，c=4 经中心点 C 连通三方。
const INRADIUS = 3;                       // 三角形内切圆半径（河岸到中心距离）
const nodes = new Map();                  // key -> { key, p, r, c, pos }
const orth  = new Map();                  // key -> [相邻 key]（直线方向邻居）
const cont  = new Map();                  // "a|b" -> [c...]  a->b 直线延伸到 c
const diag  = new Map();                  // key -> [相邻 key]（九宫斜线）

function NK(p, r, c) { return p + ',' + r + ',' + c; }

function zoneAngle(p) { return p * Math.PI * 2 / 3; }

function nodeWorldPos(p, r, c) {
  const x = c - 4, zl = INRADIUS + (4 - r);
  const th = zoneAngle(p);
  return new THREE.Vector3(
    x * Math.cos(th) + zl * Math.sin(th), 0,
    -x * Math.sin(th) + zl * Math.cos(th)
  );
}

function addOrth(a, b) {
  if (!orth.get(a).includes(b)) orth.get(a).push(b);
  if (!orth.get(b).includes(a)) orth.get(b).push(a);
}
function addCont(a, b, c2) {  // a->b 延伸 c2；同时反向 c2->b 延伸 a
  const k1 = a + '|' + b, k2 = c2 + '|' + b;
  (cont.get(k1) || cont.set(k1, []).get(k1)).push(c2);
  (cont.get(k2) || cont.set(k2, []).get(k2)).push(a);
}
function addDiag(a, b) {
  if (!diag.get(a).includes(b)) diag.get(a).push(b);
  if (!diag.get(b).includes(a)) diag.get(b).push(a);
}

function buildTopology() {
  // 节点
  for (let p = 0; p < 3; p++)
    for (let r = 0; r <= 4; r++)
      for (let c = 0; c <= 8; c++) {
        const key = NK(p, r, c);
        nodes.set(key, { key, p, r, c, pos: nodeWorldPos(p, r, c) });
      }
  for (const k of nodes.keys()) { orth.set(k, []); diag.set(k, []); }

  for (let p = 0; p < 3; p++) {
    // 行（横线）
    for (let r = 0; r <= 4; r++)
      for (let c = 0; c < 8; c++) {
        addOrth(NK(p, r, c), NK(p, r, c + 1));
        if (c < 7) addCont(NK(p, r, c), NK(p, r, c + 1), NK(p, r, c + 2));
      }
    // 列（纵线）
    for (let c = 0; c <= 8; c++)
      for (let r = 0; r < 4; r++) {
        addOrth(NK(p, r, c), NK(p, r + 1, c));
        if (r < 3) addCont(NK(p, r, c), NK(p, r + 1, c), NK(p, r + 2, c));
      }
    // 九宫斜线（r0..2, c3..5）
    addDiag(NK(p, 0, 3), NK(p, 1, 4)); addDiag(NK(p, 0, 5), NK(p, 1, 4));
    addDiag(NK(p, 1, 4), NK(p, 2, 3)); addDiag(NK(p, 1, 4), NK(p, 2, 5));
  }

  // 过河桥：zone p 右半 (c=5..8) <-> 邻盘 q 左半 (8-c=3..0)，镜像连接
  for (let p = 0; p < 3; p++) {
    const q = crossZoneFor(p);
    for (let c = 5; c <= 8; c++) {
      const A = NK(p, 4, c), B = NK(q, 4, 8 - c);
      addOrth(A, B);
      addCont(NK(p, 3, c), A, B);          // 直行过桥
      addCont(A, B, NK(q, 3, 8 - c));      // 过桥后继续直行深入
    }
  }
  // 中央三角：三方 c=4 河岸点两两直连（无中心点）
  for (let p = 0; p < 3; p++)
    addOrth(NK(p, 4, 4), NK((p + 1) % 3, 4, 4));
  // 直线延续：p 中线 → 三角边 → q 中线（在 p44 处向两邻分叉）
  for (let p = 0; p < 3; p++)
    for (let q = 0; q < 3; q++) {
      if (q === p) continue;
      addCont(NK(p, 3, 4), NK(p, 4, 4), NK(q, 4, 4));
    }
}

// 选择与 zone p 右端角(c=8)最近的邻盘（其 c=0 端）
function crossZoneFor(p) {
  const a = nodeWorldPos(p, 4, 8);
  let best = (p + 1) % 3, bd = Infinity;
  for (const q of [(p + 1) % 3, (p + 2) % 3]) {
    const d = a.distanceTo(nodeWorldPos(q, 4, 0));
    if (d < bd) { bd = d; best = q; }
  }
  return best;
}

function continuationsOf(a, b) { return cont.get(a + '|' + b) || []; }

buildTopology();
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode2">
// ============ 棋盘渲染 ============
const boardGroup = new THREE.Group();
scene.add(boardGroup);

function buildBoardMesh() {
  // 木质底座：六边形，旋转使六条边与三个半盘的后排平行对齐
  const baseGeo = new THREE.CylinderGeometry(8.9, 9.4, 0.6, 6);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x8a5a2b, roughness: 0.85 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = -0.32;
  base.rotation.y = Math.PI / 6;   // 边中点朝向 ±z，与棋盘三方对齐
  base.receiveShadow = true;
  boardGroup.add(base);

  // 统一黄色棋面：取三个半盘 6 个外角组成的六边形包络（含中央三角）
  // 注意：ShapeGeometry 绕 X 轴 -90° 旋转后 shape(x,y) → world(x,-y)，故用 -z
  const hull = [];
  for (let p = 0; p < 3; p++) {
    hull.push(nodeWorldPos(p, 0, 0), nodeWorldPos(p, 0, 8));
  }
  hull.sort((a, b) => Math.atan2(a.z, a.x) - Math.atan2(b.z, b.x));
  const yShape = new THREE.Shape();
  hull.forEach((v, i) => {
    const s = 1.06;  // 略外扩
    if (i === 0) yShape.moveTo(v.x * s, -v.z * s); else yShape.lineTo(v.x * s, -v.z * s);
  });
  yShape.closePath();
  const yMesh = new THREE.Mesh(
    new THREE.ShapeGeometry(yShape),
    new THREE.MeshStandardMaterial({ color: 0xb8924f, roughness: 0.85 })
  );
  yMesh.rotation.x = -Math.PI / 2;
  yMesh.position.y = 0.005;
  yMesh.receiveShadow = true;
  boardGroup.add(yMesh);

  // 中央河界（楚河汉界）：边界严格跟随三条弧线棋盘线（p44 → q44 的二次贝塞尔）
  const tri = new THREE.Shape();
  const a0 = nodeWorldPos(0, 4, 4);
  tri.moveTo(a0.x, -a0.z);
  for (let p = 0; p < 3; p++) {
    const a = nodeWorldPos(p, 4, 4), b = nodeWorldPos((p + 1) % 3, 4, 4);
    const ctrl = a.clone().add(b).multiplyScalar(0.5).multiplyScalar(0.45); // 与 buildBoardLines 同一控制点
    tri.quadraticCurveTo(ctrl.x, -ctrl.z, b.x, -b.z);
  }
  tri.closePath();
  const triGeo = new THREE.ShapeGeometry(tri, 16);
  const triMat = new THREE.MeshStandardMaterial({ color: 0xa67e44, roughness: 0.9 });
  const water = new THREE.Mesh(triGeo, triMat);
  water.rotation.x = -Math.PI / 2;
  water.position.y = 0.012;
  boardGroup.add(water);

  buildFactionLabels();
}

// 中央区域三国名号：红→蜀汉，绿→东吴，蓝→曹魏；文字随相机保持屏幕水平
const PLAYER_FACTIONS = ['蜀汉', '东吴', '曹魏'];
const factionLabels = [];
function buildFactionLabels() {
  for (let p = 0; p < 3; p++) {
    const cv = document.createElement('canvas');
    cv.width = 256; cv.height = 128;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#' + PLAYER_COLORS[p].toString(16).padStart(6, '0');
    ctx.globalAlpha = 0.82;
    ctx.font = 'bold 88px "KaiTi","STKaiti",serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(PLAYER_FACTIONS[p], 128, 70);
    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
    const label = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 1.2), mat);
    // 位置：从中心向本方河岸中点 p44 方向偏移
    const bank = nodeWorldPos(p, 4, 4);
    label.position.set(bank.x * 0.52, 0.015, bank.z * 0.52);
    label.rotation.x = -Math.PI / 2;
    boardGroup.add(label);
    factionLabels.push(label);
  }
  applyLabelFacing();
}
function applyLabelFacing() {
  const yaw = (typeof camTheta === 'number') ? camTheta : 0;
  for (const l of factionLabels) l.rotation.z = yaw;   // 与屏幕水平对齐
}

// 三角形角点：zone p 河岸 c=8 端与其桥接邻盘 c=0 端的中点再外推
function cornerPoint(p) {
  const q = crossZoneFor(p);
  const a = nodeWorldPos(p, 4, 8), b = nodeWorldPos(q, 4, 0);
  return a.clone().add(b).multiplyScalar(0.5);
}

// 棋盘线
function buildBoardLines() {
  const mat = new THREE.LineBasicMaterial({ color: 0x4a2c10 });
  const pts = [];
  const Y = 0.02;
  function seg(a, b) {
    pts.push(a.x, Y, a.z, b.x, Y, b.z);
  }
  for (let p = 0; p < 3; p++) {
    // 横线
    for (let r = 0; r <= 4; r++)
      seg(nodeWorldPos(p, r, 0), nodeWorldPos(p, r, 8));
    // 纵线
    for (let c = 0; c <= 8; c++)
      seg(nodeWorldPos(p, 0, c), nodeWorldPos(p, 4, c));
    // 九宫斜线
    seg(nodeWorldPos(p, 0, 3), nodeWorldPos(p, 2, 5));
    seg(nodeWorldPos(p, 0, 5), nodeWorldPos(p, 2, 3));
    // 过河桥线（到邻盘）
    const q = crossZoneFor(p);
    for (let c = 5; c <= 8; c++)
      seg(nodeWorldPos(p, 4, c), nodeWorldPos(q, 4, 8 - c));
    // 中央三角连线：p44 → 下一盘 q44，向中心微弯的弧线
    const a = nodeWorldPos(p, 4, 4), b = nodeWorldPos((p + 1) % 3, 4, 4);
    const ctrl = a.clone().add(b).multiplyScalar(0.5).multiplyScalar(0.45); // 控制点拉向中心
    let prev = a;
    for (let i = 1; i <= 12; i++) {
      const t = i / 12, it = 1 - t;
      const pt = new THREE.Vector3(
        it * it * a.x + 2 * it * t * ctrl.x + t * t * b.x, 0,
        it * it * a.z + 2 * it * t * ctrl.z + t * t * b.z);
      seg(prev, pt);
      prev = pt;
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  boardGroup.add(new THREE.LineSegments(geo, mat));

  // 交叉点小圆点（中心点高亮）
  const dotGeo = new THREE.CircleGeometry(0.07, 12);
  const dotMat = new THREE.MeshBasicMaterial({ color: 0x4a2c10 });
  const inst = new THREE.InstancedMesh(dotGeo, dotMat, nodes.size);
  const m4 = new THREE.Matrix4(), rot = new THREE.Matrix4().makeRotationX(-Math.PI / 2);
  let i = 0;
  for (const n of nodes.values()) {
    m4.makeTranslation(n.pos.x, Y + 0.002, n.pos.z).multiply(rot);
    inst.setMatrixAt(i++, m4);
  }
  boardGroup.add(inst);
}

buildBoardMesh();
buildBoardLines();
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode3">
// ============ 棋子数据与渲染 ============
// type: K帅 A士 E相 H马 R车 C炮 P兵
const PIECE_CHARS = {
  K: ['帅', '将', '将'], A: ['仕', '士', '士'], E: ['相', '象', '象'],
  H: ['马', '马', '马'], R: ['车', '车', '车'], C: ['炮', '炮', '炮'], P: ['兵', '卒', '卒']
};

let pieces = [];                 // { id, type, owner(当前控制方), home(初始方), nodeKey, mesh, alive }
const pieceAt = new Map();       // nodeKey -> piece
let pieceIdSeq = 0;

function initialSetup() {
  pieces = []; pieceAt.clear(); pieceIdSeq = 0;
  const back = ['R','H','E','A','K','A','E','H','R'];
  for (let p = 0; p < 3; p++) {
    back.forEach((t, c) => spawnPiece(t, p, NK(p, 0, c)));
    spawnPiece('C', p, NK(p, 2, 1));
    spawnPiece('C', p, NK(p, 2, 7));
    for (let c = 0; c <= 8; c += 2) spawnPiece('P', p, NK(p, 3, c));
  }
}

function spawnPiece(type, owner, nodeKey) {
  const pc = { id: ++pieceIdSeq, type, owner, home: owner, nodeKey, alive: true, mesh: null };
  pieces.push(pc);
  pieceAt.set(nodeKey, pc);
  return pc;
}

// --- 棋子贴图（canvas 画字）---
const texCache = new Map();
function pieceTexture(type, owner) {
  const key = type + owner;
  if (texCache.has(key)) return texCache.get(key);
  const cv = document.createElement('canvas');
  cv.width = cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#f5e6c8';
  ctx.beginPath(); ctx.arc(64, 64, 64, 0, Math.PI * 2); ctx.fill();
  const col = '#' + PLAYER_COLORS[owner].toString(16).padStart(6, '0');
  ctx.strokeStyle = col; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(64, 64, 54, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = col;
  ctx.font = 'bold 78px "KaiTi","STKaiti",serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(PIECE_CHARS[type][owner], 64, 68);
  const tex = new THREE.CanvasTexture(cv);
  texCache.set(key, tex);
  return tex;
}

const pieceGroup = new THREE.Group();
scene.add(pieceGroup);
const PIECE_R = 0.42, PIECE_H = 0.22;
// 棋子文字面向：统一相机方位角（CircleGeometry 顶面贴图无需额外偏转）
function applyPieceFacing() {
  const yaw = (typeof camTheta === 'number') ? camTheta : 0;
  for (const pc of pieces) {
    if (pc.alive && pc.mesh) pc.mesh.rotation.y = yaw;
  }
}

// 圆角棋子：侧面用 Lathe 旋转体（带圆角过渡）+ 顶面贴图圆片
let pieceSideGeo = null, pieceTopGeo = null;
function ensurePieceGeo() {
  if (pieceSideGeo) return;
  const R = PIECE_R, H = PIECE_H, F = 0.07;   // F = 圆角半径
  const pts = [];
  pts.push(new THREE.Vector2(0, 0));
  pts.push(new THREE.Vector2(R - F, 0));
  // 底部圆角
  for (let i = 1; i <= 4; i++) {
    const a = (i / 4) * Math.PI / 2;
    pts.push(new THREE.Vector2(R - F + F * Math.sin(a), F - F * Math.cos(a)));
  }
  // 顶部圆角
  for (let i = 0; i <= 4; i++) {
    const a = (i / 4) * Math.PI / 2;
    pts.push(new THREE.Vector2(R - F + F * Math.cos(a), H - F + F * Math.sin(a)));
  }
  pts.push(new THREE.Vector2(0, H));
  pieceSideGeo = new THREE.LatheGeometry(pts, 32);
  pieceTopGeo = new THREE.CircleGeometry(R - F * 0.6, 32);
}

function buildPieceMesh(pc) {
  ensurePieceGeo();
  const sideMat = new THREE.MeshStandardMaterial({ color: 0xe9d9b5, roughness: 0.55 });
  const body = new THREE.Mesh(pieceSideGeo, sideMat);
  body.castShadow = true;
  body.receiveShadow = true;
  const topMat = new THREE.MeshStandardMaterial({ map: pieceTexture(pc.type, pc.owner), roughness: 0.5, transparent: true });
  const top = new THREE.Mesh(pieceTopGeo, topMat);
  top.rotation.x = -Math.PI / 2;
  top.position.y = PIECE_H + 0.004;
  body.add(top);
  body.userData.pieceId = pc.id;
  return body;
}

function renderAllPieces() {
  while (pieceGroup.children.length) pieceGroup.remove(pieceGroup.children[0]);
  for (const pc of pieces) {
    if (!pc.alive) continue;
    pc.mesh = buildPieceMesh(pc);
    const n = nodes.get(pc.nodeKey);
    pc.mesh.position.set(n.pos.x, 0.02, n.pos.z);   // Lathe 从 y=0 起
    pieceGroup.add(pc.mesh);
  }
  applyPieceFacing();
}

// 棋子被接管后换贴图颜色（顶面是子 mesh）
function refreshPieceFace(pc) {
  if (pc.mesh && pc.mesh.children[0]) pc.mesh.children[0].material.map = pieceTexture(pc.type, pc.owner);
}

initialSetup();
renderAllPieces();
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode4">
// ============ 走法生成 ============
// 直线行走（车/炮/兵/帅用）：沿 a->b 方向利用 cont 表延伸
function* rayFrom(start, dir) {  // 产出依次的格子 key
  let prev = start, cur = dir;
  while (cur) {
    yield cur;
    const nexts = continuationsOf(prev, cur);
    prev = cur;
    cur = nexts.length ? nexts[0] : null;   // 中心点分叉：直行取第一条，其余由调用方枚举
  }
}

function allRays(start) {  // 返回 [[key,...], ...] 每个方向一条射线（中心分叉则裂成多条）
  const rays = [];
  for (const d of orth.get(start)) {
    expandRay(start, d, [], rays);
  }
  return rays;
}
function expandRay(prev, cur, acc, out) {
  const path = acc.concat(cur);
  const nexts = continuationsOf(prev, cur);
  if (!nexts.length) { out.push(path); return; }
  for (const nx of nexts) expandRay(cur, nx, path, out);
}

function inPalace(p, key) {
  const n = nodes.get(key);
  return n && n.p === p && n.r <= 2 && n.c >= 3 && n.c <= 5;
}
function inHomeHalf(pc, key) {
  const n = nodes.get(key);
  return n && n.p === pc.home;     // 本方半盘（按出生方算）
}
function crossedRiver(pc) {
  return !inHomeHalf(pc, pc.nodeKey);
}

// 马腿/象眼：取几何中点最近的节点
function midNode(aKey, bKey) {
  const a = nodes.get(aKey).pos, b = nodes.get(bKey).pos;
  const mid = a.clone().add(b).multiplyScalar(0.5);
  let best = null, bd = 0.35;
  for (const n of nodes.values()) {
    const d = n.pos.distanceTo(mid);
    if (d < bd) { bd = d; best = n.key; }
  }
  return best;
}

// 马（日字）：直一步到马腿 leg（须无子），再沿该方向延伸到 leg2，
// 最后从 leg2 横向一步（排除继续直行）→ 即 (2,1) 偏移，符合中国象棋规则
function knightMoves(pc) {
  const res = [];
  const start = pc.nodeKey;
  for (const leg of orth.get(start)) {
    if (pieceAt.get(leg)) continue;          // 蹩马腿（仅紧邻直步点判断）
    for (const leg2 of continuationsOf(start, leg)) {
      for (const dst of orth.get(leg2)) {
        if (dst === leg) continue;                              // 退回
        if (continuationsOf(leg, leg2).includes(dst)) continue; // 直线第三步
        pushMove(pc, dst, res);
      }
    }
  }
  return dedup(res);
}

// 象：田字 = 两步斜线（沿 diag 不可用，象走的是 2x2 对角）— 用几何法：距离≈2√2 且象眼空
function elephantMoves(pc) {
  const res = [], start = pc.nodeKey, sp = nodes.get(start).pos;
  const n0 = nodes.get(start);
  for (const n of nodes.values()) {
    if (n.p !== n0.p) continue;                       // 象不过河
    const dr = Math.abs(n.r - n0.r), dc = Math.abs(n.c - n0.c);
    if (dr !== 2 || dc !== 2) continue;
    const eye = NK(n0.p, (n.r + n0.r) / 2, (n.c + n0.c) / 2);
    if (pieceAt.get(eye)) continue;                   // 塞象眼
    pushMove(pc, n.key, res);
  }
  return res;
}

function advisorMoves(pc) {
  const res = [];
  for (const d of diag.get(pc.nodeKey)) {
    if (inPalace(pc.home, d)) pushMove(pc, d, res);
  }
  return res;
}

function kingMoves(pc) {
  const res = [];
  for (const d of orth.get(pc.nodeKey)) {
    if (inPalace(pc.home, d)) pushMove(pc, d, res);
  }
  // 飞将（将帅对脸）：沿直线（同车的射线扫描）若第一个遇到的棋子是对方老将，可直接吃掉
  for (const ray of allRays(pc.nodeKey)) {
    for (const k of ray) {
      const occ = pieceAt.get(k);
      if (!occ) continue;                                          // 空格继续延伸
      if (occ.owner !== pc.owner && occ.type === 'K') res.push(k); // 对脸：飞将吃帅
      break;                                                       // 第一个棋子即挡路，停止该方向
    }
  }
  return dedup(res);
}

function rookMoves(pc) {
  const res = [];
  for (const ray of allRays(pc.nodeKey)) {
    for (const k of ray) {
      const occ = pieceAt.get(k);
      if (!occ) { pushMove(pc, k, res); continue; }
      if (occ.owner !== pc.owner) pushMove(pc, k, res);
      break;
    }
  }
  return dedup(res);
}

function cannonMoves(pc) {
  const res = [];
  for (const ray of allRays(pc.nodeKey)) {
    let jumped = false;
    for (const k of ray) {
      const occ = pieceAt.get(k);
      if (!jumped) {
        if (!occ) { pushMove(pc, k, res); continue; }
        jumped = true;
      } else if (occ) {
        if (occ.owner !== pc.owner) pushMove(pc, k, res);
        break;
      }
    }
  }
  return dedup(res);
}

// 兵：未过河只能向前（r 增大方向）；过河后可走桥邻/横向/继续"前进"（任何远离本方后排方向）
// 各方"到本方后排(r=0)的图上最短步数"（BFS over orth），用于过河兵的前进/横走/后退判定。
// 比欧氏距离稳健：在三角形/邻盘的弯曲拓扑下，横走保持同距、前进增大、后退减小，不会误杀横向吃子。
const homeDist = [null, null, null];
(function buildHomeDist() {
  for (let p = 0; p < 3; p++) {
    const dist = new Map(), q = [];
    for (let c = 0; c <= 8; c++) { const k = NK(p, 0, c); dist.set(k, 0); q.push(k); }
    let qi = 0;
    while (qi < q.length) {
      const k = q[qi++], d = dist.get(k);
      for (const nb of orth.get(k)) if (!dist.has(nb)) { dist.set(nb, d + 1); q.push(nb); }
    }
    homeDist[p] = dist;
  }
})();

function pawnMoves(pc) {
  const res = [], n0 = nodes.get(pc.nodeKey);
  const crossed = crossedRiver(pc);
  for (const d of orth.get(pc.nodeKey)) {
    const n = nodes.get(d);
    if (!crossed) {
      // 本方半盘：前进 = r+1，或 r=4 河岸时过桥进入邻盘
      const fwd = (n.p === n0.p && n.r === n0.r + 1) ||
                  (n0.r === 4 && n.p !== n0.p);
      if (fwd) pushMove(pc, d, res);
    } else {
      // 过河后：可前进或横走，仅禁止"后退"（朝本方后排走近一步）
      if (!movesTowardHome(pc, n0, n)) pushMove(pc, d, res);
    }
  }
  return res;
}
// 判断 n0->n 是否"后退"：到本方后排的图上距离严格变小才算后退；横走(同距)与前进(变大)均放行
function movesTowardHome(pc, n0, n) {
  const D = homeDist[pc.home];
  return D.get(n.key) < D.get(n0.key);
}

function pushMove(pc, dstKey, out) {
  if (dstKey === undefined || dstKey === null) return;
  const occ = pieceAt.get(dstKey);
  if (occ && occ.owner === pc.owner) return;
  out.push(dstKey);
}
function dedup(arr) { return [...new Set(arr)]; }

function legalMoves(pc) {
  switch (pc.type) {
    case 'R': return rookMoves(pc);
    case 'C': return cannonMoves(pc);
    case 'H': return knightMoves(pc);
    case 'E': return elephantMoves(pc);
    case 'A': return advisorMoves(pc);
    case 'K': return kingMoves(pc);
    case 'P': return pawnMoves(pc);
  }
  return [];
}
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode5">
// ============ 交互与回合 ============
let curPlayer = 0;                 // 0红 1绿 2蓝
let alivePlayers = [true, true, true];
let gameOver = false;
let selected = null;               // 选中的 piece
let hintMeshes = [];               // 高亮提示

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

function isHuman(p) { return (game_config.humanPlayers || [0]).includes(p); }

function clearHints() {
  for (const m of hintMeshes) scene.remove(m);
  hintMeshes = [];
  if (selected && selected.mesh) selected.mesh.position.y = 0.02;
}

function showHints(pc, moves) {
  if (pc.mesh) pc.mesh.position.y = 0.25;   // 抬起选中棋子
  const geo = new THREE.RingGeometry(0.22, 0.34, 24);
  for (const k of moves) {
    const occ = pieceAt.get(k);
    const mat = new THREE.MeshBasicMaterial({
      color: occ ? 0xff4444 : 0x55ff88, transparent: true, opacity: 0.85, side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(geo, mat);
    const n = nodes.get(k);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(n.pos.x, 0.04, n.pos.z);
    ring.userData.targetKey = k;
    scene.add(ring);
    hintMeshes.push(ring);
  }
}

function pickNode(clientX, clientY) {
  pointer.x = (clientX / innerWidth) * 2 - 1;
  pointer.y = -(clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  // 先试棋子（递归：顶面是子 mesh）
  const hits = raycaster.intersectObjects(pieceGroup.children, true);
  if (hits.length) {
    let obj = hits[0].object;
    while (obj && obj.userData.pieceId === undefined) obj = obj.parent;
    const pc = obj && pieces.find(x => x.id === obj.userData.pieceId);
    if (pc) return { type: 'piece', piece: pc };
  }
  // 再投射地面取最近节点
  const pt = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(groundPlane, pt)) {
    let best = null, bd = 0.55;
    for (const n of nodes.values()) {
      const d = Math.hypot(n.pos.x - pt.x, n.pos.z - pt.z);
      if (d < bd) { bd = d; best = n; }
    }
    if (best) return { type: 'node', key: best.key };
  }
  return null;
}

function onTap(e) {
  if (gameOver || !gameStarted || animating) return;
  if (!isHuman(curPlayer)) return;
  const x = e.touches ? e.changedTouches[0].clientX : e.clientX;
  const y = e.touches ? e.changedTouches[0].clientY : e.clientY;
  const hit = pickNode(x, y);
  if (!hit) { clearHints(); selected = null; return; }

  const dstKey = hit.type === 'piece' ? hit.piece.nodeKey : hit.key;
  if (selected) {
    const moves = legalMoves(selected);
    if (moves.includes(dstKey)) {
      doMove(selected, dstKey);
      clearHints(); selected = null;
      return;
    }
  }
  // （重新）选择己方棋子
  if (hit.type === 'piece' && hit.piece.owner === curPlayer) {
    clearHints();
    selected = hit.piece;
    showHints(selected, legalMoves(selected));
    if (typeof playSound === 'function') playSound('select');
  } else {
    clearHints(); selected = null;
  }
}
renderer.domElement.addEventListener('pointerdown', onTap);

let animating = false;
function doMove(pc, dstKey) {
  // 人类落子前记录快照，供"悔棋"回退（每回合只保留最近一次）
  if (isHuman(pc.owner)) captureUndoSnapshot();
  const fromPos = nodes.get(pc.nodeKey).pos.clone();
  const victim = pieceAt.get(dstKey);
  pieceAt.delete(pc.nodeKey);
  pc.nodeKey = dstKey;
  pieceAt.set(dstKey, pc);
  const n = nodes.get(dstKey);
  setLastMoveMarkers(fromPos, n.pos);
  playSound('move');
  // 被吃棋子：先剥离 mesh 交给动画，逻辑立即结算
  let victimMesh = null;
  if (victim) { victimMesh = victim.mesh; victim.mesh = null; }
  animating = true;
  updateUndoButton();
  animatePieceHop(pc, fromPos, n.pos, () => {
    animating = false;
    if (victim) {
      playSound(victim.type === 'K' ? 'absorb' : 'capture');
      spawnBurst(n.pos, PLAYER_COLORS[victim.owner]);
      if (victimMesh) animateCaptureOut(victimMesh);
      capturePiece(victim, pc.owner);
    }
    applyPieceFacing();
    updateStrengthTray();
    updateCheckMarkers();
    if (!gameOver) nextTurn();
  });
}

function nextTurn() {
  do {
    curPlayer = (curPlayer + 1) % 3;
  } while (!alivePlayers[curPlayer]);
  updateTurnBadge();
  if (!isHuman(curPlayer)) scheduleAI();
}

function updateTurnBadge() {
  const badge = document.getElementById('turnBadge');
  const colors = ['bg-red-700', 'bg-emerald-700', 'bg-sky-700'];
  badge.classList.remove(...colors);
  badge.classList.add(colors[curPlayer]);
  badge.textContent = PLAYER_NAMES[curPlayer] + '方回合' + (isHuman(curPlayer) ? '（你）' : '');
  if (isHuman(curPlayer)) { const info = document.getElementById('aiInfo'); if (info) info.textContent = ''; }
  updateUndoButton();
}

// ============ 悔棋（每回合可悔1次，回退到你上一步之前；含期间 AI 的应招）============
let undoSnapshot = null;

// 记录落子前的完整逻辑状态（位置/存活/归属/回合），供一键回退
function captureUndoSnapshot() {
  undoSnapshot = {
    curPlayer,
    alivePlayers: alivePlayers.slice(),
    gameOver,
    pieces: pieces.map(p => ({ id: p.id, owner: p.owner, nodeKey: p.nodeKey, alive: p.alive }))
  };
}

let unlockInFlight = false;   // 正在请求解锁（看广告/会员），防连点
function updateUndoButton() {
  const btn = document.getElementById('undoBtn');
  if (!btn) return;
  btn.disabled = !(undoSnapshot && gameStarted && !gameOver && !animating && isHuman(curPlayer) && !unlockInFlight);
}

// 点击「悔棋」：先解锁（看广告 / 会员免），成功后再回退。悔棋一律需解锁，会员免广告。
async function requestUndo() {
  if (!undoSnapshot || animating || gameOver || !isHuman(curPlayer) || unlockInFlight) return;
  unlockInFlight = true;
  updateUndoButton();
  try {
    const ok = await requestUnlock('xiangqi_undo', '悔棋');
    if (!ok) {
      if (typeof toast === 'function') toast('需看完广告或开通会员才能悔棋', PLAYER_COLORS[0]);
      return;
    }
    // 解锁过程可能耗时，回退前再次校验仍可悔（状态可能已变化）。
    if (!undoSnapshot || animating || gameOver || !isHuman(curPlayer)) return;
    applyUndo();
  } finally {
    unlockInFlight = false;
    updateUndoButton();
  }
}

// 通用「解锁付费点」：请求父窗口（MagicHaqi 宿主 → sdk.ads）。
// 宿主会先回 haqi_unlock_ack 表示接手，随后回 haqi_unlock_result。
// 独立打开（无父窗口）或宿主不支持（无 ack）时，本地占位广告兜底，保证可测。
function requestUnlock(scene, title) {
  return new Promise((resolve) => {
    // 会员免广告：已开通会员则直接解锁，不再走广告/父窗口流程。
    if (isHaqiVip()) { resolve(true); return; }
    const requestId = 'unlock_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    let settled = false, acked = false;
    const finish = (v) => {
      if (settled) return;
      settled = true;
      window.removeEventListener('message', onMsg);
      clearTimeout(ackTimer);
      resolve(v);
    };
    const onMsg = (e) => {
      const m = e.data || {};
      if (m.requestId !== requestId) return;
      if (m.type === 'haqi_unlock_ack') { acked = true; clearTimeout(ackTimer); }
      else if (m.type === 'haqi_unlock_result') finish(!!m.unlocked);
    };
    window.addEventListener('message', onMsg);

    const hasParent = window.parent && window.parent !== window;
    if (hasParent) {
      try { window.parent.postMessage({ type: 'haqi_request_unlock', requestId, scene, title }, '*'); } catch (_) {}
    }
    // 无父窗口 → 立即兜底；有父窗口但 ~900ms 内无 ack → 视为宿主不支持，本地兜底。
    const ackTimer = setTimeout(() => {
      if (settled || acked) return;
      localPlaceholderAd(title).then(finish);
    }, hasParent ? 900 : 0);
  });
}

// ===== 会员（VIP）状态与开通 =====
// 嵌入宿主（蛋蛋星球）时，会员状态来自 keepworkSDK 真实会员（由宿主回传）；
// 独立打开（无宿主/无支付）时用本地占位标记模拟会员，仅便于测试。
const HAS_HOST = !!(window.parent && window.parent !== window);
let hostVipStatus = null;   // null=未知；true/false=宿主已告知
let currentAdDone = null;   // 当前占位广告弹层的结算回调（开通会员成功后即时解锁）

function isHaqiVip() {
  if (hostVipStatus === true) return true;
  if (!HAS_HOST) { try { return localStorage.getItem('haqi_local_vip') === '1'; } catch (_) { return false; } }
  return false;
}

// 监听宿主回传的会员状态：开通成功后即时解锁正在展示的广告弹层。
window.addEventListener('message', (e) => {
  const m = (e && e.data) || {};
  if (m.type === 'haqi_vip_status') {
    hostVipStatus = !!m.isVip;
    if (hostVipStatus && typeof currentAdDone === 'function') currentAdDone(true);
  }
});
// 进入游戏即向宿主查询会员状态（会员可直接跳过广告）。
if (HAS_HOST) { try { window.parent.postMessage({ type: 'haqi_get_vip_status' }, '*'); } catch (_) {} }

// 点击「开通会员」：嵌入宿主→请宿主打开 keepwork 真实开通会员/支付流程（结果异步回传）；
// 独立打开→无支付环境，写本地占位标记模拟会员。返回 true 表示可立即解锁。
function openVip() {
  if (HAS_HOST) {
    try { window.parent.postMessage({ type: 'haqi_open_vip', scene: 'xiangqi_undo' }, '*'); } catch (_) {}
    return false;
  }
  try { localStorage.setItem('haqi_local_vip', '1'); } catch (_) {}
  return true;
}

// 游戏内占位激励广告（独立打开/宿主不支持时的兜底）：5 秒倒计时，看完→true。
function localPlaceholderAd(title) {
  return new Promise((resolve) => {
    let remaining = 5, settled = false;
    const done = (ok) => { if (settled) return; settled = true; currentAdDone = null; clearInterval(timer); ov.remove(); resolve(ok); };
    const ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,12,20,.92);color:#fff;font:600 16px/1.5 system-ui,sans-serif;text-align:center;padding:24px';
    const x = document.createElement('button');
    x.textContent = '✕';
    x.style.cssText = 'position:absolute;top:16px;right:18px;width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:18px;cursor:pointer';
    x.onclick = () => done(false);
    const body = document.createElement('div');
    const btn = document.createElement('button');
    btn.disabled = true;
    btn.style.cssText = 'margin-top:18px;padding:10px 26px;border-radius:12px;border:none;background:#f59e0b;color:#fff;font-size:16px;font-weight:700;opacity:.5;cursor:not-allowed';
    btn.onclick = () => { if (!btn.disabled) done(true); };
    // 开通会员（永久免广告）：随时可点，点击即免本次及后续广告。
    const vipBtn = document.createElement('button');
    vipBtn.textContent = '👑 开通会员 · 永久免广告';
    vipBtn.style.cssText = 'margin-top:12px;padding:9px 22px;border-radius:12px;border:1px solid rgba(255,215,80,.6);background:rgba(255,215,80,.14);color:#ffd750;font-size:14px;font-weight:700;cursor:pointer';
    vipBtn.onclick = () => {
      // 独立打开：本地模拟会员，立即解锁；嵌入宿主：打开真实开通流程，等待回传后解锁。
      if (openVip()) { done(true); return; }
      vipBtn.disabled = true;
      vipBtn.style.cursor = 'progress';
      vipBtn.textContent = '正在打开开通会员…';
    };
    const vipHint = document.createElement('div');
    vipHint.textContent = '会员可跳过所有激励广告';
    vipHint.style.cssText = 'opacity:.6;margin-top:8px;font-size:12px;font-weight:500';
    const render = () => {
      body.innerHTML = `<div style="font-size:54px">📺</div><div style="font-size:20px;font-weight:800;margin-top:8px">激励广告（占位）</div>`
        + `<div style="opacity:.8;margin-top:6px">${remaining > 0 ? remaining + ' 秒后可领取（' + (title || '解锁') + '）' : '观看完成，点击领取'}</div>`;
      btn.textContent = remaining > 0 ? '请稍候 (' + remaining + ')' : '领取并悔棋';
      if (remaining <= 0) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
    };
    ov.append(x, body, btn, vipBtn, vipHint);
    document.body.appendChild(ov);
    currentAdDone = done;   // 供宿主回传「会员已开通」时即时解锁
    render();
    const timer = setInterval(() => { remaining = Math.max(0, remaining - 1); render(); if (remaining === 0) clearInterval(timer); }, 1000);
  });
}

// 执行回退（纯逻辑，不含付费门控）。
function applyUndo() {
  if (!undoSnapshot || animating || gameOver || !isHuman(curPlayer)) return;
  const snap = undoSnapshot;
  const byId = new Map(pieces.map(p => [p.id, p]));
  for (const s of snap.pieces) {
    const p = byId.get(s.id);
    if (!p) continue;
    p.owner = s.owner;
    p.nodeKey = s.nodeKey;
    p.alive = s.alive;
  }
  // 由存活棋子重建占位表
  pieceAt.clear();
  for (const p of pieces) if (p.alive) pieceAt.set(p.nodeKey, p);
  curPlayer = snap.curPlayer;
  alivePlayers = snap.alivePlayers.slice();
  gameOver = snap.gameOver;
  selected = null;
  clearHints();
  clearLastMoveMarkers();
  renderAllPieces();
  updateTurnBadge();
  updateStrengthTray();
  updateCheckMarkers();
  undoSnapshot = null;          // 用过即清，确保每回合只可悔1次
  updateUndoButton();
  if (typeof playSound === 'function') playSound('select');
}

updateTurnBadge();
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode6">
// ============ 吃子 / 接管 / 胜负 ============
function capturePiece(victim, byOwner) {
  victim.alive = false;
  // 只删除属于 victim 自己的占位（避免误删刚落在同格的吃子方）
  if (pieceAt.get(victim.nodeKey) === victim) pieceAt.delete(victim.nodeKey);
  if (victim.mesh) { pieceGroup.remove(victim.mesh); victim.mesh = null; }

  if (victim.type === 'K') {
    absorbPlayer(victim.owner, byOwner);
  }
}

// 某方主帅被吃：其剩余棋子全部归吃方所有
function absorbPlayer(loser, winner) {
  alivePlayers[loser] = false;
  let count = 0;
  for (const pc of pieces) {
    if (pc.alive && pc.owner === loser) {
      pc.owner = winner;
      refreshPieceFace(pc);
      count++;
    }
  }
  toast(`${PLAYER_NAMES[winner]}方击杀${PLAYER_NAMES[loser]}方主帅，接管 ${count} 枚棋子！`,
        PLAYER_COLORS[winner]);

  const remaining = alivePlayers.filter(Boolean).length;
  if (remaining === 1) endGame(winner);
}

function endGame(winner) {
  gameOver = true;
  clearHints(); selected = null;
  clearCheckMarkers();
  updateStrengthTray();
  const human = isHuman(winner);
  if (typeof playSound === 'function') playSound(human ? 'win' : 'lose');
  if (typeof spawnBurst === 'function') {
    const c = new THREE.Vector3(0, 0, 0);
    [PLAYER_COLORS[winner], 0xffd54a, 0xffffff].forEach((col, i) =>
      setTimeout(() => spawnBurst(c, col, 22), i * 220));
  }
  toast(human ? `🎉 你（${PLAYER_NAMES[winner]}方）一统天下！` : `${PLAYER_NAMES[winner]}方获胜！`,
        PLAYER_COLORS[winner], 0);
  const myPieces = pieces.filter(p => p.alive && isHuman(p.owner)).length;
  const earnedPoints = human ? 100 + myPieces * 5 : Math.min(40, myPieces * 3);
  window.parent.postMessage({
    type: 'gameFinished',
    data: { earnedPoints, won: human, difficulty: game_config.difficulty }
  }, '*');
  setTimeout(() => document.getElementById('restartBar').classList.remove('hidden'), 1200);
}

// 浮动提示
function toast(text, colorHex, ms = 2600) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.style.background = '#' + colorHex.toString(16).padStart(6, '0');
  el.classList.remove('hidden', 'opacity-0');
  if (toast._t) clearTimeout(toast._t);
  if (ms > 0) toast._t = setTimeout(() => el.classList.add('opacity-0'), ms);
}
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode7">
// ============ AI 引擎：迭代加深 + 静态搜索(Quiescence) + Paranoid alpha-beta ============
// 三人棋适配：本方为 max 层，其余两方一律按 min 层处理（paranoid 假设：都针对我）。
// 强度来源：① 迭代加深（逐层加深 + 主变例优先排序，时间用满即止）
//          ② 静态搜索（只续吃子直到局面平静，消除"地平线效应"，看清子力交换）
//          ③ 局面评估（子力 + 位置价值表 + 兵过河 + 主帅安全 + 三人制"压制领先者"）
//          ④ 杀手着法/历史启发 排序，大幅提升 alpha-beta 剪枝效率
const PIECE_VALUE = { K: 10000, R: 90, C: 50, H: 48, E: 22, A: 22, P: 12 };
const WIN_SCORE = 60000;

// depth = 迭代加深的最大层数（受 deadline 限制，未必跑满）；
// limit = 内部节点每层候选走法上限（0 不限，配合排序近似"选择性延伸"）；
// deadline = 单步思考时间预算(ms)，迭代加深用满即返回当前最优，永不卡死；
// qdepth = 静态搜索最大续吃深度（0 = 关闭，制造低难度的战术盲点）；
// topK = 从前 K 个最优中随机挑选（制造低难度的"失误"）；noise = 评分扰动幅度。
const AI_DIFF = {
  easy:   { depth: 1, limit: 0,  noise: 34, deadline: 300,  topK: 4, qdepth: 0  },
  normal: { depth: 4, limit: 14, noise: 4,  deadline: 1000, topK: 1, qdepth: 4  },
  hard:   { depth: 6, limit: 10, noise: 0,  deadline: 1700, topK: 1, qdepth: 6  },
  master: { depth: 8, limit: 8,  noise: 0,  deadline: 2200, topK: 1, qdepth: 10 }
};

// 搜索期共享状态
let killers = [];          // killers[ply] = [最近两个引发剪枝的安静着法 key]
let history = {};          // "pcId_dst" -> 历史启发分（剪枝越深加分越多）
let qDepthBudget = 6;      // 当前难度的静态搜索深度
let aiLastDepth = 0;       // 上一步实际跑到的搜索层数（用于 HUD 展示）
let lastScored = null;     // 上一完成层的根节点评分表（用于 topK/noise 选择）

// AI 性格（按座位）：让两个电脑对手棋风迥异 —— atk 放大本方进攻/位置权重，def 放大本方主帅安全权重。
// 红(0)均衡（通常是人类）；绿(1)东吴=稳健（重防守、慎进取）；蓝(2)曹魏=凶猛（重进攻、轻自保）。
const AI_STYLE = [
  { name: '均衡', atk: 1.0,  def: 1.0  },
  { name: '稳健', atk: 0.85, def: 1.4  },
  { name: '凶猛', atk: 1.35, def: 0.7  }
];

// 列中心度：第 4 列（中线）最高，越靠边越低 —— 大子居中威力更大
const COL_CENTER = [0, 1, 2, 3, 4, 3, 2, 1, 0];

function recordKiller(ply, id, dst) {
  const key = id + '_' + dst;
  const k = killers[ply] || (killers[ply] = []);
  if (k[0] !== key) { k[1] = k[0]; k[0] = key; }
}

// 临时执行/撤销一步（仅数据层，不动渲染），返回 undo 闭包
function simMove(pc, dst) {
  const fromKey = pc.nodeKey;
  const victim = pieceAt.get(dst) || null;
  pieceAt.delete(fromKey);
  if (victim) { victim.alive = false; pieceAt.delete(dst); }
  pieceAt.set(dst, pc);
  pc.nodeKey = dst;
  return () => {
    pc.nodeKey = fromKey;
    pieceAt.delete(dst);
    pieceAt.set(fromKey, pc);
    if (victim) { victim.alive = true; pieceAt.set(dst, victim); }
  };
}

// 模拟"吃帅接管"：pc 吃掉 dst 处的敌帅，败方全部存活棋子倒戈归 pc.owner（含 alivePlayers 更新）。
// 返回 undo 闭包。供搜索精确评估接管带来的巨大子力转移与三人制连锁。
function simAbsorbMove(pc, dst) {
  const fromKey = pc.nodeKey;
  const victim = pieceAt.get(dst);
  const loser = victim.owner, captor = pc.owner;
  const flipped = [];
  pieceAt.delete(fromKey);
  victim.alive = false; pieceAt.delete(dst);
  pieceAt.set(dst, pc); pc.nodeKey = dst;
  for (const q of pieces) { if (q.alive && q.owner === loser) { q.owner = captor; flipped.push(q); } }
  const wasAlive = alivePlayers[loser];
  alivePlayers[loser] = false;
  return () => {
    alivePlayers[loser] = wasAlive;
    for (const q of flipped) q.owner = loser;
    pc.nodeKey = fromKey; pieceAt.delete(dst); pieceAt.set(fromKey, pc);
    victim.alive = true; pieceAt.set(dst, victim);
  };
}

// 节点是否被任一敌方攻击（提早退出，供评估函数使用）
function isAttacked(nodeKey, defenderOwner) {
  for (const en of pieces) {
    if (!en.alive || en.owner === defenderOwner) continue;
    if (legalMoves(en).includes(nodeKey)) return true;
  }
  return false;
}

// 位置价值表：依据棋子类型给出"站位好坏"加成（与归属方无关，纯几何）
function pstBonus(pc) {
  const n = nodes.get(pc.nodeKey);
  if (!n) return 0;
  const central = COL_CENTER[n.c];          // 0..4
  switch (pc.type) {
    case 'P': {                              // 兵：过河价值飙升，未过河鼓励向前并居中
      const crossed = !inHomeHalf(pc, pc.nodeKey);
      return crossed ? 20 + central * 1.6 : n.r * 2 + central * 0.5;
    }
    case 'R': return central * 2.0 + (n.r > 0 ? 2 : 0);   // 车：占中线、出原位
    case 'H': return central * 2.4 + (n.r > 0 ? 2 : 0);   // 马：居中机动性最强
    case 'C': return central * 1.4;                       // 炮：略偏好中线
    case 'E': return inHomeHalf(pc, pc.nodeKey) ? 2 : -3; // 象：守家，不宜远离
    case 'A': return 2;                                   // 士：守宫
    case 'K': return inPalace(pc.home, pc.nodeKey) ? 0 : -6;
  }
  return 0;
}

// 静态评估（以 player 视角）：子力 + 位置价值×性格 + 主帅安全×性格 + 三人制压制领先者
function evalFor(player) {
  const style = AI_STYLE[player] || AI_STYLE[0];
  let score = 0, king = null;
  const oppMat = [0, 0, 0];                  // 各对手的纯子力（用于"压制领先者"）
  for (const pc of pieces) {
    if (!pc.alive) continue;
    const pos = pstBonus(pc);
    if (pc.owner === player) {
      score += PIECE_VALUE[pc.type] + pos * style.atk;     // 进攻型更看重己方位置/前压
      if (pc.type === 'K') king = pc;
    } else {
      score -= PIECE_VALUE[pc.type] + pos;
      oppMat[pc.owner] += PIECE_VALUE[pc.type];
    }
  }
  if (!king) return -WIN_SCORE;
  if (isAttacked(king.nodeKey, player)) score -= 150 * style.def;   // 防守型更怕被将
  // 三人博弈：额外压制实力最强的对手，避免某方做大后回头一统
  score -= Math.max(oppMat[0], oppMat[1], oppMat[2]) * 0.12;
  return score;
}

// 走法生成 + 排序：吃子(MVV-LVA) → 杀手着法 → 历史启发 → 其余，最大化剪枝效率，可按 limit 截断
function orderedMovesOf(player, limit, ply) {
  const moves = [];
  const kl = killers[ply];
  for (const pc of pieces) {
    if (!pc.alive || pc.owner !== player) continue;
    for (const dst of legalMoves(pc)) {
      const v = pieceAt.get(dst);
      let s;
      if (v) {
        // MVV-LVA：优先"高价值受害者、低价值攻击者"
        s = 100000 + PIECE_VALUE[v.type] * 10 - PIECE_VALUE[pc.type];
      } else {
        const key = pc.id + '_' + dst;
        if (kl && (kl[0] === key || kl[1] === key)) s = 90000;   // 杀手着法
        else s = history[key] || 0;                               // 历史启发
      }
      moves.push({ pc, dst, s });
    }
  }
  moves.sort((a, b) => b.s - a.s);
  return limit > 0 && moves.length > limit ? moves.slice(0, limit) : moves;
}

function nextAliveOf(p) {
  let q = p;
  do { q = (q + 1) % 3; } while (!alivePlayers[q] && q !== p);
  return q;
}

let aiDeadline = 0;

// 静态搜索：到达深度 0 后只继续"吃子"直到局面平静，消除地平线效应（看清交换结果）。
// 同样按 paranoid 处理：turnPlayer === player 取 max，否则取 min；可随时 stand-pat。
function quiesce(player, turnPlayer, alpha, beta, qdepth) {
  if (performance.now() > aiDeadline) return evalFor(player);
  const maximizing = turnPlayer === player;
  let best = evalFor(player);                          // stand-pat：不强迫续吃
  if (maximizing) { if (best >= beta) return best; if (best > alpha) alpha = best; }
  else            { if (best <= alpha) return best; if (best < beta) beta = best; }
  if (qdepth <= 0) return best;

  const caps = [];
  for (const pc of pieces) {
    if (!pc.alive || pc.owner !== turnPlayer) continue;
    for (const dst of legalMoves(pc)) {
      const v = pieceAt.get(dst);
      if (v) caps.push({ pc, dst, cv: PIECE_VALUE[v.type], vk: v.type === 'K', vo: v.owner });
    }
  }
  caps.sort((a, b) => b.cv - a.cv);
  for (const m of caps) {
    let score;
    if (m.vk) {
      if (m.vo === player) score = -WIN_SCORE;       // 我方主帅被吃
      else {                                         // 接管：模拟倒戈后评估
        const u = simAbsorbMove(m.pc, m.dst);
        score = alivePlayers.filter(Boolean).length <= 1
          ? (maximizing ? WIN_SCORE : -WIN_SCORE) : evalFor(player);
        u();
      }
    } else {
      const u = simMove(m.pc, m.dst);
      score = quiesce(player, nextAliveOf(turnPlayer), alpha, beta, qdepth - 1);
      u();
    }
    if (maximizing) { if (score > best) best = score; if (best > alpha) alpha = best; }
    else            { if (score < best) best = score; if (best < beta) beta = best; }
    if (alpha >= beta) break;
  }
  return best;
}

// Paranoid alpha-beta：turnPlayer === player 时取 max，否则取 min；depth 0 进入静态搜索
function paranoid(player, turnPlayer, depth, alpha, beta, limit, ply) {
  if (performance.now() > aiDeadline) return evalFor(player);
  if (depth <= 0) return quiesce(player, turnPlayer, alpha, beta, qDepthBudget);
  const moves = orderedMovesOf(turnPlayer, limit, ply);
  if (!moves.length)   // 无子可动：跳过该方
    return paranoid(player, nextAliveOf(turnPlayer), depth - 1, alpha, beta, limit, ply + 1);
  const maximizing = turnPlayer === player;
  let best = maximizing ? -Infinity : Infinity;
  for (const { pc, dst } of moves) {
    const victim = pieceAt.get(dst);
    let score;
    if (victim && victim.type === 'K') {
      if (victim.owner === player) {
        score = -(WIN_SCORE + depth * 100);          // 我方主帅被吃：致命
      } else {
        // 接管：精确模拟全军倒戈。若就此只剩一方 → 终局；否则按接管后的子力局面评估。
        const undo = simAbsorbMove(pc, dst);
        score = alivePlayers.filter(Boolean).length <= 1
          ? (maximizing ? WIN_SCORE + depth * 100 : -(WIN_SCORE + depth * 100))
          : evalFor(player);
        undo();
      }
    } else {
      const undo = simMove(pc, dst);
      score = paranoid(player, nextAliveOf(turnPlayer), depth - 1, alpha, beta, limit, ply + 1);
      undo();
    }
    if (maximizing) {
      if (score > best) best = score;
      if (best > alpha) alpha = best;
    } else {
      if (score < best) best = score;
      if (best < beta) beta = best;
    }
    if (alpha >= beta) {                              // 剪枝：记录安静着法为杀手/历史
      if (!victim) { recordKiller(ply, pc.id, dst); history[pc.id + '_' + dst] = (history[pc.id + '_' + dst] || 0) + depth * depth; }
      break;
    }
  }
  return best;
}

// 最近走法记忆（防原地往返循环）
const aiRecentMoves = [[], [], []];
// 每方已走步数：用于开局多样化（前两步在近似等价着法中随机选，避免每局雷同）
const aiMoveCount = [0, 0, 0];

function aiPickMove(player) {
  const cfg = AI_DIFF[game_config.difficulty] || AI_DIFF.normal;
  aiDeadline = performance.now() + cfg.deadline;
  qDepthBudget = cfg.qdepth || 0;
  killers = []; history = {}; lastScored = null; aiLastDepth = 0;

  const rootMoves = orderedMovesOf(player, 0, 0);
  if (!rootMoves.length) return null;
  // 终局杀：若吃帅后只剩本方一家，直接落子（一统天下）
  for (const m of rootMoves) {
    const v = pieceAt.get(m.dst);
    if (v && v.type === 'K') {
      const undo = simAbsorbMove(m.pc, m.dst);
      const ends = alivePlayers.filter(Boolean).length <= 1;
      undo();
      if (ends) return { pc: m.pc, dst: m.dst };
    }
  }

  const recent = aiRecentMoves[player];
  let pvKey = null;

  // 迭代加深：逐层加深，主变例(PV)优先排序；时间用满即停，返回最近完成层的结果
  for (let d = 1; d <= cfg.depth; d++) {
    if (pvKey) {  // 把上一层最优着法提到最前，显著提升剪枝
      rootMoves.sort((a, b) =>
        (((b.pc.id + '_' + b.dst) === pvKey) ? 1 : 0) - (((a.pc.id + '_' + a.dst) === pvKey) ? 1 : 0));
    }
    let alphaRoot = -Infinity, timedOut = false;
    const scored = [];
    for (const { pc, dst } of rootMoves) {
      if (performance.now() > aiDeadline) { timedOut = true; break; }
      const victim = pieceAt.get(dst);
      let score;
      if (victim && victim.type === 'K') {           // 吃帅接管：模拟倒戈后评估（终局则记为必胜）
        const undo = simAbsorbMove(pc, dst);
        score = alivePlayers.filter(Boolean).length <= 1 ? WIN_SCORE : evalFor(player);
        undo();
      } else {
        const undo = simMove(pc, dst);
        score = paranoid(player, nextAliveOf(player), d - 1,
                         cfg.topK > 1 ? -Infinity : alphaRoot, Infinity, cfg.limit, 1);
        undo();
      }
      if (recent.includes(pc.id + '>' + dst)) score -= 30;   // 防原地往返循环
      scored.push({ pc, dst, score });
      if (score > alphaRoot) alphaRoot = score;
    }
    // 仅采纳"完整跑完"的层；超时层结果可能不公允，丢弃但保留上一完整层
    if (!timedOut && scored.length) {
      scored.sort((a, b) => b.score - a.score);
      lastScored = scored;
      pvKey = scored[0].pc.id + '_' + scored[0].dst;
      aiLastDepth = d;
      if (Math.abs(scored[0].score) >= WIN_SCORE) break;     // 已找到杀棋，无需再深
    }
    if (timedOut) break;
  }

  let scored = lastScored || [{ pc: rootMoves[0].pc, dst: rootMoves[0].dst, score: 0 }];
  if (cfg.noise) {                                           // 低难度：扰动后重新排序制造"失误"
    scored = scored.map(s => ({ ...s, score: s.score + Math.random() * cfg.noise }))
                   .sort((a, b) => b.score - a.score);
  }

  // 开局多样化：高难度(topK=1)前两步，在与最优近似等价(≤8分)的着法中随机选 —— 不削弱强度，但每局开局不同
  let pick;
  if ((cfg.topK || 1) === 1 && aiMoveCount[player] < 2 && scored.length > 1) {
    const near = scored.filter(s => scored[0].score - s.score <= 8);
    pick = near[Math.floor(Math.random() * near.length)];
  } else {
    const k = Math.min(cfg.topK || 1, scored.length);
    pick = scored[k > 1 ? Math.floor(Math.random() * k) : 0];
  }
  aiMoveCount[player]++;
  recent.push(pick.pc.id + '>' + pick.dst);
  if (recent.length > 6) recent.shift();
  return { pc: pick.pc, dst: pick.dst };
}

function scheduleAI() {
  // AI 超过 300ms 未落子时显示"思考中..."
  const thinkTimer = setTimeout(() => {
    if (gameOver || isHuman(curPlayer)) return;
    const badge = document.getElementById('turnBadge');
    if (badge) badge.textContent = PLAYER_NAMES[curPlayer] + '方思考中...';
  }, 300);
  setTimeout(() => {
    if (gameOver || isHuman(curPlayer)) { clearTimeout(thinkTimer); return; }
    const aiSeat = curPlayer;
    const mv = aiPickMove(aiSeat);
    clearTimeout(thinkTimer);
    const info = document.getElementById('aiInfo');
    if (info) info.textContent = `${PLAYER_NAMES[aiSeat]}方 AI · ${(AI_STYLE[aiSeat] || AI_STYLE[0]).name} · 算到 ${aiLastDepth} 层`;
    if (mv) {
      doMove(mv.pc, mv.dst);
    } else {
      nextTurn();   // 无子可动，跳过
    }
  }, game_config.aiMoveDelay || 800);
}
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode8">
// ============ 相机环绕 & 重开 ============
let camTheta = 0, camPhi = 1.25, camDist = 19;   // 默认近俯视
let userZoomed = false;
let dragging = false, dragMoved = false, lastX = 0, lastY = 0;

// 自适应距离：纵向保证整张桌子可见；横向只需保证棋盘格可见——
// 窄屏（手机竖屏）允许桌子左右两角被裁切，从而让棋盘显示更大
function fitCamDist() {
  const R_TABLE = 10.4;   // 桌面外接半径+余量（纵向必须完整）
  const R_BOARD = 8.3;    // 棋盘格外接半径（横向最低要求）
  const vHalf = THREE.MathUtils.degToRad(camera.fov / 2);
  const hHalf = Math.atan(Math.tan(vHalf) * camera.aspect);
  return Math.max(R_TABLE / Math.tan(vHalf), R_BOARD / Math.tan(hHalf));
}

function updateCamera() {
  if (!userZoomed) camDist = fitCamDist();
  camera.position.set(
    camDist * Math.sin(camTheta) * Math.cos(camPhi),
    camDist * Math.sin(camPhi),
    camDist * Math.cos(camTheta) * Math.cos(camPhi)
  );
  camera.lookAt(0, 0, 0);
  // 棋子与标签文字始终与屏幕水平对齐
  applyPieceFacing();
  if (typeof applyLabelFacing === 'function') applyLabelFacing();
}
updateCamera();

renderer.domElement.addEventListener('pointerdown', (e) => {
  dragging = true; dragMoved = false;
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  if (Math.abs(dx) + Math.abs(dy) > 6) dragMoved = true;   // 仅用于区分点击/拖动，不再旋转相机
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('pointerup', () => { dragging = false; });
renderer.domElement.addEventListener('wheel', (e) => {
  userZoomed = true;
  camDist = Math.min(fitCamDist() * 1.4, Math.max(9, camDist + e.deltaY * 0.02));
  updateCamera();
}, { passive: true });

// 双指捏合缩放
let pinchDist = 0;
renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    if (pinchDist) {
      userZoomed = true;
      camDist = Math.min(fitCamDist() * 1.4, Math.max(9, camDist - (d - pinchDist) * 0.05));
      updateCamera();
    }
    pinchDist = d;
  }
}, { passive: true });
renderer.domElement.addEventListener('touchend', () => { pinchDist = 0; });

// 拖拽视角时不触发选子：包装 onTap
renderer.domElement.removeEventListener('pointerdown', onTap);
renderer.domElement.addEventListener('pointerup', (e) => {
  if (!dragMoved) onTap(e);
});

function restartGame() {
  gameOver = false;
  curPlayer = 0;
  alivePlayers = [true, true, true];
  selected = null;
  animating = false;
  undoSnapshot = null;
  aiMoveCount.fill(0);
  if (typeof clearAllFX === 'function') clearAllFX();
  clearHints();
  document.getElementById('restartBar').classList.add('hidden');
  document.getElementById('toast').classList.add('hidden');
  initialSetup();
  renderAllPieces();
  updateTurnBadge();
  updateStrengthTray();
  updateCheckMarkers();
  if (!isHuman(curPlayer)) scheduleAI();
}
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('undoBtn').addEventListener('click', requestUndo);
</script>

<script type="text/gamejs" class="xqGameCode" id="xqGameCode9">
// ============ 动画 / 粒子特效 / 音效 ============
const fxTweens = [];
const fxParticles = [];
let fxTime = 0;
let lastMoveMarkers = [];

function addTween(dur, onUpdate, onDone) {
  const tw = { t: 0, dur, onUpdate, onDone };
  fxTweens.push(tw);
  // \u540e\u53f0\u6807\u7b7e RAF \u88ab\u9650\u6d41\u65f6\u7684\u4fdd\u5e95\uff1a\u8d85\u65f6\u5f3a\u5236\u5b8c\u6210\uff0c\u907f\u514d\u5361\u56de\u5408
  setTimeout(() => {
    const i = fxTweens.indexOf(tw);
    if (i < 0) return;
    fxTweens.splice(i, 1);
    tw.onUpdate(1);
    if (tw.onDone) tw.onDone();
  }, dur * 1000 + 250);
}

function updateFX(dt) {
  fxTime += dt;
  for (let i = fxTweens.length - 1; i >= 0; i--) {
    const tw = fxTweens[i];
    tw.t += dt;
    const k = Math.min(1, tw.t / tw.dur);
    tw.onUpdate(k);
    if (k >= 1) { fxTweens.splice(i, 1); if (tw.onDone) tw.onDone(); }
  }
  for (let i = fxParticles.length - 1; i >= 0; i--) {
    const p = fxParticles[i];
    p.life += dt;
    const k = p.life / p.maxLife;
    if (k >= 1) { scene.remove(p.mesh); fxParticles.splice(i, 1); continue; }
    p.mesh.position.addScaledVector(p.vel, dt);
    p.vel.y -= 2.4 * dt;
    p.mesh.material.opacity = 0.9 * (1 - k);
    p.mesh.scale.setScalar(Math.max(0.05, 1 - k * 0.6));
  }
  // 选中棋子轻柔浮动
  if (selected && selected.mesh && !animating) {
    selected.mesh.position.y = 0.25 + Math.sin(fxTime * 5) * 0.05;
  }
  // 上一手标记脉冲
  for (const m of lastMoveMarkers) {
    m.material.opacity = 0.5 + Math.sin(fxTime * 4) * 0.22;
  }
  // 将军红环脉冲（更快更醒目）
  for (const m of checkMarkers) {
    m.material.opacity = 0.55 + Math.sin(fxTime * 9) * 0.35;
    const s = 1 + Math.sin(fxTime * 9) * 0.12;
    m.scale.set(s, s, s);
  }
}

// 棋子跳跃移动（抛物线 + easeInOut）
function animatePieceHop(pc, from, to, onDone) {
  const dist = from.distanceTo(to);
  const hop = Math.min(1.0, 0.35 + dist * 0.05);
  const dur = Math.min(0.5, 0.22 + dist * 0.025);
  const mesh = pc.mesh;
  addTween(dur, (k) => {
    const e = k < 0.5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;
    mesh.position.x = from.x + (to.x - from.x) * e;
    mesh.position.z = from.z + (to.z - from.z) * e;
    mesh.position.y = 0.02 + Math.sin(Math.PI * e) * hop;
  }, () => {
    mesh.position.set(to.x, 0.02, to.z);
    if (onDone) onDone();
  });
}

// 被吃棋子：弹起旋转缩小飞出
function animateCaptureOut(mesh) {
  const dir = Math.random() * Math.PI * 2;
  addTween(0.5, (k) => {
    mesh.position.x += Math.cos(dir) * 0.03;
    mesh.position.z += Math.sin(dir) * 0.03;
    mesh.position.y = 0.02 + Math.sin(Math.PI * Math.min(1, k * 1.2)) * 1.4;
    mesh.rotation.x = k * 5;
    mesh.scale.setScalar(Math.max(0.01, 1 - k));
  }, () => { pieceGroup.remove(mesh); });
}

// 粒子爆炸
function spawnBurst(pos, colorHex, count = 14) {
  const geo = new THREE.CircleGeometry(0.09, 8);
  for (let i = 0; i < count; i++) {
    const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(pos.x, 0.25, pos.z);
    m.rotation.x = -Math.PI / 2;
    const a = Math.random() * Math.PI * 2;
    const sp = 1.2 + Math.random() * 1.8;
    fxParticles.push({
      mesh: m, life: 0, maxLife: 0.6 + Math.random() * 0.5,
      vel: new THREE.Vector3(Math.cos(a) * sp, 1.4 + Math.random() * 1.6, Math.sin(a) * sp)
    });
    scene.add(m);
  }
}

// 上一手起点/终点金色标记
function setLastMoveMarkers(from, to) {
  clearLastMoveMarkers();
  const geo = new THREE.RingGeometry(0.3, 0.42, 24);
  for (const p of [from, to]) {
    const mat = new THREE.MeshBasicMaterial({ color: 0xffd54a, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(geo, mat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(p.x, 0.034, p.z);
    scene.add(ring);
    lastMoveMarkers.push(ring);
  }
}
function clearLastMoveMarkers() {
  for (const m of lastMoveMarkers) scene.remove(m);
  lastMoveMarkers = [];
}
function clearAllFX() {
  fxTweens.length = 0;
  for (const p of fxParticles) scene.remove(p.mesh);
  fxParticles.length = 0;
  clearLastMoveMarkers();
  clearCheckMarkers();
}

// ---- 将军提示：被将的主帅脚下亮红环（脉冲），人类被将时弹警告+音效 ----
let checkMarkers = [];
function kingOf(player) {
  for (const pc of pieces) if (pc.alive && pc.type === 'K' && pc.owner === player) return pc;
  return null;
}
function clearCheckMarkers() {
  for (const m of checkMarkers) scene.remove(m);
  checkMarkers = [];
}
function updateCheckMarkers() {
  clearCheckMarkers();
  if (gameOver) return;
  let humanInCheck = false;
  const geo = new THREE.RingGeometry(0.34, 0.5, 28);
  for (let p = 0; p < 3; p++) {
    if (!alivePlayers[p]) continue;
    const k = kingOf(p);
    if (!k || !isAttacked(k.nodeKey, p)) continue;
    const mat = new THREE.MeshBasicMaterial({ color: 0xff2222, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(geo, mat);
    ring.rotation.x = -Math.PI / 2;
    const n = nodes.get(k.nodeKey);
    ring.position.set(n.pos.x, 0.045, n.pos.z);
    scene.add(ring);
    checkMarkers.push(ring);
    if (isHuman(p)) humanInCheck = true;
  }
  if (humanInCheck) {
    toast('⚠️ 你被将军了！快保护主帅', PLAYER_COLORS[0], 1800);
    playSound('check');
  }
}

// ---- 三方战力实况：存活棋子数 + 王冠/骷髅 + 形势条（子力占比），谁在做大一目了然 ----
function updateStrengthTray() {
  const tray = document.getElementById('strengthTray');
  if (!tray) return;
  const cnt = [0, 0, 0], val = [0, 0, 0];
  for (const pc of pieces) {
    if (!pc.alive) continue;
    cnt[pc.owner]++;
    if (pc.type !== 'K') val[pc.owner] += PIECE_VALUE[pc.type];   // 去掉帅的天价，反映真实战力
  }
  tray.querySelectorAll('.strPill').forEach(el => {
    const s = +el.dataset.seat;
    el.textContent = PLAYER_NAMES[s] + (alivePlayers[s] ? ' 👑' : ' 💀') + cnt[s];
    el.style.opacity = alivePlayers[s] ? '1' : '0.4';
  });
  const tot = (val[0] + val[1] + val[2]) || 1;
  const bar = document.getElementById('powerBar');
  if (bar) bar.querySelectorAll('[data-seat]').forEach(el => {
    el.style.width = (val[+el.dataset.seat] / tot * 100) + '%';
  });
}

// ---- WebAudio 合成音效（无需外部资源）----
let audioCtx = null;
function ac() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type = 'sine', vol = 0.2, when = 0) {
  const ctx = ac(); if (!ctx) return;
  const t0 = ctx.currentTime + when;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function noiseBurst(dur = 0.08, vol = 0.25, cutoff = 700, when = 0) {
  const ctx = ac(); if (!ctx) return;
  const t0 = ctx.currentTime + when;
  const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = cutoff;
  const g = ctx.createGain(); g.gain.value = vol;
  src.connect(f); f.connect(g); g.connect(ctx.destination);
  src.start(t0);
}
function playSound(type) {
  switch (type) {
    case 'select':  tone(880, 0.06, 'triangle', 0.12); break;
    case 'move':    noiseBurst(0.07, 0.32, 900); tone(180, 0.08, 'sine', 0.22); break;
    case 'capture': noiseBurst(0.12, 0.4, 500); tone(110, 0.18, 'sine', 0.32); tone(70, 0.22, 'sine', 0.26, 0.03); break;
    case 'check':   tone(740, 0.1, 'square', 0.18); tone(740, 0.1, 'square', 0.18, 0.13); break;
    case 'absorb':  [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.18, 'triangle', 0.2, i * 0.09)); break;
    case 'win':     [523, 659, 784, 1047, 1319].forEach((f, i) => tone(f, 0.3, 'triangle', 0.22, i * 0.13)); break;
    case 'lose':    [392, 330, 262, 196].forEach((f, i) => tone(f, 0.28, 'sawtooth', 0.1, i * 0.14)); break;
  }
}

<script>
  // Bootstrap: the rules modal (static HTML) is the real initial screen and
  // paints immediately. All game logic lives in a non-executable <script
  // type="text/gamejs"> block so the browser does NOT compile it before
  // DOMContentLoaded, and three.js is NOT a blocking head script. After first
  // paint we lazy-load three.js, then run the game code (which builds the WebGL
  // scene, board topology and pieces) — keeping startup (DCL) tiny.
  (function () {
    try { window.parent.postMessage({ type: 'gameLoaded' }, '*'); } catch (_) {}
    var booted = false;
    // Load each game block as its OWN classic script, in order. They must stay
    // separate (not concatenated) because the original code relies on per-<script>
    // top-level lexical isolation: a `typeof someLet` in an earlier block must see
    // 'undefined' for a `let` declared in a later block, not throw a TDZ error.
    function runGame(after) {
      var blocks = Array.prototype.slice.call(document.querySelectorAll('script.xqGameCode'));
      (function next(i) {
        if (i >= blocks.length) { if (after) after(); return; }
        var url = URL.createObjectURL(new Blob([blocks[i].textContent], { type: 'application/javascript' }));
        var s = document.createElement('script');
        s.src = url;
        s.onload = function () { URL.revokeObjectURL(url); next(i + 1); };
        s.onerror = function () { URL.revokeObjectURL(url); next(i + 1); };
        document.head.appendChild(s);
      })(0);
    }
    function boot(after) {
      if (booted) { if (after) after(); return; }
      booted = true;
      if (window.THREE) { runGame(after); return; }
      var t = document.createElement('script');
      t.src = 'https://cdn.keepwork.com/npm/three%400.128.0/build/three.min.js';
      t.onload = function () { runGame(after); };
      document.head.appendChild(t);
    }
    // The Start button: build the 3D engine on demand, then replay the click so
    // the game's own start handler (attached when the game code runs) fires.
    var startBtn = document.getElementById('startBtn');
    if (startBtn) startBtn.addEventListener('click', function () {
      if (booted) return;            // game code now owns the button
      pendingStart = true;
      boot(function () { startBtn.click(); });
    });
    // If the parent drives the game (gameContinue) before any tap, boot too.
    window.addEventListener('message', function (e) {
      var msg = e.data || {};
      if (!booted && (msg.type === 'gameContinue' || msg.type === 'setGameConfig')) boot();
    });
  })();
</script>
</body>
</html>
