<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>科学期末闯关</title>
  <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #263238;
      background: linear-gradient(180deg, #dff7ff 0%, #fff7d6 52%, #dcfce7 100%);
      touch-action: manipulation;
    }
    .shell { height: 100vh; height: 100dvh; display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto; gap: 10px; padding: 10px; }
    .top {
      min-height: 58px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 9px 12px; border-radius: 14px; background: rgba(255,255,255,.88);
      border: 2px solid rgba(255,255,255,.9); box-shadow: 0 5px 0 rgba(14,116,144,.14);
    }
    .title { font-size: 20px; font-weight: 1000; color: #075985; white-space: nowrap; }
    .stats { display: flex; align-items: center; justify-content: flex-end; gap: 7px; flex-wrap: wrap; }
    .pill {
      min-width: 60px; height: 32px; display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      padding: 0 10px; border-radius: 999px; background: #fff; border: 1px solid rgba(14,116,144,.2);
      color: #0f766e; font-size: 13px; font-weight: 900; box-shadow: 0 2px 0 rgba(14,116,144,.12);
    }
    .pill.combo { color: #c2410c; border-color: rgba(249,115,22,.3); }
    .pill.combo.hot { background: #fff7ed; }
    .hearts { font-size: 16px; letter-spacing: 1px; }
    /* progress track */
    .trackWrap {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 14px;
      background: rgba(255,255,255,.78); border: 2px solid rgba(255,255,255,.9); box-shadow: 0 4px 0 rgba(14,116,144,.12);
    }
    .track {
      position: relative; flex: 1; min-width: 0; height: 18px; border-radius: 999px;
      background: linear-gradient(90deg, #bbf7d0, #fde68a, #bae6fd); border: 2px solid rgba(255,255,255,.9);
      box-shadow: inset 0 2px 4px rgba(15,23,42,.12);
    }
    .trackToken {
      position: absolute; top: 50%; left: 0; transform: translate(-50%, -50%); font-size: 22px;
      transition: left .45s cubic-bezier(.34,1.56,.64,1); filter: drop-shadow(0 2px 2px rgba(0,0,0,.25));
    }
    .trackFlag { font-size: 20px; }
    .trackLabel { font-size: 13px; font-weight: 1000; color: #0f766e; white-space: nowrap; }
    .main { min-height: 0; display: grid; grid-template-columns: 1fr; gap: 10px; }
    .petHidden { display: none; }
    .quizPanel, .petPanel {
      border-radius: 16px; background: rgba(255,255,255,.82); border: 2px solid rgba(255,255,255,.9);
      box-shadow: 0 10px 24px rgba(15,23,42,.15);
    }
    .quizPanel { min-height: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 10px; padding: 14px; overflow: hidden; }
    .qHead { display: flex; align-items: center; gap: 8px; }
    .qUnit { font-size: 12px; font-weight: 1000; color: #fff; background: #0ea5e9; border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
    .qIndex { font-size: 12px; font-weight: 900; color: #64748b; }
    .qBody { min-height: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 12px; }
    .qText { font-size: clamp(17px, 2.6vh, 22px); line-height: 1.5; font-weight: 1000; color: #0f2747; }
    .options { display: grid; grid-template-columns: 1fr; gap: 10px; align-content: start; overflow: auto; }
    .opt {
      display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
      border: 2px solid #bae6fd; border-radius: 14px; background: #f0f9ff; color: #0f2747;
      padding: 12px 14px; font-family: inherit; font-size: clamp(15px, 2.3vh, 18px); font-weight: 900;
      cursor: pointer; box-shadow: 0 3px 0 rgba(14,116,144,.14); transition: transform .1s ease;
    }
    .opt:active { transform: translateY(2px); }
    .opt .tag {
      flex: none; width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center;
      background: #0ea5e9; color: #fff; font-weight: 1000; font-size: 15px;
    }
    .opt.correct { border-color: #22c55e; background: #dcfce7; }
    .opt.correct .tag { background: #16a34a; }
    .opt.wrong { border-color: #f87171; background: #fee2e2; }
    .opt.wrong .tag { background: #dc2626; }
    .opt.dim { opacity: .5; }
    .opt:disabled { cursor: default; }
    .explain {
      margin-top: 4px; border-radius: 12px; background: #fffbeb; border: 2px solid #fde68a;
      padding: 10px 12px; font-size: 14px; line-height: 1.55; font-weight: 850; color: #7c2d12;
    }
    .explain b { color: #b45309; }
    .explain.ok { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
    .explain.ok b { color: #047857; }
    /* ---- 知道更多 reveal card (the content centerpiece) ---- */
    .reveal { margin-top: 4px; border-radius: 14px; border: 2px solid #fcd9a8; background: #fffaf0; padding: 12px 13px; display: grid; gap: 9px; animation: revealIn .3s ease; }
    .reveal.ok { border-color: #a7f3d0; background: #f3fdf6; }
    .reveal-head { font-size: 16px; font-weight: 1000; color: #b45309; }
    .reveal.ok .reveal-head { color: #047857; }
    .reveal-vis { font-size: 15px; line-height: 1.75; font-weight: 800; text-align: center; color: #475569; background: rgba(255,255,255,.72); border: 1px dashed #d6b36b; border-radius: 11px; padding: 9px 8px; }
    .reveal.ok .reveal-vis { border-color: #86e0b8; }
    .reveal-sec { font-size: 14px; line-height: 1.6; font-weight: 800; color: #334155; }
    .reveal-tag { font-weight: 1000; margin-right: 5px; white-space: nowrap; }
    .reveal-sec.why .reveal-tag { color: #0369a1; }
    .reveal-sec.wow { background: linear-gradient(180deg, #fffbe6, #fff1c2); border: 2px solid #fcd34d; border-radius: 12px; padding: 10px 12px; color: #7c2d12; box-shadow: 0 2px 0 rgba(202,138,4,.18); }
    .reveal-sec.wow .reveal-tag { color: #d97706; }
    @keyframes revealIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { .reveal { animation: none; } }
    /* pet panel */
    .petPanel { min-width: 0; display: grid; grid-template-rows: auto minmax(0, 1fr) auto; gap: 9px; padding: 12px; text-align: center; }
    .petTitle { font-size: 15px; font-weight: 1000; color: #075985; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .petAvatarWrap { min-height: 0; display: grid; place-items: center; }
    .petAvatar {
      width: min(140px, 28vmin); height: min(140px, 28vmin); border-radius: 20px;
      background: linear-gradient(180deg, #e0f2fe, #fef3c7); border: 3px solid #7dd3fc;
      box-shadow: 0 7px 0 rgba(14,116,144,.16); display: grid; place-items: center; overflow: hidden;
    }
    .petAvatar.happy { animation: petHappy .45s ease-in-out 2; }
    .petAvatar.sad { animation: petSad .5s ease-in-out 1; }
    .petSprite { width: 100%; height: 100%; background-repeat: no-repeat; image-rendering: auto; }
    .petFallback { font-size: 52px; font-weight: 1000; }
    /* 语音字幕：屏幕下方居中的轻量浮层（无内容时隐藏） */
    .petBubble {
      position: fixed; left: 50%; bottom: 74px; transform: translateX(-50%); z-index: 16;
      max-width: min(92vw, 460px); font-size: 14px; line-height: 1.45; font-weight: 900; color: #164e63;
      background: rgba(236,254,255,.97); border: 2px solid #a5f3fc; border-radius: 13px; padding: 9px 13px;
      box-shadow: 0 8px 22px rgba(15,23,42,.2); text-align: center;
    }
    .petBubble:empty { display: none; }
    /* 语音陪学按钮：移到顶栏，做成与 pill 同高的紧凑胶囊 */
    .voiceBtn {
      height: 32px; padding: 0 12px; border: 2px solid #fbcfe8; border-radius: 999px;
      background: linear-gradient(180deg, #fff, #fdf2f8); color: #be185d; font-family: inherit;
      font-weight: 1000; font-size: 13px; cursor: pointer; box-shadow: 0 2px 0 rgba(190,24,93,.16);
      transition: transform .1s ease; display: inline-flex; align-items: center; justify-content: center; gap: 5px; white-space: nowrap;
    }
    .voiceBtn:active { transform: translateY(2px); }
    .voiceBtn.on { background: linear-gradient(180deg, #fdf2f8, #fbcfe8); border-color: #f472b6; animation: voicePulse 1.5s ease-in-out infinite; }
    .voiceBtn.busy { opacity: .7; cursor: default; }
    @keyframes voicePulse { 0%,100% { box-shadow: 0 3px 0 rgba(190,24,93,.16); } 50% { box-shadow: 0 3px 0 rgba(190,24,93,.16), 0 0 0 6px rgba(244,114,182,.18); } }
    .bottom { min-height: 54px; display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 9px 12px;
      border-radius: 16px; background: rgba(255,255,255,.74); border: 2px solid rgba(255,255,255,.9); box-shadow: 0 8px 20px rgba(15,23,42,.12); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      border: 0; border-radius: 999px; padding: 11px 16px; font-family: inherit; font-weight: 1000;
      background: #0ea5e9; color: #fff; cursor: pointer; box-shadow: 0 4px 0 rgba(15,23,42,.24); font-size: 15px;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(15,23,42,.24); }
    .btn:disabled { opacity: .48; cursor: not-allowed; transform: none; box-shadow: 0 2px 0 rgba(15,23,42,.12); }
    .btn-orange { background: #f97316; }
    .btn-soft { background: #fff7ed; color: #9a3412; border: 2px solid #fed7aa; box-shadow: 0 3px 0 rgba(154,52,18,.18); }
    .overlay { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; padding: 16px; background: rgba(15,39,71,.46); }
    .card { width: min(94vw, 460px); max-height: 92dvh; overflow: auto; border-radius: 18px; background: #fff; border: 3px solid #fbbf24; padding: 22px; box-shadow: 0 18px 42px rgba(15,23,42,.28); }
    .card h1 { margin: 0 0 8px; font-size: 26px; line-height: 1.15; font-weight: 1000; color: #b45309; }
    .card p { margin: 0 0 14px; font-size: 15px; line-height: 1.65; font-weight: 850; color: #0f2747; }
    .unitGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 8px 0 16px; }
    .unitBtn {
      display: flex; flex-direction: column; align-items: center; gap: 4px; border: 2px solid #bae6fd; border-radius: 14px;
      background: #f0f9ff; color: #0f2747; padding: 14px 8px; font-family: inherit; font-weight: 1000; font-size: 15px; cursor: pointer;
      box-shadow: 0 3px 0 rgba(14,116,144,.14);
    }
    .unitBtn:active { transform: translateY(2px); }
    .unitBtn .emoji { font-size: 28px; }
    .unitBtn .cnt { font-size: 12px; font-weight: 800; color: #64748b; }
    .cardActions { display: flex; gap: 10px; flex-wrap: wrap; }
    .resultStats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin: 14px 0 16px; }
    .resultStat { border-radius: 12px; background: #ecfeff; border: 2px solid #a5f3fc; padding: 10px 6px; color: #164e63; font-size: 13px; font-weight: 1000; text-align: center; }
    .resultStat b { display: block; margin-top: 2px; color: #0f766e; font-size: 20px; }
    .grade { font-size: 18px; font-weight: 1000; color: #b45309; margin: 0 0 6px; text-align: center; }
    .batchInfo { display: inline-block; margin-top: 6px; font-size: 13px; font-weight: 900; color: #0f766e; }
    .toast { position: fixed; left: 50%; top: 30%; z-index: 30; transform: translate(-50%, -50%); border-radius: 15px; background: #fff; border: 3px solid #7dd3fc; padding: 12px 18px; font-size: 18px; line-height: 1.4; font-weight: 1000; text-align: center; box-shadow: 0 15px 36px rgba(15,23,42,.28); }
    /* ---- fun FX ---- */
    .shell { position: relative; z-index: 1; }
    .fxLayer { position: fixed; inset: 0; z-index: 50; pointer-events: none; overflow: hidden; }
    .confetti { position: absolute; width: 9px; height: 14px; border-radius: 2px; will-change: transform, opacity; }
    @keyframes confettiFall { 0% { transform: translate(0,0) rotate(0); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; } }
    .scorePop { position: fixed; z-index: 55; font-size: 22px; font-weight: 1000; color: #16a34a; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,.18); animation: scorePop .9s ease-out forwards; }
    @keyframes scorePop { 0% { transform: translate(-50%, 0) scale(.6); opacity: 0; } 25% { transform: translate(-50%, -10px) scale(1.15); opacity: 1; } 100% { transform: translate(-50%, -56px) scale(1); opacity: 0; } }
    .pill.combo.bump { animation: comboBump .35s ease; }
    @keyframes comboBump { 0%,100% { transform: scale(1); } 40% { transform: scale(1.24); } }
    .opt.correct { animation: optPop .4s ease; }
    .opt.wrong { animation: optShake .42s ease; }
    @keyframes optPop { 0%,100% { transform: scale(1); } 40% { transform: scale(1.04); } }
    @keyframes optShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
    .stars { text-align: center; margin: 2px 0 10px; letter-spacing: 5px; }
    .star { font-size: 32px; display: inline-block; animation: starPop .5s ease backwards; }
    .star.off { filter: grayscale(1); opacity: .32; }
    @keyframes starPop { 0% { transform: scale(0) rotate(-30deg); opacity: 0; } 70% { transform: scale(1.3); } 100% { transform: scale(1); opacity: 1; } }
    .petAvatar.celebrate { animation: petCelebrate .6s ease; }
    @keyframes petCelebrate { 0%,100% { transform: scale(1) rotate(0); } 25% { transform: scale(1.13) rotate(-8deg); } 50% { transform: scale(1.16) rotate(8deg); } 75% { transform: scale(1.12) rotate(-5deg); } }
    @media (prefers-reduced-motion: reduce) { .opt.correct, .opt.wrong, .pill.combo.bump, .petAvatar.celebrate { animation: none; } }
    [hidden] { display: none !important; }
    @keyframes petHappy { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08) rotate(3deg); } }
    @keyframes petSad { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @media (max-width: 720px) {
      .shell { padding: 7px; gap: 7px; }
      .main { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) auto; }
      .petPanel { order: 2; grid-template-columns: auto 1fr; grid-template-rows: auto auto; align-items: center; text-align: left; padding: 8px; gap: 8px; }
      .petAvatarWrap { grid-row: 1 / 3; }
      .petAvatar { width: 64px; height: 64px; border-radius: 13px; }
      .petFallback { font-size: 34px; }
      .petTitle { grid-column: 2; }
      .petBubble { font-size: 12px; padding: 7px 11px; min-height: 0; bottom: 104px; }
      .title { font-size: 17px; }
      .pill { min-width: 52px; height: 29px; font-size: 12px; padding: 0 8px; }
      .quizPanel { padding: 11px; }
      .bottom { align-items: stretch; flex-direction: column; }
      .actions { width: 100%; justify-content: space-between; }
      .trackLabel { display: none; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="top">
      <div class="title" id="gameTitle">科学期末闯关</div>
      <div class="stats">
        <span class="pill"><span id="scoreLabel">得分</span> <b id="score">0</b></span>
        <span class="pill combo" id="comboPill"><span id="comboLabel">连对</span> <b id="combo">0</b></span>
        <span class="pill hearts" id="hearts">❤❤❤</span>
        <button class="voiceBtn" id="voiceBtn" type="button" aria-label="语音陪学">🎙 <span id="voiceBtnLabel">语音陪学</span></button>
      </div>
    </div>

    <div class="trackWrap">
      <span class="trackLabel" id="trackLabel">闯关进度</span>
      <div class="track"><span class="trackToken" id="trackToken">🥚</span></div>
      <span class="trackFlag">🏁</span>
    </div>

    <div class="main">
      <section class="quizPanel">
        <div class="qHead">
          <span class="qUnit" id="qUnit">第一单元</span>
          <span class="qIndex" id="qIndex">第 1 / 10 题</span>
        </div>
        <div class="qBody">
          <div class="qText" id="qText">准备开始……</div>
          <div class="options" id="options"></div>
        </div>
      </section>
    </div>
    <!-- 数字人精简：语音「语音陪学」按钮已移到顶栏；这里只保留隐藏元素供脚本/精灵动画引用。 -->
    <div class="petHidden" aria-hidden="true">
      <span id="petName"></span>
      <div id="petAvatar" class="petAvatar"><span class="petFallback">🧪</span></div>
    </div>
    <!-- 语音字幕：屏幕下方轻量浮层，无内容时自动隐藏。 -->
    <div class="petBubble" id="petTalk"></div>

    <div class="bottom">
      <div class="actions">
        <button class="btn btn-soft" id="prev" hidden>上一题</button>
        <button class="btn btn-soft" id="changeUnit" hidden>换单元</button>
        <button class="btn btn-orange" id="start">开始闯关</button>
        <button class="btn btn-orange" id="next" hidden>下一题</button>
      </div>
    </div>
  </div>

  <!-- intro / unit picker -->
  <div class="overlay" id="intro">
    <div class="card">
      <h1 id="introTitle">🧪 蛋蛋星球·科学期末闯关</h1>
      <p id="introText">选择一个复习单元，答对题目就能帮 Haqi 前进闯关！连续答对有连对奖励，答错会掉一颗❤并讲解知识点。三颗❤用完或答完全部题目就结束。</p>
      <div class="unitGrid" id="unitGrid"></div>
    </div>
  </div>

  <!-- result -->
  <div class="overlay" id="result" hidden>
    <div class="card">
      <h1 id="resultTitle">闯关完成！</h1>
      <div class="stars" id="resultStars"></div>
      <p class="grade" id="resultGrade"></p>
      <p id="resultText"></p>
      <div class="resultStats">
        <div class="resultStat"><span id="rsCorrectLabel">答对</span><b id="rsCorrect">0/0</b></div>
        <div class="resultStat"><span id="rsComboLabel">最高连对</span><b id="rsCombo">0</b></div>
        <div class="resultStat"><span id="rsScoreLabel">得分</span><b id="rsScore">0</b></div>
      </div>
      <div class="cardActions">
        <button class="btn btn-orange" id="again">再来一局</button>
        <button class="btn btn-soft" id="changeUnit2">换单元</button>
      </div>
    </div>
  </div>

  <div class="fxLayer" id="fxLayer" aria-hidden="true"></div>

  <script>
    'use strict';

    /* ---------------- i18n ---------------- */
    const I18N = {
      zhCN: {
        gameTitle: '科学期末闯关', scoreLabel: '得分', comboLabel: '连对', petDefault: '我的闯关伙伴',
        petNameFmt: '伙伴：{name}', pet: 'Haqi',
        introTitle: '🧪 蛋蛋星球·科学期末闯关',
        introText: '选择一个复习单元，答对题目就能帮 Haqi 前进闯关！连续答对有连对奖励，答错会掉一颗❤并讲解知识点。三颗❤用完或答完全部题目就结束。',
        startBtn: '开始闯关', changeUnit: '换单元', again: '再来一局',
        prevBtn: '上一题', nextBtn: '下一题', finishBtn: '查看结果',
        nextBatchBtn: '下一批', newPassBtn: '再来一遍',
        reviewedFmt: '已复习 {done}/{all}',
        remainText: '本单元还剩 {n} 题没复习，点「下一批」继续，不会重复哦！',
        passDoneText: '🎉 本单元题目全部复习完啦！再来一遍会换个新顺序。',
        trackLabel: '闯关进度', qUnitFmt: '{u}', qIndexFmt: '第 {i} / {n} 题',
        revealRight: '✅ 回答正确', revealWrongFmt: '❌ 正确答案：{ans}',
        whyLabel: '为什么', wowLabel: '你知道吗',
        resultTitle: '闯关完成！', resultTitleFail: '继续加油！',
        rsCorrect: '答对', rsCombo: '最高连对', rsScore: '得分',
        resultTextWin: '你帮 Haqi 顺利闯关，复习得很扎实！',
        resultTextOk: '不错的成绩，再复习一遍就更牢固啦！',
        resultTextFail: '❤用完了，别灰心，知识点都讲过了，再来一次一定行！',
        gradeS: '🏆 满分学霸！', gradeA: '🌟 优秀！', gradeB: '👍 良好', gradeC: '💪 继续努力',
        units: { u1: '第一单元·植物生长', u2: '第二单元·电路', u3: '第三单元·岩石与土壤', all: '全部混合' },
        unitShort: { u1: '植物生长', u2: '电路', u3: '岩石与土壤', all: '全部混合' },
        unitEmoji: { u1: '🌱', u2: '🔌', u3: '🪨', all: '🌈' },

      els.comboPill.classList.add('bump');
    }
    function renderStars(n) {
      els.resultStars.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const s = document.createElement('span');
        s.className = 'star' + (i < n ? '' : ' off');
        s.style.animationDelay = (i * 0.12) + 's';
        s.textContent = '⭐';
        els.resultStars.appendChild(s);
      }
    }

    /* ---------------- static text ---------------- */
    function applyStaticText() {
      document.documentElement.setAttribute('lang', LANG === 'enUS' ? 'en' : 'zh-CN');
      els.gameTitle.textContent = t('gameTitle');
      els.scoreLabel.textContent = t('scoreLabel');
      els.comboLabel.textContent = t('comboLabel');
      els.trackLabel.textContent = t('trackLabel');
      els.introTitle.textContent = t('introTitle');
      els.introText.textContent = t('introText');
      els.start.textContent = t('startBtn');
      els.prev.textContent = t('prevBtn');
      els.next.textContent = t('nextBtn');
      els.changeUnit.textContent = t('changeUnit');
      els.changeUnit2.textContent = t('changeUnit');
      els.again.textContent = t('again');
      els.rsCorrectLabel.textContent = t('rsCorrect');
      els.rsComboLabel.textContent = t('rsCombo');
      els.rsScoreLabel.textContent = t('rsScore');

    function buildUnitGrid() {
      els.unitGrid.innerHTML = '';
      UNIT_KEYS.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'unitBtn';
        btn.type = 'button';
        const n = questionsFor(u).length;
        const p = progress[u];
        const done = p ? Math.min(p.cursor, n) : 0;
        const cnt = (done > 0 && done < n) ? t('reviewedFmt', { done, all: n }) : t('cntFmt', { n });
        btn.innerHTML = `<span class="emoji">${L().unitEmoji[u]}</span>` +
          `<span>${L().unitShort[u]}</span>` +
          `<span class="cnt">${cnt}</span>`;
        btn.onclick = () => { sfx('tap'); startRun(u); };
        els.unitGrid.appendChild(btn);
      });

    /* ---------------- flow ---------------- */
    function openIntro() {
      running = false;
      els.result.hidden = true;
      els.intro.hidden = false;
      els.changeUnit.hidden = true;
      els.start.hidden = false;
      els.prev.hidden = true;
      els.next.hidden = true;
      els.petName.textContent = t('petDefault');
      buildUnitGrid();
    }

    function startRun(unit) {
      currentUnit = unit;
      const p = getProgress(unit);
      queue = p.seq.slice(p.cursor, p.cursor + RUN_LEN); // next unseen batch (cursor advances at endRun)
      qi = 0; score = 0; combo = 0; maxCombo = 0; hearts = 3; correctCount = 0; running = true;
      answers = []; orders = [];
      els.intro.hidden = true;
      els.result.hidden = true;
      els.start.hidden = true;
      els.changeUnit.hidden = false;
      els.score.textContent = '0';
      els.combo.textContent = '0';
      els.comboPill.classList.remove('hot');
      renderHearts();
      els.trackToken.textContent = '🥚';
      post('gameStarted');
      showQuestion();
    }

    // Render the current question. If it has already been answered, show it read-only
    // with the correct answer + explanation (review mode); otherwise show it live.
    function showQuestion() {
      const item = queue[qi];
      const ans = answers[qi];
      els.qUnit.textContent = unitLabel(item.u);
      els.qIndex.textContent = t('qIndexFmt', { i: qi + 1, n: queue.length });
      els.qText.textContent = item.q;
      updateTrack();
      els.options.innerHTML = '';

      let order = orders[qi];
      if (!order) { order = shuffle(item.o.map((_, idx) => idx)); orders[qi] = order; }
      const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
      order.forEach((origIdx, pos) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.type = 'button';
        btn.innerHTML = `<span class="tag">${letters[pos]}</span><span class="txt">${item.o[origIdx]}</span>`;
        btn.dataset.idx = String(origIdx);
        if (ans) {
          btn.disabled = true;
          if (origIdx === item.a) btn.classList.add('correct');
          else if (origIdx === ans.chosen) btn.classList.add('wrong');
          else btn.classList.add('dim');
        } else {
          btn.onclick = () => answer(origIdx, item);
        }
        els.options.appendChild(btn);
      });

      if (ans) {
        // The "知道更多" reveal — the centerpiece. Shown for BOTH correct and wrong:
        // correct answer + 为什么(机制) + 你知道吗(超出课本的趣闻) + 小图示.
        const card = document.createElement('div');
        card.className = 'reveal' + (ans.correct ? ' ok' : '');
        let html = `<div class="reveal-head">${ans.correct ? t('revealRight') : t('revealWrongFmt', { ans: item.o[item.a] })}</div>`;
        if (item.vis) html += `<div class="reveal-vis">${item.vis}</div>`;
        if (item.why) html += `<div class="reveal-sec why"><span class="reveal-tag">🤔 ${t('whyLabel')}</span>${item.why}</div>`;
        if (item.wow) html += `<div class="reveal-sec wow"><span class="reveal-tag">💡 ${t('wowLabel')}</span>${item.wow}</div>`;
        card.innerHTML = html;
        els.options.appendChild(card);
      } else {
        voiceOnQuestionShown(); // 语音模式：让伙伴读这道未作答的题目（不剧透答案）
      }
      updateNav();
    }

    // Show 上一题 whenever we're past the first question; show 下一题 / 查看结果 only
    // once the current question has been answered (forces a confirm before moving on).
    function updateNav() {
      els.prev.hidden = false;
      els.prev.disabled = qi === 0;
      const ans = answers[qi];
      if (!ans) { els.next.hidden = true; return; }
      els.next.hidden = false;
      const lastAnswered = answers.length - 1;
      const canAnswerMore = hearts > 0 && lastAnswered < queue.length - 1;
      const isFrontier = qi >= lastAnswered;
      els.next.textContent = (isFrontier && !canAnswerMore) ? t('finishBtn') : t('nextBtn');
    }

    function goPrev() {
      if (qi > 0) { qi--; showQuestion(); }
    }
    function goNext() {
      if (!answers[qi]) return;
      const lastAnswered = answers.length - 1;
      if (qi < lastAnswered) { qi++; showQuestion(); return; } // forward through reviewed questions
      // at the frontier: continue to the next live question, or end the run
      const canAnswerMore = hearts > 0 && lastAnswered < queue.length - 1;
      if (canAnswerMore) { qi++; showQuestion(); }
      else endRun();
    }

    function answer(chosenIdx, item) {
      if (answers[qi]) return; // already answered — review mode
      const correct = chosenIdx === item.a;
      answers[qi] = { chosen: chosenIdx, correct };

      if (correct) {
        correctCount++;
        combo++;
        maxCombo = Math.max(maxCombo, combo);
        const gain = 20 + Math.min(30, (combo - 1) * 5); // base + 连对奖励
        score += gain;
        setScore(score);
        floatScore('+' + gain);
        els.combo.textContent = String(combo);
        els.comboPill.classList.toggle('hot', combo >= 2);
        bumpCombo();
        sfx('correct', combo);
        pulsePet('happy');
        // every 5th in a streak earns a heart back (if not full) — big reward moment
        if (combo % 5 === 0 && hearts < 3) {
          hearts++; renderHearts(); sfx('heart'); celebratePet();
          toast(t('heartGainToast'));
        } else if (combo >= 3) {
          celebratePet();
          toast(t('comboToastFmt', { n: combo }) + ' 🔥');
        }
      } else {
        combo = 0;
        els.combo.textContent = '0';
        els.comboPill.classList.remove('hot');
        hearts = Math.max(0, hearts - 1);
        renderHearts();
        sfx('wrong');
        pulsePet('sad');
      }
      showQuestion(); // re-render this question in answered state (reveal card + 下一题)
      els.options.scrollTop = els.options.scrollHeight; // keep the 知道更多 card in view
      // keep confetti small so it never covers the reveal card (content is the star)
      if (correct) confettiAtEl(els.options.querySelector('.opt.correct'), combo >= 3 ? 16 : 10, combo >= 3 ? 150 : 110);
      setTimeout(() => sfx('wow'), 300); // gentle chime as the 知道更多 card appears
      voiceOnAnswered(item, answers[qi]); // 语音模式：让伙伴点评结果并讲解知识点
    }

    function gradeKey() {
      const total = queue.length || 1;
      const r = correctCount / total;
      if (correctCount === total) return 'gradeS';
      if (r >= 0.8) return 'gradeA';
      if (r >= 0.6) return 'gradeB';
      return 'gradeC';
    }

    function endRun() {
      running = false;
      const total = queue.length;
      const passed = hearts > 0 && correctCount >= Math.ceil(total * 0.6);
      const win = hearts > 0;
      // advance the unit's batch cursor by the questions actually answered, so a run
      // cut short by losing hearts leaves its unseen questions for the next batch.
      const p = progress[currentUnit];
      if (p) p.cursor = Math.min(p.seq.length, p.cursor + answers.length);
      const poolSize = p ? p.seq.length : total;
      const reviewed = p ? p.cursor : correctCount;
      const remaining = p ? Math.max(0, p.seq.length - p.cursor) : 0;
      const passComplete = remaining === 0;

      const gk = gradeKey();
      const stars = !win ? 0 : (gk === 'gradeS' || gk === 'gradeA') ? 3 : (gk === 'gradeB' ? 2 : 1);
      renderStars(stars);
      els.resultTitle.textContent = win ? t('resultTitle') : t('resultTitleFail');
      els.resultGrade.textContent = t(gk);
      const baseText = !win ? t('resultTextFail') : (correctCount === total ? t('resultTextWin') : (passed ? t('resultTextWin') : t('resultTextOk')));
      const batchInfo = passComplete ? t('passDoneText') : t('remainText', { n: remaining });
      els.resultText.innerHTML = baseText + '<br><span class="batchInfo">' + batchInfo + '</span>';
      els.again.textContent = passComplete ? t('newPassBtn') : t('nextBatchBtn');
      els.rsCorrect.textContent = `${correctCount}/${total}`;
      els.rsCombo.textContent = String(maxCombo);
      els.rsScore.textContent = String(score);
      els.changeUnit.hidden = true;
      els.start.hidden = true;
      els.prev.hidden = true;
      els.next.hidden = true;
      els.result.hidden = false;
      if (win) { sfx('win'); bigConfetti(); } else { sfx('lose'); }
      // reward: keep earnedPoints aligned with score so parent levelReward works
      const earnedPoints = score;
      post('gameFinished', {
        earnedPoints, score, correct: correctCount, total,
        unit: currentUnit, streakMax: maxCombo, passed,
        reviewed, poolSize, passComplete, finishedAt: Date.now()
      });
    }

    /* ---------------- pet sprite (optional, from parent) ---------------- */
    function requestPetImage(petId = '') {
      const requestId = `sciquiz_pet_${Date.now()}`;
      petRequestId = requestId;
      post('haqi_get_pet_image', { requestId, anim: 'idle', petId: petId || undefined }, { requestId, anim: 'idle', petId: petId || undefined });
      setTimeout(() => {
        if (petObjectUrl) return;
        const fallbackId = `sciquiz_pets_${Date.now()}`;
        post('haqi_get_pet_images', { requestId: fallbackId, anim: 'idle' }, { requestId: fallbackId, anim: 'idle' });
      }, 900);
    }
    function mountPet(pet) {
      if (!pet?.imageBlob || !pet?.uv) return;
      if (petObjectUrl) URL.revokeObjectURL(petObjectUrl);
      petObjectUrl = URL.createObjectURL(pet.imageBlob);
      const uv = pet.uv;
      const el = document.createElement('div');
      el.className = 'petSprite';
      el.style.backgroundImage = `url("${petObjectUrl}")`;
      if (uv.cols > 1 || uv.rows > 1) {
        el.style.backgroundSize = `${uv.cols * 100}% ${uv.rows * 100}%`;
        el.style.backgroundPosition = `${uv.cols > 1 ? uv.col * 100 / (uv.cols - 1) : 50}% ${uv.rows > 1 ? uv.row * 100 / (uv.rows - 1) : 50}%`;
      } else {
        el.style.backgroundSize = 'contain'; el.style.backgroundPosition = 'center';
      }
      els.petAvatar.innerHTML = ''; els.petAvatar.appendChild(el);
      if (pet.name) els.petName.textContent = t('petNameFmt', { name: pet.name });
    }

    /* ---------------- 语音陪学（KeepworkSDK AIChatRTC 实时语音）---------------- */
    // 标准 minigame 为独立 HTML，按需懒加载 SDK，仅在点击语音时付出加载成本。
    const SDK_URL = 'https://cdn.keepwork.com/sdk/keepworkSDK.iife.js?v=20260612a';
    let rtcSdkPromise = null;
    function ensureSDK() {
      if (window.AIChatRTC) return Promise.resolve();
      if (rtcSdkPromise) return rtcSdkPromise;
      rtcSdkPromise = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = SDK_URL; s.async = true;
        s.onload = () => (window.AIChatRTC ? resolve() : reject(new Error('AIChatRTC missing')));
        s.onerror = () => { rtcSdkPromise = null; reject(new Error('SDK load failed')); };
        document.head.appendChild(s);
      });
      return rtcSdkPromise;
    }

    const VOICE_LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];

    // 与单元绑定的角色 + 行为规则系统提示（与具体题目无关；每题的事实通过 [题目]/[已作答] 消息注入）。
    function voiceSystemPrompt() {
      const petName = (els.petName.textContent || '').replace(/^[^:：]*[:：]\s*/, '').trim() || L().pet;
      const unit = unitLabel(currentUnit);
      if (LANG === 'enUS') {
        return [
          `You are ${petName}, a warm voice study-buddy in Haqi Planet's "Science Final Quiz", helping a primary-school kid review "${unit}".`,
          'Rules:',
          '0. Always focus ONLY on the question currently on the child\'s screen — that is the most recent "[Question]" or "[Answered]" message you received. Never talk about other questions or make one up.',
          '1. The app sends you "[Question]" messages with the current question, options and correct answer. Read the question and each option aloud in a friendly way and guide the child to think — but NEVER say or hint at the correct answer.',
          '2. The child talks to you by voice. If the child clearly names an option or asks you to pick, call the choose_answer tool (letter = the option letter). If the question is already answered and the child wants to continue, call the next_question tool.',
          '3. The app sends "[Answered]" messages with the result and the key point. Then briefly tell the child whether they were right, what the correct answer is, and explain why with an everyday example; you may add one fun fact.',
          '4. Always be warm, encouraging and conversational, suitable for a child. At most 3 short sentences per turn.',
        ].join('\n');
      }
      return [
        `你是"蛋蛋星球·科学期末闯关"里的语音陪学伙伴${petName}，正在陪一位小学生复习《${unit}》。`,
        '请遵守以下规则：',
        '0. 你始终只围绕小朋友屏幕上"当前显示的那一道题"交流，也就是你最近收到的「[题目]」或「[已作答]」消息；不要谈论别的题目，也不要自己编题。',
        '1. 程序会用「[题目]」开头的消息告诉你当前题目、选项和正确答案。收到后用亲切的口语把题目和每个选项读给小朋友听，引导他思考，但绝对不要说出或暗示正确答案。',
        '2. 小朋友会用语音和你交流。如果他清楚地说出某个选项、或请你帮他选，就调用 choose_answer 工具（letter 为选项字母）替他作答；如果题目已作答、他想继续，就调用 next_question 工具进入下一题。',
        '3. 程序会用「[已作答]」开头的消息告诉你作答结果和知识点。收到后简短告诉他答对还是答错、正确答案是什么，并用生活中的例子讲清楚为什么，可以再补充一个有趣的小知识。',
        '4. 始终热情、鼓励、口语化，适合小学生，每次最多3句话，不要一次读太多。',
      ].join('\n');
    }

    // 自定义工具定义（OpenAI 格式）：合并进 LLMConfig.Tools，执行时由 sandbox.registerAPI 注册的本地函数处理。
    const VOICE_TOOLS = [
      { type: 'function', function: {
        name: 'choose_answer',
        description: 'Select an option for the current quiz question on the child\'s behalf. Call when the child clearly states an option or asks you to pick one.',
        parameters: { type: 'object', properties: { letter: { type: 'string', description: 'Option letter shown on screen, e.g. A, B, C or D' } }, required: ['letter'] },
      } },
      { type: 'function', function: {
        name: 'next_question',
        description: 'Advance to the next question. Only call after the current question is already answered and the child wants to continue.',
        parameters: { type: 'object', properties: {} },
      } },
    ];

    // 完整 RTC 会话配置（默认 appId + Keepwork 代理的 VolcEngine ASR/LLM/TTS，凭证由服务端下发，无需密钥）。
    function rtcConfig(systemPrompt) {
      return {
        appId: '69883f4ae00f9e017600b901',
        agentUserId: 'ChatBot01',
        agentConfig: { UserId: 'ChatBot01', WelcomeMessage: t('voiceWelcome'), EnableConversationStateCallback: true },
        tools: VOICE_TOOLS,
        config: {
          ASRConfig: { Provider: 'volcano', ProviderParams: { Mode: 'bigmodel', AppId: '3065448513', ApiResourceId: 'volc.bigasr.sauc.duration' } },
          TTSConfig: {
            Provider: 'volcano_bidirection',
            ProviderParams: { app: { appid: '3065448513' }, audio: { voice_type: 'zh_female_tianmeiyueyue_moon_bigtts', speech_rate: 0 }, ResourceId: 'volc.service_type.10029' },
            IgnoreBracketText: [1, 2],
          },
          LLMConfig: { Mode: 'ArkV3', EndPointId: 'ep-20260315160200-s6fg7', VisionConfig: { Enable: false }, ThinkingType: 'disabled', Tools: [], SystemMessages: [systemPrompt] },
          SubtitleConfig: { SubtitleMode: 1 },
          InterruptMode: 0,
        },
        enabledToolCategories: [],
        workspace: 'haqi_science_quiz',
      };
    }

    let voiceRtc = null, voiceSession = null, voiceOn = false, voiceBusy = false;
    let voiceToolAnswering = false, voiceToolAdvancing = false;

    function setVoiceUI(s) {
      const btn = els.voiceBtn; if (!btn) return;
      btn.classList.toggle('on', s === 'on');
      btn.classList.toggle('busy', s === 'connecting');
      const labels = { off: t('voiceStart'), connecting: t('voiceConnecting'), on: t('voiceStop') };
      if (els.voiceBtnLabel) els.voiceBtnLabel.textContent = labels[s] || labels.off;
    }

    function voiceSend(text) {
      if (voiceOn && voiceSession && text) { try { voiceSession.send(text); } catch (_) {} }
    }

    // 当前题目按"屏幕显示顺序"列出选项，并给出正确答案对应的显示字母。
    function voiceOptionView() {
      const item = queue[qi];
      if (!item) return null;
      const order = orders[qi] || item.o.map((_, i) => i);
      const lines = order.map((origIdx, pos) => `${VOICE_LETTERS[pos]}. ${item.o[origIdx]}`);
      return { item, order, lines, correctLetter: VOICE_LETTERS[order.indexOf(item.a)] || '?' };
    }

    function questionContextText(v) {
      const idx = `${qi + 1}/${queue.length}`;
      if (LANG === 'enUS') {
        return `[Question] Q${idx}: ${v.item.q}\nOptions:\n${v.lines.join('\n')}\nCorrect answer (KEEP SECRET — do not say or hint it): ${v.correctLetter}\nNow read the question and options aloud and guide the child to think.`;
      }
      return `[题目] 第${idx}题：${v.item.q}\n选项：\n${v.lines.join('\n')}\n正确答案（请保密，绝对不要读出来或暗示）：${v.correctLetter}\n现在请把题目和选项读给小朋友听，引导他思考。`;
    }

    function answeredContextText(item, ans) {
      const order = orders[qi] || item.o.map((_, i) => i);
      const chosenLetter = VOICE_LETTERS[order.indexOf(ans.chosen)] || '?';
      const correctLetter = VOICE_LETTERS[order.indexOf(item.a)] || '?';
      if (LANG === 'enUS') {
        return `[Answered] The child chose ${chosenLetter}. ${item.o[ans.chosen]} — ${ans.correct ? 'correct' : 'wrong'}. Correct answer: ${correctLetter}. ${item.o[item.a]}.`
          + (item.why ? ` Why: ${item.why}` : '') + (item.wow ? ` Fun fact: ${item.wow}` : '')
          + ' Briefly tell the child if they were right, the correct answer, and explain why with an everyday example.';
      }
      return `[已作答] 小朋友选了 ${chosenLetter}. ${item.o[ans.chosen]}，${ans.correct ? '答对了' : '答错了'}。正确答案：${correctLetter}. ${item.o[item.a]}。`
        + (item.why ? `为什么：${item.why}` : '') + (item.wow ? ` 小知识：${item.wow}` : '')
        + ' 请简短地告诉小朋友答对还是答错、正确答案，并用生活例子讲清楚为什么。';
    }

    // 渲染了一道未作答的题目时调用：让语音伙伴读题（工具驱动的"下一题"除外，避免和工具返回值重复）。
    function voiceOnQuestionShown() {
      if (!voiceOn || voiceToolAdvancing) return;
      const v = voiceOptionView();
      if (v) voiceSend(questionContextText(v));
    }
    // 作答后调用：让语音伙伴讲解（工具驱动的作答除外，那种情况由工具返回值携带讲解上下文）。
    function voiceOnAnswered(item, ans) {
      if (!voiceOn || voiceToolAnswering || !item || !ans) return;
      voiceSend(answeredContextText(item, ans));
    }
    // 对齐到"屏幕上当前显示的那道题"：未作答→读题，已作答→讲解。供启用语音 / 切题时调用。
    function voiceSyncCurrent() {
      if (!voiceOn || !running) return;
      const item = queue[qi];
      if (!item) return;
      const ans = answers[qi];
      if (ans) voiceSend(answeredContextText(item, ans));
      else { const v = voiceOptionView(); if (v) voiceSend(questionContextText(v)); }
    }

    // start() 创建 sandbox 后注册本地工具：让语音伙伴能替小朋友点选答案 / 进入下一题。
    function registerVoiceTools(session) {
      const sb = session && session.sandbox;
      if (!sb || typeof sb.registerAPI !== 'function') return;
      sb.registerAPI('choose_answer', async (args) => {
        const letter = String((args && args.letter) || '').trim().toUpperCase().charAt(0);
        const pos = VOICE_LETTERS.indexOf(letter);
        if (!running || !queue[qi]) return LANG === 'enUS' ? 'No active question right now.' : '现在没有正在作答的题目。';
        if (answers[qi]) return LANG === 'enUS' ? 'This question is already answered.' : '这道题已经回答过啦。';
        const btn = els.options.children[pos];
        if (pos < 0 || !btn) return LANG === 'enUS' ? `There is no option "${letter}".` : `没有"${letter}"这个选项哦。`;
        voiceToolAnswering = true;
        try { btn.click(); } finally { voiceToolAnswering = false; }
        const ans = answers[qi];
        return ans ? answeredContextText(queue[qi], ans) : (LANG === 'enUS' ? 'OK.' : '好的。');
      });
      sb.registerAPI('next_question', async () => {
        if (!running || !answers[qi]) return LANG === 'enUS' ? 'Please answer the current question first.' : '请先回答当前这道题哦。';
        voiceToolAdvancing = true;
        try { goNext(); } finally { voiceToolAdvancing = false; }
        if (!running) return LANG === 'enUS' ? 'The quest is complete — well done!' : '闯关结束啦，太棒了！';
        const v = voiceOptionView();
        return v ? questionContextText(v) : (LANG === 'enUS' ? 'Moved on.' : '继续。');
      });
    }

    async function startVoice() {
      if (voiceBusy || voiceOn) return;
      voiceBusy = true; setVoiceUI('connecting'); setBubble(t('voiceConnecting'));
      try {
        await ensureSDK();
        const sdk = window.keepwork || (window.KeepworkSDK ? new window.KeepworkSDK({ timeout: 30000 }) : null);
        if (!sdk) throw new Error(t('voiceError'));
        if (!sdk.token) {
          try { await sdk.loginWindow?.open?.(); } catch (_) {}
          if (!sdk.token) throw new Error(t('voiceNeedLogin'));
        }
        voiceRtc = new window.AIChatRTC(sdk);
        voiceSession = voiceRtc.createSession(rtcConfig(voiceSystemPrompt()));
        voiceSession.on('subtitle', ({ text, isUser }) => {
          if (!text) return;
          setBubble(isUser ? t('voiceYouFmt', { text }) : text);
        });
        voiceSession.on('welcome', ({ message }) => { if (message) setBubble(message); });
        voiceSession.on('state', ({ code }) => { els.petAvatar.classList.toggle('happy', code === 3); });
        voiceSession.on('autoplayFailed', () => setBubble(t('voiceTapHint')));
        voiceSession.on('error', () => setBubble(t('voiceError')));
        await voiceSession.start();
        registerVoiceTools(voiceSession);
        voiceOn = true; setVoiceUI('on'); setBubble(t('voiceReady'));
        // 启用后立即对齐屏幕上"当前显示的题目"并开口读题（稍候让欢迎语先起头）。
        setTimeout(voiceSyncCurrent, 600);
      } catch (e) {
        setBubble((e && e.message) || t('voiceError'));
        await stopVoice();
      } finally {
        voiceBusy = false;
      }
    }

    async function stopVoice() {
      voiceOn = false; setVoiceUI('off');
      const s = voiceSession; voiceSession = null; voiceRtc = null;
      els.petAvatar.classList.remove('happy');
      try { await s?.stop?.(); } catch (_) {}
    }

    /* ---------------- events ---------------- */
    els.voiceBtn.onclick = () => { sfx('tap'); voiceOn ? stopVoice() : startVoice(); };
    els.start.onclick = () => { sfx('tap'); openIntro(); };
    els.prev.onclick = () => { sfx('tap'); goPrev(); };
    els.next.onclick = () => { sfx('tap'); goNext(); };
    els.changeUnit.onclick = () => { sfx('tap'); openIntro(); };
    els.changeUnit2.onclick = () => { sfx('tap'); openIntro(); };
    els.again.onclick = () => { sfx('tap'); startRun(currentUnit); };
    window.addEventListener('message', e => {
      const msg = e.data || {};
      if (msg.type === 'gameContinue') openIntro();
      if (msg.type === 'setGameConfig' && msg.data?.petId) requestPetImage(msg.data.petId);
      if (msg.type === 'haqi_pet_image' && msg.ok && msg.data && (!petRequestId || !msg.requestId || msg.requestId === petRequestId || msg.requestId === 'active_pet_config')) mountPet(msg.data);
      if (msg.type === 'haqi_pet_images' && msg.ok) {
        const firstPet = Array.isArray(msg.data?.pets) ? msg.data.pets[0] : null;
        if (firstPet) mountPet(firstPet);
      }
    });
    window.addEventListener('beforeunload', () => { if (petObjectUrl) URL.revokeObjectURL(petObjectUrl); stopVoice(); });

    /* ---------------- init ---------------- */
    applyStaticText();
    openIntro();
    requestPetImage();
    post('gameLoaded');
  </script>
</body>

</html>
