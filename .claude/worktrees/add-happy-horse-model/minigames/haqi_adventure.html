    // Fire power changes the outfit to white/red like Mario's fire form
    let shirt = girl ? '#f472b6' : '#38bdf8';
    let shirtShade = girl ? '#db2777' : '#0284c7';
    let shirtHi = girl ? '#fbb6da' : '#7dd3fc';
    let pants = '#1e3a8a', pantsShade = '#172554';
    let capColor = girl ? '#ec4899' : '#0ea5e9';
    if (state.power === 'fire') { shirt = '#fef2f2'; shirtShade = '#ef4444'; shirtHi = '#ffffff'; pants = '#dc2626'; pantsShade = '#991b1b'; capColor = '#ef4444'; }
    if (starTint) { shirt = starTint; shirtShade = starTint; shirtHi = '#ffffff'; }
    const flip = player.dir < 0;
    const moving = Math.abs(player.vx) > 12 && player.grounded;
    const frame = player.walkFrame;
    const tNow = now();
    // ---- pose / secondary motion ----
    const breathe = (!moving && player.grounded) ? Math.sin(tNow / 420) : 0;     // idle breathing
    // Smooth, continuous bob (two beats per walk cycle) instead of per-frame steps,
    // which read as high-frequency jerking at 13fps.
    const walkPhase = (player.animTime % 6) / 6 * Math.PI * 2;
    const bob = moving ? (0.5 - Math.cos(walkPhase * 2) * 0.5) * 1.6 : (!player.grounded ? -1 : breathe * 1.1);
    const armSwing = moving ? [0, -4, -2, 0, 4, 2][frame] : (!player.grounded ? -5 : breathe);
    const legA = moving ? [0, 5, 2, 0, -4, -2][frame] : (!player.grounded ? -4 : 0);
    const legB = moving ? [0, -4, -2, 0, 5, 2][frame] : (!player.grounded ? 4 : 0);
    const lean = moving ? player.dir * 1.5 : 0;                                  // forward lean while running
    // ---- squash & stretch ----
    let sx = 1, syPose = 1;
    const sinceLand = tNow - (player.landTime || 0);
    if (sinceLand < 130 && player.grounded) { const k = 1 - sinceLand / 130; sx = 1 + .18 * k; syPose = 1 - .16 * k; }   // landing squash
    else if (!player.grounded) { const v = clamp(Math.abs(player.vy) / JUMP_SPEED, 0, 1); sx = 1 - .08 * v; syPose = 1 + .1 * v; } // air stretch
    const blink = !moving && player.grounded && Math.sin(tNow / 1400) > .96;
    // Big/fire forms render slightly taller so size matches the larger hitbox
    const sy = (state.power === 'small' ? 1 : (player.h / 48)) * syPose;
    // The sprite is drawn on a 2x-resolution sub-pixel grid (units of half a game pixel)
    // for finer detail; the final scale(0.5) maps it back to the 25x52 hitbox size.
    const A = armSwing * 2, LA = legA * 2, LB = legB * 2;
    const skinHi = '#ffe0b1', outline = 'rgba(30,27,40,.55)';
    const hairDk = girl ? '#4a2114' : '#2d1a10';
    const pantsHi = state.power === 'fire' ? '#f87171' : '#3756c4';
    const irisCol = girl ? '#7c3aed' : '#1d4ed8';
    ctx.save();
    ctx.translate(x + player.w / 2, y + player.h);            // anchor at the feet so squash keeps feet planted
    if (flip) ctx.scale(-1, 1);
    ctx.scale(sx, sy);
    if (moving) ctx.rotate(lean * Math.PI / 180);
    ctx.scale(.5, .5);                                        // hi-res half-pixel grid
    ctx.translate(-25, -96 + bob * 2);
    // soft contact shadow (two layers for softness)
    drawPixelRect(4, 98, 42, 5, 'rgba(15,23,42,.14)');
    drawPixelRect(9, 99, 32, 3, 'rgba(15,23,42,.16)');
    // ---- back arm (drawn behind body) ----
    drawPixelRect(5, 50 + A, 10, 26, skinShade);
    drawPixelRect(5, 50 + A, 3, 26, '#c98c55');               // arm core shadow
    drawPixelRect(5, 72 + A, 10, 6, '#c98c55');               // back hand
    drawPixelRect(6, 51 + A, 8, 4, shirtShade);               // sleeve
    // ---- hair back / ponytail (girl) ----
    if (girl) {
      const sway = (moving ? [0, 1, 2, 0, -1, -2][frame] : Math.round(Math.sin(tNow / 360) * 1.5)) * 2;
      drawPixelRect(-1 - sway, 14, 12, 38, hair);
      drawPixelRect(0 - sway, 46, 10, 18, '#7c2d12');
      drawPixelRect(1 - sway, 60, 8, 5, hairDk);              // tail tip
      drawPixelRect(1 - sway, 18, 3, 26, hairHi);
      drawPixelRect(2 - sway, 50, 6, 3, '#fbbf24');           // hair tie
    }
    // ---- head: outline + hair ----
    drawPixelRect(7, 0, 28, 42, outline);                     // head silhouette outline
    drawPixelRect(8, 2, 24, 38, hair); drawPixelRect(12, 0, 26, 12, hair);
    drawPixelRect(14, 2, 18, 3, hairHi); drawPixelRect(10, 8, 4, 20, hairHi);   // shine band
    drawPixelRect(9, 30, 22, 10, hairDk);                     // hair underside
    // jagged fringe over the forehead
    for (let i = 0; i < 5; i++) drawPixelRect(15 + i * 4, 9 + (i % 2) * 3, 4, 6 - (i % 2) * 2, hair);
    // ---- face ----
    drawPixelRect(16, 10, 26, 30, skin);
    drawPixelRect(16, 34, 26, 6, skinShade);                  // jaw shading
    drawPixelRect(17, 11, 6, 8, skinHi);                      // forehead light
    drawPixelRect(36, 20, 8, 8, skin); drawPixelRect(40, 24, 4, 4, skinShade); // nose + tip
    // eye: big expressive eye with colored iris, blinks at idle
    if (blink) { drawPixelRect(31, 21, 11, 2, '#1e293b'); }
    else {
      drawPixelRect(31, 17, 11, 9, '#ffffff');
      drawPixelRect(35, 18, 6, 8, irisCol);                   // iris
      drawPixelRect(37, 20, 4, 5, '#0f172a');                 // pupil
      drawPixelRect(35, 18, 2, 2, '#ffffff');                 // big glint
      drawPixelRect(40, 23, 1, 1, '#e2e8f0');                 // small glint
      drawPixelRect(31, 16, 11, 2, hairDk);                   // upper lash line
    }
    drawPixelRect(31, 12, 11, 3, hair);                       // eyebrow
    drawPixelRect(29, 29, 7, 4, cheek);                       // blush
    drawPixelRect(30, 30, 2, 1, '#ffd7c2');                   // blush highlight
    const smile = moving ? 1 : 0;
    drawPixelRect(31, 36 + smile, 8, 2, '#b4304a');           // mouth
    drawPixelRect(30, 35 + smile, 2, 2, '#b4304a');           // smile corner
    drawPixelRect(32, 38 + smile, 6, 1, '#fda4af');           // lower lip light
    drawPixelRect(10, 10, 10, 18, hair); drawPixelRect(16, 8, 22, 5, hairHi);
    // ---- cap with brim, button and stripe (power-colored) ----
    drawPixelRect(11, -1, 30, 7, capColor);
    drawPixelRect(13, 0, 24, 2, '#ffffff');                   // cap stripe
    drawPixelRect(32, 3, 16, 4, capColor);                    // brim
    drawPixelRect(33, 6, 14, 1, 'rgba(15,23,42,.3)');         // brim underside
    drawPixelRect(22, -3, 6, 4, '#fde047');                   // cap button
    // ---- neck + scarf ----
    drawPixelRect(22, 40, 12, 9, skinShade);
    drawPixelRect(16, 44, 22, 6, shirtShade);                 // collar/scarf
    drawPixelRect(17, 44, 20, 2, shirtHi);                    // scarf top light
    // scarf tail flutters when moving / airborne
    const flutter = (moving || !player.grounded) ? Math.round(Math.sin(tNow / 90) * 4) : 0;
    drawPixelRect(4, 46 + flutter, 12, 6, shirtShade);
    drawPixelRect(4, 50 + flutter, 6, 3, shirtHi);            // tail tip
    // ---- torso (3-tone + stitching) ----
    drawPixelRect(11, 47, 30, 34, outline);
    drawPixelRect(12, 48, 28, 32, shirt);
    drawPixelRect(32, 52, 8, 24, shirtShade);                 // side shade
    drawPixelRect(14, 50, 6, 27, shirtHi);                    // front highlight
    drawPixelRect(16, 46, 18, 6, '#e0f2fe');                  // chest panel
    drawPixelRect(24, 52, 2, 22, shirtShade);                 // zipper line
    drawPixelRect(15, 62, 8, 6, shirtShade);                  // pocket
    drawPixelRect(15, 62, 8, 2, shirtHi);                     // pocket flap
    // belt + buckle
    drawPixelRect(12, 74, 28, 6, pantsShade);
    drawPixelRect(23, 74, 7, 6, '#facc15');
    drawPixelRect(25, 76, 3, 2, '#a16207');                   // buckle pin
    // ---- front arm ----
    drawPixelRect(40, 48 - A, 10, 30, skin);
    drawPixelRect(40, 48 - A, 10, 4, shirtShade);             // sleeve
    drawPixelRect(47, 50 - A, 3, 26, skinShade);              // arm side shade
    drawPixelRect(40, 72 - A, 10, 6, skinShade);              // hand
    drawPixelRect(41, 73 - A, 4, 3, skinHi);                  // knuckle light
    if (now() < player.attackUntil) {
      drawPixelRect(48, 36, 34, 10, '#6b7280'); drawPixelRect(70, 26, 16, 16, COLORS.stone);
      drawPixelRect(50, 38, 28, 2, '#9ca3af');                // pick handle glint
      drawPixelRect(72, 28, 5, 5, '#cbd5e1');                 // pick head light
    }
    // ---- legs (3-tone with knee patches) ----
    drawPixelRect(14, 78, 14, 18 + Math.max(0, LA), pants);
    drawPixelRect(14, 78, 4, 18 + Math.max(0, LA), pantsShade);
    drawPixelRect(24, 80, 3, 14 + Math.max(0, LA), pantsHi);
    drawPixelRect(16, 86 + Math.max(0, LA) / 2, 9, 4, pantsHi);   // knee patch
    drawPixelRect(30, 78, 14, 18 + Math.max(0, LB), pantsShade);
    drawPixelRect(40, 80, 3, 14 + Math.max(0, LB), pants);
    drawPixelRect(32, 86 + Math.max(0, LB) / 2, 9, 4, pants);     // knee patch
    // ---- shoes: 3-tone sneakers with laces ----
    const shA = Math.max(0, LA), shB = Math.max(0, LB), bkA = Math.max(0, -LA), bkB = Math.max(0, -LB);
    drawPixelRect(10 + bkA, 94 + shA, 20, 8, '#b91c1c');
    drawPixelRect(10 + bkA, 94 + shA, 20, 2, '#ef4444');      // shoe top light
    drawPixelRect(14 + bkA, 96 + shA, 6, 2, '#f8fafc');       // lace
    drawPixelRect(10 + bkA, 100 + shA, 22, 3, '#f8fafc');     // sole
    drawPixelRect(28 + bkB, 94 + shB, 20, 8, '#b91c1c');
    drawPixelRect(28 + bkB, 94 + shB, 20, 2, '#ef4444');
    drawPixelRect(32 + bkB, 96 + shB, 6, 2, '#f8fafc');
    drawPixelRect(28 + bkB, 100 + shB, 22, 3, '#f8fafc');
    ctx.restore(); ctx.globalAlpha = 1;
  }

  function drawPet() {
    const bob = Math.sin(pet.bob) * 3;
    const x = Math.round(pet.x - state.camera.x), y = Math.round(pet.y - state.camera.y + bob);
    if (state.petBitmap && state.petMeta?.uv) {
      const u = state.petMeta.uv;
      try {
        ctx.drawImage(state.petBitmap, u.x, u.y, u.width, u.height, x - 4, y - 8, pet.w + 8, pet.h + 8);
      } catch (err) {
        state.petBitmap = null;
        requestPetImage();
      }
    } else {
      drawDefaultPet(x, y);
    }
    drawRect(x + 2, y + pet.h - 2, pet.w - 4, 4, 'rgba(15,23,42,.16)');
  }

  function drawDefaultPet(x, y) {
    const blink = Math.sin(now() / 260) > .86;
    drawRect(x + 4, y + 8, 30, 25, '#f9a8d4');
    drawRect(x + 8, y + 1, 7, 10, '#f9a8d4');
    drawRect(x + 23, y + 1, 7, 10, '#f9a8d4');
    drawRect(x + 6, y + 13, 26, 14, '#fbcfe8');
    drawRect(x + 12, y + 17, 4, blink ? 1 : 4, '#0f172a');
    drawRect(x + 24, y + 17, 4, blink ? 1 : 4, '#0f172a');
    drawRect(x + 18, y + 24, 5, 3, '#be185d');
  }

  function drawPetBitmapArt(art, x, y, w, h, flip = false, alpha = 1) {
    if (!art?.bitmap || !art?.uv) return false;
    const u = art.uv;
    ctx.save();
    ctx.globalAlpha *= alpha;
    ctx.imageSmoothingEnabled = false;
    if (flip) {
      ctx.translate(x + w / 2, y + h / 2);
      ctx.scale(-1, 1);
      ctx.drawImage(art.bitmap, u.x, u.y, u.width, u.height, -w / 2, -h / 2, w, h);
    } else {
      ctx.drawImage(art.bitmap, u.x, u.y, u.width, u.height, x, y, w, h);
    }
    ctx.restore();
    ctx.imageSmoothingEnabled = false;
    return true;
  }

  function drawHpBar(x, y, w, pct, color) {
    pct = clamp(pct || 0, 0, 1);
    drawRect(x, y, w, 5, 'rgba(15,23,42,.45)');
    drawRect(x + 1, y + 1, (w - 2) * pct, 3, color);
  }

  function drawPickup(p) {
    if (p.taken) return;
    if (p.type === 'spring') { drawSpring(p); return; }
    const x = Math.round(p.x - state.camera.x), y = Math.round(p.y - state.camera.y + Math.sin(p.bob) * 4);
    if (p.type === 'power') { drawPowerUp(p, x, y); return; }
    if (p.type === 'crystal') {
      drawRect(x + 8, y, 8, 4, '#e0ffff'); drawRect(x + 4, y + 4, 16, 16, COLORS.crystal); drawRect(x + 8, y + 20, 8, 6, '#0891b2'); drawRect(x + 8, y + 5, 4, 14, '#fff');
    } else if (p.type === 'potion' || p.type === 'heart') {
      // Pixel-art red heart (heals one segment of the health bar)
      drawRect(x + 2, y + 2, 6, 6, COLORS.heart); drawRect(x + 12, y + 2, 6, 6, COLORS.heart);
      drawRect(x + 2, y + 6, 16, 6, COLORS.heart);
      drawRect(x + 4, y + 12, 12, 3, COLORS.heart); drawRect(x + 7, y + 15, 6, 2, COLORS.heart);
      drawRect(x + 4, y + 4, 3, 3, '#fecaca'); // shine
    } else {
      drawRect(x + 3, y + 1, 10, 14, COLORS.gold); drawRect(x + 5, y + 3, 6, 10, '#fde68a'); drawRect(x + 2, y + 5, 12, 2, '#b45309');
    }
  }

  function drawPowerUp(p, x, y) {
    const def = POWERUPS[p.power] || POWERUPS.mushroom;
    // pulsing glow box behind the icon
    const pulse = (Math.sin(now() / 200) + 1) * 0.5;
    ctx.save();
    ctx.globalAlpha = 0.35 + pulse * 0.25;
    drawRect(x - 2, y - 2, p.w + 4, p.h + 4, def.accent);
    ctx.restore();
    if (p.power === 'mushroom' || p.power === 'oneup') {
      const cap = p.power === 'oneup' ? '#22c55e' : '#ef4444';
      drawRect(x + 4, y + 14, p.w - 8, 10, '#fef3c7');
      drawRect(x + 2, y + 4, p.w - 4, 12, cap);
      drawRect(x + 6, y + 6, 4, 4, '#fff'); drawRect(x + p.w - 12, y + 7, 5, 4, '#fff');
      drawRect(x + 8, y + 18, 3, 3, '#0f172a'); drawRect(x + p.w - 11, y + 18, 3, 3, '#0f172a');
    } else if (p.power === 'fireflower') {
      drawRect(x + p.w / 2 - 1, y + 12, 3, 11, '#16a34a');
      drawRect(x + 4, y + 18, p.w - 8, 3, '#22c55e');
      ['#f97316', '#facc15', '#ef4444'].forEach((c, i) => { drawRect(x + 4 + i * 6, y + 2 + (i % 2) * 4, 6, 6, c); });
      drawRect(x + p.w / 2 - 3, y + 6, 6, 6, '#fff7ed');
    } else if (p.power === 'star') {
      ctx.save();
      ctx.translate(x + p.w / 2, y + p.h / 2);
      ctx.rotate(now() / 600);
      ctx.fillStyle = '#facc15';
      ctx.beginPath();
      for (let i = 0; i < 10; i++) { const r = i % 2 ? 5 : 12; const a = (i / 10) * Math.PI * 2 - Math.PI / 2; ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff7c2';
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
    }
  }

  function drawSpring(p) {
    const x = Math.round(p.x - state.camera.x), y = Math.round(p.y - state.camera.y);
    const squish = p.squish ? Math.round(p.squish * 14) : 0;
    if (p.squish) p.squish = Math.max(0, p.squish - 0.03);
    const baseY = y + 16;
    drawRect(x, baseY + 6, p.w, 4, '#475569');
    // coils
    const coilTop = baseY - 6 + squish;
    for (let i = 0; i < 3; i++) drawRect(x + 3, coilTop + i * (3 + (squish ? 0 : 1)) + 4, p.w - 6, 2, '#94a3b8');
    drawRect(x + 1, coilTop, p.w - 2, 6, '#cbd5e1');
    drawRect(x + 3, coilTop - 1, p.w - 6, 3, '#f1f5f9');
  }

  function drawPlayerShots() {
    for (const f of state.playerShots) {
      const x = Math.round(f.x - state.camera.x), y = Math.round(f.y - state.camera.y);
      const r = f.r;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(f.spin);
      drawRect(-r, -r, r * 2, r * 2, PLAYER_FIRE.color);
      drawRect(-r + 2, -r + 2, r * 2 - 4, r * 2 - 4, '#fde047');
      drawRect(-2, -2, 4, 4, PLAYER_FIRE.accent);
      ctx.restore();
      spawnTrailIfNeeded(f);
    }
  }

  function spawnTrailIfNeeded(f) {
    if (Math.random() < 0.5) state.particles.push({ x: f.x, y: f.y, vx: rand(-30, 30), vy: rand(-20, 20), life: .25, max: .25, size: rand(2, 4), color: PLAYER_FIRE.color });
  }

  function drawEnemy(e) {
    if (e.dead) return;
    const x = Math.round(e.x - state.camera.x), y = Math.round(e.y - state.camera.y);
    const def = MONSTERS[e.type] || MONSTERS.slime;
    const hurt = now() < (e.hurtUntil || 0);
    const art = state.petBitmaps[(typeof e.artIndex === 'number' ? e.artIndex : -1)];
    const size = e.boss ? Math.max(68, Math.min(92, 64 + state.level * 3)) : Math.max(40, Math.min(54, 38 + state.level * 2 + (e.maxHp || 1)));
    const bob = Math.sin(now() / 180 + (e.artIndex || 0)) * (e.flying ? 4 : 1.5);
    if (art?.bitmap && art?.uv) {
      drawRect(x + e.w / 2 - 16, y + e.h - 2, 32, 5, 'rgba(15,23,42,.16)');
      const drawn = drawPetBitmapArt(art, Math.round(x + e.w / 2 - size / 2), Math.round(y + e.h - size + 7 + bob), size, size, e.vx < 0, hurt ? .62 : 1);
      if (drawn) {
        drawHpBar(x + e.w / 2 - (e.boss ? 30 : 18), y - (e.boss ? 14 : 7), e.boss ? 60 : 36, e.hp / e.maxHp, e.boss ? '#f97316' : '#ef4444');
        if (e.boss) { ctx.fillStyle = '#7c2d12'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('BOSS', x + e.w / 2, y - 18); }
        return;
      }
    }
    if (hurt) ctx.globalAlpha = .62;
    drawRect(x + 2, y + e.h - 2, e.w - 4, 4, 'rgba(15,23,42,.14)');
    if (e.type === 'wolf') {
      drawRect(x + 2, y + 10, e.w - 4, 14, def.color); drawRect(x + 8, y + 2, 20, 13, def.color);
      drawRect(x + 4, y, 7, 8, def.color); drawRect(x + 24, y, 7, 8, def.color); drawRect(x + 28, y + 12, 8, 5, def.accent);
    } else if (e.type === 'boar') {
      drawRect(x + 1, y + 9, e.w - 2, 16, def.color); drawRect(x + 6, y + 3, 21, 12, '#854d0e');
      drawRect(x + 1, y + 15, 6, 4, '#fef3c7'); drawRect(x + 27, y + 15, 6, 4, '#fef3c7');
    } else if (e.type === 'fox') {
      drawRect(x + 3, y + 9, e.w - 7, 14, def.color); drawRect(x + 9, y + 2, 18, 12, def.color);
      drawRect(x + 5, y, 6, 8, def.accent); drawRect(x + 23, y, 6, 8, def.accent); drawRect(x + 25, y + 12, 10, 5, '#fb923c');
    } else if (e.type === 'mushpet') {
      drawRect(x + 7, y + 12, e.w - 14, 16, def.color); drawRect(x + 2, y + 2, e.w - 4, 14, def.accent);
      drawRect(x + 7, y + 5, 5, 4, '#fff'); drawRect(x + 20, y + 4, 6, 5, '#fff');
    } else if (e.type === 'bat') {
      const flap = Math.sin(now() / 90) > 0 ? 3 : -1;
      drawRect(x, y + 8 + flap, 10, 6, def.color); drawRect(x + 20, y + 8 + flap, 10, 6, def.color); drawRect(x + 10, y + 5, 10, 13, def.color);
      drawRect(x + 7, y + 4 + flap, 5, 5, def.accent); drawRect(x + 18, y + 4 + flap, 5, 5, def.accent);
    } else if (e.type === 'frog') {
      // round water frog with big eyes
      drawRect(x + 3, y + 10, e.w - 6, e.h - 12, def.color);
      drawRect(x + 6, y + 6, e.w - 12, 8, def.color);
      drawRect(x + 5, y + 3, 7, 7, def.accent); drawRect(x + e.w - 12, y + 3, 7, 7, def.accent);  // eye bumps
      drawRect(x + 7, y + 5, 3, 3, '#0f172a'); drawRect(x + e.w - 10, y + 5, 3, 3, '#0f172a');     // pupils
      drawRect(x + 8, y + e.h - 6, e.w - 16, 2, '#075985');                                          // mouth
      drawRect(x + 1, y + e.h - 4, 6, 3, def.color); drawRect(x + e.w - 7, y + e.h - 4, 6, 3, def.color); // feet
    } else {
      drawRect(x + 2, y + 8, e.w - 4, e.h - 8, def.color); drawRect(x + 6, y + 2, e.w - 12, 10, def.accent);
    }
    drawRect(x + Math.max(7, e.w * .3), y + 13, 4, 4, '#0f172a'); drawRect(x + Math.min(e.w - 10, e.w * .65), y + 13, 4, 4, '#0f172a');
    if (e.maxHp > 2) { drawRect(x + 2, y - (e.boss ? 12 : 6), e.w - 4, e.boss ? 6 : 4, 'rgba(15,23,42,.35)'); drawRect(x + 3, y - (e.boss ? 10 : 5), (e.w - 6) * clamp(e.hp / e.maxHp, 0, 1), e.boss ? 3 : 2, e.boss ? '#f97316' : '#ef4444'); }
    if (e.boss) { ctx.fillStyle = '#7c2d12'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('BOSS', x + e.w / 2, y - 15); }
    ctx.globalAlpha = 1;
  }

  function drawProjectile(p) {
    const info = ELEMENTS[p.element] || ELEMENTS.nature;
    const x = Math.round(p.x - state.camera.x), y = Math.round(p.y - state.camera.y);
    const r = p.r || 5;
    ctx.save();
    ctx.globalAlpha = clamp(p.life, .35, 1);
    drawRect(x - r, y - r, r * 2, r * 2, info.color);
    drawRect(x - Math.max(1, r - 3), y - Math.max(1, r - 3), Math.max(2, (r - 3) * 2), Math.max(2, (r - 3) * 2), info.accent);
    ctx.fillStyle = '#0f172a';
    ctx.font = `${p.fromBoss ? 15 : 11}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(info.icon, x, y + 4);
    ctx.restore();
  }

  function drawParticles() {
    for (const p of state.particles) { ctx.globalAlpha = clamp(p.life / p.max, 0, 1); drawRect(p.x - state.camera.x, p.y - state.camera.y, p.size, p.size, p.color); }
    ctx.globalAlpha = 1;
  }

  function draw() {
    const vw = window.innerWidth, vh = window.innerHeight;
    // Before the world exists (intro overlay covering the canvas), draw only the
    // sky/hill background so we never trigger world generation on the boot frame.
    if (!state.generatedCols) { drawBackground(vw, vh); return; }
    ensureWorldGeneratedTo(Math.ceil((state.camera.x + vw) / TILE) + 3);
    drawBackground(vw, vh);
    drawTrees();
    const c0 = clamp(Math.floor(state.camera.x / TILE) - 2, 0, WORLD_COLS - 1), c1 = clamp(Math.ceil((state.camera.x + vw) / TILE) + 2, 0, WORLD_COLS - 1);
    const r0 = clamp(Math.floor(state.camera.y / TILE) - 2, 0, WORLD_ROWS - 1), r1 = clamp(Math.ceil((state.camera.y + vh) / TILE) + 2, 0, WORLD_ROWS - 1);
    for (let r = r0; r <= r1; r++) for (let c = c0; c <= c1; c++) { const v = tileAt(c, r); if (v) drawTile(c, r, v); }
    drawTerrainDetails();
    for (const p of state.pickups) drawPickup(p);
    for (const e of state.enemies) drawEnemy(e);
    for (const p of state.projectiles) drawProjectile(p);
    drawPlayerShots();
    drawPet(); drawStarAura(); drawMaster(); drawParticles();
    ctx.fillStyle = 'rgba(15,23,42,.18)';
    ctx.fillRect(0, vh - 5, vw, 5);
  }

  function loop(t) {
    const dt = Math.min(0.033, Math.max(0, (t - state.lastTime) / 1000 || 0));
    state.lastTime = t;
    update(dt); draw();
    state.rafId = requestAnimationFrame(loop);
  }

  async function setPetImage(data) {
    if (!data?.imageBlob || !data?.uv) return;
    if (state.currentPetId && data.petId && data.petId !== state.currentPetId) return;
    try {
      const nextBitmap = await createImageBitmap(data.imageBlob);
      const oldBitmap = state.petBitmap;
      if (state.petUrl) URL.revokeObjectURL(state.petUrl);
      state.petMeta = data;
      state.currentPetId = data.petId || state.currentPetId;
      state.petBitmap = nextBitmap;
      oldBitmap?.close?.();
    } catch (err) {}
  }

  async function setPetImages(data) {
    const pets = data?.pets || [];
    if (!pets.length || state.petBitmaps.length) return;
    if (!state.petBitmap) setFallbackPetImage(pets[0]);
    try {
      for (const old of state.petBitmaps) old.bitmap?.close?.();
      state.petBitmaps = [];
      for (const item of pets.slice(0, 12)) {
        if (!item?.imageBlob || !item?.uv) continue;
        const bitmap = await createImageBitmap(item.imageBlob);
        state.petBitmaps.push({ bitmap, uv: item.uv, name: item.name || '野生宠物' });
      }
      state.petArtCursor = 0;
      refreshEnemyArt();
    } catch (err) {}
  }

  async function setFallbackPetImage(data) {
    const lockedPetId = state.currentPetId;
    state.currentPetId = '';
    await setPetImage(data);
    state.currentPetId = state.petMeta?.petId || lockedPetId || '';
  }

  function requestPetImage() {
    const requestId = `haqi_adventure_pet_${Date.now()}`;
    state.petRequestId = requestId;
    try { window.parent?.postMessage({ type: 'haqi_get_pet_image', requestId, anim: 'happy', currentOnly: true, petId: state.currentPetId || undefined }, '*'); } catch (err) {}
    setTimeout(() => { if (!state.petBitmap) requestPetImages(); }, 1200);
  }

  function requestPetImages() {
    const requestId = `haqi_adventure_wild_pets_${Date.now()}`;
    try { window.parent?.postMessage({ type: 'haqi_get_pet_images', requestId, anim: 'idle' }, '*'); } catch (err) {}
  }

  function onKey(e, down) {
    const k = e.key.toLowerCase();
    if (['arrowleft', 'a'].includes(k)) input.left = down;
    if (['arrowright', 'd'].includes(k)) input.right = down;
    if (['arrowup', 'w'].includes(k)) input.up = down;
    if (['arrowdown', 's'].includes(k)) input.down = down;
    if (k === ' ' || k === 'spacebar') { input.jump = down; if (down) e.preventDefault(); }
    if (k === 'e' || k === 'enter') { input.action = down; if (down) e.preventDefault(); }
    if (k === 'escape' && down) toggleOverlay();
  }

  function setJoystickVisible(visible, x = input.joyStartX, y = input.joyStartY) {
    joystick.classList.toggle('show', visible);
    joystick.style.setProperty('--x', `${x}px`);
    joystick.style.setProperty('--y', `${y}px`);
  }

  function updateJoystick(clientX, clientY) {
    input.joyX = clamp(clientX - input.joyStartX, -46, 46);
    input.joyY = clamp(clientY - input.joyStartY, -46, 46);
    knob.style.setProperty('--kx', `${input.joyX}px`);
    knob.style.setProperty('--ky', `${input.joyY}px`);
    input.up = input.joyY < -27;
    input.down = input.joyY > 30;
  }

  function onPointerDown(e) {
    if (!state.started || overlay.hidden === false) return;
    if (e.pointerType !== 'touch') return;
    // Touching the action buttons (jump/mine) shouldn't start a move-drag.
    if (e.target && e.target.closest && e.target.closest('.ha-actions')) return;
    // Drag anywhere on the screen to move; the joystick appears wherever you touch.
    if (input.joyId === null) {
      input.joyId = e.pointerId; input.joyActive = true; input.joyStartX = e.clientX; input.joyStartY = e.clientY;
      shell.setPointerCapture?.(e.pointerId); setJoystickVisible(true, e.clientX, e.clientY); updateJoystick(e.clientX, e.clientY); e.preventDefault();
    }
  }

  function onPointerMove(e) {
    if (e.pointerId === input.joyId) { updateJoystick(e.clientX, e.clientY); e.preventDefault(); }
  }

  function onPointerUp(e) {
    if (e.pointerId === input.joyId) {
      input.joyId = null; input.joyActive = false; input.joyX = 0; input.joyY = 0; input.up = false; input.down = false;
      knob.style.setProperty('--kx', '0px'); knob.style.setProperty('--ky', '0px'); setJoystickVisible(false); e.preventDefault();
    }
  }

  function touchJoyId(touch) { return `touch_${touch.identifier}`; }
  function findJoyTouch(list) {
    if (typeof input.joyId !== 'string' || !input.joyId.startsWith('touch_')) return null;
    for (const touch of list) if (touchJoyId(touch) === input.joyId) return touch;
    return null;
  }
  function onTouchStart(e) {
    if (!state.started || overlay.hidden === false || input.joyId !== null) return;
    if (e.target && e.target.closest && e.target.closest('.ha-actions')) return;
    const touch = e.changedTouches?.[0];
    if (!touch) return;
    input.joyId = touchJoyId(touch); input.joyActive = true; input.joyStartX = touch.clientX; input.joyStartY = touch.clientY;
    setJoystickVisible(true, touch.clientX, touch.clientY); updateJoystick(touch.clientX, touch.clientY); e.preventDefault();
  }
  function onTouchMove(e) {
    const touch = findJoyTouch(e.changedTouches || e.touches || []);
    if (!touch) return;
    updateJoystick(touch.clientX, touch.clientY); e.preventDefault();
  }
  function onTouchEnd(e) {
    const touch = findJoyTouch(e.changedTouches || []);
    if (!touch) return;
    input.joyId = null; input.joyActive = false; input.joyX = 0; input.joyY = 0; input.up = false; input.down = false;
    knob.style.setProperty('--kx', '0px'); knob.style.setProperty('--ky', '0px'); setJoystickVisible(false); e.preventDefault();
  }

  function toggleOverlay() {
    overlay.hidden = !overlay.hidden;
    ui.restart.hidden = !state.finished;
  }

  function releaseActionButtons() {
    input.pointerJumpQueued = false;
    input.actionPointers.clear();
    input.action = false;
  }

  function releaseMinePointer(e) {
    input.actionPointers.delete(e.pointerId);
    input.action = input.actionPointers.size > 0;
    e.currentTarget?.releasePointerCapture?.(e.pointerId);
    e.currentTarget?.blur?.();
    e.preventDefault?.();
  }

  root.querySelector('#haHelp').addEventListener('click', toggleOverlay);
  ui.start.addEventListener('click', startGame);
  ui.restart.addEventListener('click', () => { overlay.hidden = true; resetGame(); });
  root.querySelectorAll('[data-master]').forEach(btn => btn.addEventListener('click', () => { state.masterStyle = btn.dataset.master; localStorage.setItem(STORAGE_MASTER, state.masterStyle); updateChoiceButtons(); }));
  root.querySelectorAll('[data-difficulty]').forEach(btn => btn.addEventListener('click', () => { state.difficulty = btn.dataset.difficulty; localStorage.setItem(STORAGE_DIFFICULTY, state.difficulty); updateChoiceButtons(); updateHud(); }));
  const jumpButton = root.querySelector('#haJump');
  const mineButton = root.querySelector('#haMine');
  jumpButton.addEventListener('pointerdown', e => { input.pointerJumpQueued = true; jumpButton.setPointerCapture?.(e.pointerId); e.preventDefault(); });
  jumpButton.addEventListener('pointerup', e => { input.pointerJumpQueued = false; jumpButton.releasePointerCapture?.(e.pointerId); jumpButton.blur(); e.preventDefault(); });
  jumpButton.addEventListener('pointercancel', e => { input.pointerJumpQueued = false; jumpButton.releasePointerCapture?.(e.pointerId); jumpButton.blur(); });
  jumpButton.addEventListener('lostpointercapture', () => { input.pointerJumpQueued = false; jumpButton.blur(); });
  mineButton.addEventListener('pointerdown', e => { input.actionPointers.add(e.pointerId); input.action = true; mineButton.setPointerCapture?.(e.pointerId); mineBlock(); e.preventDefault(); });
  mineButton.addEventListener('pointerup', releaseMinePointer);
  mineButton.addEventListener('pointercancel', releaseMinePointer);
  mineButton.addEventListener('lostpointercapture', () => { input.actionPointers.clear(); input.action = false; mineButton.blur(); });
  mineButton.addEventListener('pointerleave', e => { if (input.actionPointers.has(e.pointerId)) releaseMinePointer(e); });
  window.addEventListener('keydown', e => onKey(e, true));
  window.addEventListener('keyup', e => onKey(e, false));
  window.addEventListener('blur', releaseActionButtons);
  window.addEventListener('pointerup', releaseActionButtons);
  window.addEventListener('pointercancel', releaseActionButtons);
  shell.addEventListener('pointerdown', onPointerDown, { passive: false });
  shell.addEventListener('pointermove', onPointerMove, { passive: false });
  shell.addEventListener('pointerup', onPointerUp, { passive: false });
  shell.addEventListener('pointercancel', onPointerUp, { passive: false });
  shell.addEventListener('touchstart', onTouchStart, { passive: false });
  shell.addEventListener('touchmove', onTouchMove, { passive: false });
  shell.addEventListener('touchend', onTouchEnd, { passive: false });
  shell.addEventListener('touchcancel', onTouchEnd, { passive: false });
  // Click-to-mine on the right of the screen is for mouse/desktop only — on touch you drag to move
  // and use the on-screen ⛏ button, so we don't want taps to accidentally mine.
  const isTouchDevice = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  canvas.addEventListener('click', e => { if (isTouchDevice || !state.started || state.finished || overlay.hidden === false) return; if (e.clientX > window.innerWidth * .38) mineBlock(); });
  window.addEventListener('resize', resize);
  window.addEventListener('message', event => {
    const msg = event.data || {};
    if (msg.type === 'haqi_pet_image' && msg.ok && (msg.requestId === 'active_pet_config' || !state.petRequestId || !msg.requestId || msg.requestId === state.petRequestId)) setPetImage(msg.data);
    if (msg.type === 'haqi_pet_images' && msg.ok) setPetImages(msg.data);
    if (msg.type === 'setGameConfig' && msg.data?.petId) { state.currentPetId = msg.data.petId; requestPetImage(); }
    if (msg.type === 'setGameConfig' && msg.data?.masterStyle) { state.masterStyle = msg.data.masterStyle === 'girl' ? 'girl' : 'boy'; updateChoiceButtons(); }
    if (msg.type === 'setGameConfig' && msg.data?.difficulty && DIFFICULTIES[msg.data.difficulty]) { state.difficulty = msg.data.difficulty; updateChoiceButtons(); updateHud(); }
  });

  // Critical path: only the intro overlay (which covers the canvas) needs to be
  // ready for first paint. World generation (a ~240k-cell allocation + hundreds
  // of columns), heart-building, the pet image request and the render loop are
  // all deferred until after first paint. startGame()->resetGame() regenerates
  // the world anyway, so nothing heavy here is needed before the user taps Start.
  updateChoiceButtons();
  if (!state.loadedPosted) { state.loadedPosted = true; post('gameLoaded', { title: '宠物冒险' }); }
  requestAnimationFrame(() => requestAnimationFrame(() => {
    resize(); buildHearts(); updateHud();
    state.lastTime = performance.now(); state.rafId = requestAnimationFrame(loop);
    setTimeout(requestPetImage, 0);
  }));
})();
</script>

</html>
